<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FF Borracharia - Painel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#020617;color:#fff}
.wrap{max-width:1200px;margin:auto;padding:16px}
.box{background:#111827;padding:16px;border-radius:18px;margin-bottom:14px}
.hero{background:linear-gradient(135deg,#f59e0b,#dc2626)}
input,button,select{width:100%;padding:12px;border-radius:10px;margin-top:10px;border:none}
button{background:#f59e0b;color:#fff;font-weight:bold;cursor:pointer}
.lista{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
.card{background:#0f172a;padding:12px;border-radius:14px}
.tag{padding:5px 10px;border-radius:999px;font-size:12px}
.aguardando{background:#78350f}
.aceito{background:#1d4ed8}
.em_andamento{background:#0f766e}
.finalizado{background:#166534}
</style>
</head>

<body>
<div class="wrap">

<div class="box hero">
<h2>FF Borracharia - Painel</h2>
</div>

<div class="box" id="loginBox">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<div id="msg"></div>
</div>

<div id="painel" style="display:none">

<div class="box">
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="cidade" placeholder="Cidade">
<input id="raio" type="number" placeholder="Raio km">

<select id="status">
<option value="true">Aberta</option>
<option value="false">Fechada</option>
</select>

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<button onclick="salvarPerfil()">Salvar</button>
<button onclick="sair()">Sair</button>
</div>

<div class="box">
<button onclick="listar()">Atualizar</button>
</div>

<div class="lista" id="lista"></div>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let user = null;
let perfil = null;

function msg(t,c="red"){document.getElementById("msg").innerText=t}

window.login = async () => {
const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

const {data,error} = await supabase.auth.signInWithPassword({email,password:senha});

if(error){msg("Login inválido");return;}

const {data:perfilB} = await supabase
.from("borracheiros")
.select("*")
.eq("user_id", data.user.id)
.maybeSingle();

if(!perfilB){
await supabase.auth.signOut();
msg("Acesso negado");
return;
}

user = data.user;
perfil = perfilB;

document.getElementById("loginBox").style.display="none";
document.getElementById("painel").style.display="block";

preencher();
listar();
};

async function preencher(){
document.getElementById("nome").value = perfil.nome || "";
document.getElementById("telefone").value = perfil.telefone || "";
document.getElementById("cidade").value = perfil.cidade || "";
document.getElementById("raio").value = perfil.raio_atendimento_km || 10;
document.getElementById("lat").value = perfil.latitude || "";
document.getElementById("lng").value = perfil.longitude || "";
document.getElementById("status").value = String(perfil.aberto);
}

window.salvarPerfil = async () => {
const {data,error} = await supabase
.from("borracheiros")
.update({
nome:document.getElementById("nome").value,
telefone:document.getElementById("telefone").value,
cidade:document.getElementById("cidade").value,
raio_atendimento_km:Number(document.getElementById("raio").value),
latitude:Number(document.getElementById("lat").value),
longitude:Number(document.getElementById("lng").value),
aberto:document.getElementById("status").value==="true"
})
.eq("id", perfil.id)
.select()
.single();

perfil = data;
alert("Salvo");
};

window.listar = async () => {
const {data} = await supabase
.from("chamados_borracharia")
.select("*")
.order("created_at",{ascending:false});

const box = document.getElementById("lista");

box.innerHTML = data.map(c=>`
<div class="card">
<div class="tag ${c.status}">${c.status}</div>
<div>${c.cliente_nome}</div>
<div>${c.problema}</div>

<button onclick="aceitar('${c.id}')">Aceitar</button>
<button onclick="iniciar('${c.id}')">Iniciar</button>
<button onclick="finalizar('${c.id}')">Finalizar</button>
</div>
`).join("");
};

window.aceitar = async (id)=>{
await supabase.from("chamados_borracharia").update({
status:"aceito",
borracheiro_id:perfil.id
}).eq("id",id);
listar();
};

window.iniciar = async (id)=>{
await supabase.from("chamados_borracharia").update({
status:"em_andamento"
}).eq("id",id);
listar();
};

window.finalizar = async (id)=>{
await supabase.from("chamados_borracharia").update({
status:"finalizado"
}).eq("id",id);
listar();
};

window.sair = async ()=>{
await supabase.auth.signOut();
location.reload();
};
</script>
</body>
</html>
