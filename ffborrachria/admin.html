<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Borracharia - Painel</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#020617;
      color:#fff;
      min-height:100vh;
    }
    .wrap{
      width:min(1200px,100%);
      margin:0 auto;
      padding:16px;
    }
    .topo{
      position:sticky;
      top:0;
      z-index:20;
      background:#020617;
      padding-bottom:12px;
    }
    .box{
      background:#111827;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
    }
    .hero{
      background:linear-gradient(135deg,#f59e0b,#dc2626);
      border:none;
    }
    .hero h1{
      font-size:26px;
      margin-bottom:6px;
    }
    .muted{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.5;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .grid4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }
    .full{grid-column:1/-1}
    input,button,select{
      width:100%;
      border:none;
      outline:none;
      padding:13px 12px;
      border-radius:12px;
      font-size:15px;
    }
    input,select{
      background:#1f2937;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }
    button{
      cursor:pointer;
      font-weight:700;
      color:#fff;
      background:#f59e0b;
    }
    button.sec{background:#334155}
    button.green{background:#16a34a}
    button.red{background:#dc2626}
    button.blue{background:#2563eb}
    .lista{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:14px;
    }
    .card{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px;
    }
    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      margin-bottom:10px;
    }
    .aguardando{background:#78350f}
    .aceito{background:#1d4ed8}
    .em_andamento{background:#0f766e}
    .finalizado{background:#166534}
    .cancelado{background:#7f1d1d}
    .titulo{
      font-size:18px;
      font-weight:800;
      margin-bottom:8px;
      color:#fbbf24;
    }
    .linha{
      line-height:1.6;
      font-size:14px;
      color:#e5e7eb;
    }
    .acoes3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    .statusMsg{
      min-height:20px;
      margin-top:8px;
      font-size:14px;
      color:#86efac;
    }
    .toggleBox{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
    }
    .statusLoja{
      display:inline-block;
      margin-top:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }
    .abertoTag{background:#166534}
    .fechadoTag{background:#7f1d1d}
    @media(max-width:900px){
      .grid,.grid3,.grid4,.acoes3{grid-template-columns:1fr}
      .hero h1{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topo">
      <div class="box hero">
        <h1>FF Borracharia - Painel do Borracheiro</h1>
        <div class="muted">Marque aberto ou fechado, defina raio de atendimento e receba chamados.</div>
      </div>
    </div>

    <div class="box" id="boxLogin">
      <div class="grid">
        <div>
          <label class="muted">Email</label>
          <input id="email" type="email" placeholder="Seu email" />
        </div>
        <div>
          <label class="muted">Senha</label>
          <input id="senha" type="password" placeholder="Sua senha" />
        </div>
        <div class="full">
          <button id="btnLogin">Entrar</button>
          <div class="statusMsg" id="loginMsg"></div>
        </div>
      </div>
    </div>

    <div id="painelApp" style="display:none;">
      <div class="box">
        <div class="grid4">
          <div>
            <label class="muted">Nome da borracharia</label>
            <input id="nomeBorracheiro" placeholder="Nome" />
          </div>
          <div>
            <label class="muted">Telefone</label>
            <input id="telefoneBorracheiro" placeholder="Telefone" />
          </div>
          <div>
            <label class="muted">Cidade</label>
            <input id="cidadeBorracheiro" placeholder="Cidade" />
          </div>
          <div>
            <label class="muted">Raio de atendimento (km)</label>
            <input id="raioAtendimento" type="number" min="1" step="0.1" placeholder="10" />
          </div>

          <div>
            <label class="muted">Latitude da borracharia</label>
            <input id="latBorracheiro" placeholder="-9.000000" />
          </div>
          <div>
            <label class="muted">Longitude da borracharia</label>
            <input id="lngBorracheiro" placeholder="-42.000000" />
          </div>

          <div>
            <label class="muted">Status da borracharia</label>
            <select id="statusAberto">
              <option value="true">Aberta</option>
              <option value="false">Fechada</option>
            </select>
          </div>

          <div class="toggleBox">
            <div class="muted">Situação atual</div>
            <div id="statusAtualLoja" class="statusLoja abertoTag">ABERTA</div>
          </div>

          <div class="full">
            <button id="btnPegarMinhaLocalizacao" class="sec">Usar minha localização atual</button>
          </div>

          <div class="full">
            <button id="btnSalvarPerfil" class="blue">Salvar perfil</button>
            <button id="btnSair" class="sec" style="margin-top:10px;">Sair</button>
            <div class="statusMsg" id="perfilMsg"></div>
          </div>
        </div>
      </div>

      <div class="box">
        <div class="grid3">
          <div>
            <label class="muted">Filtro de status</label>
            <select id="filtroStatus">
              <option value="todos">Todos</option>
              <option value="aguardando">Aguardando</option>
              <option value="aceito">Aceito</option>
              <option value="em_andamento">Em andamento</option>
              <option value="finalizado">Finalizado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
          <div>
            <label class="muted">Atualização</label>
            <input value="5 segundos" readonly />
          </div>
          <div>
            <label class="muted">Ação</label>
            <button id="btnAtualizar" class="green">Atualizar agora</button>
          </div>
        </div>
      </div>

      <div class="lista" id="listaChamados"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    const el = (id) => document.getElementById(id);

    let userLogado = null;
    let perfilBorracheiro = null;
    let intervalLista = null;

    function setMsg(id, texto, cor = "#86efac"){
      el(id).style.color = cor;
      el(id).textContent = texto;
    }

    function traduzirStatus(status){
      if(status === "aguardando") return "Aguardando";
      if(status === "aceito") return "Aceito";
      if(status === "em_andamento") return "Em andamento";
      if(status === "finalizado") return "Finalizado";
      if(status === "cancelado") return "Cancelado";
      return status || "-";
    }

    function atualizarStatusVisualLoja(valor){
      const aberto = String(valor) === "true" || valor === true;
      el("statusAtualLoja").textContent = aberto ? "ABERTA" : "FECHADA";
      el("statusAtualLoja").className = "statusLoja " + (aberto ? "abertoTag" : "fechadoTag");
    }

    async function login(){
      const email = el("email").value.trim();
      const senha = el("senha").value.trim();

      if(!email || !senha){
        setMsg("loginMsg", "Preencha email e senha.", "#fca5a5");
        return;
      }

      el("btnLogin").disabled = true;
      el("btnLogin").textContent = "Entrando...";

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      });

      el("btnLogin").disabled = false;
      el("btnLogin").textContent = "Entrar";

      if(error){
        console.error(error);
        setMsg("loginMsg", "Login inválido.", "#fca5a5");
        return;
      }

      userLogado = data.user;
      setMsg("loginMsg", "Login realizado com sucesso.");
      await iniciarPainel();
    }

    async function sair(){
      await supabase.auth.signOut();
      location.reload();
    }

    async function carregarSessao(){
      const { data } = await supabase.auth.getSession();
      userLogado = data?.session?.user || null;
      if(userLogado){
        await iniciarPainel();
      }
    }

    async function carregarOuCriarPerfil(){
      const { data: perfilExistente, error } = await supabase
        .from("borracheiros")
        .select("*")
        .eq("user_id", userLogado.id)
        .maybeSingle();

      if(error){
        console.error(error);
        return;
      }

      if(perfilExistente){
        perfilBorracheiro = perfilExistente;
        preencherPerfil(perfilExistente);
        return;
      }

      const { data: criado, error: erroCriar } = await supabase
        .from("borracheiros")
        .insert([{
          user_id: userLogado.id,
          nome: userLogado.email?.split("@")[0] || "Borracheiro",
          telefone: "",
          cidade: "",
          ativo: true,
          aberto: true,
          raio_atendimento_km: 10,
          latitude: null,
          longitude: null
        }])
        .select()
        .single();

      if(erroCriar){
        console.error(erroCriar);
        return;
      }

      perfilBorracheiro = criado;
      preencherPerfil(criado);
    }

    function preencherPerfil(perfil){
      el("nomeBorracheiro").value = perfil.nome || "";
      el("telefoneBorracheiro").value = perfil.telefone || "";
      el("cidadeBorracheiro").value = perfil.cidade || "";
      el("raioAtendimento").value = perfil.raio_atendimento_km ?? 10;
      el("latBorracheiro").value = perfil.latitude ?? "";
      el("lngBorracheiro").value = perfil.longitude ?? "";
      el("statusAberto").value = String(perfil.aberto ?? true);
      atualizarStatusVisualLoja(perfil.aberto ?? true);
    }

    async function pegarMinhaLocalizacao(){
      if(!navigator.geolocation){
        setMsg("perfilMsg", "Seu navegador não suporta localização.", "#fca5a5");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          el("latBorracheiro").value = pos.coords.latitude;
          el("lngBorracheiro").value = pos.coords.longitude;
          setMsg("perfilMsg", "Localização capturada com sucesso.");
        },
        () => {
          setMsg("perfilMsg", "Não foi possível capturar sua localização.", "#fca5a5");
        },
        { enableHighAccuracy:true, timeout:10000 }
      );
    }

    async function salvarPerfil(){
      if(!perfilBorracheiro) return;

      const nome = el("nomeBorracheiro").value.trim();
      const telefone = el("telefoneBorracheiro").value.trim();
      const cidade = el("cidadeBorracheiro").value.trim();
      const raio = Number(el("raioAtendimento").value || 10);
      const latitude = el("latBorracheiro").value === "" ? null : Number(el("latBorracheiro").value);
      const longitude = el("lngBorracheiro").value === "" ? null : Number(el("lngBorracheiro").value);
      const aberto = el("statusAberto").value === "true";

      if(!nome){
        setMsg("perfilMsg", "Informe o nome.", "#fca5a5");
        return;
      }

      if(isNaN(raio) || raio <= 0){
        setMsg("perfilMsg", "Informe um raio válido.", "#fca5a5");
        return;
      }

      const { data, error } = await supabase
        .from("borracheiros")
        .update({
          nome,
          telefone,
          cidade,
          aberto,
          raio_atendimento_km: raio,
          latitude,
          longitude
        })
        .eq("id", perfilBorracheiro.id)
        .select()
        .single();

      if(error){
        console.error(error);
        setMsg("perfilMsg", "Erro ao salvar perfil.", "#fca5a5");
        return;
      }

      perfilBorracheiro = data;
      atualizarStatusVisualLoja(aberto);
      setMsg("perfilMsg", "Perfil salvo com sucesso.");
    }

    async function iniciarPainel(){
      el("boxLogin").style.display = "none";
      el("painelApp").style.display = "block";

      await carregarOuCriarPerfil();
      await listarChamados();

      if(intervalLista) clearInterval(intervalLista);
      intervalLista = setInterval(listarChamados, 5000);
    }

    async function listarChamados(){
      const filtro = el("filtroStatus").value;

      let query = supabase
        .from("chamados_borracharia")
        .select("*")
        .order("created_at", { ascending:false });

      if(filtro !== "todos"){
        query = query.eq("status", filtro);
      }

      const { data, error } = await query;

      if(error){
        console.error(error);
        return;
      }

      renderChamados(data || []);
    }

    function mapaLink(lat, lng){
      if(lat == null || lng == null) return "";
      return `https://www.google.com/maps?q=${lat},${lng}`;
    }

    function renderChamados(lista){
      const box = el("listaChamados");

      if(!lista.length){
        box.innerHTML = `
          <div class="box" style="width:100%;">
            <div class="muted">Nenhum chamado encontrado.</div>
          </div>
        `;
        return;
      }

      box.innerHTML = lista.map(item => {
        const status = item.status || "aguardando";
        const valorEstimado = Number(item.valor_estimado || 0).toFixed(2);
        const valorFinal = Number(item.valor_final || 0).toFixed(2);

        const podeAceitar = status === "aguardando";
        const podeIniciar = status === "aceito";
        const podeFinalizar = status === "aceito" || status === "em_andamento";

        return `
          <div class="card">
            <div class="tag ${status}">${traduzirStatus(status)}</div>
            <div class="titulo">${item.tipo_veiculo} - ${item.problema}</div>

            <div class="linha"><strong>Cliente:</strong> ${item.cliente_nome || "-"}</div>
            <div class="linha"><strong>Telefone:</strong> ${item.cliente_telefone || "-"}</div>
            <div class="linha"><strong>Referência:</strong> ${item.endereco_texto || "-"}</div>
            <div class="linha"><strong>Observações:</strong> ${item.observacoes || "-"}</div>
            <div class="linha"><strong>Código:</strong> ${item.codigo_acompanhamento || "-"}</div>
            <div class="linha"><strong>Valor estimado:</strong> R$ ${valorEstimado}</div>
            <div class="linha"><strong>Valor final:</strong> R$ ${valorFinal}</div>
            <div class="linha"><strong>Pagamento:</strong> ${item.forma_pagamento || "-"}</div>

            ${
              item.latitude != null && item.longitude != null
                ? `<div class="linha"><strong>GPS:</strong> ${item.latitude}, ${item.longitude}</div>
                   <div class="linha"><a href="${mapaLink(item.latitude,item.longitude)}" target="_blank" style="color:#93c5fd;">Abrir no mapa</a></div>`
                : ``
            }

            <div class="acoes3">
              ${podeAceitar ? `<button class="green" onclick="aceitarChamado('${item.id}')">Aceitar</button>` : `<button class="sec" disabled>Ocupado</button>`}
              ${podeIniciar ? `<button class="blue" onclick="iniciarChamado('${item.id}')">Iniciar</button>` : `<button class="sec" ${!podeIniciar ? "disabled" : ""}>Andamento</button>`}
              ${podeFinalizar ? `<button class="red" onclick="finalizarChamado('${item.id}')">Finalizar</button>` : `<button class="sec" disabled>Fechado</button>`}
            </div>
          </div>
        `;
      }).join("");
    }

    window.aceitarChamado = async function(id){
      if(!perfilBorracheiro){
        alert("Perfil do borracheiro não carregado.");
        return;
      }

      if(!perfilBorracheiro.aberto){
        alert("Sua borracharia está fechada. Abra no perfil antes de aceitar chamados.");
        return;
      }

      const valor = prompt("Digite o valor estimado do atendimento:", "30");
      const valor_estimado = Number(valor || 0);

      const { error } = await supabase
        .from("chamados_borracharia")
        .update({
          status: "aceito",
          borracheiro_id: perfilBorracheiro.id,
          valor_estimado: isNaN(valor_estimado) ? 0 : valor_estimado,
          aceito_em: new Date().toISOString()
        })
        .eq("id", id)
        .eq("status", "aguardando");

      if(error){
        console.error(error);
        alert("Erro ao aceitar chamado.");
        return;
      }

      await listarChamados();
    }

    window.iniciarChamado = async function(id){
      const { error } = await supabase
        .from("chamados_borracharia")
        .update({
          status: "em_andamento"
        })
        .eq("id", id);

      if(error){
        console.error(error);
        alert("Erro ao iniciar atendimento.");
        return;
      }

      await listarChamados();
    }

    window.finalizarChamado = async function(id){
      const valorFinal = prompt("Digite o valor final cobrado:", "30");
      const formaPagamento = prompt("Forma de pagamento: pix / dinheiro / cartao", "pix");

      const { error } = await supabase
        .from("chamados_borracharia")
        .update({
          status: "finalizado",
          valor_final: Number(valorFinal || 0),
          forma_pagamento: (formaPagamento || "indefinido").toLowerCase(),
          finalizado_em: new Date().toISOString()
        })
        .eq("id", id);

      if(error){
        console.error(error);
        alert("Erro ao finalizar chamado.");
        return;
      }

      await listarChamados();
    }

    el("btnLogin").addEventListener("click", login);
    el("btnSair").addEventListener("click", sair);
    el("btnSalvarPerfil").addEventListener("click", salvarPerfil);
    el("btnAtualizar").addEventListener("click", listarChamados);
    el("filtroStatus").addEventListener("change", listarChamados);
    el("statusAberto").addEventListener("change", (e) => atualizarStatusVisualLoja(e.target.value));
    el("btnPegarMinhaLocalizacao").addEventListener("click", pegarMinhaLocalizacao);

    carregarSessao();
  </script>
</body>
</html>
