<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Negócios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial;
      background:#020617;
      color:#fff;
    }
    .topo{
      background:#0f172a;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .btn-sair{
      background:#dc2626;
      border:none;
      padding:10px;
      border-radius:10px;
      color:#fff;
      cursor:pointer;
    }
    .container{
      max-width:1100px;
      margin:auto;
      padding:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:16px;
    }
    .card{
      background:#0f172a;
      padding:18px;
      border-radius:14px;
    }
    .btn{
      padding:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }
    .btn-admin{ background:#22c55e; }
    .btn-loja{ background:#38bdf8; }
  </style>

</head>

<body>

<div class="topo">
  <h2>Painel de Negócios</h2>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="container">
  <div id="listaNegocios" class="grid"></div>
</div>

<script>

const db = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

document.addEventListener("DOMContentLoaded", iniciar);

async function iniciar(){

  const { data:{ session } } = await db.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return;
  }

  const { data: negocios } = await db
    .from("negocios")
    .select("*")
    .eq("dono_id", session.user.id)
    .eq("ativo", true);

  if(!negocios || negocios.length === 0){
    document.getElementById("listaNegocios").innerHTML = "Nenhum negócio";
    return;
  }

  document.getElementById("listaNegocios").innerHTML = negocios.map(n => `
    <div class="card">
      <h3>${n.nome}</h3>
      <p>${n.tipo}</p>

      <button class="btn btn-admin" onclick="abrirAdmin('${n.app_id}')">
        Gerenciar
      </button>

      <button class="btn btn-loja" onclick="abrirLoja('${n.app_id}')">
        Ver loja
      </button>
    </div>
  `).join("");
}

/* 🔥 AQUI O PONTO PRINCIPAL */
async function abrirAdmin(appId){

  const { data: app } = await db
    .from("apps")
    .select("*")
    .eq("id", appId)
    .single();

  if(!app){
    alert("App não encontrado");
    return;
  }

  const sistema = (app.tipo || app.sistema || "").toLowerCase().trim();

if(!sistema){
  alert("Sistema do app não configurado no banco");
  return;
}

window.location.href = `/${sistema}/admin.html`;

/* LOJA CONTINUA COM APP_ID */
function abrirLoja(appId){
  window.location.href = `/index.html?app_id=${appId}`;
}

async function sair(){
  await db.auth.signOut();
  window.location.href = "/auth/login.html";
}

</script>

</body>
</html>
