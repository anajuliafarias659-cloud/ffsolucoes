

<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Negócios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#020617;
      color:#fff;
    }

    .topo{
      background:#0f172a;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #1e293b;
    }

    .topo h1{
      font-size:20px;
      margin:0;
    }

    .btn-sair{
      background:#dc2626;
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:24px;
    }

    .bemvindo{
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:16px;
      padding:18px;
      margin-bottom:24px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
    }

    .card{
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    .tipo{
      color:#38bdf8;
      font-size:14px;
      margin-bottom:8px;
      font-weight:bold;
    }

    .app{
      font-size:12px;
      color:#94a3b8;
      margin-bottom:16px;
    }

    .acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      padding:11px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-admin{ background:#22c55e; }
    .btn-loja{ background:#38bdf8; }

    .vazio{
      background:#0f172a;
      border:1px dashed #334155;
      border-radius:16px;
      padding:30px;
      text-align:center;
      color:#94a3b8;
    }
  </style>

</head>

<body>

<div class="topo">
  <h1>🏢 Painel de Negócios</h1>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="container">
  <div class="bemvindo" id="cardMinhasLojas">
  <h2>Minhas lojas</h2>
  <p>Escolha qual negócio deseja administrar.</p>
</div>

  <div id="listaNegocios" class="grid"></div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const db = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

function avisoVencimento(app){
  if(!app){
    return `<div style="color:#f87171;font-size:13px;margin-bottom:10px;">
      ⚠️ App não encontrado
    </div>`;
  }

  if(app.ativo === false){
    return `<div style="color:#f87171;font-size:13px;margin-bottom:10px;">
      ⛔ Loja bloqueada
    </div>`;
  }

  if(!app.data_expiracao){
    return `<div style="color:#94a3b8;font-size:13px;margin-bottom:10px;">
      Plano sem vencimento
    </div>`;
  }

  const hoje = new Date();
  const vencimento = new Date(app.data_expiracao);
  const dias = Math.ceil((vencimento - hoje) / (1000 * 60 * 60 * 24));

  if(dias <= 0){
    return `<div style="color:#f87171;font-size:13px;margin-bottom:10px;">
      ⛔ Plano expirado
    </div>`;
  }

  if(dias <= 15){
    return `<div style="color:#facc15;font-size:13px;margin-bottom:10px;">
      ⚠️ Vence em ${dias} dia(s)
    </div>`;
  }

  return `<div style="color:#22c55e;font-size:13px;margin-bottom:10px;">
    ✅ Ativa — vence em ${dias} dia(s)
  </div>`;
}

function statusPlano(app){
  if(!app) return { bloqueado:true, dias:null };

  if(app.ativo === false) return { bloqueado:true, dias:null };

  if(!app.data_expiracao) return { bloqueado:false, dias:null };

  const hoje = new Date();
  const vencimento = new Date(app.data_expiracao);
  const dias = Math.ceil((vencimento - hoje) / (1000 * 60 * 60 * 24));

  return {
    bloqueado: dias <= 0,
    dias
  };
}

/* =========================
   INICIAR
========================= */
document.addEventListener("DOMContentLoaded", iniciar);

async function iniciar(){
  const lista = document.getElementById("listaNegocios");

  const { data:{ session } } = await db.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return;
  }

  const { data: negocios, error: negError } = await db
  .from("negocios")
  .select("*")
  .eq("dono_id", session.user.id)
  .eq("ativo", true);

if(negError){
  console.error(negError);
  lista.innerHTML = `<div class="vazio">Erro ao carregar negócios</div>`;
  return;
}

const appIds = (negocios || []).map(n => n.app_id).filter(Boolean);

const { data: apps } = await db
  .from("apps")
  .select("id, ativo, plano, data_expiracao")
  .in("id", appIds);

const appsMap = {};
(apps || []).forEach(app => {
  appsMap[app.id] = app;
});

lista.innerHTML = negocios.map(n => {
  const app = appsMap[n.app_id];
  const plano = statusPlano(app);

  return `
    <div class="card">
      <h3>${n.nome}</h3>
      
${avisoVencimento(appsMap[n.app_id])}

      <div class="acoes">
  <button class="btn btn-admin"
  ${plano.bloqueado ? "disabled style='opacity:.5;cursor:not-allowed;background:#64748b'" : ""}
  onclick="${plano.bloqueado ? "" : `abrirAdmin('${n.app_id}', '${n.tipo}')`}">
  ${plano.bloqueado ? "Bloqueado" : "Gerenciar"}
</button>
  </button>

  <button class="btn btn-loja" onclick="abrirLoja('${n.app_id}')">
    Ver loja
  </button>

  <button class="btn" style="background:#f59e0b"
    onclick="editarNegocio('${n.id}', '${n.nome}', '${n.tipo}')">
    Editar
  </button>

  <button class="btn" style="background:#6366f1;color:#fff"
  onclick="renovarPlano('${n.app_id}', '${n.nome}')">
  Renovar
</button>

  <button class="btn" style="background:#ef4444;color:#fff"
    onclick="deletarNegocio('${n.id}', '${n.app_id}')">
    Deletar
  </button>
</div>
    </div>
    `;
}).join("");
}

/* =========================
   ABRIR ADMIN (SEM APP_ID)
========================= */
function abrirAdmin(appId, tipo){
  const sistema = String(tipo || "").toLowerCase().trim();

  if(!sistema){
    alert("Tipo do negócio não configurado.");
    return;
  }

  window.location.href = `/${sistema}/admin.html?app_id=${encodeURIComponent(appId)}`;
}

/* =========================
   LOJA
========================= */
function abrirLoja(appId){
  window.location.href = `/index.html?app_id=${appId}`;
}


async function editarNegocio(id, nomeAtual, tipoAtual){
  const nome = prompt("Novo nome do negócio:", nomeAtual);
  if(!nome) return;

  const tipo = prompt("Tipo do sistema (ex: bar, gas, borracharia):", tipoAtual);
  if(!tipo) return;

  const { error } = await db
    .from("negocios")
    .update({
      nome: nome.trim(),
      tipo: tipo.trim().toLowerCase()
    })
    .eq("id", id);

  if(error){
    alert("Erro ao editar.");
    console.error(error);
    return;
  }

  iniciar();
}

async function deletarNegocio(id, appId){
  if(!confirm("Excluir este negócio da lista?")) return;

  const { error } = await db
    .from("negocios")
    .delete()
    .eq("id", id)
    .eq("app_id", appId);

  if(error){
    alert("Erro ao deletar: " + error.message);
    console.error(error);
    return;
  }

  alert("Negócio removido da lista.");
  iniciar();
}

function renovarPlano(appId, nome){
  const url = `https://www.ffsolucoes.com.br/pagamento/renovar?app_id=${encodeURIComponent(appId)}&nome=${encodeURIComponent(nome)}`;

  window.location.href = url;
}
/* =========================
   SAIR
========================= */
async function sair(){
  await db.auth.signOut();
  window.location.href = "/auth/login.html";
}

let cliquesSecretos = 0;
let tempoCliqueSecreto = null;

document.getElementById("cardMinhasLojas")?.addEventListener("click", () => {
  cliquesSecretos++;

  clearTimeout(tempoCliqueSecreto);

  tempoCliqueSecreto = setTimeout(() => {
    cliquesSecretos = 0;
  }, 2500);

  if(cliquesSecretos >= 20){
    cliquesSecretos = 0;
    window.location.href = "https://www.ffsolucoes.com.br/super/painel-dominios.html";
  }
});

</script>

</body>
</html>
