<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Negócios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#020617;
      color:#fff;
    }

    .topo{
      background:#0f172a;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #1e293b;
    }

    .topo h1{
      font-size:20px;
      margin:0;
    }

    .btn-sair{
      background:#dc2626;
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:24px;
    }

    .bemvindo{
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:16px;
      padding:18px;
      margin-bottom:24px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
    }

    .card{
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    .tipo{
      color:#38bdf8;
      font-size:14px;
      margin-bottom:8px;
      font-weight:bold;
    }

    .app{
      font-size:12px;
      color:#94a3b8;
      margin-bottom:16px;
    }

    .acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      padding:11px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-admin{ background:#22c55e; }
    .btn-loja{ background:#38bdf8; }

    .vazio{
      background:#0f172a;
      border:1px dashed #334155;
      border-radius:16px;
      padding:30px;
      text-align:center;
      color:#94a3b8;
    }
  </style>

</head>

<body>

<div class="topo">
  <h1>🏢 Painel de Negócios</h1>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="container">
  <div class="bemvindo">
    <h2>Minhas lojas</h2>
    <p>Escolha qual negócio deseja administrar.</p>
  </div>

  <div id="listaNegocios" class="grid"></div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const db = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

/* =========================
   INICIAR
========================= */
document.addEventListener("DOMContentLoaded", iniciar);

async function iniciar(){
  const lista = document.getElementById("listaNegocios");

  const { data:{ session } } = await db.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return;
  }

  const { data: negocios } = await db
    .from("negocios")
    .select("*")
    .eq("dono_id", session.user.id)
    .eq("ativo", true);

  if(!negocios || negocios.length === 0){
    lista.innerHTML = `<div class="vazio">Nenhum negócio encontrado</div>`;
    return;
  }

  lista.innerHTML = negocios.map(n => `
    <div class="card">
      <h3>${n.nome}</h3>
      <div class="tipo">${n.tipo}</div>
      <div class="app">APP_ID: ${n.app_id}</div>

      <div class="acoes">
        <button class="btn btn-admin" onclick="abrirAdmin('${n.app_id}')">
          Gerenciar
        </button>

        <button class="btn btn-loja" onclick="abrirLoja('${n.app_id}')">
          Ver loja
        </button>
      </div>
    </div>
  `).join("");
}

/* =========================
   ABRIR ADMIN (SEM APP_ID)
========================= */
async function abrirAdmin(appId){

  const { data: app } = await db
    .from("apps")
    .select("*")
    .eq("id", appId)
    .single();

  if(!app){
    alert("App não encontrado");
    return;
  }

  const sistema = (app.tipo || app.sistema || "").toLowerCase();

  window.location.href = `/${sistema}/admin.html`;
}

/* =========================
   LOJA
========================= */
function abrirLoja(appId){
  window.location.href = `/index.html?app_id=${appId}`;
}

/* =========================
   SAIR
========================= */
async function sair(){
  await db.auth.signOut();
  window.location.href = "/auth/login.html";
}

</script>

</body>
</html>
