<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurar Site</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#020617;
      --card:#0f172a;
      --card-2:#111827;
      --border:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --primary:#22c55e;
      --danger:#ef4444;
      --input:#0b1220;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:0 auto;
    }

    .topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    h1{
      margin:0;
      font-size:26px;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      margin-top:6px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .campo{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:14px;
    }

    .campo label{
      font-size:14px;
      font-weight:700;
      color:#fff;
    }

    input, textarea{
      width:100%;
      background:var(--input);
      color:#fff;
      border:1px solid #334155;
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
    }

    input:focus, textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(34,197,94,.12);
    }

    textarea{
      min-height:160px;
      resize:vertical;
      line-height:1.5;
    }

    .acoes{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
    }

    .btn-salvar{
      background:linear-gradient(135deg,#16a34a,#22c55e);
    }

    .btn-voltar{
      background:#334155;
    }

    .btn-sair{
      background:linear-gradient(135deg,#dc2626,#ef4444);
    }

    .status{
      margin-top:12px;
      font-size:14px;
      font-weight:700;
    }

    .preview{
      display:grid;
      gap:12px;
      grid-template-columns:1fr;
    }

    .preview-box{
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#111;
    }

    .preview-topo{
      padding:14px 16px;
      font-weight:900;
      font-size:22px;
    }

    .preview-body{
      padding:18px;
      min-height:180px;
      display:flex;
      flex-direction:column;
      justify-content:end;
      gap:12px;
      background-size:cover;
      background-position:center;
      position:relative;
      isolation:isolate;
    }

    .preview-body::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.78));
      z-index:0;
    }

    .preview-titulo,
    .preview-legenda{
      position:relative;
      z-index:1;
    }

    .preview-titulo{
      font-size:28px;
      font-weight:900;
    }

    .preview-legenda{
      align-self:center;
      background:rgba(0,0,0,.72);
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      max-width:90%;
      text-align:center;
    }

    .dica{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      margin-top:4px;
    }

    @media (max-width:700px){
      body{padding:14px}
      .grid{grid-template-columns:1fr}
      h1{font-size:22px}
      .preview-titulo{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <div>
        <h1>Configurar Site</h1>
        <div class="sub">Tema, nome, fundo e legendas do player</div>
      </div>

      <div class="acoes">
        <button class="btn btn-voltar" onclick="history.back()">Voltar</button>
        <button class="btn btn-sair" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div class="campo">
          <label for="nomeSite">Nome do site</label>
          <input id="nomeSite" type="text" placeholder="FF Filmes Online">
        </div>

        <div class="campo">
          <label for="bgFilmes">Imagem de fundo</label>
          <input id="bgFilmes" type="text" placeholder="https://...">
        </div>

        <div class="campo">
          <label for="corPrimaria">Cor primária</label>
          <input id="corPrimaria" type="text" placeholder="#e50914">
        </div>

        <div class="campo">
          <label for="corSecundaria">Cor secundária</label>
          <input id="corSecundaria" type="text" placeholder="#b20710">
        </div>

        <div class="campo">
          <label for="corFundo">Cor de fundo</label>
          <input id="corFundo" type="text" placeholder="#141414">
        </div>

        <div class="campo">
          <label for="corCard">Cor do card</label>
          <input id="corCard" type="text" placeholder="#181818">
        </div>

        <div class="campo">
          <label for="corTexto">Cor do texto</label>
          <input id="corTexto" type="text" placeholder="#ffffff">
        </div>
      </div>

      <div class="campo">
        <label for="legendasPlayer">Legendas do player (uma por linha)</label>
        <textarea id="legendasPlayer" placeholder="Aproveite seu filme 🍿
FF Filmes Online
Novos lançamentos toda semana
Seu catálogo sempre atualizado"></textarea>
        <div class="dica">
          Cada linha vira uma legenda aleatória no player.
        </div>
      </div>

      <div class="acoes">
        <button class="btn btn-salvar" onclick="salvarConfiguracoes()">Salvar configurações</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0">Prévia</h2>
      <div class="preview">
        <div class="preview-box">
          <div id="previewTopo" class="preview-topo">FF FILMES ONLINE</div>
          <div id="previewBody" class="preview-body">
            <div class="preview-titulo">Destaque do momento</div>
            <div id="previewLegenda" class="preview-legenda">Aproveite seu filme 🍿</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let adminId = null;
    let adminEmail = null;

    function setStatus(msg, ok = true) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.style.color = ok ? "#4ade80" : "#f87171";
    }

    function primeiraLegenda(texto) {
      const linhas = String(texto || "")
        .split("\n")
        .map(t => t.trim())
        .filter(Boolean);

      return linhas[0] || "Aproveite seu filme 🍿";
    }

    function atualizarPreview() {
      const nomeSite = document.getElementById("nomeSite").value.trim() || "FF FILMES ONLINE";
      const bgFilmes = document.getElementById("bgFilmes").value.trim() || "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1600&q=80";
      const corPrimaria = document.getElementById("corPrimaria").value.trim() || "#e50914";
      const corTexto = document.getElementById("corTexto").value.trim() || "#ffffff";
      const legendas = document.getElementById("legendasPlayer").value;

      document.getElementById("previewTopo").textContent = nomeSite;
      document.getElementById("previewTopo").style.color = corPrimaria;
      document.getElementById("previewTopo").style.background = "#0b0b0b";

      const body = document.getElementById("previewBody");
      body.style.backgroundImage = `url('${bgFilmes}')`;
      body.style.color = corTexto;

      document.getElementById("previewLegenda").textContent = primeiraLegenda(legendas);
    }

    async function pegarAdminLogado() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data?.user) {
        location.href = "index.html";
        return false;
      }

      const authUser = data.user;

      const { data: admin, error: erroAdmin } = await supabaseClient
        .from("admin_filmes")
        .select("*")
        .eq("user_id", authUser.id)
        .maybeSingle();

      if (erroAdmin || !admin) {
        alert("Usuário não é admin.");
        location.href = "index.html";
        return false;
      }

      if (admin.ativo === false) {
        alert("Admin desativado.");
        await supabaseClient.auth.signOut();
        location.href = "index.html";
        return false;
      }

      adminId = admin.id;
      adminEmail = admin.email || "";
      return true;
    }

    async function carregarConfiguracoes() {
      if (!adminId) return;

      const { data, error } = await supabaseClient
        .from("config_filmes")
        .select("*")
        .eq("admin_id", adminId)
        .maybeSingle();

      if (error && error.code !== "PGRST116") {
        setStatus("Erro ao carregar configurações.", false);
        return;
      }

      if (data) {
        document.getElementById("nomeSite").value = data.nome_site || "";
        document.getElementById("bgFilmes").value = data.bg_filmes || "";
        document.getElementById("corPrimaria").value = data.cor_primaria || "";
        document.getElementById("corSecundaria").value = data.cor_secundaria || "";
        document.getElementById("corFundo").value = data.cor_fundo || "";
        document.getElementById("corCard").value = data.cor_card || "";
        document.getElementById("corTexto").value = data.cor_texto || "";
        document.getElementById("legendasPlayer").value = data.legendas_player || "";
      }

      atualizarPreview();
    }

    async function salvarConfiguracoes() {
      if (!adminId) {
        setStatus("Admin não identificado.", false);
        return;
      }

      const payload = {
        admin_id: adminId,
        nome_site: document.getElementById("nomeSite").value.trim() || "FF FILMES ONLINE",
        bg_filmes: document.getElementById("bgFilmes").value.trim() || null,
        cor_primaria: document.getElementById("corPrimaria").value.trim() || "#e50914",
        cor_secundaria: document.getElementById("corSecundaria").value.trim() || "#b20710",
        cor_fundo: document.getElementById("corFundo").value.trim() || "#141414",
        cor_card: document.getElementById("corCard").value.trim() || "#181818",
        cor_texto: document.getElementById("corTexto").value.trim() || "#ffffff",
        legendas_player: document.getElementById("legendasPlayer").value.trim() || null
      };

      const { error } = await supabaseClient
        .from("config_filmes")
        .upsert(payload, { onConflict: "admin_id" });

      if (error) {
        setStatus("Erro ao salvar configurações.", false);
        return;
      }

      atualizarPreview();
      setStatus("Configurações salvas com sucesso.");
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      location.href = "index.html";
    }

    [
      "nomeSite",
      "bgFilmes",
      "corPrimaria",
      "corSecundaria",
      "corFundo",
      "corCard",
      "corTexto",
      "legendasPlayer"
    ].forEach(id => {
      document.addEventListener("input", (e) => {
        if (e.target && e.target.id === id) {
          atualizarPreview();
        }
      });
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (!session) {
        location.href = "index.html";
      }
    });

    (async function init() {
      const ok = await pegarAdminLogado();
      if (!ok) return;
      await carregarConfiguracoes();
    })();
  </script>
</body>
</html>
