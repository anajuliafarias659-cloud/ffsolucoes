<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Água e Gás</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; transition: 0.3s; }
    .topo { background: #0f172a; padding: 15px 20px; display: flex; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; transition: 0.3s; }
    .logo-box { display: flex; align-items: center; gap: 15px; }
    .logo-box > div { display: flex; flex-direction: column; justify-content: center; }
    .logo-box img { height: 65px; width: auto; max-height: 65px; object-fit: contain; background: #fff; padding: 4px; border-radius: 8px; display: none; }
    #nomeLoja { color: #fff; font-weight: bold; font-size: 20px; line-height: 1.2; }
    .banner { position: fixed; top: 110px; left: 0; width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; background: #111827; color: #fff; z-index: 999; overflow: hidden; text-align: center; transition: 0.3s; }
    .banner img { width: 100%; height: 100%; object-fit: cover; }
    .categorias { position: fixed; top: 220px; width: 100%; background: #fff; display: flex; overflow-x: auto; gap: 10px; padding: 10px; z-index: 998; border-bottom: 1px solid #ddd; }
    .categorias button { padding: 6px 12px; border: none; border-radius: 20px; background: #eee; cursor: pointer; white-space: nowrap; }
    .categorias button.ativo { background: #2563eb; color: #fff; }
    .aviso-funcionamento { margin-top: 290px; margin-left: 10px; margin-right: 10px; margin-bottom: 5px; background: #fff8e1; border: 1px solid #facc15; color: #92400e; padding: 14px; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.08); display: none; }
    .aviso-funcionamento h3 { margin: 0 0 8px 0; font-size: 16px; }
    .aviso-funcionamento p { margin: 4px 0; font-size: 14px; line-height: 1.4; }
    .produtos { margin-top: 290px; padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    body.com-aviso .produtos { margin-top: 10px; }
    @media (min-width: 768px) { .produtos { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .produtos { grid-template-columns: repeat(4, 1fr); } }
    .card { background: #fff; border-radius: 15px; padding: 12px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); cursor: pointer; transition: 0.3s; }
    .img-produto { width: 130px; height: 130px; object-fit: contain; }
    .mini-img { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
    .mini-img:hover { border-color: #2563eb; }
    .preco { font-weight: bold; color: #2563eb; }
    .btn-add { width: 100%; padding: 8px; border: none; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
    #btnCarrinho { position: fixed; bottom: 20px; right: 20px; background: #2563eb; color: #fff; border: none; padding: 12px 18px; border-radius: 50px; cursor: pointer; z-index: 9999; }
    #btnComprarNovamente { position: fixed; bottom: 75px; right: 20px; background: #16a34a; color: #fff; border: none; padding: 12px 18px; border-radius: 50px; cursor: pointer; z-index: 9999; display: none; }
    .modo-vitrine .btn-add, .modo-vitrine #btnCarrinho, .modo-vitrine #btnComprarNovamente, .modo-fechada .btn-add, .modo-fechada #btnCarrinho, .modo-fechada #btnComprarNovamente { display: none !important; }
    .modal-produto { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); display: none; align-items: center; justify-content: center; z-index: 10000; }
    .modal-conteudo { background: #fff; width: 95%; max-width: 500px; height: 90vh; overflow-y: auto; border-radius: 20px; padding: 20px; position: relative; }
    .fechar-modal { position: sticky; top: 0; float: right; font-size: 22px; cursor: pointer; background: #fff; padding: 4px 6px; border-radius: 6px; z-index: 10; }
    input, textarea { width: 100%; margin: 5px 0; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
    .sugestoes-carrinho { margin-top: 15px; }
    .sugestoes-carrinho h3 { margin: 0 0 10px 0; font-size: 16px; }
    .lista-sugestoes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .sugestao-item { background: #f8f8f8; border: 1px solid #e5e5e5; border-radius: 12px; padding: 10px; text-align: center; }
    .sugestao-item img { width: 100%; height: 90px; object-fit: contain; margin-bottom: 8px; }
    .sugestao-item .nome { font-size: 13px; font-weight: bold; min-height: 32px; }
    .sugestao-item .preco { font-size: 14px; margin: 6px 0; }
    .sugestao-item button { width: 100%; padding: 8px; border: none; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; }
    .botao-qtd { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; }
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { -webkit-text-size-adjust: 100%; }
    img { max-width: 100%; height: auto; }
    input, textarea, select, button { font-size: 16px; }
    .modal-conteudo { width: calc(100% - 20px); max-width: 500px; }
    body.modo-vitrine .produtos { margin-top: 290px; }
    body.modo-vitrine #avisoFuncionamento { display: none !important; }
    @media (max-width: 600px) {
      .topo { padding: 10px 12px; }
      .logo-box { gap: 10px; width: 100%; }
      .logo-box img { height: 50px; max-height: 50px; }
      #nomeLoja { font-size: 16px; }
      #infoLoja { font-size: 12px !important; }
      .banner { top: 82px; height: 85px; }
      .categorias { top: 167px; padding: 8px; gap: 8px; }
      .categorias button { font-size: 13px; padding: 6px 10px; }
      .aviso-funcionamento { margin-top: 225px; margin-left: 8px; margin-right: 8px; padding: 12px; }
      .produtos { margin-top: 225px; padding: 8px; gap: 8px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      body.com-aviso .produtos { margin-top: 8px; }
      body.modo-vitrine .produtos { margin-top: 225px; }
      .card { padding: 10px; border-radius: 12px; }
      .img-produto { width: 100%; max-width: 100px; height: 100px; }
      .mini-img { width: 32px; height: 32px; }
      .card h4 { font-size: 13px; line-height: 1.3; margin: 8px 0 6px; word-break: break-word; }
      .preco { font-size: 14px; }
      .btn-add { padding: 9px; font-size: 14px; }
      #btnCarrinho, #btnComprarNovamente { right: 14px; padding: 10px 14px; font-size: 14px; }
      #btnCarrinho { bottom: 14px; }
      #btnComprarNovamente { bottom: 64px; }
      .modal-conteudo { width: calc(100% - 12px); padding: 14px; border-radius: 14px 14px 0 0; height: 85vh; }
    }
  </style>
</head>
<body>
  <header class="topo">
    <div class="logo-box">
      <img id="logoLoja" alt="Logo da loja" />
      <div>
        <div id="nomeLoja"></div>
        <div id="infoLoja" style="font-size: 13px; color: #ddd; margin-top: 4px;"></div>
      </div>
    </div>
  </header>

  <div class="banner" id="bannerArea"></div>
  <div class="categorias" id="listaCategorias"></div>
  <div id="avisoFuncionamento" class="aviso-funcionamento"></div>
  <section class="produtos" id="listaProdutos"></section>

  <button id="btnComprarNovamente">🔁 Comprar novamente</button>
  <button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

  <div class="modal-produto" id="modalProduto">
    <div class="modal-conteudo">
      <span class="fechar-modal" onclick="fecharModal()">✖</span>
      <img id="modalImg" style="width: 100%; max-height: 300px; object-fit: contain;" />
      <div id="modalDots"></div>
      <h2 id="modalNome"></h2>
      <div class="preco" id="modalPreco"></div>
      <p id="modalDescricao"></p>
      <button class="btn-add" id="modalAdd">Adicionar ao Carrinho</button>
    </div>
  </div>

  <div class="modal-produto" id="modalCarrinho">
    <div class="modal-conteudo">
      <span class="fechar-modal" onclick="fecharCarrinho()">✖</span>
      <h2 id="tituloFinalizarPedido">Finalizar Pedido</h2>
      <div id="itensCarrinho" style="margin-bottom: 15px;"></div>
      <div id="sugestoesCarrinhoArea" style="margin: 15px 0;"></div>
      <hr style="margin: 10px 0;" />
      <h3>Dados do Cliente</h3>
      <input id="clienteNome" placeholder="Seu nome" required />
      <input id="clienteTelefone" placeholder="Telefone / WhatsApp" required />

      <hr style="margin: 10px 0;" />
      <h3>Endereço de Entrega</h3>
      <input id="clienteRua" placeholder="Rua" />
      <input id="clienteNumero" placeholder="Número" />
      <input id="clienteBairro" placeholder="Bairro" />
      <input id="clienteCidade" placeholder="Cidade" />
      <input id="clienteEstado" placeholder="Estado" />
      <input id="clienteCep" placeholder="CEP" />
      <input id="clienteReferencia" placeholder="Ponto de referência" />
      <input id="clienteLocalizacao" placeholder="Link da localização (Google Maps)" />
      <input id="clienteLatitude" type="hidden" />
      <input id="clienteLongitude" type="hidden" />

      <div id="areaFrete" style="margin-top: 10px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa;">
        <div style="font-weight: bold; margin-bottom: 8px;">Entrega</div>
        <button type="button" class="btn-add" style="margin-bottom: 10px;" onclick="calcularEntregaPorKm()">🚚 Calcular entrega</button>
        <div id="freteResultado" style="font-size: 14px; color: #333;">Pegue sua localização para calcular a entrega.</div>
      </div>

      <button type="button" class="btn-add" style="margin-top: 8px;" onclick="pegarLocalizacao()">📍 Pegar minha localização</button>

      <div id="areaPagamentoCompleta">
        <hr style="margin: 15px 0;" />
        <h3>Pagamento</h3>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <button type="button" class="btn-add" style="flex: 1; background: #16a34a;" onclick="selecionarPagamento('pix_mp')">PIX</button>
          <button type="button" class="btn-add" style="flex: 1;" onclick="selecionarPagamento('mercadopago')">Cartão / Mercado Pago</button>
        </div>

        <div id="areaPixMP" style="display: none; margin-top: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 10px;">
          <div style="font-weight: bold; margin-bottom: 6px;">Pagamento via PIX</div>
          <div id="statusPagamento" style="margin-bottom: 10px; font-size: 14px; color: #444;">Aguardando geração do PIX...</div>
          <div id="pixQrCodeArea" style="text-align: center; margin-top: 10px;"></div>
          <textarea id="pixCopiaCola" readonly style="width: 100%; min-height: 90px; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;"></textarea>
          <button type="button" class="btn-add" style="margin-top: 10px; background: #16a34a;" onclick="copiarPixCopiaCola()">📋 Copiar código PIX</button>
        </div>

        <button id="btnGerarPixMP" class="btn-add" style="display: none; font-size: 16px; padding: 12px; margin-top: 12px; background: #16a34a;" onclick="finalizarPedido('pix_mp')">✅ Gerar PIX</button>
        <button id="btnConfirmarMP" class="btn-add" style="display: none; font-size: 16px; padding: 12px; margin-top: 12px;" onclick="finalizarPedido('mercadopago')">✅ Confirmar e pagar no Mercado Pago</button>
      </div>

      <div id="areaPagamentoWhats" style="display:none; margin-top:15px;">
        <hr style="margin:15px 0">
        <h3>Forma de pagamento</h3>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <button type="button" class="btn-add" onclick="selecionarPagamentoWhats('dinheiro')">💵 Dinheiro</button>
          <button type="button" class="btn-add" onclick="selecionarPagamentoWhats('pix')">📲 PIX</button>
        </div>
        <div id="areaTroco" style="display:none;margin-top:10px;">
          <input id="trocoPara" placeholder="Troco para quanto? Ex: 100,00">
        </div>
      </div>

      <button id="btnEnviarWhatsapp" class="btn-add" style="display:none; font-size:16px; padding:12px; margin-top:16px; background:#16a34a;" onclick="finalizarPedidoWhatsApp()">📲 Enviar pedido no WhatsApp</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let APP_ID = null;
    const params = new URLSearchParams(window.location.search);
    const slug_query = params.get("slug");
    const partes = location.pathname.split("/").filter(Boolean);
    const slug_path = partes[partes.length - 1];
    const slugUrl = slug_query || slug_path;
    const app_id_url = params.get("app_id");
    const URL_PAGAMENTO = `${SUPABASE_URL}/functions/v1/criar-pagamento-loja`;
    const URL_PAGAMENTO_PIX = `${SUPABASE_URL}/functions/v1/criar-pix-loja`;

    const nomeLoja = document.getElementById("nomeLoja");
    const infoLoja = document.getElementById("infoLoja");
    const logoLoja = document.getElementById("logoLoja");
    const bannerArea = document.getElementById("bannerArea");
    const listaCategorias = document.getElementById("listaCategorias");
    const listaProdutos = document.getElementById("listaProdutos");
    const contadorCarrinho = document.getElementById("contadorCarrinho");
    const btnCarrinho = document.getElementById("btnCarrinho");
    const btnComprarNovamente = document.getElementById("btnComprarNovamente");
    const modalProduto = document.getElementById("modalProduto");
    const modalCarrinho = document.getElementById("modalCarrinho");
    const modalImg = document.getElementById("modalImg");
    const modalDots = document.getElementById("modalDots");
    const modalNome = document.getElementById("modalNome");
    const modalPreco = document.getElementById("modalPreco");
    const modalDescricao = document.getElementById("modalDescricao");
    const modalAdd = document.getElementById("modalAdd");
    const itensCarrinho = document.getElementById("itensCarrinho");
    const tituloFinalizarPedido = document.getElementById("tituloFinalizarPedido");

    let CARRINHO_KEY = "";
    let ULTIMO_PEDIDO_KEY = "";
    let carrinho = [];
    let todosProdutos = [];
    let modoVenda = "whatsapp";
    let numeroWhatsapp = "";
    let variacaoSelecionada = null;
    let produtoAtual = null;
    let valorFrete = 0;
    let subtotalCarrinhoAtual = 0;
    let totalCarrinhoAtual = 0;
    let formaPagamentoWhats = "";
    let nomeLojaAtual = "";
    let mensagemLojaFechada = "Estamos fechados no momento. Tente novamente mais tarde.";
    let modoExibicaoLoja = "aberta";
    let horarioFuncionamento = "";
    let ultimaEntregaCalculada = null;

    async function resolverAppId(){
      if (app_id_url) {
        APP_ID = app_id_url;
        iniciarSistema();
        return;
      }

      const { data, error } = await supabase.from("apps").select("id").eq("slug", slugUrl).maybeSingle();
      if (error) console.error("Erro ao buscar slug:", error);
      if (data?.id) {
        APP_ID = data.id;
        iniciarSistema();
        return;
      }

      document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Arial,sans-serif;background:#f5f5f5;color:#111;text-align:center;"><div><h2>❌ Loja não encontrada</h2><p>Verifique o link e tente novamente.</p></div></div>`;
    }

    function iniciarSistema(){
      if (!APP_ID) return alert("APP_ID não encontrado.");
      CARRINHO_KEY = `carrinho_${APP_ID}`;
      ULTIMO_PEDIDO_KEY = `ultimo_pedido_${APP_ID}`;
      carrinho = JSON.parse(localStorage.getItem(CARRINHO_KEY) || "[]");
      salvarCarrinhoLocal();
      carregar();
    }

    function formatarReal(valor){
      return Number(valor || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }
    function apenasNumeros(valor){ return String(valor || "").replace(/\D/g, ""); }
    function normalizarModoVenda(valor){
      const modo = String(valor || "").trim().toLowerCase();
      return ["sistema", "site", "app", "checkout", "mercadopago"].includes(modo) ? "sistema" : "whatsapp";
    }
    function podeVenderAgora(){ return modoExibicaoLoja === "aberta"; }

    function aplicarModoExibicaoLoja(){
      const aviso = document.getElementById("avisoFuncionamento");
      document.body.classList.remove("modo-vitrine", "modo-fechada", "com-aviso");

      if (modoExibicaoLoja === "vitrine") {
        document.body.classList.add("modo-vitrine");
        if (aviso) { aviso.style.display = "none"; aviso.innerHTML = ""; }
        return;
      }

      if (modoExibicaoLoja === "fechada") {
        document.body.classList.add("modo-fechada", "com-aviso");
        if (aviso) {
          aviso.style.display = "block";
          aviso.innerHTML = `<h3>🚫 Loja fechada</h3><p>${mensagemLojaFechada || "Estamos fechados no momento."}</p>${horarioFuncionamento ? `<p><strong>Horário de funcionamento:</strong> ${horarioFuncionamento}</p>` : ""}`;
        }
        return;
      }

      if (aviso) { aviso.style.display = "none"; aviso.innerHTML = ""; }
    }

    function horaParaMinutos(hora){ if (!hora || !String(hora).includes(":")) return null; const [h,m] = String(hora).split(":").map(Number); return (h*60)+m; }
    function estaDentroIntervalo(agora, inicio, fim){ if (inicio == null || fim == null) return false; if (inicio < fim) return agora >= inicio && agora < fim; if (inicio > fim) return agora >= inicio || agora < fim; return false; }
    function lojaAbertaAutomatica(config){
      if (!config?.fechamento_automatico) return config?.loja_fechada !== true;
      const agora = new Date();
      const minutosAgora = (agora.getHours() * 60) + agora.getMinutes();
      return estaDentroIntervalo(minutosAgora, horaParaMinutos(config.horario_abertura_1), horaParaMinutos(config.horario_fechamento_1));
    }

    async function verificarLojaFechadaServidor(){
      const { data } = await supabase.from("config_site").select("loja_fechada, mensagem_fechado, modo_exibicao, horario_funcionamento, fechamento_automatico, horario_abertura_1, horario_fechamento_1").eq("app_id", APP_ID).maybeSingle();
      const modo = String(data?.modo_exibicao || "").trim().toLowerCase();
      let modoFinal = "aberta";
      if (modo === "vitrine") modoFinal = "vitrine";
      else if (modo === "fechada") modoFinal = "fechada";
      else modoFinal = lojaAbertaAutomatica(data) ? "aberta" : "fechada";
      return {
        fechada: modoFinal !== "aberta",
        modo: modoFinal,
        mensagem: data?.mensagem_fechado || "Estamos fechados no momento. Tente novamente mais tarde.",
        horario: data?.horario_funcionamento || ""
      };
    }

    function atualizarModoVendaUI(){
      const areaPagamentoCompleta = document.getElementById("areaPagamentoCompleta");
      const areaPagamentoWhats = document.getElementById("areaPagamentoWhats");
      const btnEnviarWhatsapp = document.getElementById("btnEnviarWhatsapp");
      if (modoVenda === "whatsapp") {
        areaPagamentoCompleta.style.display = "none";
        areaPagamentoWhats.style.display = "block";
        btnEnviarWhatsapp.style.display = "block";
      } else {
        areaPagamentoCompleta.style.display = "block";
        areaPagamentoWhats.style.display = "none";
        btnEnviarWhatsapp.style.display = "none";
      }
    }

    function obterVariacoesProduto(produto){ try { const variacoes = JSON.parse(produto.variacoes || "[]"); return Array.isArray(variacoes) ? variacoes : []; } catch { return []; } }
    function obterTextoVariacao(v){ const tipo = String(v?.tipo || "").trim(); const valor = String(v?.valor || "").trim(); if (tipo && valor) return `${tipo}: ${valor}`; if (valor) return valor; if (tipo) return tipo; return "Variação"; }
    function obterPrecoVariacao(produto, variacao){ if (variacao?.preco !== null && variacao?.preco !== undefined && variacao?.preco !== "") return Number(variacao.preco || 0); return Number(produto?.preco || 0); }
    function gerarCodigoAcompanhamento(){ const letras = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let codigo = "PED-"; for (let i=0;i<8;i++) codigo += letras.charAt(Math.floor(Math.random()*letras.length)); return codigo; }

    function salvarCarrinhoLocal(){ localStorage.setItem(CARRINHO_KEY, JSON.stringify(carrinho || [])); contadorCarrinho.innerText = (carrinho || []).reduce((acc, item) => acc + Number(item.qtd || 0), 0); }
    function salvarUltimoPedido(){
      const itens = carrinho.map(item => ({ id: item.id, nome: item.nome, preco: item.preco, qtd: item.qtd, variacao: item.variacao || "Padrão", imagens: item.imagens, categoria: item.categoria, descricao: item.descricao, peso: item.peso, frete_gratis: item.frete_gratis, produtos_complementares: item.produtos_complementares, variacoes: item.variacoes, estoque: item.estoque ?? 0 }));
      localStorage.setItem(ULTIMO_PEDIDO_KEY, JSON.stringify(itens));
      atualizarBotaoComprarNovamente();
    }
    function atualizarBotaoComprarNovamente(){ const ultimo = JSON.parse(localStorage.getItem(ULTIMO_PEDIDO_KEY) || "[]"); btnComprarNovamente.style.display = ultimo.length && podeVenderAgora() ? "block" : "none"; }

    function limparCarrinhoWhats(){
      carrinho = [];
      localStorage.removeItem(CARRINHO_KEY);
      contadorCarrinho.innerText = "0";
      itensCarrinho.innerHTML = "";
      const sugestoes = document.getElementById("sugestoesCarrinhoArea"); if (sugestoes) sugestoes.innerHTML = "";
      valorFrete = 0; subtotalCarrinhoAtual = 0; totalCarrinhoAtual = 0; formaPagamentoWhats = ""; ultimaEntregaCalculada = null;
      const areaTroco = document.getElementById("areaTroco"); if (areaTroco) areaTroco.style.display = "none";
      const trocoPara = document.getElementById("trocoPara"); if (trocoPara) trocoPara.value = "";
      salvarCarrinhoLocal();
      fecharCarrinho();
      atualizarBotaoComprarNovamente();
    }

    function limparCarrinhoAposPagamento(){
      carrinho = []; valorFrete = 0; subtotalCarrinhoAtual = 0; totalCarrinhoAtual = 0; ultimaEntregaCalculada = null;
      localStorage.removeItem(CARRINHO_KEY); contadorCarrinho.innerText = "0"; itensCarrinho.innerHTML = "";
      const sugestoes = document.getElementById("sugestoesCarrinhoArea"); if (sugestoes) sugestoes.innerHTML = "";

    function toRad(valor){ return (valor * Math.PI) / 180; }
    function calcularDistanciaKm(lat1, lon1, lat2, lon2){
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    async function buscarLojasGasProximas(latCliente, lngCliente){
      const { data, error } = await supabase.from("lojas_gas").select("*").eq("ativa", true);
      if (error) { console.error(error); return []; }
      return (data || []).map(loja => ({ ...loja, distancia_km: Number(calcularDistanciaKm(latCliente, lngCliente, Number(loja.latitude || 0), Number(loja.longitude || 0)).toFixed(2)) })).filter(loja => !loja.raio_entrega_km || loja.distancia_km <= Number(loja.raio_entrega_km)).sort((a,b) => a.distancia_km - b.distancia_km);
    }

    window.pegarLocalizacao = function(){
      if (!navigator.geolocation) return alert("Seu navegador não suporta localização.");
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = Number(pos.coords.latitude);
        const lng = Number(pos.coords.longitude);
        document.getElementById("clienteLatitude").value = lat;
        document.getElementById("clienteLongitude").value = lng;
        document.getElementById("clienteLocalizacao").value = `https://www.google.com/maps?q=${lat},${lng}`;
        await calcularEntregaPorKm();
      }, () => alert("Não foi possível obter sua localização."), { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
    };

    window.calcularEntregaPorKm = async function(){
      const lat = Number(document.getElementById("clienteLatitude").value || 0);
      const lng = Number(document.getElementById("clienteLongitude").value || 0);
      if (!lat || !lng) { alert("Pegue a localização primeiro."); return null; }
      const lojas = await buscarLojasGasProximas(lat, lng);
      if (!lojas.length) { alert("Nenhuma loja atende essa região no momento."); return null; }
      const loja = lojas[0];
      const distanciaKm = Number(loja.distancia_km || 0);
      const taxaEntrega = Number((Number(loja.taxa_base || 0) + (distanciaKm * Number(loja.taxa_por_km || 0))).toFixed(2));
      const tempoMin = Math.max(10, Math.ceil((distanciaKm / Math.max(1, Number(loja.velocidade_media_kmh || 30))) * 60));
      valorFrete = taxaEntrega;
      ultimaEntregaCalculada = { loja, distancia_km: Number(distanciaKm.toFixed(2)), tempo_entrega_min: tempoMin, taxa_entrega: taxaEntrega };
      atualizarResumoCarrinho();
      document.getElementById("freteResultado").innerHTML = `<strong>Loja:</strong> ${loja.nome_loja || "Loja"}<br><strong>Distância:</strong> ${distanciaKm.toFixed(1)} km<br><strong>Entrega:</strong> ${tempoMin} min<br><strong>Taxa:</strong> ${formatarReal(valorFrete)}`;
      return ultimaEntregaCalculada;
    };

        if (modoEscolhido === "pix_mp") {
          const pagamento = await criarPagamentoPixMP(pedidoCriado.id, total, { nome: cliente.nome });
          const qrBase64 = pagamento?.qr_code_base64 || pagamento?.point_of_interaction?.transaction_data?.qr_code_base64 || "";
          const qrCode = pagamento?.qr_code || pagamento?.point_of_interaction?.transaction_data?.qr_code || "";
          const ticketUrl = pagamento?.ticket_url || pagamento?.point_of_interaction?.transaction_data?.ticket_url || "";
          document.getElementById("statusPagamento").innerHTML = `✅ PIX gerado com sucesso`;
          document.getElementById("pixCopiaCola").value = qrCode || "";
          document.getElementById("areaPixMP").style.display = "block";
          const areaQr = document.getElementById("pixQrCodeArea");
          const qrSrc = montarSrcQr(qrBase64);
          if (qrSrc) {
            areaQr.innerHTML = `<img src="${qrSrc}" style="max-width:240px; width:100%;" onerror="this.remove();document.getElementById('pixQrCodeArea').innerHTML='${ticketUrl ? `<a href=&quot;${ticketUrl}&quot; target=&quot;_blank&quot;>Abrir pagamento PIX</a>` : 'PIX gerado, mas o QR não carregou. Use o código copia e cola.'}'">`;
          } else if (ticketUrl) {
            areaQr.innerHTML = `<a href="${ticketUrl}" target="_blank">Abrir pagamento PIX</a>`;
          } else {
            areaQr.innerHTML = `PIX gerado, mas o QR não carregou. Use o código copia e cola.`;
          }
          salvarUltimoPedido();
          iniciarVerificacaoPix(pedidoCriado.id, codigoAcompanhamento);
        } else {
          const pagamento = await criarPagamentoSistema(total, pedidoCriado.id, cliente);
          salvarUltimoPedido();
          if (pagamento?.init_point) window.location.href = pagamento.init_point;
        }
      } catch (e) {
        console.error(e);
        alert(e.message || "Erro ao gerar pagamento.");
      }
    };

    async function carregar(){
      const statusLoja = await verificarLojaFechadaServidor();
      modoExibicaoLoja = statusLoja.modo;
      mensagemLojaFechada = statusLoja.mensagem;
      horarioFuncionamento = statusLoja.horario;
      aplicarModoExibicaoLoja();

      const { data: config } = await supabase.from("config_site").select("*").eq("app_id", APP_ID).maybeSingle();
      const { data: produtos } = await supabase.from("produtos").select("*").eq("app_id", APP_ID).eq("ativo", true).order("id", { ascending: false });
      todosProdutos = produtos || [];
      nomeLojaAtual = config?.nome_site || "Água e Gás";
      nomeLoja.innerText = nomeLojaAtual;
      infoLoja.innerText = config?.telefone ? `Pedidos: ${config.telefone}` : "Receba água e gás em casa";
      if (config?.logo_url) { logoLoja.src = config.logo_url; logoLoja.style.display = "block"; }
      if (config?.banner_url) bannerArea.innerHTML = `<img src="${config.banner_url}" alt="Banner">`; else bannerArea.innerHTML = `<div style="padding: 0 16px;"><strong>Peça sua água e gás com entrega rápida</strong></div>`;
      modoVenda = normalizarModoVenda(config?.modo_venda || "whatsapp");
      numeroWhatsapp = config?.whatsapp_numero || config?.telefone || "";
      if (config?.tema_site) document.body.classList.add(`tema-${config.tema_site}`);
      criarCategorias();
      renderizar(todosProdutos);
      atualizarBotaoComprarNovamente();
    }

    window.onclick = function(event){
      if (event.target === modalProduto) fecharModal();
      if (event.target === modalCarrinho) fecharCarrinho();
    };

    resolverAppId();
  </script>
