<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Água e Gás</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>
  <style>
    :root{
      --bg:#020617;
      --card:#0f172a;
      --card2:#111827;
      --border:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --primary:#2563eb;
      --green:#16a34a;
      --yellow:#f59e0b;
      --red:#ef4444;
      --input:#0b1220;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .topbar{
      position:sticky;top:0;z-index:20;
      background:rgba(2,6,23,.95);backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap
    }
    .brand{font-weight:bold;font-size:20px}
    .muted{color:var(--muted)}
    .container{max-width:1280px;margin:0 auto;padding:16px}
    .grid{display:grid;grid-template-columns:320px 1fr;gap:16px}
    @media(max-width:980px){.grid{grid-template-columns:1fr}}
    .sidebar,.content{display:flex;flex-direction:column;gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px}
    .card h2,.card h3{margin:0 0 12px 0}
    .menu button,.tabs button,.actions button,.btn,button{
      border:none;border-radius:12px;padding:12px 14px;cursor:pointer;font-weight:bold
    }
    .menu{display:grid;gap:10px}
    .menu button{background:var(--card2);color:var(--text);border:1px solid var(--border);text-align:left}
    .menu button.active{background:var(--primary);color:#fff}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .tabs button{background:var(--card2);color:var(--text);border:1px solid var(--border)}
    .tabs button.active{background:var(--primary)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-green{background:var(--green);color:#fff}
    .btn-yellow{background:var(--yellow);color:#111827}
    .btn-red{background:var(--red);color:#fff}
    .btn-dark{background:var(--card2);color:#fff;border:1px solid var(--border)}
    label{display:block;font-size:13px;color:var(--muted);margin-top:10px}
    input,select,textarea{
      width:100%;padding:12px;margin-top:6px;border-radius:12px;border:1px solid var(--border);
      background:var(--input);color:var(--text);outline:none
    }
    textarea{min-height:90px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    @media(max-width:760px){.row,.row-3{grid-template-columns:1fr}}
    .hidden{display:none !important}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    @media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.kpis{grid-template-columns:1fr}}
    .kpi{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:14px}
    .kpi .value{font-size:26px;font-weight:bold;margin-top:8px}
    .pedido-lista{display:grid;gap:12px}
    .pedido{
      background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:14px
    }
    .pedido-topo{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold}
    .badge-novo{background:rgba(37,99,235,.18);color:#93c5fd;border:1px solid rgba(37,99,235,.45)}
    .badge-aceito{background:rgba(34,197,94,.18);color:#86efac;border:1px solid rgba(34,197,94,.45)}
    .badge-historico{background:rgba(148,163,184,.16);color:#cbd5e1;border:1px solid rgba(148,163,184,.35)}
    .badge-pendente{background:rgba(245,158,11,.18);color:#fcd34d;border:1px solid rgba(245,158,11,.45)}
    .pedido-itens{margin-top:10px;padding-top:10px;border-top:1px dashed #334155}
    .pedido-itens div{margin:4px 0;font-size:14px}
    .pedido-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    @media(max-width:700px){.pedido-meta{grid-template-columns:1fr}}
    .pedido-meta div{font-size:14px;background:#0b1220;border:1px solid var(--border);padding:10px;border-radius:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .status{font-size:13px;margin-top:10px;color:var(--muted)}
    .link-box{background:#0b1220;border:1px solid var(--border);padding:12px;border-radius:12px;word-break:break-all}
    img.preview{width:100%;max-height:220px;object-fit:cover;border-radius:14px;border:1px solid var(--border);margin-top:8px;background:#0b1220}
    .audio-tip{font-size:12px;color:var(--muted);margin-top:8px}
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <div class="brand">Admin Água e Gás</div>
      <div class="muted" id="topInfo">Carregando...</div>
    </div>
    <div class="actions">
      <button class="btn-dark" id="btnCopiarLink">Copiar link da vitrine</button>
      <button class="btn-red" id="btnSair">Sair</button>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <aside class="sidebar">
        <div class="card">
          <h3>Menu</h3>
          <div class="menu">
            <button class="active" data-view="dashboard">📊 Painel</button>
            <button data-view="site">🏪 Site Config</button>
            <button data-view="entrega">🚚 Área de Entrega</button>
            <button data-view="produtos">🛒 Produtos</button>
            <button data-view="pedidos">📦 Pedidos</button>
          </div>
        </div>

        <div class="card">
          <h3>Link da vitrine</h3>
          <div class="link-box" id="linkVitrine">Carregando...</div>
          <div class="audio-tip">Use esse link para enviar ao cliente.</div>
        </div>
      </aside>

      <main class="content">
        <section id="view-dashboard" class="card">
          <h2>Painel</h2>
          <div class="kpis">
            <div class="kpi"><div class="muted">Pedidos novos</div><div class="value" id="kpiNovos">0</div></div>
            <div class="kpi"><div class="muted">Pedidos em andamento</div><div class="value" id="kpiAndamento">0</div></div>
            <div class="kpi"><div class="muted">Pedidos entregues</div><div class="value" id="kpiHistorico">0</div></div>
            <div class="kpi"><div class="muted">Produtos ativos</div><div class="value" id="kpiProdutos">0</div></div>
          </div>
        </section>

        <section id="view-site" class="card hidden">
          <h2>Site Config</h2>
          <div class="row">
            <div>
              <label>Nome da loja</label>
              <input id="site_nome" placeholder="Nome da loja" />
            </div>
            <div>
              <label>Telefone / WhatsApp</label>
              <input id="site_telefone" placeholder="88999999999" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Modo da loja</label>
              <select id="site_modo_exibicao">
                <option value="aberta">Aberta para vendas</option>
                <option value="vitrine">Somente vitrine</option>
                <option value="fechada">Fechada</option>
              </select>
            </div>
            <div>
              <label>Modo de venda</label>
              <select id="site_modo_venda">
                <option value="whatsapp">WhatsApp</option>
                <option value="sistema">Sistema / Mercado Pago</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>Tema</label>
              <select id="site_tema">
                <option value="padrao">Padrão</option>
                <option value="natal">Natal</option>
                <option value="anonovo">Ano Novo</option>
                <option value="capivara">Capivara</option>
              </select>
            </div>
            <div>
              <label>Chave PIX</label>
              <input id="site_pix" placeholder="Chave PIX" />
            </div>
          </div>

          <label>Mensagem quando fechado</label>
          <textarea id="site_msg_fechado" placeholder="Ex: Estamos fechados no momento."></textarea>

          <div class="row">
            <div>
              <label>Logo URL</label>
              <input id="site_logo_url" placeholder="https://..." />
              <img class="preview" id="site_logo_preview" alt="Logo preview" />
            </div>
            <div>
              <label>Banner URL</label>
              <input id="site_banner_url" placeholder="https://..." />
              <img class="preview" id="site_banner_preview" alt="Banner preview" />
            </div>
          </div>

          <label>Descrição do banner</label>
          <textarea id="site_banner_desc" placeholder="Promoção, aviso ou chamada"></textarea>

          <div class="actions">
            <button class="btn-primary" id="btnSalvarSite">Salvar site config</button>
          </div>
          <div class="status" id="statusSite"></div>
        </section>

        <section id="view-entrega" class="card hidden">
          <h2>Área de Entrega</h2>
          <div class="row">
            <div>
              <label>Nome da loja</label>
              <input id="ent_nome" placeholder="Loja Centro" />
            </div>
            <div>
              <label>Endereço</label>
              <input id="ent_endereco" placeholder="Rua, número, bairro" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Latitude</label>
              <input id="ent_lat" type="number" step="any" placeholder="-8.123456" />
            </div>
            <div>
              <label>Longitude</label>
              <input id="ent_lng" type="number" step="any" placeholder="-42.123456" />
            </div>
          </div>

          <div class="row-3">
            <div>
              <label>Raio de entrega (KM)</label>
              <input id="ent_raio" type="number" step="0.1" placeholder="8" />
            </div>
            <div>
              <label>Velocidade média (KM/H)</label>
              <input id="ent_vel" type="number" step="1" placeholder="30" />
            </div>
            <div>
              <label>Status</label>
              <select id="ent_ativa">
                <option value="true">Ativa</option>
                <option value="false">Inativa</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>Taxa base (R$)</label>
              <input id="ent_taxa_base" type="number" step="0.01" placeholder="0" />
            </div>
            <div>
              <label>Taxa por KM (R$)</label>
              <input id="ent_taxa_km" type="number" step="0.01" placeholder="2.50" />
            </div>
          </div>

          <div class="actions">
            <button class="btn-primary" id="btnSalvarEntrega">Salvar área de entrega</button>
          </div>
          <div class="status" id="statusEntrega"></div>
        </section>

        <section id="view-produtos" class="card hidden">
          <h2>Produtos</h2>

          <div class="row-3">
            <div>
              <label>Nome do produto</label>
              <input id="prod_nome" placeholder="Gás 13kg" />
            </div>
            <div>
              <label>Categoria</label>
              <input id="prod_categoria" placeholder="Gás, Água, Vasilhame" />
            </div>
            <div>
              <label>Preço</label>
              <input id="prod_preco" type="number" step="0.01" placeholder="100.00" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Imagem URL</label>
              <input id="prod_imagem" placeholder="https://..." />
            </div>
            <div>
              <label>Estoque</label>
              <input id="prod_estoque" type="number" step="1" placeholder="10" />
            </div>
          </div>

          <label>Descrição</label>
          <textarea id="prod_descricao" placeholder="Descrição do produto"></textarea>

          <div class="row">
            <div>
              <label>Tipo</label>
              <select id="prod_ativo">
                <option value="true">Ativo</option>
                <option value="false">Inativo</option>
              </select>
            </div>
            <div>
              <label>ID do produto para editar</label>
              <input id="prod_id_edit" placeholder="Preenche sozinho ao clicar em editar" readonly />
            </div>
          </div>

          <div class="actions">
            <button class="btn-primary" id="btnSalvarProduto">Salvar produto</button>
            <button class="btn-dark" id="btnNovoProduto">Novo</button>
          </div>

          <div class="status" id="statusProduto"></div>
          <div class="pedido-lista" id="listaProdutosAdmin" style="margin-top:14px"></div>
        </section>

        <section id="view-pedidos" class="card hidden">
          <h2>Pedidos</h2>
          <div class="tabs">
            <button class="active" data-tab="novos">Novos</button>
            <button data-tab="andamento">Em andamento</button>
            <button data-tab="historico">Histórico</button>
          </div>
          <div class="status" id="statusPedidos">Carregando pedidos...</div>
          <div class="pedido-lista" id="listaPedidos"></div>
          <audio id="audioNovoPedido" preload="auto">
            <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
          </audio>
        </section>
      </main>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let APP_ID = null;
    let pedidosCache = [];
    let produtosCache = [];
    let tabAtual = "novos";
    let ultimoPedidoTocado = null;
    let slugAtual = "";

    const topInfo = document.getElementById("topInfo");
    const linkVitrine = document.getElementById("linkVitrine");
    const audioNovoPedido = document.getElementById("audioNovoPedido");

    function setStatus(id, msg){
      const el = document.getElementById(id);
      if (el) el.textContent = msg || "";
    }

    function formatarReal(valor){
      return Number(valor || 0).toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
    }

    function formatarData(valor){
      if (!valor) return "";
      const d = new Date(valor);
      return d.toLocaleString("pt-BR");
    }

    function badgeStatus(status){
      const s = String(status || "").toLowerCase();
      if (s === "novo") return '<span class="badge badge-novo">Novo</span>';
      if (s === "historico") return '<span class="badge badge-historico">Histórico</span>';
      if (s === "aceito") return '<span class="badge badge-aceito">Aceito</span>';
      return '<span class="badge badge-pendente">Pendente</span>';
    }

    async function verificarSessao(){
      const { data:{ session } } = await supabase.auth.getSession();
      if (!session) {
        alert("Faça login primeiro.");
        location.href = "/auth/login.html";
        return null;
      }
      return session.user;
    }

    async function carregarAppId(){
      const user = await verificarSessao();
      if (!user) return;

      const { data, error } = await supabase
        .from("usuarios")
        .select("app_id")
        .eq("id", user.id)
        .single();

      if (error || !data?.app_id) {
        alert("Usuário sem app_id vinculado.");
        return;
      }

      APP_ID = data.app_id;
    }

    function gerarSlugBase(texto){
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    async function gerarSlugUnico(nome){
      const base = gerarSlugBase(nome || "loja") || "loja";
      let slug = base;
      let i = 1;

      while (true) {
        const { data, error } = await supabase
          .from("apps")
          .select("id")
          .eq("slug", slug);

        if (error) {
          console.error("Erro ao verificar slug:", error);
          return base;
        }

        const existeOutro = (data || []).some(item => String(item.id) !== String(APP_ID));
        if (!existeOutro) break;

        slug = `${base}-${i}`;
        i++;
      }

      return slug;
    }

    async function carregarSlug(){
      try {
        let { data, error } = await supabase
          .from("apps")
          .select("slug,nome")
          .eq("id", APP_ID)
          .maybeSingle();

        if (error) {
          console.error(error);
          slugAtual = "";
        } else {
          slugAtual = data?.slug || "";

          if (!slugAtual) {
            const novoSlug = await gerarSlugUnico(data?.nome || "loja");

            const { error: erroUpdate } = await supabase
              .from("apps")
              .update({ slug: novoSlug })
              .eq("id", APP_ID);

            if (!erroUpdate) {
              slugAtual = novoSlug;
            } else {
              console.error("Erro ao salvar slug:", erroUpdate);
            }
          }
        }

        const link = slugAtual
          ? `${location.origin}/loj/${slugAtual}`
          : `${location.origin}/vitrine.html?app_id=${APP_ID}`;

        linkVitrine.textContent = link;
        topInfo.textContent = slugAtual
          ? `APP_ID: ${APP_ID} • SLUG: ${slugAtual}`
          : `APP_ID: ${APP_ID}`;
      } catch (e) {
        console.error("Erro geral no slug:", e);
        slugAtual = "";
        linkVitrine.textContent = `${location.origin}/vitrine.html?app_id=${APP_ID}`;
        topInfo.textContent = `APP_ID: ${APP_ID}`;
      }
    }

    function ativarView(view){
      document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
      document.querySelector(`.menu button[data-view="${view}"]`)?.classList.add("active");
      document.querySelectorAll("main > section").forEach(sec => sec.classList.add("hidden"));
      document.getElementById(`view-${view}`)?.classList.remove("hidden");
    }

    async function carregarDashboard(){
      const novos = pedidosCache.filter(p => p.status === "novo").length;
      const andamento = pedidosCache.filter(p => p.status !== "novo" && p.status !== "historico").length;
      const historico = pedidosCache.filter(p => p.status === "historico").length;
      document.getElementById("kpiNovos").textContent = novos;
      document.getElementById("kpiAndamento").textContent = andamento;
      document.getElementById("kpiHistorico").textContent = historico;
      document.getElementById("kpiProdutos").textContent = produtosCache.filter(p => p.ativo !== false).length;
    }

    async function carregarSiteConfig(){
      const { data } = await supabase.from("config_site").select("*").eq("app_id", APP_ID).maybeSingle();
      document.getElementById("site_nome").value = data?.nome_site || "";
      document.getElementById("site_telefone").value = data?.telefone || data?.whatsapp_numero || "";
      document.getElementById("site_modo_exibicao").value = data?.modo_exibicao || "aberta";
      document.getElementById("site_modo_venda").value = data?.modo_venda || "whatsapp";
      document.getElementById("site_tema").value = data?.tema_site || "padrao";
      document.getElementById("site_pix").value = data?.pix_chave || "";
      document.getElementById("site_msg_fechado").value = data?.mensagem_fechado || "Estamos fechados no momento.";
      document.getElementById("site_logo_url").value = data?.logo_url || "";
      document.getElementById("site_banner_url").value = data?.banner_url || "";
      document.getElementById("site_banner_desc").value = data?.banner_descricao || "";
      document.getElementById("site_logo_preview").src = data?.logo_url || "";
      document.getElementById("site_banner_preview").src = data?.banner_url || "";
    }

    async function salvarSiteConfig(){
      setStatus("statusSite", "Salvando...");
      const nomeLoja = document.getElementById("site_nome").value.trim();

      const payload = {
        app_id: APP_ID,
        nome_site: nomeLoja,
        telefone: document.getElementById("site_telefone").value.trim(),
        whatsapp_numero: document.getElementById("site_telefone").value.trim(),
        modo_exibicao: document.getElementById("site_modo_exibicao").value,
        modo_venda: document.getElementById("site_modo_venda").value,
        tema_site: document.getElementById("site_tema").value,
        pix_chave: document.getElementById("site_pix").value.trim(),
        mensagem_fechado: document.getElementById("site_msg_fechado").value.trim() || "Estamos fechados no momento.",
        logo_url: document.getElementById("site_logo_url").value.trim(),
        banner_url: document.getElementById("site_banner_url").value.trim(),
        banner_descricao: document.getElementById("site_banner_desc").value.trim()
      };

      const { error } = await supabase.from("config_site").upsert(payload, { onConflict:"app_id" });
      if (error) {
        console.error(error);
        setStatus("statusSite", "Erro ao salvar site config.");
        return;
      }

      if (nomeLoja) {
        try {
          const { data: appAtual } = await supabase
            .from("apps")
            .select("slug,nome")
            .eq("id", APP_ID)
            .maybeSingle();

          if (!appAtual?.slug) {
            const novoSlug = await gerarSlugUnico(nomeLoja);

            await supabase
              .from("apps")
              .update({
                nome: nomeLoja,
                slug: novoSlug
              })
              .eq("id", APP_ID);

            slugAtual = novoSlug;
          } else {
            await supabase
              .from("apps")
              .update({ nome: nomeLoja })
              .eq("id", APP_ID);
          }
        } catch (e) {
          console.error("Erro ao atualizar nome/slug da app:", e);
        }
      }

      document.getElementById("site_logo_preview").src = payload.logo_url || "";
      document.getElementById("site_banner_preview").src = payload.banner_url || "";

      await carregarSlug();
      setStatus("statusSite", "Site config salvo com sucesso.");
    }

    async function carregarEntrega(){
      const { data } = await supabase.from("lojas_gas").select("*").eq("app_id", APP_ID).maybeSingle();
      document.getElementById("ent_nome").value = data?.nome_loja || "";
      document.getElementById("ent_endereco").value = data?.endereco || "";
      document.getElementById("ent_lat").value = data?.latitude ?? "";
      document.getElementById("ent_lng").value = data?.longitude ?? "";
      document.getElementById("ent_raio").value = data?.raio_entrega_km ?? 8;
      document.getElementById("ent_vel").value = data?.velocidade_media_kmh ?? 30;
      document.getElementById("ent_ativa").value = String(data?.ativa ?? true);
      document.getElementById("ent_taxa_base").value = data?.taxa_base ?? 0;
      document.getElementById("ent_taxa_km").value = data?.taxa_por_km ?? 2.5;
    }

    async function salvarEntrega(){
      setStatus("statusEntrega", "Salvando...");
      const payload = {
        app_id: APP_ID,
        nome_loja: document.getElementById("ent_nome").value.trim(),
        endereco: document.getElementById("ent_endereco").value.trim(),
        latitude: Number(document.getElementById("ent_lat").value || 0),
        longitude: Number(document.getElementById("ent_lng").value || 0),
        raio_entrega_km: Number(document.getElementById("ent_raio").value || 0),
        velocidade_media_kmh: Number(document.getElementById("ent_vel").value || 30),
        taxa_base: Number(document.getElementById("ent_taxa_base").value || 0),
        taxa_por_km: Number(document.getElementById("ent_taxa_km").value || 0),
        ativa: document.getElementById("ent_ativa").value === "true"
      };
      const { error } = await supabase.from("lojas_gas").upsert(payload, { onConflict:"app_id" });
      if (error) {
        console.error(error);
        setStatus("statusEntrega", "Erro ao salvar área de entrega.");
        return;
      }
      setStatus("statusEntrega", "Área de entrega salva com sucesso.");
    }

    function limparFormProduto(){
      document.getElementById("prod_id_edit").value = "";
      document.getElementById("prod_nome").value = "";
      document.getElementById("prod_categoria").value = "";
      document.getElementById("prod_preco").value = "";
      document.getElementById("prod_imagem").value = "";
      document.getElementById("prod_estoque").value = "";
      document.getElementById("prod_descricao").value = "";
      document.getElementById("prod_ativo").value = "true";
    }

    async function carregarProdutos(){
      const { data, error } = await supabase.from("produtos").select("*").eq("app_id", APP_ID).order("id", { ascending:false });
      if (error) {
        console.error(error);
        setStatus("statusProduto", "Erro ao carregar produtos.");
        return;
      }
      produtosCache = data || [];
      renderProdutosAdmin();
      carregarDashboard();
    }

    function renderProdutosAdmin(){
      const lista = document.getElementById("listaProdutosAdmin");
      lista.innerHTML = "";
      produtosCache.forEach(prod => {
        let img = "";
        try {
          const arr = JSON.parse(prod.imagens || "[]");
          img = arr?.[0] || "";
        } catch {}
        const card = document.createElement("div");
        card.className = "pedido";
        card.innerHTML = `
          <div class="pedido-topo">
            <div>
              <strong>${prod.nome || "-"}</strong><br>
              <span class="muted">${prod.categoria || "-"} • ${formatarReal(prod.preco || 0)}</span>
            </div>
            <div>${prod.ativo === false ? '<span class="badge badge-pendente">Inativo</span>' : '<span class="badge badge-aceito">Ativo</span>'}</div>
          </div>
          ${img ? `<img class="preview" src="${img}" alt="${prod.nome}">` : ""}
          <div class="pedido-meta">
            <div><strong>Estoque:</strong> ${prod.estoque ?? 0}</div>
            <div><strong>ID:</strong> ${prod.id}</div>
          </div>
          <div class="actions">
            <button class="btn-primary" data-edit-prod="${prod.id}">Editar</button>
            <button class="btn-red" data-del-prod="${prod.id}">Excluir</button>
          </div>
        `;
        lista.appendChild(card);
      });

      document.querySelectorAll("[data-edit-prod]").forEach(btn => {
        btn.onclick = () => preencherProduto(btn.getAttribute("data-edit-prod"));
      });
      document.querySelectorAll("[data-del-prod]").forEach(btn => {
        btn.onclick = () => excluirProduto(btn.getAttribute("data-del-prod"));
      });
    }

    function preencherProduto(id){
      const prod = produtosCache.find(p => String(p.id) === String(id));
      if (!prod) return;
      let img = "";
      try { img = JSON.parse(prod.imagens || "[]")?.[0] || ""; } catch {}
      document.getElementById("prod_id_edit").value = prod.id;
      document.getElementById("prod_nome").value = prod.nome || "";
      document.getElementById("prod_categoria").value = prod.categoria || "";
      document.getElementById("prod_preco").value = prod.preco ?? "";
      document.getElementById("prod_imagem").value = img;
      document.getElementById("prod_estoque").value = prod.estoque ?? 0;
      document.getElementById("prod_descricao").value = prod.descricao || "";
      document.getElementById("prod_ativo").value = String(prod.ativo !== false);
      ativarView("produtos");
      setStatus("statusProduto", `Editando produto #${prod.id}`);
    }

    async function salvarProduto(){
      setStatus("statusProduto", "Salvando produto...");
      const idEdit = document.getElementById("prod_id_edit").value.trim();
      const imagem = document.getElementById("prod_imagem").value.trim();
      const payload = {
        app_id: APP_ID,
        nome: document.getElementById("prod_nome").value.trim(),
        categoria: document.getElementById("prod_categoria").value.trim(),
        preco: Number(document.getElementById("prod_preco").value || 0),
        estoque: Number(document.getElementById("prod_estoque").value || 0),
        descricao: document.getElementById("prod_descricao").value.trim(),
        ativo: document.getElementById("prod_ativo").value === "true",
        imagens: JSON.stringify(imagem ? [imagem] : [])
      };

      let query = supabase.from("produtos");
      let res;
      if (idEdit) {
        res = await query.update(payload).eq("id", idEdit).eq("app_id", APP_ID);
      } else {
        res = await query.insert([payload]);
      }

      if (res.error) {
        console.error(res.error);
        setStatus("statusProduto", "Erro ao salvar produto.");
        return;
      }

      limparFormProduto();
      setStatus("statusProduto", "Produto salvo com sucesso.");
      await carregarProdutos();
    }

    async function excluirProduto(id){
      if (!confirm("Excluir esse produto?")) return;
      const { error } = await supabase.from("produtos").delete().eq("id", id).eq("app_id", APP_ID);
      if (error) {
        console.error(error);
        setStatus("statusProduto", "Erro ao excluir produto.");
        return;
      }
      setStatus("statusProduto", "Produto excluído.");
      await carregarProdutos();
    }

    function tocarSomNovoPedido(){
      if (!audioNovoPedido) return;
      audioNovoPedido.currentTime = 0;
      audioNovoPedido.play().catch(() => {});
    }

    async function carregarPedidos(){
      setStatus("statusPedidos", "Carregando pedidos...");
      const { data, error } = await supabase.from("pedidos").select("*").eq("app_id", APP_ID).order("id", { ascending:false });
      if (error) {
        console.error(error);
        setStatus("statusPedidos", "Erro ao carregar pedidos.");
        return;
      }
      pedidosCache = data || [];

      const novos = pedidosCache.filter(p => p.status === "novo");
      if (novos.length) {
        const ultimo = novos[0];
        if (ultimo.id !== ultimoPedidoTocado) {
          tocarSomNovoPedido();
          ultimoPedidoTocado = ultimo.id;
        }
      }

      renderPedidos();
      carregarDashboard();
    }

    function pedidosFiltrados(){
      if (tabAtual === "novos") return pedidosCache.filter(p => p.status === "novo");
      if (tabAtual === "andamento") return pedidosCache.filter(p => p.status !== "novo" && p.status !== "historico");
      return pedidosCache.filter(p => p.status === "historico");
    }

    function renderPedidos(){
      const lista = document.getElementById("listaPedidos");
      const pedidos = pedidosFiltrados();
      lista.innerHTML = "";

      if (!pedidos.length) {
        lista.innerHTML = `<div class="pedido"><div class="muted">Nenhum pedido nessa aba.</div></div>`;
        setStatus("statusPedidos", `${pedidos.length} pedido(s) exibido(s).`);
        return;
      }

      pedidos.forEach(p => {
        const itens = Array.isArray(p.itens) ? p.itens : [];
        const card = document.createElement("div");
        card.className = "pedido";
        card.id = `pedido-${p.id}`;
        card.innerHTML = `
          <div class="pedido-topo">
            <div>
              <strong>${p.cliente_nome || "Cliente"}</strong><br>
              <span class="muted">Pedido #${p.id} • ${formatarData(p.created_at)}</span>
            </div>
            <div>${badgeStatus(p.status)}</div>
          </div>

          <div class="pedido-itens">
            ${itens.map(item => `<div>${Number(item.qtd || 1)}x ${item.nome || "-"} ${item.variacao ? `• ${item.variacao}` : ""}</div>`).join("")}
          </div>

          <div class="pedido-meta">
            <div><strong>Telefone:</strong> ${p.cliente_telefone || "-"}</div>
            <div><strong>Total:</strong> ${formatarReal(p.total || 0)}</div>
            <div><strong>Pagamento:</strong> ${p.pagamento_tipo || p.pagamento_modo || "-"}</div>
            <div><strong>Status entrega:</strong> ${p.status_entrega || "-"}</div>
            <div><strong>Endereço:</strong> ${[p.cliente_rua,p.cliente_numero,p.cliente_bairro,p.cliente_cidade,p.cliente_estado].filter(Boolean).join(", ") || "-"}</div>
            <div><strong>Referência:</strong> ${p.referencia_endereco || "-"}</div>
            <div><strong>Loja:</strong> ${p.loja_nome_entrega || "-"}</div>
            <div><strong>Entrega:</strong> ${p.distancia_km || 0} km • ${p.tempo_entrega_min || 0} min</div>
          </div>

          <div class="actions">
            ${p.status === "novo" ? `<button class="btn-primary" data-aceitar="${p.id}">Aceitar</button>` : ""}
            ${p.status !== "historico" ? `<button class="btn-yellow" data-envio="${p.id}">Marcar como envio</button>` : ""}
            ${p.status !== "historico" ? `<button class="btn-green" data-entregue="${p.id}">Marcar entregue</button>` : ""}
            <button class="btn-dark" data-whats="${p.id}">WhatsApp</button>
            <button class="btn-dark" data-mapa="${p.id}">Mapa</button>
          </div>
        `;
        lista.appendChild(card);
      });

      document.querySelectorAll("[data-aceitar]").forEach(btn => {
        btn.onclick = () => alterarStatusPedido(btn.getAttribute("data-aceitar"), "aceito", "aceito");
      });

      document.querySelectorAll("[data-envio]").forEach(btn => {
        btn.onclick = () => alterarStatusPedido(btn.getAttribute("data-envio"), "aceito", "saiu_para_entrega");
      });

      document.querySelectorAll("[data-entregue]").forEach(btn => {
        btn.onclick = () => alterarStatusPedido(btn.getAttribute("data-entregue"), "historico", "entregue");
      });

      document.querySelectorAll("[data-whats]").forEach(btn => {
        btn.onclick = () => abrirWhatsPedido(btn.getAttribute("data-whats"));
      });

      document.querySelectorAll("[data-mapa]").forEach(btn => {
        btn.onclick = () => abrirMapaPedido(btn.getAttribute("data-mapa"));
      });

      setStatus("statusPedidos", `${pedidos.length} pedido(s) exibido(s).`);
    }

    async function alterarStatusPedido(id, status, statusEntrega){
      const payload = { status };
      if (statusEntrega) payload.status_entrega = statusEntrega;

      const { error } = await supabase.from("pedidos").update(payload).eq("id", id).eq("app_id", APP_ID);
      if (error) {
        console.error(error);
        alert("Erro ao atualizar pedido.");
        return;
      }

      if (status === "historico") {
        const card = document.getElementById(`pedido-${id}`);
        if (card) {
          card.style.transition = "0.25s";
          card.style.opacity = "0";
          setTimeout(() => card.remove(), 250);
        }
      }

      await carregarPedidos();
    }

    function abrirWhatsPedido(id){
      const p = pedidosCache.find(x => String(x.id) === String(id));
      if (!p?.cliente_telefone) return;
      const tel = String(p.cliente_telefone).replace(/\D/g, "");
      const texto = encodeURIComponent(`Olá ${p.cliente_nome || "cliente"}! Pedido #${p.id} atualizado.`);
      window.open(`https://wa.me/${tel}?text=${texto}`, "_blank");
    }

    function abrirMapaPedido(id){
      const p = pedidosCache.find(x => String(x.id) === String(id));
      if (!p) return;
      const lat = Number(p.cliente_latitude || 0);
      const lng = Number(p.cliente_longitude || 0);
      if (lat && lng) {
        window.open(`https://www.google.com/maps?q=${lat},${lng}`, "_blank");
        return;
      }
      if (p.cliente_localizacao) {
        window.open(p.cliente_localizacao, "_blank");
        return;
      }
      alert("Esse pedido não tem localização salva.");
    }

    function ligarEventos(){
      document.querySelectorAll(".menu button").forEach(btn => {
        btn.onclick = () => ativarView(btn.dataset.view);
      });

      document.querySelectorAll(".tabs button").forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          tabAtual = btn.dataset.tab;
          renderPedidos();
        };
      });

      document.getElementById("btnSalvarSite").onclick = salvarSiteConfig;
      document.getElementById("btnSalvarEntrega").onclick = salvarEntrega;
      document.getElementById("btnSalvarProduto").onclick = salvarProduto;
      document.getElementById("btnNovoProduto").onclick = () => {
        limparFormProduto();
        setStatus("statusProduto", "Novo produto.");
      };

      document.getElementById("btnCopiarLink").onclick = async () => {
        try {
          await navigator.clipboard.writeText(linkVitrine.textContent.trim());
          alert("Link copiado!");
        } catch {
          alert("Não foi possível copiar.");
        }
      };

      document.getElementById("btnSair").onclick = async () => {
        await supabase.auth.signOut();
        location.href = "/auth/login.html";
      };

      document.getElementById("site_logo_url").addEventListener("input", e => {
        document.getElementById("site_logo_preview").src = e.target.value.trim();
      });

      document.getElementById("site_banner_url").addEventListener("input", e => {
        document.getElementById("site_banner_preview").src = e.target.value.trim();
      });
    }

    async function init(){
      ligarEventos();
      await carregarAppId();
      if (!APP_ID) return;
      await carregarSlug();
      await carregarSiteConfig();
      await carregarEntrega();
      await carregarProdutos();
      await carregarPedidos();
      await carregarDashboard();
      setInterval(carregarPedidos, 5000);
    }

    init();
  </script>
</body>
</html>
