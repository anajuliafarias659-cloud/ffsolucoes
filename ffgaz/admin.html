<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Água e Gás</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>
  <style>
    :root{
      --bg:#020617;
      --card:#0f172a;
      --card2:#111827;
      --border:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --primary:#2563eb;
      --green:#16a34a;
      --yellow:#f59e0b;
      --red:#ef4444;
      --input:#0b1220;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .topbar{
      position:sticky;top:0;z-index:20;
      background:rgba(2,6,23,.95);backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap
    }
    .brand{font-weight:bold;font-size:20px}
    .muted{color:var(--muted)}
    .container{max-width:1280px;margin:0 auto;padding:16px}
    .grid{display:grid;grid-template-columns:320px 1fr;gap:16px}
    @media(max-width:980px){.grid{grid-template-columns:1fr}}
    .sidebar,.content{display:flex;flex-direction:column;gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px}
    .card h2,.card h3{margin:0 0 12px 0}
    .menu button,.tabs button,.actions button,.btn,button{
      border:none;border-radius:12px;padding:12px 14px;cursor:pointer;font-weight:bold
    }
    .menu{display:grid;gap:10px}
    .menu button{background:var(--card2);color:var(--text);border:1px solid var(--border);text-align:left}
    .menu button.active{background:var(--primary);color:#fff}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .tabs button{background:var(--card2);color:var(--text);border:1px solid var(--border)}
    .tabs button.active{background:var(--primary)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-green{background:var(--green);color:#fff}
    .btn-yellow{background:var(--yellow);color:#111827}
    .btn-red{background:var(--red);color:#fff}
    .btn-dark{background:var(--card2);color:#fff;border:1px solid var(--border)}
    label{display:block;font-size:13px;color:var(--muted);margin-top:10px}
    input,select,textarea{
      width:100%;padding:12px;margin-top:6px;border-radius:12px;border:1px solid var(--border);
      background:var(--input);color:var(--text);outline:none
    }
    textarea{min-height:90px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    @media(max-width:760px){.row,.row-3{grid-template-columns:1fr}}
    .hidden{display:none !important}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    @media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.kpis{grid-template-columns:1fr}}
    .kpi{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:14px}
    .kpi .value{font-size:26px;font-weight:bold;margin-top:8px}
    .pedido-lista{display:grid;gap:12px}
    .pedido{
      background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:14px
    }
    .pedido-topo{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold}
    .badge-novo{background:rgba(37,99,235,.18);color:#93c5fd;border:1px solid rgba(37,99,235,.45)}
    .badge-aceito{background:rgba(34,197,94,.18);color:#86efac;border:1px solid rgba(34,197,94,.45)}
    .badge-historico{background:rgba(148,163,184,.16);color:#cbd5e1;border:1px solid rgba(148,163,184,.35)}
    .badge-pendente{background:rgba(245,158,11,.18);color:#fcd34d;border:1px solid rgba(245,158,11,.45)}
    .pedido-itens{margin-top:10px;padding-top:10px;border-top:1px dashed #334155}
    .pedido-itens div{margin:4px 0;font-size:14px}
    .pedido-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    @media(max-width:700px){.pedido-meta{grid-template-columns:1fr}}
    .pedido-meta div{font-size:14px;background:#0b1220;border:1px solid var(--border);padding:10px;border-radius:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .status{font-size:13px;margin-top:10px;color:var(--muted)}
    .link-box{background:#0b1220;border:1px solid var(--border);padding:12px;border-radius:12px;word-break:break-all}
    img.preview{width:100%;max-height:220px;object-fit:cover;border-radius:14px;border:1px solid var(--border);margin-top:8px;background:#0b1220}
    .audio-tip{font-size:12px;color:var(--muted);margin-top:8px}
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <div class="brand">Admin Água e Gás</div>
      <div class="muted" id="topInfo">Carregando...</div>
    </div>
    <div class="actions">
      <button class="btn-dark" id="btnCopiarLink">Copiar link da vitrine</button>
      <button class="btn-red" id="btnSair">Sair</button>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <aside class="sidebar">
        <div class="card">
          <h3>Menu</h3>
          <div class="menu">
            <button class="active" data-view="dashboard">📊 Painel</button>
            <button data-view="site">🏪 Site Config</button>
            <button data-view="entrega">🚚 Área de Entrega</button>
            <button data-view="produtos">🛒 Produtos</button>
            <button data-view="pedidos">📦 Pedidos</button>
          </div>
        </div>

        <div class="card">
          <h3>Link da vitrine</h3>
          <div class="link-box" id="linkVitrine">Carregando...</div>
          <div class="audio-tip">Use esse link para enviar ao cliente.</div>
        </div>
      </aside>

      <main class="content">
        <section id="view-dashboard" class="card">
          <h2>Painel</h2>
          <div class="kpis">
            <div class="kpi"><div class="muted">Pedidos novos</div><div class="value" id="kpiNovos">0</div></div>
            <div class="kpi"><div class="muted">Pedidos em andamento</div><div class="value" id="kpiAndamento">0</div></div>
            <div class="kpi"><div class="muted">Pedidos entregues</div><div class="value" id="kpiHistorico">0</div></div>
            <div class="kpi"><div class="muted">Produtos ativos</div><div class="value" id="kpiProdutos">0</div></div>
          </div>
        </section>

        <section id="view-site" class="card hidden">
          <h2>Site Config</h2>
          <div class="row">
            <div>
              <label>Nome da loja</label>
              <input id="site_nome" placeholder="Nome da loja" />
            </div>
            <div>
              <label>Telefone / WhatsApp</label>
              <input id="site_telefone" placeholder="88999999999" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Modo da loja</label>
              <select id="site_modo_exibicao">
                <option value="aberta">Aberta para vendas</option>
                <option value="vitrine">Somente vitrine</option>
                <option value="fechada">Fechada</option>
              </select>
            </div>
            <div>
              <label>Modo de venda</label>
              <select id="site_modo_venda">
                <option value="whatsapp">WhatsApp</option>
                <option value="sistema">Sistema / Mercado Pago</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>Tema</label>
              <select id="site_tema">
                <option value="padrao">Padrão</option>
                <option value="natal">Natal</option>
                <option value="anonovo">Ano Novo</option>
                <option value="capivara">Capivara</option>
              </select>
            </div>
            <div>
              <label>Chave PIX</label>
              <input id="site_pix" placeholder="Chave PIX" />
            </div>
          </div>

          <label>Mensagem quando fechado</label>
          <textarea id="site_msg_fechado" placeholder="Ex: Estamos fechados no momento."></textarea>

          <div class="row">
            <div>
              <label>Logo URL</label>
              <input id="site_logo_url" placeholder="https://..." />
              <img class="preview" id="site_logo_preview" alt="Logo preview" />
            </div>
            <div>
              <label>Banner URL</label>
              <input id="site_banner_url" placeholder="https://..." />
              <img class="preview" id="site_banner_preview" alt="Banner preview" />
            </div>
          </div>

          <label>Descrição do banner</label>
          <textarea id="site_banner_desc" placeholder="Promoção, aviso ou chamada"></textarea>

          <div class="actions">
            <button class="btn-primary" id="btnSalvarSite">Salvar site config</button>
          </div>
          <div class="status" id="statusSite"></div>
        </section>

        <section id="view-entrega" class="card hidden">
          <h2>Área de Entrega</h2>
          <div class="row">
            <div>
              <label>Nome da loja</label>
              <input id="ent_nome" placeholder="Loja Centro" />
            </div>
            <div>
              <label>Endereço</label>
              <input id="ent_endereco" placeholder="Rua, número, bairro" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Latitude</label>
              <input id="ent_lat" type="number" step="any" placeholder="-8.123456" />
            </div>
            <div>
              <label>Longitude</label>
              <input id="ent_lng" type="number" step="any" placeholder="-42.123456" />
            </div>
          </div>

          <div class="row-3">
            <div>
              <label>Raio de entrega (KM)</label>
              <input id="ent_raio" type="number" step="0.1" placeholder="8" />
            </div>
            <div>
              <label>Velocidade média (KM/H)</label>
              <input id="ent_vel" type="number" step="1" placeholder="30" />
            </div>
            <div>
              <label>Status</label>
              <select id="ent_ativa">
                <option value="true">Ativa</option>
                <option value="false">Inativa</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>Taxa base (R$)</label>
              <input id="ent_taxa_base" type="number" step="0.01" placeholder="0" />
            </div>
            <div>
              <label>Taxa por KM (R$)</label>
              <input id="ent_taxa_km" type="number" step="0.01" placeholder="2.50" />
            </div>
          </div>

          <div class="actions">
            <button class="btn-primary" id="btnSalvarEntrega">Salvar área de entrega</button>
          </div>
          <div class="status" id="statusEntrega"></div>
        </section>

        <section id="view-produtos" class="card hidden">
          <h2>Produtos</h2>

          <div class="row-3">
            <div>
              <label>Nome do produto</label>
              <input id="prod_nome" placeholder="Gás 13kg" />
            </div>
            <div>
              <label>Categoria</label>
              <input id="prod_categoria" placeholder="Gás, Água, Vasilhame" />
            </div>
            <div>
              <label>Preço</label>
              <input id="prod_preco" type="number" step="0.01" placeholder="100.00" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Imagem URL</label>
              <input id="prod_imagem" placeholder="https://..." />
            </div>
            <div>
              <label>Estoque</label>
              <input id="prod_estoque" type="number" step="1" placeholder="10" />
            </div>
          </div>

          <label>Descrição</label>
          <textarea id="prod_descricao" placeholder="Descrição do produto"></textarea>

          <div class="row">
            <div>
              <label>Tipo</label>
              <select id="prod_ativo">
                <option value="true">Ativo</option>
                <option value="false">Inativo</option>
              </select>
            </div>
            <div>
              <label>ID do produto para editar</label>
              <input id="prod_id_edit" placeholder="Preenche sozinho ao clicar em editar" readonly />
            </div>
          </div>

          <div class="actions">
            <button class="btn-primary" id="btnSalvarProduto">Salvar produto</button>
            <button class="btn-dark" id="btnNovoProduto">Novo</button>
          </div>

          <div class="status" id="statusProduto"></div>
          <div class="pedido-lista" id="listaProdutosAdmin" style="margin-top:14px"></div>
        </section>

        <section id="view-pedidos" class="card hidden">
          <h2>Pedidos</h2>
          <div class="tabs">
            <button class="active" data-tab="novos">Novos</button>
            <button data-tab="andamento">Em andamento</button>
            <button data-tab="historico">Histórico</button>
          </div>
          <div class="status" id="statusPedidos">Carregando pedidos...</div>
          <div class="pedido-lista" id="listaPedidos"></div>
          <audio id="audioNovoPedido" preload="auto">
            <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
          </audio>
        </section>
      </main>
    </div>
  </div>

  <script>
const nomeLojaAtual = document.getElementById("site_nome").value.trim();

if (nomeLojaAtual) {
  const { data: appAtual } = await supabase
    .from("apps")
    .select("slug,nome")
    .eq("id", APP_ID)
    .maybeSingle();

  if (!appAtual?.slug) {
    const novoSlug = await gerarSlugUnico(nomeLojaAtual);
    await supabase
      .from("apps")
      .update({ slug: novoSlug, nome: nomeLojaAtual })
      .eq("id", APP_ID);
  } else {
    await supabase
      .from("apps")
      .update({ nome: nomeLojaAtual })
      .eq("id", APP_ID);
  }
}
</script>
</body>
</html>
