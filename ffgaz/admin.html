<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = localStorage.getItem("app_id");

/* 🔥 GERAR SLUG */
function gerarSlug(texto){
  return String(texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

/* 🔥 GARANTIR SLUG ÚNICO */
async function gerarSlugUnico(nome){
  let base = gerarSlug(nome);
  let slug = base;
  let i = 1;

  while (true) {
    const { data } = await supabase
      .from("apps")
      .select("id")
      .eq("slug", slug);

    if (!data || data.length === 0) break;

    slug = base + "-" + i;
    i++;
  }

  return slug;
}

/* 🔥 CRIAR OU GARANTIR SLUG */
async function garantirSlug() {
  const { data } = await supabase
    .from("apps")
    .select("slug,nome")
    .eq("id", APP_ID)
    .single();

  if (!data.slug) {
    const novoSlug = await gerarSlugUnico(data.nome || "loja");

    await supabase
      .from("apps")
      .update({ slug: novoSlug })
      .eq("id", APP_ID);

    return novoSlug;
  }

  return data.slug;
}

/* 🔥 CARREGAR LINK */
async function carregarLink() {
  const slug = await garantirSlug();

  const link = slug
    ? `${location.origin}/loj/${slug}`
    : `${location.origin}/vitrine.html?app_id=${APP_ID}`;

  document.getElementById("linkPublico").value = link;

  /* copiar */
  document.getElementById("btnCopiar").onclick = () => {
    navigator.clipboard.writeText(link);
    document.getElementById("btnCopiar").innerText = "Copiado!";
    setTimeout(() => {
      document.getElementById("btnCopiar").innerText = "Copiar Link";
    }, 2000);
  };

  /* abrir */
  document.getElementById("btnAbrir").onclick = () => {
    window.open(link, "_blank");
  };
}

window.addEventListener("DOMContentLoaded", carregarLink);
</script>

<style>
body{
  background:#020617;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.copiar{background:#16a34a;color:#fff}
.abrir{background:#2563eb;color:#fff}
</style>

</head>

<body>

<div class="card">
  <h2>🔗 Link da sua loja</h2>

  <input id="linkPublico" readonly>

  <button id="btnCopiar" class="copiar">Copiar Link</button>
  <button id="btnAbrir" class="abrir">Abrir Loja</button>
</div>

</body>
</html>
