<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Planos Hotspot</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
}

.topo{
background:#0d8db8;
color:#fff;
padding:18px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:25px auto;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#0d8db8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,
textarea{

width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-top:5px;

}

label{

font-weight:bold;
display:block;
margin-top:15px;

}

.check{

display:flex;
gap:10px;
align-items:center;
margin-top:18px;

}

.check input{

width:auto;

}

button{

padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;

}

.btnSalvar{

background:#16a34a;
color:#fff;
width:100%;
margin-top:20px;

}

.btnEditar{

background:#2563eb;
color:#fff;

}

.btnExcluir{

background:#dc2626;
color:#fff;

}

.lista{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;

}

.plano{

background:#fff;
border-radius:12px;
padding:18px;
box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.plano h3{

margin-bottom:10px;
color:#0d8db8;

}

.valor{

font-size:28px;
font-weight:bold;
color:#16a34a;
margin:10px 0;

}

.acoes{

display:flex;
gap:10px;
margin-top:15px;

}

</style>

</head>

<body>

<div class="topo">

📶 Planos Hotspot

</div>

<div class="container">

<div class="card">

<h2>Novo Plano</h2>

<div class="grid">

<div>

<label>Nome</label>

<input id="nome">

</div>

<div>

<label>Velocidade</label>

<input id="velocidade" placeholder="Ex: 20 Mbps">

</div>

<div>

<label>Tempo (minutos)</label>

<input id="tempo" type="number" value="60">

</div>

<div>

<label>Valor (R$)</label>

<input id="valor" type="number" step="0.01">

</div>

</div>

<label>Descrição</label>

<textarea id="descricao"></textarea>

<div class="check">

<input type="checkbox" id="ativo" checked>

<label for="ativo">

Plano Ativo

</label>

</div>

<button class="btnSalvar" onclick="salvarPlano()">

Salvar Plano

</button>

</div>

<div class="card">

<h2>Planos Cadastrados</h2>

<div id="listaPlanos" class="lista">

Carregando...

</div>

</div>
<script>

const db = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(location.search).get("app_id");

if(!APP_ID){
    alert("APP_ID não informado.");
    throw new Error("APP_ID ausente");
}

let editando=null;

async function carregarPlanos(){

    const {data,error}=await db
    .from("hotspot_planos")
    .select("*")
    .eq("app_id",APP_ID)
    .order("valor",{ascending:true});

    if(error){
        console.error(error);
        listaPlanos.innerHTML="Erro ao carregar.";
        return;
    }

    if(!data || data.length==0){
        listaPlanos.innerHTML="<b>Nenhum plano cadastrado.</b>";
        return;
    }

    listaPlanos.innerHTML=data.map(p=>`

<div class="plano">

<h3>${p.nome}</h3>

<div class="valor">
R$ ${Number(p.valor).toFixed(2)}
</div>

<p><b>Velocidade:</b> ${p.velocidade_download}</p>

<p><b>Tempo:</b> ${p.tempo_minutos} minutos</p>

<p>${p.descricao || ""}</p>

<p>
Status:
<b style="color:${p.ativo?'green':'red'}">
${p.ativo?'ATIVO':'INATIVO'}
</b>
</p>

<div class="acoes">

<button class="btnEditar"
onclick="editar('${p.id}')">
Editar
</button>

<button class="btnExcluir"
onclick="excluirPlano('${p.id}')">
Excluir
</button>

</div>

</div>

`).join("");

}

async function salvarPlano(){

    const dados = {

        app_id: APP_ID,

        nome: nome.value.trim(),

        descricao: descricao.value.trim(),

        velocidade_download: velocidade.value.trim(),

        tempo_minutos: Number(tempo.value),

        valor: Number(valor.value),

        ativo: ativo.checked

    };

    if(!dados.nome){
        alert("Informe o nome do plano.");
        return;
    }

    if(dados.valor <= 0){
        alert("Informe o valor.");
        return;
    }

    if(editando){

        const {error} = await db

        .from("hotspot_planos")

        .update(dados)

        .eq("id",editando);

        if(error){
            alert(error.message);
            return;
        }

        editando = null;

    }else{

        const {error} = await db

        .from("hotspot_planos")

        .insert(dados);

        if(error){
            alert(error.message);
            return;
        }

    }

    nome.value = "";
    descricao.value = "";
    velocidade.value = "";
    tempo.value = 60;
    valor.value = "";
    ativo.checked = true;

    carregarPlanos();

}

async function editar(id){

const {data,error}=await db

.from("hotspot_planos")

.select("*")

.eq("id",id)

.single();

if(error){
alert(error.message);
return;
}

editando=id;

nome.value=data.nome || "";
descricao.value=data.descricao || "";
velocidade.value=data.velocidade_download || "";
tempo.value=data.tempo_minutos || 60;
valor.value=data.valor || 0;
ativo.checked=data.ativo;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

async function excluirPlano(id){

if(!confirm("Deseja excluir este plano?"))
return;

const {error}=await db

.from("hotspot_planos")

.delete()

.eq("id",id);

if(error){
alert(error.message);
return;
}

carregarPlanos();

}

carregarPlanos();

</script>

</body>
</html>
