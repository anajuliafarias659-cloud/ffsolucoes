<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acesso VIP</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

button{
    width:100%;
    padding:15px;
    border:0;
    border-radius:10px;
    background:#0d8db8;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>👤 VIP 1</h2>
<button onclick="login('vip1','123456')">Conectar</button>
</div>

<div class="card">
<h2>👤 VIP 2</h2>
<button onclick="login('vip2','123456')">Conectar</button>
</div>

<div class="card">
<h2>👤 VIP 3</h2>
<button onclick="login('vip3','123456')">Conectar</button>
</div>

<div class="card">
<h2>👤 VIP 4</h2>
<button onclick="login('vip4','123456')">Conectar</button>
</div>

<div class="card">
<h2>👤 VIP 5</h2>
<button onclick="login('vip5','123456')">Conectar</button>
</div>

<script>
const params = new URLSearchParams(location.search);

const LINK_LOGIN =
    params.get("link-login-only") ||
    params.get("link-login") ||
    "";

const LINK_ORIG = params.get("link-orig") || "";

function login(usuario, senha){

    const form = document.createElement("form");

    form.method = "POST";
    form.action = LINK_LOGIN;

    form.innerHTML = `
        <input name="username" value="${usuario}">
        <input name="password" value="${senha}">
        <input name="dst" value="${LINK_ORIG}">
        <input name="popup" value="true">
    `;

    document.body.appendChild(form);
    form.submit();
}
</script>

</body>
</html>
