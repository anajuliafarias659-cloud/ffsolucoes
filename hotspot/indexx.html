
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Hotspot</title>

<script src="js/supabase.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
}

.topo{

position:fixed;
top:0;
left:0;
width:100%;
padding:18px 15px;
background:#0d8db8;
color:#fff;
text-align:center;
z-index:999;
border-radius:0 0 25px 25px;
box-shadow:0 8px 20px rgba(0,0,0,.15);

}

.logo{

width:85px;
height:85px;
border-radius:18px;
background:#fff;
padding:5px;
margin-bottom:8px;

}

.banner{

    width:100%;
    max-height:220px;
    object-fit:cover;

}

.container{

width:100%;
max-width:500px;
margin:170px auto 30px;
padding:12px;

}

.card{

background:#fff;
padding:22px;
margin-bottom:16px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.plano{

background:#fff;
border-radius:18px;
padding:20px;
margin-bottom:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.plano h3{

margin-bottom:10px;

}

.valor{

font-size:28px;
font-weight:bold;
color:#0d8db8;

}

.btn{

display:block;
width:100%;
padding:16px;
margin-top:12px;
background:#0d8db8;
color:#fff;
text-align:center;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:12px;
transition:.2s;

}

.btn:hover{

background:#0b769a;

}

.opcao{

width:100%;
padding:18px;
margin-top:12px;
background:#f7f7f7;
border:2px solid #ddd;
border-radius:12px;
font-size:18px;
cursor:pointer;
transition:.2s;

}
.topo .titulo{
    margin-top:6px;
    font-size:15px;
    font-weight:600;
    color:#ffffff;
    line-height:1.4;
    text-shadow:0 1px 3px rgba(0,0,0,.35);
}
.opcao:hover{

background:#eaf8fd;
border-color:#0d8db8;

}

.opcao.ativa{

background:#0d8db8;
color:#fff;
border-color:#0d8db8;

}

input{

width:100%;
padding:16px;
margin-top:12px;
border:2px solid #ddd;
border-radius:14px;
font-size:17px;
outline:none;
transition:.2s;

}

input:focus{

border-color:#0d8db8;
box-shadow:0 0 8px rgba(13,141,184,.2);

}

h2{

font-size:28px;
margin-bottom:12px;
color:#0d8db8;

}

h3{

font-size:20px;
margin-bottom:15px;

}

p{

font-size:16px;
line-height:1.6;
color:#555;

}

.btn-final{

background:linear-gradient(90deg,#16a34a,#22c55e);

}

</style>

</head>

<body>

<div id="empresa"></div>

<div class="container">

<div id="landing">
Carregando...
</div>

</div>

<script>

const db = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);

const MAC = params.get("mac") || "";
const IP = params.get("ip") || "";
const LINK_LOGIN = params.get("link-login") || "";
const LINK_ORIG = params.get("link-orig") || "";
const CHAP_ID = params.get("chap-id") || "";
const CHAP = params.get("chap-challenge") || "";

const APP_ID = params.get("app_id");
const PAGINA_ATUAL = location.pathname.split("/").pop();
let respondeu = false;

if (!APP_ID) {
    document.body.innerHTML = `
        <div style="padding:40px;text-align:center">
            <h2>Hotspot não encontrado</h2>
            <p>APP_ID não informado.</p>
        </div>
    `;
    throw new Error("APP_ID não informado");
}

async function carregarEmpresa(){

    const { data, error } = await db
        .from("hotspot_config")
        .select("*")
        .eq("app_id", APP_ID)
        .single();

    console.log("EMPRESA:", data);
    console.log("ERRO EMPRESA:", error);

    if(error){
        document.getElementById("empresa").innerHTML = "Hotspot não encontrado.";
        return;
    }

    document.getElementById("empresa").innerHTML = `

<div class="topo">

<img
class="logo"
src="${data.logo || '/hotspot/img/logo.png'}">

<h1>${data.nome_hotspot}</h1>

<p class="titulo">
${data.subtitulo || "Cadastre-se e aproveite benefícios exclusivos."}
</p>

</div>
`;
}


async function carregarLanding(){

document.getElementById("landing").innerHTML = `

<div class="card">

<h2>🎉 Seja Bem-vindo!</h2>

<p>

Cadastre-se gratuitamente para aproveitar todos os benefícios que preparamos para você.

</p>

<div style="margin-top:15px">

✅ Acesso rápido

<br>

🎁 Promoções exclusivas

<br>

💬 Novidades da empresa

<br>

⭐ Atendimento personalizado

</div>

</div>

<div class="card">

<h3>É sua primeira visita?</h3>

<p>

Sua resposta nos ajuda a melhorar nossos serviços.

</p>

<button class="opcao" onclick="responderPrimeira('sim',event)">
👍 Sim
</button>

<button class="opcao" onclick="responderPrimeira('nao',event)">
✨ Primeira vez
</button>

<div id="segundaPergunta"></div>

</div>

<div class="card">

<h3>👤 Faça seu Cadastro</h3>

<p>

Leva menos de 30 segundos.

Seus dados poderão ser utilizados para enviar promoções, novidades e benefícios exclusivos.

</p>

<input
id="nome"
placeholder="Seu nome">

<br><br>

<input
id="telefone"
placeholder="Seu WhatsApp">

<br><br>

<label>

<input
type="checkbox"
id="aceita">

 Desejo receber promoções e novidades.

</label>

</div>

<div class="card">

<h3>🎁 Benefícios Exclusivos</h3>

<p>

Ao realizar seu cadastro você poderá receber:

</p>

<p>

🎉 Cupons de desconto

<br>

💰 Promoções especiais

<br>

🎂 Ofertas de aniversário

<br>

📢 Novidades da empresa

</p>

</div>

<div class="card">

<button
class="btn btn-final"
onclick="liberarInternet()">

🚀 CONCLUIR CADASTRO

</button>

</div>

`;

}

function responderPrimeira(valor,event){

document
.querySelectorAll(".opcao")
.forEach(b=>b.classList.remove("ativa"));

event.target.classList.add("ativa");

const div=document.getElementById("segundaPergunta");

if(valor=="sim"){

div.innerHTML=`

<br>

<h3>⭐ Gostou da experiência?</h3>

<p>

Você indicaria nosso estabelecimento para um amigo?

</p>

<button class="opcao"
onclick="finalizarPesquisa('sim',event)">
😍 Sim
</button>

<button class="opcao"
onclick="finalizarPesquisa('nao',event)">
😕 Não
</button>

`;

}else{

div.innerHTML=`

<div class="card" style="margin-top:20px">

<h3>👋 Seja bem-vindo!</h3>

<p>
Esperamos que você tenha uma excelente experiência utilizando nossa internet.
</p>

</div>

`;

respondeu=true;

}

}
function finalizarPesquisa(valor,event){

document
.querySelectorAll("#segundaPergunta .opcao")
.forEach(b=>b.classList.remove("ativa"));

event.target.classList.add("ativa");

respondeu=true;

}

function liberarInternet(){

const nome=document.getElementById("nome").value.trim();

const telefone=document.getElementById("telefone").value.trim();

if(!respondeu){

alert("Responda a pesquisa.");

return;

}

if(nome==""){

alert("Informe seu nome.");

return;

}

if(telefone==""){

alert("Informe seu WhatsApp.");

return;

}

alert("Internet liberada.");

// aqui depois vamos salvar no Supabase
// criar usuário automaticamente
// fazer login no Mikrotik

}

async function iniciar(){

    const { data, error } = await db
        .from("hotspot_config")
        .select("modelo")
        .eq("app_id", APP_ID)
        .single();

    if(error){
        console.error(error);
        return;
    }

    if(
        data?.modelo &&
        data.modelo !== PAGINA_ATUAL
    ){

        location.replace(
            data.modelo + location.search
        );

        return;
    }

    carregarEmpresa();

carregarLanding();

}

iniciar();
console.log("FIM DO SCRIPT");
</script>

</body>

</html>
