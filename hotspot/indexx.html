<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Hotspot</title>

<script src="js/supabase.js"></script>

<style>

*{
    margin:0;

body{

}

.container{

margin:20px auto;
padding:15px;

}

.card{

    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 8px rgba(0,0,0,.1);

}

.plano{

background:#fff;
border-radius:18px;
padding:20px;
margin-bottom:15px;
text-align:center;

}

}

.valor{

}

.btn{

margin-top:15px;

width:100%;

background:#0d8db8;

}

</style>

</head>

<body>

<div id="empresa"></div>

<div class="container">

<div id="landing">
Carregando...
</div>

</div>

<script>

const db = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);

const MAC = params.get("mac") || "";
const IP = params.get("ip") || "";
const LINK_LOGIN = params.get("link-login") || "";
const LINK_ORIG = params.get("link-orig") || "";
const CHAP_ID = params.get("chap-id") || "";
const CHAP = params.get("chap-challenge") || "";

const APP_ID = params.get("app_id");
const PAGINA_ATUAL = location.pathname.split("/").pop();

if (!APP_ID) {
    document.body.innerHTML = `
        <div style="padding:40px;text-align:center">
            <h2>Hotspot não encontrado</h2>
            <p>APP_ID não informado.</p>
        </div>
    `;
    throw new Error("APP_ID não informado");
}

async function carregarEmpresa(){

    const { data, error } = await db
        .from("hotspot_config")
        .select("*")
        .eq("app_id", APP_ID)
        .single();

    console.log("EMPRESA:", data);
    console.log("ERRO EMPRESA:", error);

    if(error){
        document.getElementById("empresa").innerHTML = "Hotspot não encontrado.";
        return;
    }

    document.getElementById("empresa").innerHTML = `
<div class="topo">

<img
class="logo"
src="${data.logo || '/hotspot/img/logo.png'}">

<h1>${data.nome_hotspot}</h1>

<p>Internet Wi-Fi Oficial</p>

</div>
`;
}


async function carregarLanding(){

document.getElementById("landing").innerHTML = `

<div class="card">

<h2>Bem-vindo</h2>

</div>

`;

}

async function carregarLanding(){

document.getElementById("landing").innerHTML = `

<div class="card">

<h2>🎉 Bem-vindo!</h2>

<p>
Aproveite nossa internet gratuita.
</p>

</div>

<div class="card">

 Sim

</div>

</a>

</div>

<div class="card">

<button
class="btn"
onclick="liberarInternet()">

🚀 COMEÇAR A NAVEGAR

</button>

`;

}


function liberarInternet(){

alert("Internet liberada.");

}


async function iniciar(){

    const { data, error } = await db
        .from("hotspot_config")
        .select("modelo")
        .eq("app_id", APP_ID)
        .single();

    if(error){
        console.error(error);
        return;
    }

    if(
        data?.modelo &&
        data.modelo !== PAGINA_ATUAL
    ){

        location.replace(
            data.modelo + location.search
        );

        return;
    }

    carregarEmpresa();

carregarLanding();

}

iniciar();
console.log("FIM DO SCRIPT");
</script>
