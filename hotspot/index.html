
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Hotspot</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
}

.topo{
    background:#0d8db8;
    color:#fff;
    padding:20px;
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    border-radius:20px;
    object-fit:cover;
    background:#fff;
    padding:5px;
}

.banner{

    width:100%;
    max-height:220px;
    object-fit:cover;

}

.container{

    max-width:700px;
    margin:auto;
    padding:20px;

}

.card{

    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 8px rgba(0,0,0,.1);

}

.plano{

    border:2px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-top:15px;

}

.plano h3{

margin-bottom:10px;

}

.valor{

font-size:28px;
font-weight:bold;
color:#0d8db8;

}

.btn{

margin-top:15px;

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#0d8db8;

color:#fff;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div id="empresa"></div>

<div class="container">

<div class="card">

<h2>Escolha seu plano</h2>

<div id="planos">

Carregando...

</div>

</div>

</div>

<script>

const db = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params=new URLSearchParams(window.location.search);

const APP_ID=
params.get("app_id")||
localStorage.getItem("app_id");

if(APP_ID){

localStorage.setItem("app_id",APP_ID);

}

async function carregarEmpresa(){

    const { data, error } = await db
        .from("hotspot_config")
        .select("*")
        .eq("app_id", APP_ID)
        .single();

    console.log("EMPRESA:", data);
    console.log("ERRO EMPRESA:", error);

    if(error){
        document.getElementById("empresa").innerHTML = "Hotspot não encontrado.";
        return;
    }

    document.getElementById("empresa").innerHTML = `
        <div class="topo">

            <img
                class="logo"
                src="${data.logo || '/img/logo.png'}">

            <h1>${data.nome_hotspot}</h1>

            <p>${data.descricao || ""}</p>

        </div>

        ${data.banner ? `<img class="banner" src="${data.banner}">` : ""}
    `;
}

async function carregarPlanos(){

    const { data, error } = await db
        .from("hotspot_planos")
        .select("*");

    console.log("PLANOS:", data);
    console.log("ERRO:", error);

}

function comprar(id){

localStorage.setItem("planoHotspot",id);

alert("Plano selecionado: "+id);

// próxima etapa:

}

if(APP_ID){

carregarEmpresa();

carregarPlanos();

}else{

document.body.innerHTML="<h2>APP_ID não informado.</h2>";

}

</script>

</body>

</html>
