
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Hotspot</title>

<script src="js/supabase.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
}

.topo{
    background:#0d8db8;
    color:#fff;
    padding:20px;
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    border-radius:20px;
    object-fit:cover;
    background:#fff;
    padding:5px;
}

.banner{

    width:100%;
    max-height:220px;
    object-fit:cover;

}

.container{

max-width:420px;
margin:20px auto;
padding:15px;

}

.card{

    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 8px rgba(0,0,0,.1);

}

.plano{

background:#fff;
border-radius:18px;
padding:20px;
margin-bottom:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.plano h3{

margin-bottom:10px;

}

.valor{

font-size:28px;
font-weight:bold;
color:#0d8db8;

}

.btn{

margin-top:15px;

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#0d8db8;

color:#fff;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div id="empresa"></div>

<div class="container">

<div id="planos">
Carregando...
</div>

</div>

<script>

const db = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);

const MAC = params.get("mac") || "";
const IP = params.get("ip") || "";
const LINK_LOGIN = params.get("link-login") || "";
const LINK_ORIG = params.get("link-orig") || "";
const CHAP_ID = params.get("chap-id") || "";
const CHAP = params.get("chap-challenge") || "";

const APP_ID = params.get("app_id");

if (!APP_ID) {
    document.body.innerHTML = `
        <div style="padding:40px;text-align:center">
            <h2>Hotspot não encontrado</h2>
            <p>APP_ID não informado.</p>
        </div>
    `;
    throw new Error("APP_ID não informado");
}

async function carregarEmpresa(){

    const { data, error } = await db
        .from("hotspot_config")
        .select("*")
        .eq("app_id", APP_ID)
        .single();

    console.log("EMPRESA:", data);
    console.log("ERRO EMPRESA:", error);

    if(error){
        document.getElementById("empresa").innerHTML = "Hotspot não encontrado.";
        return;
    }

    document.getElementById("empresa").innerHTML = `
<div class="topo">

<img
class="logo"
src="${data.logo || '/hotspot/img/logo.png'}">

<h1>${data.nome_hotspot}</h1>

<p>Internet Wi-Fi Oficial</p>

</div>
`;
}

async function carregarPlanos(){

    const { data, error } = await db
    .from("hotspot_planos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("valor");

    console.log("PLANOS:", data);
    console.log("ERRO:", error);

    if(error){
        document.getElementById("planos").innerHTML = error.message;
        return;
    }

    if(!data || data.length === 0){
        document.getElementById("planos").innerHTML = "Nenhum plano encontrado.";
        return;
    }

    let html = "";

    data.forEach(plano => {

        html += `
<div class="plano">

<h3>${plano.nome}</h3>

<div class="valor">
R$ ${Number(plano.valor).toFixed(2)}
</div>

<p>${plano.tempo_minutos} minutos</p>

<button class="btn"
onclick="comprar('${plano.id}')">

📶 Conectar

</button>

</div>
`;

    });

    document.getElementById("planos").innerHTML = html;

}


function comprar(id){

    window.location.href =
`pagamentos.html?app_id=${APP_ID}
&plano=${id}
&mac=${encodeURIComponent(MAC)}
&ip=${encodeURIComponent(IP)}
&link_login=${encodeURIComponent(LINK_LOGIN)}
&link_orig=${encodeURIComponent(LINK_ORIG)}
&chap_id=${encodeURIComponent(CHAP_ID)}
&chap=${encodeURIComponent(CHAP)}`;

}

if(APP_ID){

carregarEmpresa();

carregarPlanos();

}else{

document.body.innerHTML="<h2>APP_ID não informado.</h2>";

}

</script>

</body>

</html>
