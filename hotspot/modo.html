
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Domínios Públicos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.supabase = supabaseClient;

const { data:{ session } } = await supabaseClient.auth.getSession();

if(!session){
  location.href = "/auth/login.html";
}
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#020617;
    color:#fff;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.card{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr 220px;
    gap:12px;
}

label{
    display:block;
    font-size:13px;
    color:#cbd5e1;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:13px;
    margin-top:6px;
    border:none;
    border-radius:12px;
    background:#fff;
    color:#0f172a;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    opacity:.9;
}

.btn-salvar{
    width:100%;
    margin-top:18px;
    background:#16a34a;
    color:#fff;
}

.btn-editar{
    background:#0ea5e9;
    color:#fff;
}

.btn-ativo{
    background:#16a34a;
    color:#fff;
}

.btn-inativo{
    background:#f97316;
    color:#fff;
}

.btn-excluir{
    background:#dc2626;
    color:#fff;
}

.tabela{
    width:100%;
    border-collapse:collapse;
}

.tabela th,
.tabela td{
    padding:12px;
    border-bottom:1px solid #1e293b;
    text-align:left;
    font-size:14px;
    vertical-align:middle;
}

.tabela th{
    background:#020617;
    color:#93c5fd;
}

.acoes{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.status{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.status.ok{
    background:#dcfce7;
    color:#166534;
}

.status.off{
    background:#ffedd5;
    color:#9a3412;
}

/* SWITCH */

.switch{
    position:relative;
    display:inline-block;
    width:58px;
    height:30px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    inset:0;
    background:#64748b;
    transition:.3s;
    border-radius:30px;
}

.slider:before{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    left:4px;
    top:4px;
    background:#fff;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#16a34a;
}

.switch input:checked + .slider:before{
    transform:translateX(28px);
}

.modelo{
    margin-top:6px;
    font-size:12px;
    font-weight:bold;
    text-align:center;
    color:#cbd5e1;
}

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

    .tabela{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }

    .acoes{
        flex-direction:column;
    }

    .acoes button{
        width:100%;
    }

}
</style>
</head>

<body>
<div class="container">

<h1>🌐 Domínios Públicos</h1>

<div class="card">
  <h2>Cadastrar domínio</h2>

  <div class="grid">
    <div>
      <label>Domínio</label>
      <input id="dominio" placeholder="ex: cliente.com.br">
    </div>

    <div>
      <label>App ID</label>
      <input id="app_id" placeholder="UUID do cliente">
    </div>

    <div>
      <label>Modelo da página</label>
      <select id="arquivo">
        <option value="index.html">Modelo normal</option>
        <option value="indexx.html">Modelo moderno / tema</option>
      </select>
    </div>
  </div>

  <button class="btn-salvar" onclick="salvarDominio()">Salvar domínio</button>
</div>

.modelo{
font-size:12px;
font-weight:bold;
margin-top:6px;
text-align:center;
color:#cbd5e1;
}
<div class="card">
  <h2>Domínios cadastrados</h2>

  <table class="tabela">
    <thead>
      <tr>
        <th>Domínio</th>
        <th>App ID</th>
        <th>Modo</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="listaDominios">
      <tr><td colspan="5">Carregando...</td></tr>
    </tbody>
  </table>
</div>

</div>

<script>
function limparDominio(valor){
  return String(valor || "")
    .trim()
    .toLowerCase()
    .replace("https://", "")
    .replace("http://", "")
    .replace(/^www\./, "")
    .replace(/\/$/, "");
}

async function salvarDominio(){
  const dominio = limparDominio(document.getElementById("dominio").value);
  const app_id = document.getElementById("app_id").value.trim();
  const arquivo = document.getElementById("arquivo").value;

  if(!dominio || !app_id){
    alert("Preencha domínio e app_id.");
    return;
  }

  const { error } = await window.supabase
    .from("dominios_publicos")
    .insert({ dominio, app_id, arquivo, ativo:true });

  if(error){
    alert("Erro ao salvar: " + error.message);
    return;
  }

  document.getElementById("dominio").value = "";
  document.getElementById("app_id").value = "";
  document.getElementById("arquivo").value = "index.html";

  alert("Domínio salvo com sucesso.");
  carregarDominios();
}

async function carregarDominios(){
  const lista = document.getElementById("listaDominios");

  const { data, error } = await window.supabase
    .from("dominios_publicos")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    lista.innerHTML = `<tr><td colspan="5">Erro ao carregar: ${error.message}</td></tr>`;
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<tr><td colspan="5">Nenhum domínio cadastrado.</td></tr>`;
    return;
  }

  lista.innerHTML = data.map(d => `
    <tr>
      <td><b>${d.dominio}</b></td>
      <td>${d.app_id || "-"}</td>
      <td>

<label class="switch">

<input
type="checkbox"
${d.arquivo==="indexx.html" ? "checked" : ""}
onchange="trocarModelo('${d.id}',this.checked)"
>

<span class="slider"></span>

</label>

<div class="modelo">

${d.arquivo==="indexx.html"
?"💰 Pago"
:"🆓 Gratuito"}

</div>

</td>
      <td>
        <span class="status ${d.ativo ? "ok" : "off"}">
          ${d.ativo ? "Ativo" : "Inativo"}
        </span>
      </td>
      <td>
        <div class="acoes">
          <button class="btn-editar" onclick="editarDominio('${d.id}', '${d.dominio}')">Editar</button>
          <button class="${d.ativo ? "btn-inativo" : "btn-ativo"}" onclick="alternarAtivo('${d.id}', ${d.ativo})">
            ${d.ativo ? "Desativar" : "Ativar"}
          </button>
          <button class="btn-excluir" onclick="excluirDominio('${d.id}')">Excluir</button>
        </div>
      </td>
    </tr>
  `).join("");
}

async function editarDominio(id, dominioAtual){
  const novoDominio = limparDominio(prompt("Novo domínio:", dominioAtual));
  if(!novoDominio) return;

  const { error } = await window.supabase
    .from("dominios_publicos")
    .update({ dominio: novoDominio })
    .eq("id", id);

  if(error){
    alert("Erro ao editar: " + error.message);
    return;
  }

  alert("Domínio atualizado.");
  carregarDominios();
}

window.trocarModelo = async function(id, checked){

const arquivo = checked
? "indexx.html"
: "index.html";

const { error } = await window.supabase
.from("dominios_publicos")
.update({ arquivo })
.eq("id", id);

if(error){
alert(error.message);
return;
}

carregarDominios();

}

 async function alternarAtivo(id, ativoAtual){
  const { error } = await window.supabase
    .from("dominios_publicos")
    .update({ ativo: !ativoAtual })
    .eq("id", id);

  if(error){
    alert("Erro ao alterar status: " + error.message);
    return;
  }

  carregarDominios();
}

async function excluirDominio(id){
  if(!confirm("Tem certeza que deseja excluir este domínio?")) return;

  const { error } = await window.supabase
    .from("dominios_publicos")
    .delete()
    .eq("id", id);

  if(error){
    alert("Erro ao excluir: " + error.message);
    return;
  }

  carregarDominios();
}

window.addEventListener("load", carregarDominios);
</script>

</body>
</html>
