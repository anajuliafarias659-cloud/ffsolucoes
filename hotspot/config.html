<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Configurações Hotspot</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
}

.topo{
background:#0d8db8;
color:#fff;
padding:18px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:30px auto;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#0d8db8;
}

input,
textarea,
select{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;

}

textarea{

height:90px;

}

button{

padding:15px;
border:none;
background:#0d8db8;
color:#fff;
font-size:18px;
border-radius:10px;
cursor:pointer;
width:100%;

}

label{

font-weight:bold;

}

.check{

display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;

}

.check input{

width:auto;

}

</style>

</head>

<body>

<div class="topo">

⚙ Configurações Hotspot

</div>

<div class="container">

<div class="card">

<h2>Empresa</h2>

<label>Nome</label>
<input id="nome">

<label>Descrição</label>
<textarea id="descricao"></textarea>

<label>Logo</label>
<input id="logo">

<label>Banner</label>
<input id="banner">

<label>WhatsApp</label>
<input id="whatsapp">

</div>

<div class="card">

<h2>Aparência</h2>

<label>Cor Principal</label>
<input type="color" id="cor">

<label>Cor Botão</label>
<input type="color" id="corbotao">

</div>

<div class="card">

<h2>Mercado Pago</h2>

<label>Access Token</label>
<input id="token">

<label>Public Key</label>
<input id="publickey">

</div>

<div class="card">

<h2>Mikrotik</h2>

<label>IP</label>
<input id="ip">

<label>Porta API</label>
<input id="porta">

<label>Usuário</label>
<input id="usuario">

<label>Senha</label>
<input id="senha" type="password">

<label>Nome Hotspot</label>
<input id="hotspot">

</div>

<div class="card">

<h2>Opções</h2>

<div class="check">
<input type="checkbox" id="pix">
<label for="pix">Pagamento PIX</label>
</div>

<div class="check">
<input type="checkbox" id="voucher">
<label for="voucher">Voucher</label>
</div>

<div class="check">
<input type="checkbox" id="mac">
<label for="mac">Login por MAC</label>
</div>

<div class="check">
<input type="checkbox" id="ativo">
<label for="ativo">Sistema Ativo</label>
</div>

</div>

<button onclick="salvar()">

Salvar Configurações

</button>

</div>

<script>

const db=window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"SUA_CHAVE_PUBLISHABLE"
);

const APP_ID=new URLSearchParams(location.search).get("app_id");

async function carregar(){

let {data}=await db

.from("hotspot_config")

.select("*")

.eq("app_id",APP_ID)

.single();

if(!data){

await db

.from("hotspot_config")

.insert({

app_id:APP_ID

});

return carregar();

}

nome.value=data.nome_hotspot||"";
descricao.value=data.descricao||"";
logo.value=data.logo||"";
banner.value=data.banner||"";
whatsapp.value=data.whatsapp||"";

cor.value=data.cor_primaria||"#0d8db8";
corbotao.value=data.cor_botao||"#0d8db8";

token.value=data.mercado_pago_token||"";
publickey.value=data.mercado_pago_public_key||"";

ip.value=data.mikrotik_ip||"";
porta.value=data.mikrotik_porta||8728;
usuario.value=data.mikrotik_usuario||"";
senha.value=data.mikrotik_senha||"";
hotspot.value=data.mikrotik_hotspot||"";

pix.checked=data.login_por_pix;
voucher.checked=data.login_por_voucher;
mac.checked=data.login_por_mac;
ativo.checked=data.ativo;

}

async function salvar(){

await db

.from("hotspot_config")

.update({

nome_hotspot:nome.value,
descricao:descricao.value,
logo:logo.value,
banner:banner.value,
whatsapp:whatsapp.value,

cor_primaria:cor.value,
cor_botao:corbotao.value,

mercado_pago_token:token.value,
mercado_pago_public_key:publickey.value,

mikrotik_ip:ip.value,
mikrotik_porta:Number(porta.value),
mikrotik_usuario:usuario.value,
mikrotik_senha:senha.value,
mikrotik_hotspot:hotspot.value,

login_por_pix:pix.checked,
login_por_voucher:voucher.checked,
login_por_mac:mac.checked,

ativo:ativo.checked

})

.eq("app_id",APP_ID);

alert("Configuração salva.");

}

carregar();

</script>

</body>
</html>
