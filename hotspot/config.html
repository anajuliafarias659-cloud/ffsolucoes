<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Configurações Hotspot</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
}

.topo{
background:#0d8db8;
color:#fff;
padding:18px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:30px auto;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#0d8db8;
}

input,
textarea,
select{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;

}

textarea{

height:90px;

}

button{

padding:15px;
border:none;
background:#0d8db8;
color:#fff;
font-size:18px;
border-radius:10px;
cursor:pointer;
width:100%;

}

label{

font-weight:bold;

}

.check{

display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;

}

.check input{

width:auto;

}
.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.3s;
border-radius:34px;
}

.slider:before{
content:"";
position:absolute;
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.3s;
border-radius:50%;
}

.switch input:checked + .slider{
background:#0d8db8;
}

.switch input:checked + .slider:before{
transform:translateX(26px);
}
</style>

</head>

<body>

<div class="topo">

⚙ Configurações Hotspot

</div>

<div class="container">

<div class="card">

<h2>Empresa</h2>

<label>Nome</label>
<input id="nome">

<label>Descrição</label>
<textarea id="descricao"></textarea>

<label>Logo</label>
<input id="logo">

<label>Banner</label>
<input id="banner">

<label>WhatsApp</label>
<input id="whatsapp">

</div>

<div class="card">

<h2>Aparência</h2>

<label>Cor Principal</label>
<input type="color" id="cor">

<label>Cor Botão</label>
<input type="color" id="corbotao">

</div>

<div class="card">

<h2>Mercado Pago</h2>

<label>Access Token</label>
<input id="token">

<label>Public Key</label>
<input id="publickey">

</div>

<div class="card">

<h2>Mikrotik</h2>

<label>IP</label>
<input id="ip">

<label>Porta API</label>
<input id="porta">

<label>Usuário</label>
<input id="usuario">

<label>Senha</label>
<input id="senha" type="password">

<label>Nome Hotspot</label>
<input id="hotspot">

</div>

<div class="card">

<h2>VPN WireGuard</h2>

<label>IP VPN do MikroTik</label>
<input id="vpn_ip" placeholder="10.100.0.2">

<label>Endpoint da VPS</label>
<input id="vpn_endpoint" value="179.197.224.55">

<label>Porta WireGuard</label>
<input id="vpn_porta" value="51820">

<label>Configuração RouterOS</label>

<textarea
id="scriptvpn"
style="height:250px;font-family:monospace"
readonly></textarea>

<button type="button" onclick="copiarVPN()">
📋 Copiar Configuração
</button>

<br><br>

<button onclick="gerarVPN()">
Gerar Configuração VPN
</button>

</div>

<div class="card">

<h2>Opções</h2>

<h2>Modelo da Página</h2>

<div class="check">

<span>Clássico</span>

<label class="switch">
<input type="checkbox" id="modelo">
<span class="slider"></span>
</label>

<span>Moderno</span>

</div>

<div class="check">
<input type="checkbox" id="pix">
<label for="pix">Pagamento PIX</label>
</div>

<div class="check">
<input type="checkbox" id="voucher">
<label for="voucher">Voucher</label>
</div>

<div class="check">
<input type="checkbox" id="mac">
<label for="mac">Login por MAC</label>
</div>

<div class="check">
<input type="checkbox" id="ativo">
<label for="ativo">Sistema Ativo</label>
</div>

</div>

<button onclick="salvar()">

Salvar Configurações

</button>

</div>

<script>

const db=window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(location.search).get("app_id");

console.log("APP_ID:", APP_ID);

if (!APP_ID) {
    alert("APP_ID não informado.");
    throw new Error("APP_ID ausente");
}

async function carregar() {

    const { data, error } = await db
        .from("hotspot_config")
        .select("*")
        .eq("app_id", APP_ID)
        .maybeSingle();

    if (error) {
        console.error(error);
        return;
    }

    if (!data) {

        const { error: erroInsert } = await db
            .from("hotspot_config")
            .insert({
                app_id: APP_ID
            });

        if (erroInsert) {
            console.error(erroInsert);
            return;
        }

        return carregar();
    }

    nome.value = data.nome_hotspot || "";
    descricao.value = data.descricao || "";
    logo.value = data.logo || "";
    banner.value = data.banner || "";
    whatsapp.value = data.whatsapp || "";

    cor.value = data.cor_primaria || "#0d8db8";
    corbotao.value = data.cor_botao || "#0d8db8";

    token.value = data.mercado_pago_token || "";
    publickey.value = data.mercado_pago_public_key || "";

    ip.value = data.mikrotik_ip || "";
    porta.value = data.mikrotik_porta || 8728;
    usuario.value = data.mikrotik_usuario || "";
    senha.value = data.mikrotik_senha || "";
    hotspot.value = data.mikrotik_hotspot || "";

    pix.checked = !!data.login_por_pix;
    voucher.checked = !!data.login_por_voucher;
    mac.checked = !!data.login_por_mac;
    ativo.checked = !!data.ativo;
modelo.checked = data.modelo === "indexx.html";
}

async function salvar() {

    const { error } = await db
        .from("hotspot_config")
        .update({

            // Empresa
            nome_hotspot: nome.value,
            descricao: descricao.value,
            logo: logo.value,
            banner: banner.value,
            whatsapp: whatsapp.value,

            // Aparência
            cor_primaria: cor.value,
            cor_botao: corbotao.value,

            // Mercado Pago
            mercado_pago_token: token.value.trim(),
            mercado_pago_public_key: publickey.value.trim(),

            // Mikrotik
            mikrotik_ip: ip.value,
            mikrotik_porta: Number(porta.value),
            mikrotik_usuario: usuario.value,
            mikrotik_senha: senha.value,
            mikrotik_hotspot: hotspot.value,

            // Opções
            login_por_pix: pix.checked,
            login_por_voucher: voucher.checked,
            login_por_mac: mac.checked,
            ativo: ativo.checked,

modelo: modelo.checked
    ? "indexx.html"
    : "index.html"

        })
        .eq("app_id", APP_ID);

    if (error) {
        console.error(error);
        alert(error.message);
        return;
    }

    alert("Configuração salva com sucesso!");

    carregar();
}

async function gerarVPN() {

    const resp = await fetch("https://hotspot.ffsolucoes.com.br/vpn/criar-peer", {

        method: "POST",

        headers: {

            "Content-Type": "application/json",

            "x-gateway-key": "ff_hotspot_2026_super_secreta"

        },

        body: JSON.stringify({

            app_id: APP_ID

        })

    });

    const json = await resp.json();

    if (!json.sucesso) {

        alert(json.erro);

        return;

    }

    vpn_ip.value = json.vpn_ip;

  scriptvpn.value =
`VPN criada com sucesso!

IP: ${json.vpn_ip}

===========================
CONFIGURAÇÃO ROUTEROS
===========================

${json.routeros}

===========================
CONFIGURAÇÃO WIREGUARD
===========================

${json.wireguard}`;
}

async function copiarVPN() {

    if (!scriptvpn.value.trim()) {
        alert("Nenhuma configuração gerada.");
        return;
    }

    try {

        await navigator.clipboard.writeText(scriptvpn.value);

    } catch {

        scriptvpn.select();
        document.execCommand("copy");

    }

    alert("Configuração copiada!");
}
carregar();
</script>

</body>
</html>
