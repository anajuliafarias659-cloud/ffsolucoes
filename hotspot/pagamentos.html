<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pagamento</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
padding:20px;
}

.card{

max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}

h1{

text-align:center;
margin-bottom:20px;

}

.info{

margin-bottom:20px;

}

.info p{

margin:8px 0;

}

.valor{

font-size:40px;
font-weight:bold;
color:#0d8db8;
text-align:center;
margin:20px 0;

}

button{

width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#0d8db8;
color:#fff;
font-size:18px;
cursor:pointer;

}

button:hover{

opacity:.9;

}

#pix{

display:none;
margin-top:20px;
text-align:center;

}

textarea{

width:100%;
height:90px;
padding:10px;

}

img{

max-width:250px;
margin:auto;
display:block;

}

</style>

</head>

<body>

<div class="card">

<h1>Pagamento</h1>

<div class="info">

<p><strong>Plano:</strong> <span id="nome"></span></p>

<p><strong>Descrição:</strong> <span id="descricao"></span></p>

<p><strong>Tempo:</strong> <span id="tempo"></span></p>

</div>

<div class="valor" id="valor">

R$ 0,00

</div>

<button onclick="gerarPix()">

Gerar PIX

</button>

<div id="pix">

<h3>Pagamento PIX</h3>

<img id="qrcode">

<br><br>

<textarea id="copiacola"></textarea>

<br><br>

<button onclick="copiarPix()">

Copiar Código PIX

</button>

</div>

</div>

<script>

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const db = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);

const APP_ID = params.get("app_id");
const planoId = params.get("plano");

if (!APP_ID || !planoId) {
    alert("Parâmetros inválidos.");
    throw new Error("APP_ID ou plano não informado.");
}

async function carregarPlano(){

    const { data, error } = await db
        .from("hotspot_planos")
        .select("*")
        .eq("id", planoId)
        .eq("app_id", APP_ID)
        .single();

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById("nome").innerHTML = data.nome;
    document.getElementById("descricao").innerHTML = data.descricao;
    document.getElementById("tempo").innerHTML = data.tempo_minutos + " minutos";
    document.getElementById("valor").innerHTML = "R$ " + Number(data.valor).toFixed(2);

}

async function gerarPix(){

    // Busca o plano
    const { data: plano, error } = await db
        .from("hotspot_planos")
        .select("*")
        .eq("id", planoId)
        .eq("app_id", APP_ID)
        .single();

    if(error){
        alert(error.message);
        return;
    }

    // Cria a venda
    const { data: venda, error: erroVenda } = await db
        .from("hotspot_vendas")
        .insert({
            app_id: APP_ID,
            plano_id: plano.id,
            valor: plano.valor,
            status: "aguardando_pagamento",
            pagamento_status: "pending"
        })
        .select("id")
        .single();

    if(erroVenda){
        alert(erroVenda.message);
        return;
    }

    // Gera o PIX usando a mesma função da loja
    const resposta = await fetch(
        `${SUPABASE_URL}/functions/v1/criar-pix-loja`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "apikey":SUPABASE_ANON_KEY
            },
            body:JSON.stringify({

                appId: String(APP_ID),

                pedidoId: String(venda.id),

                transaction_amount: Number(plano.valor),

                description: `Hotspot - ${plano.nome}`,

                payerEmail: "cliente@hotspot.com"

            })
        }
    );

    const pix = await resposta.json();

    console.log(pix);

    if(!resposta.ok){
        alert(pix.erro || pix.message || "Erro ao gerar PIX");
        return;
    }

    // Salva os dados retornados
    await db
        .from("hotspot_vendas")
        .update({

            pagamento_status: pix.status || "pending",

            mp_payment_id: pix.id,

            mp_qr_code:
                pix.pix_copia_cola ||
                pix.qr_code ||
                pix.pixCode

        })
        .eq("id", venda.id);

    document.getElementById("pix").style.display = "block";

    document.getElementById("qrcode").src =
        "data:image/png;base64," +
        (pix.qr_code_base64 || pix.base64);

    document.getElementById("copiacola").value =
        pix.pix_copia_cola ||
        pix.qr_code ||
        pix.pixCode ||
        "";
}

carregarPlano();

</script>

</body>
</html>
