<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pagamento Aprovado</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f3f4f6;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:#fff;

padding:35px;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,.15);

text-align:center;

max-width:500px;

width:90%;

}

.icone{

font-size:80px;

margin-bottom:20px;

}

h1{

color:#28a745;

margin-bottom:15px;

}

p{

font-size:18px;

margin-bottom:12px;

color:#555;

}

.info{

background:#f8f9fa;

padding:15px;

border-radius:10px;

margin:20px 0;

text-align:left;

}

.info p{

margin:8px 0;

font-size:16px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#0d8db8;

color:#fff;

font-size:18px;

cursor:pointer;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="card">

<div class="icone">

✅

</div>

<h1>

Pagamento Confirmado

</h1>

<p>

Seu acesso foi liberado com sucesso.

</p>

<div class="info">

<p>

<strong>Plano:</strong>

<span id="plano">

--

</span>

</p>

<p>

<strong>Tempo:</strong>

<span id="tempo">

--

</span>

</p>

<p>

<strong>Status:</strong>

<span style="color:green;font-weight:bold">

Internet Liberada

</span>

</p>

</div>

<button onclick="continuar()">

Começar Navegação

</button>

</div>

<script>

const plano=localStorage.getItem("nomePlano");

const tempo=localStorage.getItem("tempoPlano");

document.getElementById("plano").innerHTML=plano||"--";

document.getElementById("tempo").innerHTML=tempo||"--";

function continuar(){

window.location.href="https://google.com";

}

</script>

</body>

</html>
