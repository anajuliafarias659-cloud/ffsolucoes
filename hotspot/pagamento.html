<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pagamento</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
padding:20px;
}

.card{

max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}

h1{

text-align:center;
margin-bottom:20px;

}

.info{

margin-bottom:20px;

}

.info p{

margin:8px 0;

}

.valor{

font-size:40px;
font-weight:bold;
color:#0d8db8;
text-align:center;
margin:20px 0;

}

button{

width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#0d8db8;
color:#fff;
font-size:18px;
cursor:pointer;

}

button:hover{

opacity:.9;

}

#pix{

display:none;
margin-top:20px;
text-align:center;

}

textarea{

width:100%;
height:90px;
padding:10px;

}

img{

max-width:250px;
margin:auto;
display:block;

}

</style>

</head>

<body>

<div class="card">

<h1>Pagamento</h1>

<div class="info">

<p><strong>Plano:</strong> <span id="nome"></span></p>

<p><strong>Descrição:</strong> <span id="descricao"></span></p>

<p><strong>Tempo:</strong> <span id="tempo"></span></p>

</div>

<div class="valor" id="valor">

R$ 0,00

</div>

<button onclick="gerarPix()">

Gerar PIX

</button>

<div id="pix">

<h3>Pagamento PIX</h3>

<img id="qrcode">

<br><br>

<textarea id="copiacola"></textarea>

<br><br>

<button onclick="copiarPix()">

Copiar Código PIX

</button>

</div>

</div>

<script>

const db=window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const planoId=localStorage.getItem("planoHotspot");

async function carregarPlano(){

const {data,error}=await db

.from("hotspot_planos")

.select("*")

.eq("id",planoId)

.single();

if(error){

alert(error.message);

return;

}

document.getElementById("nome").innerHTML=data.nome;

document.getElementById("descricao").innerHTML=data.descricao;

document.getElementById("tempo").innerHTML=data.tempo_minutos+" minutos";

document.getElementById("valor").innerHTML="R$ "+Number(data.valor).toFixed(2);

}

async function gerarPix(){

    const resposta = await fetch(
        "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/gerar-pix-hotspot",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({

                plano_id:planoId

            })
        }
    );

    const pix = await resposta.json();

    console.log(pix);

    document.getElementById("pix").style.display="block";

    document.getElementById("qrcode").src =
    "data:image/png;base64," + pix.qr_code_base64;

    document.getElementById("copiacola").value =
    pix.copia_cola;

}

function copiarPix(){

const txt=document.getElementById("copiacola");

txt.select();

document.execCommand("copy");

alert("PIX copiado.");

}

carregarPlano();

</script>

</body>
</html>
