<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurar Locadora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#020617;
  color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
  margin:0;
}
.container{
  max-width:520px;
  margin:24px auto;
  padding:20px;
  background:#0f172a;
  border-radius:18px;
}
h2{margin-top:0;margin-bottom:10px}
label{margin-top:14px;display:block;font-weight:600}
input,select,button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border-radius:12px;
  border:none;
  font-size:14px;
}
input,select{background:#020617;color:#fff}
button{background:#22c55e;font-weight:700;margin-top:22px;cursor:pointer}
.preview{
  margin-top:10px;
  width:100%;
  max-height:220px;
  object-fit:contain;
  border-radius:12px;
  background:#020617;
  padding:6px;
}
.info{
  margin-top:12px;
  font-size:13px;
  color:#cbd5e1;
  line-height:1.5;
}
@media(max-width:600px){
  .container{margin:16px;padding:16px;}
}
</style>
</head>

<body>

<div class="container">
  <h2>🚗 Configurar Locadora</h2>

  <label>Nome da locadora</label>
  <input id="nomeSite" placeholder="Nome da locadora">

  <label>Cor primária</label>
  <input type="color" id="corPrimaria">

  <label>Tema do site</label>
  <select id="temaSite">
    <option value="padrao">🎨 Padrão</option>
    <option value="ano-novo">🎆 Ano Novo</option>
    <option value="sao-joao">🔥 São João</option>
    <option value="carnaval">🎭 Carnaval</option>
    <option value="natal">🎄 Natal</option>
  </select>

  <label>Fluxo da locação</label>
  <select id="fluxoLocacao">
    <option value="painel">🖥️ Via painel</option>
    <option value="whatsapp">📲 WhatsApp direto</option>
  </select>

  <label>Banner</label>
  <input type="file" id="bannerInput" accept="image/*">
  <img id="bannerPreview" class="preview" alt="Preview do banner">

  <div class="info">
    Sempre que trocar o banner, será enviado com nome único para evitar cache da imagem antiga.
  </div>

  <button onclick="salvar()">💾 Salvar configurações</button>
</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const app_id = localStorage.getItem("app_id");

if(!app_id){
  alert("Sessão inválida. Faça login novamente.");
  window.location.href = "../auth/login.html";
  throw new Error("sem app_id");
}

const nomeSite = document.getElementById("nomeSite");
const corPrimaria = document.getElementById("corPrimaria");
const temaSite = document.getElementById("temaSite");
const fluxoLocacao = document.getElementById("fluxoLocacao");
const bannerInput = document.getElementById("bannerInput");
const bannerPreview = document.getElementById("bannerPreview");

let bannerAtual = null;

bannerInput.addEventListener("change", () => {
  const file = bannerInput.files[0];
  if(file){
    bannerPreview.src = URL.createObjectURL(file);
  }
});

async function uploadBanner(file){
  const nomeOriginal = file.name || "banner.png";
  const ext = nomeOriginal.includes(".")
    ? nomeOriginal.split(".").pop().toLowerCase()
    : "png";

  const path = `${app_id}/banner_${Date.now()}.${ext}`;

  const { error: uploadError } = await sb.storage
    .from("banners")
    .upload(path, file, { upsert: true });

  if(uploadError){
    console.error("Erro no upload do banner:", uploadError);
    throw uploadError;
  }

  const { data } = sb.storage.from("banners").getPublicUrl(path);
  return data.publicUrl;
}

async function salvar(){
  try{
    let banner_url = bannerAtual;

    if(bannerInput.files[0]){
      banner_url = await uploadBanner(bannerInput.files[0]);
    }

    const payload = {
      app_id,
      nome_site: nomeSite.value.trim(),
      cor_primaria: corPrimaria.value || "#e30613",
      tema_site: temaSite.value || "padrao",
      fluxo_locacao: fluxoLocacao.value || "painel",
      banner_url
    };

    const { data, error: erroBusca } = await sb
      .from("config_site")
      .select("id")
      .eq("app_id", app_id)
      .maybeSingle();

    if(erroBusca){
      console.error("Erro ao buscar config_site:", erroBusca);
      alert("Erro ao buscar configuração.");
      return;
    }

    let erroSalvar = null;

    if(data){
      const { error } = await sb
        .from("config_site")
        .update(payload)
        .eq("app_id", app_id);

      erroSalvar = error;
    } else {
      const { error } = await sb
        .from("config_site")
        .insert(payload);

      erroSalvar = error;
    }

    if(erroSalvar){
      console.error("Erro ao salvar configurações:", erroSalvar);
      alert("Erro ao salvar configurações.");
      return;
    }

    bannerAtual = banner_url;

    if(bannerAtual){
      bannerPreview.src = bannerAtual + (bannerAtual.includes("?") ? "&" : "?") + "v=" + Date.now();
    }

    alert("Configurações salvas com sucesso 🚀");
  }catch(e){
    console.error("Erro geral ao salvar:", e);
    alert("Erro ao salvar banner/configurações.");
  }
}

(async () => {
  try{
    const { data, error } = await sb
      .from("config_site")
      .select("*")
      .eq("app_id", app_id)
      .maybeSingle();

    if(error){
      console.error("Erro ao carregar config_site:", error);
      return;
    }

    if(!data) return;

    nomeSite.value = data.nome_site || "";
    corPrimaria.value = data.cor_primaria || "#e30613";
    temaSite.value = data.tema_site || "padrao";
    fluxoLocacao.value = data.fluxo_locacao || "painel";

    if(data.banner_url){
      bannerAtual = data.banner_url;
      bannerPreview.src = data.banner_url + (data.banner_url.includes("?") ? "&" : "?") + "v=" + Date.now();
    }
  }catch(e){
    console.error("Erro ao carregar dados:", e);
  }
})();
</script>

</body>
</html>
