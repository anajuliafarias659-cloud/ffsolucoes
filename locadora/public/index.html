<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

/* BANNER */
.banner{
  width:100%;
  height:260px;
  object-fit:cover;
  display:none;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  gap:16px;
}

/* RESPONSIVO */
@media(min-width:768px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* CARD */
.card{
  background:#0f172a;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.05);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:14px;
}

.info h3{
  margin:0 0 8px 0;
}

.preco{
  color:#22c55e;
  font-weight:bold;
  margin-bottom:10px;
}

/* STATUS */
.status{
  font-size:13px;
  margin-bottom:10px;
}

.livre{color:#22c55e}
.ocupado{color:#f87171}

/* BOTÃO */
.btn{
  display:inline-block;
  background:#16a34a;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<img id="banner" class="banner">

<div class="container">

  <div class="header">
    <h1 id="nomeHotel">Hotel</h1>
    <p id="slogan">Quartos disponíveis</p>
  </div>

  <div id="lista" class="grid">Carregando...</div>

</div>

<script>
const url = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const key = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const sb = supabase.createClient(url, key, {
  auth:{ persistSession:false }
});

/* ===== PARAMS ===== */
const params = new URLSearchParams(location.search);
const app_id = params.get("app") || params.get("id");

if(!app_id){
  document.body.innerHTML = "Hotel não identificado";
  throw new Error("Sem app_id");
}

/* ===== ELEMENTOS ===== */
const lista = document.getElementById("lista");
const banner = document.getElementById("banner");
const nomeHotel = document.getElementById("nomeHotel");
const slogan = document.getElementById("slogan");

/* ===== CONFIG ===== */
async function carregarConfig(){
  const { data } = await sb
    .from("config_site")
    .select("*")
    .eq("app_id", app_id)
    .maybeSingle();

  if(!data) return;

  nomeHotel.innerText = data.nome_site || "Hotel";
  slogan.innerText = data.cidade || "Quartos disponíveis";

  if(data.banner_url){
    banner.src = data.banner_url;
    banner.style.display = "block";
  }

  return data.whatsapp;
}

/* ===== FORMATAR ===== */
function moeda(v){
  return Number(v||0).toLocaleString("pt-BR",{
    style:"currency",
    currency:"BRL"
  });
}

/* ===== LISTAR ===== */
async function carregarQuartos(){

  lista.innerHTML = "Carregando...";

  const whatsapp = await carregarConfig();

  const { data } = await sb
    .from("hotel_quartos")
    .select("*")
    .eq("negocio_id", app_id)
    .order("numero");

  if(!data || !data.length){
    lista.innerHTML = "Nenhum quarto disponível";
    return;
  }

  lista.innerHTML = "";

  data.forEach(q=>{

    const foto = (q.fotos && q.fotos[0]) || "";
    const status = q.status === "livre" ? "livre" : "ocupado";

    const texto = encodeURIComponent(
      `Olá, quero reservar o quarto ${q.numero || ""} - ${q.tipo}`
    );

    const link = whatsapp
      ? `https://wa.me/${whatsapp}?text=${texto}`
      : `https://wa.me/?text=${texto}`;

    lista.innerHTML += `
      <div class="card">
        ${foto ? `<img src="${foto}">` : ""}
        <div class="info">
          <h3>${q.tipo} ${q.numero ? "- Nº " + q.numero : ""}</h3>

          <div class="preco">
            Diária: ${moeda(q.preco_diaria)}
          </div>

          <div class="status ${status}">
            ${status === "livre" ? "Disponível" : "Ocupado"}
          </div>

          ${
            status === "livre"
            ? `<a class="btn" target="_blank" href="${link}">Reservar</a>`
            : `<span style="opacity:.6">Indisponível</span>`
          }
        </div>
      </div>
    `;
  });
}

carregarQuartos();
</script>

</body>
</html>
