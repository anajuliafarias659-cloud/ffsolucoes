<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Locadora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primaria:#e30613;
  --bg:#f4f4f4;
  --card:#ffffff;
  --texto:#111111;
  --banner-overlay:rgba(0,0,0,.25);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',system-ui,sans-serif;
}

body{
  background:var(--bg);
  color:var(--texto);
}

.topo{
  max-width:1200px;
  margin:20px auto 10px;
  padding:0 20px;
}

#nomeLocadora{
  text-align:center;
  font-size:32px;
  font-weight:800;
  color:var(--primaria);
}

.banner-wrapper{
  padding:20px;
}

.banner{
  width:100%;
  max-width:1200px;
  margin:0 auto;
  height:45vh;
  max-height:320px;
  min-height:180px;
  background:
    linear-gradient(var(--banner-overlay), var(--banner-overlay)),
    #000 center center/cover no-repeat;
  border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:22px;
  font-weight:700;
  text-align:center;
  padding:20px;
}

.lista{
  max-width:1200px;
  margin:20px auto 30px;
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:180px;
  object-fit:contain;
  background:#f1f1f1;
}

.info{
  padding:14px;
  flex:1;
}

.preco{
  font-weight:700;
  margin:6px 0;
}

.status{
  font-weight:700;
}

.status.disponivel{ color:#16a34a; }
.status.alugado{ color:#e30613; }

.btn{
  margin:12px;
  background:var(--primaria);
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
}

.tema-faixa{
  display:none;
  max-width:1200px;
  margin:0 auto 10px;
  padding:0 20px;
}

.tema-faixa span{
  display:block;
  width:100%;
  text-align:center;
  padding:12px;
  border-radius:14px;
  font-weight:700;
  color:#fff;
}

@media(max-width:768px){
  #nomeLocadora{ font-size:24px; }

  .banner{
    height:auto;
    aspect-ratio:16/9;
    min-height:auto;
    font-size:18px;
  }
}
</style>
</head>
<body>

<div class="topo">
  <div id="nomeLocadora">Locadora</div>
</div>

<div class="tema-faixa" id="temaFaixa">
  <span id="temaFaixaTexto"></span>
</div>

<div class="banner-wrapper">
  <div class="banner" id="banner">Banner da locadora</div>
</div>

<section class="lista" id="listaVeiculos"></section>

<script>
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(location.search);
const appId = params.get("app_id");

const nomeLocadoraEl = document.getElementById("nomeLocadora");
const bannerEl = document.getElementById("banner");
const listaVeiculosEl = document.getElementById("listaVeiculos");
const temaFaixa = document.getElementById("temaFaixa");
const temaFaixaTexto = document.getElementById("temaFaixaTexto");

if(!appId){
  document.body.innerHTML = "<h2 style='text-align:center;padding:40px'>Locadora não identificada</h2>";
} else {
  iniciarApp(appId);
}

function primeiroValorValido(...valores){
  for(const valor of valores){
    if(typeof valor === "string" && valor.trim() !== ""){
      return valor.trim();
    }
  }
  return "";
}

function moeda(valor){
  const numero = Number(valor);
  if (isNaN(numero)) return "Valor sob consulta";
  return numero.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function aplicarTema(tema, corPrimaria){
  const root = document.documentElement;

  temaFaixa.style.display = "none";
  temaFaixaTexto.textContent = "";
  temaFaixaTexto.style.background = corPrimaria || "#e30613";

  switch((tema || "padrao").toLowerCase()){
    case "ano-novo":
      root.style.setProperty("--bg", "linear-gradient(180deg, #0f172a, #111827)");
      root.style.setProperty("--card", "#ffffff");
      root.style.setProperty("--texto", "#111111");
      root.style.setProperty("--banner-overlay", "rgba(15,23,42,.35)");
      temaFaixa.style.display = "block";
      temaFaixaTexto.textContent = "🎆 Feliz Ano Novo";
      temaFaixaTexto.style.background = "linear-gradient(90deg, #2563eb, #7c3aed)";
      break;

    case "sao-joao":
      root.style.setProperty("--bg", "linear-gradient(180deg, #fff7ed, #ffedd5)");
      root.style.setProperty("--card", "#ffffff");
      root.style.setProperty("--texto", "#7c2d12");
      root.style.setProperty("--banner-overlay", "rgba(120,53,15,.25)");
      temaFaixa.style.display = "block";
      temaFaixaTexto.textContent = "🔥 Arraiá de Ofertas";
      temaFaixaTexto.style.background = "linear-gradient(90deg, #ea580c, #f59e0b)";
      break;

    case "carnaval":
      root.style.setProperty("--bg", "linear-gradient(180deg, #faf5ff, #fdf2f8)");
      root.style.setProperty("--card", "#ffffff");
      root.style.setProperty("--texto", "#4a044e");
      root.style.setProperty("--banner-overlay", "rgba(88,28,135,.25)");
      temaFaixa.style.display = "block";
      temaFaixaTexto.textContent = "🎭 Carnaval de Promoções";
      temaFaixaTexto.style.background = "linear-gradient(90deg, #9333ea, #ec4899, #f59e0b)";
      break;

    case "natal":
      root.style.setProperty("--bg", "linear-gradient(180deg, #f0fdf4, #ecfdf5)");
      root.style.setProperty("--card", "#ffffff");
      root.style.setProperty("--texto", "#14532d");
      root.style.setProperty("--banner-overlay", "rgba(20,83,45,.28)");
      temaFaixa.style.display = "block";
      temaFaixaTexto.textContent = "🎄 Especial de Natal";
      temaFaixaTexto.style.background = "linear-gradient(90deg, #15803d, #dc2626)";
      break;

    default:
      root.style.setProperty("--bg", "#f4f4f4");
      root.style.setProperty("--card", "#ffffff");
      root.style.setProperty("--texto", "#111111");
      root.style.setProperty("--banner-overlay", "rgba(0,0,0,.25)");
      break;
  }
}

async function iniciarApp(APP_ID){
  try{
    const { data: config, error: erroConfig } = await sb
      .from("config_site")
      .select("*")
      .eq("app_id", APP_ID)
      .maybeSingle();

    console.log("CONFIG_SITE:", config, erroConfig);

    if(erroConfig){
      console.error("Erro ao buscar config_site:", erroConfig);
    }

    const nome = primeiroValorValido(
      config?.nome_site,
      config?.nome_locadora,
      config?.nome_empresa,
      config?.nome_loja,
      config?.titulo_site
    ) || "Locadora";

    document.title = nome;
    nomeLocadoraEl.textContent = nome;

    const corPrimaria = primeiroValorValido(config?.cor_primaria) || "#e30613";
    document.documentElement.style.setProperty("--primaria", corPrimaria);

    const tema = primeiroValorValido(config?.tema_site) || "padrao";
    aplicarTema(tema, corPrimaria);

    const bannerUrl = primeiroValorValido(
      config?.banner_url,
      config?.url_banner,
      config?.banner,
      config?.imagem_banner,
      config?.capa_url
    );

    if(bannerUrl){
      const urlFinal = bannerUrl + (bannerUrl.includes("?") ? "&" : "?") + "v=" + Date.now();
      bannerEl.style.backgroundImage = `linear-gradient(var(--banner-overlay), var(--banner-overlay)), url("${urlFinal}")`;
      bannerEl.textContent = "";
    } else {
      bannerEl.style.backgroundImage = "linear-gradient(var(--banner-overlay), var(--banner-overlay))";
      bannerEl.textContent = nome;
    }

    const { data: veiculos, error: erroVeiculos } = await sb
      .from("veiculos")
      .select("id,modelo,diaria,status,foto_url")
      .eq("app_id", APP_ID);

    console.log("VEICULOS:", veiculos, erroVeiculos);

    listaVeiculosEl.innerHTML = "";

    if(!veiculos || veiculos.length === 0){
      listaVeiculosEl.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:30px;background:#fff;border-radius:16px;">
          Nenhum veículo cadastrado.
        </div>
      `;
      return;
    }

    veiculos.forEach(v => {
      const statusClasse = v.status === "alugado" ? "alugado" : "disponivel";
      const statusTexto = v.status === "alugado" ? "🔒 Alugado" : "✅ Disponível";

      listaVeiculosEl.innerHTML += `
        <div class="card">
          <img src="${v.foto_url || 'https://via.placeholder.com/400x200?text=Sem+Imagem'}" alt="${v.modelo || 'Veículo'}">
          <div class="info">
            <h3>${v.modelo || 'Sem nome'}</h3>
            <div class="preco">${v.diaria !== null && v.diaria !== "" ? moeda(v.diaria) + " / diária" : "Valor sob consulta"}</div>
            <div class="status ${statusClasse}">${statusTexto}</div>
          </div>
          <div class="btn" onclick="abrirVeiculo('${APP_ID}','${v.id}')">
            Alugar veículo
          </div>
        </div>
      `;
    });

  }catch(e){
    console.error("Erro ao iniciar:", e);
    document.body.innerHTML = "<h2 style='text-align:center;padding:40px'>Erro ao carregar a locadora</h2>";
  }
}

function abrirVeiculo(appId, id){
  location.href = "./veiculo.html?app_id=" + encodeURIComponent(appId) + "&id=" + encodeURIComponent(id);
}
</script>

</body>
</html>
