<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Locadora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primaria:#e30613;
  --bg:#f4f4f4;
  --card:#ffffff;
  --texto:#111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',system-ui,sans-serif;
}

body{
  background:var(--bg);
  color:var(--texto);
}

/* TOPO */
.topo{
  max-width:1200px;
  margin:20px auto 0;
  padding:0 20px;
}

.nome-locadora{
  font-size:32px;
  font-weight:800;
  color:var(--primaria);
  text-align:center;
  margin-bottom:10px;
}

/* BANNER */
.banner-wrapper{
  padding:20px;
}

.banner{
  width:100%;
  max-width:1200px;
  margin:0 auto;
  height:45vh;
  max-height:320px;
  min-height:180px;
  background:#000 center center/cover no-repeat;
  border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:22px;
  font-weight:700;
  text-align:center;
}

@media(max-width:768px){
  .banner{
    height:auto;
    aspect-ratio:16/9;
    background-size:cover;
    min-height:auto;
  }

  .nome-locadora{
    font-size:24px;
  }
}

/* LISTA */
.lista{
  max-width:1200px;
  margin:20px auto 30px;
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:180px;
  object-fit:contain;
  background:#f1f1f1;
}

.info{
  padding:14px;
  flex:1;
}

.info h3{
  margin-bottom:8px;
}

.preco{
  font-weight:700;
  margin:6px 0;
}

.status{
  font-weight:700;
}

.status.disponivel{
  color:#16a34a;
}

.status.alugado{
  color:#e30613;
}

.btn{
  margin:12px;
  background:var(--primaria);
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
  user-select:none;
}

/* TEMAS */
body.tema-ano-novo{
  --bg:#020617;
  --card:#0f172a;
  --texto:#fff;
}

body.tema-sao-joao{
  --bg:#1b0f08;
  --card:#2a160d;
  --texto:#fff;
}
body.tema-sao-joao .btn{
  background:#f97316;
}

body.tema-carnaval{
  --bg:#12002f;
  --card:#1f005c;
  --texto:#fff;
}
body.tema-carnaval .btn{
  background:linear-gradient(45deg,#22c55e,#ec4899,#facc15);
  background-size:300% 300%;
  animation:btnCarnaval 4s ease infinite;
}

body.tema-natal{
  --bg:#041b15;
  --card:#063f2e;
  --texto:#fff;
}
body.tema-natal .btn{
  background:#16a34a;
}

/* SVG CARNAVAL */
body.tema-carnaval::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'>\
<circle cx='50' cy='50' r='6' fill='%23facc15'/>\
<circle cx='120' cy='90' r='5' fill='%23ec4899'/>\
<circle cx='300' cy='60' r='7' fill='%2322c55e'/>\
<circle cx='200' cy='140' r='6' fill='%238b5cf6'/>\
<circle cx='80' cy='200' r='5' fill='%23f97316'/>\
<circle cx='260' cy='220' r='6' fill='%230ea5e9'/>\
</svg>");
  background-repeat:repeat;
  background-size:220px;
  opacity:.2;
  animation:carnavalGlow 6s ease-in-out infinite;
}

body.tema-carnaval > *{
  position:relative;
  z-index:1;
}

/* ANIMAÇÕES */
@keyframes carnavalGlow{
  0%{opacity:.15}
  50%{opacity:.35}
  100%{opacity:.15}
}

@keyframes btnCarnaval{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
</style>
</head>

<body>

<div class="topo">
  <div class="nome-locadora" id="nomeLocadora">Locadora</div>
</div>

<div class="banner-wrapper">
  <div class="banner" id="banner">Banner da locadora</div>
</div>

<section class="lista" id="listaVeiculos"></section>

<script>
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(location.search);
const appId = params.get("app_id");

const bannerEl = document.getElementById("banner");
const listaVeiculosEl = document.getElementById("listaVeiculos");
const nomeLocadoraEl = document.getElementById("nomeLocadora");

if(!appId){
  document.body.innerHTML = "<h2 style='text-align:center;padding:40px'>Locadora não identificada</h2>";
} else {
  iniciarApp(appId);
}

function aplicarTema(tema){
  document.body.className = document.body.className.replace(/tema-\S+/g, "").trim();

  if(tema && tema !== "padrao"){
    document.body.classList.add("tema-" + tema);
  }
}

function temaPorData(){
  const mes = new Date().getMonth() + 1;
  if(mes === 12) return "natal";
  if(mes === 6) return "sao-joao";
  if(mes === 2) return "carnaval";
  if(mes === 1) return "ano-novo";
  return null;
}

function moeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

async function iniciarApp(APP_ID){
  try{
    const { data: config, error: erroConfig } = await sb
      .from("config_site")
      .select("*")
      .eq("app_id", APP_ID)
      .maybeSingle();

    console.log("CONFIG_SITE:", config, erroConfig);

    if(config){
      const nomeSite =
        config.nome_site ||
        config.nome_locadora ||
        config.nome_empresa ||
        "Locadora";

      document.title = nomeSite;
      nomeLocadoraEl.textContent = nomeSite;

      document.documentElement.style.setProperty(
        "--primaria",
        config.cor_primaria || "#e30613"
      );

      const bannerUrl = (config.banner_url || "").trim();

      if(bannerUrl){
        bannerEl.style.backgroundImage = `url("${bannerUrl}${bannerUrl.includes("?") ? "&" : "?"}v=${Date.now()}")`;
        bannerEl.textContent = "";
      } else {
        bannerEl.style.backgroundImage = "none";
        bannerEl.textContent = nomeSite;
      }

      const temaURL = params.get("tema");
      aplicarTema(temaURL || config.tema_site || temaPorData());
    } else {
      nomeLocadoraEl.textContent = "Locadora";
      bannerEl.textContent = "Banner da locadora";
    }

    const { data: veiculos, error: erroVeiculos } = await sb
      .from("veiculos")
      .select("id,modelo,diaria,status,foto_url")
      .eq("app_id", APP_ID);

    console.log("VEICULOS:", veiculos, erroVeiculos);

    listaVeiculosEl.innerHTML = "";

    if(!veiculos || veiculos.length === 0){
      listaVeiculosEl.innerHTML = `
        <div style="
          grid-column:1/-1;
          text-align:center;
          padding:30px;
          background:#fff;
          border-radius:16px;
          box-shadow:0 10px 25px rgba(0,0,0,.08);
        ">
          Nenhum veículo cadastrado.
        </div>
      `;
      return;
    }

    veiculos.forEach(v => {
      const statusClasse = (v.status || "").toLowerCase() === "alugado"
        ? "alugado"
        : "disponivel";

      const statusTexto = statusClasse === "alugado"
        ? "🔒 Alugado"
        : "✅ Disponível";

      listaVeiculosEl.innerHTML += `
        <div class="card">
          <img src="${v.foto_url || 'https://via.placeholder.com/400x200?text=Sem+Imagem'}" alt="${v.modelo || 'Veículo'}">
          <div class="info">
            <h3>${v.modelo || "Veículo sem nome"}</h3>
            <div class="preco">${moeda(v.diaria)} / diária</div>
            <div class="status ${statusClasse}">
              ${statusTexto}
            </div>
          </div>
          <div class="btn" onclick="abrirVeiculo('${APP_ID}','${v.id}')">
            Alugar veículo
          </div>
        </div>
      `;
    });

  }catch(err){
    console.error("Erro ao iniciar app:", err);
    document.body.innerHTML = `
      <h2 style="text-align:center;padding:40px">
        Erro ao carregar a locadora
      </h2>
    `;
  }
}

function abrirVeiculo(appId, id){
  location.href = "./veiculo.html?app_id=" + encodeURIComponent(appId) + "&id=" + encodeURIComponent(id);
}
</script>

</body>
</html>
