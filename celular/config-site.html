<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurar Site</title>

  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --border: #1e293b;
      --text: #ffffff;
      --muted: #94a3b8;
      --primary: #22c55e;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 720px;
      margin: 40px auto;
      padding: 20px;
    }

    .box {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--border);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    button {
      background: var(--primary);
      color: #04120a;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
      }
    }

    small {
      color: var(--muted);
      display: block;
      margin-top: 6px;
      line-height: 1.3;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- ================= LOJA ================= -->
    <div class="box">
      <h2>Informações da Loja</h2>

      <input id="nome" placeholder="Nome da Loja" />

      <label>Logo</label>
      <input type="file" id="inputLogo" accept="image/*" />
      <img id="previewLogo" alt="Preview logo" />
      <button type="button" class="btn-danger" id="btnRemoverLogo">
        ❌ Remover Logo
      </button>

      <label>Banner</label>
      <input type="file" id="inputBanner" accept="image/*" />
      <img id="previewBanner" alt="Preview banner" />
      <button type="button" class="btn-danger" id="btnRemoverBanner">
        ❌ Remover Banner
      </button>

      <label>Descrição do banner (opcional)</label>
      <textarea id="bannerDescricao" placeholder="Ex: Promoção do dia!"></textarea>
    </div>

    <!-- ================= ENDEREÇO ================= -->
    <div class="box">
      <h2>Endereço</h2>

      <div class="row">
        <input id="rua" placeholder="Rua" />
        <input id="numero" placeholder="Número" />
      </div>

      <div class="row">
        <input id="cidade" placeholder="Cidade" />
        <input id="estado" placeholder="Estado" />
      </div>

      <input id="telefone" placeholder="Telefone / WhatsApp da loja" />
    </div>

    <!-- ================= CONFIGURAÇÕES ================= -->
    <div class="box">
      <h2>Configurações</h2>

      <label>Tema</label>
      <select id="tema">
        <option value="padrao">Padrão</option>
        <option value="natal">Natal</option>
        <option value="anonovo">Ano Novo</option>
        <option value="capivara">Capivara</option>
      </select>

      <label>Modo de venda</label>
      <select id="modoVenda">
        <option value="whatsapp">Venda via WhatsApp</option>
        <option value="sistema">Venda pelo Sistema (Mercado Pago)</option>
      </select>

      <label>WhatsApp (somente números)</label>
      <input id="whatsapp" placeholder="Ex: 88999999999" />

      <!-- TOKEN MERCADO PAGO -->
      <div id="boxMp" class="hidden">
        <label>Token do Mercado Pago (Access Token)</label>
        <input id="mpToken" placeholder="Cole aqui o Access Token do Mercado Pago" />
        <small>
          ⚠️ Esse token é do dono da loja. Não compartilhe.
          <br />
          Sugestão: use RLS na tabela <b>mp_contas</b>.
        </small>
        <button type="button" class="btn-danger" id="btnRemoverToken">
          ❌ Remover Token Mercado Pago
        </button>
      </div>
    </div>

    <button id="btnSalvar">Salvar Configurações</button>
    <small id="status"></small>

  </div>

  <!-- ================= SCRIPT ================= -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "SUA_PUBLIC_KEY_AQUI"
    );

    // ================= DOM =================
    const $ = (id) => document.getElementById(id);

    const nome = $("nome");
    const bannerDescricao = $("bannerDescricao");
    const rua = $("rua");
    const numero = $("numero");
    const cidade = $("cidade");
    const estado = $("estado");
    const telefone = $("telefone");
    const tema = $("tema");
    const modoVenda = $("modoVenda");
    const whatsapp = $("whatsapp");
    const boxMp = $("boxMp");
    const mpToken = $("mpToken");
    const inputLogo = $("inputLogo");
    const inputBanner = $("inputBanner");
    const previewLogo = $("previewLogo");
    const previewBanner = $("previewBanner");
    const btnSalvar = $("btnSalvar");
    const btnRemoverLogo = $("btnRemoverLogo");
    const btnRemoverBanner = $("btnRemoverBanner");
    const btnRemoverToken = $("btnRemoverToken");
    const statusEl = $("status");

    // ================= STATE =================
    let APP_ID = null;

    function setStatus(msg) {
      statusEl.textContent = msg || "";
    }

    function alternarCamposPagamento() {
      boxMp.classList.toggle("hidden", modoVenda.value !== "sistema");
    }

    modoVenda.addEventListener("change", alternarCamposPagamento);

    // ================= PREVIEW =================
    inputLogo.addEventListener("change", () => {
      const file = inputLogo.files[0];
      if (file) previewLogo.src = URL.createObjectURL(file);
    });

    inputBanner.addEventListener("change", () => {
      const file = inputBanner.files[0];
      if (file) previewBanner.src = URL.createObjectURL(file);
    });

    // ================= EVENTS =================
    btnSalvar.addEventListener("click", () => {
      alert("Botão salvar clicado ✅");
    });

    btnRemoverLogo.addEventListener("click", () => {
      previewLogo.src = "";
      inputLogo.value = "";
    });

    btnRemoverBanner.addEventListener("click", () => {
      previewBanner.src = "";
      inputBanner.value = "";
    });

    btnRemoverToken.addEventListener("click", () => {
      mpToken.value = "";
    });

  </script>
</body>
</html>
