<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurar Vitrine - Loja de Celular</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --border:#1e293b;
  --primary:#22c55e;
  --text:#ffffff;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

.container{
  max-width:520px;
  margin:40px auto;
  padding:28px;
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--border);
  transition:.3s;
}

h2,h3{text-align:center}
label{display:block;margin-top:14px;font-size:.9rem}

input,select,textarea,button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#020617;
  color:#fff;
}

textarea{
  resize:none;
  height:90px;
}

button{
  background:var(--primary);
  font-weight:bold;
  border:none;
  cursor:pointer;
  margin-top:20px;
}

.preview{
  margin-top:10px;
  max-height:90px;
  display:none;
  background:#fff;
  padding:6px;
  border-radius:10px;
}

.link{
  margin-top:20px;
  font-size:.85rem;
  word-break:break-all;
  color:var(--muted);
}

small{color:var(--muted)}

/* ===================== */
/* TEMA CAPIVARA STORY */
/* ===================== */

.tema-capivara{
  background:linear-gradient(135deg,#d65a00,#ff7a1a);
  color:#3b1d00;
}

.tema-capivara .container{
  background:#fff8f0;
  border:2px solid #f4b400;
}

.tema-capivara h2,
.tema-capivara h3{
  color:#e5391b;
}

.tema-capivara button{
  background:#e5391b;
}

.tema-capivara input,
.tema-capivara select,
.tema-capivara textarea{
  background:#fff;
  color:#3b1d00;
  border:1px solid #f4b400;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 Configurar Vitrine</h2>

<label>Nome da loja</label>
<input id="nome_site">

<label>Logo</label>
<input type="file" id="logo_file" accept="image/*">
<img id="logo_preview" class="preview">
<label><input type="checkbox" id="remover_logo"> Remover logo</label>

<label>Banner (opcional)</label>
<input type="file" id="banner_file" accept="image/*">
<img id="banner_preview" class="preview">
<label><input type="checkbox" id="remover_banner"> Remover banner</label>

<label>Descrição do Banner (opcional)</label>
<textarea id="banner_descricao"></textarea>

<label>WhatsApp (somente números)</label>
<input id="whatsapp_numero">

<h3>🛒 Tipo de Exibição</h3>
<select id="modo_cardapio">
  <option value="venda">Permitir compras</option>
  <option value="vitrine">Somente vitrine</option>
</select>

<h3>🚀 Fluxo de Venda</h3>
<select id="modo_venda">
  <option value="whatsapp">Enviar pedido pelo WhatsApp</option>
  <option value="sistema">Salvar pedido no sistema</option>
  <option value="ambos">Sistema + WhatsApp</option>
</select>

<h3>🎨 Tema</h3>
<select id="tema_site">
  <option value="padrao">Padrão</option>
  <option value="natal">Natal</option>
  <option value="anonovo">Ano Novo</option>
  <option value="capivara">Capivara Story</option>
</select>

<button onclick="salvar()">Salvar configurações</button>

<div class="link">
<strong>Link da Vitrine:</strong><br>
<span id="link_vitrine"></span>
</div>

</div>

<script type="module">
import { supabase } from "/js/supabase.js";

let app_id = null;

function aplicarPreviewTema(nome){
  document.body.classList.remove("tema-capivara");

  if(nome === "capivara"){
    document.body.classList.add("tema-capivara");
  }
}

tema_site.addEventListener("change",()=>{
  aplicarPreviewTema(tema_site.value);
});

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){
    window.location.href="/auth/login.html";
    return null;
  }
  return session;
}

async function iniciar(){
  const session = await verificarSessao();
  if(!session) return;

  const { data: usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  app_id = usuario.app_id;

  link_vitrine.innerText =
    `${location.origin}/celular/public/?app_id=${app_id}`;

  carregarDados();
}

function limparNumero(numero){
  return numero.replace(/\D/g,'');
}

async function uploadArquivo(file,bucket){
  const ext = file.name.split(".").pop();
  const path = `${app_id}/${Date.now()}.${ext}`;

  const { error } = await supabase
    .storage
    .from(bucket)
    .upload(path,file,{ upsert:true });

  if(error){
    alert(error.message);
    return null;
  }

  return supabase
    .storage
    .from(bucket)
    .getPublicUrl(path).data.publicUrl;
}

window.salvar = async function(){

  const numeroWhats = limparNumero(whatsapp_numero.value.trim());

  const payload = {
    nome_site: nome_site.value.trim(),
    whatsapp_numero: numeroWhats || null,
    modo_cardapio: modo_cardapio.value,
    modo_venda: modo_venda.value,
    tema_site: tema_site.value,
    banner_descricao: banner_descricao.value.trim() || null
  };

  if(remover_logo.checked) payload.logo_url = null;
  if(remover_banner.checked) payload.banner_url = null;

  if(logo_file.files[0])
    payload.logo_url = await uploadArquivo(logo_file.files[0],"logos");

  if(banner_file.files[0])
    payload.banner_url = await uploadArquivo(banner_file.files[0],"banners");

  const { data: existente } = await supabase
    .from("config_site")
    .select("id")
    .eq("app_id", app_id)
    .maybeSingle();

  const res = existente
    ? await supabase.from("config_site").update(payload).eq("app_id", app_id)
    : await supabase.from("config_site").insert({ ...payload, app_id });

  if(res.error){
    alert(res.error.message);
    return;
  }

  alert("Configurações salvas com sucesso 🔥");
};

async function carregarDados(){

  const { data } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", app_id)
    .maybeSingle();

  if(!data) return;

  nome_site.value = data.nome_site || "";
  whatsapp_numero.value = data.whatsapp_numero || "";
  modo_cardapio.value = data.modo_cardapio || "venda";
  modo_venda.value = data.modo_venda || "whatsapp";
  tema_site.value = data.tema_site || "padrao";
  banner_descricao.value = data.banner_descricao || "";

  aplicarPreviewTema(data.tema_site);
}

iniciar();
</script>

</body>
</html>
