<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurar Site</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔥 COLOCA AQUI
const params = new URLSearchParams(window.location.search);
let APP_ID = params.get("app_id");

// Se veio pela URL, salva
if (APP_ID) {
  localStorage.setItem("app_id", APP_ID);
} else {
  // se não veio, tenta recuperar salvo
  APP_ID = localStorage.getItem("app_id");
}

// Se ainda não existir, aí sim mostra erro
if (!APP_ID) {
  alert("APP_ID não encontrado.");
  throw new Error("APP_ID não encontrado.");
}

/* ================= UPLOAD ================= */

async function uploadImagem(file, pasta){
  const nomeArquivo = `${APP_ID}_${Date.now()}_${file.name}`;

  const { error } = await supabase.storage
    .from("arquivos-site")
    .upload(`${pasta}/${nomeArquivo}`, file);

  if(error){
    alert("Erro no upload");
    console.error(error);
    return null;
  }

  const { data } = supabase.storage
    .from("arquivos-site")
    .getPublicUrl(`${pasta}/${nomeArquivo}`);

  return data.publicUrl;
}

/* ================= CARREGAR ================= */

async function carregar(){
  const { data } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", APP_ID)
    .maybeSingle();

  if(data){
    nome.value = data.nome_site || "";
    bannerDescricao.value = data.banner_descricao || "";
    rua.value = data.loja_rua || "";
    numero.value = data.loja_numero || "";
    cidade.value = data.loja_cidade || "";
    estado.value = data.loja_estado || "";
    telefone.value = data.telefone || "";
    tema.value = data.tema_site || "padrao";
    modoVenda.value = data.modo_venda || "whatsapp";
    whatsapp.value = data.whatsapp_numero || "";

    if(data.logo_url){
      previewLogo.src = data.logo_url;
    }

    if(data.banner_url){
      previewBanner.src = data.banner_url;
    }
  }
}

/* ================= SALVAR ================= */

async function salvar(){

  let logoUrl = previewLogo.src || "";
  let bannerUrl = previewBanner.src || "";

  if(inputLogo.files[0]){
    logoUrl = await uploadImagem(inputLogo.files[0], "logos");
  }

  if(inputBanner.files[0]){
    bannerUrl = await uploadImagem(inputBanner.files[0], "banners");
  }

  const payload = {
    app_id: APP_ID,
    nome_site: nome.value,
    logo_url: logoUrl,
    banner_url: bannerUrl,
    banner_descricao: bannerDescricao.value,
    loja_rua: rua.value,
    loja_numero: numero.value,
    loja_cidade: cidade.value,
    loja_estado: estado.value,
    telefone: telefone.value,
    tema_site: tema.value,
    modo_venda: modoVenda.value,
    whatsapp_numero: whatsapp.value
  };

  const { error } = await supabase
    .from("config_site")
    .upsert(payload, { onConflict: "app_id" });

  if(error){
    alert("Erro ao salvar.");
    console.error(error);
  } else {
    alert("Salvo com sucesso!");
  }
}

window.salvar = salvar;
if (APP_ID) {
  carregar();
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}
.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}
.box{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
input,select,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
input,select,textarea{
  background:#020617;
  color:#fff;
}
button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
img{
  max-width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h2>Informações da Loja</h2>

<input id="nome" placeholder="Nome da Loja">

<label>Logo</label>
<input type="file" id="inputLogo" accept="image/*">
<img id="previewLogo">

<label>Banner</label>
<input type="file" id="inputBanner" accept="image/*">
<img id="previewBanner">

<textarea id="bannerDescricao" placeholder="Descrição do banner (opcional)"></textarea>
</div>

<div class="box">
<h2>Endereço</h2>
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">
<input id="telefone" placeholder="Telefone">
</div>

<div class="box">
<h2>Configurações</h2>

<select id="tema">
  <option value="padrao">Padrão</option>
  <option value="natal">Natal</option>
  <option value="anonovo">Ano Novo</option>
  <option value="capivara">Capivara</option>
</select>

<select id="modoVenda">
  <option value="whatsapp">Venda via WhatsApp</option>
  <option value="sistema">Venda pelo Sistema</option>
</select>

<input id="whatsapp" placeholder="WhatsApp (somente números)">
</div>

<button onclick="salvar()">Salvar Configurações</button>

</div>

</body>
</html>
