<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurar Site</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = localStorage.getItem("app_id");
if(!APP_ID) alert("APP_ID não encontrado.");

async function carregar(){
  const { data } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", APP_ID)
    .maybeSingle();

  if(data){
    nome.value = data.nome_site || "";
    logo.value = data.logo_url || "";
    banner.value = data.banner_url || "";
    bannerDescricao.value = data.banner_descricao || "";

    rua.value = data.loja_rua || "";
    numero.value = data.loja_numero || "";
    cidade.value = data.loja_cidade || "";
    estado.value = data.loja_estado || "";
    telefone.value = data.telefone || "";

    tema.value = data.tema_site || "padrao";
    modoVenda.value = data.modo_venda || "whatsapp";
    whatsapp.value = data.whatsapp_numero || "";
  }
}

async function salvar(){
  const payload = {
    app_id: APP_ID,
    nome_site: nome.value,
    logo_url: logo.value,
    banner_url: banner.value,
    banner_descricao: bannerDescricao.value,

    loja_rua: rua.value,
    loja_numero: numero.value,
    loja_cidade: cidade.value,
    loja_estado: estado.value,
    telefone: telefone.value,

    tema_site: tema.value,
    modo_venda: modoVenda.value,
    whatsapp_numero: whatsapp.value
  };

  const { error } = await supabase
    .from("config_site")
    .upsert(payload, { onConflict: "app_id" });

  if(error){
    alert("Erro ao salvar.");
    console.error(error);
  } else {
    alert("Configuração salva com sucesso!");
  }
}

window.salvar = salvar;
carregar();
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

.box{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

input,select,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

input,select,textarea{
  background:#020617;
  color:#fff;
}

button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

h2{
  margin-top:0;
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h2>Informações da Loja</h2>

<input id="nome" placeholder="Nome da Loja">
<input id="logo" placeholder="URL da Logo">
<input id="banner" placeholder="URL do Banner">
<textarea id="bannerDescricao" placeholder="Descrição do banner (opcional)"></textarea>

</div>

<div class="box">
<h2>Endereço (Opcional)</h2>

<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">
<input id="telefone" placeholder="Telefone da Loja">

</div>

<div class="box">
<h2>Configurações</h2>

<select id="tema">
  <option value="padrao">Padrão</option>
  <option value="natal">Natal</option>
  <option value="anonovo">Ano Novo</option>
  <option value="capivara">Capivara</option>
</select>

<select id="modoVenda">
  <option value="whatsapp">Venda via WhatsApp</option>
  <option value="sistema">Venda pelo Sistema</option>
</select>

<input id="whatsapp" placeholder="Número WhatsApp (somente números)">
</div>

<button onclick="salvar()">Salvar Configurações</button>

</div>

</body>
</html>
