<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Loja de Celular</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}
.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.sair{
  background:#e53935;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.container{
  padding:16px;
  max-width:1100px;
  margin:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}
.card{
  background:#0f172a;
  padding:16px;
  border-radius:14px;
  cursor:pointer;
  transition:.2s;
  text-align:center;
  position:relative;
}
.card:hover{
  transform:translateY(-4px);
  background:#1e293b;
}
select{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:none;
  margin-top:8px;
  background:#1e293b;
  color:#fff;
}
.link{
  margin-top:8px;
  font-size:13px;
  opacity:.8;
  cursor:pointer;
}
.link:hover{opacity:1}
</style>
</head>

<body>

<div class="topo">
  <h2>📱 Painel Loja de Celular</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <p>
    Bem-vindo, <b id="nome"></b><br>
    <small style="opacity:.6">
      ID da Loja: <span id="negocioId"></span>
    </small>
  </p>

  <div class="grid">

    <div class="card" onclick="ir('https://www.ffsolucoes.com.br/produtos.html')">📦 Produtos</div>
    <div class="card" onclick="ir('https://www.ffsolucoes.com.br/categorias.html')">📂 Categorias</div>
    <div class="card" onclick="ir('https://www.ffsolucoes.com.br/estoque.html')">📊 Estoque</div>
    <div class="card" onclick="ir('vendas.html')">💰 Vendas</div>
    <div class="card" onclick="ir('https://www.ffsolucoes.com.br/pedidos-online.html')">💰 Vendas online</div>
    <div class="card" onclick="ir('assistencia.html')">🛠 Assistência</div>
    <div class="card" onclick="ir('caixa.html')">💵 Caixa</div>
    <div class="card" onclick="ir('admins.html')">👤 Admins</div>
 

    <!-- ⚙️ CONFIGURAR VITRINE -->
    <div class="card" onclick="ir('https://www.ffsolucoes.com.br/celular/config-site.html')">
      🌐 Configurar Vitrine
    </div>

    <!-- 🌍 PÁGINA PÚBLICA -->
    <div class="card">
      <h3>🌍 Página Pública</h3>

      <select id="modo_publico">
        <option value="vitrine">🛒 Vitrine Online</option>
        <option value="site">🌐 Site Completo</option>
      </select>

      <div class="link" onclick="compartilharPagina()">
        🔗 Compartilhar Página
      </div>
    </div>

  </div>

</div>

<script type="module">
import { supabase } from "/js/supabase.js";

let APP_ID = null;

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){
    window.location.href="/auth/login.html";
    return null;
  }
  return session.user.id;
}

async function carregarUsuario(){

  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario } = await supabase
    .from("usuarios")
    .select("nome, app_id")
    .eq("id", userId)
    .single();

  if(!usuario) return;

  const { data: app } = await supabase
    .from("apps")
    .select("tipo")
    .eq("id", usuario.app_id)
    .single();

  if(!app || app.tipo !== "celular"){
    alert("Você não tem acesso a este painel.");
    window.location.href="/painel.html";
    return;
  }

  APP_ID = usuario.app_id;

  document.getElementById("nome").innerText = usuario.nome;
  document.getElementById("negocioId").innerText = usuario.app_id;
}

window.compartilharPagina = function(){

  const modo = document.getElementById("modo_publico").value;
  const base = location.origin;

  let url = modo==="vitrine"
    ? `${base}/celular/public/vitrine/?app_id=${APP_ID}`
    : `${base}/celular/public/site/?app_id=${APP_ID}`;

  navigator.clipboard.writeText(url);
  alert("Link copiado 🔥");
};

window.ir = pagina => window.location.href = pagina;

window.logout = async ()=>{
  await supabase.auth.signOut();
  window.location.href="/auth/login.html";
};

carregarUsuario();
</script>

</body>
</html>
