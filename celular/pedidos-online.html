<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;

window.addEventListener("DOMContentLoaded", iniciar);

async function iniciar(){

  const { data, error } = await supabase.auth.getUser();

  if(error || !data.user){
    console.log("Usuário não autenticado");
    alert("Faça login primeiro");
    window.location.href = "/auth/login.html";
    return;
  }

  const { data:usuario, error:erroUsuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", data.user.id)
    .single();

  if(erroUsuario || !usuario){
    alert("Erro ao buscar app_id");
    return;
  }

  app_id = usuario.app_id;

  carregarPedidos();
}

async function carregarPedidos(){

  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("app_id", app_id)
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    alert("Erro ao carregar pedidos");
    return;
  }

  listaPedidos.innerHTML="";
  listaHistorico.innerHTML="";

  (data || []).forEach(p=>{

    const itens = (p.itens || []).map(i=>{
      const nome = i.nome || i.nome_produto || "Produto";
      const cor = i.cor || "";
      const qtd = i.qtd || i.quantidade || 1;
      return `• ${nome} ${cor ? "(" + cor + ")" : ""} x${qtd}`;
    }).join("<br>");

    const card = `
      <div class="pedido">
        <div class="status ${p.status}">
          Status: ${p.status?.toUpperCase() || "NOVO"}
        </div>

        <strong>Cliente:</strong> ${p.cliente_nome || "-"}<br>
        <strong>Telefone:</strong> ${p.cliente_telefone || "-"}<br>

        <hr>

        <strong>Endereço:</strong><br>
        ${p.cliente_rua || "-"}, ${p.cliente_numero || "-"}<br>
        ${p.cliente_bairro || "-"} - ${p.cliente_cidade || "-"}/${p.cliente_estado || "-"}<br>
        CEP: ${p.cliente_cep || "-"}<br>

        <hr>

        <strong>Itens:</strong><br>
        ${itens}

        <hr>
        <strong>Total:</strong> R$ ${Number(p.total || 0).toFixed(2)}

        <br><br>

        ${p.status !== "historico" ? `
          <button class="btn-aceitar" onclick="aceitarPedido('${p.id}')">Aceitar</button>
          <button class="btn-historico" onclick="moverHistorico('${p.id}')">Histórico</button>
        ` : ""}

        <button class="btn-excluir" onclick="excluirPedido('${p.id}')">Excluir</button>
      </div>
    `;

    if(p.status === "historico"){
      listaHistorico.innerHTML += card;
    } else {
      listaPedidos.innerHTML += card;
    }

  });
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
  padding:20px;
}

h2{
  margin-top:40px;
}

.pedido{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.status{
  font-weight:bold;
  margin-bottom:10px;
}

.novo{ color:#22c55e; }
.aceito{ color:#facc15; }
.historico{ color:#94a3b8; }

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:6px;
  margin-right:5px;
}

.btn-aceitar{ background:#22c55e; color:#000; }
.btn-historico{ background:#3b82f6; color:#fff; }
.btn-excluir{ background:#ef4444; color:#fff; }
</style>
</head>

<body>

<h2>📦 Pedidos Ativos</h2>
<div id="listaPedidos"></div>

<h2>📁 Histórico</h2>
<div id="listaHistorico"></div>

</body>
</html>
