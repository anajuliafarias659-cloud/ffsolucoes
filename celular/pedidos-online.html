<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
  padding:20px;
}

h2{
  text-align:center;
}

.pedido{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.status{
  font-weight:bold;
  margin-bottom:10px;
}

.novo{ color:#22c55e; }
.aceito{ color:#facc15; }

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:8px;
}

.btn-aceitar{
  background:#22c55e;
  color:#000;
}
</style>
</head>
<body>

<h2>📦 Pedidos Online</h2>

<div id="listaPedidos"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "SUA_CHAVE_PUBLICA"
);

let app_id = null;

async function iniciar(){

  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){
    alert("Faça login");
    return;
  }

  const { data:user } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  app_id = user.app_id;

  carregarPedidos();
}

async function carregarPedidos(){

  const { data } = await supabase
    .from("pedidos")
    .select("*")
    .eq("app_id", app_id)
    .order("created_at",{ascending:false});

  listaPedidos.innerHTML="";

  data.forEach(p=>{

    const itens = p.itens.map(i=>
      `• ${i.nome} (${i.cor}) x${i.qtd}`
    ).join("<br>");

    listaPedidos.innerHTML += `
      <div class="pedido">
        <div class="status ${p.status}">
          Status: ${p.status.toUpperCase()}
        </div>

        <strong>Cliente:</strong> ${p.cliente_nome}<br>
        <strong>Telefone:</strong> ${p.cliente_telefone}<br>

        <hr>

        <strong>Endereço:</strong><br>
        ${p.cliente_rua}, ${p.cliente_numero}<br>
        ${p.cliente_bairro} - ${p.cliente_cidade}/${p.cliente_estado}<br>
        CEP: ${p.cliente_cep}<br>

        <hr>

        <strong>Itens:</strong><br>
        ${itens}

        <hr>
        <strong>Total:</strong> R$ ${Number(p.total).toFixed(2)}

        ${p.status === "novo"
          ? `<br><button class="btn-aceitar" onclick="aceitarPedido('${p.id}')">
              Aceitar Pedido
            </button>`
          : ""}
      </div>
    `;
  });
}

window.aceitarPedido = async function(id){

  const { data:pedido } = await supabase
    .from("pedidos")
    .select("*")
    .eq("id",id)
    .single();

  // Atualiza status
  await supabase
    .from("pedidos")
    .update({ status:"aceito" })
    .eq("id",id);

  // Monta mensagem WhatsApp
  let texto = `🛍️ *PEDIDO ACEITO*\n\n`;
  texto += `Olá ${pedido.cliente_nome}!\n\n`;
  texto += `Seu pedido foi aceito ✅\n\n`;

  pedido.itens.forEach(i=>{
    texto += `• ${i.nome} (${i.cor}) x${i.qtd}\n`;
  });

  texto += `\n💰 Total: R$ ${Number(pedido.total).toFixed(2)}`;
  texto += `\n\n⏳ Estamos aguardando o pagamento.`;

  let numero = pedido.cliente_telefone.replace(/\D/g,'');

  if(!numero.startsWith("55")){
    numero = "55"+numero;
  }

  window.open(
    `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`,
    "_blank"
  );

  carregarPedidos();
}

iniciar();

</script>
</body>
</html>
