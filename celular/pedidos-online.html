<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
  padding:20px;
}

h2{
  text-align:center;
  margin-top:40px;
}

.pedido{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.status{
  font-weight:bold;
  margin-bottom:10px;
}

.novo{ color:#22c55e; }
.aceito{ color:#facc15; }
.historico{ color:#94a3b8; }

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:6px;
  margin-right:5px;
}

.btn-aceitar{ background:#22c55e; color:#000; }
.btn-historico{ background:#3b82f6; color:#fff; }
.btn-excluir{ background:#ef4444; color:#fff; }
</style>
</head>
<body>

<h2>📦 Pedidos Ativos</h2>
<div id="listaPedidos"></div>

<h2>📁 Histórico</h2>
<div id="listaHistorico"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;

async function iniciar(){

  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){
    alert("Faça login");
    return;
  }

  const { data:user } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  app_id = user.app_id;

  carregarPedidos();
}

async function carregarPedidos(){

  const { data } = await supabase
    .from("pedidos")
    .select("*")
    .eq("app_id", app_id)
    .order("created_at",{ascending:false});

  listaPedidos.innerHTML="";
  listaHistorico.innerHTML="";

  (data || []).forEach(p=>{

    const itens = (p.itens || []).map(i => {

  const nome = i.nome || i.nome_produto || "Produto";
  const cor = i.cor || "";
  const qtd = i.qtd || i.quantidade || 1;

  return `• ${nome} ${cor ? "(" + cor + ")" : ""} x${qtd}`;

}).join("<br>");

    const card = `
      <div class="pedido">
        <div class="status ${p.status}">
          Status: ${p.status.toUpperCase()}
        </div>

        <strong>Cliente:</strong> ${p.cliente_nome}<br>
        <strong>Telefone:</strong> ${p.cliente_telefone}<br>

        <hr>

        <strong>Endereço:</strong><br>
${p.cliente_rua || "-"}, ${p.cliente_numero || "-"}<br>
${p.cliente_bairro || "-"} - ${p.cliente_cidade || "-"}/${p.cliente_estado || "-"}<br>
CEP: ${p.cliente_cep || "-"}<br>

        <hr>

        <strong>Itens:</strong><br>
        ${itens}

        <hr>
        <strong>Total:</strong> R$ ${Number(p.total).toFixed(2)}

        <br><br>

        ${p.status !== "historico" ? `
          <button class="btn-aceitar" onclick="aceitarPedido('${p.id}')">Aceitar</button>
          <button class="btn-historico" onclick="moverHistorico('${p.id}')">Histórico</button>
        ` : ""}

        <button class="btn-excluir" onclick="excluirPedido('${p.id}')">Excluir</button>
      </div>
    `;

    if(p.status === "historico"){
      listaHistorico.innerHTML += card;
    } else {
      listaPedidos.innerHTML += card;
    }

  });
}

/* ===== ACEITAR ===== */
window.aceitarPedido = async function(id){

  const { data:pedido } = await supabase
    .from("pedidos")
    .select("*")
    .eq("id",id)
    .single();

  await supabase
    .from("pedidos")
    .update({ status:"aceito" })
    .eq("id",id);

  let texto = `🛍️ *PEDIDO ACEITO*\n\n`;
  texto += `Olá ${pedido.cliente_nome}!\n\n`;
  texto += `Seu pedido foi aceito ✅\n\n`;

  pedido.itens.forEach(i=>{
    texto += `• ${i.nome} (${i.cor}) x${i.qtd}\n`;
  });

  texto += `\n💰 Total: R$ ${Number(pedido.total).toFixed(2)}`;
  texto += `\n\n⏳ Estamos aguardando o pagamento.`;

  
if(!pedido.cliente_telefone){
  alert("Cliente não tem telefone cadastrado");
  return;
}

let numero = pedido.cliente_telefone.replace(/\D/g,'');

if(!numero.startsWith("55")){
  numero = "55" + numero;
}
  

  window.open(
    `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`,
    "_blank"
  );

  carregarPedidos();
}

/* ===== HISTÓRICO ===== */
window.moverHistorico = async function(id){

  await supabase
    .from("pedidos")
    .update({ status:"historico" })
    .eq("id",id);

  carregarPedidos();
}

/* ===== EXCLUIR ===== */
window.excluirPedido = async function(id){

  if(!confirm("Tem certeza que deseja excluir este pedido?")) return;

  await supabase
    .from("pedidos")
    .delete()
    .eq("id",id);

  carregarPedidos();
}

iniciar();

</script>
</body>
</html>
