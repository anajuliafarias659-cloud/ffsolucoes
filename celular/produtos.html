<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Produtos | Loja de Celular</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.voltar{background:#334155;color:#fff;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:bold}
.container{max-width:1100px;margin:30px auto;padding:0 20px}
.box{background:#0f172a;padding:20px;border-radius:16px;margin-bottom:20px}
input,select,textarea,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
input,select,textarea{background:#020617;color:#fff}
textarea{resize:vertical;min-height:80px}
button{background:#22c55e;font-weight:bold;cursor:pointer}
.excluir{background:#e53935}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.produto{background:#020617;padding:12px;border-radius:14px;text-align:center;font-size:13px}
.produto img{width:100%;height:110px;object-fit:cover;border-radius:10px}
.preco{color:#22c55e;font-weight:bold}
small{opacity:.7}
.sem-foto{height:110px;display:flex;align-items:center;justify-content:center;opacity:.3}
#preview{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.preview-item{position:relative}
.preview-item img{width:90px;height:90px;object-fit:cover;border-radius:10px}
.preview-item button{position:absolute;top:-6px;right:-6px;background:red;color:#fff;border:none;border-radius:50%;width:22px;height:22px}
.cor-box{background:#111;padding:6px;border-radius:6px;margin-top:6px;font-size:13px}
</style>
</head>

<body>

<div class="topo">
<h2>📱 Produtos da Loja</h2>
<button class="voltar" onclick="window.location.href='admin.html'">⬅ Voltar</button>
</div>

<div class="container">

<div class="box">
<h2>➕ Cadastrar / Editar Celular</h2>

<input id="nome" placeholder="Ex: iPhone 14 Pro 128GB">
<input id="preco" type="number" step="0.01" placeholder="Preço">
<input id="estoque" type="number" placeholder="Estoque geral">
<textarea id="descricao" placeholder="Descrição do produto"></textarea>

<select id="categoria">
<option value="">Carregando categorias...</option>
</select>

<input id="camera" type="file" accept="image/*" hidden>
<button type="button" onclick="tirarFoto()">📷 Adicionar foto (até 3)</button>
<div id="preview"></div>

<button id="btnSalvar" type="button" onclick="salvar()">Cadastrar celular</button>
</div>

<div class="box">
<h2>📦 Celulares cadastrados</h2>
<div id="lista" class="grid"></div>
</div>

</div>

<script>

const sb = supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let admin = null;

/* ===== FUNÇÃO FORMATAR EM REAL ===== */
function formatarReal(valor){
  return Number(valor).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

/* ===== SESSÃO ===== */
async function verificarSessao(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    window.location.href="/auth/login.html";
    return null;
  }
  return session.user.id;
}

async function carregarAdmin(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario } = await sb
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  admin = usuario;
}

/* ===== SALVAR ===== */
async function salvar(){
  if(!nome.value || preco.value<=0){
    alert("Nome e preço obrigatórios");
    return;
  }

  const payload = {
    nome:nome.value,
    preco:Number(preco.value),
    estoque:Number(estoque.value||0),
    descricao:descricao.value,
    categoria:categoria.value
  };

  await sb.from("produtos").insert({
    ...payload,
    app_id:admin.app_id,
    ativo:true
  });

  limpar();
  carregar();
  alert("✅ Produto salvo");
}

/* ===== LISTAR ===== */
async function carregar(){
  const {data}=await sb
    .from("produtos")
    .select("*")
    .eq("app_id",admin.app_id);

  lista.innerHTML=(data||[]).map(p=>{

    return `
      <div class="produto">
        <div class="sem-foto">Sem foto</div>
        <b>${p.nome}</b>
        <div class="preco">${formatarReal(p.preco)}</div>
        <small>Estoque geral: ${p.estoque}</small><br>
        <small>${p.descricao||""}</small>
      </div>
    `;

  }).join("");
}

/* ===== LIMPAR ===== */
function limpar(){
  nome.value="";
  preco.value="";
  estoque.value="";
  descricao.value="";
}

/* ===== INIT ===== */
carregarAdmin().then(()=>{
  if(admin){
    carregar();
  }
});

</script>

</body>
</html>
