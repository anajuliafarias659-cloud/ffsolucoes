<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding-top:130px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:70px;
  background:white;
  padding:8px;
  border-radius:15px;
}

#nomeLoja{
  color:white;
  font-size:20px;
  font-weight:bold;
}

/* CATEGORIAS */
#filtros{
  padding:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filtro-btn{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#ddd;
  cursor:pointer;
}

.filtro-btn.ativo{
  background:#0071e3;
  color:white;
}

/* PRODUTOS */
.produtos{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  padding:15px;
  cursor:pointer;
}

.galeria{
  display:flex;
  gap:8px;
  justify-content:center;
}

.miniaturas{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.miniaturas img{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

.imagem-principal img{
  width:110px;
  height:110px;
  object-fit:contain;
}

.preco{
  font-size:18px;
  font-weight:bold;
  color:#0071e3;
  margin:8px 0;
}

.btn-add{
  width:100%;
  background:#0071e3;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:white;
  border:none;
  padding:15px 20px;
  border-radius:50px;
  cursor:pointer;
  z-index:9999;
}

#modalCarrinho,
#modalProduto{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal{
  background:white;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:15px;
  padding:20px;
}

.modal-produto{
  background:white;
  width:95%;
  max-width:900px;
  border-radius:15px;
  padding:20px;
}

.campo{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>
<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div id="filtros"></div>
<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<div id="modalCarrinho">
  <div class="modal">
    <h2>Seu Pedido</h2>
    <div id="itensCarrinho"></div>
    <hr>
    <h3>Total: R$ <span id="total">0.00</span></h3>
    <input class="campo" id="nomeCliente" placeholder="Nome">
    <input class="campo" id="telefoneCliente" placeholder="Telefone">
    <button id="btnFinalizar" style="background:#28a745;color:white;padding:10px;border:none;border-radius:6px;width:100%;">Finalizar</button>
  </div>
</div>

<div id="modalProduto">
  <div class="modal-produto">
    <div id="conteudoProduto"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho=[];
let configGlobal=null;

function salvar(){
  localStorage.setItem("carrinho",JSON.stringify(carrinho));
  contadorCarrinho.innerText=carrinho.length;
}

function renderCarrinho(){
  itensCarrinho.innerHTML="";
  let total=0;
  carrinho.forEach((item,i)=>{
    total+=Number(item.preco);
    itensCarrinho.innerHTML+=`
      <div style="display:flex;justify-content:space-between;">
        ${item.nome}
        <button onclick="remover(${i})">❌</button>
      </div>`;
  });
  document.getElementById("total").innerText=total.toFixed(2);
}

window.remover=(i)=>{
  carrinho.splice(i,1);
  salvar();
  renderCarrinho();
}

btnCarrinho.onclick=()=>{
  modalCarrinho.style.display="flex";
  renderCarrinho();
}

async function carregar(){
  const {data:config}=await supabase.from("config_site").select("*").eq("app_id",APP_ID).maybeSingle();
  configGlobal=config;

  if(config?.logo_url) logoLoja.src=config.logo_url;
  if(config?.nome_site) nomeLoja.innerText=config.nome_site;

  const {data:produtos}=await supabase.from("produtos").select("*").eq("app_id",APP_ID).eq("ativo",true);

  listaProdutos.innerHTML="";
  produtos.forEach(p=>{
    let imgs=[];
    try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

    listaProdutos.innerHTML+=`
      <div class="card" onclick='abrirProduto(${JSON.stringify(p)})'>
        <div class="galeria">
          <div class="miniaturas">
            ${imgs.map(i=>`<img src="${i}">`).join("")}
          </div>
          <div class="imagem-principal">
            ${imgs[0]?`<img src="${imgs[0]}">`:""}
          </div>
        </div>
        <h4>${p.nome}</h4>
        <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
        <button class="btn-add" onclick='event.stopPropagation();add(${JSON.stringify(p)})'>Adicionar</button>
      </div>`;
  });
}

window.add=(p)=>{
  carrinho.push(p);
  salvar();
}

window.abrirProduto=(p)=>{
  let imgs=[];
  try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}
  conteudoProduto.innerHTML=`
    <h2>${p.nome}</h2>
    ${imgs.map(i=>`<img src="${i}" style="width:100px;margin:5px;">`).join("")}
    <p>${p.descricao||""}</p>
    <button onclick='add(${JSON.stringify(p)})'>Adicionar</button>
  `;
  modalProduto.style.display="flex";
}

btnFinalizar.onclick=async()=>{
  if(configGlobal?.modo_venda==="whatsapp"){
    const numero=configGlobal.whatsapp_numero;
    let msg="Novo Pedido:\n";
    carrinho.forEach(i=>msg+=`${i.nome} - R$ ${i.preco}\n`);
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
  }
  alert("Pedido enviado!");
  carrinho=[];
  salvar();
  modalCarrinho.style.display="none";
}

carregar();
salvar();
</script>

</body>
</html>
