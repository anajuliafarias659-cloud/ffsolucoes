<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding-top:140px;
}

/* HEADER */
.topo{
  background: rgba(0,0,0,0.9);
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:80px;
  background:white;
  padding:8px;
  border-radius:15px;
}

#nomeLoja{
  color:white;
  font-size:20px;
  font-weight:bold;
}

/* GRID PRODUTOS */
.produtos{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  padding:20px;
}

@media(min-width:768px){
  .produtos{ grid-template-columns: repeat(3, 1fr); }
}

@media(min-width:1200px){
  .produtos{ grid-template-columns: repeat(4, 1fr); }
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  padding:15px;
}

.galeria{
  display:flex;
  gap:8px;
  justify-content:center;
}

.miniaturas{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.miniaturas img{
  width:40px;
  height:40px;
  object-fit:cover;
  cursor:pointer;
  border-radius:6px;
  border:2px solid transparent;
}

.miniaturas img:hover{
  border-color:#0071e3;
}

.imagem-principal img{
  width:120px;
  height:120px;
  object-fit:contain;
}

.preco{
  font-size:18px;
  font-weight:bold;
  color:#0071e3;
  margin:8px 0;
}

.btn-add{
  width:100%;
  background:#0071e3;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:white;
  border:none;
  padding:15px 20px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
  z-index:9999;
}

#modalCarrinho{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:99999;
  justify-content:center;
  align-items:center;
}

.modal{
  background:white;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:15px;
  padding:20px;
}

.campo{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

footer{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:30px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="produtos" id="listaProdutos"></section>

<footer>© 2026 Sistema Multi Negócio</footer>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<div id="modalCarrinho">
  <div class="modal">
    <h2>Seu Pedido</h2>
    <div id="itensCarrinho"></div>
    <hr>
    <h3>Subtotal: R$ <span id="subtotal">0.00</span></h3>
    <h3>Frete: R$ <span id="frete">0.00</span></h3>
    <h2>Total: R$ <span id="total">0.00</span></h2>

    <hr>
    <h3>Entrega</h3>
    <input class="campo" id="nomeCliente" placeholder="Nome">
    <input class="campo" id="telefoneCliente" placeholder="Telefone">
    <input class="campo" id="enderecoCliente" placeholder="Endereço">
    <input class="campo" id="numeroCliente" placeholder="Número">
    <input class="campo" id="bairroCliente" placeholder="Bairro">
    <input class="campo" id="cidadeCliente" placeholder="Cidade">
    <input class="campo" id="localizacaoCliente" placeholder="Link da localização" readonly>

    <button id="btnPegarLocalizacao"
    style="width:100%;padding:10px;background:#0071e3;color:white;border:none;border-radius:8px;margin-top:5px;">
    📍 Pegar Minha Localização
    </button>

    <textarea class="campo" id="obsCliente" placeholder="Observação"></textarea>

    <button id="btnFinalizar" style="width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:8px;">
    Finalizar Pedido
    </button>

    <br><br>
    <button id="fecharCarrinho" style="width:100%;padding:10px;background:#999;color:white;border:none;border-radius:8px;">
    Fechar
    </button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let clienteLat=null;
let clienteLng=null;
let configGlobal=null;

/* SALVAR */
function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  document.getElementById("contadorCarrinho").innerText=carrinho.length;
}

/* ABRIR CARRINHO */
btnCarrinho.onclick=()=>{
  modalCarrinho.style.display="flex";
  renderizarCarrinho();
};

fecharCarrinho.onclick=()=>{
  modalCarrinho.style.display="none";
};

/* REMOVER ITEM */
function renderizarCarrinho(){
  itensCarrinho.innerHTML="";
  let subtotal=0;

  carrinho.forEach((item,index)=>{
    subtotal+=Number(item.preco);

    const div=document.createElement("div");
    div.style.display="flex";
    div.style.justifyContent="space-between";
    div.style.alignItems="center";
    div.style.marginBottom="8px";

    div.innerHTML=`
      <div>
        <strong>${item.nome}</strong><br>
        R$ ${Number(item.preco).toFixed(2)}
      </div>
      <button style="background:#dc3545;color:white;border:none;border-radius:6px;padding:5px 8px;cursor:pointer;">
        ❌
      </button>
    `;

    div.querySelector("button").onclick=()=>{
      carrinho.splice(index,1);
      salvar();
      renderizarCarrinho();
    };

    itensCarrinho.appendChild(div);
  });

  subtotal = subtotal || 0;
  document.getElementById("subtotal").innerText=subtotal.toFixed(2);
  calcularFrete(subtotal);
}

/* LOCALIZAÇÃO COM LINK */
btnPegarLocalizacao.onclick=()=>{
  if(!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition(pos=>{
    clienteLat = pos.coords.latitude;
    clienteLng = pos.coords.longitude;

    const link = `https://www.google.com/maps?q=${clienteLat},${clienteLng}`;
    localizacaoCliente.value = link;

    const subtotal = Number(document.getElementById("subtotal").innerText || 0);
    calcularFrete(subtotal);
  });
};

/* FRETE */
function calcularFrete(subtotal){
  let frete = 10;

  if(clienteLat && clienteLng){
    const dist = distancia(-9.015,-42.700,clienteLat,clienteLng);
    frete = dist * 2;
  }

  frete = frete || 0;

  document.getElementById("frete").innerText = frete.toFixed(2);
  document.getElementById("total").innerText =
    (subtotal + frete).toFixed(2);
}

function distancia(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* PRODUTOS */
function renderizarProdutos(lista){
  listaProdutos.innerHTML="";

  lista.forEach(p=>{
    let imgs=[];
    try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

    const card=document.createElement("div");
    card.className="card";

    let mini="";
    imgs.forEach(img=> mini+=`<img src="${img}">`);

    card.innerHTML=`
      <div class="galeria">
        <div class="miniaturas">${mini}</div>
        <div class="imagem-principal">
          ${imgs[0]?`<img src="${imgs[0]}" class="imgPrincipal">`:""}
        </div>
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    const principal=card.querySelector(".imgPrincipal");
    card.querySelectorAll(".miniaturas img").forEach(min=>{
      min.onclick=()=> principal.src=min.src;
    });

    card.querySelector(".btn-add").onclick=()=>{
      carrinho.push(p);
      salvar();
    };

    listaProdutos.appendChild(card);
  });
}

/* CARREGAR */
async function carregar(){
  const {data:config}=await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  configGlobal=config;

  if(config?.logo_url) logoLoja.src=config.logo_url;
  if(config?.nome_site) nomeLoja.innerText=config.nome_site;

  const {data:produtos}=await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  renderizarProdutos(produtos||[]);
}

carregar();
salvar();
</script>

</body>
</html>
