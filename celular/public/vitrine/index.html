<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  transition:.3s;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
  font-size:20px;
  transition:.3s;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PRODUTOS */
.produtos{
  margin-top:220px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:.3s;
}

.preco{
  font-weight:bold;
  color:#0071e3;
  margin-top:8px;
}

.btn-add{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
  margin-top:8px;
}

/* ===================== */
/* TEMAS */
/* ===================== */

/* 🎄 NATAL */
.tema-natal{
  background:#8b0000;
}
.tema-natal .topo{
  background:#006400;
}
.tema-natal .btn-add{
  background:#006400;
}

/* 🎆 ANO NOVO */
.tema-anonovo{
  background:linear-gradient(135deg,#000,#1e3a8a);
}
.tema-anonovo .topo{
  background:#111827;
}
.tema-anonovo .btn-add{
  background:#facc15;
  color:#000;
}

/* 🐹 CAPIVARA */
.tema-capivara{
  background:linear-gradient(135deg,#d65a00,#ff7a1a);
}
.tema-capivara .topo{
  background:#6b2e1a;
}
.tema-capivara #nomeLoja{
  background:linear-gradient(90deg,#e5391b 60%,#f4b400 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.tema-capivara .card{
  background:#fff8f0;
  border:2px solid #f4b400;
}
.tema-capivara .preco{
  color:#e5391b;
}
.tema-capivara .btn-add{
  background:#e5391b;
}
.tema-capivara #btnCarrinho{
  background:#f4b400;
  color:#6b2e1a;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja" style="display:none;">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>
<section class="produtos" id="listaProdutos"></section>
<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  document.getElementById("contadorCarrinho").innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

function aplicarTema(nome){

  document.body.classList.remove(
    "tema-natal",
    "tema-anonovo",
    "tema-capivara"
  );

  if(nome && nome !== "padrao"){
    document.body.classList.add("tema-" + nome);
  }
}

async function carregar(){

  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config){

    document.getElementById("nomeLoja").innerText = config.nome_site || "";

    if(config.logo_url){
      const logo = document.getElementById("logoLoja");
      logo.src = config.logo_url;
      logo.style.display = "block";
    }

    if(config.banner_url){
      document.getElementById("bannerArea").innerHTML =
        `<img src="${config.banner_url}">`;
    }

    /* AQUI APLICA QUALQUER TEMA */
    aplicarTema(config.tema_site);
  }

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  renderizar(prods || []);
}

function renderizar(lista){
  const container = document.getElementById("listaProdutos");
  container.innerHTML = "";

  lista.forEach(p=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    container.appendChild(card);
  });
}

carregar();
salvar();
</script>

</body>
</html>
