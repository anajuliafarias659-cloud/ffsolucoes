<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:0px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner-text{
  padding:10px;
  text-align:center;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:200px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}

.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}

.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:260px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:all .3s ease;
}

.card.aberto{
  grid-column:1/-1;
  padding:20px;
  transform:scale(1.02);
}

.card img{
  transition:all .3s ease;
}


.descricao-produto{
  display:none;
  font-size:14px;
  margin:10px 0;
}

.card.aberto .descricao-produto{
  display:block;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

#modalCarrinho{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.modal{
  background:#fff;
  width:95%;
  max-width:500px;
  padding:20px;
  border-radius:15px;
}
.modal{
  background:#fff;
  width:95%;
  max-width:500px;
  padding:20px;
  border-radius:15px;
}

/* 👇 COLE AQUI */
/* IMAGEM PRINCIPAL */
.img-produto{
  width:120px;
  height:120px;
  object-fit:contain;
  transition:all .3s ease;
}

/* Quando card aberto */
.card.aberto .img-produto{
  width:240px;
  height:240px;
}

/* Efeito fade */
.fade{
  opacity:0;
  transform:scale(0.95);
}

.img-produto.animando{
  transition:opacity .25s ease, transform .25s ease;
}

/* Miniaturas */
.mini-img{
  width:55px;
  height:55px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .2s ease;
}

.mini-img:hover{
  transform:scale(1.05);
}

.mini-img.ativa{
  border:2px solid #0071e3;
}
/* ===== SLIDER ESTILO INSTAGRAM ===== */

.galeria{
  position:relative;
  overflow:hidden;
}

.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
  display:none;
}

.slide{
  min-width:100%;
  scroll-snap-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
}

.img-produto{
  width:100%;
  max-width:250px;
  height:250px;
  object-fit:contain;
  transition:all .3s ease;
}

.card.aberto .img-produto{
  max-width:400px;
  height:400px;
}

/* Bolinhas */

.bolinhas{
  position:absolute;
  bottom:8px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#ccc;
  cursor:pointer;
  transition:.3s;
}

.dot.ativa{
  background:#0071e3;
}
/* ===== VIEWER TELA CHEIA ===== */

.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.98);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999999;
}

.viewer-content{
  width:100%;
  height:100%;
  position:relative;
}

.viewer-slider{
  display:flex;
  height:100%;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
}

.viewer-slider::-webkit-scrollbar{
  display:none;
}

.viewer-slide{
  min-width:100%;
  scroll-snap-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
}

.viewer-slide img{
  max-width:95%;
  max-height:90%;
  object-fit:contain;
}

.viewer-dots{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:8px;
}

.viewer-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#666;
}

.viewer-dot.ativa{
  background:#fff;
}
/* ===== MODAL IMAGEM FULLSCREEN ===== */



@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes zoomIn{
  from{transform:scale(.8);}
  to{transform:scale(1);}
}
</style>
</head>


<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>

<div class="categorias" id="listaCategorias"></div>

<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>
<div id="viewer" class="viewer">
  <div class="viewer-content">
    <div class="viewer-slider"></div>
    <div class="viewer-dots"></div>
  </div>
</div>
<div id="modalCarrinho">
  <div class="modal">
    <button onclick="modalCarrinho.style.display='none'">X</button>
    <h2>Pedido</h2>
    <div id="itensCarrinho"></div>
    <h3>Total: R$ <span id="total">0.00</span></h3>
    <button id="btnFinalizar" class="btn-add">Finalizar</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let todosProdutos=[];

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

async function carregar(){

  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config){
    nomeLoja.innerText = config.nome_site || "";
    if(config.logo_url) logoLoja.src = config.logo_url;

    if(config.banner_url){
      bannerArea.innerHTML =
        `<img src="${config.banner_url}">`;
    } else if(config.banner_descricao){
      bannerArea.innerHTML =
        `<div class="banner-text">${config.banner_descricao}</div>`;
    }
  }

  const { data:cats } = await supabase
    .from("categorias")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  listaCategorias.innerHTML =
    `<button class="ativo" onclick="filtrar('todos',this)">Todos</button>` +
    cats.map(c =>
      `<button onclick="filtrar('${c.nome}',this)">${c.nome}</button>`
    ).join("");

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos = prods || [];
  renderizar(todosProdutos);
}

window.filtrar = function(cat,btn){
  document.querySelectorAll(".categorias button")
    .forEach(b=>b.classList.remove("ativo"));
  btn.classList.add("ativo");

  if(cat==="todos"){
    renderizar(todosProdutos);
  } else {
    renderizar(
      todosProdutos.filter(p=>p.categoria===cat)
    );
  }
}

function renderizar(lista){
  listaProdutos.innerHTML="";

  lista.forEach(p=>{

    let imagens=[];
    try{
      imagens = JSON.parse(p.imagens || "[]");
    }catch{
      imagens=[];
    }

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <div class="galeria">
        <div class="slider">
          ${imagens.length ? imagens.map((img,i)=>`
            <div class="slide">
              <img src="${img}" class="img-produto">
            </div>
          `).join("") : `
            <div class="slide">
              <img src="https://via.placeholder.com/300x300?text=Sem+Imagem" class="img-produto">
            </div>
          `}
        </div>

        ${imagens.length > 1 ? `
        <div class="bolinhas">
          ${imagens.map((_,i)=>`
            <span class="dot ${i===0?'ativa':''}" data-index="${i}"></span>
          `).join("")}
        </div>
        ` : ``}
      </div>

      <h4>${p.nome}</h4>

      <div class="descricao-produto">
        ${p.descricao || ""}
      </div>

      <div class="preco">
        R$ ${Number(p.preco).toFixed(2)}
      </div>

      <button class="btn-add">Adicionar</button>
    `;

    card.onclick=()=>{
      document.querySelectorAll(".card")
        .forEach(c=>c.classList.remove("aberto"));

      card.classList.add("aberto");

      setTimeout(()=>{
        card.scrollIntoView({
          behavior:"smooth",
          block:"start"
        });
      },150);
    };

    // ===== SLIDER FUNCIONAMENTO =====
    const slider = card.querySelector(".slider");
    const dots = card.querySelectorAll(".dot");

    if(slider && dots.length){

      slider.addEventListener("scroll", ()=>{
        const index = Math.round(
          slider.scrollLeft / slider.clientWidth
        );

        dots.forEach(d=>d.classList.remove("ativa"));
        if(dots[index]) dots[index].classList.add("ativa");
      });
// ===== ABRIR IMAGEM FULLSCREEN =====


      dots.forEach(dot=>{
        dot.onclick=(e)=>{
          e.stopPropagation();
          const index = dot.dataset.index;

          slider.scrollTo({
            left: slider.clientWidth * index,
            behavior: "smooth"
          });
        };
      });
    }

    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      const existe=carrinho.find(i=>i.id===p.id);
      if(existe) existe.qtd++;
      else carrinho.push({...p,qtd:1});
      salvar();
    };
// ABRIR FULLSCREEN VIEWER
card.querySelectorAll(".img-produto").forEach((img,i)=>{
  img.onclick=(e)=>{
    e.stopPropagation();
    abrirViewer(imagens, i);
  };
});
    listaProdutos.appendChild(card);
  });
}

let viewer, viewerSlider, viewerDots;

window.addEventListener("DOMContentLoaded", ()=>{
  viewer = document.getElementById("viewer");
  viewerSlider = document.querySelector(".viewer-slider");
  viewerDots = document.querySelector(".viewer-dots");
});

function abrirViewer(imagens, indexInicial=0){

  viewerSlider.innerHTML="";
  viewerDots.innerHTML="";

  imagens.forEach((img,i)=>{

    const slide = document.createElement("div");
    slide.className="viewer-slide";
    slide.innerHTML=`<img src="${img}">`;
    viewerSlider.appendChild(slide);

    const dot = document.createElement("div");
    dot.className="viewer-dot" + (i===indexInicial?" ativa":"");
    viewerDots.appendChild(dot);

  });

  viewer.style.display="flex";

  setTimeout(()=>{
    viewerSlider.scrollLeft =
      viewerSlider.clientWidth * indexInicial;
  },50);

  viewerSlider.onscroll = ()=>{
    const index = Math.round(
      viewerSlider.scrollLeft / viewerSlider.clientWidth
    );

    document.querySelectorAll(".viewer-dot")
      .forEach(d=>d.classList.remove("ativa"));

    if(document.querySelectorAll(".viewer-dot")[index]){
      document.querySelectorAll(".viewer-dot")[index]
        .classList.add("ativa");
    }
  };
}

viewer.onclick=(e)=>{
  if(e.target===viewer){
    viewer.style.display="none";
  }
};

document.getElementById("modalImagem").onclick=(e)=>{
  if(e.target.id==="modalImagem"){
    e.currentTarget.style.display="none";
  }
};
carregar();
salvar();
</script>

</body>
</html>
