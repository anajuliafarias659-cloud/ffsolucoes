<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:140px;
}

/* 🔥 HEADER FIXO */
.topo{
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);

  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
  transition:0.3s;
}

/* 🔥 LOGO */
.logo-box img{
  height:100px;
  padding:8px;
  border-radius:25px;
  background:white;
  border:4px solid transparent;
  background-image:
    linear-gradient(white, white),
    linear-gradient(135deg, #00c6ff, #0072ff, #8e2de2);
  background-origin: border-box;
  background-clip: content-box, border-box;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.logo-box img:hover{
  transform:scale(1.05);
}

.logo-box div{
  color:white;
  font-size:26px;
  font-weight:bold;
  letter-spacing:1px;
}

/* BANNER */
.banner{
    background: linear-gradient(135deg, #000, #222);
    color:white;
    text-align:center;
    padding:60px 20px;
    background-size:cover;
    background-position:center;
}

.banner h1{
    font-size:32px;
    margin-bottom:10px;
}

.banner p{
    font-size:18px;
    opacity:0.9;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

.card button{
    padding:10px 20px;
    border:none;
    background:black;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* TEMAS */
.tema-natal{
  background:#400;
}

.tema-anonovo{
  background:#002244;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box" id="logoBox">
    <img id="logoLoja" src="" alt="Logo">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="banner" id="banner">
    <h1 id="tituloBanner"></h1>
    <p id="subtituloBanner"></p>
</section>

<section class="produtos" id="listaProdutos"></section>

<footer>
© 2026 Sistema Multi Negócio
</footer>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);
const APP_ID = params.get("app_id");

if(!APP_ID){
    document.body.innerHTML = "<h2 style='text-align:center'>Loja não encontrada</h2>";
}

function lojaAberta(config){
  if(!config?.horario_abertura || !config?.horario_fechamento) return true;

  const agora = new Date();
  const horaAtual = agora.getHours() * 60 + agora.getMinutes();

  const [ha, ma] = config.horario_abertura.split(":");
  const [hf, mf] = config.horario_fechamento.split(":");

  const inicio = parseInt(ha)*60 + parseInt(ma);
  const fim = parseInt(hf)*60 + parseInt(mf);

  return horaAtual >= inicio && horaAtual <= fim;
}

async function carregarLoja(){

    const { data: config } = await supabase
      .from("config_site")
      .select("*")
      .eq("app_id", APP_ID)
      .maybeSingle();

    /* 🔥 NOME DA LOJA (NÃO MOSTRA FFCEL MAIS) */
    const nomeElemento = document.getElementById("nomeLoja");
    const logoBox = document.getElementById("logoBox");

    if(config?.nome_site && config.nome_site.trim() !== ""){
      nomeElemento.innerText = config.nome_site;
    } else {
      nomeElemento.style.display = "none";
      logoBox.style.justifyContent = "center"; // centraliza logo
    }

    /* 🔥 LOGO */
    if(config?.logo_url){
      document.getElementById("logoLoja").src = config.logo_url;
    } else {
      document.getElementById("logoLoja").style.display="none";
    }

    /* 🔥 BANNER IMAGEM */
    if(config?.banner_url){
      const banner = document.getElementById("banner");
      banner.style.backgroundImage = `url(${config.banner_url})`;
    }

    /* 🔥 TÍTULO / SUBTÍTULO */
    const titulo = document.getElementById("tituloBanner");
    const subtitulo = document.getElementById("subtituloBanner");

    if(config?.titulo_banner?.trim()){
      titulo.innerText = config.titulo_banner;
    } else {
      titulo.style.display = "none";
    }

    if(config?.subtitulo_banner?.trim()){
      subtitulo.innerText = config.subtitulo_banner;
    } else {
      subtitulo.style.display = "none";
    }

    if(!config?.titulo_banner && !config?.subtitulo_banner){
      document.getElementById("banner").style.padding = "30px 20px";
    }

    /* 🔥 TEMAS */
    if(config?.tema_site === "natal"){
      document.body.classList.add("tema-natal");
    }
    if(config?.tema_site === "anonovo"){
      document.body.classList.add("tema-anonovo");
    }

}

carregarLoja();

</script>

</body>
</html>
