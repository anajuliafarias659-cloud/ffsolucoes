
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  transition:.3s;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
  transition:.3s;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
  display:none;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
  text-align:center;
  transition:.3s;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:200px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}

.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}

.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:270px;
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
}

@media(min-width:768px){
  .produtos{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(min-width:1024px){
  .produtos{
    grid-template-columns:repeat(4, 1fr);
  }
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:.3s;
}

.img-produto{
  width:130px;
  height:130px;
  object-fit:contain;
}

.mini-img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
}

.mini-img:hover{
  border-color:#0071e3;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

/* TEMAS */

.tema-natal{ background:#8b0000; }
.tema-natal .topo{ background:#006400; }
.tema-natal .banner{ background:#8b0000; }
.tema-natal .card{ border:2px solid #00ff88; }
.tema-natal .preco{ color:#00ff88; }
.tema-natal .btn-add,
.tema-natal #btnCarrinho,
.tema-natal .categorias button.ativo{
  background:#006400;
  color:#fff;
}

.tema-anonovo{ background:linear-gradient(135deg,#000,#1e3a8a); }
.tema-anonovo .topo{ background:#111827; }
.tema-anonovo .banner{ background:#000; }
.tema-anonovo .card{ border:2px solid #facc15; }
.tema-anonovo .preco{ color:#facc15; }
.tema-anonovo .btn-add,
.tema-anonovo #btnCarrinho,
.tema-anonovo .categorias button.ativo{
  background:#facc15;
  color:#000;
}

.tema-capivara{ background:#f4b400; }
.tema-capivara .topo{ background:#6b2e1a; }
.tema-capivara .banner{ background:#d19000; }
.tema-capivara .card{ border:2px solid #f4b400; }
.tema-capivara .preco{ color:#e5391b; }
.tema-capivara .btn-add{ background:#e5391b; }
.tema-capivara #btnCarrinho{ background:#6b2e1a; }
.tema-capivara .categorias button.ativo{
  background:#e5391b;
  color:#fff;
}

/* MODAIS */
.modal-produto{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.modal-conteudo{
  background:#fff;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:20px;
  padding:20px;
  position:relative;
}

.fechar-modal{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>
<div class="categorias" id="listaCategorias"></div>
<section class="produtos" id="listaProdutos"></section>
<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- MODAL PRODUTO -->
<div class="modal-produto" id="modalProduto">
  <div class="modal-conteudo">
    <span class="fechar-modal" onclick="fecharModal()">✖</span>
    <img id="modalImg" style="width:100%;max-height:300px;object-fit:contain;">
    <div id="modalDots"></div>
    <h2 id="modalNome"></h2>
    <div class="preco" id="modalPreco"></div>
    <p id="modalDescricao"></p>
    <button class="btn-add" id="modalAdd">Adicionar ao Carrinho</button>
  </div>
</div>

<!-- MODAL CARRINHO -->
<div class="modal-produto" id="modalCarrinho">
  <div class="modal-conteudo">
    <span class="fechar-modal" onclick="fecharCarrinho()">✖</span>

    <h2>Finalizar Pedido</h2>

    <!-- ITENS -->
    <div id="itensCarrinho" style="margin-bottom:15px;"></div>

    <hr style="margin:10px 0;">

    <h3>Dados do Cliente</h3>

    <input id="clienteNome" placeholder="Seu nome" required>
    <input id="clienteTelefone" placeholder="Telefone / WhatsApp" required>

    <hr style="margin:10px 0;">

    <h3>Endereço de Entrega</h3>

    <input id="clienteRua" placeholder="Rua">
    <input id="clienteNumero" placeholder="Número">
    <input id="clienteBairro" placeholder="Bairro">
    <input id="clienteCidade" placeholder="Cidade">
    <input id="clienteEstado" placeholder="Estado">
    <input id="clienteCep" placeholder="CEP">

    <input id="clienteLocalizacao" placeholder="Link da localização (Google Maps)">

    <button 
      type="button" 
      class="btn-add" 
      style="margin-top:8px;"
      onclick="pegarLocalizacao()">
      📍 Pegar minha localização
    </button>

    <hr style="margin:15px 0;">

    <button 
      class="btn-add" 
      style="font-size:16px; padding:12px;"
      onclick="finalizarPedido()">
      Confirmar Pedido
    </button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");
if (!APP_ID) alert("APP_ID não informado.");

const contadorCarrinho = document.getElementById("contadorCarrinho");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let todosProdutos = [];
let modoVenda = "whatsapp";
let numeroWhatsapp = "";
let chavePix = "";
let corSelecionada = null;
let produtoAtual = null;

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||0),0);
}
salvar();

/* ================= CARREGAR ================= */

async function carregar(){
  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if (config) {

  // ===== NOME =====
  nomeLoja.innerText = config.nome_site || "";

  // ===== LOGO =====
  if (config.logo_url) {
    logoLoja.src = config.logo_url;
    logoLoja.style.display = "block";
  } else {
    logoLoja.style.display = "none";
  }

  
 // ===== BANNER =====
const temImagem = config.banner_url && config.banner_url.trim() !== "";
const temTexto  = config.texto_banner && config.texto_banner.trim() !== "";

if (!temImagem && !temTexto) {
  bannerArea.innerHTML = "";
}
else {
  bannerArea.innerHTML = `
    ${temImagem ? `<img src="${config.banner_url}">` : ""}
    ${temTexto ? `
      <div style="
        position:absolute;
        width:100%;
        height:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:20px;
        font-weight:bold;
        padding:10px;
        text-shadow:0 2px 5px rgba(0,0,0,0.6);
      ">
        ${config.texto_banner}
      </div>
    ` : ""}
  `;
}

  // ===== TEMAS =====
  document.body.classList.remove(
    "tema-natal",
    "tema-anonovo",
    "tema-capivara"
  );

  if (config.tema_site) {
    document.body.classList.add("tema-" + config.tema_site);
  }

  // ===== MODO DE VENDA =====
  modoVenda = config.modo_venda || "whatsapp";

  // ===== WHATSAPP =====
  numeroWhatsapp = config.whatsapp_numero || "";

  // ===== PIX AUTOMÁTICO PELO CELULAR =====
  chavePix = ""; // limpa antes

  if (numeroWhatsapp) {
    let numeroLimpo = numeroWhatsapp.replace(/\D/g, "");

    // garante código do Brasil
    if (!numeroLimpo.startsWith("55")) {
      numeroLimpo = "55" + numeroLimpo;
    }

    chavePix = "+" + numeroLimpo;
  }

} // <-- FECHAMENTO CORRETO DO if(config)

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos=prods||[];
  criarCategorias();
  renderizar(todosProdutos);
}

/* ================= CATEGORIAS ================= */

function criarCategorias(){
  const categorias=["Todas",...new Set(todosProdutos.map(p=>p.categoria).filter(Boolean))];
  listaCategorias.innerHTML=categorias.map((cat,i)=>
    `<button class="${i===0?'ativo':''}" onclick="filtrarCategoria('${cat}')">${cat}</button>`
  ).join("");
}

window.filtrarCategoria=function(cat){
  document.querySelectorAll(".categorias button").forEach(b=>b.classList.remove("ativo"));
  [...document.querySelectorAll(".categorias button")]
    .find(b=>b.innerText===cat)?.classList.add("ativo");

  renderizar(cat==="Todas"?todosProdutos:todosProdutos.filter(p=>p.categoria===cat));
}

/* ================= PRODUTOS ================= */

function renderizar(lista){
  listaProdutos.innerHTML="";
  lista.forEach(p=>{
    let imgs=[];
    try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div style="display:flex;gap:8px;">
        <div style="display:flex;flex-direction:column;gap:5px;">
          ${imgs.slice(0,3).map(i=>`<img src="${i}" class="mini-img">`).join("")}
        </div>
        <div style="flex:1;text-align:center;">
          ${imgs[0]?`<img src="${imgs[0]}" class="img-produto">`:""}
        </div>
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      abrirModal(p,imgs);
    };

    card.onclick=()=>abrirModal(p,imgs);

    listaProdutos.appendChild(card);
  });
}

/* ================= MODAL PRODUTO ================= */

function abrirModal(produto,imgs){
  produtoAtual=produto;
  corSelecionada=null;

  modalProduto.style.display="flex";
  modalNome.innerText=produto.nome;
  modalPreco.innerText="R$ "+Number(produto.preco).toFixed(2);
  modalDescricao.innerHTML=produto.descricao||"";

  let index=0;
  modalImg.src=imgs[index]||"";

  modalDots.innerHTML=imgs.map((_,i)=>
    `<span style="height:10px;width:10px;margin:4px;background:${i===0?'#0071e3':'#ccc'};
    border-radius:50%;display:inline-block;cursor:pointer"
    onclick="trocarImg(${i})"></span>`
  ).join("");

  window.trocarImg=function(i){
    index=i;
    modalImg.src=imgs[i];
    document.querySelectorAll("#modalDots span")
      .forEach((d,di)=>d.style.background=di===i?'#0071e3':'#ccc');
  }

  /* ===== CORES ===== */
  let variacoes=[];
  try{ variacoes=JSON.parse(produto.variacoes||"[]"); }catch{}

  if(variacoes.length){
    modalDescricao.innerHTML+="<br><strong>Selecione a cor:</strong><br>";

    modalDescricao.innerHTML += `<div id="coresArea" style="margin-top:10px;"></div>`;

const coresArea = document.getElementById("coresArea");

variacoes.forEach(v=>{
  const btn = document.createElement("button");
  btn.innerText = `${v.cor} (${v.estoque})`;
  btn.style.margin = "5px";
  btn.style.padding = "6px 12px";
  btn.style.borderRadius = "6px";
  btn.style.border = "1px solid #ccc";
  btn.style.cursor = "pointer";

  if(v.estoque <= 0){
    btn.disabled = true;
    btn.style.opacity = "0.5";
  }

  btn.onclick = () => {
    corSelecionada = v.cor;
    document.querySelectorAll("#coresArea button")
      .forEach(b=>b.style.background="#fff");
    btn.style.background="#0071e3";
    btn.style.color="#fff";
  };

  coresArea.appendChild(btn);
});

  }

  modalAdd.onclick=adicionarCarrinho;
}

window.selecionarCor=function(cor){
  corSelecionada=cor;
}

/* ================= CARRINHO ================= */

function adicionarCarrinho(){
  if(!corSelecionada){
    alert("Selecione uma cor.");
    return;
  }

  const existente=carrinho.find(i=>i.id===produtoAtual.id && i.cor===corSelecionada);

  if(existente){
    existente.qtd++;
  }else{
    carrinho.push({...produtoAtual, qtd:1, cor:corSelecionada});
  }

  salvar();
  fecharModal();
}

window.fecharModal=()=>modalProduto.style.display="none";

btnCarrinho.onclick=()=>abrirCarrinho();

function abrirCarrinho(){
  if(!carrinho.length) return alert("Carrinho vazio");

  let total = 0;

  itensCarrinho.innerHTML = carrinho.map((i,index)=>{
    const subtotal = i.preco * i.qtd;
    total += subtotal;

    return `
      <div style="margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px;">
        <strong>${i.nome}</strong> (${i.cor})
        <br>
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px;">
          <button onclick="diminuirQtd(${index})">➖</button>
          <strong>${i.qtd}</strong>
          <button onclick="aumentarQtd(${index})">➕</button>
          <button onclick="removerItem(${index})" style="color:red;">❌</button>
        </div>
        <div style="margin-top:5px;">
          Subtotal: R$ ${subtotal.toFixed(2)}
        </div>
      </div>
    `;
  }).join("");

  itensCarrinho.innerHTML += `
    <hr>
    <h3>Total: R$ ${total.toFixed(2)}</h3>
  `;

  modalCarrinho.style.display="flex";
}
window.aumentarQtd = function(index){
  carrinho[index].qtd++;
  salvar();
  abrirCarrinho();
}

window.diminuirQtd = function(index){
  if(carrinho[index].qtd > 1){
    carrinho[index].qtd--;
  }else{
    carrinho.splice(index,1);
  }
  salvar();
  abrirCarrinho();
}

window.removerItem = function(index){
  carrinho.splice(index,1);
  salvar();
  abrirCarrinho();
}
window.fecharCarrinho=()=>modalCarrinho.style.display="none";

/* ================= GEOLOCALIZAÇÃO ================= */

window.pegarLocalizacao=function(){
  navigator.geolocation.getCurrentPosition(pos=>{
    clienteLocalizacao.value=
      `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
  });
}

/* ================= FINALIZAR ================= */

window.finalizarPedido = async function(){

  if(!carrinho.length) return;

  const nome = document.getElementById("clienteNome").value.trim();
  const telefone = document.getElementById("clienteTelefone").value.trim();

  if(!nome || !telefone){
    alert("Preencha nome e telefone.");
    return;
  }

  let total = 0;

  for(const item of carrinho){

    const { data:produtoBanco } = await supabase
      .from("produtos")
      .select("variacoes")
      .eq("id",item.id)
      .single();

    let variacoes = [];
    try{ variacoes = JSON.parse(produtoBanco.variacoes || "[]"); }catch{}

    const index = variacoes.findIndex(v=>v.cor===item.cor);

    if(index === -1 || variacoes[index].estoque < item.qtd){
      alert(`Estoque insuficiente para ${item.nome} (${item.cor})`);
      return;
    }

    variacoes[index].estoque -= item.qtd;

    await supabase.from("produtos")
      .update({ variacoes: JSON.stringify(variacoes) })
      .eq("id", item.id);

    total += item.preco * item.qtd;
  }

  const { data, error } = await supabase
  .from("pedidos")
  .insert([{
    app_id: APP_ID,
    cliente_nome: nome,
    cliente_telefone: telefone,
    cliente_rua: document.getElementById("clienteRua").value,
    cliente_numero: document.getElementById("clienteNumero").value,
    cliente_bairro: document.getElementById("clienteBairro").value,
    cliente_cidade: document.getElementById("clienteCidade").value,
    cliente_estado: document.getElementById("clienteEstado").value,
    cliente_cep: document.getElementById("clienteCep").value,
    cliente_localizacao: document.getElementById("clienteLocalizacao").value,
    itens: carrinho,
    total: total,
    status: "novo"
  }]);

if(error){
  console.error("ERRO AO SALVAR PEDIDO:", error);
  alert("Erro ao salvar pedido. Veja o console.");
  return;
}

  if(modoVenda==="whatsapp" && numeroWhatsapp){

  let texto = `🛒 *NOVO PEDIDO*\n\n`;
  texto += `👤 ${nome}\n`;
  texto += `📞 ${telefone}\n\n`;

  carrinho.forEach(i=>{
    texto += `• ${i.nome} (${i.cor}) x${i.qtd}\n`;
  });

  texto += `\n💰 Total: R$ ${total.toFixed(2)}`;

  if(chavePix){
    texto += `\n\n💳 *PAGAMENTO VIA PIX*`;
    texto += `\nChave: ${chavePix}`;
  }

  window.open(
    `https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(texto)}`,
    "_blank"
  );
}

   carrinho = [];
  salvar();
  fecharCarrinho();
  carregar();

  if(modoVenda !== "whatsapp"){
    alert("✅ Pedido enviado com sucesso!\n\nEm breve entraremos em contato para finalizar a compra.");
  }

} // ← FECHA A FUNÇÃO finalizarPedido

carregar();
</script>

</body>
</html>
