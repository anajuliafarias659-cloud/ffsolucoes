<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:200px;
  transition:.3s;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner-text{
  padding:10px;
  text-align:center;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:200px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}

.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}

.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:260px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:.3s;
}

.card.aberto{
  grid-column:1/-1;
  padding:20px;
  transform:scale(1.02);
}

.img-produto{
  width:120px;
  height:120px;
  object-fit:contain;
  transition:.3s;
}

.card.aberto .img-produto{
  width:220px;
  height:220px;
}

.descricao-produto{
  display:none;
  font-size:14px;
  margin:10px 0;
}

.card.aberto .descricao-produto{
  display:block;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

/* ===================== */
/* 🎄 NATAL */
/* ===================== */
.tema-natal{
  background:#8b0000;
}
.tema-natal .topo{
  background:#006400;
}
.tema-natal .btn-add,
.tema-natal #btnCarrinho,
.tema-natal .categorias button.ativo{
  background:#006400;
}
.tema-natal .preco{
  color:#00ff88;
}

/* ===================== */
/* 🎆 ANO NOVO */
/* ===================== */
.tema-anonovo{
  background:linear-gradient(135deg,#000,#1e3a8a);
}
.tema-anonovo .topo{
  background:#111827;
}
.tema-anonovo .btn-add,
.tema-anonovo #btnCarrinho,
.tema-anonovo .categorias button.ativo{
  background:#facc15;
  color:#000;
}
.tema-anonovo .preco{
  color:#facc15;
}

/* ===================== */
/* 🐹 CAPIVARA AJUSTADO */
/* ===================== */
.tema-capivara{
  background:#f4b400;
}
.tema-capivara .topo{
  background:#6b2e1a;
}
.tema-capivara #nomeLoja{
  background:linear-gradient(90deg,#ff3b1f 60%,#f4b400 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.tema-capivara .banner{
  background:#6b2e1a;
  color:#f4b400;
}
.tema-capivara .categorias{
  background:#fff;
}
.tema-capivara .categorias button{
  background:#ffe08a;
  color:#6b2e1a;
}
.tema-capivara .categorias button.ativo{
  background:#e5391b;
  color:#fff;
}
.tema-capivara .card{
  background:#fff;
  border:2px solid #f4b400;
}
.tema-capivara .preco{
  color:#e5391b;
}
.tema-capivara .btn-add{
  background:#e5391b;
}
.tema-capivara #btnCarrinho{
  background:#6b2e1a;
  color:#fff;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>
<div class="categorias" id="listaCategorias"></div>
<section class="produtos" id="listaProdutos"></section>
<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let todosProdutos=[];

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

async function carregar(){

  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config){

    nomeLoja.innerText = config.nome_site || "";
    if(config.logo_url) logoLoja.src = config.logo_url;

    if(config.banner_url){
      bannerArea.innerHTML =
        `<img src="${config.banner_url}">`;
    } else if(config.banner_descricao){
      bannerArea.innerHTML =
        `<div class="banner-text">${config.banner_descricao}</div>`;
    }

    if(config.tema_site){
      document.body.classList.remove(
        "tema-natal",
        "tema-anonovo",
        "tema-capivara"
      );
      document.body.classList.add("tema-" + config.tema_site);
    }
  }

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos = prods || [];
  renderizar(todosProdutos);
}

function renderizar(lista){
  listaProdutos.innerHTML="";
  lista.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <h4>${p.nome}</h4>
      <div class="preco">
        R$ ${Number(p.preco).toFixed(2)}
      </div>
      <button class="btn-add">Adicionar</button>
    `;
    listaProdutos.appendChild(card);
  });
}

carregar();
salvar();
</script>

</body>
</html>
