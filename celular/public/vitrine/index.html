<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:200px;
  transition:.3s;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
  display:none;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
  text-align:center;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:200px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}

.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}

.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:260px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:.3s;
}

.img-produto{
  width:120px;
  height:120px;
  object-fit:contain;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

/* ===== MODAL PRODUTO ===== */
.modal-produto{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.modal-conteudo{
  background:#fff;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:20px;
  padding:20px;
  position:relative;
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{ transform:scale(.9); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

.modal-conteudo img{
  width:100%;
  max-height:300px;
  object-fit:contain;
  margin-bottom:15px;
}

.fechar-modal{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>
<div class="categorias" id="listaCategorias"></div>
<section class="produtos" id="listaProdutos"></section>
<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- MODAL -->
<div class="modal-produto" id="modalProduto">
  <div class="modal-conteudo">
    <span class="fechar-modal" onclick="fecharModal()">✖</span>
    <img id="modalImg">
    <h2 id="modalNome"></h2>
    <div class="preco" id="modalPreco"></div>
    <p id="modalDescricao"></p>
    <button class="btn-add" id="modalAdd">Adicionar ao Carrinho</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let todosProdutos=[];

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

async function carregar(){

  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config){

    nomeLoja.innerText = config.nome_site || "";

    if(config.logo_url){
      logoLoja.src = config.logo_url;
      logoLoja.style.display="block";
    }

    if(config.banner_url){
      bannerArea.innerHTML =
        `<img src="${config.banner_url}">`;
    } else if(config.banner_descricao){
      bannerArea.innerHTML =
        `<div>${config.banner_descricao}</div>`;
    } else {
      bannerArea.innerHTML="";
    }
  }

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos = prods || [];
  renderizar(todosProdutos);
}

function renderizar(lista){
  listaProdutos.innerHTML="";

  lista.forEach(p=>{

    let imagens=[];
    try{
      imagens = JSON.parse(p.imagens || "[]");
    }catch{
      imagens=[];
    }

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div style="text-align:center">
        ${imagens[0] ? `<img src="${imagens[0]}" class="img-produto">` : ""}
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      carrinho.push({ ...p, qtd:1 });
      salvar();
    };

    card.onclick=()=>{
      abrirModal(p, imagens);
    };

    listaProdutos.appendChild(card);
  });
}

window.abrirModal = function(produto, imagens){
  modalProduto.style.display="flex";
  modalImg.src = imagens[0] || "";
  modalNome.innerText = produto.nome;
  modalPreco.innerText = "R$ " + Number(produto.preco).toFixed(2);
  modalDescricao.innerText = produto.descricao || "Sem descrição disponível.";

  modalAdd.onclick=()=>{
    carrinho.push({ ...produto, qtd:1 });
    salvar();
    fecharModal();
  };
}

window.fecharModal = function(){
  modalProduto.style.display="none";
}

carregar();
salvar();
</script>

</body>
</html>
