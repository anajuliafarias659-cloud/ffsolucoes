<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  padding-top:120px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:6px;
  border-radius:12px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* PRODUTOS */
.produtos{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  cursor:pointer;
}

.galeria{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.miniaturas{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.miniaturas img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
}

.miniaturas img:hover{
  border-color:#0071e3;
}

.imagem-principal img{
  width:120px;
  height:120px;
  object-fit:contain;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:14px 18px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
}

#modalCarrinho,
#modalProduto{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.modal{
  background:#fff;
  width:95%;
  max-width:500px;
  border-radius:15px;
  padding:20px;
}

.modal-produto{
  background:#fff;
  width:95%;
  max-width:800px;
  border-radius:15px;
  padding:20px;
  position:relative;
}

.campo{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>
<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- CARRINHO -->
<div id="modalCarrinho">
  <div class="modal">
    <h2>Seu Pedido</h2>
    <div id="itensCarrinho"></div>
    <h3>Total: R$ <span id="total">0.00</span></h3>

    <input class="campo" id="nomeCliente" placeholder="Nome">
    <input class="campo" id="telefoneCliente" placeholder="Telefone">
    <input class="campo" id="enderecoCliente" placeholder="Endereço">
    <input class="campo" id="bairroCliente" placeholder="Bairro">

    <button id="btnFinalizar" class="btn-add">Finalizar Pedido</button>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div id="modalProduto">
  <div class="modal-produto">
    <button id="fecharProduto" style="position:absolute;right:15px;top:10px;">✕</button>
    <div id="conteudoProduto"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

/* ================= ELEMENTOS ================= */

const btnCarrinho = document.getElementById("btnCarrinho");
const modalCarrinho = document.getElementById("modalCarrinho");
const fecharCarrinho = document.getElementById("fecharCarrinho");
const itensCarrinho = document.getElementById("itensCarrinho");
const contadorCarrinho = document.getElementById("contadorCarrinho");
const subtotalEl = document.getElementById("subtotal");
const freteEl = document.getElementById("frete");
const totalEl = document.getElementById("total");
const btnFinalizar = document.getElementById("btnFinalizar");

const filtros = document.getElementById("filtros");
const listaProdutos = document.getElementById("listaProdutos");

const modalProduto = document.getElementById("modalProduto");
const conteudoProduto = document.getElementById("conteudoProduto");
const fecharProduto = document.getElementById("fecharProduto");

const btnPegarLocalizacao = document.getElementById("btnPegarLocalizacao");

/* ================= VARIÁVEIS ================= */

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let clienteLat=null;
let clienteLng=null;
let configGlobal=null;
let todosProdutos=[];

/* ================= SALVAR ================= */

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText=carrinho.length;
}

/* ================= CARRINHO ================= */

btnCarrinho.addEventListener("click", ()=>{
  modalCarrinho.style.display="flex";
  renderizarCarrinho();
});

fecharCarrinho.addEventListener("click", ()=>{
  modalCarrinho.style.display="none";
});

function renderizarCarrinho(){
  itensCarrinho.innerHTML="";
  let subtotal=0;

  carrinho.forEach((item,index)=>{
    subtotal+=Number(item.preco);

    const div=document.createElement("div");
    div.style.display="flex";
    div.style.justifyContent="space-between";
    div.style.alignItems="center";
    div.style.marginBottom="8px";

    div.innerHTML=`
      <div>
        <strong>${item.nome}</strong><br>
        R$ ${Number(item.preco).toFixed(2)}
      </div>
      <button style="background:#dc3545;color:white;border:none;border-radius:6px;padding:5px 8px;">❌</button>
    `;

    div.querySelector("button").addEventListener("click", ()=>{
      carrinho.splice(index,1);
      salvar();
      renderizarCarrinho();
    });

    itensCarrinho.appendChild(div);
  });

  subtotalEl.innerText=subtotal.toFixed(2);
  calcularFrete(subtotal);
}

/* ================= FRETE ================= */

function calcularFrete(subtotal){
  let frete=10;

  if(clienteLat && clienteLng){
    const R=6371;
    const latLoja=-9.015;
    const lngLoja=-42.700;

    const dLat=(clienteLat-latLoja)*Math.PI/180;
    const dLon=(clienteLng-lngLoja)*Math.PI/180;

    const a=
      Math.sin(dLat/2)**2+
      Math.cos(latLoja*Math.PI/180)*
      Math.cos(clienteLat*Math.PI/180)*
      Math.sin(dLon/2)**2;

    const distancia=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    frete=distancia*2;
  }

  freteEl.innerText=frete.toFixed(2);
  totalEl.innerText=(subtotal+frete).toFixed(2);
}

/* ================= FINALIZAR ================= */

btnFinalizar.addEventListener("click", async ()=>{

  if(carrinho.length===0){
    alert("Carrinho vazio!");
    return;
  }

  // 🔥 SEMPRE RECARREGA CONFIG ANTES DE FINALIZAR
  const { data: configAtual } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(!configAtual){
    alert("Configuração não encontrada.");
    return;
  }

  configGlobal = configAtual;

  const modo = (configGlobal.modo_venda || "").trim();

  console.log("Modo venda atual:", modo);

  const total=totalEl.innerText;

  const pedido={
    app_id:APP_ID,
    cliente_nome: nomeCliente.value || "",
    telefone: telefoneCliente.value || "",
    endereco: (enderecoCliente.value || "")+", "+(numeroCliente.value || ""),
    bairro: bairroCliente.value || "",
    cidade: cidadeCliente.value || "",
    observacao: obsCliente.value || "",
    latitude: clienteLat,
    longitude: clienteLng,
    localizacao_link: localizacaoCliente.value || "",
    total: total,
    status:"novo",
    itens:carrinho
  };

  try{

    if(modo==="sistema" || modo==="ambos"){
      const { error } = await supabase.from("pedidos").insert([pedido]);
      if(error){
        console.error(error);
        alert("Erro ao salvar pedido.");
        return;
      }
    }

    if(modo==="whatsapp" || modo==="ambos"){

  if(!configGlobal.whatsapp_numero){
    alert("Número do WhatsApp não configurado.");
    return;
  }

  const numero=configGlobal.whatsapp_numero;

  let msg = "🛒 *NOVO PEDIDO* \n\n";

  msg += `👤 *Cliente:* ${pedido.cliente_nome}\n`;
  msg += `📞 *Telefone:* ${pedido.telefone}\n\n`;

  msg += "📍 *Endereço:* \n";
  msg += `${pedido.endereco}\n`;
  msg += `${pedido.bairro}\n`;
  msg += `${pedido.cidade}\n\n`;

  msg += "📦 *ITENS:* \n";

  carrinho.forEach(item=>{
    msg += `• ${item.nome} - R$ ${Number(item.preco).toFixed(2)}\n`;
  });

  msg += `\n🚚 *Frete:* R$ ${freteEl.innerText}\n`;
  msg += `💰 *Total:* R$ ${pedido.total}\n\n`;

  if(pedido.localizacao_link){
    msg += `🔗 *Localização:* \n${pedido.localizacao_link}\n\n`;
  }

  msg += `📝 *Observação:* ${pedido.observacao || "-"}`;

  const mensagemFinal = encodeURIComponent(msg);

  window.open(`https://wa.me/${numero}?text=${mensagemFinal}`,"_blank");
}

/* ================= CARREGAR ================= */

async function carregar(){

  const {data:config}=await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  configGlobal=config;

  if(config?.logo_url)
    document.getElementById("logoLoja").src=config.logo_url;

  if(config?.nome_site)
    document.getElementById("nomeLoja").innerText=config.nome_site;

  const {data:produtos}=await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos=produtos||[];
  criarCategorias(todosProdutos);
  renderizarProdutos(todosProdutos);
}

/* ================= PRODUTOS E CATEGORIA ================= */

function criarCategorias(produtos){
  filtros.innerHTML="";
  const categorias=[...new Set(produtos.map(p=>p.categoria).filter(Boolean))];

  const btnTodos=document.createElement("button");
  btnTodos.innerText="Todos";
  btnTodos.className="filtro-btn ativo";
  btnTodos.onclick=()=>renderizarProdutos(produtos);
  filtros.appendChild(btnTodos);

  categorias.forEach(cat=>{
    const btn=document.createElement("button");
    btn.innerText=cat;
    btn.className="filtro-btn";
    btn.onclick=()=>renderizarProdutos(produtos.filter(p=>p.categoria===cat));
    filtros.appendChild(btn);
  });
}

function renderizarProdutos(lista){
  listaProdutos.innerHTML="";
  lista.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;
    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      carrinho.push(p);
      salvar();
    };
    listaProdutos.appendChild(card);
  });
}

carregar();
salvar();
</script>
</body>
</html>
