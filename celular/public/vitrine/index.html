<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding-top:130px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:70px;
  background:white;
  padding:8px;
  border-radius:15px;
}

#nomeLoja{
  color:white;
  font-size:20px;
  font-weight:bold;
}

/* CATEGORIAS */
#filtros{
  padding:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filtro-btn{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#ddd;
  cursor:pointer;
  font-size:14px;
}

.filtro-btn.ativo{
  background:#0071e3;
  color:white;
}

/* PRODUTOS */
.produtos{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  padding:20px;
}

@media(min-width:768px){
  .produtos{ grid-template-columns: repeat(3, 1fr); }
}

@media(min-width:1200px){
  .produtos{ grid-template-columns: repeat(4, 1fr); }
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  padding:15px;
  cursor:pointer;
}

.galeria{
  display:flex;
  gap:8px;
  justify-content:center;
}

.miniaturas{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.miniaturas img{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
}

.miniaturas img:hover{
  border-color:#0071e3;
}

.imagem-principal img{
  width:110px;
  height:110px;
  object-fit:contain;
}

.preco{
  font-size:18px;
  font-weight:bold;
  color:#0071e3;
  margin:8px 0;
}

.btn-add{
  width:100%;
  background:#0071e3;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:white;
  border:none;
  padding:15px 20px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
  z-index:9999;
}

#modalCarrinho,
#modalProduto{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:99999;
  justify-content:center;
  align-items:center;
}

.modal{
  background:white;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:15px;
  padding:20px;
}

.modal-produto{
  background:white;
  width:95%;
  max-width:900px;
  max-height:90vh;
  overflow:auto;
  border-radius:15px;
  padding:20px;
  position:relative;
}

.campo{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div id="filtros"></div>

<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- MODAL CARRINHO -->
<div id="modalCarrinho">
  <div class="modal">
    <h2>Seu Pedido</h2>
    <div id="itensCarrinho"></div>
    <hr>
    <h3>Subtotal: R$ <span id="subtotal">0.00</span></h3>
    <h3>Frete: R$ <span id="frete">0.00</span></h3>
    <h2>Total: R$ <span id="total">0.00</span></h2>

    <hr>
    <h3>Entrega</h3>
    <input class="campo" id="nomeCliente" placeholder="Nome">
    <input class="campo" id="telefoneCliente" placeholder="Telefone">
    <input class="campo" id="enderecoCliente" placeholder="Endereço">
    <input class="campo" id="numeroCliente" placeholder="Número">
    <input class="campo" id="bairroCliente" placeholder="Bairro">
    <input class="campo" id="cidadeCliente" placeholder="Cidade">
    <input class="campo" id="localizacaoCliente" placeholder="Link da localização" readonly>

    <button id="btnPegarLocalizacao"
    style="width:100%;padding:10px;background:#0071e3;color:white;border:none;border-radius:8px;margin-top:5px;">
    📍 Pegar Minha Localização
    </button>

    <textarea class="campo" id="obsCliente" placeholder="Observação"></textarea>

    <button id="btnFinalizar" style="width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:8px;">
    Finalizar Pedido
    </button>

    <br><br>
    <button id="fecharCarrinho" style="width:100%;padding:10px;background:#999;color:white;border:none;border-radius:8px;">
    Fechar
    </button>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div id="modalProduto">
  <div class="modal-produto">
    <button id="fecharProduto"
    style="position:absolute;top:10px;right:15px;background:#dc3545;color:white;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;">
    ✕
    </button>
    <div id="conteudoProduto"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let clienteLat=null;
let clienteLng=null;

/* SALVAR */
function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText=carrinho.length;
}

/* CARRINHO */
btnCarrinho.onclick=()=>{ modalCarrinho.style.display="flex"; renderizarCarrinho(); };
fecharCarrinho.onclick=()=> modalCarrinho.style.display="none";

function renderizarCarrinho(){
  itensCarrinho.innerHTML="";
  let subtotal=0;

  carrinho.forEach((item,index)=>{
    subtotal+=Number(item.preco);
    itensCarrinho.innerHTML+=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div><strong>${item.nome}</strong><br>R$ ${Number(item.preco).toFixed(2)}</div>
        <button onclick="removerItem(${index})"
        style="background:#dc3545;color:white;border:none;border-radius:6px;padding:5px 8px;">❌</button>
      </div>`;
  });

  subtotal=subtotal||0;
  subtotal?0:0;
  document.getElementById("subtotal").innerText=subtotal.toFixed(2);
  calcularFrete(subtotal);
}

window.removerItem=function(index){
  carrinho.splice(index,1);
  salvar();
  renderizarCarrinho();
}

/* LOCALIZAÇÃO */
btnPegarLocalizacao.onclick=()=>{
  navigator.geolocation.getCurrentPosition(pos=>{
    clienteLat=pos.coords.latitude;
    clienteLng=pos.coords.longitude;
    localizacaoCliente.value=`https://www.google.com/maps?q=${clienteLat},${clienteLng}`;
    calcularFrete(Number(subtotal.innerText||0));
  });
};

/* FRETE */
function calcularFrete(subtotal){
  let frete=10;
  if(clienteLat && clienteLng){
    const R=6371;
    const dLat=(clienteLat+9.015)*Math.PI/180;
    const dLon=(clienteLng+42.700)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.sin(dLon/2)**2;
    frete=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*2;
  }
  frete=frete||0;
  document.getElementById("frete").innerText=frete.toFixed(2);
  document.getElementById("total").innerText=(subtotal+frete).toFixed(2);
}

/* PRODUTOS + MODAL */
function abrirProduto(p){
  let imgs=[];
  try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

  let mini="";
  imgs.forEach(img=> mini+=`<img src="${img}" style="width:60px;height:60px;object-fit:cover;cursor:pointer;border-radius:6px;margin-bottom:5px;">`);

  conteudoProduto.innerHTML=`
    <div style="display:flex;gap:20px;flex-wrap:wrap;">
      <div style="display:flex;gap:10px;">
        <div style="display:flex;flex-direction:column;">${mini}</div>
        <div>${imgs[0]?`<img src="${imgs[0]}" class="imgPrincipalModal" style="width:300px;height:300px;object-fit:contain;">`:""}</div>
      </div>
      <div style="flex:1;min-width:250px;">
        <h2>${p.nome}</h2>
        <h3 style="color:#0071e3;">R$ ${Number(p.preco).toFixed(2)}</h3>
        <p>${p.descricao||"Sem descrição."}</p>
        <button onclick='addModal()'
        style="margin-top:15px;width:100%;padding:10px;background:#0071e3;color:white;border:none;border-radius:8px;">
        Adicionar ao Carrinho
        </button>
      </div>
    </div>`;

  window.addModal=function(){
    carrinho.push(p);
    salvar();
    alert("Adicionado!");
  }

  document.querySelectorAll("#conteudoProduto img").forEach(img=>{
    img.onclick=()=>{
      const principal=document.querySelector(".imgPrincipalModal");
      if(principal) principal.src=img.src;
    };
  });

  modalProduto.style.display="flex";
}

fecharProduto.onclick=()=> modalProduto.style.display="none";
modalProduto.onclick=e=>{ if(e.target===modalProduto) modalProduto.style.display="none"; };

/* CARREGAR */
async function carregar(){
  const {data:config}=await supabase.from("config_site").select("*").eq("app_id",APP_ID).maybeSingle();
  if(config?.logo_url) logoLoja.src=config.logo_url;
  if(config?.nome_site) nomeLoja.innerText=config.nome_site;

  const {data:produtos}=await supabase.from("produtos").select("*").eq("app_id",APP_ID).eq("ativo",true);
  const lista=produtos||[];

  criarCategorias(lista);
  renderizarProdutos(lista);
}

function criarCategorias(produtos){
  filtros.innerHTML="";
  const cats=[...new Set(produtos.map(p=>p.categoria).filter(Boolean))];

  const btn=document.createElement("button");
  btn.innerText="Todos";
  btn.className="filtro-btn ativo";
  btn.onclick=()=>{ renderizarProdutos(produtos); document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.remove("ativo")); btn.classList.add("ativo"); };
  filtros.appendChild(btn);

  cats.forEach(cat=>{
    const b=document.createElement("button");
    b.innerText=cat;
    b.className="filtro-btn";
    b.onclick=()=>{
      document.querySelectorAll(".filtro-btn").forEach(x=>x.classList.remove("ativo"));
      b.classList.add("ativo");
      renderizarProdutos(produtos.filter(p=>p.categoria===cat));
    };
    filtros.appendChild(b);
  });
}

function renderizarProdutos(lista){
  listaProdutos.innerHTML="";
  lista.forEach(p=>{
    let imgs=[];
    try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="galeria">
        <div class="miniaturas">${imgs.map(i=>`<img src="${i}">`).join("")}</div>
        <div class="imagem-principal">${imgs[0]?`<img src="${imgs[0]}">`:""}</div>
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>`;
    card.onclick=e=>{ if(!e.target.classList.contains("btn-add")) abrirProduto(p); };
    card.querySelector(".btn-add").onclick=e=>{ e.stopPropagation(); carrinho.push(p); salvar(); };
    listaProdutos.appendChild(card);
  });
}

carregar();
salvar();
</script>

</body>
</html>
