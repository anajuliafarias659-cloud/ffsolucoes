<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    overflow-x:hidden;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#111;
    color:white;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-area img{
    height:40px;
    max-width:120px;
    object-fit:contain;
    background:white;
    border-radius:6px;
    padding:4px;
}

.nome-loja{
    font-size:15px;
    font-weight:bold;
}

.cart-button{
    background:#00b853;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
}

/* ESPAÇO HEADER */
.space{
    height:70px;
}

/* PRODUTOS */
.produtos{
    padding:15px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}

.card{
    background:white;
    border-radius:12px;
    padding:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    cursor:pointer;
}

.card img{
    width:100%;
    height:140px;
    object-fit:contain;
}

.card h4{
    font-size:14px;
    margin:8px 0 4px;
}

.preco{
    color:#0071e3;
    font-weight:bold;
    font-size:14px;
}

/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:1998;
}

/* CARRINHO */
.carrinho{
    position:fixed;
    top:0;
    right:0;
    width:100%;
    max-width:420px;
    height:100dvh;
    background:white;
    padding:20px;
    overflow-y:auto;
    transform:translateX(100%);
    transition:0.3s;
    z-index:1999;
}

.carrinho.open{
    transform:translateX(0);
}

.item{
    border-bottom:1px solid #ddd;
    padding:8px 0;
    font-size:14px;
}

input{
    width:100%;
    padding:8px;
    margin-bottom:8px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn-frete{
    background:#0071e3;
    color:white;
}

.btn-finalizar{
    background:#00b853;
    color:white;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img id="logoLoja">
        <div id="nomeLoja" class="nome-loja"></div>
    </div>
    <div class="cart-button" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </div>
</div>

<div class="space"></div>

<div class="produtos" id="listaProdutos"></div>

<div id="overlay" onclick="toggleCart()"></div>

<div class="carrinho" id="cart">
    <h3>Seu Carrinho</h3>
    <div id="cartItems"></div>

    <h4>Entrega</h4>
    <input id="nome" placeholder="Nome completo">
    <input id="cep" placeholder="CEP">
    <input id="rua" placeholder="Rua">
    <input id="numero" placeholder="Número">
    <input id="bairro" placeholder="Bairro">
    <input id="cidade" placeholder="Cidade">
    <input id="estado" placeholder="Estado">
    <input id="complemento" placeholder="Complemento">

    <button class="btn-frete" onclick="calcularFrete()">Calcular Frete</button>
    <div id="freteBox"></div>
    <div id="totalBox"></div>

    <button class="btn-finalizar" onclick="finalizar()">Finalizar Pedido</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let produtos = [];
let carrinho = [];
let frete = 0;

const cart = document.getElementById("cart");
const overlay = document.getElementById("overlay");

window.toggleCart = function(){
    cart.classList.toggle("open");
    overlay.style.display = cart.classList.contains("open") ? "block" : "none";
}

function atualizarCarrinho(){
    cartItems.innerHTML="";
    let total=0;

    carrinho.forEach((item,i)=>{
        total+=item.preco*item.qtd;
        cartItems.innerHTML+=`
        <div class="item">
            ${item.nome}<br>
            R$ ${item.preco.toFixed(2)} x ${item.qtd}
            <button onclick="remover(${i})">❌</button>
        </div>`;
    });

    cartCount.innerText=carrinho.length;
    totalBox.innerHTML="<b>Total:</b> R$ "+(total+frete).toFixed(2);
}

window.remover=function(i){
    carrinho.splice(i,1);
    atualizarCarrinho();
}

window.adicionar=function(index){
    const p = produtos[index];
    const existe = carrinho.find(x=>x.id===p.id);
    if(existe){existe.qtd++}
    else{carrinho.push({...p,qtd:1})}
    atualizarCarrinho();
}

window.calcularFrete=function(){
    if(cep.value.length<8){alert("CEP inválido");return}
    frete=25;
    freteBox.innerHTML="Frete: R$ 25,00";
    atualizarCarrinho();
}

window.finalizar=async function(){
    if(!nome.value || carrinho.length==0){
        alert("Preencha os dados");
        return;
    }
    alert("Pedido registrado (modelo pronto)");
}

async function carregar(){
    const { data: config } = await supabase
    .from("config")
    .select("*")
    .eq("app_id", APP_ID)
    .single();

    if(config){
        if(config.logo_url){
            logoLoja.src=config.logo_url;
        }
        if(config.nome_loja){
            nomeLoja.innerText=config.nome_loja;
        }
    }

    const { data } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

    produtos=data||[];

    produtos.forEach((p,i)=>{
        let imagens=[];
        try{imagens=JSON.parse(p.imagens||"[]")}catch{}

        listaProdutos.innerHTML+=`
        <div class="card" onclick="adicionar(${i})">
            <img src="${imagens[0]||''}">
            <h4>${p.nome}</h4>
            <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
        </div>`;
    });
}

carregar();
</script>

</body>
</html>
