<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  transition:.3s;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
  transition:.3s;
}
.logo-box img{
  height:50px;
  width:auto;
  max-height:50px;
  object-fit:contain;
  background:#fff;
  padding:4px;
  border-radius:8px;
  display:none;
}
.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}
.logo-box > div{
  display:flex;
  flex-direction:column;
  justify-content:center;
}
#nomeLoja{
  color:#fff;
  font-weight:bold;
  font-size:20px;
  line-height:1.2;
}

/* BANNER */
.banner{
  position:fixed;
  top:110px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
  text-align:center;
  transition:.3s;
}
.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:220px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}
.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}
.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:290px;
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
}
@media(min-width:768px){
  .produtos{
    grid-template-columns:repeat(3, 1fr);
  }
}
@media(min-width:1024px){
  .produtos{
    grid-template-columns:repeat(4, 1fr);
  }
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:.3s;
}
.img-produto{
  width:130px;
  height:130px;
  object-fit:contain;
}
.mini-img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
}
.mini-img:hover{
  border-color:#0071e3;
}
.preco{
  font-weight:bold;
  color:#0071e3;
}
.btn-add{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

/* TEMAS */
.tema-natal{ background:#8b0000; }
.tema-natal .topo{ background:#006400; }
.tema-natal .banner{ background:#8b0000; }
.tema-natal .card{ border:2px solid #00ff88; }
.tema-natal .preco{ color:#00ff88; }
.tema-natal .btn-add,
.tema-natal #btnCarrinho,
.tema-natal .categorias button.ativo{
  background:#006400;
  color:#fff;
}

.tema-anonovo{ background:linear-gradient(135deg,#000,#1e3a8a); }
.tema-anonovo .topo{ background:#111827; }
.tema-anonovo .banner{ background:#000; }
.tema-anonovo .card{ border:2px solid #facc15; }
.tema-anonovo .preco{ color:#facc15; }
.tema-anonovo .btn-add,
.tema-anonovo #btnCarrinho,
.tema-anonovo .categorias button.ativo{
  background:#facc15;
  color:#000;
}

.tema-capivara{ background:#f4b400; }
.tema-capivara .topo{ background:#6b2e1a; }
.tema-capivara .banner{ background:#d19000; }
.tema-capivara .card{ border:2px solid #f4b400; }
.tema-capivara .preco{ color:#e5391b; }
.tema-capivara .btn-add{ background:#e5391b; }
.tema-capivara #btnCarrinho{ background:#6b2e1a; }
.tema-capivara .categorias button.ativo{
  background:#e5391b;
  color:#fff;
}

/* MODAIS */
.modal-produto{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}
.modal-conteudo{
  background:#fff;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:20px;
  padding:20px;
  position:relative;
}
.fechar-modal{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* SUGESTÕES */
.sugestoes-carrinho{
  margin-top:15px;
}
.sugestoes-carrinho h3{
  margin:0 0 10px 0;
  font-size:16px;
}
.lista-sugestoes{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
@media(min-width:768px){
  .lista-sugestoes{
    grid-template-columns:repeat(3,1fr);
  }
}
.sugestao-item{
  background:#f8f8f8;
  border:1px solid #e5e5e5;
  border-radius:12px;
  padding:10px;
  text-align:center;
}
.sugestao-item img{
  width:100%;
  height:90px;
  object-fit:contain;
  margin-bottom:8px;
}
.sugestao-item .nome{
  font-size:13px;
  font-weight:bold;
  min-height:32px;
}
.sugestao-item .preco{
  font-size:14px;
  margin:6px 0;
}
.sugestao-item button{
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div>
      <div id="nomeLoja"></div>
      <div id="infoLoja" style="font-size:13px;color:#ddd;margin-top:4px;"></div>
    </div>

</header>

<div class="banner" id="bannerArea"></div>
<div class="categorias" id="listaCategorias"></div>
<section class="produtos" id="listaProdutos"></section>
<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- MODAL PRODUTO -->
<div class="modal-produto" id="modalProduto">

    <span class="fechar-modal" onclick="fecharModal()">✖</span>

<!-- MODAL CARRINHO -->

    <h3>Pagamento</h3>

<div style="display:flex; gap:10px; margin-top:10px;">
  <button type="button" class="btn-add" style="flex:1; background:#16a34a;" onclick="selecionarPagamento('pix_mp')">
    PIX
  </button>

  <button type="button" class="btn-add" style="flex:1;" onclick="selecionarPagamento('mercadopago')">

  </button>
</div>

<div id="areaPixMP" style="display:none; margin-top:12px; padding:12px; border:1px solid #ddd; border-radius:10px;">
  <div style="font-weight:bold; margin-bottom:6px;">Pagamento via PIX</div>
  <div id="pixQrCodeArea" style="text-align:center; margin-top:10px;"></div>
  <textarea id="pixCopiaCola" readonly style="width:100%; min-height:90px; margin-top:10px; padding:10px; border-radius:8px; border:1px solid #ccc;"></textarea>
  <button type="button" class="btn-add" style="margin-top:10px; background:#16a34a;" onclick="copiarPixCopiaCola()">
    📋 Copiar código PIX
  </button>
</div>

<button id="btnGerarPixMP" class="btn-add" style="display:none; font-size:16px; padding:12px; margin-top:12px; background:#16a34a;"
  onclick="finalizarPedido('pix_mp')">
  ✅ Gerar PIX
</button>

    <button id="btnConfirmarMP" class="btn-add" style="display:none; font-size:16px; padding:12px; margin-top:12px;"
      onclick="finalizarPedido('mercadopago')">
      ✅ Confirmar e pagar no Mercado Pago
    </button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");
const URL_PAGAMENTO = `${SUPABASE_URL}/functions/v1/criar-pagamento-loja`;
const URL_PAGAMENTO_PIX = `${SUPABASE_URL}/functions/v1/criar-pix-loja`;

if (!APP_ID) alert("APP_ID não informado.");

const contadorCarrinho = document.getElementById("contadorCarrinho");
const CARRINHO_KEY = `carrinho_${APP_ID}`;

let carrinho = JSON.parse(localStorage.getItem(CARRINHO_KEY)) || [];
let todosProdutos = [];
let modoVenda = "whatsapp";
let numeroWhatsapp = "";
let corSelecionada = null;
let produtoAtual = null;
let valorFrete = 0;
let subtotalCarrinhoAtual = 0;
let totalCarrinhoAtual = 0;

function formatarReal(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function salvarCarrinhoLocal(){
  localStorage.setItem(CARRINHO_KEY, JSON.stringify(carrinho));
  contadorCarrinho.innerText = carrinho.reduce((acc, i) => acc + (i.qtd || 0), 0);
}

salvarCarrinhoLocal();

/* ================= CARREGAR ================= */

async function carregar(){
  const { data: config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", APP_ID)
    .maybeSingle();

  if (config) {
    nomeLoja.innerText = config.nome_site || "";

    const rua = config.loja_rua || "";
    const numero = config.loja_numero || "";
    const cidade = config.loja_cidade || "";
    const estado = config.loja_estado || "";
    const telefoneLoja = config.telefone || "";

    let endereco = "";

    if (rua || cidade) {
      endereco = `${rua}${numero ? ", " + numero : ""}`;
      if (cidade) endereco += ` - ${cidade}`;
      if (estado) endereco += `/${estado}`;
    }

    let infoFinal = "";

    if (endereco && telefoneLoja) {
      infoFinal = `${endereco} • 📞 ${telefoneLoja}`;
    } else if (endereco) {
      infoFinal = endereco;
    } else if (telefoneLoja) {
      infoFinal = `📞 ${telefoneLoja}`;
    }

    document.getElementById("infoLoja").innerText = infoFinal;

    if (config.logo_url) {
      logoLoja.src = config.logo_url;
      logoLoja.style.display = "block";
    } else {
      logoLoja.style.display = "none";
    }

    const temImagem = config.banner_url && config.banner_url.trim() !== "";
    const temTexto = config.banner_descricao && config.banner_descricao.trim() !== "";

    if (!temImagem && !temTexto) {
      bannerArea.innerHTML = "";
    } else {
      bannerArea.innerHTML = `
        ${temImagem ? `<img src="${config.banner_url}">` : ""}
        ${temTexto ? `
          <div style="
            position:absolute;
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
            font-weight:bold;
            padding:10px;
            text-shadow:0 2px 5px rgba(0,0,0,0.6);
          ">
            ${config.banner_descricao}
          </div>
        ` : ""}
      `;
    }

    document.body.classList.remove("tema-natal", "tema-anonovo", "tema-capivara");

    if (config.tema_site) {
      document.body.classList.add("tema-" + config.tema_site);
    }

    modoVenda = config.modo_venda || "whatsapp";
    numeroWhatsapp = config.whatsapp_numero || "";
  }

  const { data: prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true);

  todosProdutos = prods || [];
  criarCategorias();
  renderizar(todosProdutos);
}

async function criarPagamentoPixMP(pedidoId, total, cliente){
  const payload = {
    appId: APP_ID,
    pedidoId,
    transaction_amount: Number(total),
    description: `Pedido ${pedidoId}`,
    payer: {
      first_name: cliente.nome || "Cliente",
      email: cliente.email || `cliente_${pedidoId}@seudominio.com`,
      identification: {
        type: "CPF",
        number: "19119119100"
      }
    }
  };

  const res = await fetch(URL_PAGAMENTO_PIX, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY
    },
    body: JSON.stringify(payload)
  });

  const json = await res.json().catch(() => ({}));

  if (!res.ok) {
    throw new Error(json?.erro || "Erro ao gerar PIX");
  }

  return json;
}

/* ================= CATEGORIAS ================= */

function criarCategorias(){
  const categorias = ["Todas", ...new Set(todosProdutos.map(p => p.categoria).filter(Boolean))];
  listaCategorias.innerHTML = categorias.map((cat, i) =>
    `<button class="${i===0 ? 'ativo' : ''}" onclick="filtrarCategoria('${cat}')">${cat}</button>`
  ).join("");
}

window.filtrarCategoria = function(cat){
  document.querySelectorAll(".categorias button").forEach(b => b.classList.remove("ativo"));
  [...document.querySelectorAll(".categorias button")]
    .find(b => b.innerText === cat)?.classList.add("ativo");

  renderizar(cat === "Todas" ? todosProdutos : todosProdutos.filter(p => p.categoria === cat));
};

/* ================= PRODUTOS ================= */

function renderizar(lista){
  listaProdutos.innerHTML = "";

  lista.forEach(p => {
    let imgs = [];
    try { imgs = JSON.parse(p.imagens || "[]"); } catch {}

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div style="display:flex;gap:8px;">
        <div style="display:flex;flex-direction:column;gap:5px;">
          ${imgs.slice(0,3).map(i => `<img src="${i}" class="mini-img">`).join("")}
        </div>
        <div style="flex:1;text-align:center;">
          ${imgs[0] ? `<img src="${imgs[0]}" class="img-produto">` : ""}
        </div>
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">${formatarReal(p.preco)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    card.querySelector(".btn-add").onclick = (e) => {
      e.stopPropagation();
      abrirModal(p, imgs);
    };

    card.onclick = () => abrirModal(p, imgs);

    listaProdutos.appendChild(card);
  });
}

function obterImagemProduto(produto){
  let imgs = [];
  try {
    imgs = JSON.parse(produto.imagens || "[]");
  } catch {}
  return imgs[0] || "";
}

function obterIdsComplementares(produto){
  try {
    const ids = JSON.parse(produto.produtos_complementares || "[]");
    return Array.isArray(ids) ? ids : [];
  } catch {
    return [];
  }
}

function adicionarSugestaoDireto(produto){
  let variacoes = [];
  try { variacoes = JSON.parse(produto.variacoes || "[]"); } catch {}

  let corFinal = "Sem cor";

  if (variacoes.length > 0) {
    const corDisponivel = variacoes.find(v => Number(v.estoque) > 0);

    if (!corDisponivel) {
      alert("Esse produto complementar está sem estoque.");
      return;
    }

    corFinal = corDisponivel.cor || "Sem cor";
  }

  const existente = carrinho.find(i =>
    String(i.id) === String(produto.id) && i.cor === corFinal
  );

  if (existente) {
    existente.qtd++;
  } else {
    carrinho.push({ ...produto, qtd: 1, cor: corFinal });
  }

  salvarCarrinhoLocal();
  abrirCarrinho();
}

window.adicionarSugestaoDiretoPorId = function(id){
  const produto = todosProdutos.find(p => String(p.id) === String(id));
  if (!produto) return;
  adicionarSugestaoDireto(produto);
};

function renderizarSugestoesCarrinho(){
  const area = document.getElementById("sugestoesCarrinhoArea");
  if (!area) return;

  if (!carrinho.length) {
    area.innerHTML = "";
    return;
  }

  const idsNoCarrinho = carrinho.map(i => String(i.id));
  let sugestoes = [];

  carrinho.forEach(item => {
    const idsComplementares = obterIdsComplementares(item);

    idsComplementares.forEach(idComp => {
      const prod = todosProdutos.find(p => String(p.id) === String(idComp));

      if (
        prod &&
        !idsNoCarrinho.includes(String(prod.id)) &&
        !sugestoes.some(s => String(s.id) === String(prod.id))
      ) {
        sugestoes.push(prod);
      }
    });
  });

  sugestoes = sugestoes.slice(0, 6);

  if (!sugestoes.length) {
    area.innerHTML = "";
    return;
  }

  area.innerHTML = `
    <div class="sugestoes-carrinho">
      <h3>🔥 Leve também</h3>
      <div class="lista-sugestoes">
        ${sugestoes.map(p => `
          <div class="sugestao-item">
            ${obterImagemProduto(p) ? `<img src="${obterImagemProduto(p)}" alt="${p.nome}">` : ""}
            <div class="nome">${p.nome}</div>
            <div class="preco">${formatarReal(p.preco)}</div>
            <button onclick="adicionarSugestaoDiretoPorId('${p.id}')">Adicionar</button>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

/* ================= FRETE ================= */

function normalizarEstado(ufOuNome){
  const valor = String(ufOuNome || "").trim().toUpperCase();

  const mapa = {
    "AC":"AC","ACRE":"AC",
    "AL":"AL","ALAGOAS":"AL",
    "AP":"AP","AMAPA":"AP","AMAPÁ":"AP",
    "AM":"AM","AMAZONAS":"AM",
    "BA":"BA","BAHIA":"BA",
    "CE":"CE","CEARA":"CE","CEARÁ":"CE",
    "DF":"DF","DISTRITO FEDERAL":"DF",
    "ES":"ES","ESPIRITO SANTO":"ES","ESPÍRITO SANTO":"ES",
    "GO":"GO","GOIAS":"GO","GOIÁS":"GO",
    "MA":"MA","MARANHAO":"MA","MARANHÃO":"MA",
    "MT":"MT","MATO GROSSO":"MT",
    "MS":"MS","MATO GROSSO DO SUL":"MS",
    "MG":"MG","MINAS GERAIS":"MG",
    "PA":"PA","PARA":"PA","PARÁ":"PA",
    "PB":"PB","PARAIBA":"PB","PARAÍBA":"PB",
    "PR":"PR","PARANA":"PR","PARANÁ":"PR",
    "PE":"PE","PERNAMBUCO":"PE",
    "PI":"PI","PIAUI":"PI","PIAUÍ":"PI",
    "RJ":"RJ","RIO DE JANEIRO":"RJ",
    "RN":"RN","RIO GRANDE DO NORTE":"RN",
    "RS":"RS","RIO GRANDE DO SUL":"RS",
    "RO":"RO","RONDONIA":"RO","RONDÔNIA":"RO",
    "RR":"RR","RORAIMA":"RR",
    "SC":"SC","SANTA CATARINA":"SC",
    "SP":"SP","SAO PAULO":"SP","SÃO PAULO":"SP",
    "SE":"SE","SERGIPE":"SE",
    "TO":"TO","TOCANTINS":"TO"
  };

  return mapa[valor] || "";
}

function obterRegiaoPorUF(uf){
  const norte = ["AC","AP","AM","PA","RO","RR","TO"];
  const nordeste = ["AL","BA","CE","MA","PB","PE","PI","RN","SE"];
  const centroOeste = ["DF","GO","MT","MS"];
  const sudeste = ["ES","MG","RJ","SP"];
  const sul = ["PR","RS","SC"];

  if (norte.includes(uf)) return "norte";
  if (nordeste.includes(uf)) return "nordeste";
  if (centroOeste.includes(uf)) return "centro-oeste";
  if (sudeste.includes(uf)) return "sudeste";
  if (sul.includes(uf)) return "sul";
  return "";
}

function calcularPesoCarrinho(){
  let pesoTotal = 0;

  carrinho.forEach(item => {
    const pesoItem = Number(item.peso || 0);
    const qtdItem = Number(item.qtd || 1);
    pesoTotal += pesoItem * qtdItem;
  });

  return pesoTotal;
}

function obterTabelaFrete(){
  return {
    "sudeste": [
      { ate: 0.5, valor: 18 },
      { ate: 1, valor: 22 },
      { ate: 2, valor: 28 },
      { ate: 5, valor: 40 },

    ],
    "sul": [
      { ate: 0.5, valor: 20 },
      { ate: 1, valor: 24 },
      { ate: 2, valor: 30 },
      { ate: 5, valor: 45 },
      { ate: 10, valor: 70 }
    ],
    "centro-oeste": [
      { ate: 0.5, valor: 22 },
      { ate: 1, valor: 28 },
      { ate: 2, valor: 36 },
      { ate: 5, valor: 52 },
      { ate: 10, valor: 80 }
    ],
    "nordeste": [
      { ate: 0.5, valor: 25 },

    ],

      { ate: 1, valor: 36 },
      { ate: 2, valor: 48 },
      { ate: 5, valor: 70 },
      { ate: 10, valor: 110 }
    ]
  };
}

function calcularValorFretePorPesoERegiao(uf, pesoTotal){
  const regiao = obterRegiaoPorUF(uf);
  const tabela = obterTabelaFrete();

  if (!regiao || !tabela[regiao]) {
    return { erro: "Estado inválido para cálculo de frete." };
  }

  const faixas = tabela[regiao];
  const faixa = faixas.find(f => pesoTotal <= f.ate);

  if (!faixa) {
    return { erro: "Peso acima do limite de entrega automática." };
  }

  return {
    uf,
    regiao,
    pesoTotal,
    valor: faixa.valor
  };
}

window.calcularFrete = function(){
  const estadoInformado = document.getElementById("clienteEstado").value;
  const uf = normalizarEstado(estadoInformado);
  const pesoTotal = calcularPesoCarrinho();
  const area = document.getElementById("freteResultado");

  if (!uf) {
    valorFrete = 0;
    area.innerHTML = "Informe um estado válido para calcular o frete.";
    atualizarResumoCarrinho();
    return;
  }

  if (pesoTotal <= 0) {
    valorFrete = 0;
    area.innerHTML = "Os produtos ainda não têm peso cadastrado.";
    atualizarResumoCarrinho();
    return;
  }

  const resultado = calcularValorFretePorPesoERegiao(uf, pesoTotal);

  if (resultado.erro) {
    valorFrete = 0;
    area.innerHTML = resultado.erro;
    atualizarResumoCarrinho();
    return;
  }

  valorFrete = Number(resultado.valor || 0);

  area.innerHTML = `
    <div>Estado: <strong>${resultado.uf}</strong></div>
    <div>Região: <strong>${resultado.regiao}</strong></div>
    <div>Peso total: <strong>${resultado.pesoTotal.toFixed(2)} kg</strong></div>
    <div>Frete: <strong>${formatarReal(valorFrete)}</strong></div>
  `;

  atualizarResumoCarrinho();
};

function calcularFreteSePossivel(){
  const estadoInformado = document.getElementById("clienteEstado")?.value || "";
  const uf = normalizarEstado(estadoInformado);

  if (!uf) {
    valorFrete = 0;
    return;
  }

  const pesoTotal = calcularPesoCarrinho();
  const resultado = calcularValorFretePorPesoERegiao(uf, pesoTotal);

  if (resultado.erro) {
    valorFrete = 0;
    return;
  }

  valorFrete = Number(resultado.valor || 0);
}

/* ================= MODAL PRODUTO ================= */

function abrirModal(produto, imgs){
  produtoAtual = produto;
  corSelecionada = null;

  modalProduto.style.display = "flex";
  modalNome.innerText = produto.nome;
  modalPreco.innerText = formatarReal(produto.preco);
  modalDescricao.innerHTML = produto.descricao || "";

  let index = 0;
  modalImg.src = imgs[index] || "";

  modalDots.innerHTML = imgs.map((_, i) =>
    `<span style="height:10px;width:10px;margin:4px;background:${i===0?'#0071e3':'#ccc'};
    border-radius:50%;display:inline-block;cursor:pointer"
    onclick="trocarImg(${i})"></span>`
  ).join("");

  window.trocarImg = function(i){
    index = i;
    modalImg.src = imgs[i];
    document.querySelectorAll("#modalDots span")
      .forEach((d, di) => d.style.background = di === i ? "#0071e3" : "#ccc");
  };

  let variacoes = [];
  try { variacoes = JSON.parse(produto.variacoes || "[]"); } catch {}

  if (variacoes.length) {
    modalDescricao.innerHTML += "<br><strong>Selecione a cor:</strong><br>";
    modalDescricao.innerHTML += `<div id="coresArea" style="margin-top:10px;"></div>`;

    const coresArea = document.getElementById("coresArea");

    variacoes.forEach(v => {
      const btn = document.createElement("button");
      btn.innerText = `${v.cor} (${v.estoque})`;
      btn.style.margin = "5px";
      btn.style.padding = "6px 12px";
      btn.style.borderRadius = "6px";
      btn.style.border = "1px solid #ccc";
      btn.style.cursor = "pointer";

      if (v.estoque <= 0) {
        btn.disabled = true;
        btn.style.opacity = "0.5";
      }

      btn.onclick = () => {
        corSelecionada = v.cor;
        document.querySelectorAll("#coresArea button").forEach(b => {
          b.style.background = "#fff";
          b.style.color = "#000";
        });
        btn.style.background = "#0071e3";
        btn.style.color = "#fff";
      };

      coresArea.appendChild(btn);
    });
  }

  modalAdd.onclick = adicionarCarrinho;
}

window.fecharModal = () => {
  modalProduto.style.display = "none";
};

/* ================= CARRINHO ================= */

function adicionarCarrinho(){
  let variacoes = [];
  try { variacoes = JSON.parse(produtoAtual.variacoes || "[]"); } catch {}

  const precisaCor = variacoes.length > 0;

  if (precisaCor && !corSelecionada) {
    alert("Selecione uma cor.");
    return;
  }

  const corFinal = corSelecionada || "Sem cor";
  const existente = carrinho.find(i => i.id === produtoAtual.id && i.cor === corFinal);

  if (existente) {
    existente.qtd++;
  } else {
    carrinho.push({ ...produtoAtual, qtd: 1, cor: corFinal });
  }

  salvarCarrinhoLocal();
  fecharModal();
}

function atualizarResumoCarrinho(){
  let subtotal = 0;

  carrinho.forEach(i => {
    subtotal += Number(i.preco || 0) * Number(i.qtd || 1);
  });

  subtotalCarrinhoAtual = subtotal;
  totalCarrinhoAtual = subtotal + valorFrete;

  const resumoExistente = document.getElementById("resumoCarrinhoTotais");
  if (resumoExistente) {
    resumoExistente.innerHTML = `
      <hr>
      <div style="display:flex;justify-content:space-between;margin:6px 0;">
        <span>Subtotal:</span>
        <strong>${formatarReal(subtotalCarrinhoAtual)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin:6px 0;">
        <span>Frete:</span>
        <strong>${formatarReal(valorFrete)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin:10px 0 0 0;font-size:18px;">
        <span>Total:</span>
        <strong>${formatarReal(totalCarrinhoAtual)}</strong>
      </div>
    `;
  }
}

btnCarrinho.onclick = () => abrirCarrinho();

function abrirCarrinho(){
  if (!carrinho.length) return alert("Carrinho vazio");

  itensCarrinho.innerHTML = carrinho.map((i, index) => {
    const subtotal = Number(i.preco || 0) * Number(i.qtd || 1);

    return `
      <div style="margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px;">
        <strong>${i.nome}</strong> (${i.cor})
        <br>
        <small>Peso unitário: ${Number(i.peso || 0).toFixed(2)} kg</small>
        <br>
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px;">
          <button onclick="diminuirQtd(${index})">➖</button>
          <strong>${i.qtd}</strong>
          <button onclick="aumentarQtd(${index})">➕</button>
          <button onclick="removerItem(${index})" style="color:red;">❌</button>
        </div>
        <div style="margin-top:5px;">
          Subtotal: ${formatarReal(subtotal)}
        </div>
      </div>
    `;
  }).join("");

  itensCarrinho.innerHTML += `
    <div id="resumoCarrinhoTotais">
      <hr>
      <div style="display:flex;justify-content:space-between;margin:6px 0;">
        <span>Subtotal:</span>
        <strong>${formatarReal(0)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin:6px 0;">
        <span>Frete:</span>
        <strong>${formatarReal(valorFrete)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin:10px 0 0 0;font-size:18px;">
        <span>Total:</span>
        <strong>${formatarReal(0)}</strong>
      </div>
    </div>
  `;

  renderizarSugestoesCarrinho();
  atualizarResumoCarrinho();
  modalCarrinho.style.display = "flex";
}

window.aumentarQtd = function(index){
  carrinho[index].qtd++;
  salvarCarrinhoLocal();
  calcularFreteSePossivel();
  abrirCarrinho();
};

window.diminuirQtd = function(index){
  if (carrinho[index].qtd > 1) {
    carrinho[index].qtd--;
  } else {
    carrinho.splice(index, 1);
  }
  salvarCarrinhoLocal();
  calcularFreteSePossivel();
  abrirCarrinho();
};

window.removerItem = function(index){
  carrinho.splice(index, 1);
  salvarCarrinhoLocal();
  calcularFreteSePossivel();
  abrirCarrinho();
};

window.fecharCarrinho = () => {
  modalCarrinho.style.display = "none";
};

/* ================= GEOLOCALIZAÇÃO ================= */

window.pegarLocalizacao = function(){
  navigator.geolocation.getCurrentPosition(pos => {
    clienteLocalizacao.value =
      `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
  });
};

/* ================= PAGAMENTO ================= */

window.selecionarPagamento = function(modo){
  const areaPixMP = document.getElementById("areaPixMP");
  const btnMP = document.getElementById("btnConfirmarMP");
  const btnGerarPixMP = document.getElementById("btnGerarPixMP");

  areaPixMP.style.display = "none";
  btnMP.style.display = "none";
  btnGerarPixMP.style.display = "none";

  if (modo === "pix_mp") {
    areaPixMP.style.display = "block";
    btnGerarPixMP.style.display = "block";
  }

  if (modo === "mercadopago") {
    btnMP.style.display = "block";
  }
};

window.copiarPixCopiaCola = async function (){
  const codigo = document.getElementById("pixCopiaCola").value || "";
  if (!codigo) {
    alert("Nenhum código PIX gerado.");
    return;
  }

  try {
    await navigator.clipboard.writeText(codigo);
    alert("✅ Código PIX copiado!");
  } catch {
    alert("Não foi possível copiar.");
  }
};

/* ================= FINALIZAR ================= */

async function criarPagamentoMP(pedidoId, itens){
  const payload = {
    appId: APP_ID,
    pedidoId,
    items: itens
      .map(i => ({
        title: String(`${i.nome || "Produto"} (${i.cor || "Sem cor"})`).slice(0, 120),
        quantity: Number(i.qtd || 1),
        unit_price: Number(i.preco || 0)
      }))
      .filter(i => i.quantity > 0 && i.unit_price > 0)
  };

  const res = await fetch(URL_PAGAMENTO, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY
    },
    body: JSON.stringify(payload)
  });

  const json = await res.json().catch(() => ({}));

  if (!res.ok) {
    const detalhe =
      json?.detalhes?.message ||
      json?.detalhes?.cause?.[0]?.description ||
      json?.detalhes?.error ||
      json?.detalhes?.status ||
      JSON.stringify(json?.detalhes || {});

    throw new Error(`${json?.erro || `Falha ao criar pagamento (${res.status})`} | Detalhe: ${detalhe}`);
  }

  return json;
}

window.finalizarPedido = async function (modoEscolhido){
  if (!carrinho.length) return;

  const nome = document.getElementById("clienteNome").value.trim();
  const telefone = document.getElementById("clienteTelefone").value.trim();

  if (!nome || !telefone) {
    alert("Preencha nome e telefone.");
    return;
  }

  let subtotal = 0;

  for (const item of carrinho) {
    const { data: produtoBanco, error: prodErr } = await supabase
      .from("produtos")
      .select("variacoes")
      .eq("id", item.id)
      .single();

    if (prodErr || !produtoBanco) {
      alert(`Erro ao consultar produto: ${item.nome}`);
      return;
    }

    let variacoes = [];
    try { variacoes = JSON.parse(produtoBanco.variacoes || "[]"); } catch {}

    if (item.cor && item.cor !== "Sem cor") {
      const idx = variacoes.findIndex(v => v.cor === item.cor);

      if (idx === -1 || Number(variacoes[idx].estoque) < Number(item.qtd)) {
        alert(`Estoque insuficiente para ${item.nome} (${item.cor})`);
        return;
      }
    }

    subtotal += Number(item.preco || 0) * Number(item.qtd || 1);
  }

  const estadoInformado = document.getElementById("clienteEstado").value;
  const ufFrete = normalizarEstado(estadoInformado);

  if (!ufFrete) {
    alert("Informe o estado para calcular o frete.");
    return;
  }

  const pesoTotalPedido = calcularPesoCarrinho();
  const resultadoFrete = calcularValorFretePorPesoERegiao(ufFrete, pesoTotalPedido);

  if (resultadoFrete.erro) {
    alert(resultadoFrete.erro);
    return;
  }

  valorFrete = Number(resultadoFrete.valor || 0);
  const total = subtotal + valorFrete;

  const pagamentoModoInicial = modoEscolhido === "pix_mp" ? "mercadopago_pix" : "mercadopago";
  const pagamentoTipoInicial = modoEscolhido === "pix_mp" ? "pix" : "checkout_online";

  const { data: pedidoCriado, error } = await supabase
    .from("pedidos")
    .insert([{
      app_id: APP_ID,
      cliente_nome: nome,
      cliente_telefone: telefone,
      cliente_rua: document.getElementById("clienteRua").value,
      cliente_numero: document.getElementById("clienteNumero").value,
      cliente_bairro: document.getElementById("clienteBairro").value,
      cliente_cidade: document.getElementById("clienteCidade").value,
      cliente_estado: document.getElementById("clienteEstado").value,
      cliente_cep: document.getElementById("clienteCep").value,
      cliente_localizacao: document.getElementById("clienteLocalizacao").value,
      itens: carrinho,
      total: total,
      subtotal: subtotal,
      frete_valor: valorFrete,
      frete_uf: ufFrete,
      frete_regiao: resultadoFrete.regiao,
      frete_peso_total: pesoTotalPedido,
      status: "aguardando_pagamento",
      pagamento_modo: pagamentoModoInicial,
      pagamento_tipo: pagamentoTipoInicial,
      pagamento_status: "pending"
    }])
    .select("id")
    .single();

  if (error || !pedidoCriado) {
    console.error(error);
    alert("Erro ao salvar pedido.");
    return;
  }

  const pedidoId = pedidoCriado.id;

  if (modoEscolhido === "pix_mp") {
    try {
      const pagamento = await criarPagamentoPixMP(pedidoId, total, { nome });

      const qrBase64 =
        pagamento?.point_of_interaction?.transaction_data?.qr_code_base64 || "";

      const copiaCola =
        pagamento?.point_of_interaction?.transaction_data?.qr_code || "";

      const ticketUrl =
        pagamento?.point_of_interaction?.transaction_data?.ticket_url || "";

      await supabase
        .from("pedidos")
        .update({
          pagamento_modo: "mercadopago_pix",
          pagamento_tipo: "pix",
          pagamento_status: pagamento.status || "pending",
          mp_payment_id: pagamento.id || null,
          mp_qr_code: copiaCola || null,
          mp_ticket_url: ticketUrl || null,
          status: "aguardando_pagamento"
        })
        .eq("id", pedidoId);

      document.getElementById("pixCopiaCola").value = copiaCola || "";

      document.getElementById("pixQrCodeArea").innerHTML = qrBase64
        ? `<img src="data:image/png;base64,${qrBase64}" style="max-width:240px; width:100%;">`
        : (ticketUrl ? `<a href="${ticketUrl}" target="_blank">Abrir pagamento PIX</a>` : "PIX gerado.");

      return;
    } catch (e) {
      console.error(e);
      alert("Erro ao gerar PIX: " + e.message);
      return;
    }
  }

  if (modoEscolhido === "mercadopago") {
    try {
      const pagamento = await criarPagamentoMP(pedidoId, carrinho);

      await supabase
        .from("pedidos")
        .update({
          pagamento_modo: "mercadopago",
          pagamento_tipo: "checkout_online",
          pagamento_status: "pending",
          mp_preference_id: pagamento.id || null,
          status: "aguardando_pagamento"
        })
        .eq("id", pedidoId);

      const linkPagamento = pagamento.init_point || pagamento.sandbox_init_point;

      if (!linkPagamento) {
        alert("Mercado Pago não retornou o link.");
        return;
      }

      window.location.href = linkPagamento;
      return;
    } catch (e) {
      console.error(e);
      alert("Erro ao gerar pagamento: " + e.message);
      return;
    }
  }
};

carregar();
