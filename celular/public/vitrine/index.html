<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
    --cor-primaria:#0086ff;
    --cor-secundaria:#00b853;
    --fundo:#f5f6fa;
    --card:#fff;
    --texto:#222;
}
body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:var(--fundo);
    color:var(--texto);
    overflow-x:hidden;
}

/* HEADER */
.header{
    position:fixed;top:0;left:0;width:100%;
    background:var(--cor-primaria);
    color:white;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-area img{height:45px;background:white;border-radius:8px;padding:5px;object-fit:contain;}
.nome-loja{font-size:18px;font-weight:600;}
.cart-button{background:white;color:var(--cor-primaria);padding:8px 14px;border-radius:30px;font-weight:bold;cursor:pointer;}
.space{height:90px;}

/* PRODUTOS */
.produtos{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:18px;}
.card{background:var(--card);border-radius:14px;padding:12px;box-shadow:0 5px 15px rgba(0,0,0,0.08);cursor:pointer;transition:0.25s;}
.card:hover{transform:translateY(-5px);}
.card img{width:100%;height:150px;object-fit:contain;}
.card h4{font-size:14px;margin:10px 0 5px;min-height:38px;}
.preco{color:var(--cor-primaria);font-weight:bold;font-size:16px;}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:1998;}

/* CARRINHO */
.carrinho{
    position:fixed;top:0;right:0;width:100%;max-width:420px;height:100dvh;
    background:white;padding:20px;overflow-y:auto;transform:translateX(100%);transition:0.3s;z-index:1999;
}
.carrinho.open{transform:translateX(0)}
.item{border-bottom:1px solid #eee;padding:10px 0;font-size:14px;}
input{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;}
button{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;}
.btn-frete{background:var(--cor-primaria);color:white;}
.btn-finalizar{background:var(--cor-secundaria);color:white;margin-top:10px;}

/* TEMA ESCURO */
body.tema-escuro{--fundo:#121212;--card:#1e1e1e;--texto:#fff;}

/* MODAL PRODUTO */
#modalProduto{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:3000;justify-content:center;align-items:center;}
#modalProduto > div{background:white;width:95%;max-width:500px;border-radius:12px;padding:20px;position:relative;}
#modalProduto span{position:absolute;right:15px;top:10px;cursor:pointer;font-size:20px;}
#miniaturas img{width:60px;height:60px;object-fit:contain;cursor:pointer;border:1px solid #ddd;border-radius:6px;}
</style>
</head>
<body>

<div class="header">
    <div class="logo-area">
        <img id="logoLoja">
        <div id="nomeLoja" class="nome-loja"></div>
    </div>
    <div class="cart-button" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
</div>

<div class="space"></div>
<div class="produtos" id="listaProdutos"></div>
<div id="overlay" onclick="toggleCart()"></div>

<div class="carrinho" id="cart">
    <h3>Seu Carrinho</h3>
    <div id="cartItems"></div>
    <h4>Entrega</h4>
    <input id="nome" placeholder="Nome completo">
    <input id="cep" placeholder="CEP">
    <input id="rua" placeholder="Rua">
    <input id="numero" placeholder="Número">
    <input id="bairro" placeholder="Bairro">
    <input id="cidade" placeholder="Cidade">
    <input id="estado" placeholder="Estado">
    <input id="complemento" placeholder="Complemento">
    <button class="btn-frete" onclick="calcularFrete()">Calcular Frete</button>
    <div id="freteBox"></div>
    <div id="totalBox"></div>
    <button class="btn-finalizar" onclick="finalizar()">Finalizar Pedido</button>
</div>

<!-- MODAL PRODUTO -->
<div id="modalProduto">
    <div>
        <span onclick="fecharModal()">✖</span>
        <img id="imgPrincipal" style="width:100%;height:250px;object-fit:contain;margin-bottom:10px;">
        <div id="miniaturas" style="display:flex;gap:10px;justify-content:center;margin-bottom:15px;"></div>
        <h3 id="modalNome"></h3>
        <p id="modalPreco" style="font-weight:bold;margin:10px 0;"></p>
        <button onclick="adicionarModal()" class="btn-finalizar">Adicionar ao Carrinho</button>
    </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let produtos=[], carrinho=[], frete=0, produtoSelecionado=null;
const cart=document.getElementById("cart");
const overlay=document.getElementById("overlay");
const logo=document.getElementById("logoLoja");

// Carrinho
window.toggleCart=()=>{cart.classList.toggle("open");overlay.style.display=cart.classList.contains("open")?"block":"none";}
function atualizarCarrinho(){
    cartItems.innerHTML="";
    let total=0;
    carrinho.forEach((item,i)=>{
        total+=item.preco*item.qtd;
        cartItems.innerHTML+=`<div class="item">${item.nome}<br>R$ ${item.preco.toFixed(2)} x ${item.qtd}<button onclick="remover(${i})">❌</button></div>`;
    });
    cartCount.innerText=carrinho.length;
    totalBox.innerHTML="<b>Total:</b> R$ "+(total+frete).toFixed(2);
}
window.remover=(i)=>{carrinho.splice(i,1);atualizarCarrinho();}
window.calcularFrete=()=>{if(cep.value.length<8){alert("CEP inválido");return}frete=25;freteBox.innerHTML="Frete: R$ 25,00";atualizarCarrinho();}
window.finalizar=()=>{if(!nome.value||carrinho.length==0){alert("Preencha os dados");return}alert("Pedido registrado (modelo pronto)");}

// Modal Produto
window.abrirModal=(i)=>{
    produtoSelecionado=produtos[i];
    let imgs=[];
    try{imgs=JSON.parse(produtoSelecionado.imagens||"[]")}catch{}
    if(imgs.length===0) imgs=["https://via.placeholder.com/300"];
    imgPrincipal.src=imgs[0]; modalNome.innerText=produtoSelecionado.nome; modalPreco.innerText="R$ "+Number(produtoSelecionado.preco).toFixed(2);
    miniaturas.innerHTML=""; imgs.slice(0,3).forEach(img=>{miniaturas.innerHTML+=`<img src="${img}" onclick="trocarImagem('${img}')">`;});
    modalProduto.style.display="flex";
}
window.trocarImagem=(src)=>{imgPrincipal.src=src;}
window.fecharModal=()=>{modalProduto.style.display="none";}
window.adicionarModal=()=>{
    const existe=carrinho.find(x=>x.id===produtoSelecionado.id);
    if(existe) existe.qtd++; else carrinho.push({...produtoSelecionado,qtd:1});
    atualizarCarrinho(); fecharModal();
}

// Config
function aplicarConfig(config){
    document.body.classList.remove("tema-escuro");
    if(config.tema==="escuro") document.body.classList.add("tema-escuro");
    if(config.cor_primaria) document.documentElement.style.setProperty('--cor-primaria',config.cor_primaria);
    if(config.cor_secundaria) document.documentElement.style.setProperty('--cor-secundaria',config.cor_secundaria);
}

// Carregar
async function carregar(){
    const { data:config, error } = await supabase.from("site_config").select("*").eq("app_id",APP_ID).single();
    if(error) console.error("Erro site_config:",error);
    if(config){
        document.getElementById("nomeLoja").innerText = config.nome_loja || "Minha Loja";
        if(config.logo_url && config.logo_url.trim() !== "") logo.src=config.logo_url;
        else logo.src="https://via.placeholder.com/150x60?text=LOGO";
        aplicarConfig(config);
    }

    const { data:produtosData, error:prodError } = await supabase.from("produtos").select("*").eq("app_id",APP_ID).eq("ativo",true);
    if(prodError) console.error("Erro produtos:",prodError);
    produtos = produtosData || [];

    produtos.forEach((p,i)=>{
        let imgs=[]; try{imgs=JSON.parse(p.imagens||"[]");}catch{}
        listaProdutos.innerHTML+=`<div class="card" onclick="abrirModal(${i})"><img src="${imgs[0]||'https://via.placeholder.com/150'}"><h4>${p.nome}</h4><div class="preco">R$ ${Number(p.preco).toFixed(2)}</div></div>`;
    });
}

carregar();
</script>
</body>
</html>
