<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  padding-top:120px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:6px;
  border-radius:12px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
  font-size:18px;
}

/* CATEGORIAS */
#filtros{
  padding:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filtro-btn{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#ddd;
  cursor:pointer;
}

.filtro-btn.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

@media(min-width:768px){
  .produtos{grid-template-columns:repeat(3,1fr);}
}

.card{
  background:#fff;
  border-radius:18px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.galeria{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.miniaturas{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.miniaturas img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
}

.miniaturas img:hover{
  border-color:#0071e3;
}

.imagem-principal{
  flex:1;
  display:flex;
  justify-content:center;
}

.imagem-principal img{
  width:120px;
  height:120px;
  object-fit:contain;
}

.preco{
  font-size:16px;
  font-weight:bold;
  color:#0071e3;
  margin:8px 0;
}

.btn-add{
  width:100%;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:14px 18px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
  z-index:9999;
}

#modalCarrinho{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.modal{
  background:#fff;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:15px;
  padding:20px;
}

.campo{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>
<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div id="filtros"></div>
<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<div id="modalCarrinho">
  <div class="modal">
    <h2>Seu Pedido</h2>
    <div id="itensCarrinho"></div>
    <hr>
    <h3>Subtotal: R$ <span id="subtotal">0.00</span></h3>
    <h3>Frete: R$ <span id="frete">10.00</span></h3>
    <h2>Total: R$ <span id="total">0.00</span></h2>

    <hr>
    <input class="campo" id="nomeCliente" placeholder="Nome">
    <input class="campo" id="telefoneCliente" placeholder="Telefone">
    <textarea class="campo" id="obsCliente" placeholder="Observação"></textarea>

    <button id="btnFinalizar" class="btn-add">Finalizar Pedido</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let configGlobal=null;

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText=carrinho.length;
}

btnCarrinho.onclick=()=>{
  modalCarrinho.style.display="flex";
  renderCarrinho();
};

function renderCarrinho(){
  itensCarrinho.innerHTML="";
  let subtotal=0;

  carrinho.forEach((item,i)=>{
    subtotal+=Number(item.preco);
    itensCarrinho.innerHTML+=`
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span>${item.nome}</span>
        <span>R$ ${Number(item.preco).toFixed(2)}</span>
      </div>`;
  });

  subtotal.innerText=subtotal.toFixed(2);
  total.innerText=(subtotal+10).toFixed(2);
}

async function carregar(){
  const {data:config}=await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  configGlobal=config;

  if(config?.logo_url) logoLoja.src=config.logo_url;
  if(config?.nome_site) nomeLoja.innerText=config.nome_site;

  const {data:produtos}=await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  renderProdutos(produtos||[]);
}

function renderProdutos(lista){
  listaProdutos.innerHTML="";

  lista.forEach(p=>{
    let imgs=[];
    try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="galeria">
        <div class="miniaturas">
          ${imgs.slice(0,3).map(img=>`<img src="${img}">`).join("")}
        </div>
        <div class="imagem-principal">
          ${imgs[0]?`<img src="${imgs[0]}" class="principal">`:""}
        </div>
      </div>

      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    card.querySelectorAll(".miniaturas img").forEach(img=>{
      img.addEventListener("click",(e)=>{
        e.stopPropagation();
        card.querySelector(".principal").src=img.src;
      });
    });

    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      carrinho.push(p);
      salvar();
    };

    listaProdutos.appendChild(card);
  });
}

carregar();
salvar();
</script>
</body>
</html>
