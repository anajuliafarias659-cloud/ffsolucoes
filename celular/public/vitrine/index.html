<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px;
  display:flex;
  justify-content:center;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-box img{
  height:45px;
}

.logo-box div{
  color:white;
  font-size:22px;
  font-weight:bold;
}

/* BANNER */
.banner{
    background: linear-gradient(135deg, #000, #222);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.banner h1{
    font-size:32px;
    margin-bottom:10px;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

.card button{
    padding:10px 20px;
    border:none;
    background:black;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja" src="" alt="Logo">
    <div id="nomeLoja">Carregando...</div>
  </div>
</header>

<section class="banner">
    <h1>Ofertas da Loja</h1>
    <p>Parcelamos em até 12x • Aceitamos Troca</p>
</section>

<section class="produtos" id="listaProdutos"></section>

<footer>
© 2026 Sistema Multi Negócio
</footer>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔎 PEGAR APP_ID
const params = new URLSearchParams(window.location.search);
const APP_ID = params.get("app_id");

if(!APP_ID){
    document.body.innerHTML = "<h2 style='text-align:center'>Loja não encontrada</h2>";
}

// 🚀 CARREGAR LOJA
async function carregarLoja(){

    // 🔹 Buscar dados da loja
    const { data: app } = await supabase
      .from("apps")
      .select("nome, logo")
      .eq("id", APP_ID)
      .single();

    if(!app){
        document.body.innerHTML = "<h2 style='text-align:center'>Loja inválida</h2>";
        return;
    }

    document.getElementById("nomeLoja").innerText = app.nome;

    if(app.logo){
        document.getElementById("logoLoja").src = app.logo;
    } else {
        document.getElementById("logoLoja").style.display="none";
    }

    // 🔹 Buscar produtos
    const { data: produtos } = await supabase
      .from("produtos")
      .select("*")
      .eq("app_id", APP_ID)
      .eq("ativo", true);

    const lista = document.getElementById("listaProdutos");
    lista.innerHTML="";

    if(!produtos || produtos.length === 0){
        lista.innerHTML = "<p>Nenhum produto disponível</p>";
        return;
    }

    produtos.forEach(p=>{

        const whatsapp = `https://wa.me/55SEUNUMERO?text=Olá, tenho interesse no produto ${p.name}`;

        lista.innerHTML += `
            <div class="card">
                <img src="${p.imagem || 'https://via.placeholder.com/180'}">
                <h3>${p.name}</h3>
                <div class="preco">R$ ${p.preco}</div>
                <button onclick="window.open('${whatsapp}','_blank')">
                  Comprar
                </button>
            </div>
        `;
    });

}

carregarLoja();

</script>

</body>
</html>
