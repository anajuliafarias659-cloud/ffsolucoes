<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:150px;
}

/* HEADER */
.topo{
  background: rgba(0,0,0,0.9);
  padding:15px 40px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:20px;
}

.logo-box img{
  height:100px;
  background:white;
  padding:8px;
  border-radius:15px;
}

#nomeLoja{
  color:white;
  font-size:26px;
  font-weight:bold;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
}

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

.btn-add{
  background:#0071e3;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

/* BOTÃO CARRINHO */
#btnCarrinho{
position:fixed;
bottom:20px;
right:20px;
background:#0071e3;
color:white;
border:none;
padding:15px 20px;
border-radius:50px;
font-size:18px;
cursor:pointer;
z-index:9999;
}

/* MODAL */
#modalCarrinho{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:99999;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
width:95%;
max-width:500px;
max-height:90vh;
overflow:auto;
border-radius:15px;
padding:20px;
}

.campo{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:6px;
}
</style>
</head>

<body>

<header class="topo" id="topo">
  <div class="logo-box">
    <img id="logoLoja" src="" alt="Logo">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="produtos" id="listaProdutos"></section>

<footer>© 2026 Sistema Multi Negócio</footer>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<div id="modalCarrinho">
  <div class="modal-content">
    <h2>Seu Pedido</h2>
    <div id="itensCarrinho"></div>
    <hr>
    <h3>Total: R$ <span id="totalCarrinho">0.00</span></h3>
    <br>
    <button id="fecharCarrinho">Fechar</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

/* ================= CARRINHO ================= */

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvarCarrinho(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  atualizarContador();
}

function atualizarContador(){
  document.getElementById("contadorCarrinho").innerText = carrinho.length;
}

function renderizarCarrinho(){
  const container = document.getElementById("itensCarrinho");
  container.innerHTML="";
  let total=0;

  carrinho.forEach(item=>{
    total+=Number(item.preco);
    container.innerHTML+=`
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span>${item.nome}</span>
        <span>R$ ${Number(item.preco).toFixed(2)}</span>
      </div>
    `;
  });

  document.getElementById("totalCarrinho").innerText = total.toFixed(2);
}

/* EVENTOS */

document.getElementById("btnCarrinho").addEventListener("click",()=>{
  document.getElementById("modalCarrinho").style.display="flex";
  renderizarCarrinho();
});

document.getElementById("fecharCarrinho").addEventListener("click",()=>{
  document.getElementById("modalCarrinho").style.display="none";
});

/* ================= LOJA ================= */

async function carregarLoja(){

  const { data: config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", APP_ID)
    .maybeSingle();

  if(config?.logo_url){
    document.getElementById("logoLoja").src = config.logo_url;
  } else {
    document.getElementById("logoLoja").style.display="none";
  }

  if(config?.nome_site){
    document.getElementById("nomeLoja").innerText = config.nome_site;
  } else {
    document.getElementById("nomeLoja").style.display="none";
  }

  const { data: produtos } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true);

  const lista = document.getElementById("listaProdutos");
  lista.innerHTML="";

  produtos?.forEach(p=>{
    let imagens=[];
    try{ imagens=JSON.parse(p.imagens||"[]"); }catch{}

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      ${imagens[0]?`<img src="${imagens[0]}">`:""}
      <h3>${p.nome}</h3>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    card.querySelector(".btn-add").addEventListener("click",()=>{
      carrinho.push(p);
      salvarCarrinho();
      alert("Adicionado ao carrinho");
    });

    lista.appendChild(card);
  });

}

carregarLoja();
atualizarContador();
</script>

</body>
</html>
