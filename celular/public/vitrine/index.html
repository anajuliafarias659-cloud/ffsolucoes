<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  padding-top:120px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:6px;
  border-radius:12px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* PRODUTOS */
.produtos{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:all .3s ease;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-4px);
}

.card.aberto{
  grid-column: span 2;
}

.descricao-produto{
  max-height:0;
  overflow:hidden;
  font-size:14px;
  color:#555;
  transition:max-height .4s ease;
}

.card.aberto .descricao-produto{
  max-height:200px;
  margin:10px 0;
}

.galeria{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.miniaturas{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.mini-img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  transition:transform .2s;
}

.card.aberto .mini-img{
  width:70px;
  height:70px;
}

.mini-img:hover{
  transform:scale(1.05);
}

.imagem-principal{
  flex:1;
  display:flex;
  justify-content:center;
}

.imagem-principal img{
  width:120px;
  height:120px;
  object-fit:contain;
  transition:.3s;
}

.card.aberto .imagem-principal img{
  width:180px;
  height:180px;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:14px 18px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
}

#modalCarrinho{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.modal{
  background:#fff;
  width:95%;
  max-width:500px;
  border-radius:15px;
  padding:20px;
}

.campo{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>
<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<div id="modalCarrinho">
  <div class="modal">
    <button id="fecharModal" style="float:right;background:red;color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;">X</button>
    <h2>Seu Pedido</h2>

    <div id="itensCarrinho"></div>
    <h3>Total: R$ <span id="total">0.00</span></h3>

    <input class="campo" id="nomeCliente" placeholder="Nome">
    <input class="campo" id="telefoneCliente" placeholder="Telefone">
    <input class="campo" id="enderecoCliente" placeholder="Endereço">
    <input class="campo" id="bairroCliente" placeholder="Bairro">
    <input class="campo" id="cidadeCliente" placeholder="Cidade">

    <button type="button" id="btnLocalizacao" class="btn-add" style="margin-bottom:10px;">
      📍 Pegar Minha Localização
    </button>

    <textarea class="campo" id="obsCliente" placeholder="Observação"></textarea>

    <button id="btnFinalizar" class="btn-add">Finalizar Pedido</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

const listaProdutos = document.getElementById("listaProdutos");
const contadorCarrinho = document.getElementById("contadorCarrinho");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let configGlobal=null;

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText=carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

/* FECHAR MODAL */
document.getElementById("fecharModal").onclick=()=>{
  document.getElementById("modalCarrinho").style.display="none";
};

/* LOCALIZAÇÃO */
document.getElementById("btnLocalizacao").onclick = ()=>{
  if(!navigator.geolocation){
    alert("Geolocalização não suportada.");
    return;
  }

  navigator.geolocation.getCurrentPosition((pos)=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const link = `https://www.google.com/maps?q=${lat},${lng}`;
    document.getElementById("enderecoCliente").value = link;
  },
  ()=>{
    alert("Não foi possível obter localização.");
  });
};

/* ABRIR CARRINHO */
document.getElementById("btnCarrinho").onclick=()=>{
  document.getElementById("modalCarrinho").style.display="flex";
  renderCarrinho();
};

function renderCarrinho(){
  const itens=document.getElementById("itensCarrinho");
  itens.innerHTML="";
  let total=0;

  carrinho.forEach((item,index)=>{
    const qtd=item.qtd||1;
    total+=Number(item.preco)*qtd;

    const div=document.createElement("div");
    div.style.marginBottom="10px";

    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;">
        <span>${item.nome}</span>
        <span>R$ ${(Number(item.preco)*qtd).toFixed(2)}</span>
      </div>
      <div style="display:flex;gap:10px;margin-top:5px;">
        <button class="menos">➖</button>
        <span>${qtd}</span>
        <button class="mais">➕</button>
      </div>
    `;

    div.querySelector(".mais").onclick=()=>{
      item.qtd++;
      salvar();
      renderCarrinho();
    };

    div.querySelector(".menos").onclick=()=>{
      item.qtd--;
      if(item.qtd<=0){
        carrinho.splice(index,1);
      }
      salvar();
      renderCarrinho();
    };

    itens.appendChild(div);
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

/* FINALIZAR */
document.getElementById("btnFinalizar").onclick = async ()=>{
  if(carrinho.length===0){
    alert("Carrinho vazio!");
    return;
  }

  const { data: configAtual } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(!configAtual){
    alert("Configuração não encontrada.");
    return;
  }

  configGlobal=configAtual;
  const modo=(configGlobal.modo_venda||"").trim();
  const total=document.getElementById("total").innerText;

  const pedido={
    app_id:APP_ID,
    cliente_nome:nomeCliente.value||"",
    telefone:telefoneCliente.value||"",
    endereco:enderecoCliente.value||"",
    bairro:bairroCliente.value||"",
    cidade:cidadeCliente.value||"",
    observacao:obsCliente.value||"",
    total:total,
    status:"novo",
    itens:carrinho
  };

  if(modo==="sistema"||modo==="ambos"){
    await supabase.from("pedidos").insert([pedido]);
  }

  if(modo==="whatsapp"||modo==="ambos"){
    let msg="🛒 *NOVO PEDIDO*\n\n";
    msg+=`👤 ${pedido.cliente_nome}\n`;
    msg+=`📞 ${pedido.telefone}\n`;
    msg+=`📍 ${pedido.endereco} - ${pedido.bairro} - ${pedido.cidade}\n\n`;

    carrinho.forEach(i=>{
      msg+=`• ${i.nome} (${i.qtd}) - R$ ${(Number(i.preco)*i.qtd).toFixed(2)}\n`;
    });

    msg+=`\n💰 Total: R$ ${pedido.total}`;

    window.open(
      `https://wa.me/${configGlobal.whatsapp_numero}?text=${encodeURIComponent(msg)}`,
      "_blank"
    );
  }

  carrinho=[];
  salvar();
  document.getElementById("modalCarrinho").style.display="none";
};

/* CARREGAR */
async function carregar(){
  const {data:config}=await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config?.logo_url)
    document.getElementById("logoLoja").src=config.logo_url;

  if(config?.nome_site)
    document.getElementById("nomeLoja").innerText=config.nome_site;

  const {data:produtos}=await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  renderizarProdutos(produtos||[]);
}

function renderizarProdutos(lista){
  listaProdutos.innerHTML="";

  lista.forEach(p=>{
    let imgs=[];
    try{ imgs = JSON.parse(p.imagens || "[]"); }catch{}

    const imagemPrincipal = imgs[0] || "";

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="galeria">
        <div class="miniaturas">
          ${imgs.slice(0,3).map(img=>`
            <img src="${img}" class="mini-img">
          `).join("")}
        </div>
        <div class="imagem-principal">
          ${imagemPrincipal ? `<img src="${imagemPrincipal}" class="principal">` : ""}
        </div>
      </div>
      <h4>${p.nome}</h4>
      <div class="descricao-produto">
        ${p.descricao || "Sem descrição disponível."}
      </div>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    card.addEventListener("click",()=>{
      card.classList.toggle("aberto");
    });

    const principal = card.querySelector(".principal");

    card.querySelectorAll(".mini-img").forEach(img=>{
      img.addEventListener("click",(e)=>{
        e.stopPropagation();
        if(principal){
          principal.src = img.src;
        }
      });
    });

    card.querySelector(".btn-add").addEventListener("click",(e)=>{
      e.stopPropagation();
      const existe = carrinho.find(i=>i.id===p.id);
      if(existe){
        existe.qtd++;
      }else{
        carrinho.push({...p, qtd:1});
      }
      salvar();
    });

    listaProdutos.appendChild(card);
  });
}

carregar();
salvar();
</script>
</body>
</html>
