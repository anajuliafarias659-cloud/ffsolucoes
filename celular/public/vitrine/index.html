<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
    --cor-primaria:#0086ff;
    --cor-secundaria:#00b853;
    --fundo:#f5f6fa;
    --card:#ffffff;
    --texto:#222;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:var(--fundo);
    color:var(--texto);
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:var(--cor-primaria);
    color:white;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.logo-area{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-area img{
    height:45px;
    background:white;
    border-radius:8px;
    padding:5px;
}

.nome-loja{
    font-size:18px;
    font-weight:600;
}

.cart-button{
    background:white;
    color:var(--cor-primaria);
    padding:8px 14px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
}

.space{height:90px}

/* PRODUTOS */
.produtos{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:18px;
}

.card{
    background:var(--card);
    border-radius:14px;
    padding:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    cursor:pointer;
    transition:0.25s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:150px;
    object-fit:contain;
}

.card h4{
    font-size:14px;
    margin:10px 0 5px;
}

.preco{
    color:var(--cor-primaria);
    font-weight:bold;
    font-size:16px;
}

/* CARRINHO */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:1998;
}

.carrinho{
    position:fixed;
    top:0;
    right:0;
    width:100%;
    max-width:420px;
    height:100dvh;
    background:white;
    padding:20px;
    overflow-y:auto;
    transform:translateX(100%);
    transition:0.3s;
    z-index:1999;
}

.carrinho.open{transform:translateX(0)}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-frete{
    background:var(--cor-primaria);
    color:white;
}

.btn-finalizar{
    background:var(--cor-secundaria);
    color:white;
    margin-top:10px;
}

/* TEMA ESCURO */
body.tema-escuro{
    --fundo:#121212;
    --card:#1e1e1e;
    --texto:#ffffff;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img id="logoLoja">
        <div id="nomeLoja" class="nome-loja"></div>
    </div>

    <div class="cart-button" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </div>
</div>

<div class="space"></div>
<div class="produtos" id="listaProdutos"></div>

<div id="overlay" onclick="toggleCart()"></div>

<div class="carrinho" id="cart">
    <h3>Seu Carrinho</h3>
    <div id="cartItems"></div>

    <h4>Entrega</h4>
    <input id="nome" placeholder="Nome completo">
    <input id="cep" placeholder="CEP">

    <button class="btn-frete" onclick="calcularFrete()">Calcular Frete</button>
    <div id="freteBox"></div>
    <div id="totalBox"></div>

    <button class="btn-finalizar" onclick="finalizar()">Finalizar Pedido</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let produtos=[];
let carrinho=[];
let frete=0;

window.toggleCart=function(){
    cart.classList.toggle("open");
    overlay.style.display = cart.classList.contains("open") ? "block":"none";
}

function atualizarCarrinho(){
    cartItems.innerHTML="";
    let total=0;

    carrinho.forEach((item,i)=>{
        total+=item.preco*item.qtd;
        cartItems.innerHTML+=`
        <div>
            ${item.nome} - R$ ${item.preco.toFixed(2)} x ${item.qtd}
            <button onclick="remover(${i})">❌</button>
        </div>`;
    });

    cartCount.innerText=carrinho.length;
    totalBox.innerHTML="<b>Total:</b> R$ "+(total+frete).toFixed(2);
}

window.remover=function(i){
    carrinho.splice(i,1);
    atualizarCarrinho();
}

window.adicionar=function(index){
    const p=produtos[index];
    const existe=carrinho.find(x=>x.id===p.id);
    if(existe){existe.qtd++}
    else{carrinho.push({...p,qtd:1})}
    atualizarCarrinho();
}

window.calcularFrete=function(){
    frete=25;
    freteBox.innerHTML="Frete: R$ 25,00";
    atualizarCarrinho();
}

window.finalizar=function(){
    alert("Pedido registrado (modelo pronto)");
}

function aplicarConfig(config){

    if(config.tema==="escuro"){
        document.body.classList.add("tema-escuro");
    }

    if(config.cor_primaria){
        document.documentElement.style.setProperty('--cor-primaria', config.cor_primaria);
    }

    if(config.cor_secundaria){
        document.documentElement.style.setProperty('--cor-secundaria', config.cor_secundaria);
    }
}

async function carregar(){

    const { data:config } = await supabase
    .from("config")
    .select("*")
    .eq("app_id",APP_ID)
    .single();

    if(config){
        if(config.logo_url) logoLoja.src=config.logo_url;
        if(config.nome_loja) nomeLoja.innerText=config.nome_loja;
        aplicarConfig(config);
    }

    const { data } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

    produtos=data||[];

    produtos.forEach((p,i)=>{
        let imagens=[];
        try{imagens=JSON.parse(p.imagens||"[]")}catch{}

        listaProdutos.innerHTML+=`
        <div class="card" onclick="adicionar(${i})">
            <img src="${imagens[0]||''}">
            <h4>${p.nome}</h4>
            <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
        </div>`;
    });
}

carregar();
</script>

</body>
</html>
