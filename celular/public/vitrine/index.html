<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;padding-top:120px;}
.topo{background:#000;padding:15px 20px;display:flex;align-items:center;position:fixed;top:0;left:0;width:100%;z-index:999;}
.logo-box{display:flex;align-items:center;gap:15px;}
.logo-box img{height:70px;background:white;padding:8px;border-radius:15px;}
#nomeLoja{color:white;font-size:20px;font-weight:bold;}

#filtros{padding:20px;display:flex;gap:10px;flex-wrap:wrap;}
.filtro-btn{padding:8px 15px;border:none;border-radius:20px;background:#ddd;cursor:pointer;}
.filtro-btn.ativo{background:#0071e3;color:white;}

.produtos{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:20px;}

.card{background:white;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);padding:15px;cursor:pointer;}

.galeria{display:flex;gap:10px;}
.miniaturas{display:flex;flex-direction:column;gap:5px;}
.miniaturas img{width:40px;height:40px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.miniaturas img:hover{border-color:#0071e3;}
.imagem-principal img{width:110px;height:110px;object-fit:contain;}

.preco{font-size:18px;font-weight:bold;color:#0071e3;margin:8px 0;}
.btn-add{width:100%;background:#0071e3;color:white;border:none;padding:8px;border-radius:6px;cursor:pointer;}

#btnCarrinho{position:fixed;bottom:20px;right:20px;background:#0071e3;color:white;border:none;padding:15px 20px;border-radius:50px;font-size:18px;cursor:pointer;z-index:9999;}

#modalCarrinho,#modalProduto{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:99999;
}

.modal{background:white;width:95%;max-width:500px;border-radius:15px;padding:20px;max-height:90vh;overflow:auto;}
.modal-produto{background:white;width:95%;max-width:900px;border-radius:15px;padding:20px;max-height:90vh;overflow:auto;position:relative;}

.campo{width:100%;padding:10px;margin:5px 0;border:1px solid #ccc;border-radius:6px;}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div id="filtros"></div>
<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- CARRINHO -->
<div id="modalCarrinho">
<div class="modal">
<h2>Seu Pedido</h2>
<div id="itensCarrinho"></div>
<hr>
<h3>Subtotal: R$ <span id="subtotal">0.00</span></h3>
<h3>Frete: R$ <span id="frete">0.00</span></h3>
<h2>Total: R$ <span id="total">0.00</span></h2>
<hr>

<h3>Entrega</h3>
<input class="campo" id="nomeCliente" placeholder="Nome">
<input class="campo" id="telefoneCliente" placeholder="Telefone">
<input class="campo" id="enderecoCliente" placeholder="Endereço">
<input class="campo" id="numeroCliente" placeholder="Número">
<input class="campo" id="bairroCliente" placeholder="Bairro">
<input class="campo" id="cidadeCliente" placeholder="Cidade">
<input class="campo" id="localizacaoCliente" placeholder="Link da localização" readonly>

<button id="btnPegarLocalizacao" style="width:100%;padding:10px;background:#0071e3;color:white;border:none;border-radius:8px;margin-top:5px;">
📍 Pegar Minha Localização
</button>

<textarea class="campo" id="obsCliente" placeholder="Observação"></textarea>

<button id="btnFinalizar" style="width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:8px;">
Finalizar Pedido
</button>

<br><br>
<button onclick="modalCarrinho.style.display='none'" style="width:100%;padding:10px;background:#999;color:white;border:none;border-radius:8px;">
Fechar
</button>

</div>
</div>

<!-- MODAL PRODUTO -->
<div id="modalProduto">
<div class="modal-produto">
<button onclick="modalProduto.style.display='none'" style="position:absolute;top:10px;right:15px;background:#dc3545;color:white;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;">✕</button>
<div id="conteudoProduto"></div>
</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase=createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID=new URLSearchParams(window.location.search).get("app_id");

let carrinho=JSON.parse(localStorage.getItem("carrinho"))||[];
let clienteLat=null;
let clienteLng=null;
let configGlobal=null;

function salvar(){
localStorage.setItem("carrinho",JSON.stringify(carrinho));
contadorCarrinho.innerText=carrinho.length;
}

btnCarrinho.onclick=()=>{modalCarrinho.style.display="flex";renderizarCarrinho();};

function renderizarCarrinho(){
itensCarrinho.innerHTML="";
let subtotal=0;
carrinho.forEach((item,i)=>{
subtotal+=Number(item.preco);
itensCarrinho.innerHTML+=`
<div style="display:flex;justify-content:space-between;margin-bottom:8px;">
<span>${item.nome} - R$ ${Number(item.preco).toFixed(2)}</span>
<button onclick="remover(${i})">❌</button>
</div>`;
});
subtotalEl.innerText=subtotal.toFixed(2);
calcularFrete(subtotal);
}

window.remover=(i)=>{carrinho.splice(i,1);salvar();renderizarCarrinho();};

btnPegarLocalizacao.onclick=()=>{
navigator.geolocation.getCurrentPosition(pos=>{
clienteLat=pos.coords.latitude;
clienteLng=pos.coords.longitude;
localizacaoCliente.value=`https://www.google.com/maps?q=${clienteLat},${clienteLng}`;
calcularFrete(Number(subtotalEl.innerText));
});
};

function calcularFrete(sub){
let frete=10;
if(clienteLat&&clienteLng){
const R=6371;
const latLoja=-9.015;
const lngLoja=-42.700;
const dLat=(clienteLat-latLoja)*Math.PI/180;
const dLon=(clienteLng-lngLoja)*Math.PI/180;
const a=Math.sin(dLat/2)**2+Math.cos(latLoja*Math.PI/180)*Math.cos(clienteLat*Math.PI/180)*Math.sin(dLon/2)**2;
const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
frete=dist*2;
}
freteEl.innerText=frete.toFixed(2);
totalEl.innerText=(sub+frete).toFixed(2);
}

btnFinalizar.onclick=async()=>{
if(carrinho.length===0){alert("Carrinho vazio!");return;}

const {data:config}=await supabase.from("config_site").select("*").eq("app_id",APP_ID).maybeSingle();
const modo=(config?.modo_venda||"").trim();

const pedido={
app_id:APP_ID,
cliente_nome:nomeCliente.value,
telefone:telefoneCliente.value,
endereco:enderecoCliente.value+", "+numeroCliente.value,
bairro:bairroCliente.value,
cidade:cidadeCliente.value,
observacao:obsCliente.value,
latitude:clienteLat,
longitude:clienteLng,
localizacao_link:localizacaoCliente.value,
total:totalEl.innerText,
status:"novo",
itens:carrinho
};

if(modo==="sistema"||modo==="ambos"){
await supabase.from("pedidos").insert([pedido]);
}

if(modo==="whatsapp"||modo==="ambos"){
let msg="🛒 *NOVO PEDIDO*\n\n";
msg+=`Cliente: ${pedido.cliente_nome}\nTelefone: ${pedido.telefone}\n\n`;
carrinho.forEach(p=>{msg+=`• ${p.nome} - R$ ${p.preco}\n`;});
msg+=`\nTotal: R$ ${pedido.total}`;
window.open(`https://wa.me/${config.whatsapp_numero}?text=${encodeURIComponent(msg)}`,"_blank");
}

alert("Pedido enviado!");
carrinho=[];salvar();modalCarrinho.style.display="none";
};

async function carregar(){
const {data:config}=await supabase.from("config_site").select("*").eq("app_id",APP_ID).maybeSingle();
configGlobal=config;
if(config?.logo_url)logoLoja.src=config.logo_url;
if(config?.nome_site)nomeLoja.innerText=config.nome_site;

const {data:produtos}=await supabase.from("produtos").select("*").eq("app_id",APP_ID).eq("ativo",true);

listaProdutos.innerHTML="";
produtos.forEach(p=>{
listaProdutos.innerHTML+=`
<div class="card" onclick='abrirProduto(${JSON.stringify(p)})'>
<h4>${p.nome}</h4>
<div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
<button class="btn-add" onclick='event.stopPropagation();add(${JSON.stringify(p)})'>Adicionar</button>
</div>`;
});
}

window.add=(p)=>{carrinho.push(p);salvar();};

window.abrirProduto=(p)=>{
conteudoProduto.innerHTML=`
<h2>${p.nome}</h2>
<h3>R$ ${p.preco}</h3>
<p>${p.descricao||""}</p>
<button onclick='add(${JSON.stringify(p)})'>Adicionar ao Carrinho</button>`;
modalProduto.style.display="flex";
};

carregar();
salvar();
</script>

</body>
</html>
