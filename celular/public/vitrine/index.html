<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  transition:.3s;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
  display:none;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
  text-align:center;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:200px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}

.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}

.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:270px;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:.3s;
}

.img-produto{
  width:130px;
  height:130px;
  object-fit:contain;
}

.mini-img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
}

.mini-img:hover{
  border-color:#0071e3;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

/* TEMAS */
.tema-natal{ background:#8b0000; }
.tema-natal .topo{ background:#006400; }
.tema-natal .card{ border:2px solid #00ff88; }
.tema-natal .preco{ color:#00ff88; }

.tema-anonovo{ background:linear-gradient(135deg,#000,#1e3a8a); }
.tema-anonovo .preco{ color:#facc15; }

.tema-capivara{ background:#f4b400; }
.tema-capivara .preco{ color:#e5391b; }

/* MODAL */
.modal-produto{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.modal-conteudo{
  background:#fff;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:20px;
  padding:20px;
  position:relative;
}

.modal-conteudo img{
  width:100%;
  max-height:300px;
  object-fit:contain;
}

.fechar-modal{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}

.dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ccc;
  cursor:pointer;
}

.dot.ativa{
  background:#0071e3;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>
<div class="categorias" id="listaCategorias"></div>
<section class="produtos" id="listaProdutos"></section>
<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<div class="modal-produto" id="modalProduto">
  <div class="modal-conteudo">
    <span class="fechar-modal" onclick="fecharModal()">✖</span>
    <img id="modalImg">
    <div class="dots" id="modalDots"></div>
    <h2 id="modalNome"></h2>
    <div class="preco" id="modalPreco"></div>
    <p id="modalDescricao"></p>
    <button class="btn-add" id="modalAdd">Adicionar ao Carrinho</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let todosProdutos = [];

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

async function carregar(){

  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config){
    nomeLoja.innerText = config.nome_site || "";
    if(config.logo_url){
      logoLoja.src = config.logo_url;
      logoLoja.style.display="block";
    }
    if(config.banner_url){
      bannerArea.innerHTML = `<img src="${config.banner_url}">`;
    }
    if(config.tema_site){
      document.body.classList.add("tema-" + config.tema_site);
    }
  }

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos = prods || [];
  criarCategorias();
  renderizar(todosProdutos);
}

function criarCategorias(){
  const categoriasUnicas = [
    "Todas",
    ...new Set(todosProdutos.map(p => p.categoria).filter(Boolean))
  ];

  listaCategorias.innerHTML = categoriasUnicas.map((cat,i)=>`
    <button class="${i===0?'ativo':''}" onclick="filtrarCategoria('${cat}')">
      ${cat}
    </button>
  `).join("");
}

window.filtrarCategoria = function(categoria){
  document.querySelectorAll(".categorias button")
    .forEach(btn => btn.classList.remove("ativo"));

  [...document.querySelectorAll(".categorias button")]
    .find(btn => btn.innerText === categoria)
    ?.classList.add("ativo");

  if(categoria==="Todas"){
    renderizar(todosProdutos);
  }else{
    renderizar(todosProdutos.filter(p=>p.categoria===categoria));
  }
}

function renderizar(lista){
  listaProdutos.innerHTML="";

  lista.forEach(p=>{
    let imagens=[];
    try{ imagens=JSON.parse(p.imagens||"[]"); }catch{}

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div style="display:flex;gap:8px;">
        <div style="display:flex;flex-direction:column;gap:5px;">
          ${imagens.slice(0,3).map(img=>
            `<img src="${img}" class="mini-img">`
          ).join("")}
        </div>
        <div style="flex:1;display:flex;justify-content:center;align-items:center;">
          ${imagens[0] ? `<img src="${imagens[0]}" class="principal img-produto">` : ""}
        </div>
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    const principal = card.querySelector(".principal");

    card.querySelectorAll(".mini-img").forEach(img=>{
      img.onclick = (e)=>{
        e.stopPropagation();
        if(principal) principal.src = img.src;
      };
    });

    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      carrinho.push({ ...p, qtd:1 });
      salvar();
    };

    card.onclick=()=>abrirModal(p, imagens);

    listaProdutos.appendChild(card);
  });
}

function abrirModal(produto, imagens){
  modalProduto.style.display="flex";
  modalNome.innerText=produto.nome;
  modalPreco.innerText="R$ "+Number(produto.preco).toFixed(2);
  modalDescricao.innerText=produto.descricao||"";

  if(!imagens.length) return;

  modalImg.src = imagens[0];
  modalDots.innerHTML = imagens.map((_,i)=>`
    <div class="dot ${i===0?'ativa':''}" onclick="trocarImagem(${i})"></div>
  `).join("");

  window.trocarImagem = function(i){
    modalImg.src = imagens[i];
    document.querySelectorAll(".dot").forEach(d=>d.classList.remove("ativa"));
    document.querySelectorAll(".dot")[i].classList.add("ativa");
  }
}

window.fecharModal = function(){
  modalProduto.style.display="none";
}

carregar();
salvar();
</script>

</body>
</html>
