<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:140px;
}

/* HEADER FIXO */
.topo{
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:100px;
  padding:8px;
  border-radius:25px;
  background:white;
  border:4px solid transparent;
  background-image:
    linear-gradient(white, white),
    linear-gradient(135deg, #00c6ff, #0072ff, #8e2de2);
  background-origin: border-box;
  background-clip: content-box, border-box;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.logo-box div{
  color:white;
  font-size:26px;
  font-weight:bold;
}

/* BANNER */
.banner{
    background: linear-gradient(135deg, #000, #222);
    color:white;
    text-align:center;
    padding:60px 20px;
    background-size:cover;
    background-position:center;
}

.banner h1{font-size:32px;margin-bottom:10px}
.banner p{font-size:18px;opacity:0.9}

/* GRID PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{ transform:translateY(-5px); }

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

/* DETALHE PRODUTO */
.detalhe-container{
  display:grid;
  grid-template-columns: 100px 1fr 1.2fr;
  gap:30px;
  padding:40px;
  background:#fff;
  margin:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.galeria{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.thumb{
  width:80px;
  border-radius:10px;
  cursor:pointer;
  border:2px solid transparent;
}

.thumb.active{
  border:2px solid #0071e3;
}

.imagem-principal img{
  width:100%;
  max-width:400px;
}

.info-produto h1{
  font-size:24px;
  margin-bottom:10px;
}

.preco-grande{
  font-size:32px;
  font-weight:bold;
  color:#000;
}

.btn-comprar{
  background:#00a650;
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
  transition:.3s;
}

.btn-comprar:hover{
  background:#008f43;
}

/* TEMAS */
.tema-natal{ background:#400; }
.tema-anonovo{ background:#002244; }

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box" id="logoBox">
    <img id="logoLoja" src="" alt="Logo">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="banner" id="banner">
    <h1 id="tituloBanner"></h1>
    <p id="subtituloBanner"></p>
</section>

<section class="produtos" id="listaProdutos"></section>

<footer>
© 2026 Sistema Multi Negócio
</footer>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);
const APP_ID = params.get("app_id");
const PRODUTO_ID = params.get("produto");

if(!APP_ID){
    document.body.innerHTML = "<h2 style='text-align:center'>Loja não encontrada</h2>";
}

/* ================= LOJA ================= */

async function carregarLoja(){

    const { data: config } = await supabase
      .from("config_site")
      .select("*")
      .eq("app_id", APP_ID)
      .maybeSingle();

    if(config){
      if(config.nome_site) nomeLoja.innerText = config.nome_site;
      if(config.logo_url) logoLoja.src = config.logo_url;
      if(config.banner_url) banner.style.backgroundImage = `url(${config.banner_url})`;
      if(config.titulo_banner) tituloBanner.innerText = config.titulo_banner;
      if(config.subtitulo_banner) subtituloBanner.innerText = config.subtitulo_banner;
      if(config.tema_site==="natal") document.body.classList.add("tema-natal");
      if(config.tema_site==="anonovo") document.body.classList.add("tema-anonovo");
    }

    if(PRODUTO_ID){
      carregarProdutoDetalhe();
      return;
    }

    const { data: produtos } = await supabase
      .from("produtos")
      .select("*")
      .eq("app_id", APP_ID)
      .eq("ativo", true);

    const lista = document.getElementById("listaProdutos");
    lista.innerHTML="";

    if(!produtos || produtos.length === 0){
      lista.innerHTML="<p>Nenhum produto disponível</p>";
      return;
    }

    produtos.forEach(p=>{
      let imagens=[];
      try{ imagens = JSON.parse(p.imagens||"[]"); }
      catch{ imagens=[]; }

      lista.innerHTML+=`
        <div class="card"
          onclick="window.location.search='?app_id=${APP_ID}&produto=${p.id}'">
          ${imagens[0]
            ? `<img src="${imagens[0]}">`
            : `<div style="height:180px;display:flex;align-items:center;justify-content:center;opacity:.3">Sem imagem</div>`}
          <h3>${p.nome}</h3>
          <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
        </div>
      `;
    });
}

/* ================= DETALHE ================= */

async function carregarProdutoDetalhe(){

  const { data: produto } = await supabase
    .from("produtos")
    .select("*")
    .eq("id", PRODUTO_ID)
    .maybeSingle();

  if(!produto){
    document.body.innerHTML="<h2>Produto não encontrado</h2>";
    return;
  }

  let imagens=[];
  try{ imagens = JSON.parse(produto.imagens||"[]"); }
  catch{ imagens=[]; }

  document.getElementById("listaProdutos").style.display="none";

  const container = document.createElement("div");
  container.className="detalhe-container";

  container.innerHTML=`
    <div class="galeria">
      ${imagens.map((img,i)=>
        `<img src="${img}" class="thumb ${i===0?'active':''}" onclick="trocarImagem(this)">`
      ).join("")}
    </div>

    <div class="imagem-principal">
      <img id="imagemGrande" src="${imagens[0]||''}">
    </div>

    <div class="info-produto">
      <h1>${produto.nome}</h1>
      <div class="preco-grande">R$ ${Number(produto.preco).toFixed(2)}</div>
      <button class="btn-comprar">Comprar agora</button>
    </div>
  `;

  document.body.appendChild(container);
}

/* TROCAR IMAGEM */
window.trocarImagem = function(elemento){
  document.getElementById("imagemGrande").src = elemento.src;
  document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active"));
  elemento.classList.add("active");
}

carregarLoja();

</script>

</body>
</html>
