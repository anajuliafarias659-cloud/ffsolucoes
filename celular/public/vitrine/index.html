<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:200px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner-text{
  padding:10px;
  text-align:center;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:200px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}

.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}

.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:260px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card.aberto{
  grid-column:1/-1;
}

.descricao-produto{
  display:none;
  font-size:14px;
  margin:8px 0;
}

.card.aberto .descricao-produto{
  display:block;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

#modalCarrinho{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.modal{
  background:#fff;
  width:95%;
  max-width:500px;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>

<div class="categorias" id="listaCategorias"></div>

<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<div id="modalCarrinho">
  <div class="modal">
    <button onclick="modalCarrinho.style.display='none'">X</button>
    <h2>Pedido</h2>
    <div id="itensCarrinho"></div>
    <h3>Total: R$ <span id="total">0.00</span></h3>
    <button id="btnFinalizar" class="btn-add">Finalizar</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let todosProdutos=[];

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

async function carregar(){

  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config){
    nomeLoja.innerText = config.nome_site || "";
    if(config.logo_url) logoLoja.src = config.logo_url;

    if(config.banner_url){
      bannerArea.innerHTML =
        `<img src="${config.banner_url}">`;
    } else if(config.banner_descricao){
      bannerArea.innerHTML =
        `<div class="banner-text">${config.banner_descricao}</div>`;
    }
  }

  const { data:cats } = await supabase
    .from("categorias")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  listaCategorias.innerHTML =
    `<button class="ativo" onclick="filtrar('todos',this)">Todos</button>` +
    cats.map(c =>
      `<button onclick="filtrar('${c.nome}',this)">${c.nome}</button>`
    ).join("");

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos = prods || [];
  renderizar(todosProdutos);
}

window.filtrar = function(cat,btn){
  document.querySelectorAll(".categorias button")
    .forEach(b=>b.classList.remove("ativo"));
  btn.classList.add("ativo");

  if(cat==="todos"){
    renderizar(todosProdutos);
  } else {
    renderizar(
      todosProdutos.filter(p=>p.categoria===cat)
    );
  }
}

function renderizar(lista){
  listaProdutos.innerHTML="";
  lista.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h4>${p.nome}</h4>
      <div class="descricao-produto">
        ${p.descricao||""}
      </div>
      <div class="preco">
        R$ ${Number(p.preco).toFixed(2)}
      </div>
      <button class="btn-add">Adicionar</button>
    `;

    card.onclick=()=>card.classList.toggle("aberto");

    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      const existe=carrinho.find(i=>i.id===p.id);
      if(existe) existe.qtd++;
      else carrinho.push({...p,qtd:1});
      salvar();
    };

    listaProdutos.appendChild(card);
  });
}

carregar();
salvar();
</script>

</body>
</html>
