<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitrine</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      transition: 0.3s;
    }

    /* HEADER */
    .topo {
      background: #000;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      transition: 0.3s;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-box > div {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-box img {
      height: 50px;
      width: auto;
      max-height: 50px;
      object-fit: contain;
      background: #fff;
      padding: 4px;
      border-radius: 8px;
      display: none;
    }

    #nomeLoja {
      color: #fff;
      font-weight: bold;
      font-size: 20px;
      line-height: 1.2;
    }

    /* BANNER */
    .banner {
      position: fixed;
      top: 110px;
      left: 0;
      width: 100%;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      z-index: 999;
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* CATEGORIAS */
    .categorias {
      position: fixed;
      top: 220px;
      width: 100%;
      background: #fff;
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      z-index: 998;
      border-bottom: 1px solid #ddd;
    }

    .categorias button {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      background: #eee;
      cursor: pointer;
      white-space: nowrap;
    }

    .categorias button.ativo {
      background: #0071e3;
      color: #fff;
    }

    /* PRODUTOS */
    .produtos {
      margin-top: 290px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    @media (min-width: 768px) {
      .produtos {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .produtos {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .card {
      background: #fff;
      border-radius: 15px;
      padding: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: 0.3s;
    }

    .img-produto {
      width: 130px;
      height: 130px;
      object-fit: contain;
    }

    .mini-img {
      width: 45px;
      height: 45px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .mini-img:hover {
      border-color: #0071e3;
    }

    .preco {
      font-weight: bold;
      color: #0071e3;
    }

    .btn-add {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #0071e3;
      color: #fff;
      cursor: pointer;
    }

    /* CARRINHO */
    #btnCarrinho {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0071e3;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 9999;
    }

    /* TEMAS */
    .tema-natal {
      background: #8b0000;
    }

    .tema-natal .topo {
      background: #006400;
    }

    .tema-natal .banner {
      background: #8b0000;
    }

    .tema-natal .card {
      border: 2px solid #00ff88;
    }

    .tema-natal .preco {
      color: #00ff88;
    }

    .tema-natal .btn-add,
    .tema-natal #btnCarrinho,
    .tema-natal .categorias button.ativo {
      background: #006400;
      color: #fff;
    }

    .tema-anonovo {
      background: linear-gradient(135deg, #000, #1e3a8a);
    }

    .tema-anonovo .topo {
      background: #111827;
    }

    .tema-anonovo .banner {
      background: #000;
    }

    .tema-anonovo .card {
      border: 2px solid #facc15;
    }

    .tema-anonovo .preco {
      color: #facc15;
    }

    .tema-anonovo .btn-add,
    .tema-anonovo #btnCarrinho,
    .tema-anonovo .categorias button.ativo {
      background: #facc15;
      color: #000;
    }

    .tema-capivara {
      background: #f4b400;
    }

    .tema-capivara .topo {
      background: #6b2e1a;
    }

    .tema-capivara .banner {
      background: #d19000;
    }

    .tema-capivara .card {
      border: 2px solid #f4b400;
    }

    .tema-capivara .preco {
      color: #e5391b;
    }

    .tema-capivara .btn-add {
      background: #e5391b;
    }

    .tema-capivara #btnCarrinho {
      background: #6b2e1a;
    }

    .tema-capivara .categorias button.ativo {
      background: #e5391b;
      color: #fff;
    }

    /* MODAIS */
    .modal-produto {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-conteudo {
  background: #fff;
  width: 95%;
  max-width: 500px;
  height: 90vh;
  overflow-y: auto;
  border-radius: 20px;
  padding: 20px;
  position: relative;
}

    .fechar-modal {
  position: sticky;
  top: 0;
  float: right;
  font-size: 22px;
  cursor: pointer;
  background: #fff;
  padding: 4px 6px;
  border-radius: 6px;
  z-index: 10;
}

    input,
    textarea {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: inherit;
    }

    @media (max-width: 600px) {
      .modal-conteudo {
        width: 100%;
        max-width: 100%;
        height: auto;
        max-height: 100vh;
        border-radius: 16px 16px 0 0;
        padding: 16px;
      }
    }

    /* SUGESTÕES */
    .sugestoes-carrinho {
      margin-top: 15px;
    }

    .sugestoes-carrinho h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .lista-sugestoes {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    @media (min-width: 768px) {
      .lista-sugestoes {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .sugestao-item {
      background: #f8f8f8;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .sugestao-item img {
      width: 100%;
      height: 90px;
      object-fit: contain;
      margin-bottom: 8px;
    }

    .sugestao-item .nome {
      font-size: 13px;
      font-weight: bold;
      min-height: 32px;
    }

    .sugestao-item .preco {
      font-size: 14px;
      margin: 6px 0;
    }

    .sugestao-item button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #0071e3;
      color: #fff;
      cursor: pointer;
    }

    .botao-qtd {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    html, body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  -webkit-text-size-adjust: 100%;
}

img {

}

input,
textarea,
select,
button {

}

  .modal-conteudo{

  }

}
  </style>
</head>
<body>
  <header class="topo">
    <div class="logo-box">
      <img id="logoLoja" alt="Logo da loja" />
      <div>
        <div id="nomeLoja"></div>
        <div id="infoLoja" style="font-size: 13px; color: #ddd; margin-top: 4px;"></div>
      </div>
    </div>
  </header>

  <div class="banner" id="bannerArea"></div>
  <div class="categorias" id="listaCategorias"></div>
  <section class="produtos" id="listaProdutos"></section>

  <button id="btnCarrinho">
    🛒 <span id="contadorCarrinho">0</span>
  </button>

  <!-- MODAL PRODUTO -->
  <div class="modal-produto" id="modalProduto">
    <div class="modal-conteudo">
      <span class="fechar-modal" onclick="fecharModal()">✖</span>
      <img id="modalImg" style="width: 100%; max-height: 300px; object-fit: contain;" />
      <div id="modalDots"></div>
      <h2 id="modalNome"></h2>
      <div class="preco" id="modalPreco"></div>
      <p id="modalDescricao"></p>
      <button class="btn-add" id="modalAdd">Adicionar ao Carrinho</button>
    </div>
  </div>

  <!-- MODAL CARRINHO -->
  <div class="modal-produto" id="modalCarrinho">
    <div class="modal-conteudo">
      <span class="fechar-modal" onclick="fecharCarrinho()">✖</span>

      <h2>Finalizar Pedido</h2>

      <div id="itensCarrinho" style="margin-bottom: 15px;"></div>
      <div id="sugestoesCarrinhoArea" style="margin: 15px 0;"></div>

      <h3>Dados do Cliente</h3>
      <input id="clienteNome" placeholder="Seu nome" required />
      <input id="clienteTelefone" placeholder="Telefone / WhatsApp" required />

      <hr style="margin: 10px 0;" />

      <h3>Endereço de Entrega</h3>
      <input id="clienteRua" placeholder="Rua" />
      <input id="clienteNumero" placeholder="Número" />
      <input id="clienteBairro" placeholder="Bairro" />
      <input id="clienteCidade" placeholder="Cidade" />
      <input id="clienteEstado" placeholder="Estado" />
      <input id="clienteCep" placeholder="CEP" />
      <input id="clienteLocalizacao" placeholder="Link da localização (Google Maps)" />

      <div
        id="areaFrete"

        <div style="font-weight: bold; margin-bottom: 8px;">Frete</div>
        <button
          type="button"
          class="btn-add"

      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button
          type="button"
          class="btn-add"
          style="flex: 1; background: #16a34a;"
          onclick="selecionarPagamento('pix_mp')"
        >
          PIX
        </button>

        <button
          type="button"
          class="btn-add"
          style="flex: 1;"
          onclick="selecionarPagamento('mercadopago')"
        >
          Cartão / Mercado Pago
        </button>

        id="areaPixMP"
        style="display: none; margin-top: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 10px;"
      >
        <div style="font-weight: bold; margin-bottom: 6px;">Pagamento via PIX</div>

        <div id="statusPagamento" style="margin-bottom: 10px; font-size: 14px; color: #444;">
          Aguardando geração do PIX...
        </div>

        <div id="pixQrCodeArea" style="text-align: center; margin-top: 10px;"></div>

        <textarea
          id="pixCopiaCola"
          readonly
          style="width: 100%; min-height: 90px; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;"
        ></textarea>

        <button
          type="button"
          class="btn-add"
          style="margin-top: 10px; background: #16a34a;"
          onclick="copiarPixCopiaCola()"
        >
          📋 Copiar código PIX
        </button>
      </div>

      <button
        id="btnGerarPixMP"
        class="btn-add"
        style="display: none; font-size: 16px; padding: 12px; margin-top: 12px; background: #16a34a;"
        onclick="finalizarPedido('pix_mp')"
      >
        ✅ Gerar PIX
      </button>

      <button
        id="btnConfirmarMP"
        class="btn-add"
        style="display: none; font-size: 16px; padding: 12px; margin-top: 12px;"
        onclick="finalizarPedido('mercadopago')"

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const APP_ID = new URLSearchParams(window.location.search).get("app_id");
    const URL_PAGAMENTO = `${SUPABASE_URL}/functions/v1/criar-pagamento-loja`;
    const URL_PAGAMENTO_PIX = `${SUPABASE_URL}/functions/v1/criar-pix-loja`;

    if (!APP_ID) {
      alert("APP_ID não informado.");
    }

    const nomeLoja = document.getElementById("nomeLoja");
    const infoLoja = document.getElementById("infoLoja");
    const logoLoja = document.getElementById("logoLoja");
    const bannerArea = document.getElementById("bannerArea");
    const listaCategorias = document.getElementById("listaCategorias");
    const listaProdutos = document.getElementById("listaProdutos");
    const contadorCarrinho = document.getElementById("contadorCarrinho");
    const btnCarrinho = document.getElementById("btnCarrinho");

    const modalProduto = document.getElementById("modalProduto");
    const modalCarrinho = document.getElementById("modalCarrinho");

    const modalImg = document.getElementById("modalImg");
    const modalDots = document.getElementById("modalDots");
    const modalNome = document.getElementById("modalNome");
    const modalPreco = document.getElementById("modalPreco");
    const modalDescricao = document.getElementById("modalDescricao");
    const modalAdd = document.getElementById("modalAdd");

    const itensCarrinho = document.getElementById("itensCarrinho");

    const CARRINHO_KEY = `carrinho_${APP_ID}`;

    let carrinho = JSON.parse(localStorage.getItem(CARRINHO_KEY)) || [];
    let todosProdutos = [];
    let modoVenda = "whatsapp";
    let numeroWhatsapp = "";
    let corSelecionada = null;
    let produtoAtual = null;
    let valorFrete = 0;
    let subtotalCarrinhoAtual = 0;
    let totalCarrinhoAtual = 0;

    function formatarReal(valor) {
      return Number(valor || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function salvarCarrinhoLocal() {
      localStorage.setItem(CARRINHO_KEY, JSON.stringify(carrinho));
      contadorCarrinho.innerText = carrinho.reduce((acc, item) => acc + Number(item.qtd || 0), 0);
    }

    salvarCarrinhoLocal();

    async function carregar() {
      const { data: config } = await supabase
        .from("config_site")
        .select("*")
        .eq("app_id", APP_ID)
        .maybeSingle();

      if (config) {
        nomeLoja.innerText = config.nome_site || "";

        const rua = config.loja_rua || "";
        const numero = config.loja_numero || "";
        const cidade = config.loja_cidade || "";
        const estado = config.loja_estado || "";
        const telefoneLoja = config.telefone || "";

        let endereco = "";

        if (rua || cidade) {
          endereco = `${rua}${numero ? ", " + numero : ""}`;
          if (cidade) endereco += ` - ${cidade}`;
          if (estado) endereco += `/${estado}`;
        }

        let infoFinal = "";

        if (endereco && telefoneLoja) {
          infoFinal = `${endereco} • 📞 ${telefoneLoja}`;
        } else if (endereco) {
          infoFinal = endereco;
        } else if (telefoneLoja) {
          infoFinal = `📞 ${telefoneLoja}`;
        }

        infoLoja.innerText = infoFinal;

        if (config.logo_url) {
          logoLoja.src = config.logo_url;
          logoLoja.style.display = "block";
        } else {
          logoLoja.style.display = "none";
        }

        const temImagem = config.banner_url && config.banner_url.trim() !== "";
        const temTexto = config.banner_descricao && config.banner_descricao.trim() !== "";

        if (!temImagem && !temTexto) {
          bannerArea.innerHTML = "";
        } else {
          bannerArea.innerHTML = `
            ${temImagem ? `<img src="${config.banner_url}" alt="Banner">` : ""}
            ${temTexto ? `
              <div style="
                position:absolute;
                width:100%;
                height:100%;
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:20px;
                font-weight:bold;
                padding:10px;
                text-shadow:0 2px 5px rgba(0,0,0,0.6);
              ">
                ${config.banner_descricao}
              </div>
            ` : ""}
          `;
        }

        document.body.classList.remove("tema-natal", "tema-anonovo", "tema-capivara");

        if (config.tema_site) {
          document.body.classList.add("tema-" + config.tema_site);
        }

        modoVenda = config.modo_venda || "whatsapp";
        numeroWhatsapp = config.whatsapp_numero || "";
      }

      const { data: prods } = await supabase
        .from("produtos")
        .select("*")
        .eq("app_id", APP_ID)
        .eq("ativo", true);

      todosProdutos = prods || [];
      criarCategorias();
      renderizar(todosProdutos);
    }

    async function verificarStatusPagamento(pedidoId) {
      const { data, error } = await supabase
        .from("pedidos")
        .select("pagamento_status,status")
        .eq("id", pedidoId)
        .single();

      if (error || !data) return;

      const areaStatus = document.getElementById("statusPagamento");
      if (!areaStatus) return;

      if (data.pagamento_status === "approved") {
        areaStatus.innerHTML = `
          <div style="
            background:#ecfdf5;
            border:1px solid #10b981;
            color:#065f46;
            padding:16px;
            border-radius:12px;
            font-weight:bold;
            margin-top:15px;
          ">
            ✅ Pagamento realizado com sucesso.<br>
            📦 Pedido está sendo preparado para envio.
          </div>
        `;
        clearInterval(window.verificacaoPix);
        return;
      }

      if (data.pagamento_status === "pending") {
        areaStatus.innerHTML = `
          <div style="
            background:#fff7ed;
            border:1px solid #fdba74;
            color:#9a3412;
            padding:12px;
            border-radius:12px;
            margin-top:10px;
          ">
            ⏳ Aguardando pagamento do PIX...
          </div>
        `;
        return;
      }

      if (
        data.pagamento_status === "rejected" ||
        data.pagamento_status === "cancelled"
      ) {
        areaStatus.innerHTML = `
          <div style="
            background:#fef2f2;
            border:1px solid #f87171;
            color:#991b1b;
            padding:12px;
            border-radius:12px;
            margin-top:10px;
          ">
            ❌ Pagamento não aprovado.
          </div>
        `;
        clearInterval(window.verificacaoPix);
      }
    }

    async function criarPagamentoPixMP(pedidoId, total, cliente) {
      const payload = {
        appId: APP_ID,
        pedidoId,
        transaction_amount: Number(total),
        description: `Pedido ${pedidoId}`,
        payer: {
          first_name: cliente.nome || "Cliente",
          email: cliente.email || `cliente_${pedidoId}@seudominio.com`,
          identification: {
            type: "CPF",

    function obterRegiaoPorUF(uf) {
      const norte = ["AC", "AP", "AM", "PA", "RO", "RR", "TO"];
      const nordeste = ["AL", "BA", "CE", "MA", "PB", "PE", "PI", "RN", "SE"];
      const centroOeste = ["DF", "GO", "MT", "MS"];
      const sudeste = ["ES", "MG", "RJ", "SP"];
      const sul = ["PR", "RS", "SC"];

      if (norte.includes(uf)) return "norte";
      if (nordeste.includes(uf)) return "nordeste";
      if (centroOeste.includes(uf)) return "centro-oeste";
      if (sudeste.includes(uf)) return "sudeste";
      if (sul.includes(uf)) return "sul";

      return "";
    }

    function calcularPesoCarrinho() {
      let pesoTotal = 0;

      carrinho.forEach((item) => {
        const freteGratis = item.frete_gratis === true || Number(item.peso || 0) <= 0;
        if (freteGratis) return;

        const pesoItem = Number(item.peso || 0);
        const qtdItem = Number(item.qtd || 1);

        pesoTotal += pesoItem * qtdItem;
      });

      return pesoTotal;
    }

    function calcularValorFretePorPesoERegiao(uf, pesoTotal) {
      const regiao = obterRegiaoPorUF(uf);
      const tabela = obterTabelaFrete();

      if (!regiao || !tabela[regiao]) {
        return { erro: "Estado inválido para cálculo de frete." };
      }

      const faixas = tabela[regiao];
      const faixa = faixas.find((f) => pesoTotal <= f.ate);

      if (!faixa) {
        return { erro: "Peso acima do limite de entrega automática." };
      }

      return {
        uf,
        regiao,
        pesoTotal,
        valor: faixa.valor
      };
    }

    window.calcularFrete = function () {
      const estadoInformado = document.getElementById("clienteEstado").value;
      const uf = normalizarEstado(estadoInformado);
      const pesoTotal = calcularPesoCarrinho();
      const area = document.getElementById("freteResultado");

      if (!uf) {
        valorFrete = 0;
        area.innerHTML = "Informe um estado válido para calcular o frete.";
        atualizarResumoCarrinho();
        return;
      }

      if (pesoTotal <= 0) {
        valorFrete = 0;
        area.innerHTML = `
          <div style="color:green;font-weight:bold;">
            🚚 Frete grátis para este pedido
          </div>
        `;
        atualizarResumoCarrinho();
        return;
      }

      const resultado = calcularValorFretePorPesoERegiao(uf, pesoTotal);

      if (resultado.erro) {
        valorFrete = 0;
        area.innerHTML = resultado.erro;
        atualizarResumoCarrinho();
        return;
      }

      valorFrete = Number(resultado.valor || 0);

      area.innerHTML = `
        <div>Estado: <strong>${resultado.uf}</strong></div>
        <div>Região: <strong>${resultado.regiao}</strong></div>
        <div>Peso total: <strong>${resultado.pesoTotal.toFixed(2)} kg</strong></div>
        <div>Frete: <strong>${formatarReal(valorFrete)}</strong></div>
      `;

      atualizarResumoCarrinho();
    };

    function calcularFreteSePossivel() {
      const estadoInformado = document.getElementById("clienteEstado")?.value || "";
      const uf = normalizarEstado(estadoInformado);

      if (!uf) {
        valorFrete = 0;
        return;
      }

      const pesoTotal = calcularPesoCarrinho();
      const resultado = calcularValorFretePorPesoERegiao(uf, pesoTotal);

      if (resultado.erro) {
        valorFrete = 0;
        return;
      }

      valorFrete = Number(resultado.valor || 0);
    }

      let resultadoFrete = { valor: 0, regiao: "", erro: null };

      if (pesoTotalPedido > 0) {
        resultadoFrete = calcularValorFretePorPesoERegiao(ufFrete, pesoTotalPedido);

        if (resultadoFrete.erro) {
          alert(resultadoFrete.erro);
          return;
        }
      }

      valorFrete = Number(resultadoFrete.valor || 0);
      const total = subtotal + valorFrete;

      const pagamentoModoInicial =
        modoEscolhido === "pix_mp" ? "mercadopago_pix" : "mercadopago";

      const pagamentoTipoInicial =
        modoEscolhido === "pix_mp" ? "pix" : "checkout_online";

      const { data: pedidoCriado, error } = await supabase
        .from("pedidos")
        .insert([
          {
            app_id: APP_ID,
            cliente_nome: nome,
            cliente_telefone: telefone,
            cliente_rua: document.getElementById("clienteRua").value,
            cliente_numero: document.getElementById("clienteNumero").value,
            cliente_bairro: document.getElementById("clienteBairro").value,
            cliente_cidade: document.getElementById("clienteCidade").value,
            cliente_estado: document.getElementById("clienteEstado").value,
            cliente_cep: document.getElementById("clienteCep").value,
            cliente_localizacao: document.getElementById("clienteLocalizacao").value,
            itens: carrinho,
            total,
            subtotal,
            frete_valor: valorFrete,
            frete_uf: ufFrete,
            frete_regiao: resultadoFrete.regiao,
            frete_peso_total: pesoTotalPedido,
            status: "aguardando_pagamento",
            pagamento_modo: pagamentoModoInicial,
            pagamento_tipo: pagamentoTipoInicial,
            pagamento_status: "pending"
          }
        ])
        .select("id")
        .single();

      if (error || !pedidoCriado) {
        console.error(error);
        alert("Erro ao salvar pedido.");
        return;
      }

      const pedidoId = pedidoCriado.id;

      if (modoEscolhido === "pix_mp") {
        try {
           const pagamento = await criarPagamentoPixMP(pedidoId, total, { nome });

          const qrBase64 =
            pagamento?.point_of_interaction?.transaction_data?.qr_code_base64 || "";

          const copiaCola =
            pagamento?.point_of_interaction?.transaction_data?.qr_code || "";

          const ticketUrl =
            pagamento?.point_of_interaction?.transaction_data?.ticket_url || "";

          await supabase
            .from("pedidos")
            .update({
              pagamento_modo: "mercadopago_pix",
              pagamento_tipo: "pix",
              pagamento_status: pagamento.status || "pending",
              mp_payment_id: pagamento.id || null,
              mp_qr_code: copiaCola || null,
              mp_ticket_url: ticketUrl || null,
              status: "aguardando_pagamento"
            })
            .eq("id", pedidoId);

          document.getElementById("pixCopiaCola").value = copiaCola || "";

          document.getElementById("pixQrCodeArea").innerHTML = qrBase64
            ? `<img src="data:image/png;base64,${qrBase64}" style="max-width:240px; width:100%;">`
            : ticketUrl
              ? `<a href="${ticketUrl}" target="_blank">Abrir pagamento PIX</a>`
              : "PIX gerado.";

          document.getElementById("statusPagamento").innerHTML = `
            <div style="
              background:#fff7ed;
              border:1px solid #fdba74;
              color:#9a3412;
              padding:12px;
              border-radius:12px;
              margin-top:10px;
            ">
              ⏳ PIX gerado. Aguardando pagamento...
            </div>
          `;

          iniciarVerificacaoPix(pedidoId);
          alert("✅ PIX gerado com sucesso. Agora é só pagar que a tela vai atualizar automaticamente.");
          return;
        } catch (e) {
          console.error(e);
          alert("Erro ao gerar PIX: " + e.message);
          return;
        }
      }

      if (modoEscolhido === "mercadopago") {
        try {
          const pagamento = await criarPagamentoMP(pedidoId, carrinho);

          await supabase
            .from("pedidos")
            .update({
              pagamento_modo: "mercadopago",
              pagamento_tipo: "checkout_online",
              pagamento_status: "pending",
              mp_preference_id: pagamento.id || null,
              status: "aguardando_pagamento"
            })
            .eq("id", pedidoId);

          const linkPagamento = pagamento.init_point || pagamento.sandbox_init_point;

          if (!linkPagamento) {
            alert("Mercado Pago não retornou o link.");
            return;
          }

          window.location.href = linkPagamento;
          return;
        } catch (e) {
          console.error(e);
          alert("Erro ao gerar pagamento: " + e.message);
          return;
        }
      }
    };

    carregar();
  </script>
</body>
</html>
