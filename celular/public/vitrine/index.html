<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  transition:.3s;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:9999;
  transition:.3s;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:5px;
  border-radius:10px;
  display:none;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* BANNER */
.banner{
  position:fixed;
  top:90px;
  left:0;
  width:100%;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:#fff;
  z-index:999;
  overflow:hidden;
  text-align:center;
  transition:.3s;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CATEGORIAS */
.categorias{
  position:fixed;
  top:200px;
  width:100%;
  background:#fff;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  z-index:998;
  border-bottom:1px solid #ddd;
}

.categorias button{
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
  white-space:nowrap;
}

.categorias button.ativo{
  background:#0071e3;
  color:#fff;
}

/* PRODUTOS */
.produtos{
  margin-top:270px;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:.3s;
}

.img-produto{
  width:130px;
  height:130px;
  object-fit:contain;
}

.mini-img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
}

.mini-img:hover{
  border-color:#0071e3;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#0071e3;
  color:#fff;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
}

/* TEMAS */

.tema-natal{ background:#8b0000; }
.tema-natal .topo{ background:#006400; }
.tema-natal .banner{ background:#8b0000; }
.tema-natal .card{ border:2px solid #00ff88; }
.tema-natal .preco{ color:#00ff88; }
.tema-natal .btn-add,
.tema-natal #btnCarrinho,
.tema-natal .categorias button.ativo{
  background:#006400;
  color:#fff;
}

.tema-anonovo{ background:linear-gradient(135deg,#000,#1e3a8a); }
.tema-anonovo .topo{ background:#111827; }
.tema-anonovo .banner{ background:#000; }
.tema-anonovo .card{ border:2px solid #facc15; }
.tema-anonovo .preco{ color:#facc15; }
.tema-anonovo .btn-add,
.tema-anonovo #btnCarrinho,
.tema-anonovo .categorias button.ativo{
  background:#facc15;
  color:#000;
}

.tema-capivara{ background:#f4b400; }
.tema-capivara .topo{ background:#6b2e1a; }
.tema-capivara .banner{ background:#d19000; }
.tema-capivara .card{ border:2px solid #f4b400; }
.tema-capivara .preco{ color:#e5391b; }
.tema-capivara .btn-add{ background:#e5391b; }
.tema-capivara #btnCarrinho{ background:#6b2e1a; }
.tema-capivara .categorias button.ativo{
  background:#e5391b;
  color:#fff;
}

/* MODAIS */
.modal-produto{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
}

.modal-conteudo{
  background:#fff;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
  border-radius:20px;
  padding:20px;
  position:relative;
}

.fechar-modal{
  position:absolute;
  top:10px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<div class="banner" id="bannerArea"></div>
<div class="categorias" id="listaCategorias"></div>
<section class="produtos" id="listaProdutos"></section>
<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- MODAL PRODUTO -->
<div class="modal-produto" id="modalProduto">
  <div class="modal-conteudo">
    <span class="fechar-modal" onclick="fecharModal()">✖</span>
    <img id="modalImg" style="width:100%;max-height:300px;object-fit:contain;">
    <div id="modalDots"></div>
    <h2 id="modalNome"></h2>
    <div class="preco" id="modalPreco"></div>
    <p id="modalDescricao"></p>
    <button class="btn-add" id="modalAdd">Adicionar ao Carrinho</button>
  </div>
</div>

<!-- MODAL CARRINHO -->
<div class="modal-produto" id="modalCarrinho">
  <div class="modal-conteudo">
    <span class="fechar-modal" onclick="fecharCarrinho()">✖</span>
    <h2>Finalizar Pedido</h2>
    <div id="itensCarrinho"></div>

    <input id="clienteNome" placeholder="Seu nome">
    <input id="clienteTelefone" placeholder="Telefone">

    <input id="clienteRua" placeholder="Rua">
    <input id="clienteNumero" placeholder="Número">
    <input id="clienteBairro" placeholder="Bairro">
    <input id="clienteCidade" placeholder="Cidade">
    <input id="clienteEstado" placeholder="Estado">
    <input id="clienteCep" placeholder="CEP">
    <input id="clienteLocalizacao" placeholder="Link da localização">

    <button class="btn-add" onclick="finalizarPedido()">Confirmar Pedido</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient("sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw");
const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let todosProdutos = [];
let modoVenda = "whatsapp";
let numeroWhatsapp = "";

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  contadorCarrinho.innerText =
    carrinho.reduce((acc,i)=>acc+(i.qtd||1),0);
}

async function carregar(){
  const { data:config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  if(config){
    nomeLoja.innerText = config.nome_site || "";
    if(config.logo_url){
      logoLoja.src = config.logo_url;
      logoLoja.style.display="block";
    }
    if(config.banner_url){
      bannerArea.innerHTML = `<img src="${config.banner_url}">`;
    }
    if(config.tema_site){
      document.body.classList.add("tema-"+config.tema_site);
    }
    modoVenda = config.vendas_modo || "whatsapp";
    numeroWhatsapp = config.whatsapp_numero || "";
  }

  const { data:prods } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  todosProdutos = prods || [];
  criarCategorias();
  renderizar(todosProdutos);
}

function criarCategorias(){
  const categorias = ["Todas",...new Set(todosProdutos.map(p=>p.categoria).filter(Boolean))];
  listaCategorias.innerHTML = categorias.map((cat,i)=>
    `<button class="${i===0?'ativo':''}" onclick="filtrarCategoria('${cat}')">${cat}</button>`
  ).join("");
}

window.filtrarCategoria=function(cat){
  document.querySelectorAll(".categorias button").forEach(b=>b.classList.remove("ativo"));
  [...document.querySelectorAll(".categorias button")]
    .find(b=>b.innerText===cat)?.classList.add("ativo");
  renderizar(cat==="Todas"?todosProdutos:todosProdutos.filter(p=>p.categoria===cat));
}

function renderizar(lista){
  listaProdutos.innerHTML="";
  lista.forEach(p=>{
    let imgs=[];
    try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div style="display:flex;gap:8px;">
        <div style="display:flex;flex-direction:column;gap:5px;">
          ${imgs.slice(0,3).map(i=>`<img src="${i}" class="mini-img">`).join("")}
        </div>
        <div style="flex:1;text-align:center;">
          ${imgs[0]?`<img src="${imgs[0]}" class="img-produto">`:""}
        </div>
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;
    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      carrinho.push({...p,qtd:1});
      salvar();
    };
    card.onclick=()=>abrirModal(p,imgs);
    listaProdutos.appendChild(card);
  });
}

function abrirModal(produto,imgs){
  modalProduto.style.display="flex";
  modalNome.innerText=produto.nome;
  modalPreco.innerText="R$ "+Number(produto.preco).toFixed(2);
  modalDescricao.innerText=produto.descricao||"";
  modalImg.src=imgs[0]||"";
}

window.fecharModal=()=>modalProduto.style.display="none";

btnCarrinho.onclick=()=>abrirCarrinho();

function abrirCarrinho(){
  if(!carrinho.length)return alert("Carrinho vazio");
  itensCarrinho.innerHTML=carrinho.map(i=>`
    <div>${i.nome} x${i.qtd} - R$ ${(i.preco*i.qtd).toFixed(2)}</div>
  `).join("");
  modalCarrinho.style.display="flex";
}

window.fecharCarrinho=()=>modalCarrinho.style.display="none";

window.finalizarPedido=async function(){
  if(!carrinho.length)return;

  const nome=clienteNome.value;
  const telefone=clienteTelefone.value;

  if(!nome||!telefone)return alert("Preencha nome e telefone");

  let total=0;
  let texto=`🛒 NOVO PEDIDO\n\n👤 ${nome}\n📞 ${telefone}\n\n`;

  carrinho.forEach(i=>{
    total+=i.preco*i.qtd;
    texto+=`${i.nome} x${i.qtd} = R$ ${(i.preco*i.qtd).toFixed(2)}\n`;
  });

  texto+=`\nTotal: R$ ${total.toFixed(2)}`;

  if(modoVenda==="whatsapp"){
    window.open(`https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(texto)}`,"_blank");
  }else{
    await supabase.from("pedidos").insert([{
      app_id:APP_ID,
      cliente_nome:nome,
      cliente_telefone:telefone,
      itens:carrinho,
      total:total,
      status:"novo"
    }]);
    alert("Pedido enviado!");
  }

  carrinho=[];
  salvar();
  fecharCarrinho();
}

carregar();
salvar();
</script>

</body>
</html>
