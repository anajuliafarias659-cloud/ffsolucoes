<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:150px;
}

/* HEADER */
.topo{
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding:15px 40px;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:20px;
}

.logo-box img{
  height:110px;
  padding:8px;
  border-radius:20px;
  background:white;
}

/* BANNER */
.banner{
    background: linear-gradient(135deg, #000, #222);
    color:white;
    text-align:center;
    padding:60px 20px;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
}

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

.btn-add{
  background:#0071e3;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
}

.campo{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:6px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header class="topo" id="topo">
  <div class="logo-box">
    <img id="logoLoja" src="" alt="Logo">
    <div id="nomeLoja" style="color:white;font-size:26px;font-weight:bold;"></div>
  </div>
</header>

<section class="banner" id="banner">
    <h1 id="tituloBanner"></h1>
    <p id="subtituloBanner"></p>
</section>

<section class="produtos" id="listaProdutos"></section>

<footer>
© 2026 Sistema Multi Negócio
</footer>

<!-- BOTÃO CARRINHO -->
<button id="btnCarrinho" style="
position:fixed;
bottom:20px;
right:20px;
background:#0071e3;
color:white;
border:none;
padding:15px 20px;
border-radius:50px;
font-size:18px;
cursor:pointer;
z-index:9999;">
🛒 <span id="contadorCarrinho">0</span>
</button>

<!-- MODAL -->
<div id="modalCarrinho" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:99999;
justify-content:center;
align-items:center;">

<div style="
background:white;
width:95%;
max-width:500px;
max-height:90vh;
overflow:auto;
border-radius:15px;
padding:20px;">

<h2>Seu Pedido</h2>
<div id="itensCarrinho"></div>
<hr>
<h3>Total: R$ <span id="totalCarrinho">0.00</span></h3>
<h4>Frete: R$ <span id="valorFrete">0.00</span></h4>

<hr>

<h3>Entrega</h3>
<input class="campo" id="nomeCliente" placeholder="Nome">
<input class="campo" id="telefoneCliente" placeholder="Telefone">
<input class="campo" id="enderecoCliente" placeholder="Endereço">
<input class="campo" id="numeroCliente" placeholder="Número">
<input class="campo" id="bairroCliente" placeholder="Bairro">
<input class="campo" id="cidadeCliente" placeholder="Cidade">
<textarea class="campo" id="obsCliente" placeholder="Observação"></textarea>

<button onclick="finalizarPedido()" style="
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:8px;">
Finalizar Pedido
</button>

<br><br>
<button onclick="fecharCarrinho()" style="
width:100%;
padding:10px;
background:#999;
color:white;
border:none;
border-radius:8px;">
Fechar
</button>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

/* ================= CARRINHO ================= */

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvarCarrinho(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  atualizarContador();
}

function atualizarContador(){
  document.getElementById("contadorCarrinho").innerText = carrinho.length;
}

function adicionarAoCarrinho(produto){
  carrinho.push(produto);
  salvarCarrinho();
  alert("Adicionado ao carrinho");
}

document.getElementById("btnCarrinho").onclick = ()=>{
  document.getElementById("modalCarrinho").style.display="flex";
  renderizarCarrinho();
};

window.fecharCarrinho = ()=>{
  document.getElementById("modalCarrinho").style.display="none";
};

function renderizarCarrinho(){
  const container = document.getElementById("itensCarrinho");
  container.innerHTML="";
  let total=0;

  carrinho.forEach(item=>{
    total+=Number(item.preco);
    container.innerHTML+=`
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span>${item.nome}</span>
        <span>R$ ${Number(item.preco).toFixed(2)}</span>
      </div>
    `;
  });

  document.getElementById("totalCarrinho").innerText = total.toFixed(2);
  calcularFrete(total);
}

/* ================= FRETE ================= */

const lojaLat = -9.015;
const lojaLng = -42.700;

function calcularFrete(total){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const distancia = calcularDistancia(
        lojaLat, lojaLng,
        pos.coords.latitude,
        pos.coords.longitude
      );

      const frete = distancia * 2;
      document.getElementById("valorFrete").innerText = frete.toFixed(2);
      document.getElementById("totalCarrinho").innerText =
        (total + frete).toFixed(2);
    });
  }
}

function calcularDistancia(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ================= FINALIZAR ================= */

window.finalizarPedido = ()=>{
  if(carrinho.length===0){
    alert("Carrinho vazio");
    return;
  }

  alert("Pedido enviado!");

  carrinho=[];
  salvarCarrinho();
  fecharCarrinho();
};

/* ================= PRODUTOS ================= */

async function carregarLoja(){

  const { data: produtos } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true);

  const lista = document.getElementById("listaProdutos");

  produtos?.forEach(p=>{
    let imagens=[];
    try{ imagens=JSON.parse(p.imagens||"[]"); }catch{}

    lista.innerHTML+=`
      <div class="card">
        ${imagens[0]?`<img src="${imagens[0]}">`:""}
        <h3>${p.nome}</h3>
        <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
        <button class="btn-add"
        onclick='adicionarAoCarrinho(${JSON.stringify(p)})'>
        Adicionar
        </button>
      </div>
    `;
  });
}

carregarLoja();
atualizarContador();
</script>

</body>
</html>
