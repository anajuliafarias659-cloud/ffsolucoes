<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:150px;
}

/* HEADER FIXO */
.topo{
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding:15px 40px;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:20px;
}

.logo-box img{
  height:120px;
  padding:10px;
  border-radius:25px;
  background:white;
  border:4px solid transparent;
  background-image:
    linear-gradient(white, white),
    linear-gradient(135deg, #00c6ff, #0072ff, #8e2de2);
  background-origin: border-box;
  background-clip: content-box, border-box;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.logo-box div{
  color:white;
  font-size:28px;
  font-weight:bold;
  letter-spacing:1px;
}

/* RESPONSIVO */
@media(max-width:768px){
  .logo-box img{
    height:80px;
  }
  .logo-box div{
    font-size:20px;
  }
}

/* BANNER */
.banner{
    background: linear-gradient(135deg, #000, #222);
    color:white;
    text-align:center;
    padding:60px 20px;
    background-size:cover;
    background-position:center;
}

.banner h1{font-size:32px;margin-bottom:10px}
.banner p{font-size:18px;opacity:0.9}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{ transform:translateY(-5px); }

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

/* TEMAS */
.tema-natal{ background:#400; }
.tema-anonovo{ background:#002244; }

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header class="topo" id="topo">
  <div class="logo-box">
    <img id="logoLoja" src="" alt="Logo">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="banner" id="banner">
    <h1 id="tituloBanner"></h1>
    <p id="subtituloBanner"></p>
</section>

<section class="produtos" id="listaProdutos"></section>

<footer>
© 2026 Sistema Multi Negócio
</footer>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);
const APP_ID = params.get("app_id");

if(!APP_ID){
    document.body.innerHTML = "<h2 style='text-align:center'>Loja não encontrada</h2>";
}

async function carregarLoja(){

    const { data: config } = await supabase
      .from("config_site")
      .select("*")
      .eq("app_id", APP_ID)
      .maybeSingle();

    const nomeElemento = document.getElementById("nomeLoja");
    const logoElemento = document.getElementById("logoLoja");
    const topo = document.getElementById("topo");
    const tituloBanner = document.getElementById("tituloBanner");
    const subtituloBanner = document.getElementById("subtituloBanner");

    let temHeader = false;

    /* NOME OPCIONAL */
    if(config?.nome_site?.trim()){
      nomeElemento.innerText = config.nome_site;
      nomeElemento.style.display = "block";
      temHeader = true;
    } else {
      nomeElemento.style.display = "none";
    }

    /* LOGO OPCIONAL */
    if(config?.logo_url){
      logoElemento.src = config.logo_url;
      logoElemento.style.display = "block";
      temHeader = true;
    } else {
      logoElemento.style.display = "none";
    }

    /* ESCONDE HEADER SE NÃO TIVER NADA */
    if(!temHeader){
      topo.style.display = "none";
      document.body.style.paddingTop = "0px";
    }

    /* BANNER */
    if(config?.banner_url){
      document.getElementById("banner").style.backgroundImage =
        `url(${config.banner_url})`;
    }

    if(config?.titulo_banner?.trim()){
      tituloBanner.innerText = config.titulo_banner;
    } else {
      tituloBanner.style.display="none";
    }

    if(config?.subtitulo_banner?.trim()){
      subtituloBanner.innerText = config.subtitulo_banner;
    } else {
      subtituloBanner.style.display="none";
    }

    if(config?.tema_site === "natal"){
      document.body.classList.add("tema-natal");
    }

    if(config?.tema_site === "anonovo"){
      document.body.classList.add("tema-anonovo");
    }

    /* PRODUTOS */
    const { data: produtos } = await supabase
      .from("produtos")
      .select("*")
      .eq("app_id", APP_ID)
      .eq("ativo", true);

    const lista = document.getElementById("listaProdutos");
    lista.innerHTML="";

    if(!produtos || produtos.length === 0){
      lista.innerHTML =
        "<p style='text-align:center;width:100%'>Nenhum produto disponível</p>";
      return;
    }

    produtos.forEach(p=>{
      let imagens=[];
      try{ imagens = JSON.parse(p.imagens||"[]"); }
      catch{ imagens=[]; }

      lista.innerHTML+=`
        <div class="card">
          ${imagens[0]
            ? `<img src="${imagens[0]}">`
            : `<div style="height:180px;display:flex;align-items:center;justify-content:center;opacity:.3">Sem imagem</div>`}
          <h3>${p.nome}</h3>
          <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
        </div>
      `;
    });
}

carregarLoja();
</script>

</body>
</html>
