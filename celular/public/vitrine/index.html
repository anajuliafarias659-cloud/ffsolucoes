<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  padding-top:120px;
}

/* HEADER */
.topo{
  background:#000;
  padding:15px 20px;
  display:flex;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-box img{
  height:60px;
  background:#fff;
  padding:6px;
  border-radius:12px;
}

#nomeLoja{
  color:#fff;
  font-weight:bold;
}

/* PRODUTOS */
.produtos{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  cursor:pointer;
}

.galeria{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.miniaturas{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.miniaturas img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
}

.miniaturas img:hover{
  border-color:#0071e3;
}

.imagem-principal img{
  width:120px;
  height:120px;
  object-fit:contain;
}

.preco{
  font-weight:bold;
  color:#0071e3;
}

.btn-add{
  width:100%;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* CARRINHO */
#btnCarrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0071e3;
  color:#fff;
  border:none;
  padding:14px 18px;
  border-radius:50px;
  font-size:18px;
  cursor:pointer;
}

#modalCarrinho,
#modalProduto{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.modal{
  background:#fff;
  width:95%;
  max-width:500px;
  border-radius:15px;
  padding:20px;
}

.modal-produto{
  background:#fff;
  width:95%;
  max-width:800px;
  border-radius:15px;
  padding:20px;
  position:relative;
}

.campo{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>
<body>

<header class="topo">
  <div class="logo-box">
    <img id="logoLoja">
    <div id="nomeLoja"></div>
  </div>
</header>

<section class="produtos" id="listaProdutos"></section>

<button id="btnCarrinho">🛒 <span id="contadorCarrinho">0</span></button>

<!-- CARRINHO -->
<div id="modalCarrinho">
  <div class="modal">
    <h2>Seu Pedido</h2>
    <div id="itensCarrinho"></div>
    <h3>Total: R$ <span id="total">0.00</span></h3>

    <input class="campo" id="nomeCliente" placeholder="Nome">
    <input class="campo" id="telefoneCliente" placeholder="Telefone">
    <input class="campo" id="enderecoCliente" placeholder="Endereço">
    <input class="campo" id="bairroCliente" placeholder="Bairro">

    <button id="btnFinalizar" class="btn-add">Finalizar Pedido</button>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div id="modalProduto">
  <div class="modal-produto">
    <button id="fecharProduto" style="position:absolute;right:15px;top:10px;">✕</button>
    <div id="conteudoProduto"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let configGlobal=null;

const btnCarrinho = document.getElementById("btnCarrinho");
const modalCarrinho = document.getElementById("modalCarrinho");
const itensCarrinho = document.getElementById("itensCarrinho");
const totalEl = document.getElementById("total");
const btnFinalizar = document.getElementById("btnFinalizar");

function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  document.getElementById("contadorCarrinho").innerText=carrinho.length;
}

btnCarrinho.onclick=()=>{
  modalCarrinho.style.display="flex";
  renderCarrinho();
};

function renderCarrinho(){
  itensCarrinho.innerHTML="";
  let total=0;

  carrinho.forEach((item,i)=>{
    total+=Number(item.preco);
    itensCarrinho.innerHTML+=`
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span>${item.nome}</span>
        <span>R$ ${Number(item.preco).toFixed(2)}</span>
      </div>`;
  });

  totalEl.innerText=total.toFixed(2);
}

async function carregar(){
  const {data:config}=await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

  configGlobal=config;

  if(config?.logo_url) logoLoja.src=config.logo_url;
  if(config?.nome_site) nomeLoja.innerText=config.nome_site;

  const {data:produtos}=await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

  renderProdutos(produtos||[]);
}

function renderProdutos(lista){
  const container=document.getElementById("listaProdutos");
  container.innerHTML="";

  lista.forEach(p=>{
    let imgs=[];
    try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="galeria">
        <div class="miniaturas">
          ${imgs.slice(0,3).map(img=>`<img src="${img}">`).join("")}
        </div>
        <div class="imagem-principal">
          ${imgs[0]?`<img src="${imgs[0]}" class="principal">`:""}
        </div>
      </div>
      <h4>${p.nome}</h4>
      <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      <button class="btn-add">Adicionar</button>
    `;

    const principal=card.querySelector(".principal");

    card.querySelectorAll(".miniaturas img").forEach(img=>{
      img.addEventListener("click",(e)=>{
        e.stopPropagation();
        if(principal) principal.src=img.src;
      });
    });

    card.addEventListener("click",(e)=>{
      if(!e.target.classList.contains("btn-add")){
        abrirProduto(p);
      }
    });

    card.querySelector(".btn-add").onclick=(e)=>{
      e.stopPropagation();
      carrinho.push(p);
      salvar();
    };

    container.appendChild(card);
  });
}

function abrirProduto(p){
  let imgs=[];
  try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

  conteudoProduto.innerHTML=`
    <h2>${p.nome}</h2>
    <div style="display:flex;gap:20px;">
      <div>
        ${imgs.slice(0,3).map(img=>`<img src="${img}" style="width:60px;height:60px;display:block;margin-bottom:5px;cursor:pointer;">`).join("")}
      </div>
      <div>
        ${imgs[0]?`<img src="${imgs[0]}" id="modalPrincipal" style="width:300px;height:300px;object-fit:contain;">`:""}
      </div>
    </div>
    <button class="btn-add" id="addModal">Adicionar ao Carrinho</button>
  `;

  const principal=document.getElementById("modalPrincipal");

  document.querySelectorAll("#conteudoProduto img").forEach(img=>{
    img.addEventListener("click",()=>{
      if(principal) principal.src=img.src;
    });
  });

  document.getElementById("addModal").onclick=()=>{
    carrinho.push(p);
    salvar();
    modalProduto.style.display="none";
  };

  modalProduto.style.display="flex";
}

document.getElementById("fecharProduto").onclick=()=>{
  modalProduto.style.display="none";
};

btnFinalizar.onclick=()=>{
  if(!configGlobal?.whatsapp_numero) return;

  let total=0;
  carrinho.forEach(i=> total+=Number(i.preco));

  const nome=document.getElementById("nomeCliente").value;
  const telefone=document.getElementById("telefoneCliente").value;
  const endereco=document.getElementById("enderecoCliente").value;
  const bairro=document.getElementById("bairroCliente").value;

  let msg="🛒 *NOVO PEDIDO*\n\n";
  msg+=`👤 Cliente: ${nome}\n`;
  msg+=`📞 Telefone: ${telefone}\n`;
  msg+=`📍 ${endereco} - ${bairro}\n\n`;

  carrinho.forEach(i=>{
    msg+=`• ${i.nome} - R$ ${Number(i.preco).toFixed(2)}\n`;
  });

  msg+=`\n💰 Total: R$ ${total.toFixed(2)}`;

  window.open(`https://wa.me/${configGlobal.whatsapp_numero}?text=${encodeURIComponent(msg)}`,"_blank");

  carrinho=[];
  salvar();
  modalCarrinho.style.display="none";
};

carregar();
salvar();
</script>
</body>
</html>
