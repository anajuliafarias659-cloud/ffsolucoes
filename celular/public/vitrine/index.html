<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:140px;
}

/* HEADER */
.topo{
  background: rgba(0,0,0,0.85);
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:fixed;
  top:0;
  width:100%;
  z-index:999;
  color:#fff;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    cursor:pointer;
}

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
}

/* DETALHE */
.detalhe-container{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:30px;
  padding:40px;
  background:#fff;
  margin:40px;
  border-radius:20px;
}

.btn-comprar{
  background:#00a650;
  color:white;
  border:none;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:350px;
}

.modal-content input,select,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="topo">Loja Online</div>

<section class="produtos" id="listaProdutos"></section>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);
const APP_ID = params.get("app_id");
const PRODUTO_ID = params.get("produto");

async function carregarProdutos(){

  const { data: produtos } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true);

  const lista = document.getElementById("listaProdutos");
  lista.innerHTML="";

  produtos.forEach(p=>{
    let imagens=[];
    try{ imagens = JSON.parse(p.imagens||"[]"); }
    catch{ imagens=[]; }

    lista.innerHTML+=`
      <div class="card"
        onclick="window.location.search='?app_id=${APP_ID}&produto=${p.id}'">
        ${imagens[0]?`<img src="${imagens[0]}">`:""}
        <h3>${p.nome}</h3>
        <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
      </div>
    `;
  });
}

async function carregarProdutoDetalhe(){

  const { data: produto } = await supabase
    .from("produtos")
    .select("*")
    .eq("id", PRODUTO_ID)
    .single();

  document.getElementById("listaProdutos").style.display="none";

  const div = document.createElement("div");
  div.className="detalhe-container";
  div.innerHTML=`
    <div>
      <img src="${JSON.parse(produto.imagens||'[]')[0]||''}" width="100%">
    </div>
    <div>
      <h2>${produto.nome}</h2>
      <h1>R$ ${Number(produto.preco).toFixed(2)}</h1>
      <button class="btn-comprar" onclick="abrirModal('${produto.id}','${produto.nome}',${produto.preco})">
        Comprar agora
      </button>
    </div>
  `;
  document.body.appendChild(div);
}

window.abrirModal=function(id,nome,preco){

  const modal=document.createElement("div");
  modal.className="modal";
  modal.innerHTML=`
    <div class="modal-content">
      <h3>Finalizar Compra</h3>
      <input id="cliente_nome" placeholder="Seu nome">
      <input id="telefone" placeholder="Telefone">
      <input id="endereco" placeholder="Endereço">
      <select id="forma_pagamento">
        <option value="PIX">PIX</option>
        <option value="Cartão">Cartão</option>
        <option value="Dinheiro">Dinheiro</option>
      </select>
      <textarea id="observacao" placeholder="Observação"></textarea>
      <button onclick="finalizarPedido('${id}','${nome}',${preco})">
        Confirmar Pedido
      </button>
    </div>
  `;
  document.body.appendChild(modal);
}

window.finalizarPedido=async function(id,nome,preco){

  const cliente_nome=document.getElementById("cliente_nome").value;
  const telefone=document.getElementById("telefone").value;
  const endereco=document.getElementById("endereco").value;
  const forma_pagamento=document.getElementById("forma_pagamento").value;
  const observacao=document.getElementById("observacao").value;

  const { data: pedido } = await supabase
    .from("pedidos")
    .insert([{
      app_id:APP_ID,
      cliente_nome,
      telefone,
      endereco,
      forma_pagamento,
      observacao,
      status:"novo",
      total:preco
    }])
    .select()
    .single();

  await supabase
    .from("pedido_itens")
    .insert([{
      pedido_id:pedido.id,
      nome_produto:nome,
      quantidade:1,
      preco:preco
    }]);

  alert("Pedido realizado com sucesso!");
  location.href="?app_id="+APP_ID;
}

if(PRODUTO_ID){
  carregarProdutoDetalhe();
}else{
  carregarProdutos();
}
</script>

</body>
</html>
