<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:120px;
}

/* HEADER */
.topo{
    background:#111;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
}

.logo-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-box img{
    height:60px;
    background:white;
    border-radius:10px;
    padding:5px;
}

.cart-btn{
    cursor:pointer;
    font-size:20px;
    background:#00b853;
    padding:8px 14px;
    border-radius:8px;
}

/* BANNER */
.banner{
    padding:70px 20px;
    text-align:center;
    color:white;
    background-size:cover;
    background-position:center;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
    max-width:180px;
    height:180px;
    object-fit:contain;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
}

.btn{
    margin-top:10px;
    background:#0071e3;
    color:white;
    border:none;
    padding:8px;
    width:100%;
    border-radius:8px;
    cursor:pointer;
}

/* CARRINHO LATERAL */
.carrinho{
    position:fixed;
    top:0;
    right:-400px;
    width:350px;
    height:100%;
    background:white;
    box-shadow:-5px 0 20px rgba(0,0,0,0.2);
    padding:20px;
    transition:0.4s;
    z-index:2000;
    overflow-y:auto;
}

.carrinho.aberto{
    right:0;
}

.item-cart{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

.checkout{
    margin-top:15px;
}

.checkout input{
    width:100%;
    padding:8px;
    margin-bottom:8px;
}

.finalizar{
    background:#00b853;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<header class="topo">
    <div class="logo-box">
        <img id="logoLoja">
        <div id="nomeLoja"></div>
    </div>
    <div class="cart-btn" onclick="toggleCarrinho()">
        🛒 Carrinho (<span id="qtdCart">0</span>)
    </div>
</header>

<section class="banner" id="banner"></section>
<section class="produtos" id="listaProdutos"></section>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
    <h2>Seu Carrinho</h2>
    <div id="itensCarrinho"></div>

    <div class="checkout">
        <input placeholder="Seu nome" id="clienteNome">
        <input placeholder="CEP" id="clienteCep">
        <button class="btn" onclick="calcularFrete()">Calcular Frete</button>
        <div id="freteInfo"></div>
        <hr>
        <div id="totalFinal"></div>
        <button class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
    </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(window.location.search).get("app_id");

let carrinho = [];
let valorFrete = 0;

window.toggleCarrinho = function(){
    document.getElementById("carrinho").classList.toggle("aberto");
}

function atualizarCarrinho(){
    const div = document.getElementById("itensCarrinho");
    div.innerHTML="";
    let total=0;

    carrinho.forEach((item,i)=>{
        total += item.preco * item.qtd;
        div.innerHTML+=`
            <div class="item-cart">
                ${item.nome}<br>
                R$ ${item.preco} x ${item.qtd}
                <button onclick="removerItem(${i})">❌</button>
            </div>
        `;
    });

    document.getElementById("qtdCart").innerText = carrinho.length;
    document.getElementById("totalFinal").innerHTML =
        "<b>Total Produtos:</b> R$ "+total.toFixed(2);
}

window.removerItem = function(i){
    carrinho.splice(i,1);
    atualizarCarrinho();
}

window.adicionarCarrinho = function(prod){
    carrinho.push({...prod,qtd:1});
    atualizarCarrinho();
}

window.calcularFrete = function(){
    const cep = document.getElementById("clienteCep").value;
    if(cep.length<8){
        alert("CEP inválido");
        return;
    }
    valorFrete = 30 + Math.random()*20;
    document.getElementById("freteInfo").innerHTML =
        "Frete: R$ "+valorFrete.toFixed(2);
}

window.finalizarPedido = async function(){
    const nome = document.getElementById("clienteNome").value;
    const cep = document.getElementById("clienteCep").value;

    let totalProdutos = carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);
    let total = totalProdutos + valorFrete;

    const { data: pedido } = await supabase
    .from("pedidos")
    .insert({
        app_id:APP_ID,
        cliente_nome:nome,
        cliente_cep:cep,
        valor_produtos:totalProdutos,
        valor_frete:valorFrete,
        valor_total:total
    })
    .select()
    .single();

    for(const item of carrinho){
        await supabase.from("pedido_itens").insert({
            pedido_id:pedido.id,
            produto_id:item.id,
            nome_produto:item.nome,
            preco:item.preco,
            quantidade:item.qtd
        });
    }

    alert("Pedido realizado com sucesso!");
    carrinho=[];
    atualizarCarrinho();
    toggleCarrinho();
}

/* CARREGAR LOJA */
async function carregar(){
    const { data: config } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id",APP_ID)
    .maybeSingle();

    nomeLoja.innerText = config?.nome_site || "";
    logoLoja.src = config?.logo_url || "";
    banner.style.backgroundImage = `url(${config?.banner_url || ""})`;

    const { data: produtos } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id",APP_ID)
    .eq("ativo",true);

    produtos.forEach(p=>{
        let imgs=[];
        try{ imgs=JSON.parse(p.imagens||"[]"); }catch{}

        listaProdutos.innerHTML+=`
        <div class="card">
            ${imgs[0]?`<img src="${imgs[0]}">`:""}
            <h3>${p.nome}</h3>
            <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>
            <button class="btn"
            onclick='adicionarCarrinho(${JSON.stringify({
                id:p.id,
                nome:p.nome,
                preco:p.preco
            })})'>
            Adicionar ao Carrinho
            </button>
        </div>
        `;
    });
}

carregar();
</script>

</body>
</html>
