<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding-top:140px;
}

/* HEADER FIXO */
.topo{
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
}

.logo-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-box img{
    height:70px;
    border-radius:15px;
    background:white;
    padding:5px;
}

.logo-box div{
    color:white;
    font-size:22px;
    font-weight:bold;
}

/* BANNER */
.banner{
    color:white;
    text-align:center;
    padding:80px 20px;
    background-size:cover;
    background-position:center;
    position:relative;
}

.banner::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
}

.banner-content{
    position:relative;
    z-index:2;
}

.banner h1{font-size:36px;margin-bottom:10px}
.banner p{font-size:18px}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap:25px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    max-width:200px;
    height:200px;
    object-fit:contain;
}

.preco{
    font-size:22px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

/* FRETE */
.frete-box{
    margin-top:10px;
}

.frete-box input{
    width:120px;
    padding:6px;
    border-radius:8px;
    border:1px solid #ccc;
}

.frete-box button{
    padding:7px 10px;
    border:none;
    border-radius:8px;
    background:#0071e3;
    color:white;
    cursor:pointer;
}

.btn-comprar{
    margin-top:12px;
    background:#00b853;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header class="topo">
    <div class="logo-box" id="logoBox">
        <img id="logoLoja" src="" alt="Logo">
        <div id="nomeLoja"></div>
    </div>
</header>

<section class="banner" id="banner">
    <div class="banner-content">
        <h1 id="tituloBanner"></h1>
        <p id="subtituloBanner"></p>
    </div>
</section>

<section class="produtos" id="listaProdutos"></section>

<footer>© 2026 Sistema Multi Negócio</footer>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);
const APP_ID = params.get("app_id");

if(!APP_ID){
    document.body.innerHTML = "<h2 style='text-align:center'>Loja não encontrada</h2>";
}

async function carregarLoja(){

/* CONFIG */
const { data: config } = await supabase
.from("config_site")
.select("*")
.eq("app_id", APP_ID)
.maybeSingle();

if(config?.nome_site){
    nomeLoja.innerText = config.nome_site;
}

if(config?.logo_url){
    logoLoja.src = config.logo_url;
}else{
    logoLoja.style.display="none";
}

if(config?.banner_url){
    banner.style.backgroundImage = `url(${config.banner_url})`;
}

tituloBanner.innerText = config?.titulo_banner || "";
subtituloBanner.innerText = config?.subtitulo_banner || "";

/* PRODUTOS */
const { data: produtos } = await supabase
.from("produtos")
.select("*")
.eq("app_id", APP_ID)
.eq("ativo", true);

const lista = document.getElementById("listaProdutos");
lista.innerHTML="";

if(!produtos || produtos.length === 0){
    lista.innerHTML = "<p style='text-align:center;width:100%'>Nenhum produto disponível</p>";
    return;
}

produtos.forEach(p=>{

let imagens=[];
try{ imagens = JSON.parse(p.imagens||"[]"); }catch{}

lista.innerHTML+=`
<div class="card">
    ${imagens[0] 
        ? `<img src="${imagens[0]}">` 
        : `<div style="height:200px;display:flex;align-items:center;justify-content:center;opacity:.3">Sem imagem</div>`
    }
    <h3>${p.nome}</h3>
    <div class="preco">R$ ${Number(p.preco).toFixed(2)}</div>

    <div class="frete-box">
        <input placeholder="CEP" id="cep_${p.id}">
        <button onclick="calcularFrete(${p.preco},'cep_${p.id}')">Calcular</button>
        <div id="freteResultado_${p.id}" style="margin-top:5px;font-size:14px;"></div>
    </div>

    <button class="btn-comprar" onclick="comprar('${p.id}')">
        Comprar
    </button>
</div>
`;
});

}

window.calcularFrete = function(preco, cepId){
    const cep = document.getElementById(cepId).value;
    const resultado = document.getElementById("freteResultado_"+cepId.split("_")[1]);

    if(cep.length < 8){
        resultado.innerHTML = "CEP inválido";
        return;
    }

    let frete = 25 + Math.random()*20;
    let total = Number(preco) + frete;

    resultado.innerHTML = `
        Frete: R$ ${frete.toFixed(2)} <br>
        Total: <b>R$ ${total.toFixed(2)}</b>
    `;
}

window.comprar = function(produtoId){
    alert("Produto "+produtoId+" adicionado ao pedido (integração checkout aqui)");
}

carregarLoja();
</script>

</body>
</html>
