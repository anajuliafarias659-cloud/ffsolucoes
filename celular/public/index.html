<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF iPhones</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* TOPO */
header{
    background:black;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* BANNER */
.banner{
    background: linear-gradient(135deg, #000, #222);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.banner h1{
    font-size:40px;
    margin-bottom:10px;
}

.banner p{
    font-size:18px;
    opacity:0.8;
}

.banner button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#0071e3;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    max-width:180px;
}

.preco{
    font-size:20px;
    font-weight:bold;
    color:#0071e3;
    margin:10px 0;
}

.card button{
    padding:10px 20px;
    border:none;
    background:black;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
    font-size:14px;
}
</style>
</head>
<body>

<header>
FF iPhones - Qualidade e Garantia
</header>

<section class="banner">
    <h1>iPhones Novos e Seminovos</h1>
    <p>Parcelamos em até 12x • Aceitamos Troca</p>
    <button>Ver Ofertas</button>
</section>

<section class="produtos">

    <div class="card">
        <img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-14-pro-finish-select-202209-6-1inch?wid=400" alt="iPhone 14 Pro">
        <h3>iPhone 14 Pro</h3>
        <div class="preco">R$ 4.999</div>
        <button>Comprar</button>
    </div>

    <div class="card">
        <img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-13-finish-select-202207?wid=400" alt="iPhone 13">
        <h3>iPhone 13</h3>
        <div class="preco">R$ 3.799</div>
        <button>Comprar</button>
    </div>

    <div class="card">
        <img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-12-finish-select-202207?wid=400" alt="iPhone 12">
        <h3>iPhone 12</h3>
        <div class="preco">R$ 2.999</div>
        <button>Comprar</button>
    </div>

</section>

<footer>
© 2026 FF iPhones - Todos os direitos reservados
</footer>

</body>
</html>
