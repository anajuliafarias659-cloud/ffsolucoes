<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acompanhar Pedido</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      max-width:700px;
      margin:0 auto;
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }

    h1{
      margin-top:0;
      margin-bottom:16px;
    }

    .busca{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .busca input{
      flex:1;
      min-width:220px;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:16px;
    }

    .busca button{
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:#0071e3;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .status{
      padding:12px;
      border-radius:10px;
      margin:12px 0;
      background:#eff6ff;
      border:1px solid #93c5fd;
    }

    .item{
      border-bottom:1px solid #eee;
      padding:10px 0;
    }

    .label{
      color:#555;
      font-size:14px;
      margin-bottom:4px;
    }

    .valor{
      font-weight:bold;
    }

    .link-rastreio{
      display:inline-block;
      margin-top:8px;
      color:#0071e3;
      text-decoration:none;
      font-weight:bold;
    }

    .mensagem{
      padding:12px;
      border-radius:10px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      color:#334155;
    }

    @media (max-width:600px){
      body{
        padding:12px;
      }

      .box{
        padding:16px;
      }

      .busca{
        flex-direction:column;
      }

      .busca button{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Acompanhar Pedido</h1>

    <div class="busca">
      <input
        id="campoCodigo"
        type="text"
        placeholder="Digite seu código do pedido. Ex: PED-AB12CD34"
      />
      <button onclick="buscarPedido()">Buscar pedido</button>
    </div>

    <div id="conteudo" class="mensagem">
      Digite o código do pedido para acompanhar.
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const conteudo = document.getElementById("conteudo");
    const campoCodigo = document.getElementById("campoCodigo");

    function formatarReal(valor) {
      return Number(valor || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    async function carregarPedidoPorCodigo(codigoInformado) {
      const codigo = String(codigoInformado || "").trim().toUpperCase();

      if (!codigo) {
        conteudo.innerHTML = `
          <div class="mensagem">
            Informe um código válido.
          </div>
        `;
        return;
      }

      conteudo.innerHTML = `
        <div class="mensagem">
          Carregando pedido...
        </div>
      `;

      const { data, error } = await supabase
        .from("pedidos")
        .select("*")
        .eq("codigo_acompanhamento", codigo)
        .single();

      if (error || !data) {
        conteudo.innerHTML = `
          <div class="mensagem">
            Pedido não encontrado para o código <strong>${codigo}</strong>.
          </div>
        `;
        return;
      }

      const itens = Array.isArray(data.itens) ? data.itens : [];

      conteudo.innerHTML = `
        <div class="label">Código do pedido</div>
        <div class="valor">${data.codigo_acompanhamento || "-"}</div>

        <div style="margin-top:12px;" class="label">Cliente</div>
        <div class="valor">${data.cliente_nome || "-"}</div>

        <div style="margin-top:12px;" class="status">
          <strong>Status:</strong> ${data.status_entrega || data.status || "Pedido recebido"}
        </div>

        <div style="margin-top:12px;" class="label">Itens comprados</div>
        <div>
          ${itens.map(item => `
            <div class="item">
              <div><strong>${item.nome || "Produto"}</strong></div>
              <div>Cor: ${item.cor || "Sem cor"}</div>
              <div>Quantidade: ${item.qtd || 1}</div>
              <div>Preço: ${formatarReal(item.preco || 0)}</div>
            </div>
          `).join("")}
        </div>

        <div style="margin-top:12px;" class="label">Total</div>
        <div class="valor">${formatarReal(data.total || 0)}</div>

        ${
          data.rastreio_codigo
            ? `
              <div style="margin-top:18px;" class="label">Código de rastreio</div>
              <div class="valor">${data.rastreio_codigo}</div>
            `
            : ""
        }

        ${
          data.rastreio_link
            ? `
              <a class="link-rastreio" href="${data.rastreio_link}" target="_blank">
                Acompanhar nos Correios
              </a>
            `
            : ""
        }
      `;
    }

    window.buscarPedido = async function () {
      const codigo = campoCodigo.value;
      await carregarPedidoPorCodigo(codigo);

      const novaUrl = `${window.location.pathname}?codigo=${encodeURIComponent(String(codigo || "").trim().toUpperCase())}`;
      window.history.replaceState({}, "", novaUrl);
    };

    campoCodigo.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        await window.buscarPedido();
      }
    });

    const codigoUrl = new URLSearchParams(window.location.search).get("codigo");
    if (codigoUrl) {
      campoCodigo.value = codigoUrl;
      carregarPedidoPorCodigo(codigoUrl);
    }
  </script>
</body>
</html>
