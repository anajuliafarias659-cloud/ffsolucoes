<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Acompanhar Pedido</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f1f5f9;
  color:#0f172a;
}

.topo{
  background:#0f172a;
  color:#fff;
  padding:18px 16px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.topo h1{
  margin:0;
  font-size:22px;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:0 14px 30px;
}

.box{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
  margin-bottom:16px;
}

.busca{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.busca input{
  flex:1;
  min-width:220px;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  font-size:16px;
}

.busca button,
.btn-link{
  border:none;
  background:#2563eb;
  color:#fff;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-link{
  display:inline-block;
  text-decoration:none;
}

.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.info-item{
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:12px;
  padding:12px;
}

.info-item strong{
  display:block;
  margin-bottom:6px;
  color:#334155;
  font-size:14px;
}

.status-box{
  padding:14px;
  border-radius:12px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1d4ed8;
  font-weight:bold;
  margin-bottom:14px;
}

.timeline{
  position:relative;
  margin-top:8px;
}

.timeline::before{
  content:"";
  position:absolute;
  left:14px;
  top:0;
  bottom:0;
  width:3px;
  background:#cbd5e1;
  border-radius:999px;
}

.step{
  position:relative;
  padding-left:42px;
  margin-bottom:18px;
}

.step:last-child{
  margin-bottom:0;
}

.bola{
  position:absolute;
  left:4px;
  top:2px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:#cbd5e1;
  border:3px solid #fff;
  box-shadow:0 0 0 2px #cbd5e1;
}

.step.ativo .bola{
  background:#22c55e;
  box-shadow:0 0 0 2px #22c55e;
}

.step.atual .bola{
  background:#f59e0b;
  box-shadow:0 0 0 2px #f59e0b;
}

.step strong{
  display:block;
  margin-bottom:4px;
}

.itens{
  display:grid;
  gap:10px;
}

.item{
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:12px;
  padding:12px;
}

.erro{
  background:#fef2f2;
  color:#991b1b;
  border:1px solid #fecaca;
  padding:12px;
  border-radius:12px;
}

.sucesso{
  background:#ecfdf5;
  color:#065f46;
  border:1px solid #6ee7b7;
  padding:12px;
  border-radius:12px;
}

.vazio{
  color:#64748b;
  text-align:center;
  padding:20px 10px;
}

small.muted{
  color:#64748b;
}

@media (max-width:600px){
  .topo h1{
    font-size:20px;
  }

  .box{
    padding:14px;
    border-radius:14px;
  }

  .busca{
    flex-direction:column;
  }

  .busca button{
    width:100%;
  }
}
</style>
</head>
<body>

<div class="topo">
  <h1>📦 Acompanhar Pedido</h1>
</div>

<div class="container">
  <div class="box">
    <div class="busca">
      <input id="codigoPedido" placeholder="Digite o código do pedido. Ex: PED-AB12CD34">
      <button onclick="buscarPedidoManual()">Buscar pedido</button>
    </div>
  </div>

  <div id="resultadoPedido"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const resultadoPedido = document.getElementById("resultadoPedido");
const inputCodigo = document.getElementById("codigoPedido");

let codigoAtual = "";
let intervaloAtualizacao = null;

function escapeHtml(texto){
  return String(texto || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatarReal(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function formatarData(data){
  if (!data) return "-";
  const d = new Date(data);
  if (isNaN(d.getTime())) return escapeHtml(data);
  return d.toLocaleString("pt-BR");
}

function montarItens(itens){
  if (!Array.isArray(itens) || !itens.length) {
    return `<div class="vazio">Nenhum item encontrado.</div>`;
  }

  return `
    <div class="itens">
      ${itens.map(i => `
        <div class="item">
          <strong>${escapeHtml(i.nome || "Produto")}</strong>
          Cor: ${escapeHtml(i.cor || "Sem cor")}<br>
          Quantidade: ${Number(i.qtd || 0)}<br>
          ${i.preco ? `Valor unitário: ${formatarReal(i.preco)}` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function etapasPedido(statusEntrega){
  const atual = String(statusEntrega || "Pedido recebido").trim();

  const lista = [
    "Pedido recebido",
    "Pagamento aprovado",
    "Separando pedido",
    "Postado nos Correios",
    "Saiu para entrega",
    "Entregue"
  ];

  const indiceAtual = lista.findIndex(s => s.toLowerCase() === atual.toLowerCase());

  return lista.map((nome, index) => {
    let classe = "";

    if (indiceAtual >= 0) {
      if (index < indiceAtual) classe = "ativo";
      if (index === indiceAtual) classe = "atual";
    } else if (nome === "Pedido recebido") {
      classe = "atual";
    }

    return `
      <div class="step ${classe}">
        <div class="bola"></div>
        <strong>${escapeHtml(nome)}</strong>
        <small class="muted">
          ${nome.toLowerCase() === atual.toLowerCase() ? "Status atual do pedido" : ""}
        </small>
      </div>
    `;
  }).join("");
}

function renderizarPedido(pedido){
  const codigo = pedido.codigo_acompanhamento || "-";
  const statusEntrega = pedido.status_entrega || "Pedido recebido";
  const rastreio = pedido.codigo_rastreio || "";
  const transportadora = pedido.transportadora || "";
  const pagamentoStatus = pedido.pagamento_status || "";
  const statusPedido = pedido.status || "";
  const linkCorreios = rastreio
    ? `https://rastreamento.correios.com.br/app/index.php?objeto=${encodeURIComponent(rastreio)}`
    : "";

  resultadoPedido.innerHTML = `
    <div class="box">
      <div class="status-box">
        Status atual: ${escapeHtml(statusEntrega)}
      </div>

      <div class="info-grid">
        <div class="info-item">
          <strong>Código do pedido</strong>
          ${escapeHtml(codigo)}
        </div>

        <div class="info-item">
          <strong>Cliente</strong>
          ${escapeHtml(pedido.cliente_nome || "-")}
        </div>

        <div class="info-item">
          <strong>Total</strong>
          ${formatarReal(pedido.total)}
        </div>

        <div class="info-item">
          <strong>Status do pagamento</strong>
          ${escapeHtml(pagamentoStatus || statusPedido || "-")}
        </div>

        <div class="info-item">
          <strong>Código de rastreio</strong>
          ${escapeHtml(rastreio || "Ainda não informado")}
        </div>

        <div class="info-item">
          <strong>Transportadora</strong>
          ${escapeHtml(transportadora || "Aguardando envio")}
        </div>
      </div>
    </div>

    <div class="box">
      <h3 style="margin-top:0;">Linha do tempo do pedido</h3>
      <div class="timeline">
        ${etapasPedido(statusEntrega)}
      </div>
    </div>

    ${rastreio ? `
      <div class="box">
        <h3 style="margin-top:0;">Rastreamento</h3>
        <div class="sucesso">
          Seu pedido já possui código de rastreio.
        </div>
        <div style="margin-top:12px;">
          <strong>Código:</strong> ${escapeHtml(rastreio)}<br>
          ${transportadora ? `<strong>Transportadora:</strong> ${escapeHtml(transportadora)}<br>` : ""}
        </div>
        ${linkCorreios ? `
          <div style="margin-top:12px;">
            <a class="btn-link" href="${linkCorreios}" target="_blank">📮 Rastrear nos Correios</a>
          </div>
        ` : ""}
      </div>
    ` : ""}

    <div class="box">
      <h3 style="margin-top:0;">Itens do pedido</h3>
      ${montarItens(pedido.itens)}
    </div>

    <div class="box">
      <h3 style="margin-top:0;">Endereço de entrega</h3>
      <div>
        ${escapeHtml(pedido.cliente_rua || "")}, ${escapeHtml(pedido.cliente_numero || "")}<br>
        ${escapeHtml(pedido.cliente_bairro || "")} - ${escapeHtml(pedido.cliente_cidade || "")}/${escapeHtml(pedido.cliente_estado || "")}<br>
        CEP: ${escapeHtml(pedido.cliente_cep || "-")}
      </div>
      ${pedido.cliente_localizacao ? `
        <div style="margin-top:12px;">
          <a class="btn-link" href="${escapeHtml(pedido.cliente_localizacao)}" target="_blank">📍 Abrir localização</a>
        </div>
      ` : ""}
    </div>

    <div class="box">
      <small class="muted">
        Última atualização: ${formatarData(new Date().toISOString())}
      </small>
    </div>
  `;
}

async function carregarPedido(codigo){
  if (!codigo) return;

  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("codigo_acompanhamento", codigo)
    .single();

  if (error || !data) {
    resultadoPedido.innerHTML = `
      <div class="box">
        <div class="erro">
          Pedido não encontrado. Confira o código e tente novamente.
        </div>
      </div>
    `;
    return;
  }

  renderizarPedido(data);
}

window.buscarPedidoManual = function(){
  const codigo = inputCodigo.value.trim().toUpperCase();

  if (!codigo) {
    alert("Digite o código do pedido.");
    return;
  }

  codigoAtual = codigo;
  const novaUrl = `${window.location.pathname}?codigo=${encodeURIComponent(codigoAtual)}`;
  window.history.replaceState({}, "", novaUrl);

  carregarPedido(codigoAtual);

  if (intervaloAtualizacao) clearInterval(intervaloAtualizacao);
  intervaloAtualizacao = setInterval(() => {
    carregarPedido(codigoAtual);
  }, 5000);
};

function iniciarPeloLink(){
  const codigo = new URLSearchParams(window.location.search).get("codigo");

  if (!codigo) {
    resultadoPedido.innerHTML = `
      <div class="box">
        <div class="vazio">
          Digite o código do pedido acima para acompanhar sua compra.
        </div>
      </div>
    `;
    return;
  }

  codigoAtual = codigo.trim().toUpperCase();
  inputCodigo.value = codigoAtual;
  carregarPedido(codigoAtual);

  if (intervaloAtualizacao) clearInterval(intervaloAtualizacao);
  intervaloAtualizacao = setInterval(() => {
    carregarPedido(codigoAtual);
  }, 5000);
}

iniciarPeloLink();
</script>
</body>
</html>
