<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acompanhar Pedido</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      padding:20px;
    }
    .box{
      max-width:700px;
      margin:0 auto;
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    h1{
      margin-top:0;
    }
    .status{
      padding:12px;
      border-radius:10px;
      margin:12px 0;
      background:#eff6ff;
      border:1px solid #93c5fd;
    }
    .item{
      border-bottom:1px solid #eee;
      padding:10px 0;
    }
    .label{
      color:#555;
      font-size:14px;
    }
    .valor{
      font-weight:bold;
    }
    .link-rastreio{
      display:inline-block;
      margin-top:8px;
      color:#0071e3;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Acompanhar Pedido</h1>
    <div id="conteudo">Carregando...</div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_ANON_KEY = "SUA_KEY_AQUI";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const codigo = new URLSearchParams(window.location.search).get("codigo");
    const conteudo = document.getElementById("conteudo");

    async function carregarPedido() {
      if (!codigo) {
        conteudo.innerHTML = "Código do pedido não informado.";
        return;
      }

      const { data, error } = await supabase
        .from("pedidos")
        .select("*")
        .eq("codigo_acompanhamento", codigo)
        .single();

      if (error || !data) {
        conteudo.innerHTML = "Pedido não encontrado.";
        return;
      }

      const itens = Array.isArray(data.itens) ? data.itens : [];

      conteudo.innerHTML = `
        <div class="label">Código do pedido</div>
        <div class="valor">${data.codigo_acompanhamento || "-"}</div>

        <div style="margin-top:12px;" class="label">Cliente</div>
        <div class="valor">${data.cliente_nome || "-"}</div>

        <div style="margin-top:12px;" class="status">
          <strong>Status:</strong> ${data.status_entrega || data.status || "Pedido recebido"}
        </div>

        <div style="margin-top:12px;" class="label">Itens comprados</div>
        <div>
          ${itens.map(item => `
            <div class="item">
              <div><strong>${item.nome || "Produto"}</strong></div>
              <div>Cor: ${item.cor || "Sem cor"}</div>
              <div>Quantidade: ${item.qtd || 1}</div>
              <div>Preço: R$ ${Number(item.preco || 0).toFixed(2)}</div>
            </div>
          `).join("")}
        </div>

        <div style="margin-top:12px;" class="label">Total</div>
        <div class="valor">R$ ${Number(data.total || 0).toFixed(2)}</div>

        ${
          data.rastreio_codigo
            ? `
              <div style="margin-top:18px;" class="label">Código de rastreio</div>
              <div class="valor">${data.rastreio_codigo}</div>
            `
            : ""
        }

        ${
          data.rastreio_link
            ? `
              <a class="link-rastreio" href="${data.rastreio_link}" target="_blank">
                Acompanhar nos Correios
              </a>
            `
            : ""
        }
      `;
    }

    carregarPedido();
  </script>
</body>
</html>
