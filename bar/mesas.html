<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script type="module" src="../js/auth.js"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.container{padding:32px;max-width:1200px;margin:auto}
.btn{border:none;padding:10px 16px;border-radius:10px;font-weight:bold;cursor:pointer}
.btn-add{background:#22c55e}
.btn-avulsa{background:#38bdf8}
.btn-voltar{background:#1e293b;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.card{background:#0f172a;padding:16px;border-radius:18px;text-align:center;border:2px solid transparent;cursor:pointer;transition:.15s}
.card:hover{transform:scale(1.02)}
.card.livre{border-color:#22c55e}
.card.preparando{border-color:#eab308}
.card.conta{border-color:#fde047;box-shadow:0 0 14px rgba(253,224,71,.25)}
.status{margin:6px 0 10px;padding:4px 10px;border-radius:8px;font-weight:bold;font-size:13px;display:inline-block}
.status.livre{background:#22c55e;color:#022c22}
.status.preparando{background:#eab308;color:#000}
.status.conta{background:#fde047;color:#000}
.qr{background:#020617;border-radius:14px;padding:10px;margin:12px 0;display:flex;justify-content:center;min-height:140px;align-items:center}
.btn-remover{margin-top:8px;width:100%;background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:8px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
.url-mini{margin-top:8px;font-size:11px;color:#94a3b8;word-break:break-all}
.cliente-mini{font-size:12px;color:#94a3b8;margin-bottom:8px;min-height:16px}
.sessao-mini{font-size:11px;color:#cbd5e1;margin-top:6px;min-height:15px}
.atualizacao{font-size:12px;color:#94a3b8;margin-top:10px;margin-bottom:14px}
</style>
</head>

<body>

<div class="topo">
  <h2>🪑 Mesas</h2>
  <div>
    <button class="btn btn-avulsa" onclick="vendaAvulsa()">💳 Venda Avulsa</button>
    <button class="btn btn-add" onclick="adicionarMesa()">➕ Mesa</button>
    <button class="btn btn-voltar" onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">
  <div class="atualizacao" id="infoAtualizacao">Atualizando...</div>
  <div class="grid" id="listaMesas"></div>
</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
const SEGREDO_REMOVER_MESA = "4321";
let criandoMesa = false;
let carregandoMesas = false;
let intervalMesas = null;
const DURACAO_SESSAO_MINUTOS = 1440;
const cardsRenderizados = new Map();

function esperarSessao(){
  const funcionario = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  const admin = JSON.parse(localStorage.getItem("admin_logado") || "null");

  if(funcionario && funcionario.app_id){
    app_id = funcionario.app_id;
    iniciarSistema();
    return;
  }

  if(admin && admin.app_id){
    app_id = admin.app_id;
    iniciarSistema();
    return;
  }

  if(window.APP_ID){
    app_id = window.APP_ID;
    iniciarSistema();
    return;
  }

  setTimeout(esperarSessao, 100);
}

function iniciarSistema(){
  if(!app_id){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return;
  }

  carregarMesas();

  if (intervalMesas) clearInterval(intervalMesas);
  intervalMesas = setInterval(carregarMesas, 5000);
}

function agoraISO(){
  return new Date().toISOString();
}

function adicionarMinutosISO(minutos){
  return new Date(Date.now() + minutos * 60000).toISOString();
}

function gerarTokenSeguro(){
  if (window.crypto?.randomUUID) {
    return crypto.randomUUID().replaceAll("-", "") + Date.now();
  }
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function montarUrlMesa(mesaId, token){
  return `${location.origin}/bar/mesa.html?mesa=${encodeURIComponent(mesaId)}&token=${encodeURIComponent(token)}`;
}

function normalizarStatus(status){
  return String(status || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function statusFechado(status){
  const s = normalizarStatus(status);
  return [
    "pago",
    "finalizado",
    "cancelado",
    "encerrado",
    "concluido",
    "fechado",
    "quitado",
    "recebido",
    "entregue"
  ].includes(s);
}

function statusConta(status){
  const s = normalizarStatus(status);
  return s === "conta_solicitada" || s === "pedir_conta";
}

function formatarHoraBR(dataIso){
  if (!dataIso) return "";
  try{
    return new Date(dataIso).toLocaleTimeString("pt-BR", {
      hour:"2-digit",
      minute:"2-digit"
    });
  }catch{
    return "";
  }
}

function expirouSessao(sessao){
  if (!sessao?.expira_em) return true;
  return new Date(sessao.expira_em).getTime() <= Date.now();
}

function atualizarInfoAtualizacao(){
  const el = document.getElementById("infoAtualizacao");
  if (!el) return;
  el.textContent = `Última atualização: ${new Date().toLocaleTimeString("pt-BR")} • Atualiza a cada 5 segundos`;
}

async function buscarSessaoAtivaMesa(mesaId){
  const { data, error } = await sb
    .from("sessoes_mesa")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", app_id)
    .eq("ativa", true)
    .order("created_at", { ascending: false })
    .limit(1);

  if (error) {
    console.error("Erro ao buscar sessão da mesa:", mesaId, error);
    return null;
  }

  return data?.[0] || null;
}

async function encerrarSessaoMesa(sessaoId){
  if (!sessaoId) return;

  await sb
    .from("sessoes_mesa")
    .update({
      ativa: false,
      encerrada_em: agoraISO()
    })
    .eq("id", sessaoId);

  await sb
    .from("sessoes_mesa_dispositivos")
    .delete()
    .eq("sessao_mesa_id", sessaoId);
}

async function criarSessaoMesa(mesaId){
  const token = gerarTokenSeguro();

  const { data, error } = await sb
    .from("sessoes_mesa")
    .insert({
      mesa_id: mesaId,
      app_id: app_id,
      token,
      ativa: true,
      ultimo_acesso_em: agoraISO(),
      expira_em: adicionarMinutosISO(DURACAO_SESSAO_MINUTOS)
    })
    .select()
    .single();

  if (error || !data) {
    console.error("Erro ao criar sessão da mesa:", mesaId, error);
    return null;
  }

  return data;
}

async function obterSessaoSomenteLeitura(mesaId){
  let sessao = await buscarSessaoAtivaMesa(mesaId);

  if (sessao && expirouSessao(sessao)) {
    await encerrarSessaoMesa(sessao.id);
    sessao = null;
  }

  return sessao;
}

function criarCardMesaBase(mesaId){
  const div = document.createElement("div");
  div.dataset.mesaId = mesaId;
  div.className = "card livre";
  div.innerHTML = `
    <h3 class="titulo-mesa"></h3>
    <span class="status livre"></span>
    <div class="cliente-mini"></div>
    <div class="qr"><canvas></canvas></div>
    <div class="sessao-mini"></div>
    <div class="url-mini"></div>
    <button class="btn-remover" style="display:none">Remover mesa</button>
  `;
  return div;
}

async function desenharQrSeMudou(card, urlMesa){
  const qrWrap = card.querySelector(".qr");
  const canvas = qrWrap.querySelector("canvas");
  if (!canvas) return;

  if (card.dataset.urlAtual === urlMesa) return;

  canvas.width = 120;
  canvas.height = 120;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  await QRCode.toCanvas(canvas, urlMesa, { width: 120 });
  card.dataset.urlAtual = urlMesa;
}

async function atualizarOuCriarCardMesa(mesa){
  const grid = document.getElementById("listaMesas");
  let card = cardsRenderizados.get(mesa.id);

  if (!card) {
    card = criarCardMesaBase(mesa.id);
    cardsRenderizados.set(mesa.id, card);
    grid.appendChild(card);
  }

  const pedidoAberto = mesa.pedidoAberto;
  const mesaPediuConta = mesa.mesaPediuConta;
  const mesaSemPendencias = mesa.mesaSemPendencias;
  const sessao = mesa.sessao;

  let classe = "livre";
  let texto = "LIVRE";

  if (mesaPediuConta) {
    classe = "conta";
    texto = "PEDIU A CONTA";
  } else if (pedidoAberto || mesa.ocupada) {
    classe = "preparando";
    texto = "OCUPADA";
  }

  const urlMesa = sessao
    ? montarUrlMesa(mesa.id, sessao.token)
    : `${location.origin}/bar/mesa.html?mesa=${encodeURIComponent(mesa.id)}`;

  const expiraTxt = sessao?.expira_em ? `Sessão até ${formatarHoraBR(sessao.expira_em)}` : "";
  const clienteTexto = mesa.cliente_nome ? mesa.cliente_nome : (mesaSemPendencias ? "Disponível para novo acesso" : "");

  card.className = `card ${classe}`;
  card.querySelector(".titulo-mesa").textContent = `Mesa ${mesa.numero_mesa}`;

  const statusEl = card.querySelector(".status");
  statusEl.className = `status ${classe}`;
  statusEl.textContent = texto;

  card.querySelector(".cliente-mini").textContent = clienteTexto;
  card.querySelector(".sessao-mini").textContent = expiraTxt;
  card.querySelector(".url-mini").textContent = urlMesa;

  await desenharQrSeMudou(card, urlMesa);

  card.onclick = () => {
    location.href = urlMesa;
  };

  const btn = card.querySelector(".btn-remover");
  const podeRemover = !pedidoAberto && !mesaPediuConta;

  btn.style.display = podeRemover ? "block" : "none";
  btn.onclick = async (e) => {
    e.stopPropagation();
    const senha = prompt("Código para remover a mesa:");
    if (senha !== SEGREDO_REMOVER_MESA) return;

    const sessaoAtual = await buscarSessaoAtivaMesa(mesa.id);
    if (sessaoAtual?.id) await encerrarSessaoMesa(sessaoAtual.id);

    await sb
      .from("mesas")
      .update({
        ativa:false,
        ocupada:false,
        pedir_conta:false,
        status:"livre",
        cliente_nome:null
      })
      .eq("id", mesa.id);

    card.remove();
    cardsRenderizados.delete(mesa.id);
    carregarMesas();
  };
}

async function carregarMesas(){
  if (carregandoMesas) return;
  carregandoMesas = true;

  try {
    const { data: mesas, error: erroMesas } = await sb
      .from("mesas")
      .select("id,numero_mesa,ocupada,status,pedir_conta,cliente_nome,ativa")
      .eq("app_id", app_id)
      .eq("ativa", true)
      .order("numero_mesa");

    if (erroMesas) {
      console.error("Erro ao carregar mesas:", erroMesas);
      return;
    }

    const { data: pedidos, error: erroPedidos } = await sb
      .from("pedidos")
      .select("id,mesa_id,status,created_at")
      .eq("app_id", app_id)
      .not("mesa_id","is",null)
      .order("created_at",{ ascending:false });

    if (erroPedidos) {
      console.error("Erro ao carregar pedidos:", erroPedidos);
      return;
    }

    const todosPedidosPorMesa = {};
    (pedidos || []).forEach(p => {
      if (!todosPedidosPorMesa[p.mesa_id]) todosPedidosPorMesa[p.mesa_id] = [];
      todosPedidosPorMesa[p.mesa_id].push(p);
    });

    const idsAtuais = new Set();

    for (const m of (mesas || [])) {
      idsAtuais.add(m.id);

      const pedidosMesa = todosPedidosPorMesa[m.id] || [];
      const pedidoAberto = pedidosMesa.find(p => !statusFechado(p.status)) || null;

      const mesaPediuConta =
        m.pedir_conta === true ||
        statusConta(m.status) ||
        statusConta(pedidoAberto?.status);

      const mesaSemPendencias = !pedidoAberto;
      const deveEstarOcupada = mesaPediuConta || !!pedidoAberto;

      if (deveEstarOcupada && !m.ocupada) {
        await sb
          .from("mesas")
          .update({
            ocupada: true,
            status: mesaPediuConta ? "conta_solicitada" : "ocupada"
          })
          .eq("id", m.id);
        m.ocupada = true;
      }

      if (!deveEstarOcupada && (m.ocupada || m.pedir_conta || m.status !== "livre" || m.cliente_nome)) {
        await sb
          .from("mesas")
          .update({
            ocupada: false,
            pedir_conta: false,
            status: "livre",
            cliente_nome: null
          })
          .eq("id", m.id);

        m.ocupada = false;
        m.pedir_conta = false;
        m.status = "livre";
        m.cliente_nome = null;
      }

      const sessao = await obterSessaoSomenteLeitura(m.id);

      await atualizarOuCriarCardMesa({
        ...m,
        pedidoAberto,
        mesaPediuConta,
        mesaSemPendencias,
        sessao
      });
    }

    for (const [mesaId, card] of cardsRenderizados.entries()) {
      if (!idsAtuais.has(mesaId)) {
        card.remove();
        cardsRenderizados.delete(mesaId);
      }
    }

    atualizarInfoAtualizacao();
  } catch (erro) {
    console.error("Erro geral ao carregar mesas:", erro);
  } finally {
    carregandoMesas = false;
  }
}

async function adicionarMesa(){
  if (criandoMesa) return;
  criandoMesa = true;

  try {
    const { data, error: erroUltima } = await sb
      .from("mesas")
      .select("numero_mesa")
      .eq("app_id", app_id)
      .order("numero_mesa", { ascending:false })
      .limit(1)
      .maybeSingle();

    if (erroUltima) {
      console.error("Erro ao buscar última mesa:", erroUltima);
      alert("Erro ao buscar última mesa.");
      return;
    }

    const prox = (data?.numero_mesa || 0) + 1;

    const { data: novaMesa, error } = await sb
      .from("mesas")
      .insert({
        app_id,
        numero_mesa: prox,
        ativa: true,
        ocupada: false,
        pedir_conta: false,
        status: "livre"
      })
      .select()
      .single();

    if (error || !novaMesa) {
      console.error("Erro ao adicionar mesa:", error);
      alert("Erro ao adicionar mesa.");
      return;
    }

    await criarSessaoMesa(novaMesa.id);
    carregarMesas();
  } finally {
    criandoMesa = false;
  }
}

function vendaAvulsa(){
  location.href = "venda-avulsa.html";
}

function logout(){
  localStorage.removeItem("funcionario_logado");
  localStorage.removeItem("admin_logado");
  location.href = "/auth/login.html";
}

esperarSessao();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
