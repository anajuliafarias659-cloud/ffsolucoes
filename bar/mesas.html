<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="../js/auth.js"></script>

<style>
*{box-sizing:border-box}

:root{
  --bg:#020617;
  --card:#0f172a;
  --card-2:#111827;
  --text:#fff;
  --muted:#94a3b8;
  --green:#22c55e;
  --yellow:#fde047;
  --orange:#f59e0b;
  --blue:#38bdf8;
  --red:#ef4444;
  --line:rgba(255,255,255,.08);
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.topo{
  background:#0f172a;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:20;
}

.topo h2{
  margin:0;
}

.topo-acoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.container{
  padding:22px;
  max-width:1250px;
  margin:auto;
}

.btn{
  border:none;
  padding:10px 16px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-add{background:var(--green);color:#001b08}
.btn-avulsa{background:var(--blue);color:#001722}
.btn-voltar{background:#1e293b;color:#fff}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}

.card{
  background:linear-gradient(180deg,#0f172a,#111827);
  padding:16px;
  border-radius:18px;
  border:2px solid transparent;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}

.card.livre{border-color:#22c55e}
.card.preparando{border-color:#eab308}
.card.conta{border-color:#fde047;box-shadow:0 0 14px rgba(253,224,71,.20)}

.topo-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.status{
  margin:0;
  padding:5px 10px;
  border-radius:999px;
  font-weight:bold;
  font-size:12px;
  display:inline-block;
}

.status.livre{background:#22c55e;color:#022c22}
.status.preparando{background:#eab308;color:#000}
.status.conta{background:#fde047;color:#000}

.cliente-mini,
.info-mini{
  font-size:12px;
  color:var(--muted);
  margin-bottom:8px;
  min-height:16px;
}

.atualizacao{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
  margin-bottom:16px;
}

.titulo-mesa{
  margin:0;
  font-size:20px;
}

.acoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.btn-card{
  width:100%;
  border:none;
  padding:10px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  font-size:13px;
}

.btn-card:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.btn-abrir{background:#22c55e;color:#052e16}
.btn-pedidos{background:#2563eb;color:#fff}
.btn-conta{background:#fde047;color:#111827}
.btn-liberar{background:#ef4444;color:#fff}
.btn-remover{
  background:#1e293b;
  color:#cbd5e1;
  border:1px solid #334155;
  grid-column:1 / -1;
}

.painel-resumo{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}

.box-resumo{
  background:#0f172a;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
}

.box-resumo .label{
  font-size:12px;
  color:var(--muted);
}

.box-resumo .valor{
  font-size:24px;
  font-weight:800;
  margin-top:4px;
}

@media (max-width:640px){
  .container{padding:14px}
  .topo{padding:14px}
  .grid{grid-template-columns:1fr;gap:12px}
  .card{padding:12px}
  .painel-resumo{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="topo">
  <h2>🪑 Mesas</h2>

  <div class="topo-acoes">
    <button class="btn btn-avulsa" onclick="vendaAvulsa()">💳 Venda Avulsa</button>
    <button class="btn btn-add" onclick="adicionarMesa()">➕ Mesa</button>
    <button class="btn btn-voltar" onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">
  <div class="painel-resumo">
    <div class="box-resumo">
      <div class="label">Livres</div>
      <div class="valor" id="resumoLivres">0</div>
    </div>
    <div class="box-resumo">
      <div class="label">Ocupadas</div>
      <div class="valor" id="resumoOcupadas">0</div>
    </div>
    <div class="box-resumo">
      <div class="label">Pediram conta</div>
      <div class="valor" id="resumoConta">0</div>
    </div>
  </div>

  <div class="atualizacao" id="infoAtualizacao">Atualizando...</div>
  <div class="grid" id="listaMesas"></div>
</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
const SEGREDO_REMOVER_MESA = "4321";
let criandoMesa = false;
let carregandoMesas = false;
let intervalMesas = null;
const cardsRenderizados = new Map();

function esperarSessao(){
  const funcionario = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  const admin = JSON.parse(localStorage.getItem("admin_logado") || "null");

  if(funcionario && funcionario.app_id){
    app_id = funcionario.app_id;
    iniciarSistema();
    return;
  }

  if(admin && admin.app_id){
    app_id = admin.app_id;
    iniciarSistema();
    return;
  }

  if(window.APP_ID){
    app_id = window.APP_ID;
    iniciarSistema();
    return;
  }

  setTimeout(esperarSessao, 100);
}

function iniciarSistema(){
  if(!app_id){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return;
  }

  carregarMesas();

  if (intervalMesas) clearInterval(intervalMesas);
  intervalMesas = setInterval(carregarMesas, 5000);
}

function normalizarStatus(status){
  return String(status || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function statusFechado(status){
  const s = normalizarStatus(status);
  return [
    "pago",
    "finalizado",
    "cancelado",
    "encerrado",
    "concluido",
    "fechado",
    "quitado",
    "recebido",
    "entregue"
  ].includes(s);
}

function statusConta(status){
  const s = normalizarStatus(status);
  return s === "conta_solicitada" || s === "pedir_conta";
}

function formatarHoraBR(dataIso){
  if (!dataIso) return "";
  try{
    return new Date(dataIso).toLocaleTimeString("pt-BR", {
      hour:"2-digit",
      minute:"2-digit"
    });
  }catch{
    return "";
  }
}

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function atualizarInfoAtualizacao(){
  const el = document.getElementById("infoAtualizacao");
  if (!el) return;
  el.textContent = `Última atualização: ${new Date().toLocaleTimeString("pt-BR")} • Atualiza a cada 5 segundos`;
}

function atualizarResumo(mesas){
  let livres = 0;
  let ocupadas = 0;
  let contas = 0;

  mesas.forEach(m => {
    if (m.mesaPediuConta) contas++;
    else if (m.ocupada) ocupadas++;
    else livres++;
  });

  document.getElementById("resumoLivres").textContent = livres;
  document.getElementById("resumoOcupadas").textContent = ocupadas;
  document.getElementById("resumoConta").textContent = contas;
}

function criarCardMesaBase(mesaId){
  const div = document.createElement("div");
  div.dataset.mesaId = mesaId;
  div.className = "card livre";
  div.innerHTML = `
    <div class="topo-card">
      <h3 class="titulo-mesa"></h3>
      <span class="status livre"></span>
    </div>
    <div class="cliente-mini"></div>
    <div class="info-mini pedidos-mini"></div>
    <div class="info-mini total-mini"></div>
    <div class="acoes">
      <button class="btn-card btn-abrir">Abrir</button>
      <button class="btn-card btn-pedidos">Pedidos</button>
      <button class="btn-card btn-conta">Pedir conta</button>
      <button class="btn-card btn-liberar">Liberar</button>
      <button class="btn-card btn-remover">Remover mesa</button>
    </div>
  `;
  return div;
}

async function atualizarOuCriarCardMesa(mesa){
  const grid = document.getElementById("listaMesas");
  let card = cardsRenderizados.get(mesa.id);

  if (!card) {
    card = criarCardMesaBase(mesa.id);
    cardsRenderizados.set(mesa.id, card);
    grid.appendChild(card);
  }

  const estaOcupada = !!mesa.ocupada;
  const pediuConta = !!mesa.mesaPediuConta;

  let classe = "livre";
  let texto = "LIVRE";

  if (pediuConta) {
    classe = "conta";
    texto = "PEDIU A CONTA";
  } else if (estaOcupada) {
    classe = "preparando";
    texto = "OCUPADA";
  }

  const ultimoPedido = (mesa.pedidosMesa || [])[0] || null;
  const qtdPedidos = (mesa.pedidosMesa || []).length;

  card.className = `card ${classe}`;
  card.querySelector(".titulo-mesa").textContent = `Mesa ${mesa.numero_mesa}`;

  const statusEl = card.querySelector(".status");
  statusEl.className = `status ${classe}`;
  statusEl.textContent = texto;

  card.querySelector(".cliente-mini").textContent =
    `Cliente: ${mesa.cliente_nome || ultimoPedido?.cliente_nome || "-"}`;

  card.querySelector(".pedidos-mini").textContent =
    `Pedidos: ${qtdPedidos}` + (ultimoPedido ? ` • Último às ${formatarHoraBR(ultimoPedido.created_at)}` : "");

  card.querySelector(".total-mini").textContent =
    `Total aberto: ${formatarMoeda(mesa.total_aberto || 0)}`;

  const btnAbrir = card.querySelector(".btn-abrir");
  const btnPedidos = card.querySelector(".btn-pedidos");
  const btnConta = card.querySelector(".btn-conta");
  const btnLiberar = card.querySelector(".btn-liberar");
  const btnRemover = card.querySelector(".btn-remover");

  btnAbrir.onclick = async (e) => {
    e.stopPropagation();
    await abrirMesa(mesa);
  };

  btnPedidos.onclick = (e) => {
    e.stopPropagation();
    abrirTelaPedidos(mesa);
  };

  btnConta.onclick = async (e) => {
    e.stopPropagation();
    await pedirContaMesa(mesa);
  };

  btnLiberar.onclick = async (e) => {
    e.stopPropagation();
    await liberarMesa(mesa);
  };

  btnRemover.onclick = async (e) => {
    e.stopPropagation();
    await removerMesa(mesa);
  };

  btnAbrir.disabled = !!mesa.ocupada;
  btnConta.disabled = !mesa.ocupada;
  btnLiberar.disabled = false;
  btnRemover.disabled = !!mesa.ocupada;
}

async function carregarMesas(){
  if (carregandoMesas) return;
  carregandoMesas = true;

  try {
    const { data: mesas, error: erroMesas } = await sb
      .from("mesas")
      .select("id,numero_mesa,ocupada,status,pedir_conta,cliente_nome,cliente_celular,total_aberto,ativa")
      .eq("app_id", app_id)
      .eq("ativa", true)
      .order("numero_mesa");

    if (erroMesas) {
      console.error("Erro ao carregar mesas:", erroMesas);
      return;
    }

    const { data: pedidos, error: erroPedidos } = await sb
      .from("pedidos")
      .select("id,mesa_id,status,created_at,origem,cliente_id,cliente_nome,cliente_telefone,total")
      .eq("app_id", app_id)
      .eq("origem", "mesa")
      .not("mesa_id","is",null)
      .order("created_at",{ ascending:false });

    if (erroPedidos) {
      console.error("Erro ao carregar pedidos:", erroPedidos);
      return;
    }

    const todosPedidosPorMesa = {};
    (pedidos || []).forEach(p => {
      if (!todosPedidosPorMesa[p.mesa_id]) todosPedidosPorMesa[p.mesa_id] = [];
      todosPedidosPorMesa[p.mesa_id].push(p);
    });

    const idsAtuais = new Set();
    const mesasTratadas = [];

    for (const m of (mesas || [])) {
      idsAtuais.add(m.id);

      const pedidosMesa = todosPedidosPorMesa[m.id] || [];
      const pedidoAberto = pedidosMesa.find(p => !statusFechado(p.status)) || null;

      const mesaPediuConta =
        m.pedir_conta === true ||
        statusConta(m.status) ||
        statusConta(pedidoAberto?.status);

      const totalAberto = pedidosMesa
        .filter(p => !statusFechado(p.status))
        .reduce((soma, p) => soma + Number(p.total || 0), 0);

      if (pedidoAberto) {
        const novoStatus = mesaPediuConta ? "conta_solicitada" : "ocupada";

        if (!m.ocupada || m.status !== novoStatus || Number(m.total_aberto || 0) !== totalAberto) {
          await sb
            .from("mesas")
            .update({
              ocupada: true,
              pedir_conta: mesaPediuConta,
              status: novoStatus,
              total_aberto: totalAberto
            })
            .eq("id", m.id);

          m.ocupada = true;
          m.pedir_conta = mesaPediuConta;
          m.status = novoStatus;
          m.total_aberto = totalAberto;
        }
      } else if (!pedidoAberto && m.ocupada) {
        m.status = m.pedir_conta ? "conta_solicitada" : "ocupada";
        m.total_aberto = Number(m.total_aberto || 0);
      } else if (!pedidoAberto && !m.ocupada) {
        if (m.status !== "livre" || m.pedir_conta || Number(m.total_aberto || 0) !== 0) {
          await sb
            .from("mesas")
            .update({
              status: "livre",
              pedir_conta: false,
              total_aberto: 0
            })
            .eq("id", m.id);

          m.status = "livre";
          m.pedir_conta = false;
          m.total_aberto = 0;
        }
      }

      const mesaTratada = {
        ...m,
        pedidoAberto,
        mesaPediuConta,
        pedidosMesa
      };

      await atualizarOuCriarCardMesa(mesaTratada);
      mesasTratadas.push(mesaTratada);
    }

    for (const [mesaId, card] of cardsRenderizados.entries()) {
      if (!idsAtuais.has(mesaId)) {
        card.remove();
        cardsRenderizados.delete(mesaId);
      }
    }

    atualizarResumo(mesasTratadas);
    atualizarInfoAtualizacao();
  } catch (erro) {
    console.error("Erro geral ao carregar mesas:", erro);
  } finally {
    carregandoMesas = false;
  }
}

async function adicionarMesa(){
  if (criandoMesa) return;
  criandoMesa = true;

  try {
    const { data, error: erroUltima } = await sb
      .from("mesas")
      .select("numero_mesa")
      .eq("app_id", app_id)
      .order("numero_mesa", { ascending:false })
      .limit(1)
      .maybeSingle();

    if (erroUltima) {
      console.error("Erro ao buscar última mesa:", erroUltima);
      alert("Erro ao buscar última mesa.");
      return;
    }

    const prox = (data?.numero_mesa || 0) + 1;

    const { data: novaMesa, error } = await sb
      .from("mesas")
      .insert({
        app_id,
        numero_mesa: prox,
        ativa: true,
        ocupada: false,
        pedir_conta: false,
        status: "livre",
        total_aberto: 0
      })
      .select()
      .single();

    if (error || !novaMesa) {
      console.error("Erro ao adicionar mesa:", error);
      alert("Erro ao adicionar mesa.");
      return;
    }

    await carregarMesas();
  } finally {
    criandoMesa = false;
  }
}

async function abrirMesa(mesa){
  const nome = prompt(`Nome do cliente/responsável da Mesa ${mesa.numero_mesa}:`, mesa.cliente_nome || "");
  if (nome === null) return;

  const nomeLimpo = nome.trim();

  if (!nomeLimpo) {
    alert("Digite o nome do cliente.");
    return;
  }

  const { error } = await sb
    .from("mesas")
    .update({
      ocupada: true,
      pedir_conta: false,
      status: "ocupada",
      cliente_nome: nomeLimpo
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao abrir mesa:", error);
    alert("Erro ao abrir mesa.");
    return;
  }

  await carregarMesas();
}

function abrirTelaPedidos(mesa){
  location.href = `mesa.html?mesa_id=${encodeURIComponent(mesa.id)}&mesa_numero=${encodeURIComponent(mesa.numero_mesa)}`;
}

async function pedirContaMesa(mesa){
  const confirmar = confirm(`Marcar a Mesa ${mesa.numero_mesa} como PEDIU CONTA?`);
  if (!confirmar) return;

  const { error } = await sb
    .from("mesas")
    .update({
      ocupada: true,
      pedir_conta: true,
      status: "conta_solicitada"
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao pedir conta:", error);
    alert("Erro ao pedir conta.");
    return;
  }

  await carregarMesas();
}

async function liberarMesa(mesa){
  const confirmar = confirm(`Liberar a Mesa ${mesa.numero_mesa}?`);
  if (!confirmar) return;

  const { error } = await sb
    .from("mesas")
    .update({
      ocupada: false,
      pedir_conta: false,
      status: "livre",
      cliente_nome: null,
      cliente_celular: null,
      total_aberto: 0
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao liberar mesa:", error);
    alert("Erro ao liberar mesa.");
    return;
  }

  await carregarMesas();
}

async function removerMesa(mesa){
  const senha = prompt("Código para remover a mesa:");
  if (senha !== SEGREDO_REMOVER_MESA) return;

  const { error } = await sb
    .from("mesas")
    .update({
      ativa:false,
      ocupada:false,
      pedir_conta:false,
      status:"livre",
      cliente_nome:null,
      cliente_celular:null,
      total_aberto:0
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao remover mesa:", error);
    alert("Erro ao remover mesa.");
    return;
  }

  const card = cardsRenderizados.get(mesa.id);
  if (card) card.remove();
  cardsRenderizados.delete(mesa.id);

  await carregarMesas();
}

function vendaAvulsa(){
  location.href = "venda-avulsa.html";
}

function logout(){
  localStorage.removeItem("funcionario_logado");
  localStorage.removeItem("admin_logado");
  location.href = "/auth/login.html";
}

esperarSessao();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
