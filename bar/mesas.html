<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesas Interno</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --primary:#e91e63;
  --green:#16a34a;
  --orange:#f59e0b;
  --red:#ef4444;
  --blue:#2563eb;
  --dark:#111827;
  --shadow:0 8px 24px rgba(0,0,0,.08);
}

html,body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.oculto{display:none !important}

.topo{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:14px 14px 10px;
}

.topo-linha-1{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.topo-acoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn-topo{
  border:none;
  background:#f3f4f6;
  color:var(--text);
  padding:10px 14px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-topo.primary{
  background:var(--primary);
  color:#fff;
}

.logo-bola{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--primary),#ff6aa2);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
  font-weight:bold;
  box-shadow:var(--shadow);
}

.topo-breadcrumb{
  display:flex;
  gap:10px;
  font-size:12px;
  color:var(--muted);
  overflow:auto;
  white-space:nowrap;
  padding-bottom:2px;
}

.topo-breadcrumb span.ativo{
  color:var(--text);
  font-weight:bold;
}

.container{
  max-width:1200px;
  margin:0 auto;
  padding:14px;
}

.hero{
  margin:8px 0 14px;
}

.hero h1{
  margin:0;
  font-size:32px;
  line-height:1.08;
  letter-spacing:-.5px;
}

.hero p{
  margin:8px 0 0;
  font-size:14px;
  color:var(--muted);
}

.painel-info{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.info-box{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:12px 14px;
  min-width:160px;
}

.info-box span{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:4px;
}

.info-box strong{
  font-size:18px;
}

.atualizacao{
  color:var(--muted);
  font-size:12px;
  margin-bottom:12px;
}

#listaMesas{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card.livre{border-left:6px solid var(--green)}
.card.ocupada{border-left:6px solid var(--orange)}
.card.conta{border-left:6px solid var(--red)}

.card-topo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.titulo-mesa{
  margin:0;
  font-size:22px;
}

.status{
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.status.livre{
  background:#dcfce7;
  color:#166534;
}

.status.ocupada{
  background:#fef3c7;
  color:#92400e;
}

.status.conta{
  background:#fee2e2;
  color:#991b1b;
}

.mini{
  font-size:13px;
  color:var(--muted);
  line-height:1.4;
}

.mini strong{
  color:var(--text);
}

.acoes-card{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:4px;
}

.btn-card{
  border:none;
  border-radius:12px;
  padding:11px 10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-abrir{background:#111827;color:#fff}
.btn-pedidos{background:#2563eb;color:#fff}
.btn-conta{background:#f59e0b;color:#111827}
.btn-liberar{background:#16a34a;color:#fff}
.btn-remover{background:#ef4444;color:#fff}

.vazio{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
  color:var(--muted);
  text-align:center;
}

@media (max-width:700px){
  .hero h1{font-size:28px}
  #listaMesas{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="topo">
  <div class="topo-linha-1">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-bola">🍻</div>
      <div>
        <strong>Controle Interno</strong><br>
        <small style="color:var(--muted)">Garçom e admin</small>
      </div>
    </div>

    <div class="topo-acoes">
      <button class="btn-topo" onclick="vendaAvulsa()">Venda avulsa</button>
      <button class="btn-topo primary" onclick="adicionarMesa()">+ Mesa</button>
      <button class="btn-topo" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="topo-breadcrumb">
    <span>Painel</span>
    <span>›</span>
    <span class="ativo">Mesas internas</span>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h1>Mesas do bar</h1>
    <p>Fluxo interno sem QR, sem sessão expirada, sem scan. Só garçom e admin.</p>
  </div>

  <div class="painel-info">
    <div class="info-box">
      <span>Mesas livres</span>
      <strong id="totalLivres">0</strong>
    </div>
    <div class="info-box">
      <span>Mesas ocupadas</span>
      <strong id="totalOcupadas">0</strong>
    </div>
    <div class="info-box">
      <span>Pediram conta</span>
      <strong id="totalConta">0</strong>
    </div>
  </div>

  <div class="atualizacao" id="infoAtualizacao">Atualizando...</div>

  <div id="listaMesas"></div>
</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let carregandoMesas = false;
let criandoMesa = false;
let intervaloMesas = null;
const cardsRenderizados = new Map();
const SEGREDO_REMOVER_MESA = "4321";

function esperarSessao(){
  const funcionario = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  const admin = JSON.parse(localStorage.getItem("admin_logado") || "null");

  if (funcionario?.app_id) {
    app_id = funcionario.app_id;
    iniciarSistema();
    return;
  }

  if (admin?.app_id) {
    app_id = admin.app_id;
    iniciarSistema();
    return;
  }

  if (window.APP_ID) {
    app_id = window.APP_ID;
    iniciarSistema();
    return;
  }

  setTimeout(esperarSessao, 120);
}

function iniciarSistema(){
  if (!app_id) {
    alert("Sessão inválida.");
    location.href = "/auth/login.html";
    return;
  }

  carregarMesas();

  if (intervaloMesas) clearInterval(intervaloMesas);
  intervaloMesas = setInterval(carregarMesas, 5000);
}

function normalizarStatus(status){
  return String(status || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function statusFechado(status){
  const s = normalizarStatus(status);
  return [
    "pago",
    "finalizado",
    "cancelado",
    "encerrado",
    "concluido",
    "fechado",
    "quitado",
    "recebido",
    "entregue"
  ].includes(s);
}

function statusConta(status){
  const s = normalizarStatus(status);
  return s === "conta_solicitada" || s === "pedir_conta";
}

function formatarHoraBR(dataIso){
  if (!dataIso) return "-";
  try{
    return new Date(dataIso).toLocaleTimeString("pt-BR", {
      hour:"2-digit",
      minute:"2-digit"
    });
  }catch{
    return "-";
  }
}

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function atualizarInfoAtualizacao(){
  const el = document.getElementById("infoAtualizacao");
  if (!el) return;
  el.textContent = `Última atualização: ${new Date().toLocaleTimeString("pt-BR")} • Atualiza a cada 5 segundos`;
}

function atualizarResumo(mesasProcessadas){
  let livres = 0;
  let ocupadas = 0;
  let conta = 0;

  mesasProcessadas.forEach(m => {
    if (m.estado_visual === "conta") conta++;
    else if (m.estado_visual === "ocupada") ocupadas++;
    else livres++;
  });

  document.getElementById("totalLivres").textContent = livres;
  document.getElementById("totalOcupadas").textContent = ocupadas;
  document.getElementById("totalConta").textContent = conta;
}

function criarCardMesaBase(mesaId){
  const div = document.createElement("div");
  div.dataset.mesaId = mesaId;
  div.className = "card livre";
  div.innerHTML = `
    <div class="card-topo">
      <h3 class="titulo-mesa">Mesa</h3>
      <span class="status livre">LIVRE</span>
    </div>

    <div class="mini info-cliente"></div>
    <div class="mini info-pedidos"></div>
    <div class="mini info-total"></div>

    <div class="acoes-card">
      <button class="btn-card btn-abrir">Abrir</button>
      <button class="btn-card btn-pedidos">Pedidos</button>
      <button class="btn-card btn-conta">Pedir conta</button>
      <button class="btn-card btn-liberar">Liberar</button>
      <button class="btn-card btn-remover" style="grid-column:1 / -1">Remover mesa</button>
    </div>
  `;
  return div;
}

async function atualizarOuCriarCardMesa(mesa){
  const grid = document.getElementById("listaMesas");
  let card = cardsRenderizados.get(mesa.id);

  if (!card) {
    card = criarCardMesaBase(mesa.id);
    cardsRenderizados.set(mesa.id, card);
    grid.appendChild(card);
  }

  let classe = "livre";
  let texto = "LIVRE";

  if (mesa.mesaPediuConta) {
    classe = "conta";
    texto = "PEDIU CONTA";
  } else if (mesa.pedidoAberto || mesa.ocupada) {
    classe = "ocupada";
    texto = "OCUPADA";
  }

  card.className = `card ${classe}`;
  card.querySelector(".titulo-mesa").textContent = `Mesa ${mesa.numero_mesa}`;

  const statusEl = card.querySelector(".status");
  statusEl.className = `status ${classe}`;
  statusEl.textContent = texto;

  const ultimoPedido = mesa.pedidosMesa?.[0] || null;
  const qtdPedidos = mesa.pedidosMesa?.length || 0;

  card.querySelector(".info-cliente").innerHTML =
    `<strong>Cliente:</strong> ${mesa.cliente_nome || ultimoPedido?.cliente_nome || "-"}`;

  card.querySelector(".info-pedidos").innerHTML =
    `<strong>Pedidos:</strong> ${qtdPedidos} ${qtdPedidos === 1 ? "lançado" : "lançados"}`
    + (ultimoPedido ? ` • Último às ${formatarHoraBR(ultimoPedido.created_at)}` : "");

  card.querySelector(".info-total").innerHTML =
    `<strong>Total aberto:</strong> ${formatarMoeda(mesa.total_aberto || 0)}`;

  const btnAbrir = card.querySelector(".btn-abrir");
  const btnPedidos = card.querySelector(".btn-pedidos");
  const btnConta = card.querySelector(".btn-conta");
  const btnLiberar = card.querySelector(".btn-liberar");
  const btnRemover = card.querySelector(".btn-remover");

  btnAbrir.onclick = () => abrirMesa(mesa);
  btnPedidos.onclick = () => abrirTelaPedidos(mesa);
  btnConta.onclick = () => pedirContaMesa(mesa);
  btnLiberar.onclick = () => liberarMesa(mesa);
  btnRemover.onclick = (e) => {
    e.stopPropagation();
    removerMesa(mesa);
  };

  btnAbrir.disabled = !!(mesa.pedidoAberto || mesa.mesaPediuConta || mesa.ocupada);
  btnConta.disabled = !(mesa.pedidoAberto || mesa.ocupada);
  btnLiberar.disabled = !!mesa.pedidoAberto;
  btnRemover.disabled = !!(mesa.pedidoAberto || mesa.mesaPediuConta);

  mesa.estado_visual = classe;
}

async function carregarMesas(){
  if (carregandoMesas) return;
  carregandoMesas = true;

  try {
    const listaMesas = document.getElementById("listaMesas");

    const { data: mesas, error: erroMesas } = await sb
      .from("mesas")
      .select("id,numero_mesa,ocupada,status,pedir_conta,cliente_nome,cliente_celular,total_aberto,ativa")
      .eq("app_id", app_id)
      .eq("ativa", true)
      .order("numero_mesa");

    if (erroMesas) {
      console.error("Erro ao carregar mesas:", erroMesas);
      return;
    }

    const { data: pedidos, error: erroPedidos } = await sb
      .from("pedidos")
      .select("id,mesa_id,status,created_at,origem,cliente_id,cliente_nome,cliente_telefone,total")
      .eq("app_id", app_id)
      .eq("origem", "mesa")
      .not("mesa_id", "is", null)
      .order("created_at", { ascending:false });

    if (erroPedidos) {
      console.error("Erro ao carregar pedidos:", erroPedidos);
      return;
    }

    const todosPedidosPorMesa = {};
    (pedidos || []).forEach(p => {
      if (!todosPedidosPorMesa[p.mesa_id]) todosPedidosPorMesa[p.mesa_id] = [];
      todosPedidosPorMesa[p.mesa_id].push(p);
    });

    const idsAtuais = new Set();
    const mesasProcessadas = [];

    if (!mesas || mesas.length === 0) {
      listaMesas.innerHTML = `<div class="vazio">Nenhuma mesa cadastrada.</div>`;
      cardsRenderizados.clear();
      atualizarResumo([]);
      atualizarInfoAtualizacao();
      return;
    }

    listaMesas.innerHTML = "";

    for (const m of mesas) {
      idsAtuais.add(m.id);

      const pedidosMesa = todosPedidosPorMesa[m.id] || [];
      const pedidoAberto = pedidosMesa.find(p => !statusFechado(p.status)) || null;

      const mesaPediuConta =
        m.pedir_conta === true ||
        statusConta(m.status) ||
        statusConta(pedidoAberto?.status);

      const totalAberto = pedidosMesa
        .filter(p => !statusFechado(p.status))
        .reduce((soma, p) => soma + Number(p.total || 0), 0);

      const deveEstarOcupada = mesaPediuConta || !!pedidoAberto;

      if (deveEstarOcupada && (!m.ocupada || Number(m.total_aberto || 0) !== totalAberto)) {
        await sb
          .from("mesas")
          .update({
            ocupada: true,
            status: mesaPediuConta ? "conta_solicitada" : "ocupada",
            total_aberto: totalAberto
          })
          .eq("id", m.id);

        m.ocupada = true;
        m.status = mesaPediuConta ? "conta_solicitada" : "ocupada";
        m.total_aberto = totalAberto;
      }

      if (!deveEstarOcupada && (m.ocupada || m.pedir_conta || m.status !== "livre" || m.cliente_nome || Number(m.total_aberto || 0) !== 0)) {
        await sb
          .from("mesas")
          .update({
            ocupada: false,
            pedir_conta: false,
            status: "livre",
            cliente_nome: null,
            cliente_celular: null,
            total_aberto: 0
          })
          .eq("id", m.id);

        m.ocupada = false;
        m.pedir_conta = false;
        m.status = "livre";
        m.cliente_nome = null;
        m.total_aberto = 0;
      }

      const mesaTratada = {
        ...m,
        pedidosMesa,
        pedidoAberto,
        mesaPediuConta
      };

      await atualizarOuCriarCardMesa(mesaTratada);
      mesasProcessadas.push(mesaTratada);
    }

    for (const [mesaId, card] of cardsRenderizados.entries()) {
      if (!idsAtuais.has(mesaId)) {
        card.remove();
        cardsRenderizados.delete(mesaId);
      }
    }

    atualizarResumo(mesasProcessadas);
    atualizarInfoAtualizacao();
  } catch (erro) {
    console.error("Erro geral ao carregar mesas:", erro);
  } finally {
    carregandoMesas = false;
  }
}

async function adicionarMesa(){
  if (criandoMesa) return;
  criandoMesa = true;

  try {
    const { data, error: erroUltima } = await sb
      .from("mesas")
      .select("numero_mesa")
      .eq("app_id", app_id)
      .order("numero_mesa", { ascending:false })
      .limit(1)
      .maybeSingle();

    if (erroUltima) {
      console.error("Erro ao buscar última mesa:", erroUltima);
      alert("Erro ao buscar última mesa.");
      return;
    }

    const prox = (data?.numero_mesa || 0) + 1;

    const { data: novaMesa, error } = await sb
      .from("mesas")
      .insert({
        app_id,
        numero_mesa: prox,
        ativa: true,
        ocupada: false,
        pedir_conta: false,
        status: "livre",
        total_aberto: 0
      })
      .select()
      .single();

    if (error || !novaMesa) {
      console.error("Erro ao adicionar mesa:", error);
      alert("Erro ao adicionar mesa.");
      return;
    }

    carregarMesas();
  } finally {
    criandoMesa = false;
  }
}

async function abrirMesa(mesa){
  const nome = prompt(`Nome do cliente/responsável da Mesa ${mesa.numero_mesa}:`, mesa.cliente_nome || "");
  if (nome === null) return;

  const { error } = await sb
    .from("mesas")
    .update({
      ocupada: true,
      pedir_conta: false,
      status: "ocupada",
      cliente_nome: nome.trim() || null
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao abrir mesa:", error);
    alert("Erro ao abrir mesa.");
    return;
  }

  carregarMesas();
}

function abrirTelaPedidos(mesa){
  location.href = `mesa.html?mesa_id=${encodeURIComponent(mesa.id)}&mesa_numero=${encodeURIComponent(mesa.numero_mesa)}`;
}

async function pedirContaMesa(mesa){
  const confirmar = confirm(`Marcar a Mesa ${mesa.numero_mesa} como PEDIU CONTA?`);
  if (!confirmar) return;

  const { error } = await sb
    .from("mesas")
    .update({
      ocupada: true,
      pedir_conta: true,
      status: "conta_solicitada"
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao pedir conta:", error);
    alert("Erro ao pedir conta.");
    return;
  }

  carregarMesas();
}

async function liberarMesa(mesa){
  const confirmar = confirm(`Liberar a Mesa ${mesa.numero_mesa}?`);
  if (!confirmar) return;

  const { error } = await sb
    .from("mesas")
    .update({
      ocupada: false,
      pedir_conta: false,
      status: "livre",
      cliente_nome: null,
      cliente_celular: null,
      total_aberto: 0
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao liberar mesa:", error);
    alert("Erro ao liberar mesa.");
    return;
  }

  carregarMesas();
}

async function removerMesa(mesa){
  const senha = prompt(`Código para remover a Mesa ${mesa.numero_mesa}:`);
  if (senha !== SEGREDO_REMOVER_MESA) return;

  const { error } = await sb
    .from("mesas")
    .update({
      ativa: false,
      ocupada: false,
      pedir_conta: false,
      status: "livre",
      cliente_nome: null,
      cliente_celular: null,
      total_aberto: 0
    })
    .eq("id", mesa.id);

  if (error) {
    console.error("Erro ao remover mesa:", error);
    alert("Erro ao remover mesa.");
    return;
  }

  carregarMesas();
}

function vendaAvulsa(){
  location.href = "venda-avulsa.html";
}

function logout(){
  localStorage.removeItem("funcionario_logado");
  localStorage.removeItem("admin_logado");
  location.href = "/auth/login.html";
}

esperarSessao();
</script>
</body>
</html>
