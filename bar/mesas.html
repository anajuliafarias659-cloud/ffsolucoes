<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module" src="../js/auth.js"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.container{padding:32px;max-width:1200px;margin:auto}
.btn{border:none;padding:10px 16px;border-radius:10px;font-weight:bold;cursor:pointer}
.btn-add{background:#22c55e}
.btn-avulsa{background:#38bdf8}
.btn-voltar{background:#1e293b;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.card{background:#0f172a;padding:16px;border-radius:18px;text-align:center;border:2px solid transparent;cursor:pointer;transition:.15s}
.card:hover{transform:scale(1.03)}
.card.livre{border-color:#22c55e}
.card.preparando{border-color:#eab308}
.card.conta{border-color:#fde047;box-shadow:0 0 14px rgba(253,224,71,.8)}
.status{margin:6px 0 10px;padding:4px 10px;border-radius:8px;font-weight:bold;font-size:13px}
.status.livre{background:#22c55e;color:#022c22}
.status.preparando{background:#eab308;color:#000}
.status.conta{background:#fde047;color:#000}
.qr{background:#020617;border-radius:14px;padding:10px;margin:12px 0;display:flex;justify-content:center}
.btn-remover{margin-top:8px;width:100%;background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:8px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
.url-mini{margin-top:8px;font-size:11px;color:#94a3b8;word-break:break-all}
.cliente-mini{font-size:12px;color:#94a3b8;margin-bottom:8px;min-height:16px}
.sessao-mini{font-size:11px;color:#cbd5e1;margin-top:6px;min-height:15px}
</style>
</head>

<body>

<div class="topo">
  <h2>🪑 Mesas</h2>
  <div>
    <button class="btn btn-avulsa" onclick="vendaAvulsa()">💳 Venda Avulsa</button>
    <button class="btn btn-add" onclick="adicionarMesa()">➕ Mesa</button>
    <button class="btn btn-voltar" onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">
  <div class="grid" id="listaMesas"></div>
</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
const SEGREDO_REMOVER_MESA = "4321";
let criandoMesa = false;
let carregandoMesas = false;
let canalRealtime = null;
let intervalMesas = null;

const DURACAO_SESSAO_MINUTOS = 15;

function esperarSessao(){
  const funcionario = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  const admin = JSON.parse(localStorage.getItem("admin_logado") || "null");

  if(funcionario && funcionario.app_id){
    app_id = funcionario.app_id;
    iniciarSistema();
    return;
  }

  if(admin && admin.app_id){
    app_id = admin.app_id;
    iniciarSistema();
    return;
  }

  if(window.APP_ID){
    app_id = window.APP_ID;
    iniciarSistema();
    return;
  }

  setTimeout(esperarSessao,100);
}

function iniciarSistema(){
  if(!app_id){
    alert("Sessão inválida");
    location.href="/auth/login.html";
    return;
  }

  carregarMesas();
  iniciarRealtime();

  if (intervalMesas) clearInterval(intervalMesas);
  intervalMesas = setInterval(carregarMesas, 4000);
}

function agoraISO(){
  return new Date().toISOString();
}

function adicionarMinutosISO(minutos){
  return new Date(Date.now() + minutos * 60000).toISOString();
}

function gerarTokenSeguro(){
  if (window.crypto?.randomUUID) {
    return crypto.randomUUID().replaceAll("-", "") + Date.now();
  }
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function montarUrlMesa(mesaId, token){
  return `${location.origin}/bar/mesa.html?mesa=${encodeURIComponent(mesaId)}&token=${encodeURIComponent(token)}`;
}

function statusFechado(status){
  const s = String(status || "").toLowerCase().trim();
  return ["pago","finalizado","cancelado","encerrado"].includes(s);
}

function statusConta(status){
  const s = String(status || "").toLowerCase().trim();
  return s === "conta_solicitada" || s === "pedir_conta";
}

function statusPedidoAtivo(status){
  const s = String(status || "").toLowerCase().trim();
  return ["aberto","novo","aceito","preparando","pronto","conta_solicitada","pedir_conta"].includes(s);
}

function formatarHoraBR(dataIso){
  if (!dataIso) return "";
  try{
    return new Date(dataIso).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  }catch{
    return "";
  }
}

function expirouSessao(sessao){
  if (!sessao?.expira_em) return true;
  return new Date(sessao.expira_em).getTime() <= Date.now();
}

async function buscarSessaoAtivaMesa(mesaId){
  const { data, error } = await sb
    .from("sessoes_mesa")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", app_id)
    .eq("ativa", true)
    .order("created_at", { ascending: false })
    .limit(1);

  if (error) {
    console.error("Erro ao buscar sessão da mesa:", mesaId, error);
    return null;
  }

  return data?.[0] || null;
}

async function encerrarSessaoMesa(sessaoId){
  if (!sessaoId) return;

  const { error: e1 } = await sb
    .from("sessoes_mesa")
    .update({
      ativa: false,
      encerrada_em: agoraISO()
    })
    .eq("id", sessaoId);

  if (e1) {
    console.error("Erro ao encerrar sessão:", e1);
  }

  const { error: e2 } = await sb
    .from("sessoes_mesa_dispositivos")
    .delete()
    .eq("sessao_mesa_id", sessaoId);

  if (e2) {
    console.error("Erro ao limpar dispositivos da sessão:", e2);
  }
}

async function criarSessaoMesa(mesaId){
  const token = gerarTokenSeguro();

  const payload = {
    mesa_id: mesaId,
    app_id: app_id,
    token: token,
    ativa: true,
    ultimo_acesso_em: agoraISO(),
    expira_em: adicionarMinutosISO(DURACAO_SESSAO_MINUTOS)
  };

  const { data, error } = await sb
    .from("sessoes_mesa")
    .insert(payload)
    .select()
    .single();

  if (error || !data) {
    console.error("Erro ao criar sessão da mesa:", mesaId, error);
    return null;
  }

  return data;
}

async function obterSessaoValidaMesa(mesaId){
  const sessao = await buscarSessaoAtivaMesa(mesaId);

  if (!sessao) {
    return await criarSessaoMesa(mesaId);
  }

  if (expirouSessao(sessao)) {
    await encerrarSessaoMesa(sessao.id);
    return await criarSessaoMesa(mesaId);
  }

  return sessao;
}

async function renovarSessaoMesaSeNecessario(mesaId, motivo = ""){
  const sessaoAtual = await buscarSessaoAtivaMesa(mesaId);

  if (sessaoAtual?.id) {
    await encerrarSessaoMesa(sessaoAtual.id);
  }

  const novaSessao = await criarSessaoMesa(mesaId);

  if (!novaSessao) {
    console.error("Falha ao renovar sessão da mesa", mesaId, motivo);
  }

  return novaSessao;
}

async function processarSessaoConformePedidos(mesa, pedidoAberto){
  let sessao = await buscarSessaoAtivaMesa(mesa.id);

  if (pedidoAberto) {
    if (!sessao) {
      sessao = await criarSessaoMesa(mesa.id);
    } else if (expirouSessao(sessao)) {
      await encerrarSessaoMesa(sessao.id);
      sessao = await criarSessaoMesa(mesa.id);
    }
    return sessao;
  }

  if (sessao) {
    if (expirouSessao(sessao)) {
      await encerrarSessaoMesa(sessao.id);
      return await criarSessaoMesa(mesa.id);
    }
    return sessao;
  }

  return await criarSessaoMesa(mesa.id);
}

/* ===== CARREGAR MESAS ===== */
async function carregarMesas(){
  if (carregandoMesas) return;
  carregandoMesas = true;

  try {
    const { data: mesas, error: erroMesas } = await sb
      .from("mesas")
      .select("id,numero_mesa,ocupada,status,pedir_conta,cliente_nome,ativa")
      .eq("app_id", app_id)
      .eq("ativa", true)
      .order("numero_mesa");

    if (erroMesas) {
      console.error("Erro ao carregar mesas:", erroMesas);
      return;
    }

    const { data: pedidos, error: erroPedidos } = await sb
      .from("pedidos")
      .select("id,mesa_id,status,created_at")
      .eq("app_id", app_id)
      .not("mesa_id","is",null)
      .order("created_at",{ ascending:false });

    if (erroPedidos) {
      console.error("Erro ao carregar pedidos:", erroPedidos);
    }

    const pedidosAbertosPorMesa = {};
    const todosPedidosPorMesa = {};

    (pedidos || []).forEach(p => {
      if (!todosPedidosPorMesa[p.mesa_id]) todosPedidosPorMesa[p.mesa_id] = [];
      todosPedidosPorMesa[p.mesa_id].push(p);

      if (statusFechado(p.status)) return;
      if (!pedidosAbertosPorMesa[p.mesa_id]) {
        pedidosAbertosPorMesa[p.mesa_id] = p;
      }
    });

    const grid = document.getElementById("listaMesas");
    grid.innerHTML = "";

    for (const m of (mesas || [])) {
      const pedidosMesa = todosPedidosPorMesa[m.id] || [];
      const pedidoAberto = pedidosAbertosPorMesa[m.id] || null;

      const mesaPediuConta =
        m.pedir_conta === true ||
        statusConta(m.status) ||
        statusConta(pedidoAberto?.status);

      const mesaSemPendencias = pedidosMesa.length === 0 || pedidosMesa.every(p => statusFechado(p.status));

      if (mesaSemPendencias) {
        const sessaoAtual = await buscarSessaoAtivaMesa(m.id);

        if (sessaoAtual) {
          await renovarSessaoMesaSeNecessario(m.id, "mesa paga/finalizada");
        } else {
          await criarSessaoMesa(m.id);
        }
      }

      let classe = "livre";
      let texto = "LIVRE";

      if (mesaPediuConta) {
        classe = "conta";
        texto = "PEDIU A CONTA";
      } else if (pedidoAberto || m.ocupada) {
        classe = "preparando";
        texto = "OCUPADA";
      }

      const deveEstarOcupada = mesaPediuConta || !!pedidoAberto;

      if (deveEstarOcupada && !m.ocupada) {
        await sb
          .from("mesas")
          .update({ ocupada: true })
          .eq("id", m.id);
      }

      if (!deveEstarOcupada && m.ocupada) {
        await sb
          .from("mesas")
          .update({
            ocupada: false,
            pedir_conta: false,
            status: "livre",
            cliente_nome: null
          })
          .eq("id", m.id);
      }

      const sessao = await processarSessaoConformePedidos(m, pedidoAberto);
      const urlMesa = sessao
        ? montarUrlMesa(m.id, sessao.token)
        : `${location.origin}/bar/mesa.html?mesa=${encodeURIComponent(m.id)}`;

      const expiraTxt = sessao?.expira_em
        ? `Sessão até ${formatarHoraBR(sessao.expira_em)}`
        : "";

      const div = document.createElement("div");
      div.className = `card ${classe}`;
      div.innerHTML = `
        <h3>Mesa ${m.numero_mesa}</h3>
        <span class="status ${classe}">${texto}</span>
        <div class="cliente-mini">${m.cliente_nome ? m.cliente_nome : ""}</div>
        <div class="qr">
          <canvas id="qr-${m.id}"></canvas>
        </div>
        <div class="sessao-mini">${expiraTxt}</div>
        <div class="url-mini">${urlMesa}</div>
        ${!pedidoAberto && !mesaPediuConta ? `<button class="btn-remover">Remover mesa</button>` : ``}
      `;

      div.onclick = () => {
        location.href = urlMesa;
      };

      grid.appendChild(div);

      const canvas = document.getElementById(`qr-${m.id}`);
      if (canvas && sessao) {
        await QRCode.toCanvas(canvas, urlMesa, { width:120 });
      }

      const btn = div.querySelector(".btn-remover");
      if (btn) {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const senha = prompt("Código para remover a mesa:");
          if (senha !== SEGREDO_REMOVER_MESA) return;

          const sessaoAtual = await buscarSessaoAtivaMesa(m.id);
          if (sessaoAtual?.id) {
            await encerrarSessaoMesa(sessaoAtual.id);
          }

          await sb
            .from("mesas")
            .update({
              ativa:false,
              ocupada:false,
              pedir_conta:false,
              status:"livre",
              cliente_nome:null
            })
            .eq("id", m.id);

          carregarMesas();
        };
      }
    }
  } finally {
    carregandoMesas = false;
  }
}

/* ===== REALTIME ===== */
function iniciarRealtime(){
  if (canalRealtime) return;

  canalRealtime = sb.channel(`painel-mesas-${app_id}`)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "mesas",
        filter: `app_id=eq.${app_id}`
      },
      () => {
        carregarMesas();
      }
    )
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedidos",
        filter: `app_id=eq.${app_id}`
      },
      () => {
        carregarMesas();
      }
    )
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "sessoes_mesa",
        filter: `app_id=eq.${app_id}`
      },
      () => {
        carregarMesas();
      }
    )
    .subscribe((status) => {
      console.log("Realtime mesas:", status);
    });
}

/* ===== ADICIONAR MESA ===== */
async function adicionarMesa(){
  if (criandoMesa) return;
  criandoMesa = true;

  try {
    const { data, error: erroUltima } = await sb
      .from("mesas")
      .select("numero_mesa")
      .eq("app_id", app_id)
      .order("numero_mesa", { ascending:false })
      .limit(1)
      .maybeSingle();

    if (erroUltima) {
      console.error("Erro ao buscar última mesa:", erroUltima);
      alert("Erro ao buscar última mesa.");
      criandoMesa = false;
      return;
    }

    const prox = (data?.numero_mesa || 0) + 1;

    const { data: novaMesa, error } = await sb
      .from("mesas")
      .insert({
        app_id,
        numero_mesa: prox,
        ativa: true,
        ocupada: false,
        pedir_conta: false,
        status: "livre"
      })
      .select()
      .single();

    if (error || !novaMesa) {
      console.error("Erro ao adicionar mesa:", error);
      alert("Erro ao adicionar mesa.");
      criandoMesa = false;
      return;
    }

    await criarSessaoMesa(novaMesa.id);
    carregarMesas();
  } finally {
    criandoMesa = false;
  }
}

function vendaAvulsa(){
  location.href = `venda-avulsa.html`;
}

function logout(){
  localStorage.removeItem("funcionario_logado");
  localStorage.removeItem("admin_logado");
  location.href = "/auth/login.html";
}

esperarSessao();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
