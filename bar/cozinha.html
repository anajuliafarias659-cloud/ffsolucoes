<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cozinha | Pedidos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --border:#1e293b;
  --text:#ffffff;
  --muted:#94a3b8;
  --novo:#eab308;
  --preparo:#38bdf8;
  --finalizado:#22c55e;
  --cancelado:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:18px;
  border-bottom:1px solid var(--border);
  font-size:20px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.btn-voltar{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:#1e293b;
  color:#fff;
}

.subinfo{
  font-size:12px;
  color:var(--muted);
  width:100%;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
}

.meta{
  font-size:13px;
  color:var(--muted);
  margin-bottom:12px;
}

.itens div{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}

.total{
  font-weight:700;
  margin-top:12px;
}

.actions{
  margin-top:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.preparar{background:var(--novo)}
.entregar{background:var(--preparo)}
.finalizar{background:var(--finalizado)}
.cancelar{background:var(--cancelado);color:#fff}

.empty{
  grid-column:1/-1;
  text-align:center;
  color:var(--muted);
  margin-top:40px;
}

.status-badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
}

.status-novo,.status-aberto{background:rgba(234,179,8,.18);color:#facc15}
.status-aceito{background:rgba(56,189,248,.18);color:#38bdf8}
.status-pronto{background:rgba(34,197,94,.18);color:#22c55e}
.status-cancelado{background:rgba(239,68,68,.18);color:#ef4444}
</style>
</head>

<body>

<header>
  <div>🍳 Cozinha — Pedidos Ativos</div>
  <button class="btn-voltar" onclick="history.back()">Voltar</button>
  <div class="subinfo" id="subinfo">Carregando negócio...</div>
</header>

<div class="container" id="lista"></div>

<audio id="alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script type="module">
import { supabase } from "../js/supabase.js";

const lista = document.getElementById("lista");
const alerta = document.getElementById("alerta");
const subinfo = document.getElementById("subinfo");

let app_id = null;
let canalRealtime = null;

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

/* ===============================
   INICIAR
================================= */
async function iniciar(){
  const { data, error } = await supabase.auth.getSession();

  if(error || !data.session){
    window.location.href = "/auth/login.html";
    return;
  }

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, nome, email, app_id")
    .eq("id", data.session.user.id)
    .single();

  if(erroUsuario || !usuario){
    console.error("Erro ao buscar usuário:", erroUsuario);
    alert("Usuário não encontrado.");
    window.location.href = "/auth/login.html";
    return;
  }

  app_id = usuario.app_id;

  if(!app_id){
    alert("Negócio não identificado.");
    return;
  }

  subinfo.innerText = `${usuario.nome || usuario.email} • ID do Negócio: ${app_id}`;

  await carregarPedidos();
  ativarRealtime();
}

/* ===============================
   CARREGAR PEDIDOS
================================= */
async function carregarPedidos(){
  lista.innerHTML = `<div class="empty">Carregando pedidos...</div>`;

  const { data: pedidos, error: erroPedidos } = await supabase
    .from("pedidos")
    .select("id, mesa_id, status, created_at")
    .eq("app_id", app_id)
    .in("status", ["novo","aberto","aceito"])
    .order("created_at", { ascending:true });

  if(erroPedidos){
    console.error("Erro ao carregar pedidos:", erroPedidos);
    lista.innerHTML = `<div class="empty">Erro ao carregar pedidos</div>`;
    return;
  }

  if(!pedidos || pedidos.length === 0){
    lista.innerHTML = `<div class="empty">Nenhum pedido da cozinha</div>`;
    return;
  }

  const pedidoIds = pedidos.map(p => p.id);
  const mesaIds = [...new Set(pedidos.map(p => p.mesa_id).filter(Boolean))];

  const [
    { data: itens, error: erroItens },
    { data: mesas, error: erroMesas }
  ] = await Promise.all([
    supabase
      .from("pedido_itens")
      .select("id, pedido_id, nome_produto, quantidade, preco, destino, status")
      .in("pedido_id", pedidoIds)
      .order("created_at", { ascending: true }),

    mesaIds.length > 0
      ? supabase
          .from("mesas")
          .select("id, numero_mesa")
          .in("id", mesaIds)
      : Promise.resolve({ data: [], error: null })
  ]);

  if(erroItens){
    console.error("Erro ao carregar itens:", erroItens);
    lista.innerHTML = `<div class="empty">Erro ao carregar itens dos pedidos</div>`;
    return;
  }

  if(erroMesas){
    console.error("Erro ao carregar mesas:", erroMesas);
    lista.innerHTML = `<div class="empty">Erro ao carregar mesas</div>`;
    return;
  }

  const mapaMesas = new Map();
  (mesas || []).forEach(m => mapaMesas.set(m.id, m));

  const mapaItensPorPedido = new Map();
  (itens || []).forEach(item => {
    if(!mapaItensPorPedido.has(item.pedido_id)){
      mapaItensPorPedido.set(item.pedido_id, []);
    }
    mapaItensPorPedido.get(item.pedido_id).push(item);
  });

  const pedidosMontados = pedidos.map(p => ({
    ...p,
    mesa: mapaMesas.get(p.mesa_id) || null,
    pedido_itens: mapaItensPorPedido.get(p.id) || []
  }));

  renderizar(pedidosMontados);
}

/* ===============================
   RENDER
================================= */
function renderizar(pedidos){
  lista.innerHTML = "";
  let encontrou = false;

  pedidos.forEach(p => {
    const itensCozinha = (p.pedido_itens || []).filter(i => {
      if(!i.destino) return true;
      return String(i.destino).toLowerCase() === "cozinha";
    });

    if(itensCozinha.length === 0) return;

    encontrou = true;

    let total = 0;
    const numeroMesa = p.mesa?.numero_mesa || "-";
    const hora = p.created_at
      ? new Date(p.created_at).toLocaleTimeString("pt-BR", {
          hour: "2-digit",
          minute: "2-digit"
        })
      : "--:--";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>Mesa ${numeroMesa}</h3>
      <div class="meta">
        ${hora} · <span class="status-badge status-${p.status}">${p.status}</span>
      </div>
      <div class="itens"></div>
      <div class="total"></div>
      <div class="actions"></div>
    `;

    const divItens = card.querySelector(".itens");

    itensCozinha.forEach(i => {
      const subtotal = Number(i.preco || 0) * Number(i.quantidade || 0);
      total += subtotal;

      const linha = document.createElement("div");
      linha.innerHTML = `
        <span>${i.quantidade}x ${i.nome_produto}</span>
        <span>${formatarMoeda(subtotal)}</span>
      `;
      divItens.appendChild(linha);
    });

    card.querySelector(".total").innerText = `Total Cozinha: ${formatarMoeda(total)}`;

    const actions = card.querySelector(".actions");

    if(p.status === "novo" || p.status === "aberto"){
      const btnPreparar = document.createElement("button");
      btnPreparar.className = "preparar";
      btnPreparar.textContent = "Preparar";
      btnPreparar.onclick = () => mudarStatus(p.id, "aceito");
      actions.appendChild(btnPreparar);
    }

    if(p.status === "aceito"){
      const btnPronto = document.createElement("button");
      btnPronto.className = "entregar";
      btnPronto.textContent = "Pronto";
      btnPronto.onclick = () => mudarStatus(p.id, "pronto");
      actions.appendChild(btnPronto);
    }

    const btnCancelar = document.createElement("button");
    btnCancelar.className = "cancelar";
    btnCancelar.textContent = "Cancelar";
    btnCancelar.onclick = () => mudarStatus(p.id, "cancelado");
    actions.appendChild(btnCancelar);

    lista.appendChild(card);
  });

  if(!encontrou){
    lista.innerHTML = `<div class="empty">Nenhum pedido da cozinha</div>`;
  }
}

/* ===============================
   MUDAR STATUS
================================= */
window.mudarStatus = async function(id, status){
  const { error } = await supabase
    .from("pedidos")
    .update({ status })
    .eq("id", id)
    .eq("app_id", app_id);

  if(error){
    console.error("Erro ao mudar status:", error);
    alert("Erro ao atualizar pedido.");
    return;
  }

  await carregarPedidos();
};

/* ===============================
   REALTIME
================================= */
function ativarRealtime(){
  if(canalRealtime){
    supabase.removeChannel(canalRealtime);
    canalRealtime = null;
  }

  canalRealtime = supabase.channel("pedidos-cozinha-" + app_id)
    .on(
      "postgres_changes",
      { event:"INSERT", schema:"public", table:"pedidos" },
      payload => {
        if(payload.new.app_id === app_id){
          alerta.play().catch(() => {});
          carregarPedidos();
        }
      }
    )
    .on(
      "postgres_changes",
      { event:"UPDATE", schema:"public", table:"pedidos" },
      payload => {
        if(payload.new.app_id === app_id){
          carregarPedidos();
        }
      }
    )
    .on(
      "postgres_changes",
      { event:"INSERT", schema:"public", table:"pedido_itens" },
      payload => {
        if(payload.new.app_id === app_id){
          carregarPedidos();
        }
      }
    )
    .on(
      "postgres_changes",
      { event:"UPDATE", schema:"public", table:"pedido_itens" },
      payload => {
        if(payload.new.app_id === app_id){
          carregarPedidos();
        }
      }
    )
    .subscribe();
}

iniciar();
</script>

</body>
</html>
