<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caixa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="../js/auth.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff
}
.topo{
  background:#0f172a;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:24px
}
.box{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px
}
.resumo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
  margin-top:15px
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  text-align:center
}
.card h4{
  margin:0;
  color:#94a3b8;
  font-size:14px
}
.card p{
  margin:8px 0 0 0;
  font-size:18px;
  font-weight:bold;
  color:#22c55e
}
button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
  margin-right:8px
}
button.sec{
  background:#1e293b;
  color:#fff
}
.badge{
  background:#ef4444;
  color:#fff;
  border-radius:999px;
  padding:2px 8px;
  font-size:12px;
  margin-left:6px
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px
}
th,td{
  padding:12px 10px;
  border-bottom:1px solid #1e293b;
  font-size:14px;
  vertical-align:top
}
th{
  color:#94a3b8;
  text-align:left
}
@keyframes piscar{
  0%{box-shadow:0 0 0 transparent}
  50%{box-shadow:0 0 18px rgba(234,179,8,.9)}
  100%{box-shadow:0 0 0 transparent}
}
.alerta.piscar{
  animation:piscar 1s infinite
}
.itens-consumo{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.item-linha{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:10px;
  padding:8px 10px;
  line-height:1.4;
}
.item-topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.item-nome{
  font-weight:bold;
  color:#fff;
}
.item-qtd{
  color:#cbd5e1;
  font-size:13px;
}
.item-subtotal{
  color:#22c55e;
  font-weight:bold;
  font-size:13px;
}
.item-obs{
  color:#fbbf24;
  font-size:12px;
  margin-top:4px;
}
.total-mesa{
  font-size:15px;
  font-weight:bold;
  color:#22c55e;
}
.mesa-tag{
  display:inline-block;
  background:#1e293b;
  padding:6px 10px;
  border-radius:999px;
  font-weight:bold;
}
.vazio{
  color:#94a3b8;
  text-align:center;
  padding:14px 0;
}
.status-box{
  margin-top:12px;
  color:#94a3b8;
  font-size:13px;
}
.toast{
  position:fixed;
  right:16px;
  bottom:16px;
  background:#f59e0b;
  color:#111827;
  padding:14px 16px;
  border-radius:12px;
  font-weight:bold;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
  z-index:9999;
  display:none;
}
@media(max-width: 768px){
  .topo{
    padding:14px;
  }
  .container{
    padding:14px;
  }
  table, thead, tbody, th, td, tr{
    display:block;
    width:100%;
  }
  thead{
    display:none;
  }
  tr{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:14px;
    padding:12px;
    margin-bottom:12px;
  }
  td{
    border:none;
    padding:8px 0;
  }
  td::before{
    content:attr(data-label);
    display:block;
    color:#94a3b8;
    font-size:12px;
    margin-bottom:4px;
  }
}
</style>
</head>

<body>

<div class="topo">
  <h2>💰 Caixa</h2>
  <div>
    <button onclick="irPara('venda-avulsa.html')">➕ Venda Avulsa</button>
    <button class="alerta" id="btnContas" style="display:none" onclick="scrollContas()">
      🔔 Contas <span class="badge" id="qtdContas">0</span>
    </button>
    <button class="sec" onclick="irPara('historico.html')">📊 Histórico</button>
    <button class="sec" onclick="irPara('admin.html')">Voltar</button>
  </div>
</div>

<div class="container">

  <div class="box">
    <h3>📊 Fechamento de Caixa</h3>

    <div class="resumo-grid">
      <div class="card">
        <h4>Total Recebido Hoje</h4>
        <p id="totalRecebido">R$ 0.00</p>
      </div>
      <div class="card">
        <h4>Quantidade de Vendas</h4>
        <p id="qtdVendas">0</p>
      </div>
      <div class="card">
        <h4>Data</h4>
        <p id="dataHoje">--/--/----</p>
      </div>
    </div>

    <div class="status-box" id="statusRealtime">Status: iniciando...</div>

    <br>
    <button onclick="gerarFechamento()">🔄 Atualizar</button>
    <button onclick="fecharCaixa()">📄 Fechar Caixa Hoje (PDF)</button>
  </div>

  <div class="box" id="boxContas" style="display:none">
    <h3>🧾 Mesas aguardando pagamento</h3>
    <table>
      <thead>
        <tr>
          <th>Mesa</th>
          <th>Consumo</th>
          <th>Total</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="listaContas"></tbody>
    </table>
  </div>

</div>

<div class="toast" id="toastConta">🔔 Nova solicitação de conta</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let resumoPagamentosGlobal = "";
let canalRealtime = null;
let intervaloBackup = null;
let ultimoSomConta = 0;

async function aguardarSessao(){
  while(!window.APP_ID){
    await new Promise(r => setTimeout(r, 100));
  }

  const { data: { session } } = await supabase.auth.getSession();

  if(session?.access_token){
    await supabase.realtime.setAuth(session.access_token);
  }

  await verificarContas();
  await gerarFechamento();
  ativarRealtime();
  iniciarBackupAtualizacao();
}

aguardarSessao();

window.irPara = p => location.href = p;
window.scrollContas = () => document.getElementById("boxContas").scrollIntoView({ behavior:"smooth" });
window.irPagamento = id => location.href = `pagamento.html?pedido=${id}`;

/* =========================
   REALTIME + BACKUP
========================= */
function atualizarStatusRealtime(txt){
  const el = document.getElementById("statusRealtime");
  if(el) el.innerText = "Status: " + txt;
}

function ativarRealtime(){
  if(canalRealtime){
    supabase.removeChannel(canalRealtime);
    canalRealtime = null;
  }

  atualizarStatusRealtime("conectando realtime...");

  canalRealtime = supabase
    .channel(`caixa-realtime-${window.APP_ID}`)

    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedidos"
      },
      async (payload) => {
        console.log("Realtime pedidos:", payload);

        const novo = payload?.new || {};
        const antigo = payload?.old || {};

        if(novo.app_id !== window.APP_ID && antigo.app_id !== window.APP_ID){
          return;
        }

        if(novo.status === "conta_solicitada" && antigo.status !== "conta_solicitada"){
          tocarSom();
          mostrarToast("🔔 Nova solicitação de conta");
        }

        await verificarContas();
        await gerarFechamento();
      }
    )

    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedido_itens"
      },
      async () => {
        console.log("Realtime pedido_itens");
        await verificarContas();
        await gerarFechamento();
      }
    )

    .subscribe((status) => {
      console.log("Status canal caixa:", status);

      if(status === "SUBSCRIBED"){
        atualizarStatusRealtime("realtime conectado");
      }else if(status === "CHANNEL_ERROR"){
        atualizarStatusRealtime("erro no realtime, backup de 5s ativo");
      }else if(status === "TIMED_OUT"){
        atualizarStatusRealtime("realtime expirou, backup de 5s ativo");
      }else if(status === "CLOSED"){
        atualizarStatusRealtime("realtime fechado, backup de 5s ativo");
      }else{
        atualizarStatusRealtime(status);
      }
    });
}

function iniciarBackupAtualizacao(){
  if(intervaloBackup) clearInterval(intervaloBackup);

  intervaloBackup = setInterval(async () => {
    await verificarContas();
    await gerarFechamento();
  }, 5000);
}

function tocarSom(){
  const agora = Date.now();
  if(agora - ultimoSomConta < 1500) return;
  ultimoSomConta = agora;

  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play().catch(() => {});
}

function mostrarToast(msg){
  const el = document.getElementById("toastConta");
  el.innerText = msg;
  el.style.display = "block";

  clearTimeout(el._timer);
  el._timer = setTimeout(() => {
    el.style.display = "none";
  }, 4000);
}

/* =========================
   HELPERS
========================= */
function moeda(v){
  return "R$ " + Number(v || 0).toFixed(2);
}

function escaparHtml(txt){
  return String(txt || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function pegarNomeItem(item){
  return (
    item.nome_produto ||
    item.produto_nome ||
    item.nome ||
    item.descricao ||
    item.titulo ||
    "Item"
  );
}

function pegarObservacaoItem(item){
  return (
    item.observacao ||
    item.obs ||
    item.detalhes ||
    ""
  );
}

/* =========================
   CONTAS
========================= */
async function verificarContas(){
  const btn = document.getElementById("btnContas");
  const qtd = document.getElementById("qtdContas");
  const box = document.getElementById("boxContas");
  const lista = document.getElementById("listaContas");

  lista.innerHTML = "";

  const { data: pedidos, error: erroPedidos } = await supabase
    .from("pedidos")
    .select("id, app_id, mesa_id, status")
    .eq("app_id", window.APP_ID)
    .eq("status", "conta_solicitada");

  if(erroPedidos){
    console.error("Erro ao buscar pedidos:", erroPedidos);
    btn.style.display = "none";
    btn.classList.remove("piscar");
    box.style.display = "none";
    qtd.innerText = "0";
    return;
  }

  if(!pedidos || pedidos.length === 0){
    btn.style.display = "none";
    btn.classList.remove("piscar");
    box.style.display = "none";
    qtd.innerText = "0";
    return;
  }

  const pedidoIds = pedidos.map(p => p.id);
  const mesaIds = [...new Set(pedidos.map(p => p.mesa_id).filter(Boolean))];

  const [{ data: itens, error: erroItens }, { data: mesas, error: erroMesas }] = await Promise.all([
    supabase
      .from("pedido_itens")
      .select("*")
      .in("pedido_id", pedidoIds),

    mesaIds.length
      ? supabase
          .from("mesas")
          .select("id, numero_mesa")
          .in("id", mesaIds)
      : Promise.resolve({ data: [], error: null })
  ]);

  if(erroItens){
    console.error("Erro ao buscar itens:", erroItens);
  }

  if(erroMesas){
    console.error("Erro ao buscar mesas:", erroMesas);
  }

  const mapaMesas = {};
  const todasMesas = mesas || [];
  const todosItens = itens || [];

  for(const pedido of pedidos){
    const chaveMesa = pedido.mesa_id || "sem_mesa";

    if(!mapaMesas[chaveMesa]){
      const mesaInfo = todasMesas.find(m => m.id === pedido.mesa_id);

      mapaMesas[chaveMesa] = {
        mesa_id: pedido.mesa_id,
        numero_mesa: mesaInfo?.numero_mesa || "-",
        pedidos: [],
        total: 0,
        itensAgrupados: {}
      };
    }

    mapaMesas[chaveMesa].pedidos.push(pedido.id);

    const itensDoPedido = todosItens.filter(i => i.pedido_id === pedido.id);

    for(const item of itensDoPedido){
      const nome = pegarNomeItem(item);
      const qtdItem = Number(item.quantidade || 0);
      const precoItem = Number(item.preco || 0);
      const subtotal = qtdItem * precoItem;
      const observacao = pegarObservacaoItem(item);

      mapaMesas[chaveMesa].total += subtotal;

      const chaveItem = `${nome}|||${precoItem}|||${observacao}`;

      if(!mapaMesas[chaveMesa].itensAgrupados[chaveItem]){
        mapaMesas[chaveMesa].itensAgrupados[chaveItem] = {
          nome,
          quantidade: 0,
          preco: precoItem,
          subtotal: 0,
          observacao
        };
      }

      mapaMesas[chaveMesa].itensAgrupados[chaveItem].quantidade += qtdItem;
      mapaMesas[chaveMesa].itensAgrupados[chaveItem].subtotal += subtotal;
    }
  }

  const mesasFormatadas = Object.values(mapaMesas).sort((a,b) => {
    const na = Number(a.numero_mesa);
    const nb = Number(b.numero_mesa);

    if(!isNaN(na) && !isNaN(nb)) return na - nb;
    return String(a.numero_mesa).localeCompare(String(b.numero_mesa), "pt-BR");
  });

  if(mesasFormatadas.length === 0){
    btn.style.display = "none";
    btn.classList.remove("piscar");
    box.style.display = "none";
    qtd.innerText = "0";
    return;
  }

  btn.style.display = "inline-block";
  btn.classList.add("piscar");
  qtd.innerText = mesasFormatadas.length;
  box.style.display = "block";

  for(const mesa of mesasFormatadas){
    const itensArray = Object.values(mesa.itensAgrupados);

    let htmlItens = "";

    if(itensArray.length === 0){
      htmlItens = `<div class="vazio">Nenhum item encontrado nessa conta.</div>`;
    } else {
      htmlItens = `
        <div class="itens-consumo">
          ${itensArray.map(item => `
            <div class="item-linha">
              <div class="item-topo">
                <div>
                  <div class="item-nome">${escaparHtml(item.nome)}</div>
                  <div class="item-qtd">${item.quantidade}x ${moeda(item.preco)}</div>
                </div>
                <div class="item-subtotal">${moeda(item.subtotal)}</div>
              </div>
              ${item.observacao ? `<div class="item-obs">Obs: ${escaparHtml(item.observacao)}</div>` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    const pedidoPrincipal = mesa.pedidos[0];

    lista.innerHTML += `
      <tr>
        <td data-label="Mesa">
          <span class="mesa-tag">Mesa ${escaparHtml(mesa.numero_mesa)}</span>
        </td>
        <td data-label="Consumo">
          ${htmlItens}
        </td>
        <td data-label="Total">
          <span class="total-mesa">${moeda(mesa.total)}</span>
        </td>
        <td data-label="Ação">
          <button onclick="irPagamento('${pedidoPrincipal}')">💳 Pagar</button>
        </td>
      </tr>
    `;
  }
}

/* =========================
   FECHAMENTO
========================= */
window.gerarFechamento = async function(){
  const inicio = new Date();
  inicio.setHours(0,0,0,0);

  const amanha = new Date(inicio.getTime() + 86400000);

  const { data: pedidos, error } = await supabase
    .from("pedidos")
    .select("id, forma_pagamento, created_at")
    .eq("app_id", window.APP_ID)
    .eq("status", "finalizado")
    .gte("created_at", inicio.toISOString())
    .lt("created_at", amanha.toISOString());

  if(error){
    console.error("Erro ao gerar fechamento:", error);
  }

  if(!pedidos || pedidos.length === 0){
    document.getElementById("totalRecebido").innerText = "R$ 0.00";
    document.getElementById("qtdVendas").innerText = "0";
    document.getElementById("dataHoje").innerText = new Date().toLocaleDateString("pt-BR");
    resumoPagamentosGlobal = "";
    return;
  }

  const ids = pedidos.map(p => p.id);

  const { data: itens, error: erroItens } = await supabase
    .from("pedido_itens")
    .select("pedido_id, preco, quantidade")
    .in("pedido_id", ids);

  if(erroItens){
    console.error("Erro ao buscar itens do fechamento:", erroItens);
  }

  let total = 0;
  const pagamentos = {};

  pedidos.forEach(p => {
    let totalPedido = 0;

    (itens || [])
      .filter(i => i.pedido_id === p.id)
      .forEach(i => {
        totalPedido += Number(i.preco || 0) * Number(i.quantidade || 0);
      });

    total += totalPedido;

    const forma = p.forma_pagamento || "Não informado";
    if(!pagamentos[forma]) pagamentos[forma] = 0;
    pagamentos[forma] += totalPedido;
  });

  document.getElementById("totalRecebido").innerText = "R$ " + total.toFixed(2);
  document.getElementById("qtdVendas").innerText = pedidos.length;
  document.getElementById("dataHoje").innerText = new Date().toLocaleDateString("pt-BR");

  let resumo = "";
  for(const forma in pagamentos){
    resumo += `${forma}: R$ ${pagamentos[forma].toFixed(2)}\n`;
  }
  resumoPagamentosGlobal = resumo;
};

/* =========================
   PDF FECHAMENTO
========================= */
window.fecharCaixa = function(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const data = new Date().toLocaleDateString("pt-BR");
  const total = document.getElementById("totalRecebido").innerText;
  const qtd = document.getElementById("qtdVendas").innerText;

  doc.setFontSize(16);
  doc.text("Fechamento de Caixa", 14, 20);

  doc.setFontSize(12);
  doc.text(`Data: ${data}`, 14, 35);
  doc.text(`Total Recebido: ${total}`, 14, 45);
  doc.text(`Quantidade de Vendas: ${qtd}`, 14, 55);

  if(resumoPagamentosGlobal){
    doc.text("Resumo por forma de pagamento:", 14, 70);
    const linhas = doc.splitTextToSize(resumoPagamentosGlobal, 180);
    doc.text(linhas, 14, 80);
  }

  doc.save(`fechamento-caixa-${data.replaceAll("/","-")}.pdf`);
};

window.addEventListener("beforeunload", () => {
  if(canalRealtime){
    supabase.removeChannel(canalRealtime);
  }
  if(intervaloBackup){
    clearInterval(intervaloBackup);
  }
});
</script>

</body>
</html>
