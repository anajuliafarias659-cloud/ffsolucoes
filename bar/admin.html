<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel do Bar / Restaurante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.sair{
  background:#e53935;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  padding:16px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  margin-bottom:30px;
}

@media(min-width:768px){
  .grid{
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  }
}

.card{
  background:#0f172a;
  padding:16px;
  border-radius:14px;
  cursor:pointer;
  transition:.2s;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  position:relative;
  min-height:110px;
}

.card:hover{
  transform:translateY(-4px);
  background:#1e293b;
}

.badge{
  position:absolute;
  top:8px;
  right:8px;
  background:#ef4444;
  color:#fff;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  display:none;
}

@keyframes piscar {
  0%{box-shadow:0 0 0 transparent;}
  50%{box-shadow:0 0 20px rgba(239,68,68,.9);}
  100%{box-shadow:0 0 0 transparent;}
}

.piscar{
  animation:piscar 1s infinite;
}

.link-box{
  margin-top:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:10px;
  font-size:12px;
  color:#cbd5e1;
  word-break:break-all;
  text-align:left;
}

.botao-link{
  margin-top:10px;
  font-size:13px;
  opacity:.9;
  cursor:pointer;
  background:#2563eb;
  border:none;
  color:#fff;
  padding:10px 12px;
  border-radius:10px;
  font-weight:bold;
}

.botao-link:hover{
  opacity:1;
  background:#1d4ed8;
}

.titulo-card{
  font-size:18px;
  font-weight:bold;
  margin-bottom:8px;
}

.subtexto{
  font-size:13px;
  opacity:.75;
  line-height:1.4;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🍻 Painel</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <p>
    Bem-vindo, <b id="nome"></b><br>
    <small style="opacity:.6">
      ID do Negócio: <span id="negocioId"></span>
    </small>
  </p>

  <div class="grid">

    <div class="card" onclick="irPara('produtos.html')">📦 Produtos</div>
    <div class="card" onclick="irPara('categorias.html')">📂 Categorias</div>
    <div class="card" onclick="irPara('mesas.html')">🪑 Mesas</div>
    <div class="card" onclick="irPara('cozinha.html')">🧾 Cozinha</div>

    <div class="card" id="cardPedidos" onclick="irPara('pedidos-online.html')">
      🧾 Pedidos Online
      <span class="badge" id="badgePedidos">0</span>
    </div>

    <div class="card" onclick="irPara('caixa.html')">💰 Caixa</div>
    <div class="card" onclick="irPara('config-site.html')">⚙️ Configura o site / vitrine</div>
    <div class="card" onclick="irPara('admins.html')">⚙️ Admins</div>
    <div class="card" onclick="irPara('mapa-mesas.html')">🗺️ Mapa pra Organiza mesas</div>

    <div class="card" style="grid-column:1/-1; text-align:left; cursor:default;">
      <div class="titulo-card">🌍 Página Pública</div>
      <div class="subtexto">
        Esse é o link público da sua loja para compartilhar com seus clientes.
      </div>

      <div class="link-box" id="linkPublico">
        Carregando link...
      </div>

      <button class="botao-link" onclick="compartilharPagina()">
        🔗 Copiar link da loja
      </button>
    </div>

  </div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

async function carregarUsuario(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario, error } = await supabase
    .from("usuarios")
    .select("nome, app_id")
    .eq("id", userId)
    .single();

  if(error || !usuario){
    alert("Não foi possível carregar os dados do usuário.");
    return;
  }

  app_id = usuario.app_id;

  document.getElementById("nome").innerText = usuario.nome || "";
  document.getElementById("negocioId").innerText = usuario.app_id || "";

  const urlPublica = `${location.origin}/public/vitrine/?app_id=${usuario.app_id}`;
  document.getElementById("linkPublico").innerText = urlPublica;

  verificarPedidos();
  setInterval(verificarPedidos, 5000);
}

async function verificarPedidos(){
  if(!app_id) return;

  const { data, error } = await supabase
    .from("pedidos")
    .select("id")
    .eq("app_id", app_id)
    .eq("status", "novo");

  if(error) return;

  const badge = document.getElementById("badgePedidos");
  const card = document.getElementById("cardPedidos");

  if(data && data.length > 0){
    badge.style.display = "inline-block";
    badge.innerText = data.length;
    card.classList.add("piscar");
  }else{
    badge.style.display = "none";
    card.classList.remove("piscar");
  }
}

window.compartilharPagina = async function(){
  if(!app_id){
    alert("Negócio não identificado");
    return;
  }

  const url = `${location.origin}/public/vitrine/?app_id=${app_id}`;

  try{
    await navigator.clipboard.writeText(url);
    alert("🔗 Link da loja copiado com sucesso!\n\n" + url);
  }catch{
    prompt("Copie o link da loja:", url);
  }
};

window.irPara = function(pagina){
  window.location.href = pagina;
};

window.logout = async function(){
  await supabase.auth.signOut();
  window.location.href = "/auth/login.html";
};

carregarUsuario();
</script>

</body>
</html>
