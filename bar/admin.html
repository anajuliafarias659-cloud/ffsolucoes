<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Passagens</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      background:#0f172a;
      color:#fff;
      font-family:Arial, sans-serif;
    }

    .topo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:20px;
      background:#020617;
      position:sticky;
      top:0;
      z-index:10;
    }

    .titulo{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:22px;
      font-weight:bold;
    }

    .btn-sair{
      border:none;
      border-radius:10px;
      padding:10px 16px;
      background:#ef4444;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .container{
      display:flex;
      gap:20px;
      padding:20px;
      flex-wrap:wrap;
    }

    .card{
      background:#1e293b;
      border-radius:16px;
      padding:22px;
      flex:1;
      min-width:320px;
    }

    h3{
      margin:0 0 18px 0;
      font-size:22px;
    }

    input, select, button{
      width:100%;
      padding:14px 16px;
      margin-top:12px;
      border:none;
      border-radius:12px;
      font-size:16px;
    }

    input, select{
      background:#fff;
      color:#111827;
    }

    .btn-verde{
      background:#22c55e;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .lista{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      background:#334155;
      border-radius:10px;
      padding:12px 14px;
      font-size:15px;
    }

    .muted{
      opacity:.8;
      font-size:14px;
    }

    .erro{
      background:#7f1d1d;
      color:#fff;
      padding:10px 12px;
      border-radius:10px;
      margin-top:12px;
      font-size:14px;
    }

    .ok{
      background:#14532d;
      color:#fff;
      padding:10px 12px;
      border-radius:10px;
      margin-top:12px;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="topo">
    <div class="titulo">🚌 ADMIN PASSAGENS</div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>

  <div class="container">

    <div class="card">
      <h3>Cadastrar Veículo</h3>

      <input id="nomeVeiculo" placeholder="Nome">
      <select id="tipoVeiculo">
        <option value="onibus">Ônibus</option>
        <option value="van">Van</option>
        <option value="micro">Micro-ônibus</option>
      </select>
      <input id="poltronasVeiculo" type="number" min="1" placeholder="Total de poltronas">
      <select id="layoutVeiculo">
        <option value="2-2">Ônibus (2-2)</option>
        <option value="2-1">Van (2-1)</option>
        <option value="1-1">Van pequena (1-1)</option>
      </select>

      <button class="btn-verde" onclick="criarVeiculo()">Salvar Veículo</button>

      <div id="msgVeiculo"></div>
      <div class="lista" id="listaVeiculos"></div>
    </div>

    <div class="card">
      <h3>Cadastrar Viagem</h3>

      <input id="rota" placeholder="Ex: SRN → Teresina">
      <input id="hora" placeholder="08:00">
      <input id="dias" placeholder="Seg,Ter,Qua">
      <select id="veiculoSelect">
        <option value="">Selecione um veículo</option>
      </select>

      <button class="btn-verde" onclick="criarViagem()">Salvar Viagem</button>

      <div id="msgViagem"></div>
      <div class="lista" id="listaViagens"></div>
    </div>

    <div class="card">
      <h3>Reservas</h3>

      <select id="viagemReserva">
        <option value="">Selecione uma viagem</option>
      </select>

      <button class="btn-verde" onclick="verReservas()">Ver Reservas</button>

      <div id="msgReserva"></div>
      <div class="lista" id="listaReservas"></div>
    </div>

  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    let app_id = null;
    let usuarioLogado = null;

    function setMsg(id, texto, tipo = "ok"){
      const el = document.getElementById(id);
      if(!el) return;
      if(!texto){
        el.innerHTML = "";
        return;
      }
      el.innerHTML = `<div class="${tipo}">${texto}</div>`;
    }

    async function sair(){
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    }

    async function carregarApp(){
      const { data: sessionData, error: sessionError } = await supabase.auth.getSession();

      if(sessionError || !sessionData?.session?.user){
        window.location.href = "/login.html";
        return;
      }

      usuarioLogado = sessionData.session.user;

      const { data: usuario, error: usuarioError } = await supabase
        .from("usuarios")
        .select("app_id")
        .eq("id", usuarioLogado.id)
        .single();

      if(usuarioError || !usuario?.app_id){
        document.body.insertAdjacentHTML(
          "beforeend",
          `<div style="padding:20px;color:#fff;">Não foi possível localizar o app_id do usuário logado.</div>`
        );
        return;
      }

      app_id = usuario.app_id;

      await carregarVeiculos();
      await carregarViagens();
    }

    async function criarVeiculo(){
      setMsg("msgVeiculo", "");

      const nome = document.getElementById("nomeVeiculo").value.trim();
      const tipo = document.getElementById("tipoVeiculo").value;
      const total = Number(document.getElementById("poltronasVeiculo").value);
      const layout = document.getElementById("layoutVeiculo").value;

      if(!nome){
        setMsg("msgVeiculo", "Digite o nome do veículo.", "erro");
        return;
      }

      if(!total || total < 1){
        setMsg("msgVeiculo", "Informe o total de poltronas.", "erro");
        return;
      }

      const { error } = await supabase
        .from("veiculos_passagens")
        .insert([{
          nome,
          tipo,
          total_poltronas: total,
          layout,
          app_id
        }]);

      if(error){
        setMsg("msgVeiculo", "Erro ao salvar veículo: " + error.message, "erro");
        return;
      }

      document.getElementById("nomeVeiculo").value = "";
      document.getElementById("poltronasVeiculo").value = "";
      document.getElementById("layoutVeiculo").value = "2-2";
      document.getElementById("tipoVeiculo").value = "onibus";

      setMsg("msgVeiculo", "Veículo salvo com sucesso.");
      await carregarVeiculos();
    }

    async function carregarVeiculos(){
      const { data, error } = await supabase
        .from("veiculos_passagens")
        .select("*")
        .eq("app_id", app_id)
        .order("created_at", { ascending: false });

      const lista = document.getElementById("listaVeiculos");
      const select = document.getElementById("veiculoSelect");

      lista.innerHTML = "";
      select.innerHTML = `<option value="">Selecione um veículo</option>`;

      if(error){
        lista.innerHTML = `<div class="erro">Erro ao carregar veículos: ${error.message}</div>`;
        return;
      }

      if(!data || !data.length){
        lista.innerHTML = `<div class="muted">Nenhum veículo cadastrado.</div>`;
        return;
      }

      data.forEach(v => {
        lista.innerHTML += `
          <div class="item">
            <strong>${v.nome}</strong><br>
            <span class="muted">${v.tipo || "-"} • ${v.total_poltronas || 0} poltronas • layout ${v.layout || "-"}</span>
          </div>
        `;

        select.innerHTML += `<option value="${v.id}">${v.nome}</option>`;
      });
    }

    async function criarViagem(){
      setMsg("msgViagem", "");

      const rota = document.getElementById("rota").value.trim();
      const hora = document.getElementById("hora").value.trim();
      const dias = document.getElementById("dias").value.trim();
      const veiculo_id = document.getElementById("veiculoSelect").value;

      if(!rota){
        setMsg("msgViagem", "Digite a rota.", "erro");
        return;
      }

      if(!hora){
        setMsg("msgViagem", "Digite a hora.", "erro");
        return;
      }

      if(!veiculo_id){
        setMsg("msgViagem", "Selecione um veículo.", "erro");
        return;
      }

      const { error } = await supabase
        .from("viagens_passagens")
        .insert([{
          rota,
          hora,
          dias,
          veiculo_id,
          app_id
        }]);

      if(error){
        setMsg("msgViagem", "Erro ao salvar viagem: " + error.message, "erro");
        return;
      }

      document.getElementById("rota").value = "";
      document.getElementById("hora").value = "";
      document.getElementById("dias").value = "";

      setMsg("msgViagem", "Viagem salva com sucesso.");
      await carregarViagens();
    }

    async function carregarViagens(){
      const { data, error } = await supabase
        .from("viagens_passagens")
        .select("id, rota, hora, dias, veiculo_id")
        .eq("app_id", app_id)
        .order("created_at", { ascending: false });

      const lista = document.getElementById("listaViagens");
      const select = document.getElementById("viagemReserva");

      lista.innerHTML = "";
      select.innerHTML = `<option value="">Selecione uma viagem</option>`;

      if(error){
        lista.innerHTML = `<div class="erro">Erro ao carregar viagens: ${error.message}</div>`;
        return;
      }

      if(!data || !data.length){
        lista.innerHTML = `<div class="muted">Nenhuma viagem cadastrada.</div>`;
        return;
      }

      data.forEach(v => {
        lista.innerHTML += `
          <div class="item">
            <strong>${v.rota}</strong><br>
            <span class="muted">${v.hora || "-"} ${v.dias ? "• " + v.dias : ""}</span>
          </div>
        `;

        select.innerHTML += `<option value="${v.id}">${v.rota} - ${v.hora || ""}</option>`;
      });
    }

    async function verReservas(){
      setMsg("msgReserva", "");

      const viagem_id = document.getElementById("viagemReserva").value;
      const lista = document.getElementById("listaReservas");

      lista.innerHTML = "";

      if(!viagem_id){
        setMsg("msgReserva", "Selecione uma viagem.", "erro");
        return;
      }

      const { data, error } = await supabase
        .from("reservas_passagens")
        .select("*")
        .eq("viagem_id", viagem_id)
        .order("poltrona", { ascending: true });

      if(error){
        setMsg("msgReserva", "Erro ao carregar reservas: " + error.message, "erro");
        return;
      }

      if(!data || !data.length){
        lista.innerHTML = `<div class="muted">Nenhuma reserva encontrada para esta viagem.</div>`;
        return;
      }

      data.forEach(r => {
        lista.innerHTML += `
          <div class="item">
            <strong>Poltrona ${r.poltrona}</strong><br>
            <span class="muted">${r.nome || "Sem nome"}</span>
          </div>
        `;
      });
    }

    carregarApp();
  </script>
</body>
</html>
