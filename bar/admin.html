<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login FF Filmes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#020617 0%,#0f172a 100%);
  color:#fff;
}
.card{
  width:100%;
  max-width:420px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
}
h1{
  margin:0 0 8px 0;
  font-size:28px;
  color:#ef4444;
  text-align:center;
}
.sub{
  margin:0 0 22px 0;
  text-align:center;
  color:#94a3b8;
}
label{
  display:block;
  margin:12px 0 6px;
  font-weight:bold;
}
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
  outline:none;
}
input:focus{
  border-color:#ef4444;
}
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
.btn-login{
  background:#ef4444;
  color:#fff;
}
.btn-login:hover{
  background:#dc2626;
}
.btn-cadastro{
  background:#334155;
  color:#fff;
}
.btn-cadastro:hover{
  background:#475569;
}
.msg{
  margin-top:16px;
  padding:12px;
  border-radius:12px;
  display:none;
  font-size:14px;
}
.msg.erro{
  display:block;
  background:rgba(239,68,68,.12);
  border:1px solid rgba(239,68,68,.35);
  color:#fecaca;
}
.msg.ok{
  display:block;
  background:rgba(34,197,94,.12);
  border:1px solid rgba(34,197,94,.35);
  color:#bbf7d0;
}
</style>
</head>
<body>

<div class="card">
  <h1>FF FILMES</h1>
  <p class="sub">Entre com seu acesso</p>

  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="seuemail@gmail.com">

  <label for="senha">Senha</label>
  <input type="password" id="senha" placeholder="********">

  <button class="btn-login" onclick="fazerLogin()">Entrar</button>
  <button class="btn-cadastro" onclick="criarConta()">Criar conta</button>

  <div id="msg" class="msg"></div>
</div>

<script>
const supabaseUrl = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const supabaseKey = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

function mostrarMsg(texto, tipo="erro"){
  const el = document.getElementById("msg");
  el.className = "msg " + tipo;
  el.style.display = "block";
  el.innerText = texto;
}

function limparMsg(){
  const el = document.getElementById("msg");
  el.className = "msg";
  el.style.display = "none";
  el.innerText = "";
}

async function validarAdmin(userId){
  const { data: admin, error } = await supabase
    .from("admin_filmes")
    .select("id, user_id, email, ativo")
    .eq("user_id", userId)
    .single();

  if (error || !admin) {
    return {
      ok: false,
      motivo: "Seu usuário existe no Auth, mas não está vinculado ao painel."
    };
  }

  if (admin.ativo === false) {
    return {
      ok: false,
      motivo: "Seu acesso está desativado."
    };
  }

  return {
    ok: true,
    admin
  };
}

async function verificarSessao(){
  const { data: { session }, error } = await supabase.auth.getSession();

  if (error || !session || !session.user) return;

  const validacao = await validarAdmin(session.user.id);

  if (!validacao.ok) {
    await supabase.auth.signOut();
    return;
  }

  window.location.href = "filmes.html";
}

async function fazerLogin(){
  limparMsg();

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    mostrarMsg("Preencha e-mail e senha.");
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error || !data.user) {
    mostrarMsg(error?.message || "Não foi possível fazer login.");
    return;
  }

  const validacao = await validarAdmin(data.user.id);

  if (!validacao.ok) {
    await supabase.auth.signOut();
    mostrarMsg(validacao.motivo);
    return;
  }

  window.location.href = "filmes.html";
}

async function criarConta(){
  limparMsg();

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  if (!email || !senha) {
    mostrarMsg("Preencha e-mail e senha para criar a conta.");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) {
    mostrarMsg(error.message || "Erro ao criar conta.");
    return;
  }

  if (!data.user) {
    mostrarMsg("Conta criada, mas não foi possível obter o usuário.", "erro");
    return;
  }

  mostrarMsg(
    "Conta criada no Auth. Agora vincule esse usuário na tabela admin_filmes usando o user_id dele.",
    "ok"
  );

  console.log("NOVO USER AUTH:", data.user);
  console.log("USER ID PRA VINCULAR:", data.user.id);
}

verificarSessao();
</script>

</body>
</html>
