<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mesa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}
.oculto{display:none !important}
.topo{
  background:#0f172a;
  padding:14px 16px;
  position:sticky;
  top:0;
  z-index:50;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
.topo-esq h1{
  margin:0;
  font-size:20px;
}
.topo-esq p{
  margin:2px 0 0;
  color:#94a3b8;
  font-size:13px;
}
.topo-dir{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.badge{
  background:#0b1220;
  border:1px solid #1e293b;
  color:#fff;
  padding:10px 14px;
  border-radius:999px;
  font-size:14px;
  font-weight:bold;
}
.badge.ok{border-color:#14532d;color:#dcfce7}
.badge.warn{border-color:#7c2d12;color:#fed7aa}
.container{
  max-width:1200px;
  margin:auto;
  padding:14px;
}
.alerta{
  margin:12px 0;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
}
.alerta.erro{
  background:#7f1d1d;
  border:1px solid #dc2626;
}
.alerta.ok{
  background:#14532d;
  border:1px solid #22c55e;
}
.card{
  background:#07152f;
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
}
.card h2{
  margin:0 0 14px;
  font-size:18px;
}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
input, textarea, button{
  font-family:inherit;
}
input, textarea{
  width:100%;
  background:#0b1220;
  color:#fff;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:12px 14px;
  outline:none;
}
textarea{
  min-height:90px;
  resize:vertical;
}
button{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  font-weight:bold;
  cursor:pointer;
}
.btn-verde{background:#16a34a;color:#fff}
.btn-azul{background:#2563eb;color:#fff}
.btn-cinza{background:#334155;color:#fff}
.btn-vermelho{background:#dc2626;color:#fff}
.busca{
  margin-bottom:14px;
}
.produtos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
}
.produto{
  background:#07152f;
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  overflow:hidden;
}
.produto-img{
  height:150px;
  background:#0b1220 center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#94a3b8;
  font-size:38px;
  font-weight:bold;
}
.produto-body{
  padding:14px;
}
.produto-nome{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
  min-height:44px;
}
.produto-preco{
  color:#22c55e;
  font-size:20px;
  font-weight:bold;
  margin-bottom:12px;
}
.controles{
  display:flex;
  align-items:center;
  gap:10px;
}
.controles .qtd{
  min-width:18px;
  text-align:center;
  font-weight:bold;
}
.controles button{
  width:38px;
  height:38px;
  border-radius:12px;
  padding:0;
  font-size:22px;
}
.controles .mais{background:#16a34a;color:#fff}
.controles .menos{background:#475569;color:#fff}
.controles .adicionar{
  flex:1;
  height:42px;
  background:#2563eb;
  color:#fff;
  padding:0 12px;
  font-size:16px;
}
.lote-item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.lote-item:last-child{border-bottom:none}
.lote-nome{
  font-size:16px;
  font-weight:bold;
  margin-bottom:6px;
}
.lote-sub{
  color:#94a3b8;
  font-size:14px;
}
.lote-valor{
  font-size:18px;
  font-weight:bold;
}
.lote-controles{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  margin-top:10px;
}
.lote-controles button{
  width:40px;
  height:40px;
  padding:0;
  font-size:22px;
}
.resumo{
  margin-top:16px;
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:12px;
}
.box-resumo{
  background:#0b1220;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:14px;
}
.box-resumo .rotulo{
  color:#94a3b8;
  font-size:13px;
  margin-bottom:8px;
}
.box-resumo .valor{
  font-size:18px;
  font-weight:bold;
}
.box-resumo.total .valor{
  font-size:22px;
}
.acoes{
  display:flex;
  gap:10px;
  margin-top:16px;
  flex-wrap:wrap;
}
.lista-pedidos .item{
  background:#0b1220;
  border:1px solid #1e293b;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}
.status-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.status-box{
  background:#0b1220;
  border:1px solid #1e293b;
  border-radius:14px;
  padding:12px;
}
.status-box .rotulo{
  color:#94a3b8;
  font-size:13px;
  margin-bottom:8px;
}
.status-box .valor{
  font-weight:bold;
}
.vazio{
  color:#94a3b8;
  padding:12px 0;
}
@media (max-width: 900px){
  .grid-2,.resumo,.status-grid{
    grid-template-columns:1fr;
  }
  .produto-img{height:120px}
}
</style>
</head>
<body>

<div class="topo">
  <div class="topo-esq">
    <h1 id="tituloMesa">Mesa</h1>
    <p>Pedido, conta e liberação da mesa</p>
  </div>

  <div class="topo-dir">
    <div class="badge" id="badgeMesa">Mesa</div>
    <div class="badge warn" id="badgeSessao">Validando sessão...</div>
  </div>
</div>

<div class="container">

  <div id="alertaErro" class="alerta erro oculto"></div>
  <div id="alertaOk" class="alerta ok oculto"></div>

  <div class="card" id="cardCliente">
    <h2>Identificação do cliente</h2>
    <div class="grid-2">
      <input type="text" id="clienteNome" placeholder="Nome do cliente" />
      <input type="text" id="clienteCelular" placeholder="Celular do cliente" />
    </div>
    <div class="acoes">
      <button class="btn-verde" id="btnIniciar">✅ Iniciar atendimento</button>
    </div>
  </div>

  <div class="busca">
    <input type="text" id="buscaProduto" placeholder="🔎 Buscar produto" />
  </div>

  <div class="produtos" id="listaProdutos"></div>

  <div class="card">
    <h2>Lote atual</h2>
    <div id="listaLote"></div>

    <div class="resumo">
      <div class="box-resumo">
        <div class="rotulo">Observação do pedido (opcional)</div>
        <textarea id="observacaoPedido"></textarea>
      </div>

      <div class="box-resumo">
        <div class="rotulo">Itens no lote</div>
        <div class="valor" id="itensLote">0</div>
      </div>

      <div class="box-resumo total">
        <div class="rotulo">Total do lote</div>
        <div class="valor" id="totalLote">R$ 0,00</div>
      </div>

      <div class="box-resumo total">
        <div class="rotulo">Total da mesa</div>
        <div class="valor" id="totalMesa">R$ 0,00</div>
      </div>
    </div>

    <div class="acoes">
      <button class="btn-azul" id="btnEnviarPedido">Enviar pedido</button>
      <button class="btn-vermelho" id="btnPedirConta">Pedir conta</button>
      <button class="btn-cinza" id="btnLimparLote">Limpar lote</button>
    </div>
  </div>

  <div class="card">
    <h2>Pedidos da mesa</h2>
    <div class="lista-pedidos" id="listaPedidos"></div>
  </div>

  <div class="card">
    <h2>Status da mesa</h2>
    <div class="status-grid">
      <div class="status-box">
        <div class="rotulo">Sessão</div>
        <div class="valor" id="statusSessao">Validando...</div>
      </div>
      <div class="status-box">
        <div class="rotulo">Cliente</div>
        <div class="valor" id="statusCliente">-</div>
      </div>
      <div class="status-box">
        <div class="rotulo">Conta</div>
        <div class="valor" id="statusConta">-</div>
      </div>
    </div>
  </div>

</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");
const tokenMesa = params.get("token");

let mesaAtual = null;
let sessaoMesa = null;
let app_id = null;
let produtos = [];
let loteAtual = [];
const qtdTempPorProduto = {};

const STATUS_FECHADOS = ["pago", "finalizado", "cancelado", "encerrado"];
const STATUS_ABERTOS = ["pendente", "em_preparo", "pronto", "entregue", "conta_solicitada", "aguardando_pagamento", "ocupada"];

const alertaErro = document.getElementById("alertaErro");
const alertaOk = document.getElementById("alertaOk");
const badgeMesa = document.getElementById("badgeMesa");
const badgeSessao = document.getElementById("badgeSessao");

function mostrarErro(msg){
  alertaErro.textContent = msg;
  alertaErro.classList.remove("oculto");
}
function esconderErro(){
  alertaErro.classList.add("oculto");
}
function mostrarOk(msg){
  alertaOk.textContent = msg;
  alertaOk.classList.remove("oculto");
  setTimeout(() => alertaOk.classList.add("oculto"), 2500);
}
function moeda(v){
  return Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}
function escapeHtml(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function setSessaoVisual(valida){
  badgeSessao.textContent = valida ? "Sessão validada" : "Sessão inválida";
  badgeSessao.className = "badge " + (valida ? "ok" : "warn");
  document.getElementById("statusSessao").textContent = valida ? "Sessão válida" : "Sessão inválida";
}
function atualizarStatusMesa(){
  document.getElementById("statusCliente").textContent = mesaAtual?.cliente_nome || "Não identificado";

  let contaTxt = "Conta em aberto";
  if (mesaAtual?.status === "livre" || mesaAtual?.ocupada === false) {
    contaTxt = "Mesa livre";
  } else if (mesaAtual?.pedir_conta) {
    contaTxt = "Conta solicitada";
  }

  document.getElementById("statusConta").textContent = contaTxt;
}
function obterImagemProduto(p){
  return p.imagem_url || p.imagem || p.foto_url || p.foto || "";
}
function statusFechado(status){
  return STATUS_FECHADOS.includes(String(status || "").toLowerCase().trim());
}
function statusAberto(status){
  return !statusFechado(status);
}

async function validarSessaoMesa(){
  if (!mesaId || !tokenMesa) {
    throw new Error("Sessão da mesa inválida. Escaneie novamente o QR.");
  }

  const { data, error } = await sb
    .from("sessoes_mesa")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("token", tokenMesa)
    .eq("ativa", true)
    .single();

  if (error || !data) {
    throw new Error("Sessão da mesa inválida. Escaneie novamente o QR.");
  }

  if (data.expira_em && new Date(data.expira_em).getTime() < Date.now()) {
    throw new Error("Sessão da mesa expirada. Escaneie novamente o QR.");
  }

  sessaoMesa = data;
  app_id = data.app_id;

  await sb
    .from("sessoes_mesa")
    .update({ ultimo_acesso_em: new Date().toISOString() })
    .eq("id", data.id);

  setSessaoVisual(true);
}

async function carregarMesa(){
  const { data, error } = await sb
    .from("mesas")
    .select("*")
    .eq("id", mesaId)
    .single();

  if (error || !data) {
    throw new Error("Mesa não encontrada.");
  }

  mesaAtual = data;

  const numeroMesa = data.numero_mesa || data.numero || "Mesa";
  document.getElementById("tituloMesa").textContent = `Mesa ${numeroMesa}`;
  badgeMesa.textContent = `Mesa ${numeroMesa}`;

  document.getElementById("clienteNome").value = data.cliente_nome || "";
  document.getElementById("clienteCelular").value = data.cliente_celular || "";

  atualizarStatusMesa();
}

async function iniciarAtendimento(){
  try{
    const clienteNome = (document.getElementById("clienteNome").value || "").trim();
    const clienteCelular = (document.getElementById("clienteCelular").value || "").trim();

    if (!clienteNome) {
      alert("Informe o nome do cliente.");
      return;
    }

    const { error } = await sb
      .from("mesas")
      .update({
        cliente_nome: clienteNome,
        cliente_celular: clienteCelular || null,
        ocupada: true,
        status: "ocupada",
        aberta_em: new Date().toISOString(),
        pedir_conta: false
      })
      .eq("id", mesaId);

    if (error) throw error;

    await carregarMesa();
    mostrarOk("Atendimento iniciado.");
  }catch(err){
    console.error(err);
    alert(err.message || "Erro ao iniciar atendimento.");
  }
}

async function carregarProdutos(){
  const { data, error } = await sb
    .from("produtos")
    .select("*")
    .eq("app_id", app_id)
    .eq("ativo", true)
    .order("nome");

  if (error) {
    console.error("Erro produtos:", error);
    mostrarErro("Não foi possível carregar os produtos.");
    return;
  }

  produtos = data || [];
  renderizarProdutos(produtos);
}

function renderizarProdutos(lista){
  const box = document.getElementById("listaProdutos");

  if (!lista.length) {
    box.innerHTML = `<div class="card">Nenhum produto encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map((p) => {
    const img = obterImagemProduto(p);
    const imgStyle = img ? `style="background-image:url('${String(img).replaceAll("'", "%27")}')"` : "";

    return `
      <div class="produto">
        <div class="produto-img" ${imgStyle}>${img ? "" : "Produto"}</div>
        <div class="produto-body">
          <div class="produto-nome">${escapeHtml(p.nome || "Produto")}</div>
          <div class="produto-preco">${moeda(p.preco || 0)}</div>
          <div class="controles">
            <button class="menos" onclick="alterarQtdTemp('${p.id}', -1)">-</button>
            <div class="qtd" id="qtd-temp-${p.id}">${Number(qtdTempPorProduto[p.id] || 1)}</div>
            <button class="mais" onclick="alterarQtdTemp('${p.id}', 1)">+</button>
            <button class="adicionar" onclick="adicionarAoLote('${p.id}')">Adicionar</button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function alterarQtdTemp(produtoId, delta){
  const atual = Number(qtdTempPorProduto[produtoId] || 1);
  const novo = Math.max(1, atual + delta);
  qtdTempPorProduto[produtoId] = novo;
  const el = document.getElementById(`qtd-temp-${produtoId}`);
  if (el) el.textContent = novo;
}

function adicionarAoLote(produtoId){
  const produto = produtos.find(p => String(p.id) === String(produtoId));
  if (!produto) return;

  const qtd = Number(qtdTempPorProduto[produtoId] || 1);
  const idx = loteAtual.findIndex(i => String(i.produto_id) === String(produtoId));

  if (idx >= 0) {
    loteAtual[idx].quantidade += qtd;
  } else {
    loteAtual.push({
      produto_id: produto.id,
      nome_produto: (produto.nome || "Produto").trim(),
      preco: Number(produto.preco || 0),
      preco_unitario: Number(produto.preco || 0),
      quantidade: qtd,
      observacao: null
    });
  }

  qtdTempPorProduto[produtoId] = 1;
  const el = document.getElementById(`qtd-temp-${produtoId}`);
  if (el) el.textContent = "1";

  renderizarLoteAtual();
}

function alterarQtdLote(produtoId, delta){
  const idx = loteAtual.findIndex(i => String(i.produto_id) === String(produtoId));
  if (idx < 0) return;

  loteAtual[idx].quantidade += delta;

  if (loteAtual[idx].quantidade <= 0) {
    loteAtual.splice(idx, 1);
  }

  renderizarLoteAtual();
}

function renderizarLoteAtual(){
  const box = document.getElementById("listaLote");

  if (!loteAtual.length) {
    box.innerHTML = `<div class="vazio">Nenhum item no lote.</div>`;
  } else {
    box.innerHTML = loteAtual.map(item => {
      const precoUnit = Number(item.preco_unitario || item.preco || 0);
      const qtd = Number(item.quantidade || 0);
      return `
        <div class="lote-item">
          <div>
            <div class="lote-nome">${escapeHtml(item.nome_produto)}</div>
            <div class="lote-sub">Qtd: ${qtd} × ${moeda(precoUnit)}</div>
          </div>

          <div>
            <div class="lote-valor">${moeda(qtd * precoUnit)}</div>
            <div class="lote-controles">
              <button class="btn-cinza" onclick="alterarQtdLote('${item.produto_id}', -1)">-</button>
              <button class="btn-verde" onclick="alterarQtdLote('${item.produto_id}', 1)">+</button>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  const totalItens = loteAtual.reduce((s, i) => s + Number(i.quantidade || 0), 0);
  const totalLote = loteAtual.reduce((s, i) => s + (Number(i.preco_unitario || i.preco || 0) * Number(i.quantidade || 0)), 0);

  document.getElementById("itensLote").textContent = totalItens;
  document.getElementById("totalLote").textContent = moeda(totalLote);
}

async function enviarPedido() {
  try {
    if (!mesaId) {
      alert("Mesa inválida.");
      return;
    }

    if (!Array.isArray(loteAtual) || !loteAtual.length) {
      alert("Adicione pelo menos 1 item.");
      return;
    }

    const clienteNome = (document.getElementById("clienteNome")?.value || "").trim() || null;
    const clienteCelular = (document.getElementById("clienteCelular")?.value || "").trim() || null;
    const observacaoPedido = (document.getElementById("observacaoPedido")?.value || "").trim() || null;

    const itensPedido = loteAtual.map(item => {
      const preco = Number(item.preco_unitario || item.preco || 0);
      const quantidade = Number(item.quantidade || 1);
      const subtotal = preco * quantidade;

      return {
        app_id: app_id,
        mesa_id: mesaId,
        produto_id: item.produto_id || null,
        nome_produto: (item.nome_produto || "").trim() || "Produto",
        quantidade: quantidade,
        preco: preco,
        preco_unitario: preco,
        subtotal: subtotal,
        total: subtotal,
        observacao: item.observacao || null,
        status: "pendente"
      };
    });

    const itemInvalido = itensPedido.find(item =>
      !item.nome_produto ||
      item.preco === null ||
      Number.isNaN(item.preco) ||
      Number.isNaN(item.quantidade)
    );

    if (itemInvalido) {
      console.error("Item inválido:", itemInvalido);
      alert("Existe item inválido no lote.");
      return;
    }

    const totalLote = itensPedido.reduce((soma, item) => soma + Number(item.total || 0), 0);
    const quantidadeTotal = itensPedido.reduce((soma, item) => soma + Number(item.quantidade || 0), 0);

    const payloadPedido = [{
      app_id: app_id,
      mesa_id: mesaId,
      cliente_nome: clienteNome,
      cliente_celular: clienteCelular,
      observacao: observacaoPedido,
      quantidade: quantidadeTotal,
      subtotal: totalLote,
      total: totalLote,
      preco_unitario: totalLote,
      status: "pendente",
      origem: "mesa"
    }];

    const { data: novoPedido, error: erroPedido } = await sb
      .from("pedidos")
      .insert(payloadPedido)
      .select()
      .single();

    if (erroPedido) {
      console.error("Erro ao criar pedido:", erroPedido);
      throw new Error(erroPedido.message || "Erro ao criar pedido.");
    }

    const pedidoId = novoPedido?.id;

    if (!pedidoId) {
      console.error("Pedido retornado sem ID:", novoPedido);
      throw new Error("Pedido criado sem ID.");
    }

    const payloadItens = itensPedido.map(item => ({
      app_id: item.app_id,
      pedido_id: pedidoId,
      mesa_id: item.mesa_id,
      produto_id: item.produto_id,
      nome_produto: item.nome_produto,
      quantidade: item.quantidade,
      preco: item.preco,
      preco_unitario: item.preco_unitario,
      subtotal: item.subtotal,
      total: item.total,
      observacao: item.observacao,
      status: item.status
    }));

    const { error: erroItens } = await sb
      .from("pedido_itens")
      .insert(payloadItens);

    if (erroItens) {
      console.error("Erro itens detalhado:", erroItens);

      await sb
        .from("pedidos")
        .delete()
        .eq("id", pedidoId);

      throw new Error(erroItens.message || "Pedido criado, mas houve erro ao salvar os itens.");
    }

    await sb
      .from("mesas")
      .update({
        ocupada: true,
        status: "ocupada",
        cliente_nome: clienteNome,
        cliente_celular: clienteCelular,
        pedir_conta: false
      })
      .eq("id", mesaId);

    loteAtual = [];
    renderizarLoteAtual();

    const campoObs = document.getElementById("observacaoPedido");
    if (campoObs) campoObs.value = "";

    await carregarMesa();
    await carregarPedidosMesa();

    mostrarOk("Pedido enviado com sucesso.");
  } catch (err) {
    console.error("Erro final ao enviar pedido:", err);
    alert(err?.message || "Erro ao enviar pedido.");
  }
}

async function pedirConta() {
  try {
    const agora = new Date().toISOString();

    const { error: erroMesa } = await sb
      .from("mesas")
      .update({
        pedir_conta: true,
        ocupada: true,
        status: "conta_solicitada",
        updated_at: agora
      })
      .eq("id", mesaId);

    if (erroMesa) {
      console.error("Erro ao pedir conta na mesa:", erroMesa);
      throw new Error(erroMesa.message || "Erro ao pedir conta.");
    }

    const { error: erroPedidos } = await sb
      .from("pedidos")
      .update({
        status: "conta_solicitada"
      })
      .eq("mesa_id", mesaId)
      .eq("app_id", app_id)
      .not("status", "in", '("pago","finalizado","cancelado","encerrado")');

    if (erroPedidos) {
      console.error("Erro ao marcar pedidos:", erroPedidos);
    }

    const { error: erroItens } = await sb
      .from("pedido_itens")
      .update({
        status: "conta_solicitada"
      })
      .eq("mesa_id", mesaId)
      .eq("app_id", app_id)
      .not("status", "in", '("pago","finalizado","cancelado","encerrado")');

    if (erroItens) {
      console.error("Erro ao marcar itens da conta:", erroItens);
    }

    await carregarMesa();
    await carregarPedidosMesa();

    mostrarOk("Conta solicitada.");
  } catch (err) {
    console.error("Erro ao pedir conta:", err);
    alert(err?.message || "Erro ao pedir conta.");
  }
}

async function liberarMesaSeNecessario() {
  try {
    const { data: pedidosMesa, error } = await sb
      .from("pedidos")
      .select("id,status")
      .eq("mesa_id", mesaId)
      .eq("app_id", app_id);

    if (error) {
      console.error("Erro ao verificar liberação da mesa:", error);
      return;
    }

    const pedidos = pedidosMesa || [];
    const pedidosAbertos = pedidos.filter(p => statusAberto(p.status));

    if (pedidosAbertos.length > 0) {
      return;
    }

    if (!mesaAtual) {
      await carregarMesa();
    }

    if (mesaAtual && (mesaAtual.ocupada || mesaAtual.pedir_conta || mesaAtual.cliente_nome || mesaAtual.status !== "livre")) {
      const { error: erroLiberar } = await sb
        .from("mesas")
        .update({
          ocupada: false,
          status: "livre",
          pedir_conta: false,
          cliente_nome: null,
          cliente_celular: null,
          aberta_em: null
        })
        .eq("id", mesaId);

      if (erroLiberar) {
        console.error("Erro ao liberar mesa:", erroLiberar);
        return;
      }

      mesaAtual = {
        ...mesaAtual,
        ocupada: false,
        status: "livre",
        pedir_conta: false,
        cliente_nome: null,
        cliente_celular: null,
        aberta_em: null
      };

      atualizarStatusMesa();
      mostrarOk("Mesa liberada automaticamente.");
    }
  } catch (err) {
    console.error("Erro geral ao liberar mesa:", err);
  }
}

async function sincronizarItensComPedidos() {
  try {
    const { data: pedidosFechados, error } = await sb
      .from("pedidos")
      .select("id,status")
      .eq("mesa_id", mesaId)
      .eq("app_id", app_id)
      .in("status", ["pago", "finalizado", "encerrado"]);

    if (error) {
      console.error("Erro ao sincronizar pedidos pagos:", error);
      return;
    }

    const idsFechados = (pedidosFechados || []).map(p => p.id).filter(Boolean);

    if (!idsFechados.length) return;

    const { error: erroItens } = await sb
      .from("pedido_itens")
      .update({ status: "pago" })
      .in("pedido_id", idsFechados)
      .not("status", "in", '("pago","finalizado","cancelado","encerrado")');

    if (erroItens) {
      console.error("Erro ao sincronizar itens pagos:", erroItens);
    }
  } catch (err) {
    console.error("Erro geral sincronizando itens:", err);
  }
}

async function carregarPedidosMesa() {
  try {
    await sincronizarItensComPedidos();

    const { data, error } = await sb
      .from("pedido_itens")
      .select("*")
      .eq("mesa_id", mesaId)
      .eq("app_id", app_id)
      .not("status", "in", '("cancelado","encerrado")')
      .order("created_at", { ascending: false });

    if (error) {
      console.error("Erro ao carregar itens da mesa:", error);
      return;
    }

    const itens = data || [];
    const itensAbertos = itens.filter(item => !statusFechado(item.status));

    const totalMesa = itensAbertos.reduce((soma, item) => {
      return soma + Number(item.subtotal || item.total || 0);
    }, 0);

    document.getElementById("totalMesa").textContent = moeda(totalMesa);

    const listaPedidos = document.getElementById("listaPedidos");

    if (!itensAbertos.length) {
      listaPedidos.innerHTML = `<div class="vazio">Nenhum pedido em aberto.</div>`;
    } else {
      listaPedidos.innerHTML = itensAbertos.map(item => {
        const precoUnit = Number(item.preco_unitario || item.preco || 0);
        const subtotal = Number(item.subtotal || item.total || (precoUnit * Number(item.quantidade || 0)));

        return `
          <div class="item">
            <strong>${escapeHtml(item.nome_produto || item.produto_nome || "Produto")}</strong><br>
            Qtd: ${Number(item.quantidade || 0)} × ${moeda(precoUnit)}<br>
            Subtotal: ${moeda(subtotal)}<br>
            <small>Status: ${escapeHtml(item.status || "-")}</small>
            ${item.observacao ? `<br><small>Obs: ${escapeHtml(item.observacao)}</small>` : ""}
          </div>
        `;
      }).join("");
    }

    await liberarMesaSeNecessario();
  } catch (err) {
    console.error("Erro geral ao carregar pedidos da mesa:", err);
  }
}

function filtrarProdutos(){
  const termo = (document.getElementById("buscaProduto").value || "").trim().toLowerCase();

  if (!termo) {
    renderizarProdutos(produtos);
    return;
  }

  const filtrados = produtos.filter(p =>
    String(p.nome || "").toLowerCase().includes(termo)
  );

  renderizarProdutos(filtrados);
}

function iniciarRealtimeMesa() {
  sb.channel(`mesa-${mesaId}`)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "mesas",
        filter: `id=eq.${mesaId}`
      },
      async () => {
        await carregarMesa();
      }
    )
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedidos",
        filter: `mesa_id=eq.${mesaId}`
      },
      async () => {
        await carregarPedidosMesa();
        await carregarMesa();
      }
    )
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedido_itens",
        filter: `mesa_id=eq.${mesaId}`
      },
      async () => {
        await carregarPedidosMesa();
      }
    )
    .subscribe();
}

async function iniciarPagina(){
  try{
    esconderErro();
    setSessaoVisual(false);

    await validarSessaoMesa();
    await carregarMesa();
    await carregarProdutos();
    renderizarLoteAtual();
    await carregarPedidosMesa();

    document.getElementById("btnIniciar").addEventListener("click", iniciarAtendimento);
    document.getElementById("btnEnviarPedido").addEventListener("click", enviarPedido);
    document.getElementById("btnPedirConta").addEventListener("click", pedirConta);
    document.getElementById("btnLimparLote").addEventListener("click", () => {
      loteAtual = [];
      renderizarLoteAtual();
    });
    document.getElementById("buscaProduto").addEventListener("input", filtrarProdutos);

    iniciarRealtimeMesa();

    setInterval(async () => {
      try{
        await carregarMesa();
        await carregarPedidosMesa();
      }catch(e){
        console.error(e);
      }
    }, 5000);

  }catch(err){
    console.error("Erro mesa:", err);
    mostrarErro(err.message || "Erro ao carregar a mesa.");
    setSessaoVisual(false);
  }
}

window.alterarQtdTemp = alterarQtdTemp;
window.adicionarAoLote = adicionarAoLote;
window.alterarQtdLote = alterarQtdLote;

iniciarPagina();
</script>
