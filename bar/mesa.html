<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Entrada da Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script type="module" src="../js/auth.js"></script>
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#020617;
  color:#fff;
  font-family:Arial,sans-serif;
}
.box{
  width:min(92%,420px);
  background:#0f172a;
  padding:24px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
}
h2{margin-top:0}
.msg{
  margin-top:12px;
  color:#cbd5e1;
}
.erro{
  color:#fca5a5;
}
.ok{
  color:#86efac;
}
</style>
</head>
<body>

<div class="box">
  <h2>🔐 Validando mesa</h2>
  <div id="msg" class="msg">Aguarde...</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");
const qrToken = params.get("qr");
const msg = document.getElementById("msg");

function texto(t, classe=""){
  msg.className = "msg " + classe;
  msg.innerText = t;
}

function gerarTokenSessao(){
  return "sess_" + crypto.randomUUID() + "_" + Date.now();
}

function expiraEm(min=30){
  return new Date(Date.now() + min * 60000).toISOString();
}

async function main(){
  if(!mesaId || !qrToken){
    texto("Link inválido da mesa.", "erro");
    return;
  }

  while(!window.APP_ID){
    await new Promise(r => setTimeout(r, 100));
  }

  const { data: { session } } = await supabase.auth.getSession();
  if(!session){
    texto("Sessão inválida. Faça login novamente.", "erro");
    return;
  }

  const userId = session.user.id;

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, app_id")
    .eq("id", userId)
    .single();

  if(erroUsuario || !usuario){
    texto("Usuário não encontrado.", "erro");
    return;
  }

  let funcionarioLogado = null;
  try{
    funcionarioLogado = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  }catch{
    funcionarioLogado = null;
  }

  if(!funcionarioLogado?.id){
    texto("Funcionário não identificado. Volte e faça login do funcionário.", "erro");
    return;
  }

  const { data: mesa, error: erroMesa } = await supabase
    .from("mesas")
    .select("id, numero_mesa, app_id, token_qr")
    .eq("id", mesaId)
    .single();

  if(erroMesa || !mesa){
    texto("Mesa não encontrada.", "erro");
    return;
  }

  if(String(mesa.app_id) !== String(usuario.app_id)){
    texto("Essa mesa não pertence a este bar.", "erro");
    return;
  }

  if(String(mesa.token_qr || "") !== String(qrToken || "")){
    texto("QR da mesa inválido.", "erro");
    return;
  }

  const tokenSessao = gerarTokenSessao();

  const { error: erroSessao } = await supabase
    .from("sessoes_mesa")
    .insert({
      app_id: usuario.app_id,
      mesa_id: mesa.id,
      token: tokenSessao,
      funcionario_id: funcionarioLogado.id,
      funcionario_nome: funcionarioLogado.nome || null,
      ativa: true,
      expira_em: expiraEm(30),
      ultimo_acesso_em: new Date().toISOString()
    });

  if(erroSessao){
    console.error(erroSessao);
    texto("Erro ao criar sessão da mesa.", "erro");
    return;
  }

  texto(`Mesa ${mesa.numero_mesa} validada. Entrando...`, "ok");

  setTimeout(() => {
    location.href = `mesa.html?mesa=${mesa.id}&token=${encodeURIComponent(tokenSessao)}`;
  }, 700);
}

main();
</script>

</body>
</html>
