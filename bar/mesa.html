<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

:root{
  --bg:#020617;
  --card:#0f172a;
  --card-2:#111827;
  --muted:#94a3b8;
  --line:rgba(255,255,255,.08);
  --green:#22c55e;
  --blue:#2563eb;
  --orange:#f59e0b;
  --red:#ef4444;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:#fff;
}

.oculto{display:none !important}
.bloqueado-ui{opacity:.45;pointer-events:none;filter:grayscale(.2)}

.topo{
  background:#0b1220;
  padding:14px 16px;
  font-size:20px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:40;
  border-bottom:1px solid rgba(255,255,255,.06);
  box-shadow:0 2px 12px rgba(0,0,0,.25);
  text-align:center;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:14px 12px 120px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  box-sizing:border-box;
  font-size:15px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.msg-vazio{
  opacity:.75;
  background:var(--card);
  border-radius:14px;
  padding:14px;
  border:1px solid var(--line);
}

small{
  opacity:.85;
  display:block;
}

.info-status{
  margin:10px 0 12px;
  padding:12px 14px;
  border-radius:12px;
  background:var(--card);
  border:1px solid var(--line);
  font-size:14px;
}

.card-sessao{
  position:fixed;
  top:72px;
  left:12px;
  width:min(320px,calc(100vw - 24px));
  background:rgba(15,23,42,.97);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  z-index:80;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
  backdrop-filter:blur(8px);
}

.card-sessao h3{
  margin:0;
  font-size:16px;
}

.sessao-topo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.btn-toggle-sessao{
  background:var(--blue);
  color:#fff;
  padding:8px 12px;
  min-height:36px;
  font-size:12px;
  white-space:nowrap;
}

.form-sessao{
  margin-top:12px;
}

.badge{
  display:inline-block;
  background:#1e293b;
  color:#fff;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
  margin-top:6px;
}

.area-filtros{
  margin-top:6px;
}

.filtros{
  display:flex;
  gap:8px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.filtros button{
  background:#1e293b;
  color:#fff;
  padding:9px 12px;
  border-radius:999px;
  font-size:12px;
}

.filtros button.ativo{
  background:var(--blue);
}

.titulo-secao{
  margin:12px 0 12px;
  font-size:18px;
}

#listaProdutos{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
}

.produto{
  background:var(--card);
  border-radius:14px;
  padding:8px;
  border:1px solid rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:100%;
}

.produto-esquerda{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:6px;
  min-width:0;
  flex:1;
}

.thumb-produto{
  width:100%;
  aspect-ratio:1/1;
  border-radius:10px;
  object-fit:cover;
  background:#1e293b;
  border:1px solid rgba(255,255,255,.08);
}

.produto-info{
  width:100%;
  min-width:0;
}

.produto-info strong{
  display:block;
  margin-bottom:4px;
  font-size:13px;
  line-height:1.2;
  word-break:break-word;
}

.produto-info small{
  font-size:11px;
  line-height:1.2;
}

.produto button{
  width:100%;
  margin-top:8px;
  background:var(--green);
  color:#000;
  min-height:34px;
  font-size:13px;
  border-radius:9px;
}

.card-lote{
  position:fixed;
  right:12px;
  bottom:12px;
  width:min(360px,calc(100vw - 24px));
  max-height:70vh;
  overflow:auto;
  background:rgba(15,23,42,.98);
  border-radius:18px;
  padding:12px;
  border:1px solid var(--line);
  z-index:85;
  box-shadow:0 14px 36px rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
}

.card-lote h3{
  margin:0;
  font-size:16px;
}

.lote-topo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}

.btn-toggle-pedido{
  background:var(--blue);
  color:#fff;
  font-size:12px;
  padding:8px 12px;
  min-height:36px;
}

.pedido-conteudo.oculto{
  display:none !important;
}

.item{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:10px;
  background:var(--card-2);
  border-radius:14px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,.06);
}

.item-topo{
  display:flex;
  gap:10px;
  align-items:center;
}

.thumb-item{
  width:46px;
  height:46px;
  border-radius:10px;
  object-fit:cover;
  background:#1e293b;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.08);
}

.item-info{
  min-width:0;
  flex:1;
}

.item-info strong{
  display:block;
  margin-bottom:4px;
  font-size:14px;
  line-height:1.2;
}

.item-info .linha-preco{
  font-size:12px;
  color:#cbd5e1;
}

.item-acoes-wrap{
  width:100%;
}

.item-acoes{
  display:grid;
  grid-template-columns:34px 44px 34px 1fr;
  gap:6px;
  align-items:center;
}

.btn-menor,.btn-maior{
  min-height:32px;
  height:32px;
  padding:0;
  font-size:14px;
  border-radius:8px;
}

.btn-menor{
  background:var(--orange);
  color:#000;
}

.btn-maior{
  background:var(--green);
  color:#000;
}

.btn-remover{
  background:var(--red);
  color:#fff;
  font-weight:bold;
  min-height:32px;
  height:32px;
  padding:0 10px;
  border-radius:8px;
  font-size:11px;
}

.qtd-badge{
  min-width:44px;
  text-align:center;
  font-weight:bold;
  background:#1e293b;
  padding:8px 6px;
  border-radius:8px;
  font-size:13px;
}

.historico-bloco{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-top:20px;
  border:1px solid var(--line);
}

.historico-bloco h4{
  margin:0 0 10px 0;
}

.linha-historico{
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:14px;
}

.linha-historico:last-child{
  border-bottom:none;
}

.lote-tag{
  display:inline-block;
  font-size:12px;
  background:#1e293b;
  padding:6px 10px;
  border-radius:999px;
  margin-bottom:10px;
}

.divisor{
  height:1px;
  background:rgba(255,255,255,.08);
  margin:14px 0;
}

.barra-fixa{
  margin-top:8px;
}

.barra-totais{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.total-fixo{
  background:var(--card-2);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:10px 12px;
  font-weight:bold;
}

.total-fixo span{
  display:block;
  color:var(--muted);
  font-size:11px;
  margin-bottom:4px;
  font-weight:normal;
}

.total-fixo strong{
  color:var(--green);
  font-size:15px;
}

.acoes-fixas{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.acoes-fixas button{
  width:100%;
  padding:10px 6px;
  font-size:11px;
  min-height:40px;
  white-space:nowrap;
}

#btnEnviar{
  background:var(--green);
  color:#000;
}

#btnConta{
  background:var(--orange);
  color:#000;
}

.area-produtos{
  padding-top:170px;
  padding-right:0;
}

.tela-expirada{
  display:none !important;
}

@media (min-width:700px){
  .area-produtos{
    padding-right:390px;
  }

  #listaProdutos{
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:10px;
  }
}

@media (min-width:1100px){
  .area-produtos{
    padding-right:400px;
  }

  #listaProdutos{
    grid-template-columns:repeat(4,minmax(0,1fr));
  }
}

@media (max-width:699px){
  .topo{
    font-size:18px;
    padding:12px 14px;
  }

  .card-sessao{
    top:62px;
    width:min(280px,calc(100vw - 24px));
    padding:10px;
  }

  .card-lote{
    width:min(340px,calc(100vw - 24px));
    max-height:62vh;
  }

  .area-produtos{
    padding-top:160px;
    padding-bottom:90px;
  }
}

@media (max-width:520px){
  #listaProdutos{
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:7px;
  }

  .produto{
    padding:7px;
    border-radius:12px;
  }

  .thumb-produto{
    border-radius:9px;
  }

  .produto-info strong{
    font-size:12px;
  }

  .produto-info small{
    font-size:10px;
  }

  .produto button{
    font-size:12px;
    min-height:32px;
    margin-top:6px;
  }

  .acoes-fixas button{
    font-size:10px;
    padding:9px 4px;
  }

  .item-acoes{
    grid-template-columns:32px 42px 32px 1fr;
  }
}

@media (max-width:420px){
  .card-sessao{
    width:min(255px,calc(100vw - 24px));
  }

  .card-lote{
    width:min(320px,calc(100vw - 24px));
  }
}
</style>
</head>

<body>

<div class="topo" id="tituloMesa">🍽️ Mesa</div>

<div class="card-sessao" id="cardSessao">
  <div class="sessao-topo">
    <h3>Login / sessão</h3>
    <button id="btnToggleSessao" class="btn-toggle-sessao">Abrir</button>
  </div>

  <div id="formSessao" class="form-sessao oculto">
    <input id="clienteNome" placeholder="Nome do cliente">
    <input id="clienteTelefone" placeholder="Celular do cliente">
    <button id="btnIniciarSessao" style="background:#22c55e;color:#000;padding:12px 16px;width:100%">✅ Confirmar sessão</button>
  </div>

  <small id="sessaoAtualInfo" style="margin-top:10px;display:block"></small>
</div>

<div class="container" id="containerPrincipal">
  <div class="area-produtos">
    <div class="area-filtros">
      <input id="busca" placeholder="🔍 Buscar produto">
      <div class="filtros" id="filtrosCategorias"></div>
    </div>

    <h3 class="titulo-secao">Produtos</h3>
    <div id="listaProdutos"></div>

    <div class="historico-bloco" id="historicoPedidosEnviados" style="display:none;"></div>
  </div>
</div>

<div class="card-lote" id="cardLote">
  <div class="lote-topo">
    <h3>Meus pedidos</h3>
    <button id="btnTogglePedido" class="btn-toggle-pedido">Recolher</button>
  </div>

  <div id="pedidoConteudo" class="pedido-conteudo">
    <div id="statusPedido" class="info-status" style="display:none;"></div>
    <div id="pedido"></div>

    <div class="barra-fixa">
      <div class="barra-totais">
        <div class="total-fixo">
          <span>Lote atual</span>
          <strong id="totalPedidoBarra">R$ 0,00</strong>
        </div>
        <div class="total-fixo">
          <span>Total da mesa</span>
          <strong id="totalMesaBarra">R$ 0,00</strong>
        </div>
      </div>

      <div class="acoes-fixas">
        <button id="btnEnviar">📨 Enviar</button>
        <button id="btnConta">🧾 Conta</button>
      </div>
    </div>
  </div>
</div>

<div id="telaExpirada" class="tela-expirada">
  <div class="tela-expirada-card">
    <h2 id="tituloExpirada">Sessão encerrada</h2>
    <p id="textoExpirada">Escaneie novamente o QR da mesa para continuar.</p>
    <button id="btnRecarregar">Entendi</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");

let APP_ID = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = null;
let canalMesa = null;
let canalPedidoAtual = null;
let canalMesaStatus = null;
let FUNCIONARIO_LOGADO = null;
let sessaoExpiradaTimer = null;
let telaTravada = false;
let mesaInfo = null;
let atualizandoMesaStatus = false;

const CHAVE_SESSAO = `mesa_sessao_${mesaId}`;
let sessaoLocal = null;

if (!mesaId) {
  alert("Mesa não informada.");
  history.back();
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function gerarToken() {
  return "tok_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function adicionarMinutosISO(minutos) {
  return new Date(Date.now() + minutos * 60000).toISOString();
}

function nomeStatus(status) {
  const mapa = {
    aberto: "Aberto",
    novo: "Enviado",
    aceito: "Aceito pelo bar",
    pronto: "Pronto",
    conta_solicitada: "Conta solicitada",
    pago: "Pago",
    finalizado: "Finalizado",
    cancelado: "Cancelado"
  };
  return mapa[status] || status || "-";
}

function pedidoPodeSerEditado() {
  if (!pedidoAtual) return true;
  return pedidoAtual.status === "aberto";
}

function pedidoBloqueadoParaEdicao() {
  return !pedidoPodeSerEditado();
}

function limparTelaPedidoAtual() {
  document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item em aberto no momento</div>`;
  atualizarTotaisLote(0);
}

function atualizarTotaisLote(total) {
  const valor = formatarMoeda(total || 0);
  const el = document.getElementById("totalPedidoBarra");
  if (el) el.innerText = valor;
}

function atualizarTotaisMesa(total) {
  const valor = formatarMoeda(total || 0);
  const el = document.getElementById("totalMesaBarra");
  if (el) el.innerText = valor;
}

function obterImagemProduto(produto) {
  if (!produto) return "https://via.placeholder.com/300x300?text=Produto";

  let imgs = [];
  try {
    imgs = JSON.parse(produto.imagens || "[]");
  } catch {
    imgs = [];
  }

  return imgs[0] || "https://via.placeholder.com/300x300?text=Produto";
}

function obterCategoriaProduto(produto) {
  return String(
    produto.categoria_nome ||
    produto.categoria ||
    produto.categoria_id ||
    "Sem categoria"
  );
}

function carregarSessaoLocal() {
  try {
    sessaoLocal = JSON.parse(localStorage.getItem(CHAVE_SESSAO) || "null");
  } catch {
    sessaoLocal = null;
  }
}

function salvarSessaoLocal(sessao) {
  sessaoLocal = sessao;
  localStorage.setItem(CHAVE_SESSAO, JSON.stringify(sessao));
  atualizarSessaoNaTela();
  iniciarMonitorSessao();
}

function removerSessaoLocal() {
  sessaoLocal = null;
  localStorage.removeItem(CHAVE_SESSAO);
  atualizarSessaoNaTela();
  pararMonitorSessao();
}

function carregarFuncionarioLogado() {
  try {
    FUNCIONARIO_LOGADO = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  } catch {
    FUNCIONARIO_LOGADO = null;
  }
}

function sessaoExpiradaLocal() {
  if (!sessaoLocal?.sessao_expira_em) return false;
  return new Date(sessaoLocal.sessao_expira_em).getTime() <= Date.now();
}

function travarTelaPorNovoQRCode() {
  telaTravada = false;
}

function liberarBloqueioTela() {
  telaTravada = false;
}

function resetarInterfaceParaNovaSessao() {
  removerSessaoLocal();
  pedidoAtual = null;
  removerCanalPedidoAtual();
  limparTelaPedidoAtual();
  atualizarTotaisMesa(0);
  atualizarInfoStatus();
  liberarBloqueioTela();

  document.getElementById("clienteNome").value = "";
  document.getElementById("clienteTelefone").value = "";
  document.getElementById("formSessao")?.classList.remove("oculto");
  document.getElementById("btnToggleSessao").textContent = "Fechar";
}

function iniciarMonitorSessao() {
  pararMonitorSessao();

  if (!sessaoLocal?.sessao_expira_em) return;

  const verificar = async () => {
    if (sessaoExpiradaLocal()) {
      resetarInterfaceParaNovaSessao();
      await atualizarMesaStatus({
        ocupada: false,
        pedir_conta: false,
        status: "livre",
        cliente_nome: null,
        cliente_celular: null,
        total_aberto: 0
      });
      alert("Sessão expirada. Inicie uma nova sessão para continuar.");
      return;
    }

    atualizarSessaoNaTela();
  };

  verificar();
  sessaoExpiradaTimer = setInterval(verificar, 1000);
}

function pararMonitorSessao() {
  if (sessaoExpiradaTimer) {
    clearInterval(sessaoExpiradaTimer);
    sessaoExpiradaTimer = null;
  }
}

function atualizarSessaoNaTela() {
  const info = document.getElementById("sessaoAtualInfo");
  const form = document.getElementById("formSessao");
  const btn = document.getElementById("btnToggleSessao");

  if (!sessaoLocal) {
    info.innerHTML = FUNCIONARIO_LOGADO?.nome
      ? `Funcionário logado: <strong>${FUNCIONARIO_LOGADO.nome}</strong><br>Nenhuma sessão ativa nesta mesa.`
      : "Nenhuma sessão ativa nesta mesa.";

    if (btn) btn.textContent = form.classList.contains("oculto") ? "Abrir" : "Fechar";
    return;
  }

  const cliente = sessaoLocal.cliente_nome || "-";
  const fone = sessaoLocal.cliente_telefone || "-";
  const garcom = sessaoLocal.garcom_nome || null;
  const expiraEm = sessaoLocal.sessao_expira_em
    ? new Date(sessaoLocal.sessao_expira_em).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })
    : "-";

  info.innerHTML = `
    <span class="badge">Cliente: ${cliente}</span>
    <span class="badge">${fone}</span>
    ${garcom ? `<span class="badge">Responsável: ${garcom}</span>` : ""}
    <span class="badge">Expira: ${expiraEm}</span>
  `;

  if (form && btn) {
    form.classList.add("oculto");
    btn.textContent = "Abrir";
  }
}

function atualizarInfoStatus() {
  const div = document.getElementById("statusPedido");

  if (!pedidoAtual) {
    div.style.display = "block";
    div.innerHTML = `Sem pedido em aberto no momento.<br><small>Ao tocar em um produto, um novo lote será criado.</small>`;
    return;
  }

  div.style.display = "block";

  const expiraInfo = pedidoAtual.sessao_expira_em
    ? `<br><small>Sessão expira em: ${new Date(pedidoAtual.sessao_expira_em).toLocaleString("pt-BR")}</small>`
    : "";

  if (pedidoAtual.status === "aberto") {
    div.innerHTML = `Status do pedido atual: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Esse lote ainda pode ser alterado antes do envio.</small>${expiraInfo}`;
  } else {
    div.innerHTML = `Status do pedido atual: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Esse lote já foi enviado e está travado.</small>${expiraInfo}`;
  }
}

function configurarToggleSessao() {
  const btn = document.getElementById("btnToggleSessao");
  const form = document.getElementById("formSessao");

  if (!btn || !form) return;

  btn.onclick = () => {
    form.classList.toggle("oculto");
    btn.textContent = form.classList.contains("oculto") ? "Abrir" : "Fechar";
  };
}

function configurarTogglePedido() {
  const btn = document.getElementById("btnTogglePedido");
  const conteudo = document.getElementById("pedidoConteudo");

  if (!btn || !conteudo) return;

  btn.onclick = () => {
    conteudo.classList.toggle("oculto");
    btn.textContent = conteudo.classList.contains("oculto") ? "Abrir" : "Recolher";
  };
}

async function validarSessao() {
  const { data, error } = await supabase.auth.getSession();

  if (!data?.session) {
    APP_ID = localStorage.getItem("app_id") || null;
    return !!APP_ID;
  }

  if (error) console.error(error);

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, app_id")
    .eq("id", userId)
    .maybeSingle();

  if (!erroUsuario && usuario?.app_id) {
    APP_ID = usuario.app_id;
    localStorage.setItem("app_id", APP_ID);
    return true;
  }

  APP_ID = localStorage.getItem("app_id") || null;
  return !!APP_ID;
}

async function atualizarMesaStatus({
  ocupada = null,
  pedir_conta = null,
  status = null,
  cliente_nome = undefined,
  cliente_celular = undefined,
  total_aberto = undefined
} = {}) {
  if (!mesaId || atualizandoMesaStatus) return;

  const payload = {};
  if (ocupada !== null) payload.ocupada = ocupada;
  if (pedir_conta !== null) payload.pedir_conta = pedir_conta;
  if (status !== null) payload.status = status;
  if (cliente_nome !== undefined) payload.cliente_nome = cliente_nome;
  if (cliente_celular !== undefined) payload.cliente_celular = cliente_celular;
  if (total_aberto !== undefined) payload.total_aberto = Number(total_aberto || 0);

  if (Object.keys(payload).length === 0) return;

  atualizandoMesaStatus = true;
  try {
    const { data, error } = await supabase
      .from("mesas")
      .update(payload)
      .eq("id", mesaId)
      .select()
      .maybeSingle();

    if (error) {
      console.error("Erro ao atualizar mesa:", error);
      return;
    }

    if (data) mesaInfo = data;
  } finally {
    atualizandoMesaStatus = false;
  }
}

async function iniciarSistema() {
  configurarToggleSessao();
  configurarTogglePedido();
  carregarSessaoLocal();
  carregarFuncionarioLogado();
  atualizarSessaoNaTela();

  const ok = await validarSessao();
  if (!ok) {
    alert("App do bar não identificado.");

  }

  await carregarMesa();
  await carregarProdutos();
  await sincronizarSessaoComPedidos();
  ativarRealtimeMesa();
  ativarRealtimeMesaStatus();

  if (sessaoLocal) iniciarMonitorSessao();
}

async function carregarMesa() {
  const { data } = await supabase
    .from("mesas")
    .select("*")
    .eq("id", mesaId)
    .maybeSingle();

  if (data) {
    mesaInfo = data;
    document.getElementById("tituloMesa").innerText = `🍽️ Mesa ${data.numero_mesa}`;
  }
}

async function sincronizarSessaoComPedidos() {
  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const pedidos = data || [];

  const pedidosAtivos = pedidos.filter(p =>
    ["aberto", "novo", "aceito", "pronto", "conta_solicitada"].includes(p.status)
  );

  const pedidoAberto = pedidosAtivos.find(p => p.status === "aberto") || null;
  const pedidoMaisRecenteAtivo = pedidosAtivos[0] || null;

  if (pedidosAtivos.length === 0) {
    resetarInterfaceParaNovaSessao();

    await atualizarMesaStatus({
      ocupada: false,
      pedir_conta: false,
      status: "livre",
      cliente_nome: null,
      cliente_celular: null,
      total_aberto: 0
    });

    await carregarHistoricoPedidosEnviados();
    await calcularTotalGeralMesa();
    aplicarFiltros();
    return;
  }

  if (pedidoMaisRecenteAtivo?.sessao_expira_em) {
    const expiradaBanco = new Date(pedidoMaisRecenteAtivo.sessao_expira_em).getTime() <= Date.now();

    if (expiradaBanco) {
      resetarInterfaceParaNovaSessao();

      await atualizarMesaStatus({
        ocupada: false,
        pedir_conta: false,
        status: "livre",
        cliente_nome: null,
        cliente_celular: null,
        total_aberto: 0
      });

      await carregarHistoricoPedidosEnviados();
      await calcularTotalGeralMesa();
      aplicarFiltros();
      return;
    }
  }

  pedidoAtual = pedidoAberto;

  if (pedidoMaisRecenteAtivo?.sessao_token) {
    salvarSessaoLocal({
      sessao_token: pedidoMaisRecenteAtivo.sessao_token,
      cliente_nome: pedidoMaisRecenteAtivo.cliente_nome,
      cliente_telefone: pedidoMaisRecenteAtivo.cliente_telefone,
      responsavel_nome: pedidoMaisRecenteAtivo.responsavel_nome,
      garcom_nome: pedidoMaisRecenteAtivo.garcom_nome,
      funcionario_id: pedidoMaisRecenteAtivo.funcionario_id,
      sessao_expira_em: pedidoMaisRecenteAtivo.sessao_expira_em
    });

    document.getElementById("clienteNome").value = pedidoMaisRecenteAtivo.cliente_nome || "";
    document.getElementById("clienteTelefone").value = pedidoMaisRecenteAtivo.cliente_telefone || "";
  }

  const totalMesa = await calcularTotalGeralMesa();
  const statusMesa = pedidosAtivos.some(p => p.status === "conta_solicitada") ? "pediu_conta" : "ocupada";
  const pediuConta = pedidosAtivos.some(p => p.status === "conta_solicitada");

  await atualizarMesaStatus({
    ocupada: true,
    pedir_conta: pediuConta,
    status: statusMesa,
    cliente_nome: pedidoMaisRecenteAtivo?.cliente_nome || sessaoLocal?.cliente_nome || null,
    cliente_celular: pedidoMaisRecenteAtivo?.cliente_telefone || sessaoLocal?.cliente_telefone || null,
    total_aberto: totalMesa
  });

  atualizarInfoStatus();

  if (pedidoAtual) ativarRealtimePedidoAtual();
  else removerCanalPedidoAtual();

  await carregarPedidoAtual();
  await carregarHistoricoPedidosEnviados();
  aplicarFiltros();
}

async function iniciarAtendimentoManual() {

async function validarSessaoPedido() {
  if (!sessaoLocal) {
    alert("Inicie o atendimento antes de lançar itens.");
    return false;
  }

  if (sessaoExpiradaLocal()) {
    resetarInterfaceParaNovaSessao();

    await atualizarMesaStatus({
      ocupada: false,
      pedir_conta: false,
      status: "livre",
      cliente_nome: null,
      cliente_celular: null,
      total_aberto: 0
    });

    alert("Sua sessão expirou. Inicie uma nova sessão para continuar.");
    return false;
  }

  return true;
}

async function criarPedidoSeNecessario() {
  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return false;

  if (pedidoAtual && pedidoAtual.status === "aberto") return true;

  const { data, error } = await supabase
    .from("pedidos")
    .insert({
      app_id: APP_ID,
      mesa_id: mesaId,
      status: "aberto",
      origem: "mesa",
      sessao_token: sessaoLocal.sessao_token,
      sessao_status: "ativa",
      sessao_expira_em: sessaoLocal.sessao_expira_em,
      cliente_nome: sessaoLocal.cliente_nome,
      cliente_telefone: sessaoLocal.cliente_telefone,
      responsavel_nome: sessaoLocal.responsavel_nome,
      garcom_nome: sessaoLocal.garcom_nome,
      funcionario_id: sessaoLocal.funcionario_id
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Erro ao criar novo pedido.");
    return false;
  }

  pedidoAtual = data;
  atualizarInfoStatus();
  ativarRealtimePedidoAtual();

  await atualizarMesaStatus({
    ocupada: true,
    pedir_conta: false,
    status: "ocupada",
    cliente_nome: sessaoLocal.cliente_nome,
    cliente_celular: sessaoLocal.cliente_telefone
  });

  return true;
}

async function carregarProdutos() {
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if (error) {
    console.error(error);
    document.getElementById("listaProdutos").innerHTML = `<div class="msg-vazio">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = (data || []).map(p => ({
    ...p,
    categoria_exibicao: obterCategoriaProduto(p),
    imagem_exibicao: obterImagemProduto(p)
  }));

  montarCategoriasPelosProdutos();
  aplicarFiltros();
}

function montarCategoriasPelosProdutos() {
  const mapa = new Map();

  produtosCache.forEach(p => {
    const chave = obterCategoriaProduto(p);
    if (!mapa.has(chave)) {
      mapa.set(chave, { id: chave, nome: chave });
    }
  });

  categoriasCache = Array.from(mapa.values());

  if (!categoriaSelecionada && categoriasCache.length > 0) {
    categoriaSelecionada = categoriasCache[0].id;
  }

  renderizarBotoesCategorias();
}

function renderizarBotoesCategorias() {
  const div = document.getElementById("filtrosCategorias");
  div.innerHTML = "";

  if (categoriasCache.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhuma categoria encontrada nos produtos</div>`;
    return;
  }

  categoriasCache.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.nome;
    if (categoriaSelecionada === cat.id) btn.classList.add("ativo");
    btn.onclick = () => {
      categoriaSelecionada = cat.id;
      renderizarBotoesCategorias();
      aplicarFiltros();
    };
    div.appendChild(btn);
  });
}

function aplicarFiltros() {
  const texto = (document.getElementById("busca").value || "").toLowerCase();

  const lista = produtosCache.filter(p => {
    const nomeOk = (p.nome || "").toLowerCase().includes(texto);
    const categoriaOk = !categoriaSelecionada || obterCategoriaProduto(p) === categoriaSelecionada;
    return nomeOk && categoriaOk;
  });

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if (lista.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado</div>`;
    return;
  }

  lista.forEach(p => {
    const imgPrincipal = obterImagemProduto(p);

    const card = document.createElement("div");
    card.className = "produto";
    card.innerHTML = `
      <div class="produto-esquerda">
        <img class="thumb-produto" src="${imgPrincipal}" alt="${p.nome}" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x300?text=Produto'">
        <div class="produto-info">
          <strong>${p.nome}</strong>
          <small>${formatarMoeda(p.preco)}</small>
          <small>${p.categoria_exibicao}</small>
        </div>
      </div>
      <button data-id="${p.id}">Adicionar</button>
    `;

    card.querySelector("button").onclick = () => addProduto(p.id);
    div.appendChild(card);
  });
}

async function addProduto(produtoId) {
  const ok = await criarPedidoSeNecessario();
  if (!ok) return;

  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return;

  const produto = produtosCache.find(p => String(p.id) === String(produtoId));
  if (!produto) return;

  const { error: erroInsert } = await supabase
    .from("pedido_itens")
    .insert({
      app_id: APP_ID,
      pedido_id: pedidoAtual.id,
      produto_id: produto.id,
      nome_produto: produto.nome,
      preco: Number(produto.preco || 0),
      quantidade: 1,
      status: "novo",
      responsavel_nome: sessaoLocal.cliente_nome,
      cliente_nome: sessaoLocal.cliente_nome,
      cliente_telefone: sessaoLocal.cliente_telefone,
      garcom_nome: sessaoLocal.garcom_nome,
      funcionario_id: sessaoLocal.funcionario_id,
      sessao_token: sessaoLocal.sessao_token
    });

  if (erroInsert) {
    console.error(erroInsert);
    alert("Erro ao adicionar produto.");
    return;
  }

  await carregarPedidoAtual();
  await carregarHistoricoPedidosEnviados();
  await calcularTotalGeralMesa();
}

async function aumentarItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  if (!(await validarSessaoPedido())) return;

  const novaQtd = Number(item.quantidade || 0) + 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao aumentar item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function diminuirItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  if (!(await validarSessaoPedido())) return;

  const qtd = Number(item.quantidade || 0);

  if (qtd <= 1) {
    await removerItem(item.id);
    return;
  }

  const novaQtd = qtd - 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao diminuir item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function removerItem(itemId) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível remover item deste lote.");
    return;
  }

  if (!(await validarSessaoPedido())) return;

  const { error } = await supabase
    .from("pedido_itens")
    .delete()
    .eq("id", itemId)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao remover item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function carregarPedidoAtual() {
  if (!pedidoAtual) {
    limparTelaPedidoAtual();
    atualizarInfoStatus();
    await calcularTotalGeralMesa();
    return;
  }

  const { data, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const itens = data || [];
  const div = document.getElementById("pedido");
  div.innerHTML = "";
  let total = 0;

  if (itens.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum item neste pedido em aberto</div>`;
  }

  itens.forEach((i, index) => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);

    const bloqueado = pedidoBloqueadoParaEdicao();
    const produtoRel = produtosCache.find(p => String(p.id) === String(i.produto_id)) || null;
    const imgItem = produtoRel ? obterImagemProduto(produtoRel) : "https://via.placeholder.com/300x300?text=Produto";

    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <div class="item-topo">
        <img class="thumb-item" src="${imgItem}" alt="${i.nome_produto}" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x300?text=Produto'">
        <div class="item-info">
          <strong>${index + 1}. ${i.nome_produto}</strong>
          <div class="linha-preco">${formatarMoeda(Number(i.preco || 0) * Number(i.quantidade || 0))}</div>
        </div>
      </div>

      <div class="item-acoes-wrap">
        <div class="item-acoes">
          <button class="btn-menor" ${bloqueado ? "disabled" : ""}>➖</button>
          <div class="qtd-badge">${i.quantidade}</div>
          <button class="btn-maior" ${bloqueado ? "disabled" : ""}>➕</button>
          <button class="btn-remover" ${bloqueado ? "disabled" : ""}>Remover</button>
        </div>
      </div>
    `;

    const botoes = item.querySelectorAll("button");
    botoes[0].onclick = () => diminuirItem(i);
    botoes[1].onclick = () => aumentarItem(i);
    botoes[2].onclick = () => removerItem(i.id);

    div.appendChild(item);
  });

  atualizarTotaisLote(total);
  atualizarInfoStatus();
  await calcularTotalGeralMesa();
}

async function carregarHistoricoPedidosEnviados() {
  const box = document.getElementById("historicoPedidosEnviados");

  const { data: pedidos, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .neq("status", "aberto")
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    box.style.display = "none";
    return;
  }

  if (!pedidos || pedidos.length === 0) {
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  let html = `<h4>Pedidos já enviados da mesa</h4>`;

  for (let idx = 0; idx < pedidos.length; idx++) {
    const p = pedidos[idx];

    const { data: itens } = await supabase
      .from("pedido_itens")
      .select("*")
      .eq("pedido_id", p.id)
      .order("created_at", { ascending: true });

    let subtotal = 0;
    html += `<div class="divisor"></div>`;
    html += `<div class="lote-tag">Lote ${idx + 1} — ${nomeStatus(p.status)}</div>`;

    (itens || []).forEach((i, itemIndex) => {
      const sub = Number(i.preco || 0) * Number(i.quantidade || 0);
      subtotal += sub;
      html += `
        <div class="linha-historico">
          ${itemIndex + 1}. ${i.quantidade}x ${i.nome_produto} — ${formatarMoeda(sub)}
        </div>
      `;
    });

    html += `<small>Total do lote ${idx + 1}: ${formatarMoeda(subtotal)}</small>`;
  }

  box.innerHTML = html;
  box.style.display = "block";
}

async function calcularTotalGeralMesa() {
  const { data: pedidos, error: erroPedidos } = await supabase
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .in("status", ["aberto","novo","aceito","pronto","conta_solicitada","pago"]);

  if (erroPedidos) {
    console.error(erroPedidos);
    atualizarTotaisMesa(0);
    return 0;
  }

  if (!pedidos || pedidos.length === 0) {
    atualizarTotaisMesa(0);
    await atualizarMesaStatus({ total_aberto: 0 });
    return 0;
  }

  const ids = pedidos.map(p => p.id);

  const { data: itens, error: erroItens } = await supabase
    .from("pedido_itens")
    .select("pedido_id, preco, quantidade")
    .in("pedido_id", ids);

  if (erroItens) {
    console.error(erroItens);
    atualizarTotaisMesa(0);
    return 0;
  }

  let total = 0;
  (itens || []).forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);
  });

  atualizarTotaisMesa(total);
  await atualizarMesaStatus({ total_aberto: total });
  return total;
}

  const { error: errorUpdate } = await supabase
    .from("pedidos")
    .update({ status: "conta_solicitada" })
    .in("id", ids)
    .eq("app_id", APP_ID);

  if (errorUpdate) {
    console.error(errorUpdate);
    alert("Erro ao solicitar conta.");
    return;
  }

  await atualizarMesaStatus({
    ocupada: true,
    pedir_conta: true,
    status: "pediu_conta"
  });

  alert("Conta solicitada!");
  await sincronizarSessaoComPedidos();
};

function removerCanalPedidoAtual() {
  if (canalPedidoAtual) {
    supabase.removeChannel(canalPedidoAtual);
    canalPedidoAtual = null;
  }
}

function ativarRealtimePedidoAtual() {
  removerCanalPedidoAtual();

  if (!pedidoAtual) return;

  canalPedidoAtual = supabase
    .channel("mesa-pedido-atual-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedido_itens",
        filter: `pedido_id=eq.${pedidoAtual.id}`
      },
      async () => {
        await carregarPedidoAtual();
      }
    )
    .subscribe();
}

function ativarRealtimeMesa() {
  if (canalMesa) {
    supabase.removeChannel(canalMesa);
    canalMesa = null;
  }

  canalMesa = supabase
    .channel("mesa-geral-" + mesaId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedidos",
        filter: `mesa_id=eq.${mesaId}`
      },
      async (payload) => {
        const novoStatus = payload.new?.status;

        if (novoStatus === "aceito") alert("👨‍🍳 Um pedido da mesa foi aceito!");
        if (novoStatus === "pronto") alert("✅ Um pedido da mesa ficou pronto!");
        if (novoStatus === "cancelado") alert("❌ Um pedido da mesa foi cancelado!");

        await sincronizarSessaoComPedidos();
      }
    )
    .subscribe();
}

function ativarRealtimeMesaStatus() {
  if (canalMesaStatus) {
    supabase.removeChannel(canalMesaStatus);
    canalMesaStatus = null;
  }

  canalMesaStatus = supabase
    .channel("mesa-status-" + mesaId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "mesas",
        filter: `id=eq.${mesaId}`
      },
      async (payload) => {
        mesaInfo = payload.new || mesaInfo;

        const livre = payload.new?.status === "livre" || payload.new?.ocupada === false;
        if (livre) {
          resetarInterfaceParaNovaSessao();
          await sincronizarSessaoComPedidos();
        }
      }
    )
    .subscribe();
}

document.getElementById("btnIniciarSessao").onclick = iniciarAtendimentoManual;
document.getElementById("busca").oninput = aplicarFiltros;

document.getElementById("btnRecarregar").onclick = async () => {
  resetarInterfaceParaNovaSessao();
  await sincronizarSessaoComPedidos();
};

document.addEventListener("DOMContentLoaded", iniciarSistema);
</script>
