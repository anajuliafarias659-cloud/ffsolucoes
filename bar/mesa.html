<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

.oculto{display:none !important}

.topo{
  background:#0f172a;
  padding:14px 16px;
  font-size:20px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:50;
  border-bottom:1px solid rgba(255,255,255,.06);
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}

.container{
  max-width:900px;
  margin:auto;
  padding:14px 14px 170px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  box-sizing:border-box;
  font-size:15px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.filtros{
  display:flex;
  gap:8px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.filtros button{
  background:#1e293b;
  color:#fff;
  padding:10px 12px;
  border-radius:999px;
  font-size:13px;
}

.filtros button.ativo{
  background:#2563eb;
}

.bloqueado{
  opacity:.4;
  pointer-events:none;
}

.msg-vazio{
  opacity:.75;
  background:#0f172a;
  border-radius:14px;
  padding:14px;
}

small{
  opacity:.8;
  display:block;
}

.info-status{
  margin:10px 0 16px;
  padding:12px 14px;
  border-radius:12px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,.08);
  font-size:14px;
}

.card-sessao,
.card-lote{
  background:#0f172a;
  border-radius:14px;
  padding:14px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.08);
}

.card-sessao h3,
.card-lote h3{
  margin:0;
  font-size:18px;
}

.sessao-topo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.btn-toggle-sessao{
  background:#2563eb;
  color:#fff;
  padding:10px 14px;
  min-height:40px;
}

.form-sessao{
  margin-top:12px;
}

.badge{
  display:inline-block;
  background:#1e293b;
  color:#fff;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
  margin-top:6px;
}

/* PRODUTOS */
#listaProdutos{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.produto{
  background:#0f172a;
  border-radius:14px;
  padding:10px;
  border:1px solid rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:100%;
}

.produto-esquerda{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:8px;
  min-width:0;
  flex:1;
}

.thumb-produto{
  width:100%;
  aspect-ratio:1/1;
  border-radius:12px;
  object-fit:cover;
  background:#1e293b;
  border:1px solid rgba(255,255,255,.08);
}

.produto-info{
  width:100%;
  min-width:0;
}

.produto-info strong{
  display:block;
  margin-bottom:4px;
  font-size:14px;
  line-height:1.3;
}

.produto-info small{
  font-size:12px;
  line-height:1.3;
}

.produto button{
  width:100%;
  margin-top:10px;
  background:#22c55e;
  color:#000;
  min-height:38px;
  font-size:14px;
  border-radius:10px;
}

/* PEDIDO */
.item{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px 12px;
  background:#111827;
  border-radius:14px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,.06);
}

.item-topo{
  display:flex;
  gap:10px;
  align-items:center;
}

.thumb-item{
  width:54px;
  height:54px;
  border-radius:10px;
  object-fit:cover;
  background:#1e293b;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.08);
}

.item-info{
  min-width:0;
  flex:1;
}

.item-info strong{
  display:block;
  margin-bottom:4px;
  font-size:15px;
}

.item-info .linha-preco{
  font-size:13px;
  color:#cbd5e1;
}

.item-acoes-wrap{
  width:100%;
}

.item-acoes{
  display:grid;
  grid-template-columns:36px 50px 36px 1fr;
  gap:6px;
  align-items:center;
}

.btn-menor,.btn-maior{
  min-height:34px;
  height:34px;
  padding:0;
  font-size:16px;
  border-radius:8px;
}

.btn-menor{
  background:#f59e0b;
  color:#000;
}

.btn-maior{
  background:#22c55e;
  color:#000;
}

.btn-remover{
  background:#ef4444;
  color:#fff;
  font-weight:bold;
  min-height:34px;
  height:34px;
  padding:0 10px;
  border-radius:8px;
  font-size:12px;
}

.qtd-badge{
  min-width:50px;
  text-align:center;
  font-weight:bold;
  background:#1e293b;
  padding:8px 6px;
  border-radius:8px;
  font-size:14px;
}

.historico-bloco{
  background:#0f172a;
  border-radius:14px;
  padding:14px;
  margin-top:14px;
  border:1px solid rgba(255,255,255,.08);
}

.historico-bloco h4{
  margin:0 0 10px 0;
}

.linha-historico{
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:14px;
}

.linha-historico:last-child{
  border-bottom:none;
}

.lote-tag{
  display:inline-block;
  font-size:12px;
  background:#1e293b;
  padding:6px 10px;
  border-radius:999px;
  margin-bottom:10px;
}

.divisor{
  height:1px;
  background:rgba(255,255,255,.08);
  margin:14px 0;
}

/* BARRA FIXA */
.barra-fixa{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:60;
  background:rgba(15,23,42,.98);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,.08);
  box-shadow:0 -6px 24px rgba(0,0,0,.35);
}

.barra-fixa-conteudo{
  max-width:900px;
  margin:auto;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
}

.barra-totais{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.total-fixo{
  background:#111827;
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  padding:10px 12px;
  font-weight:bold;
}

.total-fixo span{
  display:block;
  color:#94a3b8;
  font-size:12px;
  margin-bottom:4px;
  font-weight:normal;
}

.total-fixo strong{
  color:#22c55e;
  font-size:16px;
}

.acoes-fixas{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.acoes-fixas button{
  width:100%;
  padding:11px 8px;
  font-size:12px;
  min-height:42px;
  white-space:nowrap;
}

#btnEnviar{
  background:#22c55e;
  color:#000;
}

#btnConta{
  background:#f59e0b;
  color:#000;
}

#btnLiberar{
  background:#2563eb;
  color:#fff;
}

@media(min-width:768px){
  .container{
    padding:20px 20px 180px;
  }

  #listaProdutos{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }

  .item{
    flex-direction:row;
    justify-content:space-between;
    align-items:center;
  }

  .item-topo{
    flex:1;
    min-width:0;
  }

  .item-acoes-wrap{
    width:auto;
    min-width:220px;
  }

  .item-acoes{
    grid-template-columns:36px 50px 36px 88px;
  }

  .acoes-fixas button{
    font-size:13px;
  }
}

@media(max-width:420px){
  .acoes-fixas button{
    font-size:11px;
    padding:10px 6px;
  }

  .item-acoes{
    grid-template-columns:34px 46px 34px 1fr;
  }
}
</style>
</head>

<body>

<div class="topo" id="tituloMesa">🍽️ Mesa</div>

<div class="container">

  <div class="card-sessao" id="cardSessao">
    <div class="sessao-topo">
      <h3>Sessão da mesa</h3>
      <button id="btnToggleSessao" class="btn-toggle-sessao">Iniciar sessão</button>
    </div>

    <div id="formSessao" class="form-sessao oculto">
      <input id="clienteNome" placeholder="Nome do cliente">
      <input id="clienteTelefone" placeholder="Celular do cliente">
      <button id="btnIniciarSessao" style="background:#22c55e;color:#000;padding:12px 16px;width:100%">✅ Confirmar sessão</button>
    </div>

    <small id="sessaoAtualInfo" style="margin-top:10px;display:block"></small>
  </div>

  <input id="busca" placeholder="🔍 Buscar produto">
  <div class="filtros" id="filtrosCategorias"></div>

  <h3>Produtos</h3>
  <div id="listaProdutos"></div>

  <div class="card-lote">
    <h3>Pedido atual da mesa</h3>
    <div id="statusPedido" class="info-status" style="display:none;"></div>
    <div id="pedido"></div>
  </div>

  <div class="historico-bloco" id="historicoPedidosEnviados" style="display:none;"></div>

</div>

<div class="barra-fixa">
  <div class="barra-fixa-conteudo">
    <div class="barra-totais">
      <div class="total-fixo">
        <span>Lote atual</span>
        <strong id="totalPedidoBarra">R$ 0,00</strong>
      </div>
      <div class="total-fixo">
        <span>Total da mesa</span>
        <strong id="totalMesaBarra">R$ 0,00</strong>
      </div>
    </div>

    <div class="acoes-fixas">
      <button id="btnEnviar">📨 Enviar pedido</button>
      <button id="btnConta">🧾 Pedir conta</button>
      <button id="btnLiberar" class="bloqueado">🔓 Liberar mesa</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");

let APP_ID = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = null;
let canalMesa = null;
let canalPedidoAtual = null;
let FUNCIONARIO_LOGADO = null;

const CHAVE_SESSAO = `mesa_sessao_${mesaId}`;
let sessaoLocal = null;

if (!mesaId) {
  alert("Mesa não informada.");
  history.back();
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function gerarToken() {
  return "tok_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function agoraISO() {
  return new Date().toISOString();
}

function adicionarMinutosISO(minutos) {
  return new Date(Date.now() + minutos * 60000).toISOString();
}

function nomeStatus(status) {
  const mapa = {
    aberto: "Aberto",
    novo: "Enviado",
    aceito: "Aceito pelo bar",
    pronto: "Pronto",
    conta_solicitada: "Conta solicitada",
    pago: "Pago",
    finalizado: "Finalizado",
    cancelado: "Cancelado"
  };
  return mapa[status] || status || "-";
}

function podeLiberarMesa(status) {
  return ["pago", "finalizado", "cancelado"].includes(status);
}

function pedidoPodeSerEditado() {
  if (!pedidoAtual) return true;
  return pedidoAtual.status === "aberto";
}

function pedidoBloqueadoParaEdicao() {
  return !pedidoPodeSerEditado();
}

function limparTelaPedidoAtual() {
  document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item em aberto no momento</div>`;
  atualizarTotaisLote(0);
}

function atualizarTotaisLote(total) {
  const valor = formatarMoeda(total || 0);
  const el = document.getElementById("totalPedidoBarra");
  if (el) el.innerText = valor;
}

function atualizarTotaisMesa(total) {
  const valor = formatarMoeda(total || 0);
  const el = document.getElementById("totalMesaBarra");
  if (el) el.innerText = valor;
}

function obterImagemProduto(produto) {
  if (!produto) return "https://via.placeholder.com/300x300?text=Produto";

  let imgs = [];
  try {
    imgs = JSON.parse(produto.imagens || "[]");
  } catch {
    imgs = [];
  }

  return imgs[0] || "https://via.placeholder.com/300x300?text=Produto";
}

function obterCategoriaProduto(produto) {
  return String(
    produto.categoria_nome ||
    produto.categoria ||
    produto.categoria_id ||
    "Sem categoria"
  );
}

function carregarSessaoLocal() {
  try {
    sessaoLocal = JSON.parse(localStorage.getItem(CHAVE_SESSAO) || "null");
  } catch {
    sessaoLocal = null;
  }
}

function salvarSessaoLocal(sessao) {
  sessaoLocal = sessao;
  localStorage.setItem(CHAVE_SESSAO, JSON.stringify(sessao));
  atualizarSessaoNaTela();
}

function removerSessaoLocal() {
  sessaoLocal = null;
  localStorage.removeItem(CHAVE_SESSAO);
  atualizarSessaoNaTela();
}

function carregarFuncionarioLogado() {
  try {
    FUNCIONARIO_LOGADO = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  } catch {
    FUNCIONARIO_LOGADO = null;
  }
}

function atualizarSessaoNaTela() {
  const info = document.getElementById("sessaoAtualInfo");
  const form = document.getElementById("formSessao");
  const btn = document.getElementById("btnToggleSessao");

  if (!sessaoLocal) {
    info.innerHTML = FUNCIONARIO_LOGADO?.nome
      ? `Garçom logado: <strong>${FUNCIONARIO_LOGADO.nome}</strong><br>Nenhuma sessão ativa nesta mesa.`
      : "Nenhuma sessão ativa nesta mesa.";

    if (btn) btn.textContent = "Iniciar sessão";
    return;
  }

  const cliente = sessaoLocal.cliente_nome || "-";
  const fone = sessaoLocal.cliente_telefone || "-";
  const garcom = sessaoLocal.garcom_nome || null;

  info.innerHTML = `
    <span class="badge">Cliente: ${cliente}</span>
    <span class="badge">${fone}</span>
    ${garcom ? `<span class="badge">Garçom: ${garcom}</span>` : ""}
  `;

  if (form && btn) {
    form.classList.add("oculto");
    btn.textContent = "Iniciar sessão";
  }
}

function sessaoExpiradaLocal() {
  if (!sessaoLocal?.sessao_expira_em) return false;
  return new Date(sessaoLocal.sessao_expira_em).getTime() < Date.now();
}

function atualizarBotaoLiberarPorPedidos(pedidosAtivos) {
  const btn = document.getElementById("btnLiberar");

  if (!pedidosAtivos || pedidosAtivos.length === 0) {
    btn.classList.remove("bloqueado");
    return;
  }

  const existePendente = pedidosAtivos.some(p => !podeLiberarMesa(p.status));
  if (existePendente) btn.classList.add("bloqueado");
  else btn.classList.remove("bloqueado");
}

function atualizarInfoStatus() {
  const div = document.getElementById("statusPedido");

  if (!pedidoAtual) {
    div.style.display = "block";
    div.innerHTML = `Sem pedido em aberto no momento.<br><small>Ao tocar em um produto, um novo lote será criado.</small>`;
    return;
  }

  div.style.display = "block";

  const expiraInfo = pedidoAtual.sessao_expira_em
    ? `<br><small>Sessão expira em: ${new Date(pedidoAtual.sessao_expira_em).toLocaleString("pt-BR")}</small>`
    : "";

  if (pedidoAtual.status === "aberto") {
    div.innerHTML = `Status do pedido atual: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Esse lote ainda pode ser alterado antes do envio.</small>${expiraInfo}`;
  } else {
    div.innerHTML = `Status do pedido atual: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Esse lote já foi enviado e está travado.</small>${expiraInfo}`;
  }
}

function configurarToggleSessao() {
  const btn = document.getElementById("btnToggleSessao");
  const form = document.getElementById("formSessao");

  if (!btn || !form) return;

  btn.onclick = () => {
    form.classList.toggle("oculto");
    btn.textContent = form.classList.contains("oculto") ? "Iniciar sessão" : "Ocultar sessão";
  };
}

async function validarSessao() {
  const { data, error } = await supabase.auth.getSession();

  if (error || !data.session) {
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, app_id")
    .eq("id", userId)
    .single();

  if (erroUsuario || !usuario) {
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  APP_ID = usuario.app_id;
  return true;
}

async function iniciarSistema() {
  configurarToggleSessao();
  carregarSessaoLocal();
  carregarFuncionarioLogado();
  atualizarSessaoNaTela();

  const ok = await validarSessao();
  if (!ok) return;

  await carregarMesa();
  await carregarProdutos();
  await sincronizarSessaoComPedidos();
  ativarRealtimeMesa();
}

async function carregarMesa() {
  const { data } = await supabase
    .from("mesas")
    .select("numero_mesa")
    .eq("id", mesaId)
    .maybeSingle();

  if (data) {
    document.getElementById("tituloMesa").innerText = `🍽️ Mesa ${data.numero_mesa}`;
  }
}

async function sincronizarSessaoComPedidos() {
  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","cancelado")')
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const pedidos = data || [];
  const pedidoAberto = pedidos.find(p => p.status === "aberto") || null;
  const pedidoMaisRecente = pedidos[0] || null;

  pedidoAtual = pedidoAberto;

  if (pedidoMaisRecente?.sessao_token) {
    salvarSessaoLocal({
      sessao_token: pedidoMaisRecente.sessao_token,
      cliente_nome: pedidoMaisRecente.cliente_nome,
      cliente_telefone: pedidoMaisRecente.cliente_telefone,
      responsavel_nome: pedidoMaisRecente.responsavel_nome,
      garcom_nome: pedidoMaisRecente.garcom_nome,
      funcionario_id: pedidoMaisRecente.funcionario_id,
      sessao_expira_em: pedidoMaisRecente.sessao_expira_em
    });

    document.getElementById("clienteNome").value = pedidoMaisRecente.cliente_nome || "";
    document.getElementById("clienteTelefone").value = pedidoMaisRecente.cliente_telefone || "";
  }

  atualizarBotaoLiberarPorPedidos(pedidos);
  atualizarInfoStatus();

  if (pedidoAtual) ativarRealtimePedidoAtual();
  else removerCanalPedidoAtual();

  await carregarPedidoAtual();
  await carregarHistoricoPedidosEnviados();
  await calcularTotalGeralMesa();
  aplicarFiltros();
}

async function iniciarAtendimentoManual() {
  const clienteNome = document.getElementById("clienteNome").value.trim();
  const clienteTelefone = document.getElementById("clienteTelefone").value.trim();

  if (!clienteNome || !clienteTelefone) {
    alert("Preencha nome e celular do cliente.");
    return;
  }

  const sessao = {
    sessao_token: gerarToken(),
    cliente_nome: clienteNome,
    cliente_telefone: clienteTelefone,
    responsavel_nome: clienteNome,
    garcom_nome: FUNCIONARIO_LOGADO?.nome || null,
    funcionario_id: FUNCIONARIO_LOGADO?.id || null,
    sessao_expira_em: adicionarMinutosISO(60)
  };

  salvarSessaoLocal(sessao);
  alert("Atendimento iniciado com sucesso!");
}

async function validarSessaoPedido() {
  if (!sessaoLocal) {
    alert("Inicie o atendimento antes de lançar itens.");
    return false;
  }

  if (sessaoExpiradaLocal()) {
    alert("A sessão expirou. Inicie um novo atendimento.");
    removerSessaoLocal();
    return false;
  }

  return true;
}

async function criarPedidoSeNecessario() {
  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return false;

  if (pedidoAtual && pedidoAtual.status === "aberto") return true;

  const { data, error } = await supabase
    .from("pedidos")
    .insert({
      app_id: APP_ID,
      mesa_id: mesaId,
      status: "aberto",
      origem: "mesa",
      sessao_token: sessaoLocal.sessao_token,
      sessao_status: "ativa",
      sessao_expira_em: sessaoLocal.sessao_expira_em,
      cliente_nome: sessaoLocal.cliente_nome,
      cliente_telefone: sessaoLocal.cliente_telefone,
      responsavel_nome: sessaoLocal.responsavel_nome,
      garcom_nome: sessaoLocal.garcom_nome,
      funcionario_id: sessaoLocal.funcionario_id
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Erro ao criar novo pedido.");
    return false;
  }

  pedidoAtual = data;
  atualizarInfoStatus();
  ativarRealtimePedidoAtual();
  return true;
}

async function carregarProdutos() {
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if (error) {
    console.error(error);
    document.getElementById("listaProdutos").innerHTML = `<div class="msg-vazio">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = (data || []).map(p => ({
    ...p,
    categoria_exibicao: obterCategoriaProduto(p),
    imagem_exibicao: obterImagemProduto(p)
  }));

  montarCategoriasPelosProdutos();
  aplicarFiltros();
}

function montarCategoriasPelosProdutos() {
  const mapa = new Map();

  produtosCache.forEach(p => {
    const chave = obterCategoriaProduto(p);
    if (!mapa.has(chave)) {
      mapa.set(chave, { id: chave, nome: chave });
    }
  });

  categoriasCache = Array.from(mapa.values());

  if (!categoriaSelecionada && categoriasCache.length > 0) {
    categoriaSelecionada = categoriasCache[0].id;
  }

  renderizarBotoesCategorias();
}

function renderizarBotoesCategorias() {
  const div = document.getElementById("filtrosCategorias");
  div.innerHTML = "";

  if (categoriasCache.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhuma categoria encontrada nos produtos</div>`;
    return;
  }

  categoriasCache.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.nome;
    if (categoriaSelecionada === cat.id) btn.classList.add("ativo");
    btn.onclick = () => {
      categoriaSelecionada = cat.id;
      renderizarBotoesCategorias();
      aplicarFiltros();
    };
    div.appendChild(btn);
  });
}

function aplicarFiltros() {
  const texto = (document.getElementById("busca").value || "").toLowerCase();

  const lista = produtosCache.filter(p => {
    const nomeOk = (p.nome || "").toLowerCase().includes(texto);
    const categoriaOk = !categoriaSelecionada || obterCategoriaProduto(p) === categoriaSelecionada;
    return nomeOk && categoriaOk;
  });

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if (lista.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado</div>`;
    return;
  }

  lista.forEach(p => {
    const imgPrincipal = obterImagemProduto(p);

    const card = document.createElement("div");
    card.className = "produto";
    card.innerHTML = `
      <div class="produto-esquerda">
        <img class="thumb-produto" src="${imgPrincipal}" alt="${p.nome}" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x300?text=Produto'">
        <div class="produto-info">
          <strong>${p.nome}</strong>
          <small>${formatarMoeda(p.preco)}</small>
          <small>${p.categoria_exibicao}</small>
        </div>
      </div>
      <button data-id="${p.id}">Adicionar</button>
    `;

    card.querySelector("button").onclick = () => addProduto(p.id);
    div.appendChild(card);
  });
}

async function addProduto(produtoId) {
  const ok = await criarPedidoSeNecessario();
  if (!ok) return;

  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return;

  const produto = produtosCache.find(p => String(p.id) === String(produtoId));
  if (!produto) return;

  const { error: erroInsert } = await supabase
    .from("pedido_itens")
    .insert({
      app_id: APP_ID,
      pedido_id: pedidoAtual.id,
      produto_id: produto.id,
      nome_produto: produto.nome,
      preco: Number(produto.preco || 0),
      quantidade: 1,
      status: "novo",
      responsavel_nome: sessaoLocal.cliente_nome,
      cliente_nome: sessaoLocal.cliente_nome,
      cliente_telefone: sessaoLocal.cliente_telefone,
      garcom_nome: sessaoLocal.garcom_nome,
      funcionario_id: sessaoLocal.funcionario_id,
      sessao_token: sessaoLocal.sessao_token
    });

  if (erroInsert) {
    console.error(erroInsert);
    alert("Erro ao adicionar produto.");
    return;
  }

  await carregarPedidoAtual();
  await carregarHistoricoPedidosEnviados();
  await calcularTotalGeralMesa();
}

async function aumentarItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  const novaQtd = Number(item.quantidade || 0) + 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao aumentar item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function diminuirItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  const qtd = Number(item.quantidade || 0);

  if (qtd <= 1) {
    await removerItem(item.id);
    return;
  }

  const novaQtd = qtd - 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao diminuir item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function removerItem(itemId) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível remover item deste lote.");
    return;
  }

  const { error } = await supabase
    .from("pedido_itens")
    .delete()
    .eq("id", itemId)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao remover item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function carregarPedidoAtual() {
  if (!pedidoAtual) {
    limparTelaPedidoAtual();
    atualizarInfoStatus();
    await calcularTotalGeralMesa();
    return;
  }

  const { data, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const itens = data || [];
  const div = document.getElementById("pedido");
  div.innerHTML = "";
  let total = 0;

  if (itens.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum item neste pedido em aberto</div>`;
  }

  itens.forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);

    const bloqueado = pedidoBloqueadoParaEdicao();
    const produtoRel = produtosCache.find(p => String(p.id) === String(i.produto_id)) || null;
    const imgItem = produtoRel ? obterImagemProduto(produtoRel) : "https://via.placeholder.com/300x300?text=Produto";

    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <div class="item-topo">
        <img class="thumb-item" src="${imgItem}" alt="${i.nome_produto}" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x300?text=Produto'">
        <div class="item-info">
          <strong>${i.nome_produto}</strong>
          <div class="linha-preco">${formatarMoeda(Number(i.preco || 0) * Number(i.quantidade || 0))}</div>
        </div>
      </div>

      <div class="item-acoes-wrap">
        <div class="item-acoes">
          <button class="btn-menor" ${bloqueado ? "disabled" : ""}>➖</button>
          <div class="qtd-badge">${i.quantidade}</div>
          <button class="btn-maior" ${bloqueado ? "disabled" : ""}>➕</button>
          <button class="btn-remover" ${bloqueado ? "disabled" : ""}>Remover</button>
        </div>
      </div>
    `;

    const botoes = item.querySelectorAll("button");
    botoes[0].onclick = () => diminuirItem(i);
    botoes[1].onclick = () => aumentarItem(i);
    botoes[2].onclick = () => removerItem(i.id);

    div.appendChild(item);
  });

  atualizarTotaisLote(total);
  atualizarInfoStatus();
  await calcularTotalGeralMesa();
}

async function carregarHistoricoPedidosEnviados() {
  const box = document.getElementById("historicoPedidosEnviados");

  const { data: pedidos, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .neq("status", "aberto")
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    box.style.display = "none";
    return;
  }

  if (!pedidos || pedidos.length === 0) {
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  let html = `<h4>Pedidos já enviados da mesa</h4>`;

  for (let idx = 0; idx < pedidos.length; idx++) {
    const p = pedidos[idx];

    const { data: itens } = await supabase
      .from("pedido_itens")
      .select("*")
      .eq("pedido_id", p.id)
      .order("created_at", { ascending: true });

    let subtotal = 0;
    html += `<div class="divisor"></div>`;
    html += `<div class="lote-tag">Lote ${idx + 1} — ${nomeStatus(p.status)}</div>`;

    (itens || []).forEach(i => {
      const sub = Number(i.preco || 0) * Number(i.quantidade || 0);
      subtotal += sub;
      html += `
        <div class="linha-historico">
          ${i.quantidade}x ${i.nome_produto} — ${formatarMoeda(sub)}
        </div>
      `;
    });

    html += `<small>Total do lote ${idx + 1}: ${formatarMoeda(subtotal)}</small>`;
  }

  box.innerHTML = html;
  box.style.display = "block";
}

async function calcularTotalGeralMesa() {
  const { data: pedidos, error: erroPedidos } = await supabase
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("cancelado","finalizado")');

  if (erroPedidos) {
    console.error(erroPedidos);
    atualizarTotaisMesa(0);
    return 0;
  }

  if (!pedidos || pedidos.length === 0) {
    atualizarTotaisMesa(0);
    return 0;
  }

  const ids = pedidos.map(p => p.id);

  const { data: itens, error: erroItens } = await supabase
    .from("pedido_itens")
    .select("pedido_id, preco, quantidade")
    .in("pedido_id", ids);

  if (erroItens) {
    console.error(erroItens);
    atualizarTotaisMesa(0);
    return 0;
  }

  let total = 0;
  (itens || []).forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);
  });

  atualizarTotaisMesa(total);
  return total;
}

document.getElementById("btnEnviar").onclick = async () => {
  if (!pedidoAtual) {
    alert("Nenhum pedido em aberto.");
    return;
  }

  if (!pedidoPodeSerEditado()) {
    alert("Esse lote já foi enviado.");
    return;
  }

  const { data: itens, error: erroItens } = await supabase
    .from("pedido_itens")
    .select("id")
    .eq("pedido_id", pedidoAtual.id)
    .limit(1);

  if (erroItens) {
    console.error(erroItens);
    alert("Erro ao validar itens do pedido.");
    return;
  }

  if (!itens || itens.length === 0) {
    alert("Adicione pelo menos um item antes de enviar.");
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({ status: "novo" })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID)
    .eq("status", "aberto");

  if (error) {
    console.error(error);
    alert("Erro ao enviar pedido.");
    return;
  }

  alert("Pedido enviado! Esse lote ficou travado. Se quiser pedir mais, é só adicionar novos itens.");
  await sincronizarSessaoComPedidos();
};

document.getElementById("btnConta").onclick = async () => {
  const totalMesa = await calcularTotalGeralMesa();

  if (totalMesa <= 0) {
    alert("Não há valores pendentes para pagamento nesta mesa.");
    return;
  }

  const { data: pedidosAtivos, error } = await supabase
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","cancelado","pago")');

  if (error) {
    console.error(error);
    alert("Erro ao verificar pedidos da mesa.");
    return;
  }

  if (!pedidosAtivos || pedidosAtivos.length === 0) {
    alert("Não há pedidos pendentes nesta mesa.");
    return;
  }

  const temAberto = pedidosAtivos.some(p => p.status === "aberto");
  if (temAberto) {
    alert("Existe um pedido em aberto. Envie o pedido atual antes de solicitar a conta.");
    return;
  }

  const ids = pedidosAtivos.map(p => p.id);

  const { error: errorUpdate } = await supabase
    .from("pedidos")
    .update({ status: "conta_solicitada" })
    .in("id", ids)
    .eq("app_id", APP_ID);

  if (errorUpdate) {
    console.error(errorUpdate);
    alert("Erro ao solicitar conta.");
    return;
  }

  alert("Conta solicitada!");
  await sincronizarSessaoComPedidos();
};

document.getElementById("btnLiberar").onclick = async () => {
  const totalMesa = await calcularTotalGeralMesa();

  if (totalMesa > 0) {
    const { data: pedidosPendentes, errorBusca } = await supabase
      .from("pedidos")
      .select("id,status")
      .eq("mesa_id", mesaId)
      .eq("app_id", APP_ID)
      .not("status", "in", '("finalizado","cancelado")');

    if (errorBusca) {
      console.error(errorBusca);
      alert("Erro ao verificar a mesa.");
      return;
    }

    if (pedidosPendentes && pedidosPendentes.some(p => !podeLiberarMesa(p.status))) {
      alert("Não é possível liberar a mesa. Ainda existem pedidos pendentes.");
      return;
    }
  }

  const { data: pedidosPendentes, errorBusca } = await supabase
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","cancelado")');

  if (errorBusca) {
    console.error(errorBusca);
    alert("Erro ao verificar a mesa.");
    return;
  }

  if (!pedidosPendentes || pedidosPendentes.length === 0) {
    removerSessaoLocal();
    location.href = "mesas.html";
    return;
  }

  const bloqueando = pedidosPendentes.some(p => !podeLiberarMesa(p.status));
  if (bloqueando) {
    alert("Não é possível liberar a mesa. Ainda existem pedidos pendentes.");
    return;
  }

  const ids = pedidosPendentes.map(p => p.id);

  const { error } = await supabase
    .from("pedidos")
    .update({
      status: "finalizado",
      sessao_status: "encerrada",
      sessao_expira_em: agoraISO()
    })
    .in("id", ids)
    .eq("app_id", APP_ID);

  if (error) {
    console.error(error);
    alert("Erro ao liberar mesa.");
    return;
  }

  removerSessaoLocal();
  location.href = "mesas.html";
};

function removerCanalPedidoAtual() {
  if (canalPedidoAtual) {
    supabase.removeChannel(canalPedidoAtual);
    canalPedidoAtual = null;
  }
}

function ativarRealtimePedidoAtual() {
  removerCanalPedidoAtual();

  if (!pedidoAtual) return;

  canalPedidoAtual = supabase
    .channel("mesa-pedido-atual-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedido_itens",
        filter: `pedido_id=eq.${pedidoAtual.id}`
      },
      async () => {
        await carregarPedidoAtual();
      }
    )
    .subscribe();
}

function ativarRealtimeMesa() {
  if (canalMesa) {
    supabase.removeChannel(canalMesa);
    canalMesa = null;
  }

  canalMesa = supabase
    .channel("mesa-geral-" + mesaId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedidos",
        filter: `mesa_id=eq.${mesaId}`
      },
      async payload => {
        const novoStatus = payload.new?.status;

        if (novoStatus === "aceito") alert("👨‍🍳 Um pedido da mesa foi aceito!");
        if (novoStatus === "pronto") alert("✅ Um pedido da mesa ficou pronto!");
        if (novoStatus === "pago") alert("💰 Um pedido da mesa foi pago!");
        if (novoStatus === "cancelado") alert("❌ Um pedido da mesa foi cancelado!");

        await sincronizarSessaoComPedidos();
      }
    )
    .subscribe();
}

document.getElementById("btnIniciarSessao").onclick = iniciarAtendimentoManual;
document.getElementById("busca").oninput = aplicarFiltros;
document.addEventListener("DOMContentLoaded", iniciarSistema);
</script>
