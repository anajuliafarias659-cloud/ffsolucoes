<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedido da Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --primary:#0f172a;
  --green:#16a34a;
  --orange:#f59e0b;
  --red:#ef4444;
  --blue:#2563eb;
  --shadow:0 8px 24px rgba(0,0,0,.08);
}

html,body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

body{
  padding-bottom:100px;
}

.topo{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:14px;
}

.topo-linha{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

.btn-topo{
  border:none;
  background:#e5e7eb;
  color:#111827;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.titulo-topo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-bola{
  width:44px;
  height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,#0f172a,#334155);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
  font-weight:bold;
  box-shadow:var(--shadow);
}

.titulo-topo h1{
  margin:0;
  font-size:22px;
}

.titulo-topo p{
  margin:2px 0 0;
  color:var(--muted);
  font-size:13px;
}

.container{
  max-width:1200px;
  margin:0 auto;
  padding:14px;
}

.hero{
  margin:8px 0 14px;
}

.hero h2{
  margin:0;
  font-size:30px;
  line-height:1.08;
}

.hero p{
  margin:8px 0 0;
  font-size:14px;
  color:var(--muted);
}

.card-sessao{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:14px;
  margin-bottom:14px;
}

.card-sessao h3{
  margin:0 0 10px;
  font-size:16px;
}

.form-grid{
  display:grid;
  gap:10px;
}

input{
  width:100%;
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  padding:13px 14px;
  border-radius:14px;
  outline:none;
  font-size:15px;
}

input:focus{
  border-color:#334155;
  box-shadow:0 0 0 3px rgba(51,65,85,.12);
}

.info-cliente{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}

.area-busca{
  margin-bottom:12px;
}

.filtros{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:4px 0 2px;
  margin-bottom:16px;
  scrollbar-width:none;
}

.filtros::-webkit-scrollbar{display:none}

.filtros button{
  background:#fff;
  border:1px solid var(--line);
  color:#374151;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  white-space:nowrap;
  cursor:pointer;
}

.filtros button.ativo{
  background:#111827;
  color:#fff;
  border-color:#111827;
}

.titulo-secao{
  margin:10px 0 14px;
  font-size:18px;
}

#listaProdutos{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.produto{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
}

.thumb-produto{
  width:100%;
  height:120px;
  object-fit:cover;
  background:#f3f4f6;
}

.produto-conteudo{
  padding:9px;
  display:flex;
  flex-direction:column;
  gap:7px;
}

.produto-info strong{
  display:block;
  font-size:14px;
  line-height:1.2;
}

.produto-info small{
  font-size:11px;
  color:var(--muted);
}

.produto-preco{
  font-size:14px;
  font-weight:bold;
  color:#111827;
}

.produto button{
  background:#111827;
  color:#fff;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:13px;
}

.msg-vazio{
  grid-column:1/-1;
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  color:var(--muted);
}

.oculto{display:none !important}

.info-status{
  margin-bottom:10px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1d4ed8;
  padding:12px;
  border-radius:14px;
  font-size:13px;
}

.item{
  display:flex;
  gap:10px;
  align-items:center;
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
}

.thumb-item{
  width:50px;
  height:50px;
  border-radius:12px;
  object-fit:cover;
  background:#f3f4f6;
  flex-shrink:0;
}

.item-centro{
  flex:1;
  min-width:0;
}

.item-centro strong{
  display:block;
  font-size:14px;
  line-height:1.2;
  margin-bottom:4px;
}

.linha-preco{
  font-size:12px;
  color:var(--muted);
}

.item-acoes{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}

.btn-menor,.btn-maior{
  width:32px;
  height:32px;
  border-radius:10px;
  color:#fff;
  font-size:14px;
  border:none;
  cursor:pointer;
}

.btn-menor{background:var(--orange); color:#111}
.btn-maior{background:var(--green)}
.btn-remover{
  background:#fff0f0;
  color:#b91c1c;
  border:1px solid #fecaca;
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
  font-weight:bold;
}

.qtd-badge{
  min-width:38px;
  text-align:center;
  padding:8px 10px;
  border-radius:10px;
  background:#f3f4f6;
  font-size:13px;
  font-weight:bold;
}

.historico-bloco{
  margin-top:18px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:14px;
}

.historico-bloco h4{
  margin:0 0 10px;
}

.lote-tag{
  display:inline-block;
  background:#f3f4f6;
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  margin-bottom:8px;
}

.linha-historico{
  padding:8px 0;
  border-bottom:1px solid var(--line);
  font-size:14px;
}

.linha-historico:last-child{
  border-bottom:none;
}

.divisor{
  height:1px;
  background:var(--line);
  margin:14px 0;
}

/* botão flutuante */
.fab-pedido{
  position:fixed;
  right:16px;
  bottom:18px;
  z-index:120;
  width:64px;
  height:64px;
  border-radius:50%;
  border:none;
  background:#16a34a;
  color:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,.22);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
}

.fab-badge{
  position:absolute;
  top:-3px;
  right:-3px;
  min-width:24px;
  height:24px;
  padding:0 6px;
  border-radius:999px;
  background:#ef4444;
  color:#fff;
  font-size:12px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #fff;
}

.fab-texto{
  display:none;
}

.backdrop-pedido{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:109;
}

.card-lote{
  position:fixed;
  right:14px;
  bottom:92px;
  width:min(420px, calc(100vw - 20px));
  max-height:72vh;
  z-index:110;
  background:rgba(255,255,255,.98);
  backdrop-filter:blur(10px);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.18);
  overflow:hidden;
}

.lote-topo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
}

.lote-topo h3{
  margin:0;
  font-size:16px;
}

.btn-toggle-pedido{
  background:#f3f4f6;
  color:#111827;
  padding:9px 12px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.pedido-conteudo{
  padding:12px 14px 14px;
  max-height:calc(72vh - 58px);
  overflow:auto;
}

.barra-fixa{
  margin-top:10px;
  display:grid;
  gap:10px;
}

.barra-totais{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.total-fixo{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}

.total-fixo span{
  display:block;
  color:var(--muted);
  font-size:11px;
  margin-bottom:4px;
}

.total-fixo strong{
  font-size:16px;
}

.acoes-fixas{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

#btnEnviar{
  background:#111827;
  color:#fff;
  padding:13px 10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

#btnConta{
  background:#16a34a;
  color:#fff;
  padding:13px 10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

@media (min-width:720px){
  #listaProdutos{grid-template-columns:repeat(3,minmax(0,1fr))}
  .hero h2{font-size:36px}
  .thumb-produto{height:140px}
}

@media (min-width:980px){
  #listaProdutos{grid-template-columns:repeat(4,minmax(0,1fr))}
}

@media (max-width:560px){
  body{
    padding-bottom:90px;
  }

  #listaProdutos{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
  }

  .thumb-produto{
    height:95px;
  }

  .produto-conteudo{
    padding:8px;
    gap:6px;
  }

  .produto-info strong{
    font-size:13px;
  }

  .produto-info small{
    font-size:10px;
  }

  .produto-preco{
    font-size:13px;
  }

  .produto button{
    padding:9px;
    font-size:12px;
  }

  .card-lote{
    right:10px;
    left:10px;
    bottom:88px;
    width:auto;
    max-height:74vh;
  }

  .pedido-conteudo{
    max-height:calc(74vh - 58px);
  }

  .barra-totais,
  .acoes-fixas{
    grid-template-columns:1fr;
  }

  .fab-pedido{
    width:58px;
    height:58px;
    font-size:25px;
    right:14px;
    bottom:14px;
  }
}
</style>
</head>

<body>

<div class="topo">
  <div class="topo-linha">
    <button class="btn-topo" onclick="voltarMesas()">‹ Voltar</button>

    <div class="titulo-topo">
      <div class="logo-bola">🍻</div>
      <div>
        <h1 id="tituloMesa">Mesa</h1>
        <p>Comanda interna do garçom / admin</p>
      </div>
    </div>

    <button class="btn-topo" onclick="recarregarTudo()">Atualizar</button>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h2>Lançar pedido da mesa</h2>
    <p>Escolha os produtos, monte o lote e envie para a cozinha.</p>
  </div>

  <div class="card-sessao">
    <h3>Dados da mesa</h3>
    <div class="form-grid">
      <input id="clienteNome" placeholder="Nome do cliente / responsável">
      <input id="clienteTelefone" placeholder="Celular do cliente (opcional)">
    </div>
    <div class="info-cliente" id="infoClienteMesa">Preencha os dados para identificar a mesa.</div>
  </div>

  <div class="area-busca">
    <input id="busca" placeholder="Buscar produto">
  </div>

  <div class="filtros" id="filtrosCategorias"></div>

  <h3 class="titulo-secao">Cardápio</h3>
  <div id="listaProdutos"></div>

  <div class="historico-bloco" id="historicoPedidosEnviados" style="display:none;"></div>
</div>

<div id="backdropPedido" class="backdrop-pedido oculto" onclick="fecharPedidoFlutuante()"></div>

<div class="card-lote oculto" id="cardLote">
  <div class="lote-topo">
    <h3>Comanda da mesa</h3>
    <button id="btnTogglePedido" class="btn-toggle-pedido">Fechar</button>
  </div>

  <div id="pedidoConteudo" class="pedido-conteudo">
    <div id="statusPedido" class="info-status"></div>
    <div id="pedido"></div>

    <div class="barra-fixa">
      <div class="barra-totais">
        <div class="total-fixo">
          <span>Lote atual</span>
          <strong id="totalPedidoBarra">R$ 0,00</strong>
        </div>
        <div class="total-fixo">
          <span>Total da mesa</span>
          <strong id="totalMesaBarra">R$ 0,00</strong>
        </div>
      </div>

      <div class="acoes-fixas">
        <button id="btnEnviar">Enviar pedido</button>
        <button id="btnConta">Pedir conta</button>
      </div>
    </div>
  </div>
</div>

<button id="fabPedido" class="fab-pedido" onclick="togglePedidoFlutuante()">
  🛒
  <span id="fabBadge" class="fab-badge">0</span>
</button>

<script>
const supabaseUrl = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const supabaseKey = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
const sb = supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa_id") || params.get("mesa");
const numeroMesaUrl = params.get("mesa_numero") || params.get("numero") || params.get("mesa");

let APP_ID = null;
let mesaInfo = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = null;
let canalMesa = null;
let canalPedidoAtual = null;
let canalMesaStatus = null;

if (!mesaId) {
  alert("Mesa não informada.");
  history.back();
}

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function normalizarStatus(status){
  return String(status || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function nomeStatus(status){
  const mapa = {
    aberto:"Em edição",
    novo:"Enviado",
    aceito:"Aceito pela cozinha",
    pronto:"Pronto",
    conta_solicitada:"Conta solicitada",
    pedir_conta:"Conta solicitada",
    pago:"Pago",
    finalizado:"Finalizado",
    cancelado:"Cancelado",
    ocupada:"Ocupada",
    livre:"Livre"
  };
  return mapa[status] || status || "-";
}

function statusFechado(status){
  const s = normalizarStatus(status);
  return ["pago","finalizado","cancelado","encerrado","concluido","fechado","quitado","recebido"].includes(s);
}

function gerarClienteId(nome, telefone){
  const fone = String(telefone || "").replace(/\D/g, "");
  if (fone) return "cli_" + fone;

  const base = (nome || "").trim().toLowerCase();
  return "cli_" + btoa(unescape(encodeURIComponent(base || "cliente"))).replace(/=/g, "");
}

function obterImagemProduto(produto){
  if (!produto) return "https://via.placeholder.com/600x600?text=Produto";

  let imgs = [];
  try{
    imgs = JSON.parse(produto.imagens || "[]");
  }catch{
    imgs = [];
  }

  return imgs[0] || "https://via.placeholder.com/600x600?text=Produto";
}

function obterCategoriaProduto(produto){
  return String(
    produto.categoria_nome ||
    produto.categoria ||
    produto.categoria_id ||
    "Sem categoria"
  );
}

function atualizarInfoClienteMesa(){
  const nome = document.getElementById("clienteNome").value.trim();
  const telefone = document.getElementById("clienteTelefone").value.trim();
  const el = document.getElementById("infoClienteMesa");

  if (!nome && !telefone) {
    el.textContent = "Preencha os dados para identificar a mesa.";
    return;
  }

  el.textContent = `Cliente: ${nome || "-"} • Celular: ${telefone || "-"}`;
}

function voltarMesas(){
  location.href = "mesas.html";
}

function recarregarTudo(){
  sincronizarMesaComPedidos();
}

function atualizarTotaisLote(total){
  document.getElementById("totalPedidoBarra").innerText = formatarMoeda(total || 0);
}

function atualizarTotaisMesa(total){
  document.getElementById("totalMesaBarra").innerText = formatarMoeda(total || 0);
}

function atualizarFabPedido(qtd){
  const badge = document.getElementById("fabBadge");
  badge.textContent = qtd || 0;
  badge.style.display = Number(qtd || 0) > 0 ? "flex" : "none";
}

function abrirPedidoFlutuante(){
  document.getElementById("cardLote").classList.remove("oculto");
  document.getElementById("backdropPedido").classList.remove("oculto");
}

function fecharPedidoFlutuante(){
  document.getElementById("cardLote").classList.add("oculto");
  document.getElementById("backdropPedido").classList.add("oculto");
}

function togglePedidoFlutuante(){
  const card = document.getElementById("cardLote");
  if (card.classList.contains("oculto")) abrirPedidoFlutuante();
  else fecharPedidoFlutuante();
}

function atualizarInfoStatus(){
  const div = document.getElementById("statusPedido");

  if (!pedidoAtual) {
    div.style.display = "block";
    div.innerHTML = `Nenhum lote em aberto.<br><small>Toque em um produto para começar.</small>`;
    return;
  }

  div.style.display = "block";

  if (normalizarStatus(pedidoAtual.status) === "aberto") {
    div.innerHTML = `Status do lote: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Você ainda pode alterar antes de enviar.</small>`;
  } else {
    div.innerHTML = `Status do lote: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Esse lote já foi enviado e está travado.</small>`;
  }
}

function pedidoPodeSerEditado(){
  if (!pedidoAtual) return true;
  return normalizarStatus(pedidoAtual.status) === "aberto";
}

function limparTelaPedidoAtual(){
  document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item em aberto no momento.</div>`;
  atualizarTotaisLote(0);
  atualizarFabPedido(0);
}

function removerCanalPedidoAtual(){
  if (canalPedidoAtual) {
    sb.removeChannel(canalPedidoAtual);
    canalPedidoAtual = null;
  }
}

function ativarRealtimePedidoAtual(){
  removerCanalPedidoAtual();

  if (!pedidoAtual) return;

  canalPedidoAtual = sb
    .channel("pedido-atual-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event:"*",
        schema:"public",
        table:"pedido_itens",
        filter:`pedido_id=eq.${pedidoAtual.id}`
      },
      async () => {
        await carregarPedidoAtual();
      }
    )
    .subscribe();
}

function ativarRealtimeMesa(){
  if (canalMesa) {
    sb.removeChannel(canalMesa);
    canalMesa = null;
  }

  canalMesa = sb
    .channel("mesa-geral-" + mesaId)
    .on(
      "postgres_changes",
      {
        event:"*",
        schema:"public",
        table:"pedidos",
        filter:`mesa_id=eq.${mesaId}`
      },
      async (payload) => {
        const novoStatus = normalizarStatus(payload.new?.status);

        if (novoStatus === "aceito") alert("Um pedido da mesa foi aceito.");
        if (novoStatus === "pronto") alert("Um pedido da mesa ficou pronto.");
        if (novoStatus === "cancelado") alert("Um pedido da mesa foi cancelado.");

        await sincronizarMesaComPedidos();
      }
    )
    .subscribe();
}

function ativarRealtimeMesaStatus(){
  if (canalMesaStatus) {
    sb.removeChannel(canalMesaStatus);
    canalMesaStatus = null;
  }

  canalMesaStatus = sb
    .channel("mesa-status-" + mesaId)
    .on(
      "postgres_changes",
      {
        event:"*",
        schema:"public",
        table:"mesas",
        filter:`id=eq.${mesaId}`
      },
      async (payload) => {
        mesaInfo = payload.new || mesaInfo;
        await sincronizarMesaComPedidos();
      }
    )
    .subscribe();
}

async function carregarMesa(){
  const { data, error } = await sb
    .from("mesas")
    .select("*")
    .eq("id", mesaId)
    .maybeSingle();

  if (error) {
    console.error(error);
    alert("Erro ao carregar mesa.");
    return false;
  }

  if (!data) {
    alert("Mesa não encontrada.");
    return false;
  }

  mesaInfo = data;
  APP_ID = data.app_id || localStorage.getItem("app_id") || null;

  document.getElementById("tituloMesa").innerText = `Mesa ${data.numero_mesa || numeroMesaUrl || ""}`;

  if (data.cliente_nome) document.getElementById("clienteNome").value = data.cliente_nome;
  if (data.cliente_celular) document.getElementById("clienteTelefone").value = data.cliente_celular;

  atualizarInfoClienteMesa();
  return true;
}

async function atualizarMesaStatus({
  ocupada = null,
  pedir_conta = null,
  status = null,
  cliente_nome = undefined,
  cliente_celular = undefined,
  total_aberto = undefined
} = {}){
  const payload = {};

  if (ocupada !== null) payload.ocupada = ocupada;
  if (pedir_conta !== null) payload.pedir_conta = pedir_conta;
  if (status !== null) payload.status = status;
  if (cliente_nome !== undefined) payload.cliente_nome = cliente_nome;
  if (cliente_celular !== undefined) payload.cliente_celular = cliente_celular;
  if (total_aberto !== undefined) payload.total_aberto = Number(total_aberto || 0);

  if (!Object.keys(payload).length) return;

  const { data, error } = await sb
    .from("mesas")
    .update(payload)
    .eq("id", mesaId)
    .select()
    .maybeSingle();

  if (error) {
    console.error("Erro ao atualizar mesa:", error);
    return;
  }

  if (data) mesaInfo = data;
}

async function carregarProdutos(){
  const { data, error } = await sb
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if (error) {
    console.error(error);
    document.getElementById("listaProdutos").innerHTML = `<div class="msg-vazio">Erro ao carregar produtos.</div>`;
    return;
  }

  produtosCache = (data || []).map(p => ({
    ...p,
    categoria_exibicao: obterCategoriaProduto(p),
    imagem_exibicao: obterImagemProduto(p)
  }));

  montarCategoriasPelosProdutos();
  aplicarFiltros();
}

function montarCategoriasPelosProdutos(){
  const mapa = new Map();

  produtosCache.forEach(p => {
    const chave = obterCategoriaProduto(p);
    if (!mapa.has(chave)) mapa.set(chave, { id:chave, nome:chave });
  });

  categoriasCache = Array.from(mapa.values());

  if (!categoriaSelecionada && categoriasCache.length > 0) {
    categoriaSelecionada = categoriasCache[0].id;
  }

  renderizarBotoesCategorias();
}

function renderizarBotoesCategorias(){
  const div = document.getElementById("filtrosCategorias");
  div.innerHTML = "";

  if (categoriasCache.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhuma categoria encontrada.</div>`;
    return;
  }

  categoriasCache.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.nome;
    if (categoriaSelecionada === cat.id) btn.classList.add("ativo");
    btn.onclick = () => {
      categoriaSelecionada = cat.id;
      renderizarBotoesCategorias();
      aplicarFiltros();
    };
    div.appendChild(btn);
  });
}

function aplicarFiltros(){
  const texto = (document.getElementById("busca").value || "").toLowerCase();

  const lista = produtosCache.filter(p => {
    const nomeOk = (p.nome || "").toLowerCase().includes(texto);
    const categoriaOk = !categoriaSelecionada || obterCategoriaProduto(p) === categoriaSelecionada;
    return nomeOk && categoriaOk;
  });

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if (lista.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado.</div>`;
    return;
  }

  lista.forEach(p => {
    const card = document.createElement("div");
    card.className = "produto";
    card.innerHTML = `
      <img class="thumb-produto" src="${p.imagem_exibicao}" alt="${p.nome}" onerror="this.onerror=null;this.src='https://via.placeholder.com/600x600?text=Produto'">
      <div class="produto-conteudo">
        <div class="produto-info">
          <strong>${p.nome}</strong>
          <small>${p.categoria_exibicao}</small>
        </div>
        <div class="produto-preco">${formatarMoeda(p.preco)}</div>
        <button data-id="${p.id}">Adicionar</button>
      </div>
    `;

    card.querySelector("button").onclick = () => addProduto(p.id);
    div.appendChild(card);
  });
}

async function criarPedidoSeNecessario(){
  if (pedidoAtual && normalizarStatus(pedidoAtual.status) === "aberto") return true;

  const clienteNome = document.getElementById("clienteNome").value.trim();
  const clienteTelefone = document.getElementById("clienteTelefone").value.trim();

  if (!clienteNome) {
    alert("Preencha ao menos o nome do cliente/responsável.");
    document.getElementById("clienteNome").focus();
    return false;
  }

  const clienteId = gerarClienteId(clienteNome, clienteTelefone);

  const { data, error } = await sb
    .from("pedidos")
    .insert({
      app_id: APP_ID,
      mesa_id: mesaId,
      status: "aberto",
      origem: "mesa",
      cliente_id: clienteId,
      cliente_nome: clienteNome,
      cliente_telefone: clienteTelefone,
      responsavel_nome: clienteNome
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Erro ao criar pedido.");
    return false;
  }

  pedidoAtual = data;
  ativarRealtimePedidoAtual();

  await atualizarMesaStatus({
    ocupada: true,
    pedir_conta: false,
    status: "ocupada",
    cliente_nome: clienteNome,
    cliente_celular: clienteTelefone
  });

  atualizarInfoClienteMesa();
  atualizarInfoStatus();
  return true;
}

async function addProduto(produtoId){
  const ok = await criarPedidoSeNecessario();
  if (!ok) return;

  const produto = produtosCache.find(p => String(p.id) === String(produtoId));
  if (!produto) return;

  const clienteNome = document.getElementById("clienteNome").value.trim();
  const clienteTelefone = document.getElementById("clienteTelefone").value.trim();

  const { error } = await sb
    .from("pedido_itens")
    .insert({
      app_id: APP_ID,
      pedido_id: pedidoAtual.id,
      produto_id: produto.id,
      nome_produto: produto.nome,
      preco: Number(produto.preco || 0),
      quantidade: 1,
      status: "novo",
      cliente_nome: clienteNome,
      cliente_telefone: clienteTelefone,
      responsavel_nome: clienteNome
    });

  if (error) {
    console.error(error);
    alert("Erro ao adicionar produto.");
    return;
  }

  abrirPedidoFlutuante();
  await carregarPedidoAtual();
  await carregarHistoricoPedidosEnviados();
  await calcularTotalGeralMesa();
}

async function aumentarItem(item){
  if (!pedidoAtual || !pedidoPodeSerEditado()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  const novaQtd = Number(item.quantidade || 0) + 1;

  const { error } = await sb
    .from("pedido_itens")
    .update({ quantidade:novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao aumentar item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function diminuirItem(item){
  if (!pedidoAtual || !pedidoPodeSerEditado()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  const qtd = Number(item.quantidade || 0);

  if (qtd <= 1) {
    await removerItem(item.id);
    return;
  }

  const novaQtd = qtd - 1;

  const { error } = await sb
    .from("pedido_itens")
    .update({ quantidade:novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao diminuir item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function removerItem(itemId){
  if (!pedidoAtual || !pedidoPodeSerEditado()) {
    alert("Não é possível remover item deste lote.");
    return;
  }

  const { error } = await sb
    .from("pedido_itens")
    .delete()
    .eq("id", itemId)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao remover item.");
    return;
  }

  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function carregarPedidoAtual(){
  if (!pedidoAtual) {
    limparTelaPedidoAtual();
    atualizarInfoStatus();
    await calcularTotalGeralMesa();
    return;
  }

  const { data, error } = await sb
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending:true });

  if (error) {
    console.error(error);
    return;
  }

  const itens = data || [];
  const div = document.getElementById("pedido");
  div.innerHTML = "";
  let total = 0;

  atualizarFabPedido(itens.reduce((s,i)=>s+Number(i.quantidade||0),0));

  if (itens.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum item neste lote.</div>`;
  }

  itens.forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);

    const bloqueado = !pedidoPodeSerEditado();
    const produtoRel = produtosCache.find(p => String(p.id) === String(i.produto_id)) || null;
    const imgItem = produtoRel ? obterImagemProduto(produtoRel) : "https://via.placeholder.com/600x600?text=Produto";

    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <img class="thumb-item" src="${imgItem}" alt="${i.nome_produto}" onerror="this.onerror=null;this.src='https://via.placeholder.com/600x600?text=Produto'">
      <div class="item-centro">
        <strong>${i.nome_produto}</strong>
        <div class="linha-preco">${formatarMoeda(Number(i.preco || 0) * Number(i.quantidade || 0))}</div>
        <div class="item-acoes">
          <button class="btn-menor" ${bloqueado ? "disabled" : ""}>−</button>
          <div class="qtd-badge">${i.quantidade}</div>
          <button class="btn-maior" ${bloqueado ? "disabled" : ""}>+</button>
          <button class="btn-remover" ${bloqueado ? "disabled" : ""}>Remover</button>
        </div>
      </div>
    `;

    const botoes = item.querySelectorAll("button");
    botoes[0].onclick = () => diminuirItem(i);
    botoes[1].onclick = () => aumentarItem(i);
    botoes[2].onclick = () => removerItem(i.id);

    div.appendChild(item);
  });

  atualizarTotaisLote(total);
  atualizarInfoStatus();
  await calcularTotalGeralMesa();
}

async function carregarHistoricoPedidosEnviados(){
  const box = document.getElementById("historicoPedidosEnviados");

  const { data: pedidos, error } = await sb
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .eq("origem", "mesa")
    .neq("status", "aberto")
    .order("created_at", { ascending:true });

  if (error) {
    console.error(error);
    box.style.display = "none";
    return;
  }

  if (!pedidos || pedidos.length === 0) {
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  let html = `<h4>Pedidos já enviados</h4>`;

  for (let idx = 0; idx < pedidos.length; idx++) {
    const p = pedidos[idx];

    const { data: itens } = await sb
      .from("pedido_itens")
      .select("*")
      .eq("pedido_id", p.id)
      .order("created_at", { ascending:true });

    let subtotal = 0;
    html += `<div class="divisor"></div>`;
    html += `<div class="lote-tag">Lote ${idx + 1} — ${nomeStatus(p.status)}</div>`;

    (itens || []).forEach((i, itemIndex) => {
      const sub = Number(i.preco || 0) * Number(i.quantidade || 0);
      subtotal += sub;

      html += `
        <div class="linha-historico">
          ${itemIndex + 1}. ${i.quantidade}x ${i.nome_produto} — ${formatarMoeda(sub)}
        </div>
      `;
    });

    html += `<small>Total do lote ${idx + 1}: ${formatarMoeda(subtotal)}</small>`;
  }

  box.innerHTML = html;
  box.style.display = "block";
}

async function calcularTotalGeralMesa(){
  const { data: pedidos, error: erroPedidos } = await sb
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .eq("origem", "mesa")
    .in("status", ["aberto","novo","aceito","pronto","conta_solicitada","pedir_conta"]);

  if (erroPedidos) {
    console.error(erroPedidos);
    atualizarTotaisMesa(0);
    return 0;
  }

  if (!pedidos || pedidos.length === 0) {
    atualizarTotaisMesa(0);
    await atualizarMesaStatus({ total_aberto:0 });
    return 0;
  }

  const ids = pedidos.map(p => p.id);

  const { data: itens, error: erroItens } = await sb
    .from("pedido_itens")
    .select("pedido_id,preco,quantidade")
    .in("pedido_id", ids);

  if (erroItens) {
    console.error(erroItens);
    atualizarTotaisMesa(0);
    return 0;
  }

  let total = 0;
  (itens || []).forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);
  });

  atualizarTotaisMesa(total);
  await atualizarMesaStatus({ total_aberto:total });
  return total;
}

async function sincronizarMesaComPedidos(){
  const { data, error } = await sb
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .eq("origem", "mesa")
    .order("created_at", { ascending:false });

  if (error) {
    console.error(error);
    return;
  }

  const pedidos = data || [];
  const pedidosAtivos = pedidos.filter(p => !statusFechado(p.status));
  const pedidoAberto = pedidosAtivos.find(p => normalizarStatus(p.status) === "aberto") || null;
  const pedidoMaisRecenteAtivo = pedidosAtivos[0] || null;

  if (pedidosAtivos.length === 0) {
    pedidoAtual = null;
    removerCanalPedidoAtual();
    limparTelaPedidoAtual();

    await atualizarMesaStatus({
      ocupada:false,
      pedir_conta:false,
      status:"livre",
      cliente_nome:null,
      cliente_celular:null,
      total_aberto:0
    });

    await carregarHistoricoPedidosEnviados();
    await calcularTotalGeralMesa();
    atualizarInfoStatus();
    return;
  }

  pedidoAtual = pedidoAberto;

  if (pedidoMaisRecenteAtivo?.cliente_nome && !document.getElementById("clienteNome").value.trim()) {
    document.getElementById("clienteNome").value = pedidoMaisRecenteAtivo.cliente_nome || "";
  }

  if (pedidoMaisRecenteAtivo?.cliente_telefone && !document.getElementById("clienteTelefone").value.trim()) {
    document.getElementById("clienteTelefone").value = pedidoMaisRecenteAtivo.cliente_telefone || "";
  }

  const totalMesa = await calcularTotalGeralMesa();
  const pediuConta = pedidosAtivos.some(p => {
    const s = normalizarStatus(p.status);
    return s === "conta_solicitada" || s === "pedir_conta";
  });

  await atualizarMesaStatus({
    ocupada:true,
    pedir_conta:pediuConta,
    status:pediuConta ? "conta_solicitada" : "ocupada",
    cliente_nome:document.getElementById("clienteNome").value.trim() || pedidoMaisRecenteAtivo?.cliente_nome || null,
    cliente_celular:document.getElementById("clienteTelefone").value.trim() || pedidoMaisRecenteAtivo?.cliente_telefone || null,
    total_aberto:totalMesa
  });

  atualizarInfoClienteMesa();
  atualizarInfoStatus();

  if (pedidoAtual) {
    ativarRealtimePedidoAtual();
    await carregarPedidoAtual();
  } else {
    removerCanalPedidoAtual();
    limparTelaPedidoAtual();
  }

  await carregarHistoricoPedidosEnviados();
}

document.getElementById("btnEnviar").onclick = async () => {
  if (!pedidoAtual) {
    alert("Nenhum lote em aberto.");
    return;
  }

  if (!pedidoPodeSerEditado()) {
    alert("Esse lote já foi enviado.");
    return;
  }

  const { data: itens, error: erroItens } = await sb
    .from("pedido_itens")
    .select("id")
    .eq("pedido_id", pedidoAtual.id)
    .limit(1);

  if (erroItens) {
    console.error(erroItens);
    alert("Erro ao validar itens.");
    return;
  }

  if (!itens || itens.length === 0) {
    alert("Adicione pelo menos um item antes de enviar.");
    return;
  }

  const clienteNome = document.getElementById("clienteNome").value.trim();
  const clienteTelefone = document.getElementById("clienteTelefone").value.trim();

  const { error } = await sb
    .from("pedidos")
    .update({
      status:"novo",
      cliente_nome:clienteNome || null,
      cliente_telefone:clienteTelefone || null,
      responsavel_nome:clienteNome || null
    })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID)
    .eq("status", "aberto");

  if (error) {
    console.error(error);
    alert("Erro ao enviar pedido.");
    return;
  }

  await atualizarMesaStatus({
    ocupada:true,
    pedir_conta:false,
    status:"ocupada",
    cliente_nome:clienteNome || null,
    cliente_celular:clienteTelefone || null
  });

  alert("Pedido enviado com sucesso.");
  fecharPedidoFlutuante();
  await sincronizarMesaComPedidos();
};

document.getElementById("btnConta").onclick = async () => {
  const totalMesa = await calcularTotalGeralMesa();

  if (totalMesa <= 0) {
    alert("Não há valores pendentes nesta mesa.");
    return;
  }

  const { data: pedidosAtivos, error } = await sb
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .eq("origem", "mesa")
    .in("status", ["aberto","novo","aceito","pronto","conta_solicitada","pedir_conta"]);

  if (error) {
    console.error(error);
    alert("Erro ao verificar pedidos.");
    return;
  }

  if (!pedidosAtivos || pedidosAtivos.length === 0) {
    alert("Não há pedidos pendentes nesta mesa.");
    return;
  }

  const temAberto = pedidosAtivos.some(p => normalizarStatus(p.status) === "aberto");
  if (temAberto) {
    alert("Existe um lote em aberto. Envie o pedido atual antes de pedir conta.");
    return;
  }

  const ids = pedidosAtivos.map(p => p.id);

  const { error:errorUpdate } = await sb
    .from("pedidos")
    .update({ status:"conta_solicitada" })
    .in("id", ids)
    .eq("app_id", APP_ID);

  if (errorUpdate) {
    console.error(errorUpdate);
    alert("Erro ao pedir conta.");
    return;
  }

  await atualizarMesaStatus({
    ocupada:true,
    pedir_conta:true,
    status:"conta_solicitada",
    cliente_nome:document.getElementById("clienteNome").value.trim() || null,
    cliente_celular:document.getElementById("clienteTelefone").value.trim() || null
  });

  alert("Conta solicitada.");
  fecharPedidoFlutuante();
  await sincronizarMesaComPedidos();
};

document.getElementById("btnTogglePedido").onclick = fecharPedidoFlutuante;

document.getElementById("busca").oninput = aplicarFiltros;
document.getElementById("clienteNome").oninput = atualizarInfoClienteMesa;
document.getElementById("clienteTelefone").oninput = atualizarInfoClienteMesa;

async function iniciarSistema(){
  const okMesa = await carregarMesa();
  if (!okMesa) return;

  if (!APP_ID) {
    alert("APP_ID não encontrado nesta mesa.");
    return;
  }

  localStorage.setItem("app_id", APP_ID);

  await carregarProdutos();
  await sincronizarMesaComPedidos();
  ativarRealtimeMesa();
  ativarRealtimeMesaStatus();
}

document.addEventListener("DOMContentLoaded", iniciarSistema);
</script>
