<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;font-size:20px;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px}
.produto,.item{background:#0f172a;border-radius:14px;padding:14px;margin-bottom:12px}
.produto{display:flex;justify-content:space-between;align-items:center;gap:10px}
button{padding:6px 12px;border:none;border-radius:8px;cursor:pointer}
.total{font-size:18px;font-weight:bold;margin:16px 0}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filtros button{background:#1e293b;color:#fff}
.filtros button.ativo{background:#2563eb}
.bloqueado{opacity:.4;pointer-events:none}
.acoes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.acoes button{
  background:#22c55e;
  color:#000;
  padding:12px 16px;
}
#btnConta{background:#f59e0b;color:#000}
#btnLiberar{background:#2563eb;color:#fff}
.msg-vazio{
  opacity:.7;
  background:#0f172a;
  border-radius:14px;
  padding:14px;
}
small{opacity:.7}
</style>
</head>

<body>

<div class="topo" id="tituloMesa">🍽️ Mesa</div>

<div class="container">

<input id="busca" placeholder="🔍 Buscar produto">

<div class="filtros" id="filtrosCategorias"></div>

<h3>Produtos</h3>
<div id="listaProdutos"></div>

<h3>Pedido da mesa</h3>
<div id="pedido"></div>

<div class="total" id="totalPedido">Total: R$ 0,00</div>

<div class="acoes">
  <button id="btnEnviar">📨 Enviar pedido</button>
  <button id="btnConta">🧾 Pedir conta</button>
  <button id="btnLiberar" class="bloqueado">🔓 Liberar mesa</button>
</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");

let APP_ID = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = null;
let canalPedido = null;

if(!mesaId){
  alert("Mesa não informada.");
  history.back();
}

async function validarSessao(){
  const { data, error } = await supabase.auth.getSession();

  if(error || !data.session){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, app_id")
    .eq("id", userId)
    .single();

  if(erroUsuario || !usuario){
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  APP_ID = usuario.app_id;
  return true;
}

async function iniciarSistema(){
  const ok = await validarSessao();
  if(!ok) return;

  await carregarMesa();
  await verificarPedidoExistente();
  await carregarProdutos();
}

async function carregarMesa(){
  const { data } = await supabase
    .from("mesas")
    .select("numero_mesa")
    .eq("id", mesaId)
    .maybeSingle();

  if(data){
    document.getElementById("tituloMesa").innerText = `🍽️ Mesa ${data.numero_mesa}`;
  }
}

async function verificarPedidoExistente(){
  const { data } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","pago")')
    .maybeSingle();

  if(data){
    pedidoAtual = data;
    document.getElementById("btnLiberar").classList.remove("bloqueado");
    ativarRealtimeNotificacao();
    await carregarPedido();
  }else{
    document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
    document.getElementById("totalPedido").innerText = `Total: R$ 0,00`;
  }
}

async function criarPedidoSeNecessario(){
  if(pedidoAtual) return true;

  const { data, error } = await supabase
    .from("pedidos")
    .insert({
      app_id: APP_ID,
      mesa_id: mesaId,
      status: "aberto",
      origem: "mesa"
    })
    .select()
    .single();

  if(error){
    alert("Erro ao criar pedido.");
    return false;
  }

  pedidoAtual = data;
  document.getElementById("btnLiberar").classList.remove("bloqueado");
  ativarRealtimeNotificacao();
  return true;
}

/* ===== CARREGAR PRODUTOS E EXTRAIR CATEGORIAS ===== */
async function carregarProdutos(){
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if(error){
    console.error(error);
    document.getElementById("listaProdutos").innerHTML =
      `<div class="msg-vazio">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = (data || []).map(p => ({
    ...p,
    categoria_exibicao:
      p.categoria_nome ||
      p.categoria ||
      p.categoria_id ||
      "Sem categoria"
  }));

  montarCategoriasPelosProdutos();
  aplicarFiltros();
}

function montarCategoriasPelosProdutos(){
  const mapa = new Map();

  produtosCache.forEach(p => {
    const chave = String(
      p.categoria_nome ||
      p.categoria ||
      p.categoria_id ||
      "Sem categoria"
    );

    if(!mapa.has(chave)){
      mapa.set(chave, {
        id: chave,
        nome: chave
      });
    }
  });

  categoriasCache = Array.from(mapa.values());

  if(categoriasCache.length > 0 && !categoriaSelecionada){
    categoriaSelecionada = categoriasCache[0].id;
  }

  renderizarBotoesCategorias();
}

function renderizarBotoesCategorias(){
  const div = document.getElementById("filtrosCategorias");
  div.innerHTML = "";

  if(categoriasCache.length === 0){
    div.innerHTML = `<div class="msg-vazio">Nenhuma categoria encontrada nos produtos</div>`;
    return;
  }

  categoriasCache.forEach(cat => {
    div.innerHTML += `
      <button
        class="${categoriaSelecionada === cat.id ? "ativo" : ""}"
        onclick="selecionarCategoria('${String(cat.id).replace(/'/g, "\\'")}')">
        ${cat.nome}
      </button>
    `;
  });
}

window.selecionarCategoria = function(catId){
  categoriaSelecionada = catId;
  renderizarBotoesCategorias();
  aplicarFiltros();
};

function aplicarFiltros(){
  const texto = document.getElementById("busca").value?.toLowerCase() || "";

  const lista = produtosCache.filter(p => {
    const nomeOk = (p.nome || "").toLowerCase().includes(texto);
    const categoriaAtual = String(
      p.categoria_nome ||
      p.categoria ||
      p.categoria_id ||
      "Sem categoria"
    );

    const categoriaOk = !categoriaSelecionada || categoriaAtual === categoriaSelecionada;

    return nomeOk && categoriaOk;
  });

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if(lista.length === 0){
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado</div>`;
    return;
  }

  lista.forEach(p => {
    div.innerHTML += `
      <div class="produto">
        <span>
          ${p.nome} - R$ ${Number(p.preco || 0).toFixed(2)}
          <br>
          <small>${p.categoria_exibicao}</small>
        </span>
        <button data-id="${p.id}">➕</button>
      </div>
    `;
  });

  div.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => addProduto(btn.dataset.id);
  });
}

async function addProduto(produtoId){
  const ok = await criarPedidoSeNecessario();
  if(!ok) return;

  const produto = produtosCache.find(p => p.id === produtoId);
  if(!produto) return;

  const categoriaNome =
    produto.categoria_nome ||
    produto.categoria ||
    produto.categoria_id ||
    "Sem categoria";

  const { error } = await supabase.from("pedido_itens").insert({
    app_id: APP_ID,
    pedido_id: pedidoAtual.id,
    produto_id: produto.id,
    nome_produto: produto.nome,
    preco: produto.preco,
    quantidade: 1,
    categoria_id: produto.categoria_id || null,
    categoria_nome: categoriaNome,
    status: "novo"
  });

  if(error){
    console.error(error);
    alert("Erro ao adicionar produto.");
    return;
  }

  await carregarPedido();
}

async function carregarPedido(){
  if(!pedidoAtual) return;

  const { data, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  const div = document.getElementById("pedido");
  div.innerHTML = "";
  let total = 0;

  if(!data || data.length === 0){
    div.innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
  }

  (data || []).forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);
    div.innerHTML += `
      <div class="item">
        ${i.nome_produto} x ${i.quantidade}
        ${i.categoria_nome ? `<br><small>${i.categoria_nome}</small>` : ""}
      </div>
    `;
  });

  document.getElementById("totalPedido").innerText = `Total: R$ ${total.toFixed(2)}`;
}

document.getElementById("btnEnviar").onclick = async () => {
  if(!pedidoAtual){
    alert("Nenhum pedido criado.");
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({ status:"novo" })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID);

  if(error){
    alert("Erro ao enviar pedido.");
    return;
  }

  alert("Pedido enviado!");
};

document.getElementById("btnConta").onclick = async () => {
  if(!pedidoAtual){
    alert("Nenhum pedido criado.");
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({ status:"conta_solicitada" })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID);

  if(error){
    alert("Erro ao solicitar conta.");
    return;
  }

  alert("Conta solicitada!");
};

document.getElementById("btnLiberar").onclick = async () => {
  if(!pedidoAtual){
    location.href = "mesas.html";
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({ status:"finalizado" })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID);

  if(error){
    alert("Erro ao liberar mesa.");
    return;
  }

  location.href = "mesas.html";
};

function ativarRealtimeNotificacao(){
  if(!pedidoAtual) return;

  if(canalPedido){
    supabase.removeChannel(canalPedido);
    canalPedido = null;
  }

  canalPedido = supabase.channel("mesa-notify-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event:"UPDATE",
        schema:"public",
        table:"pedidos",
        filter:`id=eq.${pedidoAtual.id}`
      },
      payload => {
        const status = payload.new.status;

        if(status === "aceito") alert("👨‍🍳 Pedido em preparo!");
        if(status === "pronto") alert("✅ Pedido pronto!");
        if(status === "cancelado") alert("❌ Pedido cancelado!");
      }
    )
    .subscribe();
}

document.getElementById("busca").oninput = aplicarFiltros;
document.addEventListener("DOMContentLoaded", iniciarSistema);
</script>

</body>
</html>
