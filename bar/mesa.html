<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Arial,sans-serif;background:#020617;color:#fff}
.oculto{display:none !important}
.topo{
  background:#0f172a;padding:14px 16px;font-size:20px;font-weight:bold;position:sticky;top:0;z-index:70;
  border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 2px 12px rgba(0,0,0,.25);
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.topo-info{display:flex;flex-direction:column;gap:6px;min-width:0}
.topo-sub{font-size:12px;color:#94a3b8;font-weight:normal}
.topo-cliente{display:flex;flex-wrap:wrap;gap:6px}
.badge-topo{display:inline-block;background:#1e293b;color:#fff;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:normal}
.topo-acoes{display:flex;gap:8px;flex-wrap:wrap}
.btn-topo{background:#1e293b;color:#fff;padding:10px 12px;border-radius:10px;border:none;cursor:pointer;font-weight:bold}
.container{max-width:900px;margin:auto;padding:14px 14px 190px}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px;box-sizing:border-box;font-size:15px}
button{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filtros button{background:#1e293b;color:#fff;padding:10px 12px;border-radius:999px;font-size:13px}
.filtros button.ativo{background:#2563eb}
.bloqueado{opacity:.4;pointer-events:none}
.msg-vazio{opacity:.75;background:#0f172a;border-radius:14px;padding:14px}
small{opacity:.8;display:block}
.info-status{margin:10px 0 16px;padding:12px 14px;border-radius:12px;background:#0f172a;border:1px solid rgba(255,255,255,.08);font-size:14px}
.produto,.item{background:#0f172a;border-radius:14px;padding:12px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)}
.produto{display:flex;justify-content:space-between;align-items:center;gap:10px}
.produto-esquerda{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.thumb-produto{width:54px;height:54px;border-radius:10px;object-fit:cover;background:#1e293b;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.produto-info{min-width:0;flex:1}
.produto-info strong{display:block;margin-bottom:4px;font-size:15px}
.produto-info small{font-size:12px;line-height:1.35}
.produto button{background:#22c55e;color:#000;min-width:42px;min-height:42px;font-size:18px;flex-shrink:0}
.item{display:flex;gap:10px;align-items:flex-start}
.item-topo{display:flex;gap:10px;align-items:flex-start;width:100%}
.thumb-item{width:48px;height:48px;border-radius:10px;object-fit:cover;background:#1e293b;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.item-info{min-width:0;flex:1}
.item-info strong{display:block;margin-bottom:6px;font-size:14px;line-height:1.3}
.item-info small{font-size:11px;line-height:1.3;color:#cbd5e1}
.item-acoes-wrap{margin-top:6px;margin-bottom:6px}
.item-acoes{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.item-acoes-linha2{display:block}
.btn-menor,.btn-maior{
  width:34px;height:34px;min-width:34px;min-height:34px;padding:0;border-radius:8px;font-size:16px;
  display:flex;align-items:center;justify-content:center
}
.btn-menor{background:#f59e0b;color:#000}
.btn-maior{background:#22c55e;color:#000}
.qtd-badge{
  min-width:38px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:bold;
  background:#1e293b;padding:0 8px;border-radius:8px;font-size:13px
}
.btn-remover{background:#ef4444;color:#fff;font-weight:bold;height:34px;min-height:34px;padding:0 10px;border-radius:8px;font-size:12px;width:auto}
.card-sessao,.card-lote,.historico-bloco{
  background:#0f172a;border-radius:14px;padding:14px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08)
}
.card-sessao h3,.card-lote h3,.historico-bloco h4{margin:0 0 12px 0;font-size:18px}
.badge{display:inline-block;background:#1e293b;color:#fff;padding:6px 10px;border-radius:999px;font-size:12px;margin-right:6px;margin-top:6px}
.linha-historico{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px}
.linha-historico:last-child{border-bottom:none}
.lote-tag{display:inline-block;font-size:12px;background:#1e293b;padding:6px 10px;border-radius:999px;margin-bottom:10px}
.divisor{height:1px;background:rgba(255,255,255,.08);margin:14px 0}
.barra-fixa{
  position:fixed;left:0;right:0;bottom:0;z-index:80;background:rgba(15,23,42,.98);backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,.08);box-shadow:0 -6px 24px rgba(0,0,0,.35)
}
.barra-fixa-conteudo{max-width:900px;margin:auto;padding:12px 14px calc(12px + env(safe-area-inset-bottom))}
.barra-totais{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px}
.total-fixo{background:#111827;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 12px;font-weight:bold}
.total-fixo span{display:block;color:#94a3b8;font-size:12px;margin-bottom:4px;font-weight:normal}
.total-fixo strong{color:#22c55e;font-size:17px}
.acoes-fixas{display:grid;grid-template-columns:1fr;gap:8px}
.acoes-fixas button{width:100%;padding:13px 14px;font-size:14px}
#btnEnviar{background:#22c55e;color:#000}
#btnConta{background:#f59e0b;color:#000}
#btnLiberar{background:#2563eb;color:#fff}
.btn-flutuante{
  position:fixed;right:16px;bottom:160px;z-index:85;width:58px;height:58px;border-radius:999px;border:none;
  background:#22c55e;color:#000;font-size:22px;font-weight:bold;box-shadow:0 10px 25px rgba(0,0,0,.35);
  cursor:pointer;display:flex;align-items:center;justify-content:center
}
.btn-flutuante.oculto{display:none}
.indicador-lote{
  position:absolute;top:-6px;right:-4px;min-width:24px;height:24px;padding:0 6px;border-radius:999px;
  background:#ef4444;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;border:2px solid #020617
}
.toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:145px;z-index:90;background:#111827;color:#fff;
  padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 25px rgba(0,0,0,.35);
  display:none;max-width:90%;text-align:center
}
@media(min-width:768px){
  .container{padding:20px 20px 190px}
  .barra-totais{grid-template-columns:1fr}
  .acoes-fixas{grid-template-columns:repeat(3,1fr)}
  .btn-flutuante{bottom:145px}
}
</style>
</head>

<body>

<div class="topo" id="tituloMesaWrap">
  <div class="topo-info">
    <div id="tituloMesa">🍽️ Mesa</div>
    <div class="topo-sub" id="subTopoMesa">Pedido, conta e liberação da mesa</div>
    <div class="topo-cliente" id="topoClienteInfo"></div>
  </div>

  <div class="topo-acoes">
    <button class="btn-topo" onclick="rolarParaPedido()">🧾 Pedido</button>
    <button class="btn-topo" onclick="rolarParaProdutos()">🍔 Produtos</button>
  </div>
</div>

<div class="container">
  <div class="card-sessao" id="cardSessao">
    <h3>Identificação do cliente</h3>
    <input id="clienteNome" placeholder="Nome do cliente">
    <input id="clienteTelefone" placeholder="Celular do cliente">
    <button id="btnIniciarSessao" style="background:#22c55e;color:#000;padding:12px 16px;width:100%">✅ Iniciar atendimento</button>
    <small id="sessaoAtualInfo" style="margin-top:10px;display:block"></small>
  </div>

  <div id="areaProdutos">
    <input id="busca" placeholder="🔍 Buscar produto">
    <div class="filtros" id="filtrosCategorias"></div>

    <h3>Produtos</h3>
    <div id="listaProdutos"></div>
  </div>

  <div class="card-lote" id="areaPedidoAtual">
    <h3>Pedido atual da mesa</h3>
    <div id="statusPedido" class="info-status" style="display:none;"></div>
    <div id="pedido"></div>
  </div>

  <div class="historico-bloco" id="historicoPedidosEnviados" style="display:none;"></div>
</div>

<button class="btn-flutuante oculto" id="btnFlutuantePedido" onclick="rolarParaPedido()">
  🧾
  <span class="indicador-lote" id="badgeItensPedido">0</span>
</button>

<div class="toast" id="toastMesa"></div>

<div class="barra-fixa">
  <div class="barra-fixa-conteudo">
    <div class="barra-totais">
      <div class="total-fixo">
        <span>Total da mesa</span>
        <strong id="totalMesaBarra">R$ 0,00</strong>
      </div>
    </div>

    <div class="acoes-fixas">
      <button id="btnEnviar">📨 Enviar pedido atual</button>
      <button id="btnConta">🧾 Pedir conta</button>
      <button id="btnLiberar" class="bloqueado">🔓 Liberar mesa</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false
    }
  }
);

const params = new URLSearchParams(location.search);

/* aceita QR novo e QR antigo */
const tokenSessao = (
  params.get("token") ||
  params.get("sessao") ||
  params.get("session") ||
  ""
).trim();

const mesaParam = (
  params.get("mesa") ||
  params.get("mesa_id") ||
  params.get("id") ||
  ""
).trim();

let mesaId = mesaParam || null;

let APP_ID = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = null;
let canalMesa = null;
let canalPedidoAtual = null;
let canalSessaoMesa = null;
let FUNCIONARIO_LOGADO = null;
let mesaAtual = null;
let sessaoMesaBanco = null;
let sessaoLocal = null;
let heartbeat = null;

const LIMITE_DISPOSITIVOS_SESSAO = 5;
const DEVICE_STORAGE_KEY = "mesa_device_key";

window.rolarParaPedido = () => {
  document.getElementById("areaPedidoAtual")?.scrollIntoView({ behavior:"smooth", block:"start" });
};

window.rolarParaProdutos = () => {
  document.getElementById("areaProdutos")?.scrollIntoView({ behavior:"smooth", block:"start" });
};

function voltarOuFechar() {
  if (window.history.length > 1) history.back();
  else location.href = "/";
}

if (!tokenSessao) {
  alert("Sessão da mesa inválida. Escaneie novamente o QR.");
  voltarOuFechar();
  throw new Error("Token ausente");
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function agoraISO() {
  return new Date().toISOString();
}

function adicionarMinutosISO(minutos) {
  return new Date(Date.now() + minutos * 60000).toISOString();
}

function nomeStatus(status) {
  const mapa = {
    aberto: "Aberto",
    novo: "Enviado",
    aceito: "Aceito pelo bar",
    pronto: "Pronto",
    conta_solicitada: "Conta solicitada",
    pago: "Pago",
    finalizado: "Finalizado",
    cancelado: "Cancelado"
  };
  return mapa[status] || status || "-";
}

function podeLiberarMesa(status) {
  return ["pago", "finalizado", "cancelado"].includes(status);
}

function pedidoPodeSerEditado() {
  if (!pedidoAtual) return true;
  return pedidoAtual.status === "aberto";
}

function pedidoBloqueadoParaEdicao() {
  return !pedidoPodeSerEditado();
}

function mostrarToast(msg) {
  const el = document.getElementById("toastMesa");
  if (!el) return;
  el.innerText = msg;
  el.style.display = "block";
  clearTimeout(el._timer);
  el._timer = setTimeout(() => {
    el.style.display = "none";
  }, 2500);
}

function atualizarBotaoFlutuante(qtd) {
  const btn = document.getElementById("btnFlutuantePedido");
  const badge = document.getElementById("badgeItensPedido");
  const total = Number(qtd || 0);

  if (!btn || !badge) return;

  if (total > 0) {
    btn.classList.remove("oculto");
    badge.innerText = total > 99 ? "99+" : total;
  } else {
    btn.classList.add("oculto");
    badge.innerText = "0";
  }
}

function limparTelaPedidoAtual() {
  document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item em aberto no momento</div>`;
  atualizarBotaoFlutuante(0);
}

function atualizarTotaisMesa(total) {
  const valor = formatarMoeda(total || 0);
  const el = document.getElementById("totalMesaBarra");
  if (el) el.innerText = valor;
}

function obterImagemProduto(produto) {
  if (!produto) return "https://via.placeholder.com/80x80?text=Produto";
  let imgs = [];
  try {
    imgs = JSON.parse(produto.imagens || "[]");
  } catch {
    imgs = [];
  }
  return imgs[0] || produto.imagem || produto.foto || "https://via.placeholder.com/80x80?text=Produto";
}

function obterCategoriaProduto(produto) {
  return String(
    produto.categoria_nome ||
    produto.categoria ||
    produto.categoria_id ||
    "Sem categoria"
  );
}

function salvarSessaoLocal(sessao) {
  sessaoLocal = sessao;
  atualizarSessaoNaTela();
}

function removerSessaoLocal() {
  sessaoLocal = null;
  atualizarSessaoNaTela();
}

function carregarFuncionarioLogado() {
  try {
    FUNCIONARIO_LOGADO = JSON.parse(localStorage.getItem("funcionario_logado") || "null");
  } catch {
    FUNCIONARIO_LOGADO = null;
  }
}

function obterDeviceKey() {
  let key = localStorage.getItem(DEVICE_STORAGE_KEY);
  if (!key) {
    key = crypto.randomUUID();
    localStorage.setItem(DEVICE_STORAGE_KEY, key);
  }
  return key;
}

function atualizarSessaoNaTela() {
  const info = document.getElementById("sessaoAtualInfo");
  const topo = document.getElementById("topoClienteInfo");
  const cardSessao = document.getElementById("cardSessao");

  if (!sessaoLocal) {
    info.innerHTML = "Nenhuma identificação ativa neste celular.";
    topo.innerHTML = "";
    cardSessao.classList.remove("oculto");
    return;
  }

  const cliente = sessaoLocal.cliente_nome || "-";
  const fone = sessaoLocal.cliente_telefone || "-";
  const garcom = sessaoLocal.garcom_nome || null;

  info.innerHTML = `
    <span class="badge">Cliente: ${cliente}</span>
    <span class="badge">${fone}</span>
    ${garcom ? `<span class="badge">Garçom: ${garcom}</span>` : ""}
  `;

  topo.innerHTML = `
    <span class="badge-topo">Cliente: ${cliente}</span>
    <span class="badge-topo">${fone}</span>
    ${garcom ? `<span class="badge-topo">Garçom: ${garcom}</span>` : ""}
  `;

  cardSessao.classList.add("oculto");
}

function sessaoExpiradaBanco() {
  if (!sessaoMesaBanco?.expira_em) return true;
  return new Date(sessaoMesaBanco.expira_em).getTime() < Date.now();
}

async function carregarDispositivosSessao() {
  if (!sessaoMesaBanco?.id) return [];
  const { data, error } = await supabase
    .from("sessoes_mesa_dispositivos")
    .select("*")
    .eq("sessao_mesa_id", sessaoMesaBanco.id)
    .order("criado_em", { ascending: true });

  if (error) {
    console.error(error);
    return [];
  }
  return data || [];
}

async function atualizarResumoTopoDispositivos() {
  const topo = document.getElementById("topoClienteInfo");
  if (!topo || !sessaoMesaBanco?.id) return;

  const dispositivos = await carregarDispositivosSessao();
  const nomes = dispositivos.map(d => (d.cliente_nome || "").trim()).filter(Boolean).slice(0, 5);

  if (topo.innerHTML.trim()) {
    topo.innerHTML += `<span class="badge-topo">Celulares: ${dispositivos.length}/5</span>`;
    if (nomes.length > 0) topo.innerHTML += `<span class="badge-topo">Mesa: ${nomes.join(", ")}</span>`;
  } else {
    topo.innerHTML = `<span class="badge-topo">Celulares: ${dispositivos.length}/5</span>`;
    if (nomes.length > 0) topo.innerHTML += `<span class="badge-topo">Mesa: ${nomes.join(", ")}</span>`;
  }
}

async function registrarOuValidarDispositivoSessao() {
  if (!sessaoMesaBanco?.id) return false;

  const deviceKey = obterDeviceKey();

  const { data: existente, error: erroExistente } = await supabase
    .from("sessoes_mesa_dispositivos")
    .select("*")
    .eq("sessao_mesa_id", sessaoMesaBanco.id)
    .eq("device_key", deviceKey)
    .maybeSingle();

  if (erroExistente) {
    console.error(erroExistente);
    alert("Erro ao validar aparelho desta mesa.");
    voltarOuFechar();
    return false;
  }

  if (existente) {
    await supabase
      .from("sessoes_mesa_dispositivos")
      .update({ ultimo_acesso_em: agoraISO() })
      .eq("id", existente.id);
    return true;
  }

  const { count, error: erroCount } = await supabase
    .from("sessoes_mesa_dispositivos")
    .select("*", { count: "exact", head: true })
    .eq("sessao_mesa_id", sessaoMesaBanco.id);

  if (erroCount) {
    console.error(erroCount);
    alert("Erro ao contar aparelhos da sessão.");
    voltarOuFechar();
    return false;
  }

  if (Number(count || 0) >= LIMITE_DISPOSITIVOS_SESSAO) {
    alert("Essa mesa já atingiu o limite de 5 celulares conectados nesta sessão.");
    voltarOuFechar();
    return false;
  }

  const { error: erroInsert } = await supabase
    .from("sessoes_mesa_dispositivos")
    .insert({
      sessao_mesa_id: sessaoMesaBanco.id,
      device_key: deviceKey,
      cliente_nome: "",
      cliente_telefone: "",
      ultimo_acesso_em: agoraISO()
    });

  if (erroInsert) {
    console.error(erroInsert);
    alert("Erro ao registrar este aparelho na sessão da mesa.");
    voltarOuFechar();
    return false;
  }

  return true;
}

async function atualizarDispositivoComCliente() {
  if (!sessaoMesaBanco?.id || !sessaoLocal) return;
  const deviceKey = obterDeviceKey();

  await supabase
    .from("sessoes_mesa_dispositivos")
    .update({
      cliente_nome: sessaoLocal.cliente_nome || "",
      cliente_telefone: sessaoLocal.cliente_telefone || "",
      ultimo_acesso_em: agoraISO()
    })
    .eq("sessao_mesa_id", sessaoMesaBanco.id)
    .eq("device_key", deviceKey);
}

async function tocarDispositivoSessao() {
  if (!sessaoMesaBanco?.id) return false;
  const deviceKey = obterDeviceKey();

  const { error } = await supabase
    .from("sessoes_mesa_dispositivos")
    .update({ ultimo_acesso_em: agoraISO() })
    .eq("sessao_mesa_id", sessaoMesaBanco.id)
    .eq("device_key", deviceKey);

  if (error) {
    console.error(error);
    return false;
  }
  return true;
}

async function tocarSessaoMesa() {
  if (!sessaoMesaBanco?.id) return false;

  const { data, error } = await supabase
    .from("sessoes_mesa")
    .update({
      ultimo_acesso_em: agoraISO(),
      expira_em: adicionarMinutosISO(30)
    })
    .eq("id", sessaoMesaBanco.id)
    .eq("ativa", true)
    .select()
    .single();

  if (error || !data) return false;

  sessaoMesaBanco = data;
  await tocarDispositivoSessao();
  return true;
}

function atualizarBotaoLiberarPorPedidos(pedidosAtivos) {
  const btn = document.getElementById("btnLiberar");

  if (!pedidosAtivos || pedidosAtivos.length === 0) {
    btn.classList.remove("bloqueado");
    return;
  }

  const existePendente = pedidosAtivos.some(p => !podeLiberarMesa(p.status));
  if (existePendente) btn.classList.add("bloqueado");
  else btn.classList.remove("bloqueado");
}

function atualizarInfoStatus() {
  const div = document.getElementById("statusPedido");
  const subTopo = document.getElementById("subTopoMesa");

  if (!pedidoAtual) {
    div.style.display = "block";
    div.innerHTML = `Sem pedido em aberto no momento.<br><small>Ao tocar em um produto, um novo lote será criado.</small>`;
    if (subTopo) subTopo.innerText = "Sem pedido aberto no momento";
    return;
  }

  div.style.display = "block";

  const expiraInfo = sessaoMesaBanco?.expira_em
    ? `<br><small>Sessão da mesa expira em: ${new Date(sessaoMesaBanco.expira_em).toLocaleString("pt-BR")}</small>`
    : "";

  if (pedidoAtual.status === "aberto") {
    div.innerHTML = `Status do pedido atual: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Esse lote ainda pode ser alterado antes do envio.</small>${expiraInfo}`;
  } else {
    div.innerHTML = `Status do pedido atual: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>Esse lote já foi enviado e está travado.</small>${expiraInfo}`;
  }

  if (subTopo) subTopo.innerText = `Status atual: ${nomeStatus(pedidoAtual.status)}`;
}

/* VALIDA SÓ PELO TOKEN E PEGA O MESA_ID REAL DO BANCO */
async function validarSessaoClienteMesa() {
  const { data, error } = await supabase
    .from("sessoes_mesa")
    .select("id, app_id, mesa_id, token, ativa, expira_em, ultimo_acesso_em, created_at")
    .eq("token", tokenSessao)
    .eq("ativa", true)
    .order("created_at", { ascending: false })
    .limit(1);

  if (error || !data || data.length === 0) {
    console.error("Falha ao buscar sessão:", error, tokenSessao);
    alert("Sessão da mesa inválida. Escaneie novamente o QR.");
    voltarOuFechar();
    return false;
  }

  const sessao = data[0];

  if (!sessao.app_id || !sessao.mesa_id) {
    alert("Sessão da mesa sem vínculo correto com o bar.");
    voltarOuFechar();
    return false;
  }

  APP_ID = sessao.app_id;
  sessaoMesaBanco = sessao;
  mesaId = sessao.mesa_id;

  if (sessaoExpiradaBanco()) {
    await supabase
      .from("sessoes_mesa")
      .update({
        ativa: false,
        encerrada_em: agoraISO()
      })
      .eq("id", sessao.id);

    await supabase
      .from("sessoes_mesa_dispositivos")
      .delete()
      .eq("sessao_mesa_id", sessao.id);

    alert("Sessão da mesa expirou. Escaneie novamente o QR.");
    voltarOuFechar();
    return false;
  }

  const dispositivoOk = await registrarOuValidarDispositivoSessao();
  if (!dispositivoOk) return false;

  await tocarSessaoMesa();
  return true;
}

async function iniciarSistema() {
  carregarFuncionarioLogado();
  atualizarSessaoNaTela();

  const clienteOk = await validarSessaoClienteMesa();
  if (!clienteOk) return;

  const mesaOk = await carregarMesa();
  if (!mesaOk) return;

  await carregarProdutos();
  await sincronizarSessaoComPedidos();
  ativarRealtimeMesa();
  ativarRealtimeSessaoMesa();

  heartbeat = setInterval(async () => {
    const tocou = await tocarSessaoMesa();
    if (!tocou || sessaoExpiradaBanco()) {
      clearInterval(heartbeat);
      alert("Sessão da mesa expirou. Escaneie novamente o QR.");
      voltarOuFechar();
    }
  }, 60000);
}

async function carregarMesa() {
  const { data, error } = await supabase
    .from("mesas")
    .select("id, numero_mesa, app_id")
    .eq("id", mesaId)
    .maybeSingle();

  if (error || !data) {
    console.error("Mesa não encontrada:", mesaId, error);
    alert("Mesa não encontrada.");
    voltarOuFechar();
    return false;
  }

  if (String(data.app_id) !== String(APP_ID)) {
    alert("Essa mesa não pertence a este bar.");
    voltarOuFechar();
    return false;
  }

  mesaAtual = data;
  document.getElementById("tituloMesa").innerText = `🍽️ Mesa ${data.numero_mesa}`;
  return true;
}

async function sincronizarSessaoComPedidos() {
  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","cancelado")')
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const pedidos = data || [];
  const pedidoAberto = pedidos.find(p => p.status === "aberto") || null;
  const pedidoMaisRecente = pedidos[0] || null;
  pedidoAtual = pedidoAberto;

  const deviceKey = obterDeviceKey();

  const { data: meuDispositivo } = await supabase
    .from("sessoes_mesa_dispositivos")
    .select("*")
    .eq("sessao_mesa_id", sessaoMesaBanco.id)
    .eq("device_key", deviceKey)
    .maybeSingle();

  if (meuDispositivo?.cliente_nome || meuDispositivo?.cliente_telefone) {
    salvarSessaoLocal({
      cliente_nome: meuDispositivo.cliente_nome || "",
      cliente_telefone: meuDispositivo.cliente_telefone || "",
      garcom_nome: pedidoMaisRecente?.garcom_nome || null,
      funcionario_id: pedidoMaisRecente?.funcionario_id || null
    });

    document.getElementById("clienteNome").value = meuDispositivo.cliente_nome || "";
    document.getElementById("clienteTelefone").value = meuDispositivo.cliente_telefone || "";
  } else {
    removerSessaoLocal();
  }

  atualizarBotaoLiberarPorPedidos(pedidos);
  atualizarInfoStatus();

  if (pedidoAtual) ativarRealtimePedidoAtual();
  else removerCanalPedidoAtual();

  await carregarPedidoAtual();
  await carregarHistoricoPedidosEnviados();
  await calcularTotalGeralMesa();
  aplicarFiltros();
  await atualizarResumoTopoDispositivos();
}

async function iniciarAtendimentoManual() {

async function validarSessaoPedido() {
  if (!sessaoLocal) {
    alert("Inicie o atendimento antes de lançar itens.");
    return false;
  }

  if (!mesaAtual || String(mesaAtual.app_id) !== String(APP_ID)) {
    alert("Mesa inválida para este bar.");
    return false;
  }

  if (!sessaoMesaBanco || sessaoExpiradaBanco()) {
    alert("Sessão da mesa expirou. Escaneie novamente o QR.");
    voltarOuFechar();
    return false;
  }

  await tocarSessaoMesa();
  return true;
}

async function criarPedidoSeNecessario() {
  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return false;

  if (pedidoAtual && pedidoAtual.status === "aberto") return true;

  const payload = {
    app_id: APP_ID,
    mesa_id: mesaId,
    status: "aberto",
    origem: "mesa",
    cliente_nome: sessaoLocal.cliente_nome,
    cliente_telefone: sessaoLocal.cliente_telefone,
    responsavel_nome: sessaoLocal.cliente_nome,
    garcom_nome: sessaoLocal.garcom_nome || null,
    funcionario_id: sessaoLocal.funcionario_id || null
  };

  const { data, error } = await supabase
    .from("pedidos")
    .insert(payload)
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Erro ao criar novo pedido.");
    return false;
  }

  pedidoAtual = data;
  atualizarInfoStatus();
  ativarRealtimePedidoAtual();
  return true;
}

async function carregarProdutos() {
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if (error) {
    console.error(error);
    document.getElementById("listaProdutos").innerHTML = `<div class="msg-vazio">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = (data || []).map(p => ({
    ...p,
    categoria_exibicao: obterCategoriaProduto(p),
    imagem_exibicao: obterImagemProduto(p)
  }));

  montarCategoriasPelosProdutos();
  aplicarFiltros();
}

function montarCategoriasPelosProdutos() {
  const mapa = new Map();

  produtosCache.forEach(p => {
    const chave = obterCategoriaProduto(p);
    if (!mapa.has(chave)) mapa.set(chave, { id: chave, nome: chave });
  });

  categoriasCache = Array.from(mapa.values());

  if (!categoriaSelecionada && categoriasCache.length > 0) {
    categoriaSelecionada = categoriasCache[0].id;
  }

  renderizarBotoesCategorias();
}

function renderizarBotoesCategorias() {
  const div = document.getElementById("filtrosCategorias");
  div.innerHTML = "";

  if (categoriasCache.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhuma categoria encontrada nos produtos</div>`;
    return;
  }

  categoriasCache.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.nome;
    if (categoriaSelecionada === cat.id) btn.classList.add("ativo");
    btn.onclick = () => {
      categoriaSelecionada = cat.id;
      renderizarBotoesCategorias();
      aplicarFiltros();
    };
    div.appendChild(btn);
  });
}

function aplicarFiltros() {
  const texto = (document.getElementById("busca").value || "").toLowerCase();

  const lista = produtosCache.filter(p => {
    const nomeOk = (p.nome || "").toLowerCase().includes(texto);
    const categoriaOk = !categoriaSelecionada || obterCategoriaProduto(p) === categoriaSelecionada;
    return nomeOk && categoriaOk;
  });

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if (lista.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado</div>`;
    return;
  }

  lista.forEach(p => {
    const imgPrincipal = obterImagemProduto(p);

    const card = document.createElement("div");
    card.className = "produto";
    card.innerHTML = `
      <div class="produto-esquerda">
        <img class="thumb-produto" src="${imgPrincipal}" alt="${p.nome}" onerror="this.onerror=null;this.src='https://via.placeholder.com/80x80?text=Produto'">
        <div class="produto-info">
          <strong>${p.nome}</strong>
          <small>${formatarMoeda(p.preco)}</small>
          <small>${p.categoria_exibicao}</small>
        </div>
      </div>
      <button data-id="${p.id}">➕</button>
    `;

    card.querySelector("button").onclick = () => addProduto(p.id);
    div.appendChild(card);
  });
}

async function addProduto(produtoId) {
  const ok = await criarPedidoSeNecessario();
  if (!ok) return;

  const produto = produtosCache.find(p => String(p.id) === String(produtoId));
  if (!produto) return;

  const { error: erroInsert } = await supabase
    .from("pedido_itens")
    .insert({
      app_id: APP_ID,
      pedido_id: pedidoAtual.id,
      produto_id: produto.id,
      nome_produto: produto.nome,
      preco: Number(produto.preco || 0),
      quantidade: 1,
      status: "novo",
      responsavel_nome: sessaoLocal.cliente_nome,
      cliente_nome: sessaoLocal.cliente_nome,
      cliente_telefone: sessaoLocal.cliente_telefone,
      garcom_nome: sessaoLocal.garcom_nome || null,
      funcionario_id: sessaoLocal.funcionario_id || null
    });

  if (erroInsert) {
    console.error(erroInsert);
    alert("Erro ao adicionar produto.");
    return;
  }

  await tocarSessaoMesa();
  mostrarToast("Produto adicionado");
  await carregarPedidoAtual();
  await carregarHistoricoPedidosEnviados();
  await calcularTotalGeralMesa();
}

async function aumentarItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  const novaQtd = Number(item.quantidade || 0) + 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao aumentar item.");
    return;
  }

  await tocarSessaoMesa();
  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function diminuirItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este lote.");
    return;
  }

  const qtd = Number(item.quantidade || 0);

  if (qtd <= 1) {
    await removerItem(item.id);
    return;
  }

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: qtd - 1 })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao diminuir item.");
    return;
  }

  await tocarSessaoMesa();
  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function removerItem(itemId) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível remover item deste lote.");
    return;
  }

  const { error } = await supabase
    .from("pedido_itens")
    .delete()
    .eq("id", itemId)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao remover item.");
    return;
  }

  await tocarSessaoMesa();
  await carregarPedidoAtual();
  await calcularTotalGeralMesa();
}

async function carregarPedidoAtual() {
  if (!pedidoAtual) {
    limparTelaPedidoAtual();
    atualizarInfoStatus();
    await calcularTotalGeralMesa();
    return;
  }

  const { data, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const itens = data || [];
  const div = document.getElementById("pedido");
  div.innerHTML = "";

  if (itens.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum item neste pedido em aberto</div>`;
  }

  itens.forEach(i => {
    const bloqueado = pedidoBloqueadoParaEdicao();
    const produtoRel = produtosCache.find(p => String(p.id) === String(i.produto_id)) || null;
    const imgItem = produtoRel ? obterImagemProduto(produtoRel) : "https://via.placeholder.com/80x80?text=Produto";
    const nomeCliente = i.cliente_nome || i.responsavel_nome || "-";
    const nomeGarcom = i.garcom_nome || pedidoAtual?.garcom_nome || null;

    const item = document.createElement("div");
    item.className = "item";

    item.innerHTML = `
      <div class="item-topo">
        <img class="thumb-item"
             src="${imgItem}"
             alt="${i.nome_produto}"
             onerror="this.onerror=null;this.src='https://via.placeholder.com/80x80?text=Produto'">

        <div class="item-info">
          <strong>${i.nome_produto}</strong>

          <div class="item-acoes-wrap">
            <div class="item-acoes">
              <button class="btn-menor" ${bloqueado ? "disabled" : ""}>➖</button>
              <div class="qtd-badge">${i.quantidade}</div>
              <button class="btn-maior" ${bloqueado ? "disabled" : ""}>➕</button>
            </div>

            <div class="item-acoes-linha2">
              <button class="btn-remover" ${bloqueado ? "disabled" : ""}>🗑 Remover</button>
            </div>
          </div>

          <small>Cliente: ${nomeCliente}</small>
          ${nomeGarcom ? `<small>Garçom: ${nomeGarcom}</small>` : ""}
        </div>
      </div>
    `;

    const botoes = item.querySelectorAll("button");
    botoes[0].onclick = () => diminuirItem(i);
    botoes[1].onclick = () => aumentarItem(i);
    botoes[2].onclick = () => removerItem(i.id);

    div.appendChild(item);
  });

  atualizarBotaoFlutuante(itens.reduce((acc, item) => acc + Number(item.quantidade || 0), 0));

  atualizarInfoStatus();
  await calcularTotalGeralMesa();
}

async function carregarHistoricoPedidosEnviados() {
  const box = document.getElementById("historicoPedidosEnviados");

  const { data: pedidos, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .neq("status", "aberto")
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    box.style.display = "none";
    return;
  }

  if (!pedidos || pedidos.length === 0) {
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  let html = `<h4>Pedidos já enviados da mesa</h4>`;

  for (let idx = 0; idx < pedidos.length; idx++) {
    const p = pedidos[idx];

    const { data: itens } = await supabase
      .from("pedido_itens")
      .select("*")
      .eq("pedido_id", p.id)
      .order("created_at", { ascending: true });

    let subtotal = 0;
    html += `<div class="divisor"></div>`;
    html += `<div class="lote-tag">Lote ${idx + 1} — ${nomeStatus(p.status)}</div>`;

    (itens || []).forEach(i => {
      const sub = Number(i.preco || 0) * Number(i.quantidade || 0);
      subtotal += sub;
      html += `<div class="linha-historico">${i.quantidade}x ${i.nome_produto} — ${formatarMoeda(sub)}</div>`;
    });

    html += `<small>Total do lote ${idx + 1}: ${formatarMoeda(subtotal)}</small>`;
  }

  box.innerHTML = html;
  box.style.display = "block";
}

async function calcularTotalGeralMesa() {
  const { data: pedidos, error: erroPedidos } = await supabase
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("cancelado","finalizado")');

  if (erroPedidos) {
    console.error(erroPedidos);
    atualizarTotaisMesa(0);
    return 0;
  }

  if (!pedidos || pedidos.length === 0) {
    atualizarTotaisMesa(0);
    return 0;
  }

  const ids = pedidos.map(p => p.id);

  const { data: itens, error: erroItens } = await supabase
    .from("pedido_itens")
    .select("pedido_id, preco, quantidade")
    .in("pedido_id", ids);

  if (erroItens) {
    console.error(erroItens);
    atualizarTotaisMesa(0);
    return 0;
  }

  let total = 0;
  (itens || []).forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);
  });

  atualizarTotaisMesa(total);
  return total;
}

document.getElementById("btnLiberar").onclick = async () => {
  const totalMesa = await calcularTotalGeralMesa();

  if (totalMesa > 0) {
    const { data: pedidosPendentes, errorBusca } = await supabase
      .from("pedidos")
      .select("id,status")
      .eq("mesa_id", mesaId)
      .eq("app_id", APP_ID)
      .not("status", "in", '("finalizado","cancelado")');

    if (errorBusca) {
      console.error(errorBusca);
      alert("Erro ao verificar a mesa.");
      return;
    }

    if (pedidosPendentes && pedidosPendentes.some(p => !podeLiberarMesa(p.status))) {
      alert("Não é possível liberar a mesa. Ainda existem pedidos pendentes.");
      return;
    }
  }

  const { data: pedidosPendentes, errorBusca } = await supabase
    .from("pedidos")
    .select("id,status")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","cancelado")');

  if (errorBusca) {
    console.error(errorBusca);
    alert("Erro ao verificar a mesa.");
    return;
  }

  if (!pedidosPendentes || pedidosPendentes.length === 0) {
    await encerrarSessaoMesa();
    removerSessaoLocal();
    voltarOuFechar();
    return;
  }

  const bloqueando = pedidosPendentes.some(p => !podeLiberarMesa(p.status));
  if (bloqueando) {
    alert("Não é possível liberar a mesa. Ainda existem pedidos pendentes.");
    return;
  }

  const ids = pedidosPendentes.map(p => p.id);

  const { error } = await supabase
    .from("pedidos")
    .update({ status: "finalizado" })
    .in("id", ids)
    .eq("app_id", APP_ID);

  if (error) {
    console.error(error);
    alert("Erro ao liberar mesa.");
    return;
  }

  await encerrarSessaoMesa();
  removerSessaoLocal();
  mostrarToast("Mesa liberada");
  setTimeout(() => voltarOuFechar(), 700);
};

async function encerrarSessaoMesa() {
  if (!sessaoMesaBanco?.id) return;

  await supabase
    .from("sessoes_mesa")
    .update({
      ativa: false,
      encerrada_em: agoraISO()
    })
    .eq("id", sessaoMesaBanco.id);

  await supabase
    .from("sessoes_mesa_dispositivos")
    .delete()
    .eq("sessao_mesa_id", sessaoMesaBanco.id);
}

function removerCanalPedidoAtual() {
  if (canalPedidoAtual) {
    supabase.removeChannel(canalPedidoAtual);
    canalPedidoAtual = null;
  }
}

function removerCanalSessaoMesa() {
  if (canalSessaoMesa) {
    supabase.removeChannel(canalSessaoMesa);
    canalSessaoMesa = null;
  }
}

function ativarRealtimePedidoAtual() {
  removerCanalPedidoAtual();

  if (!pedidoAtual) return;

  canalPedidoAtual = supabase
    .channel("mesa-pedido-atual-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedido_itens",
        filter: `pedido_id=eq.${pedidoAtual.id}`
      },
      async () => {
        await carregarPedidoAtual();
      }
    )
    .subscribe();
}

function ativarRealtimeSessaoMesa() {
  removerCanalSessaoMesa();

  if (!sessaoMesaBanco?.id) return;

  canalSessaoMesa = supabase
    .channel("sessao-mesa-" + sessaoMesaBanco.id)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "sessoes_mesa",
        filter: `id=eq.${sessaoMesaBanco.id}`
      },
      async payload => {
        const novaSessao = payload.new;

        if (!novaSessao || novaSessao.ativa === false) {
          alert("Esta sessão da mesa foi encerrada. Escaneie novamente o QR.");
          voltarOuFechar();
        }
      }
    )
    .subscribe();
}

function ativarRealtimeMesa() {
  if (canalMesa) {
    supabase.removeChannel(canalMesa);
    canalMesa = null;
  }

  canalMesa = supabase
    .channel("mesa-geral-" + mesaId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "pedidos",
        filter: `mesa_id=eq.${mesaId}`
      },
      async payload => {
        const novoStatus = payload.new?.status;

        if (novoStatus === "aceito") mostrarToast("👨‍🍳 Pedido aceito");
        if (novoStatus === "pronto") mostrarToast("✅ Pedido pronto");
        if (novoStatus === "pago") mostrarToast("💰 Pedido pago");
        if (novoStatus === "cancelado") mostrarToast("❌ Pedido cancelado");

        await sincronizarSessaoComPedidos();
      }
    )
    .subscribe();
}

window.addEventListener("beforeunload", () => {
  if (heartbeat) clearInterval(heartbeat);
  removerCanalPedidoAtual();
  removerCanalSessaoMesa();
  if (canalMesa) supabase.removeChannel(canalMesa);
});

document.getElementById("btnIniciarSessao").onclick = iniciarAtendimentoManual;
document.getElementById("busca").oninput = aplicarFiltros;
document.addEventListener("DOMContentLoaded", iniciarSistema);
</script>
