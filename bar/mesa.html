<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;font-size:20px;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px}
.produto,.item{background:#0f172a;border-radius:14px;padding:14px;margin-bottom:12px}
button{padding:6px 12px;border:none;border-radius:8px;cursor:pointer}
.total{font-size:18px;font-weight:bold;margin:16px 0}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filtros button{background:#1e293b;color:#fff}
.filtros button.ativo{background:#2563eb}
.bloqueado{opacity:.4;pointer-events:none}
.acoes{display:flex;flex-wrap:wrap;gap:10px}
.acoes button{background:#22c55e;color:#000;padding:12px 16px}
#btnConta{background:#f59e0b;color:#000}
#btnLiberar{background:#2563eb;color:#fff}
.msg-vazio{opacity:.7;background:#0f172a;border-radius:14px;padding:14px}
small{opacity:.75}
.info-status{
  margin:10px 0 16px;
  padding:12px 14px;
  border-radius:12px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,.08);
}
.produto{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.produto-esquerda{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
  flex:1;
}
.thumb-produto,.thumb-item{
  width:54px;
  height:54px;
  border-radius:10px;
  object-fit:cover;
  background:#1e293b;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.08);
}
.produto-info,.item-info{
  min-width:0;
  flex:1;
}
.produto-info strong,.item-info strong{
  display:block;
  margin-bottom:4px;
}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.item-esquerda{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:220px;
}
.item-acoes{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.btn-menor{background:#f59e0b;color:#000;font-weight:bold}
.btn-maior{background:#22c55e;color:#000;font-weight:bold}
.btn-remover{background:#ef4444;color:#fff;font-weight:bold}
.qtd-badge{
  min-width:34px;
  text-align:center;
  font-weight:bold;
  background:#1e293b;
  padding:8px 10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="topo" id="tituloMesa">🍽️ Mesa</div>

<div class="container">
  <input id="busca" placeholder="🔍 Buscar produto">
  <div class="filtros" id="filtrosCategorias"></div>

  <h3>Produtos</h3>
  <div id="listaProdutos"></div>

  <h3>Pedido da mesa</h3>
  <div id="statusPedido" class="info-status" style="display:none;"></div>
  <div id="pedido"></div>

  <div class="total" id="totalPedido">Total: R$ 0,00</div>

  <div class="acoes">
    <button id="btnEnviar">📨 Enviar pedido</button>
    <button id="btnConta">🧾 Pedir conta</button>
    <button id="btnLiberar" class="bloqueado">🔓 Liberar mesa</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");

let APP_ID = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = null;
let canalPedido = null;

if (!mesaId) {
  alert("Mesa não informada.");
  history.back();
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function nomeStatus(status) {
  const mapa = {
    aberto: "Aberto",
    novo: "Enviado",
    aceito: "Em preparo",
    pronto: "Pronto",
    conta_solicitada: "Conta solicitada",
    pago: "Pago",
    finalizado: "Finalizado",
    cancelado: "Cancelado"
  };
  return mapa[status] || status || "-";
}

function podeLiberarMesa(status) {
  return status === "pago" || status === "finalizado" || status === "cancelado";
}

function pedidoBloqueadoParaEdicao() {
  if (!pedidoAtual) return false;
  return ["pago", "finalizado", "cancelado"].includes(pedidoAtual.status);
}

function limparTelaPedido() {
  document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
  document.getElementById("totalPedido").innerText = `Total: ${formatarMoeda(0)}`;
}

function atualizarBotaoLiberar() {
  const btn = document.getElementById("btnLiberar");

  if (!pedidoAtual) {
    btn.classList.remove("bloqueado");
    return;
  }

  if (podeLiberarMesa(pedidoAtual.status)) {
    btn.classList.remove("bloqueado");
  } else {
    btn.classList.add("bloqueado");
  }
}

function atualizarInfoStatus() {
  const div = document.getElementById("statusPedido");

  if (!pedidoAtual) {
    div.style.display = "none";
    div.innerHTML = "";
    return;
  }

  div.style.display = "block";

  if (podeLiberarMesa(pedidoAtual.status)) {
    div.innerHTML = `Status do pedido: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>A mesa já pode ser liberada.</small>`;
  } else {
    div.innerHTML = `Status do pedido: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>A mesa só pode ser liberada após pagamento, cancelamento ou finalização.</small>`;
  }
}

function encerrarPedidoNaTela() {
  pedidoAtual = null;
  atualizarBotaoLiberar();
  atualizarInfoStatus();
  limparTelaPedido();

  if (canalPedido) {
    supabase.removeChannel(canalPedido);
    canalPedido = null;
  }
}

function obterImagemProduto(produto) {
  if (!produto) return "https://via.placeholder.com/80x80?text=Produto";

  let imgs = [];
  try {
    imgs = JSON.parse(produto.imagens || "[]");
  } catch {
    imgs = [];
  }

  return imgs[0] || "https://via.placeholder.com/80x80?text=Produto";
}

function obterCategoriaProduto(produto) {
  return String(
    produto.categoria_nome ||
    produto.categoria ||
    produto.categoria_id ||
    "Sem categoria"
  );
}

async function validarSessao() {
  const { data, error } = await supabase.auth.getSession();

  if (error || !data.session) {
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, app_id")
    .eq("id", userId)
    .single();

  if (erroUsuario || !usuario) {
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  APP_ID = usuario.app_id;
  return true;
}

async function iniciarSistema() {
  const ok = await validarSessao();
  if (!ok) return;

  await carregarMesa();
  await carregarProdutos();
  await verificarPedidoExistente();
}

async function carregarMesa() {
  const { data } = await supabase
    .from("mesas")
    .select("numero_mesa")
    .eq("id", mesaId)
    .maybeSingle();

  if (data) {
    document.getElementById("tituloMesa").innerText = `🍽️ Mesa ${data.numero_mesa}`;
  }
}

async function verificarPedidoExistente() {
  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","pago","cancelado")')
    .order("created_at", { ascending: false })
    .limit(1)
    .maybeSingle();

  if (error) {
    console.error(error);
  }

  if (data) {
    pedidoAtual = data;
    atualizarBotaoLiberar();
    atualizarInfoStatus();
    ativarRealtimeNotificacao();
    await carregarPedido();
  } else {
    encerrarPedidoNaTela();
  }
}

async function criarPedidoSeNecessario() {
  if (pedidoAtual && !podeLiberarMesa(pedidoAtual.status)) return true;

  if (pedidoAtual && podeLiberarMesa(pedidoAtual.status)) {
    pedidoAtual = null;
  }

  const { data, error } = await supabase
    .from("pedidos")
    .insert({
      app_id: APP_ID,
      mesa_id: mesaId,
      status: "aberto",
      origem: "mesa"
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Erro ao criar pedido.");
    return false;
  }

  pedidoAtual = data;
  atualizarBotaoLiberar();
  atualizarInfoStatus();
  ativarRealtimeNotificacao();
  return true;
}

async function carregarProdutos() {
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if (error) {
    console.error(error);
    document.getElementById("listaProdutos").innerHTML = `<div class="msg-vazio">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = (data || []).map(p => ({
    ...p,
    categoria_exibicao: obterCategoriaProduto(p),
    imagem_exibicao: obterImagemProduto(p)
  }));

  montarCategoriasPelosProdutos();
  aplicarFiltros();
}

function montarCategoriasPelosProdutos() {
  const mapa = new Map();

  produtosCache.forEach(p => {
    const chave = obterCategoriaProduto(p);
    if (!mapa.has(chave)) {
      mapa.set(chave, { id: chave, nome: chave });
    }
  });

  categoriasCache = Array.from(mapa.values());

  if (!categoriaSelecionada && categoriasCache.length > 0) {
    categoriaSelecionada = categoriasCache[0].id;
  }

  renderizarBotoesCategorias();
}

function renderizarBotoesCategorias() {
  const div = document.getElementById("filtrosCategorias");
  div.innerHTML = "";

  if (categoriasCache.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhuma categoria encontrada nos produtos</div>`;
    return;
  }

  categoriasCache.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.nome;
    if (categoriaSelecionada === cat.id) btn.classList.add("ativo");
    btn.onclick = () => {
      categoriaSelecionada = cat.id;
      renderizarBotoesCategorias();
      aplicarFiltros();
    };
    div.appendChild(btn);
  });
}

function aplicarFiltros() {
  const texto = (document.getElementById("busca").value || "").toLowerCase();

  const lista = produtosCache.filter(p => {
    const nomeOk = (p.nome || "").toLowerCase().includes(texto);
    const categoriaOk = !categoriaSelecionada || obterCategoriaProduto(p) === categoriaSelecionada;
    return nomeOk && categoriaOk;
  });

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if (lista.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado</div>`;
    return;
  }

  lista.forEach(p => {
    const imgPrincipal = obterImagemProduto(p);

    const card = document.createElement("div");
    card.className = "produto";
    card.innerHTML = `
      <div class="produto-esquerda">
        <img class="thumb-produto" src="${imgPrincipal}" alt="${p.nome}" onerror="this.onerror=null;this.src='https://via.placeholder.com/80x80?text=Produto'">
        <div class="produto-info">
          <strong>${p.nome}</strong>
          <small>${formatarMoeda(p.preco)}</small>
          <small>${p.categoria_exibicao}</small>
        </div>
      </div>
      <button data-id="${p.id}">➕</button>
    `;
    card.querySelector("button").onclick = () => addProduto(p.id);
    div.appendChild(card);
  });
}

async function addProduto(produtoId) {
  const ok = await criarPedidoSeNecessario();
  if (!ok) return;

  const produto = produtosCache.find(p => String(p.id) === String(produtoId));
  if (!produto) return;

  if (pedidoAtual && podeLiberarMesa(pedidoAtual.status)) {
    alert("Esse pedido já foi encerrado. Atualize a página.");
    return;
  }

  const { data: itensExistentes, error: erroBusca } = await supabase
    .from("pedido_itens")
    .select("id, quantidade")
    .eq("pedido_id", pedidoAtual.id)
    .eq("produto_id", produto.id)
    .order("created_at", { ascending: true });

  if (erroBusca) {
    console.error(erroBusca);
    alert("Erro ao verificar item existente.");
    return;
  }

  if (itensExistentes && itensExistentes.length > 0) {
    const itemPrincipal = itensExistentes[0];
    const idsDuplicados = itensExistentes.slice(1).map(i => i.id);
    const somaDuplicados = itensExistentes.slice(1).reduce((acc, i) => acc + Number(i.quantidade || 0), 0);
    const novaQtd = Number(itemPrincipal.quantidade || 0) + somaDuplicados + 1;

    const { error: erroUpdate } = await supabase
      .from("pedido_itens")
      .update({ quantidade: novaQtd })
      .eq("id", itemPrincipal.id)
      .eq("pedido_id", pedidoAtual.id);

    if (erroUpdate) {
      console.error(erroUpdate);
      alert("Erro ao atualizar quantidade.");
      return;
    }

    if (idsDuplicados.length > 0) {
      const { error: erroDeleteDuplicados } = await supabase
        .from("pedido_itens")
        .delete()
        .in("id", idsDuplicados);

      if (erroDeleteDuplicados) {
        console.error(erroDeleteDuplicados);
      }
    }
  } else {
    const { error: erroInsert } = await supabase
      .from("pedido_itens")
      .insert({
        app_id: APP_ID,
        pedido_id: pedidoAtual.id,
        produto_id: produto.id,
        nome_produto: produto.nome,
        preco: Number(produto.preco || 0),
        quantidade: 1,
        status: "novo"
      });

    if (erroInsert) {
      console.error(erroInsert);
      alert("Erro ao adicionar produto.");
      return;
    }
  }

  await carregarPedido();
}

async function aumentarItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este pedido.");
    return;
  }

  const novaQtd = Number(item.quantidade || 0) + 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao aumentar item.");
    return;
  }

  await carregarPedido();
}

async function diminuirItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este pedido.");
    return;
  }

  const qtd = Number(item.quantidade || 0);

  if (qtd <= 1) {
    await removerItem(item.id);
    return;
  }

  const novaQtd = qtd - 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao diminuir item.");
    return;
  }

  await carregarPedido();
}

async function removerItem(itemId) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível remover item deste pedido.");
    return;
  }

  const { error } = await supabase
    .from("pedido_itens")
    .delete()
    .eq("id", itemId)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao remover item.");
    return;
  }

  await carregarPedido();
}

async function carregarPedido() {
  if (!pedidoAtual) {
    limparTelaPedido();
    return;
  }

  if (podeLiberarMesa(pedidoAtual.status)) {
    encerrarPedidoNaTela();
    return;
  }

  const { data, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const mapa = new Map();

  (data || []).forEach(i => {
    const chave = String(i.produto_id || i.id);

    if (!mapa.has(chave)) {
      mapa.set(chave, {
        ...i,
        quantidade: Number(i.quantidade || 0)
      });
    } else {
      const atual = mapa.get(chave);
      atual.quantidade += Number(i.quantidade || 0);
    }
  });

  const itens = Array.from(mapa.values());

  for (const item of itens) {
    const duplicados = (data || []).filter(d => String(d.produto_id) === String(item.produto_id));
    if (duplicados.length > 1) {
      const principal = duplicados[0];
      const idsExcluir = duplicados.slice(1).map(d => d.id);
      const qtdTotal = duplicados.reduce((acc, d) => acc + Number(d.quantidade || 0), 0);

      const { error: erroUpdate } = await supabase
        .from("pedido_itens")
        .update({ quantidade: qtdTotal })
        .eq("id", principal.id);

      if (!erroUpdate && idsExcluir.length > 0) {
        await supabase
          .from("pedido_itens")
          .delete()
          .in("id", idsExcluir);
      }
    }
  }

  const div = document.getElementById("pedido");
  div.innerHTML = "";
  let total = 0;

  if (!itens || itens.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
  }

  itens.forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);

    const bloqueado = pedidoBloqueadoParaEdicao();
    const produtoRel = produtosCache.find(p => String(p.id) === String(i.produto_id)) || null;
    const imgItem = produtoRel ? obterImagemProduto(produtoRel) : "https://via.placeholder.com/80x80?text=Produto";

    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <div class="item-esquerda">
        <img class="thumb-item" src="${imgItem}" alt="${i.nome_produto}" onerror="this.onerror=null;this.src='https://via.placeholder.com/80x80?text=Produto'">
        <div class="item-info">
          <strong>${i.nome_produto}</strong>
          <small>Valor unitário: ${formatarMoeda(i.preco)}</small>
          <small>Subtotal: ${formatarMoeda(Number(i.preco || 0) * Number(i.quantidade || 0))}</small>
        </div>
      </div>

      <div class="item-acoes">
        <button class="btn-menor" ${bloqueado ? "disabled" : ""}>➖</button>
        <div class="qtd-badge">${i.quantidade}</div>
        <button class="btn-maior" ${bloqueado ? "disabled" : ""}>➕</button>
        <button class="btn-remover" ${bloqueado ? "disabled" : ""}>🗑 Remover</button>
      </div>
    `;

    const botoes = item.querySelectorAll("button");
    botoes[0].onclick = () => diminuirItem(i);
    botoes[1].onclick = () => aumentarItem(i);
    botoes[2].onclick = () => removerItem(i.id);

    div.appendChild(item);
  });

  document.getElementById("totalPedido").innerText = `Total: ${formatarMoeda(total)}`;
}

document.getElementById("btnEnviar").onclick = async () => {
  if (!pedidoAtual) {
    alert("Nenhum pedido criado.");
    return;
  }

  if (podeLiberarMesa(pedidoAtual.status)) {
    alert("Esse pedido já foi encerrado.");
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({ status: "novo" })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID);

  if (error) {
    console.error(error);
    alert("Erro ao enviar pedido.");
    return;
  }

  pedidoAtual.status = "novo";
  atualizarBotaoLiberar();
  atualizarInfoStatus();
  alert("Pedido enviado!");
};

document.getElementById("btnConta").onclick = async () => {
  if (!pedidoAtual) {
    alert("Nenhum pedido criado.");
    return;
  }

  if (podeLiberarMesa(pedidoAtual.status)) {
    alert("Esse pedido já foi encerrado.");
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({ status: "conta_solicitada" })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID);

  if (error) {
    console.error(error);
    alert("Erro ao solicitar conta.");
    return;
  }

  pedidoAtual.status = "conta_solicitada";
  atualizarBotaoLiberar();
  atualizarInfoStatus();
  alert("Conta solicitada!");
};

document.getElementById("btnLiberar").onclick = async () => {
  if (!pedidoAtual) {
    location.href = "mesas.html";
    return;
  }

  if (!podeLiberarMesa(pedidoAtual.status)) {
    alert("Não é possível liberar a mesa. Ainda existe pedido pendente. A mesa só pode ser liberada quando o pedido estiver pago, cancelado ou finalizado.");
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({ status: "finalizado" })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID);

  if (error) {
    console.error(error);
    alert("Erro ao liberar mesa.");
    return;
  }

  encerrarPedidoNaTela();
  location.href = "mesas.html";
};

function ativarRealtimeNotificacao() {
  if (!pedidoAtual) return;

  if (canalPedido) {
    supabase.removeChannel(canalPedido);
    canalPedido = null;
  }

  canalPedido = supabase
    .channel("mesa-notify-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "pedidos",
        filter: `id=eq.${pedidoAtual.id}`
      },
      async payload => {
        const status = payload.new.status;
        pedidoAtual = { ...pedidoAtual, ...payload.new };

        if (status === "aceito") alert("👨‍🍳 Pedido em preparo!");
        if (status === "pronto") alert("✅ Pedido pronto!");
        if (status === "cancelado") {
          alert("❌ Pedido cancelado!");
          encerrarPedidoNaTela();
          return;
        }
        if (status === "pago") {
          alert("💰 Pedido pago! A mesa ficou livre.");
          encerrarPedidoNaTela();
          return;
        }
        if (status === "finalizado") {
          encerrarPedidoNaTela();
          return;
        }

        atualizarBotaoLiberar();
        atualizarInfoStatus();
        await carregarPedido();
      }
    )
    .subscribe();
}
