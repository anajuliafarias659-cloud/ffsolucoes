<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;font-size:20px;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:10px
}

.produto,.item{
background:#0f172a;
border-radius:14px;
padding:14px;
margin-bottom:12px
}

button{
padding:6px 12px;
border:none;
border-radius:8px;
cursor:pointer
}

.total{
font-size:18px;
font-weight:bold;
margin:16px 0
}

.filtros{
display:flex;
gap:8px;
margin-bottom:16px;
flex-wrap:wrap
}

.filtros button{
background:#1e293b;
color:#fff
}

.filtros button.ativo{
background:#2563eb
}

.bloqueado{
opacity:.4;
pointer-events:none
}

.acoes{
display:flex;
flex-wrap:wrap;
gap:10px
}

.acoes button{
background:#22c55e;
color:#000;
padding:12px 16px
}

#btnConta{
background:#f59e0b
}

#btnLiberar{
background:#2563eb;
color:#fff
}

.msg-vazio{
opacity:.7;
background:#0f172a;
border-radius:14px;
padding:14px
}

.thumb{
width:50px;
height:50px;
border-radius:10px;
object-fit:cover;
background:#1e293b
}

.produto{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px
}

.produto-esq{
display:flex;
gap:10px;
align-items:center
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px
}

.item-esq{
display:flex;
gap:10px;
align-items:center
}

.item-acoes{
display:flex;
gap:8px
}

.qtd{
background:#1e293b;
padding:8px 10px;
border-radius:8px;
font-weight:bold
}

.btn-menor{background:#f59e0b}
.btn-maior{background:#22c55e}
.btn-remover{background:#ef4444;color:#fff}
</style>
</head>

<body>

<div class="topo" id="tituloMesa">🍽️ Mesa</div>

<div class="container">

<input id="busca" placeholder="🔍 Buscar produto">

<div class="filtros" id="filtrosCategorias"></div>

<h3>Produtos</h3>
<div id="listaProdutos"></div>

<h3>Pedido da mesa</h3>
<div id="statusPedido"></div>
<div id="pedido"></div>

<div class="total" id="totalPedido">Total: R$ 0,00</div>

<div class="acoes">
<button id="btnEnviar">📨 Enviar pedido</button>
<button id="btnConta">🧾 Pedir conta</button>
<button id="btnLiberar" class="bloqueado">🔓 Liberar mesa</button>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");

let APP_ID=null
let pedidoAtual=null
let produtosCache=[]
let categoriaSelecionada=null

function moeda(v){
return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

function imagemProduto(p){

return p.imagem||
p.foto||
p.url_imagem||
p.banner_url||
p.image||
"https://via.placeholder.com/80x80?text=Produto"

}

function limparPedido(){

document.getElementById("pedido").innerHTML=
`<div class="msg-vazio">Nenhum item no pedido ainda</div>`

document.getElementById("totalPedido").innerText=
`Total: ${moeda(0)}`

}

async function iniciar(){

const {data}=await supabase.auth.getSession()

if(!data.session){
alert("Sessão inválida")
location.href="/auth/login.html"
return
}

const {data:user}=await supabase
.from("usuarios")
.select("app_id")
.eq("id",data.session.user.id)
.single()

APP_ID=user.app_id

await carregarProdutos()
await verificarPedido()

}

async function verificarPedido(){

const {data}=await supabase
.from("pedidos")
.select("*")
.eq("mesa_id",mesaId)
.eq("app_id",APP_ID)
.not("status","in",'("pago","finalizado","cancelado")')
.limit(1)
.maybeSingle()

if(data){
pedidoAtual=data
carregarPedido()
}else{
pedidoAtual=null
limparPedido()
}

}

async function criarPedido(){

const {data}=await supabase
.from("pedidos")
.insert({
app_id:APP_ID,
mesa_id:mesaId,
status:"aberto"
})
.select()
.single()

pedidoAtual=data

}

async function carregarProdutos(){

const {data}=await supabase
.from("produtos")
.select("*")
.eq("app_id",APP_ID)
.eq("ativo",true)
.order("nome")

produtosCache=data||[]

renderProdutos()

}

function renderProdutos(){

const div=document.getElementById("listaProdutos")
div.innerHTML=""

produtosCache.forEach(p=>{

const el=document.createElement("div")
el.className="produto"

el.innerHTML=`

<div class="produto-esq">

<img class="thumb" src="${imagemProduto(p)}">

<div>
<strong>${p.nome}</strong>
<br>
${moeda(p.preco)}
</div>

</div>

<button>➕</button>

`

el.querySelector("button").onclick=()=>addProduto(p)

div.appendChild(el)

})

}

async function addProduto(prod){

if(!pedidoAtual){
await criarPedido()
}

await supabase
.from("pedido_itens")
.insert({
pedido_id:pedidoAtual.id,
produto_id:prod.id,
nome_produto:prod.nome,
preco:prod.preco,
quantidade:1
})

carregarPedido()

}

async function carregarPedido(){

if(!pedidoAtual){
limparPedido()
return
}

const {data}=await supabase
.from("pedido_itens")
.select("*")
.eq("pedido_id",pedidoAtual.id)

const div=document.getElementById("pedido")
div.innerHTML=""

let total=0

data.forEach(i=>{

total+=i.preco*i.quantidade

const prod=produtosCache.find(p=>p.id===i.produto_id)

const el=document.createElement("div")
el.className="item"

el.innerHTML=`

<div class="item-esq">

<img class="thumb" src="${imagemProduto(prod)}">

<div>
<strong>${i.nome_produto}</strong>
<br>
${moeda(i.preco)}
</div>

</div>

<div class="item-acoes">

<button class="btn-menor">➖</button>

<div class="qtd">${i.quantidade}</div>

<button class="btn-maior">➕</button>

<button class="btn-remover">🗑</button>

</div>

`

const b=el.querySelectorAll("button")

b[0].onclick=()=>alterarQtd(i,-1)
b[1].onclick=()=>alterarQtd(i,1)
b[2].onclick=()=>removerItem(i)

div.appendChild(el)

})

document.getElementById("totalPedido").innerText=
`Total: ${moeda(total)}`

}

async function alterarQtd(item,valor){

let nova=item.quantidade+valor

if(nova<=0){
removerItem(item)
return
}

await supabase
.from("pedido_itens")
.update({quantidade:nova})
.eq("id",item.id)

carregarPedido()

}

async function removerItem(item){

await supabase
.from("pedido_itens")
.delete()
.eq("id",item.id)

carregarPedido()

}

document.addEventListener("DOMContentLoaded",iniciar)

</script>

</body>
</html>
