<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:#fff;
}

.topo{
background:#0f172a;
padding:16px;
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
z-index:5;
}

.container{
max-width:1100px;
margin:auto;
padding:16px;
}

/* PRODUTOS */

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:14px;
}

.produto{
background:#0f172a;
border-radius:16px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,.25);
}

.produto-img{
width:100%;
height:140px;
background:#111827 center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:#94a3b8;
font-size:14px;
}

.produto-body{
padding:10px;
}

.produto-nome{
font-size:14px;
font-weight:bold;
min-height:36px;
margin-bottom:6px;
}

.produto-preco{
color:#22c55e;
font-size:16px;
font-weight:bold;
margin-bottom:8px;
}

.controles{
display:flex;
align-items:center;
gap:6px;
}

.controles button{
border:none;
border-radius:8px;
cursor:pointer;
}

.menos{
width:30px;
height:30px;
background:#334155;
color:#fff;
font-size:18px;
}

.mais{
width:30px;
height:30px;
background:#16a34a;
color:#fff;
font-size:18px;
}

.qtd{
width:22px;
text-align:center;
font-weight:bold;
}

.adicionar{
flex:1;
height:32px;
background:#2563eb;
color:#fff;
font-weight:bold;
font-size:13px;
}

/* LOTE */

.card{
background:#0f172a;
border-radius:14px;
padding:14px;
margin-top:20px;
}

.lote-item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #1e293b;
}

.resumo{
display:flex;
justify-content:space-between;
margin-top:10px;
font-weight:bold;
}

.btn{
border:none;
border-radius:10px;
padding:10px 14px;
font-weight:bold;
cursor:pointer;
}

.btn-enviar{background:#2563eb;color:#fff}
.btn-conta{background:#dc2626;color:#fff}

@media(max-width:700px){

.produtos{
grid-template-columns:repeat(2,1fr);
}

.produto-img{
height:110px;
}

}

</style>
</head>

<body>

<div class="topo" id="tituloMesa">
Mesa
</div>

<div class="container">

<div class="produtos" id="listaProdutos"></div>

<div class="card">

<h3>Lote atual</h3>

<div id="listaLote"></div>

<div class="resumo">
<div>Total lote</div>
<div id="totalLote">R$ 0,00</div>
</div>

<div style="margin-top:10px;display:flex;gap:10px;">
<button class="btn btn-enviar" onclick="enviarPedido()">Enviar pedido</button>
<button class="btn btn-conta" onclick="pedirConta()">Pedir conta</button>
</div>

</div>

</div>

<script>

const sb = supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);

const mesaId = params.get("mesa");
const token = params.get("token");

let app_id=null;
let produtos=[];
let lote=[];

const qtdTemp={};

function moeda(v){
return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function obterImagemProduto(p){
return p.imagem_url || p.imagem || p.foto || "";
}

/* VALIDAR SESSÃO */

async function validarSessao(){

const {data,error}=await sb
.from("sessoes_mesa")
.select("*")
.eq("mesa_id",mesaId)
.eq("token",token)
.eq("ativa",true)
.single();

if(error || !data){
alert("Sessão inválida");
location.href="/";
return;
}

app_id=data.app_id;

}

/* PRODUTOS */

async function carregarProdutos(){

const {data}=await sb
.from("produtos")
.select("*")
.eq("app_id",app_id)
.eq("ativo",true)
.order("nome");

produtos=data||[];

renderizarProdutos(produtos);

}

function renderizarProdutos(lista){

const box=document.getElementById("listaProdutos");

box.innerHTML=lista.map(p=>{

const img=obterImagemProduto(p);

return`

<div class="produto">

<div class="produto-img" style="background-image:url('${img}')">
${img?``:`Produto`}
</div>

<div class="produto-body">

<div class="produto-nome">${p.nome}</div>

<div class="produto-preco">${moeda(p.preco)}</div>

<div class="controles">

<button class="menos" onclick="alterarQtd('${p.id}',-1)">-</button>

<div class="qtd" id="qtd-${p.id}">
${qtdTemp[p.id]||1}
</div>

<button class="mais" onclick="alterarQtd('${p.id}',1)">+</button>

<button class="adicionar" onclick="addLote('${p.id}')">
Adicionar
</button>

</div>

</div>

</div>

`

}).join("");

}

function alterarQtd(id,delta){

const atual=qtdTemp[id]||1;

const novo=Math.max(1,atual+delta);

qtdTemp[id]=novo;

document.getElementById(`qtd-${id}`).innerText=novo;

}

function addLote(id){

const p=produtos.find(x=>x.id==id);

const qtd=qtdTemp[id]||1;

const idx=lote.findIndex(i=>i.produto_id==id);

if(idx>=0){

lote[idx].quantidade+=qtd;

}else{

lote.push({
produto_id:p.id,
nome:p.nome,
preco:p.preco,
quantidade:qtd
});

}

qtdTemp[id]=1;

renderizarLote();

}

function renderizarLote(){

const box=document.getElementById("listaLote");

if(!lote.length){
box.innerHTML="Nenhum item";
}else{

box.innerHTML=lote.map(i=>`

<div class="lote-item">

<div>${i.nome} x${i.quantidade}</div>

<div>${moeda(i.preco*i.quantidade)}</div>

</div>

`).join("");

}

const total=lote.reduce((s,i)=>s+i.preco*i.quantidade,0);

document.getElementById("totalLote").innerText=moeda(total);

}

/* ENVIAR PEDIDO */

async function enviarPedido(){

if(!lote.length){
alert("Adicione itens");
return;
}

const total=lote.reduce((s,i)=>s+i.preco*i.quantidade,0);

const {data:pedido}=await sb
.from("pedidos")
.insert({
app_id,
mesa_id:mesaId,
total,
status:"pendente"
})
.select()
.single();

for(const i of lote){

await sb.from("pedido_itens").insert({
app_id,
pedido_id:pedido.id,
mesa_id:mesaId,
produto_id:i.produto_id,
nome_produto:i.nome,
quantidade:i.quantidade,
preco:i.preco,
subtotal:i.preco*i.quantidade
});

}

alert("Pedido enviado");

lote=[];
renderizarLote();

}

/* PEDIR CONTA */

async function pedirConta(){

await sb
.from("mesas")
.update({
pedir_conta:true,
status:"conta_solicitada"
})
.eq("id",mesaId);

alert("Conta solicitada");

}

/* START */

async function iniciar(){

await validarSessao();

await carregarProdutos();

}

iniciar();

</script>

</body>
</html>
