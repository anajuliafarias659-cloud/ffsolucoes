<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa | Comanda Interna</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --card2:#111827;
  --border:#1e293b;
  --text:#ffffff;
  --muted:#94a3b8;
  --green:#22c55e;
  --blue:#38bdf8;
  --orange:#f59e0b;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  background:#0b1220;
  position:sticky;
  top:0;
  z-index:20;
}

.topo-esq{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.topo-esq h1{
  margin:0;
  font-size:20px;
}

.subinfo{
  font-size:12px;
  color:var(--muted);
}

.btn{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-weight:700;
  cursor:pointer;
}

.btn-voltar{background:#1e293b;color:#fff}
.btn-enviar{background:var(--green);color:#fff}
.btn-limpar{background:#334155;color:#fff}
.btn-conta{background:var(--orange);color:#111827}
.btn-liberar{background:var(--red);color:#fff}
.btn-add{background:var(--green);color:#fff;width:100%}
.btn-menor{padding:8px 10px;font-size:13px}

.container{
  max-width:1300px;
  margin:0 auto;
  padding:16px;
  display:grid;
  grid-template-columns:1.3fr .8fr;
  gap:16px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
}

h2,h3{
  margin:0 0 12px 0;
}

.busca{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#0b1220;
  color:#fff;
  outline:none;
  margin-bottom:12px;
}

.categorias{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.cat-btn{
  border:none;
  border-radius:999px;
  padding:8px 12px;
  cursor:pointer;
  background:#1e293b;
  color:#fff;
  font-weight:700;
}

.cat-btn.ativa{
  background:var(--blue);
  color:#001018;
}

.produtos{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

.produto{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.produto-nome{
  font-weight:700;
  font-size:15px;
}

.produto-desc{
  color:var(--muted);
  font-size:13px;
  min-height:34px;
}

.preco{
  font-weight:800;
  color:#86efac;
}

.lista-carrinho{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:12px;
}

.item-carrinho{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
}

.item-topo{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}

.item-nome{
  font-weight:700;
}

.item-acoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}

.qtd-box{
  display:flex;
  gap:6px;
  align-items:center;
}

.qtd-btn{
  width:30px;
  height:30px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:800;
  background:#1e293b;
  color:#fff;
}

.obs{
  width:100%;
  min-height:80px;
  resize:vertical;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#0b1220;
  color:#fff;
  outline:none;
}

.total{
  margin-top:12px;
  font-size:18px;
  font-weight:800;
}

.info-pedido{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
}

.pedido-ativo{
  margin-top:16px;
  border-top:1px solid var(--border);
  padding-top:16px;
}

.pedido-item{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.empty{
  color:var(--muted);
  text-align:center;
  padding:20px 0;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
}

.status-novo,.status-aberto{background:rgba(234,179,8,.18);color:#facc15}
.status-aceito{background:rgba(56,189,248,.18);color:#38bdf8}
.status-pronto{background:rgba(34,197,94,.18);color:#22c55e}
.status-cancelado{background:rgba(239,68,68,.18);color:#ef4444}
.status-fechado,.status-pago{background:rgba(148,163,184,.18);color:#cbd5e1}

@media (max-width: 980px){
  .container{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>
  <div class="topo-esq">
    <h1 id="tituloMesa">Mesa</h1>
    <div class="subinfo" id="subinfo">Carregando sessão...</div>
  </div>

  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-voltar" onclick="history.back()">Voltar</button>
  </div>
</header>

<div class="container">
  <section class="card">
    <h2>Produtos</h2>

    <input type="text" id="busca" class="busca" placeholder="Buscar produto...">

    <div class="categorias" id="categorias"></div>

    <div class="produtos" id="listaProdutos">
      <div class="empty">Carregando produtos...</div>
    </div>
  </section>

  <aside class="card">
    <h2>Pedido da Mesa</h2>

    <div id="mesaInfo" class="info-pedido">Carregando dados da mesa...</div>

    <div style="margin:14px 0">
      <h3 style="margin-bottom:8px">Itens para enviar</h3>
      <div id="listaCarrinho" class="lista-carrinho">
        <div class="empty">Nenhum item adicionado</div>
      </div>
    </div>

    <label for="observacao" style="display:block;margin-bottom:8px;font-weight:700">Observação do pedido</label>
    <textarea id="observacao" class="obs" placeholder="Ex.: sem cebola, ponto da carne, observação da mesa..."></textarea>

    <div class="total" id="totalCarrinho">Total: R$ 0,00</div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn btn-enviar" id="btnEnviar">Enviar pedido</button>
      <button class="btn btn-limpar" id="btnLimpar">Limpar</button>
      <button class="btn btn-conta" id="btnConta">Pedir conta</button>
      <button class="btn btn-liberar" id="btnLiberar">Liberar mesa</button>
    </div>

    <div class="pedido-ativo">
      <h3>Pedido atual</h3>
      <div id="pedidoAtualBox" class="empty">Nenhum pedido ativo</div>
    </div>
  </aside>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

const tituloMesa = document.getElementById("tituloMesa");
const subinfo = document.getElementById("subinfo");
const mesaInfoEl = document.getElementById("mesaInfo");
const categoriasEl = document.getElementById("categorias");
const listaProdutosEl = document.getElementById("listaProdutos");
const listaCarrinhoEl = document.getElementById("listaCarrinho");
const totalCarrinhoEl = document.getElementById("totalCarrinho");
const pedidoAtualBox = document.getElementById("pedidoAtualBox");
const buscaEl = document.getElementById("busca");
const observacaoEl = document.getElementById("observacao");
const btnEnviar = document.getElementById("btnEnviar");
const btnLimpar = document.getElementById("btnLimpar");
const btnConta = document.getElementById("btnConta");
const btnLiberar = document.getElementById("btnLiberar");

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa_id") || params.get("mesa") || params.get("id");
const numeroMesaUrl = params.get("mesa_numero") || params.get("numero");

let usuarioLogado = null;
let app_id = null;
let mesaInfo = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = "todas";
let carrinho = [];
let canalMesa = null;
let canalPedido = null;

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function normalizarTexto(txt){
  return String(txt || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function obterDestinoProduto(prod){
  const destino = String(prod.destino || prod.setor || prod.tipo_destino || "").toLowerCase().trim();
  if(destino) return destino;

  const categoria = normalizarTexto(prod.categoria || prod.categoria_nome || "");
  if(categoria.includes("bebida") || categoria.includes("bar")) return "bar";

  return "cozinha";
}

function getCategoriaNome(prod){
  return prod.categoria_nome || prod.categoria || "Sem categoria";
}

function getPrecoProduto(prod){
  return Number(prod.preco || prod.valor || 0);
}

function getDescricaoProduto(prod){
  return prod.descricao || prod.desc || "";
}

function bloquearBotoes(bloquear){
  btnEnviar.disabled = bloquear;
  btnLimpar.disabled = bloquear;
  btnConta.disabled = bloquear;
  btnLiberar.disabled = bloquear;
}

async function iniciarSistema(){
  const { data, error } = await supabase.auth.getSession();

  if(error || !data.session){
    alert("Sessão inválida");
    window.location.href = "/auth/login.html";
    return;
  }

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, nome, email, app_id")
    .eq("id", data.session.user.id)
    .single();

  if(erroUsuario || !usuario){
    console.error("Erro ao buscar usuário:", erroUsuario);
    alert("Usuário não encontrado.");
    window.location.href = "/auth/login.html";
    return;
  }

  usuarioLogado = usuario;
  app_id = usuario.app_id;

  if(!app_id){
    alert("Negócio não identificado.");
    return;
  }

  if(!mesaId){
    alert("Mesa não informada.");
    history.back();
    return;
  }

  subinfo.innerText = `${usuario.nome || usuario.email} • Negócio: ${app_id}`;

  const okMesa = await carregarMesa();
  if(!okMesa) return;

  await carregarCategorias();
  await carregarProdutos();
  await sincronizarPedidoAtual();
  ativarRealtimeMesa();
  ativarRealtimePedido();
}

/* ===============================
   MESA
================================= */
async function carregarMesa(){
  const { data, error } = await supabase
    .from("mesas")
    .select("*")
    .eq("id", mesaId)
    .eq("app_id", app_id)
    .single();

  if(error || !data){
    console.error("Erro ao carregar mesa:", error);
    alert("Mesa não encontrada.");
    return false;
  }

  mesaInfo = data;
  const numeroMesa = mesaInfo.numero_mesa || numeroMesaUrl || "-";

  tituloMesa.innerText = `Mesa ${numeroMesa}`;
  mesaInfoEl.innerHTML = `
    <div><strong>Mesa:</strong> ${numeroMesa}</div>
    <div><strong>Status:</strong> ${mesaInfo.status || "livre"}</div>
    <div><strong>Cliente:</strong> ${mesaInfo.nome_cliente || "Não informado"}</div>
  `;

  return true;
}

/* ===============================
   CATEGORIAS
================================= */
async function carregarCategorias(){
  const { data, error } = await supabase
    .from("categorias")
    .select("id, nome")
    .eq("app_id", app_id)
    .order("nome", { ascending:true });

  if(error){
    console.error("Erro ao carregar categorias:", error);
    categoriasCache = [];
    renderizarCategorias();
    return;
  }

  categoriasCache = data || [];
  renderizarCategorias();
}

function renderizarCategorias(){
  categoriasEl.innerHTML = "";

  const todasBtn = document.createElement("button");
  todasBtn.className = `cat-btn ${categoriaSelecionada === "todas" ? "ativa" : ""}`;
  todasBtn.textContent = "Todas";
  todasBtn.onclick = () => {
    categoriaSelecionada = "todas";
    renderizarCategorias();
    renderizarProdutos();
  };
  categoriasEl.appendChild(todasBtn);

  categoriasCache.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = `cat-btn ${String(categoriaSelecionada) === String(cat.id) ? "ativa" : ""}`;
    btn.textContent = cat.nome;
    btn.onclick = () => {
      categoriaSelecionada = cat.id;
      renderizarCategorias();
      renderizarProdutos();
    };
    categoriasEl.appendChild(btn);
  });
}

/* ===============================
   PRODUTOS
================================= */
async function carregarProdutos(){
  listaProdutosEl.innerHTML = `<div class="empty">Carregando produtos...</div>`;

  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", app_id)
    .eq("ativo", true)
    .order("nome", { ascending:true });

  if(error){
    console.error("Erro ao carregar produtos:", error);
    listaProdutosEl.innerHTML = `<div class="empty">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = data || [];
  renderizarProdutos();
}

function renderizarProdutos(){
  const termo = normalizarTexto(buscaEl.value);
  let lista = [...produtosCache];

  if(categoriaSelecionada !== "todas"){
    lista = lista.filter(p => String(p.categoria_id) === String(categoriaSelecionada));
  }

  if(termo){
    lista = lista.filter(p => {
      const nome = normalizarTexto(p.nome);
      const desc = normalizarTexto(getDescricaoProduto(p));
      const categoria = normalizarTexto(getCategoriaNome(p));
      return nome.includes(termo) || desc.includes(termo) || categoria.includes(termo);
    });
  }

  if(lista.length === 0){
    listaProdutosEl.innerHTML = `<div class="empty">Nenhum produto encontrado</div>`;
    return;
  }

  listaProdutosEl.innerHTML = "";

  lista.forEach(prod => {
    const card = document.createElement("div");
    card.className = "produto";

    card.innerHTML = `
      <div class="produto-nome">${prod.nome}</div>
      <div class="produto-desc">${getDescricaoProduto(prod) || "Sem descrição"}</div>
      <div class="preco">${formatarMoeda(getPrecoProduto(prod))}</div>
      <button class="btn btn-add btn-menor">Adicionar</button>
    `;

    card.querySelector("button").onclick = () => adicionarAoCarrinho(prod);
    listaProdutosEl.appendChild(card);
  });
}

function adicionarAoCarrinho(prod){
  const existente = carrinho.find(i => String(i.id) === String(prod.id));

  if(existente){
    existente.quantidade += 1;
  }else{
    carrinho.push({
      id: prod.id,
      nome: prod.nome,
      preco: getPrecoProduto(prod),
      quantidade: 1,
      destino: obterDestinoProduto(prod),
      observacao: "",
      produto: prod
    });
  }

  renderizarCarrinho();
}

/* ===============================
   CARRINHO
================================= */
function alterarQtd(produtoId, delta){
  const item = carrinho.find(i => String(i.id) === String(produtoId));
  if(!item) return;

  item.quantidade += delta;

  if(item.quantidade <= 0){
    carrinho = carrinho.filter(i => String(i.id) !== String(produtoId));
  }

  renderizarCarrinho();
}

function atualizarObsItem(produtoId, valor){
  const item = carrinho.find(i => String(i.id) === String(produtoId));
  if(!item) return;
  item.observacao = valor;
}

function limparCarrinho(){
  carrinho = [];
  observacaoEl.value = "";
  renderizarCarrinho();
}

function renderizarCarrinho(){
  if(carrinho.length === 0){
    listaCarrinhoEl.innerHTML = `<div class="empty">Nenhum item adicionado</div>`;
    totalCarrinhoEl.innerText = `Total: ${formatarMoeda(0)}`;
    return;
  }

  listaCarrinhoEl.innerHTML = "";
  let total = 0;

  carrinho.forEach(item => {
    const subtotal = Number(item.preco) * Number(item.quantidade);
    total += subtotal;

    const div = document.createElement("div");
    div.className = "item-carrinho";
    div.innerHTML = `
      <div class="item-topo">
        <div>
          <div class="item-nome">${item.nome}</div>
          <div class="subinfo">${item.destino}</div>
        </div>
        <div><strong>${formatarMoeda(subtotal)}</strong></div>
      </div>

      <div class="item-acoes">
        <div class="qtd-box">
          <button class="qtd-btn">-</button>
          <strong>${item.quantidade}</strong>
          <button class="qtd-btn">+</button>
        </div>
      </div>

      <textarea class="obs" placeholder="Observação do item" style="min-height:60px;margin-top:10px">${item.observacao || ""}</textarea>
    `;

    const botoes = div.querySelectorAll(".qtd-btn");
    botoes[0].onclick = () => alterarQtd(item.id, -1);
    botoes[1].onclick = () => alterarQtd(item.id, 1);

    div.querySelector("textarea").addEventListener("input", e => {
      atualizarObsItem(item.id, e.target.value);
    });

    listaCarrinhoEl.appendChild(div);
  });

  totalCarrinhoEl.innerText = `Total: ${formatarMoeda(total)}`;
}

/* ===============================
   PEDIDO ATUAL
================================= */
async function sincronizarPedidoAtual(){
  const { data: pedido, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("app_id", app_id)
    .eq("mesa_id", mesaId)
    .in("status", ["novo","aberto","aceito","pronto"])
    .order("created_at", { ascending:false })
    .limit(1)
    .maybeSingle();

  if(error){
    console.error("Erro ao carregar pedido atual:", error);
    pedidoAtual = null;
    renderizarPedidoAtual();
    return;
  }

  pedidoAtual = pedido || null;
  renderizarPedidoAtual();
}

async function renderizarPedidoAtual(){
  if(!pedidoAtual){
    pedidoAtualBox.innerHTML = `<div class="empty">Nenhum pedido ativo</div>`;
    return;
  }

  const { data: itens, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending:true });

  if(error){
    console.error("Erro ao carregar itens do pedido:", error);
    pedidoAtualBox.innerHTML = `<div class="empty">Erro ao carregar itens do pedido</div>`;
    return;
  }

  const total = (itens || []).reduce((soma, item) => {
    return soma + (Number(item.preco || 0) * Number(item.quantidade || 0));
  }, 0);

  let html = `
    <div style="margin-bottom:10px">
      <span class="badge status-${pedidoAtual.status}">${pedidoAtual.status}</span>
      <div class="info-pedido" style="margin-top:6px">Pedido #${pedidoAtual.id}</div>
    </div>
  `;

  if(!itens || itens.length === 0){
    html += `<div class="empty">Pedido sem itens</div>`;
  }else{
    itens.forEach(item => {
      const subtotal = Number(item.preco || 0) * Number(item.quantidade || 0);
      html += `
        <div class="pedido-item">
          <div>
            <div><strong>${item.quantidade}x ${item.nome_produto}</strong></div>
            <div class="subinfo">${item.destino || "-"}</div>
            ${item.observacao ? `<div class="subinfo">Obs: ${item.observacao}</div>` : ``}
          </div>
          <div>${formatarMoeda(subtotal)}</div>
        </div>
      `;
    });
  }

  html += `<div class="total">Total atual: ${formatarMoeda(total)}</div>`;
  pedidoAtualBox.innerHTML = html;
}

/* ===============================
   ENVIAR PEDIDO
================================= */
async function enviarPedido(){
  if(carrinho.length === 0){
    alert("Adicione pelo menos 1 item.");
    return;
  }

  if(!mesaInfo){
    alert("Mesa não carregada.");
    return;
  }

  try{
    bloquearBotoes(true);

    let pedidoId = null;

    const { data: pedidoExistente, error: erroExistente } = await supabase
      .from("pedidos")
      .select("id, status")
      .eq("app_id", app_id)
      .eq("mesa_id", mesaId)
      .in("status", ["novo","aberto","aceito"])
      .order("created_at", { ascending:false })
      .limit(1)
      .maybeSingle();

    if(erroExistente){
      console.error("Erro ao buscar pedido existente:", erroExistente);
      alert("Erro ao localizar pedido da mesa.");
      return;
    }

    if(pedidoExistente){
      pedidoId = pedidoExistente.id;
    }else{
      const { data: novoPedido, error: erroNovoPedido } = await supabase
        .from("pedidos")
        .insert([{
          app_id,
          mesa_id: mesaId,
          status: "novo",
          observacao: observacaoEl.value.trim() || null,
          origem: "mesa_interna",
          usuario_id: usuarioLogado.id
        }])
        .select()
        .single();

      if(erroNovoPedido || !novoPedido){
        console.error("Erro ao criar pedido:", erroNovoPedido);
        alert("Erro ao criar pedido.");
        return;
      }

      pedidoId = novoPedido.id;
    }

    const itensInsert = carrinho.map(item => ({
      app_id,
      pedido_id: pedidoId,
      produto_id: item.id,
      nome_produto: item.nome,
      quantidade: item.quantidade,
      preco: item.preco,
      destino: item.destino,
      observacao: item.observacao || null,
      status: "novo"
    }));

    const { error: erroItens } = await supabase
      .from("pedido_itens")
      .insert(itensInsert);

    if(erroItens){
      console.error("Erro ao inserir itens:", erroItens);
      alert("Erro ao enviar itens do pedido.");
      return;
    }

    const { error: erroMesa } = await supabase
      .from("mesas")
      .update({
        status: "ocupada",
        nome_cliente: mesaInfo.nome_cliente || "Mesa em atendimento"
      })
      .eq("id", mesaId)
      .eq("app_id", app_id);

    if(erroMesa){
      console.error("Erro ao atualizar mesa:", erroMesa);
    }

    limparCarrinho();
    await carregarMesa();
    await sincronizarPedidoAtual();
    alert("Pedido enviado com sucesso.");
  }finally{
    bloquearBotoes(false);
  }
}

/* ===============================
   PEDIR CONTA
================================= */
async function pedirConta(){
  if(!mesaInfo){
    alert("Mesa não carregada.");
    return;
  }

  const confirmar = confirm("Deseja solicitar a conta desta mesa?");
  if(!confirmar) return;

  bloquearBotoes(true);

  try{
    const { error } = await supabase
      .from("mesas")
      .update({
        solicitar_conta: true
      })
      .eq("id", mesaId)
      .eq("app_id", app_id);

    if(error){
      console.error("Erro ao pedir conta:", error);
      alert("Erro ao solicitar conta.");
      return;
    }

    await carregarMesa();
    alert("Conta solicitada.");
  }finally{
    bloquearBotoes(false);
  }
}

/* ===============================
   LIBERAR MESA
================================= */
async function liberarMesa(){
  if(!mesaInfo){
    alert("Mesa não carregada.");
    return;
  }

  const confirmar = confirm("Deseja liberar esta mesa?");
  if(!confirmar) return;

  bloquearBotoes(true);

  try{
    const { error: erroPedidos } = await supabase
      .from("pedidos")
      .update({ status: "fechado" })
      .eq("app_id", app_id)
      .eq("mesa_id", mesaId)
      .in("status", ["novo","aberto","aceito","pronto"]);

    if(erroPedidos){
      console.error("Erro ao fechar pedidos:", erroPedidos);
      alert("Erro ao fechar pedidos da mesa.");
      return;
    }

    const { error: erroMesa } = await supabase
      .from("mesas")
      .update({
        status: "livre",
        nome_cliente: null,
        solicitar_conta: false
      })
      .eq("id", mesaId)
      .eq("app_id", app_id);

    if(erroMesa){
      console.error("Erro ao liberar mesa:", erroMesa);
      alert("Erro ao liberar mesa.");
      return;
    }

    await carregarMesa();
    await sincronizarPedidoAtual();
    alert("Mesa liberada com sucesso.");
  }finally{
    bloquearBotoes(false);
  }
}

/* ===============================
   REALTIME
================================= */
function ativarRealtimeMesa(){
  if(canalMesa){
    supabase.removeChannel(canalMesa);
    canalMesa = null;
  }

  canalMesa = supabase
    .channel("mesa-interna-" + mesaId)
    .on(
      "postgres_changes",
      { event:"UPDATE", schema:"public", table:"mesas", filter:`id=eq.${mesaId}` },
      async () => {
        await carregarMesa();
      }
    )
    .subscribe();
}

function ativarRealtimePedido(){
  if(canalPedido){
    supabase.removeChannel(canalPedido);
    canalPedido = null;
  }

  canalPedido = supabase
    .channel("pedido-mesa-interna-" + mesaId)
    .on(
      "postgres_changes",
      { event:"INSERT", schema:"public", table:"pedidos" },
      async payload => {
        if(payload.new.app_id === app_id && String(payload.new.mesa_id) === String(mesaId)){
          await sincronizarPedidoAtual();
        }
      }
    )
    .on(
      "postgres_changes",
      { event:"UPDATE", schema:"public", table:"pedidos" },
      async payload => {
        if(payload.new.app_id === app_id && String(payload.new.mesa_id) === String(mesaId)){
          await sincronizarPedidoAtual();
        }
      }
    )
    .on(
      "postgres_changes",
      { event:"INSERT", schema:"public", table:"pedido_itens" },
      async () => {
        if(pedidoAtual){
          await renderizarPedidoAtual();
        }else{
          await sincronizarPedidoAtual();
        }
      }
    )
    .on(
      "postgres_changes",
      { event:"UPDATE", schema:"public", table:"pedido_itens" },
      async () => {
        if(pedidoAtual){
          await renderizarPedidoAtual();
        }
      }
    )
    .subscribe();
}

buscaEl.addEventListener("input", renderizarProdutos);
btnEnviar.addEventListener("click", enviarPedido);
btnLimpar.addEventListener("click", limparCarrinho);
btnConta.addEventListener("click", pedirConta);
btnLiberar.addEventListener("click", liberarMesa);

iniciarSistema();
