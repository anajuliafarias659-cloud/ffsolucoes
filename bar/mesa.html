<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;font-size:20px;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px}
.produto,.item{background:#0f172a;border-radius:14px;padding:14px;margin-bottom:12px}
.produto{display:flex;justify-content:space-between;align-items:center;gap:10px}
button{padding:6px 12px;border:none;border-radius:8px;cursor:pointer}
.total{font-size:18px;font-weight:bold;margin:16px 0}
.filtros{display:flex;gap:8px;margin-bottom:16px}
.filtros button{flex:1;background:#1e293b;color:#fff}
.filtros button.ativo{background:#2563eb}
.bloqueado{opacity:.4;pointer-events:none}
.acoes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.acoes button{
  background:#22c55e;
  color:#000;
  padding:12px 16px;
}
#btnConta{background:#f59e0b;color:#000}
#btnLiberar{background:#2563eb;color:#fff}
.msg-vazio{
  opacity:.7;
  background:#0f172a;
  border-radius:14px;
  padding:14px;
}
</style>
</head>

<body>

<div class="topo" id="tituloMesa">🍽️ Mesa</div>

<div class="container">

<input id="busca" placeholder="🔍 Buscar produto">

<div class="filtros">
  <button id="fBar" class="ativo">🍹 Bar</button>
  <button id="fCozinha">🍳 Cozinha</button>
</div>

<h3>Produtos</h3>
<div id="listaProdutos"></div>

<h3>Pedido da mesa</h3>
<div id="pedido"></div>

<div class="total" id="totalPedido">Total: R$ 0,00</div>

<div class="acoes">
  <button id="btnEnviar">📨 Enviar pedido</button>
  <button id="btnConta">🧾 Pedir conta</button>
  <button id="btnLiberar" class="bloqueado">🔓 Liberar mesa</button>
</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");

let APP_ID = null;
let pedidoAtual = null;
let produtosCache = [];
let destinoSelecionado = "bar";
let canalPedido = null;

if(!mesaId){
  alert("Mesa não informada.");
  history.back();
}

/* ===== SESSÃO ===== */
async function validarSessao(){
  const { data, error } = await supabase.auth.getSession();

  if(error || !data.session){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, app_id, nome, email")
    .eq("id", userId)
    .single();

  if(erroUsuario || !usuario){
    console.error("Erro ao buscar usuário:", erroUsuario);
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  APP_ID = usuario.app_id;

  if(!APP_ID){
    alert("Negócio não identificado.");
    return false;
  }

  return true;
}

async function iniciarSistema(){
  const ok = await validarSessao();
  if(!ok) return;

  await carregarMesa();
  await verificarPedidoExistente();
  await carregarProdutos();
}

/* ===== MESA ===== */
async function carregarMesa(){
  const { data, error } = await supabase
    .from("mesas")
    .select("numero_mesa")
    .eq("id", mesaId)
    .maybeSingle();

  if(error){
    console.error("Erro ao carregar mesa:", error);
    return;
  }

  if(data){
    document.getElementById("tituloMesa").innerText = `🍽️ Mesa ${data.numero_mesa}`;
  }
}

/* ===== VERIFICA PEDIDO ===== */
async function verificarPedidoExistente(){
  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","pago")')
    .maybeSingle();

  if(error){
    console.error("Erro ao verificar pedido:", error);
    return;
  }

  if(data){
    pedidoAtual = data;
    document.getElementById("btnLiberar").classList.remove("bloqueado");
    ativarRealtimeNotificacao();
    await carregarPedido();
  }else{
    document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
    document.getElementById("totalPedido").innerText = `Total: R$ 0,00`;
  }
}

/* ===== CRIAR PEDIDO ===== */
async function criarPedidoSeNecessario(){
  if(pedidoAtual) return true;

  const { data, error } = await supabase
    .from("pedidos")
    .insert({
      app_id: APP_ID,
      mesa_id: mesaId,
      status: "aberto",
      origem: "mesa"
    })
    .select()
    .single();

  if(error){
    console.error("Erro ao criar pedido:", error);
    alert("Erro ao criar pedido.");
    return false;
  }

  pedidoAtual = data;
  document.getElementById("btnLiberar").classList.remove("bloqueado");
  ativarRealtimeNotificacao();
  return true;
}

/* ===== PRODUTOS ===== */
async function carregarProdutos(){
  const { data, error } = await supabase
    .from("produtos")
    .select("id,nome,preco,destino")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if(error){
    console.error("Erro ao carregar produtos:", error);
    document.getElementById("listaProdutos").innerHTML =
      `<div class="msg-vazio">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = data || [];
  aplicarFiltros();
}

function atualizarBotoesFiltro(){
  document.getElementById("fBar").classList.toggle("ativo", destinoSelecionado === "bar");
  document.getElementById("fCozinha").classList.toggle("ativo", destinoSelecionado === "cozinha");
}

function aplicarFiltros(){
  atualizarBotoesFiltro();

  const texto = document.getElementById("busca").value?.toLowerCase() || "";

  const lista = produtosCache.filter(p =>
    (p.nome || "").toLowerCase().includes(texto) &&
    p.destino === destinoSelecionado
  );

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if(lista.length === 0){
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado</div>`;
    return;
  }

  lista.forEach(p => {
    div.innerHTML += `
      <div class="produto">
        <span>${p.nome} - R$ ${Number(p.preco || 0).toFixed(2)}</span>
        <button data-id="${p.id}">➕</button>
      </div>
    `;
  });

  div.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => addProduto(btn.dataset.id);
  });
}

/* ===== ADICIONAR PRODUTO ===== */
async function addProduto(produtoId){
  const ok = await criarPedidoSeNecessario();
  if(!ok) return;

  const produto = produtosCache.find(p => p.id === produtoId);
  if(!produto) return;

  const { error } = await supabase.from("pedido_itens").insert({
    app_id: APP_ID,
    pedido_id: pedidoAtual.id,
    produto_id: produto.id,
    nome_produto: produto.nome,
    preco: produto.preco,
    quantidade: 1,
    destino: produto.destino,
    status: "novo"
  });

  if(error){
    console.error("Erro ao adicionar item:", error);
    alert("Erro ao adicionar produto.");
    return;
  }

  await carregarPedido();
}

/* ===== CARREGAR PEDIDO ===== */
async function carregarPedido(){
  if(!pedidoAtual) return;

  const { data, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending: true });

  if(error){
    console.error("Erro ao carregar itens:", error);
    return;
  }

  const div = document.getElementById("pedido");
  div.innerHTML = "";
  let total = 0;

  if(!data || data.length === 0){
    div.innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
  }

  (data || []).forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);
    div.innerHTML += `
      <div class="item">
        ${i.nome_produto} x ${i.quantidade}
      </div>
    `;
  });

  document.getElementById("totalPedido").innerText = `Total: R$ ${total.toFixed(2)}`;
}

/* ===== ENVIAR ===== */
const btnEnviar = document.getElementById("btnEnviar");
if(btnEnviar){
  btnEnviar.onclick = async () => {
    if(!pedidoAtual){
      alert("Nenhum pedido criado.");
      return;
    }

    const { error } = await supabase
      .from("pedidos")
      .update({ status:"novo" })
      .eq("id", pedidoAtual.id)
      .eq("app_id", APP_ID);

    if(error){
      console.error("Erro ao enviar pedido:", error);
      alert("Erro ao enviar pedido.");
      return;
    }

    alert("Pedido enviado!");
  };
}

/* ===== PEDIR CONTA ===== */
const btnConta = document.getElementById("btnConta");
if(btnConta){
  btnConta.onclick = async () => {
    if(!pedidoAtual){
      alert("Nenhum pedido criado.");
      return;
    }

    const { error } = await supabase
      .from("pedidos")
      .update({ status:"conta_solicitada" })
      .eq("id", pedidoAtual.id)
      .eq("app_id", APP_ID);

    if(error){
      console.error("Erro ao pedir conta:", error);
      alert("Erro ao solicitar conta.");
      return;
    }

    alert("Conta solicitada!");
  };
}

/* ===== LIBERAR MESA ===== */
const btnLiberar = document.getElementById("btnLiberar");
if(btnLiberar){
  btnLiberar.onclick = async () => {
    if(!pedidoAtual){
      location.href = "mesas.html";
      return;
    }

    const { error } = await supabase
      .from("pedidos")
      .update({ status:"finalizado" })
      .eq("id", pedidoAtual.id)
      .eq("app_id", APP_ID);

    if(error){
      console.error("Erro ao liberar mesa:", error);
      alert("Erro ao liberar mesa.");
      return;
    }

    location.href = "mesas.html";
  };
}

/* ===== 🔔 NOTIFICAÇÃO REALTIME ===== */
function ativarRealtimeNotificacao(){
  if(!pedidoAtual) return;

  if(canalPedido){
    supabase.removeChannel(canalPedido);
    canalPedido = null;
  }

  canalPedido = supabase.channel("mesa-notify-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event:"UPDATE",
        schema:"public",
        table:"pedidos",
        filter:`id=eq.${pedidoAtual.id}`
      },
      payload => {
        const status = payload.new.status;

        if(status === "aceito"){
          alert("👨‍🍳 Pedido em preparo!");
        }

        if(status === "pronto"){
          alert("✅ Pedido pronto!");
        }

        if(status === "cancelado"){
          alert("❌ Pedido cancelado!");
        }
      }
    )
    .subscribe();
}

/* EVENTOS */
document.getElementById("busca").oninput = aplicarFiltros;
document.getElementById("fBar").onclick = () => {
  destinoSelecionado = "bar";
  aplicarFiltros();
};
document.getElementById("fCozinha").onclick = () => {
  destinoSelecionado = "cozinha";
  aplicarFiltros();
};

document.addEventListener("DOMContentLoaded", iniciarSistema);
</script>

</body>
</html>
