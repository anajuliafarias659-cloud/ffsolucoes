<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;font-size:20px;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}
input,select{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px;box-sizing:border-box}
.produto,.item{background:#0f172a;border-radius:14px;padding:14px;margin-bottom:12px}
button{padding:6px 12px;border:none;border-radius:8px;cursor:pointer}
.total{font-size:18px;font-weight:bold;margin:16px 0}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filtros button{background:#1e293b;color:#fff}
.filtros button.ativo{background:#2563eb}
.bloqueado{opacity:.4;pointer-events:none}
.acoes{display:flex;flex-wrap:wrap;gap:10px}
.acoes button{background:#22c55e;color:#000;padding:12px 16px}
#btnConta{background:#f59e0b;color:#000}
#btnLiberar{background:#2563eb;color:#fff}
.msg-vazio{opacity:.7;background:#0f172a;border-radius:14px;padding:14px}
small{opacity:.75;display:block}
.info-status{
  margin:10px 0 16px;
  padding:12px 14px;
  border-radius:12px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,.08);
}
.produto{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.produto-esquerda{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
  flex:1;
}
.thumb-produto,.thumb-item{
  width:54px;
  height:54px;
  border-radius:10px;
  object-fit:cover;
  background:#1e293b;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.08);
}
.produto-info,.item-info{
  min-width:0;
  flex:1;
}
.produto-info strong,.item-info strong{
  display:block;
  margin-bottom:4px;
}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.item-esquerda{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:220px;
}
.item-acoes{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.btn-menor{background:#f59e0b;color:#000;font-weight:bold}
.btn-maior{background:#22c55e;color:#000;font-weight:bold}
.btn-remover{background:#ef4444;color:#fff;font-weight:bold}
.qtd-badge{
  min-width:34px;
  text-align:center;
  font-weight:bold;
  background:#1e293b;
  padding:8px 10px;
  border-radius:8px;
}
.card-sessao{
  background:#0f172a;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.08);
}
.card-sessao h3{
  margin-top:0;
}
#boxCliente{
  display:none;
}
.badge{
  display:inline-block;
  background:#1e293b;
  color:#fff;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
  margin-top:6px;
}
.historico-bloco{
  background:#0f172a;
  border-radius:14px;
  padding:14px;
  margin-top:14px;
}
.historico-bloco h4{
  margin:0 0 10px 0;
}
.linha-historico{
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.linha-historico:last-child{
  border-bottom:none;
}
.oculto{display:none}
</style>
</head>

<body>

<div class="topo" id="tituloMesa">🍽️ Mesa</div>

<div class="container">

  <div class="card-sessao" id="cardSessao">
    <h3>Identificação do atendimento</h3>

    <select id="tipoAtendimento">
      <option value="garcom">👨‍🍳 Garçom</option>
      <option value="cliente">📱 Cliente</option>
    </select>

    <div id="boxGarcomInfo">
      <small>Os itens serão lançados no nome do garçom logado.</small>
    </div>

    <div id="boxCliente">
      <input id="clienteNome" placeholder="Nome do cliente">
      <input id="clienteTelefone" placeholder="Celular do cliente">
    </div>

    <button id="btnIniciarSessao" style="background:#22c55e;color:#000;padding:12px 16px;width:100%">✅ Iniciar atendimento</button>
    <small id="sessaoAtualInfo" style="margin-top:10px"></small>
  </div>

  <input id="busca" placeholder="🔍 Buscar produto">
  <div class="filtros" id="filtrosCategorias"></div>

  <h3>Produtos</h3>
  <div id="listaProdutos"></div>

  <h3>Pedido da mesa</h3>
  <div id="statusPedido" class="info-status" style="display:none;"></div>
  <div id="pedido"></div>

  <div class="historico-bloco" id="historicoPorResponsavel" style="display:none;"></div>

  <div class="total" id="totalPedido">Total: R$ 0,00</div>

  <div class="acoes">
    <button id="btnEnviar">📨 Enviar pedido</button>
    <button id="btnConta">🧾 Pedir conta</button>
    <button id="btnLiberar" class="bloqueado">🔓 Liberar mesa</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const params = new URLSearchParams(location.search);
const mesaId = params.get("mesa");

let APP_ID = null;
let USUARIO_LOGADO = null;
let pedidoAtual = null;
let produtosCache = [];
let categoriasCache = [];
let categoriaSelecionada = null;
let canalPedido = null;

const CHAVE_SESSAO = `mesa_sessao_${mesaId}`;
let sessaoLocal = null;

if (!mesaId) {
  alert("Mesa não informada.");
  history.back();
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function gerarToken() {
  return "tok_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function agoraISO() {
  return new Date().toISOString();
}

function adicionarMinutosISO(minutos) {
  return new Date(Date.now() + minutos * 60000).toISOString();
}

function nomeStatus(status) {
  const mapa = {
    aberto: "Aberto",
    novo: "Enviado",
    aceito: "Em preparo",
    pronto: "Pronto",
    conta_solicitada: "Conta solicitada",
    pago: "Pago",
    finalizado: "Finalizado",
    cancelado: "Cancelado"
  };
  return mapa[status] || status || "-";
}

function podeLiberarMesa(status) {
  return status === "pago" || status === "finalizado" || status === "cancelado";
}

function pedidoBloqueadoParaEdicao() {
  if (!pedidoAtual) return false;
  return ["pago", "finalizado", "cancelado"].includes(pedidoAtual.status);
}

function limparTelaPedido() {
  document.getElementById("pedido").innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
  document.getElementById("totalPedido").innerText = `Total: ${formatarMoeda(0)}`;
  document.getElementById("historicoPorResponsavel").style.display = "none";
  document.getElementById("historicoPorResponsavel").innerHTML = "";
}

function atualizarBotaoLiberar() {
  const btn = document.getElementById("btnLiberar");

  if (!pedidoAtual) {
    btn.classList.remove("bloqueado");
    return;
  }

  if (podeLiberarMesa(pedidoAtual.status)) {
    btn.classList.remove("bloqueado");
  } else {
    btn.classList.add("bloqueado");
  }
}

function atualizarInfoStatus() {
  const div = document.getElementById("statusPedido");

  if (!pedidoAtual) {
    div.style.display = "none";
    div.innerHTML = "";
    return;
  }

  div.style.display = "block";

  const expiraInfo = pedidoAtual.sessao_expira_em
    ? `<br><small>Sessão expira em: ${new Date(pedidoAtual.sessao_expira_em).toLocaleString("pt-BR")}</small>`
    : "";

  if (podeLiberarMesa(pedidoAtual.status)) {
    div.innerHTML = `Status do pedido: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>A mesa já pode ser liberada.</small>${expiraInfo}`;
  } else {
    div.innerHTML = `Status do pedido: <strong>${nomeStatus(pedidoAtual.status)}</strong><br><small>A mesa só pode ser liberada após pagamento, cancelamento ou finalização.</small>${expiraInfo}`;
  }
}

function encerrarPedidoNaTela() {
  pedidoAtual = null;
  sessaoLocal = null;
  localStorage.removeItem(CHAVE_SESSAO);
  atualizarSessaoNaTela();
  atualizarBotaoLiberar();
  atualizarInfoStatus();
  limparTelaPedido();

  if (canalPedido) {
    supabase.removeChannel(canalPedido);
    canalPedido = null;
  }
}

function obterImagemProduto(produto) {
  if (!produto) return "https://via.placeholder.com/80x80?text=Produto";

  let imgs = [];
  try {
    imgs = JSON.parse(produto.imagens || "[]");
  } catch {
    imgs = [];
  }

  return imgs[0] || "https://via.placeholder.com/80x80?text=Produto";
}

function obterCategoriaProduto(produto) {
  return String(
    produto.categoria_nome ||
    produto.categoria ||
    produto.categoria_id ||
    "Sem categoria"
  );
}

function carregarSessaoLocal() {
  try {
    sessaoLocal = JSON.parse(localStorage.getItem(CHAVE_SESSAO) || "null");
  } catch {
    sessaoLocal = null;
  }
}

function salvarSessaoLocal(sessao) {
  sessaoLocal = sessao;
  localStorage.setItem(CHAVE_SESSAO, JSON.stringify(sessao));
  atualizarSessaoNaTela();
}

function atualizarSessaoNaTela() {
  const info = document.getElementById("sessaoAtualInfo");

  if (!sessaoLocal) {
    info.innerHTML = "Nenhuma sessão ativa nesta mesa.";
    return;
  }

  const origem = sessaoLocal.tipo_atendimento === "garcom" ? "Garçom" : "Cliente";
  const nome = sessaoLocal.responsavel_nome || "-";
  const fone = sessaoLocal.cliente_telefone ? ` | ${sessaoLocal.cliente_telefone}` : "";
  info.innerHTML = `
    <span class="badge">${origem}</span>
    <span class="badge">${nome}${fone}</span>
  `;
}

function sessaoExpiradaLocal() {
  if (!sessaoLocal?.sessao_expira_em) return false;
  return new Date(sessaoLocal.sessao_expira_em).getTime() < Date.now();
}

async function validarSessao() {
  const { data, error } = await supabase.auth.getSession();

  if (error || !data.session) {
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabase
    .from("usuarios")
    .select("id, app_id, nome")
    .eq("id", userId)
    .single();

  if (erroUsuario || !usuario) {
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  APP_ID = usuario.app_id;
  USUARIO_LOGADO = usuario;
  return true;
}

async function iniciarSistema() {
  carregarSessaoLocal();
  atualizarSessaoNaTela();

  const ok = await validarSessao();
  if (!ok) return;

  await carregarMesa();
  await carregarProdutos();
  await verificarPedidoExistente();
}

async function carregarMesa() {
  const { data } = await supabase
    .from("mesas")
    .select("numero_mesa")
    .eq("id", mesaId)
    .maybeSingle();

  if (data) {
    document.getElementById("tituloMesa").innerText = `🍽️ Mesa ${data.numero_mesa}`;
  }
}

async function verificarPedidoExistente() {
  const { data, error } = await supabase
    .from("pedidos")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", APP_ID)
    .not("status", "in", '("finalizado","pago","cancelado")')
    .order("created_at", { ascending: false })
    .limit(1)
    .maybeSingle();

  if (error) {
    console.error(error);
  }

  if (data) {
    pedidoAtual = data;

    if (pedidoAtual.sessao_token) {
      salvarSessaoLocal({
        sessao_token: pedidoAtual.sessao_token,
        tipo_atendimento: pedidoAtual.tipo_atendimento,
        responsavel_nome: pedidoAtual.responsavel_nome,
        cliente_nome: pedidoAtual.cliente_nome,
        cliente_telefone: pedidoAtual.cliente_telefone,
        sessao_expira_em: pedidoAtual.sessao_expira_em
      });
    }

    atualizarBotaoLiberar();
    atualizarInfoStatus();
    ativarRealtimeNotificacao();
    await carregarPedido();
  } else {
    encerrarPedidoNaTela();
  }
}

async function iniciarAtendimentoManual() {
  const tipo = document.getElementById("tipoAtendimento").value;

  let responsavelNome = "";
  let clienteNome = null;
  let clienteTelefone = null;

  if (tipo === "garcom") {
    responsavelNome = USUARIO_LOGADO?.nome || "Garçom";
  } else {
    clienteNome = document.getElementById("clienteNome").value.trim();
    clienteTelefone = document.getElementById("clienteTelefone").value.trim();

    if (!clienteNome || !clienteTelefone) {
      alert("Preencha nome e celular do cliente.");
      return;
    }

    responsavelNome = clienteNome;
  }

  const sessao = {
    sessao_token: gerarToken(),
    tipo_atendimento: tipo,
    responsavel_nome: responsavelNome,
    cliente_nome: clienteNome,
    cliente_telefone: clienteTelefone,
    sessao_expira_em: adicionarMinutosISO(60)
  };

  salvarSessaoLocal(sessao);

  if (pedidoAtual && !podeLiberarMesa(pedidoAtual.status)) {
    const { error } = await supabase
      .from("pedidos")
      .update({
        sessao_token: sessao.sessao_token,
        tipo_atendimento: sessao.tipo_atendimento,
        responsavel_nome: sessao.responsavel_nome,
        cliente_nome: sessao.cliente_nome,
        cliente_telefone: sessao.cliente_telefone,
        sessao_expira_em: sessao.sessao_expira_em,
        sessao_status: "ativa"
      })
      .eq("id", pedidoAtual.id)
      .eq("app_id", APP_ID);

    if (error) {
      console.error(error);
      alert("Erro ao atualizar atendimento.");
      return;
    }

    pedidoAtual = {
      ...pedidoAtual,
      ...sessao,
      sessao_status: "ativa"
    };

    atualizarInfoStatus();
  }

  alert("Atendimento iniciado com sucesso!");
}

async function validarSessaoPedido() {
  if (!sessaoLocal) {
    alert("Inicie o atendimento antes de lançar itens.");
    return false;
  }

  if (sessaoExpiradaLocal()) {
    alert("A sessão expirou. Inicie um novo atendimento.");
    localStorage.removeItem(CHAVE_SESSAO);
    sessaoLocal = null;
    atualizarSessaoNaTela();
    return false;
  }

  if (pedidoAtual?.sessao_expira_em && new Date(pedidoAtual.sessao_expira_em).getTime() < Date.now()) {
    alert("A sessão deste pedido expirou. Inicie um novo atendimento.");
    return false;
  }

  return true;
}

async function renovarExpiracaoSessao() {
  if (!sessaoLocal || !pedidoAtual) return;

  const novaExpiracao = adicionarMinutosISO(60);

  sessaoLocal.sessao_expira_em = novaExpiracao;
  salvarSessaoLocal(sessaoLocal);

  const { error } = await supabase
    .from("pedidos")
    .update({
      sessao_expira_em: novaExpiracao,
      sessao_status: "ativa"
    })
    .eq("id", pedidoAtual.id)
    .eq("app_id", APP_ID);

  if (error) {
    console.error(error);
  } else {
    pedidoAtual.sessao_expira_em = novaExpiracao;
    pedidoAtual.sessao_status = "ativa";
    atualizarInfoStatus();
  }
}

async function criarPedidoSeNecessario() {
  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return false;

  if (pedidoAtual && !podeLiberarMesa(pedidoAtual.status)) return true;

  if (pedidoAtual && podeLiberarMesa(pedidoAtual.status)) {
    pedidoAtual = null;
  }

  const { data, error } = await supabase
    .from("pedidos")
    .insert({
      app_id: APP_ID,
      mesa_id: mesaId,
      status: "aberto",
      origem: "mesa",
      sessao_token: sessaoLocal.sessao_token,
      sessao_status: "ativa",
      sessao_expira_em: sessaoLocal.sessao_expira_em,
      cliente_nome: sessaoLocal.cliente_nome,
      cliente_telefone: sessaoLocal.cliente_telefone,
      responsavel_nome: sessaoLocal.responsavel_nome,
      tipo_atendimento: sessaoLocal.tipo_atendimento
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Erro ao criar pedido.");
    return false;
  }

  pedidoAtual = data;
  atualizarBotaoLiberar();
  atualizarInfoStatus();
  ativarRealtimeNotificacao();
  return true;
}

async function carregarProdutos() {
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .eq("ativo", true)
    .order("nome");

  if (error) {
    console.error(error);
    document.getElementById("listaProdutos").innerHTML = `<div class="msg-vazio">Erro ao carregar produtos</div>`;
    return;
  }

  produtosCache = (data || []).map(p => ({
    ...p,
    categoria_exibicao: obterCategoriaProduto(p),
    imagem_exibicao: obterImagemProduto(p)
  }));

  montarCategoriasPelosProdutos();
  aplicarFiltros();
}

function montarCategoriasPelosProdutos() {
  const mapa = new Map();

  produtosCache.forEach(p => {
    const chave = obterCategoriaProduto(p);
    if (!mapa.has(chave)) {
      mapa.set(chave, { id: chave, nome: chave });
    }
  });

  categoriasCache = Array.from(mapa.values());

  if (!categoriaSelecionada && categoriasCache.length > 0) {
    categoriaSelecionada = categoriasCache[0].id;
  }

  renderizarBotoesCategorias();
}

function renderizarBotoesCategorias() {
  const div = document.getElementById("filtrosCategorias");
  div.innerHTML = "";

  if (categoriasCache.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhuma categoria encontrada nos produtos</div>`;
    return;
  }

  categoriasCache.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.nome;
    if (categoriaSelecionada === cat.id) btn.classList.add("ativo");
    btn.onclick = () => {
      categoriaSelecionada = cat.id;
      renderizarBotoesCategorias();
      aplicarFiltros();
    };
    div.appendChild(btn);
  });
}

function aplicarFiltros() {
  const texto = (document.getElementById("busca").value || "").toLowerCase();

  const lista = produtosCache.filter(p => {
    const nomeOk = (p.nome || "").toLowerCase().includes(texto);
    const categoriaOk = !categoriaSelecionada || obterCategoriaProduto(p) === categoriaSelecionada;
    return nomeOk && categoriaOk;
  });

  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  if (lista.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum produto encontrado</div>`;
    return;
  }

  lista.forEach(p => {
    const imgPrincipal = obterImagemProduto(p);

    const card = document.createElement("div");
    card.className = "produto";
    card.innerHTML = `
      <div class="produto-esquerda">
        <img class="thumb-produto" src="${imgPrincipal}" alt="${p.nome}" onerror="this.onerror=null;this.src='https://via.placeholder.com/80x80?text=Produto'">
        <div class="produto-info">
          <strong>${p.nome}</strong>
          <small>${formatarMoeda(p.preco)}</small>
          <small>${p.categoria_exibicao}</small>
        </div>
      </div>
      <button data-id="${p.id}">➕</button>
    `;
    card.querySelector("button").onclick = () => addProduto(p.id);
    div.appendChild(card);
  });
}

async function addProduto(produtoId) {
  const ok = await criarPedidoSeNecessario();
  if (!ok) return;

  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return;

  const produto = produtosCache.find(p => String(p.id) === String(produtoId));
  if (!produto) return;

  if (pedidoAtual && podeLiberarMesa(pedidoAtual.status)) {
    alert("Esse pedido já foi encerrado. Atualize a página.");
    return;
  }

  const { error: erroInsert } = await supabase
    .from("pedido_itens")
    .insert({
      app_id: APP_ID,
      pedido_id: pedidoAtual.id,
      produto_id: produto.id,
      nome_produto: produto.nome,
      preco: Number(produto.preco || 0),
      quantidade: 1,
      status: "novo",
      responsavel_nome: sessaoLocal.responsavel_nome,
      cliente_nome: sessaoLocal.cliente_nome,
      cliente_telefone: sessaoLocal.cliente_telefone,
      tipo_origem: sessaoLocal.tipo_atendimento,
      sessao_token: sessaoLocal.sessao_token
    });

  if (erroInsert) {
    console.error(erroInsert);
    alert("Erro ao adicionar produto.");
    return;
  }

  await renovarExpiracaoSessao();
  await carregarPedido();
}

async function aumentarItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este pedido.");
    return;
  }

  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return;

  const novaQtd = Number(item.quantidade || 0) + 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao aumentar item.");
    return;
  }

  await renovarExpiracaoSessao();
  await carregarPedido();
}

async function diminuirItem(item) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível alterar este pedido.");
    return;
  }

  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return;

  const qtd = Number(item.quantidade || 0);

  if (qtd <= 1) {
    await removerItem(item.id);
    return;
  }

  const novaQtd = qtd - 1;

  const { error } = await supabase
    .from("pedido_itens")
    .update({ quantidade: novaQtd })
    .eq("id", item.id)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao diminuir item.");
    return;
  }

  await renovarExpiracaoSessao();
  await carregarPedido();
}

async function removerItem(itemId) {
  if (!pedidoAtual || pedidoBloqueadoParaEdicao()) {
    alert("Não é possível remover item deste pedido.");
    return;
  }

  const sessaoOk = await validarSessaoPedido();
  if (!sessaoOk) return;

  const { error } = await supabase
    .from("pedido_itens")
    .delete()
    .eq("id", itemId)
    .eq("pedido_id", pedidoAtual.id);

  if (error) {
    console.error(error);
    alert("Erro ao remover item.");
    return;
  }

  await renovarExpiracaoSessao();
  await carregarPedido();
}

function renderizarHistoricoPorResponsavel(itens) {
  const box = document.getElementById("historicoPorResponsavel");

  if (!itens || itens.length === 0) {
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  const grupos = {};

  itens.forEach(i => {
    const tipo = i.tipo_origem === "garcom" ? "Garçom" : "Cliente";
    const nome = i.responsavel_nome || i.cliente_nome || "Sem nome";
    const chave = `${tipo} - ${nome}`;

    if (!grupos[chave]) grupos[chave] = [];
    grupos[chave].push(i);
  });

  let html = `<h4>Histórico por responsável</h4>`;

  Object.keys(grupos).forEach(chave => {
    let subtotalGrupo = 0;
    html += `<div style="margin-bottom:12px"><strong>${chave}</strong>`;

    grupos[chave].forEach(i => {
      const subtotal = Number(i.preco || 0) * Number(i.quantidade || 0);
      subtotalGrupo += subtotal;
      html += `
        <div class="linha-historico">
          ${i.quantidade}x ${i.nome_produto} — ${formatarMoeda(subtotal)}
        </div>
      `;
    });

    html += `<small>Total de ${chave}: ${formatarMoeda(subtotalGrupo)}</small></div>`;
  });

  box.innerHTML = html;
  box.style.display = "block";
}

async function carregarPedido() {
  if (!pedidoAtual) {
    limparTelaPedido();
    return;
  }

  if (podeLiberarMesa(pedidoAtual.status)) {
    encerrarPedidoNaTela();
    return;
  }

  const { data, error } = await supabase
    .from("pedido_itens")
    .select("*")
    .eq("pedido_id", pedidoAtual.id)
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const itens = data || [];
  const div = document.getElementById("pedido");
  div.innerHTML = "";
  let total = 0;

  if (itens.length === 0) {
    div.innerHTML = `<div class="msg-vazio">Nenhum item no pedido ainda</div>`;
  }

  itens.forEach(i => {
    total += Number(i.preco || 0) * Number(i.quantidade || 0);

    const bloqueado = pedidoBloqueadoParaEdicao();
    const produtoRel = produtosCache.find(p => String(p.id) === String(i.produto_id)) || null;
    const imgItem = produtoRel ? obterImagemProduto(produtoRel) : "https://via.placeholder.com/80x80?text=Produto";
    const origemTexto = i.tipo_origem === "garcom" ? "Garçom" : "Cliente";
    const nomeResponsavel = i.responsavel_nome || i.cliente_nome || "-";

    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <div class="item-esquerda">
        <img class="thumb-item" src="${imgItem}" alt="${i.nome_produto}" onerror="this.onerror=null;this.src='https://via.placeholder.com/80x80?text=Produto'">
        <div class="item-info">
          <strong>${i.nome_produto}</strong>
          <small>Valor unitário: ${formatarMoeda(i.preco)}</small>
          <small>Subtotal: ${formatarMoeda(Number(i.preco || 0) * Number(i.quantidade || 0))}</small>
          <small>${origemTexto}: ${nomeResponsavel}</small>
        </div>
      </div>

      <div class="item-acoes">
        <button class="btn-menor" ${bloqueado ? "disabled" : ""}>➖</button>
        <div class="qtd-badge">${i.quantidade}</div>
        <button class="btn-maior" ${bloqueado ? "disabled" : ""}>➕</button>
        <button class="btn-remover" ${bloqueado ? "disabled" : ""}>🗑 Remover</button>
      </div>
    `;

    const botoes = item.querySelectorAll("button");
    botoes[0].onclick = () => diminuirItem(i);
    botoes[1].onclick = () => aumentarItem(i);
    botoes[2].onclick = () => removerItem(i.id);

    div.appendChild(item);
  });

  renderizarHistoricoPorResponsavel(itens);
  document.getElementById("totalPedido").innerText = `Total: ${formatarMoeda(total)}`;
}

function ativarRealtimeNotificacao() {
  if (!pedidoAtual) return;

  if (canalPedido) {
    supabase.removeChannel(canalPedido);
    canalPedido = null;
  }

  canalPedido = supabase
    .channel("mesa-notify-" + pedidoAtual.id)
    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "pedidos",
        filter: `id=eq.${pedidoAtual.id}`
      },
      async payload => {
        const status = payload.new.status;
        pedidoAtual = { ...pedidoAtual, ...payload.new };

        if (status === "aceito") alert("👨‍🍳 Pedido em preparo!");
        if (status === "pronto") alert("✅ Pedido pronto!");
        if (status === "cancelado") {
          alert("❌ Pedido cancelado!");
          encerrarPedidoNaTela();
          return;
        }
        if (status === "pago") {
          alert("💰 Pedido pago! Sessão encerrada e mesa livre.");
          encerrarPedidoNaTela();
          return;
        }
        if (status === "finalizado") {
          encerrarPedidoNaTela();
          return;
        }

        atualizarBotaoLiberar();
        atualizarInfoStatus();
        await carregarPedido();
      }
    )
    .subscribe();
}
