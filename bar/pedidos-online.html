
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
  padding:12px;
}

.topo{
  max-width:100%;
  margin:0 auto 16px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.voltar{
  background:#1e293b;
  color:#fff;
}

h2{
  text-align:center;
  margin-top:24px;
  margin-bottom:14px;
  font-size:20px;
}

.topo-filtro{
  max-width:100%;
  margin:0 auto 16px auto;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}

select,input{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:#fff;
  border:1px solid #1e293b;
}

#listaPedidos,
#listaHistorico{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  max-width:1400px;
  margin:0 auto;
}

.card-resumo{
  background:linear-gradient(180deg,#0f172a,#111827);
  border:1px solid #1e293b;
  border-radius:16px;
  padding:12px;
  cursor:pointer;
  transition:.2s;
  min-width:0;
  position:relative;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.card-resumo:hover{
  transform:translateY(-2px);
  border-color:#334155;
}

.card-resumo.mesa{
  border-color:#f59e0b;
  box-shadow:0 0 0 1px rgba(245,158,11,.14), 0 8px 20px rgba(0,0,0,.18);
}

.card-topo{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

.card-numero{
  font-size:15px;
  font-weight:bold;
  color:#fff;
  line-height:1.3;
}

.card-datahora{
  font-size:11px;
  color:#94a3b8;
  text-align:right;
  line-height:1.35;
  white-space:nowrap;
}

.card-linha{
  font-size:12px;
  color:#cbd5e1;
  margin-top:4px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.card-status{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.mini-tag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:bold;
}

.tag-vitrine{
  background:#0ea5e9;
  color:#00111a;
}

.tag-mesa{
  background:#f59e0b;
  color:#111827;
}

.tag-status-novo{ background:#22c55e; color:#052e16; }
.tag-status-pago{ background:#38bdf8; color:#082f49; }
.tag-status-aceito{ background:#facc15; color:#422006; }
.tag-status-historico{ background:#64748b; color:#fff; }
.tag-status-cancelado{ background:#ef4444; color:#fff; }

.vazio{
  text-align:center;
  color:#94a3b8;
  margin-top:10px;
  grid-column:1 / -1;
  padding:20px 10px;
}

button{
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:0;
  margin-right:0;
  font-weight:bold;
  font-size:12px;
}

.btn-pago{ background:#38bdf8; color:#000; }
.btn-aceitar{ background:#22c55e; color:#000; }
.btn-historico{ background:#64748b; color:#fff; }
.btn-excluir{ background:#ef4444; color:#fff; }
.btn-cancelar{ background:#f97316; color:#fff; }
.btn-envio{ background:#a855f7; color:#fff; }
.btn-entrega{ background:#14b8a6; color:#fff; }
.btn-imprimir-bar{ background:#7c3aed; color:#fff; }
.btn-imprimir-cozinha{ background:#dc2626; color:#fff; }
.btn-imprimir-geral{ background:#f59e0b; color:#111827; }
.btn-imprimir-novos{ background:#fde047; color:#111827; }
.btn-marcar-novos{ background:#eab308; color:#111827; }
.btn-recolher{
  background:#1e293b;
  color:#fff;
}

.modal-detalhe{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.82);
  z-index:9999;
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:0;
}

.modal-detalhe.ativo{
  display:flex;
}

.modal-card{
  width:min(100%, 760px);
  max-height:92vh;
  overflow:auto;
  background:#020617;
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  border:1px solid #1e293b;
  box-shadow:0 -10px 40px rgba(0,0,0,.45);
  padding:14px;
}

.modal-topo{
  position:sticky;
  top:0;
  z-index:5;
  background:#020617;
  padding-bottom:10px;
  margin-bottom:10px;
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.modal-titulo{
  font-size:16px;
  font-weight:bold;
}

.pedido-detalhado{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:12px;
  border-radius:14px;
  margin:0;
  max-width:none;
  min-width:0;
  font-size:13px;
  line-height:1.45;
  overflow:hidden;
}

.pedido-detalhado.mesa{
  border:1px solid #f59e0b;
  box-shadow:0 0 0 1px rgba(245,158,11,.15);
}

.status{
  font-weight:bold;
  margin-bottom:8px;
  font-size:13px;
}

.novo{ color:#22c55e; }
.pago{ color:#38bdf8; }
.aceito{ color:#facc15; }
.historico{ color:#94a3b8; }
.cancelado{ color:#ef4444; }

.tag-origem{
  display:inline-block;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.origem-box{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}

.subtag{
  display:inline-block;
  padding:4px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:bold;
  background:#1e293b;
  color:#fff;
}

.resumo-mesa{
  margin-top:8px;
  margin-bottom:8px;
  padding:8px;
  background:#111827;
  border:1px solid #334155;
  border-radius:10px;
  font-size:12px;
}

.novos-itens-box{
  margin-top:10px;
  margin-bottom:10px;
  padding:10px;
  background:#3f2f00;
  border:1px solid #facc15;
  border-radius:12px;
}

.novos-itens-titulo{
  font-weight:bold;
  color:#fde68a;
  margin-bottom:8px;
  font-size:12px;
}

.itens-antigos-box{
  margin-top:10px;
  margin-bottom:10px;
  padding:10px;
  background:#111827;
  border:1px solid #334155;
  border-radius:12px;
}

.itens-antigos-titulo{
  font-weight:bold;
  color:#cbd5e1;
  margin-bottom:8px;
  font-size:12px;
}

.tag-setor{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
  margin:4px 6px 0 0;
}
.tag-bar{ background:#7c3aed; color:#fff; }
.tag-cozinha{ background:#dc2626; color:#fff; }

.bloco-setor{
  margin-top:8px;
  padding:8px;
  border:1px solid #334155;
  border-radius:10px;
  background:#111827;
}

.bloco-setor h4{
  margin:0 0 6px 0;
  font-size:12px;
}

.item-comanda{
  padding:7px 8px;
  border-radius:8px;
  background:#0b1220;
  border:1px solid #1f2937;
  margin-top:6px;
  font-size:12px;
}

.item-comanda small{
  color:#cbd5e1;
}

.entrega-box{
  margin-top:10px;
  padding:10px;
  border:1px solid #334155;
  border-radius:10px;
  background:#111827;
  font-size:12px;
}

.rastreio-input{
  width:100%;
  margin-top:8px;
  box-sizing:border-box;
  font-size:12px;
}

.linha-botoes{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
  margin-top:10px;
}

.pedido-detalhado hr{
  border:none;
  border-top:1px solid #1e293b;
  margin:10px 0;
}

.pedido-detalhado a{
  word-break:break-word;
}

@media (min-width: 900px){
  #listaPedidos,
  #listaHistorico{
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
  }

  .linha-botoes{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .modal-detalhe{
    align-items:center;
    padding:20px;
  }

  .modal-card{
    border-radius:18px;
    max-height:94vh;
  }
}

@media (max-width: 560px){
  body{
    padding:10px;
  }

  #listaPedidos,
  #listaHistorico{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
  }

  h2{
    font-size:18px;
  }

  button{
    font-size:11px;
    padding:7px 8px;
  }

  select,input{
    padding:9px;
    font-size:12px;
  }

  .card-resumo{
    padding:10px;
  }

  .card-numero{
    font-size:14px;
  }

  .modal-card{
    width:100%;
    max-height:94vh;
    border-top-left-radius:18px;
    border-top-right-radius:18px;
    border-bottom-left-radius:0;
    border-bottom-right-radius:0;
  }
}
</style>
</head>
<body>

<div class="topo">
  <h2>📦 Pedidos</h2>
  <button class="voltar" onclick="history.back()">⬅ Voltar</button>
</div>

<h2>📦 Pedidos Ativos</h2>
<div id="listaPedidos"></div>

<h2>📁 Histórico</h2>

<div class="topo-filtro">
  <label for="filtroHistorico">Filtrar histórico:</label>
  <select id="filtroHistorico">
    <option value="todos">Todos</option>
    <option value="pago">Pago</option>
    <option value="aceito">Aceito</option>
    <option value="historico">Histórico</option>
    <option value="cancelado">Cancelado</option>
  </select>
</div>

<div id="listaHistorico"></div>

<div class="modal-detalhe" id="modalDetalhe">
  <div class="modal-card">
    <div class="modal-topo">
      <div class="modal-titulo" id="modalTitulo">Detalhes do pedido</div>
      <button class="btn-recolher" onclick="fecharDetalhe()">⬇ Recolher</button>
    </div>
    <div id="conteudoDetalhe"></div>
  </div>
</div>

<audio id="somNovoPedido" preload="auto" src="/sons/novo-pedido.mp3"></audio>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let pedidosCache = [];
let pausadoAutoRefresh = false;
let estadoAvisosAnterior = {
  pedidosAtivos: new Set(),
  novosMesaPorPedido: {}
};
let primeiraCargaPedidos = true;

const listaPedidos = document.getElementById("listaPedidos");
const listaHistorico = document.getElementById("listaHistorico");
const filtroHistorico = document.getElementById("filtroHistorico");
const modalDetalhe = document.getElementById("modalDetalhe");
const conteudoDetalhe = document.getElementById("conteudoDetalhe");
const modalTitulo = document.getElementById("modalTitulo");
const somNovoPedido = document.getElementById("somNovoPedido");

function liberarAudio(){
  if(audioLiberado || !somNovoPedido) return;

  somNovoPedido.volume = 1;
  somNovoPedido.muted = true;

  somNovoPedido.play()
    .then(() => {
      somNovoPedido.pause();
      somNovoPedido.currentTime = 0;
      somNovoPedido.muted = false;
      audioLiberado = true;
      console.log("Áudio liberado");
    })
    .catch((err) => {
      console.warn("Áudio ainda bloqueado:", err);
    });
}

function tocarSomNovoPedido(){
  if(!somNovoPedido) return;

  somNovoPedido.pause();
  somNovoPedido.currentTime = 0;

  const promessa = somNovoPedido.play();
  if(promessa){
    promessa.catch((err) => {
      console.warn("Erro ao tocar som:", err);
    });
  }
}

document.addEventListener("click", liberarAudio, { passive:true });
document.addEventListener("touchstart", liberarAudio, { passive:true });

function formatarReal(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function escapeHtml(texto){
  return String(texto || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function limparNumero(numero){
  let n = String(numero || "").replace(/\D/g, "");
  if(n && !n.startsWith("55")) n = "55" + n;
  return n;
}

function abrirWhats(numero, texto){
  const numeroLimpo = limparNumero(numero);
  if (!numeroLimpo) return;
  window.open(`https://wa.me/${numeroLimpo}?text=${encodeURIComponent(texto)}`, "_blank");
}

function statusEfetivo(p){
  const status = String(p.status || "").toLowerCase();
  const pagamentoStatus = String(p.pagamento_status || p.mp_status || "").toLowerCase();

  if (pagamentoStatus === "approved") return "pago";
  if (status === "approved") return "pago";
  if (status === "aguardando_confirmacao_pix") return "pago";

  if (status === "novo") return "novo";
  if (status === "pago") return "pago";
  if (status === "aceito") return "aceito";
  if (status === "historico") return "historico";
  if (status === "cancelado") return "cancelado";

  return status || "novo";
}

function statusBonito(status){
  switch(status){
    case "novo": return "NOVO";
    case "pago": return "PAGO";
    case "aceito": return "ACEITO";
    case "historico": return "HISTÓRICO";
    case "cancelado": return "CANCELADO";
    default: return String(status || "").toUpperCase();
  }
}

function classeStatusMini(status){
  switch(status){
    case "novo": return "tag-status-novo";
    case "pago": return "tag-status-pago";
    case "aceito": return "tag-status-aceito";
    case "historico": return "tag-status-historico";
    case "cancelado": return "tag-status-cancelado";
    default: return "tag-status-historico";
  }
}

function statusEntregaBonito(statusEntrega){
  const s = String(statusEntrega || "").trim();
  return s || "Pedido recebido";
}

function pedidoEhMesa(p){
  const origem = String(
    p.origem ||
    p.tipo ||
    p.tipo_pedido ||
    p.canal ||
    p.tipo_origem ||
    ""
  ).trim().toLowerCase();

  const temCamposOnline =
    !!p.cliente_rua ||
    !!p.cliente_numero ||
    !!p.cliente_bairro ||
    !!p.cliente_cidade ||
    !!p.cliente_estado ||
    !!p.cliente_cep ||
    !!p.cliente_localizacao ||
    !!p.codigo_acompanhamento;

  if (temCamposOnline) return false;

  if (
    origem === "delivery" ||
    origem === "entrega" ||
    origem === "retirada" ||
    origem === "online" ||
    origem === "site" ||
    origem === "vitrine"
  ){
    return false;
  }

  if (
    origem === "mesa" ||
    origem === "salão" ||
    origem === "salao" ||
    origem === "comanda" ||
    origem === "bar"
  ){
    return true;
  }

  if (p.mesa_id && !temCamposOnline) return true;

  return false;
}

function numeroMesaPedido(p){
  if (!pedidoEhMesa(p)) return "";
  return (
    p.numero_mesa_real ||
    p.numero_mesa ||
    p.mesa ||
    p.mesa_numero ||
    ""
  );
}

function nomeClientePedido(p){
  return p.cliente_nome || p.nome_cliente || p.nome || "Cliente";
}

function telefoneClientePedido(p){
  return p.cliente_telefone || p.telefone || p.whatsapp || "";
}

function nomeItem(item){
  return item.nome || item.nome_produto || item.produto_nome || item.descricao || item.titulo || "Item";
}

function qtdItem(item){
  return Number(item.qtd || item.quantidade || 0);
}

function obsItem(item){
  return item.observacao || item.obs || item.detalhes || "";
}

function corItem(item){
  return item.cor || item.variacao || item.sabor || "";
}

function setorItem(item){
  const bruto = String(item.setor || item.categoria || item.local_preparo || "").trim().toLowerCase();

  if (
    bruto.includes("cozinha") ||
    bruto.includes("cozin") ||
    bruto.includes("chapa") ||
    bruto.includes("lanche") ||
    bruto.includes("comida")
  ) return "cozinha";

  if (
    bruto.includes("bar") ||
    bruto.includes("bebida") ||
    bruto.includes("drink")
  ) return "bar";

  return "";
}

function normalizarItensPedido(pedido, itensPedidoItens){
  if (Array.isArray(itensPedidoItens) && itensPedidoItens.length) {
    return itensPedidoItens.map(i => ({
      id: i.id || "",
      nome: i.nome || i.nome_produto || i.produto_nome || i.descricao || i.titulo || "Item",
      qtd: Number(i.qtd || i.quantidade || 0),
      cor: i.cor || i.variacao || i.sabor || "",
      observacao: i.observacao || i.obs || i.detalhes || "",
      setor: i.setor || i.categoria || i.local_preparo || "",
      preco: Number(i.preco || 0),
      impresso: i.impresso === true,
      pedido_id: i.pedido_id || pedido.id || "",
      created_at: i.created_at || null
    }));
  }

  if (Array.isArray(pedido.itens) && pedido.itens.length) {
    return pedido.itens.map(i => ({
      id: i.id || "",
      nome: i.nome || i.nome_produto || i.produto_nome || i.descricao || i.titulo || "Item",
      qtd: Number(i.qtd || i.quantidade || 0),
      cor: i.cor || i.variacao || i.sabor || "",
      observacao: i.observacao || i.obs || i.detalhes || "",
      setor: i.setor || i.categoria || i.local_preparo || "",
      preco: Number(i.preco || 0),
      impresso: i.impresso === true,
      pedido_id: i.pedido_id || pedido.id || "",
      created_at: i.created_at || null
    }));
  }

  return [];
}

function calcularTotalPedido(p){
  if(p.total && Number(p.total) > 0){
    return Number(p.total);
  }

  let total = 0;
  const itens = Array.isArray(p.itens_normalizados) ? p.itens_normalizados : [];

  itens.forEach(i => {
    const preco = Number(i.preco || 0);
    const qtd = Number(i.qtd || 0);
    total += preco * qtd;
  });

  return total;
}

function quantidadeItensPedido(p){
  let qtd = 0;
  const itens = Array.isArray(p.itens_normalizados) ? p.itens_normalizados : [];

  itens.forEach(i => {
    qtd += Number(i.qtd || 0);
  });

  return qtd;
}

function separarItensMesa(p){
  const itens = Array.isArray(p.itens_normalizados) ? p.itens_normalizados : [];
  const novos = itens.filter(i => i.impresso !== true);
  const antigos = itens.filter(i => i.impresso === true);

  return { novos, antigos };
}

function contarNovosItensMesa(p){
  if (!pedidoEhMesa(p)) return 0;
  const { novos } = separarItensMesa(p);
  return novos.length;
}

function agruparItensPorSetor(itens){
  const grupos = { bar: [], cozinha: [], outros: [] };

  (Array.isArray(itens) ? itens : []).forEach(item => {
    const s = setorItem(item);
    if (s === "bar") grupos.bar.push(item);
    else if (s === "cozinha") grupos.cozinha.push(item);
    else grupos.outros.push(item);
  });

  return grupos;
}

function montarItensSimples(itens){
  if (!Array.isArray(itens) || !itens.length) return "Sem itens";

  return itens.map(i => `
    • ${escapeHtml(nomeItem(i))}
    ${corItem(i) ? `(${escapeHtml(corItem(i))})` : ""}
    x${qtdItem(i)}
    ${obsItem(i) ? ` - Obs: ${escapeHtml(obsItem(i))}` : ""}
  `).join("<br>");
}

function montarItensDetalhadoMesa(itens){
  if (!Array.isArray(itens) || !itens.length) return "Sem itens";

  const grupos = agruparItensPorSetor(itens);
  let html = "";

  if (grupos.bar.length) {
    html += `
      <div class="bloco-setor">
        <h4><span class="tag-setor tag-bar">BAR</span></h4>
        ${grupos.bar.map(i => `
          <div class="item-comanda">
            <strong>${escapeHtml(nomeItem(i))}</strong> x${qtdItem(i)}
            ${corItem(i) ? `<br><small>Variação: ${escapeHtml(corItem(i))}</small>` : ""}
            ${obsItem(i) ? `<br><small>Obs: ${escapeHtml(obsItem(i))}</small>` : ""}
          </div>
        `).join("")}
      </div>
    `;
  }

  if (grupos.cozinha.length) {
    html += `
      <div class="bloco-setor">
        <h4><span class="tag-setor tag-cozinha">COZINHA</span></h4>
        ${grupos.cozinha.map(i => `
          <div class="item-comanda">
            <strong>${escapeHtml(nomeItem(i))}</strong> x${qtdItem(i)}
            ${corItem(i) ? `<br><small>Variação: ${escapeHtml(corItem(i))}</small>` : ""}
            ${obsItem(i) ? `<br><small>Obs: ${escapeHtml(obsItem(i))}</small>` : ""}
          </div>
        `).join("")}
      </div>
    `;
  }

  if (grupos.outros.length || (!grupos.bar.length && !grupos.cozinha.length)) {
    const base = grupos.outros.length ? grupos.outros : itens;
    html += `
      <div class="bloco-setor">
        <h4>COMANDA</h4>
        ${base.map(i => `
          <div class="item-comanda">
            <strong>${escapeHtml(nomeItem(i))}</strong> x${qtdItem(i)}
            ${corItem(i) ? `<br><small>Variação: ${escapeHtml(corItem(i))}</small>` : ""}
            ${obsItem(i) ? `<br><small>Obs: ${escapeHtml(obsItem(i))}</small>` : ""}
          </div>
        `).join("")}
      </div>
    `;
  }

  return html || "Sem itens";
}

function pedidoTemSetor(p, setor){
  const itens = Array.isArray(p.itens_normalizados) ? p.itens_normalizados : [];
  return itens.some(i => setorItem(i) === setor);
}

function pedidoTemNovosItensSetor(p, setor){
  const { novos } = separarItensMesa(p);
  return novos.some(i => setorItem(i) === setor);
}

function parseDataBrasil(dataIso){
  if (!dataIso) return null;

  const texto = String(dataIso).trim();

  const temTimezone = /[zZ]$|[+\-]\d{2}:\d{2}$/.test(texto);

  const isoCorrigida = temTimezone
    ? texto
    : texto.replace(" ", "T") + "Z";

  const d = new Date(isoCorrigida);

  if (isNaN(d.getTime())) return null;
  return d;
}

function formatarDataHoraPedido(dataIso){
  const d = parseDataBrasil(dataIso);

  if(!d) return { data:"--/--/----", hora:"--:--" };

  return {
    data: d.toLocaleDateString("pt-BR", {
      timeZone: "America/Fortaleza"
    }),
    hora: d.toLocaleTimeString("pt-BR", {
      timeZone: "America/Fortaleza",
      hour:"2-digit",
      minute:"2-digit"
    })
  };
}

function formatarDataHoraCompleta(dataIso){
  const d = parseDataBrasil(dataIso);
  if (!d) return "-";

  return d.toLocaleString("pt-BR", {
    timeZone: "America/Fortaleza"
  });
}

function numeroExibicaoPedido(p){
  return p.codigo_acompanhamento || String(p.id || "").slice(0, 8) || "-";
}

function ordenarPedidos(lista){
  return [...lista].sort((a,b) => {
    const da = parseDataBrasil(a.created_at)?.getTime() || 0;
    const db = parseDataBrasil(b.created_at)?.getTime() || 0;
    return db - da;
  });
}

function renderizarPedidos(){
  listaPedidos.innerHTML = "";
  listaHistorico.innerHTML = "";

  const filtro = filtroHistorico.value;

  const ativos = ordenarPedidos(
    pedidosCache.filter(p => {
      const s = statusEfetivo(p);
      return !["historico", "cancelado"].includes(s);
    })
  );

  const historico = ordenarPedidos(
    pedidosCache.filter(p => {
      const s = statusEfetivo(p);
      if (filtro === "todos") return ["historico", "aceito", "pago", "cancelado"].includes(s);
      return s === filtro;
    })
  );

  if (!ativos.length) {
    listaPedidos.innerHTML = `<div class="vazio">Nenhum pedido ativo.</div>`;
  } else {
    ativos.forEach(p => listaPedidos.innerHTML += montarCardResumo(p, false));
  }

  if (!historico.length) {
    listaHistorico.innerHTML = `<div class="vazio">Nenhum pedido no histórico com esse filtro.</div>`;
  } else {
    historico.forEach(p => listaHistorico.innerHTML += montarCardResumo(p, true));

window.abrirDetalhe = function(id, isHistorico){

  modalDetalhe.classList.add("ativo");

};

window.fecharDetalhe = function(){
  modalDetalhe.classList.remove("ativo");

};

modalDetalhe.addEventListener("click", (e) => {

async function iniciar(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    alert("Faça login");
    return;
  }

  const { data:user, error:userErr } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  if (userErr || !user?.app_id) {
    alert("Não foi possível carregar o app_id.");
    return;
  }

  app_id = user.app_id;
  await carregarPedidos();

  setInterval(() => {
    if (!pausadoAutoRefresh) carregarPedidos();
  }, 5000);
}

async function carregarPedidos(){
  const { data: pedidos, error } = await supabase
  .from("pedidos")
  .select("*")
  .eq("app_id", app_id)
  .eq("enviado", true)
  .order("created_at", { ascending:false });

  if (error) {
    console.error(error);
    alert("Erro ao carregar pedidos.");
    return;
  }

  const idsPedidos = (pedidos || []).map(p => p.id);
  const idsMesas = [...new Set(
    (pedidos || [])
      .map(p => p.mesa_id)
      .filter(Boolean)
  )];

  let itensPorPedido = {};
  let mapaMesas = {};

  if (idsPedidos.length) {
    const { data: itensBanco, error: erroItens } = await supabase
      .from("pedido_itens")
      .select("*")
      .in("pedido_id", idsPedidos)
      .order("created_at", { ascending:true });

    if (erroItens) {
      console.error("Erro ao buscar pedido_itens:", erroItens);
    } else {
      (itensBanco || []).forEach(item => {
        const pid = item.pedido_id;
        if (!itensPorPedido[pid]) itensPorPedido[pid] = [];
        itensPorPedido[pid].push(item);
      });
    }
  }

  if (idsMesas.length) {
    const { data: mesasBanco, error: erroMesas } = await supabase
      .from("mesas")
      .select("id, numero_mesa")
      .in("id", idsMesas);

    if (erroMesas) {
      console.error("Erro ao buscar mesas:", erroMesas);
    } else {
      (mesasBanco || []).forEach(m => {
        mapaMesas[m.id] = m.numero_mesa;
      });
    }
  }

  pedidosCache = (pedidos || []).map(p => ({
    ...p,
    numero_mesa_real: p.mesa_id ? mapaMesas[p.mesa_id] || "" : "",
    itens_normalizados: normalizarItensPedido(p, itensPorPedido[p.id] || [])
  }));

      renderizarPedidos();

  const pedidosAtivosAtuais = pedidosCache.filter(p => {
    const s = statusEfetivo(p);
    return !["historico", "cancelado"].includes(s);
  });

  const idsAtivosAtuais = new Set(
    pedidosAtivosAtuais.map(p => String(p.id))
  );

  const novosMesaPorPedidoAtual = {};

  pedidosAtivosAtuais.forEach(p => {
    if (pedidoEhMesa(p)) {
      novosMesaPorPedidoAtual[String(p.id)] = contarNovosItensMesa(p);
    }
  });

  if (!primeiraCargaPedidos) {
    let deveAvisar = false;

    // 1) Pedido novo de qualquer tipo
    for (const id of idsAtivosAtuais) {
      if (!estadoAvisosAnterior.pedidosAtivos.has(id)) {
        deveAvisar = true;
        console.log("Novo pedido detectado:", id);
        break;
      }
    }

    // 2) Mesmo pedido de mesa, mas com novos itens adicionados
    if (!deveAvisar) {
      for (const pedidoId in novosMesaPorPedidoAtual) {
        const atual = Number(novosMesaPorPedidoAtual[pedidoId] || 0);
        const anterior = Number(estadoAvisosAnterior.novosMesaPorPedido[pedidoId] || 0);

        if (atual > anterior) {
          deveAvisar = true;
          console.log("Novos itens detectados na mesa:", pedidoId, "antes:", anterior, "agora:", atual);
          break;
        }
      }
    }

    if (deveAvisar) {
      tocarSomNovoPedido();
    }
  }

  estadoAvisosAnterior = {
    pedidosAtivos: idsAtivosAtuais,
    novosMesaPorPedido: novosMesaPorPedidoAtual
  };

  primeiraCargaPedidos = false;

window.marcarPago = async function(id){
  const { error } = await supabase
    .from("pedidos")
    .update({
      status:"pago",
      status_entrega:"Pagamento aprovado"
    })
    .eq("id", id);

  if (error) {
    console.error(error);
    alert("Erro ao marcar como pago.");
    return;
  }

  await carregarPedidos();
  const isHist = filtroHistorico.value !== "todos";
  abrirDetalhe(id, isHist);
};

window.aceitarPedido = async function(id){
  const { data:pedido, error:pedidoErr } = await supabase
    .from("pedidos")
    .select("*")
    .eq("id", id)
    .single();

  if (pedidoErr || !pedido) {
    console.error(pedidoErr);
    alert("Erro ao carregar pedido.");
    return;
  }

  const { error } = await supabase
    .from("pedidos")
    .update({
      status:"aceito",
      status_entrega:"Separando pedido"
    })
    .eq("id", id);

  if (error) {
    console.error(error);
    alert("Erro ao aceitar pedido.");
    return;

  if (!pedidoEhMesa(pedido)) {
    let texto = `🛍️ *PEDIDO ACEITO*\n\n`;
    texto += `Olá ${nomeClientePedido(pedido)}!\n\n`;
    texto += `Seu pedido foi confirmado e aceito ✅\n\n`;
    texto += `Código do pedido: ${pedido.codigo_acompanhamento || "-"}\n`;

    if (pedido.codigo_acompanhamento) {
      texto += `Acompanhe aqui:\n${window.location.origin}/celular/acompanhar.html?codigo=${encodeURIComponent(pedido.codigo_acompanhamento)}\n`;

    texto += `\n\n📦 Status: Separando pedido`;

    abrirWhats(telefoneClientePedido(pedido), texto);
  }

  await carregarPedidos();
  abrirDetalhe(id, false);
};

    })

    : "";

  let texto = `📦 *PEDIDO EM ENVIO*\n\n`;
  texto += `Olá ${nomeClientePedido(pedido)}!\n\n`;

  if (!infoEnvio) {
    texto += `Seu pedido foi enviado.\n`;
  } else if (transportadora === "Entrega local") {
    texto += `Seu pedido saiu para entrega local.\n`;
    texto += `Informação da entrega: ${infoEnvio}\n`;
  } else {
    texto += `Seu pedido foi postado nos Correios.\n`;
    texto += `Código de rastreio: ${infoEnvio}\n`;
  }

  if (transportadora) {
    texto += `Transportadora: ${transportadora}\n`;
  }

  if (linkAcompanhamento) {
    texto += `\nAcompanhe seu pedido aqui:\n${linkAcompanhamento}\n`;
  }

  abrirWhats(telefoneClientePedido(pedido), texto);
  await carregarPedidos();
  abrirDetalhe(id, false);
};

  const idsNovos = novos.map(i => i.id).filter(Boolean);

  if (!idsNovos.length) {
    alert("Não há novos itens para marcar.");

  const { error } = await supabase
    .from("pedido_itens")
    .update({ impresso: true })
    .in("id", idsNovos);

  if (error) {
    console.error(error);
    alert("Erro ao marcar novos itens.");
    return;
  }

  await carregarPedidos();
  abrirDetalhe(id, false);
};

window.imprimirComanda = async function(id, setorDesejado, somenteNovos = false){
  const pedido = pedidosCache.find(p => String(p.id) === String(id));
  if (!pedido) return alert("Pedido não encontrado.");

  const itensBase = Array.isArray(pedido.itens_normalizados) ? pedido.itens_normalizados : [];
  const itensNovos = itensBase.filter(i => i.impresso !== true);
  let itens = somenteNovos ? itensNovos : itensBase;

  if (setorDesejado !== "geral") {
    itens = itens.filter(i => setorItem(i) === setorDesejado);
  }

  if (!itens.length) {
    alert("Esse pedido não possui itens para impressão.");
    return;
  }

  const dataHora = formatarDataHoraCompleta(new Date().toISOString());
  const mesaNumero = numeroMesaPedido(pedido);
  const setorTitulo =
    setorDesejado === "bar" ? "BAR" :
    setorDesejado === "cozinha" ? "COZINHA" :
    "COMANDA";

  const htmlItens = itens.map(i => `
    <div style="border-bottom:1px dashed #000;padding:6px 0;">
      <div><strong>${escapeHtml(nomeItem(i))}</strong></div>
      <div>Qtd: ${qtdItem(i)}</div>
      ${corItem(i) ? `<div>Variação: ${escapeHtml(corItem(i))}</div>` : ""}
      ${obsItem(i) ? `<div>Obs: ${escapeHtml(obsItem(i))}</div>` : ""}
    </div>
  `).join("");

  const win = window.open("", "_blank", "width=420,height=700");
  if (!win) return alert("Não foi possível abrir a janela de impressão.");

  const html = `
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
      <meta charset="UTF-8">
      <title>Comanda ${setorTitulo}</title>
      <style>
        body{font-family:Arial,sans-serif;padding:14px;color:#000;font-size:14px}
        .topo{text-align:center;border-bottom:2px dashed #000;padding-bottom:10px;margin-bottom:12px}
        .titulo{font-size:20px;font-weight:bold}
        .setor{font-size:18px;margin-top:6px}
        .linha{margin:4px 0}
        .bloco{margin-top:10px}
      </style>
    </head>
    <body>
      <div class="topo">
        <div class="titulo">COMANDA</div>
        <div class="setor">${somenteNovos ? "NOVO " : ""}${setorTitulo}</div>
      </div>

      <div class="linha"><strong>Cliente:</strong> ${escapeHtml(nomeClientePedido(pedido))}</div>
      <div class="linha"><strong>Mesa:</strong> ${escapeHtml(mesaNumero || "-")}</div>
      <div class="linha"><strong>Pedido ID:</strong> ${escapeHtml(pedido.id)}</div>
      <div class="linha"><strong>Data/Hora:</strong> ${escapeHtml(dataHora)}</div>

      <div class="bloco">
        <strong>Itens:</strong>
        ${htmlItens}
      </div>

      <div class="bloco">
        <strong>Total geral da mesa:</strong> ${escapeHtml(formatarReal(calcularTotalPedido(pedido)))}
      </div>
    </body>
    </html>
  `;

  win.document.open();
  win.document.write(html);
  win.document.close();

  win.onload = async function(){
    win.focus();
    win.print();
    setTimeout(() => win.close(), 300);

    if (somenteNovos) {
      const idsImpressos = itens.map(i => i.id).filter(Boolean);
      if (idsImpressos.length) {
        const { error } = await supabase
          .from("pedido_itens")
          .update({ impresso: true })
          .in("id", idsImpressos);

        if (error) {
          console.error(error);
          alert("Imprimiu, mas não conseguiu marcar os itens como atendidos.");
        } else {
          await carregarPedidos();
          abrirDetalhe(id, false);
        }
      }
    }
  };
};
