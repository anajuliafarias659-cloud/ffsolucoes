<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR da Mesa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
.card{
  background:#0f172a;
  padding:30px;
  border-radius:18px;
  text-align:center;
  width:min(95vw,520px);
}
#qrcode{
  margin:20px auto;
  width:220px;
  min-height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
  margin:6px;
}
.info{
  font-size:13px;
  color:#cbd5e1;
  margin-top:14px;
  line-height:1.5;
  text-align:left;
  background:#020617;
  border-radius:12px;
  padding:14px;
  word-break:break-word;
}
.ok{color:#22c55e}
.erro{
  color:#fca5a5;
  background:#7f1d1d;
  border-radius:10px;
  padding:10px 12px;
  margin-top:10px;
}
.loading{color:#94a3b8}
.url-box{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  background:#111827;
  font-size:12px;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="titulo">Gerando QR...</h2>
  <div id="qrcode"><div class="loading">Aguarde...</div></div>

  <div>
    <button onclick="window.print()">🖨️ Imprimir</button>
    <button id="btnAbrir" style="display:none">🔗 Abrir link</button>
  </div>

  <div class="url-box" id="urlFinalBox" style="display:none"></div>
  <div class="info" id="logBox"></div>
  <div id="erroBox"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);
const mesaId = (params.get("mesa") || "").trim();
const admin = JSON.parse(localStorage.getItem("admin_logado") || "null");

let URL_FINAL = "";

function log(msg, ok = true){
  const box = document.getElementById("logBox");
  box.innerHTML += `<div class="${ok ? 'ok' : ''}">${msg}</div>`;
}

function erro(msg){
  document.getElementById("erroBox").innerHTML = `<div class="erro">${msg}</div>`;
}

function agoraISO(){
  return new Date().toISOString();
}

function adicionarMinutosISO(minutos){
  return new Date(Date.now() + minutos * 60000).toISOString();
}

function gerarTokenSeguro(){
  if (window.crypto?.randomUUID) {
    return crypto.randomUUID().replaceAll("-", "") + Date.now();
  }
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function gerarQRCode(url){
  const box = document.getElementById("qrcode");
  box.innerHTML = "";
  new QRCode(box, {
    text: url,
    width: 220,
    height: 220,
    correctLevel: QRCode.CorrectLevel.H
  });
}

async function carregarMesa(){
  log("1. Validando mesa...");
  const { data, error } = await supabase
    .from("mesas")
    .select("id, numero_mesa, app_id")
    .eq("id", mesaId)
    .eq("app_id", admin.app_id)
    .maybeSingle();

  if (error || !data) {
    console.error("Erro mesa:", error);
    throw new Error("Mesa não encontrada para este bar.");
  }

  log(`Mesa encontrada: ${data.numero_mesa}`);
  return data;
}

async function buscarSessaoAtiva(){
  log("2. Buscando sessão ativa...");
  const { data, error } = await supabase
    .from("sessoes_mesa")
    .select("*")
    .eq("mesa_id", mesaId)
    .eq("app_id", admin.app_id)
    .eq("ativa", true)
    .order("created_at", { ascending: false })
    .limit(1);

  if (error) {
    console.error("Erro buscar sessão:", error);
    throw new Error("Erro ao buscar sessão ativa da mesa.");
  }

  if (data?.length) {
    log("Sessão ativa encontrada.");
    return data[0];
  }

  log("Nenhuma sessão ativa encontrada.");
  return null;
}

async function encerrarSessao(sessaoId){
  log("3. Encerrando sessão antiga...");
  await supabase
    .from("sessoes_mesa")
    .update({
      ativa: false,
      encerrada_em: agoraISO()
    })
    .eq("id", sessaoId);

  await supabase
    .from("sessoes_mesa_dispositivos")
    .delete()
    .eq("sessao_mesa_id", sessaoId);
}

async function criarNovaSessao(){
  log("4. Criando nova sessão...");
  const token = gerarTokenSeguro();

  const payload = {
    mesa_id: mesaId,
    app_id: admin.app_id,
    token: token,
    ativa: true,
    ultimo_acesso_em: agoraISO(),
    expira_em: adicionarMinutosISO(30)
  };

  console.log("Payload sessão:", payload);

  const { data, error } = await supabase
    .from("sessoes_mesa")
    .insert(payload)
    .select()
    .single();

  if (error || !data) {
    console.error("Erro criar sessão:", error);
    throw new Error("Erro ao criar sessão da mesa. Veja o console.");
  }

  log(`Sessão criada com token: ${data.token}`);
  return data;
}

async function obterSessaoValida(){
  const sessao = await buscarSessaoAtiva();

  if (!sessao) {
    return await criarNovaSessao();
  }

  const expirou = !sessao.expira_em || new Date(sessao.expira_em).getTime() < Date.now();

  if (expirou) {
    log("Sessão ativa estava expirada.");
    await encerrarSessao(sessao.id);
    return await criarNovaSessao();
  }

  log("Sessão ativa reaproveitada.");
  return sessao;
}

async function iniciar(){
  try {
    if (!mesaId) throw new Error("Parâmetro mesa ausente na URL.");
    if (!admin?.app_id) throw new Error("admin_logado ou app_id ausente no localStorage.");

    log(`Mesa recebida na URL: ${mesaId}`);
    log(`App do admin: ${admin.app_id}`);

    const mesa = await carregarMesa();
    const sessao = await obterSessaoValida();

    document.getElementById("titulo").innerText = `Mesa ${mesa.numero_mesa}`;

    URL_FINAL = `https://www.ffsolucoes.com.br/bar/mesa.html?mesa=${mesa.id}&token=${sessao.token}`;

    log("5. URL final do QR montada com sucesso.");
    log(`Token final: ${sessao.token}`);

    document.getElementById("urlFinalBox").style.display = "block";
    document.getElementById("urlFinalBox").innerText = URL_FINAL;

    gerarQRCode(URL_FINAL);

    const btnAbrir = document.getElementById("btnAbrir");
    btnAbrir.style.display = "inline-block";
    btnAbrir.onclick = () => window.open(URL_FINAL, "_blank");

  } catch (e) {
    console.error(e);
    document.getElementById("titulo").innerText = "Erro ao gerar QR";
    document.getElementById("qrcode").innerHTML = `<div class="loading">Falha</div>`;
    erro(e.message || "Erro inesperado.");
    log("Falhou ao gerar QR.", false);
  }
}

iniciar();
</script>

</body>
</html>
