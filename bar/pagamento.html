<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px 24px}
.container{max-width:600px;margin:auto;padding:24px}
.box{background:#0f172a;padding:20px;border-radius:16px}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
.alert{color:#facc15;margin-top:8px}
.info-ok{color:#22c55e;margin-top:8px}
</style>
</head>

<body>

<div class="topo">
  <h2>💳 Pagamento</h2>
</div>

<div class="container">
  <div class="box">

    <p>Total</p>
    <h2 id="totalPedido">R$ 0,00</h2>

    <label>Forma de Pagamento</label>
    <select id="formaPagamento">
      <option value="Dinheiro">Dinheiro</option>
      <option value="Pix">Pix</option>
      <option value="Cartão Crédito">Cartão Crédito</option>
      <option value="Cartão Débito">Cartão Débito</option>
    </select>

    <label>Valor pago</label>
    <input type="number" id="valorRecebido" step="0.01" min="0">

    <p id="info" class="alert"></p>

    <p>Troco</p>
    <h3 id="troco">R$ 0,00</h3>

    <button id="btnConfirmar">Confirmar</button>

  </div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

const params = new URLSearchParams(location.search);
const pedidoId = params.get("pedido");

const totalPedidoEl = document.getElementById("totalPedido");
const formaPagamentoEl = document.getElementById("formaPagamento");
const valorRecebidoEl = document.getElementById("valorRecebido");
const infoEl = document.getElementById("info");
const trocoEl = document.getElementById("troco");
const btnConfirmar = document.getElementById("btnConfirmar");

let totalPedido = 0;
let mesaId = null;
let appId = null;
let processando = false;

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

async function iniciar(){
  if(!pedidoId){
    alert("Pedido não informado.");
    location.href = "caixa.html";
    return;
  }

  const { data: sessaoData, error: sessaoError } = await supabase.auth.getSession();

  if(sessaoError || !sessaoData.session){
    location.href = "/auth/login.html";
    return;
  }

  const userId = sessaoData.session.user.id;

  const { data: usuario, error: usuarioError } = await supabase
    .from("usuarios")
    .select("id, app_id")
    .eq("id", userId)
    .single();

  if(usuarioError || !usuario){
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return;
  }

  appId = usuario.app_id;

  if(!appId){
    alert("Negócio não identificado.");
    location.href = "caixa.html";
    return;
  }

  await carregarPedido();
  calcular();
}

async function carregarPedido(){
  const { data: pedido, error: pedidoError } = await supabase
    .from("pedidos")
    .select("id, mesa_id, status")
    .eq("id", pedidoId)
    .eq("app_id", appId)
    .single();

  if(pedidoError || !pedido){
    console.error("Erro ao carregar pedido:", pedidoError);
    alert("Pedido não encontrado.");
    location.href = "caixa.html";
    return;
  }

  mesaId = pedido.mesa_id;

  const { data: itens, error: itensError } = await supabase
    .from("pedido_itens")
    .select("produto_id, preco, quantidade")
    .eq("pedido_id", pedidoId);

  if(itensError){
    console.error("Erro ao carregar itens:", itensError);
    alert("Erro ao carregar itens do pedido.");
    location.href = "caixa.html";
    return;
  }

  totalPedido = 0;

  (itens || []).forEach(i => {
    totalPedido += Number(i.preco || 0) * Number(i.quantidade || 0);
  });

  totalPedidoEl.innerText = formatarMoeda(totalPedido);
}

function calcular(){
  const formaPagamento = formaPagamentoEl.value;
  const valorRecebido = Number(valorRecebidoEl.value || 0);

  const descontoMax = totalPedido * 0.10;
  const minimo = totalPedido - descontoMax;

  let troco = 0;
  infoEl.className = "alert";
  infoEl.innerText = "";

  if(valorRecebido <= 0){
    trocoEl.innerText = formatarMoeda(0);
    return;
  }

  if(formaPagamento === "Dinheiro"){
    if(valorRecebido < minimo){
      infoEl.innerText = `Desconto máximo permitido: ${formatarMoeda(descontoMax)}`;
    } else if(valorRecebido < totalPedido){
      infoEl.className = "info-ok";
      infoEl.innerText = `Desconto aplicado: ${formatarMoeda(totalPedido - valorRecebido)}`;
    }

    troco = valorRecebido > totalPedido ? valorRecebido - totalPedido : 0;
  } else {
    troco = 0;

    if(valorRecebido < minimo){
      infoEl.innerText = `Desconto máximo permitido: ${formatarMoeda(descontoMax)}`;
    } else if(valorRecebido < totalPedido){
      infoEl.className = "info-ok";
      infoEl.innerText = `Desconto aplicado: ${formatarMoeda(totalPedido - valorRecebido)}`;
    }
  }

  trocoEl.innerText = formatarMoeda(troco);
}

valorRecebidoEl.addEventListener("input", calcular);
formaPagamentoEl.addEventListener("change", calcular);

btnConfirmar.addEventListener("click", confirmarPagamento);

async function confirmarPagamento(){
  if(processando) return;

  const valorPago = Number(valorRecebidoEl.value || 0);
  const formaPagamento = formaPagamentoEl.value;

  if(!valorPago || valorPago <= 0){
    alert("Informe o valor pago.");
    return;
  }

  const descontoMax = totalPedido * 0.10;
  const minimo = totalPedido - descontoMax;

  if(valorPago < minimo){
    alert("Desconto acima do permitido.");
    return;
  }

  processando = true;
  btnConfirmar.disabled = true;
  btnConfirmar.innerText = "Processando...";

  try{
    const { data: sessao } = await supabase.auth.getSession();
    const nomeUsuario = sessao?.session?.user?.email || "Sistema";

    const troco = valorPago > totalPedido ? valorPago - totalPedido : 0;
    const desconto = valorPago < totalPedido ? totalPedido - valorPago : 0;

    const dadosUpdate = {
      status: "pago",
      forma_pagamento: formaPagamento,
      recebido_em: new Date().toISOString(),
      recebido_por: nomeUsuario,
      valor_total: totalPedido,
      valor_pago: valorPago,
      troco: troco,
      desconto: desconto
    };

    const { error: erroUpdate } = await supabase
      .from("pedidos")
      .update(dadosUpdate)
      .eq("id", pedidoId)
      .eq("app_id", appId);

    if(erroUpdate){
      console.error("Erro ao finalizar pedido:", erroUpdate);
      alert("Erro ao finalizar pedido.");
      processando = false;
      btnConfirmar.disabled = false;
      btnConfirmar.innerText = "Confirmar";
      return;
    }

    let erroEstoqueGeral = false;

    const { data: itens, error: erroItens } = await supabase
      .from("pedido_itens")
      .select("produto_id, quantidade")
      .eq("pedido_id", pedidoId);

    if(erroItens){
      console.error("Erro ao buscar itens para estoque:", erroItens);
      erroEstoqueGeral = true;
    } else {
      for(const item of (itens || [])){
        if(!item.produto_id) continue;

        const { error: erroEstoque } = await supabase.rpc("baixar_estoque", {
          produto_id_input: item.produto_id,
          quantidade_input: Number(item.quantidade || 0)
        });

        if(erroEstoque){
          erroEstoqueGeral = true;
          console.error("Erro ao baixar estoque:", erroEstoque);
        }
      }
    }

    if(mesaId){
      const { error: erroMesa } = await supabase
        .from("mesas")
        .update({ status: "livre" })
        .eq("id", mesaId)
        .eq("app_id", appId);

      if(erroMesa){
        console.error("Erro ao liberar mesa:", erroMesa);
        alert("Pagamento salvo, mas houve erro ao liberar a mesa.");
        processando = false;
        btnConfirmar.disabled = false;
        btnConfirmar.innerText = "Confirmar";
        return;
      }
    }

    if(erroEstoqueGeral){
      alert("Pagamento confirmado e mesa liberada, mas houve erro ao baixar estoque.");
    } else {
      alert("Pagamento confirmado com sucesso!");
    }

    location.href = "caixa.html";

  } catch(e){
    console.error("Erro inesperado:", e);
    alert("Erro inesperado ao confirmar pagamento.");
    processando = false;
    btnConfirmar.disabled = false;
    btnConfirmar.innerText = "Confirmar";
  }
}

iniciar();
</script>

</body>
</html>
