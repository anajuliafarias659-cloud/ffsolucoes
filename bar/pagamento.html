<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px 24px}
.container{max-width:700px;margin:auto;padding:24px}
.box{background:#0f172a;padding:20px;border-radius:16px}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}
.alert{color:#facc15;margin-top:8px}
.info-ok{color:#22c55e;margin-top:8px}
.area-online{
  margin-top:14px;
  padding:14px;
  border-radius:12px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
}
.pix-box{
  display:none;
  margin-top:12px;
  padding:14px;
  border-radius:12px;
  background:#0b1220;
  border:1px solid rgba(255,255,255,.08);
}
.linha-botoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
#pixQrCodeArea img{
  background:#fff;
  padding:10px;
  border-radius:12px;
}
#debugPix{
  margin-top:10px;
  font-size:12px;
  color:#94a3b8;
  white-space:pre-wrap;
  word-break:break-word;
  background:#020617;
  border-radius:10px;
  padding:10px;
  display:none;
}
.resumo-pagamento{
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
}
.resumo-pagamento p{
  margin:6px 0;
  color:#cbd5e1;
}
.resumo-pagamento h2,
.resumo-pagamento h3{
  margin:4px 0 10px;
}
.resumo-pagamento .restante{
  color:#22c55e;
}
.subtitulo{
  margin-top:16px;
  margin-bottom:8px;
  font-weight:bold;
}
@media(max-width:640px){
  .linha-botoes{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="topo">
  <h2>💳 Pagamento</h2>
</div>

<div class="container">
  <div class="box">

    <div class="resumo-pagamento">
      <p>Total da conta</p>
      <h2 id="totalPedido">R$ 0,00</h2>

      <p>Já pago</p>
      <h3 id="totalPago">R$ 0,00</h3>

      <p>Falta pagar</p>
      <h3 id="valorRestante" class="restante">R$ 0,00</h3>
    </div>

    <div class="subtitulo">Dividir conta</div>
    <div class="linha-botoes">
      <button type="button" id="btnDividir2">Dividir em 2</button>
      <button type="button" id="btnDividir3">Dividir em 3</button>
    </div>
    <div class="linha-botoes">
      <button type="button" id="btnDividir4">Dividir em 4</button>
      <button type="button" id="btnValorIntegral">Cobrar restante</button>
    </div>

    <label style="margin-top:16px;display:block;">Forma de Pagamento</label>
    <select id="formaPagamento">
      <option value="Dinheiro">Dinheiro</option>
      <option value="Pix">Pix manual</option>
      <option value="Cartão Crédito">Cartão Crédito</option>
      <option value="Cartão Débito">Cartão Débito</option>
      <option value="Pix MP">PIX Mercado Pago</option>
      <option value="Checkout MP">Checkout Mercado Pago</option>
    </select>

    <div id="areaManual">
      <label>Valor desta cobrança</label>
      <input type="number" id="valorRecebido" step="0.01" min="0">
      <p id="info" class="alert"></p>
      <p>Troco</p>
      <h3 id="troco">R$ 0,00</h3>
      <button id="btnConfirmar">Confirmar pagamento manual</button>
    </div>

    <div id="areaOnline" class="area-online" style="display:none;">
      <div id="statusPagamento" style="margin-bottom:10px;">Selecione uma opção online para gerar a cobrança.</div>

      <div id="areaPixMP" class="pix-box">
        <div id="pixQrCodeArea" style="text-align:center;"></div>
        <textarea id="pixCopiaCola" readonly placeholder="Código PIX copia e cola"></textarea>
        <button type="button" id="btnCopiarPix">📋 Copiar código PIX</button>
        <div id="debugPix"></div>
      </div>

      <div class="linha-botoes">
        <button id="btnGerarPixMP" type="button" style="display:none;background:#16a34a;">
          ✅ Gerar PIX Mercado Pago
        </button>
        <button id="btnCheckoutMP" type="button" style="display:none;background:#2563eb;color:#fff;">
          ✅ Ir para checkout Mercado Pago
        </button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

const params = new URLSearchParams(location.search);
const pedidoId = params.get("pedido");

const totalPedidoEl = document.getElementById("totalPedido");
const totalPagoEl = document.getElementById("totalPago");
const valorRestanteEl = document.getElementById("valorRestante");

const formaPagamentoEl = document.getElementById("formaPagamento");
const valorRecebidoEl = document.getElementById("valorRecebido");
const infoEl = document.getElementById("info");
const trocoEl = document.getElementById("troco");
const btnConfirmar = document.getElementById("btnConfirmar");

const areaManual = document.getElementById("areaManual");
const areaOnline = document.getElementById("areaOnline");
const statusPagamentoEl = document.getElementById("statusPagamento");
const areaPixMP = document.getElementById("areaPixMP");
const pixQrCodeArea = document.getElementById("pixQrCodeArea");
const pixCopiaCola = document.getElementById("pixCopiaCola");
const btnCopiarPix = document.getElementById("btnCopiarPix");
const btnGerarPixMP = document.getElementById("btnGerarPixMP");
const btnCheckoutMP = document.getElementById("btnCheckoutMP");
const debugPix = document.getElementById("debugPix");

const btnDividir2 = document.getElementById("btnDividir2");
const btnDividir3 = document.getElementById("btnDividir3");
const btnDividir4 = document.getElementById("btnDividir4");
const btnValorIntegral = document.getElementById("btnValorIntegral");

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const URL_PAGAMENTO_MESA = `${SUPABASE_URL}/functions/v1/criar-pagamento-mesa`;
const URL_PAGAMENTO_PIX_MESA = `${SUPABASE_URL}/functions/v1/criar-pix-mesa`;

let totalPedido = 0;
let totalPagoAtual = 0;
let valorRestanteAtual = 0;
let mesaId = null;
let appId = null;
let processando = false;
let verificacaoPix = null;
let valorPixAtual = Number(sessionStorage.getItem(`pix_valor_${pedidoId}`) || 0);

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function ehPagamentoOnline(forma){
  return forma === "Pix MP" || forma === "Checkout MP";
}

function atualizarResumoPagamento(){
  valorRestanteAtual = Math.max(Number(totalPedido || 0) - Number(totalPagoAtual || 0), 0);

  totalPedidoEl.innerText = formatarMoeda(totalPedido);
  totalPagoEl.innerText = formatarMoeda(totalPagoAtual);
  valorRestanteEl.innerText = formatarMoeda(valorRestanteAtual);

  if(valorRestanteAtual <= 0.009){
    valorRestanteEl.innerText = "R$ 0,00";
  }
}

function atualizarModoPagamento(){
  const forma = formaPagamentoEl.value;

  areaManual.style.display = ehPagamentoOnline(forma) ? "none" : "block";
  areaOnline.style.display = ehPagamentoOnline(forma) ? "block" : "none";

  btnGerarPixMP.style.display = "none";
  btnCheckoutMP.style.display = "none";
  areaPixMP.style.display = "none";

  if(forma === "Pix MP"){
    btnGerarPixMP.style.display = "block";
    areaPixMP.style.display = "block";
    statusPagamentoEl.innerText = "Informe um valor ou use dividir conta para gerar o PIX.";
  }

  if(forma === "Checkout MP"){
    btnCheckoutMP.style.display = "block";
    statusPagamentoEl.innerText = "Informe um valor ou use cobrar restante para abrir o checkout.";
  }
}

function preencherValorDivisao(qtdPessoas){
  if(valorRestanteAtual <= 0){
    alert("Essa conta já foi quitada.");
    return;
  }

  const valor = valorRestanteAtual / qtdPessoas;
  valorRecebidoEl.value = valor.toFixed(2);
  calcular();
}

async function obterTokenSessao(){
  const { data: sessaoData, error: sessaoError } = await supabase.auth.getSession();

  if(sessaoError || !sessaoData.session){
    throw new Error("Sessão inválida. Faça login novamente.");
  }

  return sessaoData.session.access_token;
}

function extrairDadosPix(json){
  const transactionData = json?.point_of_interaction?.transaction_data || {};
  const interaction = json?.point_of_interaction || {};
  const additionalData = json?.additional_data || {};

  const qrBase64 =
    transactionData?.qr_code_base64 ||
    interaction?.qr_code_base64 ||
    additionalData?.qr_code_base64 ||
    json?.qr_code_base64 ||
    "";

  const copiaCola =
    transactionData?.qr_code ||
    interaction?.qr_code ||
    additionalData?.qr_code ||
    json?.qr_code ||
    "";

  const ticketUrl =
    transactionData?.ticket_url ||
    interaction?.ticket_url ||
    additionalData?.ticket_url ||
    json?.ticket_url ||
    "";

  return { qrBase64, copiaCola, ticketUrl };
}

async function renderizarQrPix(copiaCola, qrBase64, ticketUrl){
  pixQrCodeArea.innerHTML = "";

  if(qrBase64){
    pixQrCodeArea.innerHTML = `<img src="data:image/png;base64,${qrBase64}" style="max-width:240px;width:100%;">`;
    return "base64";
  }

  if(copiaCola){
    try{
      const qrDataUrl = await window.QRCode.toDataURL(copiaCola, {
        width: 240,
        margin: 1
      });

      pixQrCodeArea.innerHTML = `<img src="${qrDataUrl}" style="max-width:240px;width:100%;">`;
      return "copia_cola";
    }catch(e){
      console.error("Erro ao gerar QR local:", e);
    }
  }

  if(ticketUrl){
    pixQrCodeArea.innerHTML = `<a href="${ticketUrl}" target="_blank" style="color:#93c5fd;">Abrir pagamento PIX</a>`;
    return "ticket_url";
  }

  pixQrCodeArea.innerHTML = "PIX gerado, mas sem QR visual.";
  return "vazio";
}

async function iniciar(){
  if(!pedidoId){
    alert("Pedido não informado.");
    location.href = "caixa.html";
    return;
  }

  const { data: sessaoData, error: sessaoError } = await supabase.auth.getSession();

  if(sessaoError || !sessaoData.session){
    location.href = "/auth/login.html";
    return;
  }

  const userId = sessaoData.session.user.id;

  const { data: usuario, error: usuarioError } = await supabase
    .from("usuarios")
    .select("id, app_id")
    .eq("id", userId)
    .single();

  if(usuarioError || !usuario){
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return;
  }

  appId = usuario.app_id;

  if(!appId){
    alert("Negócio não identificado.");
    location.href = "caixa.html";
    return;
  }

  await carregarPedido();
  calcular();
  atualizarModoPagamento();
}

async function carregarPedido(){
  const { data: pedido, error: pedidoError } = await supabase
    .from("pedidos")
    .select("id, mesa_id, status, total, subtotal, valor_total, valor_pago, pagamento_status, mp_qr_code, mp_ticket_url, mp_payment_id")
    .eq("id", pedidoId)
    .eq("app_id", appId)
    .single();

  if(pedidoError || !pedido){
    console.error("Erro ao carregar pedido:", pedidoError);
    alert("Pedido não encontrado.");
    location.href = "caixa.html";
    return;
  }

  mesaId = pedido.mesa_id;

  if(pedido.total != null) {
    totalPedido = Number(pedido.total || 0);
  } else if(pedido.valor_total != null) {
    totalPedido = Number(pedido.valor_total || 0);
  } else {
    const { data: itens, error: itensError } = await supabase
      .from("pedido_itens")
      .select("produto_id, preco, quantidade")
      .eq("pedido_id", pedidoId);

    if(itensError){
      console.error("Erro ao carregar itens:", itensError);
      alert("Erro ao carregar itens do pedido.");
      location.href = "caixa.html";
      return;
    }

    totalPedido = 0;
    (itens || []).forEach(i => {
      totalPedido += Number(i.preco || 0) * Number(i.quantidade || 0);
    });
  }

  totalPagoAtual = Number(pedido.valor_pago || 0);
  atualizarResumoPagamento();

  if(valorRestanteAtual <= 0.009){
    statusPagamentoEl.innerHTML = "✅ Essa conta já foi quitada.";
  }

  if(
    String(pedido.pagamento_status || "").toLowerCase() === "pending" &&
    (pedido.mp_qr_code || pedido.mp_ticket_url)
  ){
    formaPagamentoEl.value = "Pix MP";
    atualizarModoPagamento();
    pixCopiaCola.value = pedido.mp_qr_code || "";
    await renderizarQrPix(pedido.mp_qr_code || "", "", pedido.mp_ticket_url || "");

    if(!valorPixAtual || valorPixAtual <= 0){
      valorPixAtual = valorRestanteAtual;
      sessionStorage.setItem(`pix_valor_${pedidoId}`, String(valorPixAtual));
    }

    statusPagamentoEl.innerHTML = `
      ⏳ PIX já gerado anteriormente.<br>
      Valor desta cobrança: <strong>${formatarMoeda(valorPixAtual)}</strong><br>
      Aguardando pagamento...
    `;
    iniciarVerificacaoPix();
  }
}

function calcular(){
  const formaPagamento = formaPagamentoEl.value;
  const valorRecebido = Number(valorRecebidoEl.value || 0);

  let troco = 0;
  infoEl.className = "alert";
  infoEl.innerText = "";

  if(ehPagamentoOnline(formaPagamento)){
    trocoEl.innerText = formatarMoeda(0);

    if(valorRecebido > valorRestanteAtual && valorRestanteAtual > 0){
      infoEl.innerText = `O valor não pode ser maior que o restante: ${formatarMoeda(valorRestanteAtual)}`;
    } else if(valorRecebido > 0){
      infoEl.className = "info-ok";
      infoEl.innerText = `Será cobrado: ${formatarMoeda(valorRecebido)}`;
    }

    return;
  }

  if(valorRecebido <= 0){
    trocoEl.innerText = formatarMoeda(0);
    return;
  }

  if(formaPagamento === "Dinheiro"){
    troco = valorRecebido > valorRestanteAtual ? valorRecebido - valorRestanteAtual : 0;
  } else {
    troco = 0;
  }

  if(valorRecebido < valorRestanteAtual){
    infoEl.className = "info-ok";
    infoEl.innerText = `Pagamento parcial. Ainda faltará ${formatarMoeda(valorRestanteAtual - valorRecebido)}.`;
  } else if(valorRecebido >= valorRestanteAtual && valorRestanteAtual > 0){
    infoEl.className = "info-ok";
    infoEl.innerText = `Essa cobrança quita a conta.`;
  }

  trocoEl.innerText = formatarMoeda(troco);
}

formaPagamentoEl.addEventListener("change", () => {
  calcular();
  atualizarModoPagamento();
});

valorRecebidoEl.addEventListener("input", calcular);

btnDividir2.addEventListener("click", () => preencherValorDivisao(2));
btnDividir3.addEventListener("click", () => preencherValorDivisao(3));
btnDividir4.addEventListener("click", () => preencherValorDivisao(4));
btnValorIntegral.addEventListener("click", () => {
  if(valorRestanteAtual <= 0){
    alert("Essa conta já foi quitada.");
    return;
  }
  valorRecebidoEl.value = valorRestanteAtual.toFixed(2);
  calcular();
});

btnConfirmar.addEventListener("click", confirmarPagamentoManual);
btnGerarPixMP.addEventListener("click", gerarPixMesa);
btnCheckoutMP.addEventListener("click", checkoutMesa);

btnCopiarPix.addEventListener("click", async () => {
  const codigo = pixCopiaCola.value || "";
  if(!codigo){
    alert("Nenhum código PIX gerado.");
    return;
  }

  try{
    await navigator.clipboard.writeText(codigo);
    alert("✅ Código PIX copiado!");
  }catch{
    alert("Não foi possível copiar.");
  }
});

async function registrarPagamentoParcial({
  forma_pagamento,
  pagamento_modo,
  pagamento_tipo,
  valor_pago,
  troco = 0,
  desconto = 0,
  mp_payment_id = null
}){
  const novoTotalPago = Number(totalPagoAtual || 0) + Number(valor_pago || 0);
  const restante = Math.max(Number(totalPedido || 0) - novoTotalPago, 0);
  const quitado = restante <= 0.009;

  const { data: sessao } = await supabase.auth.getSession();
  const nomeUsuario = sessao?.session?.user?.email || "Sistema";

  const dadosUpdate = {
    forma_pagamento,
    pagamento_modo,
    pagamento_tipo,
    pagamento_status: quitado ? "approved" : "partial",
    status: quitado ? "pago" : "pagamento_parcial",
    recebido_em: new Date().toISOString(),
    recebido_por: nomeUsuario,
    valor_total: totalPedido,
    valor_pago: novoTotalPago,
    troco: quitado ? Number(troco || 0) : 0,
    desconto: Number(desconto || 0),
    mp_payment_id
  };

  const { error } = await supabase
    .from("pedidos")
    .update(dadosUpdate)
    .eq("id", pedidoId)
    .eq("app_id", appId);

  if(error){
    console.error("Erro ao registrar pagamento:", error);
    throw new Error("Erro ao registrar pagamento.");
  }

  totalPagoAtual = novoTotalPago;
  atualizarResumoPagamento();

  return { quitado, restante };
}

async function encerrarPedidoSeQuitado(){
  const restante = Math.max(totalPedido - totalPagoAtual, 0);

  if(restante > 0.009){
    return;
  }

  let erroEstoqueGeral = false;

  const { data: itens, error: erroItens } = await supabase
    .from("pedido_itens")
    .select("produto_id, quantidade")
    .eq("pedido_id", pedidoId);

  if(erroItens){
    console.error("Erro ao buscar itens para estoque:", erroItens);
    erroEstoqueGeral = true;
  } else {
    for(const item of (itens || [])){
      if(!item.produto_id) continue;

      const { error: erroEstoque } = await supabase.rpc("baixar_estoque", {
        produto_id_input: item.produto_id,
        quantidade_input: Number(item.quantidade || 0)
      });

      if(erroEstoque){
        erroEstoqueGeral = true;
        console.error("Erro ao baixar estoque:", erroEstoque);
      }
    }
  }

  if(mesaId){
    const { error: erroMesa } = await supabase
      .from("mesas")
      .update({ status: "livre" })
      .eq("id", mesaId);

    if(erroMesa){
      console.error("Erro ao liberar mesa:", erroMesa);
    }
  }

  sessionStorage.removeItem(`pix_valor_${pedidoId}`);

  if(erroEstoqueGeral){
    alert("Conta quitada e mesa liberada, mas houve erro ao baixar estoque.");
  } else {
    alert("Conta quitada com sucesso!");
  }

  location.href = "caixa.html";
}

async function confirmarPagamentoManual(){
  if(processando) return;

  if(valorRestanteAtual <= 0.009){
    alert("Essa conta já foi quitada.");
    return;
  }

  const valorInformado = Number(valorRecebidoEl.value || 0);
  const formaPagamento = formaPagamentoEl.value;

  if(!valorInformado || valorInformado <= 0){
    alert("Informe o valor pago.");
    return;
  }

  processando = true;
  btnConfirmar.disabled = true;
  btnConfirmar.innerText = "Processando...";

  try{
    const valorConsiderado = Math.min(valorInformado, valorRestanteAtual);
    const troco = formaPagamento === "Dinheiro" && valorInformado > valorRestanteAtual
      ? valorInformado - valorRestanteAtual
      : 0;

    const { quitado, restante } = await registrarPagamentoParcial({
      forma_pagamento: formaPagamento,
      pagamento_modo: "manual",
      pagamento_tipo: formaPagamento,
      valor_pago: valorConsiderado,
      troco,
      desconto: 0
    });

    if(quitado){
      statusPagamentoEl.innerHTML = `✅ Conta quitada. Finalizando pedido...`;
      await encerrarPedidoSeQuitado();
      return;
    }

    alert(`Pagamento parcial registrado. Falta ${formatarMoeda(restante)}.`);
    valorRecebidoEl.value = "";
    calcular();
    atualizarResumoPagamento();
  }catch(e){
    console.error("Erro inesperado:", e);
    alert(e.message || "Erro inesperado ao confirmar pagamento.");
  }finally{
    processando = false;
    btnConfirmar.disabled = false;
    btnConfirmar.innerText = "Confirmar pagamento manual";
  }
}

async function gerarPixMesa(){
  if(processando) return;

  if(valorRestanteAtual <= 0.009){
    alert("Essa conta já foi quitada.");
    return;
  }

  const valorCobrado = Number(valorRecebidoEl.value || 0) > 0
    ? Number(valorRecebidoEl.value || 0)
    : Number(valorRestanteAtual);

  if(valorCobrado <= 0){
    alert("Informe um valor para cobrar.");
    return;
  }

  if(valorCobrado > valorRestanteAtual){
    alert("O valor não pode ser maior que o restante da conta.");
    return;
  }

  processando = true;
  btnGerarPixMP.disabled = true;
  btnGerarPixMP.innerText = "Gerando PIX...";
  statusPagamentoEl.innerText = "Gerando PIX...";
  pixQrCodeArea.innerHTML = "";
  pixCopiaCola.value = "";
  debugPix.style.display = "none";
  debugPix.innerText = "";

  try{
    const accessToken = await obterTokenSessao();

    const payload = {
      appId: appId,
      pedidoId: pedidoId,
      transaction_amount: Number(valorCobrado.toFixed(2)),
      description: `Pedido mesa ${pedidoId}`
    };

    const res = await fetch(URL_PAGAMENTO_PIX_MESA, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${accessToken}`
      },
      body: JSON.stringify(payload)
    });

    const json = await res.json().catch(() => ({}));

    if(!res.ok){
      throw new Error(json?.erro || `Erro ao gerar PIX (${res.status})`);
    }

    const { qrBase64, copiaCola, ticketUrl } = extrairDadosPix(json);
    valorPixAtual = Number(valorCobrado);
    sessionStorage.setItem(`pix_valor_${pedidoId}`, String(valorPixAtual));

    await supabase
      .from("pedidos")
      .update({
        forma_pagamento: "Pix MP",
        pagamento_modo: "mercadopago_pix",
        pagamento_tipo: "pix",
        pagamento_status: json.status || "pending",
        mp_payment_id: json.id || null,
        mp_qr_code: copiaCola || null,
        mp_ticket_url: ticketUrl || null,
        status: "aguardando_pagamento"
      })
      .eq("id", pedidoId)
      .eq("app_id", appId);

    pixCopiaCola.value = copiaCola || "";

    const origemQr = await renderizarQrPix(copiaCola, qrBase64, ticketUrl);

    debugPix.style.display = "block";
    debugPix.innerText =
`Origem QR: ${origemQr}
payment_id: ${json?.id || ""}
status: ${json?.status || ""}
valor cobrança: ${formatarMoeda(valorCobrado)}
tem qr_base64: ${qrBase64 ? "sim" : "não"}
tem copia_cola: ${copiaCola ? "sim" : "não"}
tem ticket_url: ${ticketUrl ? "sim" : "não"}`;

    statusPagamentoEl.innerHTML = `
      ⏳ PIX gerado com sucesso.<br>
      Valor desta cobrança: <strong>${formatarMoeda(valorCobrado)}</strong><br>
      Restante atual da conta: <strong>${formatarMoeda(valorRestanteAtual)}</strong><br>
      Aguardando pagamento...
    `;

    iniciarVerificacaoPix();
  }catch(e){
    console.error(e);
    alert("Erro ao gerar PIX: " + e.message);
  }finally{
    processando = false;
    btnGerarPixMP.disabled = false;
    btnGerarPixMP.innerText = "✅ Gerar PIX Mercado Pago";
  }
}

async function checkoutMesa(){
  if(processando) return;

  if(valorRestanteAtual <= 0.009){
    alert("Essa conta já foi quitada.");
    return;
  }

  const valorCobrado = Number(valorRecebidoEl.value || 0) > 0
    ? Number(valorRecebidoEl.value || 0)
    : Number(valorRestanteAtual);

  if(valorCobrado <= 0){
    alert("Informe um valor para cobrar.");
    return;
  }

  if(valorCobrado > valorRestanteAtual){
    alert("O valor não pode ser maior que o restante da conta.");
    return;
  }

  processando = true;
  btnCheckoutMP.disabled = true;
  btnCheckoutMP.innerText = "Gerando checkout...";
  statusPagamentoEl.innerText = "Gerando checkout...";

  try{
    const accessToken = await obterTokenSessao();

    const payload = {
      appId: appId,
      pedidoId: pedidoId,
      items: [
        {
          title: `Pagamento parcial mesa ${pedidoId}`,
          quantity: 1,
          unit_price: Number(valorCobrado.toFixed(2))
        }
      ]
    };

    const res = await fetch(URL_PAGAMENTO_MESA, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${accessToken}`
      },
      body: JSON.stringify(payload)
    });

    const json = await res.json().catch(() => ({}));

    if(!res.ok){
      throw new Error(json?.erro || `Erro ao gerar checkout (${res.status})`);
    }

    sessionStorage.setItem(`pix_valor_${pedidoId}`, String(valorCobrado));

    await supabase
      .from("pedidos")
      .update({
        forma_pagamento: "Checkout MP",
        pagamento_modo: "mercadopago",
        pagamento_tipo: "checkout_online",
        pagamento_status: "pending",
        mp_preference_id: json.id || null,
        status: "aguardando_pagamento"
      })
      .eq("id", pedidoId)
      .eq("app_id", appId);

    const linkPagamento = json.init_point || json.sandbox_init_point;

    if(!linkPagamento){
      throw new Error("Mercado Pago não retornou o link.");
    }

    window.location.href = linkPagamento;
  }catch(e){
    console.error(e);
    alert("Erro ao gerar checkout: " + e.message);
    processando = false;
    btnCheckoutMP.disabled = false;
    btnCheckoutMP.innerText = "✅ Ir para checkout Mercado Pago";
  }
}

function iniciarVerificacaoPix(){
  clearInterval(verificacaoPix);
  verificarStatusPagamento();

  verificacaoPix = setInterval(() => {
    verificarStatusPagamento();
  }, 5000);
}

async function verificarStatusPagamento(){
  const { data, error } = await supabase
    .from("pedidos")
    .select("pagamento_status, status, mp_payment_id")
    .eq("id", pedidoId)
    .eq("app_id", appId)
    .single();

  if(error || !data) return;

  const status = String(data.pagamento_status || "").toLowerCase();

  if(status === "approved"){
    clearInterval(verificacaoPix);
    statusPagamentoEl.innerHTML = `✅ Pagamento aprovado. Registrando...`;

    try{
      const valorARegistrar = Number(sessionStorage.getItem(`pix_valor_${pedidoId}`) || valorPixAtual || 0);

      if(valorARegistrar <= 0){
        throw new Error("Valor do PIX não encontrado para registrar.");
      }

      const { quitado, restante } = await registrarPagamentoParcial({
        forma_pagamento: "Pix MP",
        pagamento_modo: "mercadopago_pix",
        pagamento_tipo: "pix",
        valor_pago: valorARegistrar,
        troco: 0,
        desconto: 0,
        mp_payment_id: data.mp_payment_id || null
      });

      sessionStorage.removeItem(`pix_valor_${pedidoId}`);
      pixQrCodeArea.innerHTML = "";
      pixCopiaCola.value = "";
      debugPix.style.display = "none";
      debugPix.innerText = "";

      if(quitado){
        statusPagamentoEl.innerHTML = `✅ Conta quitada. Finalizando pedido...`;
        await encerrarPedidoSeQuitado();
      } else {
        statusPagamentoEl.innerHTML = `
          ✅ Pagamento parcial aprovado.<br>
          Falta pagar: <strong>${formatarMoeda(restante)}</strong>
        `;
        alert(`Pagamento parcial aprovado. Falta ${formatarMoeda(restante)}.`);
        valorRecebidoEl.value = "";
        calcular();
      }
    }catch(e){
      console.error(e);
      alert("Pagamento aprovado, mas houve erro ao registrar internamente.");
    }
  }

  if(status === "pending"){
    const valorPendente = Number(sessionStorage.getItem(`pix_valor_${pedidoId}`) || valorPixAtual || 0);

    statusPagamentoEl.innerHTML = `
      ⏳ PIX gerado.<br>
      Valor desta cobrança: <strong>${formatarMoeda(valorPendente)}</strong><br>
      Aguardando pagamento...
    `;
  }

  if(status === "partial"){
    clearInterval(verificacaoPix);
    statusPagamentoEl.innerHTML = `
      ✅ Pagamento parcial registrado.<br>
      Falta pagar: <strong>${formatarMoeda(valorRestanteAtual)}</strong>
    `;
  }

  if(status === "rejected" || status === "cancelled"){
    clearInterval(verificacaoPix);
    statusPagamentoEl.innerHTML = `❌ Pagamento não aprovado.`;
  }
}

iniciar();
</script>
