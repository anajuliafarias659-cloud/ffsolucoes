<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Soluções</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.container{
  text-align:center;
  max-width:500px;
  padding:20px;
}

h1{
  font-size:28px;
  margin-bottom:10px;
}

p{
  opacity:.8;
  margin-bottom:25px;
}

.btn{
  display:block;
  width:100%;
  padding:16px;
  margin-bottom:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.whats{
  background:#22c55e;
  color:#020617;
}

.demo{
  background:#00b4ff;
  color:#020617;
}

.ver{
  background:#1e293b;
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Seu negócio online hoje</h1>

<p>
Crie sua loja, receba pedidos e automatize tudo no WhatsApp.
</p>

<button class="btn whats" onclick="irWhats()">
📲 Falar no WhatsApp
</button>

<button class="btn demo" onclick="irTeste()">
🔥 Testar grátis 15 dias
</button>

<button class="btn ver" onclick="verLoja()">
🛍 Ver exemplo funcionando
</button>

</div>

<script>
function irWhats(){
  window.open("https://wa.me/5589981452698","_blank");
}

function irTeste(){
  window.location.href="https://www.ffsolucoes.com.br/super/cadastro-demo.html";
}

function verLoja(){
  window.location.href="https://www.ffsolucoes.com.br/public/agua/";
}
</script>

</body>
</html>
