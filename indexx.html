<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Soluções</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
}

/* HEADER */
.topo{
  text-align:center;
  margin-bottom:25px;
}

.topo h1{
  font-size:26px;
}

.topo p{
  opacity:.7;
  margin-top:8px;
}

/* CARD VISITAS */
.card-visitas{
  background:rgba(0,180,255,.1);
  border:1px solid rgba(0,180,255,.3);
  padding:12px;
  border-radius:12px;
  text-align:center;
  margin-bottom:15px;
  font-size:14px;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:12px;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.03);
}

/* cores */
.whats{
  background:#22c55e;
  color:#020617;
}

.demo{
  background:#00b4ff;
  color:#020617;
}

.ver{
  background:#1e293b;
  color:#fff;
}

/* CARD AVISO */
.card-aviso{
  margin-top:20px;
  padding:18px;
  border-radius:16px;
  background:linear-gradient(135deg,#0f172a,#0b2942);
  border:1px solid rgba(0,180,255,.25);
  text-align:center;
}

.card-aviso h3{
  margin-bottom:10px;
}

.card-aviso p{
  opacity:.8;
  font-size:14px;
}

/* BOTÃO FLUTUANTE */
.whats-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#22c55e;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h1>🚀 Coloque seu negócio online hoje</h1>
    <p>Venda, receba pedidos e automatize tudo</p>
  </div>

  <div class="card-visitas">
    👀 <strong id="contadorVisitas">0</strong> pessoas acessaram hoje
  </div>

  <button class="btn whats" onclick="irWhats()">
    📲 Falar no WhatsApp
  </button>

  <button class="btn demo" onclick="irTeste()">
    🔥 Testar grátis 15 dias
  </button>

  <button class="btn ver" onclick="verLoja()">
    🛍 Ver loja funcionando
  </button>

  <div class="card-aviso">
    <h3>💼 Seu negócio ainda não está aqui?</h3>
    <p>Entre agora e comece a vender online automaticamente.</p>
  </div>

</div>

<button class="whats-float" onclick="irWhats()">💬</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔥 detectar instagram
function veioDoInstagram(){
  const params = new URLSearchParams(window.location.search);
  const ref = document.referrer.toLowerCase();
  return params.get("src") === "insta" || ref.includes("instagram");
}

// 💾 registrar visita (1 por dia por usuário)
async function registrarVisita(){
  const hojeKey = "visitou_" + new Date().toDateString();

  if(localStorage.getItem(hojeKey)) return;

  const origem = veioDoInstagram() ? "instagram" : "direto";

  try{
    await supabase.from("visitas_site").insert({
      origem
    });
  }catch(e){
    console.log("erro visita:", e);
  }

  localStorage.setItem(hojeKey, "1");
}

// 👀 contar visitas reais
async function contarVisitasHoje(){
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const { count } = await supabase
    .from("visitas_site")
    .select("*", { count: "exact", head: true })
    .gte("criado_em", hoje.toISOString());

  let texto = "0 pessoas acessaram hoje";

  if(count === 1){
    texto = "1 pessoa acessou hoje";
  }else if(count > 1){
    texto = `${count} pessoas acessaram hoje`;
  }

  // 🔥 modo marketing
  if(count > 20){
    texto = `🔥 Mais de ${count} pessoas acessaram hoje`;
  }

  document.getElementById("contadorVisitas").innerText = texto;
}

// 🚀 iniciar
await registrarVisita();
await contarVisitasHoje();

// 📲 ações
window.irWhats = function(){
  window.open("https://wa.me/5589981452698","_blank");
}

window.irTeste = function(){
  window.location.href="https://www.ffsolucoes.com.br/super/cadastro-demo.html";
}

window.verLoja = function(){
  window.location.href="https://www.ffsolucoes.com.br/public/agua/";
}

</script>

</body>
</html>
