<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Soluções</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
}

/* HEADER */
.topo{
  text-align:center;
  margin-bottom:25px;
}

.topo h1{
  font-size:26px;
}

.topo p{
  opacity:.7;
  margin-top:8px;
}

/* CARD VISITAS */
.card-visitas{
  background:rgba(0,180,255,.1);
  border:1px solid rgba(0,180,255,.3);
  padding:12px;
  border-radius:12px;
  text-align:center;
  margin-bottom:15px;
  font-size:14px;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:12px;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.03);
}

/* cores */
.whats{
  background:#22c55e;
  color:#020617;
}

.demo{
  background:#00b4ff;
  color:#020617;
}

.ver{
  background:#1e293b;
  color:#fff;
}

/* CARD AVISO */
.card-aviso{
  margin-top:20px;
  padding:18px;
  border-radius:16px;
  background:linear-gradient(135deg,#0f172a,#0b2942);
  border:1px solid rgba(0,180,255,.25);
  text-align:center;
}

.card-aviso h3{
  margin-bottom:10px;
}

.card-aviso p{
  opacity:.8;
  font-size:14px;
}

/* BOTÃO FLUTUANTE */
.whats-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#22c55e;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h1>🚀 Coloque seu negócio online hoje</h1>
    <p>Venda, receba pedidos e automatize tudo</p>
  </div>

  <div class="card-visitas">
    👀 <strong id="contadorVisitas">0</strong> pessoas acessaram hoje
  </div>

  <button class="btn whats" onclick="irWhats()">
    📲 Falar no WhatsApp
  </button>

  <button class="btn demo" onclick="irTeste()">
    🔥 Testar grátis 15 dias
  </button>

  <button class="btn ver" onclick="verLoja()">
    🛍 Ver loja funcionando
  </button>

  <div class="card-aviso">
    <h3>💼 Seu negócio ainda não está aqui?</h3>
    <p>Entre agora e comece a vender online automaticamente.</p>
  </div>

</div>

<button class="whats-float" onclick="irWhats()">💬</button>

<script>
// 🔥 detectar instagram
function veioDoInstagram(){
  const params = new URLSearchParams(window.location.search);
  const ref = document.referrer.toLowerCase();
  return params.get("src") === "insta" || ref.includes("instagram");
}

// 💾 salvar origem
if(veioDoInstagram()){
  localStorage.setItem("origem", "instagram");
}

// 👀 contador simples
let visitas = localStorage.getItem("visitas") || 0;
visitas++;
localStorage.setItem("visitas", visitas);

document.getElementById("contadorVisitas").innerText = visitas;

// 📲 ações
function irWhats(){
  window.open("https://wa.me/5589981452698","_blank");
}

function irTeste(){
  window.location.href="https://www.ffsolucoes.com.br/super/cadastro-demo.html";
}

function verLoja(){
  window.location.href="https://www.ffsolucoes.com.br/public/agua/";
}
</script>

</body>
</html>
