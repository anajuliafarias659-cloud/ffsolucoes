/* BOTÕES */
.btn{

.card-aviso h3{

}

.card-aviso p{

/* BOTÃO FLUTUANTE */
.whats-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#22c55e;
  color:#fff;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔥 detectar instagram
function veioDoInstagram(){
  const params = new URLSearchParams(window.location.search);
  const ref = document.referrer.toLowerCase();
  return params.get("src") === "insta" || ref.includes("instagram");
}

// 💾 registrar visita (1 por dia por usuário)
async function registrarVisita(){
  const hojeKey = "visitou_" + new Date().toDateString();

  if(localStorage.getItem(hojeKey)) return;

  const origem = veioDoInstagram() ? "instagram" : "direto";

  try{
    await supabase.from("visitas_site").insert({
      origem
    });
  }catch(e){
    console.log("erro visita:", e);
  }

  localStorage.setItem(hojeKey, "1");
}

// 👀 contar visitas reais
async function contarVisitasHoje(){
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const { count } = await supabase
    .from("visitas_site")
    .select("*", { count: "exact", head: true })
    .gte("criado_em", hoje.toISOString());

  let texto = "0 pessoas acessaram hoje";

  if(count === 1){
    texto = "1 pessoa acessou hoje";
  }else if(count > 1){
    texto = `${count} pessoas acessaram hoje`;
  }

  // 🔥 modo marketing
  if(count > 20){
    texto = `🔥 Mais de ${count} pessoas acessaram hoje`;
  }

  document.getElementById("contadorVisitas").innerText = texto;
}

// 🚀 iniciar
await registrarVisita();
await contarVisitasHoje();

<script>

function abrirFormulario(){
  document.getElementById("formOverlay").style.display = "flex";

function fecharFormulario(){

}

function enviarWhats(){
  const nome = document.getElementById("nome").value;
  const telefone = document.getElementById("telefone").value;
  const cpf = document.getElementById("cpf").value;
  const endereco = document.getElementById("endereco").value;
  const negocio = document.getElementById("negocio").value;

  if(!nome || !telefone){
    alert("Preencha nome e telefone");
    return;
  }

  const mensagem = `Olá, vim pelo site!

👤 Nome: ${nome}
📞 Telefone: ${telefone}
🪪 CPF: ${cpf}
📍 Endereço: ${endereco}
🏪 Negócio: ${negocio}`;

  const url = "https://wa.me/5589981452698?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
