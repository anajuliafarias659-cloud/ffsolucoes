


<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja</title>

  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#f7fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#0ea5e9;
      --primary-dark:#0369a1;
      --green:#16a34a;
      --green-dark:#15803d;
      --orange:#ea580c;
      --red:#dc2626;
      --shadow:0 10px 30px rgba(2,6,23,.08);
      --radius:20px;
    }

    .destaques{
  margin-top:20px;
}

.destaques h3{
  margin-bottom:10px;
  font-size:18px;
}

.scroll-produtos{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:6px;
}

@keyframes pulseOferta {
  0%{
    transform:scale(1);
    box-shadow:0 10px 30px rgba(2,6,23,.08);
  }
  50%{
    transform:scale(1.04);
    box-shadow:0 18px 42px rgba(14,165,233,.22);
  }
  100%{
    transform:scale(1);
    box-shadow:0 10px 30px rgba(2,6,23,.08);
  }
}

@keyframes pulseImagemOferta {
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.12);
  }
  100%{
    transform:scale(1);
  }
}
.card-destaque{
  min-width:220px;
  background:#fff;
  border-radius:20px;
  border:1px solid rgba(14,165,233,.25);
  padding:12px;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .25s ease, box-shadow .25s ease;

  position:relative;
  overflow:hidden;
}

.card-destaque::after{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:80%;
  height:100%;
  background:linear-gradient(
  120deg,
  transparent,
  rgba(255,255,255,.5),
  transparent
);
  transform:skewX(-25deg);
  animation: brilhoCard 4s infinite;
}

@keyframes brilhoCard{
  0%{ left:-120%; }
  100%{ left:140%; }
}

.card-destaque::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(
    circle at top left,
    rgba(14,165,233,.25),
    transparent 60%
  );
  opacity:.85;
  pointer-events:none;
}

.card-destaque:nth-child(2n){
  animation-delay:.2s;
}

.card-destaque{
  overflow:hidden;
}

.card-destaque:nth-child(3n){
  animation-delay:.4s;
}

.card-destaque:nth-child(2n) img{
  animation-delay:.2s;
}

.card-destaque:nth-child(3n) img{
  animation-delay:.4s;
}
.card-destaque img{
  width:100%;
  height:140px;
  object-fit:contain;
  animation:pulseImagemOferta 1.8s ease-in-out infinite;
  transform-origin:center;
}

.card-destaque:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 18px 40px rgba(14,165,233,.22);
}

.card-destaque .preco{
  color:var(--primary-dark);
  font-weight:bold;
  font-size:18px;
}

    html,body{
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body.tema-saojoao{
  --primary:#ea580c;
  --primary-dark:#c2410c;
  --green:#65a30d;
  --green-dark:#4d7c0f;
  --orange:#f59e0b;
  --red:#dc2626;
  --bg:#fff7ed;
  --card:#ffffff;
  --text:#3f1d0b;
  --muted:#7c5a3b;
  --line:#fed7aa;
  --shadow:0 10px 30px rgba(154,52,18,.10);
}

    body.tema-natal{
      --primary:#15803d;
      --primary-dark:#166534;
      --green:#16a34a;
      --orange:#b91c1c;
    }

    body.tema-anonovo{
      --primary:#1d4ed8;
      --primary-dark:#1e3a8a;
      --green:#16a34a;

    }

    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    .container{
      width:min(1180px, calc(100% - 24px));
      margin:auto;
    }

    .topo{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }

    .mini-galeria{
  position:absolute;
  right:10px;
  bottom:10px;
  display:flex;
  gap:6px;
  z-index:2;
}

.banner{
  width:100%;
  max-width:520px;
  justify-self:end;
}

.mini-thumb{

  border-radius:10px;

}

}

.variacoes-card{

  flex-wrap:wrap;

}

.btn-var{

  color:#334155;
}

.btn-var.ativa{

  border-color:var(--primary);
}

.btn-var:disabled{

}

    .topo-wrap{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
  flex:1;
}

.brand img{

  height:64px;

  background:#fff;
  border:1px solid var(--line);

}

.brand-info{

.brand-info .sub div{

}

.brand-info h1{

  font-size:22px;

  font-weight:800;

}

.brand-info .sub{
  color:var(--muted);

  margin-top:6px;
  line-height:1.45;
  white-space:normal;
  overflow:visible;

  word-break:break-word;
}

    .brand-info .sub{
      color:var(--muted);

      margin-top:4px;
      white-space:nowrap;

    .acoes-topo{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
  flex:0 0 auto;
}

    .pill-status{

      font-weight:bold;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .aberta{
      background:rgba(22,163,74,.10);
      color:var(--green);
      border-color:rgba(22,163,74,.25);
    }

    .fechada{
      background:rgba(220,38,38,.10);
      color:var(--red);
      border-color:rgba(220,38,38,.20);
    }

    .vitrine{
      background:rgba(234,88,12,.10);
      color:var(--orange);
      border-color:rgba(234,88,12,.20);
    }

    .btn-topo,
    .btn-primario,
    .btn-secundario,
    .btn-add,
    .btn-finalizar,
    .btn-carrinho,
    .btn-qtd{
      border:none;
      cursor:pointer;
      font-family:inherit;
      transition:.2s;
    }

    .btn-topo{
      padding:12px 16px;
      border-radius:14px;
      font-weight:bold;
      color:#fff;
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      box-shadow:0 10px 20px rgba(22,163,74,.18);
    }

    .btn-topo:hover,
    .btn-primario:hover,
    .btn-finalizar:hover{
      transform:translateY(-1px);
    }

    .hero{
      padding:18px 0 8px;
    }

    .hero-grid{
  display:grid;
  grid-template-columns:1fr 480px;
  gap:20px;
  align-items:stretch;
}

.hero-card,
.banner{
  min-height:260px;
}

    .hero-card{
  background:linear-gradient(135deg,#e0f2fe,#ffffff);
  border:1px solid #dbeafe;
  border-radius:26px;
  padding:28px;
  box-shadow:var(--shadow);
  min-height:260px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.hero-card h2{
  margin:0 0 10px;
  font-size:52px;
  line-height:1.05;
}

.hero-card p{
  margin:0;
  color:var(--muted);
  font-size:22px;
  line-height:1.5;
}

    .hero-tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .tag{
      padding:10px 14px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
      color:#334155;
    }

   .banner{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  min-height:260px;
  border:1px solid var(--line);
  background:#0f172a;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  animation:pulseOferta 1.2s ease-in-out infinite;
}

.banner img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  animation:pulseImagemOferta 1.8s ease-in-out infinite;
}

.scroll-produtos{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:14px;
  overflow:visible;
  padding-bottom:0;
}

.card-destaque{
  min-width:0;
  width:100%;
}

.modal-motivacional-topo{
  position:sticky;
  top:84px;
  z-index:999;
  display:flex;
  justify-content:center;
  margin:0 0 14px;
  pointer-events:none;
}

.modal-motivacional-topo.oculto{
  display:none;
}

.modal-motivacional-box{
  width:min(760px, 100%);
  background:linear-gradient(135deg,#0ea5e9,#0369a1);
  color:#fff;
  border-radius:22px;
  box-shadow:0 18px 45px rgba(3,105,161,.28);
  padding:14px 18px;
  text-align:center;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  animation:surgeModalTopo .45s ease;
  pointer-events:auto;
}

.modal-motivacional-box::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:70%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.22),
    transparent
  );
  transform:skewX(-25deg);
  animation:brilhoFrase 3.5s infinite;
}

.modal-motivacional-titulo{
  position:relative;
  z-index:1;
  font-size:13px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.92;
  margin-bottom:6px;
}

.modal-motivacional-frase{
  position:relative;
  z-index:1;
  font-size:20px;
  line-height:1.4;
  font-weight:700;
}

.modal-motivacional-fechar{
  position:absolute;
  top:10px;
  right:10px;
  width:34px;
  height:34px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,.16);
  color:#fff;
  font-size:18px;
  cursor:pointer;
  z-index:2;
}

@keyframes surgeModalTopo{
  from{
    opacity:0;
    transform:translateY(-14px) scale(.98);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

@keyframes brilhoFrase{
  0%{ left:-120%; }
  100%{ left:140%; }
}

@media (max-width:768px){
  .modal-motivacional-topo{
    top:76px;
    margin-bottom:12px;
  }

  .modal-motivacional-box{
    border-radius:18px;
    padding:14px 44px 14px 14px;
  }

  .modal-motivacional-frase{
    font-size:16px;
  }
}

@media (min-width: 1025px){
  .container{
  width:min(1180px, calc(100% - 40px));
}

  .hero{
    padding:26px 0 12px;
  }

  .destaques{
    margin-top:10px;
    margin-bottom:12px;
  }

  .barra-wrap{
    display:grid;
    grid-template-columns:1fr 380px;
    gap:18px;
    align-items:center;
  }

  .busca{
    min-width:unset;
    max-width:unset;
    width:100%;
  }

  .produtos{
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:18px;
  }
}

@media (min-width: 1025px){
  .brand-info h1{
    font-size:26px;
  }

  .brand-info .sub{
    font-size:15px;
    white-space:normal;
    overflow:visible;
    text-overflow:unset;
  }
}

  );

@keyframes brilhoBanner{

  if(variacao?.preco !== null && variacao?.preco !== undefined && variacao?.preco !== ""){
    return Number(variacao.preco || 0);
  }
  return Number(produto?.preco || 0);
}

function obterVariacaoPadrao(produto){
  const variacoes = obterVariacoesProduto(produto);

  if(!variacoes.length) return null;

  const disponivel = variacoes.find(v => Number(v.estoque || 0) > 0);
  return disponivel || variacoes[0];
}

function obterTextoVariacao(v){
  const tipo = String(v?.tipo || "").trim();
  const valor = String(v?.valor || "").trim();

  if(tipo && valor) return `${tipo}: ${valor}`;
  if(valor) return valor;
  if(tipo) return tipo;
  return "Variação";
}

    function horaParaMinutos(hora){
      if(!hora || !String(hora).includes(":")) return null;
      const [h,m] = String(hora).split(":").map(Number);
      return (h * 60) + m;
    }

    function estaDentroIntervalo(agora, inicio, fim){
      if(inicio == null || fim == null) return false;
      if(inicio < fim) return agora >= inicio && agora < fim;
      if(inicio > fim) return agora >= inicio || agora < fim;
      return false;

        horaParaMinutos(config.horario_abertura_1),
        horaParaMinutos(config.horario_fechamento_1)
      );

    function aplicarTema(nomeTema){
  const tema = TEMAS[nomeTema];

  if(!tema) return;

  // limpa tudo antes
  Object.keys(TEMAS).forEach(t => {
    Object.keys(TEMAS[t]).forEach(prop => {
      document.documentElement.style.removeProperty(prop);
    });
  });

  // aplica novo tema
  Object.keys(tema).forEach(prop => {
    document.documentElement.style.setProperty(prop, tema[prop]);
  });
}

    window.alterarQtdTemp = function(id, delta){
      const el = document.getElementById("qtd_temp_" + id);
      if(!el) return;
      let atual = Number(el.textContent || 1);
      atual += delta;
      if(atual < 1) atual = 1;
      if(atual > 99) atual = 99;
      el.textContent = atual;
    };

    window.trocarImagemProduto = function(id, img, el){
  const imgEl = document.getElementById(`img_prod_${id}`);
  if(imgEl) imgEl.src = img;

  document
    .querySelectorAll(`#listaProdutos .mini-galeria .mini-thumb`)
    .forEach(t => t.classList.remove("ativa"));

  const grupo = el.parentElement;
  if(grupo){
    grupo.querySelectorAll(".mini-thumb").forEach(t => t.classList.remove("ativa"));
  }

  el.classList.add("ativa");
};

window.selecionarVariacaoProduto = function(id, valor, preco, qtdMinima, el){
  const precoEl = document.getElementById(`preco_prod_${id}`);
  if(precoEl){
    precoEl.textContent = formatarReal(preco);
  }

  const wrap = document.getElementById(`variacoes_${id}`);
  if(wrap){
    wrap.querySelectorAll(".btn-var").forEach(btn => btn.classList.remove("ativa"));
  }

  el.classList.add("ativa");
  el.dataset.valor = valor;
  el.dataset.preco = preco;
  el.dataset.minimo = qtdMinima;
};

    window.adicionarAoCarrinho = function(id){
  if(!podeVenderAgora()){
    alert(
      modoExibicaoAtual(configLoja) === "vitrine"
        ? "No momento a loja está em modo vitrine."
        : (configLoja?.mensagem_fechado || "Estamos fechados no momento.")
    );
    return;
  }

  const produto = todosProdutos.find(p => String(p.id) === String(id));
  if(!produto) return;

  const qtdEl = document.getElementById("qtd_temp_" + id);
  const qtd = Number(qtdEl?.textContent || 1);

  const variacoes = obterVariacoesProduto(produto);
  let variacaoFinal = "Padrão";
  let precoFinal = Number(produto.preco || 0);
  let qtdMinimaFinal = 1;

  if(variacoes.length){
    const botaoAtivo = document.querySelector(`#variacoes_${id} .btn-var.ativa`);

    if(botaoAtivo){
      variacaoFinal = botaoAtivo.dataset.valor || "Padrão";
      precoFinal = Number(botaoAtivo.dataset.preco || produto.preco || 0);
      qtdMinimaFinal = Number(botaoAtivo.dataset.minimo || 1);
    }else{
      const variacaoPadrao = obterVariacaoPadrao(produto);
      if(variacaoPadrao){
        variacaoFinal = String(variacaoPadrao.valor || "Padrão");
        precoFinal = obterPrecoVariacao(produto, variacaoPadrao);
        qtdMinimaFinal = obterQtdMinimaVariacao(variacaoPadrao);
      }
    }
  }

  if(qtd < qtdMinimaFinal){
    alert(`Para essa opção, o mínimo é ${qtdMinimaFinal} unidade(s).`);
    return;
  }

  const existente = carrinho.find(i =>
    String(i.id) === String(produto.id) &&
    String(i.variacao || "Padrão") === String(variacaoFinal)
  );

  if(existente){
    existente.qtd += qtd;
  }else{
    carrinho.push({
      ...produto,
      qtd,
      variacao: variacaoFinal,
      preco: precoFinal,
      qtd_minima: qtdMinimaFinal
    });
  }


  salvarCarrinho();

  if(normalizarModoVenda(configLoja?.modo_venda) === "whatsapp"){
    abrirCarrinho();
  }else{
    alert("Produto adicionado ao carrinho.");
  }
};

    window.mudarQtdCarrinho = function(id, delta){
  const item = carrinho.find(i => String(i.id) === String(id));
  if(!item) return;

  const novaQtd = Number(item.qtd || 0) + delta;
  const minimo = Number(item.qtd_minima || 1);

  // 🔒 bloqueia cair abaixo do mínimo
  if(delta < 0 && novaQtd > 0 && novaQtd < minimo){
    alert(`A quantidade mínima para ${item.nome} (${item.variacao || "Padrão"}) é ${minimo}.`);
    return;
  }

  item.qtd = novaQtd;

  if(item.qtd <= 0){
    carrinho = carrinho.filter(i =>
      !(String(i.id) === String(id) && String(i.variacao || "Padrão") === String(item.variacao || "Padrão"))
    );
  }

  salvarCarrinho();
  renderizarCarrinho();
};

    window.removerCarrinho = function(id){
      carrinho = carrinho.filter(i => String(i.id) !== String(id));
      salvarCarrinho();
      renderizarCarrinho();

function pegarLocalizacaoCliente(){
  if(!navigator.geolocation){
    statusLocalizacao.textContent = "Geolocalização não suportada.";
    return;
  }

  statusLocalizacao.textContent = "Pegando localização...";

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const maps = `https://www.google.com/maps?q=${lat},${lng}`;

      document.getElementById("clienteLat").value = lat;
      document.getElementById("clienteLng").value = lng;
      document.getElementById("clienteMaps").value = maps;

      statusLocalizacao.innerHTML = `✅ Localização capturada <a href="${maps}" target="_blank">Ver no mapa</a>`;
    },
    () => {
      statusLocalizacao.textContent = "Erro ao pegar localização.";
    }
  );
}

function obterDataHoje(){
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mes = String(hoje.getMonth() + 1).padStart(2, "0");
  const dia = String(hoje.getDate()).padStart(2, "0");
  return `${ano}-${mes}-${dia}`;
}

function mostrarModalMotivacionalDoDia(){
  if(!modalMotivacionalTopo || !fraseMotivacional) return;

  const hoje = obterDataHoje();
  const salvo = localStorage.getItem(CHAVE_FRASE_DIA);

  if(salvo === hoje){
    modalMotivacionalTopo.classList.add("oculto");
    return;
  }

  const frases = obterFrasesMotivacionais();
  const indiceBase = Number(hoje.replace(/\D/g, "")) || 0;
  const frase = frases[indiceBase % frases.length];

  fraseMotivacional.textContent = frase;
  modalMotivacionalTopo.classList.remove("oculto");
}

window.fecharModalMotivacional = function(){
  modalMotivacionalTopo?.classList.add("oculto");
  localStorage.setItem(CHAVE_FRASE_DIA, obterDataHoje());
};

async function verificarStatusPagamento(pedidoId){
  const { data, error } = await supabase
    .from("pedidos")
    .select("pagamento_status,status")
    .eq("id", pedidoId)
    .single();

  if(error || !data) return;

  const statusPagamento = String(data.pagamento_status || "").toLowerCase();

  if(statusPagamento === "approved"){
    alert("✅ Pagamento confirmado!");

    carrinho = [];
    salvarCarrinho();
    renderizarCarrinho();
    fecharCarrinho();

    clearInterval(window.verificacaoPix);
    return;
  }

  if(statusPagamento === "pending"){
    return;
  }

  if(statusPagamento === "rejected" || statusPagamento === "cancelled"){
    clearInterval(window.verificacaoPix);
    alert("❌ Pagamento não aprovado.");
  }
}

window.selecionarPagamentoSistema = async function(tipo){
  formaPagamentoSistema = tipo;

  const areaPix = document.getElementById("areaPixSistema");
  if(areaPix){
    areaPix.style.display = tipo === "pix" ? "block" : "none";
  }

  btnFinalizar.textContent =
    tipo === "pix"
      ? "Gerando PIX..."
      : "Pagar com cartão / Mercado Pago";

  if(tipo === "pix"){
    await finalizarPixSistema();
  }
};

window.copiarPixCopiaCola = async function(){
  const codigo = document.getElementById("pixCopiaCola").value || "";

  if(!codigo){
    alert("Nenhum código PIX gerado.");
    return;
  }

  try{
    await navigator.clipboard.writeText(codigo);
    alert("✅ Código PIX copiado!");
  }catch{
    alert("Não foi possível copiar.");
  }
};

async function finalizarPixSistema(){
  if(!carrinho.length){
    alert("Carrinho vazio");
    return;
  }

  const nome = document.getElementById("clienteNome").value.trim();
  const telefone = document.getElementById("clienteTelefone").value.trim();
  const email = document.getElementById("clienteEmail")?.value?.trim();
  const rua = document.getElementById("clienteRua").value.trim();
  const numero = document.getElementById("clienteNumero").value.trim();
  const bairro = document.getElementById("clienteBairro").value.trim();
  const cidade = document.getElementById("clienteCidade").value.trim();
  const obs = document.getElementById("clienteObs").value.trim();
  const maps = document.getElementById("clienteMaps")?.value || "";
  const lat = document.getElementById("clienteLat")?.value || null;
  const lng = document.getElementById("clienteLng")?.value || null;

  if(!nome){
    alert("Informe seu nome.");
    return;
  }

  if(!telefone){
    alert("Informe seu telefone / WhatsApp.");
    return;
  }

  btnFinalizar.disabled = true;
  btnFinalizar.textContent = "Gerando PIX...";

  try{
    const total = Number(Number(totalCarrinho()).toFixed(2));

    if(!Number.isFinite(total) || total <= 0){
      throw new Error("Total inválido para gerar PIX.");
    }

    const itensPedido = carrinho.map((item) => ({
      produto_id: item.id || null,
      nome: item.nome || "Produto",
      variacao: item.variacao || "Padrão",
      qtd: Number(item.qtd || 1),
      preco: Number(item.preco || 0),
      subtotal: Number(item.preco || 0) * Number(item.qtd || 1)
    }));

    const codigoAcompanhamento = `PED${Date.now()}`;

const payloadPedido = {
  app_id: APP_ID,

  cliente_nome: nome,
  cliente_telefone: telefone,

  cliente_rua: rua || "",
  cliente_numero: numero || "",
  cliente_bairro: bairro || "",
  cliente_cidade: cidade || "",

  cliente_localizacao: maps || null,
  observacao: obs || "",

  itens: itensPedido,
  total: total,

  status: "novo",
  pagamento_tipo: "pix",
  pagamento_modo: "mercadopago_pix",
  pagamento_status: "pending"
};

    const { data: pedidoCriado, error: erroPedido } = await supabase
      .from("pedidos")
      .insert([payloadPedido])
      .select("id")
      .single();

    if(erroPedido || !pedidoCriado?.id){
      console.error(erroPedido);
      throw new Error("Erro ao criar pedido no banco.");
    }

    const pedidoId = String(pedidoCriado.id);

    const payloadPix = {
      appId: String(APP_ID),
      pedidoId: pedidoId,
      transaction_amount: total,
      description: `Pedido ${pedidoId}`,
      payerEmail: email || "cliente@cliente.com"
    };

    const resp = await fetch(
      "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pix-loja",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY
        },
        body: JSON.stringify(payloadPix)
      }
    );

    const data = await resp.json().catch(() => ({}));

    if(!resp.ok){
      const detalhe =
        data?.detalhes?.message ||
        data?.erro ||
        JSON.stringify(data);

      throw new Error(detalhe || "Erro ao gerar PIX");
    }

    const copiaColaTexto =
      data?.pix_copia_cola ||
      data?.pixCopiaCola ||
      data?.copia_cola ||
      "";

    const qrBase64 =
      data?.qr_code_base64 ||
      data?.qrCodeBase64 ||
      data?.base64 ||
      "";

    await supabase
  .from("pedidos")
  .update({
    pagamento_status: data?.status || "pending",
    mp_payment_id: data?.id ? String(data.id) : null,
    mp_qr_code: copiaColaTexto || null,
    status: "novo",
    status_entrega: "Pedido recebido"
  })
  .eq("id", pedidoId);

    document.getElementById("areaPixSistema").style.display = "block";

    const status = document.getElementById("statusPagamentoPix");
    const qrArea = document.getElementById("pixQrCodeArea");
    const copiaCola = document.getElementById("pixCopiaCola");

    if(status){
      status.textContent = "✅ PIX gerado. Faça o pagamento para concluir.";
      btnFinalizar.textContent = "Aguardando pagamento... (PIX gerado)";
      btnFinalizar.disabled = true;
    }

    if(copiaCola){
      copiaCola.value = copiaColaTexto;
    }

    if(qrArea){
      if(qrBase64){
        qrArea.innerHTML = `
          <img src="data:image/png;base64,${qrBase64}" style="max-width:220px;width:100%;">
        `;
      }else{
        qrArea.innerHTML = "";
      }
    }

    iniciarVerificacaoPix(pedidoId);

  }catch(e){
    console.error(e);
    alert(e.message || "Erro ao gerar PIX");
    btnFinalizar.disabled = false;
    btnFinalizar.textContent = "Gerar PIX";
  }
}
