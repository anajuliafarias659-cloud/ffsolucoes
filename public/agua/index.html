

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja</title>

  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#f7fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#0ea5e9;
      --primary-dark:#0369a1;
      --green:#16a34a;
      --green-dark:#15803d;
      --orange:#ea580c;
      --red:#dc2626;
      --shadow:0 10px 30px rgba(2,6,23,.08);
      --radius:20px;
    }

    .destaques{
  margin-top:20px;
}

.destaques h3{
  margin-bottom:10px;
  font-size:18px;
}

.scroll-produtos{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:6px;
}

.card-destaque{
  min-width:220px;
  background:#fff;
  border-radius:20px;
  border:1px solid var(--line);
  padding:12px;
  box-shadow:var(--shadow);
  cursor:pointer;
}

.card-destaque img{
  width:100%;
  height:140px;
  object-fit:contain;
}

.card-destaque .preco{
  color:var(--primary-dark);
  font-weight:bold;
  font-size:18px;
}

    html,body{
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body.tema-natal{
      --primary:#15803d;
      --primary-dark:#166534;
      --green:#16a34a;
      --orange:#b91c1c;
    }

    body.tema-anonovo{
      --primary:#1d4ed8;
      --primary-dark:#1e3a8a;
      --green:#16a34a;
      --orange:#ca8a04;
    }

    body.tema-capivara{
      --primary:#92400e;
      --primary-dark:#78350f;
      --green:#65a30d;
      --orange:#ea580c;
    }

    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    .container{
      width:min(1180px, calc(100% - 24px));
      margin:auto;
    }

    .topo{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }

    .mini-galeria{
  position:absolute;
  right:10px;
  bottom:10px;
  display:flex;
  gap:6px;
  z-index:2;
}

.mini-thumb{
  width:34px;
  height:34px;
  border-radius:10px;
  object-fit:cover;
  border:2px solid rgba(255,255,255,.85);
  background:#fff;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(2,6,23,.12);
}

.mini-thumb.ativa{
  border-color:var(--primary);
}

.variacoes-card{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.btn-var{
  border:none;
  border-radius:999px;
  padding:8px 12px;
  background:#f8fafc;
  border:1px solid var(--line);
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
  color:#334155;
}

.btn-var.ativa{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}

.btn-var:disabled{
  opacity:.45;
  cursor:not-allowed;
}

    .topo-wrap{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
  flex:1;
}

.brand img{
  width:64px;
  height:64px;
  object-fit:contain;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--line);
  padding:4px;
  display:none;
  flex:0 0 auto;
}

.brand-info{
  min-width:0;
  flex:1;
}

.brand-info .sub div{
  margin-top:2px;
}

.rodape div{
  margin-top:4px;
}

.brand-info h1{
  margin:0;
  font-size:22px;
  line-height:1.1;
  font-weight:800;
  white-space:normal;
  overflow:visible;
  text-overflow:unset;
  word-break:break-word;
}

.brand-info .sub{
  color:var(--muted);
  font-size:14px;
  margin-top:6px;
  line-height:1.45;
  white-space:normal;
  overflow:visible;
  text-overflow:unset;
  word-break:break-word;
}

    .brand-info .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .acoes-topo{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
  flex:0 0 auto;
}

    .pill-status{
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .aberta{
      background:rgba(22,163,74,.10);
      color:var(--green);
      border-color:rgba(22,163,74,.25);
    }

    .fechada{
      background:rgba(220,38,38,.10);
      color:var(--red);
      border-color:rgba(220,38,38,.20);
    }

    .vitrine{
      background:rgba(234,88,12,.10);
      color:var(--orange);
      border-color:rgba(234,88,12,.20);
    }

    .btn-topo,
    .btn-primario,
    .btn-secundario,
    .btn-add,
    .btn-finalizar,
    .btn-carrinho,
    .btn-qtd{
      border:none;
      cursor:pointer;
      font-family:inherit;
      transition:.2s;
    }

    .btn-topo{
      padding:12px 16px;
      border-radius:14px;
      font-weight:bold;
      color:#fff;
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      box-shadow:0 10px 20px rgba(22,163,74,.18);
    }

    .btn-topo:hover,
    .btn-primario:hover,
    .btn-finalizar:hover{
      transform:translateY(-1px);
    }

    .hero{
      padding:18px 0 8px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:16px;
      align-items:stretch;
    }

    .hero-card{
      background:linear-gradient(135deg,#e0f2fe,#ffffff);
      border:1px solid #dbeafe;
      border-radius:26px;
      padding:22px;
      box-shadow:var(--shadow);
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .hero-card h2{
      margin:0 0 8px;
      font-size:34px;
      line-height:1.05;
    }

    .hero-card p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .hero-tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .tag{
      padding:10px 14px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
      color:#334155;
    }

    .banner{
      position:relative;
      overflow:hidden;
      border-radius:26px;
      min-height:220px;
      border:1px solid var(--line);
      background:#0f172a;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
    }

    .banner img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .banner::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(15,23,42,.20),rgba(15,23,42,.50));
    }

    .banner-texto{
      position:relative;
      z-index:1;
      padding:18px;
      font-size:22px;
      font-weight:bold;
      text-shadow:0 2px 10px rgba(0,0,0,.35);
    }

    .aviso{
      margin-top:14px;
      background:#fff7ed;
      border:1px solid #fdba74;
      color:#9a3412;
      border-radius:18px;
      padding:16px;
      display:none;
      box-shadow:var(--shadow);
    }

    .aviso h3{
      margin:0 0 6px;
      font-size:16px;
    }

    .aviso p{
      margin:4px 0 0;
      font-size:14px;
      line-height:1.45;
    }

    .barra{
      padding:18px 0 6px;
    }

    .barra-wrap{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .filtros{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .filtros button{
      border:none;
      cursor:pointer;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      font-weight:bold;
      color:#334155;
    }

    .filtros button.ativo{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .busca{
      min-width:240px;
      flex:1;
      max-width:360px;
    }

    .busca input{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      outline:none;
      font-size:14px;
    }

    .produtos{
      padding:8px 0 110px;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .foto{
      aspect-ratio:1/1;
      background:linear-gradient(180deg,#f8fafc,#eef6ff);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      position:relative;
    }

    .foto img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .badge-categoria{
      position:absolute;
      top:10px;
      left:10px;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      font-size:11px;
      font-weight:bold;
      color:#334155;
    }

    .conteudo{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .nome{
      font-size:17px;
      font-weight:bold;
      line-height:1.25;
      min-height:42px;
    }

    .desc{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      min-height:38px;
    }

    .preco-row{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:8px;
    }

    .preco{
      font-size:24px;
      font-weight:800;
      color:var(--primary-dark);
      line-height:1;
    }

    .estoque{
      font-size:12px;
      color:var(--muted);
      font-weight:bold;
    }

    .acoes-produto{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qtd-box{
      display:flex;
      align-items:center;
      gap:6px;
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:6px;
    }

    .btn-qtd{
      width:32px;
      height:32px;
      border-radius:10px;
      background:#fff;
      border:1px solid var(--line);
      font-size:18px;
      font-weight:bold;
      color:#334155;
    }

    .qtd-num{
      min-width:20px;
      text-align:center;
      font-weight:bold;
      font-size:15px;
    }

    .btn-add{
      flex:1;
      padding:13px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      font-weight:bold;
      font-size:14px;
    }

    .vazio{
      grid-column:1/-1;
      background:#fff;
      border:1px dashed var(--line);
      border-radius:20px;
      padding:32px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .btn-carrinho{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:1100;
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 18px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      font-weight:bold;
      box-shadow:0 18px 40px rgba(3,105,161,.30);
    }

    .contador{
      min-width:24px;
      height:24px;
      border-radius:999px;
      background:#fff;
      color:var(--primary-dark);
      display:grid;
      place-items:center;
      font-size:12px;
      font-weight:800;
      padding:0 6px;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.55);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:1200;
      padding:16px;
    }

    .modal.ativo{
      display:flex;
    }

    .modal-box{
      width:min(720px,100%);
      max-height:92vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      box-shadow:0 30px 80px rgba(2,6,23,.30);
      padding:18px;
    }

    .modal-topo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
      position:sticky;
      top:0;
      background:#fff;
      padding-bottom:10px;
      z-index:2;
    }

    .modal-topo h3{
      margin:0;
      font-size:22px;
    }

    .fechar{
      width:40px;
      height:40px;
      border:none;
      border-radius:12px;
      background:#f8fafc;
      border:1px solid var(--line);
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
    }

    .lista-carrinho{
      display:grid;
      gap:12px;
    }

    .item-carrinho{
      display:grid;
      grid-template-columns:70px 1fr auto;
      gap:12px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
    }

    .item-carrinho img{
      width:70px;
      height:70px;
      border-radius:14px;
      object-fit:contain;
      background:#f8fafc;
      border:1px solid var(--line);
      padding:6px;
    }

    .item-carrinho h4{
      margin:0 0 4px;
      font-size:15px;
    }

    .item-carrinho p{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }

    .item-carrinho .valor{
      font-weight:bold;
      color:var(--primary-dark);
      margin-top:6px;
      font-size:14px;
    }

    .item-acoes{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
    }

    .item-acoes button{
      border:none;
      cursor:pointer;
      border-radius:10px;
      padding:8px 10px;
      font-weight:bold;
      background:#f8fafc;
      border:1px solid var(--line);
    }

    .dados{
      margin-top:16px;
      border-top:1px solid var(--line);
      padding-top:16px;
      display:grid;
      gap:12px;
    }

    .bloco{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }

    .bloco h4{
      margin:0 0 10px;
      font-size:16px;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    input, textarea{
  width:100%;
  padding:12px 13px;
  border-radius:14px;
  border:1px solid var(--line);
  outline:none;
  font-family:inherit;
  font-size:16px;
  background:#fff;
}

    textarea{
      min-height:90px;
      resize:vertical;
    }

    .resumo{
      display:grid;
      gap:8px;
      font-size:14px;
      color:#334155;
    }

    .resumo strong{
      color:#0f172a;
    }

    .btn-finalizar{
      width:100%;
      padding:15px;
      border-radius:16px;
      font-size:16px;
      font-weight:bold;
      color:#fff;
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      box-shadow:0 14px 30px rgba(22,163,74,.22);
      margin-top:8px;
    }

    .rodape{
  padding:30px 0 100px;
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

    @media (max-width:1024px){
      .produtos{grid-template-columns:repeat(3,minmax(0,1fr))}
      .hero-grid{grid-template-columns:1fr}
    }

    @media (max-width:768px){
      .produtos{grid-template-columns:repeat(2,minmax(0,1fr))}
      .topo-wrap{align-items:flex-start;flex-direction:column}
      .acoes-topo{width:100%;justify-content:flex-start}
      .grid2{grid-template-columns:1fr}
    }

    @media (max-width:768px){
  .produtos{grid-template-columns:repeat(2,minmax(0,1fr))}
  .topo-wrap{
    align-items:flex-start;
    flex-direction:column;
    gap:12px;
  }

  .brand{
    width:100%;
    align-items:flex-start;
  }

  .brand img{
    width:78px;
    height:78px;
    border-radius:18px;
  }

  .brand-info{
    padding-top:2px;
  }

  .brand-info h1{
    font-size:22px;
    line-height:1.15;
  }

  .brand-info .sub{
    font-size:14px;
    line-height:1.5;
  }

  .acoes-topo{
    width:100%;
    justify-content:flex-start;
  }

  .pill-status{
    font-size:13px;
    padding:10px 13px;
  }

  .btn-topo{
    padding:12px 15px;
    font-size:14px;
  }

  .grid2{grid-template-columns:1fr}
}

@media (max-width:520px){
  .produtos{grid-template-columns:1fr}

  .topo{
    padding-top:10px;
    padding-bottom:10px;
  }

  .container{
    width:min(100%, calc(100% - 16px));
  }

  .brand{
    gap:12px;
  }

  .brand img{
    width:88px;
    height:88px;
    border-radius:20px;
  }

  .brand-info h1{
    font-size:21px;
  }

  .brand-info .sub{
    font-size:14px;
    color:#475569;
  }

  .hero-card h2{
    font-size:26px;
  }

  .btn-carrinho{
    right:12px;
    left:12px;
    bottom:12px;
    justify-content:center;
  }
}
  </style>
</head>
<body>
  <header class="topo">
    <div class="container topo-wrap">
      <div class="brand">
        <img id="logoLoja" alt="Logo">
        <div class="brand-info">
          <h1 id="nomeLoja">Loja</h1>
          <div class="sub" id="infoLoja"></div>
        </div>
      </div>

      <div class="acoes-topo">
        <div id="statusLoja" class="pill-status aberta">🟢 Loja aberta</div>
        <a id="btnWhatsTopo" class="btn-topo" href="#" target="_blank">WhatsApp</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <section class="destaques">
  <h3>🔥 Ofertas do dia</h3>

  <div class="scroll-produtos" id="produtosDestaque"></div>
</section>
      <div class="hero-grid">
        <div class="hero-card">
  <h2 id="heroTitulo">Sua loja</h2>
  <p id="heroTexto">Escolha seus produtos e finalize seu pedido.</p>
  <div class="hero-tags" id="heroTags"></div>
</div>

        <div class="banner" id="bannerArea">
          <div class="banner-texto">Sua loja</div>
        </div>
      </div>

      <div id="avisoFuncionamento" class="aviso"></div>
    </section>

    <section class="barra">
      <div class="barra-wrap">
        <div class="filtros" id="listaCategorias"></div>
        <div class="busca">
          <input type="text" id="buscaProduto" placeholder="Buscar água, gás, galão..." />
        </div>
      </div>
    </section>

    <section class="produtos" id="listaProdutos"></section>

    <section class="rodape">
      <div id="rodapeInfo"></div>
    </section>
  </main>

  <button id="btnCarrinho" class="btn-carrinho">
    🛒 Carrinho
    <span class="contador" id="contadorCarrinho">0</span>
  </button>

  <div class="modal" id="modalCarrinho">
    <div class="modal-box">
      <div class="modal-topo">
        <h3>Seu pedido</h3>
        <button class="fechar" onclick="fecharCarrinho()">✕</button>
      </div>

      <div class="lista-carrinho" id="itensCarrinho"></div>

      <div class="dados">
        <div class="bloco">
          <h4>Dados do cliente</h4>
          <div class="grid2">
            <input id="clienteNome" placeholder="Seu nome" />
            <input id="clienteTelefone" placeholder="Telefone / WhatsApp" />
          </div>
        </div>

        <div class="bloco">
          <h4>Entrega</h4>
          <div class="grid2">
            <input id="clienteRua" placeholder="Rua" />
            <input id="clienteNumero" placeholder="Número" />
            <input id="clienteBairro" placeholder="Bairro" />
            <input id="clienteCidade" placeholder="Cidade" />
          </div>

    function obterImagensProduto(produto){

    return Array.isArray(variacoes) ? variacoes : [];
  }catch{
    return [];

}

function obterPrecoVariacao(produto, variacao){
  if(variacao?.preco !== null && variacao?.preco !== undefined && variacao?.preco !== ""){
    return Number(variacao.preco || 0);
  }
  return Number(produto?.preco || 0);
}

function obterVariacaoPadrao(produto){
  const variacoes = obterVariacoesProduto(produto);

  if(!variacoes.length) return null;

  const disponivel = variacoes.find(v => Number(v.estoque || 0) > 0);
  return disponivel || variacoes[0];
}

function obterTextoVariacao(v){
  const tipo = String(v?.tipo || "").trim();
  const valor = String(v?.valor || "").trim();

  if(tipo && valor) return `${tipo}: ${valor}`;
  if(valor) return valor;
  if(tipo) return tipo;
  return "Variação";
}

function obterQtdMinimaVariacao(variacao){
  const tipo = String(variacao?.tipo || "").toLowerCase();
  const valor = String(variacao?.valor || "").toLowerCase();

  // regra automática se for atacado
  if(tipo.includes("atacado") || valor.includes("atacado")){
    return 10;
  }

  const qtd = Number(variacao?.qtd_minima || 0);
  return qtd > 0 ? qtd : 1;
}

function obterPrecoInicialProduto(produto){

  }

  
  return Number(produto.preco || 0);
}

    function horaParaMinutos(hora){
      if(!hora || !String(hora).includes(":")) return null;
      const [h,m] = String(hora).split(":").map(Number);
      return (h * 60) + m;
    }

    function estaDentroIntervalo(agora, inicio, fim){
      if(inicio == null || fim == null) return false;
      if(inicio < fim) return agora >= inicio && agora < fim;
      if(inicio > fim) return agora >= inicio || agora < fim;
      return false;
    }

    function lojaAbertaAutomatica(config){
      if(!config?.fechamento_automatico){
        return config?.loja_fechada !== true;
      }

      const agora = new Date();
      const minutosAgora = (agora.getHours() * 60) + agora.getMinutes();

      return estaDentroIntervalo(
        minutosAgora,
        horaParaMinutos(config.horario_abertura_1),
        horaParaMinutos(config.horario_fechamento_1)
      );
    }

      `).join("");

      resumoPedido.innerHTML = `
        <div><strong>Itens:</strong> ${carrinho.reduce((a,b)=>a + Number(b.qtd || 0), 0)}</div>
        <div><strong>Total:</strong> ${formatarReal(totalCarrinho())}</div>
        <div><strong>Modo de venda:</strong> ${normalizarModoVenda(configLoja?.modo_venda) === "whatsapp" ? "WhatsApp" : "Sistema"}</div>
      `;
    }

    window.mudarQtdCarrinho = function(id, delta){
  const item = carrinho.find(i => String(i.id) === String(id));
  if(!item) return;

  const novaQtd = Number(item.qtd || 0) + delta;
  const minimo = Number(item.qtd_minima || 1);

  // 🔒 bloqueia cair abaixo do mínimo
  if(delta < 0 && novaQtd > 0 && novaQtd < minimo){
    alert(`A quantidade mínima para ${item.nome} (${item.variacao || "Padrão"}) é ${minimo}.`);
    return;
  }

  item.qtd = novaQtd;

  if(item.qtd <= 0){
    carrinho = carrinho.filter(i =>
      !(String(i.id) === String(id) && String(i.variacao || "Padrão") === String(item.variacao || "Padrão"))
    );
  }

  salvarCarrinho();
  renderizarCarrinho();
};

    window.removerCarrinho = function(id){
      carrinho = carrinho.filter(i => String(i.id) !== String(id));
      salvarCarrinho();
      renderizarCarrinho();
    };

    function abrirCarrinho(){
      renderizarCarrinho();
      modalCarrinho.classList.add("ativo");
    }

    window.fecharCarrinho = function(){
      modalCarrinho.classList.remove("ativo");
    };

    async function finalizarSistema(){
      alert("Aqui você encaixa seu fluxo atual do sistema / Mercado Pago sem mudar o config.");
    }

    function montarTextoWhatsapp(){
      const nome = document.getElementById("clienteNome").value.trim();
      const telefone = document.getElementById("clienteTelefone").value.trim();
      const rua = document.getElementById("clienteRua").value.trim();
      const numero = document.getElementById("clienteNumero").value.trim();
      const bairro = document.getElementById("clienteBairro").value.trim();
      const cidade = document.getElementById("clienteCidade").value.trim();
      const obs = document.getElementById("clienteObs").value.trim();

      let msg = `Olá! Quero fazer um pedido na loja ${configLoja?.nome_site || ""}.\n\n`;

      msg += `*Produtos:*\n`;
      carrinho.forEach(item => {
        msg += `- ${item.nome} (${item.variacao || "Padrão"}) | Qtd: ${item.qtd} | ${formatarReal(item.preco || 0)}\n`;
      });

      msg += `\n*Total:* ${formatarReal(totalCarrinho())}\n`;

      if(nome) msg += `\n*Cliente:* ${nome}`;
      if(telefone) msg += `\n*Telefone:* ${telefone}`;

      const endereco = [rua, numero, bairro, cidade].filter(Boolean).join(", ");
      if(endereco) msg += `\n*Endereço:* ${endereco}`;

      if(obs) msg += `\n*Obs:* ${obs}`;

      return msg;
    }

    async function finalizarWhatsapp(){
      if(!carrinho.length){
        alert("Seu carrinho está vazio.");
        return;
      }

      const numero = apenasNumeros(configLoja?.whatsapp_numero || configLoja?.telefone || "");
      if(!numero){
        alert("WhatsApp da loja não configurado.");
        return;
      }

      salvarUltimoPedido();

      const texto = montarTextoWhatsapp();
      const url = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;

      window.open(url, "_blank");

      carrinho = [];
      salvarCarrinho();
      renderizarCarrinho();
      fecharCarrinho();
    }

    btnCarrinho.addEventListener("click", abrirCarrinho);

    modalCarrinho.addEventListener("click", (e) => {
      if(e.target === modalCarrinho) fecharCarrinho();
    });

    buscaProduto.addEventListener("input", () => {
      textoBusca = buscaProduto.value.trim();
      renderizarProdutos();
    });

    btnFinalizar.addEventListener("click", async () => {
      if(!carrinho.length){
        alert("Seu carrinho está vazio.");
        return;
      }

      if(normalizarModoVenda(configLoja?.modo_venda) === "whatsapp"){
        finalizarWhatsapp();
      }else{
        finalizarSistema();
      }
    });

    async function init(){
      await resolverAppId();
      if(!APP_ID) return;

      CARRINHO_KEY = `carrinho_${APP_ID}`;
      ULTIMO_PEDIDO_KEY = `ultimo_pedido_${APP_ID}`;
      carrinho = JSON.parse(localStorage.getItem(CARRINHO_KEY) || "[]");

      salvarCarrinho();
      await carregarConfig();
      await carregarProdutos();
    }

    init();

   window.comprarDestaque = function(id){
  const produto = todosProdutos.find(p => String(p.id) === String(id));
  if(!produto) return;

  let qtdCompra = 1;
  const variacaoPadrao = obterVariacaoPadrao(produto);

  if(variacaoPadrao){
    qtdCompra = obterQtdMinimaVariacao(variacaoPadrao);
  }

  const qtdEl = document.getElementById("qtd_temp_" + id);
  if(qtdEl){
    qtdEl.textContent = qtdCompra;
  }

  adicionarAoCarrinho(id);
  abrirCarrinho();
};

window.irParaProduto = function(id){
  const el = document.getElementById("produto_" + id);
  if(!el) return;

  el.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });

  // efeito visual
  el.style.boxShadow = "0 0 0 3px var(--primary)";
  el.style.transform = "scale(1.02)";

  setTimeout(() => {
    el.style.boxShadow = "";
    el.style.transform = "";
  }, 1500);
};
  </script>
