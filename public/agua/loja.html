<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loja Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let APP_ID = null;
let CONFIG = {};
let PRODUTOS = [];
let CARRINHO = [];

const params = new URLSearchParams(location.search);
const appIdUrl = params.get("app_id");
const slugUrl = params.get("slug");
const partes = location.pathname.split("/").filter(Boolean);
const slugPath = partes[partes.length - 1];

function moeda(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

async function resolverAppId(){
  if(appIdUrl){
    APP_ID = appIdUrl;
    return;
  }

  const dominio = location.hostname.replace("www.","");

  const { data: dominioRow } = await supabase
    .from("dominios_publicos")
    .select("app_id")
    .eq("dominio", dominio)
    .eq("ativo", true)
    .maybeSingle();

  if(dominioRow?.app_id){
    APP_ID = dominioRow.app_id;
    return;
  }

  const slugFinal = slugUrl || slugPath;

  if(slugFinal){
    const { data: cfgSlug } = await supabase
      .from("config_site")
      .select("app_id")
      .or(`slug.eq.${slugFinal},app_id.eq.${slugFinal}`)
      .maybeSingle();

    if(cfgSlug?.app_id){
      APP_ID = cfgSlug.app_id;
      return;
    }
  }

  document.getElementById("listaProdutos").innerHTML =
    `<div class="vazio">Loja não encontrada. Verifique o app_id, slug ou domínio.</div>`;
}

async function carregarConfig(){
  const { data, error } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", APP_ID)
    .maybeSingle();

  if(error) console.error(error);

  CONFIG = data || {};

  document.title = CONFIG.nome_loja || CONFIG.nome || "Loja Online";

  document.getElementById("nomeLoja").innerText =
    CONFIG.nome_loja || CONFIG.nome || "Minha Loja";

  document.getElementById("heroTitulo").innerText =
    CONFIG.banner_titulo || CONFIG.nome_loja || CONFIG.nome || "Sua loja online";

  document.getElementById("heroTexto").innerText =
    CONFIG.banner_texto || "Escolha seus produtos e finalize seu pedido.";

  document.getElementById("telefoneLoja").innerText =
    CONFIG.whatsapp_numero || CONFIG.telefone || "WhatsApp não configurado";

  document.getElementById("enderecoLoja").innerText =
    CONFIG.endereco || "Endereço não informado";

  const logo = CONFIG.logo_url || CONFIG.logo || "";
  if(logo){
    document.getElementById("logoImg").src = logo;
    document.getElementById("logoImg").style.display = "block";
  }

  const banner = CONFIG.banner_url || CONFIG.banner_imagem || CONFIG.banner || "";
  if(banner){
    document.querySelector(".hero").style.backgroundImage =
      `linear-gradient(135deg,rgba(0,0,0,.65),rgba(37,99,235,.55)),url('${banner}')`;
  }
}

async function carregarProdutos(){
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .order("nome", { ascending:true });

  if(error){
    console.error(error);
    document.getElementById("listaProdutos").innerHTML =
      `<div class="vazio">Erro ao carregar produtos.</div>`;
    return;
  }

  PRODUTOS = data || [];
  renderizarCategorias();
  renderizarProdutos();
}

function pegarImagem(p){
  if(p.imagem_url) return p.imagem_url;
  if(p.foto_url) return p.foto_url;
  if(p.imagem) return p.imagem;
  if(p.foto) return p.foto;

  if(Array.isArray(p.imagens) && p.imagens.length) return p.imagens[0];

  try{
    const imgs = JSON.parse(p.imagens || "[]");
    if(Array.isArray(imgs) && imgs.length) return imgs[0];
  }catch(e){}

  return "";
}

function pegarPreco(p){
  return p.preco_promocional || p.preco_venda || p.valor || p.preco || 0;
}

function renderizarCategorias(){
  const cats = [...new Set(PRODUTOS.map(p => p.categoria).filter(Boolean))];
  const box = document.getElementById("categorias");

  box.innerHTML = `
    <button class="ativo" onclick="filtrarCategoria('todos',this)">Todos</button>
    ${cats.map(c => `<button onclick="filtrarCategoria('${c}',this)">${c}</button>`).join("")}
  `;
}

let categoriaAtual = "todos";

window.filtrarCategoria = function(cat, btn){
  categoriaAtual = cat;
  document.querySelectorAll(".categorias button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  renderizarProdutos();
}

window.filtrarProdutos = function(){
  renderizarProdutos();
}

function renderizarProdutos(){
  const lista = document.getElementById("listaProdutos");
  const termo = document.getElementById("busca").value.toLowerCase();

  const filtrados = PRODUTOS.filter(p => {
    const nome = String(p.nome || "").toLowerCase();
    const categoria = p.categoria || "";
    const ativo = p.ativo !== false;
    const bateBusca = nome.includes(termo);
    const bateCategoria = categoriaAtual === "todos" || categoria === categoriaAtual;
    return ativo && bateBusca && bateCategoria;
  });

  if(!filtrados.length){
    lista.innerHTML = `<div class="vazio">Nenhum produto encontrado.</div>`;
    return;
  }

  lista.innerHTML = filtrados.map(p => {
    const img = pegarImagem(p);
    const preco = pegarPreco(p);

    return `
      <div class="card">
        <div class="foto">
          ${img ? `<img src="${img}" onerror="this.style.display='none'">` : `<span>🛍️</span>`}
        </div>

        <div class="info">
          <h3>${p.nome || "Produto"}</h3>
          <p>${p.descricao || p.observacao || ""}</p>
          <div class="preco">${moeda(preco)}</div>

          <button class="add" onclick="adicionarCarrinho('${p.id}')">
            Adicionar ao carrinho
          </button>
        </div>
      </div>
    `;
  }).join("");
}

window.adicionarCarrinho = function(id){
  const produto = PRODUTOS.find(p => String(p.id) === String(id));
  if(!produto) return;

  const item = CARRINHO.find(i => String(i.id) === String(id));

  if(item){
    item.qtd++;
  }else{
    CARRINHO.push({
      id: produto.id,
      nome: produto.nome,
      preco: pegarPreco(produto),
      qtd: 1
    });
  }

  salvarCarrinho();

  if(navigator.vibrate) navigator.vibrate(80);
}

function salvarCarrinho(){
  localStorage.setItem("carrinho_" + APP_ID, JSON.stringify(CARRINHO));
  atualizarCarrinho();
}

function atualizarCarrinho(){
  document.getElementById("contador").innerText =
    CARRINHO.reduce((s,i) => s + i.qtd, 0);

  const itens = document.getElementById("itensCarrinho");

  if(!CARRINHO.length){
    itens.innerHTML = "<p>Carrinho vazio.</p>";
  }else{
    itens.innerHTML = CARRINHO.map((item, index) => `
      <div class="item-carrinho">
        <div>
          <strong>${item.nome}</strong><br>
          ${item.qtd}x ${moeda(item.preco)}
        </div>
        <button onclick="removerItem(${index})">X</button>
      </div>
    `).join("");
  }

  const total = CARRINHO.reduce((s,i) => s + Number(i.preco || 0) * i.qtd, 0);
  document.getElementById("total").innerText = "Total: " + moeda(total);
}

window.removerItem = function(index){
  CARRINHO.splice(index,1);
  salvarCarrinho();
}

window.abrirCarrinho = function(){
  document.getElementById("drawer").classList.add("aberto");
}

window.fecharCarrinho = function(){
  document.getElementById("drawer").classList.remove("aberto");
}

window.finalizarPedido = function(){
  if(!CARRINHO.length){
    alert("Carrinho vazio.");
    return;
  }

  const whats = CONFIG.whatsapp_numero || CONFIG.telefone;

  if(!whats){
    alert("WhatsApp não configurado no painel.");
    return;
  }

  const numero = String(whats).replace(/\D/g,"");

  let msg = `Olá, quero fazer um pedido na loja ${CONFIG.nome_loja || CONFIG.nome || ""}:%0A%0A`;

  CARRINHO.forEach(item => {
    msg += `${item.qtd}x ${item.nome} - ${moeda(item.preco)}%0A`;
  });

  const total = CARRINHO.reduce((s,i) => s + Number(i.preco || 0) * i.qtd, 0);
  msg += `%0ATotal: ${moeda(total)}`;

  window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}

async function init(){
  await resolverAppId();
  if(!APP_ID) return;

  CARRINHO = JSON.parse(localStorage.getItem("carrinho_" + APP_ID) || "[]");

  await carregarConfig();
  await carregarProdutos();
  atualizarCarrinho();
}

init();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f4f6fb;
  color:#111827;
}

header{
  background:#111827;
  color:white;
  padding:18px;
}

.topo{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  gap:15px;
  justify-content:space-between;
}

.marca{
  display:flex;
  align-items:center;
  gap:12px;
}

.marca img{
  width:52px;
  height:52px;
  border-radius:14px;
  object-fit:cover;
  display:none;
  background:white;
}

.logo{
  font-size:25px;
  font-weight:900;
}

.busca{
  flex:1;
  max-width:430px;
}

.busca input{
  width:100%;
  padding:13px 17px;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:15px;
}

.hero{
  max-width:1200px;
  margin:25px auto;
  min-height:310px;
  padding:35px;
  border-radius:28px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  background-size:cover;
  background-position:center;
  color:white;
  display:flex;
  align-items:center;
}

.hero-content{
  max-width:650px;
}

.hero h1{
  font-size:42px;
  margin-bottom:12px;
}

.hero p{
  font-size:18px;
  opacity:.95;
}

.loja-info{
  margin-top:18px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.loja-info span{
  background:rgba(255,255,255,.18);
  padding:10px 13px;
  border-radius:14px;
  backdrop-filter:blur(6px);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:0 18px 100px;
}

.categorias{
  display:flex;
  gap:10px;
  overflow:auto;
  margin-bottom:22px;
  padding-bottom:4px;
}

.categorias button{
  border:none;
  padding:12px 18px;
  border-radius:30px;
  background:white;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
  cursor:pointer;
  font-weight:bold;
  white-space:nowrap;
}

.categorias button.ativo{
  background:#2563eb;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:22px;
}

.card{
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.foto{
  height:210px;
  background:#eef2ff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.foto img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.foto span{
  font-size:60px;
}

.info{
  padding:18px;
}

.info h3{
  margin-bottom:8px;
}

.info p{
  color:#6b7280;
  font-size:14px;
  min-height:36px;
  margin-bottom:12px;
}

.preco{
  font-size:22px;
  font-weight:900;
  color:#16a34a;
  margin-bottom:14px;
}

.add{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:#111827;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.carrinho-flutuante{
  position:fixed;
  right:22px;
  bottom:22px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#2563eb;
  color:white;
  border:none;
  font-size:28px;
  cursor:pointer;
  box-shadow:0 12px 35px rgba(37,99,235,.45);
  z-index:10;
}

.contador{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  width:24px;
  height:24px;
  border-radius:50%;
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.drawer{
  position:fixed;
  right:-430px;
  top:0;
  width:390px;
  max-width:95%;
  height:100vh;
  background:white;
  z-index:20;
  box-shadow:-10px 0 30px rgba(0,0,0,.2);
  transition:.3s;
  padding:22px;
  display:flex;
  flex-direction:column;
}

.drawer.aberto{
  right:0;
}

.fechar{
  background:#111827;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px;
  margin-bottom:15px;
  cursor:pointer;
}

.item-carrinho{
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-bottom:1px solid #e5e7eb;
  padding:12px 0;
}

.item-carrinho button{
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}

.total{
  margin-top:auto;
  font-size:22px;
  font-weight:900;
}

.finalizar{
  margin-top:15px;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#16a34a;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.vazio{
  grid-column:1/-1;
  background:white;
  padding:25px;
  border-radius:18px;
  text-align:center;
  color:#6b7280;
}

@media(max-width:700px){
  .topo{
    flex-direction:column;
    align-items:stretch;
  }

  .hero{
    margin:15px;
    padding:25px;
  }

  .hero h1{
    font-size:30px;
  }
}
</style>
</head>

<body>

<header>
  <div class="topo">
    <div class="marca">
      <img id="logoImg">
      <div class="logo" id="nomeLoja">Minha Loja</div>
    </div>

    <div class="busca">
      <input id="busca" placeholder="Buscar produto..." oninput="filtrarProdutos()">
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1 id="heroTitulo">Sua loja online</h1>
    <p id="heroTexto">Escolha seus produtos e finalize seu pedido.</p>

    <div class="loja-info">
      <span>📞 <b id="telefoneLoja"></b></span>
      <span>📍 <b id="enderecoLoja"></b></span>
    </div>
  </div>
</section>

<div class="container">
  <div class="categorias" id="categorias"></div>
  <div class="grid" id="listaProdutos"></div>
</div>

<button class="carrinho-flutuante" onclick="abrirCarrinho()">
  🛒
  <span class="contador" id="contador">0</span>
</button>

<div class="drawer" id="drawer">
  <button class="fechar" onclick="fecharCarrinho()">Fechar</button>
  <h2>Meu carrinho</h2>
  <div id="itensCarrinho"></div>
  <div class="total" id="total">Total: R$ 0,00</div>
  <button class="finalizar" onclick="finalizarPedido()">Finalizar pelo WhatsApp</button>
</div>

</body>
</html>
