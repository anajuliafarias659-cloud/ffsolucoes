<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loja Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let APP_ID = null;
let CONFIG = {};
let PRODUTOS = [];
let CARRINHO = [];
let categoriaAtual = "todos";

const params = new URLSearchParams(location.search);
const appIdUrl = params.get("app_id");
const slugUrl = params.get("slug");
const partes = location.pathname.split("/").filter(Boolean);
const slugPath = partes[partes.length - 1];

function moeda(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

async function resolverAppId(){
  if(appIdUrl){
    APP_ID = appIdUrl;
    return;
  }

  const dominio = location.hostname.replace("www.","");

  const { data: dominioRow } = await supabase
    .from("dominios_publicos")
    .select("app_id")
    .eq("dominio", dominio)
    .eq("ativo", true)
    .maybeSingle();

  if(dominioRow?.app_id){
    APP_ID = dominioRow.app_id;
    return;
  }

  const slugFinal = slugUrl || slugPath;

  if(slugFinal){
    const { data: cfgSlug } = await supabase
      .from("config_site")
      .select("app_id")
      .or(`slug.eq.${slugFinal},app_id.eq.${slugFinal}`)
      .maybeSingle();

    if(cfgSlug?.app_id){
      APP_ID = cfgSlug.app_id;
      return;
    }
  }

  document.getElementById("listaProdutos").innerHTML =
    `<div class="vazio">Loja não encontrada. Use ?app_id=ID_DA_LOJA</div>`;
}

async function carregarConfig(){
  const { data, error } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", APP_ID)
    .maybeSingle();

  if(error) console.error(error);

  CONFIG = data || {};

  const nome = CONFIG.nome_loja || CONFIG.nome || CONFIG.titulo || "Minha Loja";
  const telefone = CONFIG.whatsapp_numero || CONFIG.telefone || "";
  const endereco = CONFIG.endereco || CONFIG.endereco_loja || "";
  const logo = CONFIG.logo_url || CONFIG.logo || "";
  const banner = CONFIG.banner_url || CONFIG.banner_imagem || CONFIG.banner || "";

  document.title = nome;

  document.getElementById("nomeLoja").innerText = nome;
  document.getElementById("heroTitulo").innerText = CONFIG.banner_titulo || nome;
  document.getElementById("heroTexto").innerText = CONFIG.banner_texto || "Escolha seus produtos e finalize seu pedido.";
  document.getElementById("telefoneLoja").innerText = telefone || "Não informado";
  document.getElementById("enderecoLoja").innerText = endereco || "Endereço não informado";

  if(logo){
    document.getElementById("logoImg").src = logo;
    document.getElementById("logoImg").style.display = "block";
  }

  if(banner){
    document.querySelector(".hero").style.backgroundImage =
      `linear-gradient(135deg,rgba(0,0,0,.68),rgba(0,0,0,.25)),url('${banner}')`;
  }

  atualizarWhats();
}

async function carregarProdutos(){
  const { data, error } = await supabase
    .from("produtos")
    .select("*")
    .eq("app_id", APP_ID)
    .order("nome", { ascending:true });

  if(error){
    console.error(error);
    document.getElementById("listaProdutos").innerHTML =
      `<div class="vazio">Erro ao carregar produtos.</div>`;
    return;
  }

  PRODUTOS = data || [];
  renderizarCategorias();
  renderizarProdutos();
}

function pegarImagem(p){
  if(Array.isArray(p.imagens) && p.imagens.length) return p.imagens[0];

  try{
    const imgs = JSON.parse(p.imagens || "[]");
    if(Array.isArray(imgs) && imgs.length) return imgs[0];
  }catch(e){}

  return p.imagem_url || p.foto_url || p.imagem || p.foto || "";
}

function pegarPreco(p){
  return p.preco_promocional || p.preco_venda || p.valor || p.preco || 0;
}

function estoqueDisponivel(p){
  if(p.ativo === false) return false;
  if(p.disponivel === false) return false;
  if(p.estoque !== undefined && p.estoque !== null && Number(p.estoque) <= 0) return false;
  return true;
}

function renderizarCategorias(){
  const cats = [...new Set(PRODUTOS.map(p => p.categoria).filter(Boolean))];
  const box = document.getElementById("categorias");

  box.innerHTML = `
    <button class="ativo" onclick="filtrarCategoria('todos',this)">Todos</button>
    ${cats.map(c => `<button onclick="filtrarCategoria('${String(c).replace(/'/g,"")} ',this)">${c}</button>`).join("")}
  `;
}

window.filtrarCategoria = function(cat, btn){
  categoriaAtual = cat.trim();
  document.querySelectorAll(".categorias button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  renderizarProdutos();
}

window.filtrarProdutos = function(){
  renderizarProdutos();
}

function renderizarProdutos(){
  const lista = document.getElementById("listaProdutos");
  const termo = document.getElementById("busca").value.toLowerCase();

  const filtrados = PRODUTOS.filter(p => {
    const nome = String(p.nome || "").toLowerCase();
    const categoria = String(p.categoria || "");
    const bateBusca = nome.includes(termo);
    const bateCategoria = categoriaAtual === "todos" || categoria === categoriaAtual;
    return bateBusca && bateCategoria && estoqueDisponivel(p);
  });

  if(!filtrados.length){
    lista.innerHTML = `<div class="vazio">Nenhum produto encontrado.</div>`;
    return;
  }

  lista.innerHTML = filtrados.map(p => {
    const img = pegarImagem(p);
    const preco = pegarPreco(p);

    return `
      <div class="card-produto">
        <div class="foto-produto">
          ${img ? `<img src="${img}" onerror="this.style.display='none'">` : `<span>🛍️</span>`}
        </div>

        <div class="info-produto">
          <small>${p.categoria || "Produto"}</small>
          <h3>${p.nome || "Produto"}</h3>
          <p>${p.descricao || p.observacao || ""}</p>
          <div class="preco">${moeda(preco)}</div>

          <button class="btn-add" onclick="adicionarCarrinho('${p.id}', event)">
            Adicionar ao carrinho
          </button>
        </div>
      </div>
    `;
  }).join("");
}

window.adicionarCarrinho = function(id, event){
  const produto = PRODUTOS.find(p => String(p.id) === String(id));
  if(!produto) return;

  const item = CARRINHO.find(i => String(i.id) === String(id));

  if(item){
    item.qtd++;
  }else{
    CARRINHO.push({
      id: produto.id,
      nome: produto.nome,
      preco: pegarPreco(produto),
      qtd: 1
    });
  }

  salvarCarrinho();

  if(event?.target){
    const btn = event.target;
    btn.innerText = "Adicionado ✔";
    btn.style.background = "#16a34a";

    setTimeout(()=>{
      btn.innerText = "Adicionar ao carrinho";
      btn.style.background = "#111827";
    },900);
  }

  if(navigator.vibrate) navigator.vibrate(80);
}

function salvarCarrinho(){
  localStorage.setItem("carrinho_" + APP_ID, JSON.stringify(CARRINHO));
  atualizarCarrinho();
}

function atualizarCarrinho(){
  document.getElementById("contador").innerText =
    CARRINHO.reduce((s,i) => s + i.qtd, 0);

  const itens = document.getElementById("itensCarrinho");

  if(!CARRINHO.length){
    itens.innerHTML = `<p class="carrinho-vazio">Carrinho vazio.</p>`;
  }else{
    itens.innerHTML = CARRINHO.map((item, index) => `
      <div class="item-carrinho">
        <div>
          <strong>${item.nome}</strong>
          <span>${item.qtd}x ${moeda(item.preco)}</span>
        </div>
        <button onclick="removerItem(${index})">×</button>
      </div>
    `).join("");
  }

  const total = CARRINHO.reduce((s,i) => s + Number(i.preco || 0) * i.qtd, 0);
  document.getElementById("total").innerText = "Total: " + moeda(total);
}

window.removerItem = function(index){
  CARRINHO.splice(index,1);
  salvarCarrinho();
}

window.abrirCarrinho = function(){
  document.getElementById("drawer").classList.add("aberto");
  document.getElementById("overlay").classList.add("aberto");
}

window.fecharCarrinho = function(){
  document.getElementById("drawer").classList.remove("aberto");
  document.getElementById("overlay").classList.remove("aberto");
}

function atualizarWhats(){
  const numero = String(CONFIG.whatsapp_numero || CONFIG.telefone || "").replace(/\D/g,"");
  const btn = document.getElementById("btnWhats");

  if(numero){
    btn.href = `https://wa.me/${numero}`;
    btn.style.display = "flex";
  }else{
    btn.style.display = "none";
  }
}

window.finalizarPedido = function(){
  if(!CARRINHO.length){
    alert("Carrinho vazio.");
    return;
  }

  const whats = CONFIG.whatsapp_numero || CONFIG.telefone;

  if(!whats){
    alert("WhatsApp não configurado no painel.");
    return;
  }

  const numero = String(whats).replace(/\D/g,"");

  let msg = `Olá, quero fazer um pedido na loja ${CONFIG.nome_loja || CONFIG.nome || ""}:%0A%0A`;

  CARRINHO.forEach(item => {
    msg += `${item.qtd}x ${item.nome} - ${moeda(item.preco)}%0A`;
  });

  const total = CARRINHO.reduce((s,i) => s + Number(i.preco || 0) * i.qtd, 0);
  msg += `%0ATotal: ${moeda(total)}`;

  window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}

async function init(){
  await resolverAppId();
  if(!APP_ID) return;

  CARRINHO = JSON.parse(localStorage.getItem("carrinho_" + APP_ID) || "[]");

  await carregarConfig();
  await carregarProdutos();
  atualizarCarrinho();
}

init();
</script>

<style>

<body>

  Compra rápida pelo WhatsApp • Produtos atualizados pelo sistema
</div>

<header>
  <div class="header-inner">
    <div class="marca">
      <img id="logoImg">
      <div>
        <strong id="nomeLoja">Minha Loja</strong>
        <small>Loja online</small>
      </div>
    </div>

    <div class="busca">
      <input id="busca" placeholder="O que você está procurando?" oninput="filtrarProdutos()">
    </div>

    <div class="header-actions">
      <button class="header-btn" onclick="abrirCarrinho()">🛒 Carrinho</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1 id="heroTitulo">Sua loja online</h1>
    <p id="heroTexto">Escolha seus produtos e finalize seu pedido.</p>

    <div class="loja-info">
      <span>📞 <b id="telefoneLoja"></b></span>
      <span>📍 <b id="enderecoLoja"></b></span>
    </div>
  </div>
</section>

<main class="container">
  <div class="titulo-section">
    <h2>Produtos</h2>
  </div>

  <div class="categorias" id="categorias"></div>

  <div class="grid" id="listaProdutos"></div>
</main>

<button class="carrinho-flutuante" onclick="abrirCarrinho()">
  🛒
  <span class="contador" id="contador">0</span>
</button>

<a id="btnWhats" class="btn-whats" target="_blank">💬 Atendimento</a>

<div class="overlay" id="overlay" onclick="fecharCarrinho()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-top">
    <h2>Meu carrinho</h2>
    <button class="fechar" onclick="fecharCarrinho()">×</button>
  </div>

  <div id="itensCarrinho"></div>

  <div class="total" id="total">Total: R$ 0,00</div>

  <button class="finalizar" onclick="finalizarPedido()">
    Finalizar pelo WhatsApp
  </button>
</div>

</body>
</html>
