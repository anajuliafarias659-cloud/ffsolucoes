<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loja Moderna</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f4f6fb;
  color:#111827;
}
header{
  background:linear-gradient(135deg,#111827,#2563eb);
  color:white;
  padding:22px;
}
.topo{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
}
.logo{
  font-size:26px;
  font-weight:900;
}
.logo span{color:#facc15}
.busca{
  flex:1;
  max-width:420px;
}
.busca input{
  width:100%;
  padding:13px 16px;
  border-radius:30px;
  border:none;
  outline:none;
  font-size:15px;
}
.hero{
  max-width:1200px;
  margin:25px auto;
  padding:35px;
  border-radius:25px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  display:grid;
  grid-template-columns:1fr 280px;
  gap:25px;
  align-items:center;
}
.hero h1{
  font-size:42px;
  margin-bottom:12px;
}
.hero p{
  font-size:18px;
  opacity:.95;
}
.hero button{
  margin-top:20px;
  padding:14px 22px;
  border:none;
  border-radius:14px;
  background:#facc15;
  color:#111827;
  font-weight:bold;
  cursor:pointer;
}
.hero-img{
  background:white;
  color:#111827;
  border-radius:22px;
  padding:25px;
  text-align:center;
  font-size:70px;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:0 18px 100px;
}
.categorias{
  display:flex;
  gap:10px;
  overflow:auto;
  margin-bottom:22px;
}
.categorias button{
  border:none;
  padding:12px 18px;
  border-radius:30px;
  background:white;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
  cursor:pointer;
  font-weight:bold;
  white-space:nowrap;
}
.categorias button.ativo{
  background:#2563eb;
  color:white;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:22px;
}
.card{
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.2s;
}
.card:hover{
  transform:translateY(-4px);
}
.foto{
  height:190px;
  background:#e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:65px;
}
.info{
  padding:18px;
}
.info h3{
  margin-bottom:8px;
}
.info p{
  color:#6b7280;
  font-size:14px;
  margin-bottom:12px;
}
.preco{
  font-size:22px;
  font-weight:900;
  color:#16a34a;
  margin-bottom:14px;
}
.add{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:#111827;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.carrinho-flutuante{
  position:fixed;
  right:22px;
  bottom:22px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#2563eb;
  color:white;
  border:none;
  font-size:28px;
  cursor:pointer;
  box-shadow:0 12px 35px rgba(37,99,235,.45);
  z-index:10;
}
.contador{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  width:24px;
  height:24px;
  border-radius:50%;
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}
.drawer{
  position:fixed;
  right:-420px;
  top:0;
  width:390px;
  max-width:95%;
  height:100vh;
  background:white;
  z-index:20;
  box-shadow:-10px 0 30px rgba(0,0,0,.2);
  transition:.3s;
  padding:22px;
  display:flex;
  flex-direction:column;
}
.drawer.aberto{right:0}
.drawer h2{
  margin-bottom:18px;
}
.item-carrinho{
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-bottom:1px solid #e5e7eb;
  padding:12px 0;
}
.item-carrinho button{
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}
.total{
  margin-top:auto;
  font-size:22px;
  font-weight:900;
}
.finalizar{
  margin-top:15px;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#16a34a;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
.fechar{
  background:#111827;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px;
  margin-bottom:15px;
  cursor:pointer;
}
@media(max-width:700px){
  .topo{flex-direction:column;align-items:stretch}
  .hero{
    grid-template-columns:1fr;
    padding:25px;
  }
  .hero h1{font-size:30px}
}
</style>
</head>

<body>

<header>
  <div class="topo">
    <div class="logo">Minha <span>Loja</span></div>
    <div class="busca">
      <input id="busca" placeholder="Buscar produto..." oninput="filtrarProdutos()">
    </div>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Ofertas especiais para você</h1>
    <p>Produtos selecionados com qualidade, preço justo e compra rápida pelo WhatsApp.</p>
    <button onclick="window.scrollTo({top:520,behavior:'smooth'})">Ver produtos</button>
  </div>
  <div class="hero-img">🛍️</div>
</section>

<div class="container">

  <div class="categorias">
    <button class="ativo" onclick="filtrarCategoria('todos',this)">Todos</button>
    <button onclick="filtrarCategoria('roupas',this)">Roupas</button>
    <button onclick="filtrarCategoria('eletronicos',this)">Eletrônicos</button>
    <button onclick="filtrarCategoria('casa',this)">Casa</button>
    <button onclick="filtrarCategoria('beleza',this)">Beleza</button>
  </div>

  <div class="grid" id="listaProdutos"></div>

</div>

<button class="carrinho-flutuante" onclick="abrirCarrinho()">
  🛒
  <span class="contador" id="contador">0</span>
</button>

<div class="drawer" id="drawer">
  <button class="fechar" onclick="fecharCarrinho()">Fechar</button>
  <h2>Meu carrinho</h2>
  <div id="itensCarrinho"></div>
  <div class="total" id="total">Total: R$ 0,00</div>
  <button class="finalizar" onclick="finalizarPedido()">Finalizar pelo WhatsApp</button>
</div>

<script>
const WHATSAPP = "5599999999999";

const produtos = [
  {
    nome:"Camisa Premium",
    categoria:"roupas",
    preco:79.90,
    foto:"👕",
    descricao:"Camisa moderna confortável."
  },
  {
    nome:"Tênis Casual",
    categoria:"roupas",
    preco:149.90,
    foto:"👟",
    descricao:"Tênis estiloso para o dia a dia."
  },
  {
    nome:"Fone Bluetooth",
    categoria:"eletronicos",
    preco:99.90,
    foto:"🎧",
    descricao:"Som limpo e bateria duradoura."
  },
  {
    nome:"Smartwatch",
    categoria:"eletronicos",
    preco:199.90,
    foto:"⌚",
    descricao:"Relógio inteligente moderno."
  },
  {
    nome:"Kit Cozinha",
    categoria:"casa",
    preco:89.90,
    foto:"🍳",
    descricao:"Utensílios práticos para sua casa."
  },
  {
    nome:"Perfume Luxo",
    categoria:"beleza",
    preco:119.90,
    foto:"💎",
    descricao:"Fragrância marcante e elegante."
  }
];

let categoriaAtual = "todos";
let carrinho = JSON.parse(localStorage.getItem("carrinhoLoja")) || [];

function moeda(valor){
  return valor.toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function renderizarProdutos(){
  const lista = document.getElementById("listaProdutos");
  const termo = document.getElementById("busca").value.toLowerCase();

  const filtrados = produtos.filter(p => {
    const bateCategoria = categoriaAtual === "todos" || p.categoria === categoriaAtual;
    const bateBusca = p.nome.toLowerCase().includes(termo);
    return bateCategoria && bateBusca;
  });

  lista.innerHTML = filtrados.map((p, i) => `
    <div class="card">
      <div class="foto">${p.foto}</div>
      <div class="info">
        <h3>${p.nome}</h3>
        <p>${p.descricao}</p>
        <div class="preco">${moeda(p.preco)}</div>
        <button class="add" onclick="adicionarCarrinho('${p.nome}')">
          Adicionar ao carrinho
        </button>
      </div>
    </div>
  `).join("");
}

function filtrarCategoria(cat, btn){
  categoriaAtual = cat;
  document.querySelectorAll(".categorias button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  renderizarProdutos();
}

function filtrarProdutos(){
  renderizarProdutos();
}

function adicionarCarrinho(nome){
  const produto = produtos.find(p => p.nome === nome);
  const item = carrinho.find(i => i.nome === nome);

  if(item){
    item.qtd++;
  }else{
    carrinho.push({...produto, qtd:1});
  }

  salvarCarrinho();

  if(navigator.vibrate){
    navigator.vibrate(80);
  }
}

function salvarCarrinho(){
  localStorage.setItem("carrinhoLoja", JSON.stringify(carrinho));
  atualizarCarrinho();
}

function atualizarCarrinho(){
  document.getElementById("contador").innerText =
    carrinho.reduce((s,i) => s + i.qtd, 0);

  const itens = document.getElementById("itensCarrinho");

  if(carrinho.length === 0){
    itens.innerHTML = "<p>Carrinho vazio.</p>";
  }else{
    itens.innerHTML = carrinho.map((item, index) => `
      <div class="item-carrinho">
        <div>
          <strong>${item.nome}</strong><br>
          ${item.qtd}x ${moeda(item.preco)}
        </div>
        <button onclick="removerItem(${index})">X</button>
      </div>
    `).join("");
  }

  const total = carrinho.reduce((s,i) => s + i.preco * i.qtd, 0);
  document.getElementById("total").innerText = "Total: " + moeda(total);
}

function removerItem(index){
  carrinho.splice(index,1);
  salvarCarrinho();
}

function abrirCarrinho(){
  document.getElementById("drawer").classList.add("aberto");
}

function fecharCarrinho(){
  document.getElementById("drawer").classList.remove("aberto");
}

function finalizarPedido(){
  if(carrinho.length === 0){
    alert("Carrinho vazio.");
    return;
  }

  let msg = "Olá, quero fazer um pedido:%0A%0A";

  carrinho.forEach(item => {
    msg += `${item.qtd}x ${item.nome} - ${moeda(item.preco)}%0A`;
  });

  const total = carrinho.reduce((s,i) => s + i.preco * i.qtd, 0);
  msg += `%0ATotal: ${moeda(total)}`;

  window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, "_blank");
}

renderizarProdutos();
atualizarCarrinho();
</script>

</body>
</html>
