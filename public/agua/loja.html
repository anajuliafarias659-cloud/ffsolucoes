<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miranda's Moda | Loja Online</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f8fafc;
  color:#0f172a;
}

header{
  background:linear-gradient(135deg,#111827,#7c2d12);
  color:white;
  padding:18px;
  position:sticky;
  top:0;
  z-index:10;
}

.topo{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.logo span{
  color:#facc15;
}

.busca{
  flex:1;
  max-width:420px;
}

.busca input{
  width:100%;
  padding:13px;
  border-radius:30px;
  border:none;
  outline:none;
}

.btn-carrinho{
  background:#facc15;
  color:#111827;
  border:none;
  border-radius:30px;
  padding:12px 18px;
  font-weight:bold;
  cursor:pointer;
}

.banner{
  background:linear-gradient(135deg,#f97316,#ec4899);
  color:white;
  margin:25px auto;
  max-width:1200px;
  border-radius:24px;
  padding:35px;
  display:grid;
  grid-template-columns:1fr 300px;
  align-items:center;
  gap:20px;
}

.banner h1{
  font-size:38px;
  margin:0 0 10px;
}

.banner p{
  font-size:18px;
}

.banner img{
  width:100%;
  border-radius:22px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:0 18px 40px;
}

.titulo-area{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:20px 0;
}

.titulo-area h2{
  margin:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
  background:#e5e7eb;
}

.info{
  padding:16px;
}

.info h3{
  margin:0 0 8px;
  font-size:18px;
}

.preco{
  color:#16a34a;
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.info button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:#111827;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.info button:hover{
  background:#f97316;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  justify-content:flex-end;
  z-index:99;
}

.modal.ativo{
  display:flex;
}

.carrinho{
  width:390px;
  max-width:100%;
  background:white;
  height:100%;
  padding:20px;
  overflow:auto;
}

.carrinho-topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.fechar{
  background:#ef4444;
  color:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  cursor:pointer;
}

.item{
  display:flex;
  gap:10px;
  border-bottom:1px solid #e5e7eb;
  padding:12px 0;
}

.item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:12px;
}

.item-info{
  flex:1;
}

.item-info h4{
  margin:0 0 5px;
}

.qtd{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:8px;
}

.qtd button{
  width:28px;
  height:28px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.total{
  font-size:24px;
  font-weight:bold;
  margin:20px 0;
}

.finalizar{
  width:100%;
  padding:15px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:15px;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}

.whats{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#22c55e;
  color:white;
  padding:15px 18px;
  border-radius:40px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

@media(max-width:700px){
  .topo{
    flex-wrap:wrap;
  }

  .busca{
    order:3;
    max-width:100%;
    width:100%;
  }

  .banner{
    grid-template-columns:1fr;
    padding:24px;
  }

  .banner h1{
    font-size:30px;
  }

  .card img{
    height:210px;
  }
}
</style>
</head>

<body>

<header>
  <div class="topo">
    <div class="logo">Miranda's <span>Moda</span></div>

    <div class="busca">
      <input type="text" id="buscar" placeholder="Buscar produto..." oninput="renderizarProdutos()">
    </div>

    <button class="btn-carrinho" onclick="abrirCarrinho()">
      🛒 Carrinho <span id="contador">0</span>
    </button>
  </div>
</header>

<section class="banner">
  <div>
    <h1>Moda Evangélica com Elegância</h1>
    <p>Vestidos, saias e looks lindos para você comprar online.</p>
  </div>

  <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=600" alt="Moda feminina">
</section>

<div class="container">
  <div class="titulo-area">
    <h2>Produtos em destaque</h2>
  </div>

  <div class="grid" id="listaProdutos"></div>
</div>

<div class="modal" id="modalCarrinho">
  <div class="carrinho">
    <div class="carrinho-topo">
      <h2>Meu carrinho</h2>
      <button class="fechar" onclick="fecharCarrinho()">×</button>
    </div>

    <div id="itensCarrinho"></div>

    <div class="total">
      Total: <span id="total">R$ 0,00</span>
    </div>

    <button class="finalizar" onclick="finalizarPedido()">
      Finalizar pedido
    </button>
  </div>
</div>

<a class="whats" href="https://wa.me/5589999999999" target="_blank">
  WhatsApp
</a>

<script>
const produtos = [
  {
    id:1,
    nome:"Vestido Midi Elegante",
    preco:189.90,
    img:"https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=500"
  },
  {
    id:2,
    nome:"Vestido Floral Evangélico",
    preco:159.90,
    img:"https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=500"
  },
  {
    id:3,
    nome:"Saia Midi Social",
    preco:99.90,
    img:"https://images.unsplash.com/photo-1485968579580-b6d095142e6e?w=500"
  },
  {
    id:4,
    nome:"Blusa Feminina Luxo",
    preco:79.90,
    img:"https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=500"
  },
  {
    id:5,
    nome:"Conjunto Social Feminino",
    preco:229.90,
    img:"https://images.unsplash.com/photo-1483985988355-763728e1935b?w=500"
  },
  {
    id:6,
    nome:"Vestido Longo Premium",
    preco:249.90,
    img:"https://images.unsplash.com/photo-1509631179647-0177331693ae?w=500"
  }
];

let carrinho = [];

function formatarReal(valor){
  return valor.toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function renderizarProdutos(){
  const busca = document.getElementById("buscar").value.toLowerCase();
  const lista = document.getElementById("listaProdutos");

  const filtrados = produtos.filter(p =>
    p.nome.toLowerCase().includes(busca)
  );

  lista.innerHTML = filtrados.map(p => `
    <div class="card">
      <img src="${p.img}" alt="${p.nome}">
      <div class="info">
        <h3>${p.nome}</h3>
        <div class="preco">${formatarReal(p.preco)}</div>
        <button onclick="adicionarCarrinho(${p.id})">
          Adicionar ao carrinho
        </button>
      </div>
    </div>
  `).join("");
}

function adicionarCarrinho(id){
  const produto = produtos.find(p => p.id === id);
  const item = carrinho.find(i => i.id === id);

  if(item){
    item.qtd++;
  }else{
    carrinho.push({...produto, qtd:1});
  }

  atualizarContador();
  renderizarCarrinho();
}

function atualizarContador(){
  const totalQtd = carrinho.reduce((soma,item) => soma + item.qtd, 0);
  document.getElementById("contador").innerText = totalQtd;
}

function abrirCarrinho(){
  renderizarCarrinho();
  document.getElementById("modalCarrinho").classList.add("ativo");
}

function fecharCarrinho(){
  document.getElementById("modalCarrinho").classList.remove("ativo");
}

function renderizarCarrinho(){
  const area = document.getElementById("itensCarrinho");

  if(carrinho.length === 0){
    area.innerHTML = "<p>Seu carrinho está vazio.</p>";
    document.getElementById("total").innerText = formatarReal(0);
    return;
  }

  area.innerHTML = carrinho.map(item => `
    <div class="item">
      <img src="${item.img}">
      <div class="item-info">
        <h4>${item.nome}</h4>
        <strong>${formatarReal(item.preco)}</strong>

        <div class="qtd">
          <button onclick="alterarQtd(${item.id}, -1)">-</button>
          <span>${item.qtd}</span>
          <button onclick="alterarQtd(${item.id}, 1)">+</button>
          <button onclick="removerItem(${item.id})">🗑</button>
        </div>
      </div>
    </div>
  `).join("");

  const total = carrinho.reduce((soma,item) => soma + item.preco * item.qtd, 0);
  document.getElementById("total").innerText = formatarReal(total);
}

function alterarQtd(id, valor){
  const item = carrinho.find(i => i.id === id);

  if(!item) return;

  item.qtd += valor;

  if(item.qtd <= 0){
    carrinho = carrinho.filter(i => i.id !== id);
  }

  atualizarContador();
  renderizarCarrinho();
}

function removerItem(id){
  carrinho = carrinho.filter(i => i.id !== id);
  atualizarContador();
  renderizarCarrinho();
}

function finalizarPedido(){
  if(carrinho.length === 0){
    alert("Adicione produtos ao carrinho.");
    return;
  }

  let mensagem = "Olá, quero fazer este pedido:%0A%0A";

  carrinho.forEach(item => {
    mensagem += `${item.qtd}x ${item.nome} - ${formatarReal(item.preco)}%0A`;
  });

  const total = carrinho.reduce((soma,item) => soma + item.preco * item.qtd, 0);
  mensagem += `%0ATotal: ${formatarReal(total)}`;

  window.open("https://wa.me/5589999999999?text=" + mensagem, "_blank");
}

renderizarProdutos();
</script>

</body>
</html>
