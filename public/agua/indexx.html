<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Chic</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:#f8f8f8;
  color:#111;
}

/* TOPO */
header{
  background:#000;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:20px;
  font-weight:bold;
}

.menu{
  display:flex;
  gap:15px;
}

.menu a{
  color:#fff;
  text-decoration:none;
}

/* BANNER */
.banner{
  height:400px;
  background:url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.banner h1{
  background:rgba(0,0,0,0.5);
  padding:20px;
  font-size:28px;
}

/* PRODUTOS */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-info{
  padding:10px;
}

.card-info h3{
  font-size:16px;
}

.preco{
  color:#e11d48;
  font-weight:bold;
  margin:5px 0;
}

.btn{
  display:block;
  text-align:center;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  margin-top:10px;
}

/* FOOTER */
footer{
  background:#000;
  color:#fff;
  text-align:center;
  padding:15px;
  margin-top:30px;
}
</style>

</head>
<body>

<header>
  <div class="logo">Minha Loja</div>
  <div class="menu">
    <a href="#">Início</a>
    <a href="#">Roupas</a>
    <a href="#">Contato</a>
  </div>
</header>

<section class="banner">
  <h1>Nova Coleção 2026</h1>
</section>

<div class="container">
  <h2>🔥 Destaques</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
      <div class="card-info">
        <h3>Camiseta Premium</h3>
        <div class="preco">R$ 79,90</div>
        <a href="#" class="btn">Comprar</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
      <div class="card-info">
        <h3>Vestido Elegante</h3>
        <div class="preco">R$ 149,90</div>
        <a href="#" class="btn">Comprar</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1514996937319-344454492b37">
      <div class="card-info">
        <h3>Jaqueta Moderna</h3>
        <div class="preco">R$ 199,90</div>
        <a href="#" class="btn">Comprar</a>
      </div>
    </div>

  </div>
</div>

<footer>
  © 2026 Minha Loja - Todos os direitos reservados
</footer>

</body>
</html>
