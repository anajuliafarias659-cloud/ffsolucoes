<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{background:#07122b;color:#fff;font-family:Arial,sans-serif;margin:0}
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  background:#020617;
  font-size:18px;

}
.container{

  padding:36px 20px;

  flex-wrap:wrap;
}
.card{
  background:#1e293b;

  border-radius:22px;

}
.card h3{
  margin:0 0 14px 0;
  font-size:28px;
}
.subtitulo{
  margin:24px 0 10px;
  font-size:22px;
  font-weight:bold;
}
.label{
  margin-top:12px;
  font-size:14px;
  opacity:.9;
}
select,input,button{
  width:100%;
  padding:14px 16px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}
button{
  background:#4b83ec;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
button:hover{opacity:.95}
.lista-viagens{margin-top:18px}
.item-viagem{
  padding:12px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  font-size:22px;
}
.item-viagem:hover{
  background:rgba(255,255,255,.03);
  border-radius:10px;
}
.item-viagem.ativa{

.item-viagem small{

}
.poltronas{

  padding:14px;

}
.motorista{
  text-align:center;
  background:#475569;
  padding:6px;
  border-radius:6px;
  font-size:18px;
  margin-bottom:12px;
}
.linha-onibus{
  display:grid;
  grid-template-columns:1fr 1fr 36px 1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.corredor{
  text-align:center;
  opacity:.35;
  padding-top:10px;
}
.poltrona{
  padding:12px 0;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
}
.livre{background:#22c55e}
.ocupado{background:#ef4444}
.selecionado{background:#facc15;color:#111}
.vazio{opacity:.8;padding:12px 0}
.valor-box{
  margin-top:12px;
  background:#111827;
  border-radius:12px;
  padding:12px;
  font-size:18px;
}
.info-viagem{
  margin-top:12px;
  font-size:15px;
  opacity:.9;
}
.msg{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  font-size:14px;
}
.msg.erro{background:#7f1d1d}
.msg.ok{background:#14532d}
.pix-box{
  margin-top:14px;
  padding:14px;
  background:#111827;
  border-radius:14px;
  display:none;
}
.pix-box img{
  width:100%;
  max-width:260px;
  background:#fff;
  padding:10px;
  border-radius:12px;
  display:block;
  margin:10px auto;
}
.pix-copia{
  width:100%;
  min-height:88px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  padding:10px;
  resize:vertical;
}
.link-btn{
  display:block;
  text-align:center;
  text-decoration:none;
  margin-top:10px;
  background:#22c55e;
  color:#fff;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}
.hidden{display:none!important}
</style>
</head>

<body>

<div class="topo">
  <div id="nomeLoja">FF TRANSPORTE</div>
  <div>São Raimundo Nonato - PI</div>
</div>

<div class="container">

  <div class="card">
    <h3>Tipo de Viagem</h3>

    <select id="tipoViagem" onchange="atualizarCamposData()">
      <option value="ida">Somente Ida</option>
      <option value="ida_volta">Ida e Volta</option>
    </select>

    <div class="label">Data de ida</div>
    <input type="date" id="dataIda">

    <div id="boxDataVolta" class="hidden">
      <div class="label">Data de volta</div>
      <input type="date" id="dataVolta">
    </div>

    <div class="subtitulo">Viagens disponíveis</div>
    <div id="listaViagens" class="lista-viagens"></div>
  </div>

  <div class="card">
    <h3>Poltronas</h3>

    <div class="poltronas">
      <div class="motorista">MOTORISTA</div>
      <div id="poltronas"></div>
    </div>

    <div id="infoViagem" class="info-viagem"></div>
    <div id="valorViagem" class="valor-box hidden"></div>

    <select id="formaPagamento">
      <option value="">Forma de pagamento</option>
      <option value="PIX">PIX</option>
      <option value="cartao">Cartão / Mercado Pago</option>
    </select>

    <input type="text" id="nome" placeholder="Seu nome">

    <button onclick="pagarEReservar()">Pagar e Reservar</button>

    <div id="mensagem"></div>

    <div id="pixBox" class="pix-box">
      <h4 style="margin:0 0 10px 0;">Pagamento PIX</h4>
      <div id="pixValor"></div>
      <img id="pixQrImg" alt="QR Code PIX">
      <textarea id="pixCopiaCola" class="pix-copia" readonly></textarea>
      <button onclick="copiarPix()">Copiar código PIX</button>
    </div>

    <a id="checkoutLink" class="link-btn hidden" target="_blank" rel="noopener">
      Abrir pagamento no Mercado Pago
    </a>
  </div>

</div>

<script>
const client = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);
const app_id_url = params.get("app_id");
const slug = params.get("slug");

let app_id = null;
let configLoja = null;
let viagemSelecionada = null;
let poltronaSelecionada = null;
let viagemAtual = null;
let viagensCache = [];

function hojeLocalISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off * 60000);
  return local.toISOString().slice(0, 10);
}

function setMsg(texto, tipo = "ok"){
  const box = document.getElementById("mensagem");
  if(!texto){
    box.innerHTML = "";
    return;
  }
  box.innerHTML = `<div class="msg ${tipo}">${texto}</div>`;
}

function limparPagamentoUI(){
  document.getElementById("pixBox").style.display = "none";
  document.getElementById("pixQrImg").src = "";
  document.getElementById("pixCopiaCola").value = "";
  document.getElementById("pixValor").innerHTML = "";
  document.getElementById("checkoutLink").classList.add("hidden");
  document.getElementById("checkoutLink").href = "#";
}

function limparSelecaoViagem(){
  viagemSelecionada = null;
  poltronaSelecionada = null;
  viagemAtual = null;
  document.getElementById("poltronas").innerHTML = "";
  document.getElementById("infoViagem").innerHTML = "";
  document.getElementById("valorViagem").innerHTML = "";
  document.getElementById("valorViagem").classList.add("hidden");
  limparPagamentoUI();
}

function atualizarCamposData(){
  const tipo = document.getElementById("tipoViagem").value;
  const boxVolta = document.getElementById("boxDataVolta");
  const dataVolta = document.getElementById("dataVolta");

  if(tipo === "ida_volta"){
    boxVolta.classList.remove("hidden");
  }else{
    boxVolta.classList.add("hidden");
    dataVolta.value = "";
  }

  renderizarListaViagens();
}

function nomeDiaSemana(dataISO){
  if(!dataISO) return "";
  const [ano, mes, dia] = dataISO.split("-").map(Number);
  const data = new Date(ano, mes - 1, dia);
  const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
  return dias[data.getDay()];
}

function normalizarDia(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .slice(0,3);
}

function viagemRodaNaData(viagem, dataISO){
  if(!viagem || !dataISO) return false;

  const diaEscolhido = normalizarDia(nomeDiaSemana(dataISO));
  const diasViagem = String(viagem.dias || "")
    .split(",")
    .map(v => normalizarDia(v))
    .filter(Boolean);

  if(!diasViagem.length){
    return true;
  }

  return diasViagem.includes(diaEscolhido);
}

function calcularValorTotal(){
  const tipoViagem = document.getElementById("tipoViagem").value;
  const valorBase = Number(viagemAtual?.valor || 0);
  return tipoViagem === "ida_volta" ? valorBase * 2 : valorBase;
}

async function resolverAppId(){
  if(app_id_url){
    app_id = app_id_url;
    return true;
  }

  if(slug){
    const { data, error } = await client
      .from("apps")
      .select("id")
      .eq("slug", slug)
      .single();

    if(error || !data?.id){
      return false;
    }

    app_id = data.id;
    return true;
  }

  return false;
}

async function carregarConfigLoja(){
  if(!app_id) return null;

  const { data, error } = await client
    .from("config_site")
    .select("*")
    .eq("app_id", app_id)
    .maybeSingle();

  if(error){
    console.error("Erro config_site:", error);
    return null;
  }

  configLoja = data || null;

  if(configLoja?.nome_site){
    document.getElementById("nomeLoja").innerText = configLoja.nome_site;
  }

  return configLoja;
}

async function carregarViagens(){
  const lista = document.getElementById("listaViagens");
  lista.innerHTML = "";
  setMsg("");

  const ok = await resolverAppId();

  if(!ok || !app_id){
    lista.innerHTML = `<div class="vazio">Negócio não identificado.</div>`;
    return;
  }

  await carregarConfigLoja();

  const { data, error } = await client
    .from("viagens_passagens")
    .select("id, rota, hora, dias, valor, veiculo_id")
    .eq("app_id", app_id)
    .order("id", { ascending: false });

  if(error){
    console.error(error);
    lista.innerHTML = `<div class="vazio">Erro ao carregar viagens.</div>`;
    return;
  }

  viagensCache = data || [];
  await renderizarListaViagens();
}

async function renderizarListaViagens(){
  const lista = document.getElementById("listaViagens");
  const dataIda = document.getElementById("dataIda").value;

  lista.innerHTML = "";
  limparSelecaoViagem();

  if(!viagensCache.length){
    lista.innerHTML = `<div class="vazio">Nenhuma viagem cadastrada.</div>`;
    return;
  }

  const viagensFiltradas = dataIda
    ? viagensCache.filter(v => viagemRodaNaData(v, dataIda))
    : viagensCache;

  if(!viagensFiltradas.length){
    lista.innerHTML = `<div class="vazio">Nenhuma viagem disponível para a data escolhida.</div>`;
    return;
  }

  for(const v of viagensFiltradas){
    let nomeVeiculo = "";

    if(v.veiculo_id){
      const { data: veiculo } = await client
        .from("veiculos_passagens")
        .select("nome")
        .eq("id", v.veiculo_id)
        .maybeSingle();

      nomeVeiculo = veiculo?.nome || "";
    }

    const div = document.createElement("div");
    div.className = "item-viagem";
    div.dataset.id = v.id;
    div.innerHTML = `
      ${v.rota || ""} - ${v.hora || ""}
      ${nomeVeiculo ? `<small>${nomeVeiculo}</small>` : ""}
      ${v.dias ? `<small>Dias: ${v.dias}</small>` : ""}
      ${v.valor !== null && v.valor !== undefined ? `<small>Valor: R$ ${Number(v.valor).toFixed(2)}</small>` : ""}
    `;
    div.onclick = () => selecionarViagem(v.id);
    lista.appendChild(div);
  }
}

async function selecionarViagem(id){
  viagemSelecionada = id;
  poltronaSelecionada = null;
  limparPagamentoUI();
  setMsg("");

  document.querySelectorAll(".item-viagem").forEach(el => {
    el.classList.toggle("ativa", el.dataset.id === String(id));
  });

  const { data: viagem, error } = await client
    .from("viagens_passagens")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !viagem){
    console.error(error);
    setMsg("Erro ao carregar a viagem.", "erro");
    return;
  }

  const dataIda = document.getElementById("dataIda").value;
  if(dataIda && !viagemRodaNaData(viagem, dataIda)){
    setMsg(`Essa viagem não roda na data escolhida. Dias disponíveis: ${viagem.dias || "-"}.`, "erro");
    limparSelecaoViagem();
    return;
  }

  viagemAtual = viagem;

  document.getElementById("infoViagem").innerHTML =
    `<b>${viagem.rota || ""}</b> - ${viagem.hora || ""}`;

  const valorBox = document.getElementById("valorViagem");
  const valorTotal = calcularValorTotal();

  if(viagem.valor !== null && viagem.valor !== undefined && viagem.valor !== ""){
    valorBox.classList.remove("hidden");
    valorBox.innerHTML = `Valor da passagem: <b>R$ ${valorTotal.toFixed(2)}</b>`;
  } else {
    valorBox.classList.add("hidden");
    valorBox.innerHTML = "";
  }

  await carregarPoltronas();
}

async function carregarPoltronas(){
  if(!viagemSelecionada) return;

  const { data: viagem } = await client
    .from("viagens_passagens")
    .select("id, veiculo_id")
    .eq("id", viagemSelecionada)
    .single();

  if(!viagem?.veiculo_id){
    return;
  }

  const { data: veiculo } = await client
    .from("veiculos_passagens")
    .select("*")
    .eq("id", viagem.veiculo_id)
    .single();

  const total = veiculo?.total_poltronas || 20;
  const dataIda = document.getElementById("dataIda").value;

  let query = client
    .from("reservas_passagens")
    .select("poltrona, status, data_viagem")
    .eq("viagem_id", viagemSelecionada);

  if(dataIda){
    query = query.eq("data_viagem", dataIda);
  }

  const { data: reservas } = await query;

  const ocupadas = (reservas || [])
    .filter(r => String(r.status || "").toLowerCase() !== "cancelado")
    .map(r => Number(r.poltrona));

  const div = document.getElementById("poltronas");
  div.innerHTML = "";

  let numero = 1;

  while(numero <= total){
    const row = document.createElement("div");
    row.className = "linha-onibus";

    for(let i = 0; i < 5; i++){
      if(i === 2){
        const corredor = document.createElement("div");
        corredor.className = "corredor";
        corredor.innerText = "";
        row.appendChild(corredor);
        continue;
      }

      if(numero > total){
        const vazio = document.createElement("div");
        vazio.style.visibility = "hidden";
        row.appendChild(vazio);
        continue;
      }

      const atual = numero;
      const btn = document.createElement("div");
      btn.innerText = atual;

      if(ocupadas.includes(atual)){
        btn.className = "poltrona ocupado";
      }else{
        btn.className = "poltrona livre";
        btn.onclick = () => {
          document.querySelectorAll(".poltrona").forEach(p => p.classList.remove("selecionado"));
          btn.classList.add("selecionado");
          poltronaSelecionada = atual;
        };
      }

      row.appendChild(btn);
      numero++;
    }

    div.appendChild(row);
  }
}

async function criarPedidoPassagem(){
  const nome = document.getElementById("nome").value.trim();
  const tipoViagem = document.getElementById("tipoViagem").value;
  const dataIda = document.getElementById("dataIda").value;
  const dataVolta = document.getElementById("dataVolta").value;
  const formaPagamento = document.getElementById("formaPagamento").value;

  const valorBase = Number(viagemAtual?.valor || 0);
  const valorTotal = tipoViagem === "ida_volta" ? valorBase * 2 : valorBase;

  const payloadPedido = {
    app_id,
    status: "aguardando_pagamento",
    pagamento_status: "pending",
    cliente_nome: nome,
    valor_total: valorTotal,
    origem: "passagens",
    forma_pagamento: formaPagamento,
    itens: [{
      tipo: "passagem",
      tipo_viagem: tipoViagem,
      viagem_id: viagemSelecionada,
      rota: viagemAtual?.rota || "",
      hora: viagemAtual?.hora || "",
      data_ida: dataIda,
      data_volta: tipoViagem === "ida_volta" ? dataVolta : null,
      poltrona: poltronaSelecionada,
      valor_unitario: valorBase,
      valor_total: valorTotal
    }]
  };

  const { data, error } = await client
    .from("pedidos")
    .insert([payloadPedido])
    .select("id")
    .single();

  if(error || !data?.id){
    throw new Error(error?.message || "Erro ao criar pedido.");
  }

  return data.id;
}

async function registrarReservaPendente(){
  const nome = document.getElementById("nome").value.trim();
  const tipoViagem = document.getElementById("tipoViagem").value;
  const dataIda = document.getElementById("dataIda").value;
  const dataVolta = document.getElementById("dataVolta").value;

  const reservas = [{
    viagem_id: viagemSelecionada,
    poltrona: poltronaSelecionada,
    nome,
    app_id,
    data_viagem: dataIda,
    status: "pendente_pagamento"
  }];

  if(tipoViagem === "ida_volta" && dataVolta){
    reservas.push({
      viagem_id: viagemSelecionada,
      poltrona: poltronaSelecionada,
      nome: `${nome} (volta)`,
      app_id,
      data_viagem: dataVolta,
      status: "pendente_pagamento"
    });
  }

  const { error } = await client
    .from("reservas_passagens")
    .insert(reservas);

  if(error){
    throw new Error(error.message || "Erro ao registrar reserva pendente.");
  }
}

async function pagarEReservar(){
  try{
    setMsg("");
    limparPagamentoUI();

    const nome = document.getElementById("nome").value.trim();
    const tipoViagem = document.getElementById("tipoViagem").value;
    const dataIda = document.getElementById("dataIda").value;
    const dataVolta = document.getElementById("dataVolta").value;
    const formaPagamento = document.getElementById("formaPagamento").value;

    if(!viagemSelecionada) return setMsg("Selecione uma viagem.", "erro");
    if(!poltronaSelecionada) return setMsg("Selecione uma poltrona.", "erro");
    if(!dataIda) return setMsg("Escolha a data de ida.", "erro");
    if(tipoViagem === "ida_volta" && !dataVolta) return setMsg("Escolha a data de volta.", "erro");
    if(tipoViagem === "ida_volta" && dataVolta < dataIda) return setMsg("A data de volta não pode ser menor que a data de ida.", "erro");
    if(!nome) return setMsg("Digite seu nome.", "erro");
    if(!formaPagamento) return setMsg("Selecione a forma de pagamento.", "erro");
    if(!configLoja) return setMsg("Configuração da loja não encontrada.", "erro");
    if(!viagemRodaNaData(viagemAtual, dataIda)){
      return setMsg(`Essa viagem não roda na data de ida escolhida. Dias disponíveis: ${viagemAtual?.dias || "-"}.`, "erro");
    }
    if(tipoViagem === "ida_volta" && dataVolta && !viagemRodaNaData(viagemAtual, dataVolta)){
      return setMsg(`Essa viagem não roda na data de volta escolhida. Dias disponíveis: ${viagemAtual?.dias || "-"}.`, "erro");

    const valorBase = Number(viagemAtual?.valor || 0);

      const texto = encodeURIComponent(

        `${tipoViagem === "ida_volta" ? `Data volta: ${dataVolta}\n` : ""}` +
        `Viagem: ${viagemAtual?.rota || ""}\n` +
        `Hora: ${viagemAtual?.hora || ""}\n` +
        `Poltrona: ${poltronaSelecionada}\n` +

        `Valor: R$ ${valorTotal.toFixed(2)}`
      );

      const numero = String(configLoja.whatsapp_numero || "").replace(/\D/g, "");
      if(!numero){
        return setMsg("WhatsApp da loja não configurado.", "erro");
      }

      window.open(`https://wa.me/55${numero}?text=${texto}`, "_blank");
      return;
    }

    if(configLoja.modo_venda !== "sistema"){
      return setMsg("Modo de venda inválido na configuração da loja.", "erro");
    }

    const pedidoId = await criarPedidoPassagem();
    await registrarReservaPendente();

    const itemTitulo = `Passagem ${viagemAtual?.rota || ""} ${viagemAtual?.hora || ""} Poltrona ${poltronaSelecionada}`;

    if(formaPagamento === "PIX"){

  // DEBUG (pode apagar depois)
  console.log("PIX payload:", {
    appId: app_id,
    pedidoId: pedidoId,
    transaction_amount: valorTotal
  });

  if(!app_id) return setMsg("Erro: app_id não encontrado", "erro");
  if(!pedidoId) return setMsg("Erro: pedido não criado", "erro");

  const res = await fetch("https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pix-loja", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      appId: app_id,
      pedidoId: pedidoId,
      transaction_amount: Number(valorTotal),
      valor: Number(valorTotal),
      descricao: `Passagem ${viagemAtual?.rota || ""}`
    })
  });

  const json = await res.json();

  console.log("RETORNO PIX:", json);

  if(!res.ok){
    throw new Error(json?.erro || json?.detalhes || "Erro ao gerar PIX.");
  }

  const qrBase64 =
    json?.qr_code_base64 ||
    json?.qrCodeBase64 ||
    json?.point_of_interaction?.transaction_data?.qr_code_base64 ||
    "";

  const copiaCola =
    json?.qr_code ||
    json?.copia_cola ||
    json?.pix_copia_cola ||
    json?.point_of_interaction?.transaction_data?.qr_code ||
    "";

  document.getElementById("pixBox").style.display = "block";
  document.getElementById("pixValor").innerHTML =
    `Valor: <b>R$ ${valorTotal.toFixed(2)}</b>`;

  if(qrBase64){
    document.getElementById("pixQrImg").src = `data:image/png;base64,${qrBase64}`;
  }

  document.getElementById("pixCopiaCola").value = copiaCola || "";

  setMsg("PIX gerado com sucesso. Faça o pagamento.");
  return;
}
      

    if(formaPagamento === "cartao"){
      const res = await fetch("https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pagamento-loja", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          appId: app_id,
          pedidoId,
          items: [{
            title: itemTitulo,
            quantity: 1,
            currency_id: "BRL",
            unit_price: valorTotal
          }]
        })
      });

      const json = await res.json();

      if(!res.ok){
        throw new Error(json?.erro || "Erro ao criar pagamento.");
      }

      const link =
        json?.init_point ||
        json?.sandbox_init_point ||
        "";

      if(!link){
        throw new Error("Link de pagamento não retornado.");
      }

      const a = document.getElementById("checkoutLink");
      a.href = link;
      a.classList.remove("hidden");
      setMsg("Pagamento criado. Clique no botão abaixo para abrir o Mercado Pago.");
      window.open(link, "_blank");
      return;
    }

    setMsg("Forma de pagamento inválida.", "erro");
  }catch(e){
    console.error(e);
    setMsg(e.message || "Erro ao processar pagamento.", "erro");
  }
}

function copiarPix(){
  const txt = document.getElementById("pixCopiaCola").value || "";
  if(!txt) return;
  navigator.clipboard.writeText(txt)
    .then(() => setMsg("Código PIX copiado."))
    .catch(() => setMsg("Não foi possível copiar o código PIX.", "erro"));
}

document.getElementById("dataIda").value = hojeLocalISO();
document.getElementById("dataVolta").value = hojeLocalISO();

document.getElementById("dataIda").addEventListener("change", async () => {
  setMsg("");
  await renderizarListaViagens();
});

document.getElementById("dataVolta").addEventListener("change", () => {
  setMsg("");
  if(!viagemAtual) return;

  const tipoViagem = document.getElementById("tipoViagem").value;
  const dataVolta = document.getElementById("dataVolta").value;

  if(tipoViagem === "ida_volta" && dataVolta && !viagemRodaNaData(viagemAtual, dataVolta)){
    setMsg(`A volta não roda nesse dia. Dias disponíveis: ${viagemAtual?.dias || "-"}.`, "erro");
    return;
  }

  const valorBox = document.getElementById("valorViagem");
  if(!valorBox.classList.contains("hidden")){
    valorBox.innerHTML = `Valor da passagem: <b>R$ ${calcularValorTotal().toFixed(2)}</b>`;
  }
});

atualizarCamposData();
carregarViagens();
</script>
