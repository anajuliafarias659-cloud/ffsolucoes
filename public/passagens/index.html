<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FF Transporte</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#07122b;color:#fff;font-family:Arial;margin:0}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  background:#020617;
  font-size:18px;
  font-weight:bold;
}

.container{
  display:flex;
  gap:28px;
  padding:36px 20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  background:#1e293b;
  padding:22px;
  border-radius:22px;
  width:520px;
  max-width:100%;
}

.card h3{
  margin:0 0 14px 0;
  font-size:28px;
}

.subtitulo{
  margin:24px 0 10px;
  font-size:22px;
  font-weight:bold;
}

select,input,button{
  width:100%;
  padding:14px 16px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button{
  background:#4b83ec;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.lista-viagens{
  margin-top:18px;
}

.item-viagem{
  padding:12px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  font-size:22px;
}

.item-viagem:hover{
  background:rgba(255,255,255,.03);
  border-radius:10px;
}

.item-viagem small{
  display:block;
  margin-top:4px;
  opacity:.7;
  font-size:13px;
}

.poltronas{
  background:#020617;
  padding:14px;
  border-radius:16px;
}

.motorista{
  text-align:center;
  background:#475569;
  padding:6px;
  border-radius:6px;
  font-size:18px;
  margin-bottom:12px;
}

.linha-onibus{
  display:grid;
  grid-template-columns:1fr 1fr 36px 1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.corredor{
  text-align:center;
  opacity:.35;
  padding-top:10px;
}

.poltrona{
  padding:12px 0;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
}

.livre{background:#22c55e}
.ocupado{background:#ef4444}
.selecionado{background:#facc15;color:#111}

.vazio{
  opacity:.8;
  padding:12px 0;
}

.valor-box{
  margin-top:12px;
  background:#111827;
  border-radius:12px;
  padding:12px;
  font-size:18px;
}

.info-viagem{
  margin-top:12px;
  font-size:15px;
  opacity:.9;
}
</style>
</head>

<body>

<div class="topo">
  <div>FF TRANSPORTE</div>
  <div>São Raimundo Nonato - PI</div>
</div>

<div class="container">

  <div class="card">
    <h3>Tipo de Viagem</h3>

    <select id="tipoViagem">
      <option value="ida">Somente Ida</option>
      <option value="ida_volta">Ida e Volta</option>
    </select>

    <div class="subtitulo">Ida</div>
    <div id="listaViagens" class="lista-viagens"></div>
  </div>

  <div class="card">
    <h3>Poltronas</h3>

    <div class="poltronas">
      <div class="motorista">MOTORISTA</div>
      <div id="poltronas"></div>
    </div>

    <div id="infoViagem" class="info-viagem"></div>
    <div id="valorViagem" class="valor-box" style="display:none"></div>

    <select id="formaPagamento">
      <option value="">Forma de pagamento</option>
      <option value="PIX">PIX</option>
      <option value="Dinheiro">Dinheiro</option>
    </select>

    <input type="text" id="nome" placeholder="Seu nome">

    <button onclick="reservar()">Pagar e Reservar</button>
  </div>

</div>

<script>
const client = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);
const app_id_url = params.get("app_id");
const slug = params.get("slug");

let app_id = null;
let viagemSelecionada = null;
let poltronaSelecionada = null;
let viagemAtual = null;

async function resolverAppId(){
  if(app_id_url){
    app_id = app_id_url;
    return true;
  }

  if(slug){
    const { data, error } = await client
      .from("apps")
      .select("id")
      .eq("slug", slug)
      .single();

    if(error || !data){
      return false;
    }

    app_id = data.id;
    return true;
  }

  return false;
}

async function carregarViagens(){
  const lista = document.getElementById("listaViagens");
  lista.innerHTML = "";

  const ok = await resolverAppId();

  if(!ok || !app_id){
    lista.innerHTML = `<div class="vazio">Negócio não identificado.</div>`;
    return;
  }

  const { data, error } = await client
    .from("viagens_passagens")
    .select("id, rota, hora, dias, valor, veiculo_id")
    .eq("app_id", app_id)
    .order("id", { ascending: false });

  if(error){
    lista.innerHTML = `<div class="vazio">Erro ao carregar viagens.</div>`;
    console.error(error);
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<div class="vazio">Nenhuma viagem cadastrada.</div>`;
    return;
  }

  for(const v of data){
    let nomeVeiculo = "";

    if(v.veiculo_id){
      const { data: veiculo } = await client
        .from("veiculos_passagens")
        .select("nome")
        .eq("id", v.veiculo_id)
        .single();

      nomeVeiculo = veiculo?.nome || "";
    }

    const div = document.createElement("div");
    div.className = "item-viagem";
    div.innerHTML = `
      ${v.rota || ""} - ${v.hora || ""}
      ${nomeVeiculo ? `<small>${nomeVeiculo}</small>` : ""}
    `;
    div.onclick = () => selecionarViagem(v.id);
    lista.appendChild(div);
  }
}

async function selecionarViagem(id){
  viagemSelecionada = id;
  poltronaSelecionada = null;

  const { data: viagem, error } = await client
    .from("viagens_passagens")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !viagem){
    console.error(error);
    return;
  }

  viagemAtual = viagem;

  const info = document.getElementById("infoViagem");
  info.innerHTML = `<b>${viagem.rota || ""}</b> - ${viagem.hora || ""}`;

  const valorBox = document.getElementById("valorViagem");
  if(viagem.valor !== null && viagem.valor !== undefined && viagem.valor !== ""){
    valorBox.style.display = "block";
    valorBox.innerHTML = `Valor da passagem: <b>R$ ${Number(viagem.valor).toFixed(2)}</b>`;
  } else {
    valorBox.style.display = "none";
    valorBox.innerHTML = "";
  }

  await carregarPoltronas();
}

async function carregarPoltronas(){
  if(!viagemSelecionada) return;

  const { data: viagem } = await client
    .from("viagens_passagens")
    .select("id, veiculo_id")
    .eq("id", viagemSelecionada)
    .single();

  if(!viagem?.veiculo_id){
    return;
  }

  const { data: veiculo } = await client
    .from("veiculos_passagens")
    .select("*")
    .eq("id", viagem.veiculo_id)
    .single();

  const total = veiculo?.total_poltronas || 20;

  const { data: reservas } = await client
    .from("reservas_passagens")
    .select("poltrona")
    .eq("viagem_id", viagemSelecionada);

  const ocupadas = (reservas || []).map(r => Number(r.poltrona));

  const div = document.getElementById("poltronas");
  div.innerHTML = "";

  let numero = 1;

  while(numero <= total){
    const row = document.createElement("div");
    row.className = "linha-onibus";

    for(let i = 0; i < 5; i++){
      if(i === 2){
        const corredor = document.createElement("div");
        corredor.className = "corredor";
        corredor.innerText = "";
        row.appendChild(corredor);
        continue;
      }

      if(numero > total){
        const vazio = document.createElement("div");
        vazio.style.visibility = "hidden";
        row.appendChild(vazio);
        continue;
      }

      const atual = numero;
      const btn = document.createElement("div");
      btn.innerText = atual;

      if(ocupadas.includes(atual)){
        btn.className = "poltrona ocupado";
      }else{
        btn.className = "poltrona livre";
        btn.onclick = () => {
          document.querySelectorAll(".poltrona").forEach(p => p.classList.remove("selecionado"));
          btn.classList.add("selecionado");
          poltronaSelecionada = atual;
        };
      }

      row.appendChild(btn);
      numero++;
    }

    div.appendChild(row);
  }
}

async function reservar(){
  const nome = document.getElementById("nome").value.trim();
  const formaPagamento = document.getElementById("formaPagamento").value;

  if(!viagemSelecionada || !poltronaSelecionada || !nome || !formaPagamento){
    alert("Preencha tudo");
    return;
  }

  const payload = {
    viagem_id: viagemSelecionada,
    poltrona: poltronaSelecionada,
    nome,
    app_id
  };

  if(viagemAtual?.valor !== undefined) payload.valor = viagemAtual.valor;
  if(formaPagamento) payload.forma_pagamento = formaPagamento;

  const { error } = await client
    .from("reservas_passagens")
    .insert([payload]);

  if(error){
    alert("Erro ao reservar: " + error.message);
    return;
  }

  alert("Reserva feita!");
  location.reload();
}

carregarViagens();
</script>

</body>
</html>
