<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FF Transporte</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { background:#0f172a; color:#fff; font-family:Arial; }

.container {
    display:flex;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    flex:1;
    min-width:300px;
}

select,input,button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

/* 🚌 ônibus */
.poltronas { display:flex; flex-direction:column; gap:8px; }

.linha-onibus {
    display:grid;
    grid-template-columns:1fr 1fr 40px 1fr 1fr;
    gap:8px;
}

.corredor { text-align:center; opacity:.3; }

.poltrona {
    padding:10px;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.livre { background:#22c55e; }
.ocupado { background:#ef4444; }
.selecionado { background:#3b82f6; }
</style>
</head>

<body>

<h2 style="padding:10px;">🚌 FF TRANSPORTE</h2>

<div class="container">

<div class="card">
<h3>Tipo de Viagem</h3>
<select id="tipoViagem">
<option value="ida">Somente Ida</option>
<option value="ida_volta">Ida e Volta</option>
</select>

<h3>Viagens</h3>
<div id="listaViagens"></div>
</div>

<div class="card">
<h3>Poltronas</h3>
<div class="poltronas" id="poltronas"></div>

<select>
<option>Forma de pagamento</option>
<option>PIX</option>
<option>Dinheiro</option>
</select>

<input type="text" id="nome" placeholder="Seu nome">

<button onclick="reservar()">Pagar e Reservar</button>
</div>

</div>

<script>

// 🔥 SUPABASE
const client = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔗 PARAMS
const params = new URLSearchParams(location.search);
const slug = params.get("slug");
const app_id_param = params.get("app_id");

let app_id = null;

let viagemIda = null;
let viagemVolta = null;

let poltronaIda = null;
let poltronaVolta = null;

let viagemSelecionada = null;

// 📅 DIA
function diaHoje(){
  return ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"][new Date().getDay()];
}

// 🔥 APP
async function carregarApp(){

  if(app_id_param){
    app_id = app_id_param;
    return carregarViagens();
  }

  if(slug){
    const { data } = await client
      .from("apps")
      .select("id")
      .eq("slug", slug)
      .single();

    app_id = data.id;
    carregarViagens();
  }
}

// 🔥 VIAGENS
async function carregarViagens(){

  const hoje = diaHoje();

  const { data } = await client
    .from("viagens")
    .select("*")
    .eq("app_id", app_id)
    .eq("ativo", true);

  const lista = document.getElementById("listaViagens");
  lista.innerHTML = "";

  data.forEach(v => {

    if(!v.dias.includes(hoje)) return;

    const div = document.createElement("div");

    div.innerHTML = `
      <p><b>${v.rota}</b> - ${v.hora}</p>
      <small>Dias: ${v.dias}</small>
      <hr>
    `;

    div.onclick = () => selecionarViagem(v.id);

    lista.appendChild(div);
  });
}

// 🔥 SELECIONAR VIAGEM
function selecionarViagem(id){

  const tipo = document.getElementById("tipoViagem").value;

  if(tipo === "ida"){
    viagemIda = id;
  } else {

    if(!viagemIda){
      viagemIda = id;
      alert("Agora escolha a VOLTA");
      return;
    }

    viagemVolta = id;
  }

  viagemSelecionada = id;
  carregarPoltronas();
}

// 🚌 POLTRONAS
async function carregarPoltronas(){

  const { data } = await client
    .from("reservas")
    .select("poltrona")
    .eq("viagem_id", viagemSelecionada)
    .eq("status","ativo");

  const ocupadas = data.map(r => r.poltrona);

  const div = document.getElementById("poltronas");
  div.innerHTML = "";

  let numero = 1;

  for(let linha=0; linha<10; linha++){

    const row = document.createElement("div");
    row.className = "linha-onibus";

    for(let pos=0; pos<5; pos++){

      if(pos === 2){
        const corredor = document.createElement("div");
        corredor.className = "corredor";
        corredor.innerText = "🚶";
        row.appendChild(corredor);
        continue;
      }

      const btn = document.createElement("div");
      btn.innerText = numero;

      if(ocupadas.includes(numero)){
        btn.className = "poltrona ocupado";
      }else{
        btn.className = "poltrona livre";

        btn.onclick = () => {

          const tipo = document.getElementById("tipoViagem").value;

          document.querySelectorAll(".poltrona").forEach(p => p.classList.remove("selecionado"));
          btn.classList.add("selecionado");

          if(tipo === "ida"){
            poltronaIda = numero;
          } else {

            if(!poltronaIda){
              poltronaIda = numero;
              alert("Agora escolha a poltrona da VOLTA");
              return;
            }

            poltronaVolta = numero;
          }
        };
      }

      row.appendChild(btn);
      numero++;
    }

    div.appendChild(row);
  }
}

// 💾 RESERVAR
async function reservar(){

  const nome = document.getElementById("nome").value;
  const tipo = document.getElementById("tipoViagem").value;

  if(!nome) return alert("Digite seu nome");

  if(tipo === "ida"){

    if(!viagemIda || !poltronaIda){
      return alert("Selecione viagem e poltrona");
    }

    await client.from("reservas").insert([{
      viagem_id: viagemIda,
      poltrona: poltronaIda,
      nome,
      app_id,
      status: "ativo"
    }]);

  } else {

    if(!viagemIda || !viagemVolta){
      return alert("Escolha ida e volta");
    }

    if(!poltronaIda || !poltronaVolta){
      return alert("Escolha as duas poltronas");
    }

    await client.from("reservas").insert([
      {
        viagem_id: viagemIda,
        poltrona: poltronaIda,
        nome,
        app_id,
        status: "ativo"
      },
      {
        viagem_id: viagemVolta,
        poltrona: poltronaVolta,
        nome,
        app_id,
        status: "ativo"
      }
    ]);
  }

  alert("Reserva realizada!");
  location.reload();
}

// 🚀 INIT
carregarApp();

</script>

</body>
</html>
