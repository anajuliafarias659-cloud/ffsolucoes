<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FF Transporte</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;margin:0}

.topo{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  width:350px;
}

select,input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#3b82f6;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.poltronas{
  background:#020617;
  padding:10px;
  border-radius:12px;
}

.linha-onibus{
  display:grid;
  grid-template-columns:1fr 1fr 40px 1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.corredor{
  text-align:center;
  opacity:.3;
}

.poltrona{
  padding:10px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

.livre{background:#22c55e}
.ocupado{background:#ef4444}
.selecionado{background:#3b82f6}

.motorista{
  text-align:center;
  background:#334155;
  padding:5px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="topo">
  <div>🚌 FF TRANSPORTE</div>
  <div>São Raimundo Nonato - PI</div>
</div>

<div class="container">

<div class="card">
<h3>Tipo de Viagem</h3>

<select id="tipoViagem">
<option value="ida">Somente Ida</option>
<option value="ida_volta">Ida e Volta</option>
</select>

<h3>Ida</h3>
<div id="listaViagens"></div>

</div>

<div class="card">

<h3>Poltronas</h3>

<div class="poltronas">
<div class="motorista">MOTORISTA</div>
<div id="poltronas"></div>
</div>

<select>
<option>Forma de pagamento</option>
<option>PIX</option>
<option>Dinheiro</option>
</select>

<input type="text" id="nome" placeholder="Seu nome">

<button onclick="reservar()">Pagar e Reservar</button>

</div>

</div>

<script>

const client = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);
const app_id = params.get("app_id");

let viagemSelecionada = null;
let poltronaSelecionada = null;

// 🔥 CARREGAR VIAGENS
async function carregarViagens(){

  const lista = document.getElementById("listaViagens");
  lista.innerHTML = "";

  if(!app_id){
    lista.innerHTML = "Falta app_id";
    return;
  }

  const { data } = await client
    .from("viagens_passagens")
    .select("*")
    .eq("app_id", app_id);

  (data || []).forEach(v => {

    const div = document.createElement("div");

    div.style.padding = "10px";
    div.style.marginTop = "10px";
    div.style.borderBottom = "1px solid #334155";
    div.style.cursor = "pointer";

    div.innerHTML = `${v.rota} - ${v.hora}`;

    div.onclick = () => selecionarViagem(v.id);

    lista.appendChild(div);
  });
}

// 🔥 SELECIONAR VIAGEM
function selecionarViagem(id){
  viagemSelecionada = id;
  carregarPoltronas();
}

// 🚌 POLTRONAS DINÂMICAS
async function carregarPoltronas(){

  // viagem
  const { data: viagem } = await client
    .from("viagens_passagens")
    .select("*")
    .eq("id", viagemSelecionada)
    .single();

  // veiculo
  const { data: veiculo } = await client
    .from("veiculos_passagens")
    .select("*")
    .eq("id", viagem.veiculo_id)
    .single();

  const total = veiculo.total_poltronas || 40;

  // ocupadas
  const { data } = await client
    .from("reservas_passagens")
    .select("poltrona")
    .eq("viagem_id", viagemSelecionada);

  const ocupadas = (data || []).map(r => r.poltrona);

  const div = document.getElementById("poltronas");
  div.innerHTML = "";

  let numero = 1;

  while(numero <= total){

    const row = document.createElement("div");
    row.className = "linha-onibus";

    for(let i=0;i<5;i++){

      if(i === 2){
        const corredor = document.createElement("div");
        corredor.className = "corredor";
        corredor.innerText = "|";
        row.appendChild(corredor);
        continue;
      }

      if(numero > total) break;

      const btn = document.createElement("div");
      btn.innerText = numero;

      if(ocupadas.includes(numero)){
        btn.className = "poltrona ocupado";
      }else{
        btn.className = "poltrona livre";

        btn.onclick = () => {
          document.querySelectorAll(".poltrona").forEach(p => p.classList.remove("selecionado"));
          btn.classList.add("selecionado");
          poltronaSelecionada = numero;
        };
      }

      row.appendChild(btn);
      numero++;
    }

    div.appendChild(row);
  }
}

// 💾 RESERVAR
async function reservar(){

  const nome = document.getElementById("nome").value;

  if(!nome || !poltronaSelecionada || !viagemSelecionada){
    alert("Preencha tudo");
    return;
  }

  await client.from("reservas_passagens").insert([{
    viagem_id: viagemSelecionada,
    poltrona: poltronaSelecionada,
    nome,
    app_id
  }]);

  alert("Reserva feita!");
  location.reload();
}

// START
carregarViagens();

</script>

</body>
</html>
