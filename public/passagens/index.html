<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FF Transporte</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { background:#0f172a; color:#fff; font-family:Arial; }

.container {
    display:flex;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    flex:1;
    min-width:300px;
}

select,input,button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

.poltronas { display:flex; flex-direction:column; gap:8px; }

.linha-onibus {
    display:grid;
    grid-template-columns:1fr 1fr 40px 1fr 1fr;
    gap:8px;
}

.corredor { text-align:center; opacity:.3; }

.poltrona {
    padding:10px;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.livre { background:#22c55e; }
.ocupado { background:#ef4444; }
.selecionado { background:#3b82f6; }
</style>
</head>

<body>

<h2 style="padding:10px;">🚌 FF TRANSPORTE</h2>

<div class="container">

<div class="card">
<h3>Tipo de Viagem</h3>
<select id="tipoViagem">
<option value="ida">Somente Ida</option>
<option value="ida_volta">Ida e Volta</option>
</select>

<h3>Viagens</h3>
<div id="listaViagens"></div>
</div>

<div class="card">
<h3>Poltronas</h3>
<div class="poltronas" id="poltronas"></div>

<select>
<option>Forma de pagamento</option>
<option>PIX</option>
<option>Dinheiro</option>
</select>

<input type="text" id="nome" placeholder="Seu nome">

<button onclick="reservar()">Pagar e Reservar</button>
</div>

</div>

<script>

// 🔥 SUPABASE
const client = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔗 PARAMS
const params = new URLSearchParams(location.search);
const app_id = params.get("app_id") || null;

// VARIÁVEIS
let viagemIda = null;
let viagemVolta = null;
let poltronaIda = null;
let poltronaVolta = null;
let viagemSelecionada = null;

// 📅 DIA
function diaHoje(){
  return ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"][new Date().getDay()];
}

// 🔥 CARREGAR VIAGENS
async function carregarViagens(){

  const lista = document.getElementById("listaViagens");
  lista.innerHTML = "";

  if(!app_id){
    lista.innerHTML = "<div style='color:red'>Falta app_id na URL</div>";
    return;
  }

  const { data, error } = await client
    .from("viagens_passagens")
    .select("*")
    .eq("app_id", app_id);

  console.log("VIAGENS:", data, error);

  if(error){
    lista.innerHTML = "Erro ao carregar viagens";
    return;
  }

  if(!data || data.length === 0){
    lista.innerHTML = "Nenhuma viagem cadastrada";
    return;
  }

  const hoje = diaHoje();

  data.forEach(v => {

    if(v.dias && !String(v.dias).includes(hoje)) return;

    const div = document.createElement("div");

    div.style.padding = "10px";
    div.style.background = "#334155";
    div.style.marginTop = "8px";
    div.style.borderRadius = "8px";
    div.style.cursor = "pointer";

    div.innerHTML = `<b>${v.rota || ""}</b> - ${v.hora || ""}`;

    div.onclick = () => selecionarViagem(v.id);

    lista.appendChild(div);
  });
}

// 🔥 SELECIONAR VIAGEM
function selecionarViagem(id){

  const tipo = document.getElementById("tipoViagem").value;

  if(tipo === "ida"){
    viagemIda = id;
  } else {

    if(!viagemIda){
      viagemIda = id;
      alert("Agora escolha a VOLTA");
      return;
    }

    viagemVolta = id;
  }

  viagemSelecionada = id;
  carregarPoltronas();
}

// 🚌 CARREGAR POLTRONAS
async function carregarPoltronas(){

  const { data } = await client
    .from("reservas_passagens")
    .select("poltrona")
    .eq("viagem_id", viagemSelecionada);

  const ocupadas = (data || []).map(r => r.poltrona);

  const div = document.getElementById("poltronas");
  div.innerHTML = "";

  let numero = 1;

  for(let linha=0; linha<10; linha++){

    const row = document.createElement("div");
    row.className = "linha-onibus";

    for(let pos=0; pos<5; pos++){

      if(pos === 2){
        const corredor = document.createElement("div");
        corredor.className = "corredor";
        corredor.innerText = "🚶";
        row.appendChild(corredor);
        continue;
      }

      const btn = document.createElement("div");
      btn.innerText = numero;

      if(ocupadas.includes(numero)){
        btn.className = "poltrona ocupado";
      }else{
        btn.className = "poltrona livre";

        btn.onclick = () => {

          document.querySelectorAll(".poltrona").forEach(p => p.classList.remove("selecionado"));
          btn.classList.add("selecionado");

          if(document.getElementById("tipoViagem").value === "ida"){
            poltronaIda = numero;
          } else {
            poltronaVolta = numero;
          }
        };
      }

      row.appendChild(btn);
      numero++;
    }

    div.appendChild(row);
  }
}

// 💾 RESERVAR
async function reservar(){

  const nome = document.getElementById("nome").value;

  if(!nome) return alert("Digite seu nome");

  if(!viagemIda || !poltronaIda){
    return alert("Selecione viagem e poltrona");
  }

  await client.from("reservas_passagens").insert([{
    viagem_id: viagemIda,
    poltrona: poltronaIda,
    nome,
    app_id
  }]);

  alert("Reserva realizada!");
  location.reload();
}

// 🚀 START
carregarViagens();

</script>

</body>
</html>
