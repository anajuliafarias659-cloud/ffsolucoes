<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurar Site</title>

  <style>
    :root{
      --bg:#020617;
      --card:#0f172a;
      --border:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --primary:#22c55e;
      --danger:#ef4444;
      --input:#0b1220;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }
    .container{
      max-width:720px;
      margin:40px auto;
      padding:20px;
    }
    .box{
      background:var(--card);
      border:1px solid var(--border);
      padding:20px;
      border-radius:16px;
      margin-bottom:18px;
    }
    h2{margin:0 0 12px 0; font-size:18px}
    label{display:block; margin-top:10px; font-size:13px; color:var(--muted)}
    input,select,textarea,button{
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:none;
      outline:none;
      font-size:14px;
    }
    input,select,textarea{
      background:var(--input);
      color:var(--text);
      border:1px solid var(--border);
    }
    textarea{resize:vertical; min-height:90px}
    button{
      background:var(--primary);
      color:#04120a;
      font-weight:bold;
      cursor:pointer;
    }
    .btn-danger{background:var(--danger); color:#fff}
    img{
      width:100%;
      max-height:220px;
      object-fit:cover;
      margin-top:10px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--input);
    }
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    @media(max-width:640px){ .row{grid-template-columns:1fr} }
    small{display:block; margin-top:6px; color:var(--muted); line-height:1.3}
    .hidden{display:none}
    #status{margin-top:12px}
  </style>
</head>

<body>
  <div class="container">

    <div class="box">
      <h2>Informações da Loja</h2>

      <input id="nome" placeholder="Nome da Loja" />

      <label>Logo</label>
      <input type="file" id="inputLogo" accept="image/*" />
      <img id="previewLogo" alt="Preview logo" />
      <button type="button" class="btn-danger" id="btnRemoverLogo">❌ Remover Logo</button>

      <label>Banner</label>
      <input type="file" id="inputBanner" accept="image/*" />
      <img id="previewBanner" alt="Preview banner" />
      <button type="button" class="btn-danger" id="btnRemoverBanner">❌ Remover Banner</button>

      <label>Descrição do banner (opcional)</label>
      <textarea id="bannerDescricao" placeholder="Ex: Promoção do dia!"></textarea>
    </div>

    <div class="box">
      <h2>Endereço</h2>

      <div class="row">
        <input id="rua" placeholder="Rua" />
        <input id="numero" placeholder="Número" />
      </div>

      <div class="row">
        <input id="cidade" placeholder="Cidade" />
        <input id="estado" placeholder="Estado" />
      </div>

      <input id="telefone" placeholder="Telefone / WhatsApp da loja" />
    </div>

    <div class="box">
      <h2>Configurações</h2>

      <label>Tema</label>
      <select id="tema">
        <option value="padrao">Padrão</option>
        <option value="natal">Natal</option>
        <option value="anonovo">Ano Novo</option>
        <option value="capivara">Capivara</option>
      </select>

      <label>Modo de venda</label>
      <select id="modoVenda">
        <option value="whatsapp">Venda via WhatsApp</option>
        <option value="sistema">Venda pelo Sistema (Mercado Pago)</option>
      </select>

      <label>WhatsApp (somente números)</label>
<input id="whatsapp" placeholder="Ex: 88999999999" />

<label>Chave PIX</label>
<input id="pixChave" placeholder="Ex: email, telefone, CPF, CNPJ ou chave aleatória" />
<small>Essa chave será copiada pelo cliente no botão PIX.</small>

<div id="boxMp" class="hidden">
  <label>Token do Mercado Pago (Access Token)</label>
  <input id="mpToken" placeholder="Cole aqui o Access Token do Mercado Pago" />
  <small>Esse token é do dono da loja. Não compartilhe.</small>

  <button type="button" class="btn-danger" id="btnRemoverToken">
    ❌ Remover Token Mercado Pago
  </button>
</div>>
      </div>
    </div>

    <button id="btnSalvar">Salvar Configurações</button>
    <small id="status"></small>

  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    // ===== DOM
    const statusEl = document.getElementById("status");

    const nome = document.getElementById("nome");
    const bannerDescricao = document.getElementById("bannerDescricao");
    const rua = document.getElementById("rua");
    const numero = document.getElementById("numero");
    const cidade = document.getElementById("cidade");
    const estado = document.getElementById("estado");
    const telefone = document.getElementById("telefone");

    const tema = document.getElementById("tema");
const modoVenda = document.getElementById("modoVenda");
const whatsapp = document.getElementById("whatsapp");
const pixChave = document.getElementById("pixChave");

    const boxMp = document.getElementById("boxMp");
    const mpToken = document.getElementById("mpToken");

    const inputLogo = document.getElementById("inputLogo");
    const inputBanner = document.getElementById("inputBanner");
    const previewLogo = document.getElementById("previewLogo");
    const previewBanner = document.getElementById("previewBanner");

    const btnSalvar = document.getElementById("btnSalvar");
    const btnRemoverLogo = document.getElementById("btnRemoverLogo");
    const btnRemoverBanner = document.getElementById("btnRemoverBanner");
    const btnRemoverToken = document.getElementById("btnRemoverToken");

    // ===== STATE
    let APP_ID = null;

    function setStatus(msg){ statusEl.textContent = msg || ""; }
    function basePath(){ return location.pathname.split("/config")[0]; }

    function alternarCamposPagamento(){
      boxMp.classList.toggle("hidden", modoVenda.value !== "sistema");
    }
    modoVenda.addEventListener("change", alternarCamposPagamento);

    // ===== AUTH / APP_ID
    async function verificarSessao(){
      const { data:{ session } } = await supabase.auth.getSession();
      if(!session){
        window.location.href = basePath() + "/auth/login.html";
        return null;
      }
      return session.user.id;
    }

    async function carregarAppId(){
      const userId = await verificarSessao();
      if(!userId) return;

      const { data, error } = await supabase
        .from("usuarios")
        .select("app_id")
        .eq("id", userId)
        .single();

      if(error || !data?.app_id){
        alert("Usuário sem app_id vinculado.");
        return;
      }

      APP_ID = data.app_id;
    }

    // ===== UPLOAD
    async function uploadImagem(file, bucket){
      if(!APP_ID) return null;

      const nomeArquivo = `${APP_ID}_${Date.now()}_${file.name}`;

      const { error } = await supabase.storage
        .from(bucket)
        .upload(nomeArquivo, file, { cacheControl:"3600", upsert:true });

      if(error){
        console.error(error);
        alert("Erro no upload: " + error.message);
        return null;
      }

      const { data } = supabase.storage.from(bucket).getPublicUrl(nomeArquivo);
      return data.publicUrl;
    }

    // ===== TOKEN MP (tabela mp_contas)
    async function carregarTokenMP(){
      if(!APP_ID) return;

      const { data, error } = await supabase
        .from("mp_contas")
        .select("mp_access_token")
        .eq("app_id", APP_ID)
        .maybeSingle();

      if(error){
        console.error("Erro ao carregar token MP:", error);
        return;
      }

      mpToken.value = data?.mp_access_token || "";
    }

    async function salvarTokenMP(){
      if(!APP_ID) return;

      const token = (mpToken.value || "").trim();
      if(!token) return; // vazio: não apaga automático

      const { error } = await supabase
        .from("mp_contas")
        .upsert({ app_id: APP_ID, mp_access_token: token }, { onConflict:"app_id" });

      if(error){
        console.error("Erro ao salvar token MP:", error);
        alert("Erro ao salvar token do Mercado Pago.");
      }
    }

    async function removerTokenMP(){
      if(!APP_ID) return;
      if(!confirm("Remover o token do Mercado Pago desta loja?")) return;

      const { error } = await supabase
        .from("mp_contas")
        .delete()
        .eq("app_id", APP_ID);

      if(error){
        console.error(error);
        alert("Erro ao remover token.");
        return;
      }

      mpToken.value = "";
      alert("Token removido!");
    }

    // ===== CARREGAR CONFIG
    async function carregarConfig(){
      if(!APP_ID) return;

      const { data, error } = await supabase
        .from("config_site")
        .select("*")
        .eq("app_id", APP_ID)
        .maybeSingle();

      if(error){
        console.error(error);
        return;
      }

      if(data){
  nome.value = data.nome_site || "";
  bannerDescricao.value = data.banner_descricao || "";
  rua.value = data.loja_rua || "";
  numero.value = data.loja_numero || "";
  cidade.value = data.loja_cidade || "";
  estado.value = data.loja_estado || "";
  telefone.value = data.telefone || "";

  tema.value = data.tema_site || "padrao";
  modoVenda.value = data.modo_venda || "whatsapp";
  whatsapp.value = data.whatsapp_numero || "";
  pixChave.value = data.pix_chave || "";

  previewLogo.src = data.logo_url || "";
  previewBanner.src = data.banner_url || "";
}

      await carregarTokenMP();
      alternarCamposPagamento();
    }

    // ===== SALVAR
    async function salvarTudo(){
      try{
        if(!APP_ID){
          alert("APP_ID não carregado.");
          return;
        }

        setStatus("Salvando...");

        let logoUrl = previewLogo.src || "";
        let bannerUrl = previewBanner.src || "";

        if(inputLogo.files[0]){
          const up = await uploadImagem(inputLogo.files[0], "logos");
          if(up) logoUrl = up;
        }

        if(inputBanner.files[0]){
          const up = await uploadImagem(inputBanner.files[0], "banners");
          if(up) bannerUrl = up;
        }

        const payload = {
  app_id: APP_ID,
  nome_site: nome.value,
  logo_url: logoUrl,
  banner_url: bannerUrl,
  banner_descricao: bannerDescricao.value,
  loja_rua: rua.value,
  loja_numero: numero.value,
  loja_cidade: cidade.value,
  loja_estado: estado.value,
  telefone: telefone.value,
  tema_site: tema.value,
  modo_venda: modoVenda.value,
  whatsapp_numero: whatsapp.value,
  pix_chave: pixChave.value.trim()
};

        const { error } = await supabase
          .from("config_site")
          .upsert(payload, { onConflict:"app_id" });

        if(error){
          console.error(error);
          alert("Erro ao salvar config_site.");
          setStatus("");
          return;
        }

        if(modoVenda.value === "sistema"){
          await salvarTokenMP();
        }

        alert("Salvo com sucesso!");
        setStatus("");

      }catch(e){
        console.error(e);
        alert("Erro inesperado ao salvar.");
        setStatus("");
      }
    }

    // ===== PREVIEW
    inputLogo.addEventListener("change", () => {
      const f = inputLogo.files[0];
      if(f) previewLogo.src = URL.createObjectURL(f);
    });

    inputBanner.addEventListener("change", () => {
      const f = inputBanner.files[0];
      if(f) previewBanner.src = URL.createObjectURL(f);
    });

    // ===== REMOVER LOGO/BANNER
    async function removerLogo(){
      if(!APP_ID) return;

      const { error } = await supabase
        .from("config_site")
        .update({ logo_url:"" })
        .eq("app_id", APP_ID);

      if(error){
        console.error(error);
        alert("Erro ao remover logo.");
        return;
      }

      previewLogo.src = "";
      inputLogo.value = "";
      alert("Logo removido!");
    }

    async function removerBanner(){
      if(!APP_ID) return;

      const { error } = await supabase
        .from("config_site")
        .update({ banner_url:"" })
        .eq("app_id", APP_ID);

      if(error){
        console.error(error);
        alert("Erro ao remover banner.");
        return;
      }

      previewBanner.src = "";
      inputBanner.value = "";
      alert("Banner removido!");
    }

    // ===== EVENTS
    btnSalvar.addEventListener("click", salvarTudo);
    btnRemoverLogo.addEventListener("click", removerLogo);
    btnRemoverBanner.addEventListener("click", removerBanner);
    btnRemoverToken.addEventListener("click", removerTokenMP);

    // ===== INIT
    (async function init(){
      await carregarAppId();
      await carregarConfig();
    })();
  </script>
</body>
</html>
