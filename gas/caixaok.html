<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caixa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:10px;
}

.box{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.pdv-grid{
  display:grid;
  grid-template-columns:1fr 350px;
  gap:10px;
}

.foto-produto-box{
  height:140px;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  margin-bottom:6px;
}

.foto-produto-box img{
  max-width:100%;
  max-height:100%;
}

input,select,button{
  width:100%;
  height:40px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  padding:8px;
}

button{
  background:#22c55e;
  font-weight:bold;
}

.cupom{
  background:#020617;
  border:1px solid #334155;
  border-radius:10px;
  padding:8px;
  height:320px;
}

#listaItensVenda{
  height:260px;
  overflow:auto;
}

.item-cupom{
  display:grid;
  grid-template-columns:1fr 40px 70px 30px;
  gap:5px;
  padding:5px 0;
  border-bottom:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="topo">
  <h2>💰 Caixa</h2>
</div>

<div class="container">

<div class="box">

<div class="pdv-grid">

<div>

<div class="foto-produto-box">
<img id="fotoProduto" style="display:none">
<span id="semFoto">SEM FOTO</span>
</div>

<input id="produtoInput" placeholder="Produto">
<div id="listaProdutos"></div>

<input id="preco" disabled>
<input id="estoque" disabled>
<input id="quantidade" type="number" value="1">

<button onclick="adicionarItemVenda()">➕ Adicionar</button>

</div>

<div class="cupom">
<h3>Itens</h3>
<div id="listaItensVenda"></div>
</div>

</div>

<select id="formaPagamento">
<option value="">Pagamento</option>
<option value="dinheiro">Dinheiro</option>
<option value="pix">Pix</option>
</select>

<input id="totalVenda" disabled>
<input id="pago" placeholder="Valor pago">
<input id="troco" disabled>

<button onclick="vender()">Finalizar Venda</button>

</div>

</div>

<script>
const sb = supabase.createClient("https://pdajixsoowcyhnjwhgpc.supabase.co","sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw");

let produtos=[];
let produtoSelecionado=null;
let itensVenda=[];

const produtoInput=document.getElementById("produtoInput");
const listaProdutos=document.getElementById("listaProdutos");
const quantidadeInput=document.getElementById("quantidade");
const totalVendaInput=document.getElementById("totalVenda");
const pagoInput=document.getElementById("pago");
const trocoInput=document.getElementById("troco");

async function carregarProdutos(){
  const {data}=await sb.from("produtos").select("*");
  produtos=data||[];
}
carregarProdutos();

produtoInput.addEventListener("input",()=>{
  const termo=produtoInput.value.toLowerCase();
  listaProdutos.innerHTML="";
  produtos.filter(p=>p.nome.toLowerCase().includes(termo)).forEach(p=>{
    const d=document.createElement("div");
    d.innerText=p.nome;
    d.onclick=()=>{
      produtoSelecionado=p;
      produtoInput.value=p.nome;
      calcularValores();
    };
    listaProdutos.appendChild(d);
  });
});

function adicionarItemVenda(){
  if(!produtoSelecionado)return alert("Escolha produto");

  const q=Number(quantidadeInput.value);
  const subtotal=q*produtoSelecionado.preco;

  itensVenda.push({
    id:produtoSelecionado.id,
    nome:produtoSelecionado.nome,
    qtd:q,
    valor:subtotal
  });

  render();
}

function render(){
  const div=document.getElementById("listaItensVenda");
  div.innerHTML=itensVenda.map((i,index)=>`
  <div class="item-cupom">
  <span>${i.nome}</span>
  <span>${i.qtd}</span>
  <span>${i.valor}</span>
  <button onclick="remover(${index})">X</button>
  </div>`).join("");

  totalVendaInput.value=itensVenda.reduce((s,i)=>s+i.valor,0);

  calcularValores();
}

function remover(i){
  itensVenda.splice(i,1);
  render();
}

function calcularValores(){
  const total=Number(totalVendaInput.value);
  const pago=Number(pagoInput.value);

  if(pago){
    trocoInput.value=(pago-total).toFixed(2);
  }
}

async function vender(){
  if(!itensVenda.length)return alert("Sem itens");

  const total=Number(totalVendaInput.value);

  await sb.from("caixa").insert({
    descricao:"Venda",
    valor:total
  });

  itensVenda=[];
  render();
  alert("Venda OK");
}
</script>

</body>
</html>
