<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caixa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

.topo{
  height:70px;
  background:#0f172a;
  padding:10px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.topo h2{
  margin:0;
  font-size:30px;
}

.topo button{
  width:220px;
  height:48px;
  margin:0;
}

.container{
  width:100%;
  height:calc(100vh - 70px);
  padding:12px;
  display:grid;
  grid-template-columns:65% 35%;
  gap:12px;
  overflow:hidden;
}

.box{
  background:#0f172a;
  border-radius:16px;
  padding:14px;
  min-width:0;
  min-height:0;
}

.box h3{
  margin:0 0 10px 0;
  font-size:22px;
}

.box-venda{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.pdv-grid{
  flex:1;
  display:grid;
  grid-template-columns:52% 48%;
  gap:12px;
  min-height:0;
}

.col-produto{
  min-width:0;
}

.foto-produto-box{
  width:100%;
  height:150px;
  background:#020617;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:8px;
  border:1px solid #1e293b;
}

.foto-produto-box img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

#semFoto{
  color:#64748b;
  font-weight:bold;
}

input,select,button{
  width:100%;
  height:40px;
  padding:8px 10px;
  margin-top:7px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

input,select{
  background:#020617;
  color:#fff;
}

button{
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.cupom{
  background:#020617;
  border:1px solid #334155;
  border-radius:14px;
  padding:12px;
  min-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#listaItensVenda{
  flex:1;
  overflow:auto;
}

.item-cupom{
  display:grid;
  grid-template-columns:1fr 45px 80px 35px;
  gap:6px;
  border-bottom:1px solid #1e293b;
  padding:7px 0;
  font-size:14px;
}

.sugestoes div{
  padding:8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.sugestoes img{
  width:45px;
  height:45px;
  object-fit:cover;
  border-radius:8px;
  background:#1e293b;
}

.box-lateral{
  display:flex;
  flex-direction:column;
  overflow:hidden;
  gap:12px;
}

.pagamento-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  flex-shrink:0;
}

.pagamento-grid select{
  grid-column:1 / 3;
}

.pagamento-grid button{
  grid-column:1 / 3;
  height:46px;
}

.box-caixa{
  background:#0f172a;
  border-radius:16px;
  padding:14px;
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#lista{
  flex:1;
  overflow:auto;
  min-height:0;
}

.item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  border-bottom:1px solid #1e293b;
  padding:7px 0;
  font-size:15px;
}

.total{
  font-size:20px;
  font-weight:bold;
  text-align:right;
  color:#22c55e;
  padding:10px 0;
  flex-shrink:0;
}

.fechar{
  background:#2563eb;
  color:#000;
  height:46px;
  flex-shrink:0;
}

@media(max-width:900px){
  html,body{
    height:auto;
    overflow:auto;
  }

  .container{
    display:block;
    height:auto;
    overflow:visible;
  }

  .box{
    margin-bottom:12px;
  }

  .pdv-grid{
    grid-template-columns:1fr;
  }

  .box-lateral{
    margin-bottom:12px;
  }
}
</style>
</head>

<body>

<div class="topo">
  <h2>💰 Caixa</h2>
 </div>

<div class="container">

  <div class="box box-venda">
    <h3>🛒 Venda</h3>

    <div class="pdv-grid">
      <div class="col-produto">
        <div class="foto-produto-box">
          <img id="fotoProduto" src="" style="display:none">
          <span id="semFoto">SEM FOTO</span>
        </div>

        <input id="produtoInput" placeholder="Digite o produto">
        <div id="listaProdutos" class="sugestoes"></div>

        <input id="preco" disabled placeholder="Preço unitário">
        <input id="estoque" disabled placeholder="Estoque disponível">
        <input id="quantidade" type="number" min="1" value="1">
        <button type="button" onclick="adicionarItemVenda()">➕ Adicionar produto</button>
      </div>

      <div class="cupom">
        <h3>🧾 Produtos passados</h3>
        <div id="listaItensVenda"></div>
      </div>
    </div>
  </div>

  <div class="box-lateral">

    <div class="box pagamento-grid">
      <select id="formaPagamento">
        <option value="">Forma de pagamento</option>
        <option value="dinheiro">💵 Dinheiro</option>
        <option value="cartao">💳 Cartão</option>
        <option value="pix">📱 Pix</option>
      </select>

      <input id="totalVenda" disabled placeholder="Total da venda">
      <input id="pago" type="number" step="0.01" placeholder="Valor pago">
      <input id="desconto" disabled placeholder="Desconto">
      <input id="troco" disabled placeholder="Troco">

      <button onclick="vender()">Registrar Venda</button>
    </div>

    <div class="box-caixa">
      <h3>📄 Caixa Atual</h3>
      <div id="lista"></div>
      <div id="total" class="total"></div>
      <button class="fechar" onclick="fecharCaixa()">🧾 Fechar Caixa</button>
    </div>

  </div>

</div>

<script>
/* ===== SESSÃO ===== */
let app_id = null;

async function verificarSessaoCaixa(){
  const { data:{ session } } = await sb.auth.getSession();

  if(!session){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const { data: usuario, error } = await sb
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  if(error || !usuario?.app_id){
    alert("Não foi possível carregar o app_id do usuário.");
    location.href = "/auth/login.html";
    return false;
  }

  app_id = usuario.app_id;
  return true;
}

/* ===== SUPABASE ===== */
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

/* ===== ELEMENTOS ===== */
const produtoInput = document.getElementById("produtoInput");
const listaProdutos = document.getElementById("listaProdutos");
const precoInput = document.getElementById("preco");
const estoqueInput = document.getElementById("estoque");
const quantidadeInput = document.getElementById("quantidade");
const formaPagamentoInput = document.getElementById("formaPagamento");
const totalVendaInput = document.getElementById("totalVenda");
const pagoInput = document.getElementById("pago");
const descontoInput = document.getElementById("desconto");
const trocoInput = document.getElementById("troco");
const lista = document.getElementById("lista");
const total = document.getElementById("total");

let produtos = [];
let produtoSelecionado = null;
let itensVenda = [];

/* ===== PRODUTOS ===== */
async function carregarProdutos(){
  const { data, error } = await sb
    .from("produtos")
    .select("*")
    .eq("app_id", app_id)
    .eq("ativo", true)
    .order("nome");

  if(error){
    console.error("Erro ao carregar produtos:", error);
    alert("Erro ao carregar produtos");
    return;
  }

  produtos = data || [];
}

function pegarFotoProduto(p){
  let foto =
    p.imagem_url ||
    p.foto_url ||
    p.url_imagem ||
    p.imagem ||
    p.foto ||
    p.imagem1 ||
    p.foto1 ||
    p.imagem_1 ||
    p.foto_1 ||
    "";

  if(!foto && Array.isArray(p.fotos) && p.fotos.length){
    foto = p.fotos[0];
  }

  if(!foto && typeof p.fotos === "string"){
    try{
      const arr = JSON.parse(p.fotos);
      if(Array.isArray(arr) && arr.length) foto = arr[0];
    }catch(e){
      foto = p.fotos;
    }
  }

  if(!foto && Array.isArray(p.imagens) && p.imagens.length){
    foto = p.imagens[0];
  }

  if(!foto && typeof p.imagens === "string"){
    try{
      const arr = JSON.parse(p.imagens);
      if(Array.isArray(arr) && arr.length) foto = arr[0];
    }catch(e){
      foto = p.imagens;
    }
  }

  return foto || "";
}

/* ===== AUTOCOMPLETE ===== */
produtoInput.addEventListener("input", ()=>{
  const termo = produtoInput.value.toLowerCase();
  listaProdutos.innerHTML = "";
  if(!termo) return;

  const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));

  filtrados.forEach((p, index)=>{
  // 👉 MOSTRAR FOTO AUTOMÁTICA DO PRIMEIRO
if(index === 0){
  produtoSelecionado = p;

  const foto = pegarFotoProduto(p);
  const img = document.getElementById("fotoProduto");
  const semFoto = document.getElementById("semFoto");

  if(foto){
    img.src = foto;
    img.style.display = "block";
    semFoto.style.display = "none";
  }else{
    img.src = "";
    img.style.display = "none";
    semFoto.style.display = "block";
  }

  produtoInput.value = p.nome;
  precoInput.value = p.preco;
  estoqueInput.value = p.estoque;
}

     d.innerHTML = `
  ${foto ? `<img src="${foto}">` : `<div style="width:45px;height:45px;border-radius:8px;background:#1e293b"></div>`}

  <div style="flex:1">
    <strong>${p.nome}</strong><br>
    <small>Estoque: ${p.estoque} | R$ ${Number(p.preco).toFixed(2)}</small>
  </div>

  <button type="button" class="btn-add-lista">Adicionar</button>
`;

// clique no CARD → só seleciona
d.onclick = ()=>{
  produtoSelecionado = p;

  const foto = pegarFotoProduto(p);
  const img = document.getElementById("fotoProduto");
  const semFoto = document.getElementById("semFoto");

  if(foto){
    img.src = foto;
    img.style.display = "block";
    semFoto.style.display = "none";
  }else{
    img.src = "";
    img.style.display = "none";
    semFoto.style.display = "block";
  }

  produtoInput.value = p.nome;
  precoInput.value = p.preco;
  estoqueInput.value = p.estoque;
};

// clique no botão → adiciona direto
d.querySelector(".btn-add-lista").onclick = (e)=>{
  e.stopPropagation();

  produtoSelecionado = p;
  produtoInput.value = p.nome;
  precoInput.value = p.preco;
  estoqueInput.value = p.estoque;
  quantidadeInput.value = 1;

  adicionarItemVenda();
  listaProdutos.innerHTML = "";
};

listaProdutos.appendChild(d);
    });
});

/* ===== CALCULOS ===== */
quantidadeInput.addEventListener("input", calcularValores);
pagoInput.addEventListener("input", calcularValores);
formaPagamentoInput.addEventListener("change", calcularValores);

function calcularValores(){
  let totalVenda = 0;

  if(itensVenda.length){
    totalVenda = calcularTotalItensVenda();
  }else if(produtoSelecionado){
    const q = Number(quantidadeInput.value || 1);
    totalVenda = Number(produtoSelecionado.preco) * q;
  }else{
    return;
  }

  const pago = Number(pagoInput.value);
  totalVendaInput.value = totalVenda.toFixed(2);

  let desconto = 0;
  if(pago && pago < totalVenda){
    desconto = totalVenda - pago;
  }

  descontoInput.value = desconto > 0 ? `R$ ${desconto.toFixed(2)}` : "";

  if(formaPagamentoInput.value === "dinheiro" && pago){
    const troco = pago - totalVenda;
    trocoInput.value = troco >= 0 ? troco.toFixed(2) : "Valor insuficiente";
  } else {
    trocoInput.value = "";
  }
}

function adicionarItemVenda(){
  if(!produtoSelecionado){
    alert("Selecione um produto");
    return;
  }

  const q = Number(quantidadeInput.value || 1);

  if(q <= 0){
    alert("Quantidade inválida");
    return;
  }

  if(q > produtoSelecionado.estoque){
    alert("Estoque insuficiente");
    return;
  }

  const valorUnitario = Number(produtoSelecionado.preco);
  const subtotal = valorUnitario * q;

  itensVenda.push({
    id: produtoSelecionado.id,
    nome: produtoSelecionado.nome,
    qtd: q,
    valorUnitario,
    valor: subtotal,
    estoque: produtoSelecionado.estoque
  });

  renderizarItensVenda();

  produtoSelecionado = null;
  produtoInput.value = "";
  precoInput.value = "";
  estoqueInput.value = "";
  quantidadeInput.value = 1;
  totalVendaInput.value = calcularTotalItensVenda().toFixed(2);
  calcularValores();

  const img = document.getElementById("fotoProduto");
  const semFoto = document.getElementById("semFoto");
  img.src = "";
  img.style.display = "none";
  semFoto.style.display = "block";
}

function calcularTotalItensVenda(){
  return itensVenda.reduce((soma, item) => soma + Number(item.valor), 0);
}

/* ===== VENDA ===== */
async function vender(){
  if(!itensVenda.length){
    alert("Adicione pelo menos um produto na lista");
    return;
  }

  const forma = formaPagamentoInput.value;
  const totalVenda = calcularTotalItensVenda();
  const pago = Number(pagoInput.value || totalVenda);

  if(!forma){
    alert("Escolha a forma de pagamento");
    return;
  }

  let desconto = 0;
  const descontoMax = totalVenda * 0.10;

  if(pago < totalVenda){
    desconto = totalVenda - pago;
    if(desconto > descontoMax){
      alert("Desconto máximo permitido é 10%");
      return;
    }
  }

  const itensParaSalvar = [...itensVenda];

  const descricao = itensParaSalvar.map(i =>
    `${i.nome} x${i.qtd} (${forma})`
  ).join(" | ");

  await sb.from("caixa").insert({
    app_id,
    tipo: "entrada",
    descricao,
    valor: pago
  });

  for(const item of itensParaSalvar){
    await sb.from("produtos")
      .update({ estoque: item.estoque - item.qtd })
      .eq("id", item.id);
  }

  itensVenda = [];
  renderizarItensVenda();

  produtoSelecionado = null;
  produtoInput.value = "";
  precoInput.value = "";
  estoqueInput.value = "";
  quantidadeInput.value = 1;
  formaPagamentoInput.value = "";
  totalVendaInput.value = "";
  pagoInput.value = "";
  descontoInput.value = "";
  trocoInput.value = "";

  alert("Venda registrada com sucesso!");

  await carregarProdutos();
  await carregarCaixa();
}

/* ===== PDF ===== */
function gerarPDFRelatorio(vendas, totalRecebido){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 15;

  doc.setFontSize(14);
  doc.text("Relatório de Fechamento de Caixa", 14, y);
  y += 8;

  doc.setFontSize(10);
  doc.text(`Data/Hora: ${new Date().toLocaleString()}`, 14, y);
  y += 8;

  vendas.forEach((v,i)=>{
    if(y > 270){ doc.addPage(); y = 15; }
    doc.text(`${i+1}. ${v.descricao} - R$ ${Number(v.valor).toFixed(2)}`,14,y);
    y += 6;
  });

  y += 6;
  doc.setFontSize(12);
  doc.text(`TOTAL RECEBIDO: R$ ${totalRecebido.toFixed(2)}`,14,y);

  doc.save(`fechamento-caixa-${Date.now()}.pdf`);
}

/* ===== CAIXA ===== */
async function getUltimoFechamento(){
  const { data } = await sb
    .from("caixa_fechamento")
    .select("fechado_em")
    .order("id",{ascending:false})
    .limit(1);

  return data?.[0]?.fechado_em || null;
}

async function carregarCaixa(){
  const fechadoEm = await getUltimoFechamento();
  let query = sb.from("caixa").select("*").eq("app_id",app_id);

  if(fechadoEm) query = query.gt("created_at",fechadoEm);

  const { data } = await query.order("created_at");

  lista.innerHTML = "";
  let soma = 0;

  if(!data?.length){
    lista.innerHTML = `<div class="item"><span>📭 Caixa vazio</span><span>-</span></div>`;
    total.innerText = "Saldo: R$ 0.00";
    return;
  }

  data.forEach(m=>{
    soma += Number(m.valor);
    lista.innerHTML += `
      <div class="item">
        <span>${m.descricao}</span>
        <span>R$ ${Number(m.valor).toFixed(2)}</span>
      </div>
    `;
  });

  total.innerText = `Saldo: R$ ${soma.toFixed(2)}`;
}

async function fecharCaixa(){

  const senhaCorreta = "987654321"; // 🔒 TROCA AQUI PELA SUA SENHA

  const senha = prompt("Digite a senha para fechar o caixa:");

  if(!senha){
    alert("Operação cancelada");
    return;
  }

  if(senha !== senhaCorreta){
    alert("❌ Senha incorreta");
    return;
  }

  // continua o código normal
  const fechadoEm = await getUltimoFechamento();
  let query = sb.from("caixa").select("*").eq("app_id",app_id);

  if(fechadoEm) query = query.gt("created_at",fechadoEm);

  const { data } = await query.order("created_at");

  if(!data?.length){
    alert("Nada para fechar");
    return;
  }

  let totalRecebido = 0;
  data.forEach(v => totalRecebido += Number(v.valor));

  await sb.from("caixa_fechamento").insert({
    total_recebido: totalRecebido,
    total_vendas: data.length,
    fechado_em: data[data.length-1].created_at
  });

  gerarPDFRelatorio(data, totalRecebido);
  carregarCaixa();
}

function renderizarItensVenda(){
  const div = document.getElementById("listaItensVenda");
  if(!div) return;

  if(!itensVenda.length){
    div.innerHTML = `<p style="color:#64748b">Nenhum produto adicionado</p>`;
    totalVendaInput.value = "";
    return;
  }

  div.innerHTML = itensVenda.map((i, index) => `
    <div class="item-cupom">
      <span>${i.nome}</span>
      <span>${i.qtd}x</span>
      <span>R$ ${Number(i.valor).toFixed(2)}</span>
      <button type="button" onclick="removerItemVenda(${index})" style="padding:4px;margin:0;background:#ef4444;color:white">X</button>
    </div>
  `).join("");

  totalVendaInput.value = calcularTotalItensVenda().toFixed(2);
}

function removerItemVenda(index){
  itensVenda.splice(index, 1);
  renderizarItensVenda();
  calcularValores();
}

async function iniciarCaixa(){
  const ok = await verificarSessaoCaixa();
  if(!ok) return;

  await carregarProdutos();
  await carregarCaixa();
  renderizarItensVenda();
}

iniciarCaixa();
</script>

</body>
</html>
