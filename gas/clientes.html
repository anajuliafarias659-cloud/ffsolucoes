<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:18px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1e293b;
}

.topo h3{
  margin:0;
  font-size:28px;
}

.topo button{
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:28px 18px;
}

.card{
  background:linear-gradient(180deg,#111c33,#0f172a);
  border-radius:20px;
  padding:24px;
  margin-bottom:18px;
  border:1px solid #334155;
  box-shadow:0 10px 35px rgba(0,0,0,.45);
}

.card-form{
  border:1px solid #475569;
}

.card h3{
  margin-top:0;
  margin-bottom:22px;
  font-size:26px;
}

.grid-form{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

input{
  width:100%;
  padding:15px 17px;
  border-radius:14px;
  border:1px solid #334155;
  margin-bottom:0;
  background:#e8f0ff;
  color:#000;
  font-size:18px;
  outline:none;
}

input:focus{
  border-color:#38bdf8;
  box-shadow:0 0 0 3px rgba(56,189,248,.25);
}

#busca{
  margin-bottom:20px;
  background:#fff;
  color:#000;
}

.btn{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
}

.btn-salvar{
  margin-top:18px;
  background:#22c55e;
  color:#fff;
  font-size:18px;
  padding:14px 22px;
}

.btn-salvar:hover{
  background:#16a34a;
}

.btn-edit{
  background:#0ea5e9;
  color:#fff;
}

.btn-del{
  background:#ef4444;
  color:#fff;
}

.btn-wpp{
  background:#22c55e;
  color:#fff;
}

.btn-hist{
  background:#facc15;
  color:#000;
}

.grid-btn{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:16px;
}

.cliente-card{
  background:linear-gradient(180deg,#1e293b,#111827);
  border:1px solid #475569;
  border-left:6px solid #22c55e;
}

.cliente-nome{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
  color:#fff;
}

.cliente-info{
  font-size:16px;
  line-height:1.7;
  color:#e5e7eb;
}

.vazio{
  text-align:center;
  padding:30px;
  color:#94a3b8;
  font-size:18px;
}

@media(max-width:700px){
  .topo h3{
    font-size:22px;
  }

  .container{
    padding:18px 12px;
  }

  .grid-form{
    grid-template-columns:1fr;
  }

  .card{
    padding:18px;
  }

  input{
    font-size:16px;
  }

  .btn{
    width:100%;
  }

  .grid-btn{
    display:grid;
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>

<div class="topo">
  <h3>👥 Clientes</h3>
  <button onclick="history.back()">⬅ Voltar</button>
</div>

<div class="container">

  <div class="card card-form">
    <h3>Cadastrar cliente</h3>

    <div class="grid-form">
      <input id="nomeCliente" placeholder="Nome">
      <input id="telefoneCliente" placeholder="Telefone / WhatsApp">
      <input id="cpfCliente" placeholder="CPF">
      <input id="emailCliente" placeholder="E-mail">
      <input id="enderecoCliente" placeholder="Endereço">
      <input id="bairroCliente" placeholder="Bairro">
      <input id="cidadeCliente" placeholder="Cidade">
    </div>

    <button class="btn btn-salvar" onclick="salvarCliente()">Salvar cliente</button>
  </div>

  <input id="busca" placeholder="Buscar por nome ou telefone..." oninput="filtrar()">

  <div id="lista"></div>

</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let clientes = [];

function limparNumero(v){
  return String(v || "").replace(/\D/g,"");
}

async function init(){
  const { data:{ session } } = await sb.auth.getSession();

  if(!session){
    alert("Faça login");
    return;
  }

  const userId = session.user.id;

  const { data, error } = await sb
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(error || !data){
    console.error(error);
    alert("Erro ao carregar usuário.");
    return;
  }

  app_id = data.app_id;
  carregarClientes();
}

async function carregarClientes(){
  const { data, error } = await sb
    .from("pedidos")
    .select(`
      id,
      cliente_nome,
      cliente_telefone,
      cliente_email,
      cliente_cpf,
      cliente_rua,
      cliente_numero,
      cliente_bairro,
      cliente_cidade,
      total,
      valor_total,
      created_at
    `)
    .eq("app_id", app_id)
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    alert("Erro ao carregar clientes dos pedidos.");
    return;
  }

  const mapa = new Map();

  (data || []).forEach(p => {
    const telefone = limparNumero(p.cliente_telefone);

    if(!telefone) return;

    if(!mapa.has(telefone)){
      mapa.set(telefone, {
        nome: p.cliente_nome || "Sem nome",
        telefone,
        email: p.cliente_email || "",
        cpf: p.cliente_cpf || "",
        endereco: [p.cliente_rua, p.cliente_numero].filter(Boolean).join(", "),
        bairro: p.cliente_bairro || "",
        cidade: p.cliente_cidade || "",
        pedidos: 0,
        total: 0,
        ultima_compra: p.created_at
      });
    }

    const c = mapa.get(telefone);
    c.pedidos += 1;
    c.total += Number(p.total || p.valor_total || 0);
  });

  clientes = Array.from(mapa.values());
  render(clientes);
}

async function salvarCliente(){
  const nome = document.getElementById("nomeCliente").value.trim();
  const telefone = limparNumero(document.getElementById("telefoneCliente").value);
  const cpf = limparNumero(document.getElementById("cpfCliente").value);
  const email = document.getElementById("emailCliente").value.trim();
  const endereco = document.getElementById("enderecoCliente").value.trim();
  const bairro = document.getElementById("bairroCliente").value.trim();
  const cidade = document.getElementById("cidadeCliente").value.trim();

  if(!nome && !telefone){
    alert("Informe pelo menos nome ou telefone.");
    return;
  }

  const { error } = await sb.from("clientes").insert({
    app_id,
    nome,
    telefone,
    email,
    endereco,
    bairro,
    cidade
  });

  if(error){
    console.error(error);
    alert("Erro ao salvar cliente.");
    return;
  }

  ["nomeCliente","telefoneCliente","cpfCliente","emailCliente","enderecoCliente","bairroCliente","cidadeCliente"]
    .forEach(id => document.getElementById(id).value = "");

  carregarClientes();
}

function render(lista){
  if(!lista.length){
    document.getElementById("lista").innerHTML = `
      <div class="card vazio">Nenhum cliente encontrado nos pedidos.</div>
    `;
    return;
  }

  document.getElementById("lista").innerHTML = lista.map(c => `
    <div class="card cliente-card">
      <div class="cliente-nome">${c.nome || "Sem nome"}</div>

      <div class="cliente-info">
        📞 <strong>Telefone:</strong> ${c.telefone || "-"}<br>
        🆔 <strong>CPF:</strong> ${c.cpf || "-"}<br>
        ✉️ <strong>E-mail:</strong> ${c.email || "-"}<br>
        📍 <strong>Endereço:</strong> ${[c.endereco, c.bairro, c.cidade].filter(Boolean).join(" - ") || "-"}<br>
        🛒 <strong>Pedidos:</strong> ${c.pedidos}<br>
        💰 <strong>Total gasto:</strong> ${Number(c.total || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
      </div>

      <div class="grid-btn">
        <button class="btn btn-wpp" onclick="wpp('${c.telefone || ""}')">WhatsApp</button>
        <button class="btn btn-hist" onclick="alert('Pedidos: ${c.pedidos}\\nTotal gasto: ${Number(c.total || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}')">Histórico</button>
        <button class="btn btn-edit" onclick='preencherCadastro(${JSON.stringify(c)})'>Cadastrar fixo</button>
      </div>
    </div>
  `).join("");
}

function filtrar(){
  const termo = document.getElementById("busca").value.toLowerCase();

  const filtrado = clientes.filter(c =>
    (c.nome || "").toLowerCase().includes(termo) ||
    (c.telefone || "").includes(termo)
  );

  render(filtrado);
}

async function editar(id){
  const cliente = clientes.find(c => String(c.id) === String(id));
  if(!cliente) return;

  const nome = prompt("Novo nome:", cliente.nome || "");
  if(!nome) return;

  const { error } = await sb
    .from("clientes")
    .update({ nome })
    .eq("id", id)
    .eq("app_id", app_id);

  if(error){
    console.error(error);
    alert("Erro ao editar cliente.");
    return;
  }

  carregarClientes();
}

async function excluir(id){
  if(!confirm("Excluir cliente?")) return;

  const { error } = await sb
    .from("clientes")
    .delete()
    .eq("id", id)
    .eq("app_id", app_id);

  if(error){
    console.error(error);
    alert("Erro ao excluir cliente.");
    return;
  }

  carregarClientes();
}

function wpp(numero){
  if(!numero) return alert("Sem telefone");

  const num = limparNumero(numero);
  window.open(`https://wa.me/55${num}`, "_blank");
}

async function historico(telefone){
  const tel = limparNumero(telefone);

  const { data, error } = await sb
    .from("pedidos")
    .select("*")
    .eq("app_id", app_id)
    .or(`telefone.eq.${tel},cliente_telefone.eq.${tel}`);

  if(error){
    console.error(error);
    alert("Erro ao buscar histórico.");
    return;
  }

  if(!data || data.length === 0){
    alert("Cliente sem compras");
    return;
  }

  let total = 0;
  data.forEach(p => total += Number(p.total || p.valor_total || 0));

  alert(
    `Pedidos: ${data.length}\n` +
    `Total gasto: R$ ${total.toFixed(2)}`
  );
}

window.preencherCadastro = function(c){
  document.getElementById("nomeCliente").value = c.nome || "";
  document.getElementById("telefoneCliente").value = c.telefone || "";
  document.getElementById("cpfCliente").value = c.cpf || "";
  document.getElementById("emailCliente").value = c.email || "";
  document.getElementById("enderecoCliente").value = c.endereco || "";
  document.getElementById("bairroCliente").value = c.bairro || "";
  document.getElementById("cidadeCliente").value = c.cidade || "";

  window.scrollTo({ top:0, behavior:"smooth" });
};

init();
</script>

</body>
</html>
