<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clientes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#020617;color:#fff}
.topo{
  background:#0f172a;padding:16px 20px;display:flex;justify-content:space-between;
  align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid #1e293b;
}
.topo h2{margin:0}
.container{max-width:1200px;margin:auto;padding:18px}
.box{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:18px;margin-bottom:16px}
.grid-form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
input,textarea,button{
  width:100%;padding:12px;border:none;border-radius:12px;font-family:Arial;
}
input,textarea{background:#020617;color:#fff;border:1px solid #334155}
textarea{min-height:80px;resize:vertical}
button{cursor:pointer;font-weight:bold}
.btn{background:#22c55e;color:#fff}
.btn-azul{background:#0ea5e9;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-dark{background:#334155;color:#fff}
.acoes{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.acoes button{width:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:14px}
.card h3{margin:0 0 6px}
.muted{color:#94a3b8;font-size:13px}
.resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.resumo div{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;text-align:center}
.num{font-size:24px;font-weight:bold;color:#22c55e}
.modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:9999;padding:18px;overflow:auto;
}
.modal-box{
  background:#0f172a;border:1px solid #334155;border-radius:18px;
  max-width:900px;margin:20px auto;padding:18px;
}
.item-pedido{background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;margin-top:10px}
@media(max-width:800px){
  .grid-form{grid-template-columns:1fr}
  .resumo{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="topo">
  <h2>👥 Clientes</h2>
  <div class="acoes" style="margin:0">
    <button class="btn-azul" onclick="importarClientesDosPedidos()">Importar dos pedidos</button>
    <button class="btn-dark" onclick="history.back()">Voltar</button>
  </div>
</div>

<div class="container">

  <div class="resumo">
    <div>
      <div class="num" id="totalClientes">0</div>
      <div class="muted">Clientes</div>
    </div>
    <div>
      <div class="num" id="totalPedidos">0</div>
      <div class="muted">Pedidos encontrados</div>
    </div>
    <div>
      <div class="num" id="totalGeral">R$ 0,00</div>
      <div class="muted">Total vendido</div>
    </div>
  </div>

  <div class="box">
    <h3 id="tituloForm">Cadastrar cliente</h3>

    <div class="grid-form">
      <input id="nome" placeholder="Nome">
      <input id="telefone" placeholder="Telefone / WhatsApp">
      <input id="cpf" placeholder="CPF">
      <input id="email" placeholder="E-mail">
      <input id="endereco" placeholder="Endereço">
      <input id="bairro" placeholder="Bairro">
      <input id="cidade" placeholder="Cidade">
      <input id="observacao" placeholder="Observação">
    </div>

    <div class="acoes">
      <button class="btn" onclick="salvarCliente()">Salvar cliente</button>
      <button class="btn-dark" onclick="limparForm()">Limpar</button>
    </div>
  </div>

  <div class="box">
    <input id="busca" placeholder="Buscar cliente por nome, telefone, CPF ou cidade..." oninput="renderClientes()">
  </div>

  <div id="listaClientes" class="cards"></div>

</div>

<div id="modalHistorico" class="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;gap:10px;align-items:center">
      <h3 id="tituloHistorico">Histórico</h3>
      <button class="btn-red" style="width:auto" onclick="fecharHistorico()">✕</button>
    </div>
    <div id="conteudoHistorico"></div>
  </div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;
let clientes = [];
let pedidos = [];
let editandoId = null;

const $ = id => document.getElementById(id);

function limparNumero(v){
  return String(v || "").replace(/\D/g, "");
}

function dinheiro(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function campoPedido(p, nomes){
  for(const n of nomes){
    if(p[n] !== undefined && p[n] !== null && String(p[n]).trim() !== ""){
      return p[n];
    }
  }
  return "";
}

function nomePedido(p){
  return campoPedido(p, [
    "cliente_nome","nome_cliente","clienteNome","nome","cliente",
    "cliente_nome_completo"
  ]);
}

function telefonePedido(p){
  return limparNumero(campoPedido(p, [
    "cliente_telefone","telefone_cliente","clienteTelefone",
    "telefone","whatsapp","celular"
  ]));
}

function cpfPedido(p){
  return limparNumero(campoPedido(p, [
    "cliente_cpf","cpf_cliente","clienteCpf","cpf"
  ]));
}

function cidadePedido(p){
  return campoPedido(p, [
    "cliente_cidade","cidade_cliente","clienteCidade","cidade"
  ]);
}

function bairroPedido(p){
  return campoPedido(p, [
    "cliente_bairro","bairro_cliente","clienteBairro","bairro"
  ]);
}

function enderecoPedido(p){
  const rua = campoPedido(p, ["cliente_rua","rua_cliente","clienteRua","rua","endereco"]);
  const numero = campoPedido(p, ["cliente_numero","numero_cliente","clienteNumero","numero"]);
  return [rua, numero].filter(Boolean).join(", ");
}

function totalPedido(p){
  return Number(campoPedido(p, ["total","valor_total","total_pedido","valor"]) || 0);
}

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  const { data: usuario, error } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  if(error || !usuario){
    alert("Erro ao carregar usuário.");
    return null;
  }

  app_id = usuario.app_id;
  return app_id;
}

async function carregarTudo(){
  if(!app_id) return;

  const { data: cli, error: erroCli } = await supabase
    .from("clientes")
    .select("*")
    .eq("app_id", app_id)
    .order("created_at", { ascending:false });

  if(erroCli){
    alert("Erro ao carregar clientes. Confira se a tabela clientes existe.");
    console.error(erroCli);
    return;
  }

  clientes = cli || [];

  const { data: ped } = await supabase
    .from("pedidos")
    .select("*")
    .eq("app_id", app_id);

  pedidos = ped || [];

  atualizarResumo();
  renderClientes();
}

function atualizarResumo(){
  $("totalClientes").innerText = clientes.length;
  $("totalPedidos").innerText = pedidos.length;

  const total = pedidos.reduce((s,p)=> s + totalPedido(p), 0);
  $("totalGeral").innerText = dinheiro(total);
}

function pedidosDoCliente(cliente){
  const tel = limparNumero(cliente.telefone);
  const cpf = limparNumero(cliente.cpf);

  return pedidos.filter(p => {
    const telP = telefonePedido(p);
    const cpfP = cpfPedido(p);

    if(tel && telP && tel === telP) return true;
    if(cpf && cpfP && cpf === cpfP) return true;

    return false;
  });
}

window.renderClientes = function(){
  const termo = String($("busca").value || "").toLowerCase();

  const filtrados = clientes.filter(c => {
    const texto = [
      c.nome,c.telefone,c.cpf,c.email,c.endereco,c.bairro,c.cidade
    ].join(" ").toLowerCase();

    return texto.includes(termo);
  });

  $("listaClientes").innerHTML = filtrados.map(c => {
    const hist = pedidosDoCliente(c);
    const total = hist.reduce((s,p)=> s + totalPedido(p), 0);

    return `
      <div class="card">
        <h3>${c.nome || "Sem nome"}</h3>
        <div class="muted">📞 ${c.telefone || "-"}</div>
        <div class="muted">🆔 ${c.cpf || "-"}</div>
        <div class="muted">📍 ${[c.bairro,c.cidade].filter(Boolean).join(" - ") || "-"}</div>
        <hr style="border-color:#334155">
        <div><b>Pedidos:</b> ${hist.length}</div>
        <div><b>Total gasto:</b> ${dinheiro(total)}</div>

        <div class="acoes">
          <button class="btn-azul" onclick="abrirHistorico('${c.id}')">Histórico</button>
          <button class="btn" onclick="whatsapp('${c.telefone || ""}')">WhatsApp</button>
          <button class="btn-dark" onclick="editarCliente('${c.id}')">Editar</button>
          <button class="btn-red" onclick="excluirCliente('${c.id}')">Excluir</button>
        </div>
      </div>
    `;
  }).join("") || `<div class="muted">Nenhum cliente encontrado.</div>`;
};

window.salvarCliente = async function(){
  if(!app_id) return;

  const payload = {
    app_id,
    nome: $("nome").value.trim(),
    telefone: limparNumero($("telefone").value),
    cpf: limparNumero($("cpf").value),
    email: $("email").value.trim(),
    endereco: $("endereco").value.trim(),
    bairro: $("bairro").value.trim(),
    cidade: $("cidade").value.trim(),
    observacao: $("observacao").value.trim()
  };

  if(!payload.nome && !payload.telefone){
    alert("Informe pelo menos nome ou telefone.");
    return;
  }

  let error;

  if(editandoId){
    ({ error } = await supabase
      .from("clientes")
      .update(payload)
      .eq("id", editandoId)
      .eq("app_id", app_id));
  }else{
    ({ error } = await supabase
      .from("clientes")
      .insert(payload));
  }

  if(error){
    console.error(error);
    alert("Erro ao salvar cliente.");
    return;
  }

  limparForm();
  await carregarTudo();
};

window.editarCliente = function(id){
  const c = clientes.find(x => String(x.id) === String(id));
  if(!c) return;

  editandoId = c.id;
  $("tituloForm").innerText = "Editando cliente";

  $("nome").value = c.nome || "";
  $("telefone").value = c.telefone || "";
  $("cpf").value = c.cpf || "";
  $("email").value = c.email || "";
  $("endereco").value = c.endereco || "";
  $("bairro").value = c.bairro || "";
  $("cidade").value = c.cidade || "";
  $("observacao").value = c.observacao || "";

  window.scrollTo({ top:0, behavior:"smooth" });
};

window.limparForm = function(){
  editandoId = null;
  $("tituloForm").innerText = "Cadastrar cliente";

  ["nome","telefone","cpf","email","endereco","bairro","cidade","observacao"]
    .forEach(id => $(id).value = "");
};

window.excluirCliente = async function(id){
  if(!confirm("Excluir cliente? O histórico dos pedidos não será apagado.")) return;

  const { error } = await supabase
    .from("clientes")
    .delete()
    .eq("id", id)
    .eq("app_id", app_id);

  if(error){
    console.error(error);
    alert("Erro ao excluir cliente.");
    return;
  }

  await carregarTudo();
};

window.whatsapp = function(tel){
  const n = limparNumero(tel);
  if(!n){
    alert("Cliente sem telefone.");
    return;
  }

  const numero = n.startsWith("55") ? n : "55" + n;
  window.open("https://wa.me/" + numero, "_blank");
};

window.abrirHistorico = function(id){
  const c = clientes.find(x => String(x.id) === String(id));
  if(!c) return;

  const hist = pedidosDoCliente(c);
  const total = hist.reduce((s,p)=> s + totalPedido(p), 0);

  $("tituloHistorico").innerText = `Histórico - ${c.nome || c.telefone || "Cliente"}`;

  $("conteudoHistorico").innerHTML = `
    <div class="box">
      <b>Total de pedidos:</b> ${hist.length}<br>
      <b>Total gasto:</b> ${dinheiro(total)}
    </div>

    ${
      hist.length
      ? hist.map(p => `
        <div class="item-pedido">
          <b>Pedido:</b> ${p.codigo || p.id || "-"}<br>
          <b>Status:</b> ${p.status || "-"}<br>
          <b>Pagamento:</b> ${p.pagamento_status || "-"}<br>
          <b>Total:</b> ${dinheiro(totalPedido(p))}<br>
          <b>Data:</b> ${p.created_at ? new Date(p.created_at).toLocaleString("pt-BR") : "-"}
        </div>
      `).join("")
      : `<div class="muted">Nenhum pedido encontrado para este cliente.</div>`
    }
  `;

  $("modalHistorico").style.display = "block";
};

window.fecharHistorico = function(){
  $("modalHistorico").style.display = "none";
};

window.importarClientesDosPedidos = async function(){
  if(!app_id) return;

  const mapa = new Map();

  for(const p of pedidos){
    const tel = telefonePedido(p);
    const cpf = cpfPedido(p);
    const nome = nomePedido(p);

    const chave = tel || cpf;
    if(!chave) continue;

    if(!mapa.has(chave)){
      mapa.set(chave, {
        app_id,
        nome: nome || "Cliente",
        telefone: tel,
        cpf,
        endereco: enderecoPedido(p),
        bairro: bairroPedido(p),
        cidade: cidadePedido(p)
      });
    }
  }

  const novos = [...mapa.values()].filter(c => {
    return !clientes.some(x =>
      (c.telefone && limparNumero(x.telefone) === c.telefone) ||
      (c.cpf && limparNumero(x.cpf) === c.cpf)
    );
  });

  if(!novos.length){
    alert("Nenhum cliente novo encontrado nos pedidos.");
    return;
  }

  const { error } = await supabase
    .from("clientes")
    .insert(novos);

  if(error){
    console.error(error);
    alert("Erro ao importar clientes.");
    return;
  }

  alert(`Importados ${novos.length} cliente(s).`);
  await carregarTudo();
};

(async function init(){
  await verificarSessao();
  await carregarTudo();
})();
</script>

</body>
</html>
