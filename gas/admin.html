<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* TOPO */
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:#0f172a;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* BOAS VINDAS */
.boasvindas{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  gap:16px;
  margin-bottom:20px;
}

@media(max-width:900px){
  .boasvindas{
    grid-template-columns:1fr;
  }
}

.hero-card,
.status-card{
  background:#0f172a;
  border-radius:16px;
  padding:20px;
}

/* GRID PRINCIPAL */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* CARDS */
.card{
  background:#0f172a;
  border-radius:16px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
  background:#1e293b;
}

.titulo{
  font-weight:bold;
  margin-top:10px;
}

.sub{
  font-size:12px;
  color:#94a3b8;
}

/* STATUS */
.status-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.status-mini{
  background:#020617;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

.status-mini .num{
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topo">
  <h2>Painel Administrativo</h2>
</div>

<div class="container">

  <!-- BOAS VINDAS -->
  <div class="boasvindas">

    <div class="hero-card">
      <h3>Bem-vindo</h3>
      <p>Gerencie sua loja e pedidos aqui.</p>
    </div>

    <div class="status-card">
      <h3>Resumo rápido</h3>

      <div class="status-grid">
        <div class="status-mini">
          <div class="num">1</div>
          <div>Pedidos</div>
        </div>

        <div class="status-mini">
          <div class="num">Aberta</div>
          <div>Status</div>
        </div>
      </div>
    </div>

  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="card">
      📦
      <div class="titulo">Produtos</div>
      <div class="sub">Cadastrar produtos</div>
    </div>

    <div class="card">
      📁
      <div class="titulo">Categorias</div>
      <div class="sub">Organizar loja</div>
    </div>

    <div class="card">
      📄
      <div class="titulo">Pedidos</div>
      <div class="sub">Pedidos online</div>
    </div>

    <div class="card">
      🚚
      <div class="titulo">Entregas</div>
      <div class="sub">Rotas</div>
    </div>

    <div class="card">
      👥
      <div class="titulo">Clientes</div>
      <div class="sub">Histórico</div>
    </div>

    <div class="card">
      💰
      <div class="titulo">Caixa</div>
      <div class="sub">Relatórios</div>
    </div>

    <div class="card">
      ⚙️
      <div class="titulo">Configurar</div>
      <div class="sub">Ajustes</div>
    </div>

    <div class="card">
      🛡️
      <div class="titulo">Admins</div>
      <div class="sub">Permissões</div>
    </div>

  </div>

</div>

</body>
</html>
