<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Usuários do Sistema</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="../js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}
.topo{
  background:#0f172a;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.topo button{
  width:auto;
  padding:9px 14px;
}
.container{
  max-width:900px;
  margin:auto;
  padding:24px;
}
.box{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.usuario{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  border-bottom:1px solid #1e293b;
  padding:12px 0;
}
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  margin-top:5px;
}
.caixa_gas{background:#facc15;color:#000}
.produtos{background:#2563eb;color:#fff}
.caixa_produtos{background:#22c55e;color:#000}
.qr{
  background:#020617;
  padding:8px;
  border-radius:10px;
}
.btn-excluir{
  background:#1e293b;
  color:#94a3b8;
  border:1px solid #334155;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}
.link-acesso{
  font-size:12px;
  color:#93c5fd;
  word-break:break-all;
  display:block;
  margin-top:6px;
}
@media(max-width:700px){
  .usuario{
    flex-direction:column;
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<div class="topo">
  <h3>⚙️ Usuários</h3>
  <button onclick="location.href='admin.html'">Voltar</button>
</div>

<div class="container">

  <div class="box">
    <h4>Criar Usuário</h4>

    <input id="nome" placeholder="Nome do usuário">

    <select id="tipo">
      <option value="caixa_gas">Caixa Gás</option>
      <option value="produtos">Cadastro de Produtos</option>
      <option value="caixa_produtos">Caixa + Produtos</option>
    </select>

    <input id="pin" placeholder="PIN (ex: 1234)" maxlength="6">

    <button onclick="criarFuncionario()">Criar Usuário</button>
  </div>

  <div class="box">
    <h4>Usuários cadastrados</h4>
    <div id="lista"></div>
  </div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

const CODIGO_ENCERRAMENTO = "9999";

const LINKS = {
  caixa_gas: "/gas/caixa.html",
  produtos: "/gas.html",
  caixa_produtos: "/gas/caixa.html"
};

const NOMES = {
  caixa_gas: "CAIXA GÁS",
  produtos: "PRODUTOS",
  caixa_produtos: "CAIXA + PRODUTOS"
};

function esperarAuth() {
  if (window.APP_ID) {
    carregarFuncionarios();
  } else {
    setTimeout(esperarAuth, 100);
  }
}

async function criarFuncionario(){

  if (!window.APP_ID) {
    alert("Sessão ainda carregando...");
    return;
  }

  const nome = document.getElementById("nome").value.trim();
  const tipo = document.getElementById("tipo").value;
  const pin  = document.getElementById("pin").value.trim();

  if(!nome || !pin){
    alert("Informe nome e PIN");
    return;
  }

  const { error } = await supabase.from("funcionarios").insert({
    nome,
    tipo,
    pin,
    app_id: window.APP_ID,
    ativo: true
  });

  if(error){
    console.error(error);
    alert("Erro ao criar usuário.");
    return;
  }

  document.getElementById("nome").value = "";
  document.getElementById("pin").value = "";

  carregarFuncionarios();
}

async function carregarFuncionarios(){

  if (!window.APP_ID) return;

  const { data, error } = await supabase
    .from("funcionarios")
    .select("id,nome,tipo")
    .eq("app_id", window.APP_ID)
    .eq("ativo", true)
    .order("nome");

  if(error){
    console.error(error);
    alert("Erro ao carregar usuários.");
    return;
  }

  const div = document.getElementById("lista");
  div.innerHTML = "";

  (data || []).forEach(u=>{

    const box = document.createElement("div");
    box.className = "usuario";

    const destino = LINKS[u.tipo] || "/produtos.html";

    const link =
      location.origin +
      destino +
      "?app_id=" +
      encodeURIComponent(window.APP_ID) +
      "&funcionario_id=" +
      encodeURIComponent(u.id);

    box.innerHTML = `
      <div>
        <strong>${u.nome}</strong><br>
        <span class="badge ${u.tipo}">${NOMES[u.tipo] || u.tipo}</span>
        <a class="link-acesso" href="${link}" target="_blank">Abrir acesso</a>
      </div>

      <div class="qr">
        <canvas id="qr-${u.id}" width="110"></canvas>
      </div>

      <div>
        <button class="btn-excluir">Excluir</button>
      </div>
    `;

    div.appendChild(box);

    QRCode.toCanvas(
      document.getElementById("qr-" + u.id),
      link,
      { width:110 }
    );

    box.querySelector(".btn-excluir").onclick = async () => {

      const codigo = prompt("🔐 Código de encerramento:");

      if(codigo !== CODIGO_ENCERRAMENTO){
        alert("Código inválido");
        return;
      }

      if(!confirm(`Excluir ${u.nome}?`)) return;

      await supabase.from("funcionarios")
        .update({ ativo:false })
        .eq("id", u.id);

      carregarFuncionarios();
    };
  });
}

esperarAuth();

window.criarFuncionario = criarFuncionario;
</script>

</body>
</html>
