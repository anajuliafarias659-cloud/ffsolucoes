<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Usuários do Gás</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="../js/auth.js"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;display:flex;justify-content:space-between;align-items:center}
.topo button{width:auto;padding:9px 14px}
.container{max-width:900px;margin:auto;padding:24px}
.box{background:#0f172a;padding:20px;border-radius:14px;margin-bottom:20px}
input,select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;box-sizing:border-box}
button{background:#22c55e;font-weight:bold;cursor:pointer;color:#fff}
.usuario{display:flex;justify-content:space-between;align-items:center;gap:16px;border-bottom:1px solid #1e293b;padding:12px 0}
.badge{display:inline-block;padding:4px 8px;border-radius:8px;font-size:12px;margin-top:5px}
.caixa_gas{background:#facc15;color:#000}
.produtos_gas{background:#2563eb;color:#fff}
.admin_gas{background:#22c55e;color:#000}
.btn-excluir{background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px}
.info{font-size:13px;color:#94a3b8;margin-top:8px;line-height:1.4}
</style>
</head>

<body>

<div class="topo">
  <h3>⚙️ Usuários do Gás</h3>
  <button onclick="location.href='admin.html'">Voltar</button>
</div>

<div class="container">

  <div class="box">
    <h4>Criar funcionário por e-mail</h4>

    <input id="nome" placeholder="Nome do funcionário">
    <input id="email" type="email" placeholder="E-mail do funcionário">
    <input id="senha" type="password" placeholder="Senha inicial">

    <select id="tipo">
      <option value="caixa_gas">Caixa Gás</option>
      <option value="produtos_gas">Cadastro de Produtos</option>
      <option value="admin_gas">Admin Gás - Caixa e Produtos</option>
    </select>

    <button onclick="criarFuncionario()">Criar acesso</button>

    <div class="info">
      O funcionário entra pela tela principal:<br>
      <b>https://www.ffsolucoes.com.br/auth/login.html</b>
    </div>
  </div>

  <div class="box">
    <h4>Funcionários cadastrados</h4>
    <div id="lista"></div>
  </div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

const CODIGO_ENCERRAMENTO = "9999";

const NOMES = {
  caixa_gas: "CAIXA GÁS",
  produtos_gas: "PRODUTOS GÁS",
  admin_gas: "ADMIN GÁS"
};

function esperarAuth() {
  if (window.APP_ID) {
    carregarFuncionarios();
  } else {
    setTimeout(esperarAuth, 100);
  }
}

async function criarFuncionario(){

  if (!window.APP_ID) {
    alert("Sessão ainda carregando...");
    return;
  }

  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value.trim();
  const tipo = document.getElementById("tipo").value;

  if(!nome || !email || !senha){
    alert("Informe nome, e-mail e senha.");
    return;
  }

  if(senha.length < 6){
    alert("A senha precisa ter pelo menos 6 caracteres.");
    return;
  }

  const { data, error } = await supabase.functions.invoke("criar-funcionario-auth", {
    body: {
      nome,
      email,
      senha,
      tipo,
      sistema: "gas",
      app_id: window.APP_ID
    }
  });

  if(error || data?.erro){
    console.error(error || data);
    alert(data?.mensagem || "Erro ao criar funcionário.");
    return;
  }

  alert("Funcionário criado. Ele já pode entrar pelo login principal.");

  document.getElementById("nome").value = "";
  document.getElementById("email").value = "";
  document.getElementById("senha").value = "";

  carregarFuncionarios();
}

async function carregarFuncionarios(){

  const { data, error } = await supabase
    .from("usuarios")
    .select("id,nome,email,tipo,sistema,ativo")
    .eq("app_id", window.APP_ID)
    .eq("sistema", "gas")
    .in("tipo", ["caixa_gas", "produtos_gas", "admin_gas"])
    .order("nome");

  if(error){
    console.error(error);
    alert("Erro ao carregar funcionários.");
    return;
  }

  const div = document.getElementById("lista");
  div.innerHTML = "";

  (data || []).forEach(u=>{

    const box = document.createElement("div");
    box.className = "usuario";

    box.innerHTML = `
      <div>
        <strong>${u.nome || "Sem nome"}</strong><br>
        <small>${u.email || ""}</small><br>
        <span class="badge ${u.tipo}">${NOMES[u.tipo] || u.tipo}</span>
      </div>

      <div>
        <button class="btn-excluir">${u.ativo === false ? "Ativar" : "Bloquear"}</button>
      </div>
    `;

    div.appendChild(box);

    box.querySelector(".btn-excluir").onclick = async () => {

      const codigo = prompt("🔐 Código de encerramento:");

      if(codigo !== CODIGO_ENCERRAMENTO){
        alert("Código inválido");
        return;
      }

      const novoStatus = u.ativo === false ? true : false;

      await supabase
        .from("usuarios")
        .update({ ativo: novoStatus })
        .eq("id", u.id);

      carregarFuncionarios();
    };
  });
}

esperarAuth();

window.criarFuncionario = criarFuncionario;
</script>

</body>
</html>
