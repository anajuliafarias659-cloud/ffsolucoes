<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa da Rede</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#0b1020;
color:white;

}

header{

height:70px;

display:flex;

align-items:center;

padding:0 25px;

background:#141b2d;

border-bottom:1px solid #28344d;

font-size:24px;

font-weight:bold;

}

#mapa{

padding:40px;

display:flex;

gap:40px;

flex-wrap:wrap;

align-items:flex-start;

}

.gateway{

width:280px;

background:#141b2d;

border:1px solid #2c3d60;

border-radius:15px;

padding:20px;

transition:.25s;

}

.gateway:hover{

transform:translateY(-5px);

border-color:#00b96b;

}

.nome{

font-size:20px;

font-weight:bold;

margin-bottom:15px;

}

.item{

margin:8px 0;

color:#c7d1df;

}

.online{

color:#2ecc71;

}

.offline{

color:#ff5252;

}

</style>

</head>

<body>

<header>

🌐 FF Infra - Mapa da Rede

</header>

<div id="mapa">

Carregando...

</div>

<script>

const SUPABASE_URL="https://pdajixsoowcyhnjwhgpc.supabase.co";

const SUPABASE_KEY="sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabase=window.supabase.createClient(

SUPABASE_URL,

SUPABASE_KEY

);

async function carregar(){

const mapa=document.getElementById("mapa");

mapa.innerHTML="";

const {data,error}=await supabase

.from("monitor_gateways")

.select("*")

.order("nome");

if(error){

mapa.innerHTML=error.message;

return;

}

data.forEach(g=>{

const div=document.createElement("div");

div.className="gateway";

div.innerHTML=`

<div class="nome">

🛰 ${g.nome}

</div>

<div class="item">

VPN

<br>

${g.ip_vpn||"-"}

</div>

<div class="item">

CPU

<br>

${g.cpu_load||0} %

</div>

<div class="item">

RAM

<br>

${Math.round((g.memoria_livre||0)/1024/1024)} MB Livre

</div>

<div class="item">

Status

<br>

<span class="${g.status}">

${g.status}

</span>

</div>

`;

mapa.appendChild(div);

});

}

carregar();

setInterval(carregar,5000);

</script>

</body>

</html>
