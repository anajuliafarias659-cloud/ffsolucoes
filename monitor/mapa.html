<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Infra - Mapa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:#fff;
}

header{
height:70px;
background:#151c2f;
display:flex;
align-items:center;
padding:0 25px;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #2d3f5d;
}

#mapa{
padding:25px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.gateway{

width:320px;
background:#151c2f;
border-radius:12px;
padding:18px;
border:1px solid #30415d;

}

.gateway h2{

margin-bottom:15px;
font-size:22px;

}

.info{

margin:6px 0;
font-size:14px;

}

.equipamento{

margin-top:10px;
padding:10px;
background:#0e1628;
border-left:4px solid #00c26f;
border-radius:8px;

}

.online{

color:#00d26a;

}

.offline{

color:#ff5757;

}

</style>

</head>

<body>

<header>

🌐 FF Infra - Mapa da Rede

</header>

<div id="mapa">

Carregando...

</div>

<script>

const db = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

function icone(tipo){

switch(tipo){

case "Servidor":
return "🖥️";

case "Switch":
return "🔀";

case "ONU":
return "📦";

case "Rádio PTP":
return "📡";

case "Rádio Setorial":
return "📶";

case "Câmera":
return "📷";

case "Nobreak":
return "🔋";

default:
return "⚙️";

}

}

async function carregar(){

const mapa=document.getElementById("mapa");

mapa.innerHTML="Carregando...";

const gw=await db
.from("monitor_gateways")
.select("*")
.order("nome");

if(gw.error){

mapa.innerHTML=gw.error.message;

console.log(gw.error);

return;

}

const eq=await db
.from("monitor_equipamentos")
.select("*")
.order("nome");

if(eq.error){

mapa.innerHTML=eq.error.message;

console.log(eq.error);

return;

}

mapa.innerHTML="";

gw.data.forEach(g=>{

const card=document.createElement("div");

card.className="gateway";

let html=`

<h2>🛰 ${g.nome}</h2>

<div class="info">

<b>VPN:</b> ${g.ip_vpn || "-"}

</div>

<div class="info">

<b>CPU:</b> ${g.cpu_load || 0}%

</div>

<div class="info">

<b>Status:</b>

<span class="${g.status}">

${g.status || "-"}

</span>

</div>

<hr style="margin:15px 0;border-color:#2d3f5d;">

`;

const filhos=eq.data.filter(x=>x.gateway_id==g.id);

if(filhos.length==0){

html+="Nenhum equipamento";

}else{

filhos.forEach(e=>{

html+=`

<div class="equipamento">

<div>

${icone(e.tipo)}
<b>${e.nome}</b>

</div>

<div>

${e.ip || "-"}

</div>

<div class="${e.status}">

${e.status || ""}

</div>

</div>

`;

});

}

card.innerHTML=html;

mapa.appendChild(card);

});

}

carregar();

setInterval(carregar,5000);

</script>

</body>
</html>
