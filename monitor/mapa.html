
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Infra Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#08111f;
color:white;

}

header{

height:70px;
background:#101b2d;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
border-bottom:1px solid #1d2a3e;

}

.logo{

font-size:24px;
font-weight:bold;

}

.statusSistema{

display:flex;
gap:15px;
align-items:center;

}

.online{

width:12px;
height:12px;
border-radius:50%;
background:#00d26a;
box-shadow:0 0 10px #00d26a;

}

.container{

width:95%;
max-width:1800px;
margin:auto;
padding:25px;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;

}

.card{

background:#111d31;
border-radius:15px;
padding:25px;
border:1px solid #1d2b42;
transition:.25s;

}

.card:hover{

transform:translateY(-5px);
border-color:#00c97b;

}


.cardTitulo{

font-size:15px;
color:#9ea8ba;

}

.cardValor{

font-size:42px;
font-weight:bold;
margin-top:10px;

}

.verde{

color:#00d26a;

}

.vermelho{

color:#ff5252;

}

.azul{

color:#2da8ff;

}

.laranja{

color:#ff9800;

}

.roxo{

color:#8b5cf6;

}

.grafico{

background:#111d31;
border-radius:15px;
padding:20px;
border:1px solid #1d2b42;
margin-bottom:25px;

}

canvas{

height:350px !important;

}
.tabela{

background:#111d31;
border:1px solid #1d2b42;
border-radius:15px;
overflow:hidden;
margin-bottom:25px;

}

.tituloTabela{

padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1d2b42;

}

table{

width:100%;
border-collapse:collapse;

}

thead{

background:#16243b;

}

th{

padding:15px;
text-align:left;
font-size:14px;
color:#9ea8ba;

}

td{

padding:16px;
border-top:1px solid #1b2a42;

}

tbody tr{

transition:.2s;

}

tbody tr:hover{

background:#172741;

}

.badge{

padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;

}

.up{

background:#0f5132;
color:#00ff8a;

}

.down{

background:#4a1a1a;
color:#ff6464;

}

.btn{

background:#00b96b;
color:white;
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;

}

.btn:hover{

background:#00d67b;

}

.alertasGrid{

display:grid;
grid-template-columns:380px 1fr;
gap:20px;
margin-bottom:25px;

}

.alertas{

background:#111d31;
border:1px solid #1d2b42;
border-radius:15px;

}

.alertas h2{

padding:20px;
border-bottom:1px solid #1d2b42;
font-size:20px;

}

.alerta{

padding:15px 20px;
border-bottom:1px solid #1d2b42;

}

.alerta:last-child{

border:none;

}

.alertaTitulo{

font-weight:bold;
margin-bottom:5px;

}

.alertaHora{

color:#8c97aa;
font-size:13px;

}

.offlineBox{

background:#111d31;
border:1px solid #1d2b42;
border-radius:15px;

}

.offlineBox h2{

padding:20px;
border-bottom:1px solid #1d2b42;

}

.offlineItem{

display:flex;
justify-content:space-between;
padding:16px 20px;
border-bottom:1px solid #1d2b42;

}

.offlineItem:last-child{

border:none;

}

.statusOff{

color:#ff5a5a;
font-weight:bold;

}

@media(max-width:1100px){

.alertasGrid{

grid-template-columns:1fr;

}

}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>

<div class="logo">

🖥 FF INFRA

</div>

<div class="statusSistema">

<div class="online"></div>

<div>

Sistema Online

</div>

<div id="hora">

--

</div>

</div>

</header>

<div class="container">

<div class="cards">

<div class="card">

<div class="cardTitulo">

🟢 Equipamentos Online

</div>

<div class="cardValor verde" id="online">

0

</div>

</div>

<div class="card">

<div class="cardTitulo">

🔴 Equipamentos Offline

</div>

<div class="cardValor vermelho" id="offline">

0

</div>

</div>

<div class="card">

<div class="cardTitulo">

👥 Clientes PPPoE

</div>

<div class="cardValor azul" id="clientes">

0

</div>

</div>

<div class="card">

<div class="cardTitulo">

🌐 Gateways

</div>

<div class="cardValor">

0

</div>

</div>

<div class="card">

<div class="cardTitulo">

⬇ Download

</div>

<div class="cardValor verde" id="download">
    0 Mbps
</div>

</div>

<div class="card">

<div class="cardTitulo">

⬆ Upload

</div>

<div class="cardValor azul" id="upload">
    0 Mbps
</div>

</div>

<div class="card">

<div class="cardTitulo">

CPU Média

</div>

<div class="cardValor laranja">

0%

</div>

</div>

<div class="card">

<div class="cardTitulo">

RAM Média

</div>

<div class="cardValor roxo">

0%

</div>

</div>

</div>

<div class="grafico">

<h2 style="margin-bottom:20px;">

📈 Tráfego Geral

</h2>

<canvas id="trafego"></canvas>

</div>
<div class="tabela">

<div class="tituloTabela">
🌐 Gateways
</div>

<table>

<thead>

<tr>

<th>Gateway</th>
<th>Status</th>
<th>Clientes</th>
<th>Download</th>
<th>Upload</th>
<th>CPU</th>
<th>RAM</th>
<th>Ping</th>
<th>Temperatura</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="listaGateways">

</tbody>

</table>

</div>

<div class="alertasGrid">

    ...

</div>

<script>

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const db = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

console.log("URL:", SUPABASE_URL);
console.log("KEY:", SUPABASE_KEY.substring(0,25));

let equipamentos = [];
let gateways = [];
let pppoe = [];
let alertas = [];
let trafego = [];

setInterval(()=>{

document.getElementById("hora").innerHTML =
new Date().toLocaleTimeString("pt-BR");

},1000);

new Chart(document.getElementById("trafego"),{

    type:"line",

    data:{

        labels:["00h","04h","08h","12h","16h","20h","24h"],

        datasets:[

            {

                label:"Download",

                data:[120,220,310,500,460,600,720]

            },

            {

                label:"Upload",

                data:[80,150,210,280,260,330,400]

            }

        ]

    },

    options:{

        responsive:true,

        maintainAspectRatio:false

    }

});



async function carregarDashboard(){

    console.log("Carregando Dashboard...");

    // Equipamentos
    const { data: equipamentosData } = await db
        .from("monitor_equipamentos")
        .select("*");

    equipamentos = equipamentosData || [];

    // PPPoE
    const { data: pppoeData } = await db
        .from("monitor_pppoe")
        .select("id");

    pppoe = pppoeData || [];

    // Gateways
const { data: gatewaysData, error: erroGateways } = await db
    .from("monitor_gateways")
    .select("*");

if(erroGateways){

    console.error(erroGateways);

    return;

}

gateways = gatewaysData || [];
console.log(gateways);

// Carrega as interfaces marcadas para monitoramento
const resposta = await fetch(
    `${SUPABASE_URL}/rest/v1/monitor_interfaces?select=*`,
    {
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
        }
    }
);

const interfacesMonitoradas = await resposta.json();

console.log("FETCH INTERFACES:", interfacesMonitoradas);

if (!Array.isArray(interfacesMonitoradas)) {

    console.error(interfacesMonitoradas);

    return;

}

// Se não houver nenhuma marcada
if (!interfacesMonitoradas || interfacesMonitoradas.length === 0) {

    trafego = [];
    atualizarDashboard();
    return;

}

// Lista dos nomes das interfaces
const nomesInterfaces = interfacesMonitoradas.map(i => i.nome);
console.log("Nomes:", nomesInterfaces);
console.log("Interfaces selecionadas:", nomesInterfaces);
// Busca somente o tráfego das interfaces marcadas
const { data: trafegoData, error: erroTrafego } = await db
    .from("monitor_trafego")
    .select("*")
    .in("interface", nomesInterfaces);
console.log("Erro tráfego:", erroTrafego);
console.log("Dados tráfego:", trafegoData);

if (erroTrafego) {

    console.error(erroTrafego);

    return;

}

trafego = trafegoData || [];
alert("Quantidade: " + trafego.length);

alert(JSON.stringify(trafego[0]));

console.log("Tráfego encontrado:", trafego);
atualizarDashboard();

}

function calcularStatus(eq){

    const ping = Number(eq.ping || 0);
    const perda = Number(eq.perda || 0);
    const latencia = Number(eq.latencia || 0);

    if(ping <= 0)
        return "offline";

    if(perda >= 50)
        return "offline";

    if(latencia > 100)
        return "offline";

    if(latencia > 50 || perda > 10)
        return "warning";

    return "online";

}

function atualizarDashboard(){

    let online = 0;
    let offline = 0;

    equipamentos.forEach(eq=>{

        const status = calcularStatus(eq);

        if(status=="online")
            online++;
        else
            offline++;

    });

    document.getElementById("online").innerHTML = online;

    document.getElementById("offline").innerHTML = offline;

    document.getElementById("clientes").innerHTML = pppoe.length;

   document.querySelector(".cards .card:nth-child(4) .cardValor").innerHTML = gateways.length;
let download = 0;
let upload = 0;

trafego.forEach(t => {

    download += Number(t.download_mbps || 0);
    upload += Number(t.upload_mbps || 0);

});

document.getElementById("download").innerHTML =
    download.toFixed(2) + " Mbps";

document.getElementById("upload").innerHTML =
    upload.toFixed(2) + " Mbps";
    
desenharGateways();

}

function desenharGateways(){

    const tabela = document.getElementById("listaGateways");

    tabela.innerHTML = "";

    gateways.forEach(g=>{

    const trafegoGateway = trafego.filter(
    t => t.gateway_id === g.id
);

const download = trafegoGateway.reduce(
    (soma,t)=>soma+Number(t.download_mbps||0),
    0
);

const upload = trafegoGateway.reduce(
    (soma,t)=>soma+Number(t.upload_mbps||0),
    0
);

        tabela.innerHTML += `
        <tr>

            <td>${g.nome || g.gateway || "-"}</td>

            <td>
                <span class="badge ${g.status=="online" ? "up":"down"}">
                    ${(g.status || "offline").toUpperCase()}
                </span>
            </td>

            <td>${g.clientes ?? 0}</td>

            <td>${download.toFixed(2)} Mbps</td>

<td>${upload.toFixed(2)} Mbps</td>

            <td>${g.cpu ?? 0}%</td>

            <td>${g.ram ?? 0}%</td>

            <td>${g.ping ?? "-"} ms</td>

            <td>${g.temperatura ?? "-"}°C</td>

            <td>
                <button class="btn">Abrir</button>
            </td>

        </tr>
        `;

    });

}
window.onload = async () => {

    await carregarDashboard();

    setInterval(carregarDashboard,5000);

};

</script>

</body>
</html>
