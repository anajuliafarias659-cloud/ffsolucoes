<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa da Rede</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#0b1020;
color:white;

}

header{

height:70px;

display:flex;

align-items:center;

padding:0 25px;

background:#141b2d;

border-bottom:1px solid #28344d;

font-size:24px;

font-weight:bold;

}

#mapa{

padding:40px;

display:flex;

gap:40px;

flex-wrap:wrap;

align-items:flex-start;

}

.gateway{

width:280px;

background:#141b2d;

border:1px solid #2c3d60;

border-radius:15px;

padding:20px;

transition:.25s;

}

.gateway:hover{

transform:translateY(-5px);

border-color:#00b96b;

}

.nome{

font-size:20px;

font-weight:bold;

margin-bottom:15px;

}

.item{

margin:8px 0;

color:#c7d1df;

}

.online{

color:#2ecc71;

}

.offline{

color:#ff5252;

}

.equipamento{

display:flex;
align-items:center;
gap:12px;
padding:10px;
margin-bottom:8px;
background:#0d1628;
border-radius:10px;
border-left:4px solid #00b96b;

}

.icone{

font-size:24px;
width:35px;
text-align:center;

}

</style>

</head>

<body>

<header>

🌐 FF Infra - Mapa da Rede

</header>

<div id="mapa">

Carregando...

</div>

<script>

const supabase = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

function icone(tipo){

switch(tipo){

case "Servidor":
return "🖥️";

case "Switch":
return "🔀";

case "ONU":
return "📦";

case "📡 Rádio PTP":
return "📡";

case "📡 Rádio Setorial":
return "📶";

case "Câmera":
return "📷";

case "Nobreak":
return "🔋";

case "Impressora":
return "🖨️";

default:
return "⚙️";

}

}
async function carregar(){

const mapa=document.getElementById("mapa");

mapa.innerHTML="";

const {data:gateways,error}=await supabase

.from("monitor_gateways")

.select("*")

.order("nome");

if(error){

mapa.innerHTML=error.message;

return;

}

const { data: equipamentos, error: erroEquip } = await supabase
.from("monitor_equipamentos")
.select("*")
.order("nome");

if(erroEquip){

    console.log(erroEquip);

    return;

}

gateways.forEach(g=>{

const filhos=equipamentos.filter(

e=>e.gateway_id===g.id

);

const div=document.createElement("div");

div.className="gateway";

let html=`

<div class="nome">

🛰 ${g.nome}

</div>

<div class="item">

VPN<br>

${g.ip_vpn||"-"}

</div>

<div class="item">

CPU<br>

${g.cpu_load||0} %

</div>

<div class="item">

Status<br>

<span class="${g.status}">

${g.status}

</span>

</div>

<hr style="margin:15px 0;border:1px solid #293850;">

<div style="font-weight:bold;margin-bottom:10px">

Equipamentos

</div>

`;

if(filhos.length==0){

html+=`

<div style="opacity:.6">

Nenhum equipamento

</div>

`;

}else{

filhos.forEach(eq=>{

html+=`

<div class="equipamento">

<div class="icone">

${icone(eq.tipo)}

</div>

<div>

<div>

${eq.nome}

</div>

<div style="font-size:12px;opacity:.7">

${eq.ip||"-"}

</div>

</div>

</div>

`;

});

}

div.innerHTML=html;

mapa.appendChild(div);

});

}


carregar();

setInterval(carregar,5000);

</script>

</body>

</html>
