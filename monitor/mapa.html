<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Infra - Mapa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<body>

<header>

<div style="display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#151c2f;border-bottom:1px solid #2d3f5d">

<div style="font-size:22px;font-weight:bold">

🌐 FF Infra - Topologia

</div>

<div>

<button id="editar">✏ Editar</button>

<button onclick="carregar()">🔄 Atualizar</button>

</div>

</div>

</header>

<div id="network"></div>

<style>

html,body{

width:100%;
height:100%;
margin:0;
overflow:hidden;
background:#0b1020;

}

#network{

width:100%;
height:calc(100vh - 70px);

}

</style>

<header>

🌐 FF Infra - Mapa da Rede

</header>

<div id="mapa" style="width:100%;height:900px;">

Carregando...

</div>

<script>
const db = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let network;

async function carregar(){

const {data,error}=await db
.from("monitor_equipamentos")
.select("*");

if(error){

alert(error.message);

return;

}

const nodes=[];
const edges=[];

data.forEach(eq=>{

nodes.push({

id:eq.id,

label:eq.nome,

shape:"box",

x:eq.posicao_x||0,

y:eq.posicao_y||0,

physics:false,

color:eq.status=="online"
?"#16a34a"
:"#dc2626"

});

if(eq.equipamento_pai){

edges.push({

from:eq.equipamento_pai,

to:eq.id

});

}

});

network=new vis.Network(

document.getElementById("network"),

{

nodes:new vis.DataSet(nodes),

edges:new vis.DataSet(edges)

},

{

physics:false,

interaction:{

dragNodes:true

}

}

);

network.on("dragEnd",async function(e){

if(!e.nodes.length)return;

const id=e.nodes[0];

const pos=network.getPositions([id])[id];

await db

.from("monitor_equipamentos")

.update({

posicao_x:Math.round(pos.x),

posicao_y:Math.round(pos.y)

})

.eq("id",id);

});

}

carregar();

setInterval(carregar,5000);
</script>

</body>
</html>
