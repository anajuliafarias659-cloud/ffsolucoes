<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Infra - Mapa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:#fff;
}

header{
height:70px;
background:#151c2f;
display:flex;
align-items:center;
padding:0 25px;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #2d3f5d;
}

#mapa{
padding:25px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.gateway{

width:320px;
background:#151c2f;
border-radius:12px;
padding:18px;
border:1px solid #30415d;

}

.gateway h2{

margin-bottom:15px;
font-size:22px;

}

.info{

margin:6px 0;
font-size:14px;

}

.equipamento{

margin-top:10px;
padding:10px;
background:#0e1628;
border-left:4px solid #00c26f;
border-radius:8px;

}

.online{

color:#00d26a;

}

.offline{

color:#ff5757;

}

</style>

</head>

<body>

<header>

🌐 FF Infra - Mapa da Rede

</header>

<div id="mapa" style="width:100%;height:900px;">

Carregando...

</div>

<script>
const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

function icone(tipo){

    switch(tipo){

        case "Internet": return "🌎";
        case "Servidor": return "🖥️";
        case "Gateway": return "🛰️";
        case "Switch": return "🔀";
        case "Rádio PTP": return "📡";
        case "Rádio Setorial": return "📶";
        case "ONU": return "📦";
        case "Câmera": return "📷";
        case "Nobreak": return "🔋";

        default: return "⚙️";

    }

}

async function carregar(){

    const mapa = document.getElementById("mapa");

    const { data, error } = await db
        .from("monitor_equipamentos")
        .select("*");

    if(error){

        mapa.innerHTML = error.message;
        console.log(error);
        return;

    }

    const nodes = [];
    const edges = [];

    data.forEach(eq=>{

        nodes.push({

            id: eq.id,

            label: icone(eq.tipo)+" "+eq.nome,

            shape: "box",

            color: eq.status=="online"
                ? "#00b96b"
                : "#ff4444"

        });

        if(eq.equipamento_pai){

            edges.push({

                from:eq.equipamento_pai,
                to:eq.id

            });

        }

    });

    const network = new vis.Network(

        mapa,

        {

            nodes:new vis.DataSet(nodes),

            edges:new vis.DataSet(edges)

        },

        {

            layout:{

                hierarchical:{

                    enabled:true,

                    direction:"UD"

                }

            },

            physics:false

        }

    );

}
carregar();

setInterval(carregar,5000);
</script>

</body>
</html>
