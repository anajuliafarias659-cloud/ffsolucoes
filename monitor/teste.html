<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Infra Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#08111f;
color:white;

}

header{

height:70px;
background:#101b2d;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
border-bottom:1px solid #1d2a3e;

}

.logo{

font-size:24px;
font-weight:bold;

}

.statusSistema{

display:flex;
gap:15px;
align-items:center;

}

.online{

width:12px;
height:12px;
border-radius:50%;
background:#00d26a;
box-shadow:0 0 10px #00d26a;

}

.container{

width:95%;
max-width:1800px;
margin:auto;
padding:25px;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:25px;

}

.card{

background:#111d31;
border:1px solid #1d2b42;
border-radius:16px;
padding:18px;
display:flex;
flex-direction:column;
justify-content:center;
min-height:110px;
transition:.25s;

}

.card:hover{

transform:translateY(-4px);
border-color:#00d26a;

}

.cardTitulo{

font-size:14px;
color:#9ea8ba;
margin-bottom:8px;

}

.cardValor{

font-size:34px;
font-weight:700;
line-height:1;

}

.verde{

color:#00d26a;

}

.vermelho{

color:#ff5252;

}

.azul{

color:#2da8ff;

}

.laranja{

color:#ff9800;

}

.roxo{

color:#8b5cf6;

}

.grafico{

background:#111d31;
border-radius:15px;
padding:20px;
border:1px solid #1d2b42;
margin-bottom:25px;

}


.painelInferior{

    display:grid;
    grid-template-columns:420px 1fr;
    gap:20px;
    margin-bottom:20px;

}

.graficoBox{

    background:#111d31;
    border:1px solid #1d2b42;
    border-radius:15px;
    padding:20px;

    height:320px;

}

.feed{

    background:#111d31;
    border:1px solid #1d2b42;
    border-radius:15px;

    height:350px;

    overflow:auto;

}

.evento{

padding:12px;

border-bottom:1px solid #23344d;

}

.evento:last-child{

border:none;

}

#graficoTrafego,
#trafego{

    width:100% !important;
    height:280px !important;

}

.tabela{

background:#111d31;
border:1px solid #1d2b42;
border-radius:15px;
overflow:hidden;
margin-bottom:25px;

}

.tituloTabela{

padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1d2b42;

}

table{

width:100%;
border-collapse:collapse;

}

thead{

background:#16243b;

}

th{

padding:15px;
text-align:left;
font-size:14px;
color:#9ea8ba;

}

td{

padding:16px;
border-top:1px solid #1b2a42;

}

tbody tr{

transition:.2s;

}

tbody tr:hover{

background:#172741;

}

.badge{

padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;

}

.up{

background:#0f5132;
color:#00ff8a;

}

.down{

background:#4a1a1a;
color:#ff6464;

}

.btn{

background:#00b96b;
color:white;
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;

}

.btn:hover{

background:#00d67b;

}

.alertasGrid{

display:grid;
grid-template-columns:380px 1fr;
gap:20px;
margin-bottom:25px;

}

.alertas{

background:#111d31;
border:1px solid #1d2b42;
border-radius:15px;

}

.alertas h2{

padding:20px;
border-bottom:1px solid #1d2b42;
font-size:20px;

}

.alerta{

padding:15px 20px;
border-bottom:1px solid #1d2b42;

}

.alerta:last-child{

border:none;

}

.alertaTitulo{

font-weight:bold;
margin-bottom:5px;

}

.alertaHora{

color:#8c97aa;
font-size:13px;

}

.offlineBox{

background:#111d31;
border:1px solid #1d2b42;
border-radius:15px;

}

.offlineBox h2{

padding:20px;
border-bottom:1px solid #1d2b42;

}

.offlineItem{

display:flex;
justify-content:space-between;
padding:16px 20px;
border-bottom:1px solid #1d2b42;

}

.offlineItem:last-child{

border:none;

}

.statusOff{

color:#ff5a5a;
font-weight:bold;

}

@media(max-width:1100px){

.alertasGrid{

grid-template-columns:1fr;

}

}
@media(max-width:768px){

    .container{
        width:100%;
        padding:12px;
    }

    header{
        padding:0 15px;
    }

    .logo{
        font-size:18px;
    }

    .statusSistema{
        gap:8px;
        font-size:12px;
    }

    .cards{
        grid-template-columns:repeat(2,1fr);
        gap:10px;
    }

    .card{
        padding:14px;
        min-height:85px;
    }

    .cardTitulo{
        font-size:12px;
    }

    .cardValor{
        font-size:24px;
    }

    /* GRÁFICO */

    .graficoBox{
        width:100%;
        height:260px;
        margin-bottom:15px;
    }

    #trafego{
        width:100% !important;
        height:190px !important;
    }

    /* EVENTOS + POPS */

    .painelInferior{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .feed{
        width:100%;
        height:300px;
    }

    .popBox{
        width:100%;
        height:280px;
    }

    /* GATEWAYS */

    .tabela{
        overflow-x:auto;
    }

    table{
        min-width:700px;
    }

}
@media(max-width:420px){

.cards{

grid-template-columns:1fr 1fr;

}

.card{

padding:12px;
min-height:78px;

}

.cardTitulo{

font-size:11px;

}

.cardValor{

font-size:22px;

}

}

.ladoDireito{

    display:flex;
    flex-direction:column;
    gap:15px;

}

.popBox{

    background:#111d31;
    border:1px solid #1d2b42;
    border-radius:15px;

    height:350px;

    overflow:auto;

}

.popItem{

    padding:12px;
    border-bottom:1px solid #23344d;

}

.popTitulo{

    font-weight:bold;
    color:#2da8ff;
    margin-bottom:8px;

}

.eqItem{

    padding:4px 0 4px 18px;
    font-size:14px;

}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>

<div class="logo" id="nomeEmpresa">
    🖥 Carregando...
</div>

<div class="statusSistema">

<div class="online"></div>

<div>

Sistema Online

</div>

<div id="hora">

--

</div>

</div>

</header>

<div class="container">

<div class="popBox">

        <h2>📡 POPs / Equipamentos</h2>

        <div id="listaPops"></div>

    </div>

    
<div class="feed">

        <h2>🚨 Eventos da Rede</h2>

        <div id="feedEventos"></div>

    </div>
    

<div class="cards">
<div class="card">

<div class="cardTitulo">

👥 Clientes PPPoE

</div>

<div class="cardValor azul" id="clientes">

0

</div>

</div><div class="card">

<div class="cardTitulo">

🌐 Gateways

</div>

<div class="cardValor">

0

</div>

</div><div class="card">

<div class="cardTitulo">

🟢 Equipamentos Online

</div>

<div class="cardValor verde" id="online">

0

</div>

</div><div class="card">

<div class="cardTitulo">

🔴 Equipamentos Offline

</div>

<div class="cardValor vermelho" id="offline">

0

</div>

</div></div>
<div class="tabela">

<div class="tituloTabela">
🌐 Gateways
</div>

<table>

<thead>

<tr>

<th>Gateway</th>
<th>Status</th>
<th>Clientes</th>
<th>Download</th>
<th>Upload</th>
<th>CPU</th>
<th>RAM</th>
<th>Ping</th>
<th>Temperatura</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="listaGateways">

</tbody>

</table>

</div>

<div class="alertasGrid">
<div class="graficoBox">

    <h2>📈 Tráfego da Rede</h2>

    <canvas id="trafego"></canvas>

</div>
<div class="painelInferior">
<div class="cards">
<div class="card">

<div class="cardTitulo">

⬇ Download

</div>

<div class="cardValor verde" id="download">
    0 Mbps
</div>

</div><div class="card">

<div class="cardTitulo">

⬆ Upload

</div>

<div class="cardValor azul" id="upload">
    0 Mbps
</div>

</div></div>...

</div>

<script>

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const db = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

console.log("URL:", SUPABASE_URL);
console.log("KEY:", SUPABASE_KEY.substring(0,25));

let equipamentos = [];
let gateways = [];
let pppoe = [];
let alertas = [];
let trafego = [];
let eventos = [];
let estadoAnterior = {};
let historicoOffline = {};
let alertaLatencia = {};

setInterval(()=>{

document.getElementById("hora").innerHTML =
new Date().toLocaleTimeString("pt-BR");

},1000);

let horarios = [];
let historicoDownload = [];
let historicoUpload = [];

const grafico = new Chart(document.getElementById("trafego"),{

    type:"line",

    data:{

        labels:horarios,

        datasets:[

            {

                label:"Download",

                data:historicoDownload

            },

            {

                label:"Upload",

                data:historicoUpload

            }

        ]

    },
    options:{

        responsive:true,

        maintainAspectRatio:false

    }

});

let app_id = null;

async function carregarDashboard(){

    const { data:{ session } } = await db.auth.getSession();

    if (!session) {
        location.href = "/auth/login.html";
        return;
    }

    const { data: usuario } = await db
        .from("usuarios")
        .select("app_id")
        .eq("id", session.user.id)
        .single();

    app_id = usuario.app_id;

    console.log("APP_ID:", app_id);
const { data: config, error: erroConfig } = await db
    .from("monitor_config")
    .select("*")
    .eq("app_id", app_id)
    .single();

console.log("Config Dashboard:", config);
console.log("Erro Dashboard:", erroConfig);
console.log("Config Dashboard:", config);
console.log("Erro Dashboard:", erroConfig);

if (config) {
    document.getElementById("nomeEmpresa").innerHTML =
        "🖥 " + config.nome_empresa;
} else {
    document.getElementById("nomeEmpresa").innerHTML =
        "🖥 FF Infra";
}

   // Equipamentos
const { data: equipamentosData } = await db
    .from("monitor_equipamentos")
    .select("*")
    .eq("app_id", app_id);

equipamentos = equipamentosData || [];

// PPPoE
const { data: pppoeData } = await db
    .from("monitor_pppoe")
    .select("id")
    .in("gateway_id", gatewayIds);

pppoe = pppoeData || [];

// Gateways
const { data: gatewaysData, error: erroGateways } = await db
    .from("monitor_gateways")
    .select("*")
    .eq("app_id", app_id);

if (erroGateways) {
    console.error(erroGateways);
    return;
}

gateways = gatewaysData || [];

const gatewayIds = gateways.map(g => g.id);

const { data: interfacesMonitoradas, error: erroInterfaces } = await db
    .from("monitor_interfaces")
    .select("nome,gateway_id")
    .eq("app_id", app_id)
    .in("gateway_id", gatewayIds)
    .eq("monitorar", true);

console.log("Gateways:", gatewayIds);
console.table(interfacesMonitoradas);

if (!interfacesMonitoradas || interfacesMonitoradas.length === 0) {

    trafego = [];

} else {

    const nomesInterfaces = interfacesMonitoradas.map(i => i.nome);

    console.log("Interfaces selecionadas:", nomesInterfaces);

    const { data: trafegoData, error: erroTrafego } = await db
    .from("monitor_trafego")
    .select("*")
    .eq("app_id", app_id)
    .in("interface", nomesInterfaces);
console.log("Interfaces:", nomesInterfaces);
console.log("Erro tráfego:", erroTrafego);
console.log("Tráfego:", trafegoData);

    if (erroTrafego) {
        console.error(erroTrafego);
        trafego = [];
    } else {
        trafego = trafegoData || [];
    }

}


// APAGUE ESTA LINHA
// atualizarDashboard();

    let online = 0;
    let offline = 0;

    equipamentos.forEach(eq => {
if(eq.cpu>90){

eventos.unshift({

hora:new Date().toLocaleTimeString(),

texto:`CPU alta em ${eq.nome}`

});

}
    const status = (eq.status || "").toLowerCase();

    if (status === "online") {
        online++;
    } else {
        offline++;
    }

});

    document.getElementById("online").innerHTML = online;

    document.getElementById("offline").innerHTML = offline;

    document.getElementById("clientes").innerHTML = pppoe.length;

   document.querySelector(".cards .card:nth-child(4) .cardValor").innerHTML = gateways.length;
let download = 0;
let upload = 0;

if(download>5000){

eventos.unshift({

hora:new Date().toLocaleTimeString(),

texto:"🔥 Tráfego acima de 5 Gbps"

});

}

trafego.forEach(t => {

    download += Number(t.download_mbps || 0);
    upload += Number(t.upload_mbps || 0);

});

document.getElementById("download").innerHTML =
    download.toFixed(2) + " Mbps";

document.getElementById("upload").innerHTML =
    upload.toFixed(2) + " Mbps";
    
    horarios.push(new Date().toLocaleTimeString());

historicoDownload.push(download);
historicoUpload.push(upload);

if(horarios.length > 60){

    horarios.shift();
    historicoDownload.shift();
    historicoUpload.shift();

}

grafico.data.labels = horarios;
grafico.data.datasets[0].data = historicoDownload;
grafico.data.datasets[1].data = historicoUpload;
grafico.update();

gerarEventos();

desenharFeed();

desenharPops();

desenharGateways();

salvarEstado();

}

function desenharPops(){

    let html = "";

    gateways.forEach(g=>{

        html += `
            <div class="popItem">

                <div class="popTitulo">
                    📍 ${g.nome}
                </div>
        `;

        equipamentos
            .filter(e=>e.gateway_id==g.id)
            .sort((a,b)=>(a.porta||0)-(b.porta||0))
            .forEach(eq=>{

                let icone="🟢";

                if((eq.status||"").toLowerCase()=="offline")
                    icone="🔴";

                else if(Number(eq.latencia)>30)
                    icone="🟠";

                html += `
                    <div class="eqItem">
                        ${icone}
                        P${eq.porta || "-"} -
                        ${eq.nome}
                    </div>
                `;

            });

        html += "</div>";

    });

    document.getElementById("listaPops").innerHTML = html;

}
function gerarEventos(){

    equipamentos.forEach(eq=>{

        const anterior = estadoAnterior[eq.id];

        if(!anterior) return;

        const statusAnterior = (anterior.status || "").toLowerCase();
        const statusAtual = (eq.status || "").toLowerCase();

        const gateway = gateways.find(g => g.id === eq.gateway_id);

        // EQUIPAMENTO FICOU OFFLINE
        if(statusAnterior == "online" && statusAtual == "offline"){

            historicoOffline[eq.id] = Date.now();

            eventos.unshift({
                hora:new Date().toLocaleTimeString(),
                nivel:"critico",
                texto:`
                    <b>📍 ${gateway?.nome}</b><br>
                    🔴 ${eq.nome} ficou OFFLINE
                `
            });

        }

        // EQUIPAMENTO VOLTOU ONLINE
        if(statusAnterior == "offline" && statusAtual == "online"){

            let tempo = "";

            if(historicoOffline[eq.id]){

                const segundos = Math.floor(
                    (Date.now() - historicoOffline[eq.id]) / 1000
                );

                tempo = ` após ${segundos}s`;

                delete historicoOffline[eq.id];
            }

            eventos.unshift({
                hora:new Date().toLocaleTimeString(),
                nivel:"info",
                texto:`
                    <b>📍 ${gateway?.nome}</b><br>
                    🟢 ${eq.nome} voltou ONLINE${tempo}
                `
            });

        }

        
        // LATÊNCIA
        // LATÊNCIA
const latAtual = Number(eq.latencia || 0);

// Entrou em latência alta
if(latAtual >= 30 && !alertaLatencia[eq.id]){

    alertaLatencia[eq.id] = true;

    eventos.unshift({
        hora:new Date().toLocaleTimeString(),
        nivel:"alerta",
        texto:`
            <b>📍 ${gateway?.nome}</b><br>
            🟠 ${eq.nome}<br>
            Latência alta: ${latAtual.toFixed(1)} ms
        `
    });

}

// Voltou ao normal
if(latAtual < 25 && alertaLatencia[eq.id]){

    alertaLatencia[eq.id] = false;

    eventos.unshift({
        hora:new Date().toLocaleTimeString(),
        nivel:"info",
        texto:`
            <b>📍 ${gateway?.nome}</b><br>
            🟢 ${eq.nome}<br>
            Latência normalizada (${latAtual.toFixed(1)} ms)
        `
    });

}

    });

    // Mantém apenas os últimos 100 eventos
    if(eventos.length > 100){
        eventos = eventos.slice(0,100);
    }

}

function salvarEstado(){

    estadoAnterior = {};

    equipamentos.forEach(eq=>{

      estadoAnterior[eq.id] = {
    status: eq.status,
    cpu: eq.cpu,
    ram: eq.ram,
    latencia: eq.latencia
};

    });

}

function desenharGateways(){

    const tabela = document.getElementById("listaGateways");

    tabela.innerHTML = "";

    gateways.forEach(g=>{

if(g.status=="offline"){

eventos.unshift({

hora:new Date().toLocaleTimeString(),

texto:`Gateway ${g.nome} Offline`

});

}

    const trafegoGateway = trafego.filter(
    t => t.gateway_id === g.id
);

const download = trafegoGateway.reduce(
    (soma,t)=>soma+Number(t.download_mbps||0),
    0
);

const upload = trafegoGateway.reduce(
    (soma,t)=>soma+Number(t.upload_mbps||0),
    0
);

        tabela.innerHTML += `
        <tr>

            <td>${g.nome || g.gateway || "-"}</td>

            <td>
                <span class="badge ${g.status=="online" ? "up":"down"}">
                    ${(g.status || "offline").toUpperCase()}
                </span>
            </td>

            <td>${g.clientes ?? 0}</td>

            <td>${download.toFixed(2)} Mbps</td>

<td>${upload.toFixed(2)} Mbps</td>

            <td>${g.cpu ?? 0}%</td>

            <td>${g.ram ?? 0}%</td>

            <td>${g.ping ?? "-"} ms</td>

            <td>${g.temperatura ?? "-"}°C</td>

            <td>
                <button class="btn">Abrir</button>
            </td>

        </tr>
        `;

    });

}

function desenharFeed(){

    let html="";

    eventos.forEach(e=>{

        html+=`

        <div class="evento">

            <b>${e.hora}</b>

            <br>

            ${e.texto}

        </div>

        `;

    });

    document.getElementById("feedEventos").innerHTML=html;

}

window.onload = async () => {

    await carregarDashboard();

    setInterval(carregarDashboard,5000);

};

</script>

</body>
</html>
