
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Configurações Hotspot</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
}

.topo{
background:#0d8db8;
color:#fff;
padding:18px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:30px auto;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#0d8db8;
}

input,
textarea,
select{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;

}

textarea{

height:90px;

}

button{

padding:15px;
border:none;
background:#0d8db8;
color:#fff;
font-size:18px;
border-radius:10px;
cursor:pointer;
width:100%;

}

label{

font-weight:bold;

}

.check{

display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;

}

.check input{

width:auto;

}
.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.3s;
border-radius:34px;
}

.slider:before{
content:"";
position:absolute;
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.3s;
border-radius:50%;
}

.switch input:checked + .slider{
background:#0d8db8;
}

.switch input:checked + .slider:before{
transform:translateX(26px);
}
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.janela{
    background:#fff;
    width:95%;
    max-width:550px;
    border-radius:12px;
    padding:20px;
    max-height:90vh;
    overflow:auto;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}
</style>

</head>

<body>

<div class="topo">

⚙ Configurações Hotspot

</div>

<div class="container">

<div class="card">

<h2>Empresa</h2>

<label>Nome</label>
<input id="nome">

<label>Descrição</label>
<textarea id="descricao"></textarea>

<label>Logo</label>
<input type="file" id="logoFile" accept="image/*">

<img id="previewLogo"
style="width:120px;border-radius:12px;margin-top:10px">
<div style="display:flex;gap:10px;margin-top:10px">

<button
type="button"
onclick="logoFile.click()">

Alterar Logo

</button>

<button
type="button"
style="background:#d32f2f"
onclick="excluirLogo()">

Excluir Logo

</button>

</div>

<label>Banner</label>
<input type="file" id="bannerFile" accept="image/*">

<img id="previewBanner"

style="width:100%;margin-top:10px;border-radius:12px">

<label>WhatsApp</label>
<input id="whatsapp">

</div>
<div style="display:flex;gap:10px;margin-top:10px">

<button
type="button"
onclick="bannerFile.click()">

Alterar Banner

</button>

<button
type="button"
style="background:#d32f2f"
onclick="excluirBanner()">

Excluir Banner

</button>

</div>
<div class="card">

<h2>Aparência</h2>

<label>Cor Principal</label>
<input type="color" id="cor">

<label>Cor Botão</label>
<input type="color" id="corbotao">

</div>

<div class="card">

<h2>Mercado Pago</h2>

<label>Access Token</label>
<input id="token">

<label>Public Key</label>
<input id="publickey">

</div>

<div class="card">

<h2>🌐 MikroTiks</h2>

<button
type="button"
onclick="novoMikrotik()">

➕ Adicionar MikroTik

</button>

<br><br>

<div id="listaMikrotiks">

Nenhum MikroTik cadastrado.

</div>

</div>

<div class="card">

<h2>VPN WireGuard</h2>

<label>IP VPN do MikroTik</label>
<input id="vpn_ip" placeholder="10.100.0.2">

<label>Endpoint da VPS</label>
<input id="vpn_endpoint" value="179.197.224.55">

<label>Porta WireGuard</label>
<input id="vpn_porta" value="51820">

<label>Configuração RouterOS</label>

<textarea
id="scriptvpn"
style="height:250px;font-family:monospace"
readonly></textarea>

<button type="button" onclick="copiarVPN()">
📋 Copiar Configuração
</button>

<br><br>

</div>

<div class="card">

<h2>🤖 Telegram</h2>

<label>Bot Token</label>
<input id="telegram_token">

<label>Chat ID</label>
<input id="telegram_chat_id">

<div class="check">
    <input type="checkbox" id="telegram_ativo">
    <label>Ativar Telegram</label>
</div>

<button
type="button"
onclick="testarTelegram()">

📨 Testar Bot

</button>

</div>

<div class="card">

<h2>Opções</h2>

<h2>Modelo da Página</h2>

<div class="check">

<span>Clássico</span>

<label class="switch">
<input type="checkbox" id="modelo">
<span class="slider"></span>
</label>

<span>Moderno</span>

</div>

<div class="check">
<input type="checkbox" id="pix">
<label for="pix">Pagamento PIX</label>
</div>

<div class="check">
<input type="checkbox" id="voucher">
<label for="voucher">Voucher</label>
</div>

<div class="check">
<input type="checkbox" id="mac">
<label for="mac">Login por MAC</label>
</div>

<div class="check">
<input type="checkbox" id="ativo">
<label for="ativo">Sistema Ativo</label>
</div>

</div>

<button onclick="salvar()">

Salvar Configurações

</button>

</div>
<div
class="modal"
id="modalMikrotik">

<div class="janela">

<h2>MikroTik</h2>

<label>Nome</label>
<input id="mk_nome">

<label>IP</label>
<input id="mk_ip">

<label>Porta</label>
<input id="mk_porta" value="8728">

<label>Usuário</label>
<input id="mk_usuario">

<label>Senha</label>
<input id="mk_senha">

<label>Hotspot</label>
<input id="mk_hotspot">

<br><br>

<button onclick="salvarMikrotik()">

Salvar

</button>

<button
type="button"
style="background:#666;margin-top:10px"
onclick="fecharModalMikrotik()">

Cancelar

</button>

</div>

</div>

<script>

const db=window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const APP_ID = new URLSearchParams(location.search).get("app_id");
const nome = document.getElementById("nome");
const descricao = document.getElementById("descricao");
const logoFile = document.getElementById("logoFile");
const bannerFile = document.getElementById("bannerFile");

const previewLogo = document.getElementById("previewLogo");
const previewBanner = document.getElementById("previewBanner");
const whatsapp = document.getElementById("whatsapp");

const cor = document.getElementById("cor");
const corbotao = document.getElementById("corbotao");

const token = document.getElementById("token");
const publickey = document.getElementById("publickey");
const telegram_token = document.getElementById("telegram_token");
const telegram_chat_id = document.getElementById("telegram_chat_id");
const telegram_ativo = document.getElementById("telegram_ativo");

const vpn_ip = document.getElementById("vpn_ip");
const scriptvpn = document.getElementById("scriptvpn");

const modelo = document.getElementById("modelo");
const pix = document.getElementById("pix");
const voucher = document.getElementById("voucher");
const mac = document.getElementById("mac");
const ativo = document.getElementById("ativo");
const mk_nome = document.getElementById("mk_nome");
const mk_ip = document.getElementById("mk_ip");
const mk_porta = document.getElementById("mk_porta");
const mk_usuario = document.getElementById("mk_usuario");
const mk_senha = document.getElementById("mk_senha");
const mk_hotspot = document.getElementById("mk_hotspot");
const modalMikrotik = document.getElementById("modalMikrotik");

let mikrotikEditando = null;

console.log("APP_ID:", APP_ID);

if (!APP_ID) {
    alert("APP_ID não informado.");
    throw new Error("APP_ID ausente");
}

async function carregarMikrotiks(){

    const { data, error } = await db

        .from("hotspot_mikrotiks")

        .select("*")

        .eq("app_id", APP_ID)

        .order("nome");

    if(error){

        console.error(error);

        return;

    }

    const lista = document.getElementById("listaMikrotiks");

    lista.innerHTML = "";

    if(!data || data.length==0){

        lista.innerHTML="Nenhum MikroTik cadastrado.";

        return;

    }

    data.forEach(mk=>{

        lista.innerHTML += `

<div style="border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:15px">

<b>${mk.nome}</b>

<br>

IP: ${mk.ip}

<br>

VPN:
${mk.vpn_ip || "Não gerada"}

<br><br>

<button
type="button"
onclick="gerarVPN('${mk.id}')">

Gerar VPN

</button>

<button
type="button"
style="background:#ff9800;margin-top:8px"
onclick="editarMikrotik('${mk.id}')">

Editar

</button>

<button
type="button"
style="background:#d32f2f;margin-top:8px"
onclick="excluirMikrotik('${mk.id}')">

Excluir

</button>

</div>

`;

    });

}

function novoMikrotik(){

    mikrotikEditando = null;

    mk_nome.value="";

    mk_ip.value="";

    mk_porta.value="8728";

    mk_usuario.value="";

    mk_senha.value="";

    mk_hotspot.value="";

    modalMikrotik.style.display="flex";

}

function fecharModalMikrotik(){

    modalMikrotik.style.display="none";

}

async function salvarMikrotik(){

    const dados={

        app_id:APP_ID,

        nome:mk_nome.value.trim(),

        ip:mk_ip.value.trim(),

        porta:Number(mk_porta.value),

        usuario:mk_usuario.value.trim(),

        senha:mk_senha.value,

        hotspot:mk_hotspot.value.trim()

    };

    if(!dados.nome){

        alert("Informe o nome.");

        return;

    }

    if(mikrotikEditando){

        const { error } = await db

            .from("hotspot_mikrotiks")

            .update(dados)

            .eq("id",mikrotikEditando);

        if(error){

            alert(error.message);

            return;

        }

    }else{

        const { error } = await db

            .from("hotspot_mikrotiks")

            .insert(dados);

        if(error){

            alert(error.message);

            return;

        }

    }

    fecharModalMikrotik();

    carregarMikrotiks();

}

async function editarMikrotik(id){

    const { data,error } = await db

        .from("hotspot_mikrotiks")

        .select("*")

        .eq("id",id)

        .single();

    if(error){

        alert(error.message);

        return;

    }

    mikrotikEditando=id;

    mk_nome.value=data.nome||"";

    mk_ip.value=data.ip||"";

    mk_porta.value=data.porta||8728;

    mk_usuario.value=data.usuario||"";

    mk_senha.value=data.senha||"";

    mk_hotspot.value=data.hotspot||"";

    modalMikrotik.style.display="flex";

}

async function excluirMikrotik(id){

    if(!confirm("Excluir este MikroTik?")) return;

    const { error } = await db

        .from("hotspot_mikrotiks")

        .delete()

        .eq("id",id);

    if(error){

        alert(error.message);

        return;

    }

    carregarMikrotiks();

}
async function carregar() {

    const { data, error } = await db
        .from("hotspot_config")
        .select("*")
        .eq("app_id", APP_ID)
        .maybeSingle();

    if (error) {
        console.error(error);
        return;
    }

    if (!data) {

        const { error: erroInsert } = await db
            .from("hotspot_config")
            .insert({
                app_id: APP_ID
            });

        if (erroInsert) {
            console.error(erroInsert);
            return;
        }

        return carregar();
    }

    nome.value = data.nome_hotspot || "";
    descricao.value = data.descricao || "";
    if (data.logo) {
    previewLogo.src = data.logo;
    previewLogo.style.display = "block";
}

if (data.banner) {
    previewBanner.src = data.banner;
    previewBanner.style.display = "block";
}
    whatsapp.value = data.whatsapp || "";

    cor.value = data.cor_primaria || "#0d8db8";
    corbotao.value = data.cor_botao || "#0d8db8";

    token.value = data.mercado_pago_token || "";
    publickey.value = data.mercado_pago_public_key || "";
telegram_token.value = data.telegram_token || "";
telegram_chat_id.value = data.telegram_chat_id || "";
telegram_ativo.checked = !!data.telegram_ativo;

    pix.checked = !!data.login_por_pix;
    voucher.checked = !!data.login_por_voucher;
    mac.checked = !!data.login_por_mac;
    ativo.checked = !!data.ativo;
modelo.checked = data.modelo === "indexx.html";
}

async function salvar() {

    // Mantém os valores atuais caso o usuário não escolha outra imagem
const { data: atual } = await db
    .from("hotspot_config")
    .select("logo,banner")
    .eq("app_id", APP_ID)
    .single();

let logoURL = atual?.logo || null;
let bannerURL = atual?.banner || null;

// =======================
// UPLOAD DO LOGO
// =======================

if (logoFile.files.length > 0) {

    const arquivo = logoFile.files[0];

    const extensao = arquivo.name.split(".").pop().toLowerCase();

await db.storage
    .from("hotspot")
    .remove([
        `${APP_ID}/logo.jpg`,
        `${APP_ID}/logo.jpeg`,
        `${APP_ID}/logo.png`,
        `${APP_ID}/logo.webp`
    ]);

const nomeArquivo = `${APP_ID}/logo.${extensao}`;

    const { error: erroUpload } = await db.storage
        .from("hotspot")
        .upload(nomeArquivo, arquivo, {
            upsert: true
        });

    if (erroUpload) {

    console.error("ERRO BANNER:", erroUpload);
    alert("Erro no banner: " + erroUpload.message);
    return;

} else {

        logoURL = db.storage
            .from("hotspot")
            .getPublicUrl(nomeArquivo)
            .data.publicUrl;

    }

}

// =======================
// UPLOAD DO BANNER
// =======================

if (bannerFile.files.length > 0) {

    const arquivo = bannerFile.files[0];

    const extensao = arquivo.name.split(".").pop().toLowerCase();

await db.storage
    .from("hotspot")
    .remove([
        `${APP_ID}/banner.jpg`,
        `${APP_ID}/banner.jpeg`,
        `${APP_ID}/banner.png`,
        `${APP_ID}/banner.webp`
    ]);

const nomeArquivo = `${APP_ID}/banner.${extensao}`;

    const { error: erroUpload } = await db.storage
        .from("hotspot")
        .upload(nomeArquivo, arquivo, {
            upsert: true
        });

    if (erroUpload) {

        console.error(erroUpload);

    } else {

        bannerURL = db.storage
            .from("hotspot")
            .getPublicUrl(nomeArquivo)
            .data.publicUrl;

    }

}

    const { error } = await db
        .from("hotspot_config")
        .update({

            nome_hotspot: nome.value,
            descricao: descricao.value,

            logo: logoURL,
            banner: bannerURL,

            whatsapp: whatsapp.value,

            cor_primaria: cor.value,
            cor_botao: corbotao.value,

            mercado_pago_token: token.value.trim(),
            mercado_pago_public_key: publickey.value.trim(),
telegram_token: telegram_token.value.trim(),
telegram_chat_id: telegram_chat_id.value.trim(),
telegram_ativo: telegram_ativo.checked,

            login_por_pix: pix.checked,
            login_por_voucher: voucher.checked,
            login_por_mac: mac.checked,
            ativo: ativo.checked,

            modelo: modelo.checked
                ? "indexx.html"
                : "index.html"

        })
        .eq("app_id", APP_ID);

    if (error) {
        console.error(error);
        alert(error.message);
        return;
    }

    alert("Configuração salva com sucesso!");

    carregar();
}


async function gerarVPN(id){

    const resp = await fetch("https://hotspot.ffsolucoes.com.br/vpn/criar-peer", {

        method: "POST",

        headers: {

            "Content-Type": "application/json",

            "x-gateway-key": "ff_hotspot_2026_super_secreta"

        },

        body: JSON.stringify({

    app_id: APP_ID,

    mikrotik_id:id

})

    });

    const json = await resp.json();

    if (!json.sucesso) {

        alert(json.erro);

        return;

    }

    vpn_ip.value = json.vpn_ip;

  scriptvpn.value =
`VPN criada com sucesso!

IP: ${json.vpn_ip}

===========================
CONFIGURAÇÃO ROUTEROS
===========================

${json.routeros}

===========================
CONFIGURAÇÃO WIREGUARD
===========================

${json.wireguard}`;
}

async function copiarVPN() {

    if (!scriptvpn.value.trim()) {
        alert("Nenhuma configuração gerada.");
        return;
    }

    try {

        await navigator.clipboard.writeText(scriptvpn.value);

    } catch {

        scriptvpn.select();
        document.execCommand("copy");

    }

    alert("Configuração copiada!");
}

async function excluirLogo() {

    if (!confirm("Excluir o logo?")) return;

    await db.storage
        .from("hotspot")
        .remove([
            `${APP_ID}/logo.jpg`,
            `${APP_ID}/logo.jpeg`,
            `${APP_ID}/logo.png`,
            `${APP_ID}/logo.webp`
        ]);

    await db
        .from("hotspot_config")
        .update({ logo: null })
        .eq("app_id", APP_ID);

    previewLogo.src = "";
    previewLogo.style.display = "none";

    carregar();
}

async function testarTelegram(){

    if(!telegram_token.value.trim()){
        return alert("Informe o Token.");
    }

    if(!telegram_chat_id.value.trim()){
        return alert("Informe o Chat ID.");
    }

    try{

        const resp = await fetch(
            `https://api.telegram.org/bot${telegram_token.value.trim()}/sendMessage`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    chat_id:telegram_chat_id.value.trim(),
                    text:"✅ FF Infra conectado com sucesso."
                })
            }
        );

        const json = await resp.json();

        if(json.ok){
            alert("Mensagem enviada com sucesso!");
        }else{
            alert("Erro: " + json.description);
        }

    }catch(e){
        console.error(e);
        alert("Erro ao conectar ao Telegram.");
    }

}
async function excluirBanner() {

    if (!confirm("Excluir o banner?")) return;

    await db.storage
        .from("hotspot")
        .remove([
            `${APP_ID}/banner.jpg`,
            `${APP_ID}/banner.jpeg`,
            `${APP_ID}/banner.png`,
            `${APP_ID}/banner.webp`
        ]);

    await db
        .from("hotspot_config")
        .update({ banner: null })
        .eq("app_id", APP_ID);

    previewBanner.src = "";
    previewBanner.style.display = "none";

    carregar();
}

carregar();

carregarMikrotiks();

</script>

</body>
</html>
