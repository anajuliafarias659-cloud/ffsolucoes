<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Equipamento - FF Infra</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0b1020;
    color:#fff;
}

header{

    height:70px;

    background:#141b2d;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 25px;

    border-bottom:1px solid #25314b;

}

.logo{

    font-size:24px;

    font-weight:bold;

}

.container{

    width:95%;

    max-width:1700px;

    margin:auto;

    padding:25px;

}

.topo{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

}

.nomeEquipamento{

    font-size:34px;

    font-weight:bold;

}

.status{

    padding:8px 18px;

    border-radius:20px;

    font-weight:bold;

}

.online{

    background:#0f5132;

    color:#00ff8a;

}

.warning{

    background:#5d4700;

    color:#ffd54f;

}

.offline{

    background:#4b1717;

    color:#ff6464;

}

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:18px;

    margin-bottom:25px;

}

.card{

    background:#141b2d;

    border:1px solid #26334d;

    border-radius:15px;

    padding:18px;

}

.cardTitulo{

    color:#9fb0cb;

    margin-bottom:8px;

    font-size:14px;

}

.cardValor{

    font-size:28px;

    font-weight:bold;

}

.infoGrid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

    margin-bottom:25px;

}

.infoBox{

    background:#141b2d;

    border:1px solid #26334d;

    border-radius:15px;

    padding:20px;

}

.infoBox h2{

    margin-bottom:20px;

}

.infoLinha{

    display:flex;

    justify-content:space-between;

    padding:10px 0;

    border-bottom:1px solid #25314b;

}

.infoLinha:last-child{

    border:none;

}

.graficos{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

    margin-bottom:25px;

}

.grafico{

    background:#141b2d;

    border:1px solid #26334d;

    border-radius:15px;

    padding:20px;

}

canvas{

    height:280px !important;

}

.eventos{

    background:#141b2d;

    border:1px solid #26334d;

    border-radius:15px;

    padding:20px;

    margin-bottom:25px;

}

.evento{

    padding:12px;

    border-bottom:1px solid #25314b;

}

.evento:last-child{

    border:none;

}

.botoes{

    display:flex;

    gap:15px;

    flex-wrap:wrap;

}

.btn{

    background:#00b96b;

    color:#fff;

    border:none;

    padding:12px 22px;

    border-radius:10px;

    cursor:pointer;

}

.btn:hover{

    background:#00d777;

}

@media(max-width:900px){

.infoGrid{

grid-template-columns:1fr;

}

.graficos{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

🖥 FF Infra

</div>

<div>

<button class="btn" onclick="history.back()">

← Voltar

</button>

</div>

</header>

<div class="container">

<div class="topo">

<div>

<div class="nomeEquipamento" id="nome">

Carregando...

</div>

</div>

<div>

<span class="status online" id="status">

ONLINE

</span>

</div>

</div>

<div class="cards">

<div class="card">
<div class="cardTitulo">📶 Ping</div>
<div class="cardValor" id="ping">0 ms</div>
</div>

<div class="card">
<div class="cardTitulo">⚡ Latência</div>
<div class="cardValor" id="latencia">0 ms</div>
</div>

<div class="card">
<div class="cardTitulo">💾 CPU</div>
<div class="cardValor" id="cpu">0%</div>
</div>

<div class="card">
<div class="cardTitulo">🧠 RAM</div>
<div class="cardValor" id="ram">0%</div>
</div>

<div class="card">
<div class="cardTitulo">🌡 Temperatura</div>
<div class="cardValor" id="temperatura">0°C</div>
</div>

<div class="card">
<div class="cardTitulo">🌐 Uptime</div>
<div class="cardValor" id="uptime">-</div>
</div>

</div>

<div class="infoGrid">

<div class="infoBox">

<h2>Informações</h2>

<div class="infoLinha"><span>Gateway</span><b id="gateway">-</b></div>

<div class="infoLinha"><span>IP</span><b id="ip">-</b></div>

<div class="infoLinha"><span>MAC</span><b id="mac">-</b></div>

<div class="infoLinha"><span>Interface</span><b id="interface">-</b></div>

<div class="infoLinha"><span>Fabricante</span><b id="fabricante">-</b></div>

<div class="infoLinha"><span>Modelo</span><b id="modelo">-</b></div>

</div>

<div class="infoBox">

<h2>Tráfego</h2>

<div class="infoLinha"><span>Download</span><b id="download">0 Mbps</b></div>

<div class="infoLinha"><span>Upload</span><b id="upload">0 Mbps</b></div>

<div class="infoLinha"><span>Perda</span><b id="perda">0%</b></div>

<div class="infoLinha"><span>Última resposta</span><b id="ultima">-</b></div>

</div>

</div>

<div class="graficos">

<div class="grafico">

<h2>📈 Ping</h2>

<canvas id="graficoPing"></canvas>

</div>

<div class="grafico">

<h2>📉 Latência</h2>

<canvas id="graficoLatencia"></canvas>

</div>

</div>

<div class="eventos">

<h2>Últimos Eventos</h2>

<div id="listaEventos">

Carregando...

</div>

</div>

<div class="botoes">

<button class="btn" id="btnWeb">

🌐 Abrir Web

</button>

<button class="btn" id="btnWinbox">

🖥 Winbox

</button>

<button class="btn" id="btnSSH">

📡 SSH

</button>

<button class="btn" id="btnEditar">

✏ Editar

</button>

</div>

</div>

<script>

// CONFIGURE AQUI
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const db = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

console.log("TESTE EVENTOS:", teste);

const id = new URLSearchParams(location.search).get("id");

let equipamento = {};
let gatewayInfo = {};
let graficoPing = null;
let graficoLatencia = null;

window.onload = iniciar;

async function iniciar(){

    if(!id){
        alert("ID do equipamento não informado.");
        history.back();
        return;
    }

    await carregarEquipamento();
    await carregarHistorico();
    await carregarEventos();

    setInterval(async()=>{
        await carregarEquipamento();
    },5000);

}

async function carregarEquipamento(){

    const { data, error } = await db.
    .from("monitor_equipamentos")
    .select("*")
    .eq("id", id)
    .single();

    if(error){

        console.log(error);

        return;

    }

    equipamento=data;

    if(equipamento.gateway_id){

        const { data: gw } = await db
    .from("monitor_gateways")
    .select("*")
    .eq("id", equipamento.gateway_id)
    .single();

        gatewayInfo = gw || {};

    }

    atualizarTela();

}

function atualizarTela(){

    document.getElementById("nome").innerHTML =
        equipamento.nome || "-";

    document.getElementById("gateway").innerHTML =
        gatewayInfo.nome || "-";

    document.getElementById("ip").innerHTML =
        equipamento.ip || "-";

    document.getElementById("mac").innerHTML =
        equipamento.mac || "-";

    document.getElementById("interface").innerHTML =
        equipamento.interface || equipamento.porta || "-";

    document.getElementById("fabricante").innerHTML =
        equipamento.fabricante || "-";

    document.getElementById("modelo").innerHTML =
        equipamento.modelo || "-";

    document.getElementById("ping").innerHTML =
        (equipamento.ping || 0) + " ms";

    document.getElementById("latencia").innerHTML =
        (equipamento.latencia || 0) + " ms";

    document.getElementById("cpu").innerHTML =
        (equipamento.cpu || 0) + "%";

    document.getElementById("ram").innerHTML =
        (equipamento.ram || 0) + "%";

    document.getElementById("temperatura").innerHTML =
        (equipamento.temperatura || 0) + "°C";

    document.getElementById("uptime").innerHTML =
        equipamento.uptime || "-";

    document.getElementById("download").innerHTML =
        (equipamento.download_mbps || 0) + " Mbps";

    document.getElementById("upload").innerHTML =
        (equipamento.upload_mbps || 0) + " Mbps";

    document.getElementById("perda").innerHTML =
        (equipamento.perda || 0) + "%";

    document.getElementById("ultima").innerHTML =
        equipamento.ultima_resposta
            ? new Date(equipamento.ultima_resposta).toLocaleString("pt-BR")
            : "-";

    atualizarStatus();

}

function atualizarStatus(){

    let classe="online";

    let texto="ONLINE";

    if((equipamento.ping||0)<=0){

        classe="offline";

        texto="OFFLINE";

    }

    if((equipamento.latencia||0)>80){

        classe="warning";

        texto="ALERTA";

    }

    status.className="status "+classe;

    status.innerHTML=texto;

}
// ==============================
// HISTÓRICO
// ==============================

async function carregarHistorico(){

    const { data, error } = await db
        .from("monitor_ping_historico")
        .select("*")
        .eq("equipamento_id", id)
        .order("created_at", { ascending: true });

    console.log("ID da URL:", id);
    console.log("Histórico:", data);

    if(error){
        console.log(error);
        return;
    }

    desenharGraficos(data || []);

}
// ==============================
// GRÁFICOS
// ==============================

function desenharGraficos(lista){

    const labels = lista.map(x =>
        new Date(x.created_at).toLocaleTimeString("pt-BR")
    );

    const ping = lista.map(x => Number(x.ping || 0));

    const latencia = lista.map(x => Number(x.latencia || 0));

    if(graficoPing) graficoPing.destroy();
    if(graficoLatencia) graficoLatencia.destroy();

    graficoPing = new Chart(
        document.getElementById("graficoPing"),
        {
            type:"line",

            data:{
                labels,
                datasets:[{
                    label:"Ping (ms)",
                    data:ping,
                    borderColor:"#00bfff",
                    backgroundColor:"rgba(0,191,255,.15)",
                    fill:true,
                    tension:.35,
                    pointRadius:3,
                    pointHoverRadius:5
                }]
            },

            options:{

                responsive:true,
                maintainAspectRatio:false,

                plugins:{
                    legend:{
                        labels:{
                            color:"#ffffff"
                        }
                    }
                },

                scales:{

                    x:{
                        ticks:{
                            color:"#9fb0cb"
                        },
                        grid:{
                            color:"rgba(255,255,255,.05)"
                        }
                    },

                    y:{
                        beginAtZero:false,
                        suggestedMin:Math.max(0,Math.min(...ping)-1),
                        suggestedMax:Math.max(...ping)+1,
                        ticks:{
                            color:"#9fb0cb"
                        },
                        grid:{
                            color:"rgba(255,255,255,.05)"
                        }
                    }

                }

            }

        }
    );

    graficoLatencia = new Chart(
        document.getElementById("graficoLatencia"),
        {
            type:"line",

            data:{
                labels,
                datasets:[{
                    label:"Latência (ms)",
                    data:latencia,
                    borderColor:"#00ff88",
                    backgroundColor:"rgba(0,255,136,.15)",
                    fill:true,
                    tension:.35,
                    pointRadius:3,
                    pointHoverRadius:5
                }]
            },

            options:{

                responsive:true,
                maintainAspectRatio:false,

                plugins:{
                    legend:{
                        labels:{
                            color:"#ffffff"
                        }
                    }
                },

                scales:{

                    x:{
                        ticks:{
                            color:"#9fb0cb"
                        },
                        grid:{
                            color:"rgba(255,255,255,.05)"
                        }
                    },

                    y:{
                        beginAtZero:false,
                        suggestedMin:Math.max(0,Math.min(...latencia)-0.5),
                        suggestedMax:Math.max(...latencia)+0.5,
                        ticks:{
                            color:"#9fb0cb"
                        },
                        grid:{
                            color:"rgba(255,255,255,.05)"
                        }
                    }

                }

            }

        }
    );

}

// ==============================
// EVENTOS
// ==============================

async function carregarEventos(){

    console.log("ID da URL:", id);

    const { data, error } = await db
        .from("monitor_eventos")
        .select("*")
        .eq("equipamento_id", id)
        .order("created_at", { ascending: false })
        .limit(20);

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if(error){
        console.log(error);
        listaEventos.innerHTML = "Nenhum evento.";
        return;
    }

    if(!data || data.length === 0){
        listaEventos.innerHTML = "Nenhum evento.";
        return;
    }

    listaEventos.innerHTML = data.map(e => `
        <div class="evento">
            <b>${e.titulo || e.tipo || "Evento"}</b><br>
            ${e.descricao || ""}<br>
            <small>${new Date(e.created_at).toLocaleString("pt-BR")}</small>
        </div>
    `).join("");

}

// ==============================
// BOTÕES
// ==============================

btnEditar.onclick=()=>{

    location.href="equipamentos.html?id="+id;

};
  //========================================
// ATUALIZAÇÃO AUTOMÁTICA
//========================================

async function atualizar(){

    await carregarEquipamento();

    await carregarHistorico();

    await carregarEventos();

}

setInterval(atualizar,10000);

//========================================
// REALTIME SUPABASE
//========================================

db
.channel("equipamento-"+id)

.on(

"postgres_changes",

{

event:"UPDATE",

schema:"public",

table:"monitor_equipamentos",

filter:`id=eq.${id}`

},

payload=>{

equipamento=payload.new;

atualizarTela();

}

)

.subscribe();

//========================================
// FORMATADORES
//========================================

function formatarMbps(valor){

    valor=Number(valor||0);

    if(valor>=1000){

        return (valor/1000).toFixed(2)+" Gbps";

    }

    return valor.toFixed(2)+" Mbps";

}

function formatarTempo(segundos){

    segundos=Number(segundos||0);

    let d=Math.floor(segundos/86400);

    segundos%=86400;

    let h=Math.floor(segundos/3600);

    segundos%=3600;

    let m=Math.floor(segundos/60);

    if(d>0) return `${d}d ${h}h`;

    if(h>0) return `${h}h ${m}m`;

    return `${m} min`;

}

//========================================
// CORES DOS CARDS
//========================================

function pintarCard(id,valor,bom,medio){

    const el=document.getElementById(id);

    if(!el) return;

    el.style.color="#ffffff";

    if(valor>=medio){

        el.style.color="#ffd54f";

    }

    if(valor>=bom){

        el.style.color="#ff5252";

    }

}

function atualizarCores(){

    pintarCard("cpu",equipamento.cpu,90,70);

    pintarCard("ram",equipamento.ram,90,70);

    pintarCard("latencia",equipamento.latencia,80,40);

}

//========================================
// ABRIR WEB
//========================================

btnWeb.onclick=()=>{

    if(!equipamento.ip)return;

    window.open("http://"+equipamento.ip,"_blank");

};

//========================================
// SSH
//========================================

btnSSH.onclick=()=>{

    navigator.clipboard.writeText(equipamento.ip);

    alert("IP copiado para acesso SSH.");

};

//========================================
// WINBOX
//========================================

btnWinbox.onclick=()=>{

    navigator.clipboard.writeText(equipamento.ip);

    alert("IP copiado para Winbox.");

};

//========================================
// EDITAR
//========================================

btnEditar.onclick=()=>{

    location.href="equipamentos.html?editar="+id;

};

//========================================
// CHAMADO NO FINAL
//========================================

setTimeout(()=>{

    atualizarCores();

},1000);
 </script> 
  </body>
</html>
