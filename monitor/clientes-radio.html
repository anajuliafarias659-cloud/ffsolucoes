<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Clientes Rádio</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="container">

<header>

<h1>

<i class="fa-solid fa-tower-broadcast"></i>

Clientes Rádio

</h1>

<button
class="btnNovo"
onclick="abrirNovo()">

<i class="fa-solid fa-plus"></i>

Novo Cliente

</button>

</header>

<div class="cards">

<div class="card verde">

<div>

<span>ONLINE</span>

<h2 id="totalOnline">0</h2>

</div>

<i class="fa-solid fa-circle-check"></i>

</div>

<div class="card amarelo">

<div>

<span>ATENÇÃO</span>

<h2 id="totalAtencao">0</h2>

</div>

<i class="fa-solid fa-triangle-exclamation"></i>

</div>

<div class="card vermelho">

<div>

<span>OFFLINE</span>

<h2 id="totalOffline">0</h2>

</div>

<i class="fa-solid fa-circle-xmark"></i>

</div>

<div class="card azul">

<div>

<span>SINAL MÉDIO</span>

<h2 id="mediaSinal">-</h2>

</div>

<i class="fa-solid fa-signal"></i>

</div>

</div>

<div class="barra">

<input
id="busca"
type="text"
placeholder="Pesquisar cliente..."
onkeyup="filtrarClientes()">

<select
id="filtroStatus"
onchange="filtrarClientes()">

<option value="">Todos</option>

<option value="online">Online</option>

<option value="warning">Atenção</option>

<option value="offline">Offline</option>

</select>

</div>

<div class="tabela">

<table>

<thead>

<tr>

<th>Status</th>

<th>Cliente</th>

<th>Torre</th>

<th>Equipamento</th>

<th>IP</th>

<th>Sinal</th>

<th>CCQ</th>

<th>Ping</th>

<th>Latência</th>

<th>Gateway</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="tabelaClientes">

<tr>

<td colspan="11">

Carregando...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<div
class="modal"
id="modalCliente">

<div class="modalBox">

<h2>

Cliente Rádio

</h2>

<input
type="hidden"
id="id">

<label>

Cliente

</label>

<input
id="cliente"
type="text">

<label>

Gateway

</label>

<select id="gateway">

</select>

<label>

Torre

</label>

<input
id="torre"
type="text">

<label>

Equipamento

</label>

<select id="equipamento">

<option value="PowerBeam">PowerBeam</option>

<option value="LiteBeam">LiteBeam</option>

<option value="NanoBeam">NanoBeam</option>

<option value="Rocket">Rocket</option>

<option value="MikroTik">MikroTik</option>

<option value="Outro">Outro</option>

</select>

<label>

IP

</label>

<input
id="ip"
type="text">

<label>

MAC (Opcional)

</label>

<input
id="mac"
type="text">

<div class="acoesModal">

<button
class="btnSalvar"
onclick="salvarCliente()">

Salvar

</button>

<button
class="btnCancelar"
onclick="fecharModal()">

Cancelar

</button>

</div>

</div>

</div>

<script src="clientes-radio.js"></script>

</body>

</html>
