<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Infra | Monitor Rádio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0f172a;
color:#fff;

}

header{

height:65px;

background:#111827;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

border-bottom:1px solid #334155;

}

.container{

width:95%;

max-width:1400px;

margin:25px auto;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.card{

background:#1e293b;

padding:25px;

border-radius:12px;

text-align:center;

border:1px solid #334155;

}

.numero{

font-size:42px;

font-weight:bold;

margin-bottom:10px;

color:#22c55e;

}

.lista{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:15px;

}

.setorial{

background:#1e293b;

padding:18px;

border-radius:10px;

border:1px solid #334155;

display:flex;

justify-content:space-between;

align-items:center;

cursor:pointer;

transition:.2s;

}

.setorial:hover{

border-color:#22c55e;

transform:translateY(-2px);

}

.vazio{

text-align:center;

padding:50px;

opacity:.7;

}

</style>

</head>

<body>

<header>

<h2>📡 FF Infra</h2>

<div>Monitor Rádio</div>

</header>

<div class="container">

<div class="cards">

<div class="card">

<div
class="numero"
id="totalClientes">

0

</div>

Clientes Rádio

</div>

<div class="card">

<div
class="numero"
id="totalSetoriais">

0

</div>

Setoriais

</div>

</div>

<h3 style="margin-bottom:20px;">

Distribuição por Setorial

</h3>

<div
class="lista"
id="listaSetoriais">

<div class="vazio">

Nenhuma setorial encontrada.

</div>

</div>

</div>

<script>

const SUPABASE_URL="https://pdajixsoowcyhnjwhgpc.supabase.co";

const SUPABASE_KEY="sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";


const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function carregarClientes() {

    const { data, error } = await supabase
        .from("monitor_clientes_radio")
        .select("cliente,setorial");

    if (error) {
        console.error(error);
        return;
    }

    clientes = data || [];

    // Total de clientes
    document.getElementById("totalClientes").textContent = clientes.length;

    // Agrupa por setorial
    const setoriais = {};

    clientes.forEach(cliente => {

        const nome = cliente.setorial || "Sem Setorial";

        if (!setoriais[nome]) {
            setoriais[nome] = 0;
        }

        setoriais[nome]++;

    });

    // Total de setoriais
    document.getElementById("totalSetoriais").textContent =
        Object.keys(setoriais).length;

    // Desenha a lista
    const lista = document.getElementById("listaSetoriais");

    lista.innerHTML = "";

    if (Object.keys(setoriais).length === 0) {

        lista.innerHTML = `
            <div class="vazio">
                Nenhuma setorial encontrada.
            </div>
        `;

        return;

    }

    Object.entries(setoriais).forEach(([nome, total]) => {

        lista.innerHTML += `
            <div class="setorial">

                <div class="nome">
                    📡 ${nome}
                </div>

                <div class="total">
                    ${total} Clientes
                </div>

            </div>
        `;

    });

}

let clientes=[];

window.onload = () => {

    carregarClientes();

};

</script>

</body>

</html>
