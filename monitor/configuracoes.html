
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Configurações Hotspot</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
}

.topo{
background:#0d8db8;
color:#fff;
padding:18px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:30px auto;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#0d8db8;
}

input,
textarea,
select{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;

}

textarea{

height:90px;

}

button{

padding:15px;
border:none;
background:#0d8db8;
color:#fff;
font-size:18px;
border-radius:10px;
cursor:pointer;
width:100%;

}

label{

font-weight:bold;

}

.check{

display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;

}

.check input{

width:auto;

}
.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.3s;
border-radius:34px;
}

.slider:before{
content:"";
position:absolute;
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.3s;
border-radius:50%;
}

.switch input:checked + .slider{
background:#0d8db8;
}

.switch input:checked + .slider:before{
transform:translateX(26px);
}
</style>

</head>

<body>

<div class="topo">

⚙ Configurações Hotspot

</div>

<div class="container">

<div class="card">

<h2>Empresa</h2>

<label>Nome</label>
<input id="nome">

<label>Descrição</label>
<textarea id="descricao"></textarea>

<label>Logo</label>
<input type="file" id="logoFile" accept="image/*">

<img id="previewLogo"
style="width:120px;border-radius:12px;margin-top:10px">
<div style="display:flex;gap:10px;margin-top:10px">

<button
type="button"
onclick="logoFile.click()">

Alterar Logo

</button>

<button
type="button"
style="background:#d32f2f"
onclick="excluirLogo()">

Excluir Logo

</button>

</div>

<label>Banner</label>
<input type="file" id="bannerFile" accept="image/*">

<img id="previewBanner"

style="width:100%;margin-top:10px;border-radius:12px">

<label>WhatsApp</label>
<input id="whatsapp">

</div>
<div style="display:flex;gap:10px;margin-top:10px">

<button
type="button"
onclick="bannerFile.click()">

Alterar Banner

</button>

<button
type="button"
style="background:#d32f2f"
onclick="excluirBanner()">

Excluir Banner

</button>

</div>
<div class="card">

<h2>Aparência</h2>

<label>Cor Principal</label>
<input type="color" id="cor">

<label>Cor Botão</label>
<input type="color" id="corbotao">

</div>

<div class="card">

<h2>Mercado Pago</h2>

<label>Access Token</label>
<input id="token">

<label>Public Key</label>
<input id="publickey">

</div>

<div class="card">

<h2>🌐 MikroTiks</h2>

<button
type="button"
onclick="novoMikrotik()">

➕ Adicionar MikroTik

</button>

<br><br>

<div id="listaMikrotiks">

Nenhum MikroTik cadastrado.

</div>

</div>

<div class="card">

<h2>VPN WireGuard</h2>

<label>IP VPN do MikroTik</label>
<input id="vpn_ip" placeholder="10.100.0.2">

<label>Endpoint da VPS</label>
<input id="vpn_endpoint" value="179.197.224.55">

<label>Porta WireGuard</label>
<input id="vpn_porta" value="51820">

<label>Configuração RouterOS</label>

<textarea
id="scriptvpn"
style="height:250px;font-family:monospace"
readonly></textarea>

<button type="button" onclick="copiarVPN()">
📋 Copiar Configuração
</button>

<br><br>

<button onclick="gerarVPN()">
Gerar Configuração VPN
</button>

</div>

<div class="card">

<h2>Opções</h2>

<h2>Modelo da Página</h2>

<div class="check">

<span>Clássico</span>

<label class="switch">
<input type="checkbox" id="modelo">
<span class="slider"></span>
</label>

<span>Moderno</span>

</div>

<div class="check">
<input type="checkbox" id="pix">
<label for="pix">Pagamento PIX</label>
</div>

<div class="check">
<input type="checkbox" id="voucher">
<label for="voucher">Voucher</label>
</div>

<div class="check">
<input type="checkbox" id="mac">
<label for="mac">Login por MAC</label>
</div>

<div class="check">
<input type="checkbox" id="ativo">
<label for="ativo">Sistema Ativo</label>
</div>

</div>

<button onclick="salvar()">

Salvar Configurações

</button>

</div>

<script>

const db=window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let APP_ID = null;

async function carregarUsuario() {

    const {
        data: { session }
    } = await db.auth.getSession();

    if (!session) {
        location.href = "/auth/login.html";
        return;
    }

    const { data: usuario } = await db
        .from("usuarios")
        .select("app_id")
        .eq("id", session.user.id)
        .single();

    APP_ID = usuario.app_id;

    carregar();
}

carregarUsuario();
const nome = document.getElementById("nome");
const descricao = document.getElementById("descricao");
const logoFile = document.getElementById("logoFile");
const bannerFile = document.getElementById("bannerFile");

const previewLogo = document.getElementById("previewLogo");
const previewBanner = document.getElementById("previewBanner");
const whatsapp = document.getElementById("whatsapp");

const cor = document.getElementById("cor");
const corbotao = document.getElementById("corbotao");

const token = document.getElementById("token");
const publickey = document.getElementById("publickey");

const vpn_ip = document.getElementById("vpn_ip");
const scriptvpn = document.getElementById("scriptvpn");

const modelo = document.getElementById("modelo");
const pix = document.getElementById("pix");
const voucher = document.getElementById("voucher");
const mac = document.getElementById("mac");
const ativo = document.getElementById("ativo");


async function carregar() {

    const { data, error } = await db
        .from("hotspot_config")
        .select("*")
        .eq("app_id", APP_ID)
        .maybeSingle();

    if (error) {
        console.error(error);
        return;
    }

    if (!data) {

        const { error: erroInsert } = await db
            .from("hotspot_config")
            .insert({
                app_id: APP_ID
            });

        if (erroInsert) {
            console.error(erroInsert);
            return;
        }

        return carregar();
    }

    nome.value = data.nome_hotspot || "";
    descricao.value = data.descricao || "";
    if (data.logo) {
    previewLogo.src = data.logo;
    previewLogo.style.display = "block";
}

if (data.banner) {
    previewBanner.src = data.banner;
    previewBanner.style.display = "block";
}
    whatsapp.value = data.whatsapp || "";

    cor.value = data.cor_primaria || "#0d8db8";
    corbotao.value = data.cor_botao || "#0d8db8";

    token.value = data.mercado_pago_token || "";
    publickey.value = data.mercado_pago_public_key || "";
  
    pix.checked = !!data.login_por_pix;
    voucher.checked = !!data.login_por_voucher;
    mac.checked = !!data.login_por_mac;
    ativo.checked = !!data.ativo;
modelo.checked = data.modelo === "indexx.html";
}

async function salvar() {

    // Mantém os valores atuais caso o usuário não escolha outra imagem
const { data: atual } = await db
    .from("hotspot_config")
    .select("logo,banner")
    .eq("app_id", APP_ID)
    .single();

let logoURL = atual?.logo || null;
let bannerURL = atual?.banner || null;

// =======================
// UPLOAD DO LOGO
// =======================

if (logoFile.files.length > 0) {

    const arquivo = logoFile.files[0];

    const extensao = arquivo.name.split(".").pop().toLowerCase();

await db.storage
    .from("hotspot")
    .remove([
        `${APP_ID}/logo.jpg`,
        `${APP_ID}/logo.jpeg`,
        `${APP_ID}/logo.png`,
        `${APP_ID}/logo.webp`
    ]);

const nomeArquivo = `${APP_ID}/logo.${extensao}`;

    const { error: erroUpload } = await db.storage
        .from("hotspot")
        .upload(nomeArquivo, arquivo, {
            upsert: true
        });

    if (erroUpload) {

    console.error("ERRO BANNER:", erroUpload);
    alert("Erro no banner: " + erroUpload.message);
    return;

} else {

        logoURL = db.storage
            .from("hotspot")
            .getPublicUrl(nomeArquivo)
            .data.publicUrl;

    }

}

// =======================
// UPLOAD DO BANNER
// =======================

if (bannerFile.files.length > 0) {

    const arquivo = bannerFile.files[0];

    const extensao = arquivo.name.split(".").pop().toLowerCase();

await db.storage
    .from("hotspot")
    .remove([
        `${APP_ID}/banner.jpg`,
        `${APP_ID}/banner.jpeg`,
        `${APP_ID}/banner.png`,
        `${APP_ID}/banner.webp`
    ]);

const nomeArquivo = `${APP_ID}/banner.${extensao}`;

    const { error: erroUpload } = await db.storage
        .from("hotspot")
        .upload(nomeArquivo, arquivo, {
            upsert: true
        });

    if (erroUpload) {

        console.error(erroUpload);

    } else {

        bannerURL = db.storage
            .from("hotspot")
            .getPublicUrl(nomeArquivo)
            .data.publicUrl;

    }

}

    const { error } = await db
        .from("hotspot_config")
        .update({

            nome_hotspot: nome.value,
            descricao: descricao.value,

            logo: logoURL,
            banner: bannerURL,

            whatsapp: whatsapp.value,

            cor_primaria: cor.value,
            cor_botao: corbotao.value,

            mercado_pago_token: token.value.trim(),
            mercado_pago_public_key: publickey.value.trim(),

            mikrotik_ip: ip.value,
            mikrotik_porta: Number(porta.value),
            mikrotik_usuario: usuario.value,
            mikrotik_senha: senha.value,
            mikrotik_hotspot: hotspot.value,

            login_por_pix: pix.checked,
            login_por_voucher: voucher.checked,
            login_por_mac: mac.checked,
            ativo: ativo.checked,

            modelo: modelo.checked
                ? "indexx.html"
                : "index.html"

        })
        .eq("app_id", APP_ID);

    if (error) {
        console.error(error);
        alert(error.message);
        return;
    }

    alert("Configuração salva com sucesso!");

    carregarUsuario();
}

async function gerarVPN(mikrotik_id) {

    const resp = await fetch(
        "https://hotspot.ffsolucoes.com.br/vpn/criar-peer",
        {
            method: "POST",
            headers:{
                "Content-Type":"application/json",
                "x-gateway-key":"ff_hotspot_2026_super_secreta"
            },
            body:JSON.stringify({
                app_id: APP_ID,
                mikrotik_id: mikrotik_id
            })
        }
    );

    const json = await resp.json();

    if (!json.sucesso) {

        alert(json.erro || "Erro ao gerar VPN");
        return;

    }

    vpn_ip.value = json.vpn_ip;

    scriptvpn.value =
`VPN criada com sucesso!

IP: ${json.vpn_ip}

===========================
CONFIGURAÇÃO ROUTEROS
===========================

${json.routeros}

===========================
CONFIGURAÇÃO WIREGUARD
===========================

${json.wireguard}`;

}

async function copiarVPN() {

    if (!scriptvpn.value.trim()) {
        alert("Nenhuma configuração gerada.");
        return;
    }

    try {

        await navigator.clipboard.writeText(scriptvpn.value);

    } catch {

        scriptvpn.select();
        document.execCommand("copy");

    }

    alert("Configuração copiada!");
}

async function excluirLogo() {

    if (!confirm("Excluir o logo?")) return;

    await db.storage
        .from("hotspot")
        .remove([
            `${APP_ID}/logo.jpg`,
            `${APP_ID}/logo.jpeg`,
            `${APP_ID}/logo.png`,
            `${APP_ID}/logo.webp`
        ]);

    await db
        .from("hotspot_config")
        .update({ logo: null })
        .eq("app_id", APP_ID);

    previewLogo.src = "";
    previewLogo.style.display = "none";

    carregarUsuario();
}

async function excluirBanner() {

    if (!confirm("Excluir o banner?")) return;

    await db.storage
        .from("hotspot")
        .remove([
            `${APP_ID}/banner.jpg`,
            `${APP_ID}/banner.jpeg`,
            `${APP_ID}/banner.png`,
            `${APP_ID}/banner.webp`
        ]);

    await db
        .from("hotspot_config")
        .update({ banner: null })
        .eq("app_id", APP_ID);

    previewBanner.src = "";
    previewBanner.style.display = "none";

    carregarUsuario();
}

carregarUsuario();
/*=========================================
SALVAR EQUIPAMENTO
=========================================*/

async function salvarEquipamento(){

    const nome=document.getElementById("nome").value.trim();

    const tipo=document.getElementById("tipo").value;

    const gateway=document.getElementById("gateway").value;

    const mac=document.getElementById("mac").value
        .trim()
        .toUpperCase();

    const descricao=document.getElementById("descricao").value;

    if(!nome){

        alert("Informe o nome.");

        return;

    }

    if(!gateway){

        alert("Selecione um gateway.");

        return;

    }

    const dados={

        app_id:APP_ID,

        gateway_id:gateway,

        nome,

        tipo,

        mac,

        descricao,

        status:"offline"

    };

    let retorno;

    if(editando){

        retorno=await supabase

        .from("monitor_equipamentos")

        .update(dados)

        .eq("id",editando);

    }else{

        retorno=await supabase

        .from("monitor_equipamentos")

        .insert(dados);

    }

    if(retorno.error){

        console.log(retorno.error);

        alert(retorno.error.message);

        return;

    }

    fecharModal();

    carregarEquipamentos();

}

/*=========================================
EDITAR
=========================================*/

function editar(id){

    const eq=equipamentos.find(x=>x.id==id);

    if(!eq)return;

    editando=id;

    document.getElementById("nome").value=eq.nome||"";

    document.getElementById("tipo").value=eq.tipo||"";

    document.getElementById("gateway").value=eq.gateway_id||"";

    document.getElementById("mac").value=eq.mac||"";

    document.getElementById("descricao").value=eq.descricao||"";

    document.getElementById("modal").style.display="flex";

}

/*=========================================
EXCLUIR
=========================================*/

async function excluirEquipamento(id){

    if(!confirm("Excluir equipamento?"))

        return;

    const {error}=await supabase

    .from("monitor_equipamentos")

    .delete()

    .eq("id",id);

    if(error){

        alert(error.message);

        return;

    }

    carregarEquipamentos();

}

async function salvarMikrotik(){

    const { data, error } = await db
        .from("hotspot_mikrotiks")
        .insert({

            app_id: APP_ID,

            nome: document.getElementById("mk_nome").value,

            ip: document.getElementById("mk_ip").value,

            porta: Number(document.getElementById("mk_porta").value),

            usuario: document.getElementById("mk_usuario").value,

            senha: document.getElementById("mk_senha").value,

            hotspot: document.getElementById("mk_hotspot").value

        })
        .select()
        .single();

    if(error){

        alert(error.message);
        return;

    }

    fecharModalMikrotik();

alert("MikroTik cadastrado com sucesso!");

await carregarMikrotiks();

    // Depois vamos gerar a VPN
    // await gerarVPN(data.id);

}

function novoMikrotik(){

    document.getElementById("modalMikrotik").style.display="flex";

}

function fecharModalMikrotik(){

    document.getElementById("modalMikrotik").style.display="none";

}

/*=========================================
MONITORAR
=========================================*/

async function monitorar(id){

    alert("Na próxima etapa vamos consultar o MikroTik e localizar o equipamento.");

}


async function carregarMikrotiks(){

    const { data, error } = await db
        .from("hotspot_mikrotiks")
        .select("*")
        .eq("app_id", APP_ID)
        .order("id");

    if(error){
        console.log(error);
        return;
    }

    const lista=document.getElementById("listaMikrotiks");

    if(!data || data.length===0){

        lista.innerHTML="Nenhum MikroTik cadastrado.";

        return;

    }

    lista.innerHTML=data.map(mk=>`

<div class="card">

<b>${mk.nome}</b><br>

VPN: ${mk.vpn_ip || "Não gerada"}<br><br>

<button onclick="gerarVPN(${mk.id})">

Gerar VPN

</button>

</div>

`).join("");

}
/*=========================================
FILTRO
=========================================*/

function filtrarEquipamentos(){

    const texto=document
        .getElementById("pesquisa")
        .value
        .toLowerCase();

    document
    .querySelectorAll("#tabelaEquipamentos tr")
    .forEach(linha=>{

        linha.style.display=

        linha.innerText
        .toLowerCase()
        .includes(texto)

        ? ""

        : "none";

    });

}

/*=========================================
INICIAR
=========================================*/


</script>
<div id="modalMikrotik"
style="display:none;position:fixed;inset:0;background:#0008;align-items:center;justify-content:center;z-index:9999;">

<div style="background:#fff;padding:20px;border-radius:12px;width:95%;max-width:500px;">

<h2>Novo MikroTik</h2>

<label>Nome</label>
<input id="mk_nome">

<label>IP</label>
<input id="mk_ip">

<label>Porta</label>
<input id="mk_porta" value="8728">

<label>Usuário</label>
<input id="mk_usuario">

<label>Senha</label>
<input id="mk_senha" type="password">

<label>Hotspot</label>
<input id="mk_hotspot">

<button onclick="salvarMikrotik()">

Salvar

</button>

<br><br>

<button
style="background:#999"
onclick="fecharModalMikrotik()">

Cancelar

</button>

</div>

</div>
</body>
</html>
