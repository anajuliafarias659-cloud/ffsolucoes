<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Equipamentos - FF Infra</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{

    background:#0b1020;
    color:#fff;

}

header{

    height:70px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 30px;

    background:#141b2d;

    border-bottom:1px solid #232c42;

    position:sticky;

    top:0;

    z-index:100;

}

.logo{

    font-size:24px;

    font-weight:700;

}

.usuario{

    font-size:15px;

    opacity:.8;

}

.container{

    width:95%;

    max-width:1700px;

    margin:auto;

    padding:30px 0;

}

.topo{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

}

.topo h1{

    font-size:34px;

    margin-bottom:8px;

}

.topo p{

    color:#bfc6d5;

}

.btnNovo{

    background:#00b96b;

    color:#fff;

    border:none;

    padding:14px 25px;

    border-radius:10px;

    cursor:pointer;

    font-size:15px;

    font-weight:600;

    transition:.25s;

}

.btnNovo:hover{

    transform:translateY(-2px);

    background:#0fd37d;

}

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-bottom:25px;

}

.cardResumo{

    background:#141b2d;

    border:1px solid #232c42;

    border-radius:15px;

    padding:25px;

    text-align:center;

    transition:.25s;

}

.cardResumo:hover{

    transform:translateY(-4px);

    border-color:#00b96b;

}

.numero{

    font-size:42px;

    font-weight:700;

}

.numero.online{

    color:#2ecc71;

}

.numero.offline{

    color:#ff5252;

}

.titulo{

    margin-top:10px;

    color:#bfc6d5;

}

.barra{

    display:flex;

    gap:15px;

    margin-bottom:25px;

    flex-wrap:wrap;

}

.barra input{

    flex:1;

    min-width:250px;

}

.barra input,

.barra select,

.barra button{

    height:46px;

    border-radius:10px;

    border:none;

    padding:0 15px;

    font-size:15px;

}

.barra input,

.barra select{

    background:#141b2d;

    color:#fff;

    border:1px solid #2b3550;

}

.barra button{

    background:#0099ff;

    color:#fff;

    cursor:pointer;

    font-weight:600;

}

table{

    width:100%;

    border-collapse:collapse;

    background:#141b2d;

    border-radius:15px;

    overflow:hidden;

}

thead{

    background:#1b2338;

}

thead th{

    padding:16px;

    text-align:left;

    font-size:14px;

}

tbody td{

    padding:16px;

    border-top:1px solid #242f47;

    font-size:14px;

}

tbody tr{

    transition:.2s;

}

tbody tr:hover{

    background:#1a2237;

}

.status{

    width:14px;

    height:14px;

    border-radius:50%;

    display:inline-block;

}

.status.online{

    background:#2ecc71;

    box-shadow:0 0 10px #2ecc71;

}

.status.offline{

    background:#ff5252;

    box-shadow:0 0 10px #ff5252;

}

.status.warning{

    background:#f1c40f;

    box-shadow:0 0 10px #f1c40f;

}

.acoes{

    display:flex;

    gap:8px;

}

.acoes button{

    border:none;

    cursor:pointer;

    padding:9px 12px;

    border-radius:8px;

    color:#fff;

}

.btnEditar{

    background:#3498db;

}

.btnMonitorar{

    background:#00b96b;

}

.btnExcluir{

    background:#ff5252;

}

.modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.65);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:999;

}

.janela{

    width:760px;

    max-width:95%;

    background:#141b2d;

    border-radius:18px;

    padding:30px;

}

.janela h2{

    margin-bottom:20px;

}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

}

.col2{

    grid-column:span 2;

}

.grid label{

    display:block;

    margin-bottom:8px;

    color:#bfc6d5;

}

.grid input,

.grid select,

.grid textarea{

    width:100%;

    background:#0b1020;

    color:#fff;

    border:1px solid #2d3852;

    border-radius:10px;

    padding:12px;

    font-size:15px;

}

.grid textarea{

    resize:none;

}

.rodape{

    display:flex;

    justify-content:flex-end;

    gap:15px;

    margin-top:25px;

}

.cancelar{

    background:#3b4256;

    color:#fff;

    border:none;

    border-radius:10px;

    padding:13px 25px;

    cursor:pointer;

}

.salvar{

    background:#00b96b;

    color:#fff;

    border:none;

    border-radius:10px;

    padding:13px 30px;

    cursor:pointer;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

.col2{

grid-column:auto;

}

.topo{

flex-direction:column;

align-items:flex-start;

gap:20px;

}

.barra{

flex-direction:column;

}

table{

display:block;

overflow:auto;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

🖥️ FF Infra

</div>

<div class="usuario">

Administrador

</div>

</header>

<div class="container">

<div class="topo">

<div>

<h1>Equipamentos</h1>

<p>

Cadastro e Monitoramento Automático

</p>

</div>

<div>

<button class="btnNovo" onclick="abrirNovo()">

＋ Novo Equipamento

</button>

</div>

</div>

<div class="cards">

<div class="cardResumo">

<div class="numero" id="totalEquipamentos">

0

</div>

<div class="titulo">

Equipamentos

</div>

</div>

<div class="cardResumo">

<div class="numero online"

id="equipamentosOnline">

0

</div>

<div class="titulo">

Online

</div>

</div>

<div class="cardResumo">

<div class="numero offline"

id="equipamentosOffline">

0

</div>

<div class="titulo">

Offline

</div>

</div>

<div class="cardResumo">

<div class="numero"

id="equipamentosDescoberta">

0

</div>

<div class="titulo">

Descobertos

</div>

</div>

</div>

<div class="barra">

<input

id="pesquisa"

type="text"

placeholder="Pesquisar equipamento"

onkeyup="filtrarEquipamentos()"

>

<select id="filtroGateway">

<option value="">

Todos os Gateways

</option>

</select>

<select id="filtroTipo">

<option value="">

Todos os Tipos

</option>

<option>

Servidor

</option>

<option>

Switch

</option>

<option>

Rádio

</option>

<option>

ONU

</option>

<option>

Impressora

</option>

<option>

Câmera

</option>

<option>

Nobreak

</option>

<option>

Outro

</option>

</select>

<button onclick="carregarEquipamentos()">

Atualizar

</button>

</div>

<table>

<thead>

<tr>

<th>Status</th>

<th>Nome</th>

<th>Tipo</th>

<th>MAC</th>

<th>IP Atual</th>

<th>Gateway</th>

<th>Ping</th>

<th>Última Atualização</th>

<th width="220">

Ações

</th>

</tr>

</thead>

<tbody id="tabelaEquipamentos">

<tr>

<td colspan="9">

Carregando

</td>

</tr>

</tbody>

</table>

</div>

<div class="modal"

id="modal">

<div class="janela">

<h2>

Novo Equipamento

</h2>

<div class="grid">

<div>

<label>

Nome

</label>

<input

id="nome"

type="text">

</div>

<div>

<label>

Tipo

</label>

<select id="tipo">

<option>

Servidor

</option>

<option>

Switch

</option>

<option>

ONU

</option>

<option>

Rádio

</option>

<option>

Impressora

</option>

<option>

Câmera

</option>

<option>

Nobreak

</option>

<option>

Outro

</option>

</select>

</div>

<div>

<label>

Gateway

</label>

<select id="gateway">

</select>

</div>

<div>

<label>

MAC Address

</label>

<input

id="mac"

placeholder="AA:BB:CC:DD:EE:FF"

type="text">

</div>

<div class="col2">

<label>

Descrição

</label>

<textarea

id="descricao"

rows="5">

</textarea>

</div>

</div>

<div class="rodape">

<button

class="cancelar"

onclick="fecharModal()">

Cancelar

</button>

<button

class="salvar"

onclick="salvarEquipamento()">

Salvar

</button>

</div>

</div>

</div>

<script>

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

window.supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);


const APP_ID = new URLSearchParams(location.search).get("app_id");

let equipamentos = [];
let gateways = [];
let editando = null;

/*===============================
ABRIR MODAL
===============================*/

function abrirNovo(){

    editando = null;

    document.getElementById("modal").style.display="flex";

    document.getElementById("nome").value="";
    document.getElementById("mac").value="";
    document.getElementById("descricao").value="";

}

/*===============================
FECHAR MODAL
===============================*/

function fecharModal(){

    document.getElementById("modal").style.display="none";

}

/*===============================
CARREGA GATEWAYS
===============================*/

async function carregarGateways(){

    const {data,error}=await supabase

    .from("monitor_gateways")

    .select("*")

    .eq("app_id",APP_ID)

    .order("nome");

    if(error){

        console.error(error);

        return;

    }

    gateways=data||[];

    const combo=document.getElementById("gateway");

    const filtro=document.getElementById("filtroGateway");

    combo.innerHTML="";

    filtro.innerHTML='<option value="">Todos os Gateways</option>';

    gateways.forEach(g=>{

        combo.innerHTML+=`
        <option value="${g.id}">
            ${g.nome}
        </option>
        `;

        filtro.innerHTML+=`
        <option value="${g.id}">
            ${g.nome}
        </option>
        `;

    });

}

/*===============================
CARREGA EQUIPAMENTOS
===============================*/

async function carregarEquipamentos(){

    const {data,error}=await supabase

    .from("monitor_equipamentos")

    .select("*")

    .order("nome");

    if(error){

        console.error(error);

        return;

    }

    equipamentos=data||[];

    atualizarCards();

    desenharTabela();

}

/*===============================
ATUALIZA CARDS
===============================*/

function atualizarCards(){

    document.getElementById("totalEquipamentos").innerHTML=

        equipamentos.length;

    document.getElementById("equipamentosOnline").innerHTML=

        equipamentos.filter(e=>e.status=="online").length;

    document.getElementById("equipamentosOffline").innerHTML=

        equipamentos.filter(e=>e.status!="online").length;

    document.getElementById("equipamentosDescoberta").innerHTML =
    equipamentos.filter(e => e.ip).length;

}

/*===============================
DESENHA TABELA
===============================*/

function desenharTabela(){

    const tbody=document.getElementById("tabelaEquipamentos");

    tbody.innerHTML="";

    if(equipamentos.length==0){

        tbody.innerHTML=`
        <tr>

        <td colspan="9">

        Nenhum equipamento cadastrado.

        </td>

        </tr>
        `;

        return;

    }

    equipamentos.forEach(eq=>{

        tbody.innerHTML+=`

<tr>

<td>

<span class="status ${eq.status||'offline'}"></span>

</td>

<td>

${eq.nome}

</td>

<td>

${eq.tipo||''}

</td>

<td>

${eq.mac}

</td>

<td>

${eq.ip||'-'}

</td>

<td>

${gateways.find(g=>g.id===eq.gateway_id)?.nome || ""}

</td>

<td>

-

</td>

<td>

${eq.updated_at||'-'}

</td>

<td>

<div class="acoes">

<button

class="btnMonitorar"

onclick="monitorar('${eq.id}')">

Ping

</button>

<button

class="btnEditar"

onclick="editar('${eq.id}')">

Editar

</button>

<button

class="btnExcluir"

onclick="excluirEquipamento('${eq.id}')">

Excluir

</button>

</div>

</td>

</tr>

`;

    });

}
async function salvarEquipamento(){

    const nome=document.getElementById("nome").value.trim();

    const tipo=document.getElementById("tipo").value;

    const gateway=document.getElementById("gateway").value;

    const mac=document.getElementById("mac").value.toUpperCase();

    const observacao=document.getElementById("descricao").value;

    // VALIDAÇÃO
    if(!gateway){

        alert("Selecione um gateway.");

        return;

    }

    const dados={

        gateway_id:gateway,

        nome,

        tipo,

        mac,

        ip:"",

        fabricante:"",

        modelo:"",

        serial:"",

        status:"offline",

        monitorar:true,

        observacao

    };

    const {error}=await supabase
        .from("monitor_equipamentos")
        .insert(dados);

    if(error){

        alert(error.message);

        return;

    }

    fecharModal();

    carregarEquipamentos();

}

window.onload=async()=>{

    await carregarGateways();

    await carregarEquipamentos();

};

</script>

</body>

</html>
