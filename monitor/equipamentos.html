<script>

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

window.supabaseClient = window.supabase.createClient(

let APP_ID =
    new URLSearchParams(location.search).get("app_id");

if(!APP_ID){

    APP_ID = sessionStorage.getItem("app_id");

}

if(!APP_ID){

    APP_ID = localStorage.getItem("app_id");

}

console.log("APP_ID:", APP_ID);

let equipamentos = [];
let gateways = [];
let editando = null;
let neighborSelecionado = null;
/*===============================

function abrirNovo(){

document.getElementById("perfil_sinal").value = "";

document.getElementById("metodo").value="ping";
document.getElementById("porta_acesso").value="22";
document.getElementById("usuario").value="";
document.getElementById("senha").value="";
document.getElementById("snmp").value="public";
document.getElementById("ssh_key").value="";

}

async function atualizarTudo(){

    await carregarGateways();

    await carregarEquipamentos();

}

FECHAR MODAL

function fecharModal(){

    document.getElementById("modal").style.display="none";

}

/*===============================
CARREGA GATEWAYS
===============================*/

async function carregarGateways(){

    let consulta = window.supabaseClient
        .from("monitor_gateways")
        .select("*");

    if(APP_ID){

        consulta = consulta.eq("app_id", APP_ID);

    }

    const { data, error } = await consulta.order("nome");

    if(error){

        console.error(error);

        return;

    }

    gateways = data || [];

    const combo = document.getElementById("gateway");
    const filtro = document.getElementById("filtroGateway");

    combo.innerHTML = "";
    filtro.innerHTML = '<option value="">Todos os Gateways</option>';

    gateways.forEach(g=>{

        combo.innerHTML += `
            <option value="${g.id}">
                ${g.nome}
            </option>
        `;

        filtro.innerHTML += `
            <option value="${g.id}">
                ${g.nome}
            </option>
        `;

    });

}

/*===============================
CARREGA EQUIPAMENTOS
===============================*/

async function carregarEquipamentos(){

    let consulta = window.supabaseClient
    .from("monitor_equipamentos")
    .select("*");

if(APP_ID){

    consulta = consulta.eq("app_id", APP_ID);

}

const { data, error } =
    await consulta.order("nome");

    if(error){

        console.error(error);

        return;

    }

    equipamentos=data||[];

    atualizarCards();

    desenharTabela();

}

/*===============================
ATUALIZA CARDS
===============================*/

function atualizarCards(){

    let online = 0;
    let offline = 0;

    equipamentos.forEach(eq=>{

        const status = calcularStatus(eq);

        if(status=="online")
            online++;
        else
            offline++;

    });

    document.getElementById("totalEquipamentos").innerHTML =
        equipamentos.length;

    document.getElementById("equipamentosOnline").innerHTML =
        online;

    document.getElementById("equipamentosOffline").innerHTML =
        offline;

    document.getElementById("equipamentosDescoberta").innerHTML =
        equipamentos.filter(e=>e.ip).length;

}


function calcularStatus(eq){

    const ping = Number(eq.ping || 0);
    const perda = Number(eq.perda || 0);
    const lat = Number(eq.latencia || 0);

    if(ping == 0)
        return "offline";

    if(perda >= 50)
        return "offline";

    if(lat >= 10000)
        return "offline";

    if(lat > 100)
        return "offline";

    if(lat > 50 || perda > 10)
        return "warning";

    return "online";

}

function corLatencia(lat){

    lat = Number(lat);

    if(!lat)
        return "#999";

    if(lat <= 5)
        return "#00e676";

    if(lat <= 20)
        return "#2ecc71";

    if(lat <= 50)
        return "#ffd600";

    if(lat <= 100)
        return "#ff9800";

    return "#ff5252";

}

function corPerda(perda){

    if(perda == null)
        return "#999";

    if(perda == 0)
        return "#2ecc71";

    if(perda <= 10)
        return "#f1c40f";

    if(perda <= 30)
        return "#ff9800";

    return "#ff5252";

}

function traduzirInterface(nome){

    if(!nome) return "-";

    nome = nome.toLowerCase();

    if(nome.startsWith("ether")){
        return "Porta " + nome.replace("ether","");
    }

    if(nome.startsWith("sfp-sfpplus")){
        return "SFP+ " + nome.replace("sfp-sfpplus","");
    }

    if(nome.startsWith("sfp")){
        return "SFP " + nome.replace("sfp","");
    }

    return nome;
}

function desenharTabela(lista = equipamentos){

    const tbody = document.getElementById("tabelaEquipamentos");

    tbody.innerHTML = "";

    if(lista.length == 0){

        tbody.innerHTML = `
        <tr>
            <td colspan="11">
                Nenhum equipamento cadastrado.
            </td>
        </tr>`;

        return;

    }

    lista.forEach(eq=>{

    console.log(eq);

    const status = calcularStatus(eq);

    tbody.innerHTML += `

<tr>

<td>
    <span class="status ${status}"></span>
</td>

<td>
    ${eq.nome}
</td>

<td>
    ${eq.tipo || "-"}
</td>

<td>
    ${eq.perfil_sinal || "-"}
</td>

<td>
    ${eq.mac || "-"}
</td>

<td>
    ${eq.ip || "-"}
</td>

<td>
    ${gateways.find(g=>g.id===eq.gateway_id)?.nome || "-"}
</td>

<td>
    ${eq.porta || traduzirInterface(neighborSelecionado?.interface)}
</td>

<td>
    ${eq.ping ?? 0}/3
</td>

<td style="
    color:${corLatencia(eq.latencia)};
    font-weight:bold;
">
    ${eq.latencia != null ? eq.latencia+" ms" : "-"}
</td>

<td style="
    color:${corPerda(eq.perda)};
    font-weight:bold;
">
    ${eq.perda != null ? eq.perda+" %" : "-"}
</td>

<td>
    ${
        eq.ultima_resposta
        ? new Date(eq.ultima_resposta).toLocaleString("pt-BR")
        : "-"
    }
</td>

<td>

<div class="acoes">

<button
class="btnMonitorar"
onclick="monitorar('${eq.id}')">
Ping
</button>

<button
class="btnEditar"
onclick="editar('${eq.id}')">
Editar
</button>

<button
class="btnExcluir"
onclick="excluirEquipamento('${eq.id}')">
Excluir
</button>

</div>

</td>

</tr>

`;

    });

}
async function salvarEquipamento(){

    const nome=document.getElementById("nome").value.trim();

    const tipo=document.getElementById("tipo").value;
const perfil_sinal =
document.getElementById("perfil_sinal").value;
    const gateway=document.getElementById("gateway").value;

    const mac=document.getElementById("mac").value.toUpperCase();
const ip=document.getElementById("ip").value.trim();

    const observacao=document.getElementById("descricao").value;
    const metodo=document.getElementById("metodo").value;
const porta_acesso=Number(document.getElementById("porta_acesso").value);
const usuario=document.getElementById("usuario").value;
const senha=document.getElementById("senha").value;
const snmp=document.getElementById("snmp").value;
const ssh_key=document.getElementById("ssh_key").value;
const usar_ip_publico=document.getElementById("usar_ip_publico").checked;

    // VALIDAÇÃO
    if(!gateway){

        alert("Selecione um gateway.");

        return;

    }
if(!ip && !mac){

    alert("Informe um IP ou um MAC.");

    return;

}

const dados = {

    app_id: APP_ID,
    gateway_id: gateway,

    nome,
tipo,
perfil_sinal,

    ip: ip || neighborSelecionado?.ip || "",
    mac: mac || neighborSelecionado?.mac || "",

interface: neighborSelecionado?.interface_nome || editando?.interface || "",
porta: neighborSelecionado
    ? traduzirInterface(neighborSelecionado.interface)
    : (editando?.porta || ""),

    fabricante: "",
    modelo: "",
    serial: "",

    status: "offline",
    monitorar: true,

    observacao,
metodo,
porta_acesso,
usuario,
senha,
snmp,
ssh_key,
usar_ip_publico

};

    let error;

if(editando){

    ({ error } = await window.supabaseClient
        .from("monitor_equipamentos")
        .update(dados)
        .eq("id", editando.id));
console.log("Editando:", editando.id);
console.log("Dados:", dados);
console.log("Erro:", error);

}else{

    ({ error } = await window.supabaseClient
        .from("monitor_equipamentos")
        .insert(dados));

}

    if(error){

        alert(error.message);

        return;

    }

    fecharModal();

    carregarEquipamentos();

}

window.onload=async()=>{

    await carregarGateways();

    await carregarEquipamentos();
setInterval(carregarEquipamentos,5000);

};
async function monitorar(id){

    const equipamento = equipamentos.find(e => e.id === id);

    if(!equipamento){
        return;
    }

    alert("Monitorar: " + equipamento.nome);

}

function editar(id){

    editando = equipamentos.find(e => e.id === id);

    if(!editando) return;

    neighborSelecionado = null;

    document.getElementById("nome").value = editando.nome || "";
    document.getElementById("tipo").value = editando.tipo || "";
document.getElementById("perfil_sinal").value =
    editando.perfil_sinal || "";
    document.getElementById("gateway").value = editando.gateway_id || "";
    document.getElementById("ip").value = editando.ip || "";
    document.getElementById("mac").value = editando.mac || "";
    document.getElementById("descricao").value = editando.observacao || "";
    document.getElementById("metodo").value = editando.metodo || "ping";
document.getElementById("porta_acesso").value = editando.porta_acesso || 22;
document.getElementById("usuario").value = editando.usuario || "";
document.getElementById("senha").value = editando.senha || "";
document.getElementById("snmp").value = editando.snmp || "public";
document.getElementById("ssh_key").value = editando.ssh_key || "";
document.getElementById("usar_ip_publico").checked = !!editando.usar_ip_publico;

    document.querySelector(".janela h2").innerText = "Editar Equipamento";

    document.getElementById("modal").style.display = "flex";

}

async function excluirEquipamento(id){

    console.log("ID recebido:", id);

    const { data, error } = await window.supabaseClient
        .from("monitor_equipamentos")
        .delete()
        .eq("id", id)
        .select();

    console.log("Data:", data);
    console.log("Error:", error);

    if(error){
        alert(error.message);
        return;
    }

    if(!data || data.length === 0){
        alert("Nenhum registro foi excluído.");
        return;
    }

    alert("Excluído!");

    await carregarEquipamentos();

}

function filtrarEquipamentos(){

    const busca = document.getElementById("pesquisa").value.toLowerCase();
    const gateway = document.getElementById("filtroGateway").value;
    const tipo = document.getElementById("filtroTipo").value;

    const lista = equipamentos.filter(e => {

        const okBusca =
    !busca ||
    (e.nome || "").toLowerCase().includes(busca) ||
    (e.mac || "").toLowerCase().includes(busca) ||
    (e.ip || "").toLowerCase().includes(busca);

        const okGateway =
            !gateway ||
            e.gateway_id === gateway;

        const okTipo =
            !tipo ||
            e.tipo === tipo;

        return okBusca && okGateway && okTipo;

    });

    desenharTabela(lista);

}

async function buscarEquipamento(){

    const gateway = document.getElementById("gateway").value;
    const ip = document.getElementById("ip").value.trim();
    const mac = document.getElementById("mac").value.trim().toUpperCase();

    console.log("APP_ID:", APP_ID);
    console.log("Gateway:", gateway);
    console.log("IP:", ip);
    console.log("MAC:", mac);

    if(!gateway) return;

    if(!ip && !mac) return;

    let consulta = window.supabaseClient
        .from("monitor_neighbor")
        .select("*")
        .eq("app_id", APP_ID)
        .eq("gateway_id", gateway);

    if (ip && mac) {
    consulta = consulta.or(`ip.eq.${ip},mac.ilike.${mac}`);
} else if (ip) {
    consulta = consulta.or(`ip.eq.${ip},mac.ilike.${ip}`);
} else if (mac) {
    consulta = consulta.or(`mac.ilike.${mac},ip.eq.${mac}`);
}
    const { data, error } = await consulta.maybeSingle();

    console.log("ERRO:", error);
    console.log("DADOS:", data);
console.log("APP_ID banco:", data?.app_id);
console.log("Gateway banco:", data?.gateway_id);
console.log("Gateway tela:", gateway);
console.log("MAC banco:", data?.mac);
console.log("MAC digitado:", mac);
    if(error){
        console.error(error);
        return;
    }

    if(!data){

        neighborSelecionado = null;

        console.log("Nenhum neighbor encontrado.");

        return;
    }

    neighborSelecionado = data;

    document.getElementById("nome").value = data.identity || "";
    document.getElementById("ip").value = data.ip || "";
    document.getElementById("mac").value = data.mac || "";

    console.table(data);

}
</script>
