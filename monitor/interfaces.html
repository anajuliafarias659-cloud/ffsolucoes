<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FF Infra - Interfaces</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:#08111f;
color:white;

}

header{

height:70px;
background:#101b2d;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
border-bottom:1px solid #1d2b42;

}

.logo{

font-size:24px;
font-weight:bold;

}

.container{

width:95%;
max-width:1700px;
margin:auto;
padding:25px;

}

.topo{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;

}

.topo h1{

font-size:30px;

}

.topo p{

color:#97a3b7;
margin-top:5px;

}

.btnSalvar{

background:#00b96b;
color:white;
border:none;
padding:12px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:bold;

}

.btnSalvar:hover{

background:#00d67b;

}

.tabela{

background:#111d31;
border-radius:15px;
overflow:hidden;
border:1px solid #1d2b42;

}

table{

width:100%;
border-collapse:collapse;

}

thead{

background:#16243b;

}

th{

padding:16px;
text-align:left;
font-size:14px;
color:#97a3b7;

}

td{

padding:16px;
border-top:1px solid #1d2b42;

}

tbody tr:hover{

background:#16243b;

}

input[type=text]{

width:100%;
padding:10px;
background:#08111f;
border:1px solid #2a3952;
border-radius:8px;
color:white;

}

input[type=checkbox]{

width:18px;
height:18px;

}

.tipo{

padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
background:#203250;

}

</style>

</head>

<body>

<header>

<div class="logo">

🖥 FF INFRA

</div>

<div>

Configuração das Interfaces

</div>

</header>

<div class="container">

<div class="topo">

<div>

<h1>

Interfaces Monitoradas

</h1>

<p>

Escolha quais interfaces aparecerão no Dashboard.

</p>

</div>

<button
class="btnSalvar"
onclick="salvarConfiguracoes()">

💾 Salvar

</button>

</div>

<div class="tabela">

<table>

<thead>

<tr>

<th style="width:90px">

Monitorar

</th>

<th>

Interface

</th>

<th>

Tipo

</th>

<th>

Descrição

</th>

</tr>

</thead>

<tbody id="listaInterfaces">

</tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL="https://pdajixsoowcyhnjwhgpc.supabase.co";

const SUPABASE_KEY="sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const db=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let interfaces = [];

window.onload = async ()=>{

    await carregarInterfaces();

};

async function carregarInterfaces(){

    const { data, error } = await db
        .from("monitor_interfaces")
        .select("*");

    console.log(data);
    console.log(error);

    if(error){

        console.error(error);
        return;

    }

    interfaces = data || [];

    desenharTabela();

}
function desenharTabela(){

    const tbody = document.getElementById("listaInterfaces");

    tbody.innerHTML = "";

    interfaces.forEach(item=>{

        tbody.innerHTML += `

        <tr>

            <td align="center">

                <input
                    type="checkbox"
                    class="chkMonitorar"
                    data-id="${item.id}"
                    ${item.monitorar ? "checked" : ""}>

            </td>

            <td>

                ${item.nome}

            </td>

            <td>

                <span class="tipo">

                    ${item.tipo || "-"}

                </span>

            </td>

            <td>

                <input
                    type="text"
                    class="txtDescricao"
                    data-id="${item.id}"
                    value="${item.descricao || ""}"
                    placeholder="Ex.: Link Oi">

            </td>

        </tr>

        `;

    });

}

</script>

</body>

</html>
