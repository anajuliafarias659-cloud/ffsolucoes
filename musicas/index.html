<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pesquisa Musical YouTube</title>

<style>

body{

  font-family:Arial;

  background:#0f172a;

  color:#fff;

  padding:20px;

}

h2{

  text-align:center;

  margin-bottom:20px;

}

input{

  width:100%;

  padding:14px;

  border:none;

  border-radius:12px;

  margin-bottom:12px;

  background:#1e293b;

  color:#fff;

}

button{

  width:100%;

  padding:14px;

  border:none;

  border-radius:12px;

  background:#22c55e;

  color:#fff;

  font-weight:bold;

  cursor:pointer;

  margin-bottom:20px;

}

#resultado{

  display:flex;

  flex-direction:column;

  gap:12px;

}

.card{

  background:#1e293b;

  border-radius:14px;

  overflow:hidden;

  padding:10px;

}

.card img{

  width:100%;

  border-radius:10px;

}

.card h3{

  margin-top:10px;

  font-size:16px;

}

.card p{

  color:#94a3b8;

  font-size:13px;

  margin-top:5px;

}

.card a{

  display:block;

  margin-top:10px;

  background:#ef4444;

  color:#fff;

  text-align:center;

  padding:10px;

  border-radius:10px;

  text-decoration:none;

}

</style>
</head>

<body>

<h2>

🎵 Pesquisa Musical YouTube

</h2>

<input
type="text"
id="busca"
placeholder="Digite artista ou música">

<button onclick="buscarMusicas()">

Pesquisar

</button>

<div id="resultado"></div>

function copiarLink(link){

  navigator.clipboard
  .writeText(link);

  alert(
   "Link copiado!"
  );

}

<script>

// 🔥 SUA API KEY AQUI

const API_KEY =
"AIzaSyBZril7D77F9brqXO2OqbvHQjAiWmkLmoA";

async function buscarMusicas(){

  const termo =
  document.getElementById(
    "busca"
  ).value;

  if(!termo){

    alert(
      "Digite algo"
    );

    return;

  }

  const resultado =
  document.getElementById(
    "resultado"
  );

  resultado.innerHTML =
  "Pesquisando...";

  try{

    const url =

`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=15&q=${encodeURIComponent(termo)}&key=${API_KEY}`;

    const res =
    await fetch(url);

    const data =
    await res.json();

    resultado.innerHTML = "";

    data.items.forEach(video => {

      const titulo =
      video.snippet.title;

      const thumb =
      video.snippet.thumbnails
      .high.url;

      const canal =
      video.snippet.channelTitle;

      const videoId =
      video.id.videoId;

      resultado.innerHTML += `

      <div class="card">

        <img src="${thumb}">

        <h3>
          ${titulo}
        </h3>

        <p>
          ${canal}
        </p>

        <a
        href="https://youtube.com/watch?v=${videoId}"
        target="_blank">

        ▶ Abrir vídeo

        </a>

      </div>

      `;

    });

  }

  catch(err){

    console.error(err);

    resultado.innerHTML =
    "Erro ao pesquisar";

  }

}

</script>

</body>
</html>
