<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Renovar Plano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
}

.box{
  background:#0f172a;
  padding:30px;
  border-radius:20px;
  width:350px;
  text-align:center;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-card{background:#2563eb;color:#fff;}
.btn-pix{background:#22c55e;color:#fff;}
.btn-codigo{background:#f59e0b;color:#000;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.pix-box{
  margin-top:20px;
  display:none;
}

small{color:#94a3b8;}
</style>
</head>

<body>

<div class="box">

  <h2>⚠️ Plano Expirado</h2>

  <button class="btn-card" onclick="gerarCartao()">Renovar com Cartão</button>
  <button class="btn-pix" onclick="gerarPix()">Renovar com PIX</button>

  <div class="pix-box" id="pixBox">
    <img id="qrImg" width="200">
    <textarea id="pixCode" style="width:100%;height:80px;margin-top:10px;"></textarea>
    <button onclick="copiarPix()">Copiar código PIX</button>
    <button onclick="verificarPix()">Já paguei, verificar pagamento</button>
    <small>Liberação automática também acontece pelo webhook</small>
  </div>

  <input id="codigo" placeholder="Digite seu código">
  <button class="btn-codigo" onclick="ativarCodigo()">Ativar Código</button>

  <small id="status"></small>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let ultimoPixPaymentId = null;
let ultimoPixAppId = null;

/* STATUS */
function setStatus(msg){
  document.getElementById("status").textContent = msg || "";
}

/* CARTÃO (mantém seu fluxo) */
async function gerarCartao(){

  setStatus("Gerando pagamento...");

  const { data:{ session } } = await supabase.auth.getSession();
  if(!session?.user){
    alert("Faça login");
    return;
  }

  const { data:usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id",session.user.id)
    .single();

  const resp = await fetch(
    "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pagamento",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${session.access_token}`
      },
      body:JSON.stringify({ appId:usuario.app_id })
    }
  );

  const data = await resp.json();

  if(data.init_point){
    window.location.href = data.init_point;
  }else{
    alert("Erro cartão");
  }
}

/* PIX */
async function gerarPix(){

  setStatus("Gerando PIX...");

  const { data:{ session } } = await supabase.auth.getSession();
  if(!session?.user){
    alert("Faça login");
    return;
  }

  const { data:usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id",session.user.id)
    .single();

  const resp = await fetch(
    "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pix-renovacao",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${session.access_token}`
      },
      body:JSON.stringify({ appId:usuario.app_id })
    }
  );

  const data = await resp.json();

  console.log("RETORNO PIX:", data);

  if(data.error){
    alert(data.error);
    return;
  }

  ultimoPixPaymentId = data.payment_id;
  ultimoPixAppId = usuario.app_id;

  document.getElementById("pixBox").style.display="block";
  document.getElementById("qrImg").src = "data:image/png;base64," + data.qr_code_base64;
  document.getElementById("pixCode").value = data.qr_code;

  setStatus("PIX gerado ✔");
}

/* COPIAR */
function copiarPix(){
  const txt = document.getElementById("pixCode");
  txt.select();
  document.execCommand("copy");
  alert("Copiado!");
}

/* VERIFICAR PIX */
async function verificarPix(){

  if(!ultimoPixPaymentId || !ultimoPixAppId){
    alert("Gere o PIX primeiro");
    return;
  }

  setStatus("Verificando pagamento...");

  const { data:{ session } } = await supabase.auth.getSession();

  const resp = await fetch(
    "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/verificar-pix-renovacao",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${session.access_token}`
      },
      body:JSON.stringify({
        payment_id: ultimoPixPaymentId,
        appId: ultimoPixAppId
      })
    }
  );

  const data = await resp.json();

  console.log("RETORNO VERIFICAR:", data);

  if(data.pago){
    setStatus("");
    alert("Pagamento confirmado! 🎉");
    location.reload();
  }else{
    setStatus("Ainda não caiu...");
  }
}

/* ATIVAR CODIGO */
async function ativarCodigo(){

  const codigo = document.getElementById("codigo").value;

  if(!codigo){
    alert("Digite código");
    return;
  }

  setStatus("Validando...");

  const { data:cod } = await supabase
    .from("codigos_renovacao")
    .select("*")
    .eq("codigo",codigo)
    .eq("usado",false)
    .single();

  if(!cod){
    alert("Código inválido");
    return;
  }

  await supabase
    .from("codigos_renovacao")
    .update({ usado:true })
    .eq("id",cod.id);

  alert("Plano ativado!");
  location.reload();
}

window.gerarPix = gerarPix;
window.verificarPix = verificarPix;
window.copiarPix = copiarPix;
window.gerarCartao = gerarCartao;
window.ativarCodigo = ativarCodigo;

</script>

</body>
</html>
