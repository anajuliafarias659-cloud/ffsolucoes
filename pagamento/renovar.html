<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Plano Expirado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background:#020617; font-family:Arial; color:#fff; text-align:center; }
.box { background:#0f172a; padding:40px; border-radius:20px; max-width:400px; }
button { margin-top:20px; padding:14px; width:100%; border:none; border-radius:12px; background:#22c55e; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<div class="box">
  <h2>⚠️ Seu plano expirou</h2>
  <p>Para continuar usando o sistema, renove agora.</p>
  <button onclick="pagar()">Renovar Plano</button>

<script type="module">
import { supabase } from "../js/supabase.js";

async function ativarCodigo(){

  const codigoDigitado = document.getElementById("codigo").value.trim().toUpperCase();

  if(!codigoDigitado){
    alert("Digite um código válido");
    return;
  }

  // 🔐 Pega usuário logado
  const { data: { user } } = await supabase.auth.getUser();

  if(!user){
    alert("Usuário não autenticado");
    return;
  }

  // 🔎 Busca vínculo do usuário
  const { data: usuarioSistema } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", user.id)
    .single();

  if(!usuarioSistema){
    alert("Usuário não vinculado.");
    return;
  }

  // 🔎 Verifica código
  const { data: codigo } = await supabase
    .from("codigos_renovacao")
    .select("*")
    .eq("codigo", codigoDigitado)
    .eq("usado", false)
    .single();

  if(!codigo){
    alert("Código inválido ou já utilizado.");
    return;
  }

  // 🔄 Atualiza data de expiração
  const { data: app } = await supabase
    .from("apps")
    .select("data_expiracao")
    .eq("id", usuarioSistema.app_id)
    .single();

  const novaData = new Date(app.data_expiracao);
  novaData.setDate(novaData.getDate() + codigo.dias);

  await supabase
    .from("apps")
    .update({ 
      data_expiracao: novaData,
      ativo: true
    })
    .eq("id", usuarioSistema.app_id);

  // ✅ Marca código como usado
  await supabase
    .from("codigos_renovacao")
    .update({
      usado: true,
      usado_em: new Date()
    })
    .eq("id", codigo.id);

  alert("Plano renovado com sucesso!");

  const basePath = location.pathname.split("/pagamento")[0];
  window.location.href = basePath + "/";
}

window.ativarCodigo = ativarCodigo;
</script>

</body>
</html>
