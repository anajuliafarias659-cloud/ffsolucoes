<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Plano Expirado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
  text-align:center;
}
.box {
  background:#0f172a;
  padding:40px;
  border-radius:20px;
  max-width:400px;
  width:100%;
}
input, button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border-radius:12px;
  border:none;
}
.btn-pagar{
  background:#2563eb;
  font-weight:bold;
  cursor:pointer;
}
.btn-codigo{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.divisor{
  margin:20px 0;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="box">
  <h2>⚠️ Seu plano expirou</h2>

  <!-- 🔵 BOTÃO PAGAR -->
  <button class="btn-pagar" onclick="renovarPlano()">
    Renovar Plano Agora
  </button>

  <div class="divisor">ou</div>

  <!-- 🟢 USAR CÓDIGO -->
  <p>Digite seu código de renovação:</p>
  <input type="text" id="codigo" placeholder="Digite seu código">
  <button class="btn-codigo" onclick="ativarCodigo()">
    Ativar Código
  </button>
</div>

<script type="module">

import { supabase } from "../js/supabase.js";

/* ============================= */
/* 🔵 GERAR PAGAMENTO */
/* ============================= */
async function renovarPlano(){

  const appId = localStorage.getItem("app_id");

  if(!appId){
    alert("Erro: app_id não encontrado. Faça login novamente.");
    return;
  }

  const res = await fetch("https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/create-payment", {
    method: "POST",
    headers: { 
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ appId })
  });

  if(!res.ok){
    alert("Erro ao conectar com servidor.");
    return;
  }

  const data = await res.json();

  if(data.init_point){
    window.location.href = data.init_point;
  } else {
    alert("Erro ao gerar pagamento.");
  }
}


/* ============================= */
/* 🟢 ATIVAR CÓDIGO */
/* ============================= */
async function ativarCodigo() {

  const codigoDigitado = document.getElementById("codigo").value.trim();

  if(!codigoDigitado){
    alert("Digite o código");
    return;
  }

  const { data, error } = await supabase
    .from("codigos_renovacao")
    .select("*")
    .eq("codigo", codigoDigitado)
    .eq("usado", false)
    .single();

  if(error || !data){
    alert("Código inválido ou já utilizado");
    return;
  }

  const dias = data.dias || 30;
  const novaData = new Date(Date.now() + dias * 24 * 60 * 60 * 1000);

  await supabase
    .from("clientes")
    .update({
      status: "ativo",
      vencimento: novaData
    })
    .eq("app_id", data.app_id);

  await supabase
    .from("codigos_renovacao")
    .update({ usado: true })
    .eq("codigo", codigoDigitado);

  alert("Plano renovado com sucesso!");
  window.location.href = "/dashboard.html";
}

window.renovarPlano = renovarPlano;
window.ativarCodigo = ativarCodigo;

</script>

</body>
</html>
