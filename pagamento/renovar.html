<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Plano Expirado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; height:100vh; display:flex; justify-content:center; align-items:center; background:#020617; font-family:Arial; color:#fff; text-align:center; }
.box { background:#0f172a; padding:40px; border-radius:20px; max-width:400px; }
button { margin-top:20px; padding:14px; width:100%; border:none; border-radius:12px; background:#22c55e; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<div class="box">
  <h2>⚠️ Seu plano expirou</h2>
  <p>Para continuar usando o sistema, renove agora.</p>
  <button onclick="pagar()">Renovar Plano - R$ 48,90</button>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

async function pagar() {
  try {
    const { data: { user } } = await supabase.auth.getUser();
    const { data: usuario } = await supabase
      .from("usuarios")
      .select("app_id")
      .eq("id", user.id)
      .single();

    const response = await fetch(
      "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/create-payment",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: user.id, app_id: usuario.app_id })
      }
    );

    const data = await response.json();

    if (!data.link) throw new Error("Erro ao gerar link de pagamento");

    window.location.href = data.link;
  } catch (err) {
    alert("Falha ao gerar pagamento: " + err.message);
    console.error(err);
  }
}

window.pagar = pagar;
</script>

</body>
</html>
