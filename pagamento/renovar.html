<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Renovar Plano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
  text-align:center;
}

.box{
  background:#0f172a;
  padding:40px;
  border-radius:20px;
  width:350px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
}

.btn-pagar{background:#2563eb;color:#fff;font-weight:bold;}
.btn-codigo{background:#22c55e;color:#fff;font-weight:bold;}

</style>
</head>

<body>

<div class="box">

<h2>⚠️ Plano Expirado</h2>

<button class="btn-pagar" onclick="gerarPagamento()">Renovar Plano</button>

<p style="margin-top:20px">ou</p>

<input id="codigo" placeholder="Digite seu código">
<button class="btn-codigo" onclick="ativarCodigo()">Ativar Código</button>

</div>

<script type="module">

import { supabase } from "../js/supabase.js";

/* GERAR PAGAMENTO */

async function gerarPagamento(){

  const { data:{user} } = await supabase.auth.getUser();

  const { data:usuario } = await supabase
  .from("usuarios")
  .select("app_id")
  .eq("id", user.id)
  .single();

  const resp = await fetch(
  "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/create-payment",
  {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ appId:usuario.app_id })
  });

  const data = await resp.json();

  if(data.init_point){
    window.location.href = data.init_point;
  }else{
    alert("Erro ao gerar pagamento");
  }
}


/* ATIVAR CODIGO */

async function ativarCodigo(){

  const codigo = document.getElementById("codigo").value.trim();

  const { data, error } = await supabase
  .from("codigos_renovacao")
  .select("*")
  .eq("codigo",codigo)
  .eq("usado",false)
  .single();

  if(error){
    alert("Código inválido");
    return;
  }

  await supabase
  .from("codigos_renovacao")
  .update({ usado:true })
  .eq("id",data.id);

  await supabase
  .from("apps")
  .update({ ativo:true })
  .eq("id",data.app_id);

  alert("Plano renovado!");

  location.href="/";
}

window.gerarPagamento = gerarPagamento;
window.ativarCodigo = ativarCodigo;

</script>

</body>
</html>
