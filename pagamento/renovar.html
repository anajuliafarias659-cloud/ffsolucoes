<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Plano Expirado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
  text-align:center;
}
.box {
  background:#0f172a;
  padding:40px;
  border-radius:20px;
  max-width:400px;
  width:100%;
}
input, button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border-radius:12px;
  border:none;
}
button {
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>⚠️ Seu plano expirou</h2>
  <p>Digite seu código de renovação para continuar.</p>

  <input type="text" id="codigo" placeholder="Digite seu código">
  <button onclick="ativarCodigo()">Ativar Código</button>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

async function renovar() {

  const codigoDigitado = document.getElementById("codigo").value.trim();

  if(!codigoDigitado){
    alert("Digite o código");
    return;
  }

  const { data, error } = await supabase
    .from("codigos_renovacao")
    .select("*")
    .eq("codigo", codigoDigitado)
    .eq("usado", false)
    .single();

  if(error || !data){
    alert("Código inválido ou já utilizado");
    return;
  }

  // libera cliente (exemplo)
  await supabase
    .from("clientes")
    .update({
      status: "ativo"
    })
    .eq("app_id", data.app_id);

  // marca código como usado
  await supabase
    .from("codigos_renovacao")
    .update({ usado: true })
    .eq("codigo", codigoDigitado);

  alert("Plano renovado com sucesso!");
  window.location.href = "/dashboard.html";
}

window.renovar = renovar;
</script>

</body>
</html>
