<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Renovar Plano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
  text-align:center;
}

.box{
  background:#0f172a;
  padding:40px;
  border-radius:20px;
  width:350px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
}

.btn-pagar{background:#2563eb;color:#fff;font-weight:bold; cursor:pointer;}
.btn-codigo{background:#22c55e;color:#fff;font-weight:bold; cursor:pointer;}

small{color:#94a3b8; display:block; margin-top:10px}
</style>
</head>

<body>

<div class="box">
  <h2>⚠️ Plano Expirado</h2>

  <button class="btn-pagar" onclick="gerarPagamento()">Renovar Plano</button>

  <p style="margin-top:20px">ou</p>

  <input id="codigo" placeholder="Digite seu código">
  <button class="btn-codigo" onclick="ativarCodigo()">Ativar Código</button>

  <small id="status"></small>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

const statusEl = document.getElementById("status");
function setStatus(msg){ statusEl.textContent = msg || ""; }

/* GERAR PAGAMENTO */
async function gerarPagamento(){

  try{

    setStatus("Gerando pagamento...");

    const { data:{ session } } = await supabase.auth.getSession();

    if(!session?.user){
      alert("Você precisa fazer login.");
      location.href="/auth/login.html";
      return;
    }

    const user = session.user;

    const { data:usuario } = await supabase
      .from("usuarios")
      .select("app_id")
      .eq("id",user.id)
      .single();

    if(!usuario?.app_id){
      alert("App não encontrado.");
      return;
    }

    const resp = await fetch(
      "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pagamento",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":`Bearer ${session.access_token}`
        },
        body:JSON.stringify({ appId:usuario.app_id })
      }
    );

    const data = await resp.json();

    if(data?.init_point){
      window.location.href = data.init_point;
    }else{
      alert("Erro ao gerar pagamento.");
    }

  }catch(e){
    console.error(e);
    alert("Erro ao gerar pagamento.");
  }
}

/* ATIVAR CODIGO */
async function ativarCodigo(){

  try{

    const codigo = document.getElementById("codigo").value.trim();

    if(!codigo){
      alert("Digite o código.");
      return;
    }

    setStatus("Validando código...");

    const { data:cod, error } = await supabase
      .from("codigos_renovacao")
      .select("*")
      .eq("codigo",codigo)
      .eq("usado",false)
      .single();

    if(error || !cod){
      setStatus("");
      alert("Código inválido ou já usado.");
      return;
    }

    /* BUSCAR DATA ATUAL DO APP */

    const { data:app } = await supabase
      .from("apps")
      .select("data_expiracao")
      .eq("id",cod.app_id)
      .single();

    const agora = new Date();

    const atual = app?.data_expiracao
      ? new Date(app.data_expiracao)
      : null;

    /* DEFINIR BASE */

    const base = (atual && atual > agora)
      ? atual
      : agora;

    /* SOMAR DIAS DO CODIGO */

    const novaExp = new Date(
      base.getTime() + (Number(cod.dias) * 86400000)
    ).toISOString();

    /* MARCAR CODIGO USADO */

    await supabase
      .from("codigos_renovacao")
      .update({
        usado:true,
        usado_em:new Date().toISOString()
      })
      .eq("id",cod.id);

    /* ATUALIZAR APP */

    await supabase
      .from("apps")
      .update({
        ativo:true,
        plano:"pago",
        data_expiracao:novaExp
      })
      .eq("id",cod.app_id);

    setStatus("");

    alert("Plano renovado com sucesso!");

    location.href="/";

  }catch(e){

    setStatus("");

    console.error(e);

    alert("Erro ao ativar código.");

  }

}

window.gerarPagamento = gerarPagamento;
window.ativarCodigo = ativarCodigo;

</script>

</body>
</html>
