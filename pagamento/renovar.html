<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Renovar Plano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
  text-align:center;
}

.box{
  background:#0f172a;
  padding:30px;
  border-radius:20px;
  width:360px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-pix{background:#22c55e;color:#fff;}
.btn-card{background:#2563eb;color:#fff;}

.pix-area{
  margin-top:15px;
  display:none;
}

.success{
  display:none;
  margin-top:15px;
  background:#052e16;
  border:1px solid rgba(34,197,94,.4);
  padding:15px;
  border-radius:12px;
}

small{color:#94a3b8}
</style>
</head>

<body>

<div class="box">

  <h2>⚠️ Plano Expirado</h2>

  <button class="btn-card" onclick="gerarPagamentoCartao()">Renovar com Cartão</button>
  <button class="btn-pix" onclick="gerarPagamentoPix()">Renovar com PIX</button>

  <div id="pixArea" class="pix-area">
    <img id="qrImg" style="width:200px;border-radius:10px">
    <textarea id="qrCode" style="width:100%;margin-top:10px;border-radius:10px;height:80px"></textarea>

    <small>Aguardando pagamento... o sistema confirma automaticamente</small>
  </div>

  <div id="sucessoPix" class="success">
    <b style="color:#4ade80">✅ Pagamento confirmado</b>
    <p>Seu plano foi renovado com sucesso.</p>

    <button onclick="entrar()">Entrar no sistema</button>
  </div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "SUA_PUBLIC_KEY_AQUI"
);

let ultimoPixPaymentId = null;
let ultimoPixAppId = null;
let intervaloPix = null;

async function gerarPagamentoPix(){

  const { data:{ session } } = await supabase.auth.getSession();

  const { data:usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id",session.user.id)
    .single();

  const resp = await fetch(
    "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pix-renovacao",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        appId: String(usuario.app_id)
      })
    }
  );

  const data = await resp.json();

  console.log("RETORNO PIX:", data);

  ultimoPixPaymentId = data.payment_id;
  ultimoPixAppId = usuario.app_id;

  document.getElementById("pixArea").style.display = "block";
  document.getElementById("qrImg").src = "data:image/png;base64," + data.qr_code_base64;
  document.getElementById("qrCode").value = data.qr_code;

  iniciarVerificacao();
}

function iniciarVerificacao(){

  if(intervaloPix) clearInterval(intervaloPix);

  intervaloPix = setInterval(async ()=>{

    try{

      const { data:{ session } } = await supabase.auth.getSession();

      const resp = await fetch(
        "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/verificar-pix-renovacao",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "Authorization":`Bearer ${session.access_token}`
          },
          body: JSON.stringify({
            payment_id: String(ultimoPixPaymentId),
            appId: String(ultimoPixAppId)
          })
        }
      );

      const data = await resp.json();

      console.log("VERIFICANDO:", data);

      if(data?.status === "approved" || data?.pago === true){

        clearInterval(intervaloPix);

        document.getElementById("pixArea").style.display = "none";
        document.getElementById("sucessoPix").style.display = "block";

      }

    }catch(e){
      console.error(e);
    }

  }, 4000);
}

function entrar(){
  location.href = "/";
}

async function gerarPagamentoCartao(){

  const { data:{ session } } = await supabase.auth.getSession();

  const { data:usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id",session.user.id)
    .single();

  const resp = await fetch(
    "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/criar-pagamento",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        appId: usuario.app_id
      })
    }
  );

  const data = await resp.json();

  if(data.init_point){
    location.href = data.init_point;
  }

}

</script>

</body>
</html>
