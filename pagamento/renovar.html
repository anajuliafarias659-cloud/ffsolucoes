<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renovar Plano</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#020617;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .box{
      width:100%;
      max-width:360px;
      background:#0f172a;
      border-radius:22px;
      padding:26px 20px;
      box-shadow:0 15px 50px rgba(0,0,0,.45);
    }
    h1{
      font-size:20px;
      text-align:center;
      margin-bottom:10px;
    }
    p{
      text-align:center;
      color:#94a3b8;
      margin-bottom:20px;
      font-size:14px;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:14px 16px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      margin-bottom:12px;
    }
    .btn-cartao{background:#2563eb;color:#fff}
    .btn-pix{background:#22c55e;color:#fff}
    .btn-sec{background:#334155;color:#fff}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .status{
      margin-top:14px;
      background:#071226;
      border-radius:12px;
      padding:12px;
      font-size:14px;
      color:#cbd5e1;
      word-break:break-word;
      display:none;
    }
    .qrbox{
      margin-top:14px;
      background:#fff;
      border-radius:12px;
      padding:10px;
      text-align:center;
      display:none;
    }
    .qrbox img{
      max-width:100%;
      border-radius:10px;
    }
    .pixcode{
      margin-top:10px;
      font-size:12px;
      color:#111827;
      word-break:break-all;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>⚠ Plano Expirado</h1>
    <p>Renove seu acesso para continuar usando o sistema</p>

    <button class="btn btn-cartao" id="btnCartao">Renovar com Cartão</button>
    <button class="btn btn-pix" id="btnPix">Renovar com PIX</button>
    <button class="btn btn-sec" id="btnVerificar">Verificar Pagamento</button>

    <div class="status" id="statusBox"></div>

    <div class="qrbox" id="qrBox">
      <img id="qrImg" alt="QR Code PIX" />
      <div class="pixcode" id="pixCode"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_ANON_KEY = "SUA_CHAVE_PUBLICA_AQUI";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusBox = document.getElementById("statusBox");
    const qrBox = document.getElementById("qrBox");
    const qrImg = document.getElementById("qrImg");
    const pixCode = document.getElementById("pixCode");
    const btnPix = document.getElementById("btnPix");
    const btnCartao = document.getElementById("btnCartao");
    const btnVerificar = document.getElementById("btnVerificar");

    let ultimoPagamentoId = localStorage.getItem("renovacao_pagamento_id") || "";

    function mostrarStatus(msg, erro = false){
      statusBox.style.display = "block";
      statusBox.style.color = erro ? "#fecaca" : "#cbd5e1";
      statusBox.innerHTML = msg;
    }

    function travarBotoes(travar){
      btnPix.disabled = travar;
      btnCartao.disabled = travar;
      btnVerificar.disabled = travar;
    }

    async function pegarUsuarioLogado() {
      const { data, error } = await supabase.auth.getUser();
      if (error || !data?.user) return null;
      return data.user;
    }

    async function buscarDadosUsuario(userId) {
      const { data, error } = await supabase
        .from("usuarios")
        .select("id, user_id, email, nome, plano_expira_em, status, renovacao_status")
        .eq("user_id", userId)
        .single();

      if (error) {
        console.error("Erro buscando usuario:", error);
        return null;
      }

      return data;
    }

    async function gerarPagamentoPix() {
      try {
        travarBotoes(true);
        mostrarStatus("Gerando PIX...");

        const user = await pegarUsuarioLogado();
        if (!user) {
          mostrarStatus("Usuário não está logado.", true);
          travarBotoes(false);
          return;
        }

        const usuario = await buscarDadosUsuario(user.id);
        if (!usuario) {
          mostrarStatus("Registro não encontrado na tabela usuarios.", true);
          travarBotoes(false);
          return;
        }

        const { data: sessionData } = await supabase.auth.getSession();
        const token = sessionData?.session?.access_token;

        const resp = await fetch(`${SUPABASE_URL}/functions/v1/criar-pix-renovacao`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            user_id: user.id,
            email: usuario.email || user.email || "",
            nome: usuario.nome || user.user_metadata?.name || "Cliente",
            valor: 29.90
          })
        });

        const json = await resp.json();
        console.log("PIX:", json);

        if (!resp.ok) {
          throw new Error(json?.error || "Erro ao gerar PIX");
        }

        ultimoPagamentoId = json.pagamento_id || "";
        if (ultimoPagamentoId) {
          localStorage.setItem("renovacao_pagamento_id", ultimoPagamentoId);
        }

        if (json.qr_code_base64) {
          qrImg.src = `data:image/png;base64,${json.qr_code_base64}`;
          qrBox.style.display = "block";
        }

        if (json.qr_code) {
          pixCode.textContent = json.qr_code;
        }

        mostrarStatus("PIX gerado. Faça o pagamento e depois clique em verificar pagamento.");
      } catch (e) {
        console.error(e);
        mostrarStatus(e.message || "Erro ao gerar PIX.", true);
      } finally {
        travarBotoes(false);
      }
    }

    async function gerarPagamentoCartao() {
      try {
        travarBotoes(true);
        mostrarStatus("Criando pagamento com cartão...");

        const user = await pegarUsuarioLogado();
        if (!user) {
          mostrarStatus("Usuário não está logado.", true);
          travarBotoes(false);
          return;
        }

        const usuario = await buscarDadosUsuario(user.id);
        if (!usuario) {
          mostrarStatus("Registro não encontrado na tabela usuarios.", true);
          travarBotoes(false);
          return;
        }

        const { data: sessionData } = await supabase.auth.getSession();
        const token = sessionData?.session?.access_token;

        const resp = await fetch(`${SUPABASE_URL}/functions/v1/criar-pagamento-renovacao`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            user_id: user.id,
            email: usuario.email || user.email || "",
            nome: usuario.nome || user.user_metadata?.name || "Cliente",
            valor: 29.90
          })
        });

        const json = await resp.json();
        console.log("CARTAO:", json);

        if (!resp.ok) {
          throw new Error(json?.error || "Erro ao gerar pagamento");
        }

        ultimoPagamentoId = json.pagamento_id || "";
        if (ultimoPagamentoId) {
          localStorage.setItem("renovacao_pagamento_id", ultimoPagamentoId);
        }

        if (json.init_point) {
          window.location.href = json.init_point;
          return;
        }

        mostrarStatus("Pagamento criado, mas não veio link de checkout.", true);
      } catch (e) {
        console.error(e);
        mostrarStatus(e.message || "Erro ao gerar pagamento com cartão.", true);
      } finally {
        travarBotoes(false);
      }
    }

    async function verificarPagamento() {
      try {
        travarBotoes(true);
        mostrarStatus("Verificando pagamento...");

        const user = await pegarUsuarioLogado();
        if (!user) {
          mostrarStatus("Usuário não está logado.", true);
          travarBotoes(false);
          return;
        }

        const usuario = await buscarDadosUsuario(user.id);
        if (!usuario) {
          mostrarStatus("Usuário não encontrado na tabela usuarios.", true);
          travarBotoes(false);
          return;
        }

        if (usuario.status === "ativo" || usuario.renovacao_status === "pago") {
          mostrarStatus("Pagamento já confirmado. Liberando acesso...");

          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);
          return;
        }

        if (!ultimoPagamentoId) {
          mostrarStatus("Nenhum pagamento recente encontrado para verificar.", true);
          travarBotoes(false);
          return;
        }

        const { data: sessionData } = await supabase.auth.getSession();
        const token = sessionData?.session?.access_token;

        const resp = await fetch(`${SUPABASE_URL}/functions/v1/verificar-renovacao`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            pagamento_id: ultimoPagamentoId,
            user_id: user.id
          })
        });

        const json = await resp.json();
        console.log("VERIFICAR:", json);

        if (!resp.ok) {
          throw new Error(json?.error || "Erro ao verificar pagamento");
        }

        if (json.status === "approved" || json.status === "pago") {
          mostrarStatus("Pagamento aprovado. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1200);
        } else {
          mostrarStatus("Pagamento ainda não confirmado. Aguarde alguns segundos e verifique novamente.");
        }
      } catch (e) {
        console.error(e);
        mostrarStatus(e.message || "Erro ao verificar pagamento.", true);
      } finally {
        travarBotoes(false);
      }
    }

    btnPix.addEventListener("click", gerarPagamentoPix);
    btnCartao.addEventListener("click", gerarPagamentoCartao);
    btnVerificar.addEventListener("click", verificarPagamento);

    (async () => {
      const user = await pegarUsuarioLogado();
      if (!user) {
        mostrarStatus("Faça login para renovar o plano.", true);
        return;
      }

      const usuario = await buscarDadosUsuario(user.id);
      if (!usuario) {
        mostrarStatus("Seu cadastro não foi encontrado na tabela usuarios.", true);
        return;
      }

      if (usuario.status === "ativo" || usuario.renovacao_status === "pago") {
        mostrarStatus("Seu plano já está ativo. Redirecionando...");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      } else {
        mostrarStatus("Seu plano está expirado. Escolha PIX ou cartão para renovar.");
      }
    })();
  </script>
</body>
</html>
