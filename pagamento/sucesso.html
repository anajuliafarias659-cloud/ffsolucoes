<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento Aprovado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#020617;
  color:#fff;
  text-align:center;
  padding-top:100px;
}
.box{
  background:#0f172a;
  display:inline-block;
  padding:40px;
  border-radius:20px;
  width:400px;
}
.codigo{
  font-size:22px;
  margin:20px 0;
  background:#111827;
  padding:15px;
  border-radius:12px;
}
button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}
.copiar{ background:#22c55e; }
.ir{ background:#2563eb; }
</style>
</head>

<body>

<div class="box">
  <h2>Pagamento Aprovado ✅</h2>
  <p>Seu código de renovação:</p>

  <div class="codigo" id="codigoBox">Carregando...</div>

  <button class="copiar" onclick="copiarCodigo()">Copiar Código</button>
  <button class="ir" onclick="irParaRenovar()">Ir para Renovar</button>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

const params = new URLSearchParams(window.location.search);
const payment_id = params.get("payment_id");

async function buscarCodigo(){

  if(!payment_id){
    document.getElementById("codigoBox").innerText = "Pagamento não identificado.";
    return;
  }

  const { data, error } = await supabase
    .from("codigos_renovacao")
    .select("codigo")
    .eq("payment_id", payment_id)
    .single();

  if(error || !data){
    document.getElementById("codigoBox").innerText = "Aguardando geração do código...";
    return;
  }

  document.getElementById("codigoBox").innerText = data.codigo;
}

function copiarCodigo(){
  const texto = document.getElementById("codigoBox").innerText;
  navigator.clipboard.writeText(texto);
  alert("Código copiado!");
}

function irParaRenovar(){
  window.location.href = "/pagamento/renovar.html";
}

window.copiarCodigo = copiarCodigo;
window.irParaRenovar = irParaRenovar;

buscarCodigo();
</script>

</body>
</html>
