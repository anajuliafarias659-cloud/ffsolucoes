<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Segoe UI',system-ui,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#102a44,#020617);
  color:#fff;
  padding:20px;
}

/* ===== CARD ===== */
.card{
  max-width:520px;
  width:100%;
  background:rgba(10,26,47,.95);
  border-radius:22px;
  padding:32px 26px;
  text-align:center;
}

/* ===== BOTÃO CHAT ===== */
#chatBotao{
  position:fixed;
  right:20px;
  bottom:20px;
  width:64px;
  height:64px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,#00b4ff,#0090cc);
  color:#fff;
  font-size:28px;
  cursor:pointer;
  z-index:9997;
}

#chatBotao.oculto{
  display:none !important;
}

/* ===== CHAT ===== */
#chatBox{
  position:fixed;
  right:20px;
  bottom:96px;
  width:380px;
  height:600px;
  background:#020617;
  border-radius:18px;
  overflow:hidden;
  z-index:9999;
  display:none;
  flex-direction:column;
}

#chatBox.ativo{
  display:flex;
}

#chatTop{
  background:#0f172a;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#ffChatFrame{
  width:100%;
  height:100%;
  border:none;
}

/* ===== MOBILE ===== */
@media (max-width:480px){

  #chatBox{
    right:0;
    left:0;
    bottom:0;
    width:100%;
    height:100vh;
    border-radius:0;
  }

}
</style>
</head>

<body>

<div class="card">
  <h1>FF Soluções</h1>
  <p>Sistemas modernos para seu negócio</p>
</div>

<!-- BOTÃO -->
<button id="chatBotao" onclick="abrirChat()">💬</button>

<!-- CHAT -->
<div id="chatBox">
  <div id="chatTop">
    <strong>Atendimento</strong>
    <button onclick="fecharChat()">X</button>
  </div>

  <iframe id="ffChatFrame"></iframe>
</div>

<script>
function abrirChat(){
  const box = document.getElementById("chatBox");
  const botao = document.getElementById("chatBotao");
  const frame = document.getElementById("ffChatFrame");

  frame.src = "/ff-chat/ffchat-suloçoes.html?t=" + Date.now();

  box.classList.add("ativo");
  botao.classList.add("oculto"); // 🔥 esconde botão
}

function fecharChat(){
  const box = document.getElementById("chatBox");
  const botao = document.getElementById("chatBotao");
  const frame = document.getElementById("ffChatFrame");

  box.classList.remove("ativo");
  botao.classList.remove("oculto"); // 🔥 volta botão
  frame.src = "";
}
</script>

</body>
</html>
