<!DOCTYPE html>

<style>
*{

margin:0;
padding:0;
font-family:'Segoe UI',system-ui,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

padding:20px;

.card{
max-width:520px;
width:100%;
background:rgba(10,26,47,.95);
border-radius:22px;
padding:32px 26px;

0 0 0 1px rgba(0,180,255,.25),

.icon{

h1{

}

p{

opacity:.9;
line-height:1.5;
}

.highlight{
margin-top:22px;
font-size:16px;
color:#00b4ff;
font-weight:600;
}

.phone{
margin-top:8px;
font-size:20px;
font-weight:700;
letter-spacing:1px;
}

.site-publico{
margin-top:20px;
background:rgba(0,180,255,.08);
border:1px solid rgba(0,180,255,.22);
border-radius:14px;
padding:14px;
font-size:14px;
line-height:1.6;
}

.site-publico strong{
color:#00b4ff;
}

.actions{
margin-top:28px;
display:flex;
flex-direction:column;
gap:12px;
}

.actions button{
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
font-size:15px;
transition:transform .2s,opacity .2s;
}

.actions button:hover{
transform:scale(1.03);
opacity:.9;
}

.btn-bar{
background:#00b4ff;
color:#020617;
}

.btn-hotel{
background:#1e293b;
color:#fff;
}

.btn-locadora{
background:#020617;
color:#fff;
border:1px solid rgba(255,255,255,.2);
}

.btn-teste{
background:#22c55e;
color:#020617;
}

.btn-modelo{
background:#22c55e;
color:#020617;
}

@media (max-width:480px){

.card{
padding:26px 20px;
}

h1{
font-size:20px;
}

.phone{
font-size:18px;
}

}
</style>
</head>

<script>
const FF_CHAT_USER_KEY = "ff_chat_user";
const FF_CHAT_CONTEXT_KEY = "ff_chat_contexto";
const FF_CHAT_NOME_KEY = "ff_chat_nome_cliente";

function slugTexto(texto){
  return String(texto || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function gerarIdAleatorio(prefixo = "chat"){
  return prefixo + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
}

function abrirModalNomeChat(){
  const overlay = document.getElementById("chatNomeOverlay");
  const input = document.getElementById("chatNomeCliente");
  const status = document.getElementById("chatNomeStatus");

  if(!overlay || !input || !status) return;

  status.textContent = "";
  input.value = "";
  overlay.classList.add("ativo");

  setTimeout(() => input.focus(), 120);
}

function fecharModalNomeChat(){
  const overlay = document.getElementById("chatNomeOverlay");
  if(overlay) overlay.classList.remove("ativo");
}

function fecharChat(){
  const box = document.getElementById("chatBox");
  if(box) box.classList.remove("ativo");
}

function montarUsuarioTemporario(nome){
  const nomeLimpo = String(nome || "").trim();
  const slug = slugTexto(nomeLimpo) || "cliente";

  return {
    numero: "visitante_" + slug + "_" + Date.now(),
    senha: gerarIdAleatorio("senha"),
    nome: nomeLimpo,
    tipo: "visitante_temporario",
    sistema: "ffsolucoes",
    criado_em: new Date().toISOString()
  };
}

function montarContextoChat(nome, usuarioTemp){
  return {
    sistema_id: "ffsolucoes",
    sistema_nome: "FF Soluções",
    origem: "ffsolucoes",
    app_id: null,
    cliente_nome: nome,
    chat_room_id: "ffsolucoes_" + slugTexto(nome) + "_" + Date.now(),
    usuario_temporario: usuarioTemp.numero,
    criado_em: new Date().toISOString()
  };
}

function abrirChatComSessao(){
  const frame = document.getElementById("ffChatFrame");
  const box = document.getElementById("chatBox");

  if(!frame || !box) return;

  frame.src = "/ff-chat/index.html?auto_login=1&origem=ffsolucoes&sistema=ffsolucoes&t=" + Date.now();
  box.classList.add("ativo");
}

function confirmarEntradaChat(){
  const input = document.getElementById("chatNomeCliente");
  const status = document.getElementById("chatNomeStatus");

  if(!input || !status) return;

  const nome = (input.value || "").trim();

  if(!nome){
    status.textContent = "Digite seu nome para continuar.";
    input.focus();
    return;
  }

  try{
    const usuarioTemp = montarUsuarioTemporario(nome);
    const contexto = montarContextoChat(nome, usuarioTemp);

    localStorage.setItem(FF_CHAT_NOME_KEY, nome);
    localStorage.setItem(FF_CHAT_USER_KEY, JSON.stringify(usuarioTemp));
    localStorage.setItem(FF_CHAT_CONTEXT_KEY, JSON.stringify(contexto));

    fecharModalNomeChat();
    abrirChatComSessao();
  }catch(err){
    console.error("Erro ao iniciar chat:", err);
    status.textContent = "Erro ao iniciar o chat.";
  }
}

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    fecharModalNomeChat();
  }
});

document.addEventListener("DOMContentLoaded", function(){
  const inputNome = document.getElementById("chatNomeCliente");
  if(inputNome){
    inputNome.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        confirmarEntradaChat();
      }
    });
  }
});
</script>
</body>
