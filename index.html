<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Soluções</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
.container{max-width:420px;width:100%;}
.topo{text-align:center;margin-bottom:25px;}
.topo h1{font-size:26px;}
.topo p{opacity:.7;margin-top:8px;}

.card-visitas{
  background:rgba(0,180,255,.1);
  border:1px solid rgba(0,180,255,.3);
  padding:12px;
  border-radius:12px;
  text-align:center;
  margin-bottom:15px;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  margin-bottom:12px;
  cursor:pointer;
}
.whats{background:#22c55e;color:#020617;}
.demo{background:#00b4ff;color:#020617;}
.ver{background:#1e293b;color:#fff;}

.card-aviso{
  margin-top:20px;
  padding:18px;
  border-radius:16px;
  background:#0f172a;
  text-align:center;
}

.whats-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#22c55e;
  color:#fff;
  font-size:26px;
  cursor:pointer;
}

/* FORM */
#formOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.formBox{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  width:100%;
  max-width:400px;
}
.formBox input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h1>🚀 Coloque seu negócio online hoje</h1>
    <p>Venda, receba pedidos e automatize tudo</p>
  </div>

  <div class="card-visitas">
    👀 <strong id="contadorVisitas">0</strong>
  </div>

  <button class="btn whats" onclick="abrirFormulario()">📲 Falar no WhatsApp</button>
  <button class="btn demo" onclick="irTeste()">🔥 Testar grátis</button>
  <button class="btn ver" onclick="verLoja()">🛍 Ver loja</button>

  <div class="card-aviso">
    💼 Seu negócio ainda não está aqui?
  </div>

</div>

<button class="whats-float" onclick="abrirFormulario()">💬</button>

<!-- FORM -->
<div id="formOverlay">
  <div class="formBox">

    <h3>Preencha antes de continuar</h3>

    <input id="nome" placeholder="Nome">
    <input id="telefone" placeholder="Telefone">
    <input id="cpf" placeholder="CPF">
    <input id="endereco" placeholder="Endereço">
    <input id="negocio" placeholder="Tipo de negócio">

    <div style="display:flex;gap:10px;margin-top:10px">
      <button onclick="fecharFormulario()">Cancelar</button>
      <button onclick="enviarWhats()">Enviar</button>
    </div>

  </div>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// contador real
async function contar(){
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const { count } = await supabase
    .from("visitas_site")
    .select("*",{count:"exact",head:true})
    .gte("criado_em",hoje.toISOString());

  document.getElementById("contadorVisitas").innerText =
    count ? `${count} pessoas hoje` : "0 pessoas hoje";
}

// salvar visita
async function salvar(){
  const key="visita_"+new Date().toDateString();
  if(localStorage.getItem(key)) return;

  await supabase.from("visitas_site").insert({origem:"direto"});
  localStorage.setItem(key,"1");
}

await salvar();
await contar();

</script>

<script>
// FORM
function abrirFormulario(){
  document.getElementById("formOverlay").style.display="flex";
}

function fecharFormulario(){
  document.getElementById("formOverlay").style.display="none";
}

function enviarWhats(){
  const nome=document.getElementById("nome").value;
  const telefone=document.getElementById("telefone").value;
  const cpf=document.getElementById("cpf").value;
  const endereco=document.getElementById("endereco").value;
  const negocio=document.getElementById("negocio").value;

  if(!nome || !telefone){
    alert("Preencha nome e telefone");
    return;
  }

  const msg=`Olá vim pelo site:

Nome: ${nome}
Telefone: ${telefone}
CPF: ${cpf}
Endereço: ${endereco}
Negócio: ${negocio}`;

  window.open("https://wa.me/5589981452698?text="+encodeURIComponent(msg));
}

// links
function irTeste(){
  window.location.href="https://www.ffsolucoes.com.br/super/cadastro-demo.html";
}
function verLoja(){
  window.location.href="https://www.ffsolucoes.com.br/public/agua/?app_id=3f7c9f20-340e-4bf1-b096-eca36327de7c";
}
</script>

</body>
</html>
