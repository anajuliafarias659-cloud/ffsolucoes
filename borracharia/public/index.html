<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Borracharia</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#020617">

<script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* TOPO FIXO */
.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#111827;
  padding:15px;
  z-index:9999;
  text-align:center;
  font-weight:bold;
}

.btn-instalar{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:#fff;
  font-weight:bold;
  display:none;
}

.container{
  margin-top:120px;
  padding:15px;
}

input,select,textarea,button{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#f97316;
  color:#fff;
  font-weight:bold;
}

.status{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topo">
  FF Borracharia 🚗
  <button class="btn-instalar">Instalar app</button>
</div>

<div class="container">

<h3>Solicitar atendimento</h3>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<input id="endereco" placeholder="Endereço">

<button id="btnGps">Pegar localização</button>

<input id="lat" placeholder="Latitude" readonly>
<input id="lng" placeholder="Longitude" readonly>

<button id="btnSolicitar">Solicitar</button>

<hr>

<h3>Consultar</h3>

<input id="codigo">
<button id="btnConsultar">Consultar</button>

<div id="status" class="status"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

document.getElementById("btnGps").onclick = ()=>{
  navigator.geolocation.getCurrentPosition((pos)=>{
    lat.value = pos.coords.latitude;
    lng.value = pos.coords.longitude;
  });
};

document.getElementById("btnSolicitar").onclick = async ()=>{

  const latitude = parseFloat(lat.value);
  const longitude = parseFloat(lng.value);

  if(!latitude || !longitude){
    alert("Pegue a localização");
    return;
  }

  // busca borracheiros abertos
  const { data: borr } = await supabase
    .from("borracheiros")
    .select("*")
    .eq("aberto", true);

  if(!borr.length){
    alert("Nenhuma aberta");
    return;
  }

  const { data, error } = await supabase
    .from("chamados_borracharia")
    .insert([{
      cliente_nome:nome.value,
      cliente_telefone:telefone.value,
      endereco_texto:endereco.value,
      latitude,
      longitude,
      status:"aguardando"
    }])
    .select()
    .single();

  if(error){
    alert("erro");
    return;
  }

  alert("Código: "+data.codigo_acompanhamento);
};

document.getElementById("btnConsultar").onclick = async ()=>{

  const codigo = document.getElementById("codigo").value;

  const { data } = await supabase
    .from("chamados_borracharia")
    .select("*")
    .eq("codigo_acompanhamento", codigo)
    .single();

  if(!data){
    status.innerHTML = "Não encontrado";
    return;
  }

  let nomeBorr = "-";

  if(data.borracheiro_id){
    const { data: b } = await supabase
      .from("borracheiros")
      .select("nome")
      .eq("id", data.borracheiro_id)
      .single();

    nomeBorr = b?.nome || "-";
  }

  status.innerHTML = `
    Status: ${data.status} <br>
    Borracheiro: ${nomeBorr}
  `;
};
</script>

<!-- PWA -->
<script>
let deferredPrompt;
const btn = document.querySelector(".btn-instalar");

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  btn.style.display="block";
});

btn.onclick = async ()=>{
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  btn.style.display="none";
};

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
