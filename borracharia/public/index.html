<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Borracharia</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:linear-gradient(90deg,#f59e0b,#ef4444);
  color:#fff;
  font-weight:bold;
}

.msg{
  margin-top:10px;
  color:#fca5a5;
}
</style>
</head>

<body>
<div class="container">

<h2>FF Borracharia</h2>

<input id="cliente_nome" placeholder="Seu nome">
<input id="cliente_telefone" placeholder="Telefone">

<input id="endereco_texto" placeholder="Endereço">

<button onclick="pegarLocalizacao()">Pegar localização</button>

<input id="latitude" placeholder="Latitude">
<input id="longitude" placeholder="Longitude">

<button onclick="solicitar()">Solicitar atendimento</button>

<div class="msg" id="msg"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const el = id => document.getElementById(id);

function msg(t){
  el("msg").innerText = t;
}

function valorAtivo(v){
  const s = String(v ?? "").toLowerCase().trim();
  return v === true || v === 1 || s === "true" || s === "1" || s === "sim";
}

function valorAberto(v){
  const s = String(v ?? "").toLowerCase().trim();
  return v === true || v === 1 || s === "aberto" || s === "aberta" || s === "true";
}

function statusAtivo(v){
  const s = String(v ?? "").toLowerCase().trim();
  return s === "aceito" || s === "em_andamento" || s === "em andamento";
}

function dist(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

async function verificar(){

  const lat = parseFloat(el("latitude").value);
  const lon = parseFloat(el("longitude").value);

  const { data } = await supabase
    .from("borracheiros")
    .select("*");

  const abertos = (data || []).filter(b =>
    valorAtivo(b.ativo) && valorAberto(b.aberto)
  );

  if(!abertos.length){
    return "sem";
  }

  const ids = abertos.map(b => b.id);

  const { data: chamados } = await supabase
    .from("chamados_borracharia")
    .select("borracheiro_id,status,created_at")
    .in("borracheiro_id", ids);

  const agora = new Date();

  const ocupados = new Set(
    (chamados||[])
      .filter(c=>{
        if(!statusAtivo(c.status)) return false;
        const d = new Date(c.created_at);
        return ((agora-d)/1000/60)<=120;
      })
      .map(c=>c.borracheiro_id)
  );

  const livres = abertos.filter(b => !ocupados.has(b.id));

  if(!livres.length){
    return "ocupadas";
  }

  const noRaio = livres.filter(b=>{
    if(!b.latitude || !b.longitude) return false;
    const d = dist(lat,lon,b.latitude,b.longitude);
    return d <= (b.raio_atendimento_km || 10);
  });

  if(!noRaio.length){
    return "fora";
  }

  return "ok";
}

async function solicitar(){

  msg("verificando...");

  const status = await verificar();

  if(status === "sem"){
    msg("Nenhuma borracharia aberta");
    return;
  }

  if(status === "ocupadas"){
    msg("Todas ocupadas agora");
    return;
  }

  if(status === "fora"){
    msg("Nenhuma atende seu local");
    return;
  }

  msg("Enviando...");

  await supabase.from("chamados_borracharia").insert([{
    cliente_nome: el("cliente_nome").value,
    cliente_telefone: el("cliente_telefone").value,
    endereco_texto: el("endereco_texto").value,
    latitude: el("latitude").value,
    longitude: el("longitude").value,
    status:"aguardando"
  }]);

  msg("Chamado enviado!");
}

function pegarLocalizacao(){
  navigator.geolocation.getCurrentPosition(pos=>{
    el("latitude").value = pos.coords.latitude;
    el("longitude").value = pos.coords.longitude;
  });
}

</script>
</body>
</html>
