<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FF Borracharia - Socorro Rápido</title>

  <!-- PWA -->
  <link rel="manifest" href="/borracharia/public/manifest.webmanifest" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FF Borracharia" />
  <link rel="apple-touch-icon" href="/borracharia/public/icons/icon-192.png" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg1:#0f172a;
      --bg2:#020617;
      --card:#111827;
      --input:#1f2937;
      --line:rgba(255,255,255,.08);
      --amarelo:#f59e0b;
      --amarelo2:#fbbf24;
      --vermelho:#dc2626;
      --verde:#16a34a;
      --texto:#ffffff;
      --muted:#94a3b8;
      --topo-altura:165px;
    }

    html,body{
      width:100%;
      min-height:100%;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--texto);
      min-height:100vh;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
    }

    .container{
      width:min(100%,700px);
      margin:0 auto;
      padding:
        calc(var(--topo-altura) + env(safe-area-inset-top) + 14px)
        14px
        calc(34px + env(safe-area-inset-bottom));
    }

    .topo{
      position:fixed;
      top:0;
      left:50%;
      transform:translateX(-50%);
      z-index:999;
      width:min(100%,700px);
      padding:
        calc(14px + env(safe-area-inset-top))
        14px
        12px;
      background:linear-gradient(135deg,rgba(245,158,11,.98),rgba(220,38,38,.96));
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-bottom-left-radius:22px;
      border-bottom-right-radius:22px;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
    }

    .topoBox{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .topoIcone{
      width:68px;
      height:68px;
      min-width:68px;
      border-radius:18px;
      background:rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);
    }

    .topoTexto h1{
      font-size:1.35rem;
      line-height:1.1;
      margin-bottom:6px;
    }

    .topoTexto p{
      color:#fff8e7;
      opacity:.95;
      font-size:.95rem;
    }

    .acoesTopo{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .acoesTopo button{
      border:none;
      border-radius:14px;
      padding:11px 14px;
      font-weight:700;
      cursor:pointer;
      background:rgba(255,255,255,.14);
      color:#fff;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);
    }

    .acoesTopo button:hover{
      background:rgba(255,255,255,.22);
    }

    .card{
      background:rgba(17,24,39,.95);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 16px 30px rgba(0,0,0,.24);
    }

    .card h2{
      font-size:1.08rem;
      margin-bottom:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      font-size:.92rem;
      color:#e5e7eb;
      margin-bottom:7px;
      font-weight:700;
    }

    input,select,textarea{
      width:100%;
      border:none;
      outline:none;
      background:var(--input);
      color:#fff;
      border-radius:14px;
      padding:13px 14px;
      font-size:15px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    button{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(135deg,var(--amarelo),var(--vermelho));
      color:#fff;
      box-shadow:0 12px 18px rgba(0,0,0,.18);
    }

    button.sec{
      background:#243041;
      color:#fff;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .msg{
      margin-top:10px;
      font-size:.95rem;
      font-weight:700;
      min-height:18px;
    }

    .codigo-box{
      margin-top:8px;
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      text-align:center;
    }

    .codigo{
      font-size:1.35rem;
      letter-spacing:2px;
      margin:10px 0;
      font-weight:900;
      color:var(--amarelo2);
    }

    .muted{
      color:var(--muted);
      font-size:.92rem;
    }

    .status-box{
      border-radius:16px;
      padding:14px;
      font-size:1rem;
      font-weight:900;
      text-align:center;
      margin-bottom:12px;
      letter-spacing:.5px;
    }

    .status-box.aguardando{
      background:rgba(245,158,11,.12);
      color:#fcd34d;
      border:1px solid rgba(245,158,11,.35);
    }

    .status-box.aceito{
      background:rgba(59,130,246,.12);
      color:#93c5fd;
      border:1px solid rgba(59,130,246,.35);
    }

    .status-box.em_andamento{
      background:rgba(34,197,94,.12);
      color:#86efac;
      border:1px solid rgba(34,197,94,.35);
    }

    .status-box.finalizado{
      background:rgba(22,163,74,.14);
      color:#86efac;
      border:1px solid rgba(22,163,74,.35);
    }

    .status-box.cancelado{
      background:rgba(220,38,38,.12);
      color:#fca5a5;
      border:1px solid rgba(220,38,38,.35);
    }

    .destaque{
      background:linear-gradient(135deg,rgba(245,158,11,.14),rgba(220,38,38,.10));
      border:1px solid rgba(245,158,11,.25);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
      line-height:1.5;
      font-weight:700;
    }

    .destaque a{
      color:#fde68a;
      text-decoration:none;
      font-weight:900;
    }

    .info{
      background:#0b1220;
      border-radius:16px;
      border:1px solid var(--line);
      padding:14px;
      line-height:1.6;
      font-size:.96rem;
    }

    .linha{
      height:1px;
      background:var(--line);
      margin:10px 0;
    }

    .oculto{
      display:none !important;
    }

    @media (max-width:640px){
      :root{
        --topo-altura:185px;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .topoIcone{
        width:58px;
        height:58px;
        min-width:58px;
        font-size:28px;
      }

      .topoTexto h1{
        font-size:1.16rem;
      }

      .topoTexto p{
        font-size:.88rem;
      }

      .card{
        padding:15px;
      }
    }
  </style>
</head>
<body>

  <div class="topo">
    <div class="topoBox">
      <div class="topoIcone">🛞</div>
      <div class="topoTexto">
        <h1>FF Borracharia</h1>
        <p>Solicite socorro rápido e acompanhe seu atendimento em tempo real.</p>
      </div>
    </div>

    <div class="acoesTopo">
      <button id="btnInstalarApp" type="button" style="display:none;">Instalar app</button>
    </div>
  </div>

  <div class="container">
    <div class="card" id="cardSolicitacao">
      <h2>Solicitar atendimento</h2>

      <div class="grid">
        <div>
          <label>Nome</label>
          <input id="cliente_nome" placeholder="Seu nome" />
        </div>

        <div>
          <label>Telefone</label>
          <input id="cliente_telefone" placeholder="Seu WhatsApp" />
        </div>

        <div>
          <label>Tipo de veículo</label>
          <select id="tipo_veiculo">
            <option value="Carro">Carro</option>
            <option value="Moto">Moto</option>
            <option value="Caminhonete">Caminhonete</option>
            <option value="Caminhão">Caminhão</option>
            <option value="Van">Van</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div>
          <label>Problema</label>
          <select id="problema">
            <option value="Pneu furado">Pneu furado</option>
            <option value="Troca de pneu">Troca de pneu</option>
            <option value="Sem estepe">Sem estepe</option>
            <option value="Calibragem">Calibragem</option>
            <option value="Roda danificada">Roda danificada</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div class="full">
          <label>Observações</label>
          <textarea id="observacoes" placeholder="Ex: estou perto do posto, carro branco, pneu dianteiro esquerdo."></textarea>
        </div>

        <div class="full">
          <label>Endereço / referência</label>
          <input id="endereco_texto" placeholder="Ex: BR 020, próximo ao posto X" />
        </div>

        <div class="full">
          <button id="btnLocalizacao" type="button" class="sec">Pegar minha localização</button>
        </div>

        <div>
          <label>Latitude</label>
          <input id="latitude" readonly />
        </div>

        <div>
          <label>Longitude</label>
          <input id="longitude" readonly />
        </div>

        <div class="full">
          <button id="btnSolicitar" type="button">Solicitar atendimento</button>
          <div class="msg" id="msgSolicitacao"></div>
        </div>
      </div>

      <div id="resultadoSolicitacao" style="display:none;">
        <div class="codigo-box">
          <div>Seu chamado foi criado com sucesso</div>
          <div class="codigo" id="codigoGerado">--------</div>
          <div class="muted">Guarde esse código para acompanhar o atendimento</div>
        </div>
      </div>
    </div>

    <div class="card" id="cardConsulta">
      <h2 id="tituloConsulta">Acompanhar chamado</h2>

      <div class="grid">
        <div class="full">
          <label>Código de acompanhamento</label>
          <input id="codigoConsulta" placeholder="Digite o código do chamado" />
        </div>
        <div class="full">
          <button id="btnConsultar" type="button" class="sec">Consultar status</button>
        </div>
      </div>

      <div id="resultadoConsulta" style="display:none;">
        <div class="status-box" id="statusBox">AGUARDANDO</div>
        <div id="destaqueBorracheiro"></div>
        <div class="info" id="infoChamado"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    const el = (id) => document.getElementById(id);

    let intervalConsulta = null;
    let deferredPrompt = null;

    function limparMensagem(){
      el("msgSolicitacao").textContent = "";
    }

    function mostrarMensagem(msg, cor = "#fca5a5"){
      el("msgSolicitacao").style.color = cor;
      el("msgSolicitacao").textContent = msg;
    }

    function traduzirStatus(status){
      if(status === "aguardando") return "Aguardando borracheiro";
      if(status === "aceito") return "Chamado aceito";
      if(status === "em_andamento") return "Em andamento";
      if(status === "finalizado") return "Finalizado";
      if(status === "cancelado") return "Cancelado";
      return status || "-";
    }

    function statusAindaAtivo(status){
      return ["aguardando", "aceito", "em_andamento"].includes(status);
    }

    function mostrarModoSomenteConsulta(codigo = ""){
      el("cardSolicitacao").classList.add("oculto");
      el("tituloConsulta").textContent = "Acompanhar atendimento";
      if(codigo){
        el("codigoConsulta").value = codigo;
      }
    }

    function mostrarModoNormal(){
      el("cardSolicitacao").classList.remove("oculto");
      el("tituloConsulta").textContent = "Acompanhar chamado";
    }

    function limparChamadoSalvo(){
      localStorage.removeItem("ff_borracharia_codigo");
    }

    function salvarChamadoSalvo(codigo){
      localStorage.setItem("ff_borracharia_codigo", codigo);
    }

    function calcularDistanciaKm(lat1, lon1, lat2, lon2){
      if(
        lat1 == null || lon1 == null ||
        lat2 == null || lon2 == null ||
        isNaN(lat1) || isNaN(lon1) || isNaN(lat2) || isNaN(lon2)
      ){
        return null;
      }

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    async function pegarLocalizacao(){
      limparMensagem();

      if(!navigator.geolocation){
        mostrarMensagem("Seu navegador não suporta localização.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          el("latitude").value = pos.coords.latitude;
          el("longitude").value = pos.coords.longitude;
          mostrarMensagem("Localização capturada com sucesso.", "#86efac");
        },
        () => {
          mostrarMensagem("Não foi possível pegar sua localização. Você pode preencher a referência manualmente.");
        },
        { enableHighAccuracy:true, timeout:10000 }
      );
    }

    async function verificarBorracheirosDisponiveis(){
      const latitudeCliente = el("latitude").value
        ? Number(String(el("latitude").value).replace(",", "."))
        : null;

      const longitudeCliente = el("longitude").value
        ? Number(String(el("longitude").value).replace(",", "."))
        : null;

      const enderecoTexto = (el("endereco_texto").value || "").trim();

      const temGpsCliente =
        latitudeCliente != null &&
        longitudeCliente != null &&
        !Number.isNaN(latitudeCliente) &&
        !Number.isNaN(longitudeCliente);

      const { data: borracheiros, error: errorBorracheiros } = await supabase
        .from("borracheiros")
        .select("id, nome, telefone, latitude, longitude, ativo, aberto, raio_atendimento_km");

      if(errorBorracheiros){
        console.error("Erro ao buscar borracheiros:", errorBorracheiros);
        return { disponivel: true, motivo: "erro_consulta" };
      }

      const borracheirosAbertos = (borracheiros || []).filter(item => {
        const ativo = item?.ativo === true || item?.ativo === "true" || item?.ativo === 1;
        const aberto = item?.aberto === true || item?.aberto === "true" || item?.aberto === 1;
        return ativo && aberto;
      });

      if(!borracheirosAbertos.length){
        return { disponivel: false, motivo: "sem_abertas" };
      }

      const idsAbertos = borracheirosAbertos.map(item => item.id).filter(Boolean);

      const { data: chamadosAtivos, error: errorChamados } = await supabase
        .from("chamados_borracharia")
        .select("id, borracheiro_id, status, created_at")
        .in("borracheiro_id", idsAbertos)
        .in("status", ["aceito", "em_andamento"]);

      if(errorChamados){
        console.error("Erro ao buscar chamados ativos:", errorChamados);
      }

      const agora = Date.now();

      const idsOcupados = new Set(
        (chamadosAtivos || [])
          .filter(item => {
            if(!item?.borracheiro_id) return false;
            if(item.status === "em_andamento") return true;

            if(item.status === "aceito"){
              const criadoEm = item.created_at ? new Date(item.created_at).getTime() : 0;
              const minutos = (agora - criadoEm) / 1000 / 60;
              return minutos <= 120;
            }

            return false;
          })
          .map(item => item.borracheiro_id)
      );

      const borracheirosLivres = borracheirosAbertos.filter(item => !idsOcupados.has(item.id));

      if(!borracheirosLivres.length){
        return { disponivel: false, motivo: "ocupadas" };
      }

      if(!temGpsCliente){
        if(enderecoTexto){
          return { disponivel: true, motivo: "ok_sem_gps" };
        }
        return { disponivel: true, motivo: "ok" };
      }

      const elegiveis = borracheirosLivres.filter(item => {
        const lat = item?.latitude != null
          ? Number(String(item.latitude).replace(",", "."))
          : null;

        const lon = item?.longitude != null
          ? Number(String(item.longitude).replace(",", "."))
          : null;

        const raio = item?.raio_atendimento_km != null
          ? Number(String(item.raio_atendimento_km).replace(",", "."))
          : 10;

        if(lat == null || lon == null || Number.isNaN(lat) || Number.isNaN(lon)){
          return true;
        }

        const distancia = calcularDistanciaKm(
          latitudeCliente,
          longitudeCliente,
          lat,
          lon
        );

        if(distancia == null) return true;

        return distancia <= (Number.isNaN(raio) ? 10 : raio);
      });

      if(!elegiveis.length){
        return { disponivel: false, motivo: "fora_do_raio" };
      }

      return { disponivel: true, motivo: "ok" };
    }

    async function solicitarAtendimento(){
      limparMensagem();

      const cliente_nome = el("cliente_nome").value.trim();
      const cliente_telefone = el("cliente_telefone").value.trim();
      const tipo_veiculo = el("tipo_veiculo").value;
      const problema = el("problema").value;
      const observacoes = el("observacoes").value.trim();
      const endereco_texto = el("endereco_texto").value.trim();
      const latitude = el("latitude").value ? Number(el("latitude").value) : null;
      const longitude = el("longitude").value ? Number(el("longitude").value) : null;

      if(!cliente_nome || !cliente_telefone){
        mostrarMensagem("Preencha nome e telefone.");
        return;
      }

      if(!endereco_texto && (latitude === null || longitude === null)){
        mostrarMensagem("Informe a localização pelo GPS ou digite uma referência/endereço.");
        return;
      }

      const disponibilidade = await verificarBorracheirosDisponiveis();

      if(!disponibilidade.disponivel){
        if(disponibilidade.motivo === "sem_abertas"){
          mostrarMensagem("⚠️ Nenhuma borracharia aberta no momento.");
          return;
        }

        if(disponibilidade.motivo === "ocupadas"){
          mostrarMensagem("⚠️ Todas as borracharias abertas estão ocupadas agora.");
          return;
        }

        if(disponibilidade.motivo === "fora_do_raio"){
          mostrarMensagem("⚠️ Nenhuma borracharia atende sua localização neste raio.");
          return;
        }

        mostrarMensagem("⚠️ Nenhuma borracharia disponível no momento. Tente novamente mais tarde.");
        return;
      }

      el("btnSolicitar").disabled = true;
      el("btnSolicitar").textContent = "Enviando...";

      const { data, error } = await supabase
        .from("chamados_borracharia")
        .insert([{
          cliente_nome,
          cliente_telefone,
          tipo_veiculo,
          problema,
          observacoes,
          endereco_texto,
          latitude,
          longitude,
          status: "aguardando",
          forma_pagamento: "indefinido",
          valor_estimado: 0,
          valor_final: 0
        }])
        .select()
        .single();

      el("btnSolicitar").disabled = false;
      el("btnSolicitar").textContent = "Solicitar atendimento";

      if(error){
        console.error(error);
        mostrarMensagem("Erro ao solicitar atendimento.");
        return;
      }

      const codigo = data?.codigo_acompanhamento || "";
      el("resultadoSolicitacao").style.display = "block";
      el("codigoGerado").textContent = codigo;

      el("codigoConsulta").value = codigo;
      salvarChamadoSalvo(codigo);
      mostrarModoSomenteConsulta(codigo);
      mostrarMensagem("Chamado criado com sucesso.", "#86efac");

      consultarChamado(codigo);
    }

    async function consultarChamado(codigoManual = null){
      const codigo = (codigoManual || el("codigoConsulta").value).trim().toUpperCase();

      if(!codigo) return;

      const { data, error } = await supabase
        .from("chamados_borracharia")
        .select(`
          id,
          cliente_nome,
          cliente_telefone,
          tipo_veiculo,
          problema,
          observacoes,
          endereco_texto,
          latitude,
          longitude,
          status,
          valor_estimado,
          valor_final,
          forma_pagamento,
          codigo_acompanhamento,
          created_at,
          aceito_em,
          finalizado_em,
          borracheiro_id,
          borracheiros (
            nome,
            telefone
          )
        `)
        .eq("codigo_acompanhamento", codigo)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      if(error || !data){
        el("resultadoConsulta").style.display = "block";
        el("statusBox").className = "status-box cancelado";
        el("statusBox").textContent = "CHAMADO NÃO ENCONTRADO";
        el("destaqueBorracheiro").innerHTML = "";
        el("infoChamado").innerHTML = "Verifique o código e tente novamente.";
        mostrarModoNormal();
        limparChamadoSalvo();
        if(intervalConsulta) clearInterval(intervalConsulta);
        return;
      }

      const status = data.status || "aguardando";
      const classe = ["aguardando","aceito","em_andamento","finalizado","cancelado"].includes(status)
        ? status
        : "aguardando";

      const nomeBorracheiro = data.borracheiros?.nome || "";
      const telefoneBorracheiro = data.borracheiros?.telefone || "";

      let textoStatus = traduzirStatus(status);
      if(status === "aceito" && nomeBorracheiro){
        textoStatus = `Aceito por ${nomeBorracheiro}`;
      }
      if(status === "em_andamento" && nomeBorracheiro){
        textoStatus = `Em atendimento com ${nomeBorracheiro}`;
      }

      el("resultadoConsulta").style.display = "block";
      el("statusBox").className = "status-box " + classe;
      el("statusBox").textContent = textoStatus.toUpperCase();

      if((status === "aceito" || status === "em_andamento") && nomeBorracheiro){
        const telefoneLink = telefoneBorracheiro
          ? telefoneBorracheiro.replace(/\D/g, "")
          : "";

        el("destaqueBorracheiro").innerHTML = `
          <div class="destaque">
            Serviço ${status === "aceito" ? "aceito" : "em andamento"} pela borracharia <strong>${nomeBorracheiro}</strong>
            ${telefoneBorracheiro ? `<br>Contato: <a href="https://wa.me/55${telefoneLink}" target="_blank">${telefoneBorracheiro}</a>` : ""}
          </div>
        `;
      } else {
        el("destaqueBorracheiro").innerHTML = "";
      }

      el("infoChamado").innerHTML = `
        <div><strong>Cliente:</strong> ${data.cliente_nome || "-"}</div>
        <div><strong>Telefone:</strong> ${data.cliente_telefone || "-"}</div>
        <div><strong>Veículo:</strong> ${data.tipo_veiculo || "-"}</div>
        <div><strong>Problema:</strong> ${data.problema || "-"}</div>
        <div><strong>Referência:</strong> ${data.endereco_texto || "-"}</div>
        <div><strong>Observações:</strong> ${data.observacoes || "-"}</div>
        <div><strong>Valor estimado:</strong> R$ ${Number(data.valor_estimado || 0).toFixed(2)}</div>
        <div><strong>Valor final:</strong> R$ ${Number(data.valor_final || 0).toFixed(2)}</div>
        <div><strong>Pagamento:</strong> ${data.forma_pagamento || "-"}</div>
        ${nomeBorracheiro ? `<div><strong>Borracharia:</strong> ${nomeBorracheiro}</div>` : ""}
        ${telefoneBorracheiro ? `<div><strong>Contato da borracharia:</strong> ${telefoneBorracheiro}</div>` : ""}
        <div class="linha"></div>
        <div><strong>Código:</strong> ${data.codigo_acompanhamento || "-"}</div>
      `;

      if(statusAindaAtivo(status)){
        mostrarModoSomenteConsulta(codigo);
        salvarChamadoSalvo(codigo);
      } else {
        mostrarModoNormal();
        limparChamadoSalvo();
      }

      if(intervalConsulta) clearInterval(intervalConsulta);

      if(statusAindaAtivo(status)){
        intervalConsulta = setInterval(() => consultarChamado(codigo), 5000);
      }
    }

    async function verificarChamadoSalvoAoAbrir(){
      const codigoSalvo = localStorage.getItem("ff_borracharia_codigo");

      if(!codigoSalvo){
        mostrarModoNormal();
        return;
      }

      el("codigoConsulta").value = codigoSalvo;
      mostrarModoSomenteConsulta(codigoSalvo);
      await consultarChamado(codigoSalvo);
    }

    function registrarServiceWorker(){
      if(!("serviceWorker" in navigator)) return;

      window.addEventListener("load", async () => {
        try{
          await navigator.serviceWorker.register("/borracharia/public/sw.js", {
            scope: "/borracharia/public/"
          });
          console.log("Service Worker registrado com sucesso.");
        }catch(error){
          console.error("Erro ao registrar Service Worker:", error);
        }
      });
    }

    function iniciarInstalacaoPWA(){
      const btnInstalarApp = el("btnInstalarApp");

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if(btnInstalarApp){
          btnInstalarApp.style.display = "block";
        }
      });

      if(btnInstalarApp){
        btnInstalarApp.addEventListener("click", async () => {
          if(!deferredPrompt) return;
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          btnInstalarApp.style.display = "none";
        });
      }

      window.addEventListener("appinstalled", () => {
        if(btnInstalarApp){
          btnInstalarApp.style.display = "none";
        }
        console.log("PWA instalada com sucesso.");
      });
    }

    el("btnLocalizacao").addEventListener("click", pegarLocalizacao);
    el("btnSolicitar").addEventListener("click", solicitarAtendimento);
    el("btnConsultar").addEventListener("click", () => consultarChamado());

    registrarServiceWorker();
    iniciarInstalacaoPWA();
    verificarChamadoSalvoAoAbrir();
  </script>
</body>
</html>
