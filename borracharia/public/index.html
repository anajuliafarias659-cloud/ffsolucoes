
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FF Borracharia - Socorro Rápido</title>

  <!-- PWA -->
  <link rel="manifest" href="/borracharia/public/manifest.webmanifest" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FF Borracharia" />
  <link rel="apple-touch-icon" href="/borracharia/public/icons/icon-192.png" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg1:#0f172a;
      --bg2:#020617;
      --card:#111827;
      --input:#1f2937;
      --line:rgba(255,255,255,.08);
      --amarelo:#f59e0b;
      --amarelo2:#fbbf24;
      --vermelho:#dc2626;
      --verde:#16a34a;
      --texto:#ffffff;
      --muted:#94a3b8;
      --topo-altura: 165px;
    }

    html,body{
      width:100%;
      min-height:100%;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--texto);
      min-height:100vh;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
    }

    .container{
      width:min(100%,700px);
      margin:0 auto;
      padding:
        calc(var(--topo-altura) + env(safe-area-inset-top) + 14px)
        14px
        calc(34px + env(safe-area-inset-bottom));
    }

    .topo{
      position:fixed;
      top:0;
      left:50%;
      transform:translateX(-50%);
      z-index:999;
      width:min(100%,700px);
      padding:
        calc(14px + env(safe-area-inset-top))
        14px
        12px;
      background:
        linear-gradient(135deg,rgba(245,158,11,.98),rgba(220,38,38,.96));
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-bottom-left-radius:22px;
      border-bottom-right-radius:22px;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
    }

    .topoBox{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .topoIcone{
      width:68px;
      height:68px;
      min-width:68px;
      border-radius:18px;
      background:rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
      overflow:hidden;
    }

    .topoIcone svg{
      width:46px;
      height:46px;
      display:block;
    }

    .topoTexto{
      min-width:0;
      flex:1;
    }

    .topo h1{
      font-size:28px;
      line-height:1.05;
      margin-bottom:6px;
      word-break:break-word;
    }

    .topo p{
      opacity:.96;
      line-height:1.35;
      font-size:14px;
    }

    .instalarWrap{
      margin-top:12px;
    }

    #btnInstalarApp{
      display:none;
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      font-weight:800;
      color:#fff;
      cursor:pointer;
      background:rgba(15,23,42,.88);
      box-shadow:0 6px 18px rgba(0,0,0,.22);
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }

    h2{
      font-size:18px;
      margin-bottom:12px;
      color:var(--amarelo2);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .full{grid-column:1/-1}

    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      color:#cbd5e1;
    }

    input,select,textarea,button{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:13px 12px;
      font-size:15px;
      font-family:inherit;
    }

    input,select,textarea{
      background:var(--input);
      color:#fff;
      border:1px solid var(--line);
      appearance:none;
      -webkit-appearance:none;
    }

    input::placeholder,
    textarea::placeholder{
      color:#94a3b8;
      opacity:1;
    }

    textarea{
      resize:none;
      min-height:96px;
    }

    button{
      background:linear-gradient(135deg,var(--amarelo),#ef4444);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
      min-height:50px;
      -webkit-tap-highlight-color:transparent;
    }

    button:hover{transform:translateY(-1px)}

    button.sec{
      background:#334155;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .status-box{
      padding:14px;
      border-radius:14px;
      font-weight:700;
      text-align:center;
      margin-top:10px;
      word-break:break-word;
    }

    .aguardando{background:#78350f}
    .aceito{background:#1d4ed8}
    .em_andamento{background:#0f766e}
    .finalizado{background:#166534}
    .cancelado{background:#7f1d1d}

    .muted{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .codigo-box{
      background:#0f172a;
      border:1px dashed var(--amarelo);
      padding:14px;
      border-radius:14px;
      text-align:center;
      margin-top:12px;
    }

    .codigo{
      font-size:28px;
      font-weight:900;
      letter-spacing:2px;
      color:var(--amarelo2);
      margin-top:8px;
      word-break:break-word;
    }

    .info{
      margin-top:10px;
      line-height:1.7;
      color:#e5e7eb;
      font-size:15px;
      word-break:break-word;
    }

    .linha{
      height:1px;
      background:var(--line);
      margin:14px 0;
    }

    .msg{
      margin-top:10px;
      font-size:14px;
      color:#fca5a5;
      min-height:18px;
      line-height:1.45;
    }

    .oculto{
      display:none !important;
    }

    .destaque{
      background:#0f172a;
      border:1px solid rgba(251,191,36,.25);
      border-radius:14px;
      padding:12px;
      margin-top:12px;
      color:#fde68a;
      font-weight:700;
      line-height:1.5;
      word-break:break-word;
    }

    .rodapeSpace{
      height:8px;
    }

    @media(max-width:640px){
      :root{
        --topo-altura: 230px;
      }

      .container{
        padding-left:12px;
        padding-right:12px;
      }

      .topo{
        width:100%;
        border-bottom-left-radius:20px;
        border-bottom-right-radius:20px;
      }

      .topoBox{
        align-items:flex-start;
        gap:12px;
      }

      .topoIcone{
        width:58px;
        height:58px;
        min-width:58px;
        border-radius:16px;
      }

      .topoIcone svg{
        width:40px;
        height:40px;
      }

      .topo h1{
        font-size:23px;
      }

      .topo p{
        font-size:13px;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .card{
        padding:14px;
        border-radius:16px;
      }

      h2{
        font-size:17px;
      }

      input,select,textarea,button{
        font-size:16px;
      }

      .codigo{
        font-size:24px;
        letter-spacing:1px;
      }

      .info{
        font-size:14px;
      }
    }

    @media(max-width:390px){
      :root{
        --topo-altura: 245px;
      }

      .topo h1{
        font-size:21px;
      }

      .topo p{
        font-size:12.5px;
      }

      .topoIcone{
        width:54px;
        height:54px;
        min-width:54px;
      }

      .topoIcone svg{
        width:36px;
        height:36px;
      }
    }
  </style>
</head>
<body>
  <div class="topo">
    <div class="topoBox">
      <div class="topoIcone" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="24" fill="#111827" stroke="#FBBF24" stroke-width="3"/>
          <circle cx="32" cy="32" r="14" fill="#1F2937" stroke="#E5E7EB" stroke-width="2"/>
          <circle cx="32" cy="32" r="4" fill="#F59E0B"/>
          <path d="M32 10V18" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
          <path d="M32 46V54" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
          <path d="M10 32H18" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
          <path d="M46 32H54" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
          <path d="M17.5 17.5L22.8 22.8" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
          <path d="M41.2 41.2L46.5 46.5" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
          <path d="M17.5 46.5L22.8 41.2" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
          <path d="M41.2 22.8L46.5 17.5" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="topoTexto">
        <h1>FF Borracharia</h1>
        <p>Furou o pneu? Ficou no prego? Solicite atendimento rápido e acompanhe seu chamado em tempo real.</p>
      </div>
    </div>

    <div class="instalarWrap">
      <button id="btnInstalarApp" type="button">Instalar aplicativo</button>
    </div>
  </div>

  <div class="container">
    <div class="card" id="cardSolicitacao">
      <h2>Solicitar socorro</h2>

      <div class="grid">
        <div>
          <label>Seu nome</label>
          <input id="cliente_nome" placeholder="Digite seu nome" />
        </div>

        <div>
          <label>Telefone / WhatsApp</label>
          <input id="cliente_telefone" placeholder="Ex: 88999999999" />
        </div>

        <div>
          <label>Veículo</label>
          <select id="tipo_veiculo">
            <option value="Carro">Carro</option>
            <option value="Moto">Moto</option>
            <option value="Caminhão">Caminhão</option>
            <option value="Van">Van</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div>
          <label>Problema</label>
          <select id="problema">
            <option value="Pneu furado">Pneu furado</option>
            <option value="Troca de pneu">Troca de pneu</option>
            <option value="Sem estepe">Sem estepe</option>
            <option value="Calibragem">Calibragem</option>
            <option value="Roda danificada">Roda danificada</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div class="full">
          <label>Observações</label>
          <textarea id="observacoes" placeholder="Ex: estou na estrada perto do posto, carro branco, pneu dianteiro esquerdo..."></textarea>
        </div>

        <div class="full">
          <label>Endereço / referência</label>
          <input id="endereco_texto" placeholder="Ex: BR 020, próximo ao posto X" />
        </div>

        <div class="full">
          <button id="btnLocalizacao" type="button">Pegar minha localização</button>
        </div>

        <div>
          <label>Latitude</label>
          <input id="latitude" readonly />
        </div>

        <div>
          <label>Longitude</label>
          <input id="longitude" readonly />
        </div>

        <div class="full">
          <button id="btnSolicitar" type="button">Solicitar atendimento</button>
          <div class="msg" id="msgSolicitacao"></div>
        </div>
      </div>

      <div id="resultadoSolicitacao" style="display:none;">
        <div class="codigo-box">
          <div>Seu chamado foi criado com sucesso</div>
          <div class="codigo" id="codigoGerado">--------</div>
          <div class="muted">Guarde esse código para acompanhar o atendimento</div>
        </div>
      </div>
    </div>

    <div class="card" id="cardConsulta">
      <h2 id="tituloConsulta">Acompanhar chamado</h2>

      <div class="grid">
        <div class="full">
          <label>Código de acompanhamento</label>
          <input id="codigoConsulta" placeholder="Digite o código do chamado" />
        </div>
        <div class="full">
          <button id="btnConsultar" type="button" class="sec">Consultar status</button>
        </div>
      </div>

      <div id="resultadoConsulta" style="display:none;">
        <div class="status-box" id="statusBox">AGUARDANDO</div>
        <div id="destaqueBorracheiro"></div>
        <div class="info" id="infoChamado"></div>
      </div>
    </div>

    <div class="rodapeSpace"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    const el = (id) => document.getElementById(id);

    let intervalConsulta = null;
    let deferredPrompt = null;

    function limparMensagem(){
      el("msgSolicitacao").textContent = "";
    }

    function mostrarMensagem(msg, cor = "#fca5a5"){
      el("msgSolicitacao").style.color = cor;
      el("msgSolicitacao").textContent = msg;
    }

    function traduzirStatus(status){
      if(status === "aguardando") return "Aguardando borracheiro";
      if(status === "aceito") return "Chamado aceito";
      if(status === "em_andamento") return "Em andamento";
      if(status === "finalizado") return "Finalizado";
      if(status === "cancelado") return "Cancelado";
      return status || "-";
    }

    function statusAindaAtivo(status){
      return ["aguardando", "aceito", "em_andamento"].includes(status);
    }

    function mostrarModoSomenteConsulta(codigo = ""){
      el("cardSolicitacao").classList.add("oculto");
      el("tituloConsulta").textContent = "Acompanhar atendimento";
      if(codigo){
        el("codigoConsulta").value = codigo;
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function mostrarModoNormal(){
      el("cardSolicitacao").classList.remove("oculto");
      el("tituloConsulta").textContent = "Acompanhar chamado";
    }

    function limparChamadoSalvo(){
      localStorage.removeItem("ff_borracharia_codigo");
    }

    function salvarChamadoSalvo(codigo){
      localStorage.setItem("ff_borracharia_codigo", codigo);
    }

    function normalizarNumero(valor){
      if(valor === null || valor === undefined || valor === "") return null;
      const texto = String(valor).replace(",", ".").trim();
      const numero = Number(texto);
      return Number.isFinite(numero) ? numero : null;
    }

    function calcularDistanciaKm(lat1, lon1, lat2, lon2){
      if(
        lat1 == null || lon1 == null ||
        lat2 == null || lon2 == null ||
        isNaN(lat1) || isNaN(lon1) || isNaN(lat2) || isNaN(lon2)
      ){
        return null;
      }

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function statusChamadoAtivo(status){
      const s = String(status || "").toLowerCase().trim();
      return s === "aceito" || s === "em_andamento" || s === "em andamento";
    }

    async function pegarLocalizacao(){
      limparMensagem();

      if(!navigator.geolocation){
        mostrarMensagem("Seu navegador não suporta localização.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          el("latitude").value = pos.coords.latitude;
          el("longitude").value = pos.coords.longitude;
          mostrarMensagem("Localização capturada com sucesso.", "#86efac");
        },
        () => {
          mostrarMensagem("Não foi possível pegar sua localização. Você pode preencher a referência manualmente.");
        },
        { enableHighAccuracy:true, timeout:10000 }
      );
    }

    async function verificarBorracheirosDisponiveis(){
      const latitudeCliente = normalizarNumero(el("latitude").value);
      const longitudeCliente = normalizarNumero(el("longitude").value);

      const { data: borracheirosRaw, error } = await supabase
  .from("borracheiros")
  .select("id, ativo, aberto, raio_atendimento_km, latitude, longitude");

function valorAtivo(v){
  const s = String(v ?? "").toLowerCase().trim();
  return v === true || v === 1 || s === "1" || s === "true" || s === "sim" || s === "ativo";
}

function valorAberto(v){
  const s = String(v ?? "").toLowerCase().trim();
  return v === true || v === 1 || s === "1" || s === "true" || s === "sim" || s === "aberto" || s === "aberta";
}

const borracheirosAbertos = (borracheirosRaw || []).filter(item =>
  valorAtivo(item.ativo) && valorAberto(item.aberto)
);

      if(error){
        console.error("Erro ao verificar borracheiros:", error);
        return { disponivel: false, motivo: "erro" };
      }

      if(!borracheirosAbertos || borracheirosAbertos.length === 0){
        return { disponivel: false, motivo: "sem_abertas" };
      }

      const idsBorracheiros = borracheirosAbertos.map(item => item.id).filter(Boolean);

      const { data: chamadosAtivos, error: errorChamados } = await supabase
        .from("chamados_borracharia")
        .select("borracheiro_id, status, created_at")
        .in("borracheiro_id", idsBorracheiros);

      if(errorChamados){
        console.error("Erro ao verificar chamados ativos:", errorChamados);
        return { disponivel: false, motivo: "erro" };
      }

      const agora = new Date();

      const ocupados = new Set(
        (chamadosAtivos || [])
          .filter(item => {
            if(!item?.borracheiro_id) return false;
            if(!statusChamadoAtivo(item.status)) return false;

            if(!item.created_at) return true;

            const dataChamado = new Date(item.created_at);
            if(Number.isNaN(dataChamado.getTime())) return true;

            const diffMin = (agora.getTime() - dataChamado.getTime()) / 1000 / 60;

            return diffMin <= 120;
          })
          .map(item => item.borracheiro_id)
      );

      const borracheirosLivres = borracheirosAbertos.filter(item => !ocupados.has(item.id));

      if(!borracheirosLivres.length){
        return { disponivel: false, motivo: "ocupadas" };
      }

      if(latitudeCliente == null || longitudeCliente == null){
        return { disponivel: true, motivo: "ok" };
      }

      const borracheirosNoRaio = borracheirosLivres.filter(item => {
        const lat = normalizarNumero(item.latitude);
        const lon = normalizarNumero(item.longitude);
        const raio = normalizarNumero(item.raio_atendimento_km) ?? 10;

        if(lat == null || lon == null){
          return false;
        }

        const distancia = calcularDistanciaKm(
          latitudeCliente,
          longitudeCliente,
          lat,
          lon
        );

        return distancia != null && distancia <= raio;
      });

      if(!borracheirosNoRaio.length){
        return { disponivel: false, motivo: "fora_do_raio" };
      }

      return { disponivel: true, motivo: "ok" };
    }

    async function solicitarAtendimento(){
      limparMensagem();

      const cliente_nome = el("cliente_nome").value.trim();
      const cliente_telefone = el("cliente_telefone").value.trim();
      const tipo_veiculo = el("tipo_veiculo").value;
      const problema = el("problema").value;
      const observacoes = el("observacoes").value.trim();
      const endereco_texto = el("endereco_texto").value.trim();
      const latitude = normalizarNumero(el("latitude").value);
      const longitude = normalizarNumero(el("longitude").value);

      if(!cliente_nome || !cliente_telefone){
        mostrarMensagem("Preencha nome e telefone.");
        return;
      }

      if(!endereco_texto && (latitude === null || longitude === null)){
        mostrarMensagem("Informe a localização pelo GPS ou digite uma referência/endereço.");
        return;
      }

      const disponibilidade = await verificarBorracheirosDisponiveis();

      if(!disponibilidade.disponivel){
        if(disponibilidade.motivo === "sem_abertas"){
          mostrarMensagem("⚠️ Nenhuma borracharia aberta no momento.");
          return;
        }

        if(disponibilidade.motivo === "ocupadas"){
          mostrarMensagem("⚠️ Todas as borracharias abertas estão ocupadas agora.");
          return;
        }

        if(disponibilidade.motivo === "fora_do_raio"){
          mostrarMensagem("⚠️ Nenhuma borracharia atende sua localização neste raio.");
          return;
        }

        mostrarMensagem("⚠️ Nenhuma borracharia disponível no momento. Tente novamente mais tarde.");
        return;
      }

      el("btnSolicitar").disabled = true;
      el("btnSolicitar").textContent = "Enviando...";

      const { data, error } = await supabase
        .from("chamados_borracharia")
        .insert([{
          cliente_nome,
          cliente_telefone,
          tipo_veiculo,
          problema,
          observacoes,
          endereco_texto,
          latitude,
          longitude,
          status: "aguardando",
          forma_pagamento: "indefinido",
          valor_estimado: 0,
          valor_final: 0
        }])
        .select()
        .single();

      el("btnSolicitar").disabled = false;
      el("btnSolicitar").textContent = "Solicitar atendimento";

      if(error){
        console.error(error);
        mostrarMensagem("Erro ao solicitar atendimento.");
        return;
      }

      const codigo = data?.codigo_acompanhamento || "";
      el("resultadoSolicitacao").style.display = "block";
      el("codigoGerado").textContent = codigo;

      el("codigoConsulta").value = codigo;
      salvarChamadoSalvo(codigo);
      mostrarModoSomenteConsulta(codigo);
      mostrarMensagem("Chamado criado com sucesso.", "#86efac");

      consultarChamado(codigo);
    }

    async function consultarChamado(codigoManual = null){
      const codigo = (codigoManual || el("codigoConsulta").value).trim().toUpperCase();

      if(!codigo) return;

      const { data, error } = await supabase
        .from("chamados_borracharia")
        .select(`
          id,
          cliente_nome,
          cliente_telefone,
          tipo_veiculo,
          problema,
          observacoes,
          endereco_texto,
          latitude,
          longitude,
          status,
          valor_estimado,
          valor_final,
          forma_pagamento,
          codigo_acompanhamento,
          created_at,
          aceito_em,
          finalizado_em,
          borracheiro_id,
          borracheiros (
            nome,
            telefone
          )
        `)
        .eq("codigo_acompanhamento", codigo)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      if(error || !data){
        el("resultadoConsulta").style.display = "block";
        el("statusBox").className = "status-box cancelado";
        el("statusBox").textContent = "CHAMADO NÃO ENCONTRADO";
        el("destaqueBorracheiro").innerHTML = "";
        el("infoChamado").innerHTML = "Verifique o código e tente novamente.";
        mostrarModoNormal();
        limparChamadoSalvo();
        if(intervalConsulta) clearInterval(intervalConsulta);
        return;
      }

      const status = data.status || "aguardando";
      const classe = ["aguardando","aceito","em_andamento","finalizado","cancelado"].includes(status)
        ? status
        : "aguardando";

      const nomeBorracheiro = data.borracheiros?.nome || "";
      const telefoneBorracheiro = data.borracheiros?.telefone || "";

      let textoStatus = traduzirStatus(status);
      if(status === "aceito" && nomeBorracheiro){
        textoStatus = `Aceito por ${nomeBorracheiro}`;
      }
      if(status === "em_andamento" && nomeBorracheiro){
        textoStatus = `Em atendimento com ${nomeBorracheiro}`;
      }

      el("resultadoConsulta").style.display = "block";
      el("statusBox").className = "status-box " + classe;
      el("statusBox").textContent = textoStatus.toUpperCase();

      if((status === "aceito" || status === "em_andamento") && nomeBorracheiro){
        el("destaqueBorracheiro").innerHTML = `
          <div class="destaque">
            Serviço ${status === "aceito" ? "aceito" : "em andamento"} pela borracharia <strong>${nomeBorracheiro}</strong>
            ${telefoneBorracheiro ? `<br>Contato: ${telefoneBorracheiro}` : ""}
          </div>
        `;
      } else {
        el("destaqueBorracheiro").innerHTML = "";
      }

      el("infoChamado").innerHTML = `
        <div><strong>Cliente:</strong> ${data.cliente_nome || "-"}</div>
        <div><strong>Telefone:</strong> ${data.cliente_telefone || "-"}</div>
        <div><strong>Veículo:</strong> ${data.tipo_veiculo || "-"}</div>
        <div><strong>Problema:</strong> ${data.problema || "-"}</div>
        <div><strong>Referência:</strong> ${data.endereco_texto || "-"}</div>
        <div><strong>Observações:</strong> ${data.observacoes || "-"}</div>
        <div><strong>Valor estimado:</strong> R$ ${Number(data.valor_estimado || 0).toFixed(2)}</div>
        <div><strong>Valor final:</strong> R$ ${Number(data.valor_final || 0).toFixed(2)}</div>
        <div><strong>Pagamento:</strong> ${data.forma_pagamento || "-"}</div>
        ${nomeBorracheiro ? `<div><strong>Borracharia:</strong> ${nomeBorracheiro}</div>` : ""}
        ${telefoneBorracheiro ? `<div><strong>Contato da borracharia:</strong> ${telefoneBorracheiro}</div>` : ""}
        <div class="linha"></div>
        <div><strong>Código:</strong> ${data.codigo_acompanhamento || "-"}</div>
      `;

      if(statusAindaAtivo(status)){
        mostrarModoSomenteConsulta(codigo);
        salvarChamadoSalvo(codigo);
      } else {
        mostrarModoNormal();
        limparChamadoSalvo();
      }

      if(intervalConsulta) clearInterval(intervalConsulta);

      if(statusAindaAtivo(status)){
        intervalConsulta = setInterval(() => consultarChamado(codigo), 5000);
      }
    }

    async function verificarChamadoSalvoAoAbrir(){
      const codigoSalvo = localStorage.getItem("ff_borracharia_codigo");

      if(!codigoSalvo){
        mostrarModoNormal();
        return;
      }

      el("codigoConsulta").value = codigoSalvo;
      mostrarModoSomenteConsulta(codigoSalvo);
      await consultarChamado(codigoSalvo);
    }

    function registrarServiceWorker(){
      if(!("serviceWorker" in navigator)) return;

      window.addEventListener("load", async () => {
        try{
          await navigator.serviceWorker.register("/borracharia/public/sw.js", {
            scope: "/borracharia/public/"
          });
          console.log("Service Worker registrado com sucesso.");
        }catch(error){
          console.error("Erro ao registrar Service Worker:", error);
        }
      });
    }

    function iniciarInstalacaoPWA(){
      const btnInstalarApp = el("btnInstalarApp");

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if(btnInstalarApp){
          btnInstalarApp.style.display = "block";
        }
      });

      if(btnInstalarApp){
        btnInstalarApp.addEventListener("click", async () => {
          if(!deferredPrompt) return;
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          btnInstalarApp.style.display = "none";
        });
      }

      window.addEventListener("appinstalled", () => {
        if(btnInstalarApp){
          btnInstalarApp.style.display = "none";
        }
        console.log("PWA instalada com sucesso.");
      });
    }

    el("btnLocalizacao").addEventListener("click", pegarLocalizacao);
    el("btnSolicitar").addEventListener("click", solicitarAtendimento);
    el("btnConsultar").addEventListener("click", () => consultarChamado());

    registrarServiceWorker();
    iniciarInstalacaoPWA();
    verificarChamadoSalvoAoAbrir();
  </script>
</body>
</html>
