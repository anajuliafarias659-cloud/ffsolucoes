<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Borracharia - Socorro Rápido</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg1:#030b2a;
      --bg2:#020617;
      --card:#09152b;
      --card-2:#0c1931;
      --input:#1b2a43;
      --text:#ffffff;
      --muted:#c9d4e7;
      --accent:#ffb000;
      --accent-2:#ff6a00;
      --danger:#8e3a09;
      --btn:#40536f;
      --shadow:0 18px 40px rgba(0,0,0,.28);
    }

    html,body{min-height:100%}

    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(20,37,90,.38), transparent 30%),
        linear-gradient(180deg,#03103a 0%, #010a23 45%, #010617 100%);
      min-height:100vh;
    }

    .container{
      width:min(100%, 430px);
      margin:0 auto;
      padding:14px 10px 28px;
    }

    .topo{
      background:linear-gradient(135deg,#f5a623 0%, #ff6c00 45%, #da2b2b 100%);
      border-radius:22px;
      padding:12px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
      position:relative;
      overflow:hidden;
    }

    .topo::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 45%);
      pointer-events:none;
    }

    .topo-conteudo{
      display:flex;
      gap:12px;
      align-items:flex-start;
      position:relative;
      z-index:1;
    }

    .logo-box{
      min-width:52px;
      width:52px;
      height:52px;
      border-radius:14px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
      flex-shrink:0;
    }

    .logo-circulo{
      width:30px;
      height:30px;
      border-radius:50%;
      background:#0a1b42;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      box-shadow:0 0 0 2px rgba(255,193,7,.55) inset;
    }

    .topo-texto{flex:1;min-width:0}

    .topo h1{
      font-size:18px;
      line-height:1.1;
      margin:0 0 4px 0;
      font-weight:800;
      letter-spacing:.2px;
    }

    .topo p{
      font-size:12.5px;
      line-height:1.35;
      color:#fff6e5;
      opacity:.98;
      margin:0;
      font-weight:600;
    }

    .btn-instalar{
      margin-top:12px;
      width:100%;
      border:none;
      border-radius:14px;
      padding:13px 14px;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(135deg,#261c33 0%, #2e1e36 50%, #23253c 100%);
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .card{
      background:linear-gradient(180deg,#071327 0%, #081325 100%);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:14px 12px;
      margin-bottom:14px;
      box-shadow:0 10px 28px rgba(0,0,0,.22);
    }

    h2{
      font-size:14px;
      color:#ffbf1a;
      font-weight:800;
      margin-bottom:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .full{grid-column:1/-1}

    label{
      display:block;
      font-size:12px;
      color:#f0f4fa;
      margin-bottom:6px;
      font-weight:700;
    }

    input,select,textarea,button{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:12px 12px;
      font-size:14px;
      font-family:inherit;
    }

    input,select,textarea{
      background:linear-gradient(180deg,#1b2940 0%, #1a2538 100%);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    input::placeholder,
    textarea::placeholder{
      color:#b2c1d8;
    }

    textarea{
      resize:none;
      min-height:92px;
    }

    button{
      color:#fff;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{transform:translateY(-1px)}

    #btnSolicitar,
    #btnLocalizacao{
      background:linear-gradient(135deg,#f59e0b,#ef4444);
    }

    #btnConsultar{
      background:linear-gradient(180deg,#42536c 0%, #3a4b63 100%);
    }

    .status-box{
      padding:12px 14px;
      border-radius:12px;
      font-weight:900;
      text-align:center;
      margin-top:8px;
      margin-bottom:10px;
      font-size:13px;
      letter-spacing:.2px;
      color:#fff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .aguardando{background:#8b3f0b}
    .aceito{background:#1f5fd1}
    .em_andamento{background:#0f766e}
    .finalizado{background:#166534}
    .cancelado{background:#7f1d1d}

    .muted{
      color:#b6c3d8;
      font-size:12px;
      line-height:1.45;
    }

    .codigo-box{
      background:#09152b;
      border:1px dashed rgba(255,176,0,.65);
      padding:14px;
      border-radius:14px;
      text-align:center;
      margin-top:12px;
    }

    .codigo{
      font-size:28px;
      font-weight:900;
      letter-spacing:1.5px;
      color:#ffbf1a;
      margin-top:7px;
    }

    .info{
      margin-top:6px;
      line-height:1.55;
      color:#f6f8fc;
      font-size:13px;
    }

    .linha{
      height:1px;
      background:rgba(255,255,255,.09);
      margin:12px 0;
    }

    .msg{
      margin-top:8px;
      font-size:13px;
      color:#fca5a5;
      min-height:18px;
      font-weight:700;
    }

    .oculto{display:none !important}

    @media(max-width:640px){
      .grid{grid-template-columns:1fr}
      .container{width:min(100%, 430px);padding:14px 10px 24px}
      .topo{border-radius:20px;padding:10px}
      .topo h1{font-size:17px}
      .topo p{font-size:12px}
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topo">
      <div class="topo-conteudo">
        <div class="logo-box">
          <div class="logo-circulo">🛞</div>
        </div>

        <div class="topo-texto">
          <h1>FF Borracharia</h1>
          <p>Furou o pneu? Ficou no prego? Solicite atendimento rápido e acompanhe seu chamado em tempo real.</p>
        </div>
      </div>

      <button type="button" class="btn-instalar">Instalar aplicativo</button>
    </div>

    <div class="card" id="cardSolicitacao">
      <h2>Solicitar socorro</h2>

      <div class="grid">
        <div>
          <label>Seu nome</label>
          <input id="cliente_nome" placeholder="Digite seu nome" />
        </div>

        <div>
          <label>Telefone / WhatsApp</label>
          <input id="cliente_telefone" placeholder="Ex: 88999999999" />
        </div>

        <div>
          <label>Veículo</label>
          <select id="tipo_veiculo">
            <option value="Carro">Carro</option>
            <option value="Moto">Moto</option>
            <option value="Caminhão">Caminhão</option>
            <option value="Van">Van</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div>
          <label>Problema</label>
          <select id="problema">
            <option value="Pneu furado">Pneu furado</option>
            <option value="Troca de pneu">Troca de pneu</option>
            <option value="Sem estepe">Sem estepe</option>
            <option value="Calibragem">Calibragem</option>
            <option value="Roda danificada">Roda danificada</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div class="full">
          <label>Observações</label>
          <textarea id="observacoes" placeholder="Ex: estou na estrada perto do posto, carro branco, pneu dianteiro esquerdo..."></textarea>
        </div>

        <div class="full">
          <label>Endereço / referência</label>
          <input id="endereco_texto" placeholder="Ex: BR 020, próximo ao posto X" />
        </div>

        <div class="full">
          <button id="btnLocalizacao" type="button">Pegar minha localização</button>
        </div>

        <div>
          <label>Latitude</label>
          <input id="latitude" readonly />
        </div>

        <div>
          <label>Longitude</label>
          <input id="longitude" readonly />
        </div>

        <div class="full">
          <button id="btnSolicitar" type="button">Solicitar atendimento</button>
          <div class="msg" id="msgSolicitacao"></div>
        </div>
      </div>

      <div id="resultadoSolicitacao" style="display:none;">
        <div class="codigo-box">
          <div>Seu chamado foi criado com sucesso</div>
          <div class="codigo" id="codigoGerado">--------</div>
          <div class="muted">Guarde esse código para acompanhar o atendimento</div>
        </div>
      </div>
    </div>

    <div class="card" id="cardConsulta">
      <h2 id="tituloConsulta">Acompanhar atendimento</h2>

      <div class="grid">
        <div class="full">
          <label>Código de acompanhamento</label>
          <input id="codigoConsulta" placeholder="Digite o código do chamado" />
        </div>

        <div class="full">
          <button id="btnConsultar" type="button">Consultar status</button>
        </div>
      </div>

      <div id="resultadoConsulta" style="display:none;">
        <div class="status-box" id="statusBox">AGUARDANDO</div>
        <div class="info" id="infoChamado"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    const el = (id) => document.getElementById(id);
    let intervalConsulta = null;

    function limparMensagem() {
      el("msgSolicitacao").textContent = "";
    }

    function mostrarMensagem(msg, cor = "#fca5a5") {
      el("msgSolicitacao").style.color = cor;
      el("msgSolicitacao").textContent = msg;
    }

    function traduzirStatus(status) {
      if (status === "aguardando") return "Aguardando borracheiro";
      if (status === "aceito") return "Chamado aceito";
      if (status === "em_andamento") return "Em andamento";
      if (status === "finalizado") return "Finalizado";
      if (status === "cancelado") return "Cancelado";
      return status || "-";
    }

    function statusAindaAtivo(status) {
      return ["aguardando", "aceito", "em_andamento"].includes(status);
    }

    function mostrarModoSomenteConsulta(codigo = "") {
      el("cardSolicitacao").classList.add("oculto");
      el("tituloConsulta").textContent = "Acompanhar atendimento";
      if (codigo) el("codigoConsulta").value = codigo;
    }

    function mostrarModoNormal() {
      el("cardSolicitacao").classList.remove("oculto");
      el("tituloConsulta").textContent = "Acompanhar chamado";
    }

    function limparChamadoSalvo() {
      localStorage.removeItem("ff_borracharia_codigo");
    }

    function salvarChamadoSalvo(codigo) {
      localStorage.setItem("ff_borracharia_codigo", codigo);
    }

    function calcularDistanciaKm(lat1, lon1, lat2, lon2) {
      const toRad = (graus) => graus * Math.PI / 180;
      const R = 6371;

      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    async function buscarBorracheirosDisponiveisDentroDoRaio(latitude, longitude) {
      const { data, error } = await supabase
        .from("borracheiros")
        .select("id, nome, aberto, latitude, longitude, raio_km")
        .eq("aberto", true);

      if (error) {
        console.error("Erro ao buscar borracheiros:", error);
        return {
          erro: true,
          mensagem: "Erro ao verificar borracheiros disponíveis.",
          lista: []
        };
      }

      if (!data || data.length === 0) {
        return {
          erro: false,
          mensagem: "Nenhuma borracharia aberta no momento.",
          lista: []
        };
      }

      const dentroDoRaio = data
        .map((b) => {
          if (
            b.latitude == null ||
            b.longitude == null ||
            b.raio_km == null ||
            latitude == null ||
            longitude == null
          ) {
            return null;
          }

          const distancia_km = calcularDistanciaKm(
            Number(latitude),
            Number(longitude),
            Number(b.latitude),
            Number(b.longitude)
          );

          return {
            ...b,
            distancia_km
          };
        })
        .filter((b) => b && b.distancia_km <= Number(b.raio_km));

      if (dentroDoRaio.length === 0) {
        return {
          erro: false,
          mensagem: "Nenhuma borracharia atende sua localização no raio configurado.",
          lista: []
        };
      }

      return {
        erro: false,
        mensagem: "",
        lista: dentroDoRaio
      };
    }

    async function pegarLocalizacao() {
      limparMensagem();

      if (!navigator.geolocation) {
        mostrarMensagem("Seu navegador não suporta localização.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          el("latitude").value = pos.coords.latitude;
          el("longitude").value = pos.coords.longitude;
          mostrarMensagem("Localização capturada com sucesso.", "#86efac");
        },
        () => {
          mostrarMensagem("Não foi possível pegar sua localização.");
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    async function solicitarAtendimento() {
      limparMensagem();

      const cliente_nome = el("cliente_nome").value.trim();
      const cliente_telefone = el("cliente_telefone").value.trim();
      const tipo_veiculo = el("tipo_veiculo").value;
      const problema = el("problema").value;
      const observacoes = el("observacoes").value.trim();
      const endereco_texto = el("endereco_texto").value.trim();
      const latitude = el("latitude").value ? Number(el("latitude").value) : null;
      const longitude = el("longitude").value ? Number(el("longitude").value) : null;

      if (!cliente_nome || !cliente_telefone) {
        mostrarMensagem("Preencha nome e telefone.");
        return;
      }

      if (!endereco_texto && (latitude === null || longitude === null)) {
        mostrarMensagem("Informe a localização pelo GPS ou digite uma referência/endereço.");
        return;
      }

      if (latitude === null || longitude === null) {
        mostrarMensagem("Permita a localização para validar borracharias abertas no raio.");
        return;
      }

      el("btnSolicitar").disabled = true;
      el("btnSolicitar").textContent = "Enviando...";

      const disponibilidade = await buscarBorracheirosDisponiveisDentroDoRaio(latitude, longitude);

      if (disponibilidade.erro || disponibilidade.lista.length === 0) {
        el("btnSolicitar").disabled = false;
        el("btnSolicitar").textContent = "Solicitar atendimento";
        mostrarMensagem(disponibilidade.mensagem || "Nenhuma borracharia disponível.");
        return;
      }

      const { data, error } = await supabase
        .from("chamados_borracharia")
        .insert([{
          cliente_nome,
          cliente_telefone,
          tipo_veiculo,
          problema,
          observacoes,
          endereco_texto,
          latitude,
          longitude,
          status: "aguardando",
          forma_pagamento: "indefinido",
          valor_estimado: 0,
          valor_final: 0
        }])
        .select()
        .single();

      el("btnSolicitar").disabled = false;
      el("btnSolicitar").textContent = "Solicitar atendimento";

      if (error) {
        console.error(error);
        mostrarMensagem("Erro ao solicitar atendimento.");
        return;
      }

      const codigo = data?.codigo_acompanhamento || "";
      el("resultadoSolicitacao").style.display = "block";
      el("codigoGerado").textContent = codigo;

      el("codigoConsulta").value = codigo;
      salvarChamadoSalvo(codigo);
      mostrarModoSomenteConsulta(codigo);
      mostrarMensagem("Chamado criado com sucesso.", "#86efac");

      consultarChamado(codigo);
    }

    async function consultarChamado(codigoManual = null) {
      const codigo = (codigoManual || el("codigoConsulta").value).trim().toUpperCase();
      if (!codigo) return;

      const { data, error } = await supabase
        .from("chamados_borracharia")
        .select(`
          id,
          cliente_nome,
          cliente_telefone,
          tipo_veiculo,
          problema,
          observacoes,
          endereco_texto,
          latitude,
          longitude,
          status,
          valor_estimado,
          valor_final,
          forma_pagamento,
          codigo_acompanhamento,
          created_at,
          aceito_em,
          finalizado_em,
          borracheiro_id
        `)
        .eq("codigo_acompanhamento", codigo)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      if (error || !data) {
        el("resultadoConsulta").style.display = "block";
        el("statusBox").className = "status-box cancelado";
        el("statusBox").textContent = "CHAMADO NÃO ENCONTRADO";
        el("infoChamado").innerHTML = "Verifique o código e tente novamente.";
        mostrarModoNormal();
        limparChamadoSalvo();
        if (intervalConsulta) clearInterval(intervalConsulta);
        return;
      }

      const status = data.status || "aguardando";
      const classe = ["aguardando","aceito","em_andamento","finalizado","cancelado"].includes(status)
        ? status
        : "aguardando";

      el("resultadoConsulta").style.display = "block";
      el("statusBox").className = "status-box " + classe;
      el("statusBox").textContent = traduzirStatus(status).toUpperCase();

      el("infoChamado").innerHTML = `
        <div><strong>Cliente:</strong> ${data.cliente_nome || "-"}</div>
        <div><strong>Telefone:</strong> ${data.cliente_telefone || "-"}</div>
        <div><strong>Veículo:</strong> ${data.tipo_veiculo || "-"}</div>
        <div><strong>Problema:</strong> ${data.problema || "-"}</div>
        <div><strong>Referência:</strong> ${data.endereco_texto || "-"}</div>
        <div><strong>Observações:</strong> ${data.observacoes || "-"}</div>
        <div><strong>Valor estimado:</strong> R$ ${Number(data.valor_estimado || 0).toFixed(2)}</div>
        <div><strong>Valor final:</strong> R$ ${Number(data.valor_final || 0).toFixed(2)}</div>
        <div><strong>Pagamento:</strong> ${data.forma_pagamento || "-"}</div>
        <div class="linha"></div>
        <div><strong>Código:</strong> ${data.codigo_acompanhamento || "-"}</div>
      `;

      if (statusAindaAtivo(status)) {
        mostrarModoSomenteConsulta(codigo);
        salvarChamadoSalvo(codigo);
      } else {
        mostrarModoNormal();
        limparChamadoSalvo();
      }

      if (intervalConsulta) clearInterval(intervalConsulta);

      if (statusAindaAtivo(status)) {
        intervalConsulta = setInterval(() => consultarChamado(codigo), 5000);
      }
    }

    async function verificarChamadoSalvoAoAbrir() {
      const codigoSalvo = localStorage.getItem("ff_borracharia_codigo");

      if (!codigoSalvo) {
        mostrarModoNormal();
        return;
      }

      el("codigoConsulta").value = codigoSalvo;
      mostrarModoSomenteConsulta(codigoSalvo);
      await consultarChamado(codigoSalvo);
    }

    el("btnLocalizacao").addEventListener("click", pegarLocalizacao);
    el("btnSolicitar").addEventListener("click", solicitarAtendimento);
    el("btnConsultar").addEventListener("click", () => consultarChamado());

    verificarChamadoSalvoAoAbrir();
  </script>
</body>
</html>
