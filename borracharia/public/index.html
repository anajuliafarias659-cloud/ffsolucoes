<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Borracharia - Socorro Rápido</title>

  <!-- 🔥 PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg1:#030b2a;
      --bg2:#020617;
      --card:#09152b;
      --input:#1b2a43;
      --text:#ffffff;
      --muted:#c9d4e7;
      --shadow:0 18px 40px rgba(0,0,0,.28);
    }

    html,body{min-height:100%}

    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(20,37,90,.38), transparent 30%),
        linear-gradient(180deg,#03103a 0%, #010a23 45%, #010617 100%);
      min-height:100vh;
    }

    .container{
      width:min(100%, 430px);
      margin:0 auto;
      padding:14px 10px 28px;
    }

    /* 🔥 TOPO FIXO SEM QUEBRAR */
    .topo{
      position:sticky;
      top:0;
      z-index:999;

      background:linear-gradient(135deg,#f5a623 0%, #ff6c00 45%, #da2b2b 100%);
      border-radius:0 0 22px 22px;
      padding:12px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
      overflow:hidden;
    }

    .topo::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 45%);
      pointer-events:none;
    }

    .topo-conteudo{
      display:flex;
      gap:12px;
      align-items:flex-start;
      position:relative;
      z-index:1;
    }

    .logo-box{
      min-width:52px;
      width:52px;
      height:52px;
      border-radius:14px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
      flex-shrink:0;
    }

    .logo-circulo{
      width:30px;
      height:30px;
      border-radius:50%;
      background:#0a1b42;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      box-shadow:0 0 0 2px rgba(255,193,7,.55) inset;
    }

    .topo-texto{flex:1;min-width:0}

    .topo h1{
      font-size:18px;
      line-height:1.1;
      margin:0 0 4px 0;
      font-weight:800;
      letter-spacing:.2px;
    }

    .topo p{
      font-size:12.5px;
      line-height:1.35;
      color:#fff6e5;
      opacity:.98;
      margin:0;
      font-weight:600;
    }

    .btn-instalar{
      display:none;
      margin-top:12px;
      width:100%;
      border:none;
      border-radius:14px;
      padding:13px 14px;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(135deg,#261c33 0%, #2e1e36 50%, #23253c 100%);
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .card{
      background:linear-gradient(180deg,#071327 0%, #081325 100%);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:14px 12px;
      margin-bottom:14px;
      box-shadow:0 10px 28px rgba(0,0,0,.22);
    }

    h2{
      font-size:14px;
      color:#ffbf1a;
      font-weight:800;
      margin-bottom:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .full{grid-column:1/-1}

    label{
      display:block;
      font-size:12px;
      color:#f0f4fa;
      margin-bottom:6px;
      font-weight:700;
    }

    input,select,textarea,button{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:12px 12px;
      font-size:14px;
      font-family:inherit;
    }

    input,select,textarea{
      background:linear-gradient(180deg,#1b2940 0%, #1a2538 100%);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    input::placeholder,
    textarea::placeholder{
      color:#b2c1d8;
    }

    textarea{
      resize:none;
      min-height:92px;
    }

    button{
      color:#fff;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{transform:translateY(-1px)}

    #btnSolicitar,
    #btnLocalizacao{
      background:linear-gradient(135deg,#f59e0b,#ef4444);
    }

    #btnConsultar{
      background:linear-gradient(180deg,#42536c 0%, #3a4b63 100%);
    }

    .status-box{
      padding:12px 14px;
      border-radius:12px;
      font-weight:900;
      text-align:center;
      margin-top:8px;
      margin-bottom:10px;
      font-size:13px;
      letter-spacing:.2px;
      color:#fff;
    }

    .aguardando{background:#8b3f0b}
    .aceito{background:#1f5fd1}
    .em_andamento{background:#0f766e}
    .finalizado{background:#166534}
    .cancelado{background:#7f1d1d}

    .muted{color:#b6c3d8;font-size:12px}
    .codigo{font-size:28px;font-weight:900;color:#ffbf1a}
    .info{margin-top:6px;font-size:13px}
    .linha{height:1px;background:rgba(255,255,255,.09);margin:12px 0}
    .msg{margin-top:8px;font-size:13px;color:#fca5a5}
    .oculto{display:none !important}
  </style>
</head>
<body>

<!-- 🔥 PWA -->
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.querySelector('.btn-instalar').style.display = 'block';
});

document.querySelector('.btn-instalar').addEventListener('click', async () => {
  if (!deferredPrompt) return alert("Instalação não disponível");

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
