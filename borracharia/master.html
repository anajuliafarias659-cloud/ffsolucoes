<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Master - Borracharia</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:#fff;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.08);
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  font-weight:bold;
}

.aberto{background:#166534;}
.fechado{background:#7f1d1d;}

</style>
</head>

<body>

<h1>Painel Master</h1>

<div id="lista"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔒 senha simples
const senha = prompt("Senha admin:");
if(senha !== "1234"){
  document.body.innerHTML = "Acesso negado";
  throw new Error("Sem acesso");
}

async function carregarPainel(){

  const { data, error } = await supabase
    .from("borracheiros")
    .select(`
      id,
      nome,
      aberto,
      latitude,
      longitude,
      chamados_borracharia (
        avaliacao,
        valor_final
      )
    `);

  if(error){
    alert("Erro ao carregar");
    return;
  }

  const lista = data.map(b => {

    const avaliacoes = b.chamados_borracharia
      .map(c => c.avaliacao)
      .filter(a => a !== null);

    const total = avaliacoes.length;

    const media = total
      ? (avaliacoes.reduce((a,b)=>a+b,0)/total).toFixed(1)
      : "—";

    const faturamento = b.chamados_borracharia
      .reduce((s,c)=>s + Number(c.valor_final || 0),0)
      .toFixed(2);

    return {
      ...b,
      total,
      media,
      faturamento
    };
  });

  // ordenar por melhor avaliação
  lista.sort((a,b)=> b.media - a.media);

  const container = document.getElementById("lista");

  container.innerHTML = lista.map(b => `
    <div class="card">

      <div class="top">
        <strong>${b.nome}</strong>
        <span class="badge ${b.aberto ? "aberto" : "fechado"}">
          ${b.aberto ? "ABERTO" : "FECHADO"}
        </span>
      </div>

      <div>⭐ Média: ${b.media}</div>
      <div>📊 Avaliações: ${b.total}</div>
      <div>💰 Faturamento: R$ ${b.faturamento}</div>

      <div style="margin-top:6px;font-size:12px;color:#94a3b8">
        📍 ${b.latitude}, ${b.longitude}
      </div>

    </div>
  `).join("");
}

carregarPainel();
</script>

</body>
</html>
