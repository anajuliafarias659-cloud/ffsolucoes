
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Borracharia - Painel</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#020617;
      color:#fff;
      min-height:100vh;
    }
    .wrap{
      width:min(1280px,100%);
      margin:0 auto;
      padding:16px;
    }
    .topo{
      position:sticky;
      top:0;
      z-index:20;
      background:#020617;
      padding-bottom:12px;
    }
    .box{
      background:#111827;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }
    .hero{
      background:linear-gradient(135deg,#f59e0b,#dc2626);
      border:none;
    }
    .hero h1{
      font-size:26px;
      margin-bottom:6px;
    }
    .muted{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.5;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .grid4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }
    .full{grid-column:1/-1}
    label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:#cbd5e1;
    }
    input,button,select{
      width:100%;
      border:none;
      outline:none;
      padding:13px 12px;
      border-radius:12px;
      font-size:15px;
    }
    input,select{
      background:#1f2937;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }
    button{
      cursor:pointer;
      font-weight:700;
      color:#fff;
      background:#f59e0b;
      transition:.2s;
    }
    button:hover{transform:translateY(-1px)}
    button.sec{background:#334155}
    button.green{background:#16a34a}
    button.red{background:#dc2626}
    button.blue{background:#2563eb}
    button.whats{background:#16a34a}
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }
    .lista{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:14px;
    }
    .card{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    .card-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }
    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      margin-bottom:6px;
    }
    .aguardando{background:#78350f}
    .aceito{background:#1d4ed8}
    .em_andamento{background:#0f766e}
    .finalizado{background:#166534}
    .cancelado{background:#7f1d1d}
    .meuHistorico{
      background:#4c1d95;
      color:#fff;
      margin-left:6px;
    }
    .titulo{
      font-size:18px;
      font-weight:800;
      color:#fbbf24;
      line-height:1.3;
    }
    .subtitulo{
      font-size:13px;
      color:#94a3b8;
    }
    .bloco{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
      border-radius:14px;
      padding:12px;
    }
    .linha{
      line-height:1.6;
      font-size:14px;
      color:#e5e7eb;
      word-break:break-word;
    }
    .linha strong{
      color:#fff;
    }
    .acoes{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:4px;
    }
    .acoes3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:4px;
    }
    .statusMsg{
      min-height:20px;
      margin-top:8px;
      font-size:14px;
      color:#86efac;
    }
    .toggleBox{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
    }
    .statusLoja{
      display:inline-block;
      margin-top:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }
    .abertoTag{background:#166534}
    .fechadoTag{background:#7f1d1d}
    .vazio{
      width:100%;
      text-align:center;
      padding:30px 16px;
      color:#94a3b8;
      background:#0f172a;
      border:1px dashed rgba(255,255,255,.08);
      border-radius:18px;
    }
    a.link{
      color:#93c5fd;
      text-decoration:none;
      font-weight:700;
    }
    a.link:hover{text-decoration:underline}

    .shareBox{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:14px;
    }
    .btnLinkPublico,
    .btnCompartilhar,
    .btnCopiar{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:48px;
      padding:13px 12px;
      border:none;
      border-radius:12px;
      font-size:15px;
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
      transition:.2s;
      color:#fff;
    }
    .btnLinkPublico{background:#2563eb}
    .btnCompartilhar{background:#16a34a}
    .btnCopiar{background:#334155}
    .btnLinkPublico:hover,
    .btnCompartilhar:hover,
    .btnCopiar:hover{
      transform:translateY(-1px);
    }

    @media(max-width:900px){
      .grid,.grid3,.grid4,.acoes,.acoes3,.shareBox{grid-template-columns:1fr}
      .hero h1{font-size:22px}
      .lista{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topo">
      <div class="box hero">
        <h1>FF Borracharia - Painel do Borracheiro</h1>
        <div class="muted">Marque aberto ou fechado, defina raio de atendimento e receba chamados.</div>

        <div class="shareBox">
          <a
            href="https://www.ffsolucoes.com.br/borracharia/public"
            target="_blank"
            class="btnLinkPublico"
            rel="noopener noreferrer"
          >
            Abrir página pública
          </a>

          <button type="button" id="btnCompartilharLink" class="btnCompartilhar">
            Compartilhar link
          </button>

          <button type="button" id="btnCopiarLink" class="btnCopiar">
            Copiar link
          </button>
        </div>

        <div id="msgCompartilhar" class="statusMsg"></div>
      </div>
    </div>

    <div class="box" id="boxLogin">
      <div class="grid">
        <div>
          <label>Email</label>
          <input id="email" type="email" placeholder="Seu email" />
        </div>
        <div>
          <label>Senha</label>
          <input id="senha" type="password" placeholder="Sua senha" />
        </div>
        <div class="full">
          <button id="btnLogin">Entrar</button>
          <div class="statusMsg" id="loginMsg"></div>
        </div>
      </div>
    </div>

    <div id="painelApp" style="display:none;">
      <div class="box">
        <div class="grid4">
          <div>
            <label>Nome da borracharia</label>
            <input id="nomeBorracheiro" placeholder="Nome" />
          </div>
          <div>
            <label>Telefone</label>
            <input id="telefoneBorracheiro" placeholder="Telefone" />
          </div>
          <div>
            <label>Cidade</label>
            <input id="cidadeBorracheiro" placeholder="Cidade" />
          </div>
          <div>
            <label>Raio de atendimento (km)</label>
            <input id="raioAtendimento" type="number" min="1" step="0.1" placeholder="10" />
          </div>

          <div>
            <label>Latitude da borracharia</label>
            <input id="latBorracheiro" placeholder="-9.000000" />
          </div>
          <div>
            <label>Longitude da borracharia</label>
            <input id="lngBorracheiro" placeholder="-42.000000" />
          </div>

          <div>
            <label>Status da borracharia</label>
            <select id="statusAberto">
              <option value="true">Aberta</option>
              <option value="false">Fechada</option>
            </select>
          </div>

          <div class="toggleBox">
            <div class="muted">Situação atual</div>
            <div id="statusAtualLoja" class="statusLoja abertoTag">ABERTA</div>
          </div>

          <div class="full">
            <button id="btnPegarMinhaLocalizacao" class="sec">Usar minha localização atual</button>
          </div>

          <div class="full">
            <button id="btnSalvarPerfil" class="blue">Salvar perfil</button>
            <button id="btnSair" class="sec" style="margin-top:10px;">Sair</button>
            <div class="statusMsg" id="perfilMsg"></div>
          </div>
        </div>
      </div>

      <div class="box">
        <div class="grid3">
          <div>
            <label>Filtro de status</label>
            <select id="filtroStatus">
              <option value="todos">Todos</option>
              <option value="aguardando">Aguardando</option>
              <option value="aceito">Aceito</option>
              <option value="em_andamento">Em andamento</option>
              <option value="finalizado">Finalizado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
          <div>
            <label>Atualização</label>
            <input value="5 segundos" readonly />
          </div>
          <div>
            <label>Ação</label>
            <button id="btnAtualizar" class="green">Atualizar agora</button>
          </div>
        </div>
      </div>

      <div class="lista" id="listaChamados"></div>
    </div>
  </div>

  <script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const el = (id) => document.getElementById(id);

let userLogado = null;
let perfilBorracheiro = null;
let chamadosJaVistos = new Set();

// 🔊 SOM
function tocarSomNovoChamado(){
  try{
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.volume = 1;
    audio.play().catch(()=>{});
  }catch(e){}
}

// LOGIN
async function login(){
  const email = el("email").value.trim();
  const senha = el("senha").value.trim();

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password: senha
  });

  if(error){
    alert("Login inválido");
    return;
  }

  const { data: perfil } = await supabase
    .from("borracheiros")
    .select("*")
    .eq("user_id", data.user.id)
    .single();

  userLogado = data.user;
  perfilBorracheiro = perfil;

  iniciar();
}

// INICIAR
async function iniciar(){
  document.getElementById("boxLogin").style.display = "none";
  document.getElementById("painelApp").style.display = "block";

  listarChamados();

  // 🚀 REALTIME
  supabase
    .channel('chamados')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'chamados_borracharia'
    }, () => {
      listarChamados();
    })
    .subscribe();
}

// LISTAR
async function listarChamados(){
  if(!perfilBorracheiro) return;

  const { data, error } = await supabase
    .from("chamados_borracharia")
    .select("*")
    .order("created_at", { ascending:false });

  if(error) return;

  let novo = false;

  (data || []).forEach(item => {
    if(
      item.status === "aguardando" &&
      !item.borracheiro_id &&
      !chamadosJaVistos.has(item.id)
    ){
      chamadosJaVistos.add(item.id);
      novo = true;
    }
  });

  if(novo){
    tocarSomNovoChamado();
  }

  render(data || []);
}

// RENDER
function render(lista){
  const box = el("listaChamados");

  if(!lista.length){
    box.innerHTML = "Nenhum chamado";
    return;
  }

  box.innerHTML = lista.map(item => {
    return `
      <div style="background:#111;padding:10px;margin:10px;border-radius:10px">
        <b>${item.cliente_nome || ""}</b><br>
        ${item.problema || ""}<br>
        Status: ${item.status}<br><br>

        ${
          item.status === "aguardando" && !item.borracheiro_id
          ? `<button onclick="aceitar('${item.id}')">Aceitar</button>`
          : ""
        }
      </div>
    `;
  }).join("");
}

// ACEITAR
window.aceitar = async function(id){
  const { data, error } = await supabase
    .from("chamados_borracharia")
    .update({
      status: "aceito",
      borracheiro_id: perfilBorracheiro.id
    })
    .eq("id", id)
    .eq("status", "aguardando")
    .is("borracheiro_id", null)
    .select();

  if(!data.length){
    alert("Já foi pego por outro");
    return;
  }

  listarChamados();
}

// EVENTOS
document.getElementById("btnLogin").onclick = login;

</script>
</body>
</html>
