


<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Borracharia - Painel</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#020617;
      color:#fff;
      min-height:100vh;
    }

    .fotoSolicitante{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  margin-top:10px;
  background:#0b1220;
}
    .wrap{
      width:min(1280px,100%);
      margin:0 auto;
      padding:16px;
    }
    .topo{
      position:sticky;
      top:0;
      z-index:20;
      background:#020617;
      padding-bottom:12px;
    }
    .box{
      background:#111827;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }
    .fotoSolicitante{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  margin-top:10px;
  background:#0b1220;
}

.mapaMini{
  display:block;
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#1e293b;
  color:#fff;
  text-decoration:none;
  font-weight:700;
  text-align:center;
}
    .hero{
      background:linear-gradient(135deg,#f59e0b,#dc2626);
      border:none;
    }
    .hero h1{
      font-size:26px;
      margin-bottom:6px;
    }
    .muted{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.5;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .grid4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }
    .full{grid-column:1/-1}
    label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:#cbd5e1;
    }
    input,button,select{
      width:100%;
      border:none;
      outline:none;
      padding:13px 12px;
      border-radius:12px;
      font-size:15px;
    }
    input,select{
      background:#1f2937;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }
    button{
      cursor:pointer;
      font-weight:700;
      color:#fff;
      background:#f59e0b;
      transition:.2s;
    }
    button:hover{transform:translateY(-1px)}
    button.sec{background:#334155}
    button.green{background:#16a34a}
    button.red{background:#dc2626}
    button.blue{background:#2563eb}
    button.whats{background:#16a34a}
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }
    .lista{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:14px;
    }
    .card{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    .card-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }
    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      margin-bottom:6px;
    }
    .aguardando{background:#78350f}
    .aceito{background:#1d4ed8}
    .em_andamento{background:#0f766e}
    .finalizado{background:#166534}
    .cancelado{background:#7f1d1d}
    .meuHistorico{
      background:#4c1d95;
      color:#fff;
      margin-left:6px;
    }
    .titulo{
      font-size:18px;
      font-weight:800;
      color:#fbbf24;
      line-height:1.3;
    }
    .subtitulo{
      font-size:13px;
      color:#94a3b8;
    }
    .bloco{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
      border-radius:14px;
      padding:12px;
    }
    .linha{
      line-height:1.6;
      font-size:14px;
      color:#e5e7eb;
      word-break:break-word;
    }
    .linha strong{
      color:#fff;
    }
    .acoes{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:4px;
    }
    .acoes3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:4px;
    }
    .statusMsg{
      min-height:20px;
      margin-top:8px;
      font-size:14px;
      color:#86efac;
    }
    .toggleBox{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
    }
    .statusLoja{
      display:inline-block;
      margin-top:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }
    .abertoTag{background:#166534}
    .fechadoTag{background:#7f1d1d}
    .vazio{
      width:100%;
      text-align:center;
      padding:30px 16px;
      color:#94a3b8;
      background:#0f172a;
      border:1px dashed rgba(255,255,255,.08);
      border-radius:18px;
    }
    a.link{
      color:#93c5fd;
      text-decoration:none;
      font-weight:700;
    }
    a.link:hover{text-decoration:underline}

    .shareBox{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:14px;
    }
    .btnLinkPublico,
    .btnCompartilhar,
    .btnCopiar{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:48px;
      padding:13px 12px;
      border:none;
      border-radius:12px;
      font-size:15px;
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
      transition:.2s;
      color:#fff;
    }
    .btnLinkPublico{background:#2563eb}
    .btnCompartilhar{background:#16a34a}
    .btnCopiar{background:#334155}
    .btnLinkPublico:hover,
    .btnCompartilhar:hover,
    .btnCopiar:hover{
      transform:translateY(-1px);
    }

    @media(max-width:900px){
      .grid,.grid3,.grid4,.acoes,.acoes3,.shareBox{grid-template-columns:1fr}
      .hero h1{font-size:22px}
      .lista{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topo">
      <div class="box hero">
        <h1>FF Borracharia - Painel do Borracheiro</h1>
        <div class="muted">Marque aberto ou fechado, defina raio de atendimento e receba chamados.</div>

        <div class="shareBox">
          <a
            href="https://www.ffsolucoes.com.br/borracharia/public"
            target="_blank"
            class="btnLinkPublico"
            rel="noopener noreferrer"
          >
            Abrir página pública
          </a>

          <button type="button" id="btnCompartilharLink" class="btnCompartilhar">
            Compartilhar link
          </button>

          <button type="button" id="btnCopiarLink" class="btnCopiar">
            Copiar link
          </button>
        </div>

        <div id="msgCompartilhar" class="statusMsg"></div>
      </div>
    </div>

    <div class="box" id="boxLogin">
      <div class="grid">
        <div>
          <label>Email</label>
          <input id="email" type="email" placeholder="Seu email" />
        </div>
        <div>
          <label>Senha</label>
          <input id="senha" type="password" placeholder="Sua senha" />
        </div>
        <div class="full">
          <button id="btnLogin">Entrar</button>
          <div class="statusMsg" id="loginMsg"></div>
        </div>
      </div>
    </div>

    <div id="painelApp" style="display:none;">
      <div class="box">
        <div class="grid4">
          <div>
            <label>Nome da borracharia</label>
            <input id="nomeBorracheiro" placeholder="Nome" />
          </div>
          <div>
            <label>Telefone</label>
            <input id="telefoneBorracheiro" placeholder="Telefone" />
          </div>
          <div>
            <label>Cidade</label>
            <input id="cidadeBorracheiro" placeholder="Cidade" />
          </div>
          <div>
            <label>Raio de atendimento (km)</label>
            <input id="raioAtendimento" type="number" min="1" step="0.1" placeholder="10" />
          </div>

          <div>
            <label>Latitude da borracharia</label>
            <input id="latBorracheiro" placeholder="-9.000000" />
          </div>
          <div>
            <label>Longitude da borracharia</label>
            <input id="lngBorracheiro" placeholder="-42.000000" />
          </div>

          <div>
            <label>Status da borracharia</label>
            <select id="statusAberto">
              <option value="true">Aberta</option>
              <option value="false">Fechada</option>
            </select>
          </div>

          <div class="toggleBox">
            <div class="muted">Situação atual</div>
            <div id="statusAtualLoja" class="statusLoja abertoTag">ABERTA</div>
          </div>

          <div class="full">
            <button id="btnPegarMinhaLocalizacao" class="sec">Usar minha localização atual</button>
          </div>

          <div class="full">
            <button id="btnSalvarPerfil" class="blue">Salvar perfil</button>
            <button id="btnSair" class="sec" style="margin-top:10px;">Sair</button>
            <div class="statusMsg" id="perfilMsg"></div>
          </div>
        </div>
      </div>

      <div class="box">
        <div class="grid3">
          <div>
            <label>Filtro de status</label>
            <select id="filtroStatus">
              <option value="todos">Todos</option>
              <option value="aguardando">Aguardando</option>
              <option value="aceito">Aceito</option>
              <option value="em_andamento">Em andamento</option>
              <option value="finalizado">Finalizado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
          <div>
            <label>Atualização</label>
            <input value="5 segundos" readonly />
          </div>
          <div>
            <label>Ação</label>
            <button id="btnAtualizar" class="green">Atualizar agora</button>
          </div>
        </div>
      </div>

      <div class="lista" id="listaChamados"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    const el = (id) => document.getElementById(id);
    const LINK_PUBLICO_BORRACHARIA = "https://www.ffsolucoes.com.br/borracharia/public";

    let userLogado = null;
    let perfilBorracheiro = null;
    let intervalLista = null;
    let idsChamadosJaVistos = new Set();
    let primeiraCargaChamados = true;

    const audioNovoPedido = new Audio("https://www.soundjay.com/buttons/sounds/beep-07a.mp3");
    audioNovoPedido.preload = "auto";

    function liberarAudio(){
      audioNovoPedido.play()
        .then(() => {
          audioNovoPedido.pause();
          audioNovoPedido.currentTime = 0;
        })
        .catch(() => {});
    }

    function tocarSomNovoPedido(){
      audioNovoPedido.currentTime = 0;
      audioNovoPedido.play().catch(() => {});
    }

    function setMsg(id, texto, cor = "#86efac"){
      el(id).style.color = cor;
      el(id).textContent = texto;
    }

    function traduzirStatus(status){
      if(status === "aguardando") return "Aguardando";
      if(status === "aceito") return "Aceito";
      if(status === "em_andamento") return "Em andamento";
      if(status === "finalizado") return "Finalizado";
      if(status === "cancelado") return "Cancelado";
      return status || "-";
    }

    function atualizarStatusVisualLoja(valor){
      const aberto = String(valor) === "true" || valor === true;
      el("statusAtualLoja").textContent = aberto ? "ABERTA" : "FECHADA";
      el("statusAtualLoja").className = "statusLoja " + (aberto ? "abertoTag" : "fechadoTag");
    }

    function soNumero(v){
      return String(v || "").replace(/\D/g, "");
    }

    function montarLinkWhatsApp(telefone, texto = ""){
      const numero = soNumero(telefone);
      if(!numero) return "";
      return `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;
    }

    function calcularDistanciaKm(lat1, lon1, lat2, lon2){
      if(
        lat1 == null || lon1 == null ||
        lat2 == null || lon2 == null ||
        isNaN(lat1) || isNaN(lon1) || isNaN(lat2) || isNaN(lon2)
      ) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function mapaLink(lat, lng){
      if(lat == null || lng == null) return "";
      return `https://www.google.com/maps?q=${lat},${lng}`;
    }

   function fotoPublica(urlOuCaminho){
  if(!urlOuCaminho) return "";

  const valor = String(urlOuCaminho).trim();

  if(valor.startsWith("http://") || valor.startsWith("https://")){
    return valor;
  }

  const { data } = supabase.storage
    .from("borracharia")
    .getPublicUrl(valor);

  return data?.publicUrl || "";
}

    async function copiarLinkPublico(){
      try{
        await navigator.clipboard.writeText(LINK_PUBLICO_BORRACHARIA);
        setMsg("msgCompartilhar", "Link copiado com sucesso.");
      }catch(error){
        console.error(error);
        setMsg("msgCompartilhar", "Não foi possível copiar o link.", "#fca5a5");
      }
    }

    async function compartilharLinkPublico(){
      try{
        if(navigator.share){
          await navigator.share({
            title: "FF Borracharia",
            text: "Acesse a página pública da borracharia:",
            url: LINK_PUBLICO_BORRACHARIA
          });
          setMsg("msgCompartilhar", "Link compartilhado com sucesso.");
        }else{
          await copiarLinkPublico();
        }
      }catch(error){
        console.error(error);
        setMsg("msgCompartilhar", "Compartilhamento cancelado ou não disponível.", "#fca5a5");
      }
    }

    async function login(){
      const email = el("email").value.trim();
      const senha = el("senha").value.trim();

      if(!email || !senha){
        setMsg("loginMsg", "Preencha email e senha.", "#fca5a5");
        return;
      }

      el("btnLogin").disabled = true;
      el("btnLogin").textContent = "Entrando...";

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: senha
      });

      el("btnLogin").disabled = false;
      el("btnLogin").textContent = "Entrar";

      if(error){
        console.error(error);
        setMsg("loginMsg", "Login inválido.", "#fca5a5");
        return;
      }

      const user = data.user;

      const { data: borracheiro, error: erroPerfil } = await supabase
        .from("borracheiros")
        .select("*")
        .eq("user_id", user.id)
        .maybeSingle();

      if(erroPerfil){
        console.error(erroPerfil);
        await supabase.auth.signOut();
        setMsg("loginMsg", "Erro ao validar usuário.", "#fca5a5");
        return;
      }

      if(!borracheiro){
        await supabase.auth.signOut();
        setMsg("loginMsg", "Acesso negado. Este usuário não é uma borracharia.", "#fca5a5");
        return;
      }

      userLogado = user;
      perfilBorracheiro = borracheiro;
      setMsg("loginMsg", "Login autorizado.");
      await iniciarPainel();
    }

    async function sair(){
      await supabase.auth.signOut();
      location.reload();
    }

    async function carregarSessao(){
      const { data } = await supabase.auth.getSession();
      const user = data?.session?.user || null;
      if(!user) return;

      const { data: borracheiro, error } = await supabase
        .from("borracheiros")
        .select("*")
        .eq("user_id", user.id)
        .maybeSingle();

      if(error || !borracheiro){
        await supabase.auth.signOut();
        return;
      }

      userLogado = user;
      perfilBorracheiro = borracheiro;
      await iniciarPainel();
    }

    function preencherPerfil(perfil){
      el("nomeBorracheiro").value = perfil.nome || "";
      el("telefoneBorracheiro").value = perfil.telefone || "";
      el("cidadeBorracheiro").value = perfil.cidade || "";
      el("raioAtendimento").value = perfil.raio_atendimento_km ?? 10;
      el("latBorracheiro").value = perfil.latitude ?? "";
      el("lngBorracheiro").value = perfil.longitude ?? "";
      el("statusAberto").value = String(perfil.aberto ?? true);
      atualizarStatusVisualLoja(perfil.aberto ?? true);
    }

    async function pegarMinhaLocalizacao(){
      if(!navigator.geolocation){
        setMsg("perfilMsg", "Seu navegador não suporta localização.", "#fca5a5");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          el("latBorracheiro").value = pos.coords.latitude;
          el("lngBorracheiro").value = pos.coords.longitude;
          setMsg("perfilMsg", "Localização capturada com sucesso.");
        },
        () => {
          setMsg("perfilMsg", "Não foi possível capturar sua localização.", "#fca5a5");
        },
        { enableHighAccuracy:true, timeout:10000 }
      );
    }

    async function salvarPerfil(){
      if(!perfilBorracheiro) return;

      const nome = el("nomeBorracheiro").value.trim();
      const telefone = el("telefoneBorracheiro").value.trim();
      const cidade = el("cidadeBorracheiro").value.trim();
      const raio = Number(el("raioAtendimento").value || 10);
      const latitude = el("latBorracheiro").value === "" ? null : Number(el("latBorracheiro").value);
      const longitude = el("lngBorracheiro").value === "" ? null : Number(el("lngBorracheiro").value);
      const aberto = el("statusAberto").value === "true";

      if(!nome){
        setMsg("perfilMsg", "Informe o nome.", "#fca5a5");
        return;
      }

      if(isNaN(raio) || raio <= 0){
        setMsg("perfilMsg", "Informe um raio válido.", "#fca5a5");
        return;
      }

      const { data, error } = await supabase
        .from("borracheiros")
        .update({
          nome,
          telefone,
          cidade,
          aberto,
          raio_atendimento_km: raio,
          latitude,
          longitude
        })
        .eq("id", perfilBorracheiro.id)
        .select()
        .single();

      if(error){
        console.error(error);
        setMsg("perfilMsg", "Erro ao salvar perfil.", "#fca5a5");
        return;
      }

      perfilBorracheiro = data;
      atualizarStatusVisualLoja(aberto);
      setMsg("perfilMsg", "Perfil salvo com sucesso.");
    }

    async function iniciarPainel(){
      el("boxLogin").style.display = "none";
      el("painelApp").style.display = "block";
      preencherPerfil(perfilBorracheiro);
      await listarChamados();

      if(intervalLista) clearInterval(intervalLista);
      intervalLista = setInterval(listarChamados, 5000);
    }

    function montarFiltroLista(filtro){
      const idAtual = perfilBorracheiro?.id;

      if(!idAtual) return "";

      if(filtro === "todos"){
        return `and(status.eq.aguardando,borracheiro_id.is.null),borracheiro_id.eq.${idAtual}`;
      }

      if(filtro === "aguardando"){
        return `and(status.eq.aguardando,borracheiro_id.is.null)`;
      }

      return `and(status.eq.${filtro},borracheiro_id.eq.${idAtual})`;
    }

    async function listarChamados(){
      if(!perfilBorracheiro?.id) return;

      const filtro = el("filtroStatus").value;
      const filtroOr = montarFiltroLista(filtro);

      let query = supabase
  .from("chamados_borracharia")
  .select(`
    id,
    cliente_nome,
    cliente_telefone,
    tipo_veiculo,
    problema,
    observacoes,
    endereco_texto,
    latitude,
    longitude,
    ultima_latitude,
    ultima_longitude,
    foto_solicitante,
    status,
    valor_estimado,
    valor_final,
    forma_pagamento,
    codigo_acompanhamento,
    created_at,
    aceito_em,
    finalizado_em,
    borracheiro_id
  `)
  .order("created_at", { ascending:false });

      if(filtroOr){
        query = query.or(filtroOr);
      }

      const { data, error } = await query;

      if(error){
        console.error(error);
        return;
      }

      const lista = data || [];

      const aguardandoSemBorracheiro = lista.filter(item =>
        item.status === "aguardando" && !item.borracheiro_id
      );

      const idsAtuais = new Set(aguardandoSemBorracheiro.map(item => String(item.id)));

      let chegouNovoPedido = false;

      for(const id of idsAtuais){
        if(!idsChamadosJaVistos.has(id)){
          chegouNovoPedido = true;
          break;
        }
      }

      if(!primeiraCargaChamados && chegouNovoPedido){
        tocarSomNovoPedido();
      }

      idsChamadosJaVistos = idsAtuais;
      primeiraCargaChamados = false;

      renderChamados(lista);
    }

    function renderChamados(lista){
      const box = el("listaChamados");

      if(!lista.length){
  box.innerHTML = `<div class="vazio">Nenhum chamado encontrado.</div>`;
  return;
}

      box.innerHTML = lista.map(item => {
  const status = item.status || "aguardando";
  const valorEstimado = Number(item.valor_estimado || 0).toFixed(2);
  const valorFinal = Number(item.valor_final || 0).toFixed(2);

  const ehMeuChamado = item.borracheiro_id === perfilBorracheiro.id;
  const ehHistorico = ehMeuChamado && ["aceito","em_andamento","finalizado","cancelado"].includes(status);

  const podeAceitar = status === "aguardando" && !item.borracheiro_id;
  const podeIniciar = status === "aceito" && item.borracheiro_id === perfilBorracheiro.id;
  const podeFinalizar = (status === "aceito" || status === "em_andamento") && item.borracheiro_id === perfilBorracheiro.id;

  const distancia = calcularDistanciaKm(
  Number(perfilBorracheiro?.latitude),
  Number(perfilBorracheiro?.longitude),
  Number(item.latitude),
  Number(item.longitude)
);

const textoWhats = `Olá ${item.cliente_nome || ""}, aqui é da ${perfilBorracheiro?.nome || "borracharia"}. Recebemos seu chamado ${item.codigo_acompanhamento || ""}.`;

const latSolicitante = item.ultima_latitude ?? item.latitude ?? null;
const lngSolicitante = item.ultima_longitude ?? item.longitude ?? null;
const fotoSolicitanteUrl = fotoPublica(item.foto_solicitante);

return `

        const textoWhats = `Olá ${item.cliente_nome || ""}, aqui é da ${perfilBorracheiro?.nome || "borracharia"}. Recebemos seu chamado ${item.codigo_acompanhamento || ""}.`;

        

        return `
          <div class="card">
            <div class="card-top">
              <div>
                <div class="tag ${status}">${traduzirStatus(status)}</div>
                ${ehHistorico ? `<div class="tag meuHistorico">Meu histórico</div>` : ``}
                <div class="titulo">${item.tipo_veiculo || "-"} • ${item.problema || "-"}</div>
                <div class="subtitulo">Código: ${item.codigo_acompanhamento || "-"}</div>
              </div>
              <div class="subtitulo">${item.created_at ? new Date(item.created_at).toLocaleString("pt-BR") : ""}</div>
            </div>

            <div class="bloco">
  <div class="linha"><strong>Cliente:</strong> ${item.cliente_nome || "-"}</div>
  <div class="linha"><strong>Telefone:</strong> ${item.cliente_telefone || "-"}</div>
  <div class="linha"><strong>Referência:</strong> ${item.endereco_texto || "-"}</div>
  <div class="linha"><strong>Observações:</strong> ${item.observacoes || "-"}</div>

  ${
    fotoSolicitanteUrl
      ? `<img
          src="${fotoSolicitanteUrl}"
          class="fotoSolicitante"
          alt="Foto do veículo do solicitante"
          onerror="this.style.display='none'"
        >`
      : ``
  }
</div>

<div class="bloco">
  <div class="linha"><strong>Valor estimado:</strong> R$ ${valorEstimado}</div>
  <div class="linha"><strong>Valor final:</strong> R$ ${valorFinal}</div>
  <div class="linha"><strong>Pagamento:</strong> ${item.forma_pagamento || "-"}</div>
  <div class="linha"><strong>Distância:</strong> ${distancia != null && isFinite(distancia) ? distancia.toFixed(1) + " km" : "não calculada"}</div>
  ${
    latSolicitante != null && lngSolicitante != null
      ? `
        <div class="linha"><strong>GPS do solicitante:</strong> ${latSolicitante}, ${lngSolicitante}</div>
        <a class="mapaMini" href="${mapaLink(latSolicitante, lngSolicitante)}" target="_blank">
          Abrir localização do solicitante no mapa
        </a>
      `
      : `<div class="linha"><strong>GPS do solicitante:</strong> não enviado</div>`
  }
<div class="acoes">
  ${
    latSolicitante != null && lngSolicitante != null
      ? `<a class="link" href="${mapaLink(latSolicitante,lngSolicitante)}" target="_blank">Abrir no mapa</a>`
      : `<span class="muted">Sem GPS</span>`
  }
  ${
    item.cliente_telefone
      ? `<a class="link" href="${montarLinkWhatsApp(item.cliente_telefone, textoWhats)}" target="_blank">WhatsApp do cliente</a>`
      : `<span class="muted">Sem WhatsApp</span>`
  }
</div>

            <div class="acoes3">
              ${podeAceitar ? `<button class="green" onclick="aceitarChamado('${item.id}')">Aceitar</button>` : `<button class="sec" disabled>Aceitar</button>`}
              ${podeIniciar ? `<button class="blue" onclick="iniciarChamado('${item.id}')">Iniciar</button>` : `<button class="sec" ${podeIniciar ? "" : "disabled"}>Iniciar</button>`}
              ${podeFinalizar ? `<button class="red" onclick="finalizarChamado('${item.id}')">Finalizar</button>` : `<button class="sec" ${podeFinalizar ? "" : "disabled"}>Finalizar</button>`}
            </div>
          </div>
        `;
      }).join("");
    }

    window.aceitarChamado = async function(id){
      if(!perfilBorracheiro){
        alert("Perfil do borracheiro não carregado.");
        return;
      }

      if(!perfilBorracheiro.aberto){
        alert("Sua borracharia está fechada. Abra no perfil antes de aceitar chamados.");
        return;
      }

      const valor = prompt("Digite o valor estimado do atendimento:", "30");
      const valor_estimado = Number(valor || 0);

      const { data, error } = await supabase
        .from("chamados_borracharia")
        .update({
          status: "aceito",
          borracheiro_id: perfilBorracheiro.id,
          valor_estimado: isNaN(valor_estimado) ? 0 : valor_estimado,
          aceito_em: new Date().toISOString()
        })
        .eq("id", id)
        .eq("status", "aguardando")
        .is("borracheiro_id", null)
        .select();

      if(error){
        console.error(error);
        alert("Erro ao aceitar chamado.");
        return;
      }

      if(!data || !data.length){
        alert("Esse atendimento já foi pego por outra borracharia.");
        await listarChamados();
        return;
      }

      await listarChamados();
    }

    window.iniciarChamado = async function(id){
      const { error } = await supabase
        .from("chamados_borracharia")
        .update({
          status: "em_andamento"
        })
        .eq("id", id)
        .eq("borracheiro_id", perfilBorracheiro.id);

      if(error){
        console.error(error);
        alert("Erro ao iniciar atendimento.");
        return;
      }

      await listarChamados();
    }

    window.finalizarChamado = async function(id){
      const valorFinal = prompt("Digite o valor final cobrado:", "30");
      const formaPagamento = prompt("Forma de pagamento: pix / dinheiro / cartao", "pix");

      const { error } = await supabase
        .from("chamados_borracharia")
        .update({
          status: "finalizado",
          valor_final: Number(valorFinal || 0),
          forma_pagamento: (formaPagamento || "indefinido").toLowerCase(),
          finalizado_em: new Date().toISOString()
        })
        .eq("id", id)
        .eq("borracheiro_id", perfilBorracheiro.id);

      if(error){
        console.error(error);
        alert("Erro ao finalizar chamado.");
        return;
      }

      await listarChamados();
    }

    el("btnLogin").addEventListener("click", () => {
      liberarAudio();
      login();
    });

    el("btnSair").addEventListener("click", sair);
    el("btnSalvarPerfil").addEventListener("click", salvarPerfil);
    el("btnAtualizar").addEventListener("click", () => {
      liberarAudio();
      listarChamados();
    });
    el("filtroStatus").addEventListener("change", listarChamados);
    el("statusAberto").addEventListener("change", (e) => atualizarStatusVisualLoja(e.target.value));
    el("btnPegarMinhaLocalizacao").addEventListener("click", pegarMinhaLocalizacao);

    el("btnCopiarLink").addEventListener("click", copiarLinkPublico);
    el("btnCompartilharLink").addEventListener("click", compartilharLinkPublico);

    document.addEventListener("click", liberarAudio, { once:true });

    carregarSessao();
  </script>
</body>
</html>
