  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#020617;
      color:#fff;
      min-height:100vh;

/* TOPO FIXO */
.top-fixed-left,
.top-fixed-right{
  position:fixed;
  top:12px;
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.boxRecolhivel{
  padding:0;
  overflow:hidden;
}

.headRecolhivel{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px;
  cursor:pointer;
  user-select:none;
}

.headRecolhivel:hover{
  background:rgba(255,255,255,.03);
}

.conteudoRecolhivel{
  padding:0 16px 16px 16px;
  border-top:1px solid rgba(255,255,255,.08);
}

.boxRecolhivel.fechado .conteudoRecolhivel{
  display:none;
}

.boxRecolhivel .setaCard{
  transition:.2s;
}

.boxRecolhivel:not(.fechado) .setaCard{
  transform:rotate(90deg);
}
.top-fixed-left{ left:12px; }
.top-fixed-right{ right:12px; align-items:flex-end; }

/* CARD DO BORRACHEIRO */
.card-borracharia-top{
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(15,23,42,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:10px 12px;
  box-shadow:0 8px 25px rgba(0,0,0,.28);
  backdrop-filter:blur(8px);
  max-width:300px;
  min-height:64px;
}

.card-borracharia-logo{
  width:42px;
  height:42px;
  min-width:42px;
  border-radius:10px;
  object-fit:cover;
  background:#0b1220;
  border:1px solid rgba(255,255,255,.08);
}

.card-borracharia-info{
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width:0;
}

.card-borracharia-info .nome{
  font-size:14px;
  font-weight:700;
  color:#fff;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.card-borracharia-info .linha{
  font-size:12px;
  color:#cbd5e1;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* CARD PEQUENO DE AÇÃO */
.card-top-acoes{
  display:flex;
  flex-direction:column;
  gap:8px;
  background:rgba(15,23,42,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:10px;
  box-shadow:0 8px 25px rgba(0,0,0,.28);
  backdrop-filter:blur(8px);
  min-width:160px;
}

.card-top-acoes .linha-botoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.btn-top-mini{
  border:none;
  border-radius:10px;
  padding:10px 12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  color:#fff;
  min-height:38px;
}

.btn-copiar{
  background:#2563eb;
}

.btn-compartilhar{
  background:#16a34a;
}

.btn-sair-top{
  background:#ef4444;
}

/* ESPAÇO NO CONTEÚDO PARA NÃO FICAR ESCONDIDO ATRÁS DOS CARDS */
body{
  padding-top:90px !important;
}

function preencherTopoBorracharia(config){

    function setMsg(id, texto, cor = "#86efac"){
      el(id).style.color = cor;
      el(id).textContent = texto;
    }

    function traduzirStatus(status){
      if(status === "aguardando") return "Aguardando";
      if(status === "aceito") return "Aceito";
      if(status === "em_andamento") return "Em andamento";
      if(status === "finalizado") return "Finalizado";
      if(status === "cancelado") return "Cancelado";
      return status || "-";
    }

    function atualizarStatusVisualLoja(valor){
      const aberto = String(valor) === "true" || valor === true;
      el("statusAtualLoja").textContent = aberto ? "ABERTA" : "FECHADA";
      el("statusAtualLoja").className = "statusLoja " + (aberto ? "abertoTag" : "fechadoTag");
    }

    function soNumero(v){
      return String(v || "").replace(/\D/g, "");
    }

    function montarLinkWhatsApp(telefone, texto = ""){
      const numero = soNumero(telefone);
      if(!numero) return "";
      return `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;
    }

    function calcularDistanciaKm(lat1, lon1, lat2, lon2){
      if(
        lat1 == null || lon1 == null ||
        lat2 == null || lon2 == null ||
        isNaN(lat1) || isNaN(lon1) || isNaN(lat2) || isNaN(lon2)
      ) return null;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function mapaLink(lat, lng){
      if(lat == null || lng == null) return "";
      return `https://www.google.com/maps?q=${lat},${lng}`;
    }

  const { data } = supabase.storage
    .from("borracharia")
    .getPublicUrl(valor);

  return data?.publicUrl || "";
}

    async function copiarLinkPublico(){
      try{
        await navigator.clipboard.writeText(LINK_PUBLICO_BORRACHARIA);
        setMsg("msgCompartilhar", "Link copiado com sucesso.");
      }catch(error){
        console.error(error);
        setMsg("msgCompartilhar", "Não foi possível copiar o link.", "#fca5a5");
      }
    }

    async function compartilharLinkPublico(){
      try{
        if(navigator.share){
          await navigator.share({
            title: "FF Borracharia",
            text: "Acesse a página pública da borracharia:",
            url: LINK_PUBLICO_BORRACHARIA
          });
          setMsg("msgCompartilhar", "Link compartilhado com sucesso.");
        }else{
          await copiarLinkPublico();
        }
      }catch(error){
        console.error(error);
        setMsg("msgCompartilhar", "Compartilhamento cancelado ou não disponível.", "#fca5a5");
      }
    }

      
    function preencherPerfil(perfil){
      el("nomeBorracheiro").value = perfil.nome || "";
      el("telefoneBorracheiro").value = perfil.telefone || "";
      el("cidadeBorracheiro").value = perfil.cidade || "";
      el("raioAtendimento").value = perfil.raio_atendimento_km ?? 10;
      el("latBorracheiro").value = perfil.latitude ?? "";
      el("lngBorracheiro").value = perfil.longitude ?? "";
      el("statusAberto").value = String(perfil.aberto ?? true);
      atualizarStatusVisualLoja(perfil.aberto ?? true);
      el("pixPadraoBorracheiro").value = perfil.pix_copia_cola_padrao || "";
    }

    async function pegarMinhaLocalizacao(){
      if(!navigator.geolocation){
        setMsg("perfilMsg", "Seu navegador não suporta localização.", "#fca5a5");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          el("latBorracheiro").value = pos.coords.latitude;
          el("lngBorracheiro").value = pos.coords.longitude;
          setMsg("perfilMsg", "Localização capturada com sucesso.");
        },
        () => {
          setMsg("perfilMsg", "Não foi possível capturar sua localização.", "#fca5a5");
        },
        { enableHighAccuracy:true, timeout:10000 }
      );
    }

    async function salvarPerfil(){
      if(!perfilBorracheiro) return;

      const nome = el("nomeBorracheiro").value.trim();
      const telefone = el("telefoneBorracheiro").value.trim();
      const cidade = el("cidadeBorracheiro").value.trim();
      const raio = Number(el("raioAtendimento").value || 10);
      const latitude = el("latBorracheiro").value === "" ? null : Number(el("latBorracheiro").value);
      const longitude = el("lngBorracheiro").value === "" ? null : Number(el("lngBorracheiro").value);
      const aberto = el("statusAberto").value === "true";
      

      if(!nome){
        setMsg("perfilMsg", "Informe o nome.", "#fca5a5");
        return;
      }

      if(isNaN(raio) || raio <= 0){
        setMsg("perfilMsg", "Informe um raio válido.", "#fca5a5");
        return;
      }

      const pixPadrao = el("pixPadraoBorracheiro").value.trim();

const { data, error } = await supabase
  .from("borracheiros")
  .update({
    nome,
    telefone,
    cidade,
    aberto,
    raio_atendimento_km: raio,
    latitude,
    longitude,
    pix_copia_cola_padrao: pixPadrao
  })
  .eq("id", perfilBorracheiro.id)
  .select()
  .single();

      if(error){
        console.error(error);
        setMsg("perfilMsg", "Erro ao salvar perfil.", "#fca5a5");
        return;
      }

      perfilBorracheiro = data;
      preencherTopoBorracharia(perfilBorracheiro);
      atualizarStatusVisualLoja(aberto);
      setMsg("perfilMsg", "Perfil salvo com sucesso.");
    }

    async function carregarPainelDireto(){
  const { data: sessaoData } = await supabase.auth.getSession();
  const user = sessaoData?.session?.user || null;

  if(!user){
    window.location.href = "/auth/login.html";
    return;
  }

  const { data: borracheiro, error } = await supabase
    .from("borracheiros")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if(error || !borracheiro){
    console.error(error);
    alert("Borracheiro não encontrado.");
    return;
  }

  userLogado = user;
  perfilBorracheiro = borracheiro;

  await iniciarPainel();
}

 async function iniciarPainel(){
  el("topFixedLeft").style.display = "flex";
  el("topFixedRight").style.display = "flex";

  preencherPerfil(perfilBorracheiro);
  preencherTopoBorracharia(perfilBorracheiro);
  await listarChamados();

  if(intervalLista) clearInterval(intervalLista);
  intervalLista = setInterval(() => {
    if(!chamadoAbertoId){
      listarChamados();
    }
  }, 5000);
}
    function montarFiltroLista(filtro){
      const idAtual = perfilBorracheiro?.id;

      if(!idAtual) return "";

      if(filtro === "todos"){
        return `and(status.eq.aguardando,borracheiro_id.is.null),borracheiro_id.eq.${idAtual}`;
      }

      if(filtro === "aguardando"){
        return `and(status.eq.aguardando,borracheiro_id.is.null)`;
      }

      return `and(status.eq.${filtro},borracheiro_id.eq.${idAtual})`;
    }

    async function listarChamados(){
  if(chamadoAbertoId){
    return;
  }

  if(!perfilBorracheiro?.id) return;

  const filtro = el("filtroStatus").value;
  const filtroOr = montarFiltroLista(filtro);

  let query = supabase
    .from("chamados_borracharia")
    .select(`
      id,
      cliente_nome,
      cliente_telefone,
      tipo_veiculo,
      problema,
      observacoes,
      endereco_texto,
      latitude,
      longitude,
      ultima_latitude,
      ultima_longitude,
      foto_solicitante,
      status,
      valor_estimado,
valor_final,
forma_pagamento,
pix_copia_cola,
pix_status,
codigo_acompanhamento,
created_at,
aceito_em,
finalizado_em,
borracheiro_id
    `)
    .order("created_at", { ascending:false });

  if(filtroOr){
    query = query.or(filtroOr);
  }

  const { data, error } = await query;

  if(error){
    console.error(error);
    return;
  }

  const lista = data || [];

  const aguardandoSemBorracheiro = lista.filter(item =>
    item.status === "aguardando" && !item.borracheiro_id
  );

  const idsAtuais = new Set(aguardandoSemBorracheiro.map(item => String(item.id)));

  let chegouNovoPedido = false;

  for(const id of idsAtuais){
    if(!idsChamadosJaVistos.has(id)){
      chegouNovoPedido = true;
      break;
    }
  }

  if(!primeiraCargaChamados && chegouNovoPedido){
    tocarSomNovoPedido();
  }

  idsChamadosJaVistos = idsAtuais;
  primeiraCargaChamados = false;

  
  renderChamados(lista);
}

function renderChamados(lista){
  const boxAtivos = el("listaChamados");
  const boxHistorico = el("listaHistoricoChamados");

  const ativos = [];
  const historico = [];

  (lista || []).forEach(item => {
    const status = item.status || "aguardando";
    if(status === "finalizado" || status === "cancelado"){
      historico.push(item);
    }else{
      ativos.push(item);
    }
  });

  boxAtivos.innerHTML = ativos.length
    ? ativos.map(item => montarCardChamado(item)).join("")
    : `<div class="vazio">Nenhum atendimento ativo no momento.</div>`;

  boxHistorico.innerHTML = historico.length
    ? historico.map(item => montarCardChamado(item)).join("")
    : `<div class="vazio">Nenhum histórico encontrado.</div>`;
}

window.toggleChamado = function(id){
  const card = document.getElementById(`card-${id}`);
  if(!card) return;

  const estavaAberto = card.classList.contains("aberto");

  document.querySelectorAll(".card.cardResumo.aberto").forEach(c => {
    c.classList.remove("aberto");
  });

  if(estavaAberto){
    chamadoAbertoId = null;
    return;
  }

  card.classList.add("aberto");
  chamadoAbertoId = id;
};

function montarCardChamado(item){
  const status = item.status || "aguardando";
  const valorEstimado = Number(item.valor_estimado || 0).toFixed(2);
  const valorFinal = Number(item.valor_final || 0).toFixed(2);

  const ehMeuChamado = item.borracheiro_id === perfilBorracheiro.id;
  const ehHistorico = ehMeuChamado && ["aceito","em_andamento","finalizado","cancelado"].includes(status);

  const podeAceitar = status === "aguardando" && !item.borracheiro_id;
  const podeIniciar = status === "aceito" && item.borracheiro_id === perfilBorracheiro.id;
  const podeFinalizar = (status === "aceito" || status === "em_andamento") && item.borracheiro_id === perfilBorracheiro.id;

  const distancia = calcularDistanciaKm(
    Number(perfilBorracheiro?.latitude),
    Number(perfilBorracheiro?.longitude),
    Number(item.latitude),
    Number(item.longitude)
  );

  const textoWhats = `Olá ${item.cliente_nome || ""}, aqui é da ${perfilBorracheiro?.nome || "borracharia"}. Recebemos seu chamado ${item.codigo_acompanhamento || ""}.`;

  const latSolicitante = item.ultima_latitude ?? item.latitude ?? null;
  const lngSolicitante = item.ultima_longitude ?? item.longitude ?? null;
  const fotoSolicitanteUrl = fotoPublica(item.foto_solicitante);

  return `
    <div class="card cardResumo ${chamadoAbertoId === String(item.id) ? "aberto" : ""}" id="card-${item.id}">
      <div class="cardHeadResumo" onclick="toggleChamado('${item.id}')">
        <div>
          <div class="tag ${status}">${traduzirStatus(status)}</div>
          ${ehHistorico ? `<div class="tag meuHistorico">Meu histórico</div>` : ``}

          <div class="cardTituloPequeno">
            ${status === "aguardando" ? "Nova solicitação" : (item.tipo_veiculo || "Chamado")}
          </div>

          <div class="cardSubPequeno">
            ${item.cliente_nome || "Cliente"} • ${item.problema || "-"}
          </div>

          <div class="resumoLinha">
            <span class="miniInfo">Código: ${item.codigo_acompanhamento || "-"}</span>
            <span class="miniInfo">${item.created_at ? new Date(item.created_at).toLocaleString("pt-BR") : ""}</span>
            <span class="miniInfo">${distancia != null && isFinite(distancia) ? distancia.toFixed(1) + " km" : "Sem distância"}</span>
          </div>
        </div>

        <div class="setaCard">›</div>
      </div>

      <div class="detalhesChamado">
        <div class="bloco">
          <div class="linha"><strong>Cliente:</strong> ${item.cliente_nome || "-"}</div>
          <div class="linha"><strong>Telefone:</strong> ${item.cliente_telefone || "-"}</div>
          <div class="linha"><strong>Problema:</strong> ${item.problema || "-"}</div>
          <div class="linha"><strong>Referência:</strong> ${item.endereco_texto || "-"}</div>
          <div class="linha"><strong>Observações:</strong> ${item.observacoes || "-"}</div>

          ${fotoSolicitanteUrl ? `
            <img src="${fotoSolicitanteUrl}" class="fotoSolicitante" alt="Foto do solicitante" onerror="this.style.display='none'">
          ` : ``}
        </div>

        <div class="bloco">
          <div class="linha"><strong>Taxa:</strong> R$ ${valorEstimado}</div>
          <div class="linha"><strong>Final:</strong> R$ ${valorFinal}</div>
          <div class="linha"><strong>Status:</strong> ${traduzirStatus(status)}</div>
          <div class="linha"><strong>Distância:</strong> ${distancia != null && isFinite(distancia) ? distancia.toFixed(1) + " km" : "não calculada"}</div>

          ${
            latSolicitante != null && lngSolicitante != null
              ? `
                <div class="linha"><strong>Localização:</strong> ${latSolicitante}, ${lngSolicitante}</div>
                <a class="mapaMini" href="${mapaLink(latSolicitante, lngSolicitante)}" target="_blank">Abrir no mapa</a>
              `
              : `<div class="linha"><strong>Localização:</strong> não enviada</div>`
          }
        </div>

        <div class="acoes">
          ${
            latSolicitante != null && lngSolicitante != null
              ? `<a class="link" href="${mapaLink(latSolicitante,lngSolicitante)}" target="_blank">Abrir no mapa</a>`
              : `<span class="muted">Sem GPS</span>`
          }
          ${
            item.cliente_telefone
              ? `<a class="link" href="${montarLinkWhatsApp(item.cliente_telefone, textoWhats)}" target="_blank">WhatsApp</a>`
              : `<span class="muted">Sem WhatsApp</span>`
          }
        </div>

        <div class="acoes3">
          ${podeAceitar ? `<button class="green" onclick="event.stopPropagation(); aceitarChamado('${item.id}')">Aceitar</button>` : `<button class="sec" disabled>Aceitar</button>`}
          ${podeIniciar ? `<button class="blue" onclick="event.stopPropagation(); iniciarChamado('${item.id}')">Iniciar</button>` : `<button class="sec" disabled>Iniciar</button>`}
          ${podeFinalizar ? `<button class="red" onclick="event.stopPropagation(); finalizarChamado('${item.id}')">Finalizar</button>` : `<button class="sec" disabled>Finalizar</button>`}
        </div>
      </div>
    </div>
  `;
}


    window.aceitarChamado = async function(id){
  chamadoAbertoId = null;

  if(!perfilBorracheiro){
    alert("Perfil do borracheiro não carregado.");
    return;
  }

  if(!perfilBorracheiro.aberto){
    alert("Sua borracharia está fechada. Abra no perfil antes de aceitar chamados.");
    return;
  }

  const valor = prompt("Digite o valor da taxa de deslocamento:", "30");
  const taxaDeslocamento = Number(valor || 0);

  if(isNaN(taxaDeslocamento) || taxaDeslocamento <= 0){
    alert("Informe um valor válido para a taxa de deslocamento.");
    return;
  }

  const pixCopiaCola = String(perfilBorracheiro?.pix_copia_cola_padrao || "").trim();

if(!pixCopiaCola){
  alert("Cadastre primeiro o PIX padrão no perfil da borracharia.");
  return;
}

  const { data, error } = await supabase
    .from("chamados_borracharia")
    .update({
      status: "aceito",
      borracheiro_id: perfilBorracheiro.id,
      valor_estimado: taxaDeslocamento,
      pix_copia_cola: pixCopiaCola.trim(),
      pix_status: "pendente",
      aceito_em: new Date().toISOString()
    })
    .eq("id", id)
    .eq("status", "aguardando")
    .is("borracheiro_id", null)
    .select();

  if(error){
    console.error(error);
    alert("Erro ao aceitar chamado.");
    return;
  }

  if(!data || !data.length){
    alert("Esse atendimento já foi pego por outra borracharia.");
    await listarChamados();
    return;
  }

  await listarChamados();
}

   window.iniciarChamado = async function(id){
  chamadoAbertoId = null;

  const confirmar = confirm("Confirmar início do atendimento?\n\nIsso marcará a taxa de deslocamento como paga.");
  if(!confirmar) return;

  const { error } = await supabase
    .from("chamados_borracharia")
    .update({
      status: "em_andamento",
      pix_status: "pago"
    })
    .eq("id", id)
    .eq("borracheiro_id", perfilBorracheiro.id);

  if(error){
    console.error(error);
    alert("Erro ao iniciar atendimento.");
    return;
  }

  await listarChamados();
}

    window.finalizarChamado = async function(id){
      chamadoAbertoId = null;
      const valorFinal = prompt("Digite o valor final cobrado:", "30");
      const formaPagamento = prompt("Forma de pagamento: pix / dinheiro / cartao", "pix");

      const { error } = await supabase
        .from("chamados_borracharia")
        .update({
          status: "finalizado",
          valor_final: Number(valorFinal || 0),
          forma_pagamento: (formaPagamento || "indefinido").toLowerCase(),
          finalizado_em: new Date().toISOString()
        })
        .eq("id", id)
        .eq("borracheiro_id", perfilBorracheiro.id);

      if(error){
        console.error(error);
        alert("Erro ao finalizar chamado.");
        return;
      }

      await listarChamados();
    }
async function sairPainel(){
  try{
    await supabase.auth.signOut();
  }catch(e){
    console.error(e);
  }

  window.location.href = "/auth/login.html";
}
   
    el("btnSair").addEventListener("click", sairPainel);
el("btnSalvarPerfil").addEventListener("click", salvarPerfil);
el("btnTopoCompartilhar").addEventListener("click", compartilharLinkPublico);
el("btnTopoSair").addEventListener("click", sairPainel);

el("btnAtualizar").addEventListener("click", () => {
  liberarAudio();
  listarChamados();
});

el("filtroStatus").addEventListener("change", listarChamados);
el("statusAberto").addEventListener("change", (e) => atualizarStatusVisualLoja(e.target.value));
el("btnPegarMinhaLocalizacao").addEventListener("click", pegarMinhaLocalizacao);

document.addEventListener("click", liberarAudio, { once:true });

carregarPainelDireto();
  </script>
