<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Login | FF Soluções</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .card {
            width: 380px;
            max-width: calc(100vw - 32px);
            background: #0f172a;
            padding: 30px;
            border-radius: 16px;
            box-sizing: border-box;
        }

        input,
        button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
        }

        button {
            background: #22c55e;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .link {
            margin-top: 12px;
            text-align: center;
            cursor: pointer;
            color: #22c55e;
        }

        .aviso-plano {
            margin-top: 18px;
            background: #111827;
            border: 1px solid #1e293b;
            padding: 18px;
            border-radius: 16px;
            text-align: left;
            color: #fff;
            font-size: 14px;
            line-height: 1.45;
        }

        .aviso-titulo {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .aviso-texto {
            color: #94a3b8;
            margin-bottom: 14px;
        }

        .btn-renovar {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
        }

        .btn-continuar {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* BOTÃO FLUTUANTE */
        #chatBotao {
            position: fixed;
            bottom: 20px;
            left: 20px;
            height: 56px;
            padding: 0 16px;
            background: #22c55e;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            font-weight: bold;
        }

        #chatBotao span {
            font-size: 14px;
        }

        #chatBotao.oculto {
            display: none;
        }

        /* CHAT */
        #chatBox {
            position: fixed;
            bottom: 90px;
            left: 20px;
            width: 360px;
            max-width: calc(100vw - 24px);
            height: 520px;
            max-height: calc(100vh - 120px);
            background: #020617;
            border-radius: 16px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 9999;
            box-shadow: 0 10px 35px rgba(0, 0, 0, .45);
            border: 1px solid #1e293b;
        }

        #chatBox.ativo {
            display: flex;
        }

        #chatTopo {
            background: #0f172a;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
        }

        #chatTopo button {
            width: auto;
            margin: 0;
            padding: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }

        #ffChatFrame {
            width: 100%;
            height: 100%;
            flex: 1;
            border: none;
            background: #020617;
        }

        /* MODAL */
        #chatNomeOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 16px;
            box-sizing: border-box;
        }

        #chatNomeOverlay.ativo {
            display: flex;
        }

        .chatNomeBox {
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            max-width: 100%;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #1e293b;
        }

        .chatNomeBox h3 {
            margin: 0 0 10px;
        }

        .chatNomeBox input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .chatNomeBox button {
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: #fff;
        }

        #chatNomeStatus {
            min-height: 18px;
            margin-top: 10px;
            color: #fca5a5;
            font-size: 13px;
        }

        @media (max-width:700px) {
            body {
                padding: 16px;
                box-sizing: border-box;
            }

            .card {
                width: 100%;
                padding: 22px;
            }

            #chatBotao {
                left: 14px;
                bottom: 14px;
                width: 56px;
                height: 56px;
            }

            #chatBotao span {
                display: none;
            }

            #chatBox {
                left: 12px;
                right: 12px;
                bottom: 80px;
                width: auto;
                height: 70vh;
                max-height: 70vh;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>🔐 Login FF Soluções</h2>

        <input id="usuario" type="email" placeholder="E-mail">
        <input id="senha" type="password" placeholder="Senha">

        <button id="btnEntrar">Entrar</button>

        <div class="link" onclick="resetSenha()">
            Esqueci minha senha
        </div>
    </div>

    <!-- BOTÃO SUPORTE -->
    <div id="chatBotao" onclick="abrirModalNomeChat()">
        💬 <span>Suporte</span>
    </div>

    <!-- CHAT -->
    <div id="chatBox">
        <div id="chatTopo">
            <span>FF Soluções</span>
            <button type="button" onclick="fecharChat()">✕</button>
        </div>

        <iframe id="ffChatFrame" title="Chat FF Soluções"></iframe>
    </div>

    <!-- MODAL NOME -->
    <div id="chatNomeOverlay">
        <div class="chatNomeBox">
            <h3>Digite seu nome</h3>

            <input id="chatNomeCliente" placeholder="Seu nome">

            <div id="chatNomeStatus"></div>

            <button type="button" onclick="confirmarEntradaChat()">
                Entrar no chat
            </button>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../js/supabase.js";

        document
            .getElementById("btnEntrar")
            .addEventListener("click", async () => {

                const email =
                    document.getElementById("usuario").value.trim();

                const senha =
                    document.getElementById("senha").value;

                if (!email || !senha) {
                    alert("Preencha e-mail e senha");
                    return;
                }

                const { error } =
                    await supabase.auth.signInWithPassword({
                        email,
                        password: senha
                    });

                if (error) {
                    alert(error.message);
                    return;
                }

                location.href = "../painel/index.html";
            });

        window.resetSenha = async function () {

            const email =
                document.getElementById("usuario").value.trim();

            if (!email) {
                alert("Digite seu e-mail.");
                return;
            }

            const { error } =
                await supabase.auth.resetPasswordForEmail(email);

            if (error) {
                alert(error.message);
                return;
            }

            alert("E-mail de recuperação enviado.");
        };

        window.abrirModalNomeChat = function () {
            document
                .getElementById("chatNomeOverlay")
                .classList.add("ativo");
        };

        window.fecharChat = function () {
            document
                .getElementById("chatBox")
                .classList.remove("ativo");
        };

        window.confirmarEntradaChat = function () {

            const nome =
                document.getElementById("chatNomeCliente").value.trim();

            if (!nome) {
                document.getElementById("chatNomeStatus").innerText =
                    "Digite seu nome";
                return;
            }

            document
                .getElementById("chatNomeOverlay")
                .classList.remove("ativo");

            document
                .getElementById("chatBox")
                .classList.add("ativo");

            document
                .getElementById("ffChatFrame").src =
                "../chat/index.html?nome=" +
                encodeURIComponent(nome);
        };
    </script>

</body>

</html>
