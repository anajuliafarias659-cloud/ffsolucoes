<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login | FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
}
.card{
  width:380px;
  background:#0f172a;
  padding:30px;
  border-radius:16px;
}
input,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}
button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.link{
  margin-top:12px;
  text-align:center;
  cursor:pointer;
  color:#22c55e;
}

.aviso-plano{
  margin-top:18px;
  background:#111827;
  border:1px solid #1e293b;
  padding:18px;
  border-radius:16px;
  text-align:left;
  color:#fff;
  font-size:14px;
  line-height:1.45;
}

.aviso-titulo{
  font-weight:bold;
  margin-bottom:8px;
  font-size:15px;
}

.aviso-texto{
  color:#94a3b8;
  margin-bottom:14px;
}

.btn-renovar{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:6px;
}

.btn-continuar{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#334155;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Login FF Soluções</h2>

  <input id="usuario" placeholder="E-mail">
  <input id="senha" type="password" placeholder="Senha">
  <button id="btnEntrar" onclick="login()">Entrar</button>

  <div class="link" onclick="resetSenha()">Esqueci minha senha</div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

function getBasePath(){
  return location.pathname.split("/auth")[0];
}

function removerAvisoPlano(){
  const aviso = document.getElementById("avisoPlano");
  if(aviso) aviso.remove();
}

function mostrarAvisoPlano(dias, basePath, destinoPainel, expirado = false){
  removerAvisoPlano();

  const box = document.createElement("div");
  box.id = "avisoPlano";
  box.className = "aviso-plano";

  const corTitulo = expirado ? "#f87171" : (dias <= 3 ? "#f59e0b" : "#38bdf8");
  const titulo = expirado
    ? "⚠️ Seu plano expirou"
    : `⚠️ Seu plano vence em ${dias} dia(s)`;

  const texto = expirado
    ? "Seu acesso pode ser bloqueado. Renove agora para continuar usando o sistema."
    : "Para evitar bloqueio, renove agora. Após o pagamento você recebe um código para ativar.";

  box.innerHTML = `
    <div class="aviso-titulo" style="color:${corTitulo}">
      ${titulo}
    </div>
    <div class="aviso-texto">
      ${texto}
    </div>
    <button id="btnRenovarAgora" class="btn-renovar">Renovar agora</button>
    ${!expirado ? '<button id="btnContinuarPainel" class="btn-continuar">Continuar para o painel</button>' : ''}
  `;

  const card = document.querySelector(".card");
  card.appendChild(box);

  document.getElementById("btnRenovarAgora").onclick = () => {
    window.location.href = basePath + "/pagamento/renovar.html";
  };

  if(!expirado){
    const btnContinuar = document.getElementById("btnContinuarPainel");
    if(btnContinuar){
      btnContinuar.onclick = () => {
        window.location.href = destinoPainel;
      };
    }
  }
}

async function login(){
  removerAvisoPlano();

  const email = document.getElementById("usuario").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value.trim();
  const btnEntrar = document.getElementById("btnEntrar");

  if(!email || !senha){
    alert("Preencha e-mail e senha");
    return;
  }

  btnEntrar.disabled = true;
  btnEntrar.textContent = "Entrando...";

  try{
    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password: senha
    });

    if(error){
      alert("Credenciais inválidas");
      return;
    }

    const userId = data.user.id;

    const { data: usuarioSistema, error: uErr } = await supabase
      .from("usuarios")
      .select("app_id")
      .eq("id", userId)
      .single();

    if(uErr || !usuarioSistema?.app_id){
      alert("Usuário não vinculado ao sistema.");
      return;
    }

    const { data: app, error: aErr } = await supabase
      .from("apps")
      .select("*")
      .eq("id", usuarioSistema.app_id)
      .single();

    if(aErr || !app){
      alert("Aplicação não encontrada.");
      return;
    }

    const basePath = getBasePath();
    const destinoPainel = basePath + "/" + app.tipo + "/admin.html";

    const dataExpiracao =
      app.data_expiracao ||
      app.expira_em ||
      app.vencimento ||
      app.vencimento_em ||
      app.trial_fim_em ||
      app.demo_expira_em ||
      app.plano_expira_em ||
      null;

    const hoje = new Date();
    const expiracao = dataExpiracao ? new Date(dataExpiracao) : null;

    if(!expiracao || isNaN(expiracao.getTime()) || app.ativo === false){
      mostrarAvisoPlano(0, basePath, destinoPainel, true);
      return;
    }

    const diffMs = expiracao.getTime() - hoje.getTime();
    const dias = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    if(dias <= 0){
      mostrarAvisoPlano(0, basePath, destinoPainel, true);
      return;
    }

    if(dias <= 15){
      mostrarAvisoPlano(dias, basePath, destinoPainel, false);
      return;
    }

    window.location.href = destinoPainel;

  } finally {
    btnEntrar.disabled = false;
    btnEntrar.textContent = "Entrar";
  }
}

async function resetSenha(){
  const email = document.getElementById("usuario").value.trim();

  if(!email){
    alert("Digite seu e-mail primeiro");
    return;
  }

  await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + "/auth/update-password.html"
  });

  alert("E-mail de recuperação enviado. Verifique sua caixa de entrada ou spam.");
}

window.login = login;
window.resetSenha = resetSenha;
</script>

</body>
</html>
