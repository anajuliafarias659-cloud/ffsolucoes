<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login | FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
}
.card{
  width:380px;
  background:#0f172a;
  padding:30px;
  border-radius:16px;
}
input,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:none;
}
button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.link{
  margin-top:12px;
  text-align:center;
  cursor:pointer;
  color:#22c55e;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Login FF Soluções</h2>

  <input id="usuario" placeholder="E-mail">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>

  <div class="link" onclick="resetSenha()">Esqueci minha senha</div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

function getBasePath(){
  return location.pathname.split("/auth")[0];
}

function mostrarAvisoPlano(dias, basePath){
  // evita duplicar
  if(document.getElementById("avisoPlano")) return;

  const box = document.createElement("div");
  box.id = "avisoPlano";
  box.style.cssText = `
    margin-top:14px;
    background:#111827;
    border:1px solid #1e293b;
    padding:12px;
    border-radius:12px;
    text-align:left;
    color:#fff;
    font-size:14px;
    line-height:1.35;
  `;

  const cor = dias <= 3 ? "#f59e0b" : "#38bdf8";

  box.innerHTML = `
    <div style="font-weight:bold; margin-bottom:6px; color:${cor}">
      ⚠️ Seu plano vence em ${dias} dia(s)
    </div>
    <div style="color:#94a3b8; margin-bottom:10px">
      Para evitar bloqueio, renove agora. Após o pagamento você recebe um código para ativar.
    </div>
    <button id="btnRenovarAgora" style="
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    ">Renovar agora</button>
  `;

  const card = document.querySelector(".card");
  card.appendChild(box);

  document.getElementById("btnRenovarAgora").onclick = () => {
    window.location.href = basePath + "/pagamento/renovar.html";
  };
}

async function login(){

  const email = document.getElementById("usuario").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    alert("Preencha e-mail e senha");
    return;
  }

  // 🔐 Login Supabase
  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert("Credenciais inválidas");
    return;
  }

  const userId = data.user.id;

  // 🔎 Busca vínculo do usuário
  const { data: usuarioSistema, error: uErr } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(uErr || !usuarioSistema?.app_id){
    alert("Usuário não vinculado ao sistema.");
    return;
  }

  // 🔎 Busca dados do app (vale para mercado/bar/restaurante/locadora/etc)
  const { data: app, error: aErr } = await supabase
    .from("apps")
    .select("tipo, data_expiracao, ativo")
    .eq("id", usuarioSistema.app_id)
    .single();

  if(aErr || !app){
    alert("Aplicação não encontrada.");
    return;
  }

  const basePath = getBasePath();

  // 🔐 Verificação de plano
  const hoje = new Date();
  const expiracao = app.data_expiracao ? new Date(app.data_expiracao) : null;

  // se não tiver data_expiracao, trata como expirado (mais seguro)
  if(!expiracao || expiracao.getTime() <= hoje.getTime() || app.ativo === false){
    window.location.href = basePath + "/pagamento/renovar.html";
    return;
  }

  // ✅ Aviso desde o primeiro dia (15 dias de demo)
const diffMs = expiracao.getTime() - hoje.getTime();
const dias = Math.ceil(diffMs / (1000*60*60*24));

if(dias <= 15){
    // Mostra aviso e NÃO impede entrar (só avisa)
    mostrarAvisoPlano(dias, basePath);

    // opcional: dá 1s pro usuário ver o aviso e depois segue
    setTimeout(() => {
      window.location.href = basePath + "/" + app.tipo + "/admin.html";
    }, 900);

    return;
  }

  // 🚀 Redirecionamento normal
  window.location.href = basePath + "/" + app.tipo + "/admin.html";
}

async function resetSenha(){

  const email = document.getElementById("usuario").value.trim();

  if(!email){
    alert("Digite seu e-mail primeiro");
    return;
  }

  await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + "/auth/update-password.html"
  });

  alert("E-mail de recuperação enviado. Verifique sua caixa de entrada ou spam.");
}

window.login = login;
window.resetSenha = resetSenha;
</script>

</body>
</html>
