<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login | FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
}
.card{
  width:380px;
  background:#0f172a;
  padding:30px;
  border-radius:16px;
}
input,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:none;
}
button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.link{
  margin-top:12px;
  text-align:center;
  cursor:pointer;
  color:#22c55e;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Login FF Soluções</h2>

  <input id="usuario" placeholder="E-mail">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>

  <div class="link" onclick="resetSenha()">Esqueci minha senha</div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

async function login(){

  const email = document.getElementById("usuario").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    alert("Preencha e-mail e senha");
    return;
  }

  // 🔐 Login Supabase
  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert("Credenciais inválidas");
    return;
  }

  const userId = data.user.id;

  // 🔎 Busca vínculo do usuário
  const { data: usuarioSistema } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(!usuarioSistema){
    alert("Usuário não vinculado ao sistema.");
    return;
  }

  // 🔎 Busca dados do app
const { data: app } = await supabase
  .from("apps")
  .select("tipo, data_expiracao, ativo")
  .eq("id", usuarioSistema.app_id)
  .single();

if(!app){
  alert("Aplicação não encontrada.");
  return;
}

// 🔐 Verificação de plano
const hoje = new Date();
const expiracao = new Date(app.data_expiracao);

if(expiracao < hoje || app.ativo === false){

  const basePath = location.pathname.split("/auth")[0];
  window.location.href = basePath + "/pagamento/renovar.html";
  return;
}

  /*
   🚀 Redirecionamento inteligente
   Funciona em:
   - raiz do domínio
   - subpasta
   - GitHub Pages
  */

  const basePath = location.pathname.split("/auth")[0];
  window.location.href = basePath + "/" + app.tipo + "/admin.html";
}

async function resetSenha(){

  const email = document.getElementById("usuario").value.trim();

  if(!email){
    alert("Digite seu e-mail primeiro");
    return;
  }

  await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + "/auth/update-password.html"
  });

  alert("E-mail de recuperação enviado verifique sua caixa de entrada ou spam.");
}

window.login = login;
window.resetSenha = resetSenha;
</script>

</body>
</html>
