<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurar Mercado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#020617;
  color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
}
.container{
  max-width:560px;
  margin:40px auto;
  padding:24px;
  background:#0f172a;
  border-radius:18px;
}
h2{text-align:center;margin-bottom:10px}
label{display:block;margin-top:14px}
input,textarea,select,button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border-radius:12px;
  border:none;
}
input,textarea,select{background:#020617;color:#fff}
textarea{resize:none;min-height:90px}
button{
  background:#22c55e;
  color:#022c22;
  font-weight:700;
  margin-top:22px;
  cursor:pointer;
}
.preview{
  margin-top:10px;
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:12px;
  display:none;
}
small{opacity:.7}
</style>
</head>

<body>

<div class="container">
  <h2>🛒 Configurar Mercado</h2>

  <label>Nome do mercado</label>
  <input id="nome" placeholder="Ex: Mercado Central">

  <label>Descrição curta</label>
  <input id="descricao" placeholder="Ex: Tudo para sua casa">

  <label>Sobre o mercado</label>
  <textarea id="sobre" placeholder="Fale sobre seu mercado"></textarea>

  <label>WhatsApp</label>
  <input id="whatsapp" placeholder="Ex: 88999999999">

  <label>Tema do site</label>
  <select id="tema">
    <option value="padrao">Padrão</option>
    <option value="carnaval">🎭 Carnaval</option>
    <option value="saojoao">🔥 São João</option>
    <option value="natal">🎄 Natal</option>
    <option value="anonovo">✨ Ano Novo</option>
  </select>

  <label>Banner do site</label>
  <input type="file" id="bannerInput" accept="image/*">
  <img id="bannerPreview" class="preview">

  <label>Benefícios (um por linha)</label>
  <textarea id="beneficios" placeholder="Entrega rápida&#10;Preços baixos&#10;Qualidade garantida"></textarea>

  <button onclick="salvar()">Salvar configurações</button>
  <small id="status"></small>
</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const BUCKET_BANNERS = "banners";

let app_id = null;

/* ===== ELEMENTOS ===== */
const nomeEl = document.getElementById("nome");
const descEl = document.getElementById("descricao");
const sobreEl = document.getElementById("sobre");
const whatsappEl = document.getElementById("whatsapp");
const temaEl = document.getElementById("tema");
const bannerInput = document.getElementById("bannerInput");
const bannerPreview = document.getElementById("bannerPreview");
const beneficiosEl = document.getElementById("beneficios");
const statusEl = document.getElementById("status");

/* ===== PREVIEW ===== */
bannerInput.onchange = ()=>{
  const f = bannerInput.files[0];
  if(f){
    bannerPreview.src = URL.createObjectURL(f);
    bannerPreview.style.display="block";
  }
};

/* ===== VALIDAR SESSÃO ===== */
async function validarSessao(){
  const { data } = await sb.auth.getSession();

  if(!data.session){
    alert("Sessão expirada");
    location.href="login.html";
    return false;
  }

  app_id = data.session.user.id;
  return true;
}

/* ===== CARREGAR ===== */
async function carregar(){
  const { data } = await sb
    .from("config_site")
    .select("nome_site,descricao_site,sobre_site,whatsapp,tema_site,banner_url,beneficios")
    .eq("app_id", app_id)
    .maybeSingle();

  if(!data) return;

  nomeEl.value = data.nome_site || "";
  descEl.value = data.descricao_site || "";
  sobreEl.value = data.sobre_site || "";
  whatsappEl.value = data.whatsapp || "";
  temaEl.value = data.tema_site || "padrao";

  if(Array.isArray(data.beneficios)){
    beneficiosEl.value = data.beneficios.join("\n");
  }

  if(data.banner_url){
    bannerPreview.src = data.banner_url;
    bannerPreview.style.display = "block";
  }
}

/* ===== SALVAR ===== */
async function salvar(){
  statusEl.innerText = "Salvando...";

  let banner_url = null;
  if(bannerInput.files[0]){
    const file = bannerInput.files[0];
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = `${app_id}/${Date.now()}.${ext}`;

    const { error } = await sb.storage
      .from(BUCKET_BANNERS)
      .upload(path, file, { upsert:true });

    if(!error){
      banner_url = sb.storage.from(BUCKET_BANNERS)
        .getPublicUrl(path).data.publicUrl;
    }
  }

  const beneficiosArr = beneficiosEl.value
    ? beneficiosEl.value.split("\n").map(b=>b.trim()).filter(Boolean)
    : [];

  const payload = {
    app_id,
    nome_site: nomeEl.value || null,
    descricao_site: descEl.value || null,
    sobre_site: sobreEl.value || null,
    whatsapp: whatsappEl.value || null,
    tema_site: temaEl.value || "padrao",
    beneficios: beneficiosArr
  };

  if(banner_url) payload.banner_url = banner_url;

  const { data: existente } = await sb
    .from("config_site")
    .select("id")
    .eq("app_id", app_id)
    .maybeSingle();

  const res = existente
    ? await sb.from("config_site").update(payload).eq("app_id", app_id)
    : await sb.from("config_site").insert(payload);

  if(res.error){
    alert("Erro ao salvar");
    statusEl.innerText="";
    return;
  }

  statusEl.innerText="Salvo com sucesso 🔥";
}

/* ===== INICIAR ===== */
document.addEventListener("DOMContentLoaded", async () => {
  const ok = await validarSessao();
  if(ok){
    await carregar();
  }
});
</script>

</body>
</html>
