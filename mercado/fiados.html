<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fiados | FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial;background:#020617;color:#e5e7eb}
.topo{
  padding:12px;
  border-bottom:1px solid #0f172a;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.topo b{font-size:20px;color:#38bdf8}
.btn-voltar{
  background:#1e293b;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.container{padding:12px}
.card{background:#0f172a;border-radius:14px;padding:12px;margin-bottom:14px}
.linha{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:4px 0}
.valor{color:#f87171;font-weight:bold}
.debito{padding:8px 0;border-bottom:1px solid #1e293b}
.obs{font-size:12px;color:#94a3b8;margin-left:22px;margin-top:4px}
input[type=checkbox]{transform:scale(1.2)}
input[type=text]{
  width:100%;padding:10px;margin:10px 0;
  border-radius:10px;border:none;
  background:#020617;color:#fff
}
button{
  width:100%;padding:10px;border:none;border-radius:10px;
  background:#22c55e;color:#020617;font-weight:bold;
  cursor:pointer;margin-top:8px
}
.totalCliente{
  font-weight:bold;
  margin:6px 0;
  color:#f87171
}
.subinfo{
  font-size:12px;
  color:#94a3b8;
  margin-top:4px;
}
.botoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.botoes button:last-child{
  background:#ef4444;
  color:#fff;
}
.vazio,.erro{
  background:#0f172a;
  padding:14px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="topo">
  <b>📋 FIADOS POR CLIENTE</b>
  <button class="btn-voltar" onclick="history.back()">Voltar</button>
</div>

<div class="container">

  <input id="pesquisa" type="text"
    placeholder="Pesquisar por nome ou CPF..."
    oninput="filtrarFiados()">

  <div id="listaFiados">Carregando...</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let dadosFiados = [];

async function validarSessao(){
  const { data, error } = await supabaseClient.auth.getSession();

  if(error || !data.session){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabaseClient
    .from("usuarios")
    .select("id, app_id, nome, email")
    .eq("id", userId)
    .single();

  if(erroUsuario || !usuario){
    console.error("Erro ao buscar usuário:", erroUsuario);
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  app_id = usuario.app_id;

  if(!app_id){
    alert("Negócio não identificado.");
    return false;
  }

  return true;
}

async function carregarFiados(){
  const lista = document.getElementById("listaFiados");
  lista.innerHTML = "Carregando...";

  const { data, error } = await supabaseClient
    .from("vendas")
    .select("*")
    .eq("app_id", app_id)
    .eq("forma_pagamento", "FIADO")
    .gt("valor_devido", 0)
    .order("created_at", { ascending: true });

  if(error){
    console.error("Erro ao carregar fiados:", error);
    lista.innerHTML = "<div class='erro'>Erro ao carregar fiados</div>";
    return;
  }

  dadosFiados = data || [];
  renderizarFiados(dadosFiados);
}

function filtrarFiados(){
  const termo = document.getElementById("pesquisa").value.toLowerCase().trim();

  if(!termo){
    renderizarFiados(dadosFiados);
    return;
  }

  const filtrado = dadosFiados.filter(v =>
    (v.cliente_nome || "").toLowerCase().includes(termo) ||
    (v.cliente_cpf || "").includes(termo)
  );

  renderizarFiados(filtrado);
}

function formatarData(dataStr){
  if(!dataStr) return "Sem data";
  const d = new Date(dataStr);
  if(isNaN(d.getTime())) return "Sem data";
  return d.toLocaleDateString("pt-BR");
}

function renderizarFiados(data){
  const container = document.getElementById("listaFiados");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "<div class='vazio'>Nenhum fiado encontrado</div>";
    return;
  }

  const clientes = {};

  data.forEach(v => {
    const chave = (v.cliente_cpf && v.cliente_cpf.trim()) 
      ? v.cliente_cpf.trim() 
      : `semcpf_${(v.cliente_nome || "cliente").trim().toLowerCase()}`;

    if(!clientes[chave]){
      clientes[chave] = {
        chave,
        nome: v.cliente_nome || "Cliente sem nome",
        cpf: v.cliente_cpf || "",
        total: 0,
        debitos: []
      };
    }

    clientes[chave].total += Number(v.valor_devido || 0);
    clientes[chave].debitos.push(v);
  });

  Object.values(clientes).forEach(cliente => {
    let html = `
      <div class="card">
        <div class="linha">
          <div>
            <b>👤 ${cliente.nome}</b>
            <div class="subinfo">
              ${cliente.cpf ? `CPF: ${cliente.cpf}` : "CPF não informado"}
            </div>
          </div>
          <span class="totalCliente">
            Total: R$ ${cliente.total.toFixed(2)}
          </span>
        </div>
    `;

    cliente.debitos.forEach(d => {
      html += `
        <div class="debito">
          <label>
            <input type="checkbox"
              class="chk"
              data-id="${d.id}"
              data-chave="${cliente.chave}">
            ${formatarData(d.created_at)} — R$ ${Number(d.valor_devido || 0).toFixed(2)}
          </label>
          ${
            d.observacao
              ? `<div class="obs">📝 ${d.observacao}</div>`
              : ""
          }
        </div>
      `;
    });

    html += `
      <div class="botoes">
        <button onclick="quitarSelecionados('${cliente.chave}')">
          Quitar selecionados
        </button>
        <button onclick="quitarTodos('${cliente.chave}')">
          Quitar todas
        </button>
      </div>
      </div>
    `;

    container.innerHTML += html;
  });
}

async function quitarSelecionados(chave){
  const checks = document.querySelectorAll(`.chk[data-chave="${chave}"]:checked`);

  if(checks.length === 0){
    alert("Nenhuma dívida selecionada");
    return;
  }

  if(!confirm("Confirmar quitação das dívidas selecionadas?")) return;

  for(const c of checks){
    const { error } = await supabaseClient
      .from("vendas")
      .update({
        valor_devido: 0,
        status: "PAGO",
        data_pagamento: new Date().toISOString()
      })
      .eq("id", c.dataset.id)
      .eq("app_id", app_id);

    if(error){
      console.error("Erro ao quitar dívida:", error);
      alert("Erro ao quitar uma das dívidas.");
      return;
    }
  }

  await carregarFiados();
}

async function quitarTodos(chave){
  const cliente = Object.values(agruparClientes(dadosFiados)).find(c => c.chave === chave);

  if(!cliente){
    alert("Cliente não encontrado.");
    return;
  }

  if(!confirm("Quitar TODAS as dívidas desse cliente?")) return;

  let query = supabaseClient
    .from("vendas")
    .update({
      valor_devido: 0,
      status: "PAGO",
      data_pagamento: new Date().toISOString()
    })
    .eq("app_id", app_id)
    .eq("forma_pagamento", "FIADO")
    .gt("valor_devido", 0);

  if(cliente.cpf){
    query = query.eq("cliente_cpf", cliente.cpf);
  }else{
    query = query
      .is("cliente_cpf", null)
      .eq("cliente_nome", cliente.nome);
  }

  const { error } = await query;

  if(error){
    console.error("Erro ao quitar todas:", error);
    alert("Erro ao quitar todas as dívidas.");
    return;
  }

  await carregarFiados();
}

function agruparClientes(data){
  const clientes = {};

  (data || []).forEach(v => {
    const chave = (v.cliente_cpf && v.cliente_cpf.trim())
      ? v.cliente_cpf.trim()
      : `semcpf_${(v.cliente_nome || "cliente").trim().toLowerCase()}`;

    if(!clientes[chave]){
      clientes[chave] = {
        chave,
        nome: v.cliente_nome || "Cliente sem nome",
        cpf: v.cliente_cpf || "",
        total: 0,
        debitos: []
      };
    }

    clientes[chave].total += Number(v.valor_devido || 0);
    clientes[chave].debitos.push(v);
  });

  return clientes;
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await validarSessao();
  if(!ok) return;
  await carregarFiados();
});
</script>

</body>
</html>
