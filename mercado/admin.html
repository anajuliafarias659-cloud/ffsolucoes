<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel | Mercado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.topo h2{
  margin:0;
  font-size:20px;
}

.sair{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  padding:18px;
  max-width:1100px;
  margin:auto;
}

.bemvindo{
  margin-bottom:20px;
  line-height:1.5;
}

.bemvindo small{
  opacity:.65;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:650px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:.25s;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:120px;
  gap:8px;
  position:relative;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.card:hover{
  transform:translateY(-4px);
  background:#1e293b;
}

.link-card{
  grid-column:1/-1;
  text-align:left;
  cursor:default;
  align-items:flex-start;
}

.link-box{
  margin-top:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:10px;
  font-size:12px;
  color:#cbd5e1;
  word-break:break-all;
  width:100%;
}

.botao-link{
  margin-top:10px;
  background:#22c55e;
  border:none;
  color:#fff;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.botao-link:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🛒 Painel do Mercado</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <div class="bemvindo">
    Bem-vindo, <b id="nome"></b><br>
    <small>ID do Negócio: <span id="negocioId"></span></small>
  </div>

  <div class="grid">

    <div class="card" onclick="irPara('admins.html')">
      <div>👥</div>
      <div>Administradores</div>
    </div>

    <div class="card" onclick="irPara('produtos.html')">
      <div>📦</div>
      <div>Produtos</div>
    </div>

    <div class="card" onclick="irPara('vendas.html')">
      <div>🛒</div>
      <div>Vendas</div>
    </div>

    <div class="card" onclick="irPara('fiados.html')">
      <div>📋</div>
      <div>Fiados</div>
    </div>

    <div class="card" onclick="irPara('relatorios.html')">
      <div>📊</div>
      <div>Relatórios</div>
    </div>

    <div class="card" onclick="alternarPublico()">
      <div>🔁</div>
      <div id="modoPublico">Modo: Catálogo</div>
    </div>

    <div class="card" onclick="abrirSite()">
      <div>🌍</div>
      <div>Acessar Site</div>
    </div>

    <div class="card" onclick="irPara('config-site.html')">
      <div>⚙️</div>
      <div>Configurar Site</div>
    </div>

    <div class="card link-card">
      <div><b>🌍 Página Pública</b></div>
      <div style="opacity:.7; margin-top:6px;">
        Esse é o link público da sua loja para compartilhar com seus clientes.
      </div>

      <div class="link-box" id="linkPublico">Carregando link...</div>

      <button class="botao-link" onclick="compartilharPagina()">
        🔗 Copiar link da loja
      </button>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;

function atualizarLabel(modo){
  const el = document.getElementById("modoPublico");
  if(!el) return;
  el.innerText = modo === "site" ? "Modo: Site" : "Modo: Catálogo";
}

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

async function carregarUsuario(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario, error } = await supabase
    .from("usuarios")
    .select("nome, app_id")
    .eq("id", userId)
    .single();

  if(error || !usuario){
    alert("Não foi possível carregar os dados do usuário.");
    return;
  }

  app_id = usuario.app_id;

  document.getElementById("nome").innerText = usuario.nome || "";
  document.getElementById("negocioId").innerText = usuario.app_id || "";

  const modoInicial = localStorage.getItem("publico_modo") || "catalogo";
  atualizarLabel(modoInicial);

  const urlPublica = `${location.origin}/mercado/public/catalogo.html?app=${usuario.app_id}`;
  document.getElementById("linkPublico").innerText = urlPublica;
}

window.irPara = function(pagina){
  window.location.href = pagina;
};

window.alternarPublico = function(){
  const atual = localStorage.getItem("publico_modo") || "catalogo";
  const novo = atual === "catalogo" ? "site" : "catalogo";
  localStorage.setItem("publico_modo", novo);
  atualizarLabel(novo);

  if(app_id){
    const urlPublica = novo === "site"
      ? `${location.origin}/mercado/public/site.html?app=${app_id}`
      : `${location.origin}/mercado/public/catalogo.html?app=${app_id}`;

    document.getElementById("linkPublico").innerText = urlPublica;
  }
};

window.abrirSite = function(){
  if(!app_id){
    alert("Negócio não identificado.");
    return;
  }

  const modo = localStorage.getItem("publico_modo") || "catalogo";

  const url = modo === "site"
    ? `${location.origin}/mercado/public/site.html?app=${app_id}`
    : `${location.origin}/mercado/public/catalogo.html?app=${app_id}`;

  window.open(url, "_blank");
};

window.compartilharPagina = async function(){
  if(!app_id){
    alert("Negócio não identificado.");
    return;
  }

  const modo = localStorage.getItem("publico_modo") || "catalogo";

  const url = modo === "site"
    ? `${location.origin}/mercado/public/site.html?app=${app_id}`
    : `${location.origin}/mercado/public/catalogo.html?app=${app_id}`;

  try{
    await navigator.clipboard.writeText(url);
    alert("🔗 Link da loja copiado com sucesso!\n\n" + url);
  }catch{
    prompt("Copie o link da loja:", url);
  }
};

window.logout = async function(){
  await supabase.auth.signOut();
  window.location.href = "/auth/login.html";
};

carregarUsuario();
</script>

</body>
</html>
