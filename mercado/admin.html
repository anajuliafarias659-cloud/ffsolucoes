<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel | Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.topo h2{
  margin:0;
  font-size:20px;
}

.sair{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  padding:18px;
  max-width:1100px;
  margin:auto;
}

.bemvindo{
  margin-bottom:20px;
  line-height:1.5;
}

.bemvindo small{
  opacity:.65;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

@media(max-width:900px){
  .grid{ grid-template-columns:repeat(3,1fr); }
}

@media(max-width:650px){
  .grid{ grid-template-columns:repeat(2,1fr); }
}

.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:.25s;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:120px;
  gap:8px;
  position:relative;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.card:hover{
  transform:translateY(-4px);
  background:#1e293b;
}

.badge{
  position:absolute;
  top:10px;
  right:10px;
  min-width:24px;
  height:24px;
  padding:0 8px;
  border-radius:999px;
  background:#ef4444;
  color:#fff;
  font-size:12px;
  font-weight:bold;
  display:none;
  align-items:center;
  justify-content:center;
}

@keyframes piscar{
  0%{box-shadow:0 0 0 transparent;}
  50%{box-shadow:0 0 20px rgba(239,68,68,.9);}
  100%{box-shadow:0 0 0 transparent;}
}

.piscar{
  animation:piscar 1s infinite;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🛒 Painel do Admin</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <div class="bemvindo">
    Bem-vindo, <b id="nome"></b><br>
    <small>ID do Negócio: <span id="negocioId"></span></small>
  </div>

  <div class="grid">

    <div class="card" onclick="irPara('admins.html')">👥 Administradores</div>
    <div class="card" onclick="irPara('https://www.ffsolucoes.com.br/produtos.html')">📦 Produtos</div>
    <div class="card" onclick="irPara('https://www.ffsolucoes.com.br/categorias.html')">📂 Categorias</div>
    <div class="card" onclick="irPara('vendas.html')">🛒 Vendas</div>

    <div class="card" id="cardPedidos" onclick="irPara('https://www.ffsolucoes.com.br/pedidos-online.html')">
      🛒 Vendas Online
      <span class="badge" id="badgePedidos">0</span>
    </div>

    <div class="card" onclick="irPara('fiados.html')">📋 Fiados</div>
    <div class="card" onclick="irPara('relatorios.html')">📊 Relatórios</div>
    <div class="card" onclick="irPara('https://www.ffsolucoes.com.br/config-site.html')">⚙️ Configurar Site</div>

  </div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;
let intervaloPedidos = null;

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }
  return session.user.id;
}

async function carregarUsuario(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario } = await supabase
    .from("usuarios")
    .select("nome, app_id")
    .eq("id", userId)
    .single();

  app_id = usuario.app_id;

  document.getElementById("nome").innerText = usuario.nome || "";
  document.getElementById("negocioId").innerText = usuario.app_id || "";

  await verificarPedidos();
  iniciarAtualizacaoPedidos();
}

async function verificarPedidos(){
  if(!app_id) return;

  const { data } = await supabase
    .from("pedidos")
    .select("id")
    .eq("app_id", app_id)
    .eq("status", "novo");

  const badge = document.getElementById("badgePedidos");
  const card = document.getElementById("cardPedidos");

  if(data && data.length > 0){
    badge.style.display = "flex";
    badge.innerText = data.length;
    card.classList.add("piscar");
  }else{
    badge.style.display = "none";
    card.classList.remove("piscar");
  }
}

function iniciarAtualizacaoPedidos(){
  if(intervaloPedidos){
    clearInterval(intervaloPedidos);
  }

  intervaloPedidos = setInterval(() => {
    verificarPedidos();
  }, 5000);
}

window.irPara = function(pagina){
  window.location.href = pagina;
};

window.logout = async function(){
  if(intervaloPedidos){
    clearInterval(intervaloPedidos);
  }
  await supabase.auth.signOut();
  window.location.href = "/auth/login.html";
};

carregarUsuario();
</script>

</body>
</html>
