<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel | ffsolucoes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}
.topo{
  background:#0f172a;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.sair{
  background:#e53935;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}
.card{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  margin-bottom:14px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🛒 Admin Seu Negócio</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">
  <h3>Bem-vindo, <span id="nome"></span></h3>

  <div class="card" onclick="go('produtos.html')">
    📦 Produtos
  </div>

  <div class="card" onclick="go('vendas.html')">
    🛒 Vendas
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.coL",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

async function validarSessao(){
  const { data } = await supabase.auth.getSession();

  if(!data.session){
    window.location.replace("login.html");
    return;
  }

  document.getElementById("nome").innerText = data.session.user.email;
}

validarSessao();

function go(pagina){
  window.location.href = pagina;
}

async function logout(){
  await supabase.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
