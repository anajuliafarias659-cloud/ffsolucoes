<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel | Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

.topo{
  padding:15px;
  background:#0f172a;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  position:relative;
}

.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:5px 10px;
  border-radius:999px;
  display:none;
}

@keyframes piscar{
  50%{box-shadow:0 0 20px red;}
}

.piscar{
  animation:piscar 1s infinite;
}
</style>
</head>

<body>

<div class="topo">
  <h2>Painel</h2>
  <button onclick="logout()">Sair</button>
</div>

<div class="container">

<p>Bem-vindo, <b id="nome"></b></p>

<div class="grid">

<div class="card" onclick="irPara('admins.html')">Admins</div>
<div class="card" onclick="irPara('produtos.html')">Produtos</div>
<div class="card" onclick="irPara('categorias.html')">Categorias</div>

<div class="card" onclick="irPara('vendas.html')">Vendas</div>

<div class="card" id="cardPedidos">
Pedidos Online
<span class="badge" id="badgePedidos">0</span>
</div>

<div class="card" onclick="irPara('relatorios.html')">Relatórios</div>

</div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;
let idsAnteriores = new Set();
let primeira = true;

async function carregar(){
  const { data:{session} } = await supabase.auth.getSession();
  if(!session) location.href="/auth/login.html";

  const { data:user } = await supabase
    .from("usuarios")
    .select("nome,app_id")
    .eq("id",session.user.id)
    .single();

  app_id = user.app_id;
  document.getElementById("nome").innerText = user.nome;

  verificar();
  setInterval(verificar,5000);
}

async function verificar(){
  if(!app_id) return;

  const { data } = await supabase
    .from("pedidos")
    .select("id,status,pagamento_status,mp_status")
    .eq("app_id",app_id);

  const pedidos = data || [];

  const novos = pedidos.filter(p=>{
    const status = String(p.status||"").toLowerCase();
    const pag = String(p.pagamento_status||p.mp_status||"").toLowerCase();

    return (
      status==="novo" ||
      status==="aguardando_confirmacao_pix" ||
      pag==="approved"
    );
  });

  const idsAtuais = new Set(novos.map(p=>String(p.id)));

  const badge = document.getElementById("badgePedidos");
  const card = document.getElementById("cardPedidos");

  if(novos.length>0){
    badge.style.display="block";
    badge.innerText=novos.length;
    card.classList.add("piscar");
  }else{
    badge.style.display="none";
    card.classList.remove("piscar");
  }

  if(!primeira){
    let entrou=false;

    for(const id of idsAtuais){
      if(!idsAnteriores.has(id)){
        entrou=true;
        break;
      }
    }

    if(entrou){
      console.log("🔥 NOVO PEDIDO!");

      // 🔊 SOM
      const audio = new Audio("/sons/novo-pedido.mp3");
      audio.play().catch(()=>{});

      // 🔔 NOTIFICAÇÃO
      if("Notification" in window){
        if(Notification.permission==="granted"){
          new Notification("Novo pedido!",{
            body:"Chegou pedido novo"
          });
        }else{
          Notification.requestPermission();
        }
      }
    }
  }

  idsAnteriores = idsAtuais;
  primeira=false;
}

window.irPara=(p)=>location.href=p;

window.logout=async()=>{
  await supabase.auth.signOut();
  location.href="/auth/login.html";
};

carregar();
</script>

</body>
</html>
