<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativação de Funcionário | Mercado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
.card{
  width:100%;
  max-width:420px;
  background:#0f172a;
  padding:32px;
  border-radius:18px;
}
h2{text-align:center;margin-top:0}
input,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
}
input{background:#020617;color:#fff}
button{
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{
  opacity:.7;
  cursor:not-allowed;
}
small{
  display:block;
  margin-top:16px;
  opacity:.6;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">
  <h2>🏪 Mercado — Ativação</h2>

  <input id="email" type="email" placeholder="Usuário ou e-mail">
  <input id="senha" type="password" placeholder="Senha">

  <button id="btnAtivar" onclick="ativar()">Ativar acesso</button>

  <small>Esse acesso é usado apenas uma vez</small>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

/* 🔁 SE JÁ ESTIVER ATIVADO, PULA LOGIN */
const sessao = localStorage.getItem("funcionario_logado");
if(sessao){
  try{
    const u = JSON.parse(sessao);
    if(u && u.tipo){
      redirecionar(u.tipo);
    }
  }catch{
    localStorage.removeItem("funcionario_logado");
  }
}

/* 🔐 ATIVAÇÃO (LOGIN UMA VEZ) */
window.ativar = async () => {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value.trim();
  const btn = document.getElementById("btnAtivar");

  if(!email || !senha){
    alert("Preencha e-mail e senha");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Entrando...";

  const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if(authError || !authData?.user){
    console.error("Erro login:", authError);
    alert("Usuário ou senha inválidos");
    btn.disabled = false;
    btn.innerText = "Ativar acesso";
    return;
  }

  const userId = authData.user.id;

  const { data: usuario, error: usuarioError } = await supabase
    .from("usuarios")
    .select("id, nome, email, tipo, app_id, ativo")
    .eq("id", userId)
    .single();

  if(usuarioError || !usuario){
    console.error("Erro ao buscar usuário:", usuarioError);
    alert("Usuário não encontrado na base.");
    await supabase.auth.signOut();
    btn.disabled = false;
    btn.innerText = "Ativar acesso";
    return;
  }

  if(usuario.ativo !== true){
    alert("Usuário inativo.");
    await supabase.auth.signOut();
    btn.disabled = false;
    btn.innerText = "Ativar acesso";
    return;
  }

  localStorage.setItem("funcionario_logado", JSON.stringify({
    id: usuario.id,
    nome: usuario.nome,
    email: usuario.email,
    tipo: usuario.tipo,
    app_id: usuario.app_id
  }));

  redirecionar(usuario.tipo);
};

/* 🔀 REDIRECIONAMENTO AUTOMÁTICO */
function redirecionar(tipo){
  tipo = String(tipo || "").toLowerCase().trim();

  if(tipo === "admin"){
    window.location.replace("admin.html");
  }
  else if(tipo === "caixa"){
    window.location.replace("caixa.html");
  }
  else if(tipo === "produtos"){
    window.location.replace("produtos.html");
  }
  else{
    alert("Tipo de funcionário inválido");
    localStorage.removeItem("funcionario_logado");
  }
}
</script>

</body>
</html>
