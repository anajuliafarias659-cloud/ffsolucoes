<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caixa | FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial;background:#020617;color:#e5e7eb;font-size:14px}
.topo-app{padding:10px 14px;border-bottom:1px solid #0f172a}
.brand{font-size:22px;font-weight:900;color:#38bdf8}
.mobile-pos{padding:12px;padding-bottom:260px}
.card{background:#0f172a;border-radius:14px;padding:12px;margin-bottom:10px}
.card input,.card textarea,.card button{
width:100%;padding:10px;font-size:14px;border-radius:10px;border:none;margin-bottom:6px}
.card input,.card textarea{background:#020617;color:#fff}
.card button{cursor:pointer;background:#0ea5e9;color:#fff}
.lista-item{padding:8px;border-radius:8px;background:#020617;margin-bottom:4px;cursor:pointer}
.lista-item:hover{background:#1e293b}
.carrinho div{padding:4px 0;border-bottom:1px solid #1e293b}
.pagamento .dinheiro{background:#16a34a}
.pagamento .pix{background:#0ea5e9}
.pagamento .cartao{background:#2563eb}
.pagamento .fiado{background:#7c3aed}
.total-fixo{
position:fixed;bottom:0;left:0;width:100%;
background:#020617;border-top:1px solid #0f172a;
color:#38bdf8;text-align:center;padding:12px;
font-size:18px;font-weight:900}
.info{text-align:center;font-weight:bold;margin-top:4px}
.hidden{display:none}
</style>
</head>

<body>

<div class="topo-app"><div class="brand">CAIXA</div></div>

<div class="mobile-pos">

<div class="card">
<input id="codigo" placeholder="Código ou nome do produto" oninput="autoBuscar()">
<div id="listaBusca"></div>
</div>

<div class="card">
<input id="quantidade" type="number" min="1" value="1">
</div>

<div class="card hidden" id="previewProduto">
<b id="prevNome"></b>
<p>R$ <span id="prevPreco"></span> | Estoque: <span id="prevEstoque"></span></p>
<button onclick="confirmarAdicionar()">Adicionar ao carrinho</button>
</div>

<div class="card carrinho">
<b>🛒 Carrinho</b>
<div id="carrinho"></div>
</div>

<div class="card pagamento">
<b>💳 Pagamento</b>
<input id="valorPago" type="number" step="0.01" placeholder="Valor pago" oninput="calcularPagamento()">
<button class="dinheiro" onclick="finalizarVenda('DINHEIRO')">Dinheiro</button>
<button class="pix" onclick="finalizarVenda('PIX')">PIX</button>
<button class="cartao" onclick="finalizarVenda('CARTAO')">Cartão</button>
<button class="fiado" onclick="abrirFiado()">Fiado</button>
<div id="infoPagamento" class="info"></div>
</div>

<div class="card hidden" id="formFiado">
<input id="fiadoNome" placeholder="Nome do cliente">
<input id="fiadoCpf" placeholder="CPF (11 dígitos)">
<textarea id="fiadoObs" placeholder="Observação"></textarea>
<button class="fiado" onclick="confirmarFiado()">Confirmar Fiado</button>
</div>

</div>

<div class="total-fixo">
TOTAL: R$ <span id="total">0.00</span>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let nomeEmpresa = "Minha Empresa";
let carrinho = [];
let produtoAtual = null;
let total = 0;
let timerBusca = null;

/* ================= VALIDAR SESSÃO ================= */

async function validarSessao(){
  const { data } = await supabaseClient.auth.getSession();

  if(!data.session){
    alert("Sessão inválida");
    location.href="login.html";
    return false;
  }

  app_id = data.session.user.id;

  // 🔥 BUSCAR NOME DO NEGÓCIO PELO ID
  const { data: empresa } = await supabaseClient
    .from("negocios") // se for outro nome, troque aqui
    .select("nome")
    .eq("id", app_id)
    .single();

  if(empresa){
    nomeEmpresa = empresa.nome;
  }

  return true;
}

function round2(v){ return Math.round(v*100)/100; }

const codigo = document.getElementById("codigo");
const quantidade = document.getElementById("quantidade");
const listaBusca = document.getElementById("listaBusca");
const previewProduto = document.getElementById("previewProduto");
const prevNome = document.getElementById("prevNome");
const prevPreco = document.getElementById("prevPreco");
const prevEstoque = document.getElementById("prevEstoque");
const carrinhoDiv = document.getElementById("carrinho");
const totalSpan = document.getElementById("total");
const valorPago = document.getElementById("valorPago");
const infoPagamento = document.getElementById("infoPagamento");
const formFiado = document.getElementById("formFiado");

/* ================= BUSCA PRODUTO ================= */

function autoBuscar(){
  clearTimeout(timerBusca);
  const v = codigo.value.trim();
  if(!v){ listaBusca.innerHTML=""; return; }
  timerBusca=setTimeout(()=>buscarGeral(v),200);
}

async function buscarGeral(v){

  let res;

  if(/^\d+$/.test(v)){
    res = await supabaseClient
      .from("produtos")
      .select("*")
      .eq("app_id",app_id)
      .eq("codigo_barras",v);
  }else{
    res = await supabaseClient
      .from("produtos")
      .select("*")
      .eq("app_id",app_id)
      .ilike("nome",`%${v}%`)
      .limit(5);
  }

  const { data, error } = res;

  listaBusca.innerHTML="";
  if(error){ console.error(error); return; }

  if(!data || data.length===0){
    listaBusca.innerHTML="<div class='lista-item'>Nenhum produto</div>";
    return;
  }

  data.forEach(p=>{
    listaBusca.innerHTML+=`
    <div class="lista-item" onclick='selecionarProduto(${JSON.stringify(p)})'>
      ${p.nome} — R$ ${Number(p.preco).toFixed(2)}
    </div>`;
  });
}

function selecionarProduto(p){
  produtoAtual=p;
  prevNome.innerText=p.nome;
  prevPreco.innerText=Number(p.preco).toFixed(2);
  prevEstoque.innerText=p.estoque;
  previewProduto.classList.remove("hidden");
  listaBusca.innerHTML="";
}

function confirmarAdicionar(){

  const qtd=Number(quantidade.value);

  if(qtd>produtoAtual.estoque){
    alert("Estoque insuficiente");
    return;
  }

  carrinho.push({
    id:produtoAtual.id,
    nome:produtoAtual.nome,
    qtd,
    preco:Number(produtoAtual.preco),
    estoque:produtoAtual.estoque,
    subtotal:round2(qtd*Number(produtoAtual.preco))
  });

  atualizarCarrinho();
  previewProduto.classList.add("hidden");
  codigo.value="";
}

/* ================= CARRINHO ================= */

function atualizarCarrinho(){
  carrinhoDiv.innerHTML="";
  total=0;

  carrinho.forEach(i=>{
    total+=i.subtotal;
    carrinhoDiv.innerHTML+=`${i.qtd} x ${i.nome} = R$ ${i.subtotal.toFixed(2)}<br>`;
  });

  totalSpan.innerText=round2(total).toFixed(2);
  localStorage.setItem("carrinho_caixa",JSON.stringify(carrinho));
}

function calcularPagamento(){
  infoPagamento.innerText="";
  const pago=round2(Number(valorPago.value));
  if(isNaN(pago)||pago<=0) return;
  if(pago<total) infoPagamento.innerText=`Falta: R$ ${(total-pago).toFixed(2)}`;
  else if(pago>total) infoPagamento.innerText=`Troco: R$ ${(pago-total).toFixed(2)}`;
  else infoPagamento.innerText="Pagamento exato";
}

/* ================= RECIBO ================= */

function gerarRecibo(tipo, pago, devido = 0, cliente = null){

  const data = new Date().toLocaleString("pt-BR");

  let itensHTML = "";
  carrinho.forEach(i=>{
    itensHTML += `
      <tr>
        <td>${i.nome}</td>
        <td>${i.qtd}</td>
        <td>R$ ${i.preco.toFixed(2)}</td>
        <td>R$ ${i.subtotal.toFixed(2)}</td>
      </tr>`;
  });

  const troco = pago > total ? round2(pago-total) : 0;

  const recibo = `
  <html>
  <head>
    <title>Recibo</title>
    <style>
      body{font-family:monospace;padding:20px}
      h2{text-align:center}
      table{width:100%;border-collapse:collapse;margin-top:10px}
      th,td{border-bottom:1px dashed #000;padding:4px;font-size:12px;text-align:left}
      .total{font-weight:bold;margin-top:10px}
    </style>
  </head>
  <body>

    <h2>${nomeEmpresa}</h2>
    <p>${data}</p>

    <table>
      <tr>
        <th>Item</th>
        <th>Qtd</th>
        <th>Preço</th>
        <th>Total</th>
      </tr>
      ${itensHTML}
    </table>

    <p class="total">TOTAL: R$ ${total.toFixed(2)}</p>
    <p>Forma: ${tipo}</p>
    <p>Pago: R$ ${pago.toFixed(2)}</p>
    ${troco>0?`<p>Troco: R$ ${troco.toFixed(2)}</p>`:""}
    ${devido>0?`<p>Devido: R$ ${devido.toFixed(2)}</p>`:""}
    ${cliente?`<p>Cliente: ${cliente}</p>`:""}

    <p style="text-align:center;margin-top:20px">
      Obrigado pela preferência!
    </p>

    <script>
      window.print();
      setTimeout(()=>window.close(),500);
    <\/script>

  </body>
  </html>
  `;

  const win = window.open("", "RECIBO", "width=400,height=600");
  win.document.write(recibo);
  win.document.close();
}

/* ================= FINALIZAR VENDA ================= */

async function finalizarVenda(tipo){

  if(carrinho.length===0){ alert("Carrinho vazio"); return; }

  const pago=round2(Number(valorPago.value));
  if(isNaN(pago)||pago<=0){ alert("Informe valor válido"); return; }

  for(const i of carrinho){

    await supabaseClient.from("vendas").insert({
      app_id:app_id,
      produto_id:i.id,
      quantidade:i.qtd,
      valor_total:i.subtotal,
      valor_pago:pago,
      valor_devido:0,
      forma_pagamento:tipo
    });

    // 🔥 ESTOQUE COMO ERA ANTES (SEM RPC)
    await supabaseClient
      .from("produtos")
      .update({ estoque:i.estoque - i.qtd })
      .eq("id",i.id)
      .eq("app_id",app_id);
  }

  gerarRecibo(tipo, pago, 0);

  carrinho=[];
  localStorage.removeItem("carrinho_caixa");
  valorPago.value="";
  infoPagamento.innerText="";
  atualizarCarrinho();
  alert("Venda finalizada");
}

/* ================= INICIAR ================= */

document.addEventListener("DOMContentLoaded",async()=>{
  const ok=await validarSessao();
  if(!ok) return;

  const salvo=localStorage.getItem("carrinho_caixa");
  if(salvo){
    carrinho=JSON.parse(salvo);
    atualizarCarrinho();
  }
});

</script>
</body>
</html>
