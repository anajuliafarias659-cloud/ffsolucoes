<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caixa | FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial;background:#020617;color:#e5e7eb;font-size:14px}
.topo-app{padding:10px 14px;border-bottom:1px solid #0f172a;display:flex;justify-content:space-between;align-items:center}
.brand{font-size:22px;font-weight:900;color:#38bdf8}
.btn-voltar{
  background:#1e293b;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.mobile-pos{padding:12px;padding-bottom:260px}
.card{background:#0f172a;border-radius:14px;padding:12px;margin-bottom:10px}
.card input,.card textarea,.card button,.card select{
width:100%;padding:10px;font-size:14px;border-radius:10px;border:none;margin-bottom:6px}
.card input,.card textarea,.card select{background:#020617;color:#fff}
.card button{cursor:pointer;background:#0ea5e9;color:#fff}
.lista-item{padding:8px;border-radius:8px;background:#020617;margin-bottom:4px;cursor:pointer}
.lista-item:hover{background:#1e293b}
.carrinho div{padding:6px 0;border-bottom:1px solid #1e293b}
.pagamento .dinheiro{background:#16a34a}
.pagamento .pix{background:#0ea5e9}
.pagamento .cartao{background:#2563eb}
.pagamento .fiado{background:#7c3aed}
.total-fixo{
position:fixed;bottom:0;left:0;width:100%;
background:#020617;border-top:1px solid #0f172a;
color:#38bdf8;text-align:center;padding:12px;
font-size:18px;font-weight:900}
.info{text-align:center;font-weight:bold;margin-top:4px}
.hidden{display:none}
.empresa-info{font-size:12px;opacity:.75;margin-top:4px}
.remover-item{
  margin-top:4px;
  background:#ef4444;
  padding:6px 10px;
  border-radius:8px;
  display:inline-block;
  font-size:12px;
  cursor:pointer;
}
.variacao-info{
  margin:6px 0;
  padding:8px;
  border-radius:10px;
  background:#111827;
  font-size:13px;
}
</style>
</head>

<body>

<div class="topo-app">
  <div>
    <div class="brand">CAIXA</div>
    <div class="empresa-info" id="empresaInfo">Carregando negócio...</div>
  </div>
  <button class="btn-voltar" onclick="history.back()">Voltar</button>
</div>

<div class="mobile-pos">

<div class="card">
<input id="codigo" placeholder="Código ou nome do produto" oninput="autoBuscar()">
<div id="listaBusca"></div>
</div>

<div class="card">
<input id="quantidade" type="number" min="1" value="1">
</div>

<div class="card hidden" id="previewProduto">
<b id="prevNome"></b>
<p>R$ <span id="prevPreco"></span> | Estoque: <span id="prevEstoque"></span></p>

<div id="areaVariacoes" class="hidden">
  <select id="selectVariacao" onchange="selecionarVariacaoAtual()">
    <option value="">Selecione uma variação</option>
  </select>
  <div class="variacao-info" id="infoVariacao"></div>
</div>

<button onclick="confirmarAdicionar()">Adicionar ao carrinho</button>
</div>

<div class="card carrinho">
<b>🛒 Carrinho</b>
<div id="carrinho"></div>
</div>

<div class="card pagamento">
<b>💳 Pagamento</b>
<input id="valorPago" type="number" step="0.01" placeholder="Valor pago" oninput="calcularPagamento()">
<button class="dinheiro" onclick="finalizarVenda('DINHEIRO')">Dinheiro</button>
<button class="pix" onclick="finalizarVenda('PIX')">PIX</button>
<button class="cartao" onclick="finalizarVenda('CARTAO')">Cartão</button>
<button class="fiado" onclick="abrirFiado()">Fiado</button>
<div id="infoPagamento" class="info"></div>
</div>

<div class="card hidden" id="formFiado">
<input id="fiadoNome" placeholder="Nome do cliente">
<input id="fiadoCpf" placeholder="CPF (11 dígitos)">
<textarea id="fiadoObs" placeholder="Observação"></textarea>
<button class="fiado" onclick="confirmarFiado()">Confirmar Fiado</button>
</div>

</div>

<div class="total-fixo">
TOTAL: R$ <span id="total">0.00</span>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let user_id = null;
let app_id = null;
let nomeEmpresa = "Minha Empresa";
let carrinho = [];
let produtoAtual = null;
let variacaoAtual = null;
let total = 0;
let timerBusca = null;

/* ================= UTIL ================= */

function round2(v){ return Math.round((Number(v) || 0) * 100) / 100; }

function parseVariacoes(produto){
  try{
    const arr = JSON.parse(produto?.variacoes || "[]");
    return Array.isArray(arr) ? arr : [];
  }catch{
    return [];
  }
}

function produtoTemVariacoes(produto){
  return parseVariacoes(produto).length > 0;
}

function obterPrecoProduto(produto){
  return Number(produto?.preco || 0);
}

function obterPrecoVariacao(produto, variacao){
  if(variacao && variacao.preco !== null && variacao.preco !== undefined && variacao.preco !== ""){
    return Number(variacao.preco || 0);
  }
  return obterPrecoProduto(produto);
}

function obterEstoqueVariacao(variacao){
  return Number(variacao?.estoque || 0);
}

function obterTextoVariacao(v){
  const tipo = String(v?.tipo || "").trim();
  const valor = String(v?.valor || "").trim();
  if(tipo && valor) return `${tipo}: ${valor}`;
  if(valor) return valor;
  if(tipo) return tipo;
  return "Variação";
}

function formatarReal(v){
  return Number(v || 0).toFixed(2);
}

const codigo = document.getElementById("codigo");
const quantidade = document.getElementById("quantidade");
const listaBusca = document.getElementById("listaBusca");
const previewProduto = document.getElementById("previewProduto");
const prevNome = document.getElementById("prevNome");
const prevPreco = document.getElementById("prevPreco");
const prevEstoque = document.getElementById("prevEstoque");
const carrinhoDiv = document.getElementById("carrinho");
const totalSpan = document.getElementById("total");
const valorPago = document.getElementById("valorPago");
const infoPagamento = document.getElementById("infoPagamento");
const formFiado = document.getElementById("formFiado");
const empresaInfo = document.getElementById("empresaInfo");
const areaVariacoes = document.getElementById("areaVariacoes");
const selectVariacao = document.getElementById("selectVariacao");
const infoVariacao = document.getElementById("infoVariacao");

/* ================= VALIDAR SESSÃO ================= */

async function validarSessao(){
  const { data, error } = await supabaseClient.auth.getSession();

  if(error || !data.session){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  user_id = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabaseClient
    .from("usuarios")
    .select("id, nome, email, app_id")
    .eq("id", user_id)
    .single();

  if(erroUsuario || !usuario){
    console.error("Erro ao buscar usuário:", erroUsuario);
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  app_id = usuario.app_id;

  if(!app_id){
    alert("Negócio não identificado.");
    return false;
  }

  await carregarEmpresa();

  return true;
}

/* ================= BUSCAR NEGÓCIO ================= */

async function carregarEmpresa(){
  let encontrou = false;

  const { data: config, error: errorConfig } = await supabaseClient
    .from("config_site")
    .select("nome_site")
    .eq("app_id", app_id)
    .maybeSingle();

  if(!errorConfig && config && config.nome_site){
    nomeEmpresa = config.nome_site;
    encontrou = true;
  }

  if(!encontrou){
    const { data: negocio, error: errorNegocio } = await supabaseClient
      .from("negocios")
      .select("nome")
      .eq("app_id", app_id)
      .maybeSingle();

    if(!errorNegocio && negocio && negocio.nome){
      nomeEmpresa = negocio.nome;
      encontrou = true;
    }
  }

  empresaInfo.innerText = `${nomeEmpresa} • ID do Negócio: ${app_id}`;
}

/* ================= BUSCAR PRODUTO ================= */

function autoBuscar(){
  clearTimeout(timerBusca);
  const v = codigo.value.trim();
  if(!v){
    listaBusca.innerHTML = "";
    previewProduto.classList.add("hidden");
    return;
  }
  timerBusca = setTimeout(() => buscarGeral(v), 200);
}

async function buscarGeral(v){
  if(!app_id) return;

  let res;

  if(/^\d+$/.test(v)){
    res = await supabaseClient
      .from("produtos")
      .select("*")
      .eq("app_id", app_id)
      .eq("codigo_barras", v)
      .limit(10);
  }else{
    res = await supabaseClient
      .from("produtos")
      .select("*")
      .eq("app_id", app_id)
      .ilike("nome", `%${v}%`)
      .limit(8);
  }

  const { data, error } = res;

  listaBusca.innerHTML = "";
  if(error){
    console.error("Erro ao buscar produto:", error);
    return;
  }

  if(!data || data.length === 0){
    listaBusca.innerHTML = "<div class='lista-item'>Nenhum produto</div>";
    return;
  }

  data.forEach(p => {
    const variacoes = parseVariacoes(p);
    const precoMostrar = variacoes.length
      ? obterPrecoVariacao(p, variacoes[0])
      : obterPrecoProduto(p);

    const produtoSeguro = encodeURIComponent(JSON.stringify(p));
    listaBusca.innerHTML += `
      <div class="lista-item" onclick="selecionarProdutoDecode('${produtoSeguro}')">
        ${p.nome} — R$ ${formatarReal(precoMostrar)}
      </div>
    `;
  });
}

window.selecionarProdutoDecode = function(p){
  const produto = JSON.parse(decodeURIComponent(p));
  selecionarProduto(produto);
};

function selecionarProduto(p){
  produtoAtual = p;
  variacaoAtual = null;

  prevNome.innerText = p.nome || "";

  const variacoes = parseVariacoes(p);

  if(variacoes.length > 0){
    areaVariacoes.classList.remove("hidden");

    selectVariacao.innerHTML = `<option value="">Selecione uma variação</option>` +
      variacoes.map((v, i) => {
        const preco = obterPrecoVariacao(p, v);
        const estoque = obterEstoqueVariacao(v);
        return `<option value="${i}">${obterTextoVariacao(v)} - R$ ${formatarReal(preco)} - estoque ${estoque}</option>`;
      }).join("");

    prevPreco.innerText = formatarReal(obterPrecoProduto(p));
    prevEstoque.innerText = "-";
    infoVariacao.innerText = "Selecione uma variação para ver preço e estoque.";
  }else{
    areaVariacoes.classList.add("hidden");
    selectVariacao.innerHTML = `<option value="">Selecione uma variação</option>`;
    infoVariacao.innerText = "";
    prevPreco.innerText = formatarReal(obterPrecoProduto(p));
    prevEstoque.innerText = Number(p.estoque || 0);
  }

  previewProduto.classList.remove("hidden");
  listaBusca.innerHTML = "";
}

window.selecionarVariacaoAtual = function(){
  if(!produtoAtual) return;

  const variacoes = parseVariacoes(produtoAtual);
  const idx = Number(selectVariacao.value);

  if(Number.isNaN(idx) || !variacoes[idx]){
    variacaoAtual = null;
    prevPreco.innerText = formatarReal(obterPrecoProduto(produtoAtual));
    prevEstoque.innerText = "-";
    infoVariacao.innerText = "Selecione uma variação para ver preço e estoque.";
    return;
  }

  variacaoAtual = variacoes[idx];
  prevPreco.innerText = formatarReal(obterPrecoVariacao(produtoAtual, variacaoAtual));
  prevEstoque.innerText = obterEstoqueVariacao(variacaoAtual);
  infoVariacao.innerText = `${obterTextoVariacao(variacaoAtual)}`;
};

/* ================= CARRINHO ================= */

function confirmarAdicionar(){
  if(!produtoAtual){
    alert("Selecione um produto");
    return;
  }

  const qtd = Number(quantidade.value);

  if(!qtd || qtd < 1){
    alert("Informe uma quantidade válida");
    return;
  }

  const usaVariacoes = produtoTemVariacoes(produtoAtual);

  if(usaVariacoes){
    if(!variacaoAtual){
      alert("Selecione uma variação");
      return;
    }

    const estoqueVar = obterEstoqueVariacao(variacaoAtual);
    if(qtd > estoqueVar){
      alert("Estoque insuficiente na variação");
      return;
    }

    const nomeVariacao = String(variacaoAtual.valor || "Padrão");
    const tipoVariacao = String(variacaoAtual.tipo || "");
    const precoFinal = obterPrecoVariacao(produtoAtual, variacaoAtual);

    const existente = carrinho.find(i =>
      i.id === produtoAtual.id &&
      i.variacao === nomeVariacao &&
      i.tipo_variacao === tipoVariacao
    );

    if(existente){
      const novaQtd = existente.qtd + qtd;

      if(novaQtd > estoqueVar){
        alert("Estoque insuficiente na variação");
        return;
      }

      existente.qtd = novaQtd;
      existente.subtotal = round2(existente.qtd * existente.preco);
    }else{
      carrinho.push({
        id: produtoAtual.id,
        nome: produtoAtual.nome,
        qtd,
        preco: precoFinal,
        estoque: estoqueVar,
        subtotal: round2(qtd * precoFinal),
        variacao: nomeVariacao,
        tipo_variacao: tipoVariacao,
        usa_variacao: true
      });
    }
  }else{
    const estoqueGeral = Number(produtoAtual.estoque || 0);

    if(qtd > estoqueGeral){
      alert("Estoque insuficiente");
      return;
    }

    const existente = carrinho.find(i => i.id === produtoAtual.id && !i.usa_variacao);

    if(existente){
      const novaQtd = existente.qtd + qtd;

      if(novaQtd > estoqueGeral){
        alert("Estoque insuficiente");
        return;
      }

      existente.qtd = novaQtd;
      existente.subtotal = round2(existente.qtd * existente.preco);
    }else{
      carrinho.push({
        id: produtoAtual.id,
        nome: produtoAtual.nome,
        qtd,
        preco: Number(produtoAtual.preco || 0),
        estoque: estoqueGeral,
        subtotal: round2(qtd * Number(produtoAtual.preco || 0)),
        variacao: null,
        tipo_variacao: null,
        usa_variacao: false
      });
    }
  }

  atualizarCarrinho();
  previewProduto.classList.add("hidden");
  codigo.value = "";
  quantidade.value = 1;
  produtoAtual = null;
  variacaoAtual = null;
  areaVariacoes.classList.add("hidden");
  selectVariacao.innerHTML = `<option value="">Selecione uma variação</option>`;
  infoVariacao.innerText = "";
}

function removerItem(index){
  carrinho.splice(index, 1);
  atualizarCarrinho();
}

function atualizarCarrinho(){
  carrinhoDiv.innerHTML = "";
  total = 0;

  if(carrinho.length === 0){
    carrinhoDiv.innerHTML = "<div style='opacity:.7'>Carrinho vazio</div>";
  }

  carrinho.forEach((i, index) => {
    total += i.subtotal;

    const textoVariacao = i.usa_variacao
      ? `<br><small>${i.tipo_variacao ? i.tipo_variacao + ": " : ""}${i.variacao || ""}</small>`
      : "";

    carrinhoDiv.innerHTML += `
      <div>
        ${i.qtd} x ${i.nome}${textoVariacao} = R$ ${i.subtotal.toFixed(2)}<br>
        <span class="remover-item" onclick="removerItem(${index})">Remover</span>
      </div>
    `;
  });

  total = round2(total);
  totalSpan.innerText = total.toFixed(2);
  localStorage.setItem("carrinho_caixa", JSON.stringify(carrinho));
  calcularPagamento();
}

window.removerItem = removerItem;

function calcularPagamento(){
  infoPagamento.innerText = "";
  const pago = round2(Number(valorPago.value));

  if(isNaN(pago) || pago <= 0) return;

  if(pago < total) infoPagamento.innerText = `Falta: R$ ${(total - pago).toFixed(2)}`;
  else if(pago > total) infoPagamento.innerText = `Troco: R$ ${(pago - total).toFixed(2)}`;
  else infoPagamento.innerText = "Pagamento exato";
}

/* ================= ESTOQUE ================= */

async function baixarEstoqueItem(item){
  const { data: produtoBanco, error } = await supabaseClient
    .from("produtos")
    .select("id, app_id, estoque, variacoes")
    .eq("id", item.id)
    .eq("app_id", app_id)
    .single();

  if(error || !produtoBanco){
    throw new Error(`Erro ao consultar estoque de ${item.nome}`);
  }

  if(item.usa_variacao){
    const variacoes = parseVariacoes(produtoBanco);
    const idx = variacoes.findIndex(v =>
      String(v.valor || "Padrão") === String(item.variacao || "Padrão") &&
      String(v.tipo || "") === String(item.tipo_variacao || "")
    );

    if(idx === -1){
      throw new Error(`Variação não encontrada em ${item.nome}`);
    }

    const estoqueAtual = Number(variacoes[idx].estoque || 0);
    if(estoqueAtual < Number(item.qtd || 1)){
      throw new Error(`Estoque insuficiente em ${item.nome} (${item.variacao})`);
    }

    variacoes[idx].estoque = estoqueAtual - Number(item.qtd || 1);

    const { error: erroUpdate } = await supabaseClient
      .from("produtos")
      .update({ variacoes: JSON.stringify(variacoes) })
      .eq("id", item.id)
      .eq("app_id", app_id);

    if(erroUpdate){
      throw new Error(`Erro ao atualizar estoque da variação em ${item.nome}`);
    }
  }else{
    const estoqueAtual = Number(produtoBanco.estoque || 0);
    if(estoqueAtual < Number(item.qtd || 1)){
      throw new Error(`Estoque insuficiente em ${item.nome}`);
    }

    const { error: erroUpdate } = await supabaseClient
      .from("produtos")
      .update({ estoque: estoqueAtual - Number(item.qtd || 1) })
      .eq("id", item.id)
      .eq("app_id", app_id);

    if(erroUpdate){
      throw new Error(`Erro ao atualizar estoque de ${item.nome}`);
    }
  }
}

/* ================= FIADO ================= */

function abrirFiado(){
  if(carrinho.length === 0){
    alert("Carrinho vazio");
    return;
  }
  formFiado.classList.toggle("hidden");
}

async function confirmarFiado(){
  if(carrinho.length === 0){
    alert("Carrinho vazio");
    return;
  }

  const nome = document.getElementById("fiadoNome").value.trim();
  const cpf = document.getElementById("fiadoCpf").value.trim();
  const obs = document.getElementById("fiadoObs").value.trim();

  if(!nome){
    alert("Informe o nome do cliente");
    return;
  }

  const valorDevido = total;

  for(const i of carrinho){
    const observacaoFinal = [
      obs || null,
      i.usa_variacao ? `Variação: ${i.tipo_variacao ? i.tipo_variacao + " - " : ""}${i.variacao}` : null
    ].filter(Boolean).join(" | ") || null;

    const { error: erroVenda } = await supabaseClient.from("vendas").insert({
      app_id: app_id,
      produto_id: i.id,
      quantidade: i.qtd,
      valor_total: i.subtotal,
      valor_pago: 0,
      valor_devido: i.subtotal,
      forma_pagamento: "FIADO",
      cliente_nome: nome,
      cliente_cpf: cpf || null,
      observacao: observacaoFinal
    });

    if(erroVenda){
      console.error("Erro ao salvar fiado:", erroVenda);
      alert("Erro ao salvar fiado.");
      return;
    }

    try{
      await baixarEstoqueItem(i);
    }catch(err){
      console.error(err);
      alert(err.message || "Erro ao atualizar estoque.");
      return;
    }
  }

  gerarRecibo("FIADO", 0, valorDevido, nome);
  limparVenda();
  formFiado.classList.add("hidden");
  document.getElementById("fiadoNome").value = "";
  document.getElementById("fiadoCpf").value = "";
  document.getElementById("fiadoObs").value = "";
  alert("Fiado registrado com sucesso");
}

/* ================= RECIBO ================= */

function gerarRecibo(tipo, pago, devido = 0, cliente = null){
  const data = new Date().toLocaleString("pt-BR", {
    timeZone: "America/Sao_Paulo"
  });

  let itensHTML = "";
  carrinho.forEach(i => {
    const nomeItem = i.usa_variacao
      ? `${i.nome} (${i.tipo_variacao ? i.tipo_variacao + ": " : ""}${i.variacao || ""})`
      : i.nome;

    itensHTML += `
      <tr>
        <td>${nomeItem}</td>
        <td>${i.qtd}</td>
        <td>R$ ${i.preco.toFixed(2)}</td>
        <td>R$ ${i.subtotal.toFixed(2)}</td>
      </tr>`;
  });

  const troco = pago > total ? round2(pago - total) : 0;

  const recibo = `
  <html>
  <head>
    <title>Recibo</title>
    <style>
      body{font-family:monospace;padding:20px}
      h2{text-align:center}
      table{width:100%;border-collapse:collapse;margin-top:10px}
      th,td{border-bottom:1px dashed #000;padding:4px;font-size:12px;text-align:left}
      .total{font-weight:bold;margin-top:10px}
    </style>
  </head>
  <body>

    <h2>${nomeEmpresa}</h2>
    <p>${data}</p>

    <table>
      <tr>
        <th>Item</th>
        <th>Qtd</th>
        <th>Preço</th>
        <th>Total</th>
      </tr>
      ${itensHTML}
    </table>

    <p class="total">TOTAL: R$ ${total.toFixed(2)}</p>
    <p>Forma: ${tipo}</p>
    <p>Pago: R$ ${Number(pago || 0).toFixed(2)}</p>
    ${troco > 0 ? `<p>Troco: R$ ${troco.toFixed(2)}</p>` : ""}
    ${devido > 0 ? `<p>Devido: R$ ${devido.toFixed(2)}</p>` : ""}
    ${cliente ? `<p>Cliente: ${cliente}</p>` : ""}

    <p style="text-align:center;margin-top:20px">
      Obrigado pela preferência!
    </p>

    <script>
      window.print();
      setTimeout(()=>window.close(),500);
    <\/script>

  </body>
  </html>
  `;

  const win = window.open("", "RECIBO", "width=400,height=600");
  win.document.write(recibo);
  win.document.close();
}

/* ================= FINALIZAR VENDA ================= */

async function finalizarVenda(tipo){
  if(carrinho.length === 0){
    alert("Carrinho vazio");
    return;
  }

  const pago = round2(Number(valorPago.value));

  if(isNaN(pago) || pago <= 0){
    alert("Informe valor válido");
    return;
  }

  if(pago < total){
    alert("O valor pago é menor que o total.");
    return;
  }

  for(const i of carrinho){
    const observacaoFinal = i.usa_variacao
      ? `Variação: ${i.tipo_variacao ? i.tipo_variacao + " - " : ""}${i.variacao}`
      : null;

    const { error: erroVenda } = await supabaseClient.from("vendas").insert({
      app_id: app_id,
      produto_id: i.id,
      quantidade: i.qtd,
      valor_total: i.subtotal,
      valor_pago: pago,
      valor_devido: 0,
      forma_pagamento: tipo,
      observacao: observacaoFinal
    });

    if(erroVenda){
      console.error("Erro ao salvar venda:", erroVenda);
      alert("Erro ao registrar venda.");
      return;
    }

    try{
      await baixarEstoqueItem(i);
    }catch(err){
      console.error(err);
      alert(err.message || "Erro ao atualizar estoque.");
      return;
    }
  }

  gerarRecibo(tipo, pago, 0);
  limparVenda();
  alert("Venda finalizada");
}

function limparVenda(){
  carrinho = [];
  localStorage.removeItem("carrinho_caixa");
  valorPago.value = "";
  infoPagamento.innerText = "";
  codigo.value = "";
  quantidade.value = 1;
  produtoAtual = null;
  variacaoAtual = null;
  previewProduto.classList.add("hidden");
  areaVariacoes.classList.add("hidden");
  selectVariacao.innerHTML = `<option value="">Selecione uma variação</option>`;
  infoVariacao.innerText = "";
  atualizarCarrinho();
}

/* ================= INICIAR ================= */

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await validarSessao();
  if(!ok) return;

  const salvo = localStorage.getItem("carrinho_caixa");
  if(salvo){
    carrinho = JSON.parse(salvo);
    atualizarCarrinho();
  }else{
    atualizarCarrinho();
  }
});
</script>
