<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Produtos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;text-align:center}
.container{max-width:1100px;margin:20px auto;padding:0 16px}
.box{background:#0f172a;padding:16px;border-radius:14px;margin-bottom:16px}

input,button{
  width:100%;padding:12px;margin-top:8px;
  border-radius:10px;border:none
}
input{background:#020617;color:#fff}
button{font-weight:bold;cursor:pointer}

.btn{background:#22c55e}
.editar{background:#334155}
.repor{background:#f59e0b}
.excluir{background:#ef4444}

.preview img,.produto img{
  width:60px;height:60px;
  object-fit:cover;border-radius:8px;
  margin:4px;border:1px solid #334155
}

.produto{
  background:#020617;padding:12px;border-radius:12px;
  margin-top:12px;text-align:center
}
</style>
</head>

<body>

<div class="topo">
  <h2>📦 Produtos</h2>
</div>

<div class="container">

<!-- CADASTRO -->
<div class="box">
  <h3>➕ Cadastrar Produto</h3>

  <input id="nome" placeholder="Nome">
  <input id="codigo" placeholder="Código de barras">
  <input id="preco" type="number" step="0.01" placeholder="Preço">
  <input id="estoque" type="number" placeholder="Estoque inicial">

  <div class="preview" id="preview"></div>

  <!-- INPUTS REAIS (IMPORTANTE) -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="galeriaInput" accept="image/jpeg,image/png" multiple hidden>

  <button class="btn" onclick="abrirCamera()">📷 Tirar foto</button>
  <button class="btn editar" onclick="abrirGaleria()">🖼️ Galeria</button>
  <button class="btn" onclick="cadastrar()">Cadastrar</button>
</div>

<div class="box">
  <button class="btn" onclick="toggle()">📋 Mostrar produtos</button>
</div>

<div class="box" id="box" style="display:none">
  <div id="lista"></div>
</div>

</div>

<script>
/* ===== SUPABASE ===== */
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;

/* ===== VALIDAR SESSÃO ===== */
async function validarSessao(){
  const { data } = await supabaseClient.auth.getSession();
  if(!data.session){
    alert("Sessão inválida");
    location.href="login.html";
    return false;
  }
  app_id = data.session.user.id;
  return true;
}

/* ===== HELPERS ===== */
function round2(v){ return Math.round(v*100)/100; }

/* ===== DOM ===== */
const codigo = document.getElementById("codigo");
const quantidade = document.getElementById("quantidade");
const listaBusca = document.getElementById("listaBusca");
const previewProduto = document.getElementById("previewProduto");
const prevNome = document.getElementById("prevNome");
const prevPreco = document.getElementById("prevPreco");
const prevEstoque = document.getElementById("prevEstoque");
const carrinhoDiv = document.getElementById("carrinho");
const totalSpan = document.getElementById("total");
const valorPago = document.getElementById("valorPago");
const infoPagamento = document.getElementById("infoPagamento");
const formFiado = document.getElementById("formFiado");

/* ===== ESTADO ===== */
let carrinho = [];
let produtoAtual = null;
let total = 0;
let timerBusca = null;

/* ===== BUSCA INTELIGENTE ===== */
function autoBuscar(){
  clearTimeout(timerBusca);
  const v = codigo.value.trim();

  if(v === ""){
    listaBusca.innerHTML = "";
    return;
  }

  timerBusca = setTimeout(()=>{
    buscarGeral(v);
  }, 300);
}

async function buscarGeral(v){
  const { data } = await supabaseClient
    .from("produtos")
    .select("*")
    .eq("app_id", app_id)
    .or(`codigo_barra.eq.${v},nome.ilike.%${v}%`)
    .limit(5);

  listaBusca.innerHTML = "";

  data?.forEach(p=>{
    listaBusca.innerHTML += `
      <div class="lista-item" onclick='selecionarProduto(${JSON.stringify(p)})'>
        ${p.nome} — R$ ${Number(p.preco).toFixed(2)}
      </div>`;
  });
}

/* ===== PRODUTO ===== */
function selecionarProduto(p){
  produtoAtual = p;
  prevNome.innerText = p.nome;
  prevPreco.innerText = Number(p.preco).toFixed(2);
  prevEstoque.innerText = p.estoque;
  previewProduto.classList.remove("hidden");
  listaBusca.innerHTML = "";
}

function confirmarAdicionar(){
  const qtd = Number(quantidade.value);
  carrinho.push({
    id: produtoAtual.id,
    nome: produtoAtual.nome,
    qtd,
    preco: Number(produtoAtual.preco),
    estoque: produtoAtual.estoque,
    subtotal: round2(qtd * Number(produtoAtual.preco))
  });
  atualizarCarrinho();
  previewProduto.classList.add("hidden");
  codigo.value = "";
}

/* ===== CARRINHO ===== */
function atualizarCarrinho(){
  carrinhoDiv.innerHTML = "";
  total = 0;

  carrinho.forEach(i=>{
    total += i.subtotal;
    carrinhoDiv.innerHTML += `${i.qtd} x ${i.nome} = R$ ${i.subtotal.toFixed(2)}<br>`;
  });

  totalSpan.innerText = round2(total).toFixed(2);
}

/* ===== PAGAMENTO INFO ===== */
function calcularPagamento(){
  infoPagamento.innerText = "";
  const pago = round2(Number(valorPago.value));
  if(isNaN(pago) || pago <= 0) return;

  if(pago < total)
    infoPagamento.innerText = `Falta: R$ ${(total-pago).toFixed(2)}`;
  else if(pago > total)
    infoPagamento.innerText = `Troco: R$ ${(pago-total).toFixed(2)}`;
  else
    infoPagamento.innerText = "Pagamento exato";
}

/* ===== FINALIZAR VENDA ===== */
async function finalizarVenda(tipo){
  if(carrinho.length === 0){
    alert("Carrinho vazio");
    return;
  }

  const pago = round2(Number(valorPago.value));
  if(isNaN(pago) || pago <= 0){
    alert("Informe valor válido");
    return;
  }

  for(const i of carrinho){
    await supabaseClient.from("vendas").insert({
      app_id: app_id,
      produto_id: i.id,
      quantidade: i.qtd,
      valor_total: total,
      valor_pago: pago,
      valor_devido: 0,
      forma_pagamento: tipo
    });
  }

  carrinho = [];
  valorPago.value = "";
  atualizarCarrinho();
  alert(`Venda finalizada em ${tipo}`);
}

/* ===== FIADO ===== */
function abrirFiado(){
  if(carrinho.length === 0){
    alert("Carrinho vazio");
    return;
  }
  formFiado.classList.remove("hidden");
}

async function confirmarFiado(){
  const nome = document.getElementById("fiadoNome").value.trim();
  const cpf = document.getElementById("fiadoCpf").value.replace(/\D/g,"");
  const obs = document.getElementById("fiadoObs").value;
  const pago = round2(Number(valorPago.value) || 0);
  const devido = round2(total - pago);

  if(!nome || cpf.length !== 11){
    alert("Informe nome e CPF válido");
    return;
  }

  for(const i of carrinho){
    await supabaseClient.from("vendas").insert({
      app_id: app_id,
      produto_id: i.id,
      quantidade: i.qtd,
      valor_total: total,
      valor_pago: pago,
      valor_devido: devido,
      forma_pagamento: "FIADO",
      cliente_nome: nome,
      cliente_cpf: cpf,
      observacao: obs
    });
  }

  alert(`Fiado salvo. Deve R$ ${devido.toFixed(2)}`);
  location.reload();
}

/* ===== INICIAR ===== */
document.addEventListener("DOMContentLoaded", async ()=>{
  const ok = await validarSessao();
  if(!ok) return;
});
</script>
</body>
</html>
