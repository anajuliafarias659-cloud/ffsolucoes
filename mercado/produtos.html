<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Produtos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;text-align:center}
.container{max-width:1100px;margin:20px auto;padding:0 16px}
.box{background:#0f172a;padding:16px;border-radius:14px;margin-bottom:16px}

input,button{
  width:100%;padding:12px;margin-top:8px;
  border-radius:10px;border:none
}
input{background:#020617;color:#fff}
button{font-weight:bold;cursor:pointer}

.btn{background:#22c55e}
.editar{background:#334155}
.repor{background:#f59e0b}
.excluir{background:#ef4444}

.preview img,.produto img{
  width:60px;height:60px;
  object-fit:cover;border-radius:8px;
  margin:4px;border:1px solid #334155
}

.produto{
  background:#020617;padding:12px;border-radius:12px;
  margin-top:12px;text-align:center
}
</style>
</head>

<body>

<div class="topo">
  <h2>📦 Produtos</h2>
</div>

<div class="container">

<!-- CADASTRO -->
<div class="box">
  <h3>➕ Cadastrar Produto</h3>

  <input id="nome" placeholder="Nome">
  <input id="codigo" placeholder="Código de barras">
  <input id="preco" type="number" step="0.01" placeholder="Preço">
  <input id="estoque" type="number" placeholder="Estoque inicial">

  <div class="preview" id="preview"></div>

  <!-- INPUTS REAIS (IMPORTANTE) -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="galeriaInput" accept="image/jpeg,image/png" multiple hidden>

  <button class="btn" onclick="abrirCamera()">📷 Tirar foto</button>
  <button class="btn editar" onclick="abrirGaleria()">🖼️ Galeria</button>
  <button class="btn" onclick="cadastrar()">Cadastrar</button>
</div>

<div class="box">
  <button class="btn" onclick="toggle()">📋 Mostrar produtos</button>
</div>

<div class="box" id="box" style="display:none">
  <div id="lista"></div>
</div>

</div>

<script>
/* ===== SUPABASE ===== */
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;

/* ===== VALIDAR SESSÃO ===== */
async function validarSessao(){
  const { data } = await supabaseClient.auth.getSession();
  if(!data.session){
    alert("Sessão inválida");
    location.href="login.html";
    return false;
  }
  app_id = data.session.user.id;
  return true;
}

/* ===== DOM ===== */
const nome = document.getElementById("nome");
const codigo = document.getElementById("codigo");
const preco = document.getElementById("preco");
const estoque = document.getElementById("estoque");
const preview = document.getElementById("preview");
const box = document.getElementById("box");
const lista = document.getElementById("lista");
const cameraInput = document.getElementById("cameraInput");
const galeriaInput = document.getElementById("galeriaInput");

/* ===== FOTOS ===== */
let fotosTemp = [];

function atualizarPreview(){
  preview.innerHTML="";
  fotosTemp.forEach(f=>{
    const img=document.createElement("img");
    img.src=URL.createObjectURL(f);
    preview.appendChild(img);
  });
}

function abrirCamera(){
  if(fotosTemp.length>=5) return alert("Máx. 5 fotos");
  cameraInput.click();
}

function abrirGaleria(){
  if(fotosTemp.length>=5) return alert("Máx. 5 fotos");
  galeriaInput.click();
}

cameraInput.onchange=()=>{
  if(cameraInput.files[0]){
    fotosTemp.push(cameraInput.files[0]);
    atualizarPreview();
    cameraInput.value="";
  }
};

galeriaInput.onchange=()=>{
  [...galeriaInput.files].forEach(f=>{
    if(fotosTemp.length<5) fotosTemp.push(f);
  });
  atualizarPreview();
  galeriaInput.value="";
};

/* ===== TOGGLE ===== */
function toggle(){
  box.style.display = box.style.display==="none"?"block":"none";
}

/* ===== CADASTRAR ===== */
async function cadastrar(){

  if(!nome.value) return alert("Nome obrigatório");
  if(!codigo.value) return alert("Código de barras obrigatório");

  let fotosURLs=[];

  for(const file of fotosTemp){
    const ext=file.name.split(".").pop();
    const path=`${app_id}/${crypto.randomUUID()}.${ext}`;

    await supabaseClient.storage.from("produtos").upload(path,file);
    const {data}=supabaseClient.storage.from("produtos").getPublicUrl(path);
    fotosURLs.push(data.publicUrl);
  }

  const { error } = await supabaseClient.from("produtos").insert({
    app_id: app_id,
    nome: nome.value,
    codigo_barras: codigo.value, // 👈 CORRETO
    preco: Number(preco.value),
    estoque: Number(estoque.value),
    imagem: JSON.stringify(fotosURLs)
  });

  if(error){
    console.error(error);
    alert("Erro ao cadastrar");
    return;
  }

  nome.value="";
  codigo.value="";
  preco.value="";
  estoque.value="";
  fotosTemp=[];
  preview.innerHTML="";
  carregar();
}

/* ===== LISTAR ===== */
async function carregar(){
  const {data} = await supabaseClient
    .from("produtos")
    .select("*")
    .eq("app_id", app_id)
    .order("nome");

  lista.innerHTML="";

  data?.forEach(p=>{
    let fotos=[];
    try{fotos=JSON.parse(p.imagem||"[]")}catch{}

    lista.innerHTML+=`
      <div class="produto">
        <b>${p.nome}</b><br>
        Código: ${p.codigo_barras || "-"}<br>
        Estoque: ${p.estoque}<br>
        R$ ${Number(p.preco).toFixed(2)}<br>
        ${fotos.map(f=>`<img src="${f}">`).join("")}
      </div>
    `;
  });
}

/* ===== INICIAR ===== */
document.addEventListener("DOMContentLoaded", async ()=>{
  const ok = await validarSessao();
  if(!ok) return;
  carregar();
});
</script>
</body>
</html>
