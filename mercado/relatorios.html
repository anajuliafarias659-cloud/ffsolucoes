<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório Geral</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
  padding:20px;
}
.box{
  max-width:1000px;
  margin:auto;
  background:#0f172a;
  padding:24px;
  border-radius:20px;
}
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
h2{
  margin:0;
}
.resumo{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-top:20px;
}
.card{
  background:#020617;
  padding:14px;
  border-radius:14px;
  text-align:center;
}
.card b{font-size:18px}
.card small{opacity:.7}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td{
  padding:10px;
  border-bottom:1px solid #1e293b;
}
th{background:#020617}
.fiado{color:#f87171;font-weight:bold}
.filtros{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:18px 0 10px;
}
input[type=date]{
  padding:10px;
  border-radius:10px;
  border:none;
}
.btn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.btn-voltar{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.table-wrap{
  overflow:auto;
}
.info-topo{
  opacity:.7;
  margin-top:8px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">
  <div class="topo">
    <h2>📊 Relatório Geral</h2>
    <button class="btn-voltar" onclick="history.back()">Voltar</button>
  </div>

  <div class="info-topo" id="infoTopo">Carregando negócio...</div>

  <div class="filtros">
    <input type="date" id="filtroData">
    <button class="btn" onclick="carregarRelatorio()">Filtrar</button>
  </div>

  <div id="dataLabel" style="text-align:center;opacity:.7"></div>

  <div class="resumo">
    <div class="card"><small>Total Vendido</small><br><b id="totalVendido">R$ 0.00</b></div>
    <div class="card"><small>Total Recebido</small><br><b id="totalRecebido">R$ 0.00</b></div>
    <div class="card"><small>Total Fiado</small><br><b class="fiado" id="totalFiado">R$ 0.00</b></div>
    <div class="card"><small>Dinheiro</small><br><b id="totalDinheiro">R$ 0.00</b></div>
    <div class="card"><small>PIX</small><br><b id="totalPix">R$ 0.00</b></div>
    <div class="card"><small>Cartão</small><br><b id="totalCartao">R$ 0.00</b></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Produto</th>
          <th>Qtd</th>
          <th>Pagamento</th>
          <th>Total</th>
          <th>Pago</th>
          <th>Devido</th>
          <th>Data/Hora</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let nomeNegocio = "Mercado";
const SENHA_APAGAR = "1234";

const inputData = document.getElementById("filtroData");
inputData.valueAsDate = new Date();

function zerarTotais(){
  document.getElementById("totalVendido").innerText = "R$ 0.00";
  document.getElementById("totalRecebido").innerText = "R$ 0.00";
  document.getElementById("totalFiado").innerText = "R$ 0.00";
  document.getElementById("totalDinheiro").innerText = "R$ 0.00";
  document.getElementById("totalPix").innerText = "R$ 0.00";
  document.getElementById("totalCartao").innerText = "R$ 0.00";
}

function formatarDataHora(dataStr){
  if(!dataStr) return "-";
  const d = new Date(dataStr);
  if(isNaN(d.getTime())) return "-";
  return d.toLocaleString("pt-BR");
}

/* 🔐 VALIDAR SESSÃO REAL */
async function validarSessao(){
  const { data, error } = await supabaseClient.auth.getSession();

  if(error || !data.session){
    alert("Sessão inválida");
    location.href = "/auth/login.html";
    return false;
  }

  const userId = data.session.user.id;

  const { data: usuario, error: erroUsuario } = await supabaseClient
    .from("usuarios")
    .select("id, nome, email, app_id")
    .eq("id", userId)
    .single();

  if(erroUsuario || !usuario){
    console.error("Erro ao buscar usuário:", erroUsuario);
    alert("Usuário não encontrado.");
    location.href = "/auth/login.html";
    return false;
  }

  app_id = usuario.app_id;

  if(!app_id){
    alert("Negócio não identificado.");
    return false;
  }

  const { data: config } = await supabaseClient
    .from("config_site")
    .select("nome_site")
    .eq("app_id", app_id)
    .maybeSingle();

  if(config && config.nome_site){
    nomeNegocio = config.nome_site;
  }

  document.getElementById("infoTopo").innerText =
    `${nomeNegocio} • ID do Negócio: ${app_id}`;

  return true;
}

/* RELATÓRIO */
async function carregarRelatorio(){
  const dataFiltro = inputData.value;
  if(!dataFiltro || !app_id) return;

  document.getElementById("dataLabel").innerText =
    "📅 " + new Date(dataFiltro + "T00:00:00").toLocaleDateString("pt-BR");

  const inicio = dataFiltro + "T00:00:00";
  const fim = dataFiltro + "T23:59:59";

  const { data, error } = await supabaseClient
    .from("vendas")
    .select(`
      *,
      produtos ( nome )
    `)
    .eq("app_id", app_id)
    .gte("created_at", inicio)
    .lte("created_at", fim)
    .order("created_at", { ascending:false });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  zerarTotais();

  if(error){
    console.error("Erro ao carregar relatório:", error);
    lista.innerHTML = `
      <tr>
        <td colspan="7" style="text-align:center;color:#f87171">
          Erro ao carregar relatório
        </td>
      </tr>`;
    return;
  }

  let totalVendido = 0;
  let totalRecebido = 0;
  let totalFiado = 0;
  let dinheiro = 0;
  let pix = 0;
  let cartao = 0;

  if(!data || data.length === 0){
    lista.innerHTML = `
      <tr>
        <td colspan="7" style="text-align:center;opacity:.7">
          Nenhuma venda no dia
        </td>
      </tr>`;
  }

  (data || []).forEach(v => {
    totalVendido += Number(v.valor_total || 0);
    totalRecebido += Number(v.valor_pago || 0);
    totalFiado += Number(v.valor_devido || 0);

    if(v.forma_pagamento === "DINHEIRO") dinheiro += Number(v.valor_pago || 0);
    if(v.forma_pagamento === "PIX") pix += Number(v.valor_pago || 0);
    if(v.forma_pagamento === "CARTAO") cartao += Number(v.valor_pago || 0);

    lista.innerHTML += `
      <tr>
        <td>${v.produtos?.nome || v.produto_id || "-"}</td>
        <td>${v.quantidade || 0}</td>
        <td>${v.forma_pagamento || "-"}</td>
        <td>R$ ${Number(v.valor_total || 0).toFixed(2)}</td>
        <td>R$ ${Number(v.valor_pago || 0).toFixed(2)}</td>
        <td class="fiado">R$ ${Number(v.valor_devido || 0).toFixed(2)}</td>
        <td>${formatarDataHora(v.created_at)}</td>
      </tr>`;
  });

  document.getElementById("totalVendido").innerText = `R$ ${totalVendido.toFixed(2)}`;
  document.getElementById("totalRecebido").innerText = `R$ ${totalRecebido.toFixed(2)}`;
  document.getElementById("totalFiado").innerText = `R$ ${totalFiado.toFixed(2)}`;
  document.getElementById("totalDinheiro").innerText = `R$ ${dinheiro.toFixed(2)}`;
  document.getElementById("totalPix").innerText = `R$ ${pix.toFixed(2)}`;
  document.getElementById("totalCartao").innerText = `R$ ${cartao.toFixed(2)}`;
}

/* 🧨 APAGAR GERAL ESCONDIDO */
document.addEventListener("keydown", async (e) => {
  if(e.ctrlKey && e.altKey && e.key.toLowerCase() === "l"){
    const senha = prompt("Acesso restrito. Digite a senha:");
    if(senha !== SENHA_APAGAR){
      alert("Senha incorreta");
      return;
    }

    if(!confirm("APAGAR TODAS AS VENDAS? ISSO NÃO TEM VOLTA.")) return;

    const { error } = await supabaseClient
      .from("vendas")
      .delete()
      .eq("app_id", app_id);

    if(error){
      console.error("Erro ao apagar vendas:", error);
      alert("Erro ao apagar vendas.");
      return;
    }

    alert("Sistema limpo com sucesso.");
    carregarRelatorio();
  }
});

/* 🚀 INICIAR */
document.addEventListener("DOMContentLoaded", async () => {
  const ok = await validarSessao();
  if(!ok) return;
  carregarRelatorio();
});
</script>

</body>
</html>
