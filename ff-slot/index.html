<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF SLOT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:350px;
  background:#111;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#222;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#d4a017;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.slot{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.reel{
  width:70px;
  height:70px;
  background:#222;
  border-radius:10px;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#game{display:none}
</style>
</head>

<body>

<div class="box" id="login">
  <h2>FF SLOT</h2>

  <input id="email" placeholder="email">
  <input id="senha" placeholder="senha" type="password">

  <button id="entrar">Entrar</button>
  <button id="criar">Criar conta</button>

  <div id="status"></div>
</div>

<div class="box" id="game">
  <h2>🎰 SLOT</h2>

  <div id="saldo">Moedas: 0</div>

  <div class="slot">
    <div class="reel" id="r1">❓</div>
    <div class="reel" id="r2">❓</div>
    <div class="reel" id="r3">❓</div>
  </div>

  <button id="girar">GIRAR</button>
  <button id="sair">Sair</button>

  <div id="msg"></div>
</div>

<script>
const SUPABASE_URL = "https://bzgvbghxmebdjqnlakbj.supabase.co",
const SUPABASE_KEY = "sb_publishable_IyvZNwtgkvECR0QVlYbhzw_zPL1TMJv";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const simbolos = ["🍒","🍋","💎","⭐","7️⃣"];

const loginBox = document.getElementById("login");
const gameBox = document.getElementById("game");

const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");
const r3 = document.getElementById("r3");

const saldoEl = document.getElementById("saldo");
const msg = document.getElementById("msg");

function rand(){
  return simbolos[Math.floor(Math.random()*simbolos.length)];
}

async function animar(res){
  for(let i=0;i<10;i++){
    r1.innerText = rand();
    r2.innerText = rand();
    r3.innerText = rand();
    await new Promise(r=>setTimeout(r,80));
  }
  r1.innerText = res[0];
  r2.innerText = res[1];
  r3.innerText = res[2];
}

document.getElementById("criar").onclick = async ()=>{
  const email = email.value;
  const senha = senha.value;

  const {error} = await supabaseClient.auth.signUp({email, password:senha});
  status.innerText = error ? error.message : "Conta criada";
};

document.getElementById("entrar").onclick = async ()=>{
  const email = email.value;
  const senha = senha.value;

  const {error} = await supabaseClient.auth.signInWithPassword({email, password:senha});

  if(error){
    status.innerText = error.message;
  }else{
    loginBox.style.display="none";
    gameBox.style.display="block";
  }
};

document.getElementById("girar").onclick = async ()=>{
  msg.innerText = "Girando...";

  const r = [rand(), rand(), rand()];

  await animar(r);

  if(r[0]==r[1] && r[1]==r[2]){
    msg.innerText = "🔥 GANHOU";
  }else{
    msg.innerText = "😢 perdeu";
  }
};

document.getElementById("sair").onclick = async ()=>{
  await supabaseClient.auth.signOut();
  location.reload();
};

console.log("JS OK");
</script>

</body>
</html>
