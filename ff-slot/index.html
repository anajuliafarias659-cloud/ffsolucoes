<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>FF SLOT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family:Arial,Helvetica,sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
    }

    body{
      background:
        radial-gradient(circle at top, rgba(255,215,0,.14), transparent 30%),
        radial-gradient(circle at bottom, rgba(255,0,90,.12), transparent 30%),
        linear-gradient(180deg,#050505,#0d0d0d 40%,#000);
    }

    .screen{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .login-box,.game-box{
      width:100%;
      max-width:430px;
      background:rgba(18,18,18,.92);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      box-shadow:0 20px 80px rgba(0,0,0,.5);
      backdrop-filter:blur(10px);
    }

    .login-box{
      padding:22px;
    }

    .title{
      text-align:center;
      font-size:30px;
      font-weight:700;
      color:#ffd54a;
      margin-bottom:8px;
      text-shadow:0 0 16px rgba(255,213,74,.25);
    }

    .subtitle{
      text-align:center;
      color:#bbb;
      margin-bottom:18px;
      font-size:14px;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      font-size:13px;
      color:#ddd;
      margin-bottom:6px;
    }

    .field input{
      width:100%;
      height:48px;
      border:none;
      outline:none;
      border-radius:14px;
      padding:0 14px;
      font-size:15px;
      background:#111;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }

    .btn{
      width:100%;
      height:48px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(90deg,#b8860b,#f0c94d,#b8860b);
      box-shadow:0 10px 30px rgba(240,201,77,.18);
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .btn-sec{
      margin-top:10px;
      background:#1a1a1a;
      box-shadow:none;
      border:1px solid rgba(255,255,255,.08);
    }

    .status{
      margin-top:12px;
      font-size:13px;
      text-align:center;
      min-height:18px;
      color:#ffcc66;
    }

    .game-box{
      padding:18px;
      display:none;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .brand{
      font-size:24px;
      font-weight:700;
      color:#ffd54a;
    }

    .mini{
      font-size:13px;
      color:#cfcfcf;
    }

    .saldo{
      padding:10px 14px;
      border-radius:14px;
      background:#101010;
      border:1px solid rgba(255,255,255,.08);
      font-weight:700;
      color:#7dff9c;
    }

    .slot-wrap{
      width:100%;
      border-radius:22px;
      padding:18px;
      background:
        linear-gradient(180deg, rgba(255,215,0,.08), rgba(255,255,255,.02)),
        #111;
      border:1px solid rgba(255,215,0,.15);
      box-shadow:inset 0 0 20px rgba(255,255,255,.03), 0 16px 40px rgba(0,0,0,.35);
    }

    .reels{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-bottom:14px;
    }

    .reel{
      height:110px;
      border-radius:18px;
      background:linear-gradient(180deg,#1f1f1f,#090909);
      border:2px solid rgba(255,215,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      box-shadow:inset 0 0 14px rgba(255,255,255,.05);
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .controls input{
      width:100%;
      height:48px;
      border:none;
      outline:none;
      border-radius:14px;
      padding:0 12px;
      font-size:16px;
      background:#0d0d0d;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }

    .msg{
      min-height:28px;
      text-align:center;
      margin-top:14px;
      font-size:18px;
      font-weight:700;
      color:#ffd54a;
    }

    .historico{
      margin-top:16px;
      max-height:190px;
      overflow:auto;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:#0d0d0d;
    }

    .item{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    .item:last-child{border-bottom:none}

    .logout-btn{
      width:auto;
      padding:10px 14px;
      height:auto;
      border-radius:12px;
      background:#1a1a1a;
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
    }

    .loadingbar{
      width:100%;
      height:10px;
      border-radius:99px;
      background:#171717;
      overflow:hidden;
      margin-bottom:16px;
      border:1px solid rgba(255,255,255,.06);
    }

    .loadingbar span{
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#8a6a00,#ffd54a,#8a6a00);
      transition:width .3s ease;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="login-box" id="loginBox">
      <div class="title">FF SLOT</div>
      <div class="subtitle">Brincadeira virtual sem valor real</div>

      <div class="loadingbar"><span id="bar"></span></div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seuemail@email.com">
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">
      </div>

      <button class="btn" id="btnEntrar" type="button">Entrar</button>
      <button class="btn btn-sec" id="btnCadastrar" type="button">Criar conta</button>

      <div class="status" id="statusLogin"></div>
    </div>

    <div class="game-box" id="gameBox">
      <div class="topbar">
        <div>
          <div class="brand">FF SLOT</div>
          <div class="mini" id="nomeJogador">Jogador</div>
        </div>

        <div class="saldo" id="saldo">Moedas: 0</div>
      </div>

      <div class="slot-wrap">
        <div class="reels">
          <div class="reel" id="r1">🍒</div>
          <div class="reel" id="r2">⭐</div>
          <div class="reel" id="r3">💎</div>
        </div>

        <div class="controls">
          <input type="number" id="aposta" min="1" value="10">
          <button class="btn" id="btnGirar" type="button">GIRAR</button>
        </div>

        <div class="msg" id="msg">Boa sorte</div>
      </div>

      <div class="historico" id="historico"></div>

      <div style="margin-top:12px">
        <button class="logout-btn" id="btnSair" type="button">Sair</button>
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://bzgvbghxmebdjqnlakbj.supabase.co",
const SUPABASE_ANON_KEY = "sb_publishable_IyvZNwtgkvECR0QVlYbhzw_zPL1TMJv"";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const bar = document.getElementById("bar");
const loginBox = document.getElementById("loginBox");
const gameBox = document.getElementById("gameBox");
const emailEl = document.getElementById("email");
const senhaEl = document.getElementById("senha");
const statusLogin = document.getElementById("statusLogin");
const saldoEl = document.getElementById("saldo");
const nomeJogadorEl = document.getElementById("nomeJogador");
const historicoEl = document.getElementById("historico");
const msgEl = document.getElementById("msg");

const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");
const r3 = document.getElementById("r3");

const btnEntrar = document.getElementById("btnEntrar");
const btnCadastrar = document.getElementById("btnCadastrar");
const btnGirar = document.getElementById("btnGirar");
const btnSair = document.getElementById("btnSair");
const apostaEl = document.getElementById("aposta");

const simbolos = ["🍒","🍋","💎","⭐","7️⃣","🔔"];

function setBar(v){
  bar.style.width = v + "%";
}

function setStatus(txt){
  statusLogin.textContent = txt || "";
}

function moeda(n){
  return Number(n || 0).toLocaleString("pt-BR");
}

function randomSymbol(){
  return simbolos[Math.floor(Math.random() * simbolos.length)];
}

async function animarRoletas(finalSymbols){
  for(let i = 0; i < 18; i++){
    r1.textContent = randomSymbol();
    r2.textContent = randomSymbol();
    r3.textContent = randomSymbol();
    await new Promise(res => setTimeout(res, 70));
  }

  r1.textContent = finalSymbols[0];
  r2.textContent = finalSymbols[1];
  r3.textContent = finalSymbols[2];
}

async function carregarPerfil(){
  const { data: { user } } = await supabaseClient.auth.getUser();
  if(!user) return null;

  nomeJogadorEl.textContent = user.email || "Jogador";

  const { data: perfil } = await supabaseClient
    .from("slot_perfis")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  saldoEl.textContent = "Moedas: " + moeda(perfil?.moedas || 0);
  return perfil;
}

async function carregarHistorico(){
  historicoEl.innerHTML = '<div class="item"><span>Carregando...</span><span></span></div>';

  const { data, error } = await supabaseClient
    .from("slot_partidas")
    .select("*")
    .order("criado_em", { ascending:false })
    .limit(15);

  if(error){
    historicoEl.innerHTML = '<div class="item"><span>Erro ao carregar</span><span></span></div>';
    return;
  }

  if(!data || !data.length){
    historicoEl.innerHTML = '<div class="item"><span>Nenhuma jogada ainda</span><span></span></div>';
    return;
  }

  historicoEl.innerHTML = data.map(item => `
    <div class="item">
      <span>${item.simbolos.join(" ")} | aposta ${item.aposta}</span>
      <span>${item.ganhou ? "ganhou +" + item.premio : "perdeu"}</span>
    </div>
  `).join("");
}

async function mostrarJogo(){
  loginBox.style.display = "none";
  gameBox.style.display = "block";
  await carregarPerfil();
  await carregarHistorico();
}

async function mostrarLogin(){
  gameBox.style.display = "none";
  loginBox.style.display = "block";
}

btnCadastrar.addEventListener("click", async function(){
  try{
    setStatus("Criando conta...");
    btnCadastrar.disabled = true;
    btnEntrar.disabled = true;

    const email = emailEl.value.trim();
    const password = senhaEl.value.trim();

    if(!email || !password){
      setStatus("Preencha e-mail e senha");
      return;
    }

    const { error } = await supabaseClient.auth.signUp({
      email: email,
      password: password
    });

    if(error){
      setStatus(error.message);
      return;
    }

    setStatus("Conta criada. Agora entre.");
  } catch(e){
    setStatus(e.message || "Erro ao criar conta");
  } finally{
    btnCadastrar.disabled = false;
    btnEntrar.disabled = false;
  }
});

btnEntrar.addEventListener("click", async function(){
  try{
    setStatus("Entrando...");
    btnCadastrar.disabled = true;
    btnEntrar.disabled = true;

    const email = emailEl.value.trim();
    const password = senhaEl.value.trim();

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if(error){
      setStatus(error.message);
      return;
    }

    setStatus("");
    await mostrarJogo();
  } catch(e){
    setStatus(e.message || "Erro ao entrar");
  } finally{
    btnCadastrar.disabled = false;
    btnEntrar.disabled = false;
  }
});

btnSair.addEventListener("click", async function(){
  await supabaseClient.auth.signOut();
  await mostrarLogin();
});

btnGirar.addEventListener("click", async function(){
  try{
    btnGirar.disabled = true;
    msgEl.textContent = "Girando...";

    const aposta = Math.max(1, parseInt(apostaEl.value || "10", 10));

    const { data, error } = await supabaseClient.functions.invoke("slot-spin", {
      body: { aposta: aposta }
    });

    if(error){
      msgEl.textContent = error.message || "Erro ao girar";
      return;
    }

    if(data && data.error){
      msgEl.textContent = data.error;
      if(data.moedas !== undefined){
        saldoEl.textContent = "Moedas: " + moeda(data.moedas);
      }
      return;
    }

    await animarRoletas((data && data.simbolos) ? data.simbolos : ["🍒","🍋","⭐"]);

    saldoEl.textContent = "Moedas: " + moeda((data && data.moedas) ? data.moedas : 0);

    if(data && data.ganhou){
      msgEl.textContent = "🔥 Você ganhou +" + moeda(data.premio) + " moedas";
    } else {
      msgEl.textContent = "😢 Não foi dessa vez";
    }

    await carregarHistorico();
  } catch(e){
    msgEl.textContent = e.message || "Erro ao girar";
  } finally{
    btnGirar.disabled = false;
  }
});

supabaseClient.auth.onAuthStateChange(async function(_event, session){
  if(session){
    await mostrarJogo();
  } else {
    await mostrarLogin();
  }
});

async function boot(){
  setBar(20);
  const { data: { session } } = await supabaseClient.auth.getSession();
  setBar(60);

  if(session){
    await mostrarJogo();
  } else {
    await mostrarLogin();
  }

  setBar(100);
}

boot();
</script>
</body>
</html>
