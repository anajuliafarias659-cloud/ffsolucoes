<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FF SLOT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  width:320px;
  background:#111;
  padding:20px;
  border-radius:20px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:#222;
  color:#fff;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#d4a017;
  color:#fff;
  font-weight:bold;
}
.slot{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:15px 0;
}
.reel{
  width:60px;
  height:60px;
  background:#222;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
}
#game{display:none}
</style>
</head>

<body>

<div class="box" id="login">
  <h2>FF SLOT</h2>
  <input id="email" placeholder="email">
  <input id="senha" type="password" placeholder="senha">
  <button id="entrar">Entrar</button>
  <button id="criar">Criar conta</button>
  <div id="status"></div>
</div>

<div class="box" id="game">
  <h2>🎰 SLOT</h2>

  <div class="slot">
    <div class="reel" id="r1">❓</div>
    <div class="reel" id="r2">❓</div>
    <div class="reel" id="r3">❓</div>
  </div>

  <button id="girar">GIRAR</button>
</div>

<script>
const SUPABASE_URL = "https://bzgvbghxmebdjqnlakbj.supabase.co";
const SUPABASE_KEY = "sb_publishable_IyvZNwtgkvECR0QVlYbhzw_zPL1TMJv";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const statusEl = document.getElementById("status");

const loginBox = document.getElementById("login");
const gameBox = document.getElementById("game");

const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");
const r3 = document.getElementById("r3");

const simbolos = ["🍒","🍋","💎","⭐","7️⃣"];

function rand(){
  return simbolos[Math.floor(Math.random()*simbolos.length)];
}

async function animar(res){
  for(let i=0;i<10;i++){
    r1.innerText = rand();
    r2.innerText = rand();
    r3.innerText = rand();
    await new Promise(r=>setTimeout(r,80));
  }
  r1.innerText = res[0];
  r2.innerText = res[1];
  r3.innerText = res[2];
}

document.getElementById("criar").onclick = async ()=>{
  const email = emailInput.value;
  const senha = senhaInput.value;

  const {error} = await supabaseClient.auth.signUp({
    email: email,
    password: senha
  });

  statusEl.innerText = error ? error.message : "Conta criada";
};

document.getElementById("entrar").onclick = async ()=>{
  const email = emailInput.value;
  const senha = senhaInput.value;

  const {error} = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if(error){
    statusEl.innerText = error.message;
  }else{
    loginBox.style.display="none";
    gameBox.style.display="block";
  }
};

document.getElementById("girar").onclick = async ()=>{
  const r = [rand(), rand(), rand()];
  await animar(r);
};

console.log("OK rodando");
</script>

</body>
</html>
