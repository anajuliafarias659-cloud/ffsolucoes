<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFFILMES Chat</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100%}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .chat-entry{
      width:100%;
      max-width:420px;
      background:rgba(15,23,42,.96);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .chat-topo{
      padding:18px 16px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .chat-topo h1{
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }

    .chat-topo p{
      font-size:13px;
      line-height:1.5;
      opacity:.95;
    }

    .chat-corpo{
      padding:18px 16px 16px;
      background:linear-gradient(180deg,#081126,#020817);
    }

    .badge{
      display:inline-block;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:11px;
      font-weight:800;
      margin-bottom:14px;
    }

    .titulo{
      font-size:24px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:8px;
    }

    .desc{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.6;
      margin-bottom:18px;
    }

    .field{
      margin-bottom:14px;
    }

    label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      font-weight:800;
      color:#e2e8f0;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(2,6,23,.95);
      color:#fff;
      outline:none;
      font-size:14px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus{
      border-color:#22c55e;
      box-shadow:0 0 0 4px rgba(34,197,94,.14);
    }

    .btn{
      width:100%;
      border:none;
      padding:15px 16px;
      border-radius:16px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(34,197,94,.24);
      transition:.2s;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .status{
      min-height:22px;
      margin-top:12px;
      font-size:13px;
      color:#cbd5e1;
    }
  </style>
</head>
<body>

  <div class="chat-entry">
    <div class="chat-topo">
      <h1>🎬 FFFILMES</h1>
      <p>Horário de atendimento: 08h00 às 18h00</p>
    </div>

    <div class="chat-corpo">
      <div class="badge">CHAT DE APRESENTAÇÃO</div>
      <div class="titulo">Digite seu nome para iniciar</div>
      <div class="desc">
        Você informa só o nome e entra no chat.
      </div>

      <div class="field">
        <label for="nomeCliente">Seu nome</label>
        <input id="nomeCliente" type="text" placeholder="Digite seu nome" />
      </div>

      <button class="btn" id="btnEntrar">Iniciar conversa</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
const CHAT_USER_KEY = "ff_chat_familia_user";
const CHAT_CONTEXT_KEY = "ff_chat_contexto";
const NOME_KEY = "ff_filmes_nome_cliente";

function getChatUser(){
  try{
    return JSON.parse(localStorage.getItem(CHAT_USER_KEY) || "null");
  }catch{
    return null;
  }
}

function getChatContexto(){
  try{
    return JSON.parse(localStorage.getItem(CHAT_CONTEXT_KEY) || "{}");
  }catch{
    return {};
  }
}

const chatUser = getChatUser();
const chatContexto = getChatContexto();
const nomeCliente = localStorage.getItem(NOME_KEY) || chatContexto.cliente_nome || "Cliente";

console.log("Usuário automático do chat:", chatUser);
console.log("Contexto do chat:", chatContexto);
console.log("Nome do cliente:", nomeCliente);

// aqui você usa chatUser.numero / chatUser.nome / chatContexto.sistema_id
</script>
</body>
</html>
