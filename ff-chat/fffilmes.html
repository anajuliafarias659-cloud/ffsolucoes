<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFFILMES Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .chat-entry{
      width:100%;
      max-width:420px;
      background:rgba(15,23,42,.92);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .chat-topo{
      padding:18px 16px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .chat-topo h1{
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }

    .chat-topo p{
      font-size:13px;
      line-height:1.5;
      opacity:.95;
    }

    .chat-corpo{
      padding:18px 16px 16px;
    }

    .badge{
      display:inline-block;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:11px;
      font-weight:800;
      margin-bottom:14px;
    }

    .titulo{
      font-size:24px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:8px;
    }

    .desc{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.6;
      margin-bottom:16px;
    }

    .field{
      margin-bottom:14px;
    }

    label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      font-weight:800;
      color:#e2e8f0;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(2,6,23,.8);
      color:#fff;
      outline:none;
      font-size:14px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus{
      border-color:#22c55e;
      box-shadow:0 0 0 4px rgba(34,197,94,.14);
    }

    .btn{
      width:100%;
      border:none;
      padding:14px 16px;
      border-radius:14px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(34,197,94,.24);
    }

    .btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .status{
      min-height:22px;
      margin-top:12px;
      font-size:13px;
      color:#cbd5e1;
    }

    .info{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:#cbd5e1;
      font-size:12px;
      line-height:1.55;
    }

    @media(max-width:520px){
      .chat-entry{
        max-width:100%;
      }
      .titulo{
        font-size:21px;
      }
    }
  </style>
</head>
<body>

  <div class="chat-entry">
    <div class="chat-topo">
      <h1>🎬 FFFILMES</h1>
      <p>Atendimento rápido para quem quer conhecer o sistema.</p>
    </div>

    <div class="chat-corpo">
      <div class="badge">CHAT DE APRESENTAÇÃO</div>
      <div class="titulo">Digite seu nome para iniciar</div>
      <div class="desc">
        Você não precisa criar login. É só informar seu nome e entrar no chat.
      </div>

      <div class="field">
        <label for="nomeVisitante">Seu nome</label>
        <input id="nomeVisitante" type="text" placeholder="Digite seu nome" />
      </div>

      <button class="btn" id="btnEntrar">Iniciar conversa</button>
      <div class="status" id="status"></div>

      <div class="info">
        Origem deste atendimento: <strong>FFFILMES</strong>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const ORIGEM = "fffilmes";
    const ATENDENTE_NUMERO = "atendente_fffilmes"; 
    // troque esse valor pelo "numero" do atendente do FFFILMES no banco

    const nomeInput = document.getElementById("nomeVisitante");
    const btnEntrar = document.getElementById("btnEntrar");
    const statusEl = document.getElementById("status");

    function setStatus(msg){
      statusEl.textContent = msg || "";
    }

    function gerarNumeroVisitante(){
      return "visit_" + ORIGEM + "_" + Date.now();
    }

    async function criarVisitante(nome){
      const numero = gerarNumeroVisitante();

      const payload = {
        nome: nome,
        numero: numero,
        senha: "",
        ativo: true,
        tipo: "visitante",
        origem: ORIGEM
      };

      const { data, error } = await supabase
        .from("chat_usuarios")
        .insert(payload)
        .select()
        .single();

      if(error) throw error;
      return data;
    }

    async function criarMensagemInicial(usuario){
      const texto = `Olá, quero conhecer o sistema FFFILMES. Meu nome é ${usuario.nome}.`;

      const payload = {
        remetente_numero: usuario.numero,
        destinatario_numero: ATENDENTE_NUMERO,
        texto: texto
      };

      const { error } = await supabase
        .from("chat_mensagens")
        .insert(payload);

      if(error){
        console.warn("Não foi possível criar mensagem inicial:", error);
      }
    }

    async function iniciarChatVisitante(){
      const nome = (nomeInput.value || "").trim();

      if(!nome){
        alert("Digite seu nome para iniciar.");
        nomeInput.focus();
        return;
      }

      btnEntrar.disabled = true;
      setStatus("Entrando no chat...");

      try{
        const usuario = await criarVisitante(nome);

        localStorage.setItem("ff_chat_familia_user", JSON.stringify({
          numero: usuario.numero,
          nome: usuario.nome,
          visitante: true,
          origem: ORIGEM
        }));

        localStorage.setItem("ff_chat_destino_direto", ATENDENTE_NUMERO);

        await criarMensagemInicial(usuario);

        setStatus("Abrindo conversa...");
        window.location.href = "/ff-chat/index.html?origem=fffilmes&auto=1";
      }catch(error){
        console.error(error);
        setStatus("");
        alert(error.message || "Erro ao iniciar o chat.");
      }finally{
        btnEntrar.disabled = false;
      }
    }

    btnEntrar.addEventListener("click", iniciarChatVisitante);

    nomeInput.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        iniciarChatVisitante();
      }
    });

    setTimeout(() => nomeInput.focus(), 300);
  </script>
</body>
</html>
