<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFFILMES Chat</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100%}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .chat-entry{
      width:100%;
      max-width:420px;
      background:rgba(15,23,42,.96);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .chat-topo{
      padding:18px 16px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .chat-topo h1{
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }

    .chat-topo p{
      font-size:13px;
      line-height:1.5;
      opacity:.95;
    }

    .chat-corpo{
      padding:18px 16px 16px;
      background:linear-gradient(180deg,#081126,#020817);
    }

    .badge{
      display:inline-block;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:11px;
      font-weight:800;
      margin-bottom:14px;
    }

    .titulo{
      font-size:24px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:8px;
    }

    .desc{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.6;
      margin-bottom:18px;
    }

    .field{
      margin-bottom:14px;
    }

    label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      font-weight:800;
      color:#e2e8f0;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(2,6,23,.95);
      color:#fff;
      outline:none;
      font-size:14px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus{
      border-color:#22c55e;
      box-shadow:0 0 0 4px rgba(34,197,94,.14);
    }

    .btn{
      width:100%;
      border:none;
      padding:15px 16px;
      border-radius:16px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(34,197,94,.24);
      transition:.2s;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .btn:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .status{
      min-height:22px;
      margin-top:12px;
      font-size:13px;
      color:#cbd5e1;
    }

    .info{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:#cbd5e1;
      font-size:12px;
      line-height:1.55;
    }

    @media(max-width:520px){
      body{padding:10px}
      .chat-entry{max-width:100%;border-radius:18px}
      .titulo{font-size:21px}
      .chat-topo{padding:16px 14px}
      .chat-corpo{padding:16px 14px 14px}
    }
  </style>
</head>
<body>

  <div class="chat-entry">
    <div class="chat-topo">
      <h1>🎬 FFFILMES</h1>
      <p>Digite seu nome para iniciar o atendimento.</p>
    </div>

    <div class="chat-corpo">
      <div class="badge">CHAT DE APRESENTAÇÃO</div>
      <div class="titulo">Digite seu nome para iniciar</div>
      <div class="desc">
        Você informa só o nome e entra no chat.
      </div>

      <div class="field">
        <label for="nomeCliente">Seu nome</label>
        <input id="nomeCliente" type="text" placeholder="Digite seu nome" />
      </div>

      <button class="btn" id="btnEntrar" type="button">Iniciar conversa</button>
      <div class="status" id="status"></div>

      <div class="info">
        Atendimento com login automático do usuário fixo <strong>FFFILMES</strong>.
      </div>
    </div>
  </div>

  <script>
    const LOGIN_FIXO_NUMERO = "99888534369182762553636261717W3W3W3WA3W3A3";
    const LOGIN_FIXO_SENHA  = "HEEFUFNJWENFJNWEGFWE 8Y2Y3738";

    const SESSAO_KEY = "fffilmes_sessao_ativa";
    const NOME_KEY = "ff_filmes_nome_cliente";
    const CHAT_USER_KEY = "ff_chat_familia_user";

    const nomeCliente = document.getElementById("nomeCliente");
    const btnEntrar = document.getElementById("btnEntrar");
    const status = document.getElementById("status");

    function setStatus(texto){
      status.textContent = texto || "";
    }

    function lerSessaoAtiva(){
      try{
        return JSON.parse(localStorage.getItem(SESSAO_KEY) || "null");
      }catch{
        return null;
      }
    }

    function removerSessaoExpirada(){
      const sessao = lerSessaoAtiva();
      if(!sessao) return;

      const agora = Date.now();
      const tempoPassado = agora - Number(sessao.timestamp || 0);

      if(tempoPassado >= 5 * 60 * 1000){
        localStorage.removeItem(SESSAO_KEY);
      }
    }

    function podeEntrar(){
      removerSessaoExpirada();

      const sessao = lerSessaoAtiva();
      if(!sessao) return true;

      const agora = Date.now();
      const tempoPassado = agora - Number(sessao.timestamp || 0);

      return tempoPassado >= 5 * 60 * 1000;
    }

    function marcarSessaoAtiva(nome){
      localStorage.setItem(SESSAO_KEY, JSON.stringify({
        nome: nome,
        timestamp: Date.now()
      }));
    }

    function iniciarConversa(){
      const nome = (nomeCliente.value || "").trim();

      if(!nome){
        alert("Digite seu nome.");
        nomeCliente.focus();
        return;
      }

      if(!podeEntrar()){
        alert("Já existe alguém usando o chat no momento. Tente novamente em instantes.");
        return;
      }

      btnEntrar.disabled = true;
      setStatus("Entrando...");

      try{
        localStorage.setItem(NOME_KEY, nome);

        localStorage.setItem(CHAT_USER_KEY, JSON.stringify({
          numero: LOGIN_FIXO_NUMERO,
          senha: LOGIN_FIXO_SENHA
        }));

        marcarSessaoAtiva(nome);

        window.location.href = "/ff-chat/index.html?origem=fffilmes";
      }catch(e){
        console.error(e);
        setStatus("");
        btnEntrar.disabled = false;
        alert("Erro ao iniciar o chat.");
      }
    }

    btnEntrar.addEventListener("click", iniciarConversa);

    nomeCliente.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        iniciarConversa();
      }
    });

    removerSessaoExpirada();
    setTimeout(() => nomeCliente.focus(), 300);
  </script>
</body>
</html>
