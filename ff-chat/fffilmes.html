<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFFILMES Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;
      min-height:100%;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .chat-entry{
      width:100%;
      max-width:420px;
      background:rgba(15,23,42,.96);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .chat-topo{
      padding:18px 16px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .chat-topo h1{
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }

    .chat-topo p{
      font-size:13px;
      line-height:1.5;
      opacity:.95;
    }

    .chat-corpo{
      padding:18px 16px 16px;
      background:linear-gradient(180deg,#081126,#020817);
    }

    .badge{
      display:inline-block;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:11px;
      font-weight:800;
      margin-bottom:14px;
    }

    .titulo{
      font-size:24px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:8px;
    }

    .desc{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.6;
      margin-bottom:18px;
    }

    .field{
      margin-bottom:14px;
    }

    label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      font-weight:800;
      color:#e2e8f0;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(2,6,23,.95);
      color:#fff;
      outline:none;
      font-size:14px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus{
      border-color:#22c55e;
      box-shadow:0 0 0 4px rgba(34,197,94,.14);
    }

    .btn{
      width:100%;
      border:none;
      padding:15px 16px;
      border-radius:16px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(34,197,94,.24);
      transition:.2s;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .btn:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .status{
      min-height:22px;
      margin-top:12px;
      font-size:13px;
      color:#cbd5e1;
    }

    .info{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:#cbd5e1;
      font-size:12px;
      line-height:1.55;
    }

    @media(max-width:520px){
      body{
        padding:10px;
      }

      .chat-entry{
        max-width:100%;
        border-radius:18px;
      }

      .titulo{
        font-size:21px;
      }

      .chat-topo{
        padding:16px 14px;
      }

      .chat-corpo{
        padding:16px 14px 14px;
      }
    }
  </style>
</head>
<body>

  <div class="chat-entry">
    <div class="chat-topo">
      <h1>🎬 FFFILMES</h1>
      <p>Atendimento rápido para quem quer conhecer o sistema.</p>
    </div>

    <div class="chat-corpo">
      <div class="badge">CHAT DE APRESENTAÇÃO</div>

      <div class="titulo">Digite seu nome para iniciar</div>

      <div class="desc">
        Você não precisa criar login. É só informar seu nome e entrar no chat.
      </div>

      <div class="field">
        <label for="nomeVisitante">Seu nome</label>
        <input id="nomeVisitante" type="text" placeholder="Digite seu nome" />
      </div>

      <button class="btn" id="btnEntrar" type="button">Iniciar conversa</button>

      <div class="status" id="status"></div>

      <div class="info">
        Origem deste atendimento: <strong>FFFILMES</strong>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const ORIGEM = "fffilmes";
      const ATENDENTE_NUMERO = "atendente_fffilmes";
      // TROQUE AQUI PELO NUMERO REAL DO ATENDENTE NO BANCO
      // exemplo: "1001"

      const nomeInput = document.getElementById("nomeVisitante");
      const btnEntrar = document.getElementById("btnEntrar");
      const statusEl = document.getElementById("status");

      function setStatus(msg){
        statusEl.textContent = msg || "";
      }

      function gerarNumeroVisitante(){
        return "visit_" + ORIGEM + "_" + Date.now();
      }

      async function criarVisitante(nome){
        const numero = gerarNumeroVisitante();

        const payload = {
          nome: nome,
          numero: numero,
          senha: "",
          ativo: true,
          tipo: "visitante",
          origem: ORIGEM
        };

        const { data, error } = await supabaseClient
          .from("chat_usuarios")
          .insert(payload)
          .select()
          .single();

        if(error) throw error;

        return data;
      }

      async function criarMensagemInicial(usuario){
        const texto = "Olá, quero conhecer o sistema FFFILMES. Meu nome é " + usuario.nome + ".";

        const payload = {
          remetente_numero: usuario.numero,
          destinatario_numero: ATENDENTE_NUMERO,
          texto: texto
        };

        const { error } = await supabaseClient
          .from("chat_mensagens")
          .insert(payload);

        if(error){
          console.warn("Não foi possível criar mensagem inicial:", error);
        }
      }

      async function iniciarChatVisitante(){
        const nome = (nomeInput.value || "").trim();

        if(!nome){
          alert("Digite seu nome para iniciar.");
          nomeInput.focus();
          return;
        }

        btnEntrar.disabled = true;
        setStatus("Entrando no chat...");

        try{
          const usuario = await criarVisitante(nome);

          localStorage.setItem("ff_chat_familia_user", JSON.stringify({
            numero: usuario.numero,
            nome: usuario.nome,
            visitante: true,
            origem: ORIGEM
          }));

          localStorage.setItem("ff_chat_destino_direto", ATENDENTE_NUMERO);

          await criarMensagemInicial(usuario);

          setStatus("Abrindo conversa...");

          window.location.href = "/ff-chat/index.html?origem=fffilmes&auto=1";
        }catch(error){
          console.error(error);
          setStatus("");
          alert(error.message || "Erro ao iniciar o chat.");
        }finally{
          btnEntrar.disabled = false;
        }
      }

      btnEntrar.addEventListener("click", iniciarChatVisitante);

      nomeInput.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
          iniciarChatVisitante();
        }
      });

      setTimeout(() => {
        nomeInput.focus();
      }, 300);
    })();
  </script>
<!-- 🔥 BOTÃO FLUTUANTE DO CHAT -->
<style>
.ff-chat-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  background:#22c55e;
  color:#fff;
  font-size:28px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  z-index:999999;
}

.ff-chat-box{
  position:fixed;
  right:20px;
  bottom:95px;
  width:350px;
  height:500px;
  background:#020617;
  border-radius:18px;
  overflow:hidden;
  display:none;
  flex-direction:column;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
  z-index:999998;
}

.ff-chat-box.ativo{
  display:flex;
}

.ff-chat-top{
  background:#22c55e;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.ff-chat-close{
  background:none;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

.ff-chat-body{
  flex:1;
}

.ff-chat-body iframe{
  width:100%;
  height:100%;
  border:none;
}

/* MOBILE */
@media(max-width:600px){
  .ff-chat-box{
    right:10px;
    left:10px;
    width:auto;
    height:70vh;
  }
}
</style>

<button class="ff-chat-btn" onclick="abrirChat()">💬</button>

<div class="ff-chat-box" id="chatBox">
  <div class="ff-chat-top">
    Suporte FF
    <button class="ff-chat-close" onclick="fecharChat()">✕</button>
  </div>

  <div class="ff-chat-body">
    <iframe src="/ff-chat/fffilmes.html"></iframe>
  </div>
</div>

<script>
function abrirChat(){
  document.getElementById("chatBox").classList.add("ativo");
}

function fecharChat(){
  document.getElementById("chatBox").classList.remove("ativo");
}
</script>
</body>
</html>
