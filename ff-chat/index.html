<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Chat</title>

<style>
:root{
  --bg:#0f172a;
  --header:#111b21;
  --chatbg:#0b141a;
  --line:#1f2c34;
  --text:#e9edef;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* APP */
.app{
  height:100dvh;
  display:flex;
}

/* CHAT */
.chat-area{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  background:var(--chatbg);
}

/* TOPO */
.chat-header{
  height:60px;
  display:flex;
  align-items:center;
  padding:10px;
  background:var(--header);
  border-bottom:1px solid var(--line);
}

/* MENSAGENS */
.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* BOLHA */
.msg{
  padding:8px 12px;
  border-radius:10px;
  max-width:80%;
  word-wrap:break-word;
}

.me{
  background:#005c4b;
  align-self:flex-end;
}

.other{
  background:#202c33;
  align-self:flex-start;
}

/* INPUT */
.chat-input{
  display:flex;
  gap:8px;
  padding:8px;
  background:var(--header);
  border-top:1px solid var(--line);
}

.chat-input input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

.chat-input button{
  background:#00a884;
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){

  html, body{
    height:100%;
    overflow:hidden;
  }

  .app{
    height:100dvh;
  }

  .chat-area{
    height:100dvh;
  }

}
</style>
</head>

<body>

<div class="app">
  <div class="chat-area">

    <div class="chat-header">
      👤 Contato
    </div>

    <div class="chat-messages" id="messages">
      <div class="msg other">Olá!</div>
      <div class="msg me">Oi 😄</div>
    </div>

    <div class="chat-input">
      <input id="msgInput" placeholder="Digite uma mensagem...">
      <button onclick="enviar()">Enviar</button>
    </div>

  </div>
</div>

<script>
const messages = document.getElementById("messages");
const msgInput = document.getElementById("msgInput");

function enviar(){
  if(!msgInput.value.trim()) return;

  const div = document.createElement("div");
  div.className = "msg me";
  div.textContent = msgInput.value;

  messages.appendChild(div);
  msgInput.value = "";

  scrollFinal();
}

function scrollFinal(){
  setTimeout(()=>{
    messages.scrollTop = messages.scrollHeight;
  },50);
}

/* CORREÇÃO MOBILE (TECLADO) */
function ajustarAlturaMobile(){
  scrollFinal();
}

msgInput.addEventListener("focus", ajustarAlturaMobile);
window.addEventListener("resize", ajustarAlturaMobile);
</script>

</body>
</html>
