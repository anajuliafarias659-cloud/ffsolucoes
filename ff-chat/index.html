
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FF Chat Família</title>

<link rel="manifest" href="/ff-chat/manifest.webmanifest">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FF Chat Família">
<link rel="apple-touch-icon" href="/ff-chat/icons/icon-192.png">

<script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b141a;
  --sidebar:#111b21;
  --header:#202c33;
  --chatbg:#0e1a21;
  --mine:#005c4b;
  --other:#202c33;
  --text:#e9edef;
  --muted:#8696a0;
  --line:rgba(255,255,255,.08);
  --green:#00a884;
  --green2:#22c55e;
  --danger:#ef4444;
  --warn:#f59e0b;
  --blue:#53bdeb;
}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}
.hidden{display:none!important}
button,input,select,textarea,audio{font-family:inherit}
audio{width:240px;max-width:100%}
img{display:block}
.auth-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:linear-gradient(180deg,#0b141a,#071218);
}
.auth-card{
  width:100%;
  max-width:430px;
  background:#111b21;
  border:1px solid var(--line);
  border-radius:20px;
  padding:22px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}
.logo{text-align:center;margin-bottom:18px}
.logo h1{font-size:28px;margin-bottom:6px}
.logo p{color:var(--muted);font-size:14px}
.tabs{display:flex;gap:8px;margin:16px 0 18px}
.tab-btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#0b141a;
  color:var(--text);
  font-weight:700;
}
.tab-btn.active{background:var(--green);color:#04110d}
.field{margin-bottom:12px}
.field label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted)}
.input{
  width:100%;
  padding:13px 14px;
  border:none;
  outline:none;
  border-radius:12px;
  background:#0b141a;
  color:#fff;
  border:1px solid var(--line);
}
.btn{
  width:100%;
  padding:13px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:var(--green);
  color:#04110d;
  font-weight:800;
  margin-top:6px;
}
.status{margin-top:12px;min-height:18px;font-size:13px;color:var(--muted)}
.status.error{color:var(--danger)}
.status.ok{color:var(--green2)}

.app{
  display:grid;
  grid-template-columns:380px 1fr;
  height:100vh;
}
.sidebar{
  background:var(--sidebar);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
}
.sidebar-top{
  background:var(--header);
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.user-mini{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:var(--green);
  color:#04110d;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  overflow:hidden;
  flex-shrink:0;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.user-mini .meta{min-width:0}
.user-mini .meta .name{
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.user-mini .meta .num{color:var(--muted);font-size:12px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.icon-btn{
  background:#111b21;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
}
.ring-btn{
  background:#ef4444;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
}
.search-box{
  padding:10px;
  border-bottom:1px solid var(--line);
}
.search-input{
  width:100%;
  padding:11px 12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#202c33;
  color:#fff;
}
.status-strip{
  padding:10px;
  border-bottom:1px solid var(--line);
  overflow:auto;
  display:flex;
  gap:12px;
}
.status-item{
  min-width:68px;
  cursor:pointer;
  text-align:center;
}
.status-ring{
  width:58px;
  height:58px;
  margin:0 auto 6px;
  border-radius:50%;
  padding:2px;
  background:linear-gradient(135deg,#22c55e,#00a884);
}
.status-ring img,
.status-ring .status-fallback{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  background:#202c33;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:800;
}
.status-name{
  font-size:12px;
  color:#d6dde2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.add-status-box{
  padding:10px;
  border-bottom:1px solid var(--line);
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.small-input{
  flex:1;
  min-width:140px;
  padding:10px 12px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#202c33;
  color:#fff;
}
.small-btn2{
  padding:10px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  background:var(--green);
  color:#04110d;
}
.contacts{flex:1;overflow:auto}
.contact{
  padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,.04);
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;
}
.contact:hover{background:rgba(255,255,255,.03)}
.contact.active{background:#2a3942}
.contact .avatar{
  width:48px;
  height:48px;
  flex-shrink:0;
}
.contact-info{min-width:0;flex:1}
.contact-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:3px;
}
.contact-name{
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.contact-time{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
}
.contact-last{
  font-size:13px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.badge{
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  background:var(--green);
  color:#04110d;
  font-size:11px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

.chat-area{
  display:flex;
  flex-direction:column;
  background:var(--chatbg);
}
.chat-header{
  background:var(--header);
  padding:12px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  gap:12px;
}
.chat-header .info .name{font-weight:800}
.chat-header .info .sub{
  font-size:12px;
  color:var(--muted);
}
.online-dot,.offline-dot{
  display:inline-block;
  width:8px;
  height:8px;
  border-radius:50%;
  margin-right:6px;
}
.online-dot{background:#22c55e}
.offline-dot{background:#64748b}
.chat-messages{
  flex:1;
  overflow:auto;
  padding:18px;
  background:
    radial-gradient(circle at top right, rgba(0,168,132,.08), transparent 22%),
    radial-gradient(circle at bottom left, rgba(255,255,255,.05), transparent 20%),
    #0b141a;
}
.typing-indicator{
  padding:8px 18px 0;
  color:var(--muted);
  font-size:13px;
  min-height:24px;
}
.typing-indicator .dot{
  display:inline-block;
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--muted);
  margin-left:4px;
  animation: blinkDot 1.2s infinite ease-in-out;
}
.typing-indicator .dot:nth-child(2){animation-delay:.2s}
.typing-indicator .dot:nth-child(3){animation-delay:.4s}
@keyframes blinkDot{
  0%,80%,100%{opacity:.25;transform:translateY(0)}
  40%{opacity:1;transform:translateY(-2px)}
}
.day-sep{text-align:center;margin:10px 0 16px}
.day-sep span{
  background:#1f2c34;
  color:#cfd6da;
  padding:7px 12px;
  border-radius:8px;
  font-size:12px;
}
.msg-row{display:flex;margin-bottom:8px}
.msg-row.me{justify-content:flex-end}
.msg-row.other{justify-content:flex-start}
.msg{
  max-width:72%;
  padding:9px 10px 18px;
  border-radius:10px;
  position:relative;
  word-wrap:break-word;
  line-height:1.4;
  font-size:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.msg.me{background:var(--mine);border-top-right-radius:4px}
.msg.other{background:var(--other);border-top-left-radius:4px}
.msg-time{
  position:absolute;
  right:8px;
  bottom:4px;
  font-size:11px;
  color:#cbd5db;
  opacity:.92;
  display:flex;
  align-items:center;
  gap:4px;
}
.msg-status{
  font-size:11px;
}
.msg-status.lido{
  color:var(--blue);
}
.msg-audio{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:220px;
  padding-right:38px;
}
.msg-audio .audio-label{
  font-size:12px;
  opacity:.9;
}
.audio-duration{
  font-size:12px;
  color:#cbd5db;
  opacity:.9;
}
.chat-input{
  background:var(--header);
  border-top:1px solid var(--line);
  padding:10px 12px;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.chat-input input{
  flex:1;
  min-width:180px;
  padding:13px 14px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#2a3942;
  color:#fff;
}
.send-btn{
  padding:12px 16px;
  border:none;
  background:var(--green);
  color:#04110d;
  font-weight:800;
  border-radius:10px;
  cursor:pointer;
}
.audio-btn{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:#fff;
  background:#1f2937;
  font-weight:700;
}
.audio-btn.recording{background:#ef4444}
.audio-btn.stop{background:#f59e0b;color:#111}
.audio-btn.send{background:#22c55e;color:#04110d}
.audio-preview{
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 0 0;
  flex-wrap:wrap;
}
.audio-preview .label{
  color:var(--muted);
  font-size:13px;
}
.empty-chat{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  color:var(--muted);
}

.admin-panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
  z-index:50;
}
.admin-card{
  width:100%;
  max-width:1000px;
  max-height:92vh;
  overflow:auto;
  background:#111b21;
  border-radius:20px;
  border:1px solid var(--line);
  padding:18px;
}
.admin-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}
.admin-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.card{
  background:#0b141a;
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
}
.card h3{margin-bottom:12px}
.users-list,.links-list{
  margin-top:12px;
  display:grid;
  gap:8px;
}
.item{
  background:#111b21;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  font-size:14px;
}
.small{font-size:12px;color:var(--muted)}
.row3{
  display:grid;
  grid-template-columns:1fr 1fr auto;
  gap:10px;
}
.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}
.small-btn{
  border:none;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
  font-weight:700;
}
.edit-btn{background:var(--warn);color:#111}
.delete-btn{background:var(--danger);color:#fff}
.close-btn{
  background:#ef4444;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
}
.logout-btn{background:#ef4444;color:#fff}
.mobile-back{display:none}

.status-viewer{
  position:fixed;
  inset:0;
  z-index:999;
  background:rgba(0,0,0,.96);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
}
.status-viewer img{
  max-width:92%;
  max-height:78vh;
  border-radius:14px;
}
.status-viewer .text{
  color:#fff;
  margin-top:12px;
  text-align:center;
  font-size:15px;
}
.status-viewer .top{
  color:#cbd5db;
  margin-bottom:10px;
  font-size:13px;
}

@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{height:100vh}
  .chat-area{
    position:fixed;
    inset:0;
    z-index:10;
  }
  .chat-area.mobile-hidden{display:none}
  .mobile-back{
    display:inline-block;
    background:#111b21;
    border:none;
    color:#fff;
    border-radius:10px;
    padding:8px 11px;
    cursor:pointer;
  }
  .admin-grid{grid-template-columns:1fr}
  .msg{max-width:86%}
}
</style>
</head>
<body>

<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="logo">
      <h1>💬 FF Chat Família</h1>
      <p>Estilo WhatsApp com números fictícios</p>
    </div>

    <div class="tabs">
      <button id="tabUser" class="tab-btn active">Usuário</button>
      <button id="tabAdmin" class="tab-btn">Admin</button>
    </div>

    <div id="userLoginBox">
      <div class="field">
        <label>Número fictício</label>
        <input id="loginNumero" class="input" placeholder="Ex: 55001">
      </div>
      <div class="field">
        <label>Senha</label>
        <input id="loginSenha" class="input" type="password" placeholder="Digite a senha">
      </div>
      <button id="btnEntrarUser" class="btn">Entrar no chat</button>
    </div>

    <div id="adminLoginBox" class="hidden">
      <div class="field">
        <label>Senha admin</label>
        <input id="adminSenha" class="input" type="password" placeholder="Digite a senha admin">
      </div>
      <button id="btnEntrarAdmin" class="btn">Entrar no painel</button>
    </div>

    <div id="authStatus" class="status"></div>
  </div>
</div>

<div id="appScreen" class="app hidden">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="user-mini">
        <div class="avatar" id="meAvatar">ME</div>
        <div class="meta">
          <div class="name" id="meNome">Meu nome</div>
          <div class="num" id="meNumero">55000</div>
        </div>
      </div>
      <div class="top-actions">
        <button id="btnUploadFoto" class="icon-btn">Foto</button>
        <button id="btnPermissaoNotif" class="icon-btn">Notif</button>
        <button id="btnPararToque" class="ring-btn hidden">Parar</button>
        <button id="openAdminBtn" class="icon-btn hidden">Admin</button>
        <button id="btnLogout" class="icon-btn logout-btn">Sair</button>
      </div>
    </div>

    <input id="fileFotoPerfil" type="file" accept="image/*" class="hidden">

    <div class="add-status-box">
      <input id="statusTexto" class="small-input" placeholder="Texto do status (opcional)">
      <button id="btnEscolherStatus" class="small-btn2">Novo status</button>
      <input id="fileStatus" type="file" accept="image/*" class="hidden">
    </div>

    <div id="statusList" class="status-strip"></div>

    <div class="search-box">
      <input id="searchContato" class="search-input" placeholder="Pesquisar conversa">
    </div>

    <div id="contactsList" class="contacts"></div>
  </div>

  <div id="chatArea" class="chat-area mobile-hidden">
    <div id="chatHeader" class="chat-header hidden">
      <button id="mobileBack" class="mobile-back">Voltar</button>
      <div class="avatar" id="chatAvatar">CT</div>
      <div class="info">
        <div class="name" id="chatNome">Contato</div>
        <div class="sub" id="chatNumero">55002</div>
      </div>
    </div>

    <div id="emptyChat" class="empty-chat">
      <div>
        <h2 style="margin-bottom:8px;">FF Chat Família</h2>
        <p>Escolha uma conversa para começar.</p>
      </div>
    </div>

    <div id="messagesBox" class="chat-messages hidden"></div>
    <div id="typingIndicator" class="typing-indicator hidden"></div>

    <div id="chatInputArea" class="chat-input hidden">
      <input id="msgInput" placeholder="Digite uma mensagem">
      <button id="btnGravarAudio" class="audio-btn">🎤 Gravar</button>
      <button id="btnPararAudio" class="audio-btn stop hidden">Parar</button>
      <button id="btnEnviarAudio" class="audio-btn send hidden">Enviar áudio</button>
      <button id="btnEnviarMsg" class="send-btn">Enviar</button>

      <div id="audioPreview" class="audio-preview hidden">
        <span class="label">Prévia do áudio:</span>
        <audio id="audioPreviewPlayer" controls></audio>
        <span id="audioPreviewDuration" class="audio-duration"></span>
        <button id="btnCancelarAudio" class="audio-btn">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<div id="adminPanel" class="admin-panel hidden">
  <div class="admin-card">
    <div class="admin-top">
      <h2>Painel Admin</h2>
      <button id="closeAdmin" class="close-btn">Fechar</button>
    </div>

    <div class="admin-grid">
      <div class="card">
        <h3>Cadastrar pessoa</h3>
        <div class="field">
          <label>Nome</label>
          <input id="novoNome" class="input" placeholder="Ex: Maria">
        </div>
        <div class="field">
          <label>Número fictício</label>
          <input id="novoNumero" class="input" placeholder="Ex: 55001">
        </div>
        <div class="field">
          <label>Senha</label>
          <input id="novaSenha" class="input" placeholder="Ex: 123456">
        </div>
        <button id="btnCadastrarUsuario" class="btn">Cadastrar</button>
        <div id="adminStatus1" class="status"></div>

        <div class="users-list" id="usersList"></div>
      </div>

      <div class="card">
        <h3>Liberar contatos</h3>
        <div class="row3">
          <select id="usuarioOrigem" class="input"></select>
          <select id="usuarioDestino" class="input"></select>
          <button id="btnVincular" class="btn" style="margin-top:0">Liberar</button>
        </div>
        <div class="small" style="margin-top:8px;">
          Isso libera o usuário da esquerda para conversar com o da direita.
        </div>
        <div id="adminStatus2" class="status"></div>

        <div class="links-list" id="linksList"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const ADMIN_PASSWORD = "123456admin";
const AUTO_REFRESH_MS = 5000;
const AUDIO_BUCKET = "chat-audios";
const FOTO_BUCKET = "chat-fotos";
const STATUS_BUCKET = "chat-status";

const authScreen = document.getElementById("authScreen");
const appScreen = document.getElementById("appScreen");
const adminPanel = document.getElementById("adminPanel");
const authStatus = document.getElementById("authStatus");

const tabUser = document.getElementById("tabUser");
const tabAdmin = document.getElementById("tabAdmin");
const userLoginBox = document.getElementById("userLoginBox");
const adminLoginBox = document.getElementById("adminLoginBox");

const loginNumero = document.getElementById("loginNumero");
const loginSenha = document.getElementById("loginSenha");
const btnEntrarUser = document.getElementById("btnEntrarUser");
const adminSenha = document.getElementById("adminSenha");
const btnEntrarAdmin = document.getElementById("btnEntrarAdmin");

const meAvatar = document.getElementById("meAvatar");
const meNome = document.getElementById("meNome");
const meNumero = document.getElementById("meNumero");
const btnLogout = document.getElementById("btnLogout");
const openAdminBtn = document.getElementById("openAdminBtn");
const btnPermissaoNotif = document.getElementById("btnPermissaoNotif");
const btnPararToque = document.getElementById("btnPararToque");
const btnUploadFoto = document.getElementById("btnUploadFoto");
const fileFotoPerfil = document.getElementById("fileFotoPerfil");

const contactsList = document.getElementById("contactsList");

function setStatus(el, text="", type=""){
  el.className = "status" + (type ? " " + type : "");
  el.textContent = text;
}
function initials(name=""){
  const p = String(name).trim().split(/\s+/).filter(Boolean);
  if(!p.length) return "??";
  if(p.length === 1) return p[0].slice(0,2).toUpperCase();
  return (p[0][0] + p[1][0]).toUpperCase();
}
function escapeHtml(text=""){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function timeOnly(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}
function dateLabel(iso){
  const d = new Date(iso);
  return d.toLocaleDateString("pt-BR");
}
function isMobile(){

function normalizeNumero(v=""){

function openAudioContext(){
  try{
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended"){
      audioCtx.resume();
    }
  }catch(e){}
}
function markUserInteraction(){
  userInteracted = true;
  openAudioContext();
}
document.addEventListener("click", markUserInteraction, { passive:true });
document.addEventListener("keydown", markUserInteraction, { passive:true });
document.addEventListener("touchstart", markUserInteraction, { passive:true });

function beep(freq=800, duration=0.12, type="sine", volume=0.05){
  if(!userInteracted) return;
  openAudioContext();
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  osc.start(now);
  osc.stop(now + duration + 0.02);
}
function playNewMessageSound(){
  beep(900, 0.10, "sine", 0.05);
  setTimeout(() => beep(1200, 0.08, "sine", 0.04), 90);
}
function playRingPatternOnce(){
  beep(700, 0.18, "square", 0.06);
  setTimeout(() => beep(880, 0.18, "square", 0.06), 220);
  setTimeout(() => beep(700, 0.18, "square", 0.06), 480);
}
function stopRinging(){
  if(ringInterval){
    clearInterval(ringInterval);
    ringInterval = null;
  }
  ringingContactNumero = null;
  btnPararToque.classList.add("hidden");
}
function startRinging(numeroContato){
  if(ringingContactNumero === numeroContato && ringInterval) return;
  stopRinging();
  ringingContactNumero = numeroContato;
  btnPararToque.classList.remove("hidden");
  playRingPatternOnce();
  ringInterval = setInterval(() => {
    if(contatoAtual && contatoAtual.numero === numeroContato){
      stopRinging();
      return;
    }
    playRingPatternOnce();
    if(navigator.vibrate){
      navigator.vibrate([200,120,200]);
    }
  }, 2200);
}

function formatDuration(sec){
  const total = Math.max(0, Number(sec || 0));
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function formatLastSeen(iso){
  if(!iso) return "offline";
  const d = new Date(iso);
  const agora = new Date();
  const diff = Math.floor((agora - d) / 1000);
  if(diff < 60) return "visto agora";
  if(diff < 3600) return `visto há ${Math.floor(diff/60)} min`;
  return `visto ${d.toLocaleDateString("pt-BR")} às ${d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`;
}
function getContatoNomeByNumero(numero){

    }
  }catch(e){}
}

  if(!("Notification" in window)){

  if(Notification.permission === "granted"){

function showBrowserNotification(title, body){
  if(!("Notification" in window)) return;
  if(Notification.permission !== "granted") return;
  try{
    const n = new Notification(title, {
      body,
      tag: "ff-chat-familia",
      renotify: true
    });
    n.onclick = () => {
      window.focus();
      n.close();
    };
  }catch(e){}
}

  }else{

    typingIndicator.innerHTML = "";
  }
}

function getSupportedMimeType(){
  const tipos = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/ogg;codecs=opus",
    "audio/mp4"
  ];
  for(const t of tipos){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
  }
  return "";
}

async function iniciarGravacaoAudio(){
  if(!navigator.mediaDevices?.getUserMedia){
    alert("Seu navegador não suporta gravação de áudio.");
    return;
  }
  if(!contatoAtual){
    alert("Abra uma conversa antes de gravar.");
    return;
  }

  try{
    audioChunks = [];
    audioBlob = null;
    audioPreviewDurationSec = 0;
    audioPreviewDuration.textContent = "";
    audioPreview.classList.add("hidden");
    audioPreviewPlayer.src = "";

    mediaStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    const mime = getSupportedMimeType();
    audioMimeType = mime || "audio/webm";

    mediaRecorder = mime ? new MediaRecorder(mediaStream, { mimeType: mime }) : new MediaRecorder(mediaStream);

    mediaRecorder.ondataavailable = (e) => {
      if(e.data && e.data.size > 0){
        audioChunks.push(e.data);
      }
    };

    mediaRecorder.onstop = () => {
      audioBlob = new Blob(audioChunks, { type: audioMimeType });
      const url = URL.createObjectURL(audioBlob);
      audioPreviewPlayer.src = url;
      audioPreviewPlayer.onloadedmetadata = () => {
        audioPreviewDurationSec = Math.round(audioPreviewPlayer.duration || 0);
        audioPreviewDuration.textContent = formatDuration(audioPreviewDurationSec);
      };
      audioPreview.classList.remove("hidden");
      btnEnviarAudio.classList.remove("hidden");
      btnPararAudio.classList.add("hidden");
      btnGravarAudio.classList.remove("recording");
      btnGravarAudio.textContent = "🎤 Gravar";

      if(mediaStream){
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
    };

    mediaRecorder.start();
    btnGravarAudio.classList.add("recording");
    btnGravarAudio.textContent = "Gravando...";
    btnPararAudio.classList.remove("hidden");
    btnEnviarAudio.classList.add("hidden");
  }catch(err){
    console.error(err);
    alert("Não foi possível acessar o microfone.");
  }
}

function pararGravacaoAudio(){
  if(mediaRecorder && mediaRecorder.state !== "inactive"){
    mediaRecorder.stop();
  }
}

function cancelarAudio(){
  audioBlob = null;
  audioChunks = [];
  audioPreviewDurationSec = 0;
  audioPreviewDuration.textContent = "";
  audioPreviewPlayer.pause();
  audioPreviewPlayer.src = "";
  audioPreview.classList.add("hidden");
  btnEnviarAudio.classList.add("hidden");
  btnPararAudio.classList.add("hidden");
  btnGravarAudio.classList.remove("recording");
  btnGravarAudio.textContent = "🎤 Gravar";

  if(mediaStream){
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
}

function extByMime(type=""){
  if(type.includes("ogg")) return "ogg";
  if(type.includes("mp4")) return "m4a";
  return "webm";
}

async function enviarAudio(){
  if(!audioBlob || !usuarioLogado || !contatoAtual) return;

  btnEnviarAudio.disabled = true;
  btnEnviarAudio.textContent = "Enviando...";

  try{
    const ext = extByMime(audioBlob.type || audioMimeType);
    const fileName = `${Date.now()}_${usuarioLogado.numero}_${contatoAtual.numero}.${ext}`;
    const path = `${usuarioLogado.numero}/${fileName}`;

    const { error: uploadError } = await supabase.storage
      .from(AUDIO_BUCKET)
      .upload(path, audioBlob, {
        contentType: audioBlob.type || audioMimeType,
        upsert: false
      });

    if(uploadError){
      console.error(uploadError);
      alert("Erro ao enviar áudio para o storage.");
      btnEnviarAudio.disabled = false;
      btnEnviarAudio.textContent = "Enviar áudio";
      return;
    }

    const { data: publicData } = supabase.storage
      .from(AUDIO_BUCKET)
      .getPublicUrl(path);

    const audioUrl = publicData?.publicUrl || "";

    const { error: insertError } = await supabase
      .from("chat_mensagens")
      .insert({
        de_numero: usuarioLogado.numero,
        para_numero: contatoAtual.numero,
        mensagem: "[áudio]",
        tipo: "audio",
        audio_url: audioUrl,
        audio_path: path,
        audio_duracao: audioPreviewDurationSec || 0,
        lido: false
      });

    if(insertError){
      console.error(insertError);
      alert("Erro ao registrar mensagem de áudio.");
      btnEnviarAudio.disabled = false;
      btnEnviarAudio.textContent = "Enviar áudio";
      return;
    }

    cancelarAudio();
    await carregarMensagens(true);
    await renderContatos(contatosPermitidos);
  }catch(err){
    console.error(err);
    alert("Erro ao enviar áudio.");
  }

  btnEnviarAudio.disabled = false;
  btnEnviarAudio.textContent = "Enviar áudio";
}

async function detectarNovasMensagens(){
  if(!usuarioLogado || !contatosPermitidos.length) return;

  for(const contato of contatosPermitidos){
    const { data, error } = await supabase
      .from("chat_mensagens")
      .select("id,de_numero,para_numero,mensagem,created_at,tipo")
      .or(`and(de_numero.eq.${usuarioLogado.numero},para_numero.eq.${contato.numero}),and(de_numero.eq.${contato.numero},para_numero.eq.${usuarioLogado.numero})`)
      .order("created_at", { ascending:false })
      .limit(1);

    if(error || !data?.length) continue;

    const ultima = data[0];
    const lastKnownId = lastMessageMap[contato.numero];

    if(!lastKnownId){
      lastMessageMap[contato.numero] = ultima.id;
      continue;
    }

    if(ultima.id !== lastKnownId){
      lastMessageMap[contato.numero] = ultima.id;

      const incoming = ultima.de_numero === contato.numero;
      if(!incoming) continue;

      const isOpenConversation = contatoAtual && contatoAtual.numero === contato.numero && !document.hidden;
      const corpoNotif = ultima.tipo === "audio" ? "🎤 Áudio recebido" : ultima.mensagem;

      if(isOpenConversation){
        playNewMessageSound();
      }else{
        unreadCountMap[contato.numero] = (unreadCountMap[contato.numero] || 0) + 1;
        playNewMessageSound();
        startRinging(contato.numero);
        showBrowserNotification(getContatoNomeByNumero(contato.numero), corpoNotif);
        if(navigator.vibrate){
          navigator.vibrate([180,120,180]);
        }
      }
    }
  }
}

async function carregarUsuariosAdmin(){
  const { data, error } = await supabase
    .from("chat_usuarios")
    .select("*")
    .order("nome", { ascending: true });

  if(error){
    console.error(error);
    return;
  }

  usersList.innerHTML = "";
  usuarioOrigem.innerHTML = `<option value="">Usuário</option>`;
  usuarioDestino.innerHTML = `<option value="">Contato</option>`;

  (data || []).forEach(u => {
    usersList.innerHTML += `
      <div class="item">
        <b>${escapeHtml(u.nome)}</b><br>
        <span class="small">${escapeHtml(u.numero)} • senha: ${escapeHtml(u.senha)} • ${u.ativo ? "ativo" : "inativo"}</span>
        <div class="actions">
          <button class="small-btn edit-btn" onclick="editarUsuario('${u.id}','${escapeHtml(u.nome)}','${escapeHtml(u.numero)}','${escapeHtml(u.senha)}')">Editar</button>
          <button class="small-btn delete-btn" onclick="apagarUsuario('${u.id}','${escapeHtml(u.numero)}')">Apagar</button>
        </div>
      </div>
    `;
    usuarioOrigem.innerHTML += `<option value="${u.numero}">${escapeHtml(u.nome)} (${escapeHtml(u.numero)})</option>`;
    usuarioDestino.innerHTML += `<option value="${u.numero}">${escapeHtml(u.nome)} (${escapeHtml(u.numero)})</option>`;
  });
}

btnVincular.onclick = async () => {
  const origem = usuarioOrigem.value;
  const destino = usuarioDestino.value;

  if(!origem || !destino){
    setStatus(adminStatus2, "Selecione os dois usuários.", "error");
    return;
  }
  if(origem === destino){
    setStatus(adminStatus2, "Não pode vincular a mesma pessoa.", "error");
    return;
  }

  const { data: existente } = await supabase
    .from("chat_contatos")
    .select("id")
    .eq("usuario_numero", origem)
    .eq("contato_numero", destino)
    .maybeSingle();

  if(existente){
    setStatus(adminStatus2, "Esse vínculo já existe.", "error");
    return;
  }

  const { error } = await supabase.from("chat_contatos").insert({
    usuario_numero: origem,
    contato_numero: destino
  });

  if(error){
    console.error(error);
    setStatus(adminStatus2, "Erro ao vincular.", "error");
    return;
  }

async function carregarVinculos(){
  const { data, error } = await supabase
    .from("chat_contatos")
    .select("*")
    .order("id", { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  linksList.innerHTML = "";
  if(!data?.length){
    linksList.innerHTML = `<div class="item">Nenhum vínculo ainda.</div>`;
    return;
  }

  for(const link of data){
    linksList.innerHTML += `
      <div class="item">
        <b>${escapeHtml(link.usuario_numero)}</b> pode conversar com <b>${escapeHtml(link.contato_numero)}</b>
        <div class="actions">
          <button class="small-btn delete-btn" onclick="removerVinculo(${link.id})">Remover</button>
        </div>
      </div>
    `;
  }
}

window.editarUsuario = async function(id, nomeAtual, numeroAtual, senhaAtual){
  const novoNomeEdit = prompt("Editar nome:", nomeAtual);
  if(novoNomeEdit === null) return;

  const novoNumeroEdit = prompt("Editar número fictício:", numeroAtual);
  if(novoNumeroEdit === null) return;

  const novaSenhaEdit = prompt("Editar senha:", senhaAtual);
  if(novaSenhaEdit === null) return;

  const nome = String(novoNomeEdit).trim();
  const numero = normalizeNumero(novoNumeroEdit);
  const senha = String(novaSenhaEdit).trim();

  if(!nome || !numero || !senha){
    setStatus(adminStatus1, "Nome, número e senha são obrigatórios.", "error");
    return;
  }

  const { error } = await supabase
    .from("chat_usuarios")
    .update({ nome, numero, senha })
    .eq("id", id);

  if(error){
    console.error(error);
    setStatus(adminStatus1, "Erro ao editar usuário.", "error");
    return;
  }

  if(numero !== numeroAtual){
    await supabase.from("chat_contatos").update({ usuario_numero: numero }).eq("usuario_numero", numeroAtual);
    await supabase.from("chat_contatos").update({ contato_numero: numero }).eq("contato_numero", numeroAtual);
    await supabase.from("chat_mensagens").update({ de_numero: numero }).eq("de_numero", numeroAtual);
    await supabase.from("chat_mensagens").update({ para_numero: numero }).eq("para_numero", numeroAtual);
    await supabase.from("chat_status").update({ usuario_numero: numero }).eq("usuario_numero", numeroAtual);

    if(usuarioLogado && usuarioLogado.numero === numeroAtual){
      usuarioLogado.numero = numero;
      usuarioLogado.nome = nome;
      usuarioLogado.senha = senha;
      saveSession();
      setMeHeader();
    }
    if(contatoAtual && contatoAtual.numero === numeroAtual){
      contatoAtual.numero = numero;
      contatoAtual.nome = nome;
    }
  }else{
    if(usuarioLogado && usuarioLogado.id === id){
      usuarioLogado.nome = nome;
      usuarioLogado.senha = senha;
      saveSession();
      setMeHeader();
    }
    if(contatoAtual && contatoAtual.numero === numero){
      contatoAtual.nome = nome;
    }
  }

  setStatus(adminStatus1, "Usuário atualizado.", "ok");
  await carregarUsuariosAdmin();
  await carregarVinculos();
  if(usuarioLogado){
    await carregarContatos();
    await renderStatus();
    if(contatoAtual) await carregarMensagens(true);
  }
};

window.apagarUsuario = async function(id, numero){
  const ok = confirm("Apagar esse usuário e seus vínculos? Essa ação não pode ser desfeita.");
  if(!ok) return;

  await supabase.from("chat_contatos").delete().eq("usuario_numero", numero);
  await supabase.from("chat_contatos").delete().eq("contato_numero", numero);
  await supabase.from("chat_mensagens").delete().eq("de_numero", numero);
  await supabase.from("chat_mensagens").delete().eq("para_numero", numero);
  await supabase.from("chat_status").delete().eq("usuario_numero", numero);

  const { error } = await supabase.from("chat_usuarios").delete().eq("id", id);

  if(error){
    console.error(error);
    setStatus(adminStatus1, "Erro ao apagar usuário.", "error");
    return;
  }

  if(usuarioLogado && usuarioLogado.id === id){
    stopAutoRefresh();
    stopHeartbeatOnline();
    stopRinging();
    cancelarAudio();
    usuarioLogado = null;
    contatoAtual = null;
    clearSession();
    showAuth();
  } else {
    if(contatoAtual && contatoAtual.numero === numero){
      contatoAtual = null;
      chatHeader.classList.add("hidden");
      messagesBox.classList.add("hidden");
      typingIndicator.classList.add("hidden");
      chatInputArea.classList.add("hidden");
      emptyChat.classList.remove("hidden");
    }
    setStatus(adminStatus1, "Usuário apagado.", "ok");
    await carregarUsuariosAdmin();
    await carregarVinculos();
    if(usuarioLogado){
      await carregarContatos();
      await renderStatus();
    }
  }
};

window.removerVinculo = async function(id){
  const ok = confirm("Remover esse vínculo?");
  if(!ok) return;

  const { error } = await supabase.from("chat_contatos").delete().eq("id", id);

  if(error){
    console.error(error);
    setStatus(adminStatus2, "Erro ao remover vínculo.", "error");
    return;
  }

  setStatus(adminStatus2, "Vínculo removido.", "ok");
  await carregarVinculos();

  if(usuarioLogado){
    await carregarContatos();
    if(contatoAtual){
      const aindaExiste = contatosPermitidos.some(c => c.numero === contatoAtual.numero);
      if(!aindaExiste){
        contatoAtual = null;
        stopRinging();
        chatHeader.classList.add("hidden");
        messagesBox.classList.add("hidden");
        typingIndicator.classList.add("hidden");
        chatInputArea.classList.add("hidden");
        emptyChat.classList.remove("hidden");
      }
    }
  }
};

async function carregarContatos(){
  if(!usuarioLogado) return;

  const { data: links, error } = await supabase
    .from("chat_contatos")
    .select("*")
    .eq("usuario_numero", usuarioLogado.numero);

  if(error){
    console.error(error);
    renderNoContacts();
    return;
  }

  if(!links || !links.length){
    contatosPermitidos = [];
    renderNoContacts();
    return;
  }

  const numeros = links.map(l => l.contato_numero);

  const { data: usuarios, error: errorUsers } = await supabase
    .from("chat_usuarios")
    .select("*")
    .in("numero", numeros)
    .eq("ativo", true);

  if(errorUsers){
    console.error(errorUsers);
    renderNoContacts();
    return;
  }

  contatosPermitidos = usuarios || [];

  if(contatoAtual){
    const atualizado = contatosPermitidos.find(c => c.numero === contatoAtual.numero);
    if(atualizado){
      contatoAtual = atualizado;
      atualizarStatusContatoTopo();
    }
  }

  await renderContatos(contatosPermitidos);
}

async function getUltimaMensagem(meuNumero, contatoNumero){
  const { data, error } = await supabase
    .from("chat_mensagens")
    .select("*")
    .or(`and(de_numero.eq.${meuNumero},para_numero.eq.${contatoNumero}),and(de_numero.eq.${contatoNumero},para_numero.eq.${meuNumero})`)
    .order("created_at", { ascending:false })
    .limit(1);

  if(error) return null;
  return data?.[0] || null;
}

async function renderContatos(lista){
  if(!lista?.length){
    renderNoContacts();
    return;
  }

  const termo = searchContato.value.trim().toLowerCase();
  let filtrados = lista.filter(c =>
    c.nome.toLowerCase().includes(termo) ||
    c.numero.toLowerCase().includes(termo)
  );

  if(!filtrados.length){
    contactsList.innerHTML = `<div style="padding:20px;color:var(--muted);text-align:center;">Nenhum contato encontrado.</div>`;
    return;
  }

  const enriched = [];
  for(const c of filtrados){
    const ultima = await getUltimaMensagem(usuarioLogado.numero, c.numero);
    enriched.push({ ...c, ultima });
  }

  enriched.sort((a,b) => {
    const ta = a.ultima ? new Date(a.ultima.created_at).getTime() : 0;
    const tb = b.ultima ? new Date(b.ultima.created_at).getTime() : 0;
    return tb - ta || a.nome.localeCompare(b.nome);
  });

  contactsList.innerHTML = enriched.map(c => `
    <div class="contact ${contatoAtual?.numero === c.numero ? 'active' : ''}" data-numero="${c.numero}">
      <div class="avatar">${avatarHtml(c)}</div>
      <div class="contact-info">
        <div class="contact-top">
          <div class="contact-name">${escapeHtml(c.nome)}</div>
          <div class="contact-time">${c.ultima ? escapeHtml(timeOnly(c.ultima.created_at)) : ""}</div>
        </div>
        <div class="contact-last">${
          c.ultima
            ? escapeHtml(c.ultima.tipo === "audio" ? "🎤 Áudio" : c.ultima.mensagem)
            : "Sem mensagens ainda"
        }</div>
      </div>
      ${(unreadCountMap[c.numero] || 0) > 0 ? `<div class="badge">${unreadCountMap[c.numero]}</div>` : ``}
    </div>
  `).join("");

  document.querySelectorAll(".contact").forEach(el => {
    el.onclick = async () => {
      const numero = el.dataset.numero;
      const contato = contatosPermitidos.find(x => x.numero === numero);
      if(contato) await abrirConversa(contato);
    };
  });
}

async function abrirConversa(contato){
  contatoAtual = contato;
  zerarNaoLidas(contato.numero);
  stopRinging();

  typingIndicator.classList.add("hidden");
  typingIndicator.innerHTML = "";

  chatHeader.classList.remove("hidden");
  messagesBox.classList.remove("hidden");
  chatInputArea.classList.remove("hidden");
  emptyChat.classList.add("hidden");

  atualizarStatusContatoTopo();

  await carregarMensagens(true);
  await renderContatos(contatosPermitidos);
  openChatMobile();
  msgInput.focus();
}

function renderMensagemConteudo(m){
  if(m.tipo === "audio" && m.audio_url){
    return `
      <div class="msg-audio">
        <div class="audio-label">🎤 Áudio</div>
        <audio controls preload="none" src="${escapeHtml(m.audio_url)}"></audio>
        <div class="audio-duration">${formatDuration(m.audio_duracao || 0)}</div>
      </div>
    `;
  }
  return escapeHtml(m.mensagem || "");
}

async function carregarMensagens(forceScroll=false){
  if(!usuarioLogado || !contatoAtual) return;

  await supabase
    .from("chat_mensagens")
    .update({ lido: true })
    .eq("para_numero", usuarioLogado.numero)
    .eq("de_numero", contatoAtual.numero)
    .eq("lido", false);

  const meu = usuarioLogado.numero;
  const outro = contatoAtual.numero;

  const { data, error } = await supabase
    .from("chat_mensagens")
    .select("*")
    .or(`and(de_numero.eq.${meu},para_numero.eq.${outro}),and(de_numero.eq.${outro},para_numero.eq.${meu})`)
    .order("created_at", { ascending:true });

  if(error){
    console.error(error);
    return;
  }

  const renderKey = JSON.stringify((data || []).map(m => [m.id, m.created_at, m.tipo, m.audio_url, m.lido, m.audio_duracao]));
  if(renderKey === ultimoChatRenderKey && !forceScroll) return;
  ultimoChatRenderKey = renderKey;

  let html = "";
  let ultimaData = "";

  for(const m of (data || [])){
    const dataAtual = dateLabel(m.created_at);
    if(dataAtual !== ultimaData){
      html += `<div class="day-sep"><span>${escapeHtml(dataAtual)}</span></div>`;
      ultimaData = dataAtual;
    }

    const isMe = m.de_numero === usuarioLogado.numero;
    let statusIcon = "";
    if(isMe){
      statusIcon = m.lido
        ? `<span class="msg-status lido">✔✔</span>`
        : `<span class="msg-status">✔</span>`;
    }

    html += `
      <div class="msg-row ${isMe ? "me" : "other"}">
        <div class="msg ${isMe ? "me" : "other"}">
          ${renderMensagemConteudo(m)}
          <div class="msg-time">${escapeHtml(timeOnly(m.created_at))}${statusIcon}</div>
        </div>
      </div>
    `;
  }

  messagesBox.innerHTML = html || `<div style="color:var(--muted);text-align:center;padding-top:30px;">Nenhuma mensagem ainda.</div>`;
  messagesBox.scrollTop = messagesBox.scrollHeight;
}

async function uploadFotoPerfil(file){
  if(!usuarioLogado || !file) return;

  const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
  const path = `perfil/${usuarioLogado.numero}_${Date.now()}.${ext}`;

  const { error } = await supabase.storage
    .from(FOTO_BUCKET)
    .upload(path, file, {
      upsert: true,
      contentType: file.type || "image/jpeg"
    });

  if(error){
    console.error(error);
    alert(error.message || "Erro ao enviar foto.");
    return;
  }

  const { data } = supabase.storage
    .from(FOTO_BUCKET)
    .getPublicUrl(path);

  const fotoUrl = data?.publicUrl || "";

  const { error: updError } = await supabase
    .from("chat_usuarios")
    .update({ foto_url: fotoUrl })
    .eq("id", usuarioLogado.id);

  if(updError){
    console.error(updError);
    alert("Erro ao salvar foto.");
    return;
  }

  usuarioLogado.foto_url = fotoUrl;
  setMeHeader();
  await carregarContatos();
  await renderStatus();
  if(contatoAtual){
    await carregarMensagens(true);
    atualizarStatusContatoTopo();
  }

  alert("Foto atualizada!");
}

async function criarStatus(file, texto=""){
  if(!usuarioLogado || !file) return;

  const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
  const path = `status/${usuarioLogado.numero}_${Date.now()}.${ext}`;

  const { error } = await supabase.storage
    .from(STATUS_BUCKET)
    .upload(path, file, {
      upsert: false,
      contentType: file.type || "image/jpeg"
    });

  if(error){
    console.error(error);
    alert(error.message || "Erro ao enviar status.");
    return;
  }

  const { data } = supabase.storage
    .from(STATUS_BUCKET)
    .getPublicUrl(path);

  const { error: insertError } = await supabase
    .from("chat_status")
    .insert({
      usuario_numero: usuarioLogado.numero,
      media_url: data?.publicUrl || "",
      texto: texto || ""
    });

  if(insertError){
    console.error(insertError);
    alert("Erro ao salvar status.");
    return;
  }

  statusTexto.value = "";

async function carregarStatus(){
  const ontem = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

  const { data, error } = await supabase
    .from("chat_status")
    .select("*")
    .gte("created_at", ontem)
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    return [];
  }
  return data || [];
}

async function renderStatus(){
  const lista = await carregarStatus();

  if(!lista.length){
    statusList.innerHTML = "";
    return;
  }

  const numerosUnicos = [...new Set(lista.map(s => s.usuario_numero))];
  const { data: users } = await supabase
    .from("chat_usuarios")
    .select("numero,nome,foto_url")
    .in("numero", numerosUnicos);

  const userMap = {};
  (users || []).forEach(u => userMap[u.numero] = u);

  const ultimos = [];
  for(const numero of numerosUnicos){
    const st = lista.find(x => x.usuario_numero === numero);
    if(st) ultimos.push(st);
  }

  statusList.innerHTML = ultimos.map(s => {
    const u = userMap[s.usuario_numero] || { nome:s.usuario_numero, foto_url:"" };
    const nome = s.usuario_numero === usuarioLogado?.numero ? "Meu status" : (u.nome || s.usuario_numero);
    const img = u.foto_url
      ? `<img src="${escapeHtml(u.foto_url)}" alt="foto">`
      : `<div class="status-fallback">${escapeHtml(initials(u.nome || s.usuario_numero))}</div>`;

    return `
      <div class="status-item" data-numero="${escapeHtml(s.usuario_numero)}">
        <div class="status-ring">${img}</div>
        <div class="status-name">${escapeHtml(nome)}</div>
      </div>
    `;
  }).join("");

  document.querySelectorAll(".status-item").forEach(el => {
    el.onclick = async () => {
      const numero = el.dataset.numero;
      await abrirViewerStatus(numero, lista, userMap);
    };
  });
}

async function abrirViewerStatus(numero, lista, userMap){
  const itens = lista
    .filter(s => s.usuario_numero === numero)
    .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

  if(!itens.length) return;

  let idx = 0;
  const u = userMap[numero] || { nome: numero };
  const viewer = document.createElement("div");
  viewer.className = "status-viewer";

  function render(){
    const item = itens[idx];
    viewer.innerHTML = `
      <div class="top">${escapeHtml(u.nome || numero)} • ${escapeHtml(timeOnly(item.created_at))}</div>
      <img src="${escapeHtml(item.media_url || "")}" alt="status">
      <div class="text">${escapeHtml(item.texto || "")}</div>
    `;
  }

  render();
  document.body.appendChild(viewer);

  const timer = setInterval(() => {
    idx++;
    if(idx >= itens.length){
      clearInterval(timer);
      viewer.remove();
      return;
    }
    render();
  }, 5000);

  viewer.onclick = () => {
    clearInterval(timer);
    viewer.remove();
  };
}
