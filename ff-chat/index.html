<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Chat</title>

<link rel="manifest" href="/ff-chat/manifest.webmanifest">
<meta name="theme-color" content="#0f172a">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://SEU-PROJETO.supabase.co",
  "SUA-ANON-KEY"
);

const PUSH_FUNCTION_URL = "https://SEU-PROJETO.supabase.co/functions/v1/send-chat-push";

let usuarioLogado = { numero: "admin" };
let contatoAtual = null;

let autoRefreshTimer = null;
let lastMessageMap = {};
let unreadCountMap = {};

const AUTO_REFRESH_MS = 15000;

async function carregarMensagens(scroll=true){
  if(!contatoAtual) return;

  const { data } = await supabase
    .from("chat_mensagens")
    .select("*")
    .or(`and(de_numero.eq.${usuarioLogado.numero},para_numero.eq.${contatoAtual.numero}),and(de_numero.eq.${contatoAtual.numero},para_numero.eq.${usuarioLogado.numero})`)
    .order("created_at",{ascending:true});

  const box = document.getElementById("msgs");
  box.innerHTML = "";

  data.forEach(m=>{
    const div = document.createElement("div");
    div.className = m.de_numero === usuarioLogado.numero ? "me" : "out";
    div.textContent = m.mensagem;
    box.appendChild(div);
  });

  if(scroll) box.scrollTop = box.scrollHeight;
}

async function enviarMensagem(){
  const input = document.getElementById("txt");
  const texto = input.value.trim();
  if(!texto) return;

  const { error } = await supabase.from("chat_mensagens").insert({
    de_numero: usuarioLogado.numero,
    para_numero: contatoAtual.numero,
    mensagem: texto,
    tipo: "texto"
  });

  if(error){
    alert("Erro ao enviar");
    return;
  }

  input.value = "";
  await carregarMensagens(true);

  await dispararPushServidor(contatoAtual.numero,{
    tipo:"texto",
    mensagem:texto
  });
}

async function dispararPushServidor(destinoNumero, mensagemObj){
  try{
    await fetch(PUSH_FUNCTION_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        to_numero: destinoNumero,
        title: usuarioLogado.numero,
        body: mensagemObj.mensagem,
        url: "/ff-chat/",
        numero: usuarioLogado.numero
      })
    });
  }catch(e){
    console.error("push erro",e);
  }
}

async function atualizarSomenteConversaAtual(){
  if(!contatoAtual) return;

  const { data } = await supabase
    .from("chat_mensagens")
    .select("id,de_numero")
    .or(`and(de_numero.eq.${usuarioLogado.numero},para_numero.eq.${contatoAtual.numero}),and(de_numero.eq.${contatoAtual.numero},para_numero.eq.${usuarioLogado.numero})`)
    .order("created_at",{ascending:false})
    .limit(1);

  if(!data?.length) return;

  const ultima = data[0];
  const last = lastMessageMap[contatoAtual.numero];

  if(!last){
    lastMessageMap[contatoAtual.numero] = ultima.id;
    return;
  }

  if(ultima.id !== last){
    lastMessageMap[contatoAtual.numero] = ultima.id;

    if(ultima.de_numero === contatoAtual.numero){
      if(document.hidden){
        unreadCountMap[contatoAtual.numero] = (unreadCountMap[contatoAtual.numero] || 0)+1;
      }
    }

    await carregarMensagens(false);
  }
}

function startAutoRefresh(){
  stopAutoRefresh();

  autoRefreshTimer = setInterval(async ()=>{
    if(contatoAtual){
      await atualizarSomenteConversaAtual();
    }
  }, AUTO_REFRESH_MS);
}

function stopAutoRefresh(){
  if(autoRefreshTimer){
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
  }
}

function abrirConversa(numero){
  contatoAtual = { numero };
  document.getElementById("topo").textContent = numero;
  carregarMensagens(true);
}

async function registrarServiceWorker(){
  if("serviceWorker" in navigator){
    const reg = await navigator.serviceWorker.register("/ff-chat/sw.js");
    console.log("SW OK",reg);
  }
}

async function pedirPermissaoPush(){
  const perm = await Notification.requestPermission();
  if(perm !== "granted") return;

  const reg = await navigator.serviceWorker.ready;

  const sub = await reg.pushManager.subscribe({
    userVisibleOnly:true,
    applicationServerKey: urlBase64ToUint8Array("SUA_PUBLIC_KEY")
  });

  await supabase.from("push_subscriptions").insert({
    numero: usuarioLogado.numero,
    endpoint: sub.endpoint,
    subscription: sub
  });
}

function urlBase64ToUint8Array(base64String){
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,"+").replace(/_/g,"/");
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c=>c.charCodeAt(0)));
}

window.onload = async ()=>{
  await registrarServiceWorker();
  await pedirPermissaoPush();

  abrirConversa("livia");

  startAutoRefresh();
};
</script>

<style>
body{font-family:Arial;margin:0;background:#111;color:#fff}
#topo{padding:15px;background:#000;font-weight:bold}
#msgs{height:70vh;overflow:auto;padding:10px}
.me{background:#22c55e;padding:8px;margin:5px;border-radius:8px;text-align:right}
.out{background:#374151;padding:8px;margin:5px;border-radius:8px}
#area{display:flex}
#txt{flex:1;padding:10px}
button{padding:10px}
</style>
</head>

<body>

<div id="topo">Chat</div>

<div id="msgs"></div>

<div id="area">
  <input id="txt" placeholder="Digite...">
  <button onclick="enviarMensagem()">Enviar</button>
</div>

</body>
</html>
