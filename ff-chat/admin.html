<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;color:#fff;font-family:Arial}
.container{display:flex;height:100vh}

.lista{
  width:250px;
  border-right:1px solid #333;
  overflow:auto;
}
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}
.msgs{flex:1;overflow:auto;padding:10px}
.input{display:flex}
input{flex:1;padding:10px}
button{padding:10px;background:#16a34a;color:#fff;border:none}
.item{padding:10px;border-bottom:1px solid #222;cursor:pointer}
.item:hover{background:#111}
</style>
</head>

<body>

<div class="container">
  <div class="lista" id="lista"></div>

  <div class="chat">
    <div class="msgs" id="msgs"></div>

    <div class="input">
      <input id="txt">
      <button onclick="responder()">Enviar</button>
    </div>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const appId = "fffilmes";

let atual = null;

// 🔥 lista clientes
async function carregarLista(){
  const { data } = await supabase
    .from("chat_mensagens")
    .select("visitante_id, de_nome")
    .eq("app_id", appId);

  const unicos = {};
  data.forEach(d=>{
    unicos[d.visitante_id] = d.de_nome;
  });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  Object.entries(unicos).forEach(([id,nome])=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText = nome;
    div.onclick = ()=>abrir(id);
    lista.appendChild(div);
  });
}

// 🔥 abrir conversa
async function abrir(id){
  atual = id;
  carregarMensagens();
}

// 🔥 mensagens
async function carregarMensagens(){
  if(!atual) return;

  const { data } = await supabase
    .from("chat_mensagens")
    .select("*")
    .eq("visitante_id", atual)
    .order("id",{ascending:true});

  const box = document.getElementById("msgs");
  box.innerHTML="";

  data.forEach(m=>{
    const div = document.createElement("div");
    div.innerText = m.de_nome + ": " + m.mensagem;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

// 🔥 responder
async function responder(){
  const txt = document.getElementById("txt");
  const msg = txt.value.trim();
  if(!msg || !atual) return;

  txt.value="";

  await supabase.from("chat_mensagens").insert({
    app_id: appId,
    visitante_id: atual,
    tipo: "admin",

    de_numero: "admin",
    para_numero: atual,

    de_nome: "Suporte",
    mensagem: msg
  });

  carregarMensagens();
}

setInterval(()=>{
  carregarLista();
  carregarMensagens();
},2000);
</script>

</body>
</html>
