<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:#fff;
      height:100vh;
      overflow:hidden;
    }

    .topo{
      height:70px;
      background:#111827;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      gap:12px;
    }

    .topo h1{
      font-size:22px;
      margin-bottom:4px;
    }

    .topo small{
      color:#94a3b8;
    }

    .topo-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .filtro,.busca{
      border:none;
      outline:none;
      border-radius:12px;
      background:#1e293b;
      color:#fff;
      padding:10px 12px;
      min-height:42px;
    }

    .busca{
      min-width:220px;
    }

    .wrap{
      height:calc(100vh - 70px);
      display:flex;
      min-height:0;
    }

    .sidebar{
      width:340px;
      background:#111827;
      border-right:1px solid rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .sidebar-head{
      padding:14px 16px;
      font-size:18px;
      font-weight:700;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .estado{
      padding:10px 16px;
      font-size:13px;
      color:#94a3b8;
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .lista-conversas{
      flex:1;
      overflow:auto;
      padding:8px;
    }

    .conversa-item{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:12px;
      margin-bottom:8px;
      cursor:pointer;
      transition:.2s;
    }

    .conversa-item:hover{
      border-color:rgba(59,130,246,.45);
      transform:translateY(-1px);
    }

    .conversa-item.ativa{
      border-color:#3b82f6;
      background:#13203a;
    }

    .conversa-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    .conversa-nome{
      font-weight:700;
      font-size:15px;
    }

    .badge-nao-lidas{
      background:#ef4444;
      color:#fff;
      font-size:12px;
      font-weight:700;
      padding:4px 8px;
      border-radius:999px;
      min-width:24px;
      text-align:center;
    }

    .conversa-meta{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .mini-badge{
      font-size:11px;
      padding:4px 7px;
      border-radius:999px;
      background:#1e293b;
      color:#cbd5e1;
      border:1px solid rgba(255,255,255,.06);
    }

    .conversa-msg{
      font-size:13px;
      color:#cbd5e1;
      line-height:1.4;
      margin-bottom:8px;
      word-break:break-word;
    }

    .conversa-data{
      font-size:12px;
      color:#94a3b8;
    }

    .chat-area{
      flex:1;
      min-width:0;
      min-height:0;
      display:flex;
      background:#020617;
    }

    .vazio{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#94a3b8;
      padding:20px;
    }

    .chat-head{
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:#0b1220;
    }

    .chat-head h2{
      font-size:20px;
      margin-bottom:4px;
    }

    .chat-head .sub{
      color:#94a3b8;
      font-size:13px;
      word-break:break-word;
    }

    .status-online{
      font-size:12px;
      color:#86efac;
      white-space:nowrap;
    }

    .mensagens{
      flex:1;
      overflow:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
    }

    .msg{
      max-width:78%;
      padding:12px;
      border-radius:16px;
      word-break:break-word;
      line-height:1.45;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }

    .msg.visitante{
      align-self:flex-start;
      background:#1e293b;
      border-top-left-radius:6px;
    }

    .msg.admin{
      align-self:flex-end;
      background:#2563eb;
      border-top-right-radius:6px;
    }

    .msg-nome{
      font-size:12px;
      font-weight:700;
      margin-bottom:6px;
      opacity:.95;
    }

    .msg-texto{
      white-space:pre-wrap;
      font-size:14px;
    }

    .msg-meta{
      font-size:11px;
      margin-top:8px;
      opacity:.8;
    }

    .chat-form{
      border-top:1px solid rgba(255,255,255,.08);
      padding:12px;
      background:#0b1220;
      display:flex;
      gap:10px;
      align-items:flex-end;
    }

    .chat-form textarea{
      flex:1;
      min-height:54px;
      max-height:150px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:14px;
      background:#111827;
      color:#fff;
      padding:14px;
      font-size:14px;
    }

    .chat-form button{
      border:none;
      outline:none;
      background:#16a34a;
      color:#fff;
      border-radius:14px;
      padding:14px 18px;
      font-weight:700;
      cursor:pointer;
      min-width:120px;
    }

    .chat-form button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    @media (max-width: 900px){
      .sidebar{width:290px}
      .busca{min-width:160px}
      .msg{max-width:88%}
    }

    @media (max-width: 760px){
      body{overflow:auto;height:auto}
      .topo{
        height:auto;
        align-items:flex-start;
        flex-direction:column;
      }
      .wrap{
        height:auto;
        min-height:calc(100vh - 90px);
        flex-direction:column;
      }
      .sidebar{
        width:100%;
        height:280px;
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,.08);
      }
      .chat-area{
        min-height:calc(100vh - 370px);
      }
    }
  </style>
</head>
<body>

  <div class="topo">
    <div>
      <h1>Painel Admin Chat</h1>
      <small>Recebe e responde os chats dos visitantes</small>
    </div>

    <div class="topo-right">
      <select id="filtroSistema" class="filtro">
        <option value="">Todos os sistemas</option>
        <option value="fffilmes">FF Filmes</option>
        <option value="ffsolucoes">FF Soluções</option>
        <option value="hotel">Hotel</option>
        <option value="mercado">Mercado</option>
        <option value="bar">Bar</option>
        <option value="pizzaria">Pizzaria</option>
        <option value="loja">Loja</option>
      </select>

      <input id="buscaNome" class="busca" type="text" placeholder="Buscar cliente.">
    </div>
  </div>

  <div class="wrap">
    <aside class="sidebar">
      <div class="sidebar-head">Conversas</div>
      <div id="estadoLista" class="estado">Carregando conversas.</div>
      <div id="listaConversas" class="lista-conversas"></div>
    </aside>

    <section class="chat-area">
      <div id="chatVazio" class="vazio">
        <div>
          <h2 style="margin-bottom:8px;">Nenhuma conversa selecionada</h2>
          <p>Escolha uma conversa na lateral para visualizar e responder.</p>
        </div>
      </div>

      <div id="chatPainel" style="display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden;">
        <div class="chat-head">
          <div>
            <h2 id="chatTitulo">Cliente</h2>
            <div class="sub" id="chatSubtitulo">---</div>
          </div>
          <div class="status-online" id="chatStatus">Atualizando.</div>
        </div>

        <div id="mensagens" class="mensagens"></div>

        <form id="formResposta" class="chat-form">
          <textarea id="textoResposta" placeholder="Digite sua resposta."></textarea>
          <button type="submit">Responder</button>
        </form>
      </div>
    </section>
  </div>

  <script>
    const CHAT_ADMIN_SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const CHAT_ADMIN_SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseAdminChat = window.supabase.createClient(
      CHAT_ADMIN_SUPABASE_URL,
      CHAT_ADMIN_SUPABASE_KEY
    );

    const ADMIN_ID = "admin_master";
    const ADMIN_NOME = "FF Soluções";

    const listaConversasEl = document.getElementById("listaConversas");
    const estadoListaEl = document.getElementById("estadoLista");
    const filtroSistemaEl = document.getElementById("filtroSistema");
    const buscaNomeEl = document.getElementById("buscaNome");

    const chatVazioEl = document.getElementById("chatVazio");
    const chatPainelEl = document.getElementById("chatPainel");
    const chatTituloEl = document.getElementById("chatTitulo");
    const chatSubtituloEl = document.getElementById("chatSubtitulo");
    const chatStatusEl = document.getElementById("chatStatus");
    const mensagensEl = document.getElementById("mensagens");
    const formRespostaEl = document.getElementById("formResposta");
    const textoRespostaEl = document.getElementById("textoResposta");

    let todasMensagens = [];
    let conversasAgrupadas = [];
    let conversaAtual = null;
    let intervaloAtualizacao = null;
    let processandoAutoResposta = false;

    function escapeHtml(texto){
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatarData(dataIso){
      if(!dataIso) return "";
      const d = new Date(dataIso);
      return d.toLocaleString("pt-BR");
    }

    function resumoTexto(texto, max=90){
      texto = String(texto || "");
      return texto.length > max ? texto.slice(0, max) + "..." : texto;
    }

    function nomeSistemaBonito(sistemaId, sistemaNome){
      const base = String(sistemaNome || sistemaId || "").trim();
      const chave = String(sistemaId || "").trim().toLowerCase();

      if(base){
        if(chave === "ffsolucoes") return "FF Soluções";
        if(chave === "fffilmes") return "FF Filmes";
        return base;
      }

      if(chave === "ffsolucoes") return "FF Soluções";
      if(chave === "fffilmes") return "FF Filmes";
      if(chave === "hotel") return "Hotel";
      if(chave === "mercado") return "Mercado";
      if(chave === "bar") return "Bar";
      if(chave === "pizzaria") return "Pizzaria";
      if(chave === "loja") return "Loja";

      return "Sistema";
    }

    function agruparConversas(mensagens){
      const mapa = {};

      for(const msg of mensagens){
        const room = msg.chat_room_id;
        if(!room) continue;

        if(!mapa[room]){
          mapa[room] = {
            chat_room_id: room,
            app_id: msg.app_id || "",
            sistema_id: msg.sistema_id || "",
            sistema_nome: nomeSistemaBonito(msg.sistema_id, msg.sistema_nome),
            nome_cliente: msg.nome_cliente || "Cliente",
            ultima_mensagem: msg.mensagem || "",
            ultima_data: msg.created_at,
            nao_lidas: 0
          };
        }

        if(new Date(msg.created_at) > new Date(mapa[room].ultima_data)){
          mapa[room].ultima_mensagem = msg.mensagem || "";
          mapa[room].ultima_data = msg.created_at;
        }

        if(msg.nome_cliente && (!mapa[room].nome_cliente || mapa[room].nome_cliente === "Cliente")){
          mapa[room].nome_cliente = msg.nome_cliente;
        }

        if(msg.remetente === "visitante" && !msg.lida){
          mapa[room].nao_lidas++;
        }
      }

      return Object.values(mapa).sort((a,b) => new Date(b.ultima_data) - new Date(a.ultima_data));
    }

    function filtrarConversas(lista){
      const filtroSistema = (filtroSistemaEl.value || "").trim().toLowerCase();
      const busca = (buscaNomeEl.value || "").trim().toLowerCase();

      return lista.filter(item => {
        const okSistema = !filtroSistema || String(item.sistema_id || "").toLowerCase() === filtroSistema;
        const alvoBusca = `${item.nome_cliente} ${item.chat_room_id} ${item.sistema_nome} ${item.app_id} ${item.sistema_id}`.toLowerCase();
        const okBusca = !busca || alvoBusca.includes(busca);
        return okSistema && okBusca;
      });
    }

    function renderizarConversas(){
      const filtradas = filtrarConversas(conversasAgrupadas);
      listaConversasEl.innerHTML = "";

      if(!filtradas.length){
        estadoListaEl.textContent = "Nenhuma conversa encontrada.";
        return;
      }

      estadoListaEl.textContent = `${filtradas.length} conversa(s)`;

      for(const conversa of filtradas){
        const ativa = conversaAtual && conversaAtual.chat_room_id === conversa.chat_room_id;

        const div = document.createElement("div");
        div.className = "conversa-item" + (ativa ? " ativa" : "");
        div.innerHTML = `
          <div class="conversa-top">
            <div class="conversa-nome">${escapeHtml(conversa.nome_cliente || "Cliente")}</div>
            ${conversa.nao_lidas > 0 ? `<span class="badge-nao-lidas">${conversa.nao_lidas}</span>` : ""}
          </div>

          <div class="conversa-meta">
            <span class="mini-badge">${escapeHtml(conversa.sistema_nome || conversa.sistema_id || "-")}</span>
            ${conversa.app_id ? `<span class="mini-badge">app_id: ${escapeHtml(conversa.app_id)}</span>` : ""}
          </div>

          <div class="conversa-msg">${escapeHtml(resumoTexto(conversa.ultima_mensagem, 100))}</div>
          <div class="conversa-data">${escapeHtml(formatarData(conversa.ultima_data))}</div>
        `;

        div.addEventListener("click", () => abrirConversa(conversa));
        listaConversasEl.appendChild(div);
      }
    }

    function obterMensagensDaConversa(chatRoomId){
      return todasMensagens
        .filter(m => m.chat_room_id === chatRoomId)
        .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
    }

    function renderizarMensagens(chatRoomId){
      const lista = obterMensagensDaConversa(chatRoomId);
      mensagensEl.innerHTML = "";

      for(const msg of lista){
        const div = document.createElement("div");
        div.className = "msg " + (msg.remetente === "admin" ? "admin" : "visitante");

        const nomeExibicao =
          msg.remetente === "admin"
            ? (msg.nome_admin || ADMIN_NOME)
            : (msg.nome_cliente || "Visitante");

        div.innerHTML = `
          <div class="msg-nome">${escapeHtml(nomeExibicao)}</div>
          <div class="msg-texto">${escapeHtml(msg.mensagem)}</div>
          <div class="msg-meta">${escapeHtml(formatarData(msg.created_at))}</div>
        `;
        mensagensEl.appendChild(div);
      }

      requestAnimationFrame(() => {
        mensagensEl.scrollTop = mensagensEl.scrollHeight;
      });
    }

    function saudacaoPorHorario(){
      const hora = new Date().getHours();
      if(hora < 12) return "Olá, bom dia";
      if(hora < 18) return "Olá, boa tarde";
      return "Olá, boa noite";
    }

    function mensagemAutomaticaInicial(nomeCliente){
      const nome = String(nomeCliente || "cliente").trim();
      return `${saudacaoPorHorario()}, ${nome}!

Seja bem-vindo ao atendimento da FF Soluções.
Escolha uma opção e responda com o número:

1 - Dificuldade no sistema
2 - Cadastro / acesso
3 - Financeiro
4 - Falar com atendente`;
    }

    function respostaAutomaticaPorOpcao(texto){
      const t = String(texto || "").trim().toLowerCase();

      if(t === "1" || t.includes("dificuldade")){
        return `Você escolheu: Dificuldade no sistema.

Me diga qual sistema você está usando:
- Bar
- Pizzaria
- Loja
- Hotel
- FF Filmes
- FF Soluções

E me envie o problema com detalhes.`;
      }

      if(t === "2" || t.includes("cadastro") || t.includes("acesso") || t.includes("login")){
        return `Você escolheu: Cadastro / acesso.

Me envie:
- nome do sistema
- o que acontece na tela
- e, se puder, um print

Assim fica mais rápido resolver.`;
      }

      if(t === "3" || t.includes("financeiro") || t.includes("pagamento") || t.includes("renovação") || t.includes("renovacao") || t.includes("fatura")){
        return `Você escolheu: Financeiro.

Selecione o assunto:
1 - Renovação
2 - PIX
3 - Cartão
4 - Cobrança
5 - Outro assunto financeiro`;
      }

      if(t === "4" || t.includes("atendente") || t.includes("humano")){
        return `Certo. Seu atendimento foi encaminhado para um atendente.
Aguarde um instante que vamos responder por aqui.`;
      }

      if(
        t === "1 - renovação" || t === "1- renovação" || t === "1-renovação" ||
        t === "1 - renovacao" || t === "1- renovacao" || t === "1-renovacao"
      ){
        return `Sobre renovação:
Me informe o e-mail, nome do sistema ou app_id para eu localizar mais rápido.`;
      }

      if(t === "2 - pix" || t === "2- pix" || t === "2-pix" || t === "pix"){
        return `Sobre PIX:
Me diga se o PIX foi gerado, pago ou se está com erro para liberar o acesso.`;
      }

      if(
        t === "3 - cartão" || t === "3- cartão" || t === "3-cartão" ||
        t === "3 - cartao" || t === "3- cartao" || t === "3-cartao"
      ){
        return `Sobre cartão:
Me informe se o problema é no pagamento, aprovação ou liberação do sistema.`;
      }

      if(
        t === "4 - cobrança" || t === "4- cobrança" || t === "4-cobrança" ||
        t === "4 - cobranca" || t === "4- cobranca" || t === "4-cobranca"
      ){
        return `Sobre cobrança:
Me informe o nome do cliente e qual cobrança você quer verificar.`;
      }

      return null;
    }

    async function marcarComoLida(chatRoomId){
      if(!chatRoomId) return;

      const { error } = await supabaseAdminChat
        .from("chat_mensagens")
        .update({ lida: true })
        .eq("chat_room_id", chatRoomId)
        .eq("remetente", "visitante")
        .eq("lida", false);

      if(error){
        console.error("Erro ao marcar como lida:", error);
      }
    }

    async function abrirConversa(conversa){
      conversaAtual = conversa;

      chatVazioEl.style.display = "none";
      chatPainelEl.style.display = "flex";

      chatTituloEl.textContent = conversa.nome_cliente || "Cliente";
      chatSubtituloEl.textContent =
        `Sistema: ${conversa.sistema_nome || conversa.sistema_id || "-"}`
        + ` | app_id: ${conversa.app_id || "-"}`
        + ` | sala: ${conversa.chat_room_id || "-"}`;

      chatStatusEl.textContent = "Abrindo conversa...";

      renderizarConversas();
      renderizarMensagens(conversa.chat_room_id);
      await marcarComoLida(conversa.chat_room_id);
      await carregarConversas(true);

      chatStatusEl.textContent = "Conversa atualizada";
    }

    async function enviarResposta(texto){
      if(!conversaAtual || !texto) return;

      const payload = {
        app_id: conversaAtual.app_id || null,
        sistema_id: conversaAtual.sistema_id || null,
        sistema_nome: conversaAtual.sistema_nome || null,
        origem: conversaAtual.sistema_id || null,
        chat_room_id: conversaAtual.chat_room_id,
        nome_cliente: conversaAtual.nome_cliente || "Cliente",
        nome_admin: ADMIN_NOME,
        remetente: "admin",
        remetente_id: ADMIN_ID,
        mensagem: texto,
        lida: true
      };

      const { error } = await supabaseAdminChat
        .from("chat_mensagens")
        .insert(payload);

      if(error) throw error;
    }

    async function enviarRespostaAutomaticaParaConversa(conversa, texto){
      if(!conversa || !texto) return;

      const payload = {
        app_id: conversa.app_id || null,
        sistema_id: conversa.sistema_id || null,
        sistema_nome: conversa.sistema_nome || null,
        origem: conversa.sistema_id || null,
        chat_room_id: conversa.chat_room_id,
        nome_cliente: conversa.nome_cliente || "Cliente",
        nome_admin: ADMIN_NOME,
        remetente: "admin",
        remetente_id: ADMIN_ID,
        mensagem: texto,
        lida: true
      };

      const { error } = await supabaseAdminChat
        .from("chat_mensagens")
        .insert(payload);

      if(error){
        console.error("Erro ao enviar auto resposta:", error);
      }
    }

    function adminJaMandouBoasVindas(mensagensAdmin){
      return mensagensAdmin.some(m => {
        const txt = String(m.mensagem || "").toLowerCase();
        return txt.includes("seja bem-vindo ao atendimento") && txt.includes("escolha uma opção");
      });
    }

    async function processarMensagensAutomaticas(){
      if(processandoAutoResposta) return;
      processandoAutoResposta = true;

      try{
        const conversas = agruparConversas(todasMensagens);

        for(const conversa of conversas){
          const mensagensConversa = obterMensagensDaConversa(conversa.chat_room_id);
          if(!mensagensConversa.length) continue;

          const mensagensVisitante = mensagensConversa.filter(m => m.remetente === "visitante");
          const mensagensAdmin = mensagensConversa.filter(m => m.remetente === "admin");

          if(!mensagensVisitante.length) continue;

          const primeiraMensagemVisitante = mensagensVisitante[0];
          const ultimaMensagemVisitante = mensagensVisitante[mensagensVisitante.length - 1];
          const ultimaMensagemAdmin = mensagensAdmin.length ? mensagensAdmin[mensagensAdmin.length - 1] : null;

          if(!adminJaMandouBoasVindas(mensagensAdmin)){
            const textoInicial = mensagemAutomaticaInicial(
              conversa.nome_cliente || primeiraMensagemVisitante.nome_cliente || "Cliente"
            );
            await enviarRespostaAutomaticaParaConversa(conversa, textoInicial);
            continue;
          }

          if(
            ultimaMensagemVisitante &&
            (!ultimaMensagemAdmin || new Date(ultimaMensagemVisitante.created_at) > new Date(ultimaMensagemAdmin.created_at))
          ){
            const respostaAuto = respostaAutomaticaPorOpcao(ultimaMensagemVisitante.mensagem);

            if(respostaAuto){
              const jaExisteRespostaDepois = mensagensAdmin.some(m =>
                String(m.mensagem || "").trim() === respostaAuto.trim() &&
                new Date(m.created_at) > new Date(ultimaMensagemVisitante.created_at)
              );

              if(!jaExisteRespostaDepois){
                await enviarRespostaAutomaticaParaConversa(conversa, respostaAuto);
              }
            }
          }
        }
      }catch(err){
        console.error("Erro no auto atendimento:", err);
      }finally{
        processandoAutoResposta = false;
      }
    }

    async function carregarConversas(manterSelecao = true){
      try{
        const { data, error } = await supabaseAdminChat
          .from("chat_mensagens")
          .select("*")
          .order("created_at", { ascending: false })
          .limit(2000);

        if(error) throw error;

        todasMensagens = Array.isArray(data) ? data : [];

        await processarMensagensAutomaticas();

        const { data: dataAtualizada, error: errorAtualizado } = await supabaseAdminChat
          .from("chat_mensagens")
          .select("*")
          .order("created_at", { ascending: false })
          .limit(2000);

        if(errorAtualizado) throw errorAtualizado;

        todasMensagens = Array.isArray(dataAtualizada) ? dataAtualizada : [];
        conversasAgrupadas = agruparConversas(todasMensagens);

        if(manterSelecao && conversaAtual){
          const novaAtual = conversasAgrupadas.find(c => c.chat_room_id === conversaAtual.chat_room_id);
          if(novaAtual){
            conversaAtual = novaAtual;
            chatTituloEl.textContent = novaAtual.nome_cliente || "Cliente";
            chatSubtituloEl.textContent =
              `Sistema: ${novaAtual.sistema_nome || novaAtual.sistema_id || "-"}`
              + ` | app_id: ${novaAtual.app_id || "-"}`
              + ` | sala: ${novaAtual.chat_room_id || "-"}`;
            renderizarMensagens(novaAtual.chat_room_id);
          }
        }

        renderizarConversas();
      }catch(err){
        console.error(err);
        estadoListaEl.textContent = "Erro ao carregar conversas.";
      }
    }

    formRespostaEl.addEventListener("submit", async function(e){
      e.preventDefault();

      const texto = (textoRespostaEl.value || "").trim();
      if(!texto || !conversaAtual) return;

      const btn = formRespostaEl.querySelector("button");
      btn.disabled = true;
      btn.textContent = "Enviando...";
      chatStatusEl.textContent = "Enviando resposta...";

      try{
        await enviarResposta(texto);
        textoRespostaEl.value = "";
        await carregarConversas(true);
        renderizarMensagens(conversaAtual.chat_room_id);
        chatStatusEl.textContent = "Resposta enviada";
      }catch(err){
        console.error(err);
        alert("Erro ao enviar resposta.");
        chatStatusEl.textContent = "Erro ao enviar";
      }finally{
        btn.disabled = false;
        btn.textContent = "Responder";
      }
    });

    textoRespostaEl.addEventListener("keydown", function(e){
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        formRespostaEl.requestSubmit();
      }
    });

    filtroSistemaEl.addEventListener("change", renderizarConversas);
    buscaNomeEl.addEventListener("input", renderizarConversas);

    async function iniciarPainel(){
      await carregarConversas(false);

      if(intervaloAtualizacao) clearInterval(intervaloAtualizacao);
      intervaloAtualizacao = setInterval(async () => {
        await carregarConversas(true);
        if(conversaAtual){
          chatStatusEl.textContent = "Atualizado às " + new Date().toLocaleTimeString("pt-BR");
        }
      }, 3000);
    }

    iniciarPainel();
  </script>
</body>
</html>
