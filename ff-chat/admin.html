<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#020617;
      color:#fff;
      height:100vh;
      overflow:hidden;
    }

    .topo{
      position:sticky;
      top:0;
      z-index:50;
      padding:16px 20px;
      background:#0f172a;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .topo h1{
      font-size:22px;
      font-weight:900;
    }

    .topo small{
      display:block;
      color:#94a3b8;
      margin-top:4px;
    }

    .topo-right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .filtro,.busca{
      background:#020617;
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      border-radius:12px;
      padding:12px 14px;
      outline:none;
      min-width:160px;
    }

    .wrap{
      display:grid;
      grid-template-columns:360px 1fr;
      height:calc(100vh - 79px);
      min-height:0;
    }

    .sidebar{
      border-right:1px solid rgba(255,255,255,.08);
      background:#081126;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
    }

    .sidebar-head{
      position:sticky;
      top:0;
      z-index:5;
      padding:14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      font-weight:800;
      color:#cbd5e1;
      background:#081126;
    }

    .lista-conversas{
      overflow:auto;
      flex:1;
      min-height:0;
    }

    .conversa-item{
      padding:14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      cursor:pointer;
      transition:.15s;
    }

    .conversa-item:hover{
      background:rgba(255,255,255,.04);
    }

    .conversa-item.ativa{
      background:rgba(34,197,94,.12);
      border-left:4px solid #22c55e;
      padding-left:10px;
    }

    .conversa-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:6px;
    }

    .conversa-nome{
      font-weight:900;
      font-size:15px;
      color:#fff;
    }

    .badge-nao-lidas{
      background:#ef4444;
      color:#fff;
      border-radius:999px;
      padding:3px 8px;
      font-size:11px;
      font-weight:900;
      min-width:22px;
      text-align:center;
    }

    .conversa-meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-bottom:8px;
    }

    .mini-badge{
      font-size:11px;
      color:#cbd5e1;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:4px 8px;
    }

    .conversa-msg{
      font-size:13px;
      color:#cbd5e1;
      line-height:1.45;
      margin-bottom:8px;
      word-break:break-word;
    }

    .conversa-data{
      font-size:12px;
      color:#94a3b8;
    }

    .chat-area{
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
      overflow:hidden;
      background:#020617;
    }

    .chat-head{
      position:sticky;
      top:0;
      z-index:5;
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:#0b1220;
    }

    .chat-head h2{
      font-size:20px;
      font-weight:900;
      margin-bottom:4px;
    }

    .chat-head .sub{
      color:#94a3b8;
      font-size:13px;
      line-height:1.4;
      word-break:break-word;
    }

    .status-online{
      color:#22c55e;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .mensagens{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .msg{
      max-width:78%;
      padding:12px 14px;
      border-radius:16px;
      word-break:break-word;
      white-space:pre-wrap;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }

    .msg.visitante{
      align-self:flex-start;
      background:#1e293b;
      border-top-left-radius:4px;
    }

    .msg.admin{
      align-self:flex-end;
      background:linear-gradient(135deg,#16a34a,#15803d);
      border-top-right-radius:4px;
    }

    .msg-nome{
      font-size:12px;
      font-weight:900;
      margin-bottom:6px;
      opacity:.95;
    }

    .msg-texto{
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
    }

    .msg-meta{
      font-size:11px;
      margin-top:8px;
      opacity:.82;
    }

    .chat-form{
      position:sticky;
      bottom:0;
      z-index:5;
      padding:12px;
      background:#0b1220;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:10px;
      align-items:flex-end;
    }

    .chat-form textarea{
      flex:1;
      min-height:56px;
      max-height:160px;
      resize:vertical;
      outline:none;
      border-radius:16px;
      padding:14px;
      background:#020617;
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      font-family:Arial,Helvetica,sans-serif;
      font-size:14px;
    }

    .chat-form button{
      border:none;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
      font-weight:900;
      border-radius:14px;
      padding:14px 18px;
      cursor:pointer;
      min-width:120px;
    }

    .chat-form button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .vazio{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#94a3b8;
      padding:24px;
    }

    .estado{
      padding:10px 14px;
      font-size:13px;
      color:#cbd5e1;
    }

    @media(max-width:900px){
      body{overflow:auto}
      .wrap{
        grid-template-columns:1fr;
        height:auto;
        min-height:calc(100vh - 79px);
      }
      .sidebar{
        min-height:260px;
        max-height:260px;
      }
      .chat-area{
        min-height:calc(100vh - 339px);
        height:auto;
      }
      .msg{
        max-width:88%;
      }
    }
  </style>
</head>
<body>

  <div class="topo">
    <div>
      <h1>Painel Admin Chat</h1>
      <small>Recebe e responde os chats dos visitantes</small>
    </div>

    <div class="topo-right">
      <select id="filtroSistema" class="filtro">
        <option value="">Todos os sistemas</option>
        <option value="fffilmes">FF Filmes</option>
        <option value="ffsolucoes">FF Soluções</option>
        <option value="hotel">Hotel</option>
        <option value="mercado">Mercado</option>
        <option value="bar">Bar</option>
        <option value="pizzaria">Pizzaria</option>
        <option value="loja">Loja</option>
      </select>

      <input id="buscaNome" class="busca" type="text" placeholder="Buscar cliente">
    </div>
  </div>

  <div class="wrap">
    <aside class="sidebar">
      <div class="sidebar-head">Conversas</div>
      <div id="estadoLista" class="estado">Carregando conversas.</div>
      <div id="listaConversas" class="lista-conversas"></div>
    </aside>

    <section class="chat-area">
      <div id="chatVazio" class="vazio">
        <div>
          <h2 style="margin-bottom:8px;">Nenhuma conversa selecionada</h2>
          <p>Escolha uma conversa na lateral para visualizar e responder.</p>
        </div>
      </div>

      <div id="chatPainel" style="display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden;">
        <div class="chat-head">
          <div>
            <h2 id="chatTitulo">Cliente</h2>
            <div class="sub" id="chatSubtitulo">---</div>
          </div>
          <div class="status-online" id="chatStatus">Atualizando.</div>
        </div>

        <div id="mensagens" class="mensagens"></div>

        <form id="formResposta" class="chat-form">
          <textarea id="textoResposta" placeholder="Digite sua resposta"></textarea>
          <button type="submit">Responder</button>
        </form>
      </div>
    </section>
  </div>

  <script>
    const CHAT_ADMIN_SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const CHAT_ADMIN_SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const TELEFONE_ADMIN = "5588999999999";
    const LINK_PAINEL_MOBILE = "https://www.ffsolucoes.com.br/SEU-PAINEL-ADMIN.html";

    const supabaseAdminChat = window.supabase.createClient(
      CHAT_ADMIN_SUPABASE_URL,
      CHAT_ADMIN_SUPABASE_KEY
    );

    const ADMIN_ID = "admin_master";
    const ADMIN_NOME = "FF Soluções";

    const listaConversasEl = document.getElementById("listaConversas");
    const estadoListaEl = document.getElementById("estadoLista");
    const filtroSistemaEl = document.getElementById("filtroSistema");
    const buscaNomeEl = document.getElementById("buscaNome");

    const chatVazioEl = document.getElementById("chatVazio");
    const chatPainelEl = document.getElementById("chatPainel");
    const chatTituloEl = document.getElementById("chatTitulo");
    const chatSubtituloEl = document.getElementById("chatSubtitulo");
    const chatStatusEl = document.getElementById("chatStatus");
    const mensagensEl = document.getElementById("mensagens");
    const formRespostaEl = document.getElementById("formResposta");
    const textoRespostaEl = document.getElementById("textoResposta");

    let todasMensagens = [];
    let conversasAgrupadas = [];
    let conversaAtual = null;
    let intervaloAtualizacao = null;
    let processandoAutoResposta = false;

    const avisadosWhats = new Set();

    function escapeHtml(texto){
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatarData(dataIso){
      if(!dataIso) return "";
      const d = new Date(dataIso);
      return d.toLocaleString("pt-BR");
    }

    function resumoTexto(texto, max=90){
      texto = String(texto || "");
      return texto.length > max ? texto.slice(0, max) + "..." : texto;
    }

    function nomeSistemaBonito(sistemaId, sistemaNome){
      const base = String(sistemaNome || sistemaId || "").trim();
      const chave = String(sistemaId || "").trim().toLowerCase();

      if(base){
        if(chave === "ffsolucoes") return "FF Soluções";
        if(chave === "fffilmes") return "FF Filmes";
        return base;
      }

      if(chave === "ffsolucoes") return "FF Soluções";
      if(chave === "fffilmes") return "FF Filmes";
      if(chave === "hotel") return "Hotel";
      if(chave === "mercado") return "Mercado";
      if(chave === "bar") return "Bar";
      if(chave === "pizzaria") return "Pizzaria";
      if(chave === "loja") return "Loja";

      return "Sistema";
    }

    function removerMarcadoresFluxo(texto){
      return String(texto || "")
        .replace(/\[#etapa:[^\]]+\]/gi, "")
        .replace(/\[#dados:[^\]]+\]/gi, "")
        .trim();
    }

    function limparTextoFluxo(texto){
      return removerMarcadoresFluxo(texto).toLowerCase();
    }

    function extrairEtapaDaMensagem(texto){
      const match = String(texto || "").match(/\[#etapa:([^\]]+)\]/i);
      return match ? match[1].trim().toLowerCase() : null;
    }

    function obterUltimaEtapaDoAdmin(mensagensAdmin){
      for(let i = mensagensAdmin.length - 1; i >= 0; i--){
        const etapa = extrairEtapaDaMensagem(mensagensAdmin[i].mensagem);
        if(etapa) return etapa;
      }
      return null;
    }

    function extrairUltimoTelefone(mensagensAdmin){
      for(let i = mensagensAdmin.length - 1; i >= 0; i--){
        const txt = String(mensagensAdmin[i].mensagem || "");
        const match = txt.match(/\[#dados:telefone=([^\]]+)\]/i);
        if(match) return match[1].trim();
      }
      return "";
    }

    function extrairUltimoDocumento(mensagensAdmin){
      for(let i = mensagensAdmin.length - 1; i >= 0; i--){
        const txt = String(mensagensAdmin[i].mensagem || "");
        const match = txt.match(/\[#dados:documento=([^\]]+)\]/i);
        if(match) return match[1].trim();
      }
      return "";
    }

    function saudacaoPorHorario(){
      const hora = new Date().getHours();
      if(hora < 12) return "Olá, bom dia";
      if(hora < 18) return "Olá, boa tarde";
      return "Olá, boa noite";
    }

    function mensagemAutomaticaInicial(nomeCliente){
      const nome = String(nomeCliente || "cliente").trim();

      return `${saudacaoPorHorario()}, ${nome}!

Seja bem-vindo ao atendimento da FF Soluções.

Escolha uma opção:

1 - Dificuldade no sistema

2 - Cadastro / acesso

3 - Financeiro

4 - Falar com atendente

Responda com o número da opção.

[#etapa:menu_principal]`;
    }

    function adminJaMandouBoasVindas(mensagensAdmin){
      return mensagensAdmin.some(m => {
        const txt = String(m.mensagem || "").toLowerCase();
        return txt.includes("seja bem-vindo ao atendimento") && txt.includes("[#etapa:menu_principal]");
      });
    }

    function agruparConversas(mensagens){
      const mapa = {};

      for(const msg of mensagens){
        const room = msg.chat_room_id;
        if(!room) continue;

        if(!mapa[room]){
          mapa[room] = {
            chat_room_id: room,
            app_id: msg.app_id || "",
            sistema_id: msg.sistema_id || "",
            sistema_nome: nomeSistemaBonito(msg.sistema_id, msg.sistema_nome),
            nome_cliente: msg.nome_cliente || "Cliente",
            ultima_mensagem: msg.mensagem || "",
            ultima_data: msg.created_at,
            nao_lidas: 0
          };
        }

        if(new Date(msg.created_at) > new Date(mapa[room].ultima_data)){
          mapa[room].ultima_mensagem = msg.mensagem || "";
          mapa[room].ultima_data = msg.created_at;
        }

        if(msg.nome_cliente && (!mapa[room].nome_cliente || mapa[room].nome_cliente === "Cliente")){
          mapa[room].nome_cliente = msg.nome_cliente;
        }

        if(msg.remetente === "visitante" && !msg.lida){
          mapa[room].nao_lidas++;
        }
      }

      return Object.values(mapa).sort((a,b) => new Date(b.ultima_data) - new Date(a.ultima_data));
    }

    function obterMensagensDaConversa(chatRoomId){
      return todasMensagens
        .filter(m => m.chat_room_id === chatRoomId)
        .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
    }

    function filtrarConversas(lista){
      const filtroSistema = (filtroSistemaEl.value || "").trim().toLowerCase();
      const busca = (buscaNomeEl.value || "").trim().toLowerCase();

      return lista.filter(item => {
        const okSistema = !filtroSistema || String(item.sistema_id || "").toLowerCase() === filtroSistema;
        const alvoBusca = `${item.nome_cliente} ${item.chat_room_id} ${item.sistema_nome} ${item.app_id} ${item.sistema_id}`.toLowerCase();
        const okBusca = !busca || alvoBusca.includes(busca);
        return okSistema && okBusca;
      });
    }

    function renderizarConversas(){
      const filtradas = filtrarConversas(conversasAgrupadas);
      listaConversasEl.innerHTML = "";

      if(!filtradas.length){
        estadoListaEl.textContent = "Nenhuma conversa encontrada.";
        return;
      }

      estadoListaEl.textContent = `${filtradas.length} conversa(s)`;

      for(const conversa of filtradas){
        const ativa = conversaAtual && conversaAtual.chat_room_id === conversa.chat_room_id;

        const div = document.createElement("div");
        div.className = "conversa-item" + (ativa ? " ativa" : "");
        div.innerHTML = `
          <div class="conversa-top">
            <div class="conversa-nome">${escapeHtml(conversa.nome_cliente || "Cliente")}</div>
            ${conversa.nao_lidas > 0 ? `<span class="badge-nao-lidas">${conversa.nao_lidas}</span>` : ""}
          </div>

          <div class="conversa-meta">
            <span class="mini-badge">${escapeHtml(conversa.sistema_nome || conversa.sistema_id || "-")}</span>
            ${conversa.app_id ? `<span class="mini-badge">app_id: ${escapeHtml(conversa.app_id)}</span>` : ""}
          </div>

          <div class="conversa-msg">${escapeHtml(resumoTexto(removerMarcadoresFluxo(conversa.ultima_mensagem), 100))}</div>
          <div class="conversa-data">${escapeHtml(formatarData(conversa.ultima_data))}</div>
        `;

        div.addEventListener("click", () => abrirConversa(conversa));
        listaConversasEl.appendChild(div);
      }
    }

    function renderizarMensagens(chatRoomId){
      const lista = obterMensagensDaConversa(chatRoomId);
      mensagensEl.innerHTML = "";

      for(const msg of lista){
        const div = document.createElement("div");
        div.className = "msg " + (msg.remetente === "admin" ? "admin" : "visitante");

        const nomeExibicao =
          msg.remetente === "admin"
            ? (msg.nome_admin || ADMIN_NOME)
            : (msg.nome_cliente || "Visitante");

        div.innerHTML = `
          <div class="msg-nome">${escapeHtml(nomeExibicao)}</div>
          <div class="msg-texto">${escapeHtml(removerMarcadoresFluxo(msg.mensagem))}</div>
          <div class="msg-meta">${escapeHtml(formatarData(msg.created_at))}</div>
        `;

        mensagensEl.appendChild(div);
      }

      requestAnimationFrame(() => {
        mensagensEl.scrollTop = mensagensEl.scrollHeight;
      });
    }

    function montarRespostaFluxo(etapaAtual, textoOriginal){
      const texto = limparTextoFluxo(textoOriginal);

      if(!etapaAtual || etapaAtual === "menu_principal"){
        if(texto === "1" || texto.includes("dificuldade") || texto.includes("erro") || texto.includes("problema")){
          return `Você escolheu: Dificuldade no sistema.

Qual sistema você está usando?

1 - Bar / Restaurante

2 - Pizzaria

3 - Loja

4 - Hotel

5 - FF Filmes

6 - Outro

[#etapa:dificuldade_sistema]`;
        }

        if(texto === "2" || texto.includes("cadastro") || texto.includes("acesso") || texto.includes("login") || texto.includes("senha")){
          return `Você escolheu: Cadastro / acesso.

Qual assunto?

1 - Não consigo entrar

2 - Esqueci senha

3 - Cadastro novo

4 - Usuário bloqueado

5 - Outro

[#etapa:cadastro_menu]`;
        }

        if(texto === "3" || texto.includes("financeiro") || texto.includes("pagamento") || texto.includes("fatura") || texto.includes("renovação") || texto.includes("renovacao") || texto.includes("pix") || texto.includes("cartão") || texto.includes("cartao")){
          return `Você escolheu: Financeiro.

Selecione o assunto:

1 - Renovação

2 - PIX

3 - Cartão

4 - Cobrança

5 - Cancelamento

6 - Outro

[#etapa:financeiro_menu]`;
        }

        if(texto === "4" || texto.includes("atendente") || texto.includes("humano")){
          return `Certo.

Antes de passar para um atendente, preciso de um dado rápido.

Informe seu telefone com DDD.
Exemplo: 89999999999

[#etapa:coletar_contato]`;
        }

        return `Não entendi a opção.

Escolha uma opção:

1 - Dificuldade no sistema

2 - Cadastro / acesso

3 - Financeiro

4 - Falar com atendente

[#etapa:menu_principal]`;
      }

      if(etapaAtual === "dificuldade_sistema"){
        let sistema = "";

        if(texto === "1" || texto.includes("bar") || texto.includes("restaurante")) sistema = "Bar / Restaurante";
        else if(texto === "2" || texto.includes("pizzaria")) sistema = "Pizzaria";
        else if(texto === "3" || texto.includes("loja")) sistema = "Loja";
        else if(texto === "4" || texto.includes("hotel")) sistema = "Hotel";
        else if(texto === "5" || texto.includes("ff filmes") || texto.includes("filmes")) sistema = "FF Filmes";
        else if(texto === "6" || texto.includes("outro")) sistema = "Outro";
        else sistema = textoOriginal.trim() || "Não informado";

        return `Entendi. Sistema informado: ${sistema}.

Agora me envie:
- o que aconteceu
- se aparece erro na tela
- e, se puder, um print

[#etapa:dificuldade_detalhes]`;
      }

      if(etapaAtual === "dificuldade_detalhes"){
        return `Perfeito. Recebi sua descrição.

Antes de passar para um atendente, informe seu telefone com DDD.
Exemplo: 89999999999

[#etapa:coletar_contato]`;
      }

      if(etapaAtual === "cadastro_menu"){
        if(texto === "1" || texto.includes("não consigo entrar") || texto.includes("nao consigo entrar") || texto.includes("login")){
          return `Certo. Sobre acesso ao sistema:

Me envie:
- nome do sistema
- e-mail ou usuário
- o que aparece na tela

[#etapa:cadastro_detalhes]`;
        }

        if(texto === "2" || texto.includes("senha")){
          return `Certo. Sobre senha:

Me envie:
- nome do sistema
- e-mail ou usuário cadastrado

[#etapa:cadastro_detalhes]`;
        }

        if(texto === "3" || texto.includes("cadastro novo")){
          return `Certo. Sobre cadastro novo:

Me envie:
- nome do cliente
- sistema desejado

    async function marcarComoLida(chatRoomId){
      if(!chatRoomId) return;

      const { error } = await supabaseAdminChat
        .from("chat_mensagens")
        .update({ lida: true })
        .eq("chat_room_id", chatRoomId)
        .eq("remetente", "visitante")
        .eq("lida", false);

      if(error){
        console.error("Erro ao marcar como lida:", error);
      }
    }

    async function abrirConversa(conversa){
      conversaAtual = conversa;

      chatVazioEl.style.display = "none";
      chatPainelEl.style.display = "flex";

      chatTituloEl.textContent = conversa.nome_cliente || "Cliente";
      chatSubtituloEl.textContent =
        `Sistema: ${conversa.sistema_nome || conversa.sistema_id || "-"}`
        + ` | app_id: ${conversa.app_id || "-"}`
        + ` | sala: ${conversa.chat_room_id || "-"}`;

      chatStatusEl.textContent = "Abrindo conversa...";

      renderizarConversas();
      renderizarMensagens(conversa.chat_room_id);
      await marcarComoLida(conversa.chat_room_id);
      await carregarConversas(true);

      chatStatusEl.textContent = "Conversa atualizada";
    }

    async function enviarResposta(texto){
      if(!conversaAtual || !texto) return;

      const payload = {
        app_id: conversaAtual.app_id || null,
        sistema_id: conversaAtual.sistema_id || null,
        sistema_nome: conversaAtual.sistema_nome || null,
        origem: conversaAtual.sistema_id || null,
        chat_room_id: conversaAtual.chat_room_id,
        nome_cliente: conversaAtual.nome_cliente || "Cliente",
        nome_admin: ADMIN_NOME,
        remetente: "admin",
        remetente_id: ADMIN_ID,
        mensagem: texto,
        lida: true
      };

      const { error } = await supabaseAdminChat
        .from("chat_mensagens")
        .insert(payload);

      if(error) throw error;
    }

    async function enviarRespostaAutomaticaParaConversa(conversa, texto){
      if(!conversa || !texto) return;

      const payload = {
        app_id: conversa.app_id || null,
        sistema_id: conversa.sistema_id || null,
        sistema_nome: conversa.sistema_nome || null,
        origem: conversa.sistema_id || null,
        chat_room_id: conversa.chat_room_id,
        nome_cliente: conversa.nome_cliente || "Cliente",
        nome_admin: ADMIN_NOME,
        remetente: "admin",
        remetente_id: ADMIN_ID,
        mensagem: texto,
        lida: true
      };

      const { error } = await supabaseAdminChat
        .from("chat_mensagens")
        .insert(payload);

      if(error){
        console.error("Erro ao enviar auto resposta:", error);
      }
    }

    function gerarLinkWhats(conversa, mensagensConversa){
      const mensagensAdmin = mensagensConversa.filter(m => m.remetente === "admin");
      const mensagensVisitante = mensagensConversa.filter(m => m.remetente === "visitante");

      const telefoneCliente = extrairUltimoTelefone(mensagensAdmin) || "Não informado";
      const documentoCliente = extrairUltimoDocumento(mensagensAdmin) || "Não informado";
      const ultimaMensagemVisitante = mensagensVisitante.length
        ? removerMarcadoresFluxo(mensagensVisitante[mensagensVisitante.length - 1].mensagem)
        : "Não informado";

      const texto = `🚨 NOVO ATENDIMENTO

👤 Cliente: ${conversa.nome_cliente || "Não informado"}
🏢 Sistema: ${conversa.sistema_nome || conversa.sistema_id || "Não informado"}
🆔 Sala: ${conversa.chat_room_id || "Não informado"}
📱 Telefone: ${telefoneCliente}
📄 Documento: ${documentoCliente}

💬 Última mensagem do cliente:
${ultimaMensagemVisitante}

👉 Abrir painel:
${LINK_PAINEL_MOBILE}`;

      return `https://wa.me/${TELEFONE_ADMIN}?text=${encodeURIComponent(texto)}`;
    }

    function verificarDisparoWhats(conversa, mensagensConversa){
      if(!conversa || !mensagensConversa.length) return;

      const mensagensAdmin = mensagensConversa.filter(m => m.remetente === "admin");
      if(!mensagensAdmin.length) return;

      const ultimaAdmin = mensagensAdmin[mensagensAdmin.length - 1];
      const ultimaEtapa = extrairEtapaDaMensagem(ultimaAdmin.mensagem || "");

      if(ultimaEtapa === "aguardando_humano" && !avisadosWhats.has(conversa.chat_room_id)){
        avisadosWhats.add(conversa.chat_room_id);
        const link = gerarLinkWhats(conversa, mensagensConversa);
        window.open(link, "_blank");
      }
    }

    async function processarMensagensAutomaticas(){
      if(processandoAutoResposta) return;
      processandoAutoResposta = true;

      try{
        const conversas = agruparConversas(todasMensagens);
        if(!conversas.length) return;

        for(const conversa of conversas.slice(0, 10)){
          const mensagensConversa = obterMensagensDaConversa(conversa.chat_room_id);
          if(!mensagensConversa.length) continue;

          const mensagensVisitante = mensagensConversa.filter(m => m.remetente === "visitante");
          const mensagensAdmin = mensagensConversa.filter(m => m.remetente === "admin");

          if(!mensagensVisitante.length) continue;

          const primeiraMensagemVisitante = mensagensVisitante[0];
          const ultimaMensagemVisitante = mensagensVisitante[mensagensVisitante.length - 1];
          const ultimaMensagemAdmin = mensagensAdmin.length ? mensagensAdmin[mensagensAdmin.length - 1] : null;

          if(!adminJaMandouBoasVindas(mensagensAdmin)){
            const textoInicial = mensagemAutomaticaInicial(
              conversa.nome_cliente || primeiraMensagemVisitante.nome_cliente || "Cliente"
            );

            await enviarRespostaAutomaticaParaConversa(conversa, textoInicial);

            todasMensagens.unshift({
              chat_room_id: conversa.chat_room_id,
              app_id: conversa.app_id || null,
              sistema_id: conversa.sistema_id || null,
              sistema_nome: conversa.sistema_nome || null,
              nome_cliente: conversa.nome_cliente || "Cliente",
              nome_admin: ADMIN_NOME,
              remetente: "admin",
              remetente_id: ADMIN_ID,
              mensagem: textoInicial,
              created_at: new Date().toISOString(),
              lida: true
            });

            continue;
          }

          if(
            ultimaMensagemVisitante &&
            (!ultimaMensagemAdmin || new Date(ultimaMensagemVisitante.created_at) > new Date(ultimaMensagemAdmin.created_at))
          ){
            const etapaAtual = obterUltimaEtapaDoAdmin(mensagensAdmin) || "menu_principal";
            const respostaAuto = montarRespostaFluxo(etapaAtual, ultimaMensagemVisitante.mensagem);

            if(respostaAuto){
              const ultimaAdminTexto = mensagensAdmin.length
                ? String(mensagensAdmin[mensagensAdmin.length - 1].mensagem || "").trim()
                : "";

              if(ultimaAdminTexto !== respostaAuto.trim()){
                await enviarRespostaAutomaticaParaConversa(conversa, respostaAuto);

                todasMensagens.unshift({
                  chat_room_id: conversa.chat_room_id,
                  app_id: conversa.app_id || null,
                  sistema_id: conversa.sistema_id || null,
                  sistema_nome: conversa.sistema_nome || null,
                  nome_cliente: conversa.nome_cliente || "Cliente",
                  nome_admin: ADMIN_NOME,
                  remetente: "admin",
                  remetente_id: ADMIN_ID,
                  mensagem: respostaAuto,
                  created_at: new Date().toISOString(),
                  lida: true
                });
              }
            }
          }
        }
      }catch(err){
        console.error("Erro no auto atendimento:", err);
      }finally{
        processandoAutoResposta = false;
      }
    }

    async function carregarConversas(manterSelecao = true){
      try{
        const { data, error } = await supabaseAdminChat
          .from("chat_mensagens")
          .select("*")
          .order("created_at", { ascending: false })
          .limit(120);

        if(error) throw error;

        todasMensagens = Array.isArray(data) ? data : [];

        await processarMensagensAutomaticas();

        conversasAgrupadas = agruparConversas(todasMensagens);

        for(const conversa of conversasAgrupadas.slice(0, 10)){
          const mensagensConversa = obterMensagensDaConversa(conversa.chat_room_id);
          verificarDisparoWhats(conversa, mensagensConversa);
        }

        if(manterSelecao && conversaAtual){
          const novaAtual = conversasAgrupadas.find(c => c.chat_room_id === conversaAtual.chat_room_id);
          if(novaAtual){
            conversaAtual = novaAtual;
            chatTituloEl.textContent = novaAtual.nome_cliente || "Cliente";
            chatSubtituloEl.textContent =
              `Sistema: ${novaAtual.sistema_nome || novaAtual.sistema_id || "-"}`
              + ` | app_id: ${novaAtual.app_id || "-"}`
              + ` | sala: ${novaAtual.chat_room_id || "-"}`;

            renderizarMensagens(novaAtual.chat_room_id);
          }
        }

        renderizarConversas();
      }catch(err){
        console.error(err);
        estadoListaEl.textContent = "Erro ao carregar conversas.";
      }
    }

    formRespostaEl.addEventListener("submit", async function(e){
      e.preventDefault();

      const texto = (textoRespostaEl.value || "").trim();
      if(!texto || !conversaAtual) return;

      const btn = formRespostaEl.querySelector("button");
      btn.disabled = true;
      btn.textContent = "Enviando...";
      chatStatusEl.textContent = "Enviando resposta...";

      try{
        await enviarResposta(texto);
        textoRespostaEl.value = "";
        await carregarConversas(true);
        renderizarMensagens(conversaAtual.chat_room_id);
        chatStatusEl.textContent = "Resposta enviada";
      }catch(err){
        console.error(err);
        alert("Erro ao enviar resposta.");
        chatStatusEl.textContent = "Erro ao enviar";
      }finally{
        btn.disabled = false;
        btn.textContent = "Responder";
      }
    });

    textoRespostaEl.addEventListener("keydown", function(e){
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        formRespostaEl.requestSubmit();
      }
    });

    filtroSistemaEl.addEventListener("change", renderizarConversas);
    buscaNomeEl.addEventListener("input", renderizarConversas);

    async function iniciarPainel(){
      await carregarConversas(false);

      if(intervaloAtualizacao) clearInterval(intervaloAtualizacao);
      intervaloAtualizacao = setInterval(async () => {
        await carregarConversas(true);
        if(conversaAtual){
          chatStatusEl.textContent = "Atualizado às " + new Date().toLocaleTimeString("pt-BR");
        }
      }, 500);
    }

    iniciarPainel();
  </script>
