<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FF Soluções Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#020617;
      --header1:#00b4ff;
      --header2:#0ea5e9;
      --text:#ffffff;
      --muted:#94a3b8;
      --real-vh:100vh;
      --topo-h:76px;
      --status-h:38px;
      --rodape-h:78px;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:var(--bg);
      -webkit-text-size-adjust:100%;
    }

    .app{
      width:100%;
      height:var(--real-vh);
      min-height:var(--real-vh);
      overflow:hidden;
      background:var(--bg);
    }

    .chat-area{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      background:linear-gradient(180deg,#081126,#020817);
    }

    .topo{
      flex-shrink:0;
      min-height:var(--topo-h);
      background:linear-gradient(135deg,var(--header1),var(--header2));
      padding:12px 14px 10px 14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      box-shadow:0 4px 20px rgba(0,0,0,.18);
      position:relative;
      z-index:3;
    }

    .topo strong{
      display:block;
      font-size:17px;
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex-shrink:0;
    }

    .topo small{
      display:block;
      margin-top:5px;
      font-size:13px;
      line-height:1.2;
      opacity:.96;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-height:16px;
      flex-shrink:0;
    }

    .status{
      flex-shrink:0;
      min-height:var(--status-h);
      padding:10px 12px;
      font-size:12px;
      color:#cbd5e1;
      background:#081126;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      position:relative;
      z-index:2;
    }

    .mensagens{
      flex:1;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background:linear-gradient(180deg,#081126,#020817);
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      scroll-behavior:smooth;
    }

    .msg{
      max-width:84%;
      padding:12px 14px;
      border-radius:16px;
      line-height:1.45;
      font-size:14px;
      word-break:break-word;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    .msg.visitante{
      align-self:flex-end;
      background:linear-gradient(135deg,#00b4ff,#0ea5e9);
      color:#fff;
    }

    .msg.admin{
      align-self:flex-start;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
    }

    .meta{
      margin-top:6px;
      font-size:11px;
      opacity:.82;
    }

    .vazio{
      text-align:center;
      color:var(--muted);
      padding:24px 14px;
      font-size:14px;
      line-height:1.5;
    }

    .rodape{
      flex-shrink:0;
      min-height:var(--rodape-h);
      padding:10px;
      background:#0b1327;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:8px;
      align-items:flex-end;
      padding-bottom:calc(10px + env(safe-area-inset-bottom, 0px));
      position:relative;
      z-index:3;
    }

    .rodape textarea{
      flex:1;
      min-height:52px;
      height:52px;
      max-height:120px;
      resize:none;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#020617;
      color:#fff;
      padding:12px;
      outline:none;
      font-size:16px;
      font-family:Arial,Helvetica,sans-serif;
      overflow:auto;
    }

    .rodape textarea::placeholder{
      color:#94a3b8;
    }

    .rodape button{
      border:none;
      min-width:92px;
      padding:12px 10px;
      border-radius:14px;
      background:linear-gradient(135deg,#00b4ff,#0ea5e9);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      height:52px;
      flex-shrink:0;
    }

    .rodape button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    @media (max-width:600px){
      :root{
        --topo-h:78px;
        --status-h:40px;
        --rodape-h:80px;
      }

      .topo{
        padding:12px 12px 10px 12px;
      }

      .msg{
        max-width:90%;
      }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="chat-area">
      <div class="topo">
        <strong>💬 FF Soluções</strong>
        <small id="nomeTopo">Conectando...</small>
      </div>

      <div class="status" id="statusChat">Preparando chat...</div>

      <div class="mensagens" id="mensagens">
        <div class="vazio" id="vazioChat">Envie sua mensagem para iniciar o atendimento.</div>
      </div>

      <form class="rodape" id="formChat">
        <textarea id="textoMensagem" placeholder="Digite sua mensagem..."></textarea>
        <button type="submit" id="btnEnviar">Enviar</button>
      </form>
    </div>
  </div>

  <script>
    const CHAT_SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const CHAT_SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseChat = window.supabase.createClient(
      CHAT_SUPABASE_URL,
      CHAT_SUPABASE_KEY
    );

    const CHAT_USER_KEY = "ff_chat_user";
    const CHAT_CONTEXT_KEY = "ff_chat_contexto";
    const NOME_KEY = "ff_chat_nome_cliente";

    const nomeTopo = document.getElementById("nomeTopo");
    const statusChat = document.getElementById("statusChat");
    const mensagensEl = document.getElementById("mensagens");
    const vazioChat = document.getElementById("vazioChat");
    const formChat = document.getElementById("formChat");
    const textoMensagem = document.getElementById("textoMensagem");
    const btnEnviar = document.getElementById("btnEnviar");

    let chatUser = null;
    let chatContexto = null;
    let pollingMensagens = null;
    let ultimaMensagemId = 0;
    let carregamentoInicialFeito = false;
    let buscandoMensagens = false;
    let ultimaQtdRenderizada = 0;

    function getViewportHeight(){
      if(window.visualViewport && window.visualViewport.height){
        return Math.round(window.visualViewport.height);
      }
      return Math.round(window.innerHeight || document.documentElement.clientHeight || screen.height);
    }

    function fixKeyboardViewport(){
      const vh = getViewportHeight();
      document.documentElement.style.setProperty("--real-vh", vh + "px");
    }

    function atualizarMedidasChat(){
      requestAnimationFrame(() => {
        const topo = document.querySelector(".topo");
        const status = document.getElementById("statusChat");
        const rodape = document.getElementById("formChat");

        document.documentElement.style.setProperty("--topo-h", ((topo && topo.offsetHeight) || 76) + "px");
        document.documentElement.style.setProperty("--status-h", ((status && status.offsetHeight) || 38) + "px");
        document.documentElement.style.setProperty("--rodape-h", ((rodape && rodape.offsetHeight) || 78) + "px");
      });
    }

    function ajustarAlturaTela(){
      fixKeyboardViewport();
      atualizarMedidasChat();
    }

    function getChatUser(){
      try{
        return JSON.parse(localStorage.getItem(CHAT_USER_KEY) || "null");
      }catch{
        return null;
      }
    }

    function getChatContexto(){
      try{
        return JSON.parse(localStorage.getItem(CHAT_CONTEXT_KEY) || "{}");
      }catch{
        return {};
      }
    }

    function escapeHtml(texto){
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatarData(dataIso){
      if(!dataIso) return "";
      return new Date(dataIso).toLocaleString("pt-BR");
    }

    function setStatus(texto){
      statusChat.textContent = texto || "";
    }

    function estaPertoDoFim(){
      const margem = 120;
      return (mensagensEl.scrollHeight - mensagensEl.scrollTop - mensagensEl.clientHeight) <= margem;
    }

    function rolarParaFim(suave = false){
      requestAnimationFrame(() => {
        mensagensEl.scrollTo({
          top: mensagensEl.scrollHeight,
          behavior: suave ? "smooth" : "auto"
        });
      });
    }

    function limparVazio(){
      if(vazioChat && vazioChat.parentNode){
        vazioChat.parentNode.removeChild(vazioChat);
      }
    }

    function criarMensagemElemento(msg){
      const ehVisitante = msg.remetente === "visitante";
      const nomeExibicao = ehVisitante
        ? (msg.nome_cliente || chatContexto.cliente_nome || "Você")
        : (msg.nome_admin || "Suporte");

      const div = document.createElement("div");
      div.className = "msg " + (ehVisitante ? "visitante" : "admin");
      div.dataset.msgId = String(msg.id || "");

      div.innerHTML = `
        <div>${escapeHtml(msg.mensagem)}</div>
        <div class="meta">
          ${escapeHtml(nomeExibicao)} • ${escapeHtml(formatarData(msg.created_at))}
        </div>
      `;

      return div;
    }

    function appendMensagens(lista, forcarScroll = false){
      if(!Array.isArray(lista) || !lista.length) return;

      limparVazio();

      const deveRolar = forcarScroll || estaPertoDoFim();
      const frag = document.createDocumentFragment();

      for(const msg of lista){
        if(msg.id && document.querySelector('[data-msg-id="' + String(msg.id) + '"]')){
          continue;
        }

        frag.appendChild(criarMensagemElemento(msg));

        const idNumerico = Number(msg.id);
        if(!Number.isNaN(idNumerico) && idNumerico > ultimaMensagemId){
          ultimaMensagemId = idNumerico;
        }
      }

      if(frag.childNodes.length){
        mensagensEl.appendChild(frag);
        ultimaQtdRenderizada = mensagensEl.querySelectorAll(".msg").length;

        if(deveRolar){
          rolarParaFim();
        }
      }
    }

    function renderizarInicial(lista){
      mensagensEl.innerHTML = "";

      if(!lista.length){
        mensagensEl.innerHTML = '<div class="vazio" id="vazioChat">Envie sua mensagem para iniciar o atendimento.</div>';
        ultimaQtdRenderizada = 0;
        return;
      }

      const frag = document.createDocumentFragment();

      for(const msg of lista){
        frag.appendChild(criarMensagemElemento(msg));

        const idNumerico = Number(msg.id);
        if(!Number.isNaN(idNumerico) && idNumerico > ultimaMensagemId){
          ultimaMensagemId = idNumerico;
        }
      }

      mensagensEl.appendChild(frag);
      ultimaQtdRenderizada = lista.length;
      rolarParaFim();
    }

    function validarSessao(){
      const params = new URLSearchParams(location.search);
      const autoLogin = params.get("auto_login") === "1";

      chatUser = getChatUser();
      chatContexto = getChatContexto();

      if(!autoLogin || !chatUser || !chatUser.numero || !chatContexto || !chatContexto.chat_room_id){
        nomeTopo.textContent = "Não conectado";
        setStatus("Sessão do chat não encontrada.");
        formChat.style.display = "none";
        mensagensEl.innerHTML = '<div class="vazio">Sessão inválida. Feche e abra o chat novamente.</div>';
        return false;
      }

      nomeTopo.textContent = "Atendendo: " + (chatUser.nome || chatContexto.cliente_nome || localStorage.getItem(NOME_KEY) || "Cliente");
      setStatus("Chat iniciado com sucesso.");
      return true;
    }

    async function carregarMensagensIniciais(){
      if(!chatContexto?.chat_room_id || buscandoMensagens) return;

      buscandoMensagens = true;
      try{
        const { data, error } = await supabaseChat
          .from("chat_mensagens")
          .select("id, mensagem, remetente, nome_cliente, nome_admin, created_at")
          .eq("chat_room_id", chatContexto.chat_room_id)
          .order("id", { ascending: false })
          .limit(40);

        if(error){
          console.error("Erro ao carregar mensagens iniciais:", error);
          setStatus("Erro ao carregar mensagens.");
          return;
        }

        const lista = Array.isArray(data) ? data.slice().reverse() : [];
        renderizarInicial(lista);
        carregamentoInicialFeito = true;
        setStatus("Chat carregado.");
      }finally{
        buscandoMensagens = false;
      }
    }

    async function buscarNovasMensagens(){
      if(!chatContexto?.chat_room_id || buscandoMensagens || !carregamentoInicialFeito) return;

      buscandoMensagens = true;
      try{
        let query = supabaseChat
          .from("chat_mensagens")
          .select("id, mensagem, remetente, nome_cliente, nome_admin, created_at")
          .eq("chat_room_id", chatContexto.chat_room_id)
          .order("id", { ascending: true });

        if(ultimaMensagemId > 0){
          query = query.gt("id", ultimaMensagemId);
        }else{
          query = query.limit(40);
        }

        const { data, error } = await query;

        if(error){
          console.error("Erro ao buscar novas mensagens:", error);
          setStatus("Erro ao atualizar mensagens.");
          return;
        }

        const lista = Array.isArray(data) ? data : [];
        if(lista.length){
          appendMensagens(lista, false);
          setStatus("Mensagens atualizadas.");
        }
      }finally{
        buscandoMensagens = false;
      }
    }

    async function enviarMensagem(texto){
      const payload = {
        app_id: chatContexto.app_id || null,
        sistema_id: chatContexto.sistema_id || "ffsolucoes",
        sistema_nome: chatContexto.sistema_nome || "FF Soluções",
        origem: chatContexto.origem || "ffsolucoes",
        chat_room_id: chatContexto.chat_room_id,
        nome_cliente: chatContexto.cliente_nome || chatUser.nome || localStorage.getItem(NOME_KEY) || "Cliente",
        remetente: "visitante",
        remetente_id: chatUser.numero || null,
        mensagem: texto,
        lida: false
      };

      const { data, error } = await supabaseChat
        .from("chat_mensagens")
        .insert(payload)
        .select("id, mensagem, remetente, nome_cliente, nome_admin, created_at")
        .single();

      if(error) throw error;

      return data || null;
    }

    formChat.addEventListener("submit", async function(e){
      e.preventDefault();

      const texto = (textoMensagem.value || "").trim();
      if(!texto) return;

      btnEnviar.disabled = true;
      btnEnviar.textContent = "Enviando...";
      setStatus("Enviando mensagem...");

      try{
        const msgCriada = await enviarMensagem(texto);

        textoMensagem.value = "";
        textoMensagem.style.height = "52px";
        atualizarMedidasChat();

        if(msgCriada){
          appendMensagens([msgCriada], true);
        }else{
          await buscarNovasMensagens();
        }

        setStatus("Mensagem enviada.");
        textoMensagem.focus();
      }catch(err){
        console.error("Erro ao enviar mensagem:", err);
        setStatus("Erro ao enviar mensagem.");
        alert("Erro ao enviar mensagem.");
      }finally{
        btnEnviar.disabled = false;
        btnEnviar.textContent = "Enviar";
      }
    });

    textoMensagem.addEventListener("keydown", function(e){
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        formChat.requestSubmit();
      }
    });

    textoMensagem.addEventListener("input", function(){
      this.style.height = "52px";
      this.style.height = Math.min(this.scrollHeight, 120) + "px";
      atualizarMedidasChat();
    });

    textoMensagem.addEventListener("focus", function(){
      setTimeout(() => {
        ajustarAlturaTela();
        rolarParaFim();
      }, 200);
    });

    textoMensagem.addEventListener("blur", function(){
      setTimeout(() => {
        ajustarAlturaTela();
      }, 200);
    });

    async function iniciar(){
      ajustarAlturaTela();

      if(!validarSessao()) return;

      await carregarMensagensIniciais();

      if(pollingMensagens) clearInterval(pollingMensagens);
      pollingMensagens = setInterval(async () => {
        await buscarNovasMensagens();
      }, 4000);
    }

    window.addEventListener("resize", () => {
      ajustarAlturaTela();
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        ajustarAlturaTela();
      }, 300);
    });

    if(window.visualViewport){
      window.visualViewport.addEventListener("resize", () => {
        ajustarAlturaTela();
      });

      window.visualViewport.addEventListener("scroll", () => {
        ajustarAlturaTela();
      });
    }

    iniciar();
  </script>
</body>
</html>
