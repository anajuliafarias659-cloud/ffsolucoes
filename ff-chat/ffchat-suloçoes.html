<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FF Soluções Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#020617;
      --header1:#00b4ff;
      --header2:#0ea5e9;
      --text:#ffffff;
      --muted:#94a3b8;
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --topo-real:110px;
      --rodape-real:84px;
      --vvh:100vh;
      --keyboard-offset:0px;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:var(--bg);
      -webkit-text-size-adjust:100%;
      overscroll-behavior:none;
      position:fixed;
      inset:0;
      touch-action:manipulation;
    }

    .app{
      position:fixed;
      inset:0;
      overflow:hidden;
      background:var(--bg);
      height:var(--vvh);
    }

    .cabecalho-fixo{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:9999;
      background:var(--bg);
      transform:translateY(0);
    }

    .topo{
      background:linear-gradient(135deg,var(--header1),var(--header2));
      padding:calc(var(--safe-top) + 12px) 14px 10px 14px;
      min-height:70px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      box-shadow:0 4px 20px rgba(0,0,0,.18);
    }

    .topo strong{
      display:block;
      font-size:17px;
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topo small{
      display:block;
      margin-top:5px;
      font-size:13px;
      line-height:1.2;
      opacity:.96;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-height:16px;
    }

    .status{
      min-height:40px;
      padding:10px 12px;
      font-size:12px;
      color:#cbd5e1;
      background:#081126;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .area-mensagens{
      position:fixed;
      left:0;
      right:0;
      top:var(--topo-real);
      bottom:calc(var(--rodape-real) + var(--keyboard-offset));
      overflow:hidden;
      background:linear-gradient(180deg,#081126,#020817);
      transition:bottom .18s ease;
    }

    .mensagens{
      width:100%;
      height:100%;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .msg{
      max-width:84%;
      padding:12px 14px;
      border-radius:16px;
      line-height:1.45;
      font-size:14px;
      word-break:break-word;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    .msg.visitante{
      align-self:flex-end;
      background:linear-gradient(135deg,#00b4ff,#0ea5e9);
      color:#fff;
    }

    .msg.admin{
      align-self:flex-start;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
    }

    .msg-texto{
      white-space:pre-wrap;
      line-height:1.55;
    }

    .meta{
      margin-top:6px;
      font-size:11px;
      opacity:.82;
    }

    .vazio{
      text-align:center;
      color:var(--muted);
      padding:24px 14px;
      font-size:14px;
      line-height:1.5;
    }

    .quick-actions{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:12px;
    }

    .quick-btn{
      width:100%;
      border:none;
      background:linear-gradient(135deg,#1d4ed8,#2563eb);
      color:#fff;
      padding:12px 14px;
      border-radius:12px;
      font-size:13px;
      font-weight:800;
      text-align:left;
      cursor:pointer;
      transition:.15s;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .quick-btn:hover{
      filter:brightness(1.05);
    }

    .quick-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .rodape-fixo{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:9999;
      min-height:84px;
      padding:10px;
      padding-bottom:calc(10px + var(--safe-bottom));
      background:#0b1327;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:8px;
      align-items:flex-end;
      transform:translateY(calc(var(--keyboard-offset) * -1));
      transition:transform .18s ease;
    }

    .rodape-fixo textarea{
      flex:1;
      min-height:52px;
      height:52px;
      max-height:120px;
      resize:none;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#020617;
      color:#fff;
      padding:12px;
      outline:none;
      font-size:16px;
      font-family:Arial,Helvetica,sans-serif;
      overflow:auto;
      -webkit-appearance:none;
      appearance:none;
    }

    .rodape-fixo textarea::placeholder{
      color:#94a3b8;
    }

    .rodape-fixo button{
      border:none;
      min-width:92px;
      padding:12px 10px;
      border-radius:14px;
      background:linear-gradient(135deg,#00b4ff,#0ea5e9);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      height:52px;
      flex-shrink:0;
    }

    .rodape-fixo button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

.quick-actions{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:12px;
}

.quick-btn{
  width:100%;
  border:none;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff;
  padding:12px 14px;
  border-radius:12px;
  font-size:13px;
  font-weight:800;
  text-align:left;
  cursor:pointer;
  transition:.15s;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
}

.quick-btn:hover{
  filter:brightness(1.05);
}

.quick-btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}
    @media (max-width:600px){
      .msg{max-width:90%}
      .topo{padding:calc(var(--safe-top) + 12px) 12px 10px 12px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="cabecalho-fixo" id="cabecalhoFixo">
      <div class="topo" id="topo">
        <strong>💬 FF Soluções</strong>
        <small id="nomeTopo">Conectando...</small>
      </div>
      <div class="status" id="statusChat">Preparando chat...</div>
    </div>

    <div class="area-mensagens" id="areaMensagens">
      <div class="mensagens" id="mensagens">
        <div class="vazio" id="vazioChat">Envie sua mensagem para iniciar o atendimento.</div>
      </div>
    </div>

    <form class="rodape-fixo" id="formChat">
      <textarea id="textoMensagem" placeholder="Digite sua mensagem..."></textarea>
      <button type="submit" id="btnEnviar">Enviar</button>
    </form>
  </div>

  <script>
    const CHAT_SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const CHAT_SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseChat = window.supabase.createClient(
      CHAT_SUPABASE_URL,
      CHAT_SUPABASE_KEY
    );

    const CHAT_USER_KEY = "ff_chat_user";
    const CHAT_CONTEXT_KEY = "ff_chat_contexto";
    const NOME_KEY = "ff_chat_nome_cliente";

    const nomeTopo = document.getElementById("nomeTopo");
    const statusChat = document.getElementById("statusChat");
    const mensagensEl = document.getElementById("mensagens");
    const formChat = document.getElementById("formChat");
    const textoMensagem = document.getElementById("textoMensagem");
    const btnEnviar = document.getElementById("btnEnviar");
    const cabecalhoFixo = document.getElementById("cabecalhoFixo");
    const areaMensagens = document.getElementById("areaMensagens");

    let chatUser = null;
    let chatContexto = null;
    let pollingMensagens = null;
    let ultimaMensagemId = 0;
    let carregamentoInicialFeito = false;
    let buscandoMensagens = false;

    function travarAlturasFixas(){
      const headerH = cabecalhoFixo ? cabecalhoFixo.offsetHeight : 110;
      const footerH = formChat ? formChat.offsetHeight : 84;

      document.documentElement.style.setProperty("--topo-real", headerH + "px");
      document.documentElement.style.setProperty("--rodape-real", footerH + "px");
    }

    function atualizarViewportVisual(){
      const vv = window.visualViewport;
      const altura = vv ? vv.height : window.innerHeight;
      const offsetTop = vv ? vv.offsetTop : 0;
      const keyboardOffset = Math.max(0, window.innerHeight - (altura + offsetTop));

      document.documentElement.style.setProperty("--vvh", altura + "px");
      document.documentElement.style.setProperty("--keyboard-offset", keyboardOffset + "px");

      travarAlturasFixas();
    }

    function getChatUser(){
      try{
        return JSON.parse(localStorage.getItem(CHAT_USER_KEY) || "null");
      }catch{
        return null;
      }
    }

    function getChatContexto(){
      try{
        return JSON.parse(localStorage.getItem(CHAT_CONTEXT_KEY) || "{}");
      }catch{
        return {};
      }
    }

    function escapeHtml(texto){
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatarData(dataIso){
      if(!dataIso) return "";
      return new Date(dataIso).toLocaleString("pt-BR");
    }

    function setStatus(texto){
      statusChat.textContent = texto || "";
    }

    function estaPertoDoFim(){
      const margem = 140;
      return (mensagensEl.scrollHeight - mensagensEl.scrollTop - mensagensEl.clientHeight) <= margem;
    }

    function rolarParaFim(suave = false){
      requestAnimationFrame(() => {
        mensagensEl.scrollTo({
          top: mensagensEl.scrollHeight,
          behavior: suave ? "smooth" : "auto"
        });
      });
    }

    function limparVazio(){
      const vazio = document.getElementById("vazioChat");
      if(vazio && vazio.parentNode){
        vazio.parentNode.removeChild(vazio);
      }
    }

    function removerMarcadoresChat(texto){
      return String(texto || "")
        .replace(/\[#etapa:[^\]]+\]/gi, "")
        .replace(/\[#dados:[^\]]+\]/gi, "")
        .replace(/\[#botoes:[^\]]+\]/gi, "")
        .trim();
    }

    function extrairBotoesMensagem(texto){
      const match = String(texto || "").match(/\[#botoes:([^\]]+)\]/i);
      if(!match) return [];

      return match[1]
        .split("|")
        .map(item => item.trim())
        .filter(Boolean);
    }

    async function enviarOpcaoRapida(texto){
      await enviarMensagem(texto);
      await buscarNovasMensagens();
    }

    function criarMensagemElemento(msg){
  const ehVisitante = msg.remetente === "visitante";
  const nomeExibicao = ehVisitante
    ? (msg.nome_cliente || chatContexto.cliente_nome || "Você")
    : (msg.nome_admin || "Suporte");

  const textoOriginal = String(msg.mensagem || "");
  const textoLimpo = removerMarcadoresChat(textoOriginal);
  const botoes = !ehVisitante ? extrairBotoesMensagem(textoOriginal) : [];

  const div = document.createElement("div");
  div.className = "msg " + (ehVisitante ? "visitante" : "admin");
  div.dataset.msgId = String(msg.id || "");

  div.innerHTML = `
    <div class="msg-texto">${escapeHtml(textoLimpo)}</div>
    <div class="meta">
      ${escapeHtml(nomeExibicao)} • ${escapeHtml(formatarData(msg.created_at))}
    </div>
  `;

  if(!ehVisitante && botoes.length){
    const areaBotoes = document.createElement("div");
    areaBotoes.className = "quick-actions";

    botoes.forEach(opcao => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "quick-btn";
      btn.textContent = opcao;

      btn.addEventListener("click", async () => {
        const numero = String(opcao).split("-")[0].trim();
        areaBotoes.querySelectorAll("button").forEach(b => b.disabled = true);
        setStatus("Enviando opção...");
        try{
          await enviarMensagem(numero);
          await buscarNovasMensagens();
          setStatus("Opção enviada.");
        }catch(err){
          console.error("Erro ao enviar opção:", err);
          areaBotoes.querySelectorAll("button").forEach(b => b.disabled = false);
          setStatus("Erro ao enviar opção.");
        }
      });

      areaBotoes.appendChild(btn);
    });

    div.appendChild(areaBotoes);
  }

  return div;
}

    function appendMensagens(lista, forcarScroll = false){
      if(!Array.isArray(lista) || !lista.length) return;

      limparVazio();

      const deveRolar = forcarScroll || estaPertoDoFim();
      const frag = document.createDocumentFragment();

      for(const msg of lista){
        if(msg.id && mensagensEl.querySelector('[data-msg-id="' + String(msg.id) + '"]')){
          continue;
        }

        frag.appendChild(criarMensagemElemento(msg));

        const idNumerico = Number(msg.id);
        if(!Number.isNaN(idNumerico) && idNumerico > ultimaMensagemId){
          ultimaMensagemId = idNumerico;
        }
      }

      if(frag.childNodes.length){
        mensagensEl.appendChild(frag);
        if(deveRolar){
          setTimeout(() => rolarParaFim(false), 20);
          setTimeout(() => rolarParaFim(false), 150);
        }
      }
    }

    function renderizarInicial(lista){
      mensagensEl.innerHTML = "";

      if(!lista.length){
        mensagensEl.innerHTML = '<div class="vazio" id="vazioChat">Envie sua mensagem para iniciar o atendimento.</div>';
        return;
      }

      const frag = document.createDocumentFragment();

      for(const msg of lista){
        frag.appendChild(criarMensagemElemento(msg));

        const idNumerico = Number(msg.id);
        if(!Number.isNaN(idNumerico) && idNumerico > ultimaMensagemId){
          ultimaMensagemId = idNumerico;
        }
      }

      mensagensEl.appendChild(frag);
      setTimeout(() => rolarParaFim(false), 30);
      setTimeout(() => rolarParaFim(false), 180);
    }

    function validarSessao(){
      const params = new URLSearchParams(location.search);
      const autoLogin = params.get("auto_login") === "1";

      chatUser = getChatUser();
      chatContexto = getChatContexto();

      if(!autoLogin || !chatUser || !chatUser.numero || !chatContexto || !chatContexto.chat_room_id){
        nomeTopo.textContent = "Não conectado";
        setStatus("Sessão do chat não encontrada.");
        formChat.style.display = "none";
        mensagensEl.innerHTML = '<div class="vazio">Sessão inválida. Feche e abra o chat novamente.</div>';
        return false;
      }

      nomeTopo.textContent = "Atendendo: " + (chatUser.nome || chatContexto.cliente_nome || localStorage.getItem(NOME_KEY) || "Cliente");
      setStatus("Chat iniciado com sucesso.");
      return true;
    }

    async function carregarMensagensIniciais(){
      if(!chatContexto?.chat_room_id || buscandoMensagens) return;

      buscandoMensagens = true;
      try{
        const { data, error } = await supabaseChat
          .from("chat_mensagens")
          .select("id, mensagem, remetente, nome_cliente, nome_admin, created_at")
          .eq("chat_room_id", chatContexto.chat_room_id)
          .order("id", { ascending: false })
          .limit(60);

        if(error){
          console.error("Erro ao carregar mensagens iniciais:", error);
          setStatus("Erro ao carregar mensagens.");
          return;
        }

        const lista = Array.isArray(data) ? data.slice().reverse() : [];
        renderizarInicial(lista);
        carregamentoInicialFeito = true;
        setStatus("Chat carregado.");
      }finally{
        buscandoMensagens = false;
      }
    }

    async function buscarNovasMensagens(){
      if(!chatContexto?.chat_room_id || buscandoMensagens || !carregamentoInicialFeito) return;

      buscandoMensagens = true;
      try{
        let query = supabaseChat
          .from("chat_mensagens")
          .select("id, mensagem, remetente, nome_cliente, nome_admin, created_at")
          .eq("chat_room_id", chatContexto.chat_room_id)
          .order("id", { ascending: true });

        if(ultimaMensagemId > 0){
          query = query.gt("id", ultimaMensagemId);
        }else{
          query = query.limit(60);
        }

        const { data, error } = await query;

        if(error){
          console.error("Erro ao buscar novas mensagens:", error);
          setStatus("Erro ao atualizar mensagens.");
          return;
        }

        const lista = Array.isArray(data) ? data : [];
        if(lista.length){
          appendMensagens(lista, false);
          setStatus("Mensagens atualizadas.");
        }
      }finally{
        buscandoMensagens = false;
      }
    }

    async function enviarMensagem(texto){
      const payload = {
        app_id: chatContexto.app_id || null,
        sistema_id: chatContexto.sistema_id || "ffsolucoes",
        sistema_nome: chatContexto.sistema_nome || "FF Soluções",
        origem: chatContexto.origem || "ffsolucoes",
        chat_room_id: chatContexto.chat_room_id,
        nome_cliente: chatContexto.cliente_nome || chatUser.nome || localStorage.getItem(NOME_KEY) || "Cliente",
        remetente: "visitante",
        remetente_id: chatUser.numero || null,
        mensagem: texto,
        lida: false
      };

      const { data, error } = await supabaseChat
        .from("chat_mensagens")
        .insert(payload)
        .select("id, mensagem, remetente, nome_cliente, nome_admin, created_at")
        .single();

      if(error) throw error;
      return data || null;
    }

    formChat.addEventListener("submit", async function(e){
      e.preventDefault();

      const texto = (textoMensagem.value || "").trim();
      if(!texto) return;

      btnEnviar.disabled = true;
      btnEnviar.textContent = "Enviando...";
      setStatus("Enviando mensagem...");

      try{
        const msgCriada = await enviarMensagem(texto);

        textoMensagem.value = "";
        textoMensagem.style.height = "52px";
        atualizarViewportVisual();

        if(msgCriada){
          appendMensagens([msgCriada], true);
        }else{
          await buscarNovasMensagens();
        }

        setStatus("Mensagem enviada.");
      }catch(err){
        console.error("Erro ao enviar mensagem:", err);
        setStatus("Erro ao enviar mensagem.");
        alert("Erro ao enviar mensagem.");
      }finally{
        btnEnviar.disabled = false;
        btnEnviar.textContent = "Enviar";
      }
    });

    textoMensagem.addEventListener("keydown", function(e){
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        formChat.requestSubmit();
      }
    });

    textoMensagem.addEventListener("input", function(){
      this.style.height = "52px";
      this.style.height = Math.min(this.scrollHeight, 120) + "px";
      atualizarViewportVisual();
    });

    textoMensagem.addEventListener("focus", function(){
      setTimeout(() => {
        atualizarViewportVisual();
        rolarParaFim(false);
      }, 120);

      setTimeout(() => {
        atualizarViewportVisual();
        rolarParaFim(false);
      }, 320);
    });

    textoMensagem.addEventListener("blur", function(){
      setTimeout(() => {
        atualizarViewportVisual();
      }, 250);
    });

    async function iniciar(){
      atualizarViewportVisual();
      travarAlturasFixas();

      if(!validarSessao()) return;

      await carregarMensagensIniciais();

      if(pollingMensagens) clearInterval(pollingMensagens);
      pollingMensagens = setInterval(async () => {
        await buscarNovasMensagens();
      }, 1000);
    }

    window.addEventListener("resize", () => {
      atualizarViewportVisual();
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        atualizarViewportVisual();
        rolarParaFim(false);
      }, 250);
    });

    if(window.visualViewport){
      window.visualViewport.addEventListener("resize", () => {
        atualizarViewportVisual();
      });

      window.visualViewport.addEventListener("scroll", () => {
        atualizarViewportVisual();
      });
    }

    iniciar();
  </script>
</body>
</html>
