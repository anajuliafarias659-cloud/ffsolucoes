<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FF Soluções Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#020617;
    }

    :root{
      --app-height:100dvh;
      --topo-h:72px;
      --status-h:38px;
      --rodape-h:76px;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#020617;
      color:#fff;
      overflow:hidden;
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      -webkit-text-size-adjust:100%;
    }

    .app{
      position:fixed;
      inset:0;
      width:100%;
      height:var(--app-height);
      overflow:hidden;
      background:#020617;
    }

    .topo{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:30;
      background:linear-gradient(135deg,#00b4ff,#0ea5e9);
      padding:16px;
      box-shadow:0 4px 20px rgba(0,0,0,.18);
      min-height:var(--topo-h);
    }

    .topo strong{
      display:block;
      font-size:17px;
      font-weight:900;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topo small{
      display:block;
      margin-top:5px;
      font-size:12px;
      opacity:.96;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .status{
      position:fixed;
      top:var(--topo-h);
      left:0;
      right:0;
      z-index:29;
      padding:10px 12px;
      font-size:12px;
      color:#cbd5e1;
      background:#081126;
      border-bottom:1px solid rgba(255,255,255,.06);
      min-height:var(--status-h);
      display:flex;
      align-items:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mensagens{
      position:fixed;
      top:calc(var(--topo-h) + var(--status-h));
      left:0;
      right:0;
      bottom:var(--rodape-h);
      overflow:auto;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background:linear-gradient(180deg,#081126,#020817);
      -webkit-overflow-scrolling:touch;
      scroll-behavior:smooth;
      overscroll-behavior:contain;
    }

    .msg{
      max-width:84%;
      padding:12px 14px;
      border-radius:16px;
      line-height:1.45;
      font-size:14px;
      word-break:break-word;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    .msg.visitante{
      align-self:flex-end;
      background:linear-gradient(135deg,#00b4ff,#0ea5e9);
      color:#fff;
    }

    .msg.admin{
      align-self:flex-start;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
    }

    .meta{
      margin-top:6px;
      font-size:11px;
      opacity:.82;
    }

    .vazio{
      text-align:center;
      color:#94a3b8;
      padding:24px 14px;
      font-size:14px;
      line-height:1.5;
    }

    .rodape{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:9999;
      padding:12px;
      background:#0b1327;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:10px;
      align-items:flex-end;
      min-height:var(--rodape-h);
      padding-bottom:calc(max(12px, env(safe-area-inset-bottom)));
      transform:translateZ(0);
    }

    .rodape textarea{
      flex:1;
      min-height:52px;
      height:52px;
      max-height:120px;
      resize:none;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#020617;
      color:#fff;
      padding:12px;
      outline:none;
      font-size:14px;
      font-family:Arial,Helvetica,sans-serif;
      overflow:auto;
    }

    .rodape textarea::placeholder{
      color:#94a3b8;
    }

    .rodape button{
      border:none;
      min-width:110px;
      padding:12px 14px;
      border-radius:14px;
      background:linear-gradient(135deg,#00b4ff,#0ea5e9);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      height:52px;
      flex-shrink:0;
    }

    .rodape button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    @media (max-width:600px){
      :root{
        --topo-h:70px;
        --status-h:38px;
        --rodape-h:78px;
      }

      .topo{
        padding:14px 12px;
      }

      .msg{
        max-width:90%;
      }

      .rodape{
        padding:10px;
        gap:8px;
        padding-bottom:calc(max(10px, env(safe-area-inset-bottom)));
      }

      .rodape button{
        min-width:92px;
        padding:12px 10px;
      }

      .rodape textarea{
        font-size:16px;
      }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="topo">
      <strong>💬 FF Soluções</strong>
      <small id="nomeTopo">Conectando...</small>
    </div>

    <div class="status" id="statusChat">Preparando chat...</div>

    <div class="mensagens" id="mensagens">
      <div class="vazio">Envie sua mensagem para iniciar o atendimento.</div>
    </div>

    <form class="rodape" id="formChat">
      <textarea id="textoMensagem" placeholder="Digite sua mensagem..."></textarea>
      <button type="submit">Enviar</button>
    </form>
  </div>

<script>
const CHAT_SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const CHAT_SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseChat = window.supabase.createClient(
  CHAT_SUPABASE_URL,

);

const nomeTopo = document.getElementById("nomeTopo");
const mensagensEl = document.getElementById("mensagens");
const formChat = document.getElementById("formChat");
const textoMensagem = document.getElementById("textoMensagem");

formChat.addEventListener("submit", async function(e){
  e.preventDefault();

  const texto = textoMensagem.value.trim();
  if(!texto) return;

  textoMensagem.value = "";

  const div = document.createElement("div");
  div.className = "msg visitante";
  div.innerHTML = texto;

  mensagensEl.appendChild(div);
