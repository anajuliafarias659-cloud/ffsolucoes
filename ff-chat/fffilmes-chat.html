<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FF Filmes Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#020617;
      color:#fff;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      height:100dvh;
    }

    .topo{
      background:linear-gradient(135deg,#22c55e,#16a34a);
      padding:16px;
      flex-shrink:0;
      position:sticky;
      top:0;
      z-index:30;
      box-shadow:0 4px 18px rgba(0,0,0,.22);
    }

    .topo strong{
      display:block;
      font-size:17px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .topo small{
      display:block;
      margin-top:5px;
      font-size:12px;
      opacity:.96;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .status{
      padding:10px 12px;
      font-size:12px;
      color:#cbd5e1;
      background:#081126;
      border-bottom:1px solid rgba(255,255,255,.06);
      min-height:38px;
      flex-shrink:0;
      position:sticky;
      top:58px;
      z-index:29;
    }

    .mensagens{
      flex:1;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background:linear-gradient(180deg,#081126,#020817);
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
    }

    .msg{
      max-width:84%;
      padding:12px 14px;
      border-radius:16px;
      line-height:1.45;
      font-size:14px;
      word-break:break-word;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    .msg.visitante{
      align-self:flex-end;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
    }

    .msg.admin{
      align-self:flex-start;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
    }

    .meta{
      margin-top:6px;
      font-size:11px;
      opacity:.82;
    }

    .vazio{
      text-align:center;
      color:#94a3b8;
      padding:24px 14px;
      font-size:14px;
      line-height:1.5;
    }

    .acoes-botoes{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .botao-resposta-chat{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      background:rgba(34,197,94,.14);
      color:#86efac;
      border:1px solid rgba(34,197,94,.35);
      font-weight:700;
      font-size:13px;
      cursor:pointer;
      transition:.15s ease;
    }

    .botao-resposta-chat:hover{
      transform:translateY(-1px);
      background:rgba(34,197,94,.22);
    }

    .botao-resposta-chat:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .rodape{
      padding:12px;
      padding-bottom:calc(12px + env(safe-area-inset-bottom));
      background:#0b1327;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:10px;
      flex-shrink:0;
      position:sticky;
      bottom:0;
      z-index:30;
    }

    .rodape textarea{
      flex:1;
      min-height:52px;
      max-height:120px;
      resize:none;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#020617;
      color:#fff;
      padding:12px;
      outline:none;
      font-size:14px;
      font-family:Arial,Helvetica,sans-serif;
    }

    .rodape textarea::placeholder{
      color:#94a3b8;
    }

    .rodape button{
      border:none;
      min-width:110px;
      padding:12px 14px;
      border-radius:14px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      flex-shrink:0;
    }

    .rodape button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    @media (max-width:640px){
      .msg{max-width:90%}
      .rodape{gap:8px}
      .rodape button{
        min-width:92px;
        padding:12px 10px;
      }
    }
  </style>
</head>
<body>

  <div class="topo">
    <strong>🎬 FFFILMES</strong>
    <small id="nomeTopo">Conectando...</small>
  </div>

  <div class="status" id="statusChat">Preparando chat...</div>

  <div class="mensagens" id="mensagens">
    <div class="vazio">Envie sua mensagem para iniciar o atendimento.</div>
  </div>

  <form class="rodape" id="formChat">
    <textarea id="textoMensagem" placeholder="Digite sua mensagem..."></textarea>
    <button type="submit">Enviar</button>
  </form>

  <script>
    const CHAT_SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const CHAT_SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseChat = window.supabase.createClient(
      CHAT_SUPABASE_URL,
      CHAT_SUPABASE_KEY
    );

    const CHAT_USER_KEY = "ff_chat_familia_user";
    const CHAT_CONTEXT_KEY = "ff_chat_contexto";
    const NOME_KEY = "ff_filmes_nome_cliente";

    const nomeTopo = document.getElementById("nomeTopo");
    const statusChat = document.getElementById("statusChat");
    const mensagensEl = document.getElementById("mensagens");
    const formChat = document.getElementById("formChat");
    const textoMensagem = document.getElementById("textoMensagem");

    let chatUser = null;
    let chatContexto = null;
    let pollingMensagens = null;
    let enviandoCliqueBotao = false;

    function getChatUser(){
      try{
        return JSON.parse(localStorage.getItem(CHAT_USER_KEY) || "null");
      }catch{
        return null;
      }
    }

    function getChatContexto(){
      try{
        return JSON.parse(localStorage.getItem(CHAT_CONTEXT_KEY) || "{}");
      }catch{
        return {};
      }
    }

    function escapeHtml(texto){
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatarData(dataIso){
      if(!dataIso) return "";
      return new Date(dataIso).toLocaleString("pt-BR");
    }

    function setStatus(texto){
      statusChat.textContent = texto || "";
    }

    function validarSessao(){
      const params = new URLSearchParams(location.search);
      const autoLogin = params.get("auto_login") === "1";

      chatUser = getChatUser();
      chatContexto = getChatContexto();

      if(!autoLogin || !chatUser || !chatUser.numero || !chatContexto || !chatContexto.chat_room_id){
        nomeTopo.textContent = "Não conectado";
        setStatus("Sessão do chat não encontrada.");
        formChat.style.display = "none";
        mensagensEl.innerHTML = '<div class="vazio">Sessão inválida. Feche e abra o chat novamente.</div>';
        return false;
      }

      nomeTopo.textContent = "Atendendo: " + (chatUser.nome || chatContexto.cliente_nome || "Cliente");
      setStatus("Chat iniciado com sucesso.");
      return true;
    }

    function extrairBotoesDaMensagem(texto){
      const match = String(texto || "").match(/\[#botoes:([^\]]+)\]/i);
      if(!match) return [];

      return match[1]
        .split("|")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function limparTextoDasOpcoes(texto, botoes = []){
      let limpo = String(texto || "");

      limpo = limpo
        .replace(/\[#etapa:[^\]]+\]/gi, "")
        .replace(/\[#dados:[^\]]+\]/gi, "")
        .replace(/\[#botoes:[^\]]+\]/gi, "");

      if(botoes.length){
        const linhas = limpo
          .split("\n")
          .map(l => l.trimEnd());

        const linhasFiltradas = linhas.filter(linha => {
          const base = linha.trim();
          if(!base) return true;

          const baseNormalizada = base
            .replace(/^\d+\s*[-.)]\s*/, "")
            .trim()
            .toLowerCase();

          const bateBotao = botoes.some(botao => {
            const botaoNormalizado = String(botao)
              .replace(/^\d+\s*[-.)]\s*/, "")
              .trim()
              .toLowerCase();

            return (
              base.toLowerCase() === String(botao).trim().toLowerCase() ||
              baseNormalizada === botaoNormalizado
            );
          });

          return !bateBotao;
        });

        limpo = linhasFiltradas.join("\n");
      }

      limpo = limpo
        .replace(/\n{3,}/g, "\n\n")
        .trim();

      return limpo;
    }

    function desabilitarBotoesDasMensagens(){
      document.querySelectorAll(".botao-resposta-chat").forEach(btn => {
        btn.disabled = true;
      });
    }

    async function enviarMensagem(texto){
      const payload = {
        app_id: chatContexto.app_id || null,
        sistema_id: chatContexto.sistema_id || "fffilmes",
        sistema_nome: chatContexto.sistema_nome || "FFFILMES",
        origem: chatContexto.origem || "fffilmes",
        chat_room_id: chatContexto.chat_room_id,
        nome_cliente: chatContexto.cliente_nome || chatUser.nome || "Cliente",
        remetente: "visitante",
        remetente_id: chatUser.numero || null,
        mensagem: texto,
        lida: false
      };

      const { error } = await supabaseChat
        .from("chat_mensagens")
        .insert(payload);

      if(error) throw error;
    }

    async function responderBotao(textoBotao, botaoEl){
      if(enviandoCliqueBotao) return;

      enviandoCliqueBotao = true;
      setStatus("Enviando resposta...");

      try{
        desabilitarBotoesDasMensagens();
        if(botaoEl) botaoEl.disabled = true;

        await enviarMensagem(textoBotao);
        await carregarMensagens();
        setStatus("Resposta enviada.");
      }catch(err){
        console.error("Erro ao enviar resposta por botão:", err);
        setStatus("Erro ao enviar resposta.");
        alert("Erro ao enviar resposta.");
      }finally{
        enviandoCliqueBotao = false;
      }
    }

    async function carregarMensagens(){
      if(!chatContexto?.chat_room_id) return;

      const { data, error } = await supabaseChat
        .from("chat_mensagens")
        .select("*")
        .eq("chat_room_id", chatContexto.chat_room_id)
        .order("created_at", { ascending: true });

      if(error){
        console.error("Erro ao carregar mensagens:", error);
        setStatus("Erro ao carregar mensagens.");
        return;
      }

      const lista = Array.isArray(data) ? data : [];
      mensagensEl.innerHTML = "";

      if(!lista.length){
        mensagensEl.innerHTML = '<div class="vazio">Envie sua mensagem para iniciar o atendimento.</div>';
        return;
      }

      for(const msg of lista){
        const div = document.createElement("div");
        div.className = "msg " + (msg.remetente === "visitante" ? "visitante" : "admin");

        const botoes = msg.remetente === "admin"
          ? extrairBotoesDaMensagem(msg.mensagem || "")
          : [];

        const textoLimpo = limparTextoDasOpcoes(msg.mensagem || "", botoes);

        let htmlTexto = "";
        if(textoLimpo){
          htmlTexto = `<div>${escapeHtml(textoLimpo).replace(/\n/g, "<br>")}</div>`;
        }

        let htmlBotoes = "";
        if(botoes.length){
          htmlBotoes = `
            <div class="acoes-botoes">
              ${botoes.map((botaoTexto, idx) => `
                <button
                  type="button"
                  class="botao-resposta-chat"
                  data-botao-texto="${escapeHtml(botaoTexto)}"
                  data-botao-idx="${idx}">
                  ${escapeHtml(botaoTexto)}
                </button>
              `).join("")}
            </div>
          `;
        }

        div.innerHTML = `
          ${htmlTexto}
          ${htmlBotoes}
          <div class="meta">
            ${escapeHtml(msg.remetente === "visitante" ? (msg.nome_cliente || "Você") : "Suporte")}
            • ${escapeHtml(formatarData(msg.created_at))}
          </div>
        `;

        div.querySelectorAll(".botao-resposta-chat").forEach(botao => {
          botao.addEventListener("click", async () => {
            const textoBotao = botao.getAttribute("data-botao-texto") || "";
            await responderBotao(textoBotao, botao);
          });
        });

        mensagensEl.appendChild(div);
      }

      mensagensEl.scrollTop = mensagensEl.scrollHeight;
    }

    formChat.addEventListener("submit", async function(e){
      e.preventDefault();

      const texto = (textoMensagem.value || "").trim();
      if(!texto) return;

      const btn = formChat.querySelector("button");
      btn.disabled = true;
      btn.textContent = "Enviando...";
      setStatus("Enviando mensagem...");

      try{
        await enviarMensagem(texto);
        textoMensagem.value = "";
        await carregarMensagens();
        setStatus("Mensagem enviada.");
      }catch(err){
        console.error("Erro ao enviar mensagem:", err);
        setStatus("Erro ao enviar mensagem.");
        alert("Erro ao enviar mensagem.");
      }finally{
        btn.disabled = false;
        btn.textContent = "Enviar";
      }
    });

    textoMensagem.addEventListener("keydown", function(e){
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        formChat.requestSubmit();
      }
    });

    function ajustarAlturaTelaChat(){
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.body.style.height = vh + "px";
    }

    async function iniciar(){
      if(!validarSessao()) return;

      ajustarAlturaTelaChat();
      await carregarMensagens();

      if(pollingMensagens) clearInterval(pollingMensagens);
      pollingMensagens = setInterval(async () => {
        await carregarMensagens();
      }, 5000);
    }

    window.addEventListener("load", ajustarAlturaTelaChat);
    window.addEventListener("resize", ajustarAlturaTelaChat);

    if(window.visualViewport){
      window.visualViewport.addEventListener("resize", ajustarAlturaTelaChat);
      window.visualViewport.addEventListener("scroll", ajustarAlturaTelaChat);
    }

    iniciar();
  </script>
</body>
</html>
