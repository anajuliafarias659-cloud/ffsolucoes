<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chat da Família | FF Soluções</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
:root{
  --bg:#020617;
  --card:#0f172a;
  --card-2:#111827;
  --line:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#94a3b8;
  --green:#22c55e;
  --green-2:#16a34a;
  --bubble-me:#22c55e;
  --bubble-other:#1e293b;
  --danger:#ef4444;
  --shadow:0 18px 40px rgba(0,0,0,.35);
}
html,body{
  margin:0;
  padding:0;
  background:linear-gradient(180deg,#020617 0%, #071124 100%);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  min-height:100%;
}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:16px;
}
.box{
  width:100%;
  max-width:760px;
  background:rgba(15,23,42,.96);
  border:1px solid var(--line);
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.topo{
  padding:18px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));
}
.topo h2{
  margin:0;
  font-size:24px;
}
.topo p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:14px;
}
.controles{
  padding:16px;
  display:grid;
  grid-template-columns:1fr 1fr 120px;
  gap:12px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.02);
}
.input, select, button{
  width:100%;
  border:none;
  outline:none;
  border-radius:14px;
  padding:14px;
  font-size:15px;
}
.input, select{
  background:#020617;
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
}
button{
  background:var(--green);
  color:#04110a;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  background:var(--green-2);
  transform:translateY(-1px);
}
.chat{
  height:420px;
  overflow:auto;
  padding:16px;
  background:
    radial-gradient(circle at top right, rgba(34,197,94,.08), transparent 30%),
    radial-gradient(circle at bottom left, rgba(59,130,246,.08), transparent 28%),
    #020617;
}
.vazio{
  text-align:center;
  color:var(--muted);
  padding:60px 20px;
  font-size:15px;
}
.msg-wrap{
  display:flex;
  margin-bottom:12px;
}
.msg-wrap.me{
  justify-content:flex-end;
}
.msg-wrap.other{
  justify-content:flex-start;
}
.msg{
  max-width:78%;
  border-radius:18px;
  padding:12px 14px;
  word-wrap:break-word;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}
.msg-wrap.me .msg{
  background:var(--bubble-me);
  color:#04110a;
  border-bottom-right-radius:6px;
}
.msg-wrap.other .msg{
  background:var(--bubble-other);
  color:#fff;
  border:1px solid rgba(255,255,255,.06);
  border-bottom-left-radius:6px;
}
.msg-top{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
}
.avatar{
  width:26px;
  height:26px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:800;
  background:rgba(255,255,255,.18);
  color:#fff;
  flex-shrink:0;
}
.nome{
  font-size:13px;
  font-weight:800;
}
.hora{
  font-size:11px;
  opacity:.78;
  margin-left:auto;
}
.texto{
  font-size:15px;
  line-height:1.45;
  white-space:pre-wrap;
}
.rodape{
  padding:14px;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,.02);
}
.form-msg{
  display:grid;
  grid-template-columns:1fr 120px;
  gap:12px;
}
.status{
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
  min-height:18px;
}
.erro{
  color:var(--danger);
}
.ok{
  color:var(--green);
}

@media (max-width: 700px){
  .box{
    max-width:100%;
    border-radius:18px;
  }
  .controles{
    grid-template-columns:1fr;
  }
  .chat{
    height:52vh;
  }
  .form-msg{
    grid-template-columns:1fr 100px;
  }
  .msg{
    max-width:88%;
  }
  .topo h2{
    font-size:20px;
  }
}
</style>
</head>

<body>

<div class="box">
  <div class="topo">
    <h2>💬 Chat da Família</h2>
    <p>Conversa simples, rápida e em tempo real.</p>
  </div>

  <div class="controles">
    <select id="appSelect">
      <option value="">Selecione o grupo</option>
    </select>

    <input id="nomePessoa" class="input" placeholder="Seu nome. Ex: Mãe, João, Ana">

    <button id="btnEntrar">Entrar</button>
  </div>

  <div class="chat" id="chatBox">
    <div class="vazio">Selecione um grupo e informe seu nome para começar.</div>
  </div>

  <div class="rodape">
    <div class="form-msg">
      <input id="mensagem" class="input" placeholder="Digite sua mensagem..." maxlength="1000">
      <button id="btnEnviar" type="button">Enviar</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const appSelect   = document.getElementById("appSelect");
const nomePessoa  = document.getElementById("nomePessoa");
const chatBox     = document.getElementById("chatBox");
const mensagem    = document.getElementById("mensagem");
const btnEnviar   = document.getElementById("btnEnviar");
const btnEntrar   = document.getElementById("btnEntrar");
const statusBox   = document.getElementById("status");

let canalRealtime = null;

function setStatus(txt="", tipo=""){
  statusBox.className = "status" + (tipo ? " " + tipo : "");
  statusBox.textContent = txt;
}

function escapeHtml(text=""){
  return text
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getIniciais(nome=""){
  const partes = nome.trim().split(/\s+/).filter(Boolean);
  if(!partes.length) return "??";
  if(partes.length === 1) return partes[0].slice(0,2).toUpperCase();
  return (partes[0][0] + partes[1][0]).toUpperCase();
}

function formatarHora(dataIso){
  if(!dataIso) return "";
  const d = new Date(dataIso);
  return d.toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});
}

function meuNomeAtual(){
  return (nomePessoa.value || "").trim();
}

function meuGrupoAtual(){
  return (appSelect.value || "").trim();
}

function salvarPreferencias(){
  localStorage.setItem("chat_familia_nome", meuNomeAtual());
  localStorage.setItem("chat_familia_app", meuGrupoAtual());
}

function restaurarPreferencias(){
  const nomeSalvo = localStorage.getItem("chat_familia_nome") || "";
  const appSalvo  = localStorage.getItem("chat_familia_app") || "";
  nomePessoa.value = nomeSalvo;
  window._appSalvo = appSalvo;
}

function renderMensagem(m){
  const nome = m.remetente || "Visitante";
  const texto = m.mensagem || "";
  const hora = formatarHora(m.created_at);
  const isMe = nome.toLowerCase() === meuNomeAtual().toLowerCase();

  return `
    <div class="msg-wrap ${isMe ? 'me' : 'other'}">
      <div class="msg">
        <div class="msg-top">
          <div class="avatar">${escapeHtml(getIniciais(nome))}</div>
          <div class="nome">${escapeHtml(nome)}</div>
          <div class="hora">${escapeHtml(hora)}</div>
        </div>
        <div class="texto">${escapeHtml(texto)}</div>
      </div>
    </div>
  `;
}

function scrollFinal(){
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function carregarApps(){
  setStatus("Carregando grupos...");
  const { data, error } = await supabase
    .from("apps")
    .select("id,nome")
    .order("nome", { ascending:true });

  if(error){
    console.error(error);
    setStatus("Erro ao carregar grupos.", "erro");
    return;
  }

  appSelect.innerHTML = `<option value="">Selecione o grupo</option>`;
  (data || []).forEach(a => {
    appSelect.innerHTML += `<option value="${a.id}">${escapeHtml(a.nome)}</option>`;
  });

  if(window._appSalvo){
    appSelect.value = window._appSalvo;
  }

  setStatus("Grupos carregados.", "ok");
}

async function carregarMensagens(){
  chatBox.innerHTML = "";
  const appId = meuGrupoAtual();

  if(!appId){
    chatBox.innerHTML = `<div class="vazio">Selecione um grupo para ver as mensagens.</div>`;
    return;
  }

  setStatus("Carregando mensagens...");

  const { data, error } = await supabase
    .from("chat_admin")
    .select("id, app_id, remetente, mensagem, created_at")
    .eq("app_id", appId)
    .order("created_at", { ascending:true });

  if(error){
    console.error(error);
    chatBox.innerHTML = `<div class="vazio">Erro ao carregar mensagens.</div>`;
    setStatus("Erro ao carregar mensagens.", "erro");
    return;
  }

  if(!data || !data.length){
    chatBox.innerHTML = `<div class="vazio">Nenhuma mensagem ainda. Seja o primeiro a enviar.</div>`;
    setStatus("Tudo pronto.");
    return;
  }

  chatBox.innerHTML = data.map(renderMensagem).join("");
  scrollFinal();
  setStatus("Mensagens atualizadas.", "ok");
}

function desmontarRealtime(){
  if(canalRealtime){
    supabase.removeChannel(canalRealtime);
    canalRealtime = null;
  }
}

function montarRealtime(){
  desmontarRealtime();

  const appId = meuGrupoAtual();
  if(!appId) return;

  canalRealtime = supabase
    .channel("chat-familia-" + appId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "chat_admin",
        filter: `app_id=eq.${appId}`
      },
      async () => {
        await carregarMensagens();
      }
    )
    .subscribe((status) => {
      if(status === "SUBSCRIBED"){
        setStatus("Conectado em tempo real.", "ok");
      }
    });
}

async function entrarNoChat(){
  if(!meuGrupoAtual()){
    setStatus("Selecione um grupo.", "erro");
    return;
  }

  if(!meuNomeAtual()){
    setStatus("Digite seu nome.", "erro");
    nomePessoa.focus();
    return;
  }

  salvarPreferencias();
  await carregarMensagens();
  montarRealtime();
  mensagem.focus();
}

async function enviar(){
  const appId = meuGrupoAtual();
  const nome = meuNomeAtual();
  const texto = mensagem.value.trim();

  if(!appId){
    setStatus("Selecione um grupo antes de enviar.", "erro");
    return;
  }

  if(!nome){
    setStatus("Digite seu nome antes de enviar.", "erro");
    nomePessoa.focus();
    return;
  }

  if(!texto){
    setStatus("Digite uma mensagem.", "erro");
    mensagem.focus();
    return;
  }

  btnEnviar.disabled = true;
  btnEnviar.textContent = "Enviando...";
  setStatus("");

  const { error } = await supabase
    .from("chat_admin")
    .insert({
      app_id: appId,
      remetente: nome,
      mensagem: texto
    });

  btnEnviar.disabled = false;
  btnEnviar.textContent = "Enviar";

  if(error){
    console.error(error);
    setStatus("Erro ao enviar mensagem.", "erro");
    return;
  }

  mensagem.value = "";
  setStatus("Mensagem enviada.", "ok");
  mensagem.focus();

  // fallback caso realtime demore
  await carregarMensagens();
}

btnEntrar.addEventListener("click", entrarNoChat);
btnEnviar.addEventListener("click", enviar);

appSelect.addEventListener("change", async () => {
  salvarPreferencias();
  await carregarMensagens();
  montarRealtime();
});

nomePessoa.addEventListener("input", salvarPreferencias);

mensagem.addEventListener("keydown", (e) => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    enviar();
  }
});

restaurarPreferencias();
await carregarApps();

if(meuGrupoAtual()){
  await carregarMensagens();
  montarRealtime();
}
</script>

</body>
</html>
