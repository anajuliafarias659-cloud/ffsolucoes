
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Produtos | Loja de Celular</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.voltar{background:#334155;color:#fff;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:bold}
.container{max-width:1100px;margin:30px auto;padding:0 20px}
.box{background:#0f172a;padding:20px;border-radius:16px;margin-bottom:20px}
input,select,textarea,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
input,select,textarea{background:#020617;color:#fff}
textarea{resize:vertical;min-height:80px}
button{background:#22c55e;font-weight:bold;cursor:pointer}
.excluir{background:#e53935}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.produto{background:#020617;padding:12px;border-radius:14px;text-align:center;font-size:13px}
.produto img{width:100%;height:110px;object-fit:cover;border-radius:10px}
.preco{color:#22c55e;font-weight:bold}
small{opacity:.7}
.sem-foto{height:110px;display:flex;align-items:center;justify-content:center;opacity:.3}
#preview{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.preview-item{position:relative}
.preview-item img{width:90px;height:90px;object-fit:cover;border-radius:10px}
.preview-item button{position:absolute;top:-6px;right:-6px;background:red;color:#fff;border:none;border-radius:50%;width:22px;height:22px}
.cor-box{background:#111;padding:6px;border-radius:6px;margin-top:6px;font-size:13px}
#listaComplementares{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:8px;
  margin-top:10px;
}

.item-comp{
  background:#020617;
  border:1px solid #334155;
  border-radius:10px;
  padding:10px;
  display:flex;
  align-items:center;
  gap:8px;
}

.item-comp input[type="checkbox"]{
  width:auto;
  margin:0;
}

.item-comp label{
  cursor:pointer;
  font-size:14px;
  flex:1;
}
</style>
</head>

<body>

<div class="topo">
  <h2>Produtos</h2>
  <button class="voltar" onclick="history.back()">⬅ Voltar</button>
</div>

<div class="container">

<div class="box">
<h2>➕ Cadastrar / Editar produtos</h2>

<input id="nome" placeholder="Ex: Digitar o nome do seu produto">
<input id="preco" type="text" placeholder="Preço">
<input id="estoque" type="number" placeholder="Estoque geral">
<input id="peso" type="number" step="0.01" placeholder="Peso (kg)">
<textarea id="descricao" placeholder="Descrição do produto"></textarea>

<select id="categoria">
<option value="">Carregando categorias...</option>
</select>

<input id="corInput" placeholder="Cor (ex: Preto)">
<input id="estoqueCorInput" type="number" placeholder="Estoque dessa cor">
<button type="button" onclick="adicionarCor()">Adicionar cor</button>
<div id="listaCores"></div>

<h3 style="margin-top:18px;">🔗 Produtos complementares</h3>
<small>Marque os produtos que serão sugeridos no carrinho junto com este item.</small>
<div id="listaComplementares" style="margin-top:10px;"></div>

<input id="camera" type="file" accept="image/*" hidden>
<button type="button" onclick="tirarFoto()">📷 Adicionar foto (até 3)</button>
<div id="preview"></div>

<button id="btnSalvar" type="button" onclick="salvar()">Cadastrar Produtos</button>
</div>

<div class="box">
<h2>📦Produtos cadastrados</h2>
<div id="lista" class="grid"></div>
</div>

</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let admin = null;
let fotosTemp = [];
let fotosExistentes = [];
let variacoes = [];
const LIMITE = 3;
let editando = false;
let produtoEditandoId = null;
let complementaresSelecionados = [];

/* ===== FORMATAR REAL ===== */
function formatarReal(valor){
  return Number(valor).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

/* ===== MÁSCARA DE MOEDA ===== */
document.addEventListener("DOMContentLoaded", function(){
  const campoPreco = document.getElementById("preco");

  campoPreco.addEventListener("input", function(e){
    let valor = e.target.value.replace(/\D/g, "");

    if(valor === ""){
      e.target.value = "";
      return;
    }

    valor = (Number(valor) / 100).toFixed(2);

    e.target.value = Number(valor).toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
  });
});

/* ===== SESSÃO ===== */
async function verificarSessao(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    window.location.href="/auth/login.html";
    return null;
  }
  return session.user.id;
}

async function carregarAdmin(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario } = await sb
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  admin = usuario;
}

/* ===== CATEGORIAS ===== */
async function carregarCategorias(){
  const { data } = await sb
    .from("categorias")
    .select("*")
    .eq("app_id", admin.app_id)
    .order("nome");

  if(!data || data.length === 0){
    categoria.innerHTML = "<option value=''>Nenhuma categoria cadastrada</option>";
    return;
  }

  categoria.innerHTML = data.map(c =>
    `<option value="${c.nome}">${c.nome}</option>`
  ).join("");
}

/* ===== COMPLEMENTARES ===== */
async function carregarComplementares(){
  const { data } = await sb
    .from("produtos")
    .select("id,nome")
    .eq("app_id", admin.app_id)
    .order("nome");

  const lista = data || [];
  const filtrados = lista.filter(p => String(p.id) !== String(produtoEditandoId));

  const html = filtrados.map(p => `
    <div class="item-comp">
      <input
        type="checkbox"
        id="comp_${p.id}"
        value="${p.id}"
        ${complementaresSelecionados.includes(String(p.id)) ? "checked" : ""}
      >
      <label for="comp_${p.id}">${p.nome}</label>
    </div>
  `).join("");

  document.getElementById("listaComplementares").innerHTML =
    html || "<small>Nenhum outro produto cadastrado ainda.</small>";
}

function lerComplementaresSelecionados(){
  const checks = document.querySelectorAll('#listaComplementares input[type="checkbox"]:checked');
  return [...checks].map(c => String(c.value));
}

/* ===== FOTO ===== */
function tirarFoto(){
  if(fotosTemp.length + fotosExistentes.length >= LIMITE){
    alert("Máximo de 3 fotos por produto");
    return;
  }
  camera.click();
}

camera.onchange = ()=>{
  const file = camera.files[0];
  if(!file) return;
  fotosTemp.push(file);
  camera.value = "";
  atualizarPreview();
};

function atualizarPreview(){
  preview.innerHTML = "";

  fotosExistentes.forEach((url,i)=>{
    preview.innerHTML += `
      <div class="preview-item">
        <img src="${url}">
        <button type="button" onclick="removerExistente(${i})">×</button>
      </div>`;
  });

  fotosTemp.forEach((f,i)=>{
    preview.innerHTML += `
      <div class="preview-item">
        <img src="${URL.createObjectURL(f)}">
        <button type="button" onclick="removerTemp(${i})">×</button>
      </div>`;
  });
}

function removerExistente(i){
  fotosExistentes.splice(i,1);
  atualizarPreview();
}

function removerTemp(i){
  fotosTemp.splice(i,1);
  atualizarPreview();
}

/* ===== VARIAÇÕES ===== */
function adicionarCor(){
  if(!corInput.value || estoqueCorInput.value === "" || Number(estoqueCorInput.value) < 0){
    alert("Informe cor e estoque");
    return;
  }

  variacoes.push({
    cor: corInput.value,
    estoque: Number(estoqueCorInput.value)
  });

  corInput.value = "";
  estoqueCorInput.value = "";
  atualizarCores();
}

function atualizarCores(){
  listaCores.innerHTML = variacoes.map((v,i)=>`
    <div class="cor-box">
      ${v.cor} - ${v.estoque} unidades
      <button type="button" onclick="removerCor(${i})">x</button>
    </div>
  `).join("");
}

function removerCor(i){
  variacoes.splice(i,1);
  atualizarCores();
}

/* ===== SALVAR ===== */
async function salvar(){
  if(!nome.value || !preco.value){
    alert("Nome e preço obrigatórios");
    return;
  }

  let imagens = [...fotosExistentes];

  for(const foto of fotosTemp){
    const path = `${admin.app_id}/${Date.now()}_${Math.random()}.jpg`;

    await sb.storage.from("produtos").upload(path, foto, { upsert:true });

    imagens.push(
      sb.storage.from("produtos").getPublicUrl(path).data.publicUrl
    );
  }

  const idsComplementares = lerComplementaresSelecionados();

  const payload = {
    nome: nome.value,
    preco: Number(
      preco.value
        .replace(/\s/g,"")
        .replace("R$","")
        .replace(/\./g,"")
        .replace(",",".")
    ),
    estoque: Number(estoque.value || 0),
    peso: Number(peso.value || 0),
    descricao: descricao.value,
    categoria: categoria.value,
    variacoes: JSON.stringify(variacoes),
    imagens: JSON.stringify(imagens),
    produtos_complementares: JSON.stringify(idsComplementares)
  };

  if(editando){
    await sb
      .from("produtos")
      .update(payload)
      .eq("id", produtoEditandoId);
  }else{
    await sb.from("produtos").insert({
      ...payload,
      app_id: admin.app_id,
      ativo: true
    });
  }

  limpar();
  await carregar();
  await carregarComplementares();
  alert("✅ Produto salvo");
}

/* ===== EDITAR ===== */
function editar(p){
  editando = true;
  produtoEditandoId = p.id;
  peso.value = p.peso || "";

  nome.value = p.nome;
  preco.value = formatarReal(p.preco);
  estoque.value = p.estoque;
  descricao.value = p.descricao || "";
  categoria.value = p.categoria || "";
  peso.value=descricao.value="";

  try { fotosExistentes = JSON.parse(p.imagens || "[]"); }
  catch { fotosExistentes = []; }

  try { variacoes = JSON.parse(p.variacoes || "[]"); }
  catch { variacoes = []; }

  try {
    complementaresSelecionados = JSON.parse(p.produtos_complementares || "[]").map(String);
  } catch {
    complementaresSelecionados = [];
  }

  fotosTemp = [];
  atualizarPreview();
  atualizarCores();
  carregarComplementares();

  btnSalvar.innerText = "💾 Salvar alterações";
}

/* ===== LISTAR ===== */
async function carregar(){
  const { data } = await sb
    .from("produtos")
    .select("*")
    .eq("app_id", admin.app_id);

  lista.innerHTML = (data || []).map(p=>{
    let imgs = [];
    try { imgs = JSON.parse(p.imagens || "[]"); } catch {}

    return `
      <div class="produto">
        ${imgs[0] ? `<img src="${imgs[0]}">` : `<div class="sem-foto">Sem foto</div>`}
        <b>${p.nome}</b>
        <div class="preco">${formatarReal(p.preco)}</div>
        <small>Estoque geral: ${p.estoque}</small><br>
        <small>${p.descricao || ""}</small><br><br>
        <button type="button" onclick='editar(${JSON.stringify(p)})'>✏️ Editar</button>
        <button type="button" class="excluir" onclick="excluir('${p.id}')">Excluir</button>
      </div>
    `;
  }).join("");
}

/* ===== EXCLUIR ===== */
async function excluir(id){
  if(confirm("Excluir produto?")){
    await sb.from("produtos").delete().eq("id", id);
    await carregar();
    await carregarComplementares();
  }
}

/* ===== LIMPAR ===== */
function limpar(){
  editando = false;
  produtoEditandoId = null;
  nome.value = "";
  preco.value = "";
  estoque.value = "";
  descricao.value = "";
  variacoes = [];
  fotosTemp = [];
  fotosExistentes = [];
  complementaresSelecionados = [];
  preview.innerHTML = "";
  listaCores.innerHTML = "";
  btnSalvar.innerText = "Cadastrar celular";
}

/* ===== INIT ===== */
carregarAdmin().then(async ()=>{
  if(admin){
    await carregarCategorias();
    await carregar();
    await carregarComplementares();
  }
});
</script>

</body>
</html>
