```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Escolha o Profissional</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

button{
    background:#0d8db8;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
}

</style>

</head>
<body>

<h2>💈 Escolha o Profissional</h2>

<div id="lista"></div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

async function carregar(){

    const app_id = localStorage.getItem("barbeariaAppId");

    if(!app_id){
        alert("Barbearia não encontrada");
        return;
    }

    const { data, error } = await db
    .from("barbearia_profissionais")
    .select("*")
    .eq("ativo", true)
    .eq("app_id", app_id);

    if(error){
        console.log(error);
        return;
    }

    let html="";

    data.forEach(item=>{

        html += `
        <div class="card">

            <div>
                <h3>${item.nome}</h3>
                <small>${item.especialidade || ''}</small>
            </div>

            <button onclick="selecionar(${item.id})">
                Escolher
            </button>

        </div>
        `;
    });

    document.getElementById("lista").innerHTML = html;
}

function selecionar(id){

    localStorage.setItem(
        "profissionalSelecionado",
        id
    );

    location.href="agenda.html";
}

carregar();

</script>

</body>
</html>
