```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Confirmar Agendamento</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.card{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    background:#0d8db8;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    cursor:pointer;
}

.resumo{
    background:#f8f8f8;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

</style>

</head>
<body>

<div class="card">

<h2>✅ Confirmar Agendamento</h2>

<div class="resumo">

<p><b>Data:</b> <span id="data"></span></p>

<p><b>Horário:</b> <span id="hora"></span></p>

</div>

<input
type="text"
id="nome"
placeholder="Seu nome">

<input
type="tel"
id="telefone"
placeholder="Telefone">

<button onclick="confirmar()">
Confirmar Agendamento
</button>

</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const servicoId =
localStorage.getItem("servicoSelecionado");

const profissionalId =
localStorage.getItem("profissionalSelecionado");

const dataSelecionada =
localStorage.getItem("dataSelecionada");

const horaSelecionada =
localStorage.getItem("horaSelecionada");
const app_id =
localStorage.getItem("barbeariaAppId") ||
localStorage.getItem("app_id");
const partes = dataSelecionada.split("-");

document.getElementById("data").innerText =
`${partes[2]}/${partes[1]}/${partes[0]}`;

document.getElementById("hora")
.innerText = horaSelecionada;

async function confirmar(){

    const nome =
    document.getElementById("nome").value;

    const telefone =
    document.getElementById("telefone").value;

    if(!nome || !telefone){

        alert("Preencha todos os campos");
        return;

    }

const agora = new Date();

const hoje =
agora.getFullYear() + "-" +
String(agora.getMonth()+1).padStart(2,"0") + "-" +
String(agora.getDate()).padStart(2,"0");

if(dataSelecionada === hoje){

    const horaAtual =
    String(agora.getHours()).padStart(2,"0") +
    ":" +
    String(agora.getMinutes()).padStart(2,"0");

    if(horaSelecionada <= horaAtual){

        alert("Este horário já passou.");

        return;
    }
}
    /* Verifica se alguém reservou antes */

    const { data: existe, error: erroExiste } = await db
.from("barbearia_agendamentos")
.select("id")
.eq("app_id", app_id)
.eq("profissional_id", profissionalId)
.eq("data_agendamento", dataSelecionada)
.eq("hora_agendamento", horaSelecionada);

console.log("HORARIO OCUPADO?", existe);
console.log("ERRO CONSULTA", erroExiste);

if(erroExiste){
    alert("Erro ao verificar disponibilidade.");
    return;
}

if(existe && existe.length > 0){

    alert("Esse horário já está reservado.");

    return;

}

    const { error } = await db
    .from("barbearia_agendamentos")
    .insert({

    app_id: app_id,

    cliente_nome: nome,
    telefone: telefone,

    servico_id: servicoId,

    profissional_id: profissionalId,

    data_agendamento:
    dataSelecionada,

    hora_agendamento:
    horaSelecionada

});

    if(error){

        alert(error.message);
        return;

    }

    alert(
        "Agendamento realizado com sucesso!"
    );

    localStorage.removeItem(
        "servicoSelecionado"
    );

    localStorage.removeItem(
        "profissionalSelecionado"
    );

    localStorage.removeItem(
        "dataSelecionada"
    );

    localStorage.removeItem(
        "horaSelecionada"
    );

    location.href="cliente.html";

}

</script>

</body>
</html>
