<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Escolha o Horário</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.horarios{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    gap:10px;
}

.hora{
    background:#0d8db8;
    color:white;
    padding:12px;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
}

.hora:hover{
    opacity:.9;
}

.ocupado{
    background:#999;
    cursor:not-allowed;
}

</style>

</head>
<body>

<div class="card">

<h2>📅 Escolha a Data</h2>

<input type="date" id="data">

</div>

<div class="card">

<h2>⏰ Horários Disponíveis</h2>

<div id="horarios" class="horarios">

</div>

</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const profissionalId =
localStorage.getItem("profissionalSelecionado");

const app_id =
localStorage.getItem("barbeariaAppId") ||
localStorage.getItem("app_id");

const horariosPadrao = [
"08:00",
"09:00",
"10:00",
"11:00",
"14:00",
"15:00",
"16:00",
"17:00"
];

document
.getElementById("data")
.addEventListener("change",carregarHorarios);

async function carregarHorarios(){

    const data =
    document.getElementById("data").value;

    if(!data) return;

    const { data: agendados } = await db
.from("barbearia_agendamentos")
.select("hora_agendamento")
.eq("app_id", app_id)
.eq("profissional_id", profissionalId)
.eq("data_agendamento", data);

    let html = "";

    const agora = new Date();

    const hoje =
    agora.getFullYear() + "-" +
    String(agora.getMonth()+1).padStart(2,"0") + "-" +
    String(agora.getDate()).padStart(2,"0");

    horariosPadrao.forEach(hora => {

        const ocupado =
        agendados?.some(
            a => a.hora_agendamento.startsWith(hora)
        );

        let horarioPassado = false;

        if(data === hoje){

            const horaAtual =
            String(agora.getHours()).padStart(2,"0") +
            ":" +
            String(agora.getMinutes()).padStart(2,"0");

            horarioPassado = hora <= horaAtual;
        }

        const bloqueado =
        ocupado || horarioPassado;

        html += `
        <div
        class="hora ${bloqueado ? 'ocupado' : ''}"
        onclick="${
            bloqueado
            ? ''
            : `selecionarHorario('${hora}')`
        }">

        ${hora}

        </div>
        `;
    });

    document.getElementById("horarios").innerHTML = html;
}

function selecionarHorario(hora){

    localStorage.setItem(
        "dataSelecionada",
        document.getElementById("data").value
    );

    localStorage.setItem(
        "horaSelecionada",
        hora
    );

    location.href="confirmar.html";
}

</script>

</body>
</html>
