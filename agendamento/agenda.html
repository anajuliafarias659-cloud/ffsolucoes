<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Escolha o Horário</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.horarios{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    gap:10px;
}

.hora{
    background:#0d8db8;
    color:white;
    padding:12px;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
}

.hora:hover{
    opacity:.9;
}

.ocupado{
    background:#999;
    cursor:not-allowed;
}

.calendario{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.mes{
    text-align:center;
    font-size:22px;
    font-weight:700;
    margin-bottom:15px;
}

.dias{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.dia{
    background:#f1f5f9;
    padding:12px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.dia:hover{
    background:#0d8db8;
    color:white;
}

.dia.selecionado{
    background:#0d8db8;
    color:white;
}

.dia.hoje{
    border:2px solid #0d8db8;
}
</style>

</head>
<body>

<div class="calendario">

    <div id="mesAtual" class="mes"></div>

    <div id="dias" class="dias"></div>

    <input
    type="hidden"
    id="data">

</div>

<div class="card">

<h2>⏰ Horários Disponíveis</h2>

<div id="horarios" class="horarios">

</div>

</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const profissionalId =
localStorage.getItem("profissionalSelecionado");

const app_id =
localStorage.getItem("barbeariaAppId") ||
localStorage.getItem("app_id");

const horariosPadrao = [
"08:00",
"09:00",
"10:00",
"11:00",
"14:00",
"15:00",
"16:00",
"17:00"
];

function gerarCalendario(){

    const hoje = new Date();

    const ano = hoje.getFullYear();
    const mes = hoje.getMonth();

    const meses = [
        "Janeiro","Fevereiro","Março","Abril",
        "Maio","Junho","Julho","Agosto",
        "Setembro","Outubro","Novembro","Dezembro"
    ];

    document.getElementById("mesAtual")
    .innerText =
    `${meses[mes]} ${ano}`;

    const ultimoDia =
    new Date(ano, mes + 1, 0).getDate();

    let html = "";

    for(let dia=1; dia<=ultimoDia; dia++){

        const dataFormatada =
        `${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;

        const classe =
        dia === hoje.getDate()
        ? "dia hoje"
        : "dia";

        html += `
        <div
        class="${classe}"
        onclick="selecionarData('${dataFormatada}',this)">

        ${dia}

        </div>
        `;
    }

    document.getElementById("dias")
    .innerHTML = html;
}
document
.getElementById("data")
.addEventListener("change",carregarHorarios);

async function carregarHorarios(){

    const data =
    document.getElementById("data").value;

    if(!data) return;

    let consulta = db
.from("barbearia_agendamentos")
.select("hora_agendamento")
.eq("app_id", app_id)
.eq("data_agendamento", data);

if(profissionalId !== "sem_preferencia"){
    consulta = consulta.eq(
        "profissional_id",
        profissionalId
    );
}

const { data: agendados } =
await consulta;

    let html = "";

    const agora = new Date();

    const hoje =
    agora.getFullYear() + "-" +
    String(agora.getMonth()+1).padStart(2,"0") + "-" +
    String(agora.getDate()).padStart(2,"0");

    horariosPadrao.forEach(hora => {

        const ocupado =
        agendados?.some(
            a => a.hora_agendamento.startsWith(hora)
        );

        let horarioPassado = false;

        if(data === hoje){

            const horaAtual =
            String(agora.getHours()).padStart(2,"0") +
            ":" +
            String(agora.getMinutes()).padStart(2,"0");

            horarioPassado = hora <= horaAtual;
        }

        const bloqueado =
        ocupado || horarioPassado;

        html += `
        <div
        class="hora ${bloqueado ? 'ocupado' : ''}"
        onclick="${
            bloqueado
            ? ''
            : `selecionarHorario('${hora}')`
        }">

        ${hora}

        </div>
        `;
    });

    document.getElementById("horarios").innerHTML = html;
}

function selecionarData(data, elemento){

    document
    .querySelectorAll(".dia")
    .forEach(d => d.classList.remove("selecionado"));

    elemento.classList.add("selecionado");

    document.getElementById("data").value =
    data;

    carregarHorarios();
}
function selecionarHorario(hora){

    localStorage.setItem(
        "dataSelecionada",
        document.getElementById("data").value
    );

    localStorage.setItem(
        "horaSelecionada",
        hora
    );

    location.href="confirmar.html";
}

gerarCalendario();
</script>

</body>
</html>
