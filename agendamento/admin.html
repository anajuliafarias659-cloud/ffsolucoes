<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Agendamento Barbearia</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:#222;
    padding:20px;
    border-radius:15px;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#f7b500;
    cursor:pointer;
    font-weight:bold;
}

#msg{
    margin-top:15px;
}
</style>
</head>
<body>

<div class="card">

<h2>💈 Agendar Horário</h2>

<input type="text" id="nome" placeholder="Seu nome">

<input type="text" id="telefone" placeholder="Telefone">

<select id="servico">
    <option>Corte</option>
    <option>Barba</option>
    <option>Corte + Barba</option>
</select>

<input type="date" id="data">

<select id="hora">
    <option>08:00</option>
    <option>09:00</option>
    <option>10:00</option>
    <option>11:00</option>
    <option>14:00</option>
    <option>15:00</option>
    <option>16:00</option>
    <option>17:00</option>
</select>

<button onclick="agendar()">
Agendar
</button>

<div id="msg"></div>

</div>

<script>

const supabaseUrl = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const supabaseKey = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function agendar(){

    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;
    const servico = document.getElementById("servico").value;
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;

    if(!nome || !telefone || !data){
        alert("Preencha todos os campos");
        return;
    }

    const { data: horarioExistente } = await supabase
    .from("agendamentos")
    .select("*")
    .eq("data", data)
    .eq("hora", hora);

    if(horarioExistente.length > 0){
        alert("Horário já ocupado.");
        return;
    }

    const { error } = await supabase
    .from("agendamentos")
    .insert({
        nome,
        telefone,
        servico,
        data,
        hora
    });

    if(error){
        console.error(error);
        document.getElementById("msg").innerHTML =
        "❌ Erro ao agendar";
        return;
    }

    document.getElementById("msg").innerHTML =
    "✅ Horário agendado com sucesso!";

}
</script>

</body>
</html>
