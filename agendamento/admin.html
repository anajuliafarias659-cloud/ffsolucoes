```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Barbearia</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

h1,h2,h3{
    margin-top:0;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    background:#0d8db8;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.excluir{
    background:#dc3545;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

.logo-preview{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-top:10px;
    border:2px solid #ddd;
}

</style>

</head>
<body>

<div class="container">

<h1>💈 Administração da Barbearia</h1>

<!-- CONFIGURAÇÕES -->

<div class="card">

<h2>🏪 Dados da Barbearia</h2>

<input
id="nome_salao"
placeholder="Nome da Barbearia">

<input
id="telefone_salao"
placeholder="Telefone">

<input
id="endereco_salao"
placeholder="Endereço">

<input
id="logo_url"
placeholder="URL da Logo"
oninput="atualizarPreview()">

<img
id="preview_logo"
class="logo-preview"
src="https://via.placeholder.com/100">

<br><br>

<button onclick="salvarConfig()">
Salvar Dados
</button>

</div>

<!-- SERVIÇOS -->

<div class="card">

<h2>✂️ Novo Serviço</h2>

<input
id="nome"
placeholder="Nome do serviço">

<input
id="valor"
type="number"
step="0.01"
placeholder="Valor">

<input
id="duracao"
type="number"
placeholder="Duração em minutos">

<textarea
id="descricao"
placeholder="Descrição do serviço"></textarea>

<br><br>

<button onclick="salvarServico()">
Salvar Serviço
</button>

</div>

<!-- LISTA -->

<div class="card">

<h2>📋 Serviços Cadastrados</h2>

<table>

<thead>
<tr>
<th>Serviço</th>
<th>Valor</th>
<th>Duração</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaServicos">

</tbody>

</table>

</div>

</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

function atualizarPreview(){

    const url =
    document.getElementById("logo_url").value;

    document.getElementById("preview_logo").src =
    url || "https://via.placeholder.com/100";
}

/* CONFIGURAÇÕES */

async function carregarConfig(){

    const { data } = await db
    .from("barbearia_config")
    .select("*")
    .limit(1);

    if(!data || data.length === 0)
        return;

    const config = data[0];

    document.getElementById("nome_salao").value =
    config.nome_salao || "";

    document.getElementById("telefone_salao").value =
    config.telefone || "";

    document.getElementById("endereco_salao").value =
    config.endereco || "";

    document.getElementById("logo_url").value =
    config.logo_url || "";

    atualizarPreview();
}

async function salvarConfig(){

    const nome_salao =
    document.getElementById("nome_salao").value;

    const telefone =
    document.getElementById("telefone_salao").value;

    const endereco =
    document.getElementById("endereco_salao").value;

    const logo_url =
    document.getElementById("logo_url").value;

    const { data } = await db
    .from("barbearia_config")
    .select("id")
    .limit(1);

    if(data && data.length > 0){

        const { error } = await db
        .from("barbearia_config")
        .update({
            nome_salao,
            telefone,
            endereco,
            logo_url
        })
        .eq("id", data[0].id);

        if(error){
            alert(error.message);
            return;
        }

    }else{

        const { error } = await db
        .from("barbearia_config")
        .insert({
            nome_salao,
            telefone,
            endereco,
            logo_url
        });

        if(error){
            alert(error.message);
            return;
        }

    }

    alert("Dados salvos com sucesso!");
}

/* SERVIÇOS */

async function salvarServico(){

    const nome =
    document.getElementById("nome").value;

    const valor =
    document.getElementById("valor").value;

    const duracao =
    document.getElementById("duracao").value;

    const descricao =
    document.getElementById("descricao").value;

    if(!nome){
        alert("Informe o nome do serviço");
        return;
    }

    const { error } = await db
    .from("barbearia_servicos")
    .insert({
        nome,
        valor,
        duracao_minutos: duracao,
        descricao,
        ativo: true
    });

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById("nome").value="";
    document.getElementById("valor").value="";
    document.getElementById("duracao").value="";
    document.getElementById("descricao").value="";

    carregarServicos();

    alert("Serviço cadastrado!");
}

async function carregarServicos(){

    const { data, error } = await db
    .from("barbearia_servicos")
    .select("*")
    .order("id",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    let html="";

    data.forEach(item=>{

        html += `
        <tr>

            <td>${item.nome}</td>

            <td>
                R$ ${Number(item.valor).toFixed(2)}
            </td>

            <td>
                ${item.duracao_minutos} min
            </td>

            <td>

                <button
                class="excluir"
                onclick="excluirServico(${item.id})">

                Excluir

                </button>

            </td>

        </tr>
        `;
    });

    document.getElementById(
        "listaServicos"
    ).innerHTML = html;
}

async function excluirServico(id){

    if(!confirm("Excluir serviço?"))
        return;

    const { error } = await db
    .from("barbearia_servicos")
    .delete()
    .eq("id",id);

    if(error){
        alert(error.message);
        return;
    }

    carregarServicos();
}

carregarConfig();
carregarServicos();

</script>

</body>
</html>
