<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin - Serviços</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    background:#0d8db8;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

.excluir{
    background:#dc3545;
}

</style>
</head>
<body>

<div class="container">

<h1>💈 Administração de Serviços</h1>

<div class="card">

<h3>Novo Serviço</h3>

<input id="nome" placeholder="Nome do serviço">

<input id="valor" type="number" placeholder="Valor">

<input id="duracao" type="number" placeholder="Duração em minutos">

<textarea
id="descricao"
placeholder="Descrição"></textarea>

<br><br>

<button onclick="salvarServico()">
Salvar Serviço
</button>

</div>

<div class="card">

<h3>Serviços Cadastrados</h3>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Valor</th>
<th>Duração</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaServicos">

</tbody>

</table>

</div>

</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

async function salvarServico(){

    const nome =
    document.getElementById("nome").value;

    const valor =
    document.getElementById("valor").value;

    const duracao =
    document.getElementById("duracao").value;

    const descricao =
    document.getElementById("descricao").value;

    if(!nome){
        alert("Informe o nome");
        return;
    }

    const { error } = await db
    .from("barbearia_servicos")
    .insert({
        nome,
        valor,
        duracao_minutos: duracao,
        descricao,
        ativo: true
    });

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById("nome").value="";
    document.getElementById("valor").value="";
    document.getElementById("duracao").value="";
    document.getElementById("descricao").value="";

    carregarServicos();

    alert("Serviço cadastrado!");
}

async function carregarServicos(){

    const { data, error } = await db
    .from("barbearia_servicos")
    .select("*")
    .order("id",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    let html="";

    data.forEach(item=>{

        html += `
        <tr>

            <td>${item.nome}</td>

            <td>
                R$ ${Number(item.valor).toFixed(2)}
            </td>

            <td>
                ${item.duracao_minutos} min
            </td>

            <td>

                <button
                class="excluir"
                onclick="excluirServico(${item.id})">

                Excluir

                </button>

            </td>

        </tr>
        `;
    });

    document.getElementById(
        "listaServicos"
    ).innerHTML = html;
}

async function excluirServico(id){

    if(!confirm("Excluir serviço?"))
        return;

    const { error } = await db
    .from("barbearia_servicos")
    .delete()
    .eq("id",id);

    if(error){
        alert(error.message);
        return;
    }

    carregarServicos();
}

carregarServicos();

</script>

</body>
</html>
