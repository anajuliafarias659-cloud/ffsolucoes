<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Serviços</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.topo{
    background:white;
    border-radius:12px;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.logo{
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
}

.info h1{
    margin:0;
    font-size:24px;
}

.info p{
    margin:4px 0;
    color:#666;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.btn{
    background:#0d8db8;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover{
    opacity:.9;
}

.erro{
    color:red;
    font-weight:bold;
}

.vazio{
    color:#666;
}

</style>

</head>
<body>

<div id="empresa"></div>

<h2>💈 Serviços</h2>

<div id="lista">
    Carregando...
</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);

const APP_ID =
    params.get("app_id") ||
    localStorage.getItem("app_id");

if(APP_ID){
    localStorage.setItem("app_id", APP_ID);
}

console.log("APP_ID:", APP_ID);

async function carregarEmpresa(){

    const { data: empresas, error } = await db
    .from("barbearia_config")
    .select("*");

    console.table(empresas);

    const empresa = empresas?.find(
        e => e.app_id === APP_ID
    );

    console.log("APP_ID URL:", APP_ID);
    console.log("EMPRESA ENCONTRADA:", empresa);

    if(!empresa){
        console.log("EMPRESA NÃO ENCONTRADA");
        return;
    }

    document.getElementById("empresa").innerHTML = `
        <div class="topo">

            <img
                src="${empresa.logo_url || 'https://via.placeholder.com/100'}"
                class="logo">

            <div class="info">
                <h1>${empresa.nome_salao || ''}</h1>
                <p>${empresa.endereco || ''}</p>
                <p>${empresa.telefone || ''}</p>
            </div>

        </div>
    `;
}

async function carregarServicos(){

    try{

       const { data, error } = await db
.from("barbearia_servicos")
.select("*")
.eq("app_id", APP_ID);

console.table(data);
        console.log("ERROR:", error);

        if(error){

            document.getElementById("lista").innerHTML =
                `<p class="erro">${error.message}</p>`;

            return;
        }

        if(!data || data.length === 0){

            document.getElementById("lista").innerHTML =
                `<p class="vazio">Nenhum serviço cadastrado.</p>`;

            return;
        }

        let html = "";

        data.forEach(servico => {

            html += `
            <div class="card">

                <div>
                    <h3>${servico.nome}</h3>

                    <small>
                        ${servico.duracao_minutos || 0} min
                    </small>

                    <br>

                    <strong>
                        R$ ${Number(servico.valor).toFixed(2)}
                    </strong>
                </div>

                <button
                    class="btn"
                    onclick="reservar(${servico.id})">
                    Reservar
                </button>

            </div>
            `;
        });

        document.getElementById("lista").innerHTML = html;

    }catch(err){

        console.error(err);

        document.getElementById("lista").innerHTML =
            `<p class="erro">${err.message}</p>`;
    }
}

function reservar(id){

    localStorage.setItem(
        "servicoSelecionado",
        id
    );

    localStorage.setItem(
        "barbeariaAppId",
        APP_ID
    );

    location.href = "profissionais.html";
}

if(!APP_ID){

    document.getElementById("lista").innerHTML =
        "<p class='erro'>Barbearia não identificada.</p>";

}else{

    carregarEmpresa();
    carregarServicos();

}

</script>

</body>
</html>
