
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Serviços</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.topo{
    background:white;
    border-radius:12px;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
    border-left:6px solid #d4af37;
}

.logo-box{
    width:100px;
    height:100px;
    min-width:100px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(
        135deg,
        #0d8db8,
        #0a6d8f
    );

    border-radius:20px;

    box-shadow:
    0 8px 20px rgba(13,141,184,.35);

    padding:8px;
}

.logo{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;

    border:4px solid #fff;

    box-shadow:
    0 4px 12px rgba(0,0,0,.25);
}

/* BLACK BARBER */

.tema-barber-black h1,
.tema-barber-black h2,
.tema-barber-black h3,
.tema-barber-black p,
.tema-barber-black small,
.tema-barber-black strong{
    color:#fff !important;
}

/* GOLD */

.tema-gold h1,
.tema-gold h2,
.tema-gold h3{
    color:#8b5e00;
}

.tema-gold strong{
    color:#d4af37;
}

/* NEON */

.tema-neon h1,
.tema-neon h2,
.tema-neon h3,
.tema-neon p,
.tema-neon small,
.tema-neon strong{
    color:#00ff88 !important;
}

/* NATAL */

.tema-natal h1,
.tema-natal h2,
.tema-natal h3,
.tema-natal p,
.tema-natal small,
.tema-natal strong{
    color:#fff !important;
}

/* ANO NOVO */

.tema-anonovo h1,
.tema-anonovo h2,
.tema-anonovo h3{
    color:#facc15 !important;
}

.tema-anonovo p,
.tema-anonovo small,
.tema-anonovo strong{
    color:#fff !important;
}

/* CAPIVARA */

.tema-capivara h1,
.tema-capivara h2,
.tema-capivara h3{
    color:#6b2e1a !important;
}

.tema-capivara strong{
    color:#e5391b !important;
}

.info h1{
    margin:0;
    font-size:clamp(20px, 5vw, 32px);
    font-weight:900;
    text-transform:uppercase;
    line-height:1.2;
    word-break:break-word;
}

.card h3{
    font-size:20px;
    font-weight:800;
    margin:0 0 8px;
}

.card strong{
    font-size:18px;
}

.info p{
    margin:4px 0;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
    border-left:5px solid #d4af37;
}

.btn{
    background:#0d8db8;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover{
    opacity:.9;
}

.erro{
    color:red;
    font-weight:bold;
}

.vazio{
    color:#666;
}
.tema-barber-black{
    background:
    linear-gradient(
        rgba(0,0,0,.85),
        rgba(0,0,0,.85)
    ),
    url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:#fff;
}

.tema-barber-black .topo{
    background:rgba(28,28,28,.95);
    backdrop-filter:blur(6px);
}

.tema-barber-black .card{
    background:rgba(28,28,28,.92);
    backdrop-filter:blur(4px);
}

.tema-barber-black .info p{
    color:#fff !important;
}
.tema-capivara .btn{
    background:#e5391b;
}

.tema-barber-black h2,
.tema-neon h2,
.tema-natal h2,
.tema-anonovo h2{
    color:#fff !important;
}

/* NEON */

.tema-neon{
    background:#051b12;
}

.tema-neon .topo,
.tema-neon .card{
    background:#0b2b1f;
}

.tema-neon .info p{
    color:#00ff88 !important;
}

/* NATAL */

.tema-natal{
    background:#0b3d1d;
}

.tema-natal .topo,
.tema-natal .card{
    background:#14532d;
}

.tema-natal .info p{
    color:#fff !important;
}

/* ANO NOVO */

.tema-anonovo{
    background:#111827;
}

.tema-anonovo .topo,
.tema-anonovo .card{
    background:#1f2937;
}

.tema-anonovo .info p{
    color:#fff !important;
}

.tema-barber-black h2{
    text-align:center;
    font-size:32px;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(255,255,255,.2);
}

/* RESPONSIVO CELULAR */
@media (max-width: 600px){

    .topo{
        flex-direction: column;
        text-align: center;
    }

    .info h1{
        font-size: 22px;
        line-height: 1.2;
        word-break: break-word;
    }

    .info p{
        font-size: 14px;
    }

    .logo-box{
        width: 80px;
        height: 80px;
        min-width: 80px;
    }

    .logo{
        width: 70px;
        height: 70px;
    }

    .card{
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }

    .btn{
        width: 100%;
    }

}
</style>

</head>
<body>

<div id="empresa"></div>

<h2>💈 Serviços</h2>

<div id="lista">
    Carregando...
</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);

const APP_ID =
    params.get("app_id") ||
    localStorage.getItem("app_id");

if(APP_ID){
    localStorage.setItem("app_id", APP_ID);
}

console.log("APP_ID:", APP_ID);

async function carregarEmpresa(){

    const { data: empresas, error } = await db
    .from("barbearia_config")
    .select("*");

    const empresa = empresas?.find(
        e => e.app_id === APP_ID
    );

    if(!empresa){
        console.log("EMPRESA NÃO ENCONTRADA");
        return;
    }

    document.body.classList.remove(
        "tema-barber-black",
        "tema-gold",
        "tema-neon",
        "tema-natal",
        "tema-anonovo",
        "tema-capivara"
    );

    if(empresa.tema_site){
        document.body.classList.add(
            "tema-" + empresa.tema_site
        );
    }

    document.getElementById("empresa").innerHTML = `
        <div class="topo">

            <img
                src="${empresa.logo_url || 'https://via.placeholder.com/100'}"
                class="logo">

            <div class="info">
                <h1>${empresa.nome_salao || ''}</h1>
                <p>${empresa.endereco || ''}</p>
                <p>${empresa.telefone || ''}</p>
            </div>

        </div>
    `;
}

async function carregarServicos(){

    try{

       const { data, error } = await db
.from("barbearia_servicos")
.select("*")
.eq("app_id", APP_ID);

console.table(data);
        console.log("ERROR:", error);

        if(error){

            document.getElementById("lista").innerHTML =
                `<p class="erro">${error.message}</p>`;

            return;
        }

        if(!data || data.length === 0){

            document.getElementById("lista").innerHTML =
                `<p class="vazio">Nenhum serviço cadastrado.</p>`;

            return;
        }

        let html = "";

        data.forEach(servico => {

            html += `
            <div class="card">

                <div>
                    <h3>${servico.nome}</h3>

                    <small>
                        ${servico.duracao_minutos || 0} min
                    </small>

                    <br>

                    <strong>
                        R$ ${Number(servico.valor).toFixed(2)}
                    </strong>
                </div>

                <button
                    class="btn"
                    onclick="reservar(${servico.id})">
                    Agendar
                </button>

            </div>
            `;
        });

        document.getElementById("lista").innerHTML = html;

    }catch(err){

        console.error(err);

        document.getElementById("lista").innerHTML =
            `<p class="erro">${err.message}</p>`;
    }
}

function reservar(id){

    localStorage.setItem(
        "servicoSelecionado",
        id
    );

    localStorage.setItem(
        "barbeariaAppId",
        APP_ID
    );

    location.href = "profissionais.html";
}

if(!APP_ID){

    document.getElementById("lista").innerHTML =
        "<p class='erro'>Barbearia não identificada.</p>";

}else{

    carregarEmpresa();
    carregarServicos();

}

</script>

</body>
</html>
