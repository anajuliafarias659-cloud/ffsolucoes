<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Serviços</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.btn{
    background:#0d8db8;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.erro{
    color:red;
    font-weight:bold;
}

.vazio{
    color:#666;
}
</style>
</head>
<body>

<h2>💈 Serviços</h2>

<div id="lista">
    Carregando...
</div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

async function carregarServicos(){

    try{

        const { data, error } = await db
        .from("barbearia_servicos")
        .select("*")
        .eq("ativo", true)
        .order("nome");

        console.log("DATA:", data);
        console.log("ERROR:", error);

        if(error){
            document.getElementById("lista").innerHTML =
            `<p class="erro">${error.message}</p>`;
            return;
        }

        if(!data || data.length === 0){

            document.getElementById("lista").innerHTML =
            `<p class="vazio">Nenhum serviço cadastrado.</p>`;

            return;
        }

        let html = "";

        data.forEach(servico=>{

            html += `
            <div class="card">

                <div>
                    <h3>${servico.nome}</h3>

                    <small>
                        ${servico.duracao_minutos || 0} min
                    </small>

                    <br>

                    <strong>
                        R$ ${Number(servico.valor).toFixed(2)}
                    </strong>
                </div>

                <button
                    class="btn"
                    onclick="reservar(${servico.id})">
                    Reservar
                </button>

            </div>
            `;
        });

        document.getElementById("lista").innerHTML = html;

    }catch(err){

        console.error(err);

        document.getElementById("lista").innerHTML =
        `<p class="erro">${err.message}</p>`;
    }
}

function reservar(id){

    localStorage.setItem(
        "servicoSelecionado",
        id
    );

    alert("Serviço selecionado: " + id);

    // futuramente:
    // location.href="profissionais.html";
}

carregarServicos();

</script>

</body>
</html>
