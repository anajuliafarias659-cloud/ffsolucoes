<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Serviços</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn{
    background:#0d8db8;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>💈 Serviços</h2>

<div id="lista"></div>

<script>

const db = window.supabase.createClient(
    "https://pdajixsoowcyhnjwhgpc.supabase.co",
    "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

async function carregarServicos(){

    const { data } = await supabase
    .from("barbearia_servicos")
    .select("*")
    .eq("ativo", true)
    .order("nome");

    let html = "";

    data.forEach(servico=>{

        html += `
        <div class="card">

            <div>
                <h3>${servico.nome}</h3>

                <small>
                    ${servico.duracao_minutos} min
                </small>

                <br>

                <strong>
                    R$ ${servico.valor}
                </strong>
            </div>

            <button
            class="btn"
            onclick="reservar(${servico.id})">
            Reservar
            </button>

        </div>
        `;
    });

    document.getElementById("lista").innerHTML = html;
}

function reservar(id){

    localStorage.setItem(
        "servicoSelecionado",
        id
    );

    location.href="profissionais.html";
}

carregarServicos();

</script>

</body>
</html>
