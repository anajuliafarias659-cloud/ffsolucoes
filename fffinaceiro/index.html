<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.8;
}

.linha{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.saldo{
  font-size:22px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Controle Financeiro</h2>

<div class="card">
  <h3>Saldo Atual</h3>
  <div class="saldo" id="saldo">R$ 0</div>
</div>

<div class="card">
  <h3>Adicionar Entrada</h3>
  <input type="text" id="descEntrada" placeholder="Ex: Salário / Extra">
  <input type="number" id="valorEntrada" placeholder="Valor">
  <button onclick="addEntrada()">Adicionar</button>
</div>

<div class="card">
  <h3>Adicionar Gasto</h3>
  <input type="text" id="descSaida" placeholder="Ex: Mercado, Internet">
  <input type="number" id="valorSaida" placeholder="Valor">
  <select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Lazer</option>
    <option>Contas</option>
    <option>Outros</option>
  </select>
  <button onclick="addSaida()">Adicionar</button>
</div>

<div class="card">
  <h3>Histórico</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Gráfico</h3>
  <canvas id="grafico"></canvas>
</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("financeiro")) || [];

function salvar(){
  localStorage.setItem("financeiro", JSON.stringify(dados));
  atualizar();
}

function addEntrada(){
  let desc = document.getElementById("descEntrada").value;
  let valor = parseFloat(document.getElementById("valorEntrada").value);

  if(!valor) return alert("Digite valor");

  dados.push({
    tipo:"entrada",
    desc,
    valor
  });

  salvar();
}

function addSaida(){
  let desc = document.getElementById("descSaida").value;
  let valor = parseFloat(document.getElementById("valorSaida").value);
  let categoria = document.getElementById("categoria").value;

  if(!valor) return alert("Digite valor");

  dados.push({
    tipo:"saida",
    desc,
    valor,
    categoria
  });

  salvar();
}

function atualizar(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let entradas = 0;
  let saidas = 0;

  dados.forEach((item,i)=>{
    let div = document.createElement("div");
    div.className="linha";

    div.innerHTML = `
      <span>${item.desc}</span>
      <span style="color:${item.tipo=="entrada"?"#22c55e":"#ef4444"}">
        R$ ${item.valor}
      </span>
    `;

    lista.appendChild(div);

    if(item.tipo=="entrada") entradas += item.valor;
    else saidas += item.valor;
  });

  let saldo = entradas - saidas;
  document.getElementById("saldo").innerText = "R$ " + saldo.toFixed(2);

  desenharGrafico(entradas, saidas);
}

let chart;

function desenharGrafico(entradas, saidas){
  let ctx = document.getElementById("grafico");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type:"doughnut",
    data:{
      labels:["Entradas","Saídas"],
      datasets:[{
        data:[entradas, saidas],
        backgroundColor:["#22c55e","#ef4444"]
      }]
    }
  });
}

atualizar();

</script>

</body>
</html>
