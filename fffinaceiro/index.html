<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestão Financeira</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#020617;
    color:#fff;
  }

  .topo{
    padding:18px 16px;
    background:#0f172a;
    border-bottom:1px solid rgba(255,255,255,.08);
    position:sticky;
    top:0;
    z-index:10;
  }

  .topo .linha{
    max-width:1100px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }

  .titulo{
    font-size:24px;
    font-weight:700;
  }

  .container{
    max-width:1100px;
    margin:auto;
    padding:18px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }

  .grid-3{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
  }

  .card{
    background:#0f172a;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
  }

  .card h3{
    margin:0 0 14px;
    font-size:18px;
  }

  .resumo{
    font-size:28px;
    font-weight:700;
    margin-top:8px;
  }

  .verde{color:#22c55e}
  .vermelho{color:#ef4444}
  .azul{color:#38bdf8}

  input, select{
    width:100%;
    padding:12px 14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#020617;
    color:#fff;
    margin-bottom:10px;
    border:1px solid rgba(255,255,255,.08);
  }

  button{
    border:none;
    border-radius:12px;
    padding:12px 14px;
    cursor:pointer;
    font-weight:700;
    color:#fff;
  }

  .btn-primario{background:#2563eb}
  .btn-verde{background:#16a34a}
  .btn-vermelho{background:#dc2626}
  .btn-cinza{background:#334155}

  .acoes{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .acoes button{
    flex:1;
    min-width:120px;
  }

  .lista{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:450px;
    overflow:auto;
  }

  .item{
    background:#020617;
    border:1px solid rgba(255,255,255,.06);
    border-radius:14px;
    padding:12px;
    display:grid;
    grid-template-columns:1fr auto;
    gap:8px;
    align-items:center;
  }

  .item-topo{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }

  .tag{
    font-size:12px;
    padding:4px 8px;
    border-radius:999px;
    background:#1e293b;
    color:#cbd5e1;
  }

  .tag.entrada{
    background:rgba(34,197,94,.15);
    color:#4ade80;
  }

  .tag.saida{
    background:rgba(239,68,68,.15);
    color:#f87171;
  }

  .item-desc{
    font-weight:700;
  }

  .item-sub{
    font-size:13px;
    color:#94a3b8;
    margin-top:4px;
  }

  .valor{
    font-weight:700;
    font-size:18px;
  }

  .login-box{
    max-width:420px;
    margin:50px auto;
  }

  .hidden{display:none !important}

  .msg{
    margin-top:10px;
    font-size:14px;
    color:#facc15;
  }

  canvas{
    width:100% !important;
    max-height:320px !important;
  }

  .filtros{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
  }

  @media(max-width:900px){
    .grid,
    .grid-3,
    .filtros{
      grid-template-columns:1fr;
    }

    .topo .linha{
      align-items:flex-start;
    }

    .titulo{
      font-size:20px;
    }

    .resumo{
      font-size:24px;
    }
  }
</style>
</head>
<body>

<div class="topo">
  <div class="linha">
    <div class="titulo">💰 Gestão Financeira</div>
    <div class="acoes">
      <button id="btnMostrarLogin" class="btn-cinza">Login</button>
      <button id="btnLogout" class="btn-vermelho hidden">Sair</button>
    </div>
  </div>
</div>

<div class="container">

  <!-- LOGIN -->
  <div id="areaLogin" class="login-box">
    <div class="card">
      <h3>Entrar / Criar conta</h3>
      <input type="email" id="email" placeholder="Seu e-mail">
      <input type="password" id="senha" placeholder="Sua senha">
      <div class="acoes">
        <button class="btn-primario" id="btnLogin">Entrar</button>
        <button class="btn-verde" id="btnCadastro">Criar conta</button>
      </div>
      <div id="msgLogin" class="msg"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="areaApp" class="hidden">
    <div class="grid-3">
      <div class="card">
        <h3>Saldo Atual</h3>
        <div class="resumo azul" id="saldoAtual">R$ 0,00</div>
      </div>
      <div class="card">
        <h3>Total Entradas</h3>
        <div class="resumo verde" id="totalEntradas">R$ 0,00</div>
      </div>
      <div class="card">
        <h3>Total Saídas</h3>
        <div class="resumo vermelho" id="totalSaidas">R$ 0,00</div>
      </div>
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card">
        <h3>Novo movimento</h3>

        <select id="tipo">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <input type="text" id="descricao" placeholder="Descrição. Ex: Salário, Mercado, Internet">

        <input type="number" id="valor" placeholder="Valor" step="0.01">

        <select id="categoria">
          <option value="Salário">Salário</option>
          <option value="Renda Extra">Renda Extra</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Moradia">Moradia</option>
          <option value="Internet">Internet</option>
          <option value="Água">Água</option>
          <option value="Energia">Energia</option>
          <option value="Saúde">Saúde</option>
          <option value="Lazer">Lazer</option>
          <option value="Investimento">Investimento</option>
          <option value="Outros">Outros</option>
        </select>

        <input type="date" id="data_movimento">

        <div class="acoes">
          <button class="btn-verde" id="btnSalvar">Salvar movimento</button>
        </div>

        <div id="msgApp" class="msg"></div>
      </div>

      <div class="card">
        <h3>Gráfico de Entradas x Saídas</h3>
        <canvas id="graficoFinanceiro"></canvas>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Filtros</h3>
      <div class="filtros">
        <input type="month" id="filtroMes">
        <select id="filtroTipo">
          <option value="">Todos os tipos</option>
          <option value="entrada">Somente entradas</option>
          <option value="saida">Somente saídas</option>
        </select>
        <select id="filtroCategoria">
          <option value="">Todas as categorias</option>
        </select>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Histórico</h3>
      <div id="listaMovimentos" class="lista"></div>
    </div>
  </div>
</div>

<script>
  const supabaseUrl = "SEU_SUPABASE_URL";
  const supabaseKey = "SUA_SUPABASE_ANON_KEY";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const areaLogin = document.getElementById("areaLogin");
  const areaApp = document.getElementById("areaApp");
  const btnLogout = document.getElementById("btnLogout");
  const btnMostrarLogin = document.getElementById("btnMostrarLogin");
  const msgLogin = document.getElementById("msgLogin");
  const msgApp = document.getElementById("msgApp");

  const emailEl = document.getElementById("email");
  const senhaEl = document.getElementById("senha");

  const tipoEl = document.getElementById("tipo");
  const descricaoEl = document.getElementById("descricao");
  const valorEl = document.getElementById("valor");
  const categoriaEl = document.getElementById("categoria");
  const dataMovimentoEl = document.getElementById("data_movimento");

  const filtroMesEl = document.getElementById("filtroMes");
  const filtroTipoEl = document.getElementById("filtroTipo");
  const filtroCategoriaEl = document.getElementById("filtroCategoria");

  const saldoAtualEl = document.getElementById("saldoAtual");
  const totalEntradasEl = document.getElementById("totalEntradas");
  const totalSaidasEl = document.getElementById("totalSaidas");
  const listaMovimentosEl = document.getElementById("listaMovimentos");

  let usuarioAtual = null;
  let movimentos = [];
  let chart = null;

  function moeda(v){
    return Number(v || 0).toLocaleString("pt-BR", {
      style:"currency",
      currency:"BRL"
    });
  }

  function hojeISO(){
    const d = new Date();
    const ano = d.getFullYear();
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    const dia = String(d.getDate()).padStart(2, "0");
    return `${ano}-${mes}-${dia}`;
  }

  function mesAtualISO(){
    const d = new Date();
    const ano = d.getFullYear();
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    return `${ano}-${mes}`;
  }

  function limparMensagens(){
    msgLogin.textContent = "";
    msgApp.textContent = "";
  }

  function mostrarLogin(){
    areaLogin.classList.remove("hidden");
    areaApp.classList.add("hidden");
    btnLogout.classList.add("hidden");
  }

  function mostrarApp(){
    areaLogin.classList.add("hidden");
    areaApp.classList.remove("hidden");
    btnLogout.classList.remove("hidden");
  }

  async function cadastrar(){
    limparMensagens();

    const email = emailEl.value.trim();
    const senha = senhaEl.value.trim();

    if(!email || !senha){
      msgLogin.textContent = "Preencha e-mail e senha.";
      return;
    }

    const { error } = await supabase.auth.signUp({
      email,
      password: senha
    });

    if(error){
      msgLogin.textContent = error.message;
      return;
    }

    msgLogin.textContent = "Conta criada. Se seu projeto exigir confirmação por e-mail, confirme antes de entrar.";
  }

  async function entrar(){
    limparMensagens();

    const email = emailEl.value.trim();
    const senha = senhaEl.value.trim();

    if(!email || !senha){
      msgLogin.textContent = "Preencha e-mail e senha.";
      return;
    }

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password: senha
    });

    if(error){
      msgLogin.textContent = error.message;
      return;
    }

    await verificarUsuario();
  }

  async function sair(){
    await supabase.auth.signOut();
    usuarioAtual = null;
    movimentos = [];
    mostrarLogin();
  }

  async function verificarUsuario(){
    const { data, error } = await supabase.auth.getUser();

    if(error || !data?.user){
      usuarioAtual = null;
      mostrarLogin();
      return;
    }

    usuarioAtual = data.user;
    mostrarApp();
    await carregarMovimentos();
  }

  async function salvarMovimento(){
    limparMensagens();

    if(!usuarioAtual){
      msgApp.textContent = "Usuário não logado.";
      return;
    }

    const tipo = tipoEl.value;
    const descricao = descricaoEl.value.trim();
    const valor = parseFloat(valorEl.value);
    const categoria = categoriaEl.value;
    const data_movimento = dataMovimentoEl.value || hojeISO();

    if(!descricao){
      msgApp.textContent = "Digite a descrição.";
      return;
    }

    if(!valor || valor <= 0){
      msgApp.textContent = "Digite um valor válido.";
      return;
    }

    const { error } = await supabase
      .from("financeiro_movimentos")
      .insert([{
        user_id: usuarioAtual.id,
        tipo,
        descricao,
        valor,
        categoria,
        data_movimento
      }]);

    if(error){
      msgApp.textContent = error.message;
      return;
    }

    descricaoEl.value = "";
    valorEl.value = "";
    categoriaEl.value = "Salário";
    tipoEl.value = "entrada";
    dataMovimentoEl.value = hojeISO();
    msgApp.textContent = "Movimento salvo com sucesso.";

    await carregarMovimentos();
  }

  async function excluirMovimento(id){
    const ok = confirm("Deseja excluir este movimento?");
    if(!ok) return;

    const { error } = await supabase
      .from("financeiro_movimentos")
      .delete()
      .eq("id", id);

    if(error){
      msgApp.textContent = error.message;
      return;
    }

    await carregarMovimentos();
  }

  function aplicarFiltros(lista){
    let filtrado = [...lista];

    const mes = filtroMesEl.value;
    const tipo = filtroTipoEl.value;
    const categoria = filtroCategoriaEl.value;

    if(mes){
      filtrado = filtrado.filter(item => String(item.data_movimento || "").startsWith(mes));
    }

    if(tipo){
      filtrado = filtrado.filter(item => item.tipo === tipo);
    }

    if(categoria){
      filtrado = filtrado.filter(item => item.categoria === categoria);
    }

    return filtrado;
  }

  function preencherCategoriasFiltro(lista){
    const categorias = [...new Set(lista.map(x => x.categoria).filter(Boolean))].sort();
    const valorAtual = filtroCategoriaEl.value;

    filtroCategoriaEl.innerHTML = `<option value="">Todas as categorias</option>`;

    categorias.forEach(cat => {
      const op = document.createElement("option");
      op.value = cat;
      op.textContent = cat;
      filtroCategoriaEl.appendChild(op);
    });

    filtroCategoriaEl.value = categorias.includes(valorAtual) ? valorAtual : "";
  }

  function renderizarResumo(lista){
    const entradas = lista
      .filter(x => x.tipo === "entrada")
      .reduce((s, x) => s + Number(x.valor || 0), 0);

    const saidas = lista
      .filter(x => x.tipo === "saida")
      .reduce((s, x) => s + Number(x.valor || 0), 0);

    const saldo = entradas - saidas;

    saldoAtualEl.textContent = moeda(saldo);
    totalEntradasEl.textContent = moeda(entradas);
    totalSaidasEl.textContent = moeda(saidas);

    renderizarGrafico(entradas, saidas);
  }

  function renderizarGrafico(entradas, saidas){
    const ctx = document.getElementById("graficoFinanceiro");

    if(chart) chart.destroy();

    chart = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: ["Entradas", "Saídas"],
        datasets: [{
          data: [entradas, saidas]
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: {
              color: "#fff"
            }
          }
        }
      }
    });
  }

  function renderizarLista(lista){
    listaMovimentosEl.innerHTML = "";

    if(!lista.length){
      listaMovimentosEl.innerHTML = `<div class="item"><div>Nenhum movimento encontrado.</div></div>`;
      return;
    }

    lista.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>
          <div class="item-topo">
            <span class="tag ${item.tipo}">${item.tipo === "entrada" ? "Entrada" : "Saída"}</span>
            ${item.categoria ? `<span class="tag">${item.categoria}</span>` : ""}
          </div>
          <div class="item-desc">${escapeHtml(item.descricao || "")}</div>
          <div class="item-sub">${formatarData(item.data_movimento)}</div>
        </div>
        <div style="text-align:right;">
          <div class="valor ${item.tipo === "entrada" ? "verde" : "vermelho"}">
            ${item.tipo === "entrada" ? "+" : "-"} ${moeda(item.valor)}
          </div>
          <div style="margin-top:8px;">
            <button class="btn-vermelho" onclick="excluirMovimento(${item.id})">Excluir</button>
          </div>
        </div>
      `;

      listaMovimentosEl.appendChild(div);
    });
  }

  function escapeHtml(text){
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function formatarData(data){
    if(!data) return "";
    const [ano, mes, dia] = String(data).split("-");
    if(!ano || !mes || !dia) return data;
    return `${dia}/${mes}/${ano}`;
  }

  function atualizarTela(){
    preencherCategoriasFiltro(movimentos);
    const listaFiltrada = aplicarFiltros(movimentos);
    renderizarResumo(listaFiltrada);
    renderizarLista(listaFiltrada);
  }

  async function carregarMovimentos(){
    if(!usuarioAtual) return;

    const { data, error } = await supabase
      .from("financeiro_movimentos")
      .select("*")
      .eq("user_id", usuarioAtual.id)
      .order("data_movimento", { ascending: false })
      .order("id", { ascending: false });

    if(error){
      msgApp.textContent = error.message;
      return;
    }

    movimentos = data || [];
    atualizarTela();
  }

  document.getElementById("btnCadastro").addEventListener("click", cadastrar);
  document.getElementById("btnLogin").addEventListener("click", entrar);
  document.getElementById("btnLogout").addEventListener("click", sair);
  document.getElementById("btnSalvar").addEventListener("click", salvarMovimento);
  btnMostrarLogin.addEventListener("click", () => {
    if(areaLogin.classList.contains("hidden")){
      mostrarLogin();
    }
  });

  filtroMesEl.addEventListener("change", atualizarTela);
  filtroTipoEl.addEventListener("change", atualizarTela);
  filtroCategoriaEl.addEventListener("change", atualizarTela);

  supabase.auth.onAuthStateChange(async (_event, session) => {
    usuarioAtual = session?.user || null;
    if(usuarioAtual){
      mostrarApp();
      await carregarMovimentos();
    } else {
      mostrarLogin();
    }
  });

  dataMovimentoEl.value = hojeISO();
  filtroMesEl.value = mesAtualISO();
  verificarUsuario();

  window.excluirMovimento = excluirMovimento;
</script>

</body>
</html>
