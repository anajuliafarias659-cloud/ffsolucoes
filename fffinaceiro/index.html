<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Financeiro PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.card{
  background:#0f172a;
  padding:16px;
  border-radius:16px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.08);
}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.grid-3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
h1,h2,h3{margin:0 0 12px}
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  outline:none;
  background:#020617;
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
}
button{
  border:none;
  border-radius:12px;
  padding:12px 14px;
  color:#fff;
  cursor:pointer;
  font-weight:700;
}
.azul{background:#2563eb}
.verde{background:#16a34a}
.vermelho{background:#dc2626}
.cinza{background:#334155}
.amarelo{background:#ca8a04}
.linha-botoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.linha-botoes button{
  flex:1;
  min-width:120px;
}
.resumo{
  font-size:28px;
  font-weight:700;
}
.texto-verde{color:#22c55e}
.texto-vermelho{color:#ef4444}
.texto-azul{color:#38bdf8}
.hidden{display:none!important}
.msg{
  margin-top:8px;
  color:#facc15;
  font-size:14px;
  min-height:18px;
}
.lista{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.item{
  background:#020617;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
}
.item-topo{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
.item-titulo{
  font-weight:700;
  font-size:16px;
}
.item-sub{
  color:#94a3b8;
  font-size:13px;
  margin-top:4px;
}
.tag{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
  background:#1e293b;
}
.tag.entrada{background:rgba(34,197,94,.15); color:#4ade80}
.tag.saida{background:rgba(239,68,68,.15); color:#f87171}
.tag.pendente{background:rgba(250,204,21,.15); color:#facc15}
.tag.parcial{background:rgba(59,130,246,.15); color:#60a5fa}
.tag.pago{background:rgba(34,197,94,.15); color:#4ade80}
.valor{
  font-size:18px;
  font-weight:700;
}
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.login-box{
  max-width:450px;
  margin:40px auto;
}
@media(max-width:900px){
  .grid-2,.grid-3{grid-template-columns:1fr}
  .resumo{font-size:24px}
}
</style>
</head>
<body>

<div class="container">
  <div class="topo">
    <h1>💰 Financeiro PRO</h1>
    <div class="linha-botoes">
      <button id="btnLogout" class="vermelho hidden" onclick="sair()">Sair</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="areaLogin" class="login-box">
    <div class="card">
      <h3>Entrar / Cadastrar</h3>
      <input id="email" type="email" placeholder="E-mail">
      <input id="senha" type="password" placeholder="Senha">
      <div class="linha-botoes">
        <button class="azul" onclick="login()">Entrar</button>
        <button class="verde" onclick="cadastro()">Cadastrar</button>
      </div>
      <div id="msgLogin" class="msg"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="areaApp" class="hidden">

    <div class="grid-3">
      <div class="card">
        <h3>Saldo Atual</h3>
        <div id="saldoAtual" class="resumo texto-azul">R$ 0,00</div>
      </div>

      <div class="card">
        <h3>Total Entradas</h3>
        <div id="totalEntradas" class="resumo texto-verde">R$ 0,00</div>
      </div>

      <div class="card">
        <h3>Total Saídas</h3>
        <div id="totalSaidas" class="resumo texto-vermelho">R$ 0,00</div>
      </div>
    </div>

    <div class="grid-3">
      <div class="card">
        <h3>Dívidas Pendentes</h3>
        <div id="dividasPendentes" class="resumo" style="color:#facc15">R$ 0,00</div>
      </div>

      <div class="card">
        <h3>Saldo Livre</h3>
        <div id="saldoLivre" class="resumo" style="color:#a78bfa">R$ 0,00</div>
      </div>

      <div class="card">
        <h3>Total já Pago em Dívidas</h3>
        <div id="dividasPagas" class="resumo" style="color:#4ade80">R$ 0,00</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>💰 Novo Movimento</h3>

        <select id="tipoMov">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <input id="descMov" placeholder="Descrição">
        <input id="valorMov" type="number" step="0.01" placeholder="Valor">

        <select id="categoriaMov">
          <option value="Salário">Salário</option>
          <option value="Renda Extra">Renda Extra</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Moradia">Moradia</option>
          <option value="Internet">Internet</option>
          <option value="Água">Água</option>
          <option value="Energia">Energia</option>
          <option value="Saúde">Saúde</option>
          <option value="Lazer">Lazer</option>
          <option value="Investimento">Investimento</option>
          <option value="Outros">Outros</option>
        </select>

        <input id="dataMov" type="date">

        <button class="azul" onclick="addMov()">Salvar movimento</button>
        <div id="msgMov" class="msg"></div>
      </div>

      <div class="card">
        <h3>💳 Nova Dívida</h3>

        <input id="descDivida" placeholder="Descrição da dívida">
        <input id="valorDivida" type="number" step="0.01" placeholder="Valor total">

        <select id="categoriaDivida">
          <option value="Cartão">Cartão</option>
          <option value="Empréstimo">Empréstimo</option>
          <option value="Financiamento">Financiamento</option>
          <option value="Conta">Conta</option>
          <option value="Outros">Outros</option>
        </select>

        <input id="vencimentoDivida" type="date">

        <button class="vermelho" onclick="criarDivida()">Salvar dívida</button>
        <div id="msgDiv" class="msg"></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>📋 Movimentos</h3>
        <div id="listaMovimentos" class="lista"></div>
      </div>

      <div class="card">
        <h3>📌 Dívidas</h3>
        <div id="listaDividas" class="lista"></div>
      </div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user = null;

function moeda(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function hojeISO(){
  const d = new Date();
  const ano = d.getFullYear();
  const mes = String(d.getMonth() + 1).padStart(2, "0");
  const dia = String(d.getDate()).padStart(2, "0");
  return `${ano}-${mes}-${dia}`;
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = text || "";
  return div.innerHTML;
}

function setMsg(id, texto){
  document.getElementById(id).textContent = texto || "";
}

function mostrarLogin(){
  document.getElementById("areaLogin").classList.remove("hidden");
  document.getElementById("areaApp").classList.add("hidden");
  document.getElementById("btnLogout").classList.add("hidden");
}

function mostrarApp(){
  document.getElementById("areaLogin").classList.add("hidden");
  document.getElementById("areaApp").classList.remove("hidden");
  document.getElementById("btnLogout").classList.remove("hidden");
}

async function cadastro(){
  setMsg("msgLogin", "");

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    setMsg("msgLogin", "Preencha e-mail e senha.");
    return;
  }

  const { error } = await supabaseClient.auth.signUp({
    email,
    password: senha
  });

  if(error){
    if((error.message || "").toLowerCase().includes("already registered")){
      setMsg("msgLogin", "Esse e-mail já está cadastrado. Clique em Entrar.");
    } else {
      setMsg("msgLogin", error.message);
    }
    return;
  }

  setMsg("msgLogin", "Conta criada com sucesso. Agora clique em Entrar.");
}

async function login(){
  setMsg("msgLogin", "");

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    setMsg("msgLogin", "Preencha e-mail e senha.");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    setMsg("msgLogin", error.message);
    return;
  }

  await iniciar();
}

async function sair(){
  await supabaseClient.auth.signOut();
  user = null;
  mostrarLogin();
}

async function iniciar(){
  const { data, error } = await supabaseClient.auth.getUser();

  if(error || !data?.user){
    mostrarLogin();
    return;
  }

  user = data.user;
  mostrarApp();

  document.getElementById("dataMov").value = hojeISO();
  document.getElementById("vencimentoDivida").value = hojeISO();

  await Promise.all([
    carregarMovimentos(),
    carregarDividas(),
    carregarResumo()
  ]);
}

async function addMov(){
  setMsg("msgMov", "");

  if(!user){
    setMsg("msgMov", "Faça login primeiro.");
    return;
  }

  const tipo = document.getElementById("tipoMov").value;
  const descricao = document.getElementById("descMov").value.trim();
  const valor = parseFloat(document.getElementById("valorMov").value);
  const categoria = document.getElementById("categoriaMov").value;
  const data_movimento = document.getElementById("dataMov").value || hojeISO();

  if(!descricao){
    setMsg("msgMov", "Digite a descrição.");
    return;
  }

  if(!valor || valor <= 0){
    setMsg("msgMov", "Digite um valor válido.");
    return;
  }

  const { error } = await supabaseClient
    .from("financeiro_movimentos")
    .insert([{
      user_id: user.id,
      tipo,
      descricao,
      valor,
      categoria,
      data_movimento
    }]);

  if(error){
    setMsg("msgMov", error.message);
    return;
  }

  document.getElementById("descMov").value = "";
  document.getElementById("valorMov").value = "";
  document.getElementById("categoriaMov").value = "Salário";
  document.getElementById("tipoMov").value = "entrada";
  document.getElementById("dataMov").value = hojeISO();

  setMsg("msgMov", "Movimento salvo com sucesso.");

  await Promise.all([
    carregarMovimentos(),
    carregarResumo()
  ]);
}

async function criarDivida(){
  setMsg("msgDiv", "");

  if(!user){
    setMsg("msgDiv", "Faça login primeiro.");
    return;
  }

  const descricao = document.getElementById("descDivida").value.trim();
  const valor_total = parseFloat(document.getElementById("valorDivida").value);
  const categoria = document.getElementById("categoriaDivida").value;
  const vencimento = document.getElementById("vencimentoDivida").value || null;

  if(!descricao){
    setMsg("msgDiv", "Digite a descrição da dívida.");
    return;
  }

  if(!valor_total || valor_total <= 0){
    setMsg("msgDiv", "Digite um valor válido.");
    return;
  }

  const { error } = await supabaseClient
    .from("financeiro_dividas")
    .insert([{
      user_id: user.id,
      descricao,
      valor_total,
      valor_pago: 0,
      categoria,
      vencimento,
      status: "pendente"
    }]);

  if(error){
    setMsg("msgDiv", error.message);
    return;
  }

  document.getElementById("descDivida").value = "";
  document.getElementById("valorDivida").value = "";
  document.getElementById("categoriaDivida").value = "Cartão";
  document.getElementById("vencimentoDivida").value = hojeISO();

  setMsg("msgDiv", "Dívida salva com sucesso.");

  await Promise.all([
    carregarDividas(),
    carregarResumo()
  ]);
}

async function carregarMovimentos(){
  if(!user) return;

  const { data, error } = await supabaseClient
    .from("financeiro_movimentos")
    .select("*")
    .eq("user_id", user.id)
    .order("data_movimento", { ascending: false })
    .order("id", { ascending: false });

  if(error){
    setMsg("msgMov", error.message);
    return;
  }

  const lista = document.getElementById("listaMovimentos");
  lista.innerHTML = "";

  if(!data || !data.length){
    lista.innerHTML = `<div class="item">Nenhum movimento cadastrado.</div>`;
    return;
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="item-topo">
        <div>
          <div>
            <span class="tag ${item.tipo}">${item.tipo === "entrada" ? "Entrada" : "Saída"}</span>
            ${item.categoria ? `<span class="tag">${escapeHtml(item.categoria)}</span>` : ""}
          </div>
          <div class="item-titulo">${escapeHtml(item.descricao)}</div>
          <div class="item-sub">${formatarData(item.data_movimento)}</div>
        </div>
        <div class="valor ${item.tipo === 'entrada' ? 'texto-verde' : 'texto-vermelho'}">
          ${item.tipo === 'entrada' ? '+' : '-'} ${moeda(item.valor)}
        </div>
      </div>
    `;
    lista.appendChild(div);
  });
}

async function carregarDividas(){
  if(!user) return;

  const { data, error } = await supabaseClient
    .from("financeiro_dividas")
    .select("*")
    .eq("user_id", user.id)
    .order("id", { ascending: false });

  if(error){
    setMsg("msgDiv", error.message);
    return;
  }

  const lista = document.getElementById("listaDividas");
  lista.innerHTML = "";

  if(!data || !data.length){
    lista.innerHTML = `<div class="item">Nenhuma dívida cadastrada.</div>`;
    return;
  }

  data.forEach(d => {
    const restante = Number(d.valor_total || 0) - Number(d.valor_pago || 0);

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="item-topo">
        <div>
          <div>
            <span class="tag ${d.status}">${capitalize(d.status)}</span>
            ${d.categoria ? `<span class="tag">${escapeHtml(d.categoria)}</span>` : ""}
          </div>
          <div class="item-titulo">${escapeHtml(d.descricao)}</div>
          <div class="item-sub">Vence: ${d.vencimento ? formatarData(d.vencimento) : "-"}</div>
          <div class="item-sub">Total: ${moeda(d.valor_total)} | Pago: ${moeda(d.valor_pago)} | Restante: ${moeda(restante)}</div>
        </div>
      </div>

      ${restante > 0 ? `
        <div style="margin-top:10px;">
          <input id="pagar_${d.id}" type="number" step="0.01" placeholder="Valor para pagar">
          <div class="linha-botoes">
            <button class="verde" onclick="pagarDivida(${d.id}, ${Number(d.valor_total)}, ${Number(d.valor_pago)}, '${escapeForJs(d.descricao)}', '${escapeForJs(d.categoria || "Dívidas")}')">Pagar</button>
          </div>
        </div>
      ` : ""}
    `;
    lista.appendChild(div);
  });
}

async function pagarDivida(id, valorTotal, valorPagoAtual, descricao, categoria){
  setMsg("msgDiv", "");

  if(!user){
    setMsg("msgDiv", "Faça login primeiro.");
    return;
  }

  const campo = document.getElementById("pagar_" + id);
  const valor = parseFloat(campo.value);

  if(!valor || valor <= 0){
    setMsg("msgDiv", "Digite um valor válido para pagamento.");
    return;
  }

  const restanteAntes = valorTotal - valorPagoAtual;

  if(valor > restanteAntes){
    setMsg("msgDiv", "O pagamento não pode ser maior que o restante.");
    return;
  }

  const novoValorPago = Number(valorPagoAtual) + Number(valor);
  const restante = Number(valorTotal) - Number(novoValorPago);

  let status = "pendente";
  if(novoValorPago > 0 && restante > 0) status = "parcial";
  if(restante === 0) status = "pago";

  const { error: errorDiv } = await supabaseClient
    .from("financeiro_dividas")
    .update({
      valor_pago: novoValorPago,
      status
    })
    .eq("id", id)
    .eq("user_id", user.id);

  if(errorDiv){
    setMsg("msgDiv", errorDiv.message);
    return;
  }

  const { error: errorMov } = await supabaseClient
    .from("financeiro_movimentos")
    .insert([{
      user_id: user.id,
      tipo: "saida",
      descricao: "Pagamento dívida: " + descricao,
      valor: valor,
      categoria: categoria || "Dívidas",
      data_movimento: hojeISO()
    }]);

  if(errorMov){
    setMsg("msgDiv", errorMov.message);
    return;
  }

  setMsg("msgDiv", "Pagamento registrado com sucesso.");

  await Promise.all([
    carregarDividas(),
    carregarMovimentos(),
    carregarResumo()
  ]);
}

async function carregarResumo(){
  if(!user) return;

  const [{ data: movimentos, error: movError }, { data: dividas, error: divError }] = await Promise.all([
    supabaseClient
      .from("financeiro_movimentos")
      .select("tipo,valor")
      .eq("user_id", user.id),
    supabaseClient
      .from("financeiro_dividas")
      .select("valor_total,valor_pago,status")
      .eq("user_id", user.id)
  ]);

  if(movError){
    setMsg("msgMov", movError.message);
    return;
  }

  if(divError){
    setMsg("msgDiv", divError.message);
    return;
  }

  let entradas = 0;
  let saidas = 0;

  (movimentos || []).forEach(m => {
    if(m.tipo === "entrada") entradas += Number(m.valor || 0);
    if(m.tipo === "saida") saidas += Number(m.valor || 0);
  });

  let pendentes = 0;
  let pagos = 0;

  (dividas || []).forEach(d => {
    const total = Number(d.valor_total || 0);
    const pago = Number(d.valor_pago || 0);
    const restante = total - pago;

    pagos += pago;
    if(restante > 0) pendentes += restante;
  });

  const saldoAtual = entradas - saidas;
  const saldoLivre = saldoAtual - pendentes;

  document.getElementById("saldoAtual").textContent = moeda(saldoAtual);
  document.getElementById("totalEntradas").textContent = moeda(entradas);
  document.getElementById("totalSaidas").textContent = moeda(saidas);
  document.getElementById("dividasPendentes").textContent = moeda(pendentes);
  document.getElementById("dividasPagas").textContent = moeda(pagos);
  document.getElementById("saldoLivre").textContent = moeda(saldoLivre);
}

function formatarData(data){
  if(!data) return "";
  const [ano, mes, dia] = String(data).split("-");
  if(!ano || !mes || !dia) return data;
  return `${dia}/${mes}/${ano}`;
}

function capitalize(txt){
  txt = txt || "";
  return txt.charAt(0).toUpperCase() + txt.slice(1);
}

function escapeForJs(text){
  return String(text)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'");
}

iniciar();
</script>
</body>
</html>
