<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Financeiro PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:Arial}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#0f172a;padding:15px;border-radius:15px;margin-bottom:15px}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none}
button{padding:10px;border:none;border-radius:10px;color:#fff;cursor:pointer}
.verde{background:#22c55e}
.vermelho{background:#ef4444}
.azul{background:#3b82f6}
.item{border-bottom:1px solid #222;padding:10px 0}
</style>
</head>

<body>

<div class="container">

<h2>💰 Financeiro PRO</h2>

<div class="card">
<input id="email" placeholder="email">
<input id="senha" type="password" placeholder="senha">
<button class="azul" onclick="login()">Entrar</button>
<button class="verde" onclick="cadastro()">Cadastrar</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>➕ Nova Dívida</h3>
<input id="descDivida" placeholder="Descrição">
<input id="valorDivida" type="number" placeholder="Valor total">
<input id="vencimento" type="date">
<button class="vermelho" onclick="criarDivida()">Criar dívida</button>
</div>

<div class="card">
<h3>💳 Dívidas</h3>
<div id="listaDividas"></div>
</div>

</div>

</div>

<script>

const supabase = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let user;

async function cadastro(){
  await supabase.auth.signUp({
    email: email.value,
    password: senha.value
  });
  alert("Conta criada");
}

async function login(){
  await supabase.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  });
  iniciar();
}

async function iniciar(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(!user) return;

  document.getElementById("app").style.display="block";
  carregarDividas();
}

async function criarDivida(){
  await supabase.from("financeiro_dividas").insert([{
    user_id: user.id,
    descricao: descDivida.value,
    valor_total: valorDivida.value,
    vencimento: vencimento.value
  }]);

  carregarDividas();
}

async function carregarDividas(){
  const { data } = await supabase
  .from("financeiro_dividas")
  .select("*")
  .eq("user_id", user.id);

  let html = "";

  data.forEach(d => {

    let restante = d.valor_total - d.valor_pago;

    html += `
    <div class="item">
      <b>${d.descricao}</b><br>
      Total: R$ ${d.valor_total}<br>
      Pago: R$ ${d.valor_pago}<br>
      Restante: R$ ${restante}<br>
      Status: ${d.status}<br>

      <input id="pagar_${d.id}" type="number" placeholder="valor pagamento">

      <button class="verde" onclick="pagar(${d.id}, ${d.valor_total}, ${d.valor_pago})">
        Pagar
      </button>
    </div>
    `;
  });

  listaDividas.innerHTML = html;
}

async function pagar(id, total, pago){

  let valor = Number(document.getElementById("pagar_"+id).value);

  let novoPago = pago + valor;
  let restante = total - novoPago;

  let status = "pendente";

  if(novoPago > 0 && restante > 0) status = "parcial";
  if(restante <= 0) status = "pago";

  await supabase
  .from("financeiro_dividas")
  .update({
    valor_pago: novoPago,
    status
  })
  .eq("id", id);

  // cria saída automática
  await supabase.from("financeiro_movimentos").insert([{
    user_id: user.id,
    tipo:"saida",
    descricao:"Pagamento dívida",
    valor: valor
  }]);

  carregarDividas();
}

iniciar();

</script>

</body>
</html>
