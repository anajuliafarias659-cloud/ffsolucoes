<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel FF Filmes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#020617;
      color:#fff;
    }
    .topo{
      background:#0f172a;
      padding:18px 20px;
      font-size:26px;
      font-weight:800;
      color:#ef4444;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,.08);
      position:sticky;
      top:0;
      z-index:5;
    }
    .container{
      max-width:1280px;
      margin:0 auto;
      padding:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:400px 1fr;
      gap:20px;
      align-items:start;
    }
    .coluna-esquerda{
      display:grid;
      gap:20px;
    }
    .card{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    h2{
      margin:0 0 16px;
      font-size:22px;
    }
    .campo{
      margin-bottom:14px;
    }
    label{
      display:block;
      margin-bottom:6px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:700;
    }
    input, textarea{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#020617;
      color:#fff;
      outline:none;
      font-size:14px;
    }
    input:focus, textarea:focus{
      border-color:#3b82f6;
    }
    textarea{
      min-height:95px;
      resize:vertical;
    }
    .check-linha{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
    }
    .check-linha input{
      width:auto;
      margin:0;
    }
    .btn{
      border:none;
      padding:13px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      transition:.2s;
    }
    .btn:hover{
      transform:translateY(-1px);
    }
    .btn-salvar{background:#22c55e;color:#fff;width:100%}
    .btn-limpar{background:#334155;color:#fff;width:100%}
    .btn-azul{background:#2563eb;color:#fff;width:100%}
    .acoes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .msg{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-size:14px;
      font-weight:700;
      line-height:1.4;
    }
    .msg.ok{
      display:block;
      background:rgba(34,197,94,.15);
      color:#bbf7d0;
      border:1px solid rgba(34,197,94,.3);
    }
    .msg.erro{
      display:block;
      background:rgba(239,68,68,.15);
      color:#fecaca;
      border:1px solid rgba(239,68,68,.3);
    }
    .top-lista{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    .btn-mini{
      border:none;
      padding:10px 12px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      background:#1e293b;
      color:#fff;
    }
    .lista{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:14px;
    }
    .item{
      background:#020617;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      overflow:hidden;
    }
    .item img{
      width:100%;
      height:150px;
      object-fit:cover;
      display:block;
      background:#111827;
    }
    .item .info{
      padding:12px;
    }
    .item h3{
      margin:0 0 8px;
      font-size:15px;
      line-height:1.35;
      min-height:38px;
    }
    .meta{
      color:#94a3b8;
      font-size:12px;
      margin-bottom:8px;
      word-break:break-word;
    }
    .botoes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .editar{background:#2563eb;color:#fff}
    .excluir{background:#ef4444;color:#fff}
    .codigo-box{
      background:#020617;
      border:1px dashed rgba(255,255,255,.12);
      padding:10px 12px;
      border-radius:12px;
      color:#93c5fd;
      font-size:13px;
      margin-top:6px;
      word-break:break-all;
    }
    .status{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      margin-top:8px;
      background:rgba(34,197,94,.15);
      color:#bbf7d0;
    }
    .status.inativo{
      background:rgba(239,68,68,.15);
      color:#fecaca;
    }
    .config-preview{
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      background:#020617;
      border:1px solid rgba(255,255,255,.08);
      color:#93c5fd;
      font-weight:700;
      font-size:14px;
    }
    @media (max-width:980px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topo">PAINEL FF FILMES</div>

  <div class="container">
    <div class="grid">
      <div class="coluna-esquerda">

        <div class="card">
          <h2>Configuração do site</h2>

          <div class="campo">
            <label for="nomeSite">Nome do site de filmes</label>
            <input id="nomeSite" placeholder="Ex: FF Filmes Premium">
          </div>

          <button class="btn btn-azul" id="btnSalvarConfig">Salvar nome do site</button>

          <div id="previewNomeSite" class="config-preview">
            Nome atual do site: carregando...
          </div>

          <div id="msgConfig" class="msg"></div>
        </div>

        <div class="card">
          <h2>Cadastrar filme</h2>

          <div class="campo">
            <label for="titulo">Título</label>
            <input id="titulo" placeholder="Ex: Velozes da Noite">
          </div>

          <div class="campo">
            <label for="linkYoutube">Link do YouTube</label>
            <input id="linkYoutube" placeholder="Cole aqui o link do YouTube">
            <div id="codigoExtraido" class="codigo-box">Código do vídeo: aguardando link...</div>
          </div>

          <div class="campo">
            <label for="categoria">Categoria</label>
            <input id="categoria" placeholder="Ex: Ação, Suspense, Comédia">
          </div>

          <div class="campo">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" placeholder="Descrição do filme"></textarea>
          </div>

          <div class="check-linha">
            <input type="checkbox" id="ativo" checked>
            <label for="ativo" style="margin:0">Filme ativo</label>
          </div>

          <div class="acoes">
            <button class="btn btn-salvar" id="btnSalvar">Salvar filme</button>
            <button class="btn btn-limpar" id="btnLimpar">Limpar</button>
          </div>

          <div id="msg" class="msg"></div>
        </div>

      </div>

      <div class="card">
        <div class="top-lista">
          <h2 style="margin:0">Filmes cadastrados</h2>
          <button class="btn-mini" onclick="carregarFilmes()">Atualizar lista</button>
        </div>

        <div id="listaFilmes" class="lista"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let editId = null;

    const titulo = document.getElementById("titulo");
    const linkYoutube = document.getElementById("linkYoutube");
    const categoria = document.getElementById("categoria");
    const descricao = document.getElementById("descricao");
    const ativo = document.getElementById("ativo");
    const codigoExtraido = document.getElementById("codigoExtraido");
    const msg = document.getElementById("msg");
    const listaFilmes = document.getElementById("listaFilmes");
    const btnSalvar = document.getElementById("btnSalvar");

    const nomeSite = document.getElementById("nomeSite");
    const btnSalvarConfig = document.getElementById("btnSalvarConfig");
    const msgConfig = document.getElementById("msgConfig");
    const previewNomeSite = document.getElementById("previewNomeSite");

    function mostrarMsg(el, texto, tipo) {
      el.className = "msg " + tipo;
      el.textContent = texto;
    }

    function limparMsg(el) {
      el.className = "msg";
      el.textContent = "";
    }

    function extrairYoutubeId(url) {
      if (!url) return "";

      url = url.trim();

      if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;

      const patterns = [
        /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/live\/([a-zA-Z0-9_-]{11})/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }

      try {
        const parsed = new URL(url);
        const v = parsed.searchParams.get("v");
        if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
      } catch (e) {}

      return "";
    }

    function atualizarCodigoPreview() {
      const id = extrairYoutubeId(linkYoutube.value);
      codigoExtraido.textContent = id
        ? "Código do vídeo: " + id
        : "Código do vídeo: link inválido ou não reconhecido";
    }

    linkYoutube.addEventListener("input", atualizarCodigoPreview);

    function limparFormulario() {
      titulo.value = "";
      linkYoutube.value = "";
      categoria.value = "";
      descricao.value = "";
      ativo.checked = true;
      editId = null;
      btnSalvar.textContent = "Salvar filme";
      codigoExtraido.textContent = "Código do vídeo: aguardando link...";
      limparMsg(msg);
    }

    document.getElementById("btnLimpar").addEventListener("click", limparFormulario);

    async function carregarConfig() {
      previewNomeSite.textContent = "Nome atual do site: carregando...";

      try {
        const { data, error } = await supabaseClient
          .from("config_filmes")
          .select("*")
          .order("id", { ascending: true })
          .limit(1);

        if (error) throw error;

        if (data && data.length > 0) {
          nomeSite.value = data[0].nome_site || "";
          previewNomeSite.textContent = "Nome atual do site: " + (data[0].nome_site || "Sem nome definido");
        } else {
          nomeSite.value = "";
          previewNomeSite.textContent = "Nome atual do site: Sem nome definido";
        }
      } catch (error) {
        previewNomeSite.textContent = "Erro ao carregar nome do site";
      }
    }

    async function salvarConfig() {
      limparMsg(msgConfig);

      const nome = nomeSite.value.trim();

      if (!nome) {
        mostrarMsg(msgConfig, "Digite o nome do site.", "erro");
        return;
      }

      btnSalvarConfig.disabled = true;
      btnSalvarConfig.textContent = "Salvando...";

      try {
        const { data, error } = await supabaseClient
          .from("config_filmes")
          .select("id")
          .order("id", { ascending: true })
          .limit(1);

        if (error) throw error;

        if (data && data.length > 0) {
          const { error: errorUpdate } = await supabaseClient
            .from("config_filmes")
            .update({
              nome_site: nome,
              atualizado_em: new Date().toISOString()
            })
            .eq("id", data[0].id);

          if (errorUpdate) throw errorUpdate;
        } else {
          const { error: errorInsert } = await supabaseClient
            .from("config_filmes")
            .insert([{
              nome_site: nome
            }]);

          if (errorInsert) throw errorInsert;
        }

        mostrarMsg(msgConfig, "Nome do site salvo com sucesso.", "ok");
        previewNomeSite.textContent = "Nome atual do site: " + nome;
      } catch (error) {
        mostrarMsg(msgConfig, error.message || "Erro ao salvar nome do site.", "erro");
      }

      btnSalvarConfig.disabled = false;
      btnSalvarConfig.textContent = "Salvar nome do site";
    }

    btnSalvarConfig.addEventListener("click", salvarConfig);

    async function salvarFilme() {
      limparMsg(msg);

      const tituloVal = titulo.value.trim();
      const linkVal = linkYoutube.value.trim();
      const categoriaVal = categoria.value.trim();
      const descricaoVal = descricao.value.trim();
      const ativoVal = ativo.checked;
      const videoId = extrairYoutubeId(linkVal);

      if (!tituloVal) {
        mostrarMsg(msg, "Digite o título.", "erro");
        return;
      }

      if (!videoId) {
        mostrarMsg(msg, "Cole um link válido do YouTube.", "erro");
        return;
      }

      const thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

      btnSalvar.disabled = true;
      btnSalvar.textContent = editId ? "Atualizando..." : "Salvando...";

      try {
        if (!editId) {
          const { error } = await supabaseClient
            .from("filmes")
            .insert([{
              titulo: tituloVal,
              link: linkVal,
              video_id: videoId,
              categoria: categoriaVal || "Sem categoria",
              descricao: descricaoVal,
              thumb: thumb,
              ativo: ativoVal
            }]);

          if (error) throw error;

          mostrarMsg(msg, "Filme cadastrado com sucesso.", "ok");
        } else {
          const { error } = await supabaseClient
            .from("filmes")
            .update({
              titulo: tituloVal,
              link: linkVal,
              video_id: videoId,
              categoria: categoriaVal || "Sem categoria",
              descricao: descricaoVal,
              thumb: thumb,
              ativo: ativoVal
            })
            .eq("id", editId);

          if (error) throw error;

          mostrarMsg(msg, "Filme atualizado com sucesso.", "ok");
        }

        limparFormulario();
        await carregarFilmes();
      } catch (error) {
        mostrarMsg(msg, error.message || "Erro ao salvar filme.", "erro");
      }

      btnSalvar.disabled = false;
      btnSalvar.textContent = editId ? "Atualizar filme" : "Salvar filme";
    }

    btnSalvar.addEventListener("click", salvarFilme);

    async function carregarFilmes() {
      listaFilmes.innerHTML = '<div style="color:#94a3b8">Carregando filmes...</div>';

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .order("id", { ascending: false });

        if (error) throw error;

        if (!data || !data.length) {
          listaFilmes.innerHTML = '<div style="color:#94a3b8">Nenhum filme cadastrado ainda.</div>';
          return;
        }

        listaFilmes.innerHTML = data.map(filme => `
          <div class="item">
            <img src="${filme.thumb || ''}" alt="${filme.titulo}">
            <div class="info">
              <h3>${filme.titulo || ""}</h3>
              <div class="meta">${filme.categoria || "Sem categoria"}</div>
              <div class="meta">Código: ${filme.video_id || ""}</div>
              <div class="status ${filme.ativo ? "" : "inativo"}">${filme.ativo ? "Ativo" : "Inativo"}</div>
              <div class="botoes">
                <button class="btn-mini editar" onclick="editarFilme(${filme.id})">Editar</button>
                <button class="btn-mini excluir" onclick="excluirFilme(${filme.id})">Excluir</button>
              </div>
            </div>
          </div>
        `).join("");
      } catch (error) {
        listaFilmes.innerHTML = `<div style="color:#fca5a5">${error.message || "Erro ao carregar filmes."}</div>`;
      }
    }

    async function editarFilme(id) {
      limparMsg(msg);

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .eq("id", id)
          .single();

        if (error) throw error;

        titulo.value = data.titulo || "";
        linkYoutube.value = data.link || "";
        categoria.value = data.categoria || "";
        descricao.value = data.descricao || "";
        ativo.checked = !!data.ativo;
        editId = data.id;

        btnSalvar.textContent = "Atualizar filme";
        atualizarCodigoPreview();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (error) {
        mostrarMsg(msg, error.message || "Erro ao carregar filme para edição.", "erro");
      }
    }

    async function excluirFilme(id) {
      if (!confirm("Deseja excluir este filme?")) return;

      try {
        const { error } = await supabaseClient
          .from("filmes")
          .delete()
          .eq("id", id);

        if (error) throw error;

        await carregarFilmes();
      } catch (error) {
        mostrarMsg(msg, error.message || "Erro ao excluir filme.", "erro");
      }
    }

    carregarConfig();
    carregarFilmes();
  </script>
</body>
</html>
