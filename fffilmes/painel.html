<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel FF Filmes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}
    :root{
      --primary:#e50914;
      --secondary:#b20710;
      --bg:#020617;
      --card:#0f172a;
      --text:#ffffff;
      --muted:#94a3b8;
      --line:rgba(255,255,255,.08);
    }
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .topo{
      background:var(--card);
      padding:18px 20px;
      font-size:26px;
      font-weight:800;
      color:var(--primary);
      text-align:center;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:5;
    }
    .container{
      max-width:1320px;
      margin:0 auto;
      padding:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:20px;
      align-items:start;
    }
    .coluna-esquerda{
      display:grid;
      gap:20px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }
    h2{
      margin:0 0 16px;
      font-size:22px;
    }
    .campo{
      margin-bottom:14px;
    }
    label{
      display:block;
      margin-bottom:6px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:700;
    }
    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#020617;
      color:#fff;
      outline:none;
      font-size:14px;
    }
    textarea{
      min-height:95px;
      resize:vertical;
    }
    .check-linha{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
    }
    .check-linha input{
      width:auto;
      margin:0;
    }
    .btn{
      border:none;
      padding:13px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      transition:.2s;
    }
    .btn-salvar{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      width:100%;
    }
    .btn-limpar{
      background:#334155;
      color:#fff;
      width:100%;
    }
    .acoes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .msg{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-size:14px;
      font-weight:700;
      line-height:1.4;
    }
    .msg.ok{
      display:block;
      background:rgba(34,197,94,.15);
      color:#bbf7d0;
      border:1px solid rgba(34,197,94,.3);
    }
    .msg.erro{
      display:block;
      background:rgba(239,68,68,.15);
      color:#fecaca;
      border:1px solid rgba(239,68,68,.3);
    }
    .preview{
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      background:#020617;
      border:1px solid rgba(255,255,255,.08);
      color:#93c5fd;
      font-weight:700;
      font-size:14px;
      line-height:1.5;
    }
    .top-lista{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    .btn-mini{
      border:none;
      padding:10px 12px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      background:#1e293b;
      color:#fff;
    }
    .lista{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:14px;
    }
    .item{
      background:#020617;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      overflow:hidden;
    }
    .item img{
      width:100%;
      height:150px;
      object-fit:cover;
      display:block;
      background:#111827;
    }
    .info{
      padding:12px;
    }
    .info h3{
      margin:0 0 8px;
      font-size:15px;
      line-height:1.35;
      min-height:38px;
    }
    .meta{
      color:#94a3b8;
      font-size:12px;
      margin-bottom:8px;
      word-break:break-word;
    }
    .botoes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .editar{background:#2563eb;color:#fff}
    .excluir{background:#ef4444;color:#fff}
    .status{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      margin-top:8px;
      background:rgba(34,197,94,.15);
      color:#bbf7d0;
    }
    .status.inativo{
      background:rgba(239,68,68,.15);
      color:#fecaca;
    }
    @media (max-width:980px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="topo">PAINEL FF FILMES</div>

  <div class="container">
    <div class="grid">
      <div class="coluna-esquerda">

        <div class="card">
          <h2>Configuração visual</h2>

          <div class="campo">
            <label for="nomeSite">Nome do site</label>
            <input id="nomeSite" placeholder="Ex: FF Filmes Premium">
          </div>

          <div class="campo">
            <label for="tema">Tema pronto</label>
            <select id="tema">
              <option value="vermelho_cinema">Vermelho Cinema</option>
              <option value="azul_premium">Azul Premium</option>
              <option value="neon_roxo">Neon Roxo</option>
              <option value="preto_dourado">Preto Dourado</option>
              <option value="escuro_classico">Escuro Clássico</option>
            </select>
          </div>

          <div class="campo">
            <label for="corPrimaria">Cor primária</label>
            <input id="corPrimaria" type="color" value="#e50914">
          </div>

          <div class="campo">
            <label for="corSecundaria">Cor secundária</label>
            <input id="corSecundaria" type="color" value="#b20710">
          </div>

          <div class="campo">
            <label for="corFundo">Cor fundo</label>
            <input id="corFundo" type="color" value="#020617">
          </div>

          <div class="campo">
            <label for="corCard">Cor card</label>
            <input id="corCard" type="color" value="#0f172a">
          </div>

          <div class="campo">
            <label for="corTexto">Cor texto</label>
            <input id="corTexto" type="color" value="#ffffff">
          </div>

          <div class="campo">
            <label for="bgLogin">Imagem de fundo do login</label>
            <input id="bgLogin" placeholder="Cole a URL da imagem">
          </div>

          <div class="campo">
            <label for="bgFilmes">Imagem de fundo dos filmes</label>
            <input id="bgFilmes" placeholder="Cole a URL da imagem">
          </div>

          <button class="btn btn-salvar" id="btnSalvarConfig">Salvar visual</button>

          <div id="previewTema" class="preview">Carregando tema...</div>
          <div id="msgConfig" class="msg"></div>
        </div>

        <div class="card">
          <h2>Cadastrar filme</h2>

          <div class="campo">
            <label for="titulo">Título</label>
            <input id="titulo" placeholder="Ex: Velozes da Noite">
          </div>

          <div class="campo">
            <label for="linkYoutube">Link do YouTube</label>
            <input id="linkYoutube" placeholder="Cole aqui o link do YouTube">
          </div>

          <div class="campo">
            <label for="categoria">Categoria</label>
            <input id="categoria" placeholder="Ex: Ação, Suspense, Comédia">
          </div>

          <div class="campo">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" placeholder="Descrição do filme"></textarea>
          </div>

          <div class="check-linha">
            <input type="checkbox" id="ativo" checked>
            <label for="ativo" style="margin:0">Filme ativo</label>
          </div>

          <div class="acoes">
            <button class="btn btn-salvar" id="btnSalvar">Salvar filme</button>
            <button class="btn btn-limpar" id="btnLimpar">Limpar</button>
          </div>

          <div id="msg" class="msg"></div>
        </div>

      </div>

      <div class="card">
        <div class="top-lista">
          <h2 style="margin:0">Filmes cadastrados</h2>
          <button class="btn-mini" onclick="carregarFilmes()">Atualizar lista</button>
        </div>

        <div id="listaFilmes" class="lista"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let editId = null;

    const titulo = document.getElementById("titulo");
    const linkYoutube = document.getElementById("linkYoutube");
    const categoria = document.getElementById("categoria");
    const descricao = document.getElementById("descricao");
    const ativo = document.getElementById("ativo");
    const msg = document.getElementById("msg");
    const listaFilmes = document.getElementById("listaFilmes");
    const btnSalvar = document.getElementById("btnSalvar");

    const nomeSite = document.getElementById("nomeSite");
    const tema = document.getElementById("tema");
    const corPrimaria = document.getElementById("corPrimaria");
    const corSecundaria = document.getElementById("corSecundaria");
    const corFundo = document.getElementById("corFundo");
    const corCard = document.getElementById("corCard");
    const corTexto = document.getElementById("corTexto");
    const bgLogin = document.getElementById("bgLogin");
    const bgFilmes = document.getElementById("bgFilmes");
    const btnSalvarConfig = document.getElementById("btnSalvarConfig");
    const msgConfig = document.getElementById("msgConfig");
    const previewTema = document.getElementById("previewTema");

    function mostrarMsg(el, texto, tipo) {
      el.className = "msg " + tipo;
      el.textContent = texto;
    }

    function limparMsg(el) {
      el.className = "msg";
      el.textContent = "";
    }

    function extrairYoutubeId(url) {
      if (!url) return "";
      url = url.trim();

      if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;

      const patterns = [
        /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/live\/([a-zA-Z0-9_-]{11})/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }

      try {
        const parsed = new URL(url);
        const v = parsed.searchParams.get("v");
        if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
      } catch (e) {}

      return "";
    }

    function aplicarTemaNaTela(config) {
      document.documentElement.style.setProperty("--primary", config.cor_primaria || "#e50914");
      document.documentElement.style.setProperty("--secondary", config.cor_secundaria || "#b20710");
      document.documentElement.style.setProperty("--bg", config.cor_fundo || "#020617");
      document.documentElement.style.setProperty("--card", config.cor_card || "#0f172a");
      document.documentElement.style.setProperty("--text", config.cor_texto || "#ffffff");
    }

    function aplicarTemaPronto(nomeTema) {
      const temas = {
        vermelho_cinema: {
          cor_primaria:"#e50914",
          cor_secundaria:"#b20710",
          cor_fundo:"#020617",
          cor_card:"#0f172a",
          cor_texto:"#ffffff"
        },
        azul_premium: {
          cor_primaria:"#2563eb",
          cor_secundaria:"#1d4ed8",
          cor_fundo:"#06121f",
          cor_card:"#0b1b2b",
          cor_texto:"#ffffff"
        },
        neon_roxo: {
          cor_primaria:"#a855f7",
          cor_secundaria:"#7e22ce",
          cor_fundo:"#0b0613",
          cor_card:"#170b24",
          cor_texto:"#ffffff"
        },
        preto_dourado: {
          cor_primaria:"#d4af37",
          cor_secundaria:"#a67c00",
          cor_fundo:"#050505",
          cor_card:"#111111",
          cor_texto:"#ffffff"
        },
        escuro_classico: {
          cor_primaria:"#22c55e",
          cor_secundaria:"#15803d",
          cor_fundo:"#020617",
          cor_card:"#111827",
          cor_texto:"#ffffff"
        }
      };

      const t = temas[nomeTema];
      if (!t) return;

      corPrimaria.value = t.cor_primaria;
      corSecundaria.value = t.cor_secundaria;
      corFundo.value = t.cor_fundo;
      corCard.value = t.cor_card;
      corTexto.value = t.cor_texto;

      aplicarTemaNaTela({
        cor_primaria: corPrimaria.value,
        cor_secundaria: corSecundaria.value,
        cor_fundo: corFundo.value,
        cor_card: corCard.value,
        cor_texto: corTexto.value
      });
    }

    tema.addEventListener("change", () => aplicarTemaPronto(tema.value));

    async function carregarConfig() {
      previewTema.textContent = "Carregando tema...";

      try {
        const { data, error } = await supabaseClient
          .from("config_filmes")
          .select("*")
          .order("id", { ascending: true })
          .limit(1);

        if (error) throw error;

        if (data && data.length > 0) {
          const c = data[0];
          nomeSite.value = c.nome_site || "";
          tema.value = c.tema || "vermelho_cinema";
          corPrimaria.value = c.cor_primaria || "#e50914";
          corSecundaria.value = c.cor_secundaria || "#b20710";
          corFundo.value = c.cor_fundo || "#020617";
          corCard.value = c.cor_card || "#0f172a";
          corTexto.value = c.cor_texto || "#ffffff";
          bgLogin.value = c.bg_login || "";
          bgFilmes.value = c.bg_filmes || "";

          aplicarTemaNaTela(c);

          previewTema.textContent =
            "Nome do site: " + (c.nome_site || "Sem nome") +
            "\nTema: " + (c.tema || "sem tema") +
            "\nPrimária: " + (c.cor_primaria || "") +
            "\nSecundária: " + (c.cor_secundaria || "");
        } else {
          previewTema.textContent = "Nenhuma configuração encontrada.";
        }
      } catch (error) {
        previewTema.textContent = "Erro ao carregar configuração.";
      }
    }

    async function salvarConfig() {
      limparMsg(msgConfig);

      const config = {
        nome_site: nomeSite.value.trim() || "FF Filmes",
        tema: tema.value,
        cor_primaria: corPrimaria.value,
        cor_secundaria: corSecundaria.value,
        cor_fundo: corFundo.value,
        cor_card: corCard.value,
        cor_texto: corTexto.value,
        bg_login: bgLogin.value.trim(),
        bg_filmes: bgFilmes.value.trim(),
        atualizado_em: new Date().toISOString()
      };

      btnSalvarConfig.disabled = true;
      btnSalvarConfig.textContent = "Salvando...";

      try {
        const { data, error } = await supabaseClient
          .from("config_filmes")
          .select("id")
          .order("id", { ascending: true })
          .limit(1);

        if (error) throw error;

        if (data && data.length > 0) {
          const { error: errorUpdate } = await supabaseClient
            .from("config_filmes")
            .update(config)
            .eq("id", data[0].id);

          if (errorUpdate) throw errorUpdate;
        } else {
          const { error: errorInsert } = await supabaseClient
            .from("config_filmes")
            .insert([config]);

          if (errorInsert) throw errorInsert;
        }

        aplicarTemaNaTela(config);
        previewTema.textContent =
          "Nome do site: " + config.nome_site +
          "\nTema: " + config.tema +
          "\nPrimária: " + config.cor_primaria +
          "\nSecundária: " + config.cor_secundaria;

        mostrarMsg(msgConfig, "Visual salvo com sucesso.", "ok");
      } catch (error) {
        mostrarMsg(msgConfig, error.message || "Erro ao salvar visual.", "erro");
      }

      btnSalvarConfig.disabled = false;
      btnSalvarConfig.textContent = "Salvar visual";
    }

    btnSalvarConfig.addEventListener("click", salvarConfig);

    function limparFormulario() {
      titulo.value = "";
      linkYoutube.value = "";
      categoria.value = "";
      descricao.value = "";
      ativo.checked = true;
      editId = null;
      btnSalvar.textContent = "Salvar filme";
      limparMsg(msg);
    }

    document.getElementById("btnLimpar").addEventListener("click", limparFormulario);

    async function salvarFilme() {
      limparMsg(msg);

      const tituloVal = titulo.value.trim();
      const linkVal = linkYoutube.value.trim();
      const categoriaVal = categoria.value.trim();
      const descricaoVal = descricao.value.trim();
      const ativoVal = ativo.checked;
      const videoId = extrairYoutubeId(linkVal);

      if (!tituloVal) {
        mostrarMsg(msg, "Digite o título.", "erro");
        return;
      }

      if (!videoId) {
        mostrarMsg(msg, "Cole um link válido do YouTube.", "erro");
        return;
      }

      const thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

      btnSalvar.disabled = true;
      btnSalvar.textContent = editId ? "Atualizando..." : "Salvando...";

      try {
        if (!editId) {
          const { error } = await supabaseClient
            .from("filmes")
            .insert([{
              titulo: tituloVal,
              link: linkVal,
              video_id: videoId,
              categoria: categoriaVal || "Sem categoria",
              descricao: descricaoVal,
              thumb: thumb,
              ativo: ativoVal
            }]);

          if (error) throw error;
          mostrarMsg(msg, "Filme cadastrado com sucesso.", "ok");
        } else {
          const { error } = await supabaseClient
            .from("filmes")
            .update({
              titulo: tituloVal,
              link: linkVal,
              video_id: videoId,
              categoria: categoriaVal || "Sem categoria",
              descricao: descricaoVal,
              thumb: thumb,
              ativo: ativoVal
            })
            .eq("id", editId);

          if (error) throw error;
          mostrarMsg(msg, "Filme atualizado com sucesso.", "ok");
        }

        limparFormulario();
        await carregarFilmes();
      } catch (error) {
        mostrarMsg(msg, error.message || "Erro ao salvar filme.", "erro");
      }

      btnSalvar.disabled = false;
      btnSalvar.textContent = editId ? "Atualizar filme" : "Salvar filme";
    }

    btnSalvar.addEventListener("click", salvarFilme);

    async function carregarFilmes() {
      listaFilmes.innerHTML = '<div style="color:#94a3b8">Carregando filmes...</div>';

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .order("id", { ascending: false });

        if (error) throw error;

        if (!data || !data.length) {
          listaFilmes.innerHTML = '<div style="color:#94a3b8">Nenhum filme cadastrado ainda.</div>';
          return;
        }

        listaFilmes.innerHTML = data.map(filme => `
          <div class="item">
            <img src="${filme.thumb || ''}" alt="${filme.titulo}">
            <div class="info">
              <h3>${filme.titulo || ""}</h3>
              <div class="meta">${filme.categoria || "Sem categoria"}</div>
              <div class="meta">Código: ${filme.video_id || ""}</div>
              <div class="status ${filme.ativo ? "" : "inativo"}">${filme.ativo ? "Ativo" : "Inativo"}</div>
              <div class="botoes">
                <button class="btn-mini editar" onclick="editarFilme(${filme.id})">Editar</button>
                <button class="btn-mini excluir" onclick="excluirFilme(${filme.id})">Excluir</button>
              </div>
            </div>
          </div>
        `).join("");
      } catch (error) {
        listaFilmes.innerHTML = `<div style="color:#fca5a5">${error.message || "Erro ao carregar filmes."}</div>`;
      }
    }

    async function editarFilme(id) {
      limparMsg(msg);

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .eq("id", id)
          .single();

        if (error) throw error;

        titulo.value = data.titulo || "";
        linkYoutube.value = data.link || "";
        categoria.value = data.categoria || "";
        descricao.value = data.descricao || "";
        ativo.checked = !!data.ativo;
        editId = data.id;
        btnSalvar.textContent = "Atualizar filme";
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (error) {
        mostrarMsg(msg, error.message || "Erro ao carregar filme para edição.", "erro");
      }
    }

    async function excluirFilme(id) {
      if (!confirm("Deseja excluir este filme?")) return;

      try {
        const { error } = await supabaseClient
          .from("filmes")
          .delete()
          .eq("id", id);

        if (error) throw error;

        await carregarFilmes();
      } catch (error) {
        mostrarMsg(msg, error.message || "Erro ao excluir filme.", "erro");
      }
    }

    async function protegerPainel() {
      const { data } = await supabaseClient.auth.getSession();

      if (!data?.session?.user) {
        window.location.href = "index.html";
      }
    }

    protegerPainel();
    carregarConfig();
    carregarFilmes();
  </script>
</body>
</html>
