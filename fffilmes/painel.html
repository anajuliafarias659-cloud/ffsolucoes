<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel FF Filmes</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#020617;
      color:#fff;
    }
    .topo{
      background:#0f172a;
      padding:18px 20px;
      font-size:24px;
      font-weight:800;
      color:#ef4444;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .container{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:20px;
    }
    .card{
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:18px;
    }
    h2{
      margin:0 0 16px;
      font-size:20px;
    }
    .campo{
      margin-bottom:14px;
    }
    label{
      display:block;
      margin-bottom:6px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:700;
    }
    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#020617;
      color:#fff;
      outline:none;
    }
    textarea{
      min-height:90px;
      resize:vertical;
    }
    .btn{
      width:100%;
      border:none;
      padding:13px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      margin-top:6px;
    }
    .btn-salvar{background:#22c55e;color:#fff;}
    .btn-limpar{background:#334155;color:#fff;}
    .acoes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .msg{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-size:14px;
      font-weight:700;
    }
    .msg.ok{display:block;background:rgba(34,197,94,.15);color:#bbf7d0;border:1px solid rgba(34,197,94,.3)}
    .msg.erro{display:block;background:rgba(239,68,68,.15);color:#fecaca;border:1px solid rgba(239,68,68,.3)}
    .top-lista{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    .btn-mini{
      border:none;
      padding:10px 12px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      background:#1e293b;
      color:#fff;
    }
    .lista{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:14px;
    }
    .item{
      background:#020617;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      overflow:hidden;
    }
    .item img{
      width:100%;
      height:140px;
      object-fit:cover;
      display:block;
    }
    .item .info{
      padding:12px;
    }
    .item h3{
      margin:0 0 8px;
      font-size:15px;
      line-height:1.35;
    }
    .meta{
      color:#94a3b8;
      font-size:12px;
      margin-bottom:10px;
    }
    .botoes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .editar{background:#2563eb;color:#fff}
    .excluir{background:#ef4444;color:#fff}
    .codigo-box{
      background:#020617;
      border:1px dashed rgba(255,255,255,.12);
      padding:10px 12px;
      border-radius:12px;
      color:#93c5fd;
      font-size:13px;
      margin-top:6px;
      word-break:break-all;
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="topo">PAINEL FF FILMES</div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>Cadastrar filme</h2>

        <div class="campo">
          <label for="titulo">Título</label>
          <input id="titulo" placeholder="Ex: O Último Caçador de Bruxas">
        </div>

        <div class="campo">
          <label for="linkYoutube">Link do YouTube</label>
          <input id="linkYoutube" placeholder="Cole aqui o link do YouTube">
          <div id="codigoExtraido" class="codigo-box">Código do vídeo: aguardando link...</div>
        </div>

        <div class="campo">
          <label for="categoria">Categoria</label>
          <input id="categoria" placeholder="Ex: Ação, Comédia, Suspense">
        </div>

        <div class="campo">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" placeholder="Descrição do filme"></textarea>
        </div>

        <div class="acoes">
          <button class="btn btn-salvar" id="btnSalvar">Salvar filme</button>
          <button class="btn btn-limpar" id="btnLimpar">Limpar</button>
        </div>

        <div id="msg" class="msg"></div>
      </div>

      <div class="card">
        <div class="top-lista">
          <h2 style="margin:0">Filmes cadastrados</h2>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn-mini" onclick="window.open('filmes.html','_blank')">Abrir página filmes</button>
            <button class="btn-mini" onclick="limparTudo()">Apagar todos</button>
          </div>
        </div>

        <div id="listaFilmes" class="lista"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "ff_filmes_lista";
    let editIndex = null;

    const titulo = document.getElementById("titulo");
    const linkYoutube = document.getElementById("linkYoutube");
    const categoria = document.getElementById("categoria");
    const descricao = document.getElementById("descricao");
    const codigoExtraido = document.getElementById("codigoExtraido");
    const msg = document.getElementById("msg");
    const listaFilmes = document.getElementById("listaFilmes");
    const btnSalvar = document.getElementById("btnSalvar");

    function getFilmes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function setFilmes(lista) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
    }

    function mostrarMsg(texto, tipo) {
      msg.className = "msg " + tipo;
      msg.textContent = texto;
    }

    function limparMsg() {
      msg.className = "msg";
      msg.textContent = "";
    }

    function extrairYoutubeId(url) {
      if (!url) return "";

      url = url.trim();

      if (/^[a-zA-Z0-9_-]{11}$/.test(url)) {
        return url;
      }

      const patterns = [
        /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/live\/([a-zA-Z0-9_-]{11})/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }

      try {
        const parsed = new URL(url);
        const v = parsed.searchParams.get("v");
        if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
      } catch {}

      return "";
    }

    function atualizarCodigoPreview() {
      const id = extrairYoutubeId(linkYoutube.value);
      codigoExtraido.textContent = id
        ? "Código do vídeo: " + id
        : "Código do vídeo: link inválido ou não reconhecido";
    }

    linkYoutube.addEventListener("input", atualizarCodigoPreview);

    function limparFormulario() {
      titulo.value = "";
      linkYoutube.value = "";
      categoria.value = "";
      descricao.value = "";
      editIndex = null;
      btnSalvar.textContent = "Salvar filme";
      codigoExtraido.textContent = "Código do vídeo: aguardando link...";
      limparMsg();
    }

    document.getElementById("btnLimpar").addEventListener("click", limparFormulario);

    btnSalvar.addEventListener("click", () => {
      limparMsg();

      const tituloVal = titulo.value.trim();
      const linkVal = linkYoutube.value.trim();
      const categoriaVal = categoria.value.trim();
      const descricaoVal = descricao.value.trim();
      const videoId = extrairYoutubeId(linkVal);

      if (!tituloVal) {
        mostrarMsg("Digite o título.", "erro");
        return;
      }

      if (!videoId) {
        mostrarMsg("Cole um link válido do YouTube.", "erro");
        return;
      }

      const thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

      const filme = {
        titulo: tituloVal,
        link: linkVal,
        videoId,
        categoria: categoriaVal || "Sem categoria",
        descricao: descricaoVal || "",
        thumb
      };

      const lista = getFilmes();

      if (editIndex === null) {
        lista.unshift(filme);
        mostrarMsg("Filme cadastrado com sucesso.", "ok");
      } else {
        lista[editIndex] = filme;
        mostrarMsg("Filme atualizado com sucesso.", "ok");
      }

      setFilmes(lista);
      renderizarLista();
      limparFormulario();
    });

    function editarFilme(index) {
      const lista = getFilmes();
      const filme = lista[index];
      if (!filme) return;

      titulo.value = filme.titulo || "";
      linkYoutube.value = filme.link || "";
      categoria.value = filme.categoria || "";
      descricao.value = filme.descricao || "";
      editIndex = index;
      btnSalvar.textContent = "Atualizar filme";
      atualizarCodigoPreview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function excluirFilme(index) {
      const lista = getFilmes();
      if (!confirm("Deseja excluir este filme?")) return;
      lista.splice(index, 1);
      setFilmes(lista);
      renderizarLista();
    }

    function limparTudo() {
      if (!confirm("Deseja apagar todos os filmes cadastrados?")) return;
      localStorage.removeItem(STORAGE_KEY);
      renderizarLista();
      limparFormulario();
    }

    function renderizarLista() {
      const lista = getFilmes();

      if (!lista.length) {
        listaFilmes.innerHTML = '<div style="color:#94a3b8">Nenhum filme cadastrado ainda.</div>';
        return;
      }

      listaFilmes.innerHTML = lista.map((filme, index) => `
        <div class="item">
          <img src="${filme.thumb}" alt="${filme.titulo}">
          <div class="info">
            <h3>${filme.titulo}</h3>
            <div class="meta">${filme.categoria || "Sem categoria"}</div>
            <div class="meta">Código: ${filme.videoId}</div>
            <div class="botoes">
              <button class="btn-mini editar" onclick="editarFilme(${index})">Editar</button>
              <button class="btn-mini excluir" onclick="excluirFilme(${index})">Excluir</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    renderizarLista();
  </script>
</body>
</html>
