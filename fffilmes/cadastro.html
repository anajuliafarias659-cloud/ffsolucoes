<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Teste grátis FFCINE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

font-family:Arial;

background:
linear-gradient(
rgba(2,6,23,.92),
rgba(2,6,23,.95)
),

url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1400&q=80");

background-size:cover;
background-position:center;

padding:20px;

color:#fff;

}

.box{

width:100%;
max-width:360px;

background:
rgba(15,23,42,.95);

padding:28px 22px;

border-radius:24px;

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(10px);

}

.logo{

text-align:center;

margin-bottom:18px;

}

.logo img{

width:90px;

margin-bottom:10px;

}

.logo h1{

font-size:40px;

color:#22c55e;

}

.sub{

text-align:center;

color:#94a3b8;

margin-bottom:22px;

line-height:1.5;

}

input{

width:100%;

padding:14px;

margin-bottom:14px;

border:none;

border-radius:14px;

background:#1e293b;

color:#fff;

outline:none;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#22c55e;

color:#fff;

font-weight:bold;

cursor:pointer;

}

.status{

margin-top:14px;

text-align:center;

font-size:13px;

line-height:1.6;

}

.paywall{

margin-top:16px;

background:
rgba(250,204,21,.08);

border:
1px solid
rgba(250,204,21,.35);

padding:14px;

border-radius:14px;

color:#facc15;

text-align:center;

line-height:1.6;

}

</style>
</head>

<body>

<div class="box">

<div class="logo">

<img
src="/fffilmes/icon-192.png">

<h1>FFCINE</h1>

</div>

<div class="sub">

🎬 Ganhe 2 horas grátis<br>

Teste filmes e séries
agora mesmo

</div>

<form id="formCadastro">

<input
type="email"
id="email"
placeholder="Seu e-mail"
required>

<input
type="password"
id="senha"
placeholder="Crie uma senha"
required>

<button type="submit">

Começar teste grátis

</button>

</form>

<div
class="status"
id="status"></div>

</div>

<script>

const SUPABASE_URL =
"https://pdajixsoowcyhnjwhgpc.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

// 🔥 id aparelho

let deviceId =
localStorage.getItem(
"ffcine_device_id"
);

if(!deviceId){

deviceId =
crypto.randomUUID();

localStorage.setItem(
"ffcine_device_id",
deviceId
);

}

document
.getElementById(
"formCadastro"
)

.addEventListener(

"submit",

async (e)=>{

e.preventDefault();

const email =
document.getElementById(
"email"
).value;

const senha =
document.getElementById(
"senha"
).value;

const status =
document.getElementById(
"status"
);

status.textContent =
"Verificando...";

// 🔥 verifica aparelho

const { data: trialExistente }
=
await supabaseClient

.from("trials")

.select("*")

.eq("device_id", deviceId)

.maybeSingle();

if(trialExistente){

status.innerHTML = `

<div class="paywall">

🔥 Este aparelho já utilizou
o teste grátis.<br><br>

Assine o FFCINE para
continuar assistindo.

<br><br>

📞 WhatsApp:<br>
(89)98145-2698

</div>

`;

return;

}


// 🔥 cria conta

const {
data,
error
}
=

email,
password: senha

});

if(error){

status.textContent =
error.message;

return;

}

// 🔥 usuário criado

const user =
data.user;

if(user){

await supabaseClient

.from("usuarios")

.upsert({

user_id: user.id,

email: email,

nome:
email.split("@")[0],

plano: "trial",

admin: false,

criado_em:
new Date()

});

}

// 🔥 inicia trial

localStorage.setItem(
"ffcine_trial_inicio",
Date.now()
);

// 🔥 salva aparelho

await supabaseClient

.from("trials")

.insert({

email: email,

device_id: deviceId,

criado_em:
new Date()

});



status.textContent =
"Conta criada com sucesso";

setTimeout(()=>{

location.href =
"filmes.html";

}, 1000);

});

</script>

</body>
</html>
