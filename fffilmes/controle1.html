

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Simples | FF Filmes</title>

<meta name="theme-color" content="#020617">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Controle FF TV">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;padding:16px}
.container{
  max-width:520px;
  margin:auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
h1{text-align:center;color:#ef4444}
.card{background:#0f172a;border-radius:16px;padding:14px;margin-bottom:14px}
input{width:100%;padding:13px;border:none;border-radius:10px;background:#020617;color:#fff;margin-bottom:10px}
button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:8px;font-weight:bold;color:#fff;cursor:pointer}
.btn-red{background:#dc2626}
.btn-green{background:#16a34a}
.btn-blue{background:#2563eb}
.btn-yellow{background:#f59e0b;color:#020617}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.filme{display:flex;gap:10px;background:#020617;border-radius:12px;padding:10px;margin-top:10px;align-items:center}
.filme img{width:70px;height:95px;object-fit:cover;border-radius:8px;background:#111}
.filme-info{flex:1}
.filme-info b{font-size:14px}
.filme-info small{color:#94a3b8}
.status{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:12px}
.oculto{display:none}
.controle-card{
  background:#0b1120;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.08);
  padding:18px;
  box-shadow:0 0 20px rgba(0,0,0,.35);
}

select{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  background:#020617;
  color:#fff;
  margin-bottom:10px;
}

.controle-card h3{
  text-align:center;
  margin-bottom:16px;
  color:#fff;
  font-size:20px;
}

.controle-grid{
  display:grid;

  grid-template-columns:1fr 1fr;

  gap:10px;

  margin-top:10px;
}

.controle-btn{

  height:82px;

  border:none;

  border-radius:18px;

  color:#fff;

  font-size:32px;

  font-weight:bold;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:center;

  gap:4px;

  cursor:pointer;

  transition:.2s;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.15),
    0 6px 14px rgba(0,0,0,.35);
}

.controle-btn span{
  font-size:14px;
  font-weight:700;
}

.controle-btn:active{
  transform:scale(.95);
}

.controle-btn:hover{
  transform:translateY(-2px);
}

.play{
  background:#16a34a;
}

.pause{
  background:#eab308;
  color:#111827;
}

.next{
  background:#2563eb;
}

.stop{
  background:#dc2626;
}

.blue{
  background:#1d4ed8;
}

.green{
  background:#059669;
}

.purple{
  background:#7c3aed;
}

.yellow{
  background:#f59e0b;
  color:#111827;
}
</style>
</head>

<body>

<div class="container">

<h1>📱 Controle Simples</h1>
<div id="status" class="status">Verificando login...</div>

<div id="boxLogin" class="card">
  <h3>🔐 Login</h3>
  <input id="email" type="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn-red" onclick="login()">Entrar</button>
</div>

<div id="area" class="oculto">

  <h3>📺 Controle TV</h3>

  <div class="controle-grid">

    <button class="controle-btn play"
      onclick="enviarComando('play')">
      ▶
      <span>Play</span>
    </button>

    <button class="controle-btn pause"
      onclick="enviarComando('pause')">
      ⏸
      <span>Pause</span>
    </button>

    <button class="controle-btn next"
      onclick="enviarComando('proximo')">
      ⏭
      <span>Próximo</span>
    </button>

    <button class="controle-btn stop"
      onclick="enviarComando('fechar')">
      ⛔
      <span>Fechar</span>
    </button>

    <button class="controle-btn blue"
      onclick="enviarComando('fullscreen')">
      🖥
      <span>Tela cheia</span>
    </button>

    <button class="controle-btn green"
      onclick="enviarComando('add_lista')">
      ➕
      <span>Minha Lista</span>
    </button>

    <button class="controle-btn purple"
      onclick="enviarComando('play_lista')">
      ▶
      <span>Play Lista</span>
    </button>

    <button class="controle-btn yellow"
  onclick="enviarComando('loop_lista')">
  🔁
  <span>Loop</span>
</button>

<!-- 🔥 ABRE LISTA DE FILMES -->
<button class="controle-btn blue"
  onclick="toggleCard('cardFilmes')">
  🎬
  <span>Filmes</span>
</button>

<!-- 🔥 ABRE CADASTRO -->
<button class="controle-btn green"
  onclick="toggleCard('cardCadastro')">
  👑
  <span>Cadastrar</span>
</button>

<!-- 🔥 ABRE BUSCA YOUTUBE -->
<button class="controle-btn purple"
  onclick="toggleCard('cardYoutube')">
  🔎
  <span>YouTube</span>
</button>

  </div>

</div>

<div class="card controle-card">

  <label>
    🔊 Volume:
    <span id="valorVolume">70</span>%
  </label>

  <details class="card" style="margin-bottom:20px">

  <summary style="
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
  ">
    ⚙️ Configuração da Sala
  </summary>

  <div style="margin-top:15px">

    <input id="sala" placeholder="Ex: sala1">

    <button
      class="btn-blue"
      onclick="salvarSala()">

      Salvar sala

</button>

<button
  class="btn-red"
  onclick="trocarTV()">

  🚪 Trocar TV

</button>

</details>
  
<div class="card controle-card">

  <input 
    id="volumeControle" 
    type="range" 
    min="0" 
    max="100" 
    value="70"
    oninput="alterarVolume(this.value)"
  >

</div>

<div id="cardFilmes"
  class="card controle-card oculto">

  <h3>🎬 Escolher filme</h3>

  <input
    id="busca"
    placeholder="Pesquisar filme..."
    oninput="renderFilmes()"
  >

  <div id="listaFilmes">
    Carregando...
  </div>

</div>

<div id="cardCadastro"
  class="card controle-card oculto">

  <h3>👑 Cadastrar Filme</h3>

  <input
    id="novoTituloFilme"
    placeholder="Título do filme"
  >

  <input
    id="novoLinkFilme"
    placeholder="Link do YouTube"
  >

  <select
    id="tipoConteudo"
    onchange="atualizarCategorias()">

    <option value="">
      Selecione o tipo
    </option>

    <option value="filme">
      🎬 Filmes
    </option>

    <option value="musica">
      🎵 Música
    </option>

  </select>

  <select id="novaCategoriaFilme">

    <option value="">
      Selecione a categoria
    </option>

  </select>

  <button
    id="btnCadastrarFilme"
    class="btn-green"
    onclick="cadastrarFilme()">

    Cadastrar Filme

  </button>

</div>

<div id="cardYoutube"
  class="card controle-card oculto">

  <h3>🔎 Buscar no YouTube</h3>

  <input
    id="buscaYoutube"
    placeholder="Ex: Velozes e Furiosos"
  >

  <button
    class="btn-red"
    onclick="buscarYoutube()">

    Buscar

  </button>

  <div id="resultadoYoutube"></div>

</div>
  

</div>

<script>
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(location.search);
let SALA = params.get("sala") || localStorage.getItem("SALA_TV") || "sala1";
let filmes = [];
let usuario = null;
let isMaster = false;

function status(txt){
  document.getElementById("status").innerText = txt;
}

function mostrarArea(){
  document.getElementById("boxLogin").classList.add("oculto");
  document.getElementById("area").classList.remove("oculto");
  document.getElementById("sala").value = SALA;
  status("Conectado na sala: " + SALA);
}
function atualizarCategorias(){
  const tipo = document.getElementById("tipoConteudo").value;
  const select = document.getElementById("novaCategoriaFilme");

  let categorias = [];

  if(tipo === "filme"){
    categorias = [
      "Ação",
      "Comédia",
      "Terror",
      "Romance",
      "Infantil",
      "Drama",
      "Suspense"
    ];
  }

  if(tipo === "musica"){
    categorias = [
      "Sertanejo",
      "Gospel",
      "Funk",
      "Forró",
      "Internacional",
      "Rap",
      "Eletrônica"
    ];
  }

  select.innerHTML = '<option value="">Selecione a categoria</option>';

  categorias.forEach(cat => {
    select.innerHTML += `<option value="${cat}">${cat}</option>`;
  });
}

function renderMasterArea(){
  if(isMaster){
    document.getElementById("areaMaster").classList.remove("oculto");
  }
}

async function verificarLogin(){

  const { data } =
    await supabaseClient.auth.getSession();

  if(data?.session?.user){

    usuario = data.session.user;

    document
      .getElementById("boxLogin")
      .classList.add("oculto");

    document
      .getElementById("area")
      .classList.remove("oculto");

    const { data: master } =
      await supabaseClient
      .from("super_admins")
      .select("id")
      .eq("user_id", usuario.id)
      .maybeSingle();

    isMaster = !!master;

    mostrarArea();
    document
  .getElementById("boxLogin")
  .classList.add("oculto");

document
  .getElementById("area")
  .classList.remove("oculto");

    await carregarFilmes();

  } else {

    document
      .getElementById("boxLogin")
      .classList.remove("oculto");

    document
      .getElementById("area")
      .classList.add("oculto");

  }
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    alert("Informe email e senha.");
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert("Erro no login: " + error.message);
    return;
  }

  usuario = data.user;

// 🔥 verifica se é master
const { data: master } = await supabaseClient
  .from("super_admins")
  .select("id")
  .eq("user_id", usuario.id)
  .maybeSingle();

isMaster = !!master;

mostrarArea();
await carregarFilmes();
renderMasterArea(); // 🔥 faltava isso
}

function salvarSala(){
  SALA = document.getElementById("sala").value.trim() || "sala1";
  localStorage.setItem("SALA_TV", SALA);
  status("Conectado na sala: " + SALA);
}

async function trocarTV(){

  localStorage.removeItem(
    "codigo_tv_salvo"
  );

  localStorage.removeItem(
    "SALA_TV"
  );

  SALA = "";

  document.getElementById("sala").value = "";

  status("🔄 Escolha outra TV");

  await conectarTV();

}

async function enviarComando(comando, extra = {}){
  const { error } = await supabaseClient
    .from("controle_tv")
    .insert({
      sala: SALA,
      comando,
      video_id: extra.video_id || null,
      titulo: extra.titulo || null,
      filme_id: extra.filme_id || null,
      volume: extra.volume ?? null
    });

  if(error){
    alert("Erro ao enviar comando: " + error.message);
    return;
  }

  status("✅ Comando enviado: " + comando);
}

async function alterarVolume(valor){
  document.getElementById("valorVolume").innerText = valor;

  await enviarComando("volume", {
    volume: Number(valor)
  });
}
async function carregarFilmes(){
  const { data, error } = await supabaseClient
    .from("filmes")
    .select("id,titulo,video_id,thumb,categoria,ativo")
    .eq("ativo", true)
    .order("titulo");

  if(error){
    document.getElementById("listaFilmes").innerHTML = "Erro ao carregar filmes.";
    return;
  }

  filmes = data || [];
  renderFilmes();
}

function toggleListaFilmes(){
  const box = document.getElementById("boxListaFilmes");
  const seta = document.getElementById("setaFilmes");

  box.classList.toggle("oculto");

  seta.innerText = box.classList.contains("oculto") ? "▼" : "▲";
}

function renderFilmes(){
  const termo = document.getElementById("busca").value.toLowerCase().trim();

  const filtrados = filmes.filter(f =>
    String(f.titulo || "").toLowerCase().includes(termo) ||
    String(f.categoria || "").toLowerCase().includes(termo)
  );

  document.getElementById("listaFilmes").innerHTML = filtrados.map(f => `
    <div class="filme">
      <img src="${f.thumb || ""}">
      <div class="filme-info">
        <b>${f.titulo || "Sem título"}</b><br>
        <small>${f.categoria || "Sem categoria"}</small>
        <button class="btn-green" onclick="tocarFilme('${f.video_id}', '${String(f.titulo || "").replace(/'/g,"\\'")}', ${f.id})">
          ▶ Tocar na TV
        </button>
    <button class="btn-blue" onclick="adicionarLista('${f.video_id}', '${String(f.titulo || "").replace(/'/g,"\\'")}', ${f.id})">
  ➕ Adicionar à lista
</button>
      </div>
    </div>
  `).join("") || "Nenhum filme encontrado.";
}

async function tocarFilme(videoId, titulo, id){

  // 🔥 toca direto
  await enviarComando("abrir", {
    video_id: videoId,
    titulo,
    filme_id: id
  });

  // 🔥 força play
  setTimeout(async () => {

    await enviarComando("play");

  }, 1500);

  status("📺 Tocando agora: " + titulo);
}

async function tocarYoutube(videoId, titulo){

  // 🔥 toca direto na TV
  await enviarComando("abrir", {
    video_id: videoId,
    titulo: titulo,
    filme_id: null
  });

  // 🔥 força play
  setTimeout(async () => {

    await enviarComando("play");

  }, 1500);

  status("📺 Tocando agora: " + titulo);
}

async function adicionarFilaYoutube(videoId, titulo){

  await enviarComando("add_lista", {
    video_id: videoId,
    titulo: titulo,
    filme_id: null
  });

  status("📺 Adicionado à fila: " + titulo);
}

async function adicionarLista(videoId, titulo, id){
  await enviarComando("add_lista", {
    video_id: videoId,
    titulo,
    filme_id: id
  });

  status("📺 Adicionado à lista: " + titulo);
}


function extrairYoutubeId(url) {
  if (!url) return "";
  url = url.trim();

  if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;

  const patterns = [
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/live\/([a-zA-Z0-9_-]{11})/
  ];

  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match && match[1]) return match[1];
  }

  return "";
}

async function cadastrarFilme(){
  if(!isMaster){
    alert("Sem permissão");
    return;
  }


  const titulo = document.getElementById("novoTituloFilme").value.trim();
  const link = document.getElementById("novoLinkFilme").value.trim();
  const categoria = document.getElementById("novaCategoriaFilme").value.trim();

  if(!titulo || !link){
    alert("Preencha título e link do YouTube");
    return;
  }

  const videoId = extrairYoutubeId(link);

  if(!videoId){
    alert("Link do YouTube inválido");
    return;
  }

  // 🔥 evita cadastrar o mesmo vídeo 2x, mesmo com título diferente
const { data: existe } = await supabaseClient
  .from("filmes")
  .select("id,titulo")
  .eq("video_id", videoId)
  .maybeSingle();

if(existe){
  alert("Esse vídeo já está cadastrado como: " + existe.titulo);
  return;
}

  const thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

  const { error } = await supabaseClient
    .from("filmes")
    .insert({
      titulo,
      link,
      video_id: videoId,
      categoria: categoria || "Sem categoria",
      descricao: "",
      thumb,
      ativo: true
    });

  if(error){
    alert("Erro ao cadastrar filme: " + error.message);
    return;
  }

  alert("✅ Filme cadastrado com sucesso");

  document.getElementById("novoTituloFilme").value = "";
  document.getElementById("novoLinkFilme").value = "";
  document.getElementById("novaCategoriaFilme").value = "";

  await carregarFilmes();
}

const YOUTUBE_API_KEY = "AIzaSyBZril7D77F9brqXO2OqbvHQjAiWmkLmoA";

async function buscarYoutube(){
  const termo = document.getElementById("buscaYoutube").value.trim();

  if(!termo){
    alert("Digite algo para buscar");
    return;
  }

  document.getElementById("resultadoYoutube").innerHTML = "Buscando...";

  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(termo)}&type=video&maxResults=10&key=${YOUTUBE_API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  if(!data.items){
    document.getElementById("resultadoYoutube").innerHTML = "Erro ao buscar.";
    return;
  }

  document.getElementById("resultadoYoutube").innerHTML = data.items.map(v => {
    const videoId = v.id.videoId;
    const titulo = v.snippet.title;
    const thumb = v.snippet.thumbnails.medium.url;
    const link = `https://www.youtube.com/watch?v=${videoId}`;

    return `
      <div class="filme">
        <img src="${thumb}">
        <div class="filme-info">
          <b>${titulo}</b><br>
        <button
  class="btn-green"
  onclick="tocarYoutube(
    '${videoId}',
    '${titulo.replace(/'/g,"")}'
  )">

  ▶ Tocar Agora

</button>

<button
  class="btn-yellow"
  onclick="adicionarFilaYoutube(
    '${videoId}',
    '${titulo.replace(/'/g,"")}'
  )">

  ➕ Adicionar à Fila

</button>

<button
  class="btn-blue"
  onclick="usarLink(
    '${titulo.replace(/'/g,"")}',
    '${link}'
  )">

  📥 Cadastrar

</button>
      
      </div>
      </div>
    `;
  }).join("");
}
async function conectarTV(){

  let codigo =
    localStorage.getItem("codigo_tv_salvo");

  if(!codigo){

    codigo =
      prompt("Digite o código da TV");

  }

  if(!codigo) return;

  const { data, error } =
    await supabaseClient
      .from("tv_sessoes")
      .select("*")
      .eq("codigo", codigo)
      .eq("ativo", true)
      .maybeSingle();

  if(error || !data){

    localStorage.removeItem(
      "codigo_tv_salvo"
    );

    alert("TV não encontrada");

    return conectarTV();
  }

  localStorage.setItem(
    "codigo_tv_salvo",
    codigo
  );

  SALA = data.sala;

  document.getElementById("sala").value =
    SALA;

  status(
    "📺 Conectado na TV " +
    codigo
  );

}
function usarLink(titulo, link){
  document.getElementById("novoTituloFilme").value = titulo;
  document.getElementById("novoLinkFilme").value = link;

  alert("Link preenchido 👍 agora é só cadastrar");
}
function toggleYoutube(){

  const box = document.getElementById("boxYoutube");
  const seta = document.getElementById("setaYoutube");

  box.classList.toggle("oculto");

  if(box.classList.contains("oculto")){
    seta.innerText = "▼";
  } else {
    seta.innerText = "▲";
  }
}
function toggleCard(id){

  const el = document.getElementById(id);

  if(!el) return;

  el.classList.toggle("oculto");

  if(!el.classList.contains("oculto")){

    el.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });

  }
}
(async () => {

  await conectarTV();

  await verificarLogin();

})();
</script>
