<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Roupas</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f7fafc;
  color:#111;
}

header{
  background:#111;
  color:#fff;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:900;
}

.carrinho-btn{
  background:#e91e63;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
}

.container{
  max-width:1200px;
  margin:20px auto;
  padding:0 14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 5px 15px #0001;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-info{
  padding:12px;
}

.preco{
  color:#e91e63;
  font-weight:bold;
}

.modal{
  position:fixed;
  inset:0;
  background:#0008;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:#fff;
  width:90%;
  max-width:500px;
  border-radius:16px;
  padding:18px;
}

select,button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  background:#111;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#333;
}

.carrinho{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#fff;
  box-shadow:-5px 0 20px #0003;
  padding:14px;
  transform:translateX(100%);
  transition:.3s;
  z-index:9999;
}

.carrinho.show{
  transform:translateX(0);
}

.item{
  border-bottom:1px solid #eee;
  padding:8px 0;
}

.total{
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">👗 Loja Fashion</div>
  <button class="carrinho-btn" onclick="abrirCarrinho()">🛒 Carrinho (<span id="qtd">0</span>)</button>
</header>

<div class="container">
  <div id="produtos" class="grid"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3 id="nomeProd"></h3>
    <img id="imgProd" style="width:100%;border-radius:12px">

    <select id="tamanho">
      <option>P</option>
      <option>M</option>
      <option>G</option>
    </select>

    <select id="cor">
      <option>Preto</option>
      <option>Branco</option>
      <option>Rosa</option>
    </select>

    <button onclick="addCarrinho()">Adicionar ao carrinho</button>
    <button onclick="fecharModal()">Fechar</button>
  </div>
</div>

<!-- CARRINHO -->
<div id="carrinho" class="carrinho">
  <h3>🛒 Carrinho</h3>
  <div id="itens"></div>
  <div class="total">Total: R$ <span id="total">0</span></div>
  <button onclick="finalizar()">Finalizar Pedido</button>
</div>

<script>
const produtos = [
  {nome:"Vestido Floral", preco:79, img:"https://images.unsplash.com/photo-1521336575822-6da63fb45455"},
  {nome:"Blusa Moderna", preco:49, img:"https://images.unsplash.com/photo-1489987707025-afc232f7ea0f"},
  {nome:"Calça Jeans", preco:99, img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"},
  {nome:"Conjunto Feminino", preco:120, img:"https://images.unsplash.com/photo-1495121605193-b116b5b09a14"}
];

let carrinho = [];
let produtoAtual = null;

function render(){
  const box = document.getElementById("produtos");

  box.innerHTML = produtos.map((p,i)=>`
    <div class="card" onclick="abrirModal(${i})">
      <img src="${p.img}">
      <div class="card-info">
        <div>${p.nome}</div>
        <div class="preco">R$ ${p.preco}</div>
      </div>
    </div>
  `).join("");
}

function abrirModal(i){
  produtoAtual = produtos[i];
  document.getElementById("modal").style.display="flex";
  document.getElementById("nomeProd").innerText=produtoAtual.nome;
  document.getElementById("imgProd").src=produtoAtual.img;
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
}

function addCarrinho(){
  const tam = document.getElementById("tamanho").value;
  const cor = document.getElementById("cor").value;

  carrinho.push({
    ...produtoAtual,
    tamanho:tam,
    cor:cor
  });

  atualizarCarrinho();
  fecharModal();
}

function atualizarCarrinho(){
  document.getElementById("qtd").innerText = carrinho.length;

  const itens = document.getElementById("itens");

  let total = 0;

  itens.innerHTML = carrinho.map((i,idx)=>{
    total += i.preco;
    return `<div class="item">
      ${i.nome} (${i.tamanho}/${i.cor}) - R$ ${i.preco}
    </div>`;
  }).join("");

  document.getElementById("total").innerText = total;
}

function abrirCarrinho(){
  document.getElementById("carrinho").classList.toggle("show");
}

function finalizar(){
  if(!carrinho.length) return alert("Carrinho vazio");

  let texto = "Pedido:%0A";

  carrinho.forEach(i=>{
    texto += `${i.nome} (${i.tamanho}/${i.cor}) - R$ ${i.preco}%0A`;
  });

  window.open(`https://wa.me/5588999999999?text=${texto}`);
}

render();
</script>

</body>
</html>
