<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja com Carrinho</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f5f5f5}

header{
  background:#111;
  color:#fff;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:none;
  border-radius:10px;
  padding:10px;
  cursor:pointer;
}

.container{
  max-width:1100px;
  margin:20px auto;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 12px #0001;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-info{
  padding:10px;
}

.preco{
  color:#e91e63;
  font-weight:bold;
}

.add{
  width:100%;
  margin-top:10px;
  background:#111;
  color:#fff;
}

/* CARRINHO */
.carrinho{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#fff;
  box-shadow:-5px 0 20px #0003;
  padding:14px;
  transform:translateX(100%);
  transition:.3s;
  z-index:999;
}

.carrinho.show{
  transform:translateX(0);
}

.item{
  border-bottom:1px solid #eee;
  padding:8px 0;
}

.item button{
  padding:4px 8px;
  margin:2px;
  font-size:12px;
}

.total{
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <h2>👗 Loja</h2>
  <button onclick="abrirCarrinho()">🛒 (<span id="qtd">0</span>)</button>
</header>

<div class="container">
  <div id="produtos" class="grid"></div>
</div>

<div id="carrinho" class="carrinho">
  <h3>Carrinho</h3>
  <div id="itens"></div>
  <div class="total">Total: R$ <span id="total">0</span></div>
  <button onclick="limparCarrinho()">Limpar</button>
</div>

<script>
const produtos = [
  {id:1,nome:"Vestido",preco:80,img:"https://images.unsplash.com/photo-1521336575822-6da63fb45455"},
  {id:2,nome:"Blusa",preco:50,img:"https://images.unsplash.com/photo-1489987707025-afc232f7ea0f"},
  {id:3,nome:"Calça",preco:100,img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"}
];

let carrinho = [];

/* RENDER PRODUTOS */
function renderProdutos(){
  document.getElementById("produtos").innerHTML = produtos.map(p=>`
    <div class="card">
      <img src="${p.img}">
      <div class="card-info">
        <div>${p.nome}</div>
        <div class="preco">R$ ${p.preco}</div>
        <button class="add" onclick="addCarrinho(${p.id})">Adicionar</button>
      </div>
    </div>
  `).join("");
}

/* ADICIONAR */
function addCarrinho(id){
  const produto = produtos.find(p=>p.id===id);

  const existente = carrinho.find(i=>i.id===id);

  if(existente){
    existente.qtd++;
  }else{
    carrinho.push({...produto,qtd:1});
  }

  atualizarCarrinho();
}

/* REMOVER */
function removerItem(id){
  carrinho = carrinho.filter(i=>i.id!==id);
  atualizarCarrinho();
}

/* DIMINUIR */
function diminuirItem(id){
  const item = carrinho.find(i=>i.id===id);

  if(item){
    item.qtd--;
    if(item.qtd<=0){
      removerItem(id);
    }
  }

  atualizarCarrinho();
}

/* AUMENTAR */
function aumentarItem(id){
  const item = carrinho.find(i=>i.id===id);
  if(item){
    item.qtd++;
  }
  atualizarCarrinho();
}

/* LIMPAR */
function limparCarrinho(){
  carrinho = [];
  atualizarCarrinho();
}

/* ATUALIZAR */
function atualizarCarrinho(){
  document.getElementById("qtd").innerText = carrinho.reduce((a,b)=>a+b.qtd,0);

  let total = 0;

  document.getElementById("itens").innerHTML = carrinho.map(i=>{
    total += i.preco * i.qtd;

    return `
    <div class="item">
      <b>${i.nome}</b><br>
      R$ ${i.preco} x ${i.qtd}<br>

      <button onclick="diminuirItem(${i.id})">➖</button>
      <button onclick="aumentarItem(${i.id})">➕</button>
      <button onclick="removerItem(${i.id})">❌</button>
    </div>
    `;
  }).join("");

  document.getElementById("total").innerText = total;
}

/* ABRIR */
function abrirCarrinho(){
  document.getElementById("carrinho").classList.toggle("show");
}

renderProdutos();
</script>

</body>
</html>
