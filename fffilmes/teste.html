<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Rede Social</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f0f2f5;color:#1c1e21}
header{position:sticky;top:0;z-index:10;background:#1877f2;color:white;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px #0002}
.logo{font-size:24px;font-weight:900}
.search{border:none;border-radius:20px;padding:10px 14px;width:260px}
.container{max-width:980px;margin:20px auto;padding:0 12px;display:grid;grid-template-columns:220px 1fr;gap:16px}
.sidebar,.card{background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px #0002}
.menu-item{padding:12px;border-radius:10px;font-weight:bold;cursor:pointer}
.menu-item:hover{background:#f0f2f5}
.post-box textarea{width:100%;min-height:80px;border:1px solid #ddd;border-radius:12px;padding:12px;resize:none;font-size:15px}
button{border:none;border-radius:10px;padding:10px 14px;background:#1877f2;color:white;font-weight:bold;cursor:pointer}
button:hover{background:#145dbf}
.post{margin-top:14px}
.post-header{display:flex;gap:10px;align-items:center}
.avatar{width:45px;height:45px;border-radius:50%;background:#1877f2;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}
.name{font-weight:900}
.time{font-size:12px;color:#65676b}
.post-text{margin:14px 0;line-height:1.5}
.actions{display:flex;border-top:1px solid #eee;border-bottom:1px solid #eee}
.action{flex:1;text-align:center;padding:10px;cursor:pointer;font-weight:bold;color:#65676b}
.action:hover{background:#f0f2f5}
.comments{margin-top:10px}
.comment{background:#f0f2f5;border-radius:12px;padding:8px 10px;margin-top:6px}
.comment-box{display:flex;gap:8px;margin-top:10px}
.comment-box input{flex:1;border:1px solid #ddd;border-radius:20px;padding:10px}
@media(max-width:750px){
  .container{grid-template-columns:1fr}
  .sidebar{display:none}
  .search{width:150px}
}
</style>
</head>
<body>

<header>
  <div class="logo">SocialFF</div>
  <input class="search" placeholder="Pesquisar">
</header>

<div class="container">
  <aside class="sidebar">
    <div class="menu-item">🏠 Início</div>
    <div class="menu-item">👥 Amigos</div>
    <div class="menu-item">🎬 Vídeos</div>
    <div class="menu-item">🛒 Marketplace</div>
    <div class="menu-item">⚙️ Configurações</div>
  </aside>

  <main>
    <div class="card post-box">
      <textarea id="postTexto" placeholder="No que você está pensando?"></textarea>
      <br><br>
      <button onclick="criarPost()">Publicar</button>
    </div>

    <div id="feed"></div>
  </main>
</div>

<script>
let posts = [
  {
    nome:"Lívia Maria",
    texto:"Bem-vindo à minha rede social!",
    curtidas:2,
    comentarios:["Ficou top!", "Muito legal"]
  }
];

function renderFeed(){
  const feed = document.getElementById("feed");
  feed.innerHTML = posts.map((p,i)=>`
    <div class="card post">
      <div class="post-header">
        <div class="avatar">${p.nome.charAt(0)}</div>
        <div>
          <div class="name">${p.nome}</div>
          <div class="time">Agora mesmo</div>
        </div>
      </div>

      <div class="post-text">${p.texto}</div>

      <div class="time">${p.curtidas} curtida(s)</div>

      <div class="actions">
        <div class="action" onclick="curtir(${i})">👍 Curtir</div>
        <div class="action" onclick="focarComentario(${i})">💬 Comentar</div>
        <div class="action">↗ Compartilhar</div>
      </div>

      <div class="comments">
        ${p.comentarios.map(c=>`<div class="comment"><b>Visitante:</b> ${c}</div>`).join("")}
      </div>

      <div class="comment-box">
        <input id="comentario-${i}" placeholder="Escreva um comentário">
        <button onclick="comentar(${i})">Enviar</button>
      </div>
    </div>
  `).join("");
}

function criarPost(){
  const texto = document.getElementById("postTexto").value.trim();
  if(!texto) return alert("Digite algo para publicar.");

  posts.unshift({
    nome:"Você",
    texto,
    curtidas:0,
    comentarios:[]
  });

  document.getElementById("postTexto").value = "";
  renderFeed();
}

function curtir(i){
  posts[i].curtidas++;
  renderFeed();
}

function comentar(i){
  const input = document.getElementById("comentario-" + i);
  const texto = input.value.trim();
  if(!texto) return;

  posts[i].comentarios.push(texto);
  renderFeed();
}

function focarComentario(i){
  document.getElementById("comentario-" + i)?.focus();
}

renderFeed();
</script>

</body>
</html>
