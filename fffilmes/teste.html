<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo de Boneca</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#ffd1e8,#c7f0ff);
  min-height:100vh;
  color:#333;
}

header{
  text-align:center;
  padding:18px;
  background:rgba(255,255,255,.6);
  box-shadow:0 4px 18px rgba(0,0,0,.12);
}

h1{
  margin:0;
  color:#e91e63;
}

.game{
  max-width:1000px;
  margin:20px auto;
  padding:12px;
  display:grid;
  grid-template-columns:1fr 280px;
  gap:18px;
}

.palco{
  min-height:560px;
  border-radius:25px;
  background:linear-gradient(#bdefff,#fff0f8);
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.boneca{
  position:absolute;
  left:50%;
  bottom:40px;
  transform:translateX(-50%);
  width:230px;
  height:430px;
}

.cabeca{
  position:absolute;
  top:20px;
  left:65px;
  width:100px;
  height:110px;
  background:#ffd3b6;
  border-radius:50%;
  z-index:5;
}

.cabelo{
  position:absolute;
  top:0;
  left:50px;
  width:130px;
  height:120px;
  background:#5b2c1b;
  border-radius:60px 60px 40px 40px;
  z-index:4;
}

.olho{
  position:absolute;
  top:55px;
  width:12px;
  height:12px;
  background:#222;
  border-radius:50%;
  z-index:7;
}

.olho.e{left:90px}
.olho.d{left:130px}

.boca{
  position:absolute;
  top:85px;
  left:105px;
  width:28px;
  height:12px;
  border-bottom:4px solid #d81b60;
  border-radius:50%;
  z-index:7;
}

.corpo{
  position:absolute;
  top:130px;
  left:75px;
  width:80px;
  height:140px;
  background:#ffd3b6;
  border-radius:35px 35px 20px 20px;
  z-index:2;
}

.braco{
  position:absolute;
  top:145px;
  width:35px;
  height:120px;
  background:#ffd3b6;
  border-radius:20px;
  z-index:1;
}

.braco.e{left:35px; transform:rotate(18deg)}
.braco.d{right:35px; transform:rotate(-18deg)}

.perna{
  position:absolute;
  top:265px;
  width:36px;
  height:130px;
  background:#ffd3b6;
  border-radius:20px;
  z-index:1;
}

.perna.e{left:78px}
.perna.d{left:120px}

.roupa{
  position:absolute;
  top:125px;
  left:55px;
  width:120px;
  height:170px;
  background:#ff4081;
  clip-path:polygon(25% 0,75% 0,100% 100%,0 100%);
  border-radius:18px;
  z-index:6;
}

.sapato{
  position:absolute;
  top:385px;
  width:58px;
  height:28px;
  background:#9c27b0;
  border-radius:20px 20px 8px 8px;
  z-index:8;
}

.sapato.e{left:60px}
.sapato.d{left:118px}

.nome{
  position:absolute;
  left:50%;
  bottom:12px;
  transform:translateX(-50%);
  font-size:34px;
  font-weight:900;
  color:#e91e63;
  text-shadow:2px 2px #fff;
}

.painel{
  background:rgba(255,255,255,.8);
  border-radius:22px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.painel h2{
  margin:0 0 12px;
  color:#673ab7;
}

.grupo{
  margin-bottom:18px;
}

.grupo h3{
  margin:0 0 8px;
  font-size:16px;
}

button{
  border:none;
  border-radius:14px;
  padding:10px 12px;
  margin:4px;
  cursor:pointer;
  font-weight:bold;
  background:#e91e63;
  color:white;
}

button:hover{
  transform:scale(1.05);
}

.btn-roxo{background:#9c27b0}
.btn-azul{background:#2196f3}
.btn-verde{background:#4caf50}
.btn-amarelo{background:#ffc107;color:#333}
.btn-preto{background:#222}
.btn-marrom{background:#6d3b1f}

@media(max-width:750px){
  .game{
    grid-template-columns:1fr;
  }

  .palco{
    min-height:520px;
  }

  .painel{
    order:-1;
  }
}
</style>
</head>

<body>

<header>
  <h1>👗 Jogo de Boneca da Lívia Maria</h1>
  <p>Escolha roupa, cabelo, sapato e cenário</p>
</header>

<div class="game">
  <div id="palco" class="palco">
    <div class="boneca">
      <div id="cabelo" class="cabelo"></div>
      <div class="cabeca"></div>
      <div class="olho e"></div>
      <div class="olho d"></div>
      <div class="boca"></div>
      <div class="braco e"></div>
      <div class="braco d"></div>
      <div class="corpo"></div>
      <div class="perna e"></div>
      <div class="perna d"></div>
      <div id="roupa" class="roupa"></div>
      <div id="sapatoE" class="sapato e"></div>
      <div id="sapatoD" class="sapato d"></div>
    </div>

    <div class="nome">Lívia Maria</div>
  </div>

  <div class="painel">
    <h2>Personalizar</h2>

    <div class="grupo">
      <h3>Vestido</h3>
      <button onclick="trocarRoupa('#ff4081')">Rosa</button>
      <button class="btn-roxo" onclick="trocarRoupa('#9c27b0')">Roxo</button>
      <button class="btn-azul" onclick="trocarRoupa('#2196f3')">Azul</button>
      <button class="btn-verde" onclick="trocarRoupa('#4caf50')">Verde</button>
      <button class="btn-amarelo" onclick="trocarRoupa('#ffc107')">Amarelo</button>
    </div>

    <div class="grupo">
      <h3>Cabelo</h3>
      <button class="btn-marrom" onclick="trocarCabelo('#5b2c1b')">Castanho</button>
      <button class="btn-preto" onclick="trocarCabelo('#111')">Preto</button>
      <button class="btn-amarelo" onclick="trocarCabelo('#f4c542')">Loiro</button>
      <button onclick="trocarCabelo('#e91e63')">Rosa</button>
    </div>

    <div class="grupo">
      <h3>Sapato</h3>
      <button class="btn-roxo" onclick="trocarSapato('#9c27b0')">Roxo</button>
      <button onclick="trocarSapato('#ff4081')">Rosa</button>
      <button class="btn-preto" onclick="trocarSapato('#111')">Preto</button>
      <button class="btn-azul" onclick="trocarSapato('#2196f3')">Azul</button>
    </div>

    <div class="grupo">
      <h3>Cenário</h3>
      <button onclick="trocarCenario('princesa')">Princesa</button>
      <button class="btn-azul" onclick="trocarCenario('ceu')">Céu</button>
      <button class="btn-verde" onclick="trocarCenario('jardim')">Jardim</button>
      <button class="btn-roxo" onclick="trocarCenario('noite')">Noite</button>
    </div>
  </div>
</div>

<script>
function trocarRoupa(cor){
  document.getElementById("roupa").style.background = cor;
}

function trocarCabelo(cor){
  document.getElementById("cabelo").style.background = cor;
}

function trocarSapato(cor){
  document.getElementById("sapatoE").style.background = cor;
  document.getElementById("sapatoD").style.background = cor;
}

function trocarCenario(tipo){
  const palco = document.getElementById("palco");

  if(tipo === "princesa"){
    palco.style.background = "linear-gradient(#ffd1e8,#fff0f8)";
  }

  if(tipo === "ceu"){
    palco.style.background = "linear-gradient(#87ceeb,#ffffff)";
  }

  if(tipo === "jardim"){
    palco.style.background = "linear-gradient(#b7ffbf,#fff7d6)";
  }

  if(tipo === "noite"){
    palco.style.background = "linear-gradient(#111827,#4c1d95)";
  }
}
</script>

</body>
</html>
