<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo de Blocos - Lívia Maria</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#ffb6d9,#b5e8ff);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#222;
}

header{
  width:100%;
  text-align:center;
  padding:18px 10px;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,.12);
}

h1{
  margin:0;
  font-size:30px;
  color:#e91e63;
}

p{
  margin:6px 0 0;
  font-weight:bold;
}

.game{
  width:95%;
  max-width:900px;
  margin:20px auto;
  display:grid;
  grid-template-columns:1fr 220px;
  gap:16px;
}

.area{
  min-height:520px;
  background:#f8fbff;
  border:4px dashed #ff69b4;
  border-radius:22px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}

.area::before{
  content:"Monte aqui o castelo da Lívia Maria";
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  color:#999;
  font-weight:bold;
  font-size:14px;
}

.painel{
  background:rgba(255,255,255,.75);
  border-radius:20px;
  padding:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.painel h2{
  margin:0 0 12px;
  font-size:18px;
  color:#673ab7;
}

.bloco{
  width:70px;
  height:70px;
  border-radius:12px;
  margin:10px auto;
  cursor:grab;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#fff;
  box-shadow:0 6px 12px rgba(0,0,0,.25);
  user-select:none;
}

.bloco:active{cursor:grabbing}

.rosa{background:#ff4081}
.azul{background:#2196f3}
.roxo{background:#9c27b0}
.amarelo{background:#ffc107;color:#222}
.verde{background:#4caf50}
.laranja{background:#ff5722}

.peca{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:white;
  box-shadow:0 6px 12px rgba(0,0,0,.25);
  cursor:move;
  user-select:none;
}

.nome{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:42px;
  font-weight:900;
  color:#e91e63;
  text-shadow:2px 2px 0 #fff;
  pointer-events:none;
}

button{
  width:100%;
  border:none;
  padding:12px;
  border-radius:14px;
  margin-top:12px;
  background:#e91e63;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

button:hover{background:#c2185b}

@media(max-width:700px){
  .game{
    grid-template-columns:1fr;
  }

  .painel{
    order:-1;
  }

  .bloco{
    display:inline-flex;
    margin:6px;
  }

  .area{
    min-height:500px;
  }

  .nome{
    font-size:30px;
  }
}
</style>
</head>

<body>

<header>
  <h1>🌸 Jogo de Blocos da Lívia Maria 🌸</h1>
  <p>Arraste os blocos e monte sua construção</p>
</header>

<div class="game">
  <div id="area" class="area">
    <div class="nome">Lívia Maria</div>
  </div>

  <div class="painel">
    <h2>Blocos</h2>

    <div class="bloco rosa" draggable="true" data-cor="rosa">L</div>
    <div class="bloco azul" draggable="true" data-cor="azul">I</div>
    <div class="bloco roxo" draggable="true" data-cor="roxo">V</div>
    <div class="bloco amarelo" draggable="true" data-cor="amarelo">I</div>
    <div class="bloco verde" draggable="true" data-cor="verde">A</div>
    <div class="bloco laranja" draggable="true" data-cor="laranja">★</div>

    <button onclick="limparTudo()">Limpar blocos</button>
  </div>
</div>

<script>
const area = document.getElementById("area");
let corSelecionada = "";
let textoSelecionado = "";

document.querySelectorAll(".bloco").forEach(bloco => {
  bloco.addEventListener("dragstart", e => {
    corSelecionada = bloco.dataset.cor;
    textoSelecionado = bloco.textContent;
  });
});

area.addEventListener("dragover", e => {
  e.preventDefault();
});

area.addEventListener("drop", e => {
  e.preventDefault();

  const rect = area.getBoundingClientRect();
  const x = e.clientX - rect.left - 35;
  const y = e.clientY - rect.top - 35;

  criarPeca(x, y, corSelecionada, textoSelecionado);
});

function criarPeca(x, y, cor, texto){
  const peca = document.createElement("div");
  peca.className = "peca " + cor;
  peca.textContent = texto;
  peca.style.left = x + "px";
  peca.style.top = y + "px";

  let arrastando = false;
  let offsetX = 0;
  let offsetY = 0;

  peca.addEventListener("mousedown", e => {
    arrastando = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener("mousemove", e => {
    if(!arrastando) return;

    const rect = area.getBoundingClientRect();
    let novoX = e.clientX - rect.left - offsetX;
    let novoY = e.clientY - rect.top - offsetY;

    novoX = Math.max(0, Math.min(area.clientWidth - 70, novoX));
    novoY = Math.max(0, Math.min(area.clientHeight - 70, novoY));

    peca.style.left = novoX + "px";
    peca.style.top = novoY + "px";
  });

  document.addEventListener("mouseup", () => {
    arrastando = false;
  });

  peca.addEventListener("dblclick", () => {
    peca.remove();
  });

  area.appendChild(peca);
}

function limparTudo(){
  document.querySelectorAll(".peca").forEach(p => p.remove());
}
</script>

</body>
</html>
