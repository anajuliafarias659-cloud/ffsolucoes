<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boneca com Casinha</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(#ffd6ec,#bdefff);
  min-height:100vh;
}

header{
  text-align:center;
  padding:16px;
  background:rgba(255,255,255,.65);
}

h1{
  margin:0;
  color:#e91e63;
}

.game{
  max-width:1100px;
  margin:20px auto;
  padding:12px;
  display:grid;
  grid-template-columns:1fr 280px;
  gap:18px;
}

.cenario{
  min-height:600px;
  border-radius:25px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(#9be7ff 0 55%,#9be36b 55% 100%);
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

/* CASA */
.casa{
  position:absolute;
  left:40px;
  bottom:90px;
  width:310px;
  height:250px;
}

.telhado{
  position:absolute;
  top:0;
  left:15px;
  width:280px;
  height:160px;
  background:#d84315;
  clip-path:polygon(50% 0,100% 65%,0 65%);
  z-index:2;
}

.parede{
  position:absolute;
  bottom:0;
  left:30px;
  width:250px;
  height:170px;
  background:#ffe0b2;
  border:5px solid #8d5524;
  border-radius:10px;
}

.porta{
  position:absolute;
  bottom:0;
  left:120px;
  width:65px;
  height:105px;
  background:#8d5524;
  border-radius:25px 25px 0 0;
}

.janela{
  position:absolute;
  top:80px;
  width:55px;
  height:55px;
  background:#90caf9;
  border:5px solid #6d4c41;
}

.janela.e{left:55px}
.janela.d{right:55px}

/* BONECA */
.boneca{
  position:absolute;
  right:110px;
  bottom:70px;
  width:230px;
  height:430px;
}

.cabelo{
  position:absolute;
  top:0;
  left:50px;
  width:130px;
  height:125px;
  background:#5b2c1b;
  border-radius:65px 65px 45px 45px;
  z-index:2;
}

.cabeca{
  position:absolute;
  top:25px;
  left:65px;
  width:100px;
  height:110px;
  background:#ffd3b6;
  border-radius:50%;
  z-index:3;
}

.olho{
  position:absolute;
  top:65px;
  width:12px;
  height:12px;
  background:#222;
  border-radius:50%;
  z-index:4;
}

.olho.e{left:92px}
.olho.d{left:130px}

.boca{
  position:absolute;
  top:92px;
  left:107px;
  width:26px;
  height:12px;
  border-bottom:4px solid #e91e63;
  border-radius:50%;
  z-index:4;
}

.braco{
  position:absolute;
  top:150px;
  width:35px;
  height:125px;
  background:#ffd3b6;
  border-radius:20px;
  z-index:1;
}

.braco.e{left:32px;transform:rotate(20deg)}
.braco.d{right:32px;transform:rotate(-20deg)}

.corpo{
  position:absolute;
  top:135px;
  left:75px;
  width:80px;
  height:140px;
  background:#ffd3b6;
  border-radius:35px;
}

.perna{
  position:absolute;
  top:270px;
  width:36px;
  height:130px;
  background:#ffd3b6;
  border-radius:20px;
}

.perna.e{left:78px}
.perna.d{left:120px}

.roupa{
  position:absolute;
  top:128px;
  left:55px;
  width:120px;
  height:175px;
  background:#ff4081;
  clip-path:polygon(25% 0,75% 0,100% 100%,0 100%);
  border-radius:18px;
  z-index:5;
}

.sapato{
  position:absolute;
  top:390px;
  width:58px;
  height:28px;
  background:#9c27b0;
  border-radius:20px 20px 8px 8px;
  z-index:6;
}

.sapato.e{left:60px}
.sapato.d{left:118px}

.nome{
  position:absolute;
  right:90px;
  bottom:25px;
  font-size:30px;
  font-weight:900;
  color:#e91e63;
  text-shadow:2px 2px #fff;
}

/* PAINEL */
.painel{
  background:rgba(255,255,255,.85);
  border-radius:22px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.painel h2{
  margin-top:0;
  color:#673ab7;
}

.grupo{
  margin-bottom:18px;
}

.grupo h3{
  margin:0 0 8px;
}

button{
  border:none;
  padding:10px 12px;
  border-radius:14px;
  margin:4px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  background:#e91e63;
}

button:hover{
  transform:scale(1.05);
}

.roxo{background:#9c27b0}
.azul{background:#2196f3}
.verde{background:#4caf50}
.amarelo{background:#ffc107;color:#333}
.preto{background:#111}
.marrom{background:#6d3b1f}
.laranja{background:#ff5722}

@media(max-width:800px){
  .game{
    grid-template-columns:1fr;
  }

  .painel{
    order:-1;
  }

  .cenario{
    min-height:620px;
  }

  .casa{
    transform:scale(.78);
    transform-origin:left bottom;
    left:10px;
  }

  .boneca{
    transform:scale(.82);
    transform-origin:right bottom;
    right:10px;
  }

  .nome{
    right:20px;
    font-size:24px;
  }
}
</style>
</head>

<body>

<header>
  <h1>🏠 Jogo da Boneca com Casinha</h1>
  <p>Troque a roupa, cabelo, sapato e a cor da casa</p>
</header>

<div class="game">

  <div id="cenario" class="cenario">

    <div class="casa">
      <div id="telhado" class="telhado"></div>
      <div id="parede" class="parede">
        <div class="janela e"></div>
        <div class="janela d"></div>
        <div class="porta"></div>
      </div>
    </div>

    <div class="boneca">
      <div id="cabelo" class="cabelo"></div>
      <div class="cabeca"></div>
      <div class="olho e"></div>
      <div class="olho d"></div>
      <div class="boca"></div>
      <div class="braco e"></div>
      <div class="braco d"></div>
      <div class="corpo"></div>
      <div class="perna e"></div>
      <div class="perna d"></div>
      <div id="roupa" class="roupa"></div>
      <div id="sapatoE" class="sapato e"></div>
      <div id="sapatoD" class="sapato d"></div>
    </div>

    <div class="nome">Lívia Maria</div>
  </div>

  <div class="painel">
    <h2>Personalizar</h2>

    <div class="grupo">
      <h3>Vestido</h3>
      <button onclick="trocarRoupa('#ff4081')">Rosa</button>
      <button class="roxo" onclick="trocarRoupa('#9c27b0')">Roxo</button>
      <button class="azul" onclick="trocarRoupa('#2196f3')">Azul</button>
      <button class="verde" onclick="trocarRoupa('#4caf50')">Verde</button>
      <button class="amarelo" onclick="trocarRoupa('#ffc107')">Amarelo</button>
    </div>

    <div class="grupo">
      <h3>Cabelo</h3>
      <button class="marrom" onclick="trocarCabelo('#5b2c1b')">Castanho</button>
      <button class="preto" onclick="trocarCabelo('#111')">Preto</button>
      <button class="amarelo" onclick="trocarCabelo('#f4c542')">Loiro</button>
      <button onclick="trocarCabelo('#e91e63')">Rosa</button>
    </div>

    <div class="grupo">
      <h3>Sapato</h3>
      <button class="roxo" onclick="trocarSapato('#9c27b0')">Roxo</button>
      <button onclick="trocarSapato('#ff4081')">Rosa</button>
      <button class="preto" onclick="trocarSapato('#111')">Preto</button>
      <button class="azul" onclick="trocarSapato('#2196f3')">Azul</button>
    </div>

    <div class="grupo">
      <h3>Casa</h3>
      <button class="laranja" onclick="trocarCasa('#ffe0b2','#d84315')">Clássica</button>
      <button onclick="trocarCasa('#ffc1e3','#ad1457')">Rosa</button>
      <button class="azul" onclick="trocarCasa('#bbdefb','#1565c0')">Azul</button>
      <button class="verde" onclick="trocarCasa('#c8e6c9','#2e7d32')">Verde</button>
    </div>

    <div class="grupo">
      <h3>Cenário</h3>
      <button onclick="trocarCenario('dia')">Dia</button>
      <button class="roxo" onclick="trocarCenario('noite')">Noite</button>
      <button class="verde" onclick="trocarCenario('jardim')">Jardim</button>
    </div>
  </div>

</div>

<script>
function trocarRoupa(cor){
  document.getElementById("roupa").style.background = cor;
}

function trocarCabelo(cor){
  document.getElementById("cabelo").style.background = cor;
}

function trocarSapato(cor){
  document.getElementById("sapatoE").style.background = cor;
  document.getElementById("sapatoD").style.background = cor;
}

function trocarCasa(corParede, corTelhado){
  document.getElementById("parede").style.background = corParede;
  document.getElementById("telhado").style.background = corTelhado;
}

function trocarCenario(tipo){
  const cenario = document.getElementById("cenario");

  if(tipo === "dia"){
    cenario.style.background = "linear-gradient(#9be7ff 0 55%,#9be36b 55% 100%)";
  }

  if(tipo === "noite"){
    cenario.style.background = "linear-gradient(#111827 0 55%,#1b5e20 55% 100%)";
  }

  if(tipo === "jardim"){
    cenario.style.background = "linear-gradient(#b3e5fc 0 50%,#66bb6a 50% 100%)";
  }
}
</script>

</body>
</html>
