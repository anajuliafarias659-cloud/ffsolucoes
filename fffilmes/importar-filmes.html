<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Importar Filmes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:#fff;
  padding:20px;
}

textarea{
  width:100%;
  height:200px;
  margin-top:10px;
  border-radius:10px;
  padding:10px;
}

button{
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#status{
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Importar Filmes (10 por vez)</h2>

<textarea id="lista" placeholder="Cole links do YouTube aqui..."></textarea>

<button onclick="importar()">Importar</button>

<div id="status"></div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

function sleep(ms){
  return new Promise(r => setTimeout(r, ms));
}

async function importar(){
  const texto = document.getElementById("lista").value;
  const status = document.getElementById("status");

  const links = texto.split("\n").filter(l => l.trim());

  let total = links.length;
  let enviados = 0;

  for(let i = 0; i < links.length; i += 10){

    const bloco = links.slice(i, i + 10);

    status.innerHTML = `Enviando ${enviados} / ${total}...`;

    const dados = bloco.map(link => {
      const videoId = link.split("v=")[1]?.split("&")[0];

      return {
        titulo: "Filme automático",
        descricao: "Importado em massa",
        thumb: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
        link: link,
        ativo: true
      };
    });

    const { error } = await supabase.from("filmes").insert(dados);

    if(error){
      console.error(error);
      alert("Erro ao importar");
      return;
    }

    enviados += bloco.length;

    status.innerHTML = `✅ ${enviados} / ${total} enviados`;

    await sleep(800); // pausa entre blocos
  }

  status.innerHTML = "🔥 Importação concluída!";
}
</script>

</body>
</html>
