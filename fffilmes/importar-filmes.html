<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Importador Profissional de Filmes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:#fff;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
}
textarea{
  width:100%;
  height:250px;
  padding:12px;
  border-radius:10px;
  background:#0f172a;
  color:#fff;
  border:1px solid #334155;
}
button{
  margin-top:10px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
#status{
  margin-top:15px;
}
.barra{
  height:10px;
  background:#1e293b;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}
.barra div{
  height:100%;
  width:0%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">
<h2>Importador Profissional de Filmes</h2>

<p>Formato:<br>
<strong>Titulo | Categoria | Descrição | Link</strong></p>

<textarea id="lista"></textarea>

<button onclick="importar()">Importar</button>

<div id="status"></div>
<div class="barra"><div id="barra"></div></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

function sleep(ms){
  return new Promise(r => setTimeout(r, ms));
}

function extrairId(link){
  if(!link) return null;

  const regras = [
    /v=([^&]+)/,
    /youtu\.be\/([^?]+)/,
    /embed\/([^?]+)/,
    /shorts\/([^?]+)/
  ];

  for(const r of regras){
    const match = link.match(r);
    if(match) return match[1];
  }

  return null;
}

async function importar(){
  const texto = document.getElementById("lista").value;
  const status = document.getElementById("status");
  const barra = document.getElementById("barra");

  const linhas = texto.split("\n").filter(l => l.trim());

  let total = linhas.length;
  let enviados = 0;

  for(let i = 0; i < linhas.length; i += 10){

    const bloco = linhas.slice(i, i + 10);

    const dados = bloco.map(linha => {
      const partes = linha.split("|").map(p => p.trim());

      const titulo = partes[0] || "Sem título";
      const categoria = partes[1] || "Sem categoria";
      const descricao = partes[2] || "";
      const link = partes[3];

      const videoId = extrairId(link);

      return {
        titulo,
        categoria,
        descricao,
        link,
        video_id: videoId,
        thumb: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
        ativo: true
      };
    });

    status.innerHTML = `Enviando ${enviados} / ${total}...`;

    const { error } = await supabase.from("filmes").insert(dados);

    if(error){
      console.error(error);
      alert("Erro ao importar");
      return;
    }

    enviados += bloco.length;

    const porcento = Math.round((enviados / total) * 100);
    barra.style.width = porcento + "%";

    status.innerHTML = `✅ ${enviados} / ${total} enviados`;

    await sleep(800);
  }

  status.innerHTML = "🔥 Importação concluída!";
}
</script>

</body>
</html>
