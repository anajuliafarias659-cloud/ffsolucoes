<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FF Filmes</title>
  <meta name="theme-color" content="#141414">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    :root{
      --primary:#e50914;
      --secondary:#b20710;
      --bg:#141414;
      --card:#181818;
      --card-2:#202020;
      --text:#ffffff;
      --muted:#b3b3b3;
      --line:rgba(255,255,255,.08);
      --shadow:0 18px 45px rgba(0,0,0,.38);
      --bg-filmes:url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1600&q=80');
    }

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.94)),
        var(--bg-filmes) center/cover fixed no-repeat;
      overflow-x:hidden;
      min-height:100vh;
    }

    img{display:block;max-width:100%}

    header{
      position:sticky;
      top:0;
      z-index:100;
      background:linear-gradient(to bottom, rgba(0,0,0,.92), rgba(0,0,0,.68));
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }

    .top-bar{
      max-width:1440px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      min-width:0;
      display:flex;
      align-items:center;
      gap:12px;
      flex:1;
    }

    .brand-text{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
      width:100%;
    }

    .logo{
      font-size:28px;
      font-weight:900;
      color:var(--primary);
      letter-spacing:.6px;
      text-transform:uppercase;
      line-height:1;
      white-space:nowrap;
    }

    .user-info{
      color:var(--muted);
      font-size:13px;
      max-width:320px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn-sair{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      border:none;
      padding:11px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
      box-shadow:0 10px 24px rgba(229,9,20,.28);
    }

    .container{
      max-width:1440px;
      margin:0 auto;
      padding:20px 18px 48px;
    }

    .hero{
      position:relative;
      min-height:72vh;
      border-radius:28px;
      overflow:hidden;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      display:flex;
      align-items:flex-end;
      padding:38px;
      margin-bottom:22px;
      isolation:isolate;
      background:#111;
    }

    .hero-bg{
      position:absolute;
      inset:0;
      z-index:0;
      background-size:cover;
      background-position:center;
      transform:scale(1.05);
      filter:brightness(.55);
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      z-index:1;
      background:
        linear-gradient(90deg, rgba(0,0,0,.94) 0%, rgba(0,0,0,.72) 40%, rgba(0,0,0,.2) 100%),
        linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.8) 100%);
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:720px;
    }

    .hero-tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.09);
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
    }

    .hero-title{
      font-size:clamp(32px,5vw,60px);
      font-weight:900;
      line-height:.98;
      margin:0 0 12px;
      text-shadow:0 10px 35px rgba(0,0,0,.45);
      max-width:700px;
    }

    .hero-desc{
      color:#e5e7eb;
      line-height:1.65;
      font-size:16px;
      margin:0 0 20px;
      max-width:620px;
      white-space:pre-line;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn-hero{
      border:none;
      padding:14px 20px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
      min-height:48px;
    }

    .btn-play{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      box-shadow:0 12px 28px rgba(229,9,20,.28);
    }

    .btn-info{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(10px);
    }

    .busca-box{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:0 0 18px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .busca-input{
      flex:1;
      min-width:240px;
      height:48px;
      border:none;
      outline:none;
      border-radius:14px;
      padding:0 16px;
      background:rgba(0,0,0,.45);
      color:#fff;
      font-size:15px;
      border:1px solid rgba(255,255,255,.08);
    }

    .busca-input::placeholder{
      color:#94a3b8;
    }

    .btn-busca{
      height:48px;
      border:none;
      border-radius:14px;
      padding:0 18px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      box-shadow:0 10px 24px rgba(229,9,20,.24);
    }

    .btn-busca-sec{
      height:48px;
      border:none;
      border-radius:14px;
      padding:0 18px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.1);
    }

    .busca-info{
      width:100%;
      color:var(--muted);
      font-size:14px;
      padding:2px 4px 0;
    }

    .busca-vazio{
      margin-top:22px;
      padding:22px;
      border-radius:20px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .busca-vazio h3{
      margin:0 0 10px;
      font-size:22px;
    }

    .busca-vazio p{
      margin:0 0 16px;
      color:#d1d5db;
      line-height:1.6;
    }

    .categorias-topo{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding:4px 0 10px;
      margin-bottom:6px;
      scrollbar-width:none;
      scroll-snap-type:x proximity;
    }

    .categorias-topo::-webkit-scrollbar{display:none}

    .categoria-btn{
      border:none;
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:11px 16px;
      border-radius:999px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
      transition:.2s;
      flex:0 0 auto;
      scroll-snap-align:start;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(10px);
    }

    .categoria-btn.ativo{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      border-color:transparent;
      box-shadow:0 10px 22px rgba(229,9,20,.24);
    }

    .secao-categoria{margin-top:26px}

    .secao-topo{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .secao-titulo{
      font-size:24px;
      font-weight:900;
      margin:0;
      letter-spacing:.2px;
    }

    .secao-sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }

    .linha-scroll{
      display:flex;
      gap:14px;
      overflow-x:auto;
      padding:2px 2px 14px;
      scroll-behavior:smooth;
      scrollbar-width:thin;
      scroll-snap-type:x proximity;
    }

    .linha-scroll::-webkit-scrollbar{height:7px}
    .linha-scroll::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.16);
      border-radius:999px;
    }

    .movie{
      min-width:190px;
      max-width:190px;
      cursor:pointer;
      background:linear-gradient(180deg, rgba(30,30,30,.96), rgba(20,20,20,.96));
      border-radius:18px;
      overflow:hidden;
      transition:.22s ease;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(8px);
      flex:0 0 auto;
      scroll-snap-align:start;
      box-shadow:0 10px 24px rgba(0,0,0,.26);
      position:relative;
    }

    .movie:hover{
      transform:translateY(-6px) scale(1.02);
      border-color:rgba(229,9,20,.35);
      box-shadow:0 16px 30px rgba(0,0,0,.34);
    }

    .movie-capa{
      position:relative;
    }

    .movie img{
      width:100%;
      height:250px;
      object-fit:cover;
      display:block;
      background:#0f172a;
    }

    .movie-acoes{
      position:absolute;
      top:8px;
      right:8px;
      display:flex;
      gap:6px;
      z-index:4;
    }

    .icon-btn{
      width:34px;
      height:34px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:16px;
      font-weight:900;
      color:#fff;
      background:rgba(0,0,0,.65);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .icon-btn.ativo{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      border-color:transparent;
    }

    .movie-title{
      font-size:15px;
      padding:12px 12px 6px;
      line-height:1.35;
      font-weight:700;
      min-height:58px;
    }

    .movie-cat{
      color:var(--muted);
      font-size:12px;
      padding:0 12px 12px;
    }

    .vazio{
      color:var(--muted);
      font-size:16px;
      padding:20px 0;
    }

    .loading-tela{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#cbd5e1;
      font-size:18px;
      background:#141414;
    }

    .player-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.97);
      z-index:9999;
      display:none;
      flex-direction:column;
    }

    .player-overlay.show{display:flex}

    .player-topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px;
      background:rgba(0,0,0,.85);
      border-bottom:1px solid rgba(255,255,255,.08);
      flex-wrap:wrap;
    }

    .player-acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-overlay{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
    }

    .btn-voltar{background:#334155}
    .btn-fechar{background:linear-gradient(135deg,var(--primary),var(--secondary))}
    .btn-proximo{background:#2563eb}

    .player-titulo{
      font-size:16px;
      font-weight:800;
      color:#fff;
      flex:1;
      min-width:220px;
    }

    .player-area{
      position:relative;
      flex:1;
      background:#000;
    }

    .player-area #overlayPlayer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
    }

    .legenda-flutuante{
      position:absolute;
      left:50%;
      bottom:50px;
      transform:translateX(-50%);
      max-width:85%;
      background:rgba(0,0,0,.75);
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      font-size:18px;
      text-align:center;
      z-index:99999;
      display:none;
      opacity:0;
      transition:opacity .3s ease;
      pointer-events:none;
      box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    .legenda-flutuante.show{
      display:block;
      opacity:1;
    }

    .btn-admin-secreto{
      position:fixed;
      right:12px;
      bottom:12px;
      width:42px;
      height:42px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      cursor:pointer;
      opacity:.14;
      z-index:99999;
    }

    @media (max-width:900px){
      .hero{
        min-height:56vh;
        padding:24px;
      }
      .movie{
        min-width:155px;
        max-width:155px;
      }
      .movie img{height:215px}
    }

    @media (max-width:700px){
      .top-bar{align-items:flex-start}
      .logo{font-size:24px}
      .hero{
        min-height:52vh;
        padding:20px;
        border-radius:18px;
      }
      .hero-title{font-size:32px}
      .hero-desc{font-size:14px}
      .btn-sair{align-self:flex-start}
      .player-topo{align-items:stretch}
      .player-acoes{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
      }
      .btn-overlay{width:100%}
      .player-titulo{
        min-width:auto;
        width:100%;
      }
      .secao-titulo{font-size:20px}
      .legenda-flutuante{
        bottom:30px;
        font-size:14px;
        max-width:92%;
      }
      .busca-box{
        padding:12px;
      }
      .busca-input,
      .btn-busca,
      .btn-busca-sec{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div id="loadingTela" class="loading-tela">Verificando acesso...</div>

  <div id="conteudo" style="display:none;">
    <header>
      <div class="top-bar">
        <div class="brand">
          <div class="brand-text">
            <div id="nomeSiteTopo" class="logo">FF FILMES ONLINE</div>
            <div id="userInfo" class="user-info"></div>
          </div>
        </div>
        <button class="btn-sair" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="container">
      <section class="hero">
        <div id="heroBg" class="hero-bg"></div>
        <div class="hero-overlay"></div>

        <div class="hero-content">
          <div class="hero-tag">🎬 Destaque do momento</div>
          <h1 id="tituloPlayer" class="hero-title">Carregando...</h1>
          <p id="descricaoPlayer" class="hero-desc"></p>

          <div class="hero-actions">
            <button id="btnAssistirDestaque" class="btn-hero btn-play" style="display:none;">
              ▶ Assistir agora
            </button>
            <button id="btnCategoriaDestaque" class="btn-hero btn-info" style="display:none;">
              Ver categoria
            </button>
          </div>
        </div>
      </section>

      <div class="busca-box">
        <input
          id="campoBuscaFilmes"
          class="busca-input"
          type="text"
          placeholder="Pesquisar filme no catálogo... se não achar, busca no YouTube"
        >
        <button class="btn-busca" onclick="pesquisarFilmes()">Pesquisar</button>
        <button class="btn-busca-sec" onclick="limparBuscaFilmes()">Limpar</button>
        <div id="buscaInfo" class="busca-info">Pesquise filmes do seu catálogo.</div>
      </div>

      <div id="secaoRecentes"></div>
      <div id="secaoFavoritos"></div>
      <div id="secaoMinhaLista"></div>

      <div id="menuCategorias" class="categorias-topo"></div>
      <div id="catalogoNetflix"></div>
    </div>
  </div>

  <div id="playerOverlay" class="player-overlay">
    <div class="player-topo">
      <div id="overlayTitulo" class="player-titulo">Assistindo</div>
      <div class="player-acoes">
        <button class="btn-overlay btn-voltar" onclick="fecharPlayer()">Voltar</button>
        <button class="btn-overlay btn-proximo" onclick="abrirProximoFilme()">Próximo</button>
        <button class="btn-overlay btn-fechar" onclick="fecharPlayer()">Fechar</button>
      </div>
    </div>
    <div id="playerArea" class="player-area">
      <div id="overlayPlayer"></div>
      <div id="legendaFlutuante" class="legenda-flutuante"></div>
    </div>
  </div>

  <button id="btnAdminSecreto" class="btn-admin-secreto" title="Acesso admin">⚙️</button>

  <script>
  const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
  const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
  const SENHA_ADMIN_SECRETA = "1234";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let filmesCache = [];
  let filmesBase = [];
  let filmeDestaque = null;
  let categoriaAtual = "Todos";
  let buscaAtual = "";

  let usuarioDerrubado = false;
  let canalTempoReal = null;
  let clienteAtual = null;
  let adminAtual = null;
  let tipoUsuarioAtual = null;
  let toquesAdmin = 0;
  let timerToquesAdmin = null;

  let frasesLegendas = [
    "Aproveite seu filme 🍿",
    "Bem-vindo ao FF Filmes",
    "Sistema premium liberado 🔥"
  ];

  let legendaMinMinutos = 1;
  let legendaMaxMinutos = 2;
  let legendaDuracaoSegundos = 6;
  let timerLegenda = null;

  let favoritosIds = [];
  let listaIds = [];
  let recentesIds = [];
  let progressoFilmes = {};
  let filmeAtualIndex = -1;

  let ytPlayer = null;
  let ytApiPronta = false;
  let filmeAtualPlayer = null;
  let timerSalvarProgresso = null;
  let ultimoTempoSalvo = 0;

  let timerPingAssistindo = null;

  async function getUserIdAtual() {
    const { data, error } = await supabaseClient.auth.getUser();
    if (error || !data?.user) return null;
    return data.user.id;
  }

  function obterEmailViewer() {
    return clienteAtual?.email || adminAtual?.email || null;
  }

  function obterNomeViewer() {
    return clienteAtual?.nome || (tipoUsuarioAtual === "admin" ? "Admin" : "Usuário");
  }

  function obterAdminIdViewer() {
    return Number(clienteAtual?.admin_id || adminAtual?.id || 0) || null;
  }

  function obterClienteIdViewer() {
    return clienteAtual?.id || null;
  }

  async function buscarRegistroAssistindoExistente() {
    const adminId = obterAdminIdViewer();
    const email = obterEmailViewer();
    const clienteId = obterClienteIdViewer();

    if (!adminId) return null;
    if (!email && !clienteId) return null;

    let query = supabaseClient
      .from("filmes_views")
      .select("id, started_at")
      .eq("admin_id", adminId)
      .order("id", { ascending: false })
      .limit(1);

    if (clienteId) {
      query = query.eq("cliente_id", clienteId);
    } else {
      query = query.eq("cliente_email", email);
    }

    const { data, error } = await query;

    if (error) {
      console.error("Erro buscando filmes_views:", error);
      return null;
    }

    return Array.isArray(data) && data.length ? data[0] : null;
  }

  async function gravarPingAssistindo(filmeRef = null, inicio = false) {
    try {
      const filme = filmeRef || filmeAtualPlayer;
      if (!filme || !filme.video_id) return;

      const adminId = obterAdminIdViewer();
      const clienteId = obterClienteIdViewer();
      const clienteNome = obterNomeViewer();
      const clienteEmail = obterEmailViewer();

      if (!adminId || (!clienteId && !clienteEmail)) return;

      const agora = new Date().toISOString();
      const existente = await buscarRegistroAssistindoExistente();

      const payloadBase = {
        admin_id: adminId,
        cliente_id: clienteId,
        cliente_nome: clienteNome,
        cliente_email: clienteEmail,
        filme_id: filme.id ? Number(filme.id) : null,
        filme_titulo: filme.titulo || null,
        last_ping: agora
      };

      if (existente?.id) {
        const payloadUpdate = {
          ...payloadBase
        };

        if (inicio && !existente.started_at) {
          payloadUpdate.started_at = agora;
        }

        const { error } = await supabaseClient
          .from("filmes_views")
          .update(payloadUpdate)
          .eq("id", existente.id);

        if (error) {
          console.error("Erro atualizando ping em filmes_views:", error);
        }
      } else {
        const payloadInsert = {
          ...payloadBase,
          started_at: agora
        };

        const { error } = await supabaseClient
          .from("filmes_views")
          .insert([payloadInsert]);

        if (error) {
          console.error("Erro inserindo ping em filmes_views:", error);
        }
      }
    } catch (e) {
      console.error("Erro geral no ping assistindo:", e);
    }
  }

  async function removerPingAssistindo() {
    try {
      const adminId = obterAdminIdViewer();
      const email = obterEmailViewer();
      const clienteId = obterClienteIdViewer();

      if (!adminId) return;
      if (!email && !clienteId) return;

      let query = supabaseClient
        .from("filmes_views")
        .delete()
        .eq("admin_id", adminId);

      if (clienteId) {
        query = query.eq("cliente_id", clienteId);
      } else {
        query = query.eq("cliente_email", email);
      }

      const { error } = await query;
      if (error) {
        console.error("Erro removendo ping assistindo:", error);
      }
    } catch (e) {
      console.error("Erro geral removendo ping:", e);
    }
  }

  async function iniciarPingAssistindo(filmeRef = null) {
    pararPingAssistindo(false);
    await gravarPingAssistindo(filmeRef, true);

    timerPingAssistindo = setInterval(async () => {
      await gravarPingAssistindo(filmeAtualPlayer || filmeRef, false);
    }, 20000);
  }

  function pararPingAssistindo(remover = true) {
    if (timerPingAssistindo) {
      clearInterval(timerPingAssistindo);
      timerPingAssistindo = null;
    }

    if (remover) {
      removerPingAssistindo();
    }
  }

  async function carregarProgressoUsuario() {
    const userId = await getUserIdAtual();
    progressoFilmes = {};

    if (!userId) return;

    const { data, error } = await supabaseClient
      .from("filmes_progresso")
      .select("filme_id,progresso_segundos,concluido")
      .eq("user_id", userId);

    if (error) {
      console.error("Erro carregando progresso:", error);
      return;
    }

    (data || []).forEach(item => {
      if (!item.concluido) {
        progressoFilmes[Number(item.filme_id)] = Number(item.progresso_segundos || 0);
      }
    });
  }

  function obterProgressoFilme(filmeId) {
    return Number(progressoFilmes[Number(filmeId)] || 0);
  }

  async function salvarProgressoFilme(filmeId, tempoSegundos) {
    const userId = await getUserIdAtual();
    if (!userId || !filmeId) return;

    const tempo = Math.floor(Number(tempoSegundos || 0));
    if (tempo < 3) return;

    progressoFilmes[Number(filmeId)] = tempo;

    const { error } = await supabaseClient
      .from("filmes_progresso")
      .upsert([{
        user_id: userId,
        admin_id: clienteAtual?.admin_id || null,
        filme_id: Number(filmeId),
        progresso_segundos: tempo,
        atualizado_em: new Date().toISOString(),
        concluido: false
      }], {
        onConflict: "user_id,filme_id"
      });

    if (error) {
      console.error("Erro salvando progresso:", error);
    }
  }

  async function limparProgressoFilme(filmeId) {
    const userId = await getUserIdAtual();
    if (!userId || !filmeId) return;

    delete progressoFilmes[Number(filmeId)];

    const { error } = await supabaseClient
      .from("filmes_progresso")
      .upsert([{
        user_id: userId,
        admin_id: clienteAtual?.admin_id || null,
        filme_id: Number(filmeId),
        progresso_segundos: 0,
        atualizado_em: new Date().toISOString(),
        concluido: true
      }], {
        onConflict: "user_id,filme_id"
      });

    if (error) {
      console.error("Erro limpando progresso:", error);
    }
  }

  function pararTimerSalvarProgresso() {
    if (timerSalvarProgresso) {
      clearInterval(timerSalvarProgresso);
      timerSalvarProgresso = null;
    }
  }

  async function salvarProgressoAtual(forcar = false) {
    if (!ytPlayer || !filmeAtualPlayer?.id) return;
    if (typeof ytPlayer.getCurrentTime !== "function") return;

    try {
      const tempo = Math.floor(ytPlayer.getCurrentTime() || 0);
      if (forcar || Math.abs(tempo - ultimoTempoSalvo) >= 5) {
        ultimoTempoSalvo = tempo;
        await salvarProgressoFilme(filmeAtualPlayer.id, tempo);
      }
    } catch (e) {
      console.error("Erro ao salvar progresso atual:", e);
    }
  }

  function iniciarTimerSalvarProgresso() {
    pararTimerSalvarProgresso();
    timerSalvarProgresso = setInterval(async () => {
      await salvarProgressoAtual(false);
    }, 5000);
  }

  function aplicarTema(config) {
    if (!config) return;

    document.documentElement.style.setProperty("--primary", config.cor_primaria || "#e50914");
    document.documentElement.style.setProperty("--secondary", config.cor_secundaria || "#b20710");
    document.documentElement.style.setProperty("--bg", config.cor_fundo || "#141414");
    document.documentElement.style.setProperty("--card", config.cor_card || "#1c1c1c");
    document.documentElement.style.setProperty("--text", config.cor_texto || "#ffffff");

    if (config.bg_filmes) {
      document.documentElement.style.setProperty("--bg-filmes", `url('${config.bg_filmes}')`);
    }

    if (config.nome_site) {
      document.title = config.nome_site;
      document.getElementById("nomeSiteTopo").textContent = config.nome_site;
    }
  }

  function montarLegendas(texto) {
    if (!texto) return [];
    return String(texto)
      .split("\n")
      .map(item => item.trim())
      .filter(Boolean);
  }

  function escaparTexto(texto) {
    return String(texto || "")
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'")
      .replace(/\n/g, "\\n")
      .replace(/\r/g, "");
  }

  function embaralharArray(lista) {
    const arr = [...lista];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function normalizarCategoria(categoria) {
    const texto = String(categoria || "").trim();
    return texto || "Sem categoria";
  }

  function normalizarBusca(texto) {
    return String(texto || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim();
  }

  function obterCategorias(filmes) {
    const set = new Set();
    filmes.forEach(f => set.add(normalizarCategoria(f.categoria)));
    return ["Todos", ...Array.from(set).sort((a, b) => a.localeCompare(b, "pt-BR"))];
  }

  function agruparCategorias(filmes) {
    const grupos = {};
    filmes.forEach(filme => {
      const categoria = normalizarCategoria(filme.categoria);
      if (!grupos[categoria]) grupos[categoria] = [];
      grupos[categoria].push(filme);
    });

    const categoriasOrdenadas = Object.keys(grupos).sort((a, b) => a.localeCompare(b, "pt-BR"));

    return categoriasOrdenadas.map(categoria => ({
      categoria,
      filmes: embaralharArray(grupos[categoria])
    }));
  }

  function tempoAleatorioLegenda() {
    const min = legendaMinMinutos * 60 * 1000;
    const max = legendaMaxMinutos * 60 * 1000;
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function mostrarLegendaAleatoria() {
    const box = document.getElementById("legendaFlutuante");
    if (!box || !frasesLegendas.length) return;

    const frase = frasesLegendas[Math.floor(Math.random() * frasesLegendas.length)];
    box.textContent = frase;
    box.style.display = "block";

    requestAnimationFrame(() => {
      box.classList.add("show");
    });

    setTimeout(() => {
      box.classList.remove("show");
      setTimeout(() => {
        box.style.display = "none";
      }, 300);
    }, legendaDuracaoSegundos * 1000);
  }

  function iniciarLegendasAleatorias() {
    pararLegendasAleatorias();

    setTimeout(() => {
      mostrarLegendaAleatoria();
    }, 3000);

    function loop() {
      timerLegenda = setTimeout(() => {
        mostrarLegendaAleatoria();
        loop();
      }, tempoAleatorioLegenda());
    }

    loop();
  }

  function pararLegendasAleatorias() {
    if (timerLegenda) {
      clearTimeout(timerLegenda);
      timerLegenda = null;
    }

    const box = document.getElementById("legendaFlutuante");
    if (box) {
      box.classList.remove("show");
      box.style.display = "none";
    }
  }

  function getFilmeIndexById(filmeId) {
    return filmesBase.findIndex(f => String(f.id) === String(filmeId));
  }

  async function registrarHistorico(filme) {
    const userId = await getUserIdAtual();
    if (!userId || !filme || !clienteAtual?.admin_id) return;

    await supabaseClient
      .from("filmes_historico")
      .insert([{
        user_id: userId,
        admin_id: Number(clienteAtual.admin_id),
        cliente_id: clienteAtual.id || null,
        cliente_nome: clienteAtual.nome || null,
        cliente_email: clienteAtual.email || null,
        filme_id: Number(filme.id),
        filme_titulo: filme.titulo || null
      }]);

    await carregarRecentesUsuario();
    renderSecoesUsuario();
  }

  function onYouTubePlayerReady(event) {
    if (!filmeAtualPlayer) return;

    const inicio = Math.max(0, Math.floor(obterProgressoFilme(filmeAtualPlayer.id) || 0));

    if (inicio > 0) {
      try {
        event.target.seekTo(inicio, true);
      } catch (e) {}
    }

    try {
      event.target.playVideo();
    } catch (e) {}
  }

  async function onYouTubePlayerStateChange(event) {
    if (!filmeAtualPlayer) return;

    if (event.data === YT.PlayerState.PLAYING) {
      iniciarTimerSalvarProgresso();
    }

    if (event.data === YT.PlayerState.PAUSED) {
      await salvarProgressoAtual(true);
      pararTimerSalvarProgresso();
    }

    if (event.data === YT.PlayerState.BUFFERING) {
      await salvarProgressoAtual(true);
    }

    if (event.data === YT.PlayerState.ENDED) {
      pararTimerSalvarProgresso();
      await limparProgressoFilme(filmeAtualPlayer.id);
      ultimoTempoSalvo = 0;
    }
  }

  function garantirPlayerYoutube(videoId) {
    if (!ytApiPronta || !window.YT || !window.YT.Player) return false;

    if (!ytPlayer) {
      ytPlayer = new YT.Player("overlayPlayer", {
        width: "100%",
        height: "100%",
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          rel: 0,
          playsinline: 1
        },
        events: {
          onReady: onYouTubePlayerReady,
          onStateChange: onYouTubePlayerStateChange
        }
      });
    } else {
      try {
        ytPlayer.loadVideoById({
          videoId: videoId,
          startSeconds: Math.max(0, Math.floor(obterProgressoFilme(filmeAtualPlayer?.id) || 0))
        });
      } catch (e) {
        try {
          ytPlayer.loadVideoById(videoId);
        } catch (err) {}
      }
    }

    return true;
  }

  window.onYouTubeIframeAPIReady = function () {
    ytApiPronta = true;
  };

  async function abrirPlayer(videoId, titulo = "", filmeId = null) {
    const overlay = document.getElementById("playerOverlay");
    const overlayTitulo = document.getElementById("overlayTitulo");
    const playerArea = document.getElementById("playerArea");

    await salvarProgressoAtual(true);

    filmeAtualIndex = getFilmeIndexById(filmeId);
    filmeAtualPlayer = filmesBase.find(f => String(f.id) === String(filmeId)) || {
      id: filmeId,
      video_id: videoId,
      titulo: titulo
    };
    ultimoTempoSalvo = 0;

    overlayTitulo.textContent = titulo || "Assistindo";
    overlay.classList.add("show");
    document.body.style.overflow = "hidden";

    iniciarLegendasAleatorias();

    const filmeObj = filmesBase.find(f => String(f.id) === String(filmeId));
    if (filmeObj) {
      await registrarHistorico(filmeObj);
    }

    await iniciarPingAssistindo(filmeObj || filmeAtualPlayer);

    const playerCriado = garantirPlayerYoutube(videoId);

    if (!playerCriado) {
      setTimeout(() => {
        garantirPlayerYoutube(videoId);
      }, 400);
    }

    try {
      if (playerArea.requestFullscreen) {
        await playerArea.requestFullscreen();
      }
    } catch (e) {}
  }

  async function abrirProximoFilme() {
    await salvarProgressoAtual(true);

    if (!filmesBase.length) return;

    if (filmeAtualIndex < 0) {
      filmeAtualIndex = 0;
    } else {
      filmeAtualIndex = (filmeAtualIndex + 1) % filmesBase.length;
    }

    const proximo = filmesBase[filmeAtualIndex];
    if (!proximo) return;

    await abrirPlayer(proximo.video_id, proximo.titulo, proximo.id);
  }

  async function fecharPlayer() {
    await salvarProgressoAtual(true);
    pararTimerSalvarProgresso();
    pararPingAssistindo(true);

    const overlay = document.getElementById("playerOverlay");

    pararLegendasAleatorias();

    try {
      if (ytPlayer && typeof ytPlayer.stopVideo === "function") {
        ytPlayer.stopVideo();
      }
    } catch (e) {}

    overlay.classList.remove("show");
    document.body.style.overflow = "";

    try {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
      }
    } catch (e) {}
  }

  function slugCategoria(texto) {
    return String(texto || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .toLowerCase();
  }

  async function carregarListaUsuario() {
    const userId = await getUserIdAtual();
    if (!userId) {
      favoritosIds = [];
      listaIds = [];
      return;
    }

    const { data, error } = await supabaseClient
      .from("filmes_lista")
      .select("filme_id,tipo")
      .eq("user_id", userId);

    if (error || !data) {
      favoritosIds = [];
      listaIds = [];
      return;
    }

    favoritosIds = data.filter(i => i.tipo === "favorito").map(i => Number(i.filme_id));
    listaIds = data.filter(i => i.tipo === "lista").map(i => Number(i.filme_id));
  }

  async function carregarRecentesUsuario() {
    const userId = await getUserIdAtual();
    if (!userId) {
      recentesIds = [];
      return;
    }

    const { data, error } = await supabaseClient
      .from("filmes_historico")
      .select("filme_id,assistido_em")
      .eq("user_id", userId)
      .order("assistido_em", { ascending: false })
      .limit(30);

    if (error || !data) {
      recentesIds = [];
      return;
    }

    const unicos = [];
    for (const item of data) {
      const id = Number(item.filme_id);
      if (!unicos.includes(id)) {
        unicos.push(id);
      }
    }

    recentesIds = unicos.slice(0, 12);
  }

  async function toggleListaFilme(filmeId, tipo) {
    const userId = await getUserIdAtual();
    if (!userId || !clienteAtual?.admin_id) return;

    const filmeIdNum = Number(filmeId);
    const idsAtuais = tipo === "favorito" ? favoritosIds : listaIds;
    const jaExiste = idsAtuais.includes(filmeIdNum);

    if (jaExiste) {
      const { error } = await supabaseClient
        .from("filmes_lista")
        .delete()
        .eq("user_id", userId)
        .eq("filme_id", filmeIdNum)
        .eq("tipo", tipo);

      if (error) return;
    } else {
      const { error } = await supabaseClient
        .from("filmes_lista")
        .insert([{
          user_id: userId,
          admin_id: Number(clienteAtual.admin_id),
          filme_id: filmeIdNum,
          tipo: tipo
        }]);

      if (error && !String(error.message || "").toLowerCase().includes("duplicate")) {
        return;
      }
    }

    await carregarListaUsuario();
    renderCatalogoNetflix();
    renderSecoesUsuario();
  }

  function renderMenuCategorias() {
    const menu = document.getElementById("menuCategorias");
    const categorias = obterCategorias(filmesCache);

    if (!filmesCache.length) {
      menu.innerHTML = "";
      return;
    }

    menu.innerHTML = categorias.map(cat => `
      <button
        class="categoria-btn ${cat === categoriaAtual ? "ativo" : ""}"
        onclick="trocarCategoria('${escaparTexto(cat)}')"
      >
        ${cat}
      </button>
    `).join("");
  }

  function trocarCategoria(cat) {
    categoriaAtual = cat;
    renderMenuCategorias();
    renderCatalogoNetflix();

    const destino = document.getElementById(`categoria-${slugCategoria(cat)}`);
    if (cat !== "Todos" && destino) {
      destino.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  function cardFilmeHTML(filme) {
    const favorito = favoritosIds.includes(Number(filme.id));
    const naLista = listaIds.includes(Number(filme.id));
    const progresso = obterProgressoFilme(filme.id);

    return `
      <div class="movie">
        <div class="movie-capa" onclick="abrirPlayer('${escaparTexto(filme.video_id)}', '${escaparTexto(filme.titulo)}', ${filme.id || 'null'})">
          <img src="${filme.thumb || ''}" alt="${filme.titulo || ''}">
          <div class="movie-acoes">
            <button class="icon-btn ${favorito ? 'ativo' : ''}" title="Favorito" onclick="event.stopPropagation(); toggleListaFilme(${filme.id}, 'favorito')">★</button>
            <button class="icon-btn ${naLista ? 'ativo' : ''}" title="Minha Lista" onclick="event.stopPropagation(); toggleListaFilme(${filme.id}, 'lista')">＋</button>
          </div>
        </div>
        <div onclick="abrirPlayer('${escaparTexto(filme.video_id)}', '${escaparTexto(filme.titulo)}', ${filme.id || 'null'})">
          <div class="movie-title">${filme.titulo || ''}</div>
          <div class="movie-cat">${normalizarCategoria(filme.categoria)}${progresso > 0 ? ` • continuar em ${Math.floor(progresso/60)}:${String(progresso%60).padStart(2,'0')}` : ''}</div>
        </div>
      </div>
    `;
  }

  function renderSecaoPersonalizada(containerId, titulo, filmes) {
    const el = document.getElementById(containerId);

    if (!filmes.length) {
      el.innerHTML = '';
      return;
    }

    el.innerHTML = `
      <section class="secao-categoria">
        <div class="secao-topo">
          <h2 class="secao-titulo">${titulo}</h2>
          <div class="secao-sub">${filmes.length} filme(s)</div>
        </div>
        <div class="linha-scroll">
          ${filmes.map(cardFilmeHTML).join("")}
        </div>
      </section>
    `;
  }

  function renderSecoesUsuario() {
    const filmesRecentes = recentesIds
      .map(id => filmesBase.find(f => Number(f.id) === Number(id)))
      .filter(Boolean);

    const filmesFavoritos = filmesBase.filter(f => favoritosIds.includes(Number(f.id)));
    const filmesMinhaLista = filmesBase.filter(f => listaIds.includes(Number(f.id)));

    renderSecaoPersonalizada("secaoRecentes", "Assistidos Recentemente", filmesRecentes);
    renderSecaoPersonalizada("secaoFavoritos", "Meus Favoritos", filmesFavoritos);
    renderSecaoPersonalizada("secaoMinhaLista", "Minha Lista", filmesMinhaLista);
  }

  function renderCatalogoNetflix() {
    const catalogo = document.getElementById("catalogoNetflix");

    if (!filmesCache.length) {
      if (buscaAtual) {
        const termoEscapado = escaparTexto(buscaAtual);
        catalogo.innerHTML = `
          <div class="busca-vazio">
            <h3>Nenhum filme encontrado no catálogo</h3>
            <p>Não achei "<strong>${buscaAtual}</strong>" nos filmes cadastrados. Você pode buscar esse nome direto no YouTube.</p>
            <button class="btn-busca" onclick="abrirBuscaYoutube('${termoEscapado}')">Buscar no YouTube</button>
          </div>
        `;
      } else {
        catalogo.innerHTML = '<div class="vazio">Nenhum filme ativo cadastrado.</div>';
      }
      return;
    }

    const grupos = agruparCategorias(filmesCache);
    const gruposFiltrados = categoriaAtual === "Todos"
      ? grupos
      : grupos.filter(g => g.categoria === categoriaAtual);

    if (!gruposFiltrados.length) {
      catalogo.innerHTML = '<div class="vazio">Nenhum filme nessa categoria.</div>';
      return;
    }

    catalogo.innerHTML = gruposFiltrados.map(grupo => `
      <section class="secao-categoria" id="categoria-${slugCategoria(grupo.categoria)}">
        <div class="secao-topo">
          <h2 class="secao-titulo">${grupo.categoria}</h2>
          <div class="secao-sub">${grupo.filmes.length} filme(s)</div>
        </div>

        <div class="linha-scroll">
          ${grupo.filmes.map(cardFilmeHTML).join("")}
        </div>
      </section>
    `).join("");
  }

  function renderHero() {
    const tituloPlayer = document.getElementById("tituloPlayer");
    const descricaoPlayer = document.getElementById("descricaoPlayer");
    const btnAssistirDestaque = document.getElementById("btnAssistirDestaque");
    const btnCategoriaDestaque = document.getElementById("btnCategoriaDestaque");
    const heroBg = document.getElementById("heroBg");

    if (!filmeDestaque) {
      tituloPlayer.textContent = buscaAtual ? "Nenhum resultado encontrado" : "Nenhum filme cadastrado";
      descricaoPlayer.textContent = buscaAtual
        ? `Não encontrei "${buscaAtual}" no catálogo atual.`
        : "";
      btnAssistirDestaque.style.display = "none";
      btnCategoriaDestaque.style.display = "none";
      heroBg.style.backgroundImage = "";
      return;
    }

    tituloPlayer.textContent = filmeDestaque.titulo || "Sem título";
    descricaoPlayer.textContent = filmeDestaque.descricao || "";
    heroBg.style.backgroundImage = filmeDestaque.thumb ? `url('${filmeDestaque.thumb}')` : "";

    btnAssistirDestaque.style.display = "inline-block";
    btnAssistirDestaque.onclick = () => abrirPlayer(
      filmeDestaque.video_id,
      filmeDestaque.titulo,
      filmeDestaque.id || null
    );

    btnCategoriaDestaque.style.display = "inline-block";
    btnCategoriaDestaque.textContent = normalizarCategoria(filmeDestaque.categoria);
    btnCategoriaDestaque.onclick = () => trocarCategoria(normalizarCategoria(filmeDestaque.categoria));
  }

  function atualizarBuscaInfo(texto) {
    const info = document.getElementById("buscaInfo");
    if (info) info.textContent = texto;
  }

  function filtrarFilmesLocal(termo) {
    const busca = normalizarBusca(termo);
    if (!busca) return [...filmesBase];

    return filmesBase.filter(filme => {
      const titulo = normalizarBusca(filme.titulo);
      const descricao = normalizarBusca(filme.descricao);
      const categoria = normalizarBusca(filme.categoria);
      return titulo.includes(busca) || descricao.includes(busca) || categoria.includes(busca);
    });
  }

  function aplicarBuscaFilmes(termo) {
    buscaAtual = String(termo || "").trim();
    filmesCache = filtrarFilmesLocal(buscaAtual);
    categoriaAtual = "Todos";
    filmeDestaque = filmesCache.length ? filmesCache[0] : null;

    if (!buscaAtual) {
      atualizarBuscaInfo("Pesquise filmes do seu catálogo.");
    } else if (filmesCache.length) {
      atualizarBuscaInfo(`Busca por "${buscaAtual}" • ${filmesCache.length} filme(s) encontrado(s) no catálogo.`);
    } else {
      atualizarBuscaInfo(`Busca por "${buscaAtual}" • nada encontrado no catálogo. Você pode buscar no YouTube.`);
    }

    renderHero();
    renderMenuCategorias();
    renderCatalogoNetflix();
  }

  function pesquisarFilmes() {
    const campo = document.getElementById("campoBuscaFilmes");
    aplicarBuscaFilmes(campo ? campo.value : "");
  }

  function limparBuscaFilmes() {
    const campo = document.getElementById("campoBuscaFilmes");
    if (campo) campo.value = "";

    buscaAtual = "";
    filmesCache = [...filmesBase];
    categoriaAtual = "Todos";
    filmeDestaque = filmesCache.length ? filmesCache[0] : null;

    atualizarBuscaInfo("Pesquise filmes do seu catálogo.");
    renderHero();
    renderMenuCategorias();
    renderCatalogoNetflix();
  }

  function abrirBuscaYoutube(termo = "") {
    const texto = String(termo || buscaAtual || "").trim();
    if (!texto) return;
    const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(texto)}`;
    window.open(url, "_blank");
  }

  async function derrubarUsuario(msg = "Seu acesso foi bloqueado.") {
    if (usuarioDerrubado) return;
    usuarioDerrubado = true;

    try {
      if (canalTempoReal) {
        supabaseClient.removeChannel(canalTempoReal);
      }
    } catch (e) {}

    pararPingAssistindo(true);

    try {
      await supabaseClient.auth.signOut();
    } catch (e) {}

    alert(msg);
    location.href = "index.html";
  }

  async function validarClienteAtual() {
    const { data, error } = await supabaseClient.auth.getUser();

    if (error || !data?.user) {
      location.href = "index.html";
      return null;
    }

    const authUser = data.user;

    const { data: cliente, error: erroCliente } = await supabaseClient
      .from("admin_clientes")
      .select("*")
      .eq("user_id", authUser.id)
      .maybeSingle();

    if (!erroCliente && cliente) {
      if (cliente.ativo === false) {
        await derrubarUsuario("Seu acesso foi bloqueado.");
        return null;
      }

      clienteAtual = cliente;
      adminAtual = null;
      tipoUsuarioAtual = "cliente";

      return cliente;
    }

    const { data: admin, error: erroAdmin } = await supabaseClient
      .from("admin_filmes")
      .select("*")
      .eq("user_id", authUser.id)
      .maybeSingle();

    if (!erroAdmin && admin) {
      if (admin.ativo === false) {
        await derrubarUsuario("Admin desativado.");
        return null;
      }

      adminAtual = admin;
      clienteAtual = {
        id: null,
        nome: "Admin",
        email: admin.email || "",
        admin_id: admin.id,
        ativo: true
      };
      tipoUsuarioAtual = "admin";

      return clienteAtual;
    }

    await derrubarUsuario("Usuário não vinculado.");
    return null;
  }

  async function mostrarUsuario() {
    if (!clienteAtual) return;

    const prefixo = tipoUsuarioAtual === "admin" ? "Admin: " : "Logado como: ";
    document.getElementById("userInfo").textContent =
      prefixo + (clienteAtual.email || "usuário");
  }

  async function carregarConfigTema() {
    if (!clienteAtual?.admin_id) return;

    let cfgAdmin = null;
    let cfgGlobal = null;

    const { data: dataAdmin, error: errorAdmin } = await supabaseClient
      .from("config_filmes")
      .select("*")
      .eq("admin_id", clienteAtual.admin_id)
      .maybeSingle();

    if (!errorAdmin && dataAdmin) {
      cfgAdmin = dataAdmin;
    }

    const { data: dataGlobal, error: errorGlobal } = await supabaseClient
      .from("config_filmes")
      .select("*")
      .eq("admin_id", 0)
      .maybeSingle();

    if (!errorGlobal && dataGlobal) {
      cfgGlobal = dataGlobal;
    }

    const cfg = {
      ...(cfgGlobal || {}),
      ...(cfgAdmin || {})
    };

    if (!cfg || Object.keys(cfg).length === 0) return;

    aplicarTema(cfg);

    let legendasBanco = montarLegendas(cfg.legendas_player);

    if (!legendasBanco.length && cfgGlobal?.legendas_player) {
      legendasBanco = montarLegendas(cfgGlobal.legendas_player);
    }

    if (legendasBanco.length) {
      frasesLegendas = legendasBanco;
    }

    legendaMinMinutos = Number(cfg.legenda_min_minutos || 10);
    legendaMaxMinutos = Number(cfg.legenda_max_minutos || 15);
    legendaDuracaoSegundos = Number(cfg.legenda_duracao_segundos || 6);

    if (legendaMinMinutos < 1) legendaMinMinutos = 1;
    if (legendaMaxMinutos < legendaMinMinutos) legendaMaxMinutos = legendaMinMinutos;
    if (legendaDuracaoSegundos < 1) legendaDuracaoSegundos = 1;
  }

  async function carregarFilmes() {
    const catalogo = document.getElementById("catalogoNetflix");
    catalogo.innerHTML = '<div class="vazio">Carregando filmes...</div>';

    try {
      const { data, error } = await supabaseClient
        .from("filmes")
        .select("*")
        .eq("ativo", true);

      if (error) throw error;

      let filmes = data || [];
      filmes = embaralharArray(filmes);

      filmesBase = filmes;
      filmesCache = [...filmesBase];
      categoriaAtual = "Todos";
      buscaAtual = "";

      if (!filmesBase.length) {
        filmeDestaque = null;
        renderHero();
        renderMenuCategorias();
        renderCatalogoNetflix();
        renderSecoesUsuario();
        atualizarBuscaInfo("Pesquise filmes do seu catálogo.");
        return;
      }

      filmeDestaque = filmesBase[0];
      atualizarBuscaInfo("Pesquise filmes do seu catálogo.");
      renderHero();
      renderMenuCategorias();
      renderCatalogoNetflix();
      renderSecoesUsuario();

    } catch (error) {
      catalogo.innerHTML = `<div class="vazio" style="color:#fca5a5">${error.message || "Erro ao carregar filmes."}</div>`;
    }
  }

  function ativarBloqueioTempoReal(clienteId) {
    if (!clienteId) return;

    try {
      if (canalTempoReal) {
        supabaseClient.removeChannel(canalTempoReal);
      }
    } catch (e) {}

    canalTempoReal = supabaseClient
      .channel("cliente-status-" + clienteId)
      .on(
        "postgres_changes",
        {
          event: "UPDATE",
          schema: "public",
          table: "admin_clientes",
          filter: `id=eq.${clienteId}`
        },
        async (payload) => {
          const novo = payload.new || {};
          if (novo.ativo === false) {
            await derrubarUsuario("Seu acesso foi bloqueado pelo admin.");
          }
        }
      )
      .on(
        "postgres_changes",
        {
          event: "DELETE",
          schema: "public",
          table: "admin_clientes",
          filter: `id=eq.${clienteId}`
        },
        async () => {
          await derrubarUsuario("Seu acesso foi removido.");
        }
      )
      .subscribe();
  }

  async function protegerPagina() {
    const cliente = await validarClienteAtual();
    if (!cliente) return;

    document.getElementById("loadingTela").style.display = "none";
    document.getElementById("conteudo").style.display = "block";

    await mostrarUsuario();
    await carregarConfigTema();
    await carregarListaUsuario();
    await carregarRecentesUsuario();
    await carregarProgressoUsuario();
    await carregarFilmes();

    if (tipoUsuarioAtual === "cliente" && cliente.id) {
      ativarBloqueioTempoReal(cliente.id);
    }
  }

  function resetToquesAdmin() {
    toquesAdmin = 0;
    if (timerToquesAdmin) clearTimeout(timerToquesAdmin);
    timerToquesAdmin = null;
  }

  async function abrirPainelAdmin() {
    const senha = prompt("Digite a senha secreta do painel:");
    if (!senha) return;

    if (senha !== SENHA_ADMIN_SECRETA) {
      alert("Senha inválida.");
      return;
    }

    const { data: authData, error: authError } = await supabaseClient.auth.getUser();

    if (authError || !authData?.user) {
      alert("Sessão inválida.");
      location.href = "index.html";
      return;
    }

    const { data: admin, error } = await supabaseClient
      .from("admin_filmes")
      .select("*")
      .eq("user_id", authData.user.id)
      .maybeSingle();

    if (error || !admin) {
      alert("Este usuário não é admin.");
      return;
    }

    if (admin.ativo === false) {
      alert("Admin desativado.");
      await supabaseClient.auth.signOut();
      location.href = "index.html";
      return;
    }

    location.href = "painel-admin.html";
  }

  document.getElementById("btnAdminSecreto").addEventListener("click", async () => {
    toquesAdmin++;

    if (timerToquesAdmin) clearTimeout(timerToquesAdmin);
    timerToquesAdmin = setTimeout(resetToquesAdmin, 2000);

    if (toquesAdmin >= 5) {
      resetToquesAdmin();
      await abrirPainelAdmin();
    }
  });

  document.getElementById("campoBuscaFilmes").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      pesquisarFilmes();
    }
  });

  async function logout() {
    await salvarProgressoAtual(true);
    pararTimerSalvarProgresso();
    pararPingAssistindo(true);

    try {
      if (canalTempoReal) {
        supabaseClient.removeChannel(canalTempoReal);
      }
    } catch (e) {}

    pararLegendasAleatorias();
    await supabaseClient.auth.signOut();
    location.href = "index.html";
  }

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (!session && !usuarioDerrubado) {
      location.href = "index.html";
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") fecharPlayer();
  });

  document.addEventListener("fullscreenchange", () => {
    const overlay = document.getElementById("playerOverlay");

    if (!document.fullscreenElement) {
      if (overlay.classList.contains("show")) {
        document.body.style.overflow = "hidden";
      }
    }
  });

  window.addEventListener("focus", async () => {
    if (!usuarioDerrubado) {
      await validarClienteAtual();
    }
  });

  window.addEventListener("beforeunload", () => {
    salvarProgressoAtual(true);
    removerPingAssistindo();
  });

  protegerPagina();
</script>
</body>
</html>
