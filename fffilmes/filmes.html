<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Filmes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}

    :root{
      --primary:#e50914;
      --secondary:#b20710;
      --bg:#141414;
      --card:#1c1c1c;
      --text:#ffffff;
      --muted:#94a3b8;
      --bg-filmes:url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1600&q=80');
    }

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.92)),
        var(--bg-filmes) center/cover fixed no-repeat;
      overflow-x:hidden;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .top-bar{
      max-width:1440px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .logo{
      font-size:30px;
      font-weight:900;
      color:var(--primary);
      letter-spacing:.5px;
      text-transform:uppercase;
    }

    .user-info{
      color:var(--muted);
      font-size:14px;
    }

    .btn-sair{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .container{
      max-width:1440px;
      margin:0 auto;
      padding:20px 18px 40px;
    }

    .hero{
      position:relative;
      min-height:68vh;
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(90deg, rgba(0,0,0,.9) 0%, rgba(0,0,0,.68) 38%, rgba(0,0,0,.25) 100%);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      display:flex;
      align-items:flex-end;
      padding:36px;
      margin-bottom:24px;
    }

    .hero-bg{
      position:absolute;
      inset:0;
      z-index:0;
      background-size:cover;
      background-position:center;
      filter:brightness(.58);
      transform:scale(1.04);
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,.55) 42%, rgba(0,0,0,.18) 100%),
        linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.72) 100%);
      z-index:1;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:720px;
    }

    .hero-tag{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.08);
    }

    .hero-title{
      font-size:clamp(30px,5vw,58px);
      font-weight:900;
      line-height:1.02;
      margin:0 0 12px;
      text-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .hero-desc{
      color:#dbe4f0;
      line-height:1.6;
      font-size:16px;
      margin:0 0 18px;
      max-width:640px;
      white-space:pre-line;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn-hero{
      border:none;
      padding:13px 20px;
      border-radius:12px;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
    }

    .btn-play{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
    }

    .btn-info{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.1);
    }

    .categorias-topo{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding:4px 0 10px;
      margin-bottom:10px;
      scrollbar-width:none;
    }

    .categorias-topo::-webkit-scrollbar{display:none}

    .categoria-btn{
      border:none;
      background:#1e293b;
      color:#fff;
      padding:10px 14px;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
      transition:.2s;
    }

    .categoria-btn:hover{transform:translateY(-1px)}

    .categoria-btn.ativo{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
    }

    .secao-categoria{margin-top:24px}

    .secao-topo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .secao-titulo{
      font-size:24px;
      font-weight:900;
      margin:0;
    }

    .secao-sub{
      color:var(--muted);
      font-size:13px;
    }

    .linha-scroll{
      display:flex;
      gap:14px;
      overflow-x:auto;
      padding:4px 2px 12px;
      scroll-behavior:smooth;
      scrollbar-width:thin;
    }

    .linha-scroll::-webkit-scrollbar{height:8px}
    .linha-scroll::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.18);
      border-radius:999px;
    }

    .movie{
      min-width:190px;
      max-width:190px;
      cursor:pointer;
      background:rgba(28,28,28,.88);
      border-radius:16px;
      overflow:hidden;
      transition:.22s;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(6px);
      flex:0 0 auto;
    }

    .movie:hover{
      transform:translateY(-6px) scale(1.02);
      border-color:color-mix(in srgb, var(--primary) 36%, transparent);
    }

    .movie img{
      width:100%;
      height:260px;
      object-fit:cover;
      display:block;
      background:#0f172a;
    }

    .movie-title{
      font-size:15px;
      padding:12px 12px 6px;
      line-height:1.35;
      font-weight:700;
      min-height:58px;
    }

    .movie-cat{
      color:var(--muted);
      font-size:12px;
      padding:0 12px 12px;
    }

    .vazio{
      color:var(--muted);
      font-size:16px;
      padding:20px 0;
    }

    .loading-tela{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#cbd5e1;
      font-size:18px;
      background:#141414;
    }

    .player-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.97);
      z-index:9999;
      display:none;
      flex-direction:column;
    }

    .player-overlay.show{display:flex}

    .player-topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px;
      background:rgba(0,0,0,.85);
      border-bottom:1px solid rgba(255,255,255,.08);
      flex-wrap:wrap;
    }

    .player-acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-overlay{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
    }

    .btn-voltar{background:#334155}
    .btn-fechar{background:linear-gradient(135deg,var(--primary),var(--secondary))}

    .player-titulo{
      font-size:16px;
      font-weight:800;
      color:#fff;
      flex:1;
      min-width:220px;
    }

    .player-area{
      position:relative;
      flex:1;
      background:#000;
    }

    .player-area iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
    }

    .btn-admin-secreto{
      position:fixed;
      right:12px;
      bottom:12px;
      width:42px;
      height:42px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      cursor:pointer;
      opacity:.14;
      z-index:99999;
    }

    @media (max-width:900px){
      .hero{
        min-height:56vh;
        padding:24px;
      }
      .movie{
        min-width:160px;
        max-width:160px;
      }
      .movie img{height:220px}
    }

    @media (max-width:700px){
      .top-bar{align-items:flex-start}
      .logo{font-size:24px}
      .hero{
        min-height:52vh;
        padding:20px;
        border-radius:18px;
      }
      .hero-title{font-size:32px}
      .hero-desc{font-size:14px}
      .btn-sair{align-self:flex-start}
      .player-topo{align-items:stretch}
      .player-acoes{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
      }
      .btn-overlay{width:100%}
      .player-titulo{
        min-width:auto;
        width:100%;
      }
      .secao-titulo{font-size:20px}
    }
  </style>
</head>
<body>
  <div id="loadingTela" class="loading-tela">Verificando acesso...</div>

  <div id="conteudo" style="display:none;">
    <header>
      <div class="top-bar">
        <div class="brand">
          <div id="nomeSiteTopo" class="logo">FF FILMES ONLINE</div>
          <div id="userInfo" class="user-info"></div>
        </div>
        <button class="btn-sair" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="container">
      <section class="hero">
        <div id="heroBg" class="hero-bg"></div>
        <div class="hero-overlay"></div>

        <div class="hero-content">
          <div class="hero-tag">🎬 Destaque do momento</div>
          <h1 id="tituloPlayer" class="hero-title">Carregando...</h1>
          <p id="descricaoPlayer" class="hero-desc"></p>

          <div class="hero-actions">
            <button id="btnAssistirDestaque" class="btn-hero btn-play" style="display:none;">
              ▶ Assistir agora
            </button>
            <button id="btnCategoriaDestaque" class="btn-hero btn-info" style="display:none;">
              Ver categoria
            </button>
          </div>
        </div>
      </section>

      <div id="menuCategorias" class="categorias-topo"></div>
      <div id="catalogoNetflix"></div>
    </div>
  </div>

  <div id="playerOverlay" class="player-overlay">
    <div class="player-topo">
      <div id="overlayTitulo" class="player-titulo">Assistindo</div>
      <div class="player-acoes">
        <button class="btn-overlay btn-voltar" onclick="fecharPlayer()">Voltar</button>
        <button class="btn-overlay btn-fechar" onclick="fecharPlayer()">Fechar</button>
      </div>
    </div>
    <div id="playerArea" class="player-area">
      <iframe id="overlayPlayer" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
  </div>

  <button id="btnAdminSecreto" class="btn-admin-secreto" title="Acesso admin">⚙️</button>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";
    const SENHA_ADMIN_SECRETA = "1234";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let filmesCache = [];
    let filmeDestaque = null;
    let categoriaAtual = "Todos";

    let usuarioDerrubado = false;
    let canalTempoReal = null;
    let clienteAtual = null;
    let adminAtual = null;
    let tipoUsuarioAtual = null;
    let toquesAdmin = 0;
    let timerToquesAdmin = null;

    function aplicarTema(config) {
      if (!config) return;

      document.documentElement.style.setProperty("--primary", config.cor_primaria || "#e50914");
      document.documentElement.style.setProperty("--secondary", config.cor_secundaria || "#b20710");
      document.documentElement.style.setProperty("--bg", config.cor_fundo || "#141414");
      document.documentElement.style.setProperty("--card", config.cor_card || "#1c1c1c");
      document.documentElement.style.setProperty("--text", config.cor_texto || "#ffffff");

      if (config.bg_filmes) {
        document.documentElement.style.setProperty("--bg-filmes", `url('${config.bg_filmes}')`);
      }

      if (config.nome_site) {
        document.title = config.nome_site;
        document.getElementById("nomeSiteTopo").textContent = config.nome_site;
      }
    }

    function escaparTexto(texto) {
      return String(texto || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\n/g, "\\n")
        .replace(/\r/g, "");
    }

    function embaralharArray(lista) {
      const arr = [...lista];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function normalizarCategoria(categoria) {
      const texto = String(categoria || "").trim();
      return texto || "Sem categoria";
    }

    function obterCategorias(filmes) {
      const set = new Set();
      filmes.forEach(f => set.add(normalizarCategoria(f.categoria)));
      return ["Todos", ...Array.from(set).sort((a, b) => a.localeCompare(b, "pt-BR"))];
    }

    function agruparCategorias(filmes) {
      const grupos = {};
      filmes.forEach(filme => {
        const categoria = normalizarCategoria(filme.categoria);
        if (!grupos[categoria]) grupos[categoria] = [];
        grupos[categoria].push(filme);
      });

      const categoriasOrdenadas = Object.keys(grupos).sort((a, b) => a.localeCompare(b, "pt-BR"));

      return categoriasOrdenadas.map(categoria => ({
        categoria,
        filmes: embaralharArray(grupos[categoria])
      }));
    }

    async function abrirPlayer(videoId, titulo = "") {
      const overlay = document.getElementById("playerOverlay");
      const overlayPlayer = document.getElementById("overlayPlayer");
      const overlayTitulo = document.getElementById("overlayTitulo");
      const playerArea = document.getElementById("playerArea");

      overlayTitulo.textContent = titulo || "Assistindo";
      overlayPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      overlay.classList.add("show");
      document.body.style.overflow = "hidden";

      try {
        if (playerArea.requestFullscreen) {
          await playerArea.requestFullscreen();
        }
      } catch (e) {}
    }

    async function fecharPlayer() {
      const overlay = document.getElementById("playerOverlay");
      const overlayPlayer = document.getElementById("overlayPlayer");

      overlayPlayer.src = "";
      overlay.classList.remove("show");
      document.body.style.overflow = "";

      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        }
      } catch (e) {}
    }

    function slugCategoria(texto) {
      return String(texto || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .toLowerCase();
    }

    function renderMenuCategorias() {
      const menu = document.getElementById("menuCategorias");
      const categorias = obterCategorias(filmesCache);

      menu.innerHTML = categorias.map(cat => `
        <button
          class="categoria-btn ${cat === categoriaAtual ? "ativo" : ""}"
          onclick="trocarCategoria('${escaparTexto(cat)}')"
        >
          ${cat}
        </button>
      `).join("");
    }

    function trocarCategoria(cat) {
      categoriaAtual = cat;
      renderMenuCategorias();
      renderCatalogoNetflix();

      const destino = document.getElementById(`categoria-${slugCategoria(cat)}`);
      if (cat !== "Todos" && destino) {
        destino.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function renderCatalogoNetflix() {
      const catalogo = document.getElementById("catalogoNetflix");

      if (!filmesCache.length) {
        catalogo.innerHTML = '<div class="vazio">Nenhum filme ativo cadastrado.</div>';
        return;
      }

      const grupos = agruparCategorias(filmesCache);
      const gruposFiltrados = categoriaAtual === "Todos"
        ? grupos
        : grupos.filter(g => g.categoria === categoriaAtual);

      if (!gruposFiltrados.length) {
        catalogo.innerHTML = '<div class="vazio">Nenhum filme nessa categoria.</div>';
        return;
      }

      catalogo.innerHTML = gruposFiltrados.map(grupo => `
        <section class="secao-categoria" id="categoria-${slugCategoria(grupo.categoria)}">
          <div class="secao-topo">
            <h2 class="secao-titulo">${grupo.categoria}</h2>
            <div class="secao-sub">${grupo.filmes.length} filme(s)</div>
          </div>

          <div class="linha-scroll">
            ${grupo.filmes.map(filme => `
              <div class="movie" onclick="abrirPlayer('${escaparTexto(filme.video_id)}', '${escaparTexto(filme.titulo)}')">
                <img src="${filme.thumb || ''}" alt="${filme.titulo || ''}">
                <div class="movie-title">${filme.titulo || ''}</div>
                <div class="movie-cat">${normalizarCategoria(filme.categoria)}</div>
              </div>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderHero() {
      const tituloPlayer = document.getElementById("tituloPlayer");
      const descricaoPlayer = document.getElementById("descricaoPlayer");
      const btnAssistirDestaque = document.getElementById("btnAssistirDestaque");
      const btnCategoriaDestaque = document.getElementById("btnCategoriaDestaque");
      const heroBg = document.getElementById("heroBg");

      if (!filmeDestaque) {
        tituloPlayer.textContent = "Nenhum filme cadastrado";
        descricaoPlayer.textContent = "";
        btnAssistirDestaque.style.display = "none";
        btnCategoriaDestaque.style.display = "none";
        heroBg.style.backgroundImage = "";
        return;
      }

      tituloPlayer.textContent = filmeDestaque.titulo || "Sem título";
      descricaoPlayer.textContent = filmeDestaque.descricao || "";
      heroBg.style.backgroundImage = filmeDestaque.thumb ? `url('${filmeDestaque.thumb}')` : "";

      btnAssistirDestaque.style.display = "inline-block";
      btnAssistirDestaque.onclick = () => abrirPlayer(
        filmeDestaque.video_id,
        filmeDestaque.titulo
      );

      btnCategoriaDestaque.style.display = "inline-block";
      btnCategoriaDestaque.textContent = normalizarCategoria(filmeDestaque.categoria);
      btnCategoriaDestaque.onclick = () => trocarCategoria(normalizarCategoria(filmeDestaque.categoria));
    }

    async function derrubarUsuario(msg = "Seu acesso foi bloqueado.") {
      if (usuarioDerrubado) return;
      usuarioDerrubado = true;

      try {
        if (canalTempoReal) {
          supabaseClient.removeChannel(canalTempoReal);
        }
      } catch (e) {}

      try {
        await supabaseClient.auth.signOut();
      } catch (e) {}

      alert(msg);
      location.href = "index.html";
    }

    async function validarClienteAtual() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data?.user) {
        location.href = "index.html";
        return null;
      }

      const authUser = data.user;

      const { data: cliente, error: erroCliente } = await supabaseClient
        .from("admin_clientes")
        .select("*")
        .eq("user_id", authUser.id)
        .maybeSingle();

      if (!erroCliente && cliente) {
        if (cliente.ativo === false) {
          await derrubarUsuario("Seu acesso foi bloqueado.");
          return null;
        }

        clienteAtual = cliente;
        adminAtual = null;
        tipoUsuarioAtual = "cliente";

        localStorage.setItem("tipo_usuario_filmes", "cliente");
        localStorage.setItem("cliente_id_filmes", String(cliente.id || ""));
        localStorage.setItem("cliente_nome_filmes", cliente.nome || "");
        localStorage.setItem("cliente_email_filmes", cliente.email || "");
        localStorage.setItem("cliente_user_id_filmes", authUser.id || "");
        localStorage.setItem("admin_id_filmes", String(cliente.admin_id || ""));

        return cliente;
      }

      const { data: admin, error: erroAdmin } = await supabaseClient
        .from("admin_filmes")
        .select("*")
        .eq("user_id", authUser.id)
        .maybeSingle();

      if (!erroAdmin && admin) {
        if (admin.ativo === false) {
          await derrubarUsuario("Admin desativado.");
          return null;
        }

        adminAtual = admin;
        clienteAtual = {
          id: null,
          nome: "Admin",
          email: admin.email || "",
          admin_id: admin.id,
          ativo: true
        };
        tipoUsuarioAtual = "admin";

        localStorage.setItem("tipo_usuario_filmes", "admin");
        localStorage.setItem("admin_id_filmes", String(admin.id || ""));
        localStorage.setItem("admin_email_filmes", admin.email || "");

        return clienteAtual;
      }

      await derrubarUsuario("Usuário não vinculado.");
      return null;
    }

    async function mostrarUsuario() {
      if (!clienteAtual) return;

      const prefixo = tipoUsuarioAtual === "admin" ? "Admin: " : "Logado como: ";
      document.getElementById("userInfo").textContent =
        prefixo + (clienteAtual.email || "usuário");
    }

    async function carregarConfigTema() {
      if (!clienteAtual?.admin_id) return;

      const { data, error } = await supabaseClient
        .from("config_filmes")
        .select("*")
        .eq("admin_id", clienteAtual.admin_id)
        .maybeSingle();

      if (!error && data) {
        aplicarTema(data);
      }
    }

    async function carregarFilmes() {
      const catalogo = document.getElementById("catalogoNetflix");
      catalogo.innerHTML = '<div class="vazio">Carregando filmes...</div>';

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .eq("ativo", true);

        if (error) throw error;

        let filmes = data || [];
        filmes = embaralharArray(filmes);
        filmesCache = filmes;
        categoriaAtual = "Todos";

        if (!filmes.length) {
          filmeDestaque = null;
          renderHero();
          renderMenuCategorias();
          renderCatalogoNetflix();
          return;
        }

        filmeDestaque = filmes[0];
        renderHero();
        renderMenuCategorias();
        renderCatalogoNetflix();

      } catch (error) {
        catalogo.innerHTML = `<div class="vazio" style="color:#fca5a5">${error.message || "Erro ao carregar filmes."}</div>`;
      }
    }

    function ativarBloqueioTempoReal(clienteId) {
      if (!clienteId) return;

      try {
        if (canalTempoReal) {
          supabaseClient.removeChannel(canalTempoReal);
        }
      } catch (e) {}

      canalTempoReal = supabaseClient
        .channel("cliente-status-" + clienteId)
        .on(
          "postgres_changes",
          {
            event: "UPDATE",
            schema: "public",
            table: "admin_clientes",
            filter: `id=eq.${clienteId}`
          },
          async (payload) => {
            const novo = payload.new || {};
            if (novo.ativo === false) {
              await derrubarUsuario("Seu acesso foi bloqueado pelo admin.");
            }
          }
        )
        .on(
          "postgres_changes",
          {
            event: "DELETE",
            schema: "public",
            table: "admin_clientes",
            filter: `id=eq.${clienteId}`
          },
          async () => {
            await derrubarUsuario("Seu acesso foi removido.");
          }
        )
        .subscribe();
    }

    async function protegerPagina() {
      const cliente = await validarClienteAtual();
      if (!cliente) return;

      document.getElementById("loadingTela").style.display = "none";
      document.getElementById("conteudo").style.display = "block";

      await mostrarUsuario();
      await carregarConfigTema();
      await carregarFilmes();

      if (tipoUsuarioAtual === "cliente" && cliente.id) {
        ativarBloqueioTempoReal(cliente.id);
      }
    }

    function resetToquesAdmin() {
      toquesAdmin = 0;
      if (timerToquesAdmin) clearTimeout(timerToquesAdmin);
      timerToquesAdmin = null;
    }

    async function abrirPainelAdmin() {
      const senha = prompt("Digite a senha secreta do painel:");
      if (!senha) return;

      if (senha !== SENHA_ADMIN_SECRETA) {
        alert("Senha inválida.");
        return;
      }

      const { data: authData, error: authError } = await supabaseClient.auth.getUser();

      if (authError || !authData?.user) {
        alert("Sessão inválida.");
        location.href = "index.html";
        return;
      }

      const { data: admin, error } = await supabaseClient
        .from("admin_filmes")
        .select("*")
        .eq("user_id", authData.user.id)
        .maybeSingle();

      if (error || !admin) {
        alert("Este usuário não é admin.");
        return;
      }

      if (admin.ativo === false) {
        alert("Admin desativado.");
        await supabaseClient.auth.signOut();
        location.href = "index.html";
        return;
      }

      location.href = "painel-admin.html";
    }

    document.getElementById("btnAdminSecreto").addEventListener("click", async () => {
      toquesAdmin++;

      if (timerToquesAdmin) clearTimeout(timerToquesAdmin);
      timerToquesAdmin = setTimeout(resetToquesAdmin, 2000);

      if (toquesAdmin >= 5) {
        resetToquesAdmin();
        await abrirPainelAdmin();
      }
    });

    async function logout() {
      try {
        if (canalTempoReal) {
          supabaseClient.removeChannel(canalTempoReal);
        }
      } catch (e) {}

      await supabaseClient.auth.signOut();
      location.href = "index.html";
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (!session && !usuarioDerrubado) {
        location.href = "index.html";
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") fecharPlayer();
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) {
        const overlay = document.getElementById("playerOverlay");
        if (overlay.classList.contains("show")) {
          document.body.style.overflow = "hidden";
        }
      }
    });

    window.addEventListener("focus", async () => {
      if (!usuarioDerrubado) {
        await validarClienteAtual();
      }
    });

    protegerPagina();
  </script>
</body>
</html>
