<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFcina Favoritos</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* LISTA DE FILMES */
.lista{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
  padding:10px;
}

/* ITEM DO FILME */
.item{
  position:relative;
}

.item img{
  width:100%;
  border-radius:8px;
}

/* BOTÃO FAVORITO */
.fav{
  position:absolute;
  top:5px;
  right:5px;
  background:rgba(0,0,0,0.6);
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  font-size:18px;
  color:#fff;
}

/* ATIVO */
.fav.ativo{
  color:red;
}

/* TITULO */
.titulo{
  font-size:14px;
  margin-top:5px;
}

/* SEÇÃO FAVORITOS */
#favoritos{
  padding:10px;
  border-top:2px solid #333;
}

#favoritos h2{
  font-size:16px;
}
</style>
</head>

<body>

<h2 style="padding:10px;">🎬 Filmes</h2>

<div class="lista" id="listaFilmes"></div>

<div id="favoritos">
  <h2>❤️ Meus Favoritos</h2>
  <div class="lista" id="listaFav"></div>
</div>

<script>
// FILMES EXEMPLO
const filmes = [
  {id:1, nome:"Filme 1", img:"https://via.placeholder.com/300x400"},
  {id:2, nome:"Filme 2", img:"https://via.placeholder.com/300x400"},
  {id:3, nome:"Filme 3", img:"https://via.placeholder.com/300x400"},
];

// PEGAR FAVORITOS
let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

// RENDER FILMES
function render(){
  const lista = document.getElementById("listaFilmes");
  lista.innerHTML = "";

  filmes.forEach(f => {
    const ativo = favoritos.includes(f.id);

    lista.innerHTML += `
      <div class="item">
        <img src="${f.img}">
        <button class="fav ${ativo ? 'ativo':''}" onclick="toggleFav(${f.id})">
          ❤️
        </button>
        <div class="titulo">${f.nome}</div>
      </div>
    `;
  });

  renderFav();
}

// TOGGLE FAVORITO
function toggleFav(id){
  if(favoritos.includes(id)){
    favoritos = favoritos.filter(f => f !== id);
  }else{
    favoritos.push(id);
  }

  localStorage.setItem("fav", JSON.stringify(favoritos));
  render();
}

// RENDER FAVORITOS
function renderFav(){
  const lista = document.getElementById("listaFav");
  lista.innerHTML = "";

  const favFilmes = filmes.filter(f => favoritos.includes(f.id));

  favFilmes.forEach(f => {
    lista.innerHTML += `
      <div class="item">
        <img src="${f.img}">
        <div class="titulo">${f.nome}</div>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
