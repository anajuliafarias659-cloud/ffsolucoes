<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Filmes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#141414;
      font-family:Arial,sans-serif;
      color:#fff;
    }
    header{
      background:#000;
      padding:16px 20px;
      font-size:28px;
      font-weight:bold;
      color:#ef4444;
      text-align:center;
      position:sticky;
      top:0;
      z-index:5;
    }
    .container{
      padding:20px;
      max-width:1400px;
      margin:0 auto;
    }
    .player{
      margin-top:10px;
      position:relative;
      padding-top:56.25%;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    iframe{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:none;
    }
    .titulo-player{
      margin:16px 0 6px;
      font-size:26px;
      font-weight:800;
    }
    .descricao-player{
      color:#cbd5e1;
      line-height:1.6;
      margin-bottom:24px;
    }
    .subtitulo{
      font-size:24px;
      margin:0 0 16px;
    }
    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:16px;
      margin-top:20px;
    }
    .movie{
      cursor:pointer;
      background:#1c1c1c;
      border-radius:14px;
      overflow:hidden;
      transition:.2s;
      border:1px solid rgba(255,255,255,.06);
    }
    .movie:hover{
      transform:translateY(-4px);
      border-color:rgba(239,68,68,.35);
    }
    .movie img{
      width:100%;
      height:240px;
      object-fit:cover;
      display:block;
      background:#0f172a;
    }
    .movie-title{
      font-size:15px;
      padding:12px 12px 6px;
      line-height:1.4;
      font-weight:700;
    }
    .movie-cat{
      color:#94a3b8;
      font-size:12px;
      padding:0 12px 12px;
    }
    .vazio{
      color:#94a3b8;
      font-size:16px;
      padding:20px 0;
    }
  </style>
</head>
<body>
  <header>FF FILMES ONLINE</header>

  <div class="container">
    <div class="player">
      <iframe id="mainPlayer" src="" allowfullscreen></iframe>
    </div>

    <div id="tituloPlayer" class="titulo-player">Carregando...</div>
    <div id="descricaoPlayer" class="descricao-player"></div>

    <h2 class="subtitulo">Catálogo</h2>
    <div id="gallery" class="gallery"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let filmesCache = [];

    function playMovie(videoId, titulo = "", descricao = "") {
      const player = document.getElementById("mainPlayer");
      const tituloPlayer = document.getElementById("tituloPlayer");
      const descricaoPlayer = document.getElementById("descricaoPlayer");

      player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      tituloPlayer.textContent = titulo || "Sem título";
      descricaoPlayer.textContent = descricao || "";

      document.querySelector(".player").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    async function carregarFilmes() {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = '<div class="vazio">Carregando filmes...</div>';

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .eq("ativo", true)
          .order("id", { ascending: false });

        if (error) throw error;

        filmesCache = data || [];

        if (!filmesCache.length) {
          document.getElementById("mainPlayer").src = "";
          document.getElementById("tituloPlayer").textContent = "Nenhum filme cadastrado";
          document.getElementById("descricaoPlayer").textContent = "";
          gallery.innerHTML = '<div class="vazio">Nenhum filme ativo cadastrado.</div>';
          return;
        }

        const primeiro = filmesCache[0];
        playMovie(primeiro.video_id, primeiro.titulo, primeiro.descricao || "");

        gallery.innerHTML = filmesCache.map(filme => `
          <div class="movie" onclick="playMovie('${filme.video_id.replace(/'/g, "\\'")}', '${(filme.titulo || '').replace(/'/g, "\\'")}', '${(filme.descricao || '').replace(/'/g, "\\'")}')">
            <img src="${filme.thumb || ''}" alt="${filme.titulo}">
            <div class="movie-title">${filme.titulo}</div>
            <div class="movie-cat">${filme.categoria || "Sem categoria"}</div>
          </div>
        `).join("");

      } catch (error) {
        gallery.innerHTML = `<div class="vazio" style="color:#fca5a5">${error.message || "Erro ao carregar filmes."}</div>`;
      }
    }

    carregarFilmes();
  </script>
</body>
</html>
