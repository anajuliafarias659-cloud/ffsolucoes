<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Filmes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}

    :root{
      --primary:#e50914;
      --secondary:#b20710;
      --bg:#141414;
      --card:#1c1c1c;
      --text:#ffffff;
      --muted:#94a3b8;
      --bg-filmes:url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1600&q=80');
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.84), rgba(0,0,0,.92)),
        var(--bg-filmes) center/cover fixed no-repeat;
    }

    header{
      background:rgba(0,0,0,.86);
      backdrop-filter:blur(8px);
      padding:16px 20px;
      font-size:28px;
      font-weight:bold;
      color:var(--primary);
      text-align:center;
      position:sticky;
      top:0;
      z-index:20;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .top-bar{
      position:relative;
      max-width:1400px;
      margin:0 auto;
    }

    .btn-sair{
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .user-info{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      padding:10px 16px 0;
    }

    .container{
      padding:20px;
      max-width:1400px;
      margin:0 auto;
    }

    .destaque-box{
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:20px;
      margin-top:12px;
      backdrop-filter:blur(8px);
    }

    .titulo-player{
      margin:0 0 8px;
      font-size:26px;
      font-weight:800;
    }

    .descricao-player{
      color:#cbd5e1;
      line-height:1.6;
      margin-bottom:16px;
      white-space:pre-line;
    }

    .btn-assistir{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      border:none;
      padding:12px 18px;
      border-radius:12px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }

    .categorias-wrap{
      margin-top:24px;
    }

    .categoria-bloco{
      margin-bottom:30px;
    }

    .categoria-titulo{
      font-size:24px;
      margin:0 0 14px;
      color:#fff;
      border-left:5px solid var(--primary);
      padding-left:12px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:16px;
    }

    .movie{
      cursor:pointer;
      background:rgba(28,28,28,.88);
      border-radius:14px;
      overflow:hidden;
      transition:.2s;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(6px);
    }

    .movie:hover{
      transform:translateY(-4px);
      border-color:color-mix(in srgb, var(--primary) 36%, transparent);
    }

    .movie img{
      width:100%;
      height:240px;
      object-fit:cover;
      display:block;
      background:#0f172a;
    }

    .movie-title{
      font-size:15px;
      padding:12px 12px 6px;
      line-height:1.4;
      font-weight:700;
    }

    .movie-cat{
      color:var(--muted);
      font-size:12px;
      padding:0 12px 12px;
    }

    .vazio{
      color:var(--muted);
      font-size:16px;
      padding:20px 0;
    }

    .loading-tela{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#cbd5e1;
      font-size:18px;
      background:#141414;
    }

    .player-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.96);
      z-index:9999;
      display:none;
      flex-direction:column;
    }

    .player-overlay.show{
      display:flex;
    }

    .player-topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px;
      background:rgba(0,0,0,.85);
      border-bottom:1px solid rgba(255,255,255,.08);
      flex-wrap:wrap;
    }

    .player-acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-overlay{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
    }

    .btn-voltar{
      background:#334155;
    }

    .btn-fechar{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
    }

    .player-titulo{
      font-size:16px;
      font-weight:800;
      color:#fff;
      flex:1;
      min-width:220px;
    }

    .player-area{
      position:relative;
      flex:1;
      background:#000;
    }

    .player-area iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
    }

    @media (max-width:700px){
      header{
        font-size:22px;
        padding:14px 12px;
      }

      .btn-sair{
        position:static;
        transform:none;
        display:block;
        margin:10px auto 0;
      }

      .top-bar{
        display:flex;
        flex-direction:column;
        align-items:center;
      }

      .titulo-player{
        font-size:22px;
      }

      .movie img{
        height:220px;
      }

      .player-topo{
        align-items:stretch;
      }

      .player-acoes{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
      }

      .btn-overlay{
        width:100%;
      }

      .player-titulo{
        min-width:auto;
        width:100%;
      }

      .categoria-titulo{
        font-size:20px;
      }
    }
  </style>
</head>
<body>
  <div id="loadingTela" class="loading-tela">Verificando acesso...</div>

  <div id="conteudo" style="display:none;">
    <header>
      <div class="top-bar">
        <div id="nomeSiteTopo">FF FILMES ONLINE</div>
        <button class="btn-sair" onclick="logout()">Sair</button>
      </div>
    </header>

    <div id="userInfo" class="user-info"></div>

    <div class="container">
      <div class="destaque-box">
        <div id="tituloPlayer" class="titulo-player">Carregando...</div>
        <div id="descricaoPlayer" class="descricao-player"></div>
        <button id="btnAssistirDestaque" class="btn-assistir" style="display:none;">Assistir agora</button>
      </div>

      <div id="categoriasWrap" class="categorias-wrap"></div>
    </div>
  </div>

  <div id="playerOverlay" class="player-overlay">
    <div class="player-topo">
      <div id="overlayTitulo" class="player-titulo">Assistindo</div>
      <div class="player-acoes">
        <button class="btn-overlay btn-voltar" onclick="fecharPlayer()">Voltar</button>
        <button class="btn-overlay btn-fechar" onclick="fecharPlayer()">Fechar</button>
      </div>
    </div>
    <div id="playerArea" class="player-area">
      <iframe id="overlayPlayer" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let filmesCache = [];
    let filmeDestaque = null;

    function aplicarTema(config) {
      if (!config) return;

      document.documentElement.style.setProperty("--primary", config.cor_primaria || "#e50914");
      document.documentElement.style.setProperty("--secondary", config.cor_secundaria || "#b20710");
      document.documentElement.style.setProperty("--bg", config.cor_fundo || "#141414");
      document.documentElement.style.setProperty("--card", config.cor_card || "#1c1c1c");
      document.documentElement.style.setProperty("--text", config.cor_texto || "#ffffff");

      if (config.bg_filmes) {
        document.documentElement.style.setProperty("--bg-filmes", `url('${config.bg_filmes}')`);
      }

      if (config.nome_site) {
        document.title = config.nome_site;
        document.getElementById("nomeSiteTopo").textContent = config.nome_site;
      }
    }

    function escaparTexto(texto) {
      return String(texto || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\n/g, "\\n")
        .replace(/\r/g, "");
    }

    function embaralharArray(lista) {
      const arr = [...lista];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function normalizarCategoria(categoria) {
      const texto = String(categoria || "").trim();
      return texto || "Sem categoria";
    }

    function agruparPorCategoria(filmes) {
      const grupos = {};

      filmes.forEach(filme => {
        const categoria = normalizarCategoria(filme.categoria);
        if (!grupos[categoria]) grupos[categoria] = [];
        grupos[categoria].push(filme);
      });

      const categoriasOrdenadas = Object.keys(grupos).sort((a, b) => a.localeCompare(b, "pt-BR"));

      return categoriasOrdenadas.map(categoria => ({
        categoria,
        filmes: embaralharArray(grupos[categoria])
      }));
    }

    async function abrirPlayer(videoId, titulo = "") {
      const overlay = document.getElementById("playerOverlay");
      const overlayPlayer = document.getElementById("overlayPlayer");
      const overlayTitulo = document.getElementById("overlayTitulo");
      const playerArea = document.getElementById("playerArea");

      overlayTitulo.textContent = titulo || "Assistindo";
      overlayPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      overlay.classList.add("show");
      document.body.style.overflow = "hidden";

      try {
        if (playerArea.requestFullscreen) {
          await playerArea.requestFullscreen();
        }
      } catch (e) {}
    }

    async function fecharPlayer() {
      const overlay = document.getElementById("playerOverlay");
      const overlayPlayer = document.getElementById("overlayPlayer");

      overlayPlayer.src = "";
      overlay.classList.remove("show");
      document.body.style.overflow = "";

      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        }
      } catch (e) {}
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        fecharPlayer();
      }
    });

    async function protegerPagina() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error || !data?.session?.user) {
          window.location.href = "index.html";
          return;
        }

        document.getElementById("loadingTela").style.display = "none";
        document.getElementById("conteudo").style.display = "block";

        await mostrarUsuario();
        await carregarConfigTema();
        await carregarFilmes();
      } catch (e) {
        window.location.href = "index.html";
      }
    }

    async function mostrarUsuario() {
      try {
        const { data } = await supabaseClient.auth.getUser();

        if (data?.user) {
          document.getElementById("userInfo").textContent =
            "Logado como: " + (data.user.email || "usuário");
        }
      } catch (e) {}
    }

    async function carregarConfigTema() {
      try {
        const { data, error } = await supabaseClient
          .from("config_filmes")
          .select("*")
          .order("id", { ascending: true })
          .limit(1);

        if (error) return;
        if (data && data.length > 0) aplicarTema(data[0]);
      } catch (e) {}
    }

    function renderizarCategorias(filmes) {
      const categoriasWrap = document.getElementById("categoriasWrap");

      if (!filmes.length) {
        categoriasWrap.innerHTML = '<div class="vazio">Nenhum filme ativo cadastrado.</div>';
        return;
      }

      const grupos = agruparPorCategoria(filmes);

      categoriasWrap.innerHTML = grupos.map(grupo => `
        <section class="categoria-bloco">
          <h2 class="categoria-titulo">${grupo.categoria}</h2>
          <div class="gallery">
            ${grupo.filmes.map(filme => `
              <div class="movie" onclick="abrirPlayer('${escaparTexto(filme.video_id)}', '${escaparTexto(filme.titulo)}')">
                <img src="${filme.thumb || ''}" alt="${filme.titulo || ''}">
                <div class="movie-title">${filme.titulo || ''}</div>
                <div class="movie-cat">${normalizarCategoria(filme.categoria)}</div>
              </div>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    async function carregarFilmes() {
      const categoriasWrap = document.getElementById("categoriasWrap");
      const tituloPlayer = document.getElementById("tituloPlayer");
      const descricaoPlayer = document.getElementById("descricaoPlayer");
      const btnAssistirDestaque = document.getElementById("btnAssistirDestaque");

      categoriasWrap.innerHTML = '<div class="vazio">Carregando filmes...</div>';

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .eq("ativo", true);

        if (error) throw error;

        let filmes = data || [];
        filmes = embaralharArray(filmes);
        filmesCache = filmes;

        if (!filmes.length) {
          tituloPlayer.textContent = "Nenhum filme cadastrado";
          descricaoPlayer.textContent = "";
          btnAssistirDestaque.style.display = "none";
          categoriasWrap.innerHTML = '<div class="vazio">Nenhum filme ativo cadastrado.</div>';
          return;
        }

        filmeDestaque = filmes[0];
        tituloPlayer.textContent = filmeDestaque.titulo || "Sem título";
        descricaoPlayer.textContent = filmeDestaque.descricao || "";
        btnAssistirDestaque.style.display = "inline-block";
        btnAssistirDestaque.onclick = () => abrirPlayer(
          filmeDestaque.video_id,
          filmeDestaque.titulo
        );

        renderizarCategorias(filmes);

      } catch (error) {
        categoriasWrap.innerHTML = `<div class="vazio" style="color:#fca5a5">${error.message || "Erro ao carregar filmes."}</div>`;
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (!session) {
        window.location.href = "index.html";
      }
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) {
        const overlay = document.getElementById("playerOverlay");
        if (overlay.classList.contains("show")) {
          document.body.style.overflow = "hidden";
        }
      }
    });

    protegerPagina();
  </script>
</body>
</html>
