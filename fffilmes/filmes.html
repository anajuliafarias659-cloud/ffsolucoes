<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FF Filmes</title>
  <meta name="theme-color" content="#141414">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    :root{
      --primary:#e50914;
      --secondary:#b20710;
      --bg:#141414;
      --card:#181818;
      --card-2:#202020;
      --text:#ffffff;
      --muted:#b3b3b3;
      --line:rgba(255,255,255,.08);
      --shadow:0 18px 45px rgba(0,0,0,.38);
      --bg-filmes:url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1600&q=80');
    }

    .canal-item{
  font-size:16px;
  padding:14px;
}


.assistir-box{
  width:100%;
  display:flex;
  justify-content:center;
  margin:12px 0;
}

.btn-assistir-mobile{
  width:90%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff0000,#990000);
  color:#fff;
  font-size:18px;
  font-weight:900;
}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.94)),
        var(--bg-filmes) center/cover fixed no-repeat;
      overflow-x:hidden;
      min-height:100vh;
    }

    img{display:block;max-width:100%}

    header{
      position:sticky;
      top:0;
      z-index:100;
      background:linear-gradient(to bottom, rgba(0,0,0,.92), rgba(0,0,0,.68));
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }

    .top-bar{
      max-width:1440px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      min-width:0;
      display:flex;
      align-items:center;
      gap:12px;
      flex:1;
    }


.video-tv{
  flex:1;
}


.grade-tv{
  width:280px;
  background:rgba(0,0,0,.7);
  border-radius:16px;
  padding:10px;
  overflow-y:auto;
  max-height:80vh;
}

.canal-item{
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
  background:rgba(255,255,255,.05);
}

.canal-item.ativo{
  background:#ff0000;
}

    .logo-player{
  position:absolute;
  top:5px;
left:15px;
right:auto;
  bottom:auto;     /* 👈 importante */
  height:170px;
  z-index:9999;
  opacity:.9;
  pointer-events:none;
}

    .brand-text{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
      width:100%;
    }

    .logo{
      font-size:28px;
      font-weight:900;
      color:var(--primary);
      letter-spacing:.6px;
      text-transform:uppercase;
      line-height:1;
      white-space:nowrap;
    }

    .user-info{
      color:var(--muted);
      font-size:13px;
      max-width:320px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn-sair{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      border:none;
      padding:11px 16px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
      box-shadow:0 10px 24px rgba(229,9,20,.28);
    }

    .container{
      max-width:1440px;
      margin:0 auto;
      padding:20px 18px 48px;
    }

    .hero{
      position:relative;
      min-height:72vh;
      border-radius:28px;
      overflow:hidden;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      display:flex;
      align-items:flex-end;
      padding:38px;
      margin-bottom:22px;
      isolation:isolate;
      background:#111;
    }

    .hero-bg{
  position:absolute;
  inset:0;
  z-index:-1;
  background-size:cover;
  background-position:center;
  transform:scale(1.05);
  filter:brightness(.55);
}

    .hero-overlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:
    linear-gradient(90deg, rgba(0,0,0,.65) 0%, rgba(0,0,0,.4) 40%, rgba(0,0,0,.1) 100%),
    linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.5) 100%);
}

    .hero-content{
  max-width:500px;
  position:relative;
  z-index:5; /* 🔥 deixa acima do vídeo */
}

.hero h1{
  font-size:28px !important;
}

.hero p{
  font-size:14px !important;
  opacity:.8;
}

    .hero-tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.09);
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
    }

    .hero-video-box{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
  pointer-events:none;
}

.hero-video-box iframe,
.hero-video-box #heroVideoPlayer{
  width:100%;
  height:100%;
  pointer-events:none;
}

@media (max-width:900px){
  .mini-player-box{
    width:240px;
    height:135px;
    top:16px;
    right:16px;
  }
}



@media (max-width:768px){

  .layout-tv{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  /* PLAYER */
  .video-tv{
    width:100%;
    height:auto !important;
  }

  .hero{
    width:100%;
    height:220px !important;
    min-height:220px !important;
    border-radius:16px;
    overflow:hidden;
    margin-bottom:10px;
  }

  .hero-video-box,
  #heroVideoPlayer,
  #heroVideoPlayer iframe{
    width:100% !important;
    height:220px !important;
  }

  /* LISTA TV */
  .grade-tv{
    width:100%;
    max-height:180px;
    overflow-y:auto;
    display:block;
  }

  /* CATÁLOGO */
  #catalogoNetflix{
    margin-top:14px;
    display:block !important;
  }

  .linha-scroll{
    display:flex;
    overflow-x:auto;
    gap:10px;
  }

  .movie{
    min-width:130px !important;
    max-width:130px !important;
  }

  .movie img{
    height:190px !important;
  }

}

@media (max-width:700px){
  .mini-player-box{
    position:relative;
    top:auto;
    right:auto;
    width:100%;
    height:190px;
    margin:0 0 18px 0;
  }

  .hero{
    align-items:flex-start;
  }

  .hero-content{
    margin-top:210px;
  }
}

    .hero-title{
      font-size:clamp(32px,5vw,60px);
      font-weight:900;
      line-height:.98;
      margin:0 0 12px;
      text-shadow:0 10px 35px rgba(0,0,0,.45);
      max-width:700px;
    }

    .hero-desc{
      color:#e5e7eb;
      line-height:1.65;
      font-size:16px;
      margin:0 0 20px;
      max-width:620px;
      white-space:pre-line;
    }

    .hero-actions{
  position:absolute;
  bottom:30px;
  left:30px;

  z-index:50;

  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

    .btn-hero{
      border:none;
      padding:14px 20px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
      min-height:48px;
    }

   .btn-play{
  background:linear-gradient(135deg,#ff1a1a,#ff0000);
  color:#fff;
  box-shadow:0 0 20px rgba(255,0,0,.6);
  font-size:16px;
}

    .btn-info{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(10px);
    }

    .busca-box{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:0 0 18px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .busca-input{
      flex:1;
      min-width:240px;
      height:48px;
      border:none;
      outline:none;
      border-radius:14px;
      padding:0 16px;
      background:rgba(0,0,0,.45);
      color:#fff;
      font-size:15px;
      border:1px solid rgba(255,255,255,.08);
    }

    .busca-input::placeholder{
      color:#94a3b8;
    }

    .btn-busca{
      height:48px;
      border:none;
      border-radius:14px;
      padding:0 18px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      box-shadow:0 10px 24px rgba(229,9,20,.24);
    }

    .btn-busca-sec{
      height:48px;
      border:none;
      border-radius:14px;
      padding:0 18px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.1);
    }

    .busca-info{
      width:100%;
      color:var(--muted);
      font-size:14px;
      padding:2px 4px 0;
    }

    .busca-vazio{
      margin-top:22px;
      padding:22px;
      border-radius:20px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .busca-vazio h3{
      margin:0 0 10px;
      font-size:22px;
    }

    .busca-vazio p{
      margin:0 0 16px;
      color:#d1d5db;
      line-height:1.6;
    }

    .categorias-topo{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  overflow:visible;
  padding:4px 0 10px;
  margin-bottom:6px;
}

    .categorias-topo::-webkit-scrollbar{display:none}

    .categoria-btn{
      border:none;
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:11px 16px;
      border-radius:999px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
      transition:.2s;
      flex:0 0 auto;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(10px);
    }

    .categoria-btn.ativo{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      border-color:transparent;
      box-shadow:0 10px 22px rgba(229,9,20,.24);
    }

    .secao-categoria{margin-top:26px}

    .secao-topo{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .secao-titulo{
      font-size:24px;
      font-weight:900;
      margin:0;
      letter-spacing:.2px;
    }

    .secao-sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }

    .linha-scroll{
      display:flex;
      gap:14px;
      overflow-x:auto;
      padding:2px 2px 14px;
      scroll-behavior:smooth;
      scrollbar-width:thin;
      scroll-snap-type:x proximity;
    }

    .linha-scroll::-webkit-scrollbar{height:7px}
    .linha-scroll::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.16);
      border-radius:999px;
    }

    .movie{
      min-width:190px;
      max-width:190px;
      cursor:pointer;
      background:linear-gradient(180deg, rgba(30,30,30,.96), rgba(20,20,20,.96));
      border-radius:18px;
      overflow:hidden;
      transition:.22s ease;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(8px);
      flex:0 0 auto;
      scroll-snap-align:start;
      box-shadow:0 10px 24px rgba(0,0,0,.26);
      position:relative;
    }

    .movie:hover{
      transform:translateY(-6px) scale(1.02);
      border-color:rgba(229,9,20,.35);
      box-shadow:0 16px 30px rgba(0,0,0,.34);
    }

    .movie-capa{
      position:relative;
    }

    .movie img{
      width:100%;
      height:250px;
      object-fit:cover;
      display:block;
      background:#0f172a;
    }

    .movie-acoes{
      position:absolute;
      top:8px;
      right:8px;
      display:flex;
      gap:6px;
      z-index:4;
    }

    .icon-btn{
      width:34px;
      height:34px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:16px;
      font-weight:900;
      color:#fff;
      background:rgba(0,0,0,.65);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .icon-btn.ativo{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      border-color:transparent;
    }

    .movie-title{
      font-size:15px;
      padding:12px 12px 6px;
      line-height:1.35;
      font-weight:700;
      min-height:58px;
    }

    .movie-cat{
      color:var(--muted);
      font-size:12px;
      padding:0 12px 12px;
    }

    .vazio{
      color:var(--muted);
      font-size:16px;
      padding:20px 0;
    }

    .loading-tela{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#cbd5e1;
      font-size:18px;
      background:#141414;
    }

    .player-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.97);

  backdrop-filter:blur(4px);

  z-index:9999;

  display:none;
  flex-direction:column;
}

    .player-overlay.show{display:flex}

   .player-topo{
  position:absolute;
  top:0;
  left:0;
  width:100%;

  z-index:9999999;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:12px;

  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.85),
    rgba(0,0,0,.2),
    transparent
  );

  transition:opacity .4s ease;

  opacity:0;

  pointer-events:none;
}

.player-overlay:hover .player-topo{
  opacity:1;
  pointer-events:auto;
}
    .player-acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-overlay{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
    }

    .btn-voltar{background:#334155}
    .btn-fechar{background:linear-gradient(135deg,var(--primary),var(--secondary))}
    .btn-proximo{background:#2563eb}

    .player-titulo{
      font-size:16px;
      font-weight:800;
      color:#fff;
      flex:1;
      min-width:260px;
    }

    .player-area{
  position:fixed;

  inset:0;

  width:100vw;
  height:100vh;

  background:#000;

  z-index:9999;

  overflow:hidden;
}

    .player-area #overlayPlayer,
.player-area iframe{

  position:fixed;

  top:0;
  left:0;

  width:100vw !important;
  height:100vh !important;

  border:none;

  z-index:1;

}

    .legenda-flutuante{
      position:absolute;
      left:50%;
      bottom:50px;
      transform:translateX(-50%);
      max-width:85%;
      background:rgba(0,0,0,.75);
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      font-size:18px;
      text-align:center;
      z-index:99999;
      display:none;
      opacity:0;
      transition:opacity .3s ease;
      pointer-events:none;
      box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    .legenda-flutuante.show{
      display:block;
      opacity:1;
    }

    .btn-admin-secreto{
      position:fixed;
      right:12px;
      bottom:12px;
      width:42px;
      height:42px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      cursor:pointer;
      opacity:.14;
      z-index:99999;
    }

    @media (max-width:900px){
      .hero{
        min-height:56vh;
        padding:24px;
      }
      .movie{
        min-width:155px;
        max-width:155px;
      }
      .movie img{height:215px}
    }

    @media (max-width:700px){
      .top-bar{align-items:flex-start}
      .logo{font-size:24px}
      .hero{
        min-height:52vh;
        padding:20px;
        border-radius:18px;
      }
      .hero-title{font-size:32px}
      .hero-desc{font-size:14px}
      .btn-sair{align-self:flex-start}
      .player-topo{align-items:stretch}
      .player-acoes{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
      }
      .btn-overlay{width:100%}
      .player-titulo{
        min-width:auto;

      }
      .secao-titulo{font-size:20px}
      .legenda-flutuante{
        bottom:30px;
        font-size:14px;
        max-width:92%;
      }
      .busca-box{
        padding:12px;
      }
      .busca-input,
      .btn-busca,
      .btn-busca-sec{
        width:100%;
      }
    }

    .top-channels{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  flex:1;
}

.top-channel-card{
  min-width:240px;
  text-align:center;
  padding:14px 20px;
  border-radius:18px;

  background:linear-gradient(
    135deg,
    rgba(255,0,0,.18),
    rgba(120,0,0,.35)
  );

  border:1px solid rgba(255,0,0,.35);

  color:#fff;

  font-size:20px;
  font-weight:900;

  letter-spacing:1px;
  text-transform:uppercase;

  cursor:pointer;

  box-shadow:
    0 0 20px rgba(255,0,0,.25),
    inset 0 0 12px rgba(255,255,255,.06);

  backdrop-filter:blur(12px);

  transition:
    transform .18s ease,
    box-shadow .18s ease,
    background .18s ease;

  animation:pulseBtn 2s infinite;
}

/* 🔥 PASSAR O MOUSE */
.top-channel-card:hover{

  transform:scale(1.05);

  background:linear-gradient(
    135deg,
    rgba(255,0,0,.35),
    rgba(180,0,0,.55)
  );

  box-shadow:
    0 0 35px rgba(255,0,0,.65),
    0 0 60px rgba(255,0,0,.25);
}

/* 🔥 CLIQUE */
.top-channel-card:active{

  transform:scale(.96);

}

/* 🔥 PULSO */
@keyframes pulseBtn{

  0%{
    box-shadow:
      0 0 12px rgba(255,0,0,.25);
  }

  50%{
    box-shadow:
      0 0 28px rgba(255,0,0,.55);
  }

  100%{
    box-shadow:
      0 0 12px rgba(255,0,0,.25);
  }

}

.top-channel-card.ao-vivo{
  background:rgba(255,0,0,.08);
  border:1px solid rgba(255,0,0,.24);
  box-shadow:0 0 18px rgba(255,0,0,.18);
}

@media (max-width:900px){
  .top-bar{
    flex-wrap:wrap;
  }

  .top-channels{
    order:3;
    width:100%;
    justify-content:flex-start;
    flex-wrap:wrap;
    gap:10px;
    margin-top:8px;
  }
  .top-channel-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(255,0,0,.5);
}

.top-channel-card.ao-vivo{
  background:linear-gradient(135deg,#ff0000,#990000);
  color:#fff;
  box-shadow:0 0 25px rgba(255,0,0,.6);
}

  .top-channel-card{
    min-width:auto;
    font-size:14px;
    padding:10px 14px;
  }
}


.layout-tv{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

/* 🔥 TARJA INFERIOR TV */

/* 🔥 FAIXA ESTILO BREAKING NEWS */

.ticker-bar{

  position:fixed !important;

  left:12px;
  right:12px;
  bottom:12px;

  height:54px;

  background:linear-gradient(
    90deg,
    #0077c8,
    #00a2ff
  );

  border-radius:12px;

  display:flex !important;
  align-items:center;
  justify-content:center;

  overflow:hidden;

  z-index:999999999 !important;

  box-shadow:
    0 8px 30px rgba(0,0,0,.45),
    0 0 20px rgba(0,150,255,.35);

  opacity:1 !important;
  visibility:visible !important;

}

/* TEXTO */
.ticker-content{

  position:relative;
  z-index:2;

  width:100%;

  display:flex;
  align-items:center;
  justify-content:center;

  text-align:center;

  color:#fff;

  font-size:20px;
  font-weight:900;

  letter-spacing:.5px;

  padding:0 14px;

  text-shadow:0 2px 10px rgba(0,0,0,.7);

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;

}

/* CELULAR */
@media(max-width:768px){

  .ticker-bar{

    height:40px !important;

    left:6px;

  async function gravarPingAssistindo(filmeRef = null, inicio = false) {
    try {
      const filme = filmeRef || filmeAtualPlayer;
      if (!filme || !filme.video_id) return;

      const adminId = obterAdminIdViewer();
      const clienteId = obterClienteIdViewer();
      const clienteNome = obterNomeViewer();
      const clienteEmail = obterEmailViewer();

      if (!adminId || (!clienteId && !clienteEmail)) return;

      const agora = new Date().toISOString();
      const existente = await buscarRegistroAssistindoExistente();

      const payloadBase = {
        admin_id: adminId,
        cliente_id: clienteId,
        cliente_nome: clienteNome,
        cliente_email: clienteEmail,
        filme_id: filme.id ? Number(filme.id) : null,
        filme_titulo: filme.titulo || null,
        last_ping: agora
      };

      if (existente?.id) {
        const payloadUpdate = {
          ...payloadBase
        };

        if (inicio && !existente.started_at) {
          payloadUpdate.started_at = agora;
        }

        const { error } = await supabaseClient
          .from("filmes_views")
          .update(payloadUpdate)
          .eq("id", existente.id);

        if (error) {
          console.error("Erro atualizando ping em filmes_views:", error);
        }
      } else {
        const payloadInsert = {
          ...payloadBase,
          started_at: agora
        };

        const { error } = await supabaseClient
          .from("filmes_views")
          .insert([payloadInsert]);

        if (error) {
          console.error("Erro inserindo ping em filmes_views:", error);
        }
      }
    } catch (e) {
      console.error("Erro geral no ping assistindo:", e);
    }
  }

  async function removerPingAssistindo() {
    try {
      const adminId = obterAdminIdViewer();
      const email = obterEmailViewer();
      const clienteId = obterClienteIdViewer();

      if (!adminId) return;
      if (!email && !clienteId) return;

      if (clienteId) {
        query = query.eq("cliente_id", clienteId);

      const { error } = await query;
      if (error) {
        console.error("Erro removendo ping assistindo:", error);
      }
    } catch (e) {
      console.error("Erro geral removendo ping:", e);
    }
  }

  function montarLegendas(texto) {
    if (!texto) return [];
    return String(texto)
      .split("\n")
      .map(item => item.trim())
      .filter(Boolean);
  }

  function escaparTexto(texto) {
    return String(texto || "")
      .replace(/\\/g, "\\\\")
      .replace(/'/g, "\\'")
      .replace(/\n/g, "\\n")
      .replace(/\r/g, "");
  }

  function embaralharArray(lista) {
    const arr = [...lista];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function normalizarCategoria(categoria) {
    const texto = String(categoria || "").trim();
    return texto || "Sem categoria";
  }

  function normalizarBusca(texto) {
    return String(texto || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim();
  }

  function filmeEhAoVivo(filme){
  const cat = normalizarBusca(filme?.categoria || "");
  const titulo = normalizarBusca(filme?.titulo || "");

  return (
    cat.includes("tv ao vivo") ||
    cat.includes("ao vivo") ||
    cat.includes("live") ||
    titulo.includes("tv ao vivo") ||
    titulo.includes("ao vivo") ||
    titulo.includes("live")
  );
}

  function obterCategorias(filmes) {
    const set = new Set();
    filmes.forEach(f => set.add(normalizarCategoria(f.categoria)));
    return ["Todos", ...Array.from(set).sort((a, b) => a.localeCompare(b, "pt-BR"))];
  }

  function agruparCategorias(filmes) {
    const grupos = {};
    filmes.forEach(filme => {
      const categoria = normalizarCategoria(filme.categoria);
      if (!grupos[categoria]) grupos[categoria] = [];
      grupos[categoria].push(filme);
    });

    const categoriasOrdenadas = Object.keys(grupos).sort((a, b) => a.localeCompare(b, "pt-BR"));

    return categoriasOrdenadas.map(categoria => ({
      categoria,
      filmes: embaralharArray(grupos[categoria])
    }));
  }

function extrairVideoId(valor){
  const txt = String(valor || "").trim();

  if(!txt) return "";

  if(txt.includes("youtube.com/watch?v=")){
    return new URL(txt).searchParams.get("v") || "";
  }

  if(txt.includes("youtu.be/")){
    return txt.split("youtu.be/")[1].split("?")[0];
  }

  if(txt.includes("/embed/")){
    return txt.split("/embed/")[1].split("?")[0];
  }

  return txt;
}

async function buscarYoutubeTV(busca){

  const termo =
    busca ||

    document.getElementById(
      "campoBuscaFilmes"
    ).value.trim();

  if(!termo) return [];

  const url =
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(termo)}&type=video&maxResults=30&key=${YOUTUBE_API_KEY}`;

  try{

    const res =
      await fetch(url);

    const data =
      await res.json();

    const box =
      document.getElementById(
        "youtubeBuscaBox"
      );

    const resultadosBox =
      document.getElementById(
        "youtubeResultados"
      );

    // 🔥 RESULTADOS
    const resultadosNovela =
      (data.items || []).map(v => ({

        videoId:
          v.id.videoId,

        titulo:
          v.snippet.title,

        thumb:
          v.snippet.thumbnails.medium.url

      }));

    // 🔥 ORDENA CAPÍTULOS
    resultadosNovela.sort((a,b)=>{

      const na =
        parseInt(
          a.titulo.match(/\d+/)?.[0] || 0
        );

      const nb =
        parseInt(
          b.titulo.match(/\d+/)?.[0] || 0
        );

      return na - nb;

    });

    // 🔥 RETORNO INTERNO
    // novelas
    if(busca){

      return resultadosNovela;

    }

    // 🔥 NADA ENCONTRADO
    if(!resultadosNovela.length){

      box.style.display =
        "block";

      resultadosBox.innerHTML =
        "<div class='vazio'>Nada encontrado.</div>";

      return [];

    }

    // 🔥 MOSTRA RESULTADOS
    box.style.display =
      "block";

    resultadosBox.innerHTML =
      resultadosNovela.map(v => `

        <div class="movie"
          onclick="abrirPlayer(
            '${v.videoId}',
            '${v.titulo.replace(/'/g,"")}',
            null
          )">

          <img src="${v.thumb}">

          <div class="movie-title">
            ${v.titulo}
          </div>

        </div>

      `).join("");

    return resultadosNovela;

  }catch(e){

    console.error(e);

    return [];

  }

}

 function ativarBloqueioTempoReal(clienteId) {

  if (!clienteId) return;

  try {
    if (canalTempoReal) {
      supabaseClient.removeChannel(canalTempoReal);
    }
  } catch (e) {}

  canalTempoReal = supabaseClient

    .channel("cliente-status-" + clienteId)

    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "admin_clientes",
        filter: `id=eq.${clienteId}`
      },

      async (payload) => {

        const novo = payload.new || {};

        // 🔥 BLOQUEIO CLIENTE
        if (novo.ativo === false) {
          await derrubarUsuario(
            "Seu acesso foi bloqueado pelo admin."
          );
        }

      }
    )

    // 🔥 FILA / CONTROLE TV
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "controle_tv",
        filter: `sala=eq.${SALA_TV}`
      },

      async (payload) => {

        const cmd = payload.new;

        if(!cmd) return;

        // 🔥 TOCAR AGORA
        if(cmd.comando === "abrir"){

          await abrirPlayer(
            cmd.video_id,
            cmd.titulo || "YouTube",
            cmd.filme_id || null
          );

        }

        // 🔥 ADICIONAR FILA
        if(cmd.comando === "add_lista"){

          if(!window.minhaLista){
            window.minhaLista = [];
          }

          window.minhaLista.push({
            video_id: cmd.video_id,
            titulo: cmd.titulo,
            filme_id: cmd.filme_id || null
          });

          renderMinhaLista();

        }

        // 🔥 PRÓXIMO
        if(cmd.comando === "proximo"){

          abrirProximoFilme();

        }

      }
    )

    .subscribe();
}

// 🔥 CONTROLE TV TEMPO REAL

async function forcarFullscreen(){
  try{
    const el = document.getElementById("playerArea") || document.documentElement;

    if (el.requestFullscreen && !document.fullscreenElement) {
      await el.requestFullscreen();
      console.log("📺 Fullscreen ativado");
    }
  }catch(e){
    console.warn("❌ Falha fullscreen:", e);
  }
}

  function iniciarControleTV(){
  if(canalControleTV){
    supabaseClient.removeChannel(canalControleTV);
  }

  canalControleTV = supabaseClient
  .channel("controle-tv-" + SALA_TV)
  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "controle_tv",
      filter: `sala=eq.${SALA_TV}`
    },
    async (payload) => {

      const c = payload.new;
      if(!c) return;

     if(c.comando === "play"){

  try{

    if(window.ytPlayer){

      window.ytPlayer.unMute();

      window.ytPlayer.setVolume(100);

      window.ytPlayer.playVideo();

    }

  }catch(e){
    console.log(e);
  }

}

      if(c.comando === "pause"){

  try{

    if(window.ytPlayer){

      window.ytPlayer.pauseVideo();

    }

  }catch(e){
    console.log(e);
  }

}

      if(c.comando === "volume" && window.ytPlayer){

        const vol = Math.max(
          0,
          Math.min(100, Number(c.volume || 0))
        );

        if(typeof ytPlayer.setVolume === "function"){
          ytPlayer.setVolume(vol);
        }

        if(vol === 0 && typeof ytPlayer.mute === "function"){
          ytPlayer.mute();
        }

        if(vol > 0 && typeof ytPlayer.unMute === "function"){
          ytPlayer.unMute();
        }

        console.log("🔊 Volume:", vol);
      }

      if(c.comando === "abrir"){

        await abrirPlayer(
          c.video_id,
          c.titulo || "Assistindo",
          c.filme_id || null
        );

        try{
          await forcarFullscreen();
        }catch(e){
          console.warn("Tela cheia bloqueada");
        }
      }

      if(c.comando === "proximo"){
        abrirProximoFilme();
      }

      if(c.comando === "fechar"){
        fecharPlayer();
      }

      if(c.comando === "repetir"){
        toggleRepetir();
      }

      // 🔥 FILA
      if(c.comando === "add_lista"){

        window.minhaLista.push({
          video_id: c.video_id,
          titulo: c.titulo,
          filme_id: c.filme_id || null
        });

        console.log(
          "➕ Adicionado na fila:",
          c.titulo
        );
      }

      if(c.comando === "play_lista"){
        tocarLista();
      }

      if(c.comando === "loop_lista"){
        window.repetirLista =
          !window.repetirLista;

        console.log(
          "🔁 Loop:",
          window.repetirLista
        );
      }

      if(c.comando === "fullscreen"){
        try{
          await forcarFullscreen();
        }catch(e){
          console.warn("❌ Fullscreen bloqueado");
        }
      }

    }
  )

 .subscribe();

}

  function resetToquesAdmin() {

  async function abrirPainelAdmin() {
    const senha = prompt("Digite a senha secreta do painel:");
    if (!senha) return;

    if (senha !== SENHA_ADMIN_SECRETA) {
      alert("Senha inválida.");
      return;
    }

    const { data: authData, error: authError } = await supabaseClient.auth.getUser();

    if (authError || !authData?.user) {
      alert("Sessão inválida.");
      location.href = "index.html";
      return;
    }

    const { data: admin, error } = await supabaseClient
      .from("admin_filmes")
      .select("*")
      .eq("user_id", authData.user.id)
      .maybeSingle();

    if (error || !admin) {
      alert("Este usuário não é admin.");
      return;
    }

    if (admin.ativo === false) {
      alert("Admin desativado.");
      await supabaseClient.auth.signOut();
      location.href = "index.html";
      return;
    }

    location.href = "painel-admin.html";
  }

  document.getElementById("btnAdminSecreto").addEventListener("click", async () => {
    toquesAdmin++;

    if (timerToquesAdmin) clearTimeout(timerToquesAdmin);
    timerToquesAdmin = setTimeout(resetToquesAdmin, 2000);

function liberarFullscreenUmaVez() {
  if (fullscreenLiberado) return;

  document.documentElement.requestFullscreen()
    .then(() => {
      return document.exitFullscreen();
    })
    .then(() => {
      fullscreenLiberado = true;
      console.log("✅ Fullscreen liberado");
    })
    .catch(() => {
      console.warn("⚠️ Clique não liberou fullscreen");
    });

  // remove depois do primeiro clique
  document.removeEventListener("click", liberarFullscreenUmaVez);
}
