<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Filmes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}
    :root{
      --primary:#e50914;
      --secondary:#b20710;
      --bg:#141414;
      --card:#1c1c1c;
      --text:#ffffff;
      --muted:#94a3b8;
      --bg-filmes:url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1600&q=80');
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.84), rgba(0,0,0,.92)),
        var(--bg-filmes) center/cover fixed no-repeat;
    }

    header{
      background:rgba(0,0,0,.86);
      backdrop-filter:blur(8px);
      padding:16px 20px;
      font-size:28px;
      font-weight:bold;
      color:var(--primary);
      text-align:center;
      position:sticky;
      top:0;
      z-index:20;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .top-bar{
      position:relative;
      max-width:1400px;
      margin:0 auto;
    }

    .btn-sair{
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .user-info{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      padding:10px 16px 0;
    }

    .container{
      padding:20px;
      max-width:1400px;
      margin:0 auto;
    }

    .player{
      margin-top:10px;
      position:relative;
      padding-top:56.25%;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    iframe{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:none;
    }

    .titulo-player{
      margin:16px 0 6px;
      font-size:26px;
      font-weight:800;
    }

    .descricao-player{
      color:#cbd5e1;
      line-height:1.6;
      margin-bottom:24px;
      white-space:pre-line;
    }

    .subtitulo{
      font-size:24px;
      margin:0 0 16px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:16px;
      margin-top:20px;
    }

    .movie{
      cursor:pointer;
      background:rgba(28,28,28,.88);
      border-radius:14px;
      overflow:hidden;
      transition:.2s;
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(6px);
    }

    .movie:hover{
      transform:translateY(-4px);
      border-color:color-mix(in srgb, var(--primary) 36%, transparent);
    }

    .movie img{
      width:100%;
      height:240px;
      object-fit:cover;
      display:block;
      background:#0f172a;
    }

    .movie-title{
      font-size:15px;
      padding:12px 12px 6px;
      line-height:1.4;
      font-weight:700;
    }

    .movie-cat{
      color:var(--muted);
      font-size:12px;
      padding:0 12px 12px;
    }

    .vazio{
      color:var(--muted);
      font-size:16px;
      padding:20px 0;
    }

    .loading-tela{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#cbd5e1;
      font-size:18px;
      background:#141414;
    }

    @media (max-width:700px){
      header{
        font-size:22px;
        padding:14px 12px;
      }
      .btn-sair{
        position:static;
        transform:none;
        display:block;
        margin:10px auto 0;
      }
      .top-bar{
        display:flex;
        flex-direction:column;
        align-items:center;
      }
      .titulo-player{
        font-size:22px;
      }
      .movie img{
        height:220px;
      }
    }
  </style>
</head>
<body>
  <div id="loadingTela" class="loading-tela">Verificando acesso...</div>

  <div id="conteudo" style="display:none;">
    <header>
      <div class="top-bar">
        <div id="nomeSiteTopo">FF FILMES ONLINE</div>
        <button class="btn-sair" onclick="logout()">Sair</button>
      </div>
    </header>

    <div id="userInfo" class="user-info"></div>

    <div class="container">
      <div class="player">
        <iframe id="mainPlayer" src="" allowfullscreen></iframe>
      </div>

      <div id="tituloPlayer" class="titulo-player">Carregando...</div>
      <div id="descricaoPlayer" class="descricao-player"></div>

      <h2 class="subtitulo">Catálogo</h2>
      <div id="gallery" class="gallery"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function aplicarTema(config) {
      if (!config) return;

      document.documentElement.style.setProperty("--primary", config.cor_primaria || "#e50914");
      document.documentElement.style.setProperty("--secondary", config.cor_secundaria || "#b20710");
      document.documentElement.style.setProperty("--bg", config.cor_fundo || "#141414");
      document.documentElement.style.setProperty("--card", config.cor_card || "#1c1c1c");
      document.documentElement.style.setProperty("--text", config.cor_texto || "#ffffff");

      if (config.bg_filmes) {
        document.documentElement.style.setProperty("--bg-filmes", `url('${config.bg_filmes}')`);
      }

      if (config.nome_site) {
        document.title = config.nome_site;
        document.getElementById("nomeSiteTopo").textContent = config.nome_site;
      }
    }

    function escaparTexto(texto) {
      return String(texto || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\n/g, "\\n")
        .replace(/\r/g, "");
    }

    function playMovie(videoId, titulo = "", descricao = "") {
      const player = document.getElementById("mainPlayer");
      const tituloPlayer = document.getElementById("tituloPlayer");
      const descricaoPlayer = document.getElementById("descricaoPlayer");

      player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      tituloPlayer.textContent = titulo || "Sem título";
      descricaoPlayer.textContent = descricao || "";

      document.querySelector(".player").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    async function protegerPagina() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error || !data?.session?.user) {
          window.location.href = "index.html";
          return;
        }

        document.getElementById("loadingTela").style.display = "none";
        document.getElementById("conteudo").style.display = "block";

        await mostrarUsuario();
        await carregarConfigTema();
        await carregarFilmes();
      } catch (e) {
        window.location.href = "index.html";
      }
    }

    async function mostrarUsuario() {
      try {
        const { data } = await supabaseClient.auth.getUser();

        if (data?.user) {
          document.getElementById("userInfo").textContent =
            "Logado como: " + (data.user.email || "usuário");
        }
      } catch (e) {}
    }

    async function carregarConfigTema() {
      try {
        const { data, error } = await supabaseClient
          .from("config_filmes")
          .select("*")
          .order("id", { ascending: true })
          .limit(1);

        if (error) return;
        if (data && data.length > 0) aplicarTema(data[0]);
      } catch (e) {}
    }

    async function carregarFilmes() {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = '<div class="vazio">Carregando filmes...</div>';

      try {
        const { data, error } = await supabaseClient
          .from("filmes")
          .select("*")
          .eq("ativo", true)
          .order("id", { ascending: false });

        if (error) throw error;

        const filmes = data || [];

        if (!filmes.length) {
          document.getElementById("mainPlayer").src = "";
          document.getElementById("tituloPlayer").textContent = "Nenhum filme cadastrado";
          document.getElementById("descricaoPlayer").textContent = "";
          gallery.innerHTML = '<div class="vazio">Nenhum filme ativo cadastrado.</div>';
          return;
        }

        const primeiro = filmes[0];
        playMovie(primeiro.video_id, primeiro.titulo, primeiro.descricao || "");

        gallery.innerHTML = filmes.map(filme => `
          <div class="movie" onclick="playMovie('${escaparTexto(filme.video_id)}', '${escaparTexto(filme.titulo)}', '${escaparTexto(filme.descricao || "")}')">
            <img src="${filme.thumb || ''}" alt="${filme.titulo || ''}">
            <div class="movie-title">${filme.titulo || ''}</div>
            <div class="movie-cat">${filme.categoria || "Sem categoria"}</div>
          </div>
        `).join("");
      } catch (error) {
        gallery.innerHTML = `<div class="vazio" style="color:#fca5a5">${error.message || "Erro ao carregar filmes."}</div>`;
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (!session) {
        window.location.href = "index.html";
      }
    });

    protegerPagina();
  </script>
</body>
</html>
