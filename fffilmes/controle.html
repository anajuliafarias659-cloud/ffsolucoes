<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FF</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;padding:16px}

.container{max-width:900px;margin:auto}

h1{text-align:center;color:#ef4444}

.card{
  background:#0f172a;
  border-radius:16px;
  padding:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

button{
  padding:14px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-green{background:#16a34a}
.btn-yellow{background:#f59e0b;color:#000}
.btn-blue{background:#2563eb}
.btn-red{background:#dc2626}

.layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

#listaFilmes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.filme-card{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}

.filme-card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.filme-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:8px;
  background:linear-gradient(transparent, rgba(0,0,0,.8));
}

.filme-card.expandido{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.3);
  z-index:9999;
  width:80%;
  max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.9);
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

.oculto{display:none}
</style>
</head>

<body>

<div class="container">

<h1>📱 Controle FF</h1>

<div id="boxLogin" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn-red" onclick="login()">Entrar</button>
</div>

<div id="area" class="layout oculto">

  <!-- CONTROLE -->
  <div class="card">
    <h3>🎮 Controle</h3>

    <div class="grid">
      <button class="btn-green" onclick="enviarComando('play')">▶</button>
      <button class="btn-yellow" onclick="enviarComando('pause')">⏸</button>
      <button class="btn-blue" onclick="enviarComando('proximo')">⏭</button>
      <button class="btn-red" onclick="enviarComando('fechar')">⛔</button>
      <button class="btn-blue" onclick="enviarComando('fullscreen')">🖥</button>
    </div>

    <div style="margin-top:10px">
      <label>🔊 Volume: <span id="vol">70</span>%</label>
      <input type="range" min="0" max="100" value="70"
        oninput="alterarVolume(this.value)">
    </div>
  </div>

  <!-- FILMES -->
  <div class="card">
    <h3>🎬 Filmes</h3>
    <input id="busca" placeholder="Buscar..." oninput="renderFilmes()">
    <div id="listaFilmes"></div>
  </div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let filmes = [];
let SALA = "sala1";

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("boxLogin").classList.add("oculto");
  document.getElementById("area").classList.remove("oculto");

  carregarFilmes();
}

/* COMANDOS */
async function enviarComando(comando, extra={}){
  await supabaseClient.from("controle_tv").insert({
    sala:SALA,
    comando,
    ...extra
  });
}

/* VOLUME */
async function alterarVolume(v){
  document.getElementById("vol").innerText = v;

  await enviarComando("volume", {
    volume:Number(v)
  });
}

/* FILMES */
async function carregarFilmes(){
  const { data } = await supabaseClient
    .from("filmes")
    .select("*")
    .eq("ativo", true);

  filmes = data || [];
  renderFilmes();
}

function renderFilmes(){
  const termo = document.getElementById("busca").value.toLowerCase();

  const lista = filmes.filter(f =>
    (f.titulo || "").toLowerCase().includes(termo)
  );

  document.getElementById("listaFilmes").innerHTML = lista.map(f => `
    <div class="filme-card"
      onclick="expandirFilme(this,'${f.video_id}','${f.titulo}',${f.id})">

      <img src="${f.thumb}">
      <div class="filme-overlay">${f.titulo}</div>
    </div>
  `).join("");
}

/* EXPANDIR + PLAY */
async function expandirFilme(el, videoId, titulo, id){

  document.querySelectorAll(".filme-card")
    .forEach(c => c.classList.remove("expandido"));

  el.classList.add("expandido");

  await enviarComando("abrir", {
    video_id: videoId,
    titulo,
    filme_id: id
  });

  setTimeout(()=>{
    el.classList.remove("expandido");
  },1200);
}
</script>

</body>
</html>
