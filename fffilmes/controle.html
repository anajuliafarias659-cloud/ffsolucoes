<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FF</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;padding:16px}
.container{max-width:420px;margin:auto}

h1{text-align:center;color:#ef4444}

.card{
  background:#0f172a;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

button{
  padding:14px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-green{background:#16a34a}
.btn-yellow{background:#f59e0b;color:#000}
.btn-blue{background:#2563eb}
.btn-red{background:#dc2626}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

.oculto{display:none}

/* FILMES */
#listaFilmes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.filme-card{
  background:#020617;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.1);
}

.filme-card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.filme-overlay{
  font-size:12px;
  padding:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>📱 Controle FF</h1>

<!-- LOGIN -->
<div id="boxLogin" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn-red" onclick="login()">Entrar</button>
</div>

<!-- AREA -->
<div id="area" class="oculto">

  <!-- CONTROLE -->
  <div class="card">
    <div class="grid">
      <button class="btn-green" onclick="enviarComando('play')">▶</button>
      <button class="btn-yellow" onclick="enviarComando('pause')">⏸</button>
      <button class="btn-blue" onclick="enviarComando('proximo')">⏭</button>
      <button class="btn-red" onclick="enviarComando('fechar')">⛔</button>
      <button class="btn-blue" onclick="enviarComando('fullscreen')">🖥</button>
      <button class="btn-blue" onclick="toggleFilmes()">🎬 Filmes</button>
    </div>

    <div style="margin-top:10px">
      <label>🔊 <span id="vol">70</span>%</label>
      <input type="range" min="0" max="100" value="70"
        oninput="alterarVolume(this.value)">
    </div>

    <button class="btn-red" style="margin-top:10px" onclick="logout()">Sair</button>
  </div>

  <!-- FILMES -->
  <div id="boxFilmes" class="card oculto">
    <input id="busca" placeholder="Buscar filme..." oninput="renderFilmes()">
    <div id="listaFilmes"></div>
  </div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let filmes = [];
let SALA = "sala1";

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert(error.message);
    return;
  }

  mostrarArea();
}

/* SESSION */
async function verificarLogin(){
  const { data } = await supabaseClient.auth.getSession();
  if(data?.session) mostrarArea();
}

/* MOSTRAR */
function mostrarArea(){
  document.getElementById("boxLogin").classList.add("oculto");
  document.getElementById("area").classList.remove("oculto");
}

/* LOGOUT */
async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

/* COMANDO */
async function enviarComando(comando, extra={}){
  await supabaseClient.from("controle_tv").insert({
    sala:SALA,
    comando,
    ...extra
  });
}

/* VOLUME */
async function alterarVolume(v){
  document.getElementById("vol").innerText = v;
  await enviarComando("volume",{volume:Number(v)});
}

/* TOGGLE FILMES */
function toggleFilmes(){
  const box = document.getElementById("boxFilmes");

  box.classList.toggle("oculto");

  if(!box.classList.contains("oculto")){
    carregarFilmes();
  }
}

/* CARREGAR FILMES */
async function carregarFilmes(){
  const { data } = await supabaseClient
    .from("filmes")
    .select("*")
    .eq("ativo", true);

  filmes = data || [];
  renderFilmes();
}

/* RENDER */
function renderFilmes(){
  const termo = document.getElementById("busca").value.toLowerCase();

  const lista = filmes.filter(f =>
    (f.titulo || "").toLowerCase().includes(termo)
  );

  document.getElementById("listaFilmes").innerHTML = lista.map(f => `
    <div class="filme-card"
      onclick="enviarComando('abrir',{video_id:'${f.video_id}',titulo:'${f.titulo}',filme_id:${f.id}})">

      <img src="${f.thumb}">
      <div class="filme-overlay">${f.titulo}</div>

    </div>
  `).join("");
}

/* INIT */
verificarLogin();
</script>

</body>
</html>
