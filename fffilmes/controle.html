<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FF</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;padding:16px}
.container{max-width:420px;margin:auto}

h1{text-align:center;color:#ef4444}

.card{
  background:#0f172a;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

button{
  padding:14px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-green{background:#16a34a}
.btn-yellow{background:#f59e0b;color:#000}
.btn-blue{background:#2563eb}
.btn-red{background:#dc2626}

.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.oculto{display:none}

/* 🎬 CARD BUSCA */
.card-filme{
  display:flex;
  align-items:center;
  justify-content:center;
  height:80px;
  font-size:28px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.1);
  transition:.2s;
}

.card-filme:hover{
  transform:scale(1.05);
  border-color:#dc2626;
}
</style>
</head>

<body>

<div class="container">

<h1>📱 Controle FF</h1>

<!-- LOGIN -->
<div id="boxLogin" class="card">
  <input id="email" class="input" placeholder="Email">
  <input id="senha" class="input" type="password" placeholder="Senha">
  <button class="btn-red" onclick="login()">Entrar</button>
</div>

<!-- AREA -->
<div id="area" class="oculto">

  <!-- CONTROLE -->
  <div class="card">
    <div class="grid">
      <button class="btn-green" onclick="enviarComando('play')">▶</button>
      <button class="btn-yellow" onclick="enviarComando('pause')">⏸</button>
      <button class="btn-blue" onclick="enviarComando('proximo')">⏭</button>
      <button class="btn-red" onclick="enviarComando('fechar')">⛔</button>
      <button class="btn-blue" onclick="enviarComando('fullscreen')">🖥</button>
    </div>

    <div style="margin-top:10px">
      <label>🔊 <span id="vol">70</span>%</label>
      <input type="range" min="0" max="100" value="70"
        oninput="alterarVolume(this.value)">
    </div>

    <button class="btn-red" style="margin-top:10px" onclick="logout()">Sair</button>
  </div>

  <!-- 🎬 CARD ÚNICO -->
  <div class="card card-filme" onclick="abrirBusca()">
    🎬
  </div>

  <!-- BUSCA -->
  <div id="boxBusca" class="card oculto">
    <input id="buscaFilme" class="input" placeholder="Digite o nome do filme">
    <button class="btn-green" onclick="buscarFilme()">Buscar e tocar</button>
  </div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let SALA = "sala1";

/* LOGIN */
async function login(){
  const email = emailEl().value;
  const senha = senhaEl().value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error) return alert(error.message);

  mostrarArea();
}

/* SESSION */
async function verificarLogin(){
  const { data } = await supabaseClient.auth.getSession();
  if(data?.session) mostrarArea();
}

/* UI */
function mostrarArea(){
  boxLogin().classList.add("oculto");
  area().classList.remove("oculto");
}

/* LOGOUT */
async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

/* CONTROLE */
async function enviarComando(comando, extra={}){
  await supabaseClient.from("controle_tv").insert({
    sala:SALA,
    comando,
    ...extra
  });
}

/* VOLUME */
async function alterarVolume(v){
  volEl().innerText = v;
  await enviarComando("volume",{volume:Number(v)});
}

/* 🎬 BUSCA */
function abrirBusca(){
  boxBusca().classList.toggle("oculto");
}

async function buscarFilme(){
  const termo = buscaFilmeEl().value.trim();
  if(!termo) return;

  // manda direto pra TV (YouTube busca)
  await enviarComando("abrir", {
    video_id: termo,
    titulo: termo
  });

  buscaFilmeEl().value = "";
  boxBusca().classList.add("oculto");
}

/* helpers */
const emailEl = ()=>document.getElementById("email");
const senhaEl = ()=>document.getElementById("senha");
const boxLogin = ()=>document.getElementById("boxLogin");
const area = ()=>document.getElementById("area");
const volEl = ()=>document.getElementById("vol");
const boxBusca = ()=>document.getElementById("boxBusca");
const buscaFilmeEl = ()=>document.getElementById("buscaFilme");

/* INIT */
verificarLogin();
</script>

</body>
</html>
