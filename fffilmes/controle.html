<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolha a sua Musia</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:Arial;
  padding:14px;
}

.fila-item{
  background:#020617;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.fila-num{
  width:34px;
  height:34px;
  border-radius:999px;
  background:#dc2626;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.fila-titulo{
  flex:1;
  font-size:14px;
}
.container{
  max-width:520px;
  margin:auto;
}

h1{
  text-align:center;
  color:#ef4444;
  margin-bottom:20px;
}

.card{
  background:#0f172a;
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#020617;
  color:#fff;
  margin-bottom:10px;
}

button{
  width:100%;
  border:none;
  border-radius:12px;
  padding:13px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:8px;
}

.btn-red{
  background:#dc2626;
}

.btn-green{
  background:#16a34a;
}

.btn-yellow{
  background:#f59e0b;
  color:#111;
}

.status{
  text-align:center;
  color:#94a3b8;
  margin-bottom:12px;
}

.filme{
  display:flex;
  gap:10px;
  background:#020617;
  border-radius:14px;
  padding:10px;
  margin-top:10px;
}

.filme img{
  width:90px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.filme-info{
  flex:1;
}

.filme-info b{
  font-size:14px;
}

.layout{
  display:flex;
  gap:14px;
  align-items:flex-start;
}

.lado-esquerdo{
  flex:1;
}

.lado-direito{
  width:320px;
  position:sticky;
  top:10px;
}

@media(max-width:900px){

  .layout{
    flex-direction:column;
  }

  .lado-direito{
    width:100%;
    position:relative;
  }

}
</style>
</head>
<body>

<div class="container">

<h1>📺 Pesquise sua Musica</h1>

<div class="status" id="status">
Conectado
</div>

<div class="layout">

  <div class="lado-esquerdo">

    <div class="card">

      <input
        id="buscaYoutube"
        placeholder="Pesquisar música ou vídeo"
      >

      <button
        class="btn-red"
        onclick="buscarYoutube()">

        🔎 Buscar

      </button>

    </div>

    <div id="resultadoYoutube"></div>

  </div>

  <div class="lado-direito">

    <div class="card">

      <h3>📃 Fila da TV</h3>

      <div id="listaFila"></div>

    </div>

  </div>

</div>

<script>
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient =
  supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

const SALA = "sala1";

const YOUTUBE_API_KEY = "AIzaSyBRTkvh_4dNLYGzDzopf_pPg7fDPwBoG50";
let filaAtual = [];
const FILA_KEY = "fila_tv";

function salvarFila(){
  localStorage.setItem(
    FILA_KEY,
    JSON.stringify(filaAtual)
  );
}

function carregarFila(){

  const salva =
    localStorage.getItem(FILA_KEY);

  if(!salva) return;

  try{
    filaAtual = JSON.parse(salva) || [];
  }catch(e){
    filaAtual = [];
  }

  renderFila();
}

function status(txt){
  document.getElementById("status").innerText = txt;
}

async function enviarComando(comando, extra = {}){

  const { error } = await supabaseClient
    .from("controle_tv")
    .insert({
      sala: SALA,
      comando,
      video_id: extra.video_id || null,
      titulo: extra.titulo || null,
      filme_id: null
    });

  if(error){
    alert(error.message);
    return;
  }
}

function renderFila(){

  const box =
    document.getElementById("listaFila");

  if(!filaAtual.length){

    box.innerHTML =
      "<div style='color:#94a3b8'>Fila vazia</div>";

    return;
  }

  box.innerHTML =
    filaAtual.map((item, i) => `

      <div class="fila-item">

        <div class="fila-num">
          ${i + 1}
        </div>

        <div class="fila-titulo">
          ${i === 0 ? "🎵 Tocando:" : "⏭️ Próxima:"}
          <br>
          <b>${item.titulo}</b>
        </div>

      </div>

    `).join("");
}

async function tocarYoutube(videoId, titulo){

  await enviarComando("abrir", {
    video_id: videoId,
    titulo: titulo
  });

  // remove duplicados
  filaAtual = filaAtual.filter(
    item => item.titulo !== titulo
  );

  // adiciona no topo
  filaAtual.unshift({
    titulo,
    videoId
  });

  // remove músicas antigas do topo
  if(filaAtual.length > 1){

    filaAtual = [
      filaAtual[0],
      ...filaAtual.slice(1)
    ];

  }

  renderFila();
  salvarFila();

  status("📺 Tocando: " + titulo);
}
async function adicionarFilaYoutube(videoId, titulo){

  await enviarComando("add_lista", {
    video_id: videoId,
    titulo: titulo
  });

  filaAtual.push({
  titulo,
  videoId
});

renderFila();
salvarFila();

  status("➕ Adicionado à fila");
}

async function buscarYoutube(){

  const termo =
    document
    .getElementById("buscaYoutube")
    .value
    .trim();

  if(!termo){
    alert("Digite algo");
    return;
  }

  document
    .getElementById("resultadoYoutube")
    .innerHTML = "Buscando...";

  const url =
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(termo)}&type=video&maxResults=10&key=${YOUTUBE_API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  if(!data.items){

    document
      .getElementById("resultadoYoutube")
      .innerHTML = "Erro ao buscar";

    return;
  }

  document
    .getElementById("resultadoYoutube")
    .innerHTML = data.items.map(v => {

      const videoId = v.id.videoId;
      const titulo = v.snippet.title;
      const thumb = v.snippet.thumbnails.medium.url;

      return `

      <div class="filme">

        <img src="${thumb}">

        <div class="filme-info">

          <b>${titulo}</b>

          <button
  class="btn-green"
  onclick='tocarYoutube(
    ${JSON.stringify(videoId)},
    ${JSON.stringify(titulo)}
  )'>

  ▶ Tocar Agora

</button>

          <button
  class="btn-yellow"
  onclick='adicionarFilaYoutube(
    ${JSON.stringify(videoId)},
    ${JSON.stringify(titulo)}
  )'>

  ➕ Adicionar à fila

</button>

        </div>

      </div>

      `;

    }).join("");
}

supabaseClient
  .channel("fila-tv")

  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "controle_tv",
      filter: `sala=eq.${SALA}`
    },

    (payload) => {

      const cmd = payload.new;

      if(!cmd) return;

      // quando tocar
      if(cmd.comando === "abrir"){

  // remove música que entrou
  if(cmd.comando === "abrir"){

  // remove música atual e duplicadas
  filaAtual = filaAtual.filter(
    item => item.videoId !== cmd.video_id
  );

  // remove quem estava tocando
  if(filaAtual.length){
    filaAtual.shift();
  }

  // coloca nova música no topo
  filaAtual.unshift({
    titulo: cmd.titulo,
    videoId: cmd.video_id
  });

  renderFila();
  salvarFila();
}
if(cmd.comando === "proximo"){

  if(filaAtual.length > 1){

    // remove atual
    filaAtual.shift();

  }

  renderFila();
  salvarFila();
}
    }

  )

  .subscribe();
carregarFila();
</script>
</body>
</html>
