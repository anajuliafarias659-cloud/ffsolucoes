<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Simples | FF Filmes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;padding:16px}
.container{max-width:520px;margin:auto}

h1{text-align:center;color:#ef4444}
.card{background:#0f172a;border-radius:16px;padding:14px;margin-bottom:14px}

input{width:100%;padding:13px;border:none;border-radius:10px;background:#020617;color:#fff;margin-bottom:10px}

button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:8px;font-weight:bold;color:#fff;cursor:pointer}
.btn-red{background:#dc2626}
.btn-green{background:#16a34a}
.btn-blue{background:#2563eb}
.btn-yellow{background:#f59e0b;color:#020617}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.status{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:12px}
.oculto{display:none}

/* 🔥 GRID FILMES */
#listaFilmes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* 🎬 CARD */
.filme-card{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.filme-card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.filme-card:hover{
  transform:scale(1.05);
}

.filme-overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:10px;
  background:linear-gradient(transparent, rgba(0,0,0,.8));
}

.filme-card.expandido{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.2);
  z-index:9999;
  width:80%;
  max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}
</style>
</head>

<body>

<div class="container">

<h1>📱 Controle FF</h1>
<div id="status" class="status">Verificando login...</div>

<div id="boxLogin" class="card">
  <h3>🔐 Login</h3>
  <input id="email" type="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn-red" onclick="login()">Entrar</button>
</div>

<div id="area" class="oculto">

  <div class="card">
    <h3>🏠 Sala</h3>
    <input id="sala" placeholder="sala1">
    <button class="btn-blue" onclick="salvarSala()">Salvar</button>
  </div>

  <div class="card">
    <h3>🎮 Controle</h3>
    <div class="grid">
      <button class="btn-green" onclick="enviarComando('play')">▶ Play</button>
      <button class="btn-yellow" onclick="enviarComando('pause')">⏸ Pause</button>
      <button class="btn-blue" onclick="enviarComando('proximo')">⏭ Próximo</button>
      <button class="btn-red" onclick="enviarComando('fechar')">⛔ Fechar</button>
      <button class="btn-blue" onclick="enviarComando('fullscreen')">🖥 Tela cheia</button>
    </div>
  </div>

  <div class="card">
    <h3 onclick="toggleListaFilmes()" style="cursor:pointer">
      🎬 Filmes ▼
    </h3>

    <div id="boxListaFilmes" class="oculto">
      <input id="busca" placeholder="Buscar..." oninput="renderFilmes()">
      <div id="listaFilmes"></div>
    </div>
  </div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let SALA = "sala1";
let filmes = [];
let usuario = null;

/* LOGIN */
async function login(){
  const email = emailEl.value;
  const senha = senhaEl.value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email, password: senha
  });

  if(error) return alert(error.message);

  usuario = data.user;
  mostrarArea();
  carregarFilmes();
}

function mostrarArea(){
  boxLogin.classList.add("oculto");
  area.classList.remove("oculto");
}

function salvarSala(){
  SALA = document.getElementById("sala").value || "sala1";
}

/* COMANDO */
async function enviarComando(comando, extra={}){
  await supabaseClient.from("controle_tv").insert({
    sala:SALA,
    comando,
    ...extra
  });

  status.innerText = "✅ " + comando;
}

/* FILMES */
async function carregarFilmes(){
  const { data } = await supabaseClient
    .from("filmes")
    .select("*")
    .eq("ativo", true);

  filmes = data || [];
  renderFilmes();
}

function toggleListaFilmes(){
  boxListaFilmes.classList.toggle("oculto");
}

function renderFilmes(){
  const termo = busca.value.toLowerCase();

  const filtrados = filmes.filter(f =>
    f.titulo?.toLowerCase().includes(termo)
  );

  listaFilmes.innerHTML = filtrados.map(f => `
    <div class="filme-card"
      onclick="expandirFilme(this,'${f.video_id}','${f.titulo}',${f.id})">

      <img src="${f.thumb}">
      <div class="filme-overlay">
        <b>${f.titulo}</b>
      </div>
    </div>
  `).join("");
}

/* 🎬 EXPANDIR + PLAY */
async function expandirFilme(el, videoId, titulo, id){

  document.querySelectorAll(".filme-card")
    .forEach(c => c.classList.remove("expandido"));

  el.classList.add("expandido");

  await enviarComando("abrir", {
    video_id: videoId,
    titulo,
    filme_id: id
  });

  setTimeout(()=>{
    el.classList.remove("expandido");
  },1500);
}
</script>

</body>
</html>
