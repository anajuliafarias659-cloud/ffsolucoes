<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFCINE - Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

.topo{
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:26px;
  font-weight:900;
  color:#22c55e;
}

.hero{
  padding:16px;
}

.hero h1{
  font-size:28px;
  margin-bottom:10px;
  line-height:1.2;
}

.hero span{
  color:#22c55e;
}

.hero p{
  color:#cbd5e1;
  margin-bottom:14px;
}

.banner-grid{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px 0 6px;
  scrollbar-width:none;
}

.banner-grid::-webkit-scrollbar{
  display:none;
}

.banner-card{
  min-width:220px;
  width:220px;
  height:260px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  background:#0f172a;
  flex:0 0 220px;
}

.banner-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.banner-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(2,6,23,.95), rgba(2,6,23,.15));
}

.banner-info{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  z-index:2;
}

.banner-info strong{
  display:block;
  font-size:17px;
  margin-bottom:6px;
}

.banner-info span{
  display:block;
  font-size:12px;
  color:#dbe5f3;
  margin-bottom:8px;
  line-height:1.4;
}

.play-btn{
  background:#fff;
  color:#000;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.login-card{
  margin:20px 16px 24px;
  background:#0f172a;
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
}

.login-card h2{
  margin-bottom:8px;
}

.login-card p{
  color:#94a3b8;
  font-size:14px;
  margin-bottom:12px;
}

label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
  font-size:14px;
  font-weight:700;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:#020617;
  color:#fff;
  outline:none;
}

input:focus{
  border-color:#22c55e;
}

.btn-login{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#loginStatus{
  margin-top:10px;
  font-size:13px;
  color:#94a3b8;
  min-height:18px;
}

@media(min-width:900px){
  .container{
    max-width:1200px;
    margin:0 auto;
    display:grid;
    grid-template-columns:1.1fr .9fr;
    gap:24px;
    align-items:start;
    padding:0 16px 30px;
  }

  .hero{
    padding:16px 0;
  }

  .login-card{
    margin:16px 0 0;
  }

  .banner-card{
    min-width:250px;
    width:250px;
    height:300px;
    flex:0 0 250px;
  }
}
</style>
</head>

<body>

<div class="topo">
  <div class="logo">FFCINE</div>
</div>

<div class="container">
  <div class="hero">
    <h1>Assista no <span>FFCINE</span></h1>
    <p>Clique em play para ir direto ao login e entrar na plataforma.</p>
    <div class="banner-grid" id="bannerGrid"></div>
  </div>

  <div class="login-card">
    <h2>Entrar</h2>
    <p>Faça login para acessar seus filmes.</p>

    <form id="formLogin">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" required>

      <button class="btn-login" type="submit">Entrar</button>
      <div id="loginStatus"></div>
    </form>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const FALLBACK_BANNERS = [
  {
    titulo: "Noite de Cinema",
    descricao: "Uma experiência bonita para sua plataforma.",
    thumb: "https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=900&q=80"
  },
  {
    titulo: "Filmes Online",
    descricao: "Catálogo organizado e moderno.",
    thumb: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=900&q=80"
  },
  {
    titulo: "Visual de Cinema",
    descricao: "Layout com cara de streaming.",
    thumb: "https://images.unsplash.com/photo-1478720568477-152d9b164e26?auto=format&fit=crop&w=900&q=80"
  }
];

let poolFilmes = [];
let trocaTimer = null;

function escaparHtml(texto){
  return String(texto || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function embaralhar(lista){
  const arr = [...lista];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function irParaLogin(){
  const login = document.querySelector(".login-card");
  const status = document.getElementById("loginStatus");
  const campoEmail = document.getElementById("email");

  if(status){
    status.textContent = "Faça login para assistir 🍿";
  }

  if(login){
    login.scrollIntoView({ behavior:"smooth", block:"start" });
  }

  setTimeout(() => {
    if(campoEmail) campoEmail.focus();
  }, 500);
}

function renderBanners(lista){
  const grid = document.getElementById("bannerGrid");
  if(!grid) return;

  grid.innerHTML = lista.map(f => `
    <div class="banner-card">
      <img src="${escaparHtml(f.thumb || "")}" alt="${escaparHtml(f.titulo || "Filme")}">
      <div class="banner-info">
        <strong>${escaparHtml(f.titulo || "Filme")}</strong>
        <span>${escaparHtml(f.descricao || "Confira esse filme disponível.")}</span>
        <button class="play-btn" type="button" onclick="irParaLogin()">▶ Play</button>
      </div>
    </div>
  `).join("");
}

function iniciarTroca(){
  if(trocaTimer) clearInterval(trocaTimer);

  trocaTimer = setInterval(() => {
    if(!poolFilmes.length) return;
    renderBanners(embaralhar(poolFilmes).slice(0, 3));
  }, 10000);
}

async function carregarBanners(){
  try{
    const { data, error } = await supabase
      .from("filmes")
      .select("*")
      .limit(50);

    if(error){
      console.error("Erro ao buscar filmes:", error);
      poolFilmes = FALLBACK_BANNERS;
      renderBanners(poolFilmes);
      iniciarTroca();
      return;
    }

    const lista = (data || []).filter(f => f.thumb);

    if(!lista.length){
      poolFilmes = FALLBACK_BANNERS;
      renderBanners(poolFilmes);
      iniciarTroca();
      return;
    }

    poolFilmes = lista;
    renderBanners(embaralhar(poolFilmes).slice(0, 3));
    iniciarTroca();

  }catch(err){
    console.error("Falha geral:", err);
    poolFilmes = FALLBACK_BANNERS;
    renderBanners(poolFilmes);
    iniciarTroca();
  }
}

document.getElementById("formLogin").addEventListener("submit", async function(e){
  e.preventDefault();

  const emailInput = document.getElementById("email");
  const senhaInput = document.getElementById("senha");
  const loginStatus = document.getElementById("loginStatus");

  const email = emailInput.value.trim();
  const senha = senhaInput.value;

  loginStatus.textContent = "Entrando...";

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if(error){
    loginStatus.textContent = "";
    alert(error.message || "Erro no login");
    return;
  }

  loginStatus.textContent = "Login realizado com sucesso.";
  window.location.href = "filmes.html";
});

carregarBanners();
</script>

</body>
</html>
