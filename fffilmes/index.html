<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- 🔥 ESSA LINHA É A MAIS IMPORTANTE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FFCINE - Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  max-width:100%;
}

html,body{
  width:100%;
  overflow-x:hidden;
}

/* VARIAVEIS */
:root{
  --primary:#22c55e;
  --secondary:#16a34a;
  --bg:#020617;
  --card:rgba(15,23,42,.82);
  --text:#ffffff;
  --muted:#b6c2d1;
  --line:rgba(255,255,255,.08);
}

/* BODY */
body{
  font-family:Arial;
  color:#fff;
  background:#020617;
}

/* TOPO */
.topo{
  padding:16px;
  display:flex;
  justify-content:space-between;
}

.logo{
  font-size:22px;
  font-weight:900;
  color:#22c55e;
}

/* CONTAINER */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:15px;
}

/* HERO */
.hero h1{
  font-size:32px;
  margin-bottom:10px;
}

.hero p{
  font-size:14px;
}

/* BANNERS */
.banner-grid{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.banner-card{
  min-width:240px;
  height:260px;
  background:#111;
  border-radius:16px;
  overflow:hidden;
}

.banner-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOGIN */
.login-wrap{
  display:flex;
  justify-content:center;
}

.login-card{
  width:100%;
  max-width:400px;
  background:#0f172a;
  padding:20px;
  border-radius:20px;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}

/* 🔥 RESPONSIVO FORTE */
@media(max-width:900px){

  .container{
    grid-template-columns:1fr;
  }

  .login-wrap{
    justify-content:center;
  }

}

/* 🔥 CELULAR TOP */
@media(max-width:600px){

  .hero h1{
    font-size:24px;
  }

  .banner-card{
    min-width:180px;
    height:220px;
  }

  .login-card{
    padding:15px;
  }

}

</style>
</head>

<body>

<header class="topo">
  <div class="logo">FFCINE</div>
</header>

<div class="container">

  <div class="hero">
    <h1>Entre no FFCINE</h1>
    <p>Assista filmes do YouTube em um visual moderno</p>

    <div class="banner-grid" id="bannerGrid"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <h2>Login</h2>

      <form id="formLogin">
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
      </form>

    </div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* BANNERS */
async function carregarBanners(){
  const { data } = await supabaseClient
    .from("filmes")
    .select("*")
    .limit(10);

  const grid = document.getElementById("bannerGrid");

  grid.innerHTML = data.map(f => `
    <div class="banner-card">
      <img src="${f.thumb}">
    </div>
  `).join("");
}

carregarBanners();

/* LOGIN */
document.getElementById("formLogin").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert(error.message);
    return;
  }

  location.href = "filmes.html";
});
</script>

</body>
</html>
