<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Filmes - Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --primary:#e50914;
  --secondary:#b20710;
  --bg:#020617;
  --card:#0f172a;
  --text:#ffffff;
  --muted:#94a3b8;
  --line:rgba(255,255,255,.08);
  --shadow:0 20px 60px rgba(0,0,0,.45);
  --bg-login:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80');
}

body{
  min-height:100vh;
  font-family:Arial;
  color:var(--text);
  background:
    linear-gradient(rgba(2,6,23,.78), rgba(2,6,23,.93)),
    var(--bg-login) center/cover no-repeat fixed;
}

.topo{
  padding:22px;
  display:flex;
  justify-content:space-between;
}

.logo{
  font-size:30px;
  font-weight:900;
  color:var(--primary);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.login-card{
  background:rgba(15,23,42,.82);
  padding:20px;
  border-radius:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo" id="logoTopo">Filmes Online</div>
</header>

<div class="container">
  <div class="login-card">
    <h2>Login</h2>

    <form id="formLogin">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="senha" placeholder="Senha">
      <button>Entrar</button>
    </form>
  </div>
</div>

<script>
const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 🔥 CARREGA CONFIG CERTO (FUNCIONA LOGADO E DESLOGADO)
async function carregarConfigTemaPadrao(){

  const { data: userData } = await supabaseClient.auth.getUser();

  let adminId = null;

  // 👉 SE ESTIVER LOGADO
  if(userData?.user){
    const { data: cliente } = await supabaseClient
      .from("admin_clientes")
      .select("admin_id")
      .eq("user_id", userData.user.id)
      .single();

    if(cliente){
      adminId = cliente.admin_id;
    }
  }

  let config = null;

  // 👉 SE NÃO TEM ADMIN (VISITANTE)
  if(!adminId){
    const { data } = await supabaseClient
      .from("config_filmes")
      .select("*")
      .limit(1)
      .single();

    config = data;
  } else {
    // 👉 SE TEM ADMIN
    const { data } = await supabaseClient
      .from("config_filmes")
      .select("*")
      .eq("admin_id", adminId)
      .single();

    config = data;
  }

  // 👉 APLICA
  if(config){
    aplicarTema(config);
  }
}

// 🔥 APLICA TEMA
function aplicarTema(config){
  if(!config) return;

  document.documentElement.style.setProperty("--primary", config.cor_primaria || "#e50914");
  document.documentElement.style.setProperty("--secondary", config.cor_secundaria || "#b20710");

  if(config.bg_login){
    document.documentElement.style.setProperty("--bg-login", `url('${config.bg_login}')`);
  }

  if(config.nome_site){
    document.title = config.nome_site;
    document.getElementById("logoTopo").textContent = config.nome_site;
  }
}

// 🔥 LOGIN
document.getElementById("formLogin").addEventListener("submit", async(e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    alert("Erro no login");
    return;
  }

  location.href = "filmes.html";
});

// 🔥 CHAMA SEMPRE
carregarConfigTemaPadrao();

</script>

</body>
</html>
