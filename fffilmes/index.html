<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFCINE - Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:#020617;
  color:#fff;
}

/* ===== TOPO ===== */
.topo{
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:26px;
  font-weight:900;
  color:#22c55e;
}

/* ===== HERO ===== */
.hero{
  padding:16px;
}

.hero h1{
  font-size:28px;
  margin-bottom:10px;
}

.hero span{color:#22c55e}

/* ===== BANNER SCROLL ===== */
.banner-grid{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px 0;
}

.banner-card{
  min-width:220px;
  height:260px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

.banner-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner-info{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
}

.play-btn{
  margin-top:6px;
  background:#fff;
  color:#000;
  border:none;
  padding:6px 10px;
  border-radius:10px;
  font-weight:700;
}

/* ===== LOGIN ===== */
.login-card{
  margin:20px;
  background:#0f172a;
  padding:20px;
  border-radius:18px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:700;
}

#loginStatus{
  margin-top:10px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="topo">
  <div class="logo">FFCINE</div>
</div>

<div class="hero">
  <h1>Assista no <span>FFCINE</span></h1>

  <div class="banner-grid" id="bannerGrid"></div>
</div>

<div class="login-card">
  <h2>Entrar</h2>

  <form id="formLogin">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="senha" placeholder="Senha" required>
    <button type="submit">Entrar</button>
    <div id="loginStatus"></div>
  </form>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

/* ===== IR PARA LOGIN ===== */
function irParaLogin(){
  const login = document.querySelector(".login-card");

  document.getElementById("loginStatus").textContent = "Faça login para assistir 🍿";

  window.scrollTo({
    top: login.offsetTop - 20,
    behavior: "smooth"
  });

  setTimeout(()=>{
    document.getElementById("email").focus();
  },500);
}

/* ===== CARREGAR BANNERS ===== */
async function carregar(){
  const { data } = await supabase
    .from("filmes")
    .select("*")
    .limit(20);

  if(!data) return;

  const lista = data.filter(f => f.thumb);

  document.getElementById("bannerGrid").innerHTML =
    lista.map(f=>`
      <div class="banner-card">
        <img src="${f.thumb}">
        <div class="banner-info">
          <strong>${f.titulo}</strong>
          <br>
          <button class="play-btn" onclick="irParaLogin()">▶ Play</button>
        </div>
      </div>
    `).join("");
}

/* ===== LOGIN ===== */
document.getElementById("formLogin").addEventListener("submit", async(e)=>{
  e.preventDefault();

  const email = email.value;
  const senha = senha.value;

  const { error } = await supabase.auth.signInWithPassword({
    email, password: senha
  });

  if(error){
    alert("Erro login");
    return;
  }

  location.href = "filmes.html";
});

carregar();
</script>

</body>
</html>
