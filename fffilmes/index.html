<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FFCINE Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:
  linear-gradient(
    rgba(2,6,23,.88),
    rgba(2,6,23,.92)
  ),
  url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1200&q=80");

  background-size:cover;
  background-position:center;

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:Arial, Helvetica, sans-serif;

  color:#fff;

}

.login-box{

  width:100%;
  max-width:340px;

  background:rgba(15,23,42,.92);

  padding:30px 24px;

  border-radius:24px;

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 20px 60px rgba(0,0,0,.45);

}

.logo{

  text-align:center;

  font-size:38px;

  font-weight:900;

  color:#22c55e;

  margin-bottom:8px;

}

.sub{

  text-align:center;

  color:#94a3b8;

  font-size:14px;

  margin-bottom:24px;

}

input{

  width:100%;

  padding:14px;

  margin-bottom:14px;

  border:none;

  border-radius:14px;

  background:#1e293b;

  color:#fff;

  font-size:14px;

  outline:none;

}

input::placeholder{
  color:#94a3b8;
}

button{

  width:100%;

  padding:14px;

  border:none;

  border-radius:14px;

  background:#22c55e;

  color:#fff;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  transition:.2s;

}

button:hover{

  transform:scale(1.02);

}

.trial{

  margin-top:16px;

  text-align:center;

  color:#cbd5e1;

  font-size:13px;

}

.status{

  margin-top:12px;

  text-align:center;

  font-size:13px;

  color:#cbd5e1;

}

</style>
</head>

<body>

<div class="login-box">

  <div class="logo">
    FFCINE
  </div>

  <div class="sub">
    Entre para assistir filmes e séries
  </div>

  <form id="formLogin">

    <input
      type="email"
      id="email"
      placeholder="Seu e-mail"
      required
    >

    <input
      type="password"
      id="senha"
      placeholder="Sua senha"
      required
    >

    <button type="submit">
      Entrar
    </button>

  </form>

  <div class="trial">
    🎬 Teste grátis por 2 horas
  </div>

  <div class="status" id="status"></div>

</div>

<script>

const SUPABASE_URL =
"https://SEU-PROJETO.supabase.co";

const SUPABASE_ANON_KEY =
"SUA-KEY";

const supabaseClient =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

document
.getElementById("formLogin")

.addEventListener(
"submit",

async (e)=>{

  e.preventDefault();

  const email =
  document.getElementById(
    "email"
  ).value;

  const senha =
  document.getElementById(
    "senha"
  ).value;

  const status =
  document.getElementById(
    "status"
  );

  status.textContent =
  "Entrando...";

  const { error } =
  await supabaseClient.auth
  .signInWithPassword({

    email,
    password: senha

  });

  if(error){

    status.textContent =
    error.message;

    return;

  }

  // 🔥 inicia trial simples

  if(
   !localStorage.getItem(
    "ffcine_trial_inicio"
   )
  ){

    localStorage.setItem(
      "ffcine_trial_inicio",
      Date.now()
    );

  }

  status.textContent =
  "Login realizado";

  location.href =
  "filmes.html";

});

</script>

</body>
</html>
