<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FFCINE Login</title>

<link rel="manifest"
href="/fffilmes/manifest.json">

<meta name="theme-color"
content="#020617">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:Arial, Helvetica, sans-serif;

  background:
  linear-gradient(
    rgba(2,6,23,.90),
    rgba(2,6,23,.94)
  ),

  url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1400&q=80");

  background-size:cover;
  background-position:center;

  color:#fff;

  padding:20px;

}

.login-box{

  width:100%;
  max-width:360px;

  background:
  rgba(15,23,42,.94);

  border:
  1px solid
  rgba(255,255,255,.08);

  backdrop-filter:blur(12px);

  border-radius:24px;

  padding:28px 22px;

  box-shadow:
  0 20px 60px rgba(0,0,0,.45);

}

.logo{

  text-align:center;

  margin-bottom:18px;

}

.logo img{

  width:95px;

  margin:auto;

  margin-bottom:10px;

}

.logo h1{

  font-size:38px;

  color:#22c55e;

  font-weight:900;

}

.sub{

  text-align:center;

  color:#94a3b8;

  margin-bottom:22px;

  font-size:14px;

}

input{

  width:100%;

  padding:14px;

  margin-bottom:14px;

  border:none;

  border-radius:14px;

  background:#1e293b;

  color:#fff;

  font-size:14px;

  outline:none;

}

input::placeholder{

  color:#94a3b8;

}

button{

  width:100%;

  padding:14px;

  border:none;

  border-radius:14px;

  background:#22c55e;

  color:#fff;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  transition:.2s;

}

button:hover{

  transform:scale(1.02);

}

.trial{

  margin-top:16px;

  text-align:center;

  font-size:13px;

  color:#cbd5e1;

}

.status{

  margin-top:14px;

  text-align:center;

  font-size:13px;

  color:#fff;

}

.promo{

  margin-top:18px;

  background:
  rgba(255,255,255,.05);

  border:
  1px solid
  rgba(255,255,255,.08);

  padding:12px;

  border-radius:14px;

  text-align:center;

  font-size:13px;

  line-height:1.6;

}

.promo strong{

  color:#22c55e;

}

.rodape{

  margin-top:18px;

  text-align:center;

  color:#94a3b8;

  font-size:12px;

}

@media(max-width:480px){

  .login-box{

    padding:24px 18px;

  }

  .logo h1{

    font-size:32px;

  }

}

</style>
</head>

<body>

<div class="login-box">

  <div class="logo">

    <img
    src="/fffilmes/icon-192.png"
    alt="FFCINE">

    <h1>FFCINE</h1>

  </div>

  <div class="sub">

    Entre para assistir
    filmes e séries

  </div>

  <form id="formLogin">

    <input
    type="email"
    id="email"
    placeholder="Seu e-mail"
    required>

    <input
    type="password"
    id="senha"
    placeholder="Sua senha"
    required>

    <button type="submit">

      Entrar

    </button>

  </form>

  <div class="trial">

    🎬 Teste grátis por 2 horas

  </div>

  <div class="promo">

    🔥 <strong>Promoção especial</strong><br>

    Assine hoje e tenha
    acesso VIP completo.

    <br><br>

    📞 WhatsApp:<br>
    (85) 99999-9999

  </div>

  <div
  class="status"
  id="status"></div>

  <div class="rodape">

    © FFCINE Streaming

  </div>

</div>

<script>

const SUPABASE_URL =
"https://pdajixsoowcyhnjwhgpc.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

document
.getElementById("formLogin")

.addEventListener(

"submit",

async (e)=>{

  e.preventDefault();

  const email =
  document.getElementById(
    "email"
  ).value;

  const senha =
  document.getElementById(
    "senha"
  ).value;

  const status =
  document.getElementById(
    "status"
  );

  status.textContent =
  "Entrando...";

  try{

    const { error } =
    await supabaseClient.auth
    .signInWithPassword({

      email,
      password: senha

    });

    if(error){

      status.textContent =
      error.message;

      return;

    }

    // 🔥 inicia trial simples

    if(
      !localStorage.getItem(
        "ffcine_trial_inicio"
      )
    ){

      localStorage.setItem(

        "ffcine_trial_inicio",

        Date.now()

      );

    }

    status.textContent =
    "Login realizado";

    setTimeout(()=>{

      location.href =
      "filmes.html";

    }, 800);

  }

  catch(err){

    console.error(err);

    status.textContent =
    "Erro ao conectar";

  }

});

</script>

</body>
</html>
