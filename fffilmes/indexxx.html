<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FFCINE Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

font-family:Arial;

background:
linear-gradient(
rgba(2,6,23,.92),
rgba(2,6,23,.95)
),

url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1400&q=80");

background-size:cover;
background-position:center;

padding:20px;

color:#fff;

}

.box{

width:100%;
max-width:360px;

background:
rgba(15,23,42,.95);

padding:28px 22px;

border-radius:24px;

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(10px);

}

.logo{

text-align:center;

margin-bottom:18px;

}

.logo img{

width:90px;

margin-bottom:10px;

}

.logo h1{

font-size:40px;

color:#22c55e;

}

.sub{

text-align:center;

color:#94a3b8;

margin-bottom:22px;

}

input{

width:100%;

padding:14px;

margin-bottom:14px;

border:none;

border-radius:14px;

background:#1e293b;

color:#fff;

outline:none;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:#22c55e;

color:#fff;

font-weight:bold;

cursor:pointer;

margin-top:8px;

}

.cadastro{

background:#0f172a;

border:
1px solid rgba(255,255,255,.08);

}

.status{

margin-top:14px;

text-align:center;

font-size:13px;

}

</style>
</head>

<body>

<div class="box">

<div class="logo">

<img
src="/fffilmes/icon-192.png">

<h1>FFCINE</h1>

</div>

<div class="sub">

Entre para continuar

</div>

<form id="formLogin">

<input
type="email"
id="email"
placeholder="Seu e-mail"
required>

<input
type="password"
id="senha"
placeholder="Sua senha"
required>

<button type="submit">

Entrar

</button>

</form>

<button
class="cadastro"
id="btnCadastro">

Criar teste grátis

</button>

<div
class="status"
id="status"></div>

</div>

<script>

const SUPABASE_URL =
"https://pdajixsoowcyhnjwhgpc.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

document
.getElementById("btnCadastro")

.onclick = ()=>{

location.href =
"cadastro.html";

};

document
.getElementById("formLogin")

.addEventListener(

"submit",

async (e)=>{

e.preventDefault();

const email =
document.getElementById(
"email"
).value;

const senha =
document.getElementById(
"senha"
).value;

const status =
document.getElementById(
"status"
);

status.textContent =
"Entrando...";

const { error } =
await supabaseClient.auth
.signInWithPassword({

email,
password: senha

});

if(error){

status.textContent =
"Email ou senha inválidos";

return;

}

status.textContent =
"Login realizado";

setTimeout(()=>{

location.href =
"filmes.html";

}, 800);

});

</script>

</body>
</html>
