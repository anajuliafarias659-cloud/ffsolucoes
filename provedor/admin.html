<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel NOC Provedor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

/* 🔐 VERIFICA LOGIN */

const { data:{session} } = await supabase.auth.getSession()

if(!session){
 location.href="/auth/login.html"
}

let appId = null

async function carregarApp(){

 const { data: { session } } = await supabase.auth.getSession()

 if(!session){
  window.location.href="/auth/login.html"
  return
 }

 const userId = session.user.id

 const { data } = await supabase
 .from("users_app")
 .select("app_id")
 .eq("user_id",userId)
 .single()

 if(!data){
  alert("Usuário sem APP")
  return
 }

 appId = data.app_id

 dashboard()
 carregarTabela()
 carregarSelects()

}

/* DASHBOARD */

async function dashboard(){

 const { count:pops } = await supabase
 .from("pops_provedor")
 .select("*",{count:"exact",head:true})
 .eq("app_id",appId)

 const { count:equip } = await supabase
 .from("equipamentos_provedor")
 .select("*",{count:"exact",head:true})
 .eq("app_id",appId)

 const { count:ips } = await supabase
 .from("ips_provedor")
 .select("*",{count:"exact",head:true})
 .eq("app_id",appId)

 document.getElementById("totalPops").innerText=pops
 document.getElementById("totalEquip").innerText=equip
 document.getElementById("totalIps").innerText=ips
}

/* TABELA */

async function carregarTabela(){

 const { data } = await supabase
 .from("ips_provedor")
 .select(`
  ip,
  equipamentos_provedor (
    nome,
    modelo,
    pops_provedor (
      nome,
      localizacao
    )
  )
 `)
 .eq("app_id",appId)
 .order("ip")

 const tabela=document.getElementById("lista")
 tabela.innerHTML=""

 data.forEach(l=>{

 const eq=l.equipamentos_provedor
 const pop=eq.pops_provedor

 tabela.innerHTML+=`
 <tr>
 <td><a href="http://${l.ip}" target="_blank">${l.ip}</a></td>
 <td>${eq.nome}</td>
 <td>${eq.modelo}</td>
 <td>${pop.nome}</td>
 <td>${pop.localizacao}</td>
 </tr>
 `
 })

}

/* CADASTRAR POP */

async function cadastrarPop(){

 const nome=document.getElementById("popNome").value
 const local=document.getElementById("popLocal").value

 await supabase
 .from("pops_provedor")
 .insert({
  nome:nome,
  localizacao:local,
  app_id:appId
 })

 alert("POP cadastrado")

 carregarSelects()
 dashboard()
}

/* CADASTRAR EQUIPAMENTO */

async function cadastrarEquip(){

 const nome=document.getElementById("equipNome").value
 const modelo=document.getElementById("equipModelo").value
 const pop=document.getElementById("equipPop").value

 await supabase
 .from("equipamentos_provedor")
 .insert({
  nome:nome,
  modelo:modelo,
  pop_id:pop,
  app_id:appId
 })

 alert("Equipamento cadastrado")

 carregarSelects()
 dashboard()
}

/* CADASTRAR IP */

async function cadastrarIp(){

 const ip=document.getElementById("ip").value
 const equip=document.getElementById("equipIp").value

 await supabase
 .from("ips_provedor")
 .insert({
  ip:ip,
  equipamento_id:equip,
  app_id:appId
 })

 carregarTabela()
 dashboard()
}

/* CARREGAR SELECTS */

async function carregarSelects(){

 const popSelect=document.getElementById("equipPop")
 popSelect.innerHTML=""

 const { data:pops } = await supabase
 .from("pops_provedor")
 .select("*")
 .eq("app_id",appId)

 pops.forEach(p=>{
 popSelect.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
 })


 const equipSelect=document.getElementById("equipIp")
 equipSelect.innerHTML=""

 const { data:equip } = await supabase
 .from("equipamentos_provedor")
 .select("*")
 .eq("app_id",appId)

 equip.forEach(e=>{
 equipSelect.innerHTML+=`<option value="${e.id}">${e.nome}</option>`
 })

}

/* BUSCA */

async function buscar(){

 const busca=document.getElementById("busca").value

 const { data } = await supabase
 .from("ips_provedor")
 .select(`
 ip,
 equipamentos_provedor (
   nome,
   modelo,
   pops_provedor (
     nome,
     localizacao
   )
 )
 `)
 .ilike("ip",`%${busca}%`)
 .eq("app_id",appId)

 const tabela=document.getElementById("lista")
 tabela.innerHTML=""

 data.forEach(l=>{

 tabela.innerHTML+=`
 <tr>
 <td><a href="http://${l.ip}" target="_blank">${l.ip}</a></td>
 <td>${l.equipamentos_provedor.nome}</td>
 <td>${l.equipamentos_provedor.modelo}</td>
 <td>${l.equipamentos_provedor.pops_provedor.nome}</td>
 <td>${l.equipamentos_provedor.pops_provedor.localizacao}</td>
 </tr>
 `
 })

}

window.cadastrarPop=cadastrarPop
window.cadastrarEquip=cadastrarEquip
window.cadastrarIp=cadastrarIp
window.buscar=buscar

carregarApp()

</script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
}

.section{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<h2>📡 NOC Provedor</h2>

<div class="dashboard">

<div class="card">
<h3>POPs</h3>
<h1 id="totalPops">0</h1>
</div>

<div class="card">
<h3>Equipamentos</h3>
<h1 id="totalEquip">0</h1>
</div>

<div class="card">
<h3>IPs</h3>
<h1 id="totalIps">0</h1>
</div>

</div>

<div class="section">

<h3>Cadastrar POP</h3>

<input id="popNome" placeholder="Nome do POP">
<input id="popLocal" placeholder="Localização">

<button onclick="cadastrarPop()">Salvar</button>

</div>

<div class="section">

<h3>Cadastrar Equipamento</h3>

<input id="equipNome" placeholder="Nome do equipamento">
<input id="equipModelo" placeholder="Modelo (Mikrotik / Intelbras / STC / etc)">

<select id="equipPop"></select>

<button onclick="cadastrarEquip()">Salvar</button>

</div>

<div class="section">

<h3>Cadastrar IP</h3>

<input id="ip" placeholder="IP do equipamento">

<select id="equipIp"></select>

<button onclick="cadastrarIp()">Salvar</button>

</div>

<div class="section">

<h3>Buscar IP</h3>

<input id="busca" placeholder="Buscar IP">
<button onclick="buscar()">Buscar</button>

<table>

<thead>
<tr>
<th>IP</th>
<th>Equipamento</th>
<th>Modelo</th>
<th>POP</th>
<th>Localização</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</body>
</html>
