<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Provedor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const COLUNA_EQUIPAMENTO_IP = "equipamento";

let appId = null;
let popSelecionadoTopo = "";

/* =========================
   AUX
========================= */
function escaparHtml(texto){
  if(texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function abrirModal(id){
  const el = document.getElementById(id);
  if(el) el.style.display = "flex";
}

function fecharModal(id){
  const el = document.getElementById(id);
  if(el) el.style.display = "none";
}

function limparFormularioPop(){
  document.getElementById("popNome").value = "";
  document.getElementById("popLocal").value = "";
}

function limparFormularioEquip(){
  document.getElementById("equipNome").value = "";
  document.getElementById("equipModelo").value = "";
  document.getElementById("equipPop").value = "";
}

function limparFormularioIp(){
  document.getElementById("ip").value = "";
  document.getElementById("cidr").value = "";
  document.getElementById("porta").value = "";
  document.getElementById("tipoIp").value = "host";
  document.getElementById("equipIp").value = "";
}

function limparFormularioEditarPop(){
  document.getElementById("editarPopId").value = "";
  document.getElementById("editarPopNome").value = "";
  document.getElementById("editarPopLocal").value = "";
}

/* =========================
   LOGIN + APP
========================= */
async function carregarApp(){
  try{
    const { data:{ session }, error: sessaoError } = await supabase.auth.getSession();

    if(sessaoError){
      console.error("Erro ao verificar sessão:", sessaoError);
      alert("Erro ao verificar login");
      return;
    }

    if(!session){
      window.location.href = "/auth/login.html";
      return;
    }

    const userId = session.user.id;

    const { data: usuario, error: usuarioError } = await supabase
      .from("usuarios")
      .select("app_id, validade")
      .eq("id", userId)
      .single();

    if(usuarioError){
      console.error("Erro ao buscar usuário:", usuarioError);
      alert("Erro ao carregar usuário: " + usuarioError.message);
      return;
    }

    if(!usuario || !usuario.app_id){
      alert("Usuário sem APP vinculado");
      return;
    }

    appId = usuario.app_id;

    mostrarAvisoRenovacao(usuario.validade);

    await dashboard();
    await carregarSelects();
    await renderizarPopsTopo();
    await carregarTabela();
    await carregarListaPopsGerenciar();

  }catch(erro){
    console.error("Erro geral ao carregar painel:", erro);
    alert("Erro ao carregar painel");
  }
}

/* =========================
   DASHBOARD
========================= */
async function dashboard(){
  try{
    const { data: pops } = await supabase
      .from("pops_provedor")
      .select("id")
      .eq("app_id", appId);

    const { data: equipamentos } = await supabase
      .from("equipamentos_provedor")
      .select("id")
      .eq("app_id", appId);

    const { count: ips } = await supabase
      .from("ips_provedor")
      .select("*", { count:"exact", head:true })
      .eq("app_id", appId);

    document.getElementById("totalPops").innerText = (pops || []).length;
    document.getElementById("totalEquip").innerText = (equipamentos || []).length;
    document.getElementById("totalIps").innerText = ips || 0;

  }catch(erro){
    console.error("Erro no dashboard:", erro);
  }
}

/* =========================
   POPS TOPO
========================= */
async function renderizarPopsTopo(){
  try{
    const box = document.getElementById("popsTopo");
    if(!box) return;

    const { data: pops, error } = await supabase
      .from("pops_provedor")
      .select("id,nome,localizacao")
      .eq("app_id", appId)
      .order("nome", { ascending:true });

    if(error){
      console.error("Erro ao carregar POPs:", error);
      return;
    }

    box.innerHTML = `
      <button class="chip-pop ${!popSelecionadoTopo ? "ativo" : ""}" onclick="selecionarPopTopo('', this)">
        Todos
      </button>
    `;

    (pops || []).forEach(pop => {
      const ativo = String(popSelecionadoTopo) === String(pop.id) ? "ativo" : "";
      const idSeguro = String(pop.id).replace(/'/g, "\\'");
      box.innerHTML += `
        <button class="chip-pop ${ativo}" onclick="selecionarPopTopo('${idSeguro}', this)">
          ${escaparHtml(pop.nome || "")}
        </button>
      `;
    });

  }catch(erro){
    console.error("Erro ao renderizar POPs:", erro);
  }
}

function selecionarPopTopo(popId, botao){
  popSelecionadoTopo = popId || "";

  document.querySelectorAll(".chip-pop").forEach(btn => {
    btn.classList.remove("ativo");
  });

  if(botao){
    botao.classList.add("ativo");
  }

  carregarTabela();
}

/* =========================
   CADASTRAR POP
========================= */
async function cadastrarPop(){
  try{
    const nome = document.getElementById("popNome").value.trim();
    const localizacao = document.getElementById("popLocal").value.trim();

    if(!nome || !localizacao){
      alert("Preencha nome e localização");
      return;
    }

    const { error } = await supabase
      .from("pops_provedor")
      .insert({
        nome,
        localizacao,
        app_id: appId
      });

    if(error){
      console.error("Erro ao cadastrar POP:", error);
      alert("Erro ao cadastrar POP: " + error.message);
      return;
    }

    alert("POP cadastrado com sucesso");
    limparFormularioPop();
    fecharModal("modalPop");

    await atualizarTelaCompleta();

  }catch(erro){
    console.error("Erro geral ao cadastrar POP:", erro);
    alert("Erro ao cadastrar POP");
  }
}

/* =========================
   EDITAR POP
========================= */
function abrirEditarPop(id, nome, localizacao){
  document.getElementById("editarPopId").value = id || "";
  document.getElementById("editarPopNome").value = nome || "";
  document.getElementById("editarPopLocal").value = localizacao || "";
  abrirModal("modalEditarPop");
}

async function salvarEdicaoPop(){
  try{
    const id = document.getElementById("editarPopId").value;
    const nome = document.getElementById("editarPopNome").value.trim();
    const localizacao = document.getElementById("editarPopLocal").value.trim();

    if(!id || !nome || !localizacao){
      alert("Preencha nome e localização");
      return;
    }

    const { error } = await supabase
      .from("pops_provedor")
      .update({
        nome,
        localizacao
      })
      .eq("id", id)
      .eq("app_id", appId);

    if(error){
      console.error("Erro ao editar POP:", error);
      alert("Erro ao editar POP: " + error.message);
      return;
    }

    alert("POP atualizado com sucesso");
    fecharModal("modalEditarPop");
    limparFormularioEditarPop();

    await atualizarTelaCompleta();

  }catch(erro){
    console.error("Erro geral ao editar POP:", erro);
    alert("Erro ao editar POP");
  }
}

/* =========================
   EXCLUIR POP
========================= */
async function excluirPop(id, nome){
  try{
    const confirmar = confirm(
      `Deseja excluir o POP "${nome}"?\n\nIsso também vai excluir os equipamentos e IPs vinculados a ele.`
    );

    if(!confirmar) return;

    const { data: equipamentos, error: erroEquipBusca } = await supabase
      .from("equipamentos_provedor")
      .select("id")
      .eq("app_id", appId)
      .eq("pop_id", id);

    if(erroEquipBusca){
      console.error("Erro ao buscar equipamentos do POP:", erroEquipBusca);
      alert("Erro ao buscar equipamentos do POP: " + erroEquipBusca.message);
      return;
    }

    const idsEquip = (equipamentos || []).map(e => e.id);

    if(idsEquip.length){
      const { error: erroExcluirIps } = await supabase
        .from("ips_provedor")
        .delete()
        .eq("app_id", appId)
        .in(COLUNA_EQUIPAMENTO_IP, idsEquip);

      if(erroExcluirIps){
        console.error("Erro ao excluir IPs do POP:", erroExcluirIps);
        alert("Erro ao excluir IPs do POP: " + erroExcluirIps.message);
        return;
      }

      const { error: erroExcluirEquip } = await supabase
        .from("equipamentos_provedor")
        .delete()
        .eq("app_id", appId)
        .eq("pop_id", id);

      if(erroExcluirEquip){
        console.error("Erro ao excluir equipamentos do POP:", erroExcluirEquip);
        alert("Erro ao excluir equipamentos do POP: " + erroExcluirEquip.message);
        return;
      }
    }

    const { error: erroExcluirPop } = await supabase
      .from("pops_provedor")
      .delete()
      .eq("id", id)
      .eq("app_id", appId);

    if(erroExcluirPop){
      console.error("Erro ao excluir POP:", erroExcluirPop);
      alert("Erro ao excluir POP: " + erroExcluirPop.message);
      return;
    }

    if(String(popSelecionadoTopo) === String(id)){
      popSelecionadoTopo = "";
    }

    alert("POP excluído com sucesso");
    await atualizarTelaCompleta();

  }catch(erro){
    console.error("Erro geral ao excluir POP:", erro);
    alert("Erro ao excluir POP");
  }
}

/* =========================
   CADASTRAR EQUIPAMENTO
========================= */
async function cadastrarEquipamento(){
  try{
    const nome = document.getElementById("equipNome").value.trim();
    const modelo = document.getElementById("equipModelo").value.trim();
    const popId = document.getElementById("equipPop").value;

    if(!nome || !modelo || !popId){
      alert("Preencha nome, modelo e POP");
      return;
    }

    const { error } = await supabase
      .from("equipamentos_provedor")
      .insert({
        nome,
        modelo,
        pop_id: popId,
        app_id: appId
      });

    if(error){
      console.error("Erro ao cadastrar equipamento:", error);
      alert("Erro ao cadastrar equipamento: " + error.message);
      return;
    }

    alert("Equipamento cadastrado com sucesso");
    limparFormularioEquip();
    fecharModal("modalEquip");

    await atualizarTelaCompleta();

  }catch(erro){
    console.error("Erro geral ao cadastrar equipamento:", erro);
    alert("Erro ao cadastrar equipamento");
  }
}

/* =========================
   CADASTRAR IP
========================= */
async function cadastrarIp(){
  try{
    const ip = document.getElementById("ip").value.trim();
    const cidr = document.getElementById("cidr").value.trim();
    const porta = document.getElementById("porta").value.trim();
    const tipo = document.getElementById("tipoIp").value;
    const equipamento = document.getElementById("equipIp").value;

    if(!ip || !equipamento){
      alert("Preencha IP e equipamento");
      return;
    }

    const dados = {
      ip,
      cidr: cidr || null,
      porta: porta || null,
      tipo: tipo || "host",
      app_id: appId
    };

    dados[COLUNA_EQUIPAMENTO_IP] = equipamento;

    const { error } = await supabase
      .from("ips_provedor")
      .insert(dados);

    if(error){
      console.error("Erro ao cadastrar IP:", error);
      alert("Erro ao cadastrar IP: " + error.message);
      return;
    }

    alert("IP cadastrado com sucesso");
    limparFormularioIp();

    await dashboard();
    await carregarTabela();

  }catch(erro){
    console.error("Erro geral ao cadastrar IP:", erro);
    alert("Erro ao cadastrar IP");
  }
}

/* =========================
   SELECTS
========================= */
async function carregarSelects(){
  try{
    const popSelect = document.getElementById("equipPop");
    const equipSelect = document.getElementById("equipIp");

    popSelect.innerHTML = `<option value="">Selecione o POP</option>`;
    equipSelect.innerHTML = `<option value="">Selecione o equipamento</option>`;

    const { data: pops, error: erroPops } = await supabase
      .from("pops_provedor")
      .select("id,nome,localizacao")
      .eq("app_id", appId)
      .order("nome", { ascending:true });

    if(erroPops){
      console.error("Erro ao carregar POPs:", erroPops);
      return;
    }

    (pops || []).forEach(pop => {
      popSelect.innerHTML += `<option value="${escaparHtml(pop.id)}">${escaparHtml(pop.nome || "")}</option>`;
    });

    const { data: equipamentos, error: erroEquip } = await supabase
      .from("equipamentos_provedor")
      .select("id,nome,pop_id")
      .eq("app_id", appId)
      .order("nome", { ascending:true });

    if(erroEquip){
      console.error("Erro ao carregar equipamentos:", erroEquip);
      return;
    }

    const mapaPop = {};
    (pops || []).forEach(pop => {
      mapaPop[String(pop.id)] = pop;
    });

    (equipamentos || []).forEach(equip => {
      const pop = mapaPop[String(equip.pop_id)] || null;
      const texto = pop
        ? `${pop.nome || ""} - ${equip.nome || ""}`
        : `${equip.nome || ""}`;

      equipSelect.innerHTML += `
        <option value="${escaparHtml(equip.id)}">${escaparHtml(texto)}</option>
      `;
    });

  }catch(erro){
    console.error("Erro geral ao carregar selects:", erro);
  }
}

/* =========================
   LISTA POPS GERENCIAR
========================= */
async function carregarListaPopsGerenciar(){
  try{
    const box = document.getElementById("listaPopsGerenciar");
    if(!box) return;

    const { data: pops, error } = await supabase
      .from("pops_provedor")
      .select("id,nome,localizacao")
      .eq("app_id", appId)
      .order("nome", { ascending:true });

    if(error){
      console.error("Erro ao carregar lista de POPs:", error);
      box.innerHTML = `<div class="muted">Erro ao carregar POPs</div>`;
      return;
    }

    if(!pops || !pops.length){
      box.innerHTML = `<div class="muted">Nenhum POP cadastrado</div>`;
      return;
    }

    box.innerHTML = "";

    pops.forEach(pop => {
      const idJs = JSON.stringify(String(pop.id || ""));
      const nomeJs = JSON.stringify(String(pop.nome || ""));
      const localJs = JSON.stringify(String(pop.localizacao || ""));

      box.innerHTML += `
        <div class="item-pop-gerenciar">
          <div class="item-pop-info">
            <strong>${escaparHtml(pop.nome || "")}</strong>
            <div class="texto-localizacao">${escaparHtml(pop.localizacao || "Sem localização")}</div>
          </div>

          <div class="item-pop-acoes">
            <button class="btn-editar" onclick='abrirEditarPop(${idJs}, ${nomeJs}, ${localJs})'>Editar</button>
            <button class="btn-excluir" onclick='excluirPop(${idJs}, ${nomeJs})'>Excluir</button>
          </div>
        </div>
      `;
    });

  }catch(erro){
    console.error("Erro geral ao carregar lista POPs:", erro);
  }
}

/* =========================
   DADOS TABELA
========================= */
async function buscarDadosCompletos(filtroIp = ""){
  let queryIps = supabase
    .from("ips_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("ip", { ascending:true });

  if(filtroIp){
    queryIps = queryIps.ilike("ip", `%${filtroIp}%`);
  }

  const { data: ips, error: erroIps } = await queryIps;
  if(erroIps) throw new Error("Erro ao buscar IPs: " + erroIps.message);

  const { data: equipamentos, error: erroEquip } = await supabase
    .from("equipamentos_provedor")
    .select("*")
    .eq("app_id", appId);

  if(erroEquip) throw new Error("Erro ao buscar equipamentos: " + erroEquip.message);

  const { data: pops, error: erroPops } = await supabase
    .from("pops_provedor")
    .select("*")
    .eq("app_id", appId);

  if(erroPops) throw new Error("Erro ao buscar POPs: " + erroPops.message);

  const mapaEquip = {};
  (equipamentos || []).forEach(e => {
    mapaEquip[String(e.id)] = e;
  });

  const mapaPop = {};
  (pops || []).forEach(p => {
    mapaPop[String(p.id)] = p;
  });

  let linhas = (ips || []).map(item => {
    const equipId = String(item[COLUNA_EQUIPAMENTO_IP] || "");
    const equip = mapaEquip[equipId] || null;
    const pop = equip ? (mapaPop[String(equip.pop_id)] || null) : null;

    return {
      ip: item.ip || "",
      cidr: item.cidr || "",
      porta: item.porta || "",
      equipamentoNome: equip?.nome || "",
      equipamentoModelo: equip?.modelo || "",
      popId: pop?.id || "",
      popNome: pop?.nome || "",
      popLocalizacao: pop?.localizacao || ""
    };
  });

  if(popSelecionadoTopo){
    linhas = linhas.filter(l => String(l.popId) === String(popSelecionadoTopo));
  }

  return linhas;
}

/* =========================
   TABELA
========================= */
async function carregarTabela(){
  try{
    const buscaEl = document.getElementById("busca");
    const filtroBusca = buscaEl ? buscaEl.value.trim() : "";
    const linhas = await buscarDadosCompletos(filtroBusca);

    const tabela = document.getElementById("lista");
    tabela.innerHTML = "";

    linhas.forEach(l => {
      const ipFormatado = l.cidr ? `${l.ip}/${l.cidr}` : l.ip;
      const localizacao = (l.popLocalizacao || "").trim();

      let linkMapa = "";
      if(localizacao.startsWith("http://") || localizacao.startsWith("https://")){
        linkMapa = localizacao;
      }else{
        linkMapa = "https://www.google.com/maps/search/" + encodeURIComponent(localizacao);
      }

      tabela.innerHTML += `
        <tr>
          <td><a href="http://${escaparHtml(l.ip)}" target="_blank">${escaparHtml(ipFormatado)}</a></td>
          <td>${escaparHtml(l.equipamentoNome)}</td>
          <td>${escaparHtml(l.equipamentoModelo)}</td>
          <td>${escaparHtml(l.popNome)}</td>
          <td>
            ${
              localizacao
              ? `<a href="${escaparHtml(linkMapa)}" target="_blank" class="btn-mapa-link">📍 Ver localização</a>
                 <div class="texto-localizacao">${escaparHtml(localizacao)}</div>`
              : `<span class="muted">Sem localização</span>`
            }
          </td>
          <td>${escaparHtml(l.porta || "-")}</td>
        </tr>
      `;
    });

    if(!linhas.length){
      tabela.innerHTML = `
        <tr>
          <td colspan="6" class="muted center">Nenhum IP encontrado</td>
        </tr>
      `;
    }

  }catch(erro){
    console.error("Erro ao carregar tabela:", erro);
  }
}

async function buscar(){
  await carregarTabela();
}

/* =========================
   AVISO RENOVAÇÃO
========================= */
function formatarDataBR(dataStr){
  if(!dataStr) return "";
  const d = new Date(dataStr + "T00:00:00");
  if(isNaN(d.getTime())) return dataStr;
  return d.toLocaleDateString("pt-BR");
}

function diasRestantes(dataStr){
  if(!dataStr) return null;

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const venc = new Date(dataStr + "T00:00:00");
  venc.setHours(0,0,0,0);

  const diff = venc.getTime() - hoje.getTime();
  return Math.ceil(diff / 86400000);
}

function mostrarAvisoRenovacao(validade){
  const faixa = document.getElementById("faixaRenovacao");
  if(!faixa) return;

  if(!validade){
    faixa.innerHTML = "";
    return;
  }

  const dias = diasRestantes(validade);
  const dataFormatada = formatarDataBR(validade);

  if(dias < 0){
    faixa.innerHTML = `
      <div class="aviso-renovacao">
        ⚠️ Seu plano expirou em ${dataFormatada}.
        <a href="/renovar.html">Clique aqui para renovar</a>
      </div>
    `;
    return;
  }

  if(dias <= 8){
    faixa.innerHTML = `
      <div class="aviso-alerta">
        ⏳ Seu plano vence em ${dataFormatada}.
        <a href="/renovar.html">Renovar agora</a>
      </div>
    `;
    return;
  }

  faixa.innerHTML = "";
}

window.excluirPop = excluirPop;

carregarApp();
</script>

  padding:10px;
  border:none;
  border-radius:10px;
}

input,select{
  background:#fff;
  color:#000;
  min-width:220px;
}

button{
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.92;
}

table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #334155;
  text-align:left;
  vertical-align:top;
}

a{
  color:#38bdf8;
  text-decoration:none;
}

.pops-topo{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.chip-pop{
  background:#1e293b;
  color:#fff;
  border:1px solid #334155;
  border-radius:999px;
  padding:10px 14px;
}

.chip-pop.ativo{
  background:#22c55e;
  color:#000;
  border-color:#22c55e;
}

.muted{
  color:#94a3b8;
}

.center{
  text-align:center;
}

.texto-localizacao{
  margin-top:6px;
  font-size:12px;
  color:#94a3b8;
  line-height:1.4;
  word-break:break-word;
}

.btn-mapa-link{
  display:inline-block;
  background:#2563eb;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:9999;
}

.modal-box{
  width:100%;
  max-width:500px;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:20px;
}

.modal-box .linha{
  margin-bottom:12px;
}

.modal-acoes{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.btn-sec{
  background:#475569;
  color:#fff;
}

.aviso-renovacao{
  background:#dc2626;
  color:#fff;
  padding:14px 16px;
  text-align:center;
  font-weight:bold;
}

.aviso-renovacao a{
  color:#fff;
  text-decoration:underline;
  margin-left:6px;
}

.aviso-alerta{
  background:#f59e0b;
  color:#111827;
  padding:14px 16px;
  text-align:center;
  font-weight:bold;
}

.aviso-alerta a{
  color:#111827;
  text-decoration:underline;
  margin-left:6px;
}

.lista-pops-gerenciar{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
}

.item-pop-gerenciar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:14px;
}

.item-pop-info{
  flex:1;
  min-width:0;
}

.item-pop-acoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn-editar{
  background:#f59e0b;
  color:#111827;
}

.btn-excluir{
  background:#ef4444;
  color:#fff;
}

@media(max-width:700px){
  body{
    padding:15px;
  }

  .dashboard{
    flex-direction:column;
  }

  .topo-acoes{
    flex-direction:column;
  }

  input,select,button{
    width:100%;
    min-width:100%;
  }

  .pops-topo{
    overflow-x:auto;
    flex-wrap:nowrap;
    padding-bottom:4px;
  }

  .chip-pop{
    white-space:nowrap;
  }

  .modal-acoes{
    flex-direction:column;
  }

  table{
    display:block;
    overflow-x:auto;
  }

  .item-pop-gerenciar{
    flex-direction:column;
    align-items:stretch;
  }

  .item-pop-acoes{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div id="faixaRenovacao"></div>

<h2>📡 Painel Provedor</h2>

<div class="dashboard">
  <div class="card">
    <h3>POPs</h3>
    <h1 id="totalPops">0</h1>
  </div>

  <div class="card">
    <h3>Equipamentos</h3>
    <h1 id="totalEquip">0</h1>
  </div>

  <div class="card">
    <h3>IPs</h3>
    <h1 id="totalIps">0</h1>
  </div>
</div>

<div class="section">
  <h3>Escolher POP</h3>
  <div id="popsTopo" class="pops-topo"></div>
</div>

<div class="section">
  <h3>Ações rápidas</h3>
  <div class="topo-acoes">
    <button onclick="abrirModal('modalPop')">+ Cadastrar POP</button>
    <button onclick="abrirModal('modalEquip')">+ Cadastrar Equipamento</button>
    <button onclick="abrirEquipamentos()">Abrir página de equipamentos</button>
    <button onclick="abrirmapadarede()">Abrir Mapa da Rede</button>
  </div>
</div>

<div class="section">
  <h3>Gerenciar POPs</h3>
  <div id="listaPopsGerenciar" class="lista-pops-gerenciar"></div>
</div>

<div class="section">
  <h3>Cadastrar IP</h3>

  <input id="ip" placeholder="IP (ex: 10.0.0.1)">
  <input id="cidr" placeholder="CIDR (30 / 24)">
  <input id="porta" placeholder="Porta (ex: ether1 / sfp1)">

  <select id="tipoIp">
    <option value="host">Host</option>
    <option value="link">Link /30</option>
    <option value="rede">Rede /24</option>
  </select>

  <select id="equipIp">
    <option value="">Selecione o equipamento</option>
  </select>

  <button onclick="cadastrarIp()">Salvar IP</button>
</div>

<div class="section">
  <h3>Buscar IP</h3>

  <input id="busca" placeholder="Buscar IP" oninput="buscar()">

  <table>
    <thead>
      <tr>
        <th>IP</th>
        <th>Equipamento</th>
        <th>Modelo</th>
        <th>POP</th>
        <th>Localização</th>
        <th>Porta</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<div class="modal" id="modalPop">
  <div class="modal-box">
    <h3>Cadastrar POP</h3>

    <div class="linha">
      <input id="popNome" placeholder="Nome do POP">
    </div>

    <div class="linha">
      <input id="popLocal" placeholder="Localização">
    </div>

    <div class="modal-acoes">
      <button onclick="cadastrarPop()">Salvar</button>
      <button class="btn-sec" onclick="fecharModal('modalPop')">Cancelar</button>
    </div>
  </div>
</div>

<div class="modal" id="modalEditarPop">
  <div class="modal-box">
    <h3>Editar POP</h3>

    <input type="hidden" id="editarPopId">

    <div class="linha">
      <input id="editarPopNome" placeholder="Nome do POP">
    </div>

    <div class="linha">
      <input id="editarPopLocal" placeholder="Localização">
    </div>

    <div class="modal-acoes">
      <button onclick="salvarEdicaoPop()">Salvar alterações</button>
      <button class="btn-sec" onclick="fecharModal('modalEditarPop')">Cancelar</button>
    </div>
  </div>
</div>

<div class="modal" id="modalEquip">
  <div class="modal-box">
    <h3>Cadastrar Equipamento</h3>

    <div class="linha">
      <input id="equipNome" placeholder="Nome do equipamento">
    </div>

    <div class="linha">
      <input id="equipModelo" placeholder="Modelo">
    </div>

    <div class="linha">
      <select id="equipPop">
        <option value="">Selecione o POP</option>
      </select>
    </div>

    <div class="modal-acoes">
      <button onclick="cadastrarEquipamento()">Salvar</button>
      <button class="btn-sec" onclick="fecharModal('modalEquip')">Cancelar</button>
    </div>
  </div>
</div>

</body>
</html>
