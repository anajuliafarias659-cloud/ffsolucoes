<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Provedor</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://SEU-PROJETO.supabase.co",
"SUA-ANON-KEY"
)

let appId = localStorage.getItem("app_id")

async function carregarIps(){

 const { data } = await supabase
   .from("ips_provedor")
   .select("*")
   .eq("app_id", appId)
   .order("ip")

 const tabela = document.getElementById("lista")
 tabela.innerHTML = ""

 data.forEach(ip=>{

  tabela.innerHTML += `
  <tr>
    <td>${ip.ip}</td>
    <td>${ip.equipamento}</td>
    <td>${ip.pop}</td>
    <td>${ip.cliente}</td>
  </tr>
  `
 })

}

async function cadastrar(){

 const ip = document.getElementById("ip").value
 const equipamento = document.getElementById("equipamento").value
 const pop = document.getElementById("pop").value
 const cliente = document.getElementById("cliente").value

 await supabase
 .from("ips_provedor")
 .insert({
   ip,
   equipamento,
   pop,
   cliente,
   app_id: appId
 })

 carregarIps()

}

async function buscar(){

 const busca = document.getElementById("busca").value

 const { data } = await supabase
   .from("ips_provedor")
   .select("*")
   .ilike("ip", `%${busca}%`)

 const tabela = document.getElementById("lista")
 tabela.innerHTML=""

 data.forEach(ip=>{

 tabela.innerHTML+=`
 <tr>
   <td>${ip.ip}</td>
   <td>${ip.equipamento}</td>
   <td>${ip.pop}</td>
   <td>${ip.cliente}</td>
 </tr>
 `
 })

}

window.cadastrar = cadastrar
window.buscar = buscar

carregarIps()

</script>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
padding:40px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<h2>📡 Documentação de IPs</h2>

<h3>Cadastrar IP</h3>

<input id="ip" placeholder="IP">
<input id="equipamento" placeholder="Equipamento">
<input id="pop" placeholder="POP / Torre">
<input id="cliente" placeholder="Cliente">

<button onclick="cadastrar()">Salvar</button>

<hr>

<h3>Buscar</h3>

<input id="busca" placeholder="Buscar IP ou equipamento">
<button onclick="buscar()">Buscar</button>

<table>

<thead>
<tr>
<th>IP</th>
<th>Equipamento</th>
<th>POP</th>
<th>Cliente</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</body>
</html>
