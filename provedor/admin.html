<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Provedor</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://SEU-PROJETO.supabase.co",
"SUA-ANON-KEY"
)

let appId = localStorage.getItem("app_id")

async function carregar(){

 const { data } = await supabase
 .from("ips_provedor")
 .select(`
   id,
   ip,
   equipamentos_provedor (
      nome,
      modelo,
      pops_provedor (
         nome,
         localizacao
      )
   )
 `)
 .eq("app_id", appId)
 .order("ip")

 const tabela = document.getElementById("lista")
 tabela.innerHTML=""

 data.forEach(l=>{

 const eq = l.equipamentos_provedor
 const pop = eq.pops_provedor

 tabela.innerHTML+=`
 <tr>
  <td>
   <a href="http://${l.ip}" target="_blank">${l.ip}</a>
  </td>
  <td>${eq.nome}</td>
  <td>${eq.modelo}</td>
  <td>${pop.nome}</td>
  <td>${pop.localizacao}</td>
 </tr>
 `

 })

}

async function cadastrarPop(){

 const nome = document.getElementById("popNome").value
 const localizacao = document.getElementById("popLocal").value

 await supabase
 .from("pops_provedor")
 .insert({
   nome,
   localizacao,
   app_id: appId
 })

 alert("POP cadastrado")

}

async function cadastrarEquipamento(){

 const nome = document.getElementById("equipNome").value
 const modelo = document.getElementById("equipModelo").value
 const pop = document.getElementById("equipPop").value

 await supabase
 .from("equipamentos_provedor")
 .insert({
   nome,
   modelo,
   pop_id: pop,
   app_id: appId
 })

 alert("Equipamento cadastrado")

}

async function cadastrarIp(){

 const ip = document.getElementById("ip").value
 const equipamento = document.getElementById("equipamentoIp").value

 await supabase
 .from("ips_provedor")
 .insert({
   ip,
   equipamento_id: equipamento,
   app_id: appId
 })

 carregar()

}

async function carregarSelects(){

 const { data:pops } = await supabase
 .from("pops_provedor")
 .select("*")
 .eq("app_id", appId)

 const popSelect = document.getElementById("equipPop")

 pops.forEach(p=>{
  popSelect.innerHTML+=`<option value="${p.id}">${p.nome}</option>`
 })


 const { data:equip } = await supabase
 .from("equipamentos_provedor")
 .select("*")
 .eq("app_id", appId)

 const equipSelect = document.getElementById("equipamentoIp")

 equip.forEach(e=>{
  equipSelect.innerHTML+=`<option value="${e.id}">${e.nome}</option>`
 })

}

async function buscar(){

 const busca = document.getElementById("busca").value

 const { data } = await supabase
 .from("ips_provedor")
 .select(`
   id,
   ip,
   equipamentos_provedor (
      nome,
      modelo,
      pops_provedor (
         nome,
         localizacao
      )
   )
 `)
 .ilike("ip", `%${busca}%`)
 .eq("app_id", appId)

 const tabela = document.getElementById("lista")
 tabela.innerHTML=""

 data.forEach(l=>{

 const eq = l.equipamentos_provedor
 const pop = eq.pops_provedor

 tabela.innerHTML+=`
 <tr>
  <td>
   <a href="http://${l.ip}" target="_blank">${l.ip}</a>
  </td>
  <td>${eq.nome}</td>
  <td>${eq.modelo}</td>
  <td>${pop.nome}</td>
  <td>${pop.localizacao}</td>
 </tr>
 `

 })

}

window.cadastrarPop = cadastrarPop
window.cadastrarEquipamento = cadastrarEquipamento
window.cadastrarIp = cadastrarIp
window.buscar = buscar

carregar()
carregarSelects()

</script>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
padding:40px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<h2>📡 Documentação de Rede</h2>

<h3>Cadastrar POP</h3>

<input id="popNome" placeholder="Nome do POP">
<input id="popLocal" placeholder="Localização">

<button onclick="cadastrarPop()">Salvar POP</button>

<hr>

<h3>Cadastrar Equipamento</h3>

<input id="equipNome" placeholder="Nome equipamento">

<select id="equipModelo">
<option>Mikrotik</option>
<option>Intelbras</option>
<option>STC</option>
</select>

<select id="equipPop"></select>

<button onclick="cadastrarEquipamento()">Salvar Equipamento</button>

<hr>

<h3>Cadastrar IP</h3>

<input id="ip" placeholder="IP">

<select id="equipamentoIp"></select>

<button onclick="cadastrarIp()">Salvar IP</button>

<hr>

<h3>Buscar</h3>

<input id="busca" placeholder="Buscar IP">
<button onclick="buscar()">Buscar</button>

<table>

<thead>
<tr>
<th>IP</th>
<th>Equipamento</th>
<th>Modelo</th>
<th>POP</th>
<th>Localização</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</body>
</html>
