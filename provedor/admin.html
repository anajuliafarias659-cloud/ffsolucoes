<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel NOC Provedor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const COLUNA_EQUIPAMENTO_IP = "equipamento";

let appId = null;
let popSelecionadoTopo = "";

/* =========================
   LOGIN + APP
========================= */
async function carregarApp() {
  try {
    const { data: sessaoData, error: sessaoError } = await supabase.auth.getSession();

    if (sessaoError) {
      console.error("Erro ao verificar sessão:", sessaoError);
      alert("Erro ao verificar login");
      return;
    }

    const session = sessaoData.session;

    if (!session) {
      window.location.href = "/auth/login.html";
      return;
    }

    const userId = session.user.id;
    console.log("Usuário logado:", userId);

    const { data: usuario, error: usuarioError } = await supabase
      .from("usuarios")
      .select("app_id")
      .eq("id", userId)
      .single();

    if (usuarioError) {
      console.error("Erro ao buscar app_id:", usuarioError);
      alert("Não foi possível localizar o app do usuário: " + usuarioError.message);
      return;
    }

    if (!usuario || !usuario.app_id) {
      alert("Usuário sem APP vinculado");
      return;
    }

    appId = usuario.app_id;

    await dashboard();
    await carregarTabela();
    await carregarSelects();
    await renderizarPopsTopo();

  } catch (erro) {
    console.error("Erro geral ao carregar app:", erro);
    alert("Erro ao carregar painel");
  }
}

/* =========================
   DASHBOARD
========================= */
async function dashboard() {
  try {
    const { count: pops } = await supabase
      .from("pops_provedor")
      .select("*", { count: "exact", head: true })
      .eq("app_id", appId);

    const { count: equip } = await supabase
      .from("equipamentos_provedor")
      .select("*", { count: "exact", head: true })
      .eq("app_id", appId);

    const { count: ips } = await supabase
      .from("ips_provedor")
      .select("*", { count: "exact", head: true })
      .eq("app_id", appId);

    document.getElementById("totalPops").innerText = pops || 0;
    document.getElementById("totalEquip").innerText = equip || 0;
    document.getElementById("totalIps").innerText = ips || 0;

  } catch (erro) {
    console.error("Erro no dashboard:", erro);
  }
}

/* =========================
   AUXILIAR PARA ESCAPAR TEXTO
========================= */
function escaparHtml(texto) {
  if (texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

/* =========================
   TOGGLE FORM/LISTA EQUIP
========================= */
function toggleFormEquip() {
  const box = document.getElementById("boxFormEquip");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function toggleListaEquip() {
  const box = document.getElementById("boxListaEquip");
  box.style.display = box.style.display === "none" ? "block" : "none";

  if (box.style.display === "block") {
    listarEquipamentos();
  }
}

/* =========================
   POPS NO TOPO
========================= */
async function renderizarPopsTopo() {
  try {
    const box = document.getElementById("popsTopo");
    if (!box) return;

    const { data: pops, error } = await supabase
      .from("pops_provedor")
      .select("id,nome")
      .eq("app_id", appId)
      .order("nome", { ascending: true });

    if (error) {
      console.error("Erro ao carregar POPs do topo:", error);
      return;
    }

    box.innerHTML = `
      <button class="chip-pop ativo" onclick="selecionarPopTopo('', this)">
        Todos
      </button>
    `;

    (pops || []).forEach(pop => {
      box.innerHTML += `
        <button class="chip-pop" onclick="selecionarPopTopo('${pop.id}', this)">
          ${escaparHtml(pop.nome)}
        </button>
      `;
    });

  } catch (erro) {
    console.error("Erro ao renderizar POPs do topo:", erro);
  }
}

function selecionarPopTopo(popId, botao) {
  popSelecionadoTopo = popId || "";

  document.querySelectorAll(".chip-pop").forEach(b => {
    b.classList.remove("ativo");
  });

  if (botao) {
    botao.classList.add("ativo");
  }
}

/* =========================
   BUSCA DADOS COMPLETOS
========================= */
async function buscarDadosCompletos(filtroIp = "") {
  let queryIps = supabase
    .from("ips_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("ip", { ascending: true });

  if (filtroIp) {
    queryIps = queryIps.ilike("ip", `%${filtroIp}%`);
  }

  const { data: ips, error: erroIps } = await queryIps;

  if (erroIps) {
    throw new Error("Erro ao buscar IPs: " + erroIps.message);
  }

  const { data: equipamentos, error: erroEquip } = await supabase
    .from("equipamentos_provedor")
    .select("*")
    .eq("app_id", appId);

  if (erroEquip) {
    throw new Error("Erro ao buscar equipamentos: " + erroEquip.message);
  }

  const { data: pops, error: erroPops } = await supabase
    .from("pops_provedor")
    .select("*")
    .eq("app_id", appId);

  if (erroPops) {
    throw new Error("Erro ao buscar POPs: " + erroPops.message);
  }

  const mapaEquip = {};
  (equipamentos || []).forEach(e => {
    mapaEquip[String(e.id)] = e;
  });

  const mapaPop = {};
  (pops || []).forEach(p => {
    mapaPop[String(p.id)] = p;
  });

  const linhas = (ips || []).map(item => {
    const idEquip = String(item[COLUNA_EQUIPAMENTO_IP] || "");
    const equip = mapaEquip[idEquip] || null;
    const pop = equip ? (mapaPop[String(equip.pop_id)] || null) : null;

    return {
      ip: item.ip || "",
      equipamentoNome: equip?.nome || "",
      equipamentoModelo: equip?.modelo || "",
      popNome: pop?.nome || "",
      popLocalizacao: pop?.localizacao || ""
    };
  });

  return linhas;
}

/* =========================
   CARREGAR TABELA IPs
========================= */
async function carregarTabela() {
  try {
    const linhas = await buscarDadosCompletos();

    const tabela = document.getElementById("lista");
    tabela.innerHTML = "";

    linhas.forEach(l => {
      const ipSeguro = escaparHtml(l.ip);
      const nomeEquip = escaparHtml(l.equipamentoNome);
      const modeloEquip = escaparHtml(l.equipamentoModelo);
      const nomePop = escaparHtml(l.popNome);
      const localizacao = l.popLocalizacao || "";
      const localizacaoSegura = escaparHtml(localizacao);
      const linkMapa = "https://www.google.com/maps/search/" + encodeURIComponent(localizacao);

      tabela.innerHTML += `
        <tr>
          <td><a href="http://${ipSeguro}" target="_blank">${ipSeguro}</a></td>
          <td>${nomeEquip}</td>
          <td>${modeloEquip}</td>
          <td>${nomePop}</td>
          <td>
            ${localizacao
              ? `<a href="${linkMapa}" target="_blank" class="btn-mapa-link">
                   <button type="button" class="btn-mapa">📍 Ver localização</button>
                 </a>`
              : `<span class="muted">Sem localização</span>`
            }
            ${localizacao ? `<div class="texto-localizacao">${localizacaoSegura}</div>` : ``}
          </td>
        </tr>
      `;
    });

  } catch (erro) {
    console.error("Erro ao carregar tabela:", erro);
    alert(erro.message || "Erro ao carregar tabela");
  }
}

/* =========================
   CADASTRAR POP
========================= */
async function cadastrarPop() {
  try {
    const nome = document.getElementById("popNome").value.trim();
    const local = document.getElementById("popLocal").value.trim();

    if (!nome || !local) {
      alert("Preencha nome e localização");
      return;
    }

    const { error } = await supabase
      .from("pops_provedor")
      .insert({
        nome,
        localizacao: local,
        app_id: appId
      });

    if (error) {
      console.error("Erro ao cadastrar POP:", error);
      alert("Erro ao cadastrar POP: " + error.message);
      return;
    }

    document.getElementById("popNome").value = "";
    document.getElementById("popLocal").value = "";

    alert("POP cadastrado com sucesso");

    await carregarSelects();
    await dashboard();
    await carregarTabela();
    await renderizarPopsTopo();

  } catch (erro) {
    console.error("Erro geral ao cadastrar POP:", erro);
  }
}

/* =========================
   CADASTRAR EQUIPAMENTO
========================= */
async function cadastrarEquip() {
  try {
    const nome = document.getElementById("equipNome").value.trim();
    const modelo = document.getElementById("equipModelo").value.trim();
    const pop = document.getElementById("equipPop").value;

    if (!nome || !modelo || !pop) {
      alert("Preencha todos os campos do equipamento");
      return;
    }

    const { error } = await supabase
      .from("equipamentos_provedor")
      .insert({
        nome,
        modelo,
        pop_id: pop,
        app_id: appId
      });

    if (error) {
      console.error("Erro ao cadastrar equipamento:", error);
      alert("Erro ao cadastrar equipamento: " + error.message);
      return;
    }

    document.getElementById("equipNome").value = "";
    document.getElementById("equipModelo").value = "";
    document.getElementById("equipPop").value = "";

    alert("Equipamento cadastrado com sucesso");

    await carregarSelects();
    await dashboard();
    await listarEquipamentos();

  } catch (erro) {
    console.error("Erro geral ao cadastrar equipamento:", erro);
  }
}

/* =========================
   CADASTRAR IP
========================= */
async function cadastrarIp() {
  try {
    const ip = document.getElementById("ip").value.trim();
    const equip = document.getElementById("equipIp").value;

    if (!ip || !equip) {
      alert("Preencha IP e equipamento");
      return;
    }

    const objetoInsert = {
      ip: ip,
      app_id: appId
    };

    objetoInsert[COLUNA_EQUIPAMENTO_IP] = equip;

    const { error } = await supabase
      .from("ips_provedor")
      .insert(objetoInsert);

    if (error) {
      console.error("Erro ao cadastrar IP:", error);
      alert("Erro ao cadastrar IP: " + error.message);
      return;
    }

    document.getElementById("ip").value = "";
    document.getElementById("equipIp").value = "";

    alert("IP cadastrado com sucesso");

    await carregarTabela();
    await dashboard();

  } catch (erro) {
    console.error("Erro geral ao cadastrar IP:", erro);
  }
}

/* =========================
   CARREGAR SELECTS
========================= */
async function carregarSelects() {
  try {
    const popSelect = document.getElementById("equipPop");
    popSelect.innerHTML = `<option value="">Selecione o POP</option>`;

    const filtroPopEquip = document.getElementById("filtroPopEquip");
    if (filtroPopEquip) {
      filtroPopEquip.innerHTML = `<option value="">Todos os POPs</option>`;
    }

    const { data: pops, error: popError } = await supabase
      .from("pops_provedor")
      .select("id,nome")
      .eq("app_id", appId)
      .order("nome", { ascending: true });

    if (popError) {
      console.error("Erro ao carregar POPs:", popError);
      return;
    }

    (pops || []).forEach(p => {
      popSelect.innerHTML += `<option value="${escaparHtml(p.id)}">${escaparHtml(p.nome)}</option>`;

      if (filtroPopEquip) {
        filtroPopEquip.innerHTML += `<option value="${escaparHtml(p.id)}">${escaparHtml(p.nome)}</option>`;
      }
    });

    const equipSelect = document.getElementById("equipIp");
    equipSelect.innerHTML = `<option value="">Selecione o equipamento</option>`;

    const { data: equip, error: equipError } = await supabase
      .from("equipamentos_provedor")
      .select("id,nome")
      .eq("app_id", appId)
      .order("nome", { ascending: true });

    if (equipError) {
      console.error("Erro ao carregar equipamentos:", equipError);
      return;
    }

    (equip || []).forEach(e => {
      equipSelect.innerHTML += `<option value="${escaparHtml(e.id)}">${escaparHtml(e.nome)}</option>`;
    });

  } catch (erro) {
    console.error("Erro geral ao carregar selects:", erro);
  }
}

/* =========================
   LISTAR EQUIPAMENTOS
========================= */
async function listarEquipamentos() {
  try {
    const filtro = document.getElementById("filtroPopEquip");
    const filtroPop = filtro ? filtro.value : "";

    const { data: equipamentos, error: erroEquip } = await supabase
      .from("equipamentos_provedor")
      .select("*")
      .eq("app_id", appId)
      .order("nome", { ascending: true });

    if (erroEquip) {
      alert("Erro ao listar equipamentos: " + erroEquip.message);
      return;
    }

    const { data: pops, error: erroPops } = await supabase
      .from("pops_provedor")
      .select("*")
      .eq("app_id", appId);

    if (erroPops) {
      alert("Erro ao listar POPs: " + erroPops.message);
      return;
    }

    const mapaPop = {};
    (pops || []).forEach(p => {
      mapaPop[String(p.id)] = p.nome;
    });

    const tbody = document.getElementById("listaEquipamentos");
    if (!tbody) return;

    tbody.innerHTML = "";

    (equipamentos || [])
      .filter(e => !filtroPop || String(e.pop_id) === String(filtroPop))
      .forEach(e => {
        const id = escaparHtml(e.id);
        const nome = escaparHtml(e.nome || "");
        const modelo = escaparHtml(e.modelo || "");
        const popNome = escaparHtml(mapaPop[String(e.pop_id)] || "");

        tbody.innerHTML += `
          <tr class="linha-click" onclick="selecionarEquipamento('${id}', '${nome}')">
            <td>${nome}</td>
            <td>${modelo}</td>
            <td>${popNome}</td>
          </tr>
        `;
      });

    if (!tbody.innerHTML.trim()) {
      tbody.innerHTML = `
        <tr>
          <td colspan="3" class="muted">Nenhum equipamento encontrado</td>
        </tr>
      `;
    }

  } catch (erro) {
    console.error("Erro ao listar equipamentos:", erro);
  }
}

/* =========================
   SELECIONAR EQUIPAMENTO
========================= */
function selecionarEquipamento(id, nome) {
  document.getElementById("equipIp").value = id;
  alert("Equipamento selecionado: " + nome);
}

/* =========================
   BUSCAR IP
========================= */
async function buscar() {
  try {
    const busca = document.getElementById("busca").value.trim();
    const linhas = await buscarDadosCompletos(busca);

    const tabela = document.getElementById("lista");
    tabela.innerHTML = "";

    linhas.forEach(l => {
      const ipSeguro = escaparHtml(l.ip);
      const nomeEquip = escaparHtml(l.equipamentoNome);
      const modeloEquip = escaparHtml(l.equipamentoModelo);
      const nomePop = escaparHtml(l.popNome);
      const localizacao = l.popLocalizacao || "";
      const localizacaoSegura = escaparHtml(localizacao);
      const linkMapa = "https://www.google.com/maps/search/" + encodeURIComponent(localizacao);

      tabela.innerHTML += `
        <tr>
          <td><a href="http://${ipSeguro}" target="_blank">${ipSeguro}</a></td>
          <td>${nomeEquip}</td>
          <td>${modeloEquip}</td>
          <td>${nomePop}</td>
          <td>
            ${localizacao
              ? `<a href="${linkMapa}" target="_blank" class="btn-mapa-link">
                   <button type="button" class="btn-mapa">📍 Ver localização</button>
                 </a>`
              : `<span class="muted">Sem localização</span>`
            }
            ${localizacao ? `<div class="texto-localizacao">${localizacaoSegura}</div>` : ``}
          </td>
        </tr>
      `;
    });

  } catch (erro) {
    console.error("Erro ao buscar:", erro);
    alert(erro.message || "Erro ao buscar");
  }
}

/* =========================
   ABRIR EQUIPAMENTOS
========================= */
function abrirEquipamentos() {
  let url = "equipamentos.html";

  if (popSelecionadoTopo) {
    url += "?pop_id=" + encodeURIComponent(popSelecionadoTopo);
  }

  window.open(url, "_blank");
}

/* =========================
   AVISO RENOVAÇÃO
========================= */
function formatarDataBR(dataStr) {
  if (!dataStr) return "";
  const d = new Date(dataStr + "T00:00:00");
  if (isNaN(d.getTime())) return dataStr;
  return d.toLocaleDateString("pt-BR");
}

function diasRestantes(dataStr) {
  if (!dataStr) return null;

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const venc = new Date(dataStr + "T00:00:00");
  venc.setHours(0,0,0,0);

  const diff = venc.getTime() - hoje.getTime();
  return Math.ceil(diff / 86400000);
}

function mostrarAvisoRenovacao(validade) {
  const faixa = document.getElementById("faixaRenovacao");
  if (!faixa) return;

  if (!validade) {
    faixa.innerHTML = "";
    return;
  }

  const dias = diasRestantes(validade);
  const dataFormatada = formatarDataBR(validade);

  if (dias < 0) {
    faixa.innerHTML = `
      <div class="aviso-renovacao">
        ⚠️ Seu plano expirou em ${dataFormatada}.
        <a href="/renovar.html">Clique aqui para renovar</a>
      </div>
    `;
    return;
  }

  if (dias <= 8) {
    faixa.innerHTML = `
      <div class="aviso-alerta">
        ⏳ Seu plano vence em ${dataFormatada}.
        <a href="/renovar.html">Renovar agora</a>
      </div>
    `;
    return;
  }

  faixa.innerHTML = "";
}

window.cadastrarPop = cadastrarPop;
window.cadastrarEquip = cadastrarEquip;
window.cadastrarIp = cadastrarIp;
window.buscar = buscar;
window.toggleFormEquip = toggleFormEquip;
window.toggleListaEquip = toggleListaEquip;
window.listarEquipamentos = listarEquipamentos;
window.abrirEquipamentos = abrirEquipamentos;
window.selecionarPopTopo = selecionarPopTopo;

carregarApp();
</script>

<body>

<div id="faixaRenovacao"></div>

<h2>📡 NOC Provedor</h2>

<div class="dashboard">
  <div class="card">
    <h3>POPs</h3>
    <h1 id="totalPops">0</h1>
  </div>

  <div class="card">
    <h3>Equipamentos</h3>
    <h1 id="totalEquip">0</h1>
  </div>

  <div class="card">
    <h3>IPs</h3>
    <h1 id="totalIps">0</h1>
  </div>
</div>

<div class="section">
  <h3>Escolher POP</h3>
  <div id="popsTopo" class="pops-topo"></div>
</div>

<div class="section">
  <h3>Cadastrar POP</h3>
  <input id="popNome" placeholder="Nome do POP">
  <input id="popLocal" placeholder="Localização">
  <button onclick="cadastrarPop()">Salvar</button>
</div>

<div class="section">
  <div class="topo-secao">
    <h3>Equipamentos</h3>
    <div class="acoes-topo">
      <button type="button" onclick="toggleFormEquip()">+ Novo equipamento</button>
      <button type="button" onclick="abrirEquipamentos()">Ver equipamentos</button>
    </div>
  </div>

  <div id="boxFormEquip" style="display:none; margin-top:15px;">
    <input id="equipNome" placeholder="Nome do equipamento">
    <input id="equipModelo" placeholder="Modelo (Mikrotik / Intelbras / STC / etc)">
    <select id="equipPop"></select>
    <button onclick="cadastrarEquip()">Salvar</button>
  </div>

  <div id="boxListaEquip" style="display:none; margin-top:15px;">
    <div style="margin-bottom:10px;">
      <select id="filtroPopEquip" onchange="listarEquipamentos()">
        <option value="">Todos os POPs</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Modelo</th>
          <th>POP</th>
        </tr>
      </thead>
      <tbody id="listaEquipamentos"></tbody>
    </table>
  </div>
</div>

<div class="section">
  <h3>Cadastrar IP</h3>
  <input id="ip" placeholder="IP do equipamento">
  <select id="equipIp"></select>
  <button onclick="cadastrarIp()">Salvar</button>
</div>

<div class="section">
  <h3>Buscar IP</h3>
  <input id="busca" placeholder="Buscar IP">
  <button onclick="buscar()">Buscar</button>

  <table>
    <thead>
      <tr>
        <th>IP</th>
        <th>Equipamento</th>
        <th>Modelo</th>
        <th>POP</th>
        <th>Localização</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

</body>
</html>
