<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa dos POPs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let mapa=null;
let camadaMarcadores;
let camadaLinhas;
let camadaFluxo;

function escaparHtml(t){
return String(t||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");
}

/* MAPA */

function iniciarMapa(){

mapa=L.map("mapaPops",{zoomControl:true});

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}
).addTo(mapa);

camadaMarcadores=L.layerGroup().addTo(mapa);
camadaLinhas=L.layerGroup().addTo(mapa);
camadaFluxo=L.layerGroup().addTo(mapa);

mapa.setView([-9,-42],6);
}

/* MARCADOR */

function criarIconePop(status,nome){

return L.divIcon({
className:"marcador-pop-wrap",
html:`
<div class="marcador-completo">
<div class="marcador-pop marcador-${status}">
<div class="marcador-core"></div>
</div>
<div class="nome-pop-fixo">${escaparHtml(nome)}</div>
</div>
`,
iconSize:[170,34],
iconAnchor:[13,17],
popupAnchor:[0,-12]
});

}

/* GEO */

async function geocodificarEndereco(endereco){

const url=`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(endereco)}`;

const r=await fetch(url);
const d=await r.json();

if(!d.length) return null;

return{
lat:Number(d[0].lat),
lng:Number(d[0].lon)
};

}

/* LINK MAPA */

function montarLinkMapa(localizacao,lat,lng){

if(localizacao){
return "https://www.google.com/maps/search/"+encodeURIComponent(localizacao);
}

return "https://www.google.com/maps/search/"+encodeURIComponent(`${lat},${lng}`);

}

/* BUSCAR DADOS */

async function carregar(){

camadaMarcadores.clearLayers();
camadaLinhas.clearLayers();

const {data:pops}=await supabase
.from("pops_provedor")
.select("*")
.order("nome",{ascending:true});

if(!pops)return;

for(const pop of pops){

let lat=pop.latitude;
let lng=pop.longitude;

if(!lat && pop.localizacao){

const geo=await geocodificarEndereco(pop.localizacao);
if(geo){
lat=geo.lat;
lng=geo.lng;
}

}

if(!lat)continue;

const marker=L.marker([lat,lng],{
icon:criarIconePop("up",pop.nome)
}).addTo(camadaMarcadores);

const linkMapa=montarLinkMapa(pop.localizacao,lat,lng);

marker.bindPopup(`
<div class="popup-mapa">

<div class="popup-topo">
<div class="titulo-popup">${escaparHtml(pop.nome)}</div>
</div>

<div class="bloco-popup">
<div class="linha-popup">
<span>Localização</span>
<strong>${escaparHtml(pop.localizacao||"Não informada")}</strong>
</div>

<div class="linha-popup">
<span>Latitude</span>
<strong>${lat}</strong>
</div>

<div class="linha-popup">
<span>Longitude</span>
<strong>${lng}</strong>
</div>
</div>

<div class="acoes-popup">
<a href="${linkMapa}" target="_blank" class="btn-popup-mapa">
Abrir no Google Maps
</a>
</div>

</div>
`);

}

}

/* INICIAR */

async function iniciar(){

iniciarMapa();
await carregar();

}

window.onload=iniciar;

</script>

<style>

body{
margin:0;
background:#020617;
color:#fff;
font-family:Arial;
padding:20px;
}

#mapaPops{
height:600px;
border-radius:14px;
}

.marcador-completo{
display:flex;
align-items:center;
gap:8px;
}

.nome-pop-fixo{
background:#020617;
padding:4px 8px;
border-radius:8px;
font-size:12px;
}

.marcador-pop{
width:24px;
height:24px;
border-radius:50%;
background:#22c55e;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #fff;
}

.marcador-core{
width:6px;
height:6px;
background:#fff;
border-radius:50%;
}

.popup-mapa{
min-width:220px;
}

.btn-popup-mapa{
display:inline-block;
margin-top:10px;
background:#2563eb;
color:#fff;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
}

</style>

</head>

<body>

<h2>Mapa Automático dos POPs</h2>

<div id="mapaPops"></div>

</body>
</html>
