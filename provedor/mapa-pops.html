<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa de POPs</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#0f172a;
font-family:Arial,Helvetica,sans-serif;
}

#mapa{
width:100%;
height:100%;
}

.pop-marker{
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>
<body>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* ================================
CONFIGURAÇÃO
================================ */

const SUPABASE_URL="https://pdajixsoowcyhnjwhgpc.supabase.co"
const SUPABASE_KEY="sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"

const appId="provedor1"

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

/* ================================
MAPA
================================ */

const mapa=L.map("mapa").setView([-14.235,-51.925],4)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19
}
).addTo(mapa)

const camadaMarcadores=L.layerGroup().addTo(mapa)
const camadaLinhas=L.layerGroup().addTo(mapa)

let animacoes=[]

/* ================================
UTIL
================================ */

function corStatus(status){

if(status==="down") return "#ef4444"
if(status==="warning") return "#f59e0b"
return "#22c55e"

}

function textoStatus(status){

if(status==="down") return "Offline"
if(status==="warning") return "Alerta"
return "Online"

}

function normalizarStatus(s){

if(!s) return "up"

s=String(s).toLowerCase()

if(s==="down") return "down"
if(s==="warning") return "warning"

return "up"

}

function criarIconePop(status){

const cor=corStatus(status)

return L.divIcon({

className:"pop-marker",

html:`
<div style="
width:16px;
height:16px;
border-radius:50%;
background:${cor};
border:2px solid white;
box-shadow:0 0 8px ${cor};
"></div>
`,

iconSize:[16,16]

})

}

function limparAnimacoesFluxo(){

animacoes.forEach(a=>clearInterval(a))
animacoes=[]

}

/* ================================
ANIMAÇÃO
================================ */

function animarFluxo(origem,destino,status){

const cor=corStatus(status)

const ponto=L.circleMarker(origem,{
radius:4,
color:cor,
fillColor:cor,
fillOpacity:1
}).addTo(mapa)

let passo=0

const anim=setInterval(()=>{

passo+=0.02

if(passo>=1) passo=0

const lat=origem[0]+(destino[0]-origem[0])*passo
const lng=origem[1]+(destino[1]-origem[1])*passo

ponto.setLatLng([lat,lng])

},60)

animacoes.push(anim)

}

/* ================================
CARREGAR MAPA
================================ */

async function carregarMapa(){

camadaMarcadores.clearLayers()
camadaLinhas.clearLayers()
limparAnimacoesFluxo()

const {data:pops,error}=await supabaseClient
.from("pops_provedor")
.select("*")
.eq("app_id",appId)

if(error){

console.error("Erro:",error)
return

}

if(!pops || pops.length===0){

console.warn("Nenhum POP")
return

}

const bounds=[]

const core=
pops.find(p=>String(p.nome).toUpperCase()==="CORE")
|| pops[0]

const latCore=Number(core.latitude)
const lngCore=Number(core.longitude)

pops.forEach(pop=>{

const lat=Number(pop.latitude)
const lng=Number(pop.longitude)

if(!lat || !lng) return

bounds.push([lat,lng])

const status=normalizarStatus(pop.status)

const marker=L.marker([lat,lng],{
icon:criarIconePop(status)
}).addTo(camadaMarcadores)

marker.bindPopup(
"<b>"+pop.nome+"</b><br>Status: "+textoStatus(status)
)

if(pop.id===core.id) return

const corLinha=corStatus(status)

L.polyline(
[
[latCore,lngCore],
[lat,lng]
],
{
color:corLinha,
weight:3,
opacity:0.9
}
).addTo(camadaLinhas)

animarFluxo(
[latCore,lngCore],
[lat,lng],
status
)

})

if(bounds.length){

mapa.fitBounds(bounds,{padding:[40,40]})

}

}

/* ================================
INICIAR
================================ */

carregarMapa()

setInterval(()=>{

carregarMapa()

},30000)

</script>

</body>
</html>
