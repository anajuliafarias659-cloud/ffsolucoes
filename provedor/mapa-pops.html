<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa de POPs</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#0f172a;
font-family:Arial, Helvetica, sans-serif;
}

#mapa{
width:100%;
height:100%;
}

.pop-marker{
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "COLOQUE_SUA_URL_AQUI"
const SUPABASE_KEY = "COLOQUE_SUA_KEY_AQUI"
const APP_ID = "COLOQUE_SEU_APP_ID"

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

const mapa = L.map("mapa").setView([-14.235,-51.925],4)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19
}
).addTo(mapa)

async function carregarMapa(){

const camadaLinhas = L.layerGroup().addTo(mapa)
const bounds = []

try{

const { data:pops, error } = await supabaseClient
.from("pops_provedor")
.select("*")
.eq("app_id",APP_ID)

if(error){
console.error(error)
return
}

if(!pops || pops.length===0){
console.log("Nenhum POP encontrado")
return
}

const pontos = []

pops.forEach(pop=>{

const lat = parseFloat(pop.latitude)
const lng = parseFloat(pop.longitude)

if(!lat || !lng) return

const status =
pop.status==="down"
? "down"
: pop.status==="warning"
? "warning"
: "up"

pontos.push({
id:pop.id,
nome:pop.nome,
lat,
lng,
status
})

bounds.push([lat,lng])

})

/* MARCADORES */

pontos.forEach(pop=>{

const cor =
pop.status==="down"
? "#ef4444"
: pop.status==="warning"
? "#f59e0b"
: "#22c55e"

const icone = L.divIcon({
className:"pop-marker",
html:`
<div style="
width:16px;
height:16px;
border-radius:50%;
background:${cor};
border:2px solid white;
box-shadow:0 0 8px ${cor};
"></div>
`,
iconSize:[16,16]
})

L.marker([pop.lat,pop.lng],{icon:icone})
.addTo(mapa)
.bindPopup("<b>"+pop.nome+"</b><br>Status: "+pop.status)

})

/* POP PRINCIPAL */

const popPrincipal =
pontos.find(p=>p.nome?.toUpperCase()==="CORE") || pontos[0]

/* LINHAS */

pontos.forEach(pop=>{

if(pop.id===popPrincipal.id) return

const statusLinha =
pop.status==="down" || popPrincipal.status==="down"
? "down"
: pop.status==="warning" || popPrincipal.status==="warning"
? "warning"
: "up"

const corLinha =
statusLinha==="down"
? "#ef4444"
: statusLinha==="warning"
? "#f59e0b"
: "#38bdf8"

L.polyline(
[
[popPrincipal.lat,popPrincipal.lng],
[pop.lat,pop.lng]
],
{
color:corLinha,
weight:3,
opacity:0.9
}
).addTo(camadaLinhas)

animarFluxo(
[popPrincipal.lat,popPrincipal.lng],
[pop.lat,pop.lng],
corLinha
)

})

if(bounds.length>0){
mapa.fitBounds(bounds,{padding:[40,40]})
}

}catch(err){
console.error("Erro:",err)
}

}

function animarFluxo(origem,destino,cor){

const circulo = L.circleMarker(origem,{
radius:4,
color:cor,
fillColor:cor,
fillOpacity:1
}).addTo(mapa)

let passo=0

setInterval(()=>{

passo+=0.02

if(passo>=1){
passo=0
}

const lat =
origem[0] + (destino[0]-origem[0])*passo

const lng =
origem[1] + (destino[1]-origem[1])*passo

circulo.setLatLng([lat,lng])

},60)

}

carregarMapa()

</script>

</body>
</html>
