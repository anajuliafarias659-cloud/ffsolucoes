<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa de POPs</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

#mapa{
height:100vh;
width:100%;
}

.pop{
width:22px;
height:22px;
border-radius:50%;
border:3px solid white;
}

.up{
background:#22c55e;
animation:pulso 2s infinite;
}

.warning{
background:#f59e0b;
animation:pulso 1.6s infinite;
}

.down{
background:#ef4444;
animation:pulso 1.2s infinite;
}

@keyframes pulso{

0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(255,255,255,0.4);
}

70%{
transform:scale(1.1);
box-shadow:0 0 0 16px rgba(255,255,255,0);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =============================
// POPS
// =============================

const pops = [

{
nome:"POP Centro",
lat:-9.012,
lng:-42.70
},

{
nome:"POP Norte",
lat:-8.95,
lng:-42.65
},

{
nome:"POP Sul",
lat:-9.10,
lng:-42.75
},

{
nome:"POP Oeste",
lat:-9.05,
lng:-42.85
}

]

// =============================
// MAPA
// =============================

const mapa = L.map("mapa").setView([-9.02,-42.72],9)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19
}
).addTo(mapa)

// =============================
// STATUS RANDOM
// =============================

function statusRandom(){

const lista = ["up","warning","down"]

return lista[Math.floor(Math.random()*lista.length)]

}

// =============================
// CRIAR MARCADOR
// =============================

function criarMarcador(pop){

const status = statusRandom()

const icone = L.divIcon({

className:"",
html:`<div class="pop ${status}"></div>`,
iconSize:[20,20]

})

const marker = L.marker([pop.lat,pop.lng],{icon:icone})

marker.bindPopup(`<b>${pop.nome}</b><br>Status: ${status.toUpperCase()}`)

marker.addTo(mapa)

return {marker,status}

}

// =============================
// ANIMAÇÃO DE TRÁFEGO
// =============================

function animar(origem,destino){

const bolinha = L.circleMarker(origem,{
radius:4,
color:"#38bdf8",
fillColor:"#38bdf8",
fillOpacity:1
}).addTo(mapa)

let p = 0

function frame(){

p += 0.005

if(p>1)p=0

const lat = origem[0] + (destino[0]-origem[0])*p
const lng = origem[1] + (destino[1]-origem[1])*p

bolinha.setLatLng([lat,lng])

requestAnimationFrame(frame)

}

frame()

}

// =============================
// DESENHAR POPS
// =============================

const marcadores=[]

pops.forEach(pop=>{

const m = criarMarcador(pop)

marcadores.push({
lat:pop.lat,
lng:pop.lng,
status:m.status
})

})

// =============================
// LIGAR POPS
// =============================

for(let i=1;i<marcadores.length;i++){

const a = marcadores[i-1]
const b = marcadores[i]

L.polyline(
[
[a.lat,a.lng],
[b.lat,b.lng]
],
{
color:"#38bdf8",
weight:3
}
).addTo(mapa)

animar(
[a.lat,a.lng],
[b.lat,b.lng]
)

}

</script>

</body>
</html>
