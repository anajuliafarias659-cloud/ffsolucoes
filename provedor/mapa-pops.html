<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa dos POPs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let appId = null;
let mapa = null;
let camadaMarcadores = null;
let camadaLinhas = null;
let cacheGeocoding = {};

/* =========================
   AUX
========================= */
function escaparHtml(texto){
  if(texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function normalizarIp(ip){
  if(!ip) return "";
  return String(ip)
    .trim()
    .replace(/^https?:\/\//i, "")
    .replace(/\/.*$/, "")
    .replace(/:\d+$/, "")
    .trim();
}

function ehLatLngTexto(texto){
  if(!texto) return false;
  return /^-?\d+(\.\d+)?\s*,\s*-?\d+(\.\d+)?$/.test(String(texto).trim());
}

function extrairLatLng(texto){
  if(!ehLatLngTexto(texto)) return null;

  const partes = String(texto).split(",");
  const lat = Number(partes[0].trim());
  const lng = Number(partes[1].trim());

  if(Number.isNaN(lat) || Number.isNaN(lng)) return null;

  return { lat, lng };
}

function ehLinkMapa(texto){
  const valor = String(texto || "").trim().toLowerCase();
  return (
    valor.startsWith("http://") ||
    valor.startsWith("https://") ||
    valor.startsWith("www.") ||
    valor.includes("maps.app.goo.gl") ||
    valor.includes("google.com/maps")
  );
}

function montarLinkMapa(localizacao, lat = null, lng = null){
  const valor = String(localizacao || "").trim();

  if(valor){
    if(
      valor.startsWith("http://") ||
      valor.startsWith("https://")
    ){
      return valor;
    }

    if(
      valor.startsWith("www.") ||
      valor.includes("maps.app.goo.gl") ||
      valor.includes("google.com/maps")
    ){
      return "https://" + valor.replace(/^https?:\/\//i, "");
    }

    return "https://www.google.com/maps/search/" + encodeURIComponent(valor);
  }

  if(lat !== null && lng !== null){
    return "https://www.google.com/maps/search/" + encodeURIComponent(`${lat},${lng}`);
  }

  return "";
}

function extrairCoordenadaDeLink(link){
  const texto = String(link || "").trim();
  if(!texto) return null;

  let match = texto.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return {
      lat: Number(match[1]),
      lng: Number(match[2])
    };
  }

  match = texto.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
  if(match){
    return {
      lat: Number(match[1]),
      lng: Number(match[2])
    };
  }

  match = texto.match(/[?&]q=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return {
      lat: Number(match[1]),
      lng: Number(match[2])
    };
  }

  match = texto.match(/[?&]ll=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return {
      lat: Number(match[1]),
      lng: Number(match[2])
    };
  }

  return null;
}

function mostrarStatus(texto, tipo="ok"){
  const box = document.getElementById("status");
  box.className = "status " + tipo;
  box.innerText = texto || "";
}

function iniciarMapa(){
  if(mapa) return;

  mapa = L.map("mapaPops");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap"
  }).addTo(mapa);

  camadaMarcadores = L.layerGroup().addTo(mapa);
  camadaLinhas = L.layerGroup().addTo(mapa);

  mapa.setView([-9.0, -42.7], 6);
}

async function geocodificarEndereco(endereco){
  try{
    if(!endereco) return null;

    const chave = String(endereco).trim().toLowerCase();
    if(cacheGeocoding[chave]) return cacheGeocoding[chave];

    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(endereco)}`;

    const resposta = await fetch(url, {
      headers: {
        "Accept": "application/json"
      }
    });

    const dados = await resposta.json();

    if(!dados || !dados.length){
      return null;
    }

    const resultado = {
      lat: Number(dados[0].lat),
      lng: Number(dados[0].lon)
    };

    cacheGeocoding[chave] = resultado;
    return resultado;

  }catch(erro){
    console.error("Erro ao geocodificar:", endereco, erro);
    return null;
  }
}

/* =========================
   AUTH / APP ID
========================= */
async function obterAppId(){
  const { data:{ session }, error: sessionError } = await supabase.auth.getSession();

  if(sessionError){
    throw new Error("Erro ao verificar sessão: " + sessionError.message);
  }

  if(!session){
    location.href = "/auth/login.html";
    return null;
  }

  const userId = session.user.id;

  const { data:user, error:userError } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(userError){
    throw new Error("Erro ao buscar app_id: " + userError.message);
  }

  if(!user || !user.app_id){
    throw new Error("Usuário sem app_id vinculado");
  }

  return user.app_id;
}

/* =========================
   CARREGAR POPS NO FILTRO
========================= */
async function carregarFiltroPops(){
  const { data:pops, error } = await supabase
    .from("pops_provedor")
    .select("id,nome")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(error){
    throw new Error("Erro ao carregar filtro de POPs: " + error.message);
  }

  const filtro = document.getElementById("filtroPop");
  filtro.innerHTML = `<option value="">Todos os POPs</option>`;

  (pops || []).forEach(pop => {
    filtro.innerHTML += `
      <option value="${escaparHtml(pop.id)}">${escaparHtml(pop.nome || "")}</option>
    `;
  });
}

/* =========================
   BUSCAR DADOS
========================= */
async function buscarDadosMapa(){
  const popSelecionado = document.getElementById("filtroPop").value;

  let queryPops = supabase
    .from("pops_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(popSelecionado){
    queryPops = queryPops.eq("id", popSelecionado);
  }

  const { data:pops, error:errorPops } = await queryPops;

  if(errorPops){
    throw new Error("Erro ao carregar POPs: " + errorPops.message);
  }

  const { data:equipamentos, error:errorEquip } = await supabase
    .from("equipamentos_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(errorEquip){
    throw new Error("Erro ao carregar equipamentos: " + errorEquip.message);
  }

  const { data:ips, error:errorIps } = await supabase
    .from("ips_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("ip", { ascending:true });

  if(errorIps){
    throw new Error("Erro ao carregar IPs: " + errorIps.message);
  }

  return {
    pops: pops || [],
    equipamentos: equipamentos || [],
    ips: ips || []
  };
}
/* =========================
   MONTAR MAPA
========================= */
async function desenharMapa(){
  try{
    mostrarStatus("Carregando mapa...", "ok");
    iniciarMapa();
    camadaMarcadores.clearLayers();
    camadaLinhas.clearLayers();

    const { pops, equipamentos, ips } = await buscarDadosMapa();

    const mapaEquipPorPop = {};
    equipamentos.forEach(eq => {
      const popId = String(eq.pop_id || "");
      if(!popId) return;

      if(!mapaEquipPorPop[popId]){
        mapaEquipPorPop[popId] = [];
      }

      mapaEquipPorPop[popId].push(eq);
    });

    const mapaIpsPorEquip = {};
    ips.forEach(ipItem => {
      const equipId = String(ipItem.equipamento || "");
      if(!equipId) return;

      if(!mapaIpsPorEquip[equipId]){
        mapaIpsPorEquip[equipId] = [];
      }

      mapaIpsPorEquip[equipId].push(ipItem);
    });

    const pontos = [];

    for(const pop of pops){
      let coords = null;

      if(pop.latitude && pop.longitude){
        coords = {
          lat: Number(pop.latitude),
          lng: Number(pop.longitude)
        };
      }else if(pop.localizacao){
        const localizacaoTexto = String(pop.localizacao || "").trim();

        coords = extrairLatLng(localizacaoTexto);

        if(!coords){
          coords = extrairCoordenadaDeLink(localizacaoTexto);
        }

        if(!coords && !ehLinkMapa(localizacaoTexto)){
          coords = await geocodificarEndereco(localizacaoTexto);
        }
      }

      if(!coords){
        console.warn("POP sem coordenadas/localização válida:", pop.nome, pop.localizacao);
        continue;
      }

      const listaEquip = mapaEquipPorPop[String(pop.id)] || [];

      const ipsDoPop = [];
      listaEquip.forEach(eq => {
        const listaIpsEquip = mapaIpsPorEquip[String(eq.id)] || [];
        listaIpsEquip.forEach(ipItem => {
          const ipTratado = normalizarIp(ipItem.ip || "");
          if(ipTratado){
            ipsDoPop.push(ipTratado);
          }
        });
      });

      pontos.push({
        id: pop.id,
        nome: pop.nome || "Sem nome",
        localizacao: pop.localizacao || "",
        lat: coords.lat,
        lng: coords.lng,
        equipamentos: listaEquip,
        ips: [...new Set(ipsDoPop)]
      });
    }

    if(!pontos.length){
      mostrarStatus("Nenhum POP com localização válida encontrado.", "erro");
      mapa.setView([-14.235, -51.9253], 4);
      document.getElementById("resumo").innerHTML = `
        <div class="card-resumo">Nenhum POP com localização válida para mostrar no mapa.</div>
      `;
      return;
    }

    const bounds = [];
    let totalEquip = 0;
    let totalIps = 0;

    pontos.forEach((pop, index) => {
      totalEquip += pop.equipamentos.length;
      totalIps += pop.ips.length;

      const equipamentosHtml = pop.equipamentos.length
        ? pop.equipamentos.map(eq => `
            <div class="item-popup">
              <strong>${escaparHtml(eq.nome || "Sem nome")}</strong>
              <span>${escaparHtml(eq.modelo || "Sem modelo")}</span>
            </div>
          `).join("")
        : `<div class="item-popup muted-popup">Sem equipamentos</div>`;

      const ipsHtml = pop.ips.length
        ? pop.ips.slice(0, 10).map(ip => `
            <div class="ip-popup">${escaparHtml(ip)}</div>
          `).join("")
        : `<div class="muted-popup">Sem IP cadastrado</div>`;

      const linkMapa = montarLinkMapa(pop.localizacao, pop.lat, pop.lng);

      const marker = L.marker([pop.lat, pop.lng]).addTo(camadaMarcadores);

      marker.bindPopup(`
        <div class="popup-mapa">
          <div class="titulo-popup">${escaparHtml(pop.nome)}</div>
          <div><b>Localização:</b> ${escaparHtml(pop.localizacao || "Não informada")}</div>
          <div><b>Latitude:</b> ${escaparHtml(pop.lat)}</div>
          <div><b>Longitude:</b> ${escaparHtml(pop.lng)}</div>
          <div><b>Equipamentos:</b> ${pop.equipamentos.length}</div>
          <div><b>IPs:</b> ${pop.ips.length}</div>

          <div class="sub-popup">Equipamentos</div>
          ${equipamentosHtml}

          <div class="sub-popup">IPs</div>
          ${ipsHtml}

          <div style="margin-top:10px;">
            <a
              href="${escaparHtml(linkMapa)}"
              target="_blank"
              class="btn-popup-mapa"
            >
              Abrir no Google Maps
            </a>
          </div>
        </div>
      `);

      bounds.push([pop.lat, pop.lng]);

      if(index > 0){
        const anterior = pontos[index - 1];

        L.polyline(
          [
            [anterior.lat, anterior.lng],
            [pop.lat, pop.lng]
          ],
          {
            color: "#38bdf8",
            weight: 3,
            opacity: 0.85
          }
        ).addTo(camadaLinhas);
      }
    });

    mapa.fitBounds(bounds, { padding:[30,30] });

    document.getElementById("resumo").innerHTML = `
      <div class="card-resumo">
        <strong>POPs no mapa:</strong> ${pontos.length}
      </div>
      <div class="card-resumo">
        <strong>Equipamentos encontrados:</strong> ${totalEquip}
      </div>
      <div class="card-resumo">
        <strong>IPs encontrados:</strong> ${totalIps}
      </div>
    `;

    mostrarStatus("Mapa carregado com sucesso.", "sucesso");

  }catch(erro){
    console.error(erro);
    mostrarStatus(erro.message || "Erro ao carregar mapa", "erro");
  }
}

/* =========================
   INICIAR
========================= */
async function iniciar(){
  try{
    appId = await obterAppId();
    await carregarFiltroPops();
    await desenharMapa();
  }catch(erro){
    console.error("Erro ao iniciar:", erro);
    mostrarStatus(erro.message || "Erro ao iniciar página", "erro");
  }
}

window.recarregarMapa = desenharMapa;

iniciar();
</script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

h2{
  margin:0;
}

.painel{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

select, button{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-size:14px;
}

select{
  min-width:220px;
}

button{
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.status{
  margin-bottom:16px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #1e293b;
  background:#0f172a;
}

.status.ok{
  color:#cbd5e1;
}

.status.sucesso{
  color:#86efac;
  border-color:#14532d;
}

.status.erro{
  color:#fca5a5;
  border-color:#7f1d1d;
}

#resumo{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:12px;

}

.card-resumo{
  background:#0f172a;

  border-radius:14px;
  padding:14px;
}

.box-mapa{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:16px;
  padding:16px;
}

#mapaPops{
  width:100%;
  height:520px;
  border-radius:12px;
  overflow:hidden;
}

.popup-mapa{
  min-width:250px;
  line-height:1.45;
  color:#111827;
}

.titulo-popup{
  font-weight:bold;
  font-size:16px;
  margin-bottom:8px;
}

.sub-popup{
  margin-top:10px;
  margin-bottom:6px;
  font-weight:bold;
}

.item-popup{
  margin-bottom:6px;
  padding:6px 8px;
  background:#f8fafc;

}

.item-popup span{
  display:block;
  font-size:12px;

  margin-top:2px;
}

  display:inline-block;
  margin:3px 4px 3px 0;

  border-radius:999px;

}

  color:#64748b;

}

  display:inline-block;

  background:#2563eb;
  color:#fff;

  font-size:12px;
}

@media(max-width:700px){
  body{
    padding:14px;
  }

  .topo{
    flex-direction:column;
    align-items:stretch;
  }

  .painel{
    flex-direction:column;
    align-items:stretch;
  }

  select, button{
    width:100%;
  }

  #mapaPops{
    height:380px;
  }
}
</style>
</head>
<body>

<div class="topo">
  <h2>Mapa Automático dos POPs</h2>

  <div class="painel">
    <select id="filtroPop" onchange="recarregarMapa()">
      <option value="">Todos os POPs</option>
    </select>

    <button onclick="recarregarMapa()">Atualizar mapa</button>
  </div>
</div>

<div id="status" class="status ok">Iniciando...</div>

<div id="resumo"></div>

<div class="box-mapa">
  <div id="mapaPops"></div>
</div>

</body>
</html>
