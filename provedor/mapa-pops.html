/* =========================
   AUX
========================= */
function escaparHtml(texto){
  if(texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function normalizarTexto(texto){
  if(!texto) return "";
  return String(texto)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .toLowerCase();
}

function limparHtmlTexto(texto){
  if(!texto) return "";
  return String(texto)
    .replace(/<[^>]*>/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function normalizarIp(ip){
  if(!ip) return "";
  return String(ip)
    .trim()
    .replace(/^https?:\/\//i, "")
    .replace(/\/.*$/, "")
    .replace(/:\d+$/, "")
    .trim();
}

function ehLatLngTexto(texto){
  if(!texto) return false;
  return /^-?\d+(\.\d+)?\s*,\s*-?\d+(\.\d+)?$/.test(String(texto).trim());
}

function extrairLatLng(texto){
  if(!ehLatLngTexto(texto)) return null;

  const partes = String(texto).split(",");
  const lat = Number(partes[0].trim());
  const lng = Number(partes[1].trim());

  if(Number.isNaN(lat) || Number.isNaN(lng)) return null;
  return { lat, lng };
}

function ehLinkMapa(texto){
  const valor = String(texto || "").trim().toLowerCase();
  return (
    valor.startsWith("http://") ||
    valor.startsWith("https://") ||
    valor.startsWith("www.") ||
    valor.includes("maps.app.goo.gl") ||
    valor.includes("google.com/maps")
  );
}

function montarLinkMapa(localizacao, lat = null, lng = null){
  const valor = String(localizacao || "").trim();

  if(valor){
    if(valor.startsWith("http://") || valor.startsWith("https://")){
      return valor;
    }

    if(
      valor.startsWith("www.") ||
      valor.includes("maps.app.goo.gl") ||
      valor.includes("google.com/maps")
    ){
      return "https://" + valor.replace(/^https?:\/\//i, "");
    }

    return "https://www.google.com/maps/search/" + encodeURIComponent(valor);
  }

  if(lat !== null && lng !== null){
    return "https://www.google.com/maps/search/" + encodeURIComponent(`${lat},${lng}`);
  }

  return "";
}

function extrairCoordenadaDeLink(link){
  const texto = String(link || "").trim();
  if(!texto) return null;

  let match = texto.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  match = texto.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  match = texto.match(/[?&]q=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  match = texto.match(/[?&]ll=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  return null;
}

/* =========================
   STATUS
========================= */
function normalizarStatus(valor){
  if(!valor) return "unknown";

  const s = String(valor).trim().toLowerCase();

  if(
    s.includes("up") ||
    s.includes("online") ||
    s.includes("ok") ||
    s.includes("ativo") ||
    s.includes("normal")
  ){
    return "up";
  }

  if(
    s.includes("down") ||
    s.includes("offline") ||
    s.includes("erro") ||
    s.includes("falha")
  ){
    return "down";
  }

  if(
    s.includes("warning") ||
    s.includes("alerta") ||
    s.includes("alarme")
  ){
    return "warning";
  }

  return "unknown";
}

function corStatus(status){
  if(status === "up") return "#22c55e";
  if(status === "down") return "#ef4444";
  if(status === "warning") return "#f59e0b";
  return "#f59e0b";
}

function textoStatus(status){
  if(status === "up") return "UP";
  if(status === "down") return "DOWN";
  if(status === "warning") return "ALERTA";
  return "SEM STATUS";
}

function badgeClassStatus(status){
  if(status === "up") return "up";
  if(status === "down") return "down";
  return "unknown";
}

/* =========================
   PRTG
========================= */
async function carregarStatusPRTG(){
  try{
    const url = "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/PRTG";

    const resposta = await fetch(url);
    const textoBruto = await resposta.text();

    let dados = {};
    try{
      dados = textoBruto ? JSON.parse(textoBruto) : {};
    }catch{
      dados = { erro: textoBruto || "Resposta inválida da function" };
    }

    if(!resposta.ok){
      throw new Error(dados.erro || ("Function respondeu com status " + resposta.status));
    }

    const devices = dados.devices || [];

    const mapaPorIp = {};
    const mapaPorNome = {};

    devices.forEach(item => {
      const hostOriginal = String(item.host || "").trim();
      const hostNormalizado = normalizarIp(hostOriginal);

      const nomeDevice = String(item.device || "").trim();
      const nomeNormalizado = normalizarTexto(nomeDevice);

      const statusInfo = {
        status: item.status || "",
        message: limparHtmlTexto(item.message || ""),
        device: nomeDevice || "",
        host: hostNormalizado || hostOriginal || ""
      };

      if(hostNormalizado){
        mapaPorIp[hostNormalizado] = statusInfo;
      }

      if(nomeNormalizado){
        mapaPorNome[nomeNormalizado] = statusInfo;
      }
    });

    return {
      ok: true,
      porIp: mapaPorIp,
      porNome: mapaPorNome
    };

  }catch(erro){
    console.error("Erro ao buscar status no PRTG:", erro);
    return {
      ok: false,
      porIp: {},
      porNome: {},
      erro: erro.message || "Erro ao consultar PRTG"
    };
  }
}

function obterStatusEquipamento(eq, listaIpsEquip, statusPRTG){
  if(!statusPRTG || !statusPRTG.ok){
    return {
      status: "unknown",
      info: null
    };
  }

  for(const item of listaIpsEquip){
    const ipBase = normalizarIp(item.ip || "");
    if(ipBase && statusPRTG.porIp[ipBase]){
      return {
        status: normalizarStatus(statusPRTG.porIp[ipBase].status),
        info: statusPRTG.porIp[ipBase]
      };
    }
  }

  const nomeNormalizado = normalizarTexto(eq.nome || "");
  if(nomeNormalizado && statusPRTG.porNome[nomeNormalizado]){
    return {
      status: normalizarStatus(statusPRTG.porNome[nomeNormalizado].status),
      info: statusPRTG.porNome[nomeNormalizado]
    };
  }

  return {
    status: "unknown",
    info: null
  };
}

function calcularStatusPopPorEquipamentos(statusesEquip){
  if(!statusesEquip.length) return "unknown";

  let temUp = false;
  let temWarning = false;

  for(const st of statusesEquip){
    if(st === "down") return "down";
    if(st === "warning") temWarning = true;
    if(st === "up") temUp = true;
  }

  if(temWarning) return "warning";
  if(temUp) return "up";
  return "unknown";
}

async function geocodificarEndereco(endereco){
  try{
    if(!endereco) return null;

    const chave = String(endereco).trim().toLowerCase();
    if(cacheGeocoding[chave]) return cacheGeocoding[chave];

    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(endereco)}`;

    const resposta = await fetch(url, {
      headers: {
        "Accept": "application/json"
      }
    });

    const dados = await resposta.json();

    if(!dados || !dados.length){
      return null;
    }

    const resultado = {
      lat: Number(dados[0].lat),
      lng: Number(dados[0].lon)
    };

    cacheGeocoding[chave] = resultado;
    return resultado;

  }catch(erro){
    console.error("Erro ao geocodificar:", endereco, erro);
    return null;
  }
}

/* =========================
   AUTH / APP ID
========================= */
async function obterAppId(){
  const { data:{ session }, error: sessionError } = await supabase.auth.getSession();

  if(sessionError){
    throw new Error("Erro ao verificar sessão: " + sessionError.message);
  }

  if(!session){
    location.href = "/auth/login.html";
    return null;
  }

  const userId = session.user.id;

  const { data:user, error:userError } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(userError){
    throw new Error("Erro ao buscar app_id: " + userError.message);
  }

  if(!user || !user.app_id){
    throw new Error("Usuário sem app_id vinculado");
  }

  return user.app_id;
}

/* =========================
   BUSCAR DADOS
========================= */
async function buscarDadosMapa(){
  const popSelecionado = document.getElementById("filtroPop").value;

  let queryPops = supabase
    .from("pops_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(popSelecionado){
    queryPops = queryPops.eq("id", popSelecionado);
  }

  const { data:pops, error:errorPops } = await queryPops;

  if(errorPops){
    throw new Error("Erro ao carregar POPs: " + errorPops.message);
  }

  const { data:equipamentos, error:errorEquip } = await supabase
    .from("equipamentos_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(errorEquip){
    throw new Error("Erro ao carregar equipamentos: " + errorEquip.message);
  }

  const { data:ips, error:errorIps } = await supabase
    .from("ips_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("ip", { ascending:true });

  if(errorIps){
    throw new Error("Erro ao carregar IPs: " + errorIps.message);
  }

  return {
    pops: pops || [],
    equipamentos: equipamentos || [],
    ips: ips || []
  };
}

/* =========================
   ANIMAÇÃO DE TRÁFEGO
========================= */
function animarFluxoEntrePontos(origem, destino, statusLinha = "up"){
  const bolinha = L.circleMarker(origem, {
    radius: 4,
    color: statusLinha === "down" ? "#ef4444" : "#38bdf8",
    fillColor: statusLinha === "down" ? "#ef4444" : "#38bdf8",
    fillOpacity: 1,
    opacity: 1,
    weight: 2
  }).addTo(camadaFluxo);

  let progresso = 0;
  const velocidade = 0.006;

  function passo(){
    progresso += velocidade;
    if(progresso > 1) progresso = 0;

    const lat = origem[0] + (destino[0] - origem[0]) * progresso;
    const lng = origem[1] + (destino[1] - origem[1]) * progresso;

    bolinha.setLatLng([lat, lng]);

    const id = requestAnimationFrame(passo);
    animacoesFluxo.push(id);
  }

  const id = requestAnimationFrame(passo);
  animacoesFluxo.push(id);
}

    const nomeOk = !busca || String(pop.nome).toLowerCase().includes(busca);

            <div class="linha-popup"><span>Equipamentos</span><strong>${pop.equipamentos.length}</strong></div>
            <div class="linha-popup"><span>IPs</span><strong>${pop.ips.length}</strong></div>
            <div class="linha-popup"><span>Status do POP</span><strong style="color:${corStatus(pop.status)}">${textoStatus(pop.status)}</strong></div>
          </div>

          <div class="acoes-popup">
            <a href="${escaparHtml(linkMapa)}" target="_blank" class="btn-popup-mapa">
              Abrir no Google Maps
            </a>
          </div>
        </div>
      `);

      bounds.push([pop.lat, pop.lng]);

      if(index > 0){
        const anterior = pontos[index - 1];

        const statusLinha =
          pop.status === "down" || anterior.status === "down"
            ? "down"
            : (pop.status === "up" && anterior.status === "up" ? "up" : "unknown");

        L.polyline(
          [
            [anterior.lat, anterior.lng],
            [pop.lat, pop.lng]
          ],
          {
            color:
              statusLinha === "down"
                ? "#ef4444"
                : statusLinha === "up"
                  ? "#38bdf8"
                  : "#f59e0b",
            weight: statusLinha === "down" ? 4 : 3,
            opacity: 0.9,
            dashArray: statusLinha === "unknown" ? "8, 10" : null
          }
        ).addTo(camadaLinhas);

        animarFluxoEntrePontos(
          [anterior.lat, anterior.lng],
          [pop.lat, pop.lng],
          statusLinha
        );
      }
    });

    mapa.fitBounds(bounds, { padding:[40,40] });

    atualizarResumo(pontos);
    renderizarPainelLateral(pontos);

    ultimoAtualizadoEm = new Date();
    atualizarLegendaAtualizacao();

    if(!silencioso){
      mostrarStatus("Mapa carregado com sucesso.", "sucesso");
    }else{
      mostrarStatus("Mapa atualizado automaticamente.", "sucesso");
    }

  }catch(erro){
    console.error(erro);
    mostrarStatus(erro.message || "Erro ao carregar mapa", "erro");
  }
}

/* =========================
   EVENTOS
========================= */
function registrarEventosUI(){
  document.getElementById("buscaPop").addEventListener("input", () => {
    renderizarPainelLateral(pontosGlobais);
  });

  document.getElementById("filtroStatusLista").addEventListener("change", () => {
    renderizarPainelLateral(pontosGlobais);
  });
}

/* =========================
   INICIAR
========================= */
async function iniciar(){
  try{
    appId = await obterAppId();
    await carregarFiltroPops();
    registrarEventosUI();
    await desenharMapa();
    iniciarAutoRefresh();
  }catch(erro){
    console.error("Erro ao iniciar:", erro);
    mostrarStatus(erro.message || "Erro ao iniciar página", "erro");
  }
}

window.recarregarMapa = () => desenharMapa(false);

iniciar();
</script>
