<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa dos POPs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let appId = null;
let mapa = null;
let camadaMarcadores = null;
let camadaLinhas = null;
let camadaFluxo = null;
let cacheGeocoding = {};
let animacoesFluxo = [];

// ⭐ NOVO
let popPrincipalId = null;

/* =========================
   FUNÇÕES BASE
========================= */
function escaparHtml(t){ return String(t||"").replace(/[&<>"']/g,s=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[s])); }
function normalizarIp(ip){ return String(ip||"").replace(/^https?:\/\//,"").replace(/\/.*$/,"").replace(/:\d+$/,"").trim(); }

/* =========================
   MAPA
========================= */
function iniciarMapa(){
  if(mapa) return;

  mapa = L.map("mapaPops");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(mapa);

  camadaMarcadores = L.layerGroup().addTo(mapa);
  camadaLinhas = L.layerGroup().addTo(mapa);
  camadaFluxo = L.layerGroup().addTo(mapa);

  mapa.setView([-9,-42],6);
}

/* =========================
   POP PRINCIPAL
========================= */
function definirPopPrincipal(){
  popPrincipalId = document.getElementById("popPrincipal").value || null;
  desenharMapa();
}

/* =========================
   ÍCONE
========================= */
function criarIconePop(status,nome,isPrincipal=false){
  return L.divIcon({
    html: `
      <div style="display:flex;align-items:center;gap:6px">
        <div class="marker ${status} ${isPrincipal?'principal':''}"></div>
        <div>${isPrincipal?"⭐ ":""}${escaparHtml(nome)}</div>
      </div>
    `,
    className:""
  });
}

/* =========================
   DADOS
========================= */
async function carregarFiltroPops(){
  const {data:pops} = await supabase.from("pops_provedor").select("id,nome").eq("app_id",appId);

  const f = document.getElementById("filtroPop");
  const p = document.getElementById("popPrincipal");

  f.innerHTML = `<option value="">Todos</option>`;
  p.innerHTML = `<option value="">POP Principal</option>`;

  pops.forEach(pop=>{
    f.innerHTML += `<option value="${pop.id}">${pop.nome}</option>`;
    p.innerHTML += `<option value="${pop.id}">${pop.nome}</option>`;
  });
}

async function buscarDados(){
  const {data:pops} = await supabase.from("pops_provedor").select("*").eq("app_id",appId);
  return pops || [];
}

/* =========================
   LINHA + ANIMAÇÃO
========================= */
function animar(orig,dest){
  const bol = L.circleMarker(orig,{radius:4}).addTo(camadaFluxo);
  let t=0;
  function step(){
    t+=0.01;
    if(t>1)t=0;
    bol.setLatLng([
      orig[0]+(dest[0]-orig[0])*t,
      orig[1]+(dest[1]-orig[1])*t
    ]);
    requestAnimationFrame(step);
  }
  step();
}

/* =========================
   DESENHAR
========================= */
async function desenharMapa(){
  iniciarMapa();

  camadaMarcadores.clearLayers();
  camadaLinhas.clearLayers();
  camadaFluxo.clearLayers();

  const pops = await buscarDados();

  let pontos = pops.map(p=>({
    id:p.id,
    nome:p.nome,
    lat:Number(p.latitude),
    lng:Number(p.longitude)
  })).filter(p=>p.lat && p.lng);

  pontos.forEach((pop,i)=>{

    const isPrincipal = String(pop.id) === String(popPrincipalId);

    L.marker([pop.lat,pop.lng],{
      icon:criarIconePop("up",pop.nome,isPrincipal)
    }).addTo(camadaMarcadores);

    let origem = null;

    if(popPrincipalId){
      origem = pontos.find(p=>String(p.id)===String(popPrincipalId));
    }else if(i>0){
      origem = pontos[i-1];
    }

    if(origem && origem.id !== pop.id){
      L.polyline([[origem.lat,origem.lng],[pop.lat,pop.lng]]).addTo(camadaLinhas);
      animar([origem.lat,origem.lng],[pop.lat,pop.lng]);
    }
  });
}

/* =========================
   INIT
========================= */
async function iniciar(){
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) return location.href="/login.html";

  const {data:user} = await supabase.from("usuarios").select("app_id").eq("id",session.user.id).single();
  appId = user.app_id;

  await carregarFiltroPops();
  desenharMapa();
}

window.recarregarMapa = desenharMapa;
iniciar();

</script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:Arial}
#mapaPops{height:100vh}

/* marcador */
.marker{
  width:16px;height:16px;border-radius:50%;
  background:#22c55e;
}

.marker.principal{
  transform:scale(1.6);
  box-shadow:0 0 20px #3b82f6;
}
</style>
</head>

<body>

<div style="position:absolute;z-index:999;padding:10px">
  <select id="filtroPop" onchange="recarregarMapa()"></select>
  <select id="popPrincipal" onchange="definirPopPrincipal()"></select>
  <button onclick="recarregarMapa()">Atualizar</button>
</div>

<div id="mapaPops"></div>

</body>
</html>
