<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Mapa dos POPs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let mapa = null;
let markersLayer = null;
let popsCache = [];

/* =========================
   CONFIG
========================= */
const TABELA_POPS = "pops";

/* =========================
   AUX
========================= */
function escaparHtml(texto) {
  if (texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function numeroValido(v) {
  const n = Number(v);
  return !isNaN(n) && isFinite(n);
}

function obterLatitude(pop) {
  return pop.latitude ?? pop.lat ?? pop.local_lat ?? pop.latitude_pop;
}

function obterLongitude(pop) {
  return pop.longitude ?? pop.lng ?? pop.lon ?? pop.local_lng ?? pop.longitude_pop;
}

function obterNome(pop) {
  return pop.nome ?? pop.pop ?? pop.titulo ?? pop.descricao ?? "POP sem nome";
}

function obterIp(pop) {
  return pop.ip ?? pop.equipamento ?? pop.host ?? pop.endereco_ip ?? "";
}

function obterStatus(pop) {
  const bruto =
    pop.status ??
    pop.prtg_status ??
    pop.estado ??
    pop.situacao ??
    "";

  const s = String(bruto).trim().toLowerCase();

  if (
    s.includes("up") ||
    s.includes("online") ||
    s.includes("ativo") ||
    s.includes("ok")
  ) {
    return "UP";
  }

  if (
    s.includes("down") ||
    s.includes("offline") ||
    s.includes("inativo") ||
    s.includes("erro")
  ) {
    return "DOWN";
  }

  return "SEM STATUS";
}

function corStatus(status) {
  if (status === "UP") return "#22c55e";
  if (status === "DOWN") return "#ef4444";
  return "#f59e0b";
}

function classeStatus(status) {
  if (status === "UP") return "up";
  if (status === "DOWN") return "down";
  return "warn";
}

function criarIcone(status) {
  const cor = corStatus(status);

  return L.divIcon({
    className: "custom-marker-wrapper",
    html: `
      <div class="marker-pin" style="background:${cor}">
        <div class="marker-core"></div>
      </div>
    `,
    iconSize: [22, 22],
    iconAnchor: [11, 11],
    popupAnchor: [0, -8]
  });
}

/* =========================
   MAPA
========================= */
function iniciarMapa() {
  mapa = L.map("mapa", {
    zoomControl: true
  }).setView([-9.015, -42.699], 6);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap"
  }).addTo(mapa);

  markersLayer = L.layerGroup().addTo(mapa);
}

function popupHtml(pop) {
  const nome = escaparHtml(obterNome(pop));
  const ip = escaparHtml(obterIp(pop) || "Não informado");
  const status = obterStatus(pop);
  const statusClass = classeStatus(status);
  const lat = obterLatitude(pop);
  const lng = obterLongitude(pop);

  return `
    <div class="popup-box">
      <div class="popup-topo">
        <div class="popup-titulo">${nome}</div>
        <div class="badge ${statusClass}">${status}</div>
      </div>
      <div class="popup-linha"><strong>IP:</strong> ${ip}</div>
      <div class="popup-linha"><strong>Latitude:</strong> ${escaparHtml(lat)}</div>
      <div class="popup-linha"><strong>Longitude:</strong> ${escaparHtml(lng)}</div>
    </div>
  `;
}

function renderizarMapa(pops) {
  markersLayer.clearLayers();

  const bounds = [];

  for (const pop of pops) {
    const lat = obterLatitude(pop);
    const lng = obterLongitude(pop);

    if (!numeroValido(lat) || !numeroValido(lng)) continue;

    const status = obterStatus(pop);

    const marker = L.marker([Number(lat), Number(lng)], {
      icon: criarIcone(status)
    });

    marker.bindPopup(popupHtml(pop), {
      maxWidth: 320
    });

    marker.addTo(markersLayer);
    bounds.push([Number(lat), Number(lng)]);

    pop.__marker = marker;
  }

  if (bounds.length === 1) {
    mapa.setView(bounds[0], 13);
  } else if (bounds.length > 1) {
    mapa.fitBounds(bounds, { padding: [40, 40] });
  }
}

/* =========================
   LISTA LATERAL
========================= */
function renderizarLista(pops) {
  const lista = document.getElementById("listaPops");

  if (!pops.length) {
    lista.innerHTML = `<div class="sem-dados">Nenhum POP com localização encontrada.</div>`;
    atualizarResumo([]);
    return;
  }

  lista.innerHTML = pops.map((pop, index) => {
    const nome = escaparHtml(obterNome(pop));
    const ip = escaparHtml(obterIp(pop) || "Sem IP");
    const status = obterStatus(pop);
    const statusClass = classeStatus(status);

    return `
      <div class="pop-card" onclick="window.irParaPop(${index})">
        <div class="pop-card-topo">
          <div class="pop-nome">${nome}</div>
          <div class="badge ${statusClass}">${status}</div>
        </div>
        <div class="pop-ip">${ip}</div>
      </div>
    `;
  }).join("");

  atualizarResumo(pops);
}

function atualizarResumo(pops) {
  const total = pops.length;
  const up = pops.filter(p => obterStatus(p) === "UP").length;
  const down = pops.filter(p => obterStatus(p) === "DOWN").length;
  const sem = pops.filter(p => obterStatus(p) === "SEM STATUS").length;

  document.getElementById("totalPops").textContent = total;
  document.getElementById("totalUp").textContent = up;
  document.getElementById("totalDown").textContent = down;
  document.getElementById("totalSem").textContent = sem;
}

window.irParaPop = function(index) {
  const pop = popsCache[index];
  if (!pop || !pop.__marker) return;

  const lat = Number(obterLatitude(pop));
  const lng = Number(obterLongitude(pop));

  mapa.setView([lat, lng], 15, { animate: true });
  pop.__marker.openPopup();
};

function filtrarLista() {
  const termo = document.getElementById("busca").value.trim().toLowerCase();
  const filtroStatus = document.getElementById("filtroStatus").value;

  const filtrados = popsCache.filter(pop => {
    const nome = obterNome(pop).toLowerCase();
    const ip = obterIp(pop).toLowerCase();
    const status = obterStatus(pop);

    const bateTexto =
      !termo ||
      nome.includes(termo) ||
      ip.includes(termo);

    const bateStatus =
      !filtroStatus || status === filtroStatus;

    return bateTexto && bateStatus;
  });

  renderizarMapa(filtrados);
  renderizarLista(filtrados);
}

/* =========================
   SUPABASE
========================= */
async function carregarPops() {
  document.getElementById("listaPops").innerHTML =
    `<div class="sem-dados">Carregando POPs...</div>`;

  const { data, error } = await supabase
    .from(TABELA_POPS)
    .select("*")
    .order("nome", { ascending: true });

  if (error) {
    console.error(error);
    document.getElementById("listaPops").innerHTML =
      `<div class="sem-dados">Erro ao carregar POPs.</div>`;
    return;
  }

  const popsComLocal = (data || []).filter(pop => {
    return numeroValido(obterLatitude(pop)) && numeroValido(obterLongitude(pop));
  });

  popsCache = popsComLocal;

  renderizarMapa(popsCache);
  renderizarLista(popsCache);
}

/* =========================
   INIT
========================= */
window.addEventListener("load", async () => {
  iniciarMapa();

  document.getElementById("busca").addEventListener("input", filtrarLista);
  document.getElementById("filtroStatus").addEventListener("change", filtrarLista);

  await carregarPops();
});
</script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #fff;
}

.app {
  display: grid;
  grid-template-columns: 360px 1fr;
  height: 100vh;
}

.sidebar {
  background: linear-gradient(180deg, #0f172a, #111827);
  border-right: 1px solid #1e293b;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-topo {
  padding: 18px;
  border-bottom: 1px solid #1e293b;
}

.titulo {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 6px;
}

.subtitulo {
  color: #94a3b8;
  font-size: 13px;
  margin-bottom: 16px;
}

.resumo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.box-resumo {
  background: rgba(255,255,255,0.04);
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 12px;
}

.box-resumo .rotulo {
  color: #94a3b8;
  font-size: 12px;
  margin-bottom: 4px;
}

.box-resumo .valor {
  font-size: 22px;
  font-weight: bold;
}

.filtros {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.filtros input,
.filtros select {
  width: 100%;
  background: #020617;
  color: #fff;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 12px;
  outline: none;
}

.lista-pops {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

.pop-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid #1e293b;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.pop-card:hover {
  transform: translateY(-2px);
  border-color: #334155;
  background: rgba(255,255,255,0.06);
}

.pop-card-topo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.pop-nome {
  font-weight: bold;
  font-size: 15px;
}

.pop-ip {
  margin-top: 8px;
  color: #94a3b8;
  font-size: 13px;
  word-break: break-word;
}

.badge {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
  white-space: nowrap;
}

.badge.up {
  background: rgba(34,197,94,0.15);
  color: #4ade80;
  border: 1px solid rgba(34,197,94,0.35);
}

.badge.down {
  background: rgba(239,68,68,0.15);
  color: #f87171;
  border: 1px solid rgba(239,68,68,0.35);
}

.badge.warn {
  background: rgba(245,158,11,0.15);
  color: #fbbf24;
  border: 1px solid rgba(245,158,11,0.35);
}

.mapa-area {
  position: relative;
}

#mapa {
  width: 100%;
  height: 100%;
}

.topo-mapa {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 999;
  background: rgba(15, 23, 42, 0.92);
  border: 1px solid #1e293b;
  border-radius: 16px;
  padding: 12px 14px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.topo-mapa strong {
  display: block;
  margin-bottom: 4px;
}

.topo-mapa span {
  color: #94a3b8;
  font-size: 13px;
}

.custom-marker-wrapper {
  background: transparent;
  border: none;
}

.marker-pin {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 3px solid #fff;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.12), 0 8px 20px rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
}

.marker-core {
  width: 6px;
  height: 6px;
  background: #fff;
  border-radius: 50%;
}

.popup-box {
  min-width: 220px;
}

.popup-topo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.popup-titulo {
  font-size: 15px;
  font-weight: bold;
  color: #0f172a;
}

.popup-linha {
  font-size: 13px;
  margin-bottom: 6px;
  color: #334155;
}

.sem-dados {
  color: #94a3b8;
  text-align: center;
  padding: 30px 10px;
}

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }

  .sidebar {
    height: auto;
    max-height: 50vh;
  }

  .lista-pops {
    max-height: 220px;
  }
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-topo">
      <div class="titulo">Mapa dos POPs</div>
      <div class="subtitulo">Visual moderno com nome, IP e status em tempo real</div>

      <div class="resumo">
        <div class="box-resumo">
          <div class="rotulo">Total</div>
          <div class="valor" id="totalPops">0</div>
        </div>
        <div class="box-resumo">
          <div class="rotulo">UP</div>
          <div class="valor" id="totalUp">0</div>
        </div>
        <div class="box-resumo">
          <div class="rotulo">DOWN</div>
          <div class="valor" id="totalDown">0</div>
        </div>
        <div class="box-resumo">
          <div class="rotulo">Sem status</div>
          <div class="valor" id="totalSem">0</div>
        </div>
      </div>

      <div class="filtros">
        <input type="text" id="busca" placeholder="Buscar por nome ou IP..." />
        <select id="filtroStatus">
          <option value="">Todos os status</option>
          <option value="UP">Somente UP</option>
          <option value="DOWN">Somente DOWN</option>
          <option value="SEM STATUS">Sem status</option>
        </select>
      </div>
    </div>

    <div class="lista-pops" id="listaPops"></div>
  </aside>

  <main class="mapa-area">
    <div class="topo-mapa">
      <strong>Rede de POPs</strong>
      <span>Clique em um POP na lista ou no mapa para ver detalhes</span>
    </div>
    <div id="mapa"></div>
  </main>
</div>

</body>
</html>
