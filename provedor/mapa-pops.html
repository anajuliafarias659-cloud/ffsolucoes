<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa de POPs</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#020617;
font-family:Arial;
}

#mapa{
height:100vh;
}

.nome-pop{
font-size:12px;
color:white;
margin-top:2px;
text-shadow:0 0 4px black;
}

.icone{
font-size:24px;
text-align:center;
animation:pulso 2s infinite;
}

@keyframes pulso{

0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}

}

</style>
</head>

<body>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ============================
// POPS
// ============================

const pops=[

{
nome:"POP Centro",
lat:-9.012,
lng:-42.70,
tipo:"torre"
},

{
nome:"POP Bairro",
lat:-9.05,
lng:-42.75,
tipo:"casa"
},

{
nome:"Datacenter",
lat:-9.02,
lng:-42.65,
tipo:"datacenter"
},

{
nome:"POP Norte",
lat:-8.95,
lng:-42.68,
tipo:"torre"
}

]

// ============================
// MAPA
// ============================

const mapa=L.map("mapa").setView([-9.02,-42.72],10)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(mapa)

// ============================
// ÍCONE POR TIPO
// ============================

function iconePorTipo(tipo){

let icone="📡"

if(tipo==="torre") icone="📡"
if(tipo==="casa") icone="🏠"
if(tipo==="datacenter") icone="🏢"

return icone

}

// ============================
// CRIAR MARCADOR
// ============================

function criarMarcador(pop){

const icone=L.divIcon({

className:"",

html:`
<div style="text-align:center">
<div class="icone">${iconePorTipo(pop.tipo)}</div>
<div class="nome-pop">${pop.nome}</div>
</div>
`,

iconSize:[40,40],
iconAnchor:[20,20]

})

const marker=L.marker([pop.lat,pop.lng],{icon:icone})

marker.bindPopup(`
<b>${pop.nome}</b><br>
Tipo: ${pop.tipo}
`)

marker.addTo(mapa)

return marker

}

// ============================
// ANIMAÇÃO DE TRÁFEGO
// ============================

function animar(origem,destino){

const pacote=L.circleMarker(origem,{
radius:4,
color:"#38bdf8",
fillColor:"#38bdf8",
fillOpacity:1
}).addTo(mapa)

let p=0

function frame(){

p+=0.004
if(p>1)p=0

const lat=origem[0]+(destino[0]-origem[0])*p
const lng=origem[1]+(destino[1]-origem[1])*p

pacote.setLatLng([lat,lng])

requestAnimationFrame(frame)

}

frame()

}

// ============================
// CRIAR POPS
// ============================

const pontos=[]

pops.forEach(pop=>{

criarMarcador(pop)

pontos.push([pop.lat,pop.lng])

})

// ============================
// LIGAR POPS
// ============================

for(let i=1;i<pontos.length;i++){

const a=pontos[i-1]
const b=pontos[i]

L.polyline(
[a,b],
{
color:"#38bdf8",
weight:3
}
).addTo(mapa)

animar(a,b)

}

</script>

</body>
</html>
