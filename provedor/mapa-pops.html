<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa dos POPs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let appId = null;
let mapa = null;
let camadaMarcadores = null;
let camadaLinhas = null;
let cacheGeocoding = {};

/* =========================
   STATUS
========================= */

function normalizarStatus(valor){

  if(!valor) return "unknown";

  const s = String(valor).toLowerCase();

  if(
    s.includes("up") ||
    s.includes("online") ||
    s.includes("ok") ||
    s.includes("ativo")
  ){
    return "up";
  }

  if(
    s.includes("down") ||
    s.includes("offline") ||
    s.includes("erro")
  ){
    return "down";
  }

  return "unknown";
}

function corStatus(status){

  if(status === "up") return "#22c55e";
  if(status === "down") return "#ef4444";

  return "#f59e0b";
}

function criarIconePop(status){

  const cor = corStatus(status);

  return L.divIcon({
    className:"marcador-wrap",
    html:`
      <div class="marcador" style="background:${cor}">
        <div class="centro"></div>
      </div>
    `,
    iconSize:[24,24],
    iconAnchor:[12,12]
  });
}

/* =========================
   AUX
========================= */

function escaparHtml(texto){
  if(texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function normalizarIp(ip){
  if(!ip) return "";
  return String(ip)
    .trim()
    .replace(/^https?:\/\//i, "")
    .replace(/\/.*$/, "")
    .replace(/:\d+$/, "")
    .trim();
}

/* =========================
   MAPA
========================= */

function iniciarMapa(){

  if(mapa) return;

  mapa = L.map("mapaPops");

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      maxZoom:19
    }
  ).addTo(mapa);

  camadaMarcadores = L.layerGroup().addTo(mapa);
  camadaLinhas = L.layerGroup().addTo(mapa);

  mapa.setView([-9,-42.7],6);
}

/* =========================
   AUTH
========================= */

async function obterAppId(){

  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    location.href="/auth/login.html";
    return null;
  }

  const { data:user } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id",session.user.id)
    .single();

  return user.app_id;
}

/* =========================
   BUSCAR DADOS
========================= */

async function buscarDadosMapa(){

  const popSelecionado =
    document.getElementById("filtroPop").value;

  let queryPops = supabase
    .from("pops_provedor")
    .select("*")
    .eq("app_id",appId);

  if(popSelecionado){
    queryPops = queryPops.eq("id",popSelecionado);
  }

  const { data:pops } = await queryPops;

  const { data:equipamentos } = await supabase
    .from("equipamentos_provedor")
    .select("*")
    .eq("app_id",appId);

  const { data:ips } = await supabase
    .from("ips_provedor")
    .select("*")
    .eq("app_id",appId);

  return{
    pops:pops||[],
    equipamentos:equipamentos||[],
    ips:ips||[]
  };
}

/* =========================
   DESENHAR MAPA
========================= */

async function desenharMapa(){

  iniciarMapa();

  camadaMarcadores.clearLayers();
  camadaLinhas.clearLayers();

  const { pops, equipamentos, ips } =
    await buscarDadosMapa();

  const mapaEquipPorPop = {};
  const mapaIpsPorEquip = {};

  equipamentos.forEach(eq=>{
    if(!mapaEquipPorPop[eq.pop_id]){
      mapaEquipPorPop[eq.pop_id]=[];
    }
    mapaEquipPorPop[eq.pop_id].push(eq);
  });

  ips.forEach(ip=>{
    if(!mapaIpsPorEquip[ip.equipamento]){
      mapaIpsPorEquip[ip.equipamento]=[];
    }
    mapaIpsPorEquip[ip.equipamento].push(ip);
  });

  const pontos=[];

  for(const pop of pops){

    if(!pop.latitude || !pop.longitude) continue;

    const listaEquip =
      mapaEquipPorPop[pop.id] || [];

    let statusFinal="up";

    const ipsDoPop=[];

    listaEquip.forEach(eq=>{

      const listaIpsEquip =
        mapaIpsPorEquip[eq.id] || [];

      listaIpsEquip.forEach(ipItem=>{

        const ipTratado =
          normalizarIp(ipItem.ip);

        ipsDoPop.push(ipTratado);

        const st =
          normalizarStatus(ipItem.status);

        if(st==="down"){
          statusFinal="down";
        }

      });

    });

    pontos.push({

      id:pop.id,
      nome:pop.nome,
      lat:Number(pop.latitude),
      lng:Number(pop.longitude),
      equipamentos:listaEquip,
      ips:[...new Set(ipsDoPop)],
      status:statusFinal

    });

  }

  const bounds=[];

  pontos.forEach((pop,index)=>{

    const marker =
      L.marker(
        [pop.lat,pop.lng],
        {icon:criarIconePop(pop.status)}
      ).addTo(camadaMarcadores);

    marker.bindPopup(`

      <div class="popup">

      <div class="titulo">${escaparHtml(pop.nome)}</div>

      <div>Status:
      <b style="color:${corStatus(pop.status)}">
      ${pop.status.toUpperCase()}
      </b></div>

      <div>Equipamentos: ${pop.equipamentos.length}</div>
      <div>IPs: ${pop.ips.length}</div>

      </div>

    `);

    bounds.push([pop.lat,pop.lng]);

    if(index>0){

      const anterior=pontos[index-1];

      L.polyline(
        [
          [anterior.lat,anterior.lng],
          [pop.lat,pop.lng]
        ],
        {
          color:"#38bdf8",
          weight:3
        }
      ).addTo(camadaLinhas);

    }

  });

  if(bounds.length){
    mapa.fitBounds(bounds,{padding:[40,40]});
  }

}

/* =========================
   INIT
========================= */

async function iniciar(){

  appId = await obterAppId();

  await desenharMapa();

}

window.recarregarMapa = desenharMapa;

iniciar();
</script>

<style>
