  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"

let appId = null;

let camadaFluxo = null;

let animacoesFluxo = [];

/* =========================
   AUX
========================= */
function escaparHtml(texto){
  if(texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function normalizarTexto(texto){
  if(!texto) return "";
  return String(texto)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .toLowerCase();
}

function limparHtmlTexto(texto){
  if(!texto) return "";
  return String(texto)
    .replace(/<[^>]*>/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function normalizarIp(ip){
  if(!ip) return "";
  return String(ip)
    .trim()
    .replace(/^https?:\/\//i, "")
    .replace(/\/.*$/, "")
    .replace(/:\d+$/, "")
    .trim();
}

function ehLatLngTexto(texto){
  if(!texto) return false;
  return /^-?\d+(\.\d+)?\s*,\s*-?\d+(\.\d+)?$/.test(String(texto).trim());
}

function extrairLatLng(texto){
  if(!ehLatLngTexto(texto)) return null;

  const partes = String(texto).split(",");
  const lat = Number(partes[0].trim());
  const lng = Number(partes[1].trim());

  if(Number.isNaN(lat) || Number.isNaN(lng)) return null;
  return { lat, lng };
}

function ehLinkMapa(texto){
  const valor = String(texto || "").trim().toLowerCase();
  return (
    valor.startsWith("http://") ||
    valor.startsWith("https://") ||
    valor.startsWith("www.") ||
    valor.includes("maps.app.goo.gl") ||
    valor.includes("google.com/maps")
  );
}

function montarLinkMapa(localizacao, lat = null, lng = null){
  const valor = String(localizacao || "").trim();

  if(valor){
    if(valor.startsWith("http://") || valor.startsWith("https://")){
      return valor;
    }

    if(
      valor.startsWith("www.") ||
      valor.includes("maps.app.goo.gl") ||
      valor.includes("google.com/maps")
    ){
      return "https://" + valor.replace(/^https?:\/\//i, "");
    }

    return "https://www.google.com/maps/search/" + encodeURIComponent(valor);
  }

  if(lat !== null && lng !== null){
    return "https://www.google.com/maps/search/" + encodeURIComponent(`${lat},${lng}`);
  }

  return "";
}

function extrairCoordenadaDeLink(link){
  const texto = String(link || "").trim();
  if(!texto) return null;

  let match = texto.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  match = texto.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  match = texto.match(/[?&]q=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  match = texto.match(/[?&]ll=(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
  if(match){
    return { lat: Number(match[1]), lng: Number(match[2]) };
  }

  return null;
}

function mostrarStatus(texto, tipo="ok"){
  const box = document.getElementById("status");
  box.className = "status " + tipo;
  box.innerText = texto || "";
}

/* =========================
   STATUS
========================= */
function normalizarStatus(valor){
  if(!valor) return "unknown";

  const s = String(valor).trim().toLowerCase();

  if(
    s.includes("down") ||
    s.includes("offline") ||
    s.includes("error") ||
    s.includes("erro") ||
    s.includes("falha")
  ){
    return "down";
  }

  if(
    s.includes("warning") ||
    s.includes("alerta") ||
    s.includes("alarme")
  ){
    return "warning";
  }

  if(
    s.includes("up") ||
    s.includes("online") ||
    s.includes("ok") ||
    s.includes("ativo") ||
    s.includes("normal")
  ){
    return "up";
  }

  return "unknown";
}

function corStatus(status){
  if(status === "up") return "#22c55e";
  if(status === "down") return "#ef4444";
  if(status === "warning") return "#f59e0b";
  return "#94a3b8";
}

function textoStatus(status){
  if(status === "up") return "UP";
  if(status === "down") return "DOWN";
  if(status === "warning") return "ALERTA";
  return "SEM STATUS";
}

function badgeClassStatus(status){
  if(status === "up") return "up";
  if(status === "down") return "down";
  if(status === "warning") return "warning";
  return "unknown";
}

function textoStatusCompleto(status){
  if(status === "up") return "Operando normalmente";
  if(status === "down") return "Equipamento/POP com falha";
  if(status === "warning") return "POP com alerta";
  return "Sem retorno de status";
}

/* =========================
   PRTG
========================= */
async function carregarStatusPRTG(){
  try{
    const url = "https://pdajixsoowcyhnjwhgpc.supabase.co/functions/v1/PRTG";

    const resposta = await fetch(url);
    const textoBruto = await resposta.text();

    let dados = {};
    try{
      dados = textoBruto ? JSON.parse(textoBruto) : {};
    }catch{
      dados = { erro: textoBruto || "Resposta inválida da function" };
    }

    if(!resposta.ok){
      throw new Error(dados.erro || ("Function respondeu com status " + resposta.status));
    }

    const devices = dados.devices || [];

    const mapaPorIp = {};
    const mapaPorNome = {};

    devices.forEach(item => {
      const hostOriginal = String(item.host || "").trim();
      const hostNormalizado = normalizarIp(hostOriginal);

      const nomeDevice = String(item.device || "").trim();
      const nomeNormalizado = normalizarTexto(nomeDevice);

      const statusInfo = {
        status: item.status || "",
        message: limparHtmlTexto(item.message || ""),
        device: nomeDevice || "",
        host: hostNormalizado || hostOriginal || ""
      };

      if(hostNormalizado){
        mapaPorIp[hostNormalizado] = statusInfo;
      }

      if(nomeNormalizado){
        mapaPorNome[nomeNormalizado] = statusInfo;
      }
    });

    return {
      ok: true,
      porIp: mapaPorIp,
      porNome: mapaPorNome
    };

  }catch(erro){
    console.error("Erro ao buscar status no PRTG:", erro);
    return {
      ok: false,
      porIp: {},
      porNome: {},
      erro: erro.message || "Erro ao consultar PRTG"
    };
  }
}

function obterStatusEquipamento(eq, listaIpsEquip, statusPRTG){
  if(!statusPRTG || !statusPRTG.ok){
    return {
      status: "unknown",
      info: null
    };
  }

  for(const item of listaIpsEquip){
    const ipBase = normalizarIp(item.ip || "");
    if(ipBase && statusPRTG.porIp[ipBase]){
      return {
        status: normalizarStatus(statusPRTG.porIp[ipBase].status),
        info: statusPRTG.porIp[ipBase]
      };
    }
  }

  const nomeNormalizado = normalizarTexto(eq.nome || "");
  if(nomeNormalizado && statusPRTG.porNome[nomeNormalizado]){
    return {
      status: normalizarStatus(statusPRTG.porNome[nomeNormalizado].status),
      info: statusPRTG.porNome[nomeNormalizado]
    };
  }

  return {
    status: "unknown",
    info: null
  };
}

function calcularStatusPopPorEquipamentos(statusesEquip){
  if(!statusesEquip.length) return "unknown";

  let temUp = false;
  let temWarning = false;

  for(const st of statusesEquip){
    if(st === "down") return "down";
    if(st === "warning") temWarning = true;
    if(st === "up") temUp = true;
  }

  if(temWarning) return "warning";
  if(temUp) return "up";
  return "unknown";
}

/* =========================
   MAPA / MARCADORES
========================= */
function criarIconePop(status, nome){
  return L.divIcon({
    className: "marcador-pop-wrap",
    html: `
      <div class="marcador-completo">
        <div class="marcador-pop marcador-${status}">
          <div class="marcador-core"></div>
        </div>
        <div class="nome-pop-fixo">${escaparHtml(nome || "")}</div>
      </div>
    `,
    iconSize: [170, 34],
    iconAnchor: [13, 17],
    popupAnchor: [0, -12]
  });
}

function iniciarMapa(){
  if(mapa) return;

  mapa = L.map("mapaPops", {
    zoomControl: true
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap"
  }).addTo(mapa);

  camadaLinhas = L.layerGroup().addTo(mapa);
  camadaFluxo = L.layerGroup().addTo(mapa);
  camadaMarcadores = L.layerGroup().addTo(mapa);

  mapa.setView([-9.0, -42.7], 6);
}

function limparAnimacoesFluxo(){
  animacoesFluxo.forEach(id => cancelAnimationFrame(id));
  animacoesFluxo = [];
  camadaFluxo.clearLayers();
}

async function geocodificarEndereco(endereco){
  try{
    if(!endereco) return null;

    const chave = String(endereco).trim().toLowerCase();
    if(cacheGeocoding[chave]) return cacheGeocoding[chave];

    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(endereco)}`;

    const resposta = await fetch(url, {
      headers: {
        "Accept": "application/json"
      }
    });

    const dados = await resposta.json();

    if(!dados || !dados.length){
      return null;
    }

    const resultado = {
      lat: Number(dados[0].lat),
      lng: Number(dados[0].lon)
    };

    cacheGeocoding[chave] = resultado;
    return resultado;

  }catch(erro){
    console.error("Erro ao geocodificar:", endereco, erro);
    return null;
  }
}

/* =========================
   AUTH / APP ID
========================= */
async function obterAppId(){
  const { data:{ session }, error: sessionError } = await supabase.auth.getSession();

  if(sessionError){
    throw new Error("Erro ao verificar sessão: " + sessionError.message);
  }

  if(!session){
    location.href = "/auth/login.html";
    return null;
  }

  const userId = session.user.id;

  const { data:user, error:userError } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(userError){
    throw new Error("Erro ao buscar app_id: " + userError.message);
  }

  if(!user || !user.app_id){
    throw new Error("Usuário sem app_id vinculado");
  }

  return user.app_id;
}

/* =========================
   FILTRO POP
========================= */
async function carregarFiltroPops(){
  const { data:pops, error } = await supabase
    .from("pops_provedor")
    .select("id,nome")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(error){
    throw new Error("Erro ao carregar filtro de POPs: " + error.message);
  }

  const filtro = document.getElementById("filtroPop");
  filtro.innerHTML = `<option value="">Todos os POPs</option>`;

  (pops || []).forEach(pop => {
    filtro.innerHTML += `
      <option value="${escaparHtml(pop.id)}">${escaparHtml(pop.nome || "")}</option>
    `;
  });
}

/* =========================
   BUSCAR DADOS
========================= */
async function buscarDadosMapa(){
  const popSelecionado = document.getElementById("filtroPop").value;

  let queryPops = supabase
    .from("pops_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(popSelecionado){
    queryPops = queryPops.eq("id", popSelecionado);
  }

  const { data:pops, error:errorPops } = await queryPops;

  if(errorPops){
    throw new Error("Erro ao carregar POPs: " + errorPops.message);
  }

  const { data:equipamentos, error:errorEquip } = await supabase
    .from("equipamentos_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("nome", { ascending:true });

  if(errorEquip){
    throw new Error("Erro ao carregar equipamentos: " + errorEquip.message);
  }

  const { data:ips, error:errorIps } = await supabase
    .from("ips_provedor")
    .select("*")
    .eq("app_id", appId)
    .order("ip", { ascending:true });

  if(errorIps){
    throw new Error("Erro ao carregar IPs: " + errorIps.message);
  }

  return {
    pops: pops || [],
    equipamentos: equipamentos || [],
    ips: ips || []
  };
}

/* =========================
   ANIMAÇÃO DE TRÁFEGO
========================= */
function animarFluxoEntrePontos(origem, destino, statusLinha = "up"){
  const bolinha = L.circleMarker(origem, {
    radius: 4,
    color:
      statusLinha === "down"
        ? "#ef4444"
        : statusLinha === "warning"
          ? "#f59e0b"
          : "#38bdf8",
    fillColor:
      statusLinha === "down"
        ? "#ef4444"
        : statusLinha === "warning"
          ? "#f59e0b"
          : "#38bdf8",
    fillOpacity: 1,
    opacity: 1,
    weight: 2
  }).addTo(camadaFluxo);

  let progresso = 0;
  const velocidade = 0.006;

  function passo(){
    progresso += velocidade;
    if(progresso > 1) progresso = 0;

    const lat = origem[0] + (destino[0] - origem[0]) * progresso;
    const lng = origem[1] + (destino[1] - origem[1]) * progresso;

    bolinha.setLatLng([lat, lng]);

    const id = requestAnimationFrame(passo);
    animacoesFluxo.push(id);
  }

  const id = requestAnimationFrame(passo);
  animacoesFluxo.push(id);
}

/* =========================
   MONTAR LISTA LATERAL
========================= */
function renderizarListaLateral(pontos){
  const box = document.getElementById("listaPopsStatus");

  if(!pontos.length){
    box.innerHTML = `<div class="lista-vazia">Nenhum POP encontrado</div>`;
    return;
  }

  const ordenados = [...pontos].sort((a, b) => {
    const ordem = { down: 0, warning: 1, up: 2, unknown: 3 };
    return ordem[a.status] - ordem[b.status] || String(a.nome).localeCompare(String(b.nome));
  });

  box.innerHTML = ordenados.map(pop => `
    <div class="item-lateral ${badgeClassStatus(pop.status)}">
      <div class="item-lateral-topo">
        <div class="item-lateral-nome">${escaparHtml(pop.nome)}</div>
        <div class="item-lateral-badge ${badgeClassStatus(pop.status)}">${textoStatus(pop.status)}</div>
      </div>
      <div class="item-lateral-sub">${escaparHtml(textoStatusCompleto(pop.status))}</div>
      <div class="item-lateral-mini">
        Equipamentos: <strong>${pop.equipamentos.length}</strong> · IPs: <strong>${pop.ips.length}</strong>
      </div>
    </div>
  `).join("");
}

/* =========================
   MONTAR MAPA
========================= */
async function desenharMapa(){
  try{
    mostrarStatus("Carregando mapa...", "ok");
    iniciarMapa();

    camadaMarcadores.clearLayers();
    camadaLinhas.clearLayers();
    limparAnimacoesFluxo();

    const { pops, equipamentos, ips } = await buscarDadosMapa();
    const statusPRTG = await carregarStatusPRTG();

    const mapaEquipPorPop = {};
    equipamentos.forEach(eq => {
      const popId = String(eq.pop_id || "");
      if(!popId) return;

      if(!mapaEquipPorPop[popId]){
        mapaEquipPorPop[popId] = [];
      }

      mapaEquipPorPop[popId].push(eq);
    });

    const mapaIpsPorEquip = {};
    ips.forEach(ipItem => {
      const equipId = String(ipItem.equipamento || "");
      if(!equipId) return;

      if(!mapaIpsPorEquip[equipId]){
        mapaIpsPorEquip[equipId] = [];
      }

      mapaIpsPorEquip[equipId].push(ipItem);
    });

    const pontos = [];

    for(const pop of pops){
      let coords = null;

      if(pop.latitude && pop.longitude){
        coords = {
          lat: Number(pop.latitude),
          lng: Number(pop.longitude)
        };
      }else if(pop.localizacao){
        const localizacaoTexto = String(pop.localizacao || "").trim();

        coords = extrairLatLng(localizacaoTexto);

        if(!coords){
          coords = extrairCoordenadaDeLink(localizacaoTexto);
        }

        if(!coords && !ehLinkMapa(localizacaoTexto)){
          coords = await geocodificarEndereco(localizacaoTexto);
        }
      }

      if(!coords){
        console.warn("POP sem coordenadas/localização válida:", pop.nome, pop.localizacao);
        continue;
      }

      const listaEquip = mapaEquipPorPop[String(pop.id)] || [];
      const ipsDoPop = [];
      const ipsObjetosDoPop = [];
      const statusesEquip = [];
      const detalhesEquipStatus = [];

      listaEquip.forEach(eq => {
        const listaIpsEquip = mapaIpsPorEquip[String(eq.id)] || [];

        listaIpsEquip.forEach(ipItem => {
          const ipTratado = normalizarIp(ipItem.ip || "");
          if(ipTratado){
            ipsDoPop.push(ipTratado);
          }
          ipsObjetosDoPop.push(ipItem);
        });

        const statusEquip = obterStatusEquipamento(eq, listaIpsEquip, statusPRTG);
        statusesEquip.push(statusEquip.status);

        detalhesEquipStatus.push({
          nome: eq.nome || "Sem nome",
          modelo: eq.modelo || "",
          status: statusEquip.status,
          mensagem: statusEquip.info?.message || "",
          host: statusEquip.info?.host || ""
        });
      });

      const statusPop = calcularStatusPopPorEquipamentos(statusesEquip);

      pontos.push({
        id: pop.id,
        nome: pop.nome || "Sem nome",
        localizacao: pop.localizacao || "",
        lat: coords.lat,
        lng: coords.lng,
        equipamentos: listaEquip,
        ips: [...new Set(ipsDoPop)],
        ipsObjetos: ipsObjetosDoPop,
        status: statusPop,
        detalhesEquipStatus
      });
    }

    if(!pontos.length){
      mostrarStatus("Nenhum POP com localização válida encontrado.", "erro");
      mapa.setView([-14.235, -51.9253], 4);
      document.getElementById("resumo").innerHTML = `
        <div class="card-resumo">
          <div class="card-icone">📍</div>
          <div>
            <div class="card-label">Mapa</div>
            <div class="card-value-mini">Nenhum POP com localização válida para mostrar.</div>
          </div>
        </div>
      `;
      renderizarListaLateral([]);
      return;
    }

    const bounds = [];
    let totalEquip = 0;
    let totalIps = 0;
    let totalUp = 0;
    let totalDown = 0;
    let totalWarning = 0;
    let totalUnknown = 0;

    pontos.forEach((pop, index) => {
      totalEquip += pop.equipamentos.length;
      totalIps += pop.ips.length;

      if(pop.status === "up") totalUp++;
      else if(pop.status === "down") totalDown++;
      else if(pop.status === "warning") totalWarning++;
      else totalUnknown++;

      const equipamentosHtml = pop.detalhesEquipStatus.length
        ? pop.detalhesEquipStatus.map(eq => `
            <div class="item-popup">
              <div class="item-popup-linha-topo">
                <div>
                  <div class="item-popup-titulo">${escaparHtml(eq.nome || "Sem nome")}</div>
                  <div class="item-popup-sub">${escaparHtml(eq.modelo || "Sem modelo")}</div>
                </div>
                <div class="mini-badge ${badgeClassStatus(eq.status)}">${textoStatus(eq.status)}</div>
              </div>
              ${
                eq.host || eq.mensagem
                  ? `<div class="item-popup-msg">${escaparHtml(eq.host || eq.mensagem)}</div>`
                  : ""
              }
            </div>
          `).join("")
        : `<div class="item-popup-vazio">Sem equipamentos</div>`;

      const ipsHtml = pop.ips.length
        ? pop.ips.slice(0, 12).map(ip => `
            <span class="ip-popup">${escaparHtml(ip)}</span>
          `).join("")
        : `<div class="item-popup-vazio">Sem IP cadastrado</div>`;

      const linkMapa = montarLinkMapa(pop.localizacao, pop.lat, pop.lng);

      const marker = L.marker([pop.lat, pop.lng], {
        icon: criarIconePop(pop.status, pop.nome)
      }).addTo(camadaMarcadores);

      marker.bindPopup(`
        <div class="popup-mapa">
          <div class="popup-topo">
            <div>
              <div class="titulo-popup">${escaparHtml(pop.nome)}</div>
              <div class="badge-popup ${badgeClassStatus(pop.status)}">${textoStatus(pop.status)}</div>
            </div>
          </div>

          <div class="bloco-popup">
            <div class="linha-popup"><span>Localização</span><strong>${escaparHtml(pop.localizacao || "Não informada")}</strong></div>
            <div class="linha-popup"><span>Latitude</span><strong>${escaparHtml(pop.lat)}</strong></div>
            <div class="linha-popup"><span>Longitude</span><strong>${escaparHtml(pop.lng)}</strong></div>
            <div class="linha-popup"><span>Equipamentos</span><strong>${pop.equipamentos.length}</strong></div>
            <div class="linha-popup"><span>IPs</span><strong>${pop.ips.length}</strong></div>
            <div class="linha-popup"><span>Status do POP</span><strong style="color:${corStatus(pop.status)}">${textoStatus(pop.status)}</strong></div>
            <div class="linha-popup"><span>Fonte do status</span><strong>${statusPRTG.ok ? "PRTG" : "Sem conexão com PRTG"}</strong></div>
          </div>

          <div class="sub-popup">Equipamentos</div>
          <div class="lista-popup">${equipamentosHtml}</div>

          <div class="sub-popup">IPs</div>
          <div class="lista-ips-popup">${ipsHtml}</div>

          <div class="acoes-popup">
            <a
              href="${escaparHtml(linkMapa)}"
              target="_blank"
              class="btn-popup-mapa"
            >
              Abrir no Google Maps
            </a>
          </div>
        </div>
      `);

      bounds.push([pop.lat, pop.lng]);

      if(index > 0){
        const anterior = pontos[index - 1];

        const statusLinha =
          pop.status === "down" || anterior.status === "down"
            ? "down"
            : (pop.status === "warning" || anterior.status === "warning")
              ? "warning"
              : (pop.status === "up" && anterior.status === "up" ? "up" : "unknown");

        L.polyline(
          [
            [anterior.lat, anterior.lng],
            [pop.lat, pop.lng]
          ],
          {
            color:
              statusLinha === "down"
                ? "#ef4444"
                : statusLinha === "warning"
                  ? "#f59e0b"
                  : statusLinha === "up"
                    ? "#38bdf8"
                    : "#94a3b8",
            weight: statusLinha === "down" ? 4 : 3,
            opacity: 0.9,
            dashArray: statusLinha === "unknown" ? "8, 10" : null
          }
        ).addTo(camadaLinhas);

        animarFluxoEntrePontos(
          [anterior.lat, anterior.lng],
          [pop.lat, pop.lng],
          statusLinha
        );
      }
    });

    mapa.fitBounds(bounds, { padding:[30,30] });

    document.getElementById("resumo").innerHTML = `
      <div class="card-resumo">
        <div class="card-icone">📍</div>
        <div>
          <div class="card-label">POPs no mapa</div>
          <div class="card-value">${pontos.length}</div>
        </div>
      </div>

      <div class="card-resumo">
        <div class="card-icone">🟢</div>
        <div>
          <div class="card-label">POPs UP</div>
          <div class="card-value">${totalUp}</div>
        </div>
      </div>

      <div class="card-resumo">
        <div class="card-icone">🟠</div>
        <div>
          <div class="card-label">POPs em alerta</div>
          <div class="card-value">${totalWarning}</div>
        </div>
      </div>

      <div class="card-resumo">
        <div class="card-icone">🔴</div>
        <div>
          <div class="card-label">POPs DOWN</div>
          <div class="card-value">${totalDown}</div>
        </div>
      </div>

      <div class="card-resumo">
        <div class="card-icone">🖧</div>
        <div>
          <div class="card-label">Equipamentos encontrados</div>
          <div class="card-value">${totalEquip}</div>
        </div>
      </div>

      <div class="card-resumo">
        <div class="card-icone">🌐</div>
        <div>
          <div class="card-label">IPs encontrados</div>
          <div class="card-value">${totalIps}</div>
        </div>
      </div>

      <div class="card-resumo">
        <div class="card-icone">⚪</div>
        <div>
          <div class="card-label">Sem status</div>
          <div class="card-value">${totalUnknown}</div>
        </div>
      </div>
    `;

    renderizarListaLateral(pontos);

    if(statusPRTG.ok){
      mostrarStatus("Mapa carregado com sucesso.", "sucesso");
    }else{
      mostrarStatus("Mapa carregado, mas sem conexão com o PRTG: " + (statusPRTG.erro || ""), "erro");
    }

  }catch(erro){
    console.error(erro);
    mostrarStatus(erro.message || "Erro ao carregar mapa", "erro");
  }
}

async function atualizarMapaAutomaticamente(){

}

let timerAtualizacao = null;

function iniciarAtualizacaoAutomatica(){
  if(timerAtualizacao){
    clearInterval(timerAtualizacao);
  }

  timerAtualizacao = setInterval(() => {
    atualizarMapaAutomaticamente();
  }, 30000);
}

========================= */

  try{
    appId = await obterAppId();
    await carregarFiltroPops();
    await desenharMapa();

  }catch(erro){
