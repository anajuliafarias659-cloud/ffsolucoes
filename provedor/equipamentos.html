<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Equipamentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let appId=null;

/* ========================
   INICIAR
======================== */

async function iniciar(){

 const {data:{session}}=await supabase.auth.getSession();

 if(!session){
  location.href="/auth/login.html";
  return;
 }

 const userId=session.user.id;

 const {data:user}=await supabase
 .from("usuarios")
 .select("app_id")
 .eq("id",userId)
 .single();

 appId=user.app_id;

 await carregarPops();
 await carregarEquipamentos();

}

/* ========================
   CARREGAR POPS
======================== */

async function carregarPops(){

 const {data:pops}=await supabase
 .from("pops_provedor")
 .select("*")
 .eq("app_id",appId)
 .order("nome");

 const select=document.getElementById("filtroPop");

 select.innerHTML=`<option value="">Todos os POPs</option>`;

 pops.forEach(p=>{
  select.innerHTML+=`
  <option value="${p.id}">${p.nome}</option>
  `;
 });

}

/* ========================
   CARREGAR EQUIPAMENTOS
======================== */

async function carregarEquipamentos(){

 const popSelecionado=document.getElementById("filtroPop").value;

 let query=supabase
 .from("equipamentos_provedor")
 .select("*")
 .eq("app_id",appId)
 .order("nome");

 if(popSelecionado){
  query=query.eq("pop_id",popSelecionado);
 }

 const {data:equip}=await query;

 const {data:pops}=await supabase
 .from("pops_provedor")
 .select("*")
 .eq("app_id",appId);

 const mapaPop={};

 pops.forEach(p=>{
  mapaPop[p.id]=p.nome;
 });

 const tabela=document.getElementById("lista");

 tabela.innerHTML="";

 equip.forEach(e=>{

 tabela.innerHTML+=`
 <tr>
 <td>${e.nome}</td>
 <td>${e.modelo}</td>
 <td>${mapaPop[e.pop_id]||""}</td>
 </tr>
 `

 });

}

/* ======================== */

window.carregarEquipamentos=carregarEquipamentos;

iniciar();

</script>

<style>

body{
background:#020617;
color:#fff;
font-family:Arial;
padding:30px;
margin:0;
}

h2{
margin-bottom:20px;
}

select{
padding:10px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:#0f172a;
}

td,th{
padding:12px;
border-bottom:1px solid #1e293b;
text-align:left;
}

th{
background:#020617;
}

tr:hover{
background:#172036;
}

</style>

</head>

<body>

<h2>Equipamentos</h2>

<select id="filtroPop" onchange="carregarEquipamentos()">
<option value="">Todos os POPs</option>
</select>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Modelo</th>
<th>POP</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</body>
</html>
