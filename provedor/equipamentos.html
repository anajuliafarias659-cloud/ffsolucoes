<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Equipamentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const COLUNA_EQUIPAMENTO_IP = "equipamento";

let appId = null;

/* ========================
   AUXILIARES
======================== */
function escaparHtml(texto){
  if(texto === null || texto === undefined) return "";
  return String(texto)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function abrirModalEdicao(){
  document.getElementById("modalEditar").style.display = "flex";
}

function fecharModalEdicao(){
  document.getElementById("modalEditar").style.display = "none";
}

/* ========================
   INICIAR
======================== */
async function iniciar(){
  try{
    const { data:{ session }, error: sessionError } = await supabase.auth.getSession();

    if(sessionError){
      console.error("Erro ao verificar sessão:", sessionError);
      alert("Erro ao verificar login");
      return;
    }

    if(!session){
      location.href = "/auth/login.html";
      return;
    }

    const userId = session.user.id;

    const { data:user, error:userError } = await supabase
      .from("usuarios")
      .select("app_id")
      .eq("id", userId)
      .single();

    if(userError){
      console.error("Erro ao buscar app_id:", userError);
      alert("Erro ao carregar usuário: " + userError.message);
      return;
    }

    if(!user || !user.app_id){
      alert("Usuário sem app_id vinculado");
      return;
    }

    appId = user.app_id;

    await carregarPops();
    await carregarEquipamentos();

  }catch(erro){
    console.error("Erro ao iniciar:", erro);
    alert("Erro ao abrir tela de equipamentos");
  }
}

/* ========================
   CARREGAR POPS
======================== */
async function carregarPops(){
  try{
    const { data:pops, error } = await supabase
      .from("pops_provedor")
      .select("id,nome")
      .eq("app_id", appId)
      .order("nome", { ascending:true });

    if(error){
      console.error("Erro ao carregar POPs:", error);
      alert("Erro ao carregar POPs");
      return;
    }

    const filtro = document.getElementById("filtroPop");
    const selectEditar = document.getElementById("editarPop");

    filtro.innerHTML = `<option value="">Todos os POPs</option>`;
    selectEditar.innerHTML = `<option value="">Selecione o POP</option>`;

    (pops || []).forEach(p => {
      const id = escaparHtml(p.id);
      const nome = escaparHtml(p.nome || "");
      filtro.innerHTML += `<option value="${id}">${nome}</option>`;
      selectEditar.innerHTML += `<option value="${id}">${nome}</option>`;
    });

  }catch(erro){
    console.error("Erro geral ao carregar POPs:", erro);
  }
}

/* ========================
   CARREGAR EQUIPAMENTOS
======================== */
async function carregarEquipamentos(){
  try{
    const popSelecionado = document.getElementById("filtroPop").value;

    let query = supabase
      .from("equipamentos_provedor")
      .select("*")
      .eq("app_id", appId)
      .order("nome", { ascending:true });

    if(popSelecionado){
      query = query.eq("pop_id", popSelecionado);
    }

    const { data:equip, error:equipError } = await query;

    if(equipError){
      console.error("Erro ao carregar equipamentos:", equipError);
      alert("Erro ao carregar equipamentos");
      return;
    }

    const { data:pops, error:popsError } = await supabase
      .from("pops_provedor")
      .select("*")
      .eq("app_id", appId);

    if(popsError){
      console.error("Erro ao carregar POPs:", popsError);
      alert("Erro ao carregar POPs");
      return;
    }

    const { data:ips, error:ipsError } = await supabase
      .from("ips_provedor")
      .select("*")
      .eq("app_id", appId)
      .order("ip", { ascending:true });

    if(ipsError){
      console.error("Erro ao carregar IPs:", ipsError);
      alert("Erro ao carregar IPs");
      return;
    }

    const mapaPop = {};
    (pops || []).forEach(p => {
      mapaPop[String(p.id)] = p;
    });

    const mapaIpsPorEquipamento = {};
    (ips || []).forEach(ipItem => {
      const equipId = String(ipItem[COLUNA_EQUIPAMENTO_IP] || "");
      if(!equipId) return;

      if(!mapaIpsPorEquipamento[equipId]){
        mapaIpsPorEquipamento[equipId] = [];
      }

      mapaIpsPorEquipamento[equipId].push({
        ip: ipItem.ip || "",
        cidr: ipItem.cidr || "",
        porta: ipItem.porta || ""
      });
    });

    const tabela = document.getElementById("lista");
    tabela.innerHTML = "";

    (equip || []).forEach(e => {
      const pop = mapaPop[String(e.pop_id)] || null;
      const nomePop = pop?.nome || "";
      const localizacao = pop?.localizacao || "";
      const ipsEquip = mapaIpsPorEquipamento[String(e.id)] || [];

      const nomeSeguro = escaparHtml(e.nome || "");
      const modeloSeguro = escaparHtml(e.modelo || "");
      const popSeguro = escaparHtml(nomePop);
      const localizacaoSegura = escaparHtml(localizacao);

      const htmlIps = ipsEquip.length
        ? ipsEquip.map(item => {
            const ipBase = item.ip || "";
            const ipExibido = item.cidr ? `${ipBase}/${item.cidr}` : ipBase;
            const ipSeguro = escaparHtml(ipExibido);
            const hrefSeguro = escaparHtml(ipBase);
            const portaHtml = item.porta
              ? `<div class="texto-porta">Porta: ${escaparHtml(item.porta)}</div>`
              : "";

            return `
              <div class="bloco-ip">
                <a href="http://${hrefSeguro}" target="_blank" class="link-ip">${ipSeguro}</a>
                ${portaHtml}
              </div>
            `;
          }).join("")
        : `<span class="muted">Sem IP</span>`;

      const htmlLocalizacao = localizacao
        ? `
            <a href="https://www.google.com/maps/search/${encodeURIComponent(localizacao)}" target="_blank" class="btn-localizacao">
              📍 Ver localização
            </a>
            <div class="texto-localizacao">${localizacaoSegura}</div>
          `
        : `<span class="muted">Sem localização</span>`;

      const idJs = JSON.stringify(String(e.id || ""));
      const nomeJs = JSON.stringify(String(e.nome || ""));
      const modeloJs = JSON.stringify(String(e.modelo || ""));
      const popJs = JSON.stringify(String(e.pop_id || ""));

      tabela.innerHTML += `
        <tr>
          <td data-label="Nome">${nomeSeguro}</td>
          <td data-label="Modelo">${modeloSeguro}</td>
          <td data-label="POP">${popSeguro}</td>
          <td data-label="IP">${htmlIps}</td>
          <td data-label="Localização">${htmlLocalizacao}</td>
          <td data-label="Ações">
            <div class="acoes-linha">
              <button class="btn-editar" onclick='abrirEditarEquipamento(${idJs}, ${nomeJs}, ${modeloJs}, ${popJs})'>Editar</button>
              <button class="btn-excluir" onclick='excluirEquipamento(${idJs}, ${nomeJs})'>Excluir</button>
            </div>
          </td>
        </tr>
      `;
    });

    if(!(equip || []).length){
      tabela.innerHTML = `
        <tr>
          <td colspan="6" class="muted center">Nenhum equipamento encontrado</td>
        </tr>
      `;
    }

  }catch(erro){
    console.error("Erro geral ao carregar equipamentos:", erro);
    alert("Erro ao carregar equipamentos");
  }
}

/* ========================
   EDITAR EQUIPAMENTO
======================== */
function abrirEditarEquipamento(id, nome, modelo, popId){
  document.getElementById("editarId").value = id || "";
  document.getElementById("editarNome").value = nome || "";
  document.getElementById("editarModelo").value = modelo || "";
  document.getElementById("editarPop").value = popId || "";
  abrirModalEdicao();
}

async function salvarEdicaoEquipamento(){
  try{
    const id = document.getElementById("editarId").value;
    const nome = document.getElementById("editarNome").value.trim();
    const modelo = document.getElementById("editarModelo").value.trim();
    const popId = document.getElementById("editarPop").value;

    if(!id || !nome || !modelo || !popId){
      alert("Preencha todos os campos");
      return;
    }

    const { error } = await supabase
      .from("equipamentos_provedor")
      .update({
        nome,
        modelo,
        pop_id: popId
      })
      .eq("id", id)
      .eq("app_id", appId);

    if(error){
      console.error("Erro ao editar equipamento:", error);
      alert("Erro ao editar equipamento: " + error.message);
      return;
    }

    alert("Equipamento atualizado com sucesso");
    fecharModalEdicao();
    await carregarEquipamentos();

  }catch(erro){
    console.error("Erro geral ao editar equipamento:", erro);
    alert("Erro ao editar equipamento");
  }
}

/* ========================
   EXCLUIR EQUIPAMENTO
======================== */
async function excluirEquipamento(id, nome){
  try{
    const confirmar = confirm(`Deseja excluir o equipamento "${nome}"?`);
    if(!confirmar) return;

    const { data: ipsVinculados, error: erroIps } = await supabase
      .from("ips_provedor")
      .select("id")
      .eq("app_id", appId)
      .eq(COLUNA_EQUIPAMENTO_IP, id);

    if(erroIps){
      console.error("Erro ao verificar IPs vinculados:", erroIps);
      alert("Erro ao verificar IPs vinculados");
      return;
    }

    if(ipsVinculados && ipsVinculados.length > 0){
      alert("Não é possível excluir este equipamento porque existem IPs vinculados a ele.");
      return;
    }

    const { error } = await supabase
      .from("equipamentos_provedor")
      .delete()
      .eq("id", id)
      .eq("app_id", appId);

    if(error){
      console.error("Erro ao excluir equipamento:", error);
      alert("Erro ao excluir equipamento: " + error.message);
      return;
    }

    alert("Equipamento excluído com sucesso");
    await carregarEquipamentos();

  }catch(erro){
    console.error("Erro geral ao excluir equipamento:", erro);
    alert("Erro ao excluir equipamento");
  }
}

window.carregarEquipamentos = carregarEquipamentos;
window.abrirEditarEquipamento = abrirEditarEquipamento;
window.salvarEdicaoEquipamento = salvarEdicaoEquipamento;
window.excluirEquipamento = excluirEquipamento;
window.fecharModalEdicao = fecharModalEdicao;

iniciar();
</script>

<style>

  box-sizing:border-box;
}

  color:#fff;
  font-family:Arial, sans-serif;
  padding:30px;

}

  margin-bottom:20px;
}

  display:flex;
  justify-content:space-between;
  align-items:center;

  flex-wrap:wrap;

}

  padding:10px;

}

}

}

}

}

  position:fixed;

</head>

<body>

<div class="topo">
  <h2>Equipamentos</h2>

  <select id="filtroPop" onchange="carregarEquipamentos()">
    <option value="">Todos os POPs</option>
  </select>
</div>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Modelo</th>
      <th>POP</th>
      <th>IP</th>
      <th>Localização</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody id="lista"></tbody>
</table>

<div class="modal" id="modalEditar">
  <div class="modal-box">
    <h3>Editar equipamento</h3>

    <input type="hidden" id="editarId">

    <div style="margin-bottom:10px;">
      <input id="editarNome" placeholder="Nome do equipamento">
    </div>

    <div style="margin-bottom:10px;">
      <input id="editarModelo" placeholder="Modelo">
    </div>

    <div style="margin-bottom:10px;">
      <select id="editarPop">
        <option value="">Selecione o POP</option>
      </select>
    </div>

    <div class="modal-acoes">
      <button class="btn-salvar" onclick="salvarEdicaoEquipamento()">Salvar</button>
      <button class="btn-cancelar" onclick="fecharModalEdicao()">Cancelar</button>
    </div>
  </div>
</div>

</body>
</html>
