<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Equipamentos</title>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let appId=null;

async function iniciar(){

 const {data:{session}}=await supabase.auth.getSession();

 if(!session){
  location.href="/auth/login.html";
  return;
 }

 const userId=session.user.id;

 const {data:user}=await supabase
 .from("usuarios")
 .select("app_id")
 .eq("id",userId)
 .single();

 appId=user.app_id;

 carregarEquipamentos();

}

async function carregarEquipamentos(){

 const {data:equip}=await supabase
 .from("equipamentos_provedor")
 .select("*")
 .eq("app_id",appId)
 .order("nome");

 const {data:pops}=await supabase
 .from("pops_provedor")
 .select("*")
 .eq("app_id",appId);

 const mapaPop={};

 pops.forEach(p=>{
  mapaPop[p.id]=p.nome;
 });

 const tabela=document.getElementById("lista");
 tabela.innerHTML="";

 equip.forEach(e=>{

 tabela.innerHTML+=`
 <tr>
 <td>${e.nome}</td>
 <td>${e.modelo}</td>
 <td>${mapaPop[e.pop_id]||""}</td>
 </tr>
 `

 });

}

iniciar();

</script>

<style>

body{
background:#020617;
color:#fff;
font-family:Arial;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<h2>Equipamentos</h2>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Modelo</th>
<th>POP</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</body>
</html>
