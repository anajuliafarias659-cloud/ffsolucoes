<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobrador | Scanner de Passagem</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.container{padding:16px}
.card{background:#0f172a;padding:16px;border-radius:12px;margin-bottom:16px}
button{padding:12px;border:none;border-radius:10px;color:#fff;font-weight:bold;cursor:pointer}
.btn-verde{background:#16a34a}
.btn-vermelho{background:#dc2626}
.btn-azul{background:#2563eb}
#reader{background:#000;border-radius:12px;min-height:260px}
.msg{margin-top:10px;padding:10px;border-radius:10px}
.msg.ok{background:#14532d}
.msg.erro{background:#7f1d1d}
.msg.info{background:#1e3a8a}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Scanner QR</h2>

    <div id="reader"></div>

    <button class="btn-verde" onclick="iniciarScanner()">Abrir câmera</button>
    <button class="btn-vermelho" onclick="pararScanner()">Parar</button>
    <button class="btn-azul" onclick="reabrirCamera()">🔄 Ler outro QR</button>

    <input id="ultimoQrLido" readonly placeholder="QR lido aparecerá aqui">

    <div id="msg"></div>
  </div>

  <div class="card">
    <div id="resultadoBusca"></div>
  </div>

</div>

<script>
const client = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let scanner = null;
let scannerRodando = false;
let ultimoCodigo = null;

function setMsg(texto, tipo="info"){
  const box = document.getElementById("msg");
  box.innerHTML = `<div class="msg ${tipo}">${texto}</div>`;
}

function extrairCodigoDoQr(texto){
  try{
    const obj = JSON.parse(texto);
    return obj.codigo_embarque || obj.codigo || texto;
  }catch{
    return texto;
  }
}

async function iniciarScanner(){
  if(scannerRodando) return;

  scanner = new Html5Qrcode("reader");

  await scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },

    async (decodedText) => {

      const codigo = extrairCodigoDoQr(decodedText);
      if(!codigo) return;

      if(ultimoCodigo === codigo) return;
      ultimoCodigo = codigo;

      document.getElementById("ultimoQrLido").value = codigo;

      // 🔥 AJUSTE PRINCIPAL (SEM QUEBRAR NADA)
      await pararScanner();
      document.getElementById("reader").style.display = "none";

      setMsg("✅ QR lido com sucesso", "ok");

      if(navigator.vibrate){
        navigator.vibrate(200);
      }

      // 👇 SUA FUNÇÃO ORIGINAL (não mexi)
      buscarPassageiroPorCodigo(codigo);
    }
  );

  scannerRodando = true;
  setMsg("Câmera aberta", "ok");
}

async function pararScanner(){
  if(scanner && scannerRodando){
    await scanner.stop();
    await scanner.clear();
    scannerRodando = false;
  }
}

async function reabrirCamera(){
  document.getElementById("reader").style.display = "block";
  ultimoCodigo = null;
  await iniciarScanner();
}

// 👇 NÃO MEXI NA SUA FUNÇÃO
async function buscarPassageiroPorCodigo(codigo){
  document.getElementById("resultadoBusca").innerHTML =
    `<div class="msg ok">Buscando passageiro: ${codigo}</div>`;
}
</script>

</body>
</html>
