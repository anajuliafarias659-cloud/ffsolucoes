<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobrador | Scanner de Passagem</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%,#0f172a 100%);
  color:#fff;
}
.topo{
  position:sticky;
  top:0;
  z-index:10;
  background:#020617;
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.topo h1{margin:0;font-size:20px;}
.topo-acoes{display:flex;align-items:center;gap:10px;}
.container{max-width:1000px;margin:auto;padding:16px;}
.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}
.subtitulo{margin:0 0 12px 0;font-size:20px;}
input,button,select{
  width:100%;
  padding:12px 14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
}
button{color:#fff;font-weight:bold;cursor:pointer;}
.btn-azul{background:#2563eb}
.btn-verde{background:#16a34a}
.btn-vermelho{background:#dc2626}
.btn-cinza{background:#475569}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
#reader{
  width:100%;
  border-radius:14px;
  background:#000;
  min-height:260px;
}
.msg{margin-top:12px;padding:12px;border-radius:12px;}
.msg.ok{background:#14532d}
.msg.erro{background:#7f1d1d}
.msg.info{background:#1e3a8a}
</style>
</head>
<body>

<div class="topo">
  <h1>🚌 Cobrador | Scanner</h1>
  <button class="btn-vermelho" onclick="logout()">Sair</button>
</div>

<div class="container">

<div class="card">
<h2 class="subtitulo">Ler QR</h2>

<div class="grid2">

<div>
<div id="reader"></div>

<button class="btn-verde" onclick="iniciarScanner()">Abrir câmera</button>
<button class="btn-vermelho" onclick="pararScanner()">Parar câmera</button>
</div>

<div>
<input type="text" id="codigoManual" placeholder="Código">
<button class="btn-azul" onclick="buscarCodigoManual()">Buscar</button>

<input type="text" id="ultimoQrLido" readonly>

<div id="msg"></div>
</div>

</div>
</div>

<div class="card">
<div id="resultadoBusca"></div>
</div>

</div>

<script>
const client = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let scanner = null;
let scannerRodando = false;
let ultimoCodigo = null;

function setMsg(t,tipo="info"){
  document.getElementById("msg").innerHTML =
    t ? `<div class="msg ${tipo}">${t}</div>` : "";
}

function extrairCodigoDoQr(texto){
  try{
    const obj = JSON.parse(texto);
    return obj.codigo_embarque || obj.codigo || texto;
  }catch{
    return texto;
  }
}

async function iniciarScanner(){
  if(scannerRodando) return;

  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  await scanner.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    async (decodedText)=>{

      const codigo = extrairCodigoDoQr(decodedText);
      if(!codigo) return;

      if(ultimoCodigo === codigo) return;
      ultimoCodigo = codigo;

      document.getElementById("ultimoQrLido").value = codigo;
      setMsg("QR lido", "ok");

      // 🔥 PRIMEIRO BUSCA (não quebra pedidos)
      await buscarPassageiroPorCodigo(codigo);

      // 🔥 DEPOIS FECHA CÂMERA
      await pararScanner();
      document.getElementById("reader").style.display = "none";

    }
  );

  scannerRodando = true;
}

async function pararScanner(){
  if(scanner && scannerRodando){
    await scanner.stop();
    await scanner.clear();
    scannerRodando = false;
  }
}

async function buscarCodigoManual(){
  const c = document.getElementById("codigoManual").value.trim();
  if(!c) return setMsg("Digite código","erro");

  await buscarPassageiroPorCodigo(c);
}

async function buscarPassageiroPorCodigo(codigo){
  document.getElementById("resultadoBusca").innerHTML =
    `<div class="msg info">Buscando ${codigo}...</div>`;
}

async function logout(){
  await pararScanner();
  await client.auth.signOut();
  location.href="/auth/login.html";
}
</script>

</body>
</html>
