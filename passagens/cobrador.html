<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobrador | Scanner de Passagem</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%,#0f172a 100%);
  color:#fff;
}
.topo{
  position:sticky;
  top:0;
  z-index:10;
  background:#020617;
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.topo h1{
  margin:0;
  font-size:20px;
}
.topo-acoes{
  display:flex;
  align-items:center;
  gap:10px;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:16px;
}
.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 10px 24px rgba(0,0,0,.18);
}
.subtitulo{
  margin:0 0 12px 0;
  font-size:20px;
}
input,button,select{
  width:100%;
  padding:12px 14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
}
input,select{
  background:#fff;
  color:#111827;
}
button{
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btn-azul{background:#2563eb}
.btn-verde{background:#16a34a}
.btn-vermelho{background:#dc2626}
.btn-cinza{background:#475569}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
#readerWrap{
  width:100%;
}
#reader{
  width:100%;
  overflow:hidden;
  border-radius:14px;
  background:#000;
  min-height:260px;
}
#readerWrap.oculto{
  display:none;
}
.msg{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  font-size:14px;
}
.msg.ok{background:#14532d}
.msg.erro{background:#7f1d1d}
.msg.info{background:#1e3a8a}
.resultado{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  gap:16px;
}
.info-box{
  background:#0b1220;
  border-radius:14px;
  padding:14px;
}
.info-box div{
  margin-bottom:8px;
  line-height:1.5;
}
.fotos{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.foto-card{
  background:#0b1220;
  border-radius:14px;
  padding:12px;
}
.foto-card h4{
  margin:0 0 8px 0;
  font-size:15px;
}
.foto-card img{
  width:100%;
  border-radius:12px;
  background:#fff;
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}
.badge.pago{background:#1d4ed8}
.badge.pendente{background:#d97706}
.badge.cancelado{background:#b91c1c}
.badge.outro{background:#475569}
.lista-registros{
  display:grid;
  gap:14px;
}
.linha-acoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
small{opacity:.8}
@media(max-width:800px){
  .grid2,.resultado,.linha-acoes{
    grid-template-columns:1fr;
  }
  .topo{
    align-items:flex-start;
    flex-direction:column;
  }
  .topo-acoes{
    width:100%;
    justify-content:space-between;
  }
}
</style>
</head>
<body>

<div class="topo">
  <h1>🚌 Cobrador | Scanner de Passagem</h1>

  <div class="topo-acoes">
    <div id="appInfo"><small>Carregando...</small></div>
    <button class="btn-vermelho" style="width:auto;margin:0;padding:10px 14px;" onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2 class="subtitulo">Ler QR da passagem</h2>

    <div class="grid2">
      <div>
        <div id="readerWrap">
          <div id="reader"></div>
        </div>

        <div class="linha-acoes">
          <button class="btn-verde" onclick="iniciarScanner()">Abrir câmera</button>
          <button class="btn-vermelho" onclick="pararScanner()">Parar câmera</button>
        </div>
      </div>

      <div>
        <label>Ou digite / cole o código do embarque</label>
        <input type="text" id="codigoManual" placeholder="Ex: FFP-123456-ABCDEF">

        <button class="btn-azul" onclick="buscarCodigoManual()">Buscar código</button>

        <label style="display:block;margin-top:14px;">Último QR lido</label>
        <input type="text" id="ultimoQrLido" readonly>

        <div id="msg"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 class="subtitulo">Dados do passageiro</h2>
    <div id="resultadoBusca">
      <div class="msg info">Aguardando leitura do QR ou digitação do código.</div>
    </div>
  </div>

</div>

<script>
const client = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let usuarioLogado = null;
let scanner = null;
let scannerRodando = false;
let ultimoCodigo = null;
let processandoLeitura = false;

function setMsg(texto, tipo="info"){
  const box = document.getElementById("msg");
  if(!texto){
    box.innerHTML = "";
    return;
  }
  box.innerHTML = `<div class="msg ${tipo}">${texto}</div>`;
}

function escapeHtml(texto){
  return String(texto || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function badgeStatus(status){
  const s = String(status || "").toLowerCase().trim();
  if(["pago","pago_agencia","approved","embarcado","concluida","finalizada"].includes(s)){
    return `<span class="badge pago">${escapeHtml(status || "Pago")}</span>`;
  }
  if(["pendente","pendente_pagamento","pendente_agencia","aguardando_pagamento","pending"].includes(s)){
    return `<span class="badge pendente">${escapeHtml(status || "Pendente")}</span>`;
  }
  if(["cancelada","cancelado","cancelled"].includes(s)){
    return `<span class="badge cancelado">${escapeHtml(status || "Cancelado")}</span>`;
  }
  return `<span class="badge outro">${escapeHtml(status || "-")}</span>`;
}

function mostrarCamera(){
  const wrap = document.getElementById("readerWrap");
  if(wrap) wrap.classList.remove("oculto");
}

function esconderCamera(){
  const wrap = document.getElementById("readerWrap");
  if(wrap) wrap.classList.add("oculto");
}

async function carregarUsuarioLogado(){
  try{
    const { data: { session }, error: sessionError } = await client.auth.getSession();

    if(sessionError){
      document.getElementById("appInfo").innerHTML = "<small>Erro de sessão</small>";
      setMsg("Erro ao validar sessão: " + sessionError.message, "erro");
      return false;
    }

    if(!session){
      window.location.href = "/auth/login.html";
      return false;
    }

    const { data: usuario, error } = await client
      .from("usuarios")
      .select("id,nome,email,app_id,tipo")
      .eq("id", session.user.id)
      .single();

    if(error || !usuario){
      document.getElementById("appInfo").innerHTML = "<small>Usuário não encontrado</small>";
      setMsg("Não foi possível carregar o usuário logado.", "erro");
      return false;
    }

    const tipo = String(usuario.tipo || "").toLowerCase().trim();

    if(!["admin","cobrador"].includes(tipo)){
      document.getElementById("appInfo").innerHTML = "<small>Sem permissão</small>";
      setMsg("Esse usuário não tem permissão para acessar o cobrador.", "erro");
      return false;
    }

    usuarioLogado = usuario;
    app_id = String(usuario.app_id || "").trim();

    if(!app_id){
      document.getElementById("appInfo").innerHTML = "<small>app_id não encontrado</small>";
      setMsg("O usuário logado não está vinculado a nenhum negócio.", "erro");
      return false;
    }

    const { data: config } = await client
      .from("config_site")
      .select("nome_site")
      .eq("app_id", app_id)
      .maybeSingle();

    document.getElementById("appInfo").innerHTML =
      `<small>${escapeHtml(usuario.nome || "")} • ${escapeHtml(config?.nome_site || "FF Transporte")}</small>`;

    return true;
  }catch(e){
    console.error(e);
    document.getElementById("appInfo").innerHTML = "<small>Erro</small>";
    setMsg(e.message || "Erro ao carregar usuário logado.", "erro");
    return false;
  }
}

function extrairCodigoDoQr(texto){
  const bruto = String(texto || "").trim();
  if(!bruto) return "";

  try{
    const obj = JSON.parse(bruto);
    if(obj?.codigo_embarque) return String(obj.codigo_embarque).trim();
    if(obj?.codigo) return String(obj.codigo).trim();
  }catch(e){}

  return bruto;
}

async function iniciarScanner(){
  try{
    if(!app_id){
      const ok = await carregarUsuarioLogado();
      if(!ok) return;
    }

    if(scannerRodando) return;

    mostrarCamera();
    setMsg("Abrindo câmera...", "info");

    scanner = new Html5Qrcode("reader");

    await scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      },
      async (decodedText) => {
        try{
          if(processandoLeitura) return;

          const codigo = extrairCodigoDoQr(decodedText);
          if(!codigo) return;
          if(ultimoCodigo === codigo) return;

          processandoLeitura = true;
          ultimoCodigo = codigo;

          document.getElementById("ultimoQrLido").value = codigo;
          setMsg("QR lido com sucesso. Buscando passageiro...", "ok");

          await buscarPassageiroPorCodigo(codigo);

          await pararScanner(false);
          esconderCamera();
          setMsg("QR lido com sucesso.", "ok");
        }catch(e){
          console.error(e);
          setMsg(e.message || "Erro ao ler QR.", "erro");
        }finally{
          processandoLeitura = false;
        }
      },
      () => {}
    );

    scannerRodando = true;
    setMsg("Câmera aberta. Aponte para o QR da passagem.", "ok");
  }catch(e){
    console.error(e);
    setMsg("Não foi possível abrir a câmera.", "erro");
  }
}

async function pararScanner(mostrarMensagem = true){
  try{
    if(scanner && scannerRodando){
      await scanner.stop();
      await scanner.clear();
    }
  }catch(e){
    console.error(e);
  }finally{
    scanner = null;
    scannerRodando = false;
    processandoLeitura = false;

    if(mostrarMensagem){
      setMsg("Câmera parada.", "info");
    }
  }
}

async function buscarCodigoManual(){
  const codigo = document.getElementById("codigoManual").value.trim();
  if(!codigo){
    setMsg("Digite um código.", "erro");
    return;
  }

  document.getElementById("ultimoQrLido").value = codigo;
  await buscarPassageiroPorCodigo(codigo);
}

async function marcarEmbarcado(idReserva){
  try{
    if(!app_id){
      const ok = await carregarUsuarioLogado();
      if(!ok) return;
    }

    const { error } = await client
      .from("reservas_passagens")
      .update({ status: "embarcado" })
      .eq("id", idReserva)
      .eq("app_id", app_id);

    if(error){
      setMsg("Erro ao marcar embarque: " + error.message, "erro");
      return;
    }

    setMsg("Passageiro marcado como embarcado.", "ok");

    if(ultimoCodigo){
      await buscarPassageiroPorCodigo(ultimoCodigo);
    }
  }catch(e){
    setMsg(e.message || "Erro ao marcar embarque.", "erro");
  }
}

window.marcarEmbarcado = marcarEmbarcado;

async function buscarPassageiroPorCodigo(codigo){
  try{
    setMsg("");
    const box = document.getElementById("resultadoBusca");
    box.innerHTML = `<div class="msg info">Buscando passageiro...</div>`;

    if(!app_id){
      const ok = await carregarUsuarioLogado();
      if(!ok) return;
    }

    const codigoTratado = extrairCodigoDoQr(codigo);
    ultimoCodigo = codigoTratado;

    const { data: reservas, error } = await client
      .from("reservas_passagens")
      .select("*")
      .eq("app_id", app_id)
      .eq("codigo_embarque", codigoTratado)
      .order("data_viagem", { ascending: true });

    if(error){
      box.innerHTML = `<div class="msg erro">Erro ao buscar reserva: ${escapeHtml(error.message)}</div>`;
      return;
    }

    if(reservas && reservas.length){
      let html = `<div class="lista-registros">`;

      for(const r of reservas){
        let rota = "-";
        let hora = "-";

        if(r.viagem_id){
          const { data: viagem } = await client
            .from("viagens_passagens")
            .select("rota,hora")
            .eq("id", r.viagem_id)
            .maybeSingle();

          rota = viagem?.rota || "-";
          hora = viagem?.hora || "-";
        }

        html += `
          <div class="resultado">
            <div class="info-box">
              <div><b>Nome:</b> ${escapeHtml(r.nome || "-")}</div>
              <div><b>Documento:</b> ${escapeHtml(r.cpf_rg || "-")}</div>
              <div><b>WhatsApp:</b> ${escapeHtml(r.whatsapp || "-")}</div>
              <div><b>Poltrona:</b> ${escapeHtml(r.poltrona || "-")}</div>
              <div><b>Data da viagem:</b> ${escapeHtml(r.data_viagem || "-")}</div>
              <div><b>Hora:</b> ${escapeHtml(hora)}</div>
              <div><b>Rota:</b> ${escapeHtml(rota)}</div>
              <div><b>Status:</b> ${badgeStatus(r.status)}</div>
              <div><b>Código:</b> ${escapeHtml(r.codigo_embarque || "-")}</div>

              <div class="linha-acoes">
                <button class="btn-verde" onclick="marcarEmbarcado('${r.id}')">Confirmar embarque</button>
                <button class="btn-cinza" onclick="window.print()">Imprimir tela</button>
              </div>
            </div>

            <div class="fotos">
              <div class="foto-card">
                <h4>Documento</h4>
                ${
                  r.foto_rg
                    ? `<img src="${r.foto_rg}" alt="Foto do documento">`
                    : `<div class="msg info">Sem foto do documento</div>`
                }
              </div>

              <div class="foto-card">
                <h4>Selfie</h4>
                ${
                  r.selfie
                    ? `<img src="${r.selfie}" alt="Selfie do passageiro">`
                    : `<div class="msg info">Sem selfie</div>`
                }
              </div>
            </div>
          </div>
        `;
      }

      html += `</div>`;
      box.innerHTML = html;
      setMsg("Passageiro localizado com sucesso.", "ok");
      return;
    }

    const { data: pedidos, error: erroPedidos } = await client
      .from("pedidos")
      .select("id,status,pagamento_status,itens,nome,cpf,cpf_rg,whatsapp,foto_rg,selfie,created_at")
      .eq("app_id", app_id)
      .in("pagamento_status", ["approved", "pending"]);

    if(erroPedidos){
      box.innerHTML = `<div class="msg erro">Erro ao buscar pedidos: ${escapeHtml(erroPedidos.message)}</div>`;
      return;
    }

    let achados = [];

    for(const p of (pedidos || [])){
      const itens = Array.isArray(p.itens) ? p.itens : [];

      for(const item of itens){
        if(String(item?.codigo_embarque || "").trim() === codigoTratado){
          let rota = "-";
          let hora = "-";

          if(item?.viagem_id){
            const { data: viagem } = await client
              .from("viagens_passagens")
              .select("rota,hora")
              .eq("id", item.viagem_id)
              .maybeSingle();

            rota = viagem?.rota || "-";
            hora = viagem?.hora || "-";
          }

          achados.push({
            pedido_id: p.id,
            status: p.pagamento_status || p.status || "approved",
            nome: item?.nome || p?.nome || "-",
            cpf_rg: item?.cpf_rg || item?.cpf || p?.cpf_rg || p?.cpf || "-",
            whatsapp: item?.whatsapp || p?.whatsapp || "-",
            poltrona: item?.poltrona || "-",
            data_viagem: item?.data_ida || item?.data_viagem || item?.data_volta || "-",
            rota,
            hora,
            codigo_embarque: item?.codigo_embarque || codigoTratado,
            foto_rg: item?.foto_rg || p?.foto_rg || "",
            selfie: item?.selfie || p?.selfie || "",
            viagem_id: item?.viagem_id || null
          });
        }
      }
    }

    if(!achados.length){
      box.innerHTML = `<div class="msg erro">Nenhum passageiro encontrado para o código ${escapeHtml(codigoTratado)}.</div>`;
      return;
    }

    let html = `<div class="lista-registros">`;

    for(const r of achados){
      html += `
        <div class="resultado">
          <div class="info-box">
            <div><b>Nome:</b> ${escapeHtml(r.nome || "-")}</div>
            <div><b>Documento:</b> ${escapeHtml(r.cpf_rg || "-")}</div>
            <div><b>WhatsApp:</b> ${escapeHtml(r.whatsapp || "-")}</div>
            <div><b>Poltrona:</b> ${escapeHtml(r.poltrona || "-")}</div>
            <div><b>Data da viagem:</b> ${escapeHtml(r.data_viagem || "-")}</div>
            <div><b>Hora:</b> ${escapeHtml(r.hora || "-")}</div>
            <div><b>Rota:</b> ${escapeHtml(r.rota || "-")}</div>
            <div><b>Status:</b> ${badgeStatus(r.status)}</div>
            <div><b>Código:</b> ${escapeHtml(r.codigo_embarque || "-")}</div>

            <div class="linha-acoes">
              <button class="btn-cinza" onclick="window.print()">Imprimir tela</button>
              <button class="btn-cinza" disabled>Sem reserva vinculada</button>
            </div>
          </div>

          <div class="fotos">
            <div class="foto-card">
              <h4>Documento</h4>
              ${
                r.foto_rg
                  ? `<img src="${r.foto_rg}" alt="Foto do documento">`
                  : `<div class="msg info">Sem foto do documento</div>`
              }
            </div>

            <div class="foto-card">
              <h4>Selfie</h4>
              ${
                r.selfie
                  ? `<img src="${r.selfie}" alt="Selfie do passageiro">`
                  : `<div class="msg info">Sem selfie</div>`
              }
            </div>
          </div>
        </div>
      `;
    }

    html += `</div>`;
    box.innerHTML = html;
    setMsg("Passageiro localizado pelo pedido com sucesso.", "ok");

  }catch(e){
    console.error(e);
    document.getElementById("resultadoBusca").innerHTML =
      `<div class="msg erro">${escapeHtml(e.message || "Erro ao buscar passageiro.")}</div>`;
  }
}

window.logout = async function(){
  try{
    await pararScanner(false);
  }catch(e){}

  await client.auth.signOut();
  window.location.href = "/auth/login.html";
};

(async function init(){
  await carregarUsuarioLogado();
})();
</script>

</body>
</html>
