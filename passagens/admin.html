<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin Transporte</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.topo{
  padding:15px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
  max-width:1000px;
  margin:auto;
}

input, select, button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:5px;
}

input, select{
  width:100%;
}

button{
  background:#22c55e;
  color:#fff;
  cursor:pointer;
}

.lista{
  margin-top:20px;
}

.item{
  background:#1e293b;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topo">
  <b>🚌 Transporte</b>
  <button onclick="logout()">Sair</button>
</div>

<div class="container">

  <!-- ROTAS -->
  <h3>🛣️ Nova Rota</h3>
  <input id="origem" placeholder="Origem (Ex: SRN)">
  <input id="destino" placeholder="Destino (Ex: Caracol)">
  <button onclick="salvarRota()">Salvar Rota</button>

  <div class="lista" id="rotas"></div>

  <hr>

  <!-- VIAGENS -->
  <h3>🚌 Nova Viagem</h3>

  <select id="rotaSelect"></select>

  <input id="data" type="datetime-local">

  <input id="preco" type="number" step="0.01" placeholder="Preço da passagem (R$)">

  <button onclick="salvarViagem()">Salvar Viagem</button>

  <div class="lista" id="viagens"></div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;

async function init(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    location.href="/auth/login.html";
    return;
  }

  const { data:user } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  app_id = user.app_id;

  carregarRotas();
  carregarViagens();
}

async function salvarRota(){
  const origem = document.getElementById("origem").value;
  const destino = document.getElementById("destino").value;

  if(!origem || !destino){
    alert("Preencha origem e destino");
    return;
  }

  await supabase.from("transporte.rotas").insert({
    app_id,
    origem,
    destino
  });

  alert("Rota salva!");
  carregarRotas();
}

async function carregarRotas(){
  const { data } = await supabase
    .from("transporte.rotas")
    .select("*")
    .eq("app_id", app_id);

  const lista = document.getElementById("rotas");
  const select = document.getElementById("rotaSelect");

  lista.innerHTML = "";
  select.innerHTML = "";

  data.forEach(r=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText = r.origem + " → " + r.destino;
    lista.appendChild(div);

    const opt = document.createElement("option");
    opt.value = r.id;
    opt.innerText = r.origem + " → " + r.destino;
    select.appendChild(opt);
  });
}

async function salvarViagem(){
  const rota_id = document.getElementById("rotaSelect").value;
  const data_saida = document.getElementById("data").value;
  const preco = parseFloat(document.getElementById("preco").value);

  if(!rota_id || !data_saida){
    alert("Preencha todos os campos");
    return;
  }

  if(!preco || preco <= 0){
    alert("Digite um preço válido");
    return;
  }

  const { data:viagem } = await supabase
    .from("transporte.viagens")
    .insert({
      app_id,
      rota_id,
      data_saida,
      preco
    })
    .select()
    .single();

  // cria 40 poltronas
  let poltronas = [];
  for(let i=1;i<=40;i++){
    poltronas.push({
      viagem_id: viagem.id,
      numero: i,
      status: "livre"
    });
  }

  await supabase.from("transporte.poltronas").insert(poltronas);

  alert("Viagem criada com sucesso!");
  carregarViagens();
}

async function carregarViagens(){
  const { data } = await supabase
    .from("transporte.viagens")
    .select("*, transporte.rotas(origem,destino)")
    .eq("app_id", app_id)
    .order("data_saida");

  const lista = document.getElementById("viagens");
  lista.innerHTML="";

  data.forEach(v=>{
    const div=document.createElement("div");
    div.className="item";

    div.innerText =
      v.rotas.origem + " → " + v.rotas.destino +
      " | " + new Date(v.data_saida).toLocaleString() +
      " | R$ " + Number(v.preco).toFixed(2);

    lista.appendChild(div);
  });
}

window.logout = async function(){
  await supabase.auth.signOut();
  location.href="/auth/login.html";
}

init();
</script>

</body>
</html>
