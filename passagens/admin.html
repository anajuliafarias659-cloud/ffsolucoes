<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Passagens</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      background:#0f172a;
      color:#fff;
      font-family:Arial, sans-serif;
    }

    .topo{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:20px;
      background:#020617;
      position:sticky;
      top:0;
      z-index:10;
    }

    .titulo{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:22px;
      font-weight:bold;
    }

    .btn-sair{
      border:none;
      border-radius:10px;
      padding:10px 16px;
      background:#ef4444;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .container{
      display:flex;
      gap:20px;
      padding:20px;
      flex-wrap:wrap;
    }

    .card{
      background:#1e293b;
      border-radius:16px;
      padding:22px;
      flex:1;
      min-width:320px;
    }

    h3{
      margin:0 0 18px 0;
      font-size:22px;
    }

    input, select, button{
      width:100%;
      padding:14px 16px;
      margin-top:12px;
      border:none;
      border-radius:12px;
      font-size:16px;
    }

    input, select{
      background:#fff;
      color:#111827;
    }

    .btn-verde{
      background:#22c55e;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .lista{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      background:#334155;
      border-radius:10px;
      padding:12px 14px;
      font-size:15px;
    }

    .muted{
      opacity:.8;
      font-size:14px;
    }

    .erro{
      background:#7f1d1d;
      color:#fff;
      padding:10px 12px;
      border-radius:10px;
      margin-top:12px;
      font-size:14px;
    }

    .ok{
      background:#14532d;
      color:#fff;
      padding:10px 12px;
      border-radius:10px;
      margin-top:12px;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="topo">
    <div class="titulo">🚌 ADMIN PASSAGENS</div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>

  <div class="container">

    <div class="card">
      <h3>Cadastrar Veículo</h3>

      <input id="nomeVeiculo" placeholder="Nome">
      <select id="tipoVeiculo">
        <option value="onibus">Ônibus</option>
        <option value="van">Van</option>
        <option value="micro">Micro-ônibus</option>
      </select>
      <input id="poltronasVeiculo" type="number" min="1" placeholder="Total de poltronas">
      <select id="layoutVeiculo">
        <option value="2-2">Ônibus (2-2)</option>
        <option value="2-1">Van (2-1)</option>
        <option value="1-1">Van pequena (1-1)</option>
      </select>

      <button class="btn-verde" onclick="criarVeiculo()">Salvar Veículo</button>

      <div id="msgVeiculo"></div>
      <div class="lista" id="listaVeiculos"></div>
    </div>

    <div class="card">
      <h3>Cadastrar Viagem</h3>

      <input id="rota" placeholder="Ex: SRN → Teresina">
      <input id="hora" placeholder="08:00">
      <input id="dias" placeholder="Seg,Ter,Qua">
      <select id="veiculoSelect">
        <option value="">Selecione um veículo</option>
      </select>

      <button class="btn-verde" onclick="criarViagem()">Salvar Viagem</button>

      <div id="msgViagem"></div>
      <div class="lista" id="listaViagens"></div>
    </div>

    <div class="card">
      <h3>Reservas</h3>

      <select id="viagemReserva">
        <option value="">Selecione uma viagem</option>
      </select>

      <button class="btn-verde" onclick="verReservas()">Ver Reservas</button>

      <div id="msgReserva"></div>
      <div class="lista" id="listaReservas"></div>
    </div>

  </div>

 <script>

// 🔥 SUPABASE
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;

// 🔐 SESSION + APP_ID
async function carregarApp(){

  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    location.href = "/login.html";
    return;
  }

  const user = session.user;

  const { data, error } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", user.id)
    .single();

  if(error || !data){
    alert("Erro ao carregar usuário");
    return;
  }

  app_id = data.app_id;

  carregarVeiculos();
  carregarViagens();
}

// 🚐 CRIAR VEÍCULO
async function criarVeiculo(){

  const nome = document.getElementById("nomeVeiculo").value.trim();
  const tipo = document.getElementById("tipoVeiculo").value;
  const total = parseInt(document.getElementById("poltronasVeiculo").value);
  const layout = document.getElementById("layoutVeiculo").value;

  if(!nome || !total){
    return alert("Preencha os dados do veículo");
  }

  const { error } = await supabase
    .from("veiculos_passagens")
    .insert([{
      nome,
      tipo,
      total_poltronas: total,
      layout,
      app_id
    }]);

  if(error){
    return alert("Erro: " + error.message);
  }

  alert("Veículo criado");
  carregarVeiculos();
}

// 🔥 LISTAR VEÍCULOS
async function carregarVeiculos(){

  const { data, error } = await supabase
    .from("veiculos_passagens")
    .select("*")
    .eq("app_id", app_id);

  const lista = document.getElementById("listaVeiculos");
  const select = document.getElementById("veiculoSelect");

  lista.innerHTML = "";
  select.innerHTML = `<option value="">Selecione</option>`;

  if(error || !data){
    lista.innerHTML = "Erro ao carregar";
    return;
  }

  data.forEach(v => {

    lista.innerHTML += `
      <div class="item">
        ${v.nome} • ${v.total_poltronas} lugares • ${v.layout}
      </div>
    `;

    select.innerHTML += `
      <option value="${v.id}">${v.nome}</option>
    `;
  });
}

// 🛣️ CRIAR VIAGEM
async function criarViagem(){

  const rota = document.getElementById("rota").value.trim();
  const hora = document.getElementById("hora").value.trim();
  const dias = document.getElementById("dias").value.trim();
  const veiculo_id = document.getElementById("veiculoSelect").value;

  if(!rota || !hora || !veiculo_id){
    return alert("Preencha os dados da viagem");
  }

  const { error } = await supabase
    .from("viagens_passagens")
    .insert([{
      rota,
      hora,
      dias,
      veiculo_id,
      app_id,
      ativo: true
    }]);

  if(error){
    return alert("Erro: " + error.message);
  }

  alert("Viagem criada");
  carregarViagens();
}

// 🔥 LISTAR VIAGENS
async function carregarViagens(){

  const { data, error } = await supabase
    .from("viagens_passagens")
    .select("*")
    .eq("app_id", app_id);

  const lista = document.getElementById("listaViagens");
  const select = document.getElementById("viagemReserva");

  lista.innerHTML = "";
  select.innerHTML = `<option value="">Selecione</option>`;

  if(error || !data){
    lista.innerHTML = "Erro ao carregar viagens";
    return;
  }

  data.forEach(v => {

    lista.innerHTML += `
      <div class="item">
        ${v.rota} - ${v.hora}
      </div>
    `;

    select.innerHTML += `
      <option value="${v.id}">${v.rota}</option>
    `;
  });
}

// 🎟️ RESERVAS
async function verReservas(){

  const viagem_id = document.getElementById("viagemReserva").value;

  if(!viagem_id){
    return alert("Selecione a viagem");
  }

  const { data, error } = await supabase
    .from("reservas_passagens")
    .select("*")
    .eq("viagem_id", viagem_id)
    .eq("app_id", app_id);

  const lista = document.getElementById("listaReservas");
  lista.innerHTML = "";

  if(error){
    return alert("Erro: " + error.message);
  }

  if(!data.length){
    lista.innerHTML = "Nenhuma reserva";
    return;
  }

  data.forEach(r => {
    lista.innerHTML += `
      <div class="item">
        Poltrona ${r.poltrona} - ${r.nome}
      </div>
    `;
  });
}

// 🚪 SAIR
async function sair(){
  await supabase.auth.signOut();
  location.href = "/login.html";
}

// 🚀 START
carregarApp();

</script>
</body>
</html>
