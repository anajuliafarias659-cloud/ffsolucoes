<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Passagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:18px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#111827;
  padding:18px;
  border-radius:16px;
  margin-bottom:20px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

input,select{
  background:#fff;
  color:#000;
}

button{
  cursor:pointer;
  font-weight:bold;
}

.botao-azul{background:#3b82f6;color:#fff;}
.botao-verde{background:#22c55e;color:#fff;}

.lista{
  margin-top:10px;
}

.item{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  font-size:14px;
}

.erro{background:#7f1d1d;padding:10px;border-radius:10px;margin-top:10px;}
.ok{background:#14532d;padding:10px;border-radius:10px;margin-top:10px;}
.vazio{opacity:.7;margin-top:10px;}
</style>
</head>

<body>

<div class="topo">
  <h2>🚌 Painel Passagens</h2>
</div>

<div class="container">

  <div class="card">
    <h3>🎟️ Reservas</h3>

    <select id="viagemReserva"></select>

    <input type="date" id="dataReservaFiltro">

    <button class="botao-azul" onclick="verReservas()">Ver Reservas</button>

    <div id="msgReserva"></div>
    <div class="lista" id="listaReservas"></div>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "SUA_ANON_KEY_AQUI"
);

let app_id = null;

function msg(id, texto, tipo="ok"){
  const el = document.getElementById(id);
  if(!texto){ el.innerHTML=""; return; }
  el.innerHTML = `<div class="${tipo}">${texto}</div>`;
}

// 🔥 pegar usuário e app_id
async function iniciar(){
  const { data } = await supabase.auth.getUser();

  if(!data.user){
    alert("Não logado");
    return;
  }

  const { data: userDb } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("auth_id", data.user.id)
    .single();

  app_id = userDb?.app_id;

  carregarViagens();
}

async function carregarViagens(){
  const { data, error } = await supabase
    .from("viagens")
    .select("*")
    .eq("app_id", app_id);

  const select = document.getElementById("viagemReserva");

  select.innerHTML = `<option value="">Selecione a viagem</option>`;

  if(data){
    data.forEach(v=>{
      select.innerHTML += `<option value="${v.id}">
        ${v.rota} - ${v.hora}
      </option>`;
    });
  }
}

// 🔥 FUNÇÃO QUE ESTAVA FALTANDO
async function verReservas(){
  try{
    msg("msgReserva", "Carregando...");

    const viagem_id = document.getElementById("viagemReserva").value;
    const data = document.getElementById("dataReservaFiltro").value;

    if(!viagem_id){
      msg("msgReserva", "Selecione uma viagem", "erro");
      return;
    }

    let query = supabase
      .from("reservas")
      .select("*")
      .eq("viagem_id", viagem_id)
      .eq("app_id", app_id)
      .order("created_at", { ascending:false });

    if(data){
      query = query.eq("data_viagem", data);
    }

    const { data: reservas, error } = await query;

    if(error){
      msg("msgReserva", error.message, "erro");
      return;
    }

    const lista = document.getElementById("listaReservas");

    if(!reservas || reservas.length === 0){
      lista.innerHTML = `<div class="vazio">Nenhuma reserva</div>`;
      msg("msgReserva", "");
      return;
    }

    lista.innerHTML = reservas.map(r=>`
      <div class="item">
        👤 <b>${r.nome || "Cliente"}</b><br>
        📅 ${r.data_viagem || "-"}<br>
        💺 Poltrona: ${r.poltrona || "-"}<br>
        💰 Status: ${r.status || "pendente"}<br>
        🕒 ${new Date(r.created_at).toLocaleString()}
      </div>
    `).join("");

    msg("msgReserva", "OK");
  }
  catch(e){
    msg("msgReserva", e.message, "erro");
  }
}

iniciar();
</script>

</body>
</html>
