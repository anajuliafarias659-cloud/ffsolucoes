<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Passagens</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:Arial}
.container{display:flex;gap:20px;padding:20px;flex-wrap:wrap}
.card{background:#1e293b;padding:20px;border-radius:12px;flex:1;min-width:300px}
input,select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
button{background:#22c55e;font-weight:bold;cursor:pointer}
.lista{margin-top:10px;font-size:14px}
</style>
</head>

<body>

<h2 style="padding:10px;">🚌 ADMIN PASSAGENS</h2>

<div class="container">

<div class="card">
<h3>Cadastrar Veículo</h3>

<input id="nomeVeiculo" placeholder="Nome">
<input id="poltronasVeiculo" type="number" placeholder="Total de poltronas">

<button onclick="criarVeiculo()">Salvar Veículo</button>

<div id="listaVeiculos"></div>
</div>

<div class="card">
<h3>Cadastrar Viagem</h3>

<input id="rota" placeholder="Rota">
<input id="hora" placeholder="Hora">

<select id="veiculoSelect"></select>

<button onclick="criarViagem()">Salvar Viagem</button>

<div id="listaViagens"></div>
</div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(location.search);
const app_id = params.get("app_id");

async function criarVeiculo(){

  const nome = document.getElementById("nomeVeiculo").value;
  const total = document.getElementById("poltronasVeiculo").value;

  await supabase.from("veiculos_passagens").insert([{
    nome,
    total_poltronas: total,
    app_id
  }]);

  carregarVeiculos();
}

async function carregarVeiculos(){

  const { data } = await supabase
    .from("veiculos_passagens")
    .select("*")
    .eq("app_id", app_id);

  const lista = document.getElementById("listaVeiculos");
  const select = document.getElementById("veiculoSelect");

  lista.innerHTML = "";
  select.innerHTML = "";

  (data || []).forEach(v => {

    lista.innerHTML += `<div>${v.nome}</div>`;
    select.innerHTML += `<option value="${v.id}">${v.nome}</option>`;
  });
}

async function criarViagem(){

  const rota = document.getElementById("rota").value;
  const hora = document.getElementById("hora").value;
  const veiculo_id = document.getElementById("veiculoSelect").value;

  await supabase.from("viagens_passagens").insert([{
    rota,
    hora,
    veiculo_id,
    app_id
  }]);

  carregarViagens();
}

async function carregarViagens(){

  const { data } = await supabase
    .from("viagens_passagens")
    .select("*")
    .eq("app_id", app_id);

  const lista = document.getElementById("listaViagens");
  lista.innerHTML = "";

  (data || []).forEach(v => {
    lista.innerHTML += `<div>${v.rota} - ${v.hora}</div>`;
  });
}

carregarVeiculos();
carregarViagens();

</script>

</body>
</html>
