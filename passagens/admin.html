<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Passagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:#fff;
}

/* TOPO */
.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.topo h2{
  margin:0;
  font-size:20px;
}

.sair{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* CONTAINER */
.container{
  padding:18px;
  max-width:1200px;
  margin:auto;
}

/* INFO */
.info{
  margin-bottom:18px;
  line-height:1.6;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

@media(max-width:1000px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* CARDS */
.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.card h3{
  margin:0 0 14px 0;
  font-size:22px;
}

/* FORM */
input,select,button{
  width:100%;
  padding:12px 14px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

input,select{
  background:#fff;
  color:#111827;
}

button{
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

/* LISTAS */
.lista{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  padding:12px;
  border-radius:10px;
  font-size:14px;
}

.vazio{
  opacity:.7;
  font-size:14px;
  margin-top:10px;
}

.erro{
  background:#7f1d1d;
  color:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

.ok{
  background:#14532d;
  color:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

/* LINK PÚBLICO */
.link-card{
  grid-column:1/-1;
}

.link-box{
  margin-top:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:10px;
  font-size:12px;
  color:#cbd5e1;
  word-break:break-all;
}

.botao-link{
  margin-top:10px;
  background:#22c55e;
  border:none;
  color:#fff;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.botao-link:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🚌 Painel Passagens</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <div class="info">
    Bem-vindo, <b id="nome">...</b><br>
    <small style="opacity:.7">
      ID do Negócio: <span id="negocioId">...</span>
    </small>
  </div>

  <div class="grid">

    <!-- VEÍCULOS -->
    <div class="card">
      <h3>🚐 Cadastrar Veículo</h3>

      <input id="nomeVeiculo" placeholder="Nome do veículo">
      
      <select id="tipoVeiculo">
        <option value="van">Van</option>
        <option value="onibus">Ônibus</option>
        <option value="micro">Micro-ônibus</option>
      </select>

      <input id="poltronasVeiculo" type="number" placeholder="Total de poltronas">

      <select id="layoutVeiculo">
        <option value="2-2">Ônibus (2-2)</option>
        <option value="2-1">Van (2-1)</option>
        <option value="1-1">Van pequena (1-1)</option>
      </select>

      <button onclick="criarVeiculo()">Salvar Veículo</button>

      <div id="msgVeiculo"></div>
      <div class="lista" id="listaVeiculos"></div>
    </div>

    <!-- VIAGENS -->
    <div class="card">
      <h3>🛣️ Cadastrar Viagem</h3>

      <input id="rota" placeholder="Ex: SRN → Teresina">
      <input id="hora" placeholder="08:00">
      <input id="dias" placeholder="Seg,Ter,Qua">

      <select id="veiculoSelect">
        <option value="">Selecione o veículo</option>
      </select>

      <button onclick="criarViagem()">Salvar Viagem</button>

      <div id="msgViagem"></div>
      <div class="lista" id="listaViagens"></div>
    </div>

    <!-- RESERVAS -->
    <div class="card">
      <h3>🎟️ Reservas</h3>

      <select id="viagemReserva">
        <option value="">Selecione a viagem</option>
      </select>

      <button onclick="verReservas()">Ver Reservas</button>

      <div id="msgReserva"></div>
      <div class="lista" id="listaReservas"></div>
    </div>

    <!-- LINK PÚBLICO -->
    <div class="card link-card">
      <h3>🌍 Página Pública</h3>
      <div style="opacity:.8">
        Esse é o link público para seus clientes comprarem passagens.
      </div>

      <div class="link-box" id="linkPublico">Carregando link...</div>

      <button class="botao-link" onclick="copiarLinkPublico()">
        🔗 Copiar link da página pública
      </button>
    </div>

  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;

function msg(id, texto, tipo="ok"){
  const el = document.getElementById(id);
  if(!texto){
    el.innerHTML = "";
    return;
  }
  el.innerHTML = `<div class="${tipo}">${texto}</div>`;
}

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

async function carregarUsuario(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario, error } = await supabase
    .from("usuarios")
    .select("nome, app_id")
    .eq("id", userId)
    .single();

  if(error || !usuario){
    alert("Não foi possível carregar os dados do usuário.");
    return;
  }

  app_id = usuario.app_id;

  document.getElementById("nome").innerText = usuario.nome || "";
  document.getElementById("negocioId").innerText = usuario.app_id || "";

  await montarLinkPublico();
  await carregarVeiculos();
  await carregarViagens();
}

async function montarLinkPublico(){
  if(!app_id) return;

  const { data: appData, error } = await supabase
    .from("apps")
    .select("slug")
    .eq("id", app_id)
    .single();

  const url = (error || !appData?.slug)
    ? `${location.origin}/passagens/publica.html?app_id=${encodeURIComponent(app_id)}`
    : `${location.origin}/passagens/publica.html?slug=${encodeURIComponent(appData.slug)}`;

  document.getElementById("linkPublico").innerText = url;
}

async function copiarLinkPublico(){
  const url = document.getElementById("linkPublico").innerText;

  try{
    await navigator.clipboard.writeText(url);
    alert("🔗 Link copiado com sucesso!\n\n" + url);
  }catch{
    prompt("Copie o link:", url);
  }
}

async function logout(){
  await supabase.auth.signOut();
  window.location.href = "/auth/login.html";
}

async function criarVeiculo(){
  msg("msgVeiculo", "");

  const nome = document.getElementById("nomeVeiculo").value.trim();
  const tipo = document.getElementById("tipoVeiculo").value;
  const total_poltronas = parseInt(document.getElementById("poltronasVeiculo").value || "0", 10);
  const layout = document.getElementById("layoutVeiculo").value;

  if(!nome) return msg("msgVeiculo", "Digite o nome do veículo.", "erro");
  if(!total_poltronas) return msg("msgVeiculo", "Digite o total de poltronas.", "erro");
  if(!app_id) return msg("msgVeiculo", "app_id não encontrado.", "erro");

  const { error } = await supabase
    .from("veiculos_passagens")
    .insert([{
      nome,
      tipo,
      total_poltronas,
      layout,
      app_id
    }]);

  if(error){
    msg("msgVeiculo", "Erro ao salvar veículo: " + error.message, "erro");
    return;
  }

  document.getElementById("nomeVeiculo").value = "";
  document.getElementById("poltronasVeiculo").value = "";
  document.getElementById("tipoVeiculo").value = "van";
  document.getElementById("layoutVeiculo").value = "2-2";

  msg("msgVeiculo", "Veículo salvo com sucesso.");
  await carregarVeiculos();
}

async function carregarVeiculos(){
  const lista = document.getElementById("listaVeiculos");
  const select = document.getElementById("veiculoSelect");

  lista.innerHTML = "";
  select.innerHTML = `<option value="">Selecione o veículo</option>`;

  if(!app_id){
    lista.innerHTML = `<div class="vazio">Negócio não identificado.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("veiculos_passagens")
    .select("*")
    .eq("app_id", app_id)
    .order("id", { ascending: false });

  if(error){
    lista.innerHTML = `<div class="erro">Erro ao carregar veículos: ${error.message}</div>`;
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<div class="vazio">Nenhum veículo cadastrado.</div>`;
    return;
  }

  data.forEach(v => {
    lista.innerHTML += `
      <div class="item">
        <b>${v.nome}</b><br>
        Tipo: ${v.tipo || "-"}<br>
        Poltronas: ${v.total_poltronas || 0}<br>
        Layout: ${v.layout || "-"}
      </div>
    `;

    select.innerHTML += `<option value="${v.id}">${v.nome}</option>`;
  });
}

async function criarViagem(){
  msg("msgViagem", "");

  const rota = document.getElementById("rota").value.trim();
  const hora = document.getElementById("hora").value.trim();
  const dias = document.getElementById("dias").value.trim();
  const veiculo_id = document.getElementById("veiculoSelect").value;

  if(!rota) return msg("msgViagem", "Digite a rota.", "erro");
  if(!hora) return msg("msgViagem", "Digite a hora.", "erro");
  if(!veiculo_id) return msg("msgViagem", "Selecione um veículo.", "erro");
  if(!app_id) return msg("msgViagem", "app_id não encontrado.", "erro");

  const { error } = await supabase
    .from("viagens_passagens")
    .insert([{
      rota,
      hora,
      dias,
      veiculo_id,
      app_id
    }]);

  if(error){
    msg("msgViagem", "Erro ao salvar viagem: " + error.message, "erro");
    return;
  }

  document.getElementById("rota").value = "";
  document.getElementById("hora").value = "";
  document.getElementById("dias").value = "";

  msg("msgViagem", "Viagem salva com sucesso.");
  await carregarViagens();
}

async function carregarViagens(){
  const lista = document.getElementById("listaViagens");
  const select = document.getElementById("viagemReserva");

  lista.innerHTML = "";
  select.innerHTML = `<option value="">Selecione a viagem</option>`;

  if(!app_id){
    lista.innerHTML = `<div class="vazio">Negócio não identificado.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("viagens_passagens")
    .select("*")
    .eq("app_id", app_id)
    .order("id", { ascending: false });

  if(error){
    lista.innerHTML = `<div class="erro">Erro ao carregar viagens: ${error.message}</div>`;
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<div class="vazio">Nenhuma viagem cadastrada.</div>`;
    return;
  }

  data.forEach(v => {
    lista.innerHTML += `
      <div class="item">
        <b>${v.rota}</b><br>
        Hora: ${v.hora || "-"}<br>
        Dias: ${v.dias || "-"}
      </div>
    `;

    select.innerHTML += `<option value="${v.id}">${v.rota} - ${v.hora || ""}</option>`;
  });
}

async function verReservas(){
  msg("msgReserva", "");

  const viagem_id = document.getElementById("viagemReserva").value;
  const lista = document.getElementById("listaReservas");

  lista.innerHTML = "";

  if(!viagem_id){
    msg("msgReserva", "Selecione uma viagem.", "erro");
    return;
  }

  const { data, error } = await supabase
    .from("reservas_passagens")
    .select("*")
    .eq("viagem_id", viagem_id)
    .order("poltrona", { ascending: true });

  if(error){
    msg("msgReserva", "Erro ao carregar reservas: " + error.message, "erro");
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<div class="vazio">Nenhuma reserva encontrada.</div>`;
    return;
  }

  data.forEach(r => {
    lista.innerHTML += `
      <div class="item">
        <b>Poltrona ${r.poltrona}</b><br>
        Nome: ${r.nome || "-"}
      </div>
    `;
  });
}

carregarUsuario();
</script>

</body>
</html>
