<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Passagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.sair{
  background:#ef4444;
  border:none;
  padding:10px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}

.container{
  padding:18px;
  max-width:1200px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.card{
  background:#111827;
  padding:18px;
  border-radius:16px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

input,select{
  background:#fff;
  color:#000;
}

.botao-verde{background:#22c55e;color:#fff;}
.botao-azul{background:#3b82f6;color:#fff;}

.lista{margin-top:10px;}
.item{background:#020617;padding:10px;border-radius:10px;margin-top:8px;}

.erro{background:#7f1d1d;padding:10px;border-radius:10px;margin-top:10px;}
.ok{background:#14532d;padding:10px;border-radius:10px;margin-top:10px;}
.vazio{opacity:.7;margin-top:10px;}
</style>
</head>

<body>

<div class="topo">
  <h2>🚌 Painel Passagens</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>🎟️ Reservas</h3>

<select id="viagemReserva"></select>
<input type="date" id="dataReservaFiltro">

<!-- 🔥 MAPA POLTRONAS -->
<div id="mapaPoltronas" style="margin-top:10px;"></div>

<input id="nomeAgencia" placeholder="Nome do cliente (agência)">

<button class="botao-verde" onclick="reservarAgencia()">
Reservar na Agência
</button>

<button class="botao-azul" onclick="verReservas()">Ver Reservas</button>

<div id="msgReserva"></div>
<div class="lista" id="listaReservas"></div>
</div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://pdajixsoowcyhnjwhgpc.supabase.co",
"sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let poltronaSelecionada = null;

function msg(id, texto, tipo="ok"){
const el = document.getElementById(id);
if(!texto){ el.innerHTML=""; return; }
el.innerHTML = `<div class="${tipo}">${texto}</div>`;
}

async function iniciar(){
const { data } = await supabase.auth.getUser();

if(!data.user){
alert("Não logado");
return;
}

const { data: userDb } = await supabase
.from("usuarios")
.select("app_id")
.eq("auth_id", data.user.id)
.single();

app_id = userDb?.app_id;

carregarViagens();
desenharPoltronas();
}

async function carregarViagens(){
const { data } = await supabase
.from("viagens")
.select("*")
.eq("app_id", app_id);

const select = document.getElementById("viagemReserva");

select.innerHTML = `<option value="">Selecione a viagem</option>`;

data?.forEach(v=>{
select.innerHTML += `<option value="${v.id}">
${v.rota} - ${v.hora}
</option>`;
});
}

// 🔥 POLTRONAS
function desenharPoltronas(qtd=15){
let html = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">`;

for(let i=1;i<=qtd;i++){
html += `<div onclick="selecionarPoltrona(${i})"
id="pol_${i}"
style="background:#ef4444;padding:10px;border-radius:8px;text-align:center;cursor:pointer;">
${i}
</div>`;
}

html += `</div>`;
document.getElementById("mapaPoltronas").innerHTML = html;
}

function selecionarPoltrona(num){
poltronaSelecionada = num;

document.querySelectorAll("[id^='pol_']").forEach(el=>{
el.style.background="#ef4444";
});

document.getElementById("pol_"+num).style.background="#22c55e";
}

// 🔥 RESERVA AGÊNCIA
async function reservarAgencia(){
try{
const nome = document.getElementById("nomeAgencia").value;
const viagem = document.getElementById("viagemReserva").value;
const data = document.getElementById("dataReservaFiltro").value;

if(!nome || !viagem || !poltronaSelecionada){
msg("msgReserva","Preencha tudo","erro");
return;
}

const { error } = await supabase
.from("reservas")
.insert([{
nome,
viagem_id: viagem,
data_viagem: data,
poltrona: poltronaSelecionada,
status: "confirmado",
origem: "agencia",
app_id
}]);

if(error) throw error;

msg("msgReserva","Reserva feita na agência");

verReservas();
}
catch(e){
msg("msgReserva",e.message,"erro");
}
}

// 🔥 VER RESERVAS
async function verReservas(){
try{
msg("msgReserva","Carregando...");

const viagem_id = document.getElementById("viagemReserva").value;
const data = document.getElementById("dataReservaFiltro").value;

let query = supabase
.from("reservas")
.select("*")
.eq("viagem_id", viagem_id)
.eq("app_id", app_id)
.order("created_at",{ascending:false});

if(data){
query = query.eq("data_viagem", data);
}

const { data: reservas, error } = await query;

if(error) throw error;

const lista = document.getElementById("listaReservas");

if(!reservas || !reservas.length){
lista.innerHTML = `<div class="vazio">Nenhuma reserva</div>`;
return;
}

lista.innerHTML = reservas.map(r=>`
<div class="item">
👤 ${r.nome}<br>
📅 ${r.data_viagem}<br>
💺 ${r.poltrona}<br>
💰 ${r.status} ${r.origem==="agencia"?"(Agência)":""}
</div>
`).join("");

msg("msgReserva","OK");

}
catch(e){
msg("msgReserva",e.message,"erro");
}
}

// 🔥 LOGOUT
async function logout(){
await supabase.auth.signOut();
location.reload();
}

iniciar();
</script>

</body>
</html>
