<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Passagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
  gap:16px;
}

.topo h2{
  margin:0;
  font-size:20px;
}

.sair{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  min-width:120px;
}

.container{
  padding:18px;
  max-width:1200px;
  margin:auto;
}

.info{
  margin-bottom:18px;
  line-height:1.6;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

@media(max-width:1000px){
  .grid{ grid-template-columns:repeat(2,1fr); }
}

@media(max-width:700px){
  .grid{ grid-template-columns:1fr; }
}

.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.card h3{
  margin:0 0 14px 0;
  font-size:22px;
}

input,select,button{
  width:100%;
  padding:12px 14px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

input,select{
  background:#fff;
  color:#111827;
}

.botao-verde{
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.botao-verde:hover{
  background:#16a34a;
}

.botao-azul{
  background:#3b82f6;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.botao-azul:hover{
  background:#2563eb;
}

.botao-vermelho{
  background:#ef4444;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.botao-vermelho:hover{
  background:#dc2626;
}

.botao-cinza{
  background:#475569;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.botao-cinza:hover{
  background:#334155;
}

.botoes-form{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:10px;
}

.botoes-item{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.lista{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  padding:12px;
  border-radius:10px;
  font-size:14px;
}

.vazio{
  opacity:.7;
  font-size:14px;
  margin-top:10px;
}

.erro{
  background:#7f1d1d;
  color:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

.ok{
  background:#14532d;
  color:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

.link-card{
  grid-column:1/-1;
}

.link-box{
  margin-top:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:10px;
  font-size:12px;
  color:#cbd5e1;
  word-break:break-all;
}

.botao-link{
  margin-top:10px;
  background:#22c55e;
  border:none;
  color:#fff;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.botao-link:hover{
  background:#16a34a;
}

small{
  opacity:.75;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🚌 Painel Passagens</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">

  <div class="info">
    Bem-vindo, <b id="nome">...</b><br>
    <small>
      ID do Negócio: <span id="negocioId">...</span>
    </small>
  </div>

  <div class="grid">

    <div class="card">
      <h3>🚐 Cadastrar Veículo</h3>

      <input type="hidden" id="veiculoEditId">

      <input id="nomeVeiculo" placeholder="Nome do veículo">

      <select id="tipoVeiculo">
        <option value="van">Van</option>
        <option value="onibus">Ônibus</option>
        <option value="micro">Micro-ônibus</option>
      </select>

      <input id="poltronasVeiculo" type="number" placeholder="Total de poltronas">

      <select id="layoutVeiculo">
        <option value="2-2">Ônibus (2-2)</option>
        <option value="2-1">Van (2-1)</option>
        <option value="1-1">Van pequena (1-1)</option>
      </select>

      <div class="botoes-form">
        <button id="btnSalvarVeiculo" class="botao-verde" onclick="salvarVeiculo()">Salvar Veículo</button>
        <button id="btnCancelarVeiculo" class="botao-cinza" onclick="cancelarEdicaoVeiculo()" style="display:none;">Cancelar edição</button>
      </div>

      <div id="msgVeiculo"></div>
      <div class="lista" id="listaVeiculos"></div>
    </div>

    <div class="card">
      <h3>🛣️ Cadastrar Viagem</h3>

      <input type="hidden" id="viagemEditId">

      <input id="rota" placeholder="Ex: SRN → Teresina">
      <input id="hora" placeholder="08:00">
      <input id="valor" type="number" step="0.01" placeholder="Valor da passagem">
      <input id="dias" placeholder="Seg,Ter,Qua">

      <select id="veiculoSelect">
        <option value="">Selecione o veículo</option>
      </select>

      <div class="botoes-form">
        <button id="btnSalvarViagem" class="botao-verde" onclick="salvarViagem()">Salvar Viagem</button>
        <button id="btnCancelarViagem" class="botao-cinza" onclick="cancelarEdicaoViagem()" style="display:none;">Cancelar edição</button>
      </div>

      <div id="msgViagem"></div>
      <div class="lista" id="listaViagens"></div>
    </div>

    <div class="card">
      <h3>🎟️ Reservas</h3>

      <select id="viagemReserva">
        <option value="">Selecione a viagem</option>
      </select>

      <button class="botao-azul" onclick="verReservas()">Ver Reservas</button>

      <div id="msgReserva"></div>
      <div class="lista" id="listaReservas"></div>
    </div>

    <div class="card link-card">
      <h3>🌍 Página Pública</h3>
      <div style="opacity:.8">
        Esse é o link público para seus clientes comprarem passagens.
      </div>

      <div class="link-box" id="linkPublico">Carregando link...</div>

      <button class="botao-link" onclick="copiarLinkPublico()">
        🔗 Copiar link da página pública
      </button>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;

function msg(id, texto, tipo="ok"){
  const el = document.getElementById(id);
  if(!el) return;
  if(!texto){
    el.innerHTML = "";
    return;
  }
  el.innerHTML = `<div class="${tipo}">${texto}</div>`;
}

function limparFormularioVeiculo(){
  document.getElementById("veiculoEditId").value = "";
  document.getElementById("nomeVeiculo").value = "";
  document.getElementById("tipoVeiculo").value = "van";
  document.getElementById("poltronasVeiculo").value = "";
  document.getElementById("layoutVeiculo").value = "2-2";
  document.getElementById("btnSalvarVeiculo").innerText = "Salvar Veículo";
  document.getElementById("btnCancelarVeiculo").style.display = "none";
}

function limparFormularioViagem(){
  document.getElementById("viagemEditId").value = "";
  document.getElementById("rota").value = "";
  document.getElementById("hora").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("dias").value = "";
  document.getElementById("veiculoSelect").value = "";
  document.getElementById("btnSalvarViagem").innerText = "Salvar Viagem";
  document.getElementById("btnCancelarViagem").style.display = "none";
}

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

async function carregarUsuario(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario, error } = await supabase
    .from("usuarios")
    .select("nome, app_id")
    .eq("id", userId)
    .single();

  if(error || !usuario){
    alert("Não foi possível carregar os dados do usuário.");
    return;
  }

  app_id = usuario.app_id;

  document.getElementById("nome").innerText = usuario.nome || "";
  document.getElementById("negocioId").innerText = usuario.app_id || "";

  await montarLinkPublico();
  await carregarVeiculos();
  await carregarViagens();
}

async function montarLinkPublico(){
  if(!app_id) return;

  const { data: appData, error } = await supabase
    .from("apps")
    .select("slug")
    .eq("id", app_id)
    .single();

  const url = (error || !appData?.slug)
    ? `${location.origin}/passagens/publica.html?app_id=${encodeURIComponent(app_id)}`
    : `${location.origin}/passagens/publica.html?slug=${encodeURIComponent(appData.slug)}`;

  document.getElementById("linkPublico").innerText = url;
}

window.copiarLinkPublico = async function(){
  const url = document.getElementById("linkPublico").innerText;

  try{
    await navigator.clipboard.writeText(url);
    alert("🔗 Link copiado com sucesso!\n\n" + url);
  }catch{
    prompt("Copie o link:", url);
  }
};

window.logout = async function(){
  await supabase.auth.signOut();
  window.location.href = "/auth/login.html";
};

window.cancelarEdicaoVeiculo = function(){
  limparFormularioVeiculo();
  msg("msgVeiculo", "");
};

window.cancelarEdicaoViagem = function(){
  limparFormularioViagem();
  msg("msgViagem", "");
};

window.salvarVeiculo = async function(){
  msg("msgVeiculo", "");

  const id = document.getElementById("veiculoEditId").value;
  const nome = document.getElementById("nomeVeiculo").value.trim();
  const tipo = document.getElementById("tipoVeiculo").value;
  const total_poltronas = parseInt(document.getElementById("poltronasVeiculo").value || "0", 10);
  const layout = document.getElementById("layoutVeiculo").value;

  if(!nome) return msg("msgVeiculo", "Digite o nome do veículo.", "erro");
  if(!total_poltronas) return msg("msgVeiculo", "Digite o total de poltronas.", "erro");
  if(!app_id) return msg("msgVeiculo", "app_id não encontrado.", "erro");

  if(id){
    const { error } = await supabase
      .from("veiculos_passagens")
      .update({
        nome,
        tipo,
        total_poltronas,
        layout
      })
      .eq("id", id)
      .eq("app_id", app_id);

    if(error){
      msg("msgVeiculo", "Erro ao atualizar veículo: " + error.message, "erro");
      return;
    }

    msg("msgVeiculo", "Veículo atualizado com sucesso.");
  }else{
    const { error } = await supabase
      .from("veiculos_passagens")
      .insert([{
        nome,
        tipo,
        total_poltronas,
        layout,
        app_id
      }]);

    if(error){
      msg("msgVeiculo", "Erro ao salvar veículo: " + error.message, "erro");
      return;
    }

    msg("msgVeiculo", "Veículo salvo com sucesso.");
  }

  limparFormularioVeiculo();
  await carregarVeiculos();
  await carregarViagens();
};

window.editarVeiculo = async function(id){
  msg("msgVeiculo", "");

  const { data, error } = await supabase
    .from("veiculos_passagens")
    .select("*")
    .eq("id", id)
    .eq("app_id", app_id)
    .single();

  if(error || !data){
    msg("msgVeiculo", "Erro ao carregar veículo.", "erro");
    return;
  }

  document.getElementById("veiculoEditId").value = data.id;
  document.getElementById("nomeVeiculo").value = data.nome || "";
  document.getElementById("tipoVeiculo").value = data.tipo || "van";
  document.getElementById("poltronasVeiculo").value = data.total_poltronas || "";
  document.getElementById("layoutVeiculo").value = data.layout || "2-2";
  document.getElementById("btnSalvarVeiculo").innerText = "Atualizar Veículo";
  document.getElementById("btnCancelarVeiculo").style.display = "block";

  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.excluirVeiculo = async function(id){
  msg("msgVeiculo", "");

  const { data: viagens } = await supabase
    .from("viagens_passagens")
    .select("id")
    .eq("veiculo_id", id)
    .eq("app_id", app_id)
    .limit(1);

  if(viagens && viagens.length){
    msg("msgVeiculo", "Esse veículo está vinculado a uma viagem. Exclua ou edite a viagem primeiro.", "erro");
    return;
  }

  if(!confirm("Tem certeza que deseja excluir este veículo?")) return;

  const { error } = await supabase
    .from("veiculos_passagens")
    .delete()
    .eq("id", id)
    .eq("app_id", app_id);

  if(error){
    msg("msgVeiculo", "Erro ao excluir veículo: " + error.message, "erro");
    return;
  }

  msg("msgVeiculo", "Veículo excluído com sucesso.");
  limparFormularioVeiculo();
  await carregarVeiculos();
};

async function carregarVeiculos(){
  const lista = document.getElementById("listaVeiculos");
  const select = document.getElementById("veiculoSelect");

  lista.innerHTML = "";
  select.innerHTML = `<option value="">Selecione o veículo</option>`;

  if(!app_id){
    lista.innerHTML = `<div class="vazio">Negócio não identificado.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("veiculos_passagens")
    .select("*")
    .eq("app_id", app_id)
    .order("id", { ascending: false });

  if(error){
    lista.innerHTML = `<div class="erro">Erro ao carregar veículos: ${error.message}</div>`;
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<div class="vazio">Nenhum veículo cadastrado.</div>`;
    return;
  }

  data.forEach(v => {
    lista.innerHTML += `
      <div class="item">
        <b>${v.nome}</b><br>
        Tipo: ${v.tipo || "-"}<br>
        Poltronas: ${v.total_poltronas || 0}<br>
        Layout: ${v.layout || "-"}
        <div class="botoes-item">
          <button class="botao-azul" onclick="editarVeiculo('${v.id}')">Editar</button>
          <button class="botao-vermelho" onclick="excluirVeiculo('${v.id}')">Excluir</button>
        </div>
      </div>
    `;

    select.innerHTML += `<option value="${v.id}">${v.nome}</option>`;
  });
}

window.salvarViagem = async function(){
  msg("msgViagem", "");

  const id = document.getElementById("viagemEditId").value;
  const rota = document.getElementById("rota").value.trim();
  const hora = document.getElementById("hora").value.trim();
  const valor = document.getElementById("valor").value.trim();
  const dias = document.getElementById("dias").value.trim();
  const veiculo_id = document.getElementById("veiculoSelect").value;

  if(!rota) return msg("msgViagem", "Digite a rota.", "erro");
  if(!hora) return msg("msgViagem", "Digite a hora.", "erro");
  if(!valor) return msg("msgViagem", "Digite o valor da passagem.", "erro");
  if(!veiculo_id) return msg("msgViagem", "Selecione um veículo.", "erro");
  if(!app_id) return msg("msgViagem", "app_id não encontrado.", "erro");

  const payload = {
    rota,
    hora,
    valor: Number(valor),
    dias,
    veiculo_id
  };

  if(id){
    const { error } = await supabase
      .from("viagens_passagens")
      .update(payload)
      .eq("id", id)
      .eq("app_id", app_id);

    if(error){
      msg("msgViagem", "Erro ao atualizar viagem: " + error.message, "erro");
      return;
    }

    msg("msgViagem", "Viagem atualizada com sucesso.");
  }else{
    const { error } = await supabase
      .from("viagens_passagens")
      .insert([{
        ...payload,
        app_id
      }]);

    if(error){
      msg("msgViagem", "Erro ao salvar viagem: " + error.message, "erro");
      return;
    }

    msg("msgViagem", "Viagem salva com sucesso.");
  }

  limparFormularioViagem();
  await carregarViagens();
};

window.editarViagem = async function(id){
  msg("msgViagem", "");

  const { data, error } = await supabase
    .from("viagens_passagens")
    .select("*")
    .eq("id", id)
    .eq("app_id", app_id)
    .single();

  if(error || !data){
    msg("msgViagem", "Erro ao carregar viagem.", "erro");
    return;
  }

  document.getElementById("viagemEditId").value = data.id;
  document.getElementById("rota").value = data.rota || "";
  document.getElementById("hora").value = data.hora || "";
  document.getElementById("valor").value = data.valor ?? "";
  document.getElementById("dias").value = data.dias || "";
  document.getElementById("veiculoSelect").value = data.veiculo_id || "";
  document.getElementById("btnSalvarViagem").innerText = "Atualizar Viagem";
  document.getElementById("btnCancelarViagem").style.display = "block";

  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.excluirViagem = async function(id){
  msg("msgViagem", "");

  const { data: reservas } = await supabase
    .from("reservas_passagens")
    .select("id")
    .eq("viagem_id", id)
    .limit(1);

  if(reservas && reservas.length){
    if(!confirm("Essa viagem já possui reservas. Deseja excluir mesmo assim?")) return;
  }else{
    if(!confirm("Tem certeza que deseja excluir esta viagem?")) return;
  }

  const { error } = await supabase
    .from("viagens_passagens")
    .delete()
    .eq("id", id)
    .eq("app_id", app_id);

  if(error){
    msg("msgViagem", "Erro ao excluir viagem: " + error.message, "erro");
    return;
  }

  msg("msgViagem", "Viagem excluída com sucesso.");
  limparFormularioViagem();
  await carregarViagens();
  document.getElementById("listaReservas").innerHTML = "";
};

async function carregarViagens(){
  const lista = document.getElementById("listaViagens");
  const select = document.getElementById("viagemReserva");

  lista.innerHTML = "";
  select.innerHTML = `<option value="">Selecione a viagem</option>`;

  if(!app_id){
    lista.innerHTML = `<div class="vazio">Negócio não identificado.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("viagens_passagens")
    .select("*")
    .eq("app_id", app_id)
    .order("id", { ascending: false });

  if(error){
    lista.innerHTML = `<div class="erro">Erro ao carregar viagens: ${error.message}</div>`;
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<div class="vazio">Nenhuma viagem cadastrada.</div>`;
    return;
  }

  for (const v of data) {
    let nomeVeiculo = "-";

    if(v.veiculo_id){
      const { data: veiculo } = await supabase
        .from("veiculos_passagens")
        .select("nome")
        .eq("id", v.veiculo_id)
        .maybeSingle();

      nomeVeiculo = veiculo?.nome || "-";
    }

    lista.innerHTML += `
      <div class="item">
        <b>${v.rota}</b><br>
        Hora: ${v.hora || "-"}<br>
        Valor: R$ ${Number(v.valor || 0).toFixed(2)}<br>
        Dias: ${v.dias || "-"}<br>
        Veículo: ${nomeVeiculo}
        <div class="botoes-item">
          <button class="botao-azul" onclick="editarViagem('${v.id}')">Editar</button>
          <button class="botao-vermelho" onclick="excluirViagem('${v.id}')">Excluir</button>
        </div>
      </div>
    `;

    select.innerHTML += `<option value="${v.id}">${v.rota} - ${v.hora || ""}</option>`;
  }
}

window.verReservas = async function(){
  msg("msgReserva", "");

  const viagem_id = document.getElementById("viagemReserva").value;
  const lista = document.getElementById("listaReservas");

  lista.innerHTML = "";

  if(!viagem_id){
    msg("msgReserva", "Selecione uma viagem.", "erro");
    return;
  }

  const { data, error } = await supabase
    .from("reservas_passagens")
    .select("*")
    .eq("viagem_id", viagem_id)
    .order("poltrona", { ascending: true });

  if(error){
    msg("msgReserva", "Erro ao carregar reservas: " + error.message, "erro");
    return;
  }

  if(!data || !data.length){
    lista.innerHTML = `<div class="vazio">Nenhuma reserva encontrada.</div>`;
    return;
  }

  data.forEach(r => {
    lista.innerHTML += `
      <div class="item">
        <b>Poltrona ${r.poltrona}</b><br>
        Nome: ${r.nome || "-"}<br>
        Status: ${r.status || "-"}
      </div>
    `;
  });
}

limparFormularioVeiculo();
limparFormularioViagem();
carregarUsuario();
</script>

</body>
</html>
