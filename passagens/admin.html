```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Passagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:#fff;
}
.topo{
  background:#0f172a;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.sair{
  background:#ef4444;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.container{padding:18px;max-width:1200px;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{
  background:#0f172a;
  border-radius:14px;
  padding:16px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
.botao-verde{background:#22c55e;color:#fff}
.botao-azul{background:#3b82f6;color:#fff}
.botao-vermelho{background:#ef4444;color:#fff}
.lista{margin-top:10px}
.item{background:#111827;padding:10px;border-radius:8px;margin-top:6px}
.ok{background:#14532d;padding:8px;border-radius:8px;margin-top:8px}
.erro{background:#7f1d1d;padding:8px;border-radius:8px;margin-top:8px}
</style>
</head>

<body>

<div class="topo">
  <h2>🚌 Painel Passagens</h2>
  <button class="sair" onclick="logout()">Sair</button>
</div>

<div class="container">
<div class="grid">

<!-- VEICULOS -->
<div class="card">
<h3>🚐 Veículos</h3>
<input id="nomeVeiculo" placeholder="Nome">
<input id="poltronasVeiculo" type="number" placeholder="Poltronas">
<button class="botao-verde" onclick="salvarVeiculo()">Salvar</button>
<div id="listaVeiculos" class="lista"></div>
</div>

<!-- VIAGENS -->
<div class="card">
<h3>🛣️ Viagens</h3>
<input id="rota" placeholder="Rota">
<input id="hora" placeholder="Hora 08:00">
<input id="valor" placeholder="Valor">
<input id="dias" placeholder="Seg,Ter,Qua">
<select id="veiculoSelect"></select>
<button class="botao-verde" onclick="salvarViagem()">Salvar</button>
<div id="listaViagens" class="lista"></div>
</div>

<!-- RESERVAS -->
<div class="card">
<h3>🎟️ Reservas</h3>

<select id="viagemReserva"></select>
<button class="botao-azul" onclick="verReservas()">Ver</button>

<input id="nomeAgencia" placeholder="Nome cliente">

<div id="mapaPoltronas" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;"></div>

<button class="botao-verde" onclick="reservarAgencia()">Reservar Agência</button>

<div id="msgReserva"></div>
<div id="listaReservas" class="lista"></div>

</div>

</div>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id=null;
let poltronaSelecionada=null;
let reservasAtuais=[];

// =============================
// LIMPAR PENDENTES 5 MIN
// =============================
async function limparReservasExpiradas(){
  const limite = new Date(Date.now()-5*60*1000).toISOString();

  await supabase
    .from("reservas_passagens")
    .delete()
    .eq("status","pendente")
    .lt("created_at",limite);
}

setInterval(limparReservasExpiradas,60000);
limparReservasExpiradas();

// =============================
// VEICULOS
// =============================
window.salvarVeiculo = async ()=>{
  const nome=document.getElementById("nomeVeiculo").value;
  const poltronas=document.getElementById("poltronasVeiculo").value;

  await supabase.from("veiculos_passagens").insert([{nome,total_poltronas:poltronas}]);
  carregarVeiculos();
};

async function carregarVeiculos(){
  const {data}=await supabase.from("veiculos_passagens").select("*");
  const lista=document.getElementById("listaVeiculos");
  const select=document.getElementById("veiculoSelect");

  lista.innerHTML="";
  select.innerHTML="";

  data.forEach(v=>{
    lista.innerHTML+=`<div class="item">${v.nome}</div>`;
    select.innerHTML+=`<option value="${v.id}">${v.nome}</option>`;
  });
}

// =============================
// VIAGENS
// =============================
window.salvarViagem = async ()=>{
  const rota=rotaInput.value;
  const hora=horaInput.value;
  const valor=valorInput.value;
  const dias=diasInput.value;
  const veiculo_id=veiculoSelect.value;

  await supabase.from("viagens_passagens").insert([{rota,hora,valor,dias,veiculo_id}]);
  carregarViagens();
};

async function carregarViagens(){
  const {data}=await supabase.from("viagens_passagens").select("*");
  const lista=document.getElementById("listaViagens");
  const select=document.getElementById("viagemReserva");

  lista.innerHTML="";
  select.innerHTML="";

  data.forEach(v=>{
    lista.innerHTML+=`<div class="item">${v.rota} - ${v.hora}</div>`;
    select.innerHTML+=`<option value="${v.id}">${v.rota}</option>`;
  });
}

// =============================
// RESERVAS
// =============================
window.verReservas = async ()=>{
  const viagem=document.getElementById("viagemReserva").value;

  const {data}=await supabase
    .from("reservas_passagens")
    .select("*")
    .eq("viagem_id",viagem);

  reservasAtuais=data||[];

  desenharPoltronas(20);

  const lista=document.getElementById("listaReservas");
  lista.innerHTML="";

  reservasAtuais.forEach(r=>{
    lista.innerHTML+=`<div class="item">Poltrona ${r.poltrona} - ${r.nome}</div>`;
  });
};

function desenharPoltronas(total){
  const el=document.getElementById("mapaPoltronas");
  let html="";

  for(let i=1;i<=total;i++){
    const ocupada=reservasAtuais.some(r=>Number(r.poltrona)===i);

    html+=`
    <div onclick="${ocupada?'':`selecionarPoltrona(${i})`}"
    style="background:${ocupada?'#ef4444':'#0f172a'};padding:10px;text-align:center;border-radius:6px;">
    ${i}
    </div>`;
  }

  el.innerHTML=html;
}

window.selecionarPoltrona=(n)=>{
  poltronaSelecionada=n;
};

// =============================
// RESERVA AGÊNCIA COM VALIDAÇÃO
// =============================
window.reservarAgencia = async ()=>{
  const nome=document.getElementById("nomeAgencia").value;
  const viagem_id=document.getElementById("viagemReserva").value;

  const {data:viagem}=await supabase
    .from("viagens_passagens")
    .select("*")
    .eq("id",viagem_id)
    .single();

  const hoje=new Date();
  const dias=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
  const hojeStr=dias[hoje.getDay()];

  if(!viagem.dias.includes(hojeStr)){
    alert("Sem viagem hoje");
    return;
  }

  const [h,m]=viagem.hora.split(":");
  const horaViagem=new Date();
  horaViagem.setHours(h);
  horaViagem.setMinutes(m);

  if(new Date()>horaViagem){
    alert("Viagem já saiu");
    return;
  }

  await supabase.from("reservas_passagens").insert([{
    nome,
    viagem_id,
    poltrona:poltronaSelecionada,
    status:"confirmado"
  }]);

  verReservas();
};

// =============================
carregarVeiculos();
carregarViagens();
</script>

</body>
</html>
