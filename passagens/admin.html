<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin Passagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, select, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.viagem{
  background:#111827;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🚌 Admin Passagens</h2>
  <button onclick="logout()">Sair</button>
</div>

<div class="container">

<div class="card">
<h3>Cadastrar Viagem</h3>

<input id="rota" placeholder="Ex: SRN → Teresina">
<input id="hora" placeholder="Ex: 08:00">

<select id="dias">
  <option value="Seg,Ter,Qua,Qui,Sex">Seg a Sex</option>
  <option value="Sab,Dom">Fim de semana</option>
  <option value="Seg,Qua,Sex">Seg, Qua, Sex</option>
</select>

<button onclick="salvar()">Salvar Viagem</button>
</div>

<div class="card">
<h3>Viagens cadastradas</h3>
<div id="lista"></div>
</div>

</div>

<script>
// 🔥 CONFIG
const supabase = supabase.createClient(
  "SUA_URL",
  "SUA_KEY"
);

// 🔥 CARREGAR VIAGENS
async function carregar(){
  const { data } = await supabase
    .from("viagens")
    .select("*")
    .order("hora");

  const div = document.getElementById("lista");
  div.innerHTML = "";

  data.forEach(v => {
    const el = document.createElement("div");

    el.className = "viagem";

    el.innerHTML = `
      <b>${v.rota}</b> - ${v.hora}<br>
      <small>${v.dias}</small><br>
      Status: ${v.ativo ? "🟢 Ativo" : "🔴 Inativo"}
      <br><br>
      <button onclick="toggle('${v.id}', ${v.ativo})">
        ${v.ativo ? "Desativar" : "Ativar"}
      </button>
      <button onclick="excluir('${v.id}')">Excluir</button>
    `;

    div.appendChild(el);
  });
}

// 🔥 SALVAR
async function salvar(){
  const rota = document.getElementById("rota").value;
  const hora = document.getElementById("hora").value;
  const dias = document.getElementById("dias").value;

  if(!rota || !hora) return alert("Preencha tudo");

  await supabase.from("viagens").insert([{
    rota,
    hora,
    dias
  }]);

  alert("Salvo!");
  carregar();
}

// 🔥 ATIVAR/DESATIVAR
async function toggle(id, ativo){
  await supabase
    .from("viagens")
    .update({ ativo: !ativo })
    .eq("id", id);

  carregar();
}

// 🔥 EXCLUIR
async function excluir(id){
  if(!confirm("Excluir viagem?")) return;

  await supabase
    .from("viagens")
    .delete()
    .eq("id", id);

  carregar();
}

// 🔥 LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// INIT
carregar();
</script>

</body>
</html>
