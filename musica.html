<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Music</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

.topo{
  padding:20px;
  text-align:center;
}

.codigo{
  font-size:20px;
  font-weight:bold;
}

#player{
  position:absolute;
  left:-9999px;
  width:1px;
  height:1px;
}

.lista{
  padding:20px;
}

.item{
  padding:15px;
  margin-bottom:8px;
  border-radius:10px;
  background:#111;
}

</style>
</head>

<body>

<div class="topo">

<h1>🎵 FF MUSIC</h1>

<div id="codigoTV" class="codigo"></div>

<h2 id="tocando">
Aguardando música...
</h2>

</div>

<div id="player"></div>

<div class="lista" id="listaMusicas"></div>

<script>

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let codigo =
localStorage.getItem("codigo_tv");

if(!codigo){

  codigo =
  Math.floor(
    100000 + Math.random()*900000
  ).toString();

  localStorage.setItem(
    "codigo_tv",
    codigo
  );

}

document
.getElementById("codigoTV")
.innerHTML =
"📺 Código TV: " + codigo;

const SALA =
"tv_" + codigo;

let ytPlayer;

function onYouTubeIframeAPIReady(){

  ytPlayer =
  new YT.Player(
    "player",
    {
      videoId:"",
      playerVars:{
        autoplay:1
      }
    }
  );

}

supabaseClient

.channel("controle-tv")

.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"controle_tv",
filter:`sala=eq.${SALA}`
},

(payload)=>{

const c =
payload.new;

if(c.comando==="abrir"){

document
.getElementById("tocando")
.innerText =
c.titulo;

ytPlayer.loadVideoById(
c.video_id
);

}

if(c.comando==="play"){

ytPlayer.playVideo();

}

if(c.comando==="pause"){

ytPlayer.pauseVideo();

}

if(c.comando==="volume"){

ytPlayer.setVolume(
Number(c.volume)
);

}

}

)

.subscribe();

</script>

</body>
</html>
