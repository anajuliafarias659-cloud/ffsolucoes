<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FF Music</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

.topo{
  padding:20px;
  text-align:center;
}

.codigo{
  font-size:20px;
  font-weight:bold;
}

#player{
  position:absolute;
  left:-9999px;
  width:1px;
  height:1px;
}

.lista{
  padding:20px;
}

.item{
  padding:15px;
  margin-bottom:8px;
  border-radius:10px;
  background:#111;
}

</style>
</head>

<body>

<div class="topo">

<h1>🎵 FF MUSIC</h1>

<div id="codigoTV" class="codigo"></div>

<h2 id="tocando">
Aguardando música...
</h2>

<button onclick="teste()">
▶ Testar Música
</button>

</div>

<div id="player"></div>

<div class="lista" id="listaMusicas"></div>

<script>

const SUPABASE_URL = "https://pdajixsoowcyhnjwhgpc.supabase.co";
const SUPABASE_KEY = "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let codigo =
localStorage.getItem("codigo_tv");

if(!codigo){

  codigo =
  Math.floor(
    100000 + Math.random()*900000
  ).toString();

  localStorage.setItem(
    "codigo_tv",
    codigo
  );

}

document
.getElementById("codigoTV")
.innerHTML =
"📺 Código TV: " + codigo;

const SALA =
"tv_" + codigo;

let ytPlayer = null;
let playerPronto = false;

async function registrarTV(){

  try{

    await supabaseClient
      .from("tv_sessoes")
      .delete()
      .eq("sala", SALA);

    const { error } =
      await supabaseClient
        .from("tv_sessoes")
        .insert([{
          codigo: codigo,
          sala: SALA,
          ativo: true
        }]);

    if(error){
      console.log(error);
    }else{
      console.log("TV registrada:", codigo);
    }

  }catch(err){
    console.log(err);
  }

}

registrarTV();

window.addEventListener("beforeunload", async ()=>{

  await supabaseClient
    .from("tv_sessoes")
    .delete()
    .eq("sala", SALA);

});
  


function onYouTubeIframeAPIReady(){

  ytPlayer =
  new YT.Player("player",{

    videoId:"",

    playerVars:{
      autoplay:1
    },

    events:{
      onReady:()=>{
        playerPronto = true;
      }
    }

  });

}

supabaseClient
supabaseClient
.channel("controle-tv-" + SALA)

.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"controle_tv"
  },

  (payload)=>{

    console.log("COMANDO RECEBIDO:", payload);

    const c = payload.new;

    if(!c) return;

    if(c.comando==="abrir"){

      console.log("ABRIR:", c.video_id);

      document.getElementById("tocando")
      .innerText =
      c.titulo || "Tocando...";

      if(playerPronto && ytPlayer){

        ytPlayer.loadVideoById(c.video_id);

      }else{

        console.log("PLAYER NÃO PRONTO");

      }

    }

    if(c.comando==="play"){

      console.log("PLAY");

      if(playerPronto && ytPlayer){
        ytPlayer.playVideo();
      }

    }

    if(c.comando==="pause"){

      console.log("PAUSE");

      if(playerPronto && ytPlayer){
        ytPlayer.pauseVideo();
      }

    }

    if(c.comando==="volume"){

      console.log("VOLUME:", c.volume);

      if(playerPronto && ytPlayer){
        ytPlayer.setVolume(
          Number(c.volume)
        );
      }

    }

  }

)

.subscribe((status)=>{

  console.log(
    "STATUS REALTIME:",
    status
  );

});

function teste(){

  if(!playerPronto){

    alert("Player não carregou");

    return;

  }

  ytPlayer.loadVideoById(
    "dQw4w9WgXcQ"
  );

  document.getElementById("tocando")
  .innerText =
  "Teste funcionando";

}

</script>

</body>
</html>
