<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Config Demo</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;

  padding:16px 20px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:10px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.voltar{
  background:#334155;
  color:#fff;
}

.demo{
  background:linear-gradient(
    135deg,
    #22c55e,
    #16a34a
  );

  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.box{
  background:#0f172a;
  border-radius:20px;
  padding:20px;
}

h2{
  margin-bottom:18px;
}

input,
textarea{
  width:100%;

  padding:14px;

  margin-top:10px;

  border:none;
  border-radius:12px;

  background:#020617;
  color:#fff;
}

textarea{
  min-height:100px;
  resize:vertical;
}

.salvar{
  margin-top:16px;

  background:linear-gradient(
    135deg,
    #22c55e,
    #16a34a
  );

  color:#fff;
}

.preview{
  margin-top:18px;

  display:grid;
  grid-template-columns:1fr 1fr;

  gap:20px;
}

@media(max-width:700px){

  .preview{
    grid-template-columns:1fr;
  }

}

.card{
  background:#020617;
  border-radius:18px;
  padding:16px;
}

.card h3{
  margin-bottom:14px;
}

.preview-img{
  width:100%;
  height:220px;

  object-fit:cover;

  border-radius:16px;

  background:#111827;
}

.logo-preview{
  width:120px;
  height:120px;

  border-radius:24px;

  object-fit:cover;

  background:#111827;
}

.info{
  margin-top:16px;
}

.info h1{
  font-size:22px;
}

.info p{
  margin-top:8px;
  color:#94a3b8;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="topo">

  <button
    class="btn voltar"
    onclick="history.back()"
  >

    ← Voltar

  </button>

  <button class="btn demo">

    🔥 CONFIG DEMO

  </button>

</div>

<div class="container">

  <div class="box">

    <h2>
      ⚙️ Configurações da Loja
    </h2>

    <input
      id="nomeLoja"
      placeholder="Nome da loja"
    >

    <textarea
      id="descricaoLoja"
      placeholder="Descrição da loja"
    ></textarea>

    <!-- LOGO -->

    <div style="margin-top:20px">

      <h2>
        🖼️ Logo
      </h2>

      <input
        type="file"
        id="logoInput"
        accept="image/*"
      >

    </div>

    <!-- BANNER -->

    <div style="margin-top:20px">

      <h2>
        🌄 Banner
      </h2>

      <input
        type="file"
        id="bannerInput"
        accept="image/*"
      >

    </div>

    <button
      class="btn salvar"
      onclick="salvarConfig()"
    >

      💾 Salvar configuração

    </button>

  </div>

  <!-- PREVIEW -->

  <div class="preview">

    <!-- LOGO -->

    <div class="card">

      <h3>
        Preview da logo
      </h3>

      <img
        id="previewLogo"
        class="logo-preview"
      >

    </div>

    <!-- BANNER -->

    <div class="card">

      <h3>
        Preview do banner
      </h3>

      <img
        id="previewBanner"
        class="preview-img"
      >

    </div>

  </div>

  <!-- PREVIEW FINAL -->

  <div
    class="box"
    style="margin-top:20px"
  >

    <h2>
      🛍️ Preview da loja
    </h2>

    <div style="
      display:flex;
      gap:14px;
      align-items:center;
      flex-wrap:wrap;
    ">

      <img
        id="previewLojaLogo"
        class="logo-preview"
      >

      <div class="info">

        <h1 id="previewNome">
          Minha Loja
        </h1>

        <p id="previewDesc">
          Descrição da loja
        </p>

      </div>

    </div>

  </div>

</div>

<script>

/* STORAGE */

const configSalva =
JSON.parse(
  localStorage.getItem(
    "config_demo"
  )
) || {};

/* VARIÁVEIS */

let logoBase64 =
configSalva.logo || "";

let bannerBase64 =
configSalva.banner || "";

/* ELEMENTOS */

const nomeInput =
document.getElementById(
  "nomeLoja"
);

const descInput =
document.getElementById(
  "descricaoLoja"
);

/* CARREGAR */

nomeInput.value =
configSalva.nome || "";

descInput.value =
configSalva.descricao || "";

/* PREVIEW */

function atualizarPreview(){

  document.getElementById(
    "previewLogo"
  ).src =
  logoBase64 ||
  "https://cdn-icons-png.flaticon.com/512/3081/3081559.png";

  document.getElementById(
    "previewBanner"
  ).src =
  bannerBase64 ||
  "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200";

  document.getElementById(
    "previewLojaLogo"
  ).src =
  logoBase64 ||
  "https://cdn-icons-png.flaticon.com/512/3081/3081559.png";

  document.getElementById(
    "previewNome"
  ).innerText =
  nomeInput.value ||
  "Minha Loja";

  document.getElementById(
    "previewDesc"
  ).innerText =
  descInput.value ||
  "Descrição da loja";

}

/* BASE64 */

function converterBase64(file){

  return new Promise(resolve => {

    const reader =
    new FileReader();

    reader.onload = e => {

      resolve(e.target.result);

    };

    reader.readAsDataURL(file);

  });

}

/* LOGO */

document.getElementById(
  "logoInput"
).addEventListener(
  "change",
  async function(){

    const file =
    this.files[0];

    if(!file) return;

    logoBase64 =
    await converterBase64(file);

    atualizarPreview();

  }
);

/* BANNER */

document.getElementById(
  "bannerInput"
).addEventListener(
  "change",
  async function(){

    const file =
    this.files[0];

    if(!file) return;

    bannerBase64 =
    await converterBase64(file);

    atualizarPreview();

  }
);

/* INPUTS */

nomeInput.addEventListener(
  "input",
  atualizarPreview
);

descInput.addEventListener(
  "input",
  atualizarPreview
);

/* SALVAR */

function salvarConfig(){

  const config = {

    nome:
    nomeInput.value,

    descricao:
    descInput.value,

    logo:
    logoBase64,

    banner:
    bannerBase64

  };

  localStorage.setItem(

    "config_demo",

    JSON.stringify(config)

  );

  alert(
    "✅ Configuração salva"
  );

}

/* INIT */

atualizarPreview();

</script>

</body>
</html>
