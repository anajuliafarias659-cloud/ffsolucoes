<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Loja Demo</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

:root{
  --bg:#020617;
  --card:#111827;
  --line:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#94a3b8;
  --blue:#0ea5e9;
  --green:#22c55e;
}

body{
  background:#020617;
  color:#fff;
}

/* TOPO */

.topo{
  position:sticky;
  top:0;
  z-index:10;

  background:#0f172a;
  border-bottom:1px solid var(--line);

  padding:14px;
}

.topo-wrap{
  max-width:1200px;
  margin:auto;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand img{
  width:60px;
  height:60px;
  border-radius:16px;
  object-fit:cover;
  background:#fff;
}

.brand h1{
  font-size:22px;
}

.brand p{
  color:var(--muted);
  margin-top:4px;
}

.btn{
  border:none;
  padding:12px 16px;
  border-radius:14px;

  background:linear-gradient(
    135deg,
    var(--green),
    #16a34a
  );

  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */

.hero{
  max-width:1200px;
  margin:auto;
  padding:18px;
}

.banner{
  height:260px;
  border-radius:24px;

  overflow:hidden;
  position:relative;

  background:#111827;
  border:1px solid var(--line);
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner-texto{
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:38px;
  font-weight:bold;

  background:rgba(0,0,0,.35);
}

/* PRODUTOS */

.produtos{
  max-width:1200px;
  margin:auto;

  padding:18px;

  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(230px,1fr));

  gap:16px;
}

.card{
  background:#111827;
  border:1px solid var(--line);

  border-radius:22px;
  overflow:hidden;

  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.foto{
  height:220px;
  background:#fff;

  display:flex;
  align-items:center;
  justify-content:center;
}

.foto img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.info{
  padding:14px;
}

.nome{
  font-size:18px;
  font-weight:bold;
}

.preco{
  margin-top:8px;

  font-size:24px;
  font-weight:bold;

  color:#38bdf8;
}

.desc{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.acoes{
  margin-top:14px;

  display:flex;
  gap:10px;
}

.btn-add{
  flex:1;

  border:none;
  padding:12px;

  border-radius:14px;

  background:linear-gradient(
    135deg,
    var(--blue),
    #0284c7
  );

  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* CARRINHO */

.btn-carrinho{
  position:fixed;
  right:16px;
  bottom:16px;

  border:none;

  padding:14px 18px;

  border-radius:999px;

  background:linear-gradient(
    135deg,
    var(--green),
    #16a34a
  );

  color:#fff;
  font-weight:bold;

  cursor:pointer;

  z-index:100;
}

.contador{
  background:#fff;
  color:#000;

  min-width:24px;
  height:24px;

  border-radius:999px;

  display:inline-flex;
  align-items:center;
  justify-content:center;

  margin-left:8px;

  font-size:12px;
}

/* VAZIO */

.vazio{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}

/* MOBILE */

@media(max-width:700px){

  .topo-wrap{
    flex-direction:column;
    align-items:flex-start;
  }

  .banner{
    height:180px;
  }

  .banner-texto{
    font-size:28px;
  }

}

</style>
</head>

<body>

<!-- TOPO -->

<header class="topo">

  <div class="topo-wrap">

    <div class="brand">

      <img
        id="logoLoja"
        src=""
      >

      <div>

        <h1 id="nomeLoja">
          Minha Loja Demo
        </h1>

        <p id="descLoja">
          Demonstração local
        </p>

      </div>

    </div>

    <button class="btn">
      🔥 DEMO
    </button>

  </div>

</header>

<!-- HERO -->

<section class="hero">

  <div class="banner">

    <img
      id="bannerLoja"
      src=""
    >

    <div class="banner-texto">
      🛍 Loja funcionando
    </div>

  </div>

</section>

<!-- PRODUTOS -->

<section
  class="produtos"
  id="listaProdutos"
></section>

<!-- CARRINHO -->

<button
  class="btn-carrinho"
  onclick="abrirCarrinho()"
>

🛒 Carrinho

<span
  class="contador"
  id="contador"
>
0
</span>

</button>

<script>

/* CONFIG */

const configDemo =
JSON.parse(
  localStorage.getItem("config_demo")
) || {

  nome:"Minha Loja Demo",

  descricao:
  "Loja de demonstração",

  logo:
  "https://cdn-icons-png.flaticon.com/512/3081/3081559.png",

  banner:
  "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200"

};

/* APLICAR CONFIG */

document.getElementById(
  "nomeLoja"
).innerText =
configDemo.nome;

document.getElementById(
  "descLoja"
).innerText =
configDemo.descricao;

document.getElementById(
  "logoLoja"
).src =
configDemo.logo;

document.getElementById(
  "bannerLoja"
).src =
configDemo.banner;

/* PRODUTOS */

function pegarProdutos(){

  return JSON.parse(
    localStorage.getItem(
      "produtos_demo"
    )
  ) || [];

}

const lista =
document.getElementById(
  "listaProdutos"
);

function renderizarProdutos(){

  const produtos =
  pegarProdutos();

  if(produtos.length <= 0){

    lista.innerHTML = `

      <div class="vazio">

        <h2>
          Nenhum produto cadastrado
        </h2>

        <p style="margin-top:10px">
          Vá no admin demo e adicione produtos
        </p>

      </div>

    `;

    return;

  }

  lista.innerHTML = "";

  produtos.forEach(produto => {

    lista.innerHTML += `

    <div class="card">

      <div class="foto">

        <img
          src="${
            produto.imagem ||
            'https://cdn-icons-png.flaticon.com/512/3081/3081559.png'
          }"
        >

      </div>

      <div class="info">

        <div class="nome">
          ${produto.nome}
        </div>

        <div class="preco">
          R$ ${produto.preco}
        </div>

        <div class="desc">

          ${
            produto.descricao ||
            "Produto demo"
          }

        </div>

        <div class="acoes">

          <button
            class="btn-add"
            onclick="adicionarCarrinho(${produto.id})"
          >

            Adicionar

          </button>

        </div>

      </div>

    </div>

    `;

  });

}

/* CARRINHO */

let carrinho =
JSON.parse(
  localStorage.getItem(
    "carrinho_demo"
  )
) || [];

function atualizarCarrinho(){

  document.getElementById(
    "contador"
  ).innerText =
  carrinho.length;

}

function adicionarCarrinho(id){

  const produtos =
  pegarProdutos();

  const produto =
  produtos.find(p => p.id == id);

  if(!produto) return;

  carrinho.push(produto);

  localStorage.setItem(
    "carrinho_demo",
    JSON.stringify(carrinho)
  );

  atualizarCarrinho();

  alert("Produto adicionado");

}

function abrirCarrinho(){

  if(carrinho.length <= 0){

    alert(
      "Carrinho vazio"
    );

    return;

  }

  let texto = "🛒 Carrinho Demo\n\n";

  carrinho.forEach(item => {

    texto += `
${item.nome}
R$ ${item.preco}

`;

  });

  alert(texto);

}

/* AUTO UPDATE */

setInterval(() => {

  renderizarProdutos();

}, 2000);

/* INIT */

renderizarProdutos();
atualizarCarrinho();

</script>

</body>
</html>
