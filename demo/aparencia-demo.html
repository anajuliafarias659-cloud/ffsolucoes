<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Configuração Demo</title>

<style>

:root{
  --bg:#020617;
  --card:#0f172a;
  --border:#1e293b;
  --text:#ffffff;
  --muted:#94a3b8;
  --primary:#22c55e;
  --danger:#ef4444;
  --warning:#f59e0b;
  --input:#0b1220;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial;
}

.container{
  max-width:850px;
  margin:30px auto;
  padding:20px;
}

.box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  margin-bottom:18px;
}

h2{
  margin:0 0 16px;
}

input,
select,
textarea,
button{
  width:100%;
  padding:14px;
  margin-top:10px;

  border:none;
  border-radius:12px;

  font-size:14px;
}

input,
select,
textarea{
  background:var(--input);
  color:#fff;
  border:1px solid var(--border);
}

textarea{
  resize:vertical;
  min-height:90px;
}

button{
  background:var(--primary);
  color:#04120a;
  font-weight:bold;
  cursor:pointer;
}

.btn-danger{
  background:var(--danger);
  color:#fff;
}

.btn-warning{
  background:var(--warning);
  color:#111827;
}

img{
  width:100%;
  max-height:240px;
  object-fit:cover;
  border-radius:14px;
  margin-top:10px;
  background:#111827;
}

.logo-preview{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:24px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:700px){

  .row{
    grid-template-columns:1fr;
  }

}

small{
  display:block;
  margin-top:6px;
  color:var(--muted);
}

.hidden{
  display:none;
}

.switch-box{
  margin-top:14px;
  background:#111827;
  border-radius:14px;
  padding:14px;
}

.switch-linha{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

.switch{
  position:relative;
  width:62px;
  height:34px;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  inset:0;
  background:#475569;
  border-radius:999px;
  transition:.2s;
}

.slider:before{
  content:"";
  position:absolute;
  width:26px;
  height:26px;
  left:4px;
  top:4px;
  background:#fff;
  border-radius:50%;
  transition:.2s;
}

.switch input:checked + .slider{
  background:#22c55e;
}

.switch input:checked + .slider:before{
  transform:translateX(28px);
}

.status-pill{
  margin-top:12px;
  display:inline-block;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
}

.status-aberta{
  background:rgba(34,197,94,.15);
  color:#4ade80;
}

.status-fechada{
  background:rgba(239,68,68,.15);
  color:#f87171;
}

</style>
</head>

<body>

<div class="container">

  <!-- INFO -->

  <div class="box">

    <h2>
      🏪 Informações da Loja
    </h2>

    <input
      id="nome"
      placeholder="Nome da loja"
    >

    <label>Logo</label>

    <input
      type="file"
      id="inputLogo"
      accept="image/*"
    >

    <img
      id="previewLogo"
      class="logo-preview"
    >

    <button
      class="btn-danger"
      onclick="removerLogo()"
    >

      ❌ Remover Logo

    </button>

    <label>Banner</label>

    <input
      type="file"
      id="inputBanner"
      accept="image/*"
    >

    <img id="previewBanner">

    <button
      class="btn-danger"
      onclick="removerBanner()"
    >

      ❌ Remover Banner

    </button>

    <label>
      Descrição do banner
    </label>

    <textarea
      id="bannerDescricao"
    ></textarea>

  </div>

  <!-- PROMOÇÃO -->

  <div class="box">

    <h2>
      🔥 Promoção
    </h2>

    <div class="switch-box">

      <div class="switch-linha">

        <div>
          Ativar promoção
        </div>

        <label class="switch">

          <input
            type="checkbox"
            id="promocaoAtiva"
          >

          <span class="slider"></span>

        </label>

      </div>

    </div>

    <textarea
      id="promocaoTexto"
      placeholder="Mensagem da promoção"
    ></textarea>

    <div class="row">

      <input
        type="datetime-local"
        id="promocaoInicio"
      >

      <input
        type="datetime-local"
        id="promocaoFim"
      >

    </div>

    <input
      type="file"
      id="inputPromocaoImagem"
      accept="image/*"
    >

    <img
      id="previewPromocaoImagem"
      style="display:none"
    >

  </div>

  <!-- ENDEREÇO -->

  <div class="box">

    <h2>
      📍 Endereço
    </h2>

    <div class="row">

      <input
        id="rua"
        placeholder="Rua"
      >

      <input
        id="numero"
        placeholder="Número"
      >

    </div>

    <div class="row">

      <input
        id="cidade"
        placeholder="Cidade"
      >

      <input
        id="estado"
        placeholder="Estado"
      >

    </div>

    <input
      id="telefone"
      placeholder="Telefone"
    >

    <button
      class="btn-warning"
      onclick="pegarLocalizacao()"
    >

      📍 Pegar localização

    </button>

    <div class="row">

      <input
        id="lojaLat"
        placeholder="Latitude"
        readonly
      >

      <input
        id="lojaLng"
        placeholder="Longitude"
        readonly
      >

    </div>

    <input
      id="lojaMaps"
      placeholder="Link Maps"
    >

  </div>

  <!-- CONFIG -->

  <div class="box">

    <h2>
      ⚙️ Configurações
    </h2>

    <select id="tema">

      <option value="azul">
        🔵 Azul
      </option>

      <option value="verde">
        🟢 Verde
      </option>

      <option value="dark">
        🌙 Dark
      </option>

      <option value="gold">
        👑 Gold
      </option>

    </select>

    <select id="modoVenda">

      <option value="whatsapp">
        WhatsApp
      </option>

      <option value="sistema">
        Sistema
      </option>

    </select>

    <input
      id="whatsapp"
      placeholder="WhatsApp"
    >

    <input
      id="pixChave"
      placeholder="Chave PIX"
    >

  </div>

  <!-- LOJA -->

  <div class="box">

    <h2>
      🏪 Status da Loja
    </h2>

    <select id="modoExibicao">

      <option value="aberta">
        🟢 Aberta
      </option>

      <option value="vitrine">
        🛍️ Vitrine
      </option>

      <option value="fechada">
        🔴 Fechada
      </option>

    </select>

    <div class="switch-box">

      <div class="switch-linha">

        <div>
          Loja aberta
        </div>

        <label class="switch">

          <input
            type="checkbox"
            id="lojaAberta"
          >

          <span class="slider"></span>

        </label>

      </div>

      <div
        id="statusLoja"
        class="status-pill status-aberta"
      >

        🟢 Loja aberta

      </div>

    </div>

    <textarea
      id="mensagemFechado"
      placeholder="Mensagem quando fechada"
    ></textarea>

  </div>

  <!-- SALVAR -->

  <button onclick="salvarTudo()">

    💾 Salvar Configuração

  </button>

</div>

<script>

/* ELEMENTOS */

const nome =
document.getElementById("nome");

const bannerDescricao =
document.getElementById(
  "bannerDescricao"
);

const rua =
document.getElementById("rua");

const numero =
document.getElementById("numero");

const cidade =
document.getElementById("cidade");

const estado =
document.getElementById("estado");

const telefone =
document.getElementById("telefone");

const lojaLat =
document.getElementById("lojaLat");

const lojaLng =
document.getElementById("lojaLng");

const lojaMaps =
document.getElementById("lojaMaps");

const tema =
document.getElementById("tema");

const modoVenda =
document.getElementById("modoVenda");

const whatsapp =
document.getElementById("whatsapp");

const pixChave =
document.getElementById("pixChave");

const promocaoAtiva =
document.getElementById(
  "promocaoAtiva"
);

const promocaoTexto =
document.getElementById(
  "promocaoTexto"
);

const promocaoInicio =
document.getElementById(
  "promocaoInicio"
);

const promocaoFim =
document.getElementById(
  "promocaoFim"
);

const modoExibicao =
document.getElementById(
  "modoExibicao"
);

const lojaAberta =
document.getElementById(
  "lojaAberta"
);

const mensagemFechado =
document.getElementById(
  "mensagemFechado"
);

const statusLoja =
document.getElementById(
  "statusLoja"
);

const previewLogo =
document.getElementById(
  "previewLogo"
);

const previewBanner =
document.getElementById(
  "previewBanner"
);

const previewPromocaoImagem =
document.getElementById(
  "previewPromocaoImagem"
);

/* BASE64 */

let logoBase64 = "";
let bannerBase64 = "";
let promoBase64 = "";

function converterBase64(file){

  return new Promise(resolve => {

    const reader =
    new FileReader();

    reader.onload = e => {

      resolve(e.target.result);

    };

    reader.readAsDataURL(file);

  });

}

/* LOGO */

document.getElementById(
  "inputLogo"
).addEventListener(
  "change",
  async () => {

    const file =
    event.target.files[0];

    if(!file) return;

    logoBase64 =
    await converterBase64(file);

    previewLogo.src =
    logoBase64;

  }
);

/* BANNER */

document.getElementById(
  "inputBanner"
).addEventListener(
  "change",
  async () => {

    const file =
    event.target.files[0];

    if(!file) return;

    bannerBase64 =
    await converterBase64(file);

    previewBanner.src =
    bannerBase64;

  }
);

/* PROMO */

document.getElementById(
  "inputPromocaoImagem"
).addEventListener(
  "change",
  async () => {

    const file =
    event.target.files[0];

    if(!file) return;

    promoBase64 =
    await converterBase64(file);

    previewPromocaoImagem.src =
    promoBase64;

    previewPromocaoImagem
    .style.display = "block";

  }
);

/* GEO */

function pegarLocalizacao(){

  if(!navigator.geolocation){

    alert(
      "Geolocalização não suportada"
    );

    return;

  }

  navigator.geolocation
  .getCurrentPosition(pos => {

    lojaLat.value =
    pos.coords.latitude;

    lojaLng.value =
    pos.coords.longitude;

    lojaMaps.value =
    `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;

    alert(
      "📍 Localização capturada"
    );

  });

}

/* STATUS */

function atualizarStatus(){

  if(
    modoExibicao.value ===
    "fechada"
  ){

    statusLoja.className =
    "status-pill status-fechada";

    statusLoja.innerText =
    "🔴 Loja fechada";

    return;

  }

  if(
    modoExibicao.value ===
    "vitrine"
  ){

    statusLoja.className =
    "status-pill status-fechada";

    statusLoja.innerText =
    "🛍️ Somente vitrine";

    return;

  }

  if(lojaAberta.checked){

    statusLoja.className =
    "status-pill status-aberta";

    statusLoja.innerText =
    "🟢 Loja aberta";

  }else{

    statusLoja.className =
    "status-pill status-fechada";

    statusLoja.innerText =
    "🔴 Loja fechada";

  }

}

modoExibicao.addEventListener(
  "change",
  atualizarStatus
);

lojaAberta.addEventListener(
  "change",
  atualizarStatus
);

/* SALVAR */

function salvarTudo(){

  const payload = {

    nome_site:
      nome.value,

    logo_url:
      logoBase64,

    banner_url:
      bannerBase64,

    banner_descricao:
      bannerDescricao.value,

    loja_rua:
      rua.value,

    loja_numero:
      numero.value,

    loja_cidade:
      cidade.value,

    loja_estado:
      estado.value,

    telefone:
      telefone.value,

    loja_lat:
      lojaLat.value,

    loja_lng:
      lojaLng.value,

    loja_maps:
      lojaMaps.value,

    tema_site:
      tema.value,

    modo_venda:
      modoVenda.value,

    whatsapp_numero:
      whatsapp.value,

    pix_chave:
      pixChave.value,

    promocao_ativa:
      promocaoAtiva.checked,

    promocao_texto:
      promocaoTexto.value,

    promocao_inicio:
      promocaoInicio.value,

    promocao_fim:
      promocaoFim.value,

    promocao_imagem:
      promoBase64,

    modo_exibicao:
      modoExibicao.value,

    loja_fechada:
      !lojaAberta.checked,

    mensagem_fechado:
      mensagemFechado.value

  };

  localStorage.setItem(

    "config_demo",

    JSON.stringify(payload)

  );

  alert(
    "✅ Configuração salva"
  );

}

/* CARREGAR */

function carregarConfig(){

  const data =
  JSON.parse(
    localStorage.getItem(
      "config_demo"
    )
  );

  if(!data) return;

  nome.value =
  data.nome_site || "";

  bannerDescricao.value =
  data.banner_descricao || "";

  rua.value =
  data.loja_rua || "";

  numero.value =
  data.loja_numero || "";

  cidade.value =
  data.loja_cidade || "";

  estado.value =
  data.loja_estado || "";

  telefone.value =
  data.telefone || "";

  lojaLat.value =
  data.loja_lat || "";

  lojaLng.value =
  data.loja_lng || "";

  lojaMaps.value =
  data.loja_maps || "";

  tema.value =
  data.tema_site || "azul";

  modoVenda.value =
  data.modo_venda || "whatsapp";

  whatsapp.value =
  data.whatsapp_numero || "";

  pixChave.value =
  data.pix_chave || "";

  promocaoAtiva.checked =
  data.promocao_ativa || false;

  promocaoTexto.value =
  data.promocao_texto || "";

  promocaoInicio.value =
  data.promocao_inicio || "";

  promocaoFim.value =
  data.promocao_fim || "";

  modoExibicao.value =
  data.modo_exibicao || "aberta";

  lojaAberta.checked =
  !data.loja_fechada;

  mensagemFechado.value =
  data.mensagem_fechado || "";

  logoBase64 =
  data.logo_url || "";

  bannerBase64 =
  data.banner_url || "";

  promoBase64 =
  data.promocao_imagem || "";

  previewLogo.src =
  logoBase64;

  previewBanner.src =
  bannerBase64;

  if(promoBase64){

    previewPromocaoImagem.src =
    promoBase64;

    previewPromocaoImagem
    .style.display = "block";

  }

  atualizarStatus();

}

/* REMOVER */

function removerLogo(){

  logoBase64 = "";

  previewLogo.src = "";

}

function removerBanner(){

  bannerBase64 = "";

  previewBanner.src = "";

}

/* INIT */

carregarConfig();

</script>

</body>
</html>
