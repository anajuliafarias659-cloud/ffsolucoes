<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Produtos Demo</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial;
}

body{
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:16px 20px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.voltar{
  background:#334155;
  color:#fff;
}

.demo{
  background:linear-gradient(
    135deg,
    #22c55e,
    #16a34a
  );

  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.box{
  background:#0f172a;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

h2{
  margin-bottom:16px;
}

input,
textarea,
select{
  width:100%;
  padding:14px;
  margin-top:10px;

  border:none;
  border-radius:12px;

  background:#020617;
  color:#fff;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.grid4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

@media(max-width:900px){

  .grid4{
    grid-template-columns:1fr 1fr;
  }

}

@media(max-width:600px){

  .grid2,
  .grid4{
    grid-template-columns:1fr;
  }

}

.salvar{
  margin-top:14px;

  background:linear-gradient(
    135deg,
    #22c55e,
    #16a34a
  );

  color:#fff;
}

.preview{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

.preview-item{
  position:relative;
}

.preview-item img{
  width:90px;
  height:90px;
  border-radius:12px;
  object-fit:cover;
}

.preview-item button{
  position:absolute;
  top:-6px;
  right:-6px;

  width:24px;
  height:24px;

  border:none;
  border-radius:50%;

  background:red;
  color:#fff;
  cursor:pointer;
}

.lista{
  display:grid;
  grid-template-columns:
  repeat(auto-fill,minmax(220px,1fr));

  gap:16px;
}

.produto{
  background:#020617;
  border-radius:16px;
  overflow:hidden;
}

.produto img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:14px;
}

.nome{
  font-size:18px;
  font-weight:bold;
}

.preco{
  margin-top:8px;
  color:#22c55e;
  font-size:22px;
  font-weight:bold;
}

.desc{
  margin-top:8px;
  color:#94a3b8;
  font-size:13px;
  line-height:1.5;
}

.acoes{
  margin-top:14px;
  display:flex;
  gap:8px;
}

.editar{
  flex:1;
  background:#0ea5e9;
  color:#fff;
}

.excluir{
  flex:1;
  background:#ef4444;
  color:#fff;
}

.variacao{
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:13px;
}

.vazio{
  color:#94a3b8;
  text-align:center;
  padding:40px 20px;
}

</style>
</head>

<body>

<div class="topo">

  <button
    class="btn voltar"
    onclick="history.back()"
  >
    ← Voltar
  </button>

  <button class="btn demo">
    🔥 DEMO LOCAL
  </button>

</div>

<div class="container">

  <!-- FORM -->

  <div class="box">

    <h2>
      ➕ Cadastrar Produto
    </h2>

    <input
      id="nome"
      placeholder="Nome do produto"
    >

    <div class="grid2">

      <input
        id="preco"
        placeholder="Preço"
      >

      <input
        id="estoque"
        type="number"
        placeholder="Estoque"
      >

    </div>

    <textarea
      id="descricao"
      placeholder="Descrição"
    ></textarea>

    <input
      id="categoria"
      placeholder="Categoria"
    >

    <!-- VARIAÇÕES -->

    <h2 style="margin-top:20px">
      🔗 Variações
    </h2>

    <div class="grid4">

      <input
        id="tipoVar"
        placeholder="Tipo"
      >

      <input
        id="valorVar"
        placeholder="Valor"
      >

      <input
        id="estoqueVar"
        type="number"
        placeholder="Estoque"
      >

      <input
        id="precoVar"
        placeholder="Preço"
      >

    </div>

    <button
      class="btn salvar"
      onclick="adicionarVariacao()"
    >
      Adicionar variação
    </button>

    <div id="listaVariacoes"></div>

    <!-- FOTO -->

    <h2 style="margin-top:20px">
      📷 Fotos
    </h2>

    <input
      type="file"
      id="foto"
      accept="image/*"
      multiple
    >

    <div
      class="preview"
      id="preview"
    ></div>

    <button
      class="btn salvar"
      onclick="salvarProduto()"
    >
      💾 Salvar produto
    </button>

  </div>

  <!-- LISTA -->

  <div class="box">

    <h2>
      📦 Produtos cadastrados
    </h2>

    <div
      class="lista"
      id="listaProdutos"
    ></div>

  </div>

</div>

<script>

/* STORAGE */

function pegarProdutos(){

  return JSON.parse(
    localStorage.getItem(
      "produtos_demo"
    )
  ) || [];

}

function salvarProdutos(lista){

  localStorage.setItem(
    "produtos_demo",
    JSON.stringify(lista)
  );

}

/* VARIAÇÕES */

let variacoes = [];

function adicionarVariacao(){

  const tipo =
  document.getElementById(
    "tipoVar"
  ).value;

  const valor =
  document.getElementById(
    "valorVar"
  ).value;

  const estoque =
  document.getElementById(
    "estoqueVar"
  ).value;

  const preco =
  document.getElementById(
    "precoVar"
  ).value;

  if(!tipo || !valor){

    alert(
      "Preencha a variação"
    );

    return;

  }

  variacoes.push({

    tipo,
    valor,
    estoque,
    preco

  });

  renderizarVariacoes();

  document.getElementById(
    "tipoVar"
  ).value = "";

  document.getElementById(
    "valorVar"
  ).value = "";

  document.getElementById(
    "estoqueVar"
  ).value = "";

  document.getElementById(
    "precoVar"
  ).value = "";

}

function renderizarVariacoes(){

  const lista =
  document.getElementById(
    "listaVariacoes"
  );

  lista.innerHTML = "";

  variacoes.forEach((v,i)=>{

    lista.innerHTML += `

    <div class="variacao">

      <b>
        ${v.tipo}
      </b>

      :
      ${v.valor}

      -
      R$ ${v.preco || "padrão"}

      <button
        style="
          margin-top:8px;
          background:red;
          color:#fff;
          border:none;
          padding:8px 10px;
          border-radius:10px;
          cursor:pointer;
        "
        onclick="removerVariacao(${i})"
      >

        Remover

      </button>

    </div>

    `;

  });

}

function removerVariacao(i){

  variacoes.splice(i,1);

  renderizarVariacoes();

}

/* FOTOS */

let fotosBase64 = [];

document.getElementById(
  "foto"
).addEventListener(
  "change",
  async function(){

    const arquivos =
    [...this.files];

    for(const file of arquivos){

      const base64 =
      await converterBase64(file);

      fotosBase64.push(base64);

    }

    renderizarPreview();

  }
);

function converterBase64(file){

  return new Promise(resolve => {

    const reader =
    new FileReader();

    reader.onload = e => {

      resolve(e.target.result);

    };

    reader.readAsDataURL(file);

  });

}

function renderizarPreview(){

  const preview =
  document.getElementById(
    "preview"
  );

  preview.innerHTML = "";

  fotosBase64.forEach((foto,i)=>{

    preview.innerHTML += `

    <div class="preview-item">

      <img src="${foto}">

      <button
        onclick="removerFoto(${i})"
      >

        ×

      </button>

    </div>

    `;

  });

}

function removerFoto(i){

  fotosBase64.splice(i,1);

  renderizarPreview();

}

/* SALVAR */

let editandoId = null;

function salvarProduto(){

  const nome =
  document.getElementById(
    "nome"
  ).value;

  const preco =
  document.getElementById(
    "preco"
  ).value;

  const estoque =
  document.getElementById(
    "estoque"
  ).value;

  const descricao =
  document.getElementById(
    "descricao"
  ).value;

  const categoria =
  document.getElementById(
    "categoria"
  ).value;

  if(!nome || !preco){

    alert(
      "Nome e preço obrigatórios"
    );

    return;

  }

  let produtos =
  pegarProdutos();

  const produto = {

    id:
      editandoId ||
      Date.now(),

    nome,
    preco,
    estoque,
    descricao,
    categoria,

    imagens:fotosBase64,

    variacoes

  };

  if(editandoId){

    produtos =
    produtos.map(p => {

      if(p.id == editandoId){

        return produto;

      }

      return p;

    });

  }else{

    produtos.push(produto);

  }

  salvarProdutos(produtos);

  limpar();

  carregarProdutos();

  alert(
    "Produto salvo"
  );

}

/* LISTA */

function carregarProdutos(){

  const produtos =
  pegarProdutos();

  const lista =
  document.getElementById(
    "listaProdutos"
  );

  if(produtos.length <= 0){

    lista.innerHTML = `

      <div class="vazio">

        Nenhum produto cadastrado

      </div>

    `;

    return;

  }

  lista.innerHTML = "";

  produtos.reverse().forEach(p => {

    lista.innerHTML += `

    <div class="produto">

      <img
        src="${
          p.imagens?.[0] ||
          'https://cdn-icons-png.flaticon.com/512/3081/3081559.png'
        }"
      >

      <div class="info">

        <div class="nome">
          ${p.nome}
        </div>

        <div class="preco">
          R$ ${p.preco}
        </div>

        <div class="desc">
          ${p.descricao || ""}
        </div>

        <div style="
          margin-top:8px;
          color:#94a3b8;
          font-size:13px;
        ">

          📦 Estoque:
          ${p.estoque || 0}

        </div>

        <div style="
          margin-top:8px;
          color:#94a3b8;
          font-size:13px;
        ">

          🗂️
          ${p.categoria || "Sem categoria"}

        </div>

        <div class="acoes">

          <button
            class="btn editar"
            onclick="editarProduto(${p.id})"
          >
            Editar
          </button>

          <button
            class="btn excluir"
            onclick="excluirProduto(${p.id})"
          >
            Excluir
          </button>

        </div>

      </div>

    </div>

    `;

  });

}

/* EDITAR */

function editarProduto(id){

  const produtos =
  pegarProdutos();

  const produto =
  produtos.find(p => p.id == id);

  if(!produto) return;

  editandoId = id;

  document.getElementById(
    "nome"
  ).value =
  produto.nome || "";

  document.getElementById(
    "preco"
  ).value =
  produto.preco || "";

  document.getElementById(
    "estoque"
  ).value =
  produto.estoque || "";

  document.getElementById(
    "descricao"
  ).value =
  produto.descricao || "";

  document.getElementById(
    "categoria"
  ).value =
  produto.categoria || "";

  variacoes =
  produto.variacoes || [];

  fotosBase64 =
  produto.imagens || [];

  renderizarVariacoes();
  renderizarPreview();

  scrollTo({
    top:0,
    behavior:"smooth"
  });

}

/* EXCLUIR */

function excluirProduto(id){

  if(
    !confirm(
      "Excluir produto?"
    )
  ){
    return;
  }

  let produtos =
  pegarProdutos();

  produtos =
  produtos.filter(
    p => p.id != id
  );

  salvarProdutos(produtos);

  carregarProdutos();

}

/* LIMPAR */

function limpar(){

  editandoId = null;

  document.getElementById(
    "nome"
  ).value = "";

  document.getElementById(
    "preco"
  ).value = "";

  document.getElementById(
    "estoque"
  ).value = "";

  document.getElementById(
    "descricao"
  ).value = "";

  document.getElementById(
    "categoria"
  ).value = "";

  variacoes = [];
  fotosBase64 = [];

  renderizarVariacoes();
  renderizarPreview();

}

/* INIT */

carregarProdutos();

</script>

</body>
</html>
