<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Categorias - Loja de Celular</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="../js/auth.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:32px;
  max-width:900px;
  margin:auto;
}

.card-box{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  margin-bottom:24px;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  margin-right:10px;
}

button{
  padding:12px 16px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.salvar{
  background:#22c55e;
  color:#000;
}

.desativar{
  background:#ef4444;
  color:#fff;
}

.lista{
  margin-top:24px;
}

.item{
  background:#0f172a;
  padding:14px 18px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  transition:.2s;
}

.item:hover{
  background:#1e293b;
}

.vazio{
  opacity:.6;
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="topo">
  <h2> Categorias - da sua Loja</h2>
  <button onclick="history.back()">⬅ Voltar</button>
</div>

<div class="container">

  <div class="card-box">
    <h3>Nova Categoria</h3>
    <input id="emoji" placeholder="Emoji ()">
    <input id="nome" placeholder="">
    <button class="salvar" onclick="criar()">Salvar</button>
  </div>

  <div class="lista" id="lista"></div>

</div>

<script>
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;

/* 🔐 Iniciar */
async function iniciar(){

  let tentativas = 0;

  while(!window.APP_ID && tentativas < 20){
    await new Promise(r=>setTimeout(r,100));
    tentativas++;
  }

  if(!window.APP_ID){
    alert("Sessão inválida");
    location.href="/auth/login.html";
    return;
  }

  app_id = window.APP_ID;
  listar();
}

/* ➕ Criar Categoria */
async function criar(){

  const nome = document.getElementById("nome").value.trim();
  const emoji = document.getElementById("emoji").value.trim();

  if(!nome){
    alert("Informe o nome da categoria");
    return;
  }

  const { error } = await sb
    .from("categorias")
    .insert({
      app_id,
      nome,
      emoji: emoji || "📦",
      ativo:true
    });

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("nome").value="";
  document.getElementById("emoji").value="";
  listar();
}

/* 📋 Listar */
async function listar(){

  const { data, error } = await sb
    .from("categorias")
    .select("*")
    .eq("app_id", app_id)
    .eq("ativo", true)
    .order("created_at");

  if(error){
    console.error(error);
    return;
  }

  const lista = document.getElementById("lista");
  lista.innerHTML="";

  if(!data || data.length===0){
    lista.innerHTML="<div class='vazio'>Nenhuma categoria cadastrada</div>";
    return;
  }

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <div>
        <b>${cat.emoji || "📦"} ${cat.nome}</b>
      </div>
      <button class="desativar" onclick="desativar('${cat.id}')">Desativar</button>
    `;
    lista.appendChild(div);
  });
}

/* ❌ Desativar */
async function desativar(id){

  if(!confirm("Desativar categoria?")) return;

  await sb
    .from("categorias")
    .update({ativo:false})
    .eq("id", id);

  listar();
}

iniciar();
</script>

</body>
</html>
