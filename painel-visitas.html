<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Visitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  text-align:center;
}

.card h2{
  font-size:22px;
}

canvas{
  background:#0f172a;
  border-radius:14px;
  padding:10px;
}
</style>
</head>

<body>

<h1>📊 Painel de Visitas</h1>

<div class="cards">
  <div class="card">
    <h2 id="totalHoje">0</h2>
    <p>Hoje</p>
  </div>

  <div class="card">
    <h2 id="instagram">0</h2>
    <p>Instagram</p>
  </div>

  <div class="card">
    <h2 id="direto">0</h2>
    <p>Direto</p>
  </div>
</div>

<canvas id="grafico"></canvas>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// 🔥 carregar dados
async function carregar(){
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  // TOTAL HOJE
  const { count: totalHoje } = await supabase
    .from("visitas_site")
    .select("*", { count: "exact", head: true })
    .gte("criado_em", hoje.toISOString());

  document.getElementById("totalHoje").innerText = totalHoje || 0;

  // INSTAGRAM
  const { count: insta } = await supabase
    .from("visitas_site")
    .select("*", { count: "exact", head: true })
    .eq("origem","instagram")
    .gte("criado_em", hoje.toISOString());

  document.getElementById("instagram").innerText = insta || 0;

  // DIRETO
  const { count: direto } = await supabase
    .from("visitas_site")
    .select("*", { count: "exact", head: true })
    .eq("origem","direto")
    .gte("criado_em", hoje.toISOString());

  document.getElementById("direto").innerText = direto || 0;

  // 📊 ÚLTIMOS 7 DIAS
  const seteDias = new Date();
  seteDias.setDate(seteDias.getDate() - 7);

  const { data } = await supabase
    .from("visitas_site")
    .select("criado_em")
    .gte("criado_em", seteDias.toISOString());

  const dias = {};
  
  data.forEach(v => {
    const d = new Date(v.criado_em).toLocaleDateString();
    dias[d] = (dias[d] || 0) + 1;
  });

  const labels = Object.keys(dias);
  const valores = Object.values(dias);

  new Chart(document.getElementById("grafico"), {
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Visitas",
        data:valores
      }]
    }
  });
}

carregar();

</script>

</body>
</html>
