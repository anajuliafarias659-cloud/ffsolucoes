<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Usuários</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#07142b;
      color:#fff;
      padding:20px;
    }

    .container{
      max-width:1300px;
      margin:0 auto;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:28px;
    }

    .topo{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
      margin-bottom:20px;
    }

    .card{
      background:#182742;
      border-radius:18px;
      padding:20px;
      box-shadow:0 4px 16px rgba(0,0,0,.20);
    }

    .card h3{
      font-size:14px;
      color:#d8e1ee;
      margin-bottom:10px;
    }

    .card .valor{
      font-size:28px;
      font-weight:bold;
    }

    .filtros{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .filtros input,
    .filtros select,
    .filtros button{
      padding:12px;
      border:none;
      border-radius:12px;
      font-size:14px;
    }

    .filtros input,
    .filtros select{
      background:#182742;
      color:#fff;
      min-width:190px;
    }

    .filtros button{
      background:#22c55e;
      color:#fff;
      cursor:pointer;
      font-weight:bold;
    }

    .filtros button:hover{
      opacity:.92;
    }

    .erro{
      display:none;
      background:#991b1b;
      color:#fee2e2;
      padding:14px;
      border-radius:14px;
      margin-bottom:16px;
    }

    .tabela-wrap{
      background:#111827;
      border-radius:16px;
      overflow:auto;
      box-shadow:0 4px 16px rgba(0,0,0,.22);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
    }

    th, td{
      padding:14px 12px;
      border-bottom:1px solid rgba(255,255,255,.07);
      text-align:left;
      font-size:14px;
      white-space:nowrap;
    }

    th{
      background:#1f2937;
      position:sticky;
      top:0;
      z-index:2;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      white-space:nowrap;
    }

    .badge-demo{
      background:#f59e0b;
      color:#111827;
    }

    .badge-pago{
      background:#22c55e;
      color:#052e16;
    }

    .badge-ativo{
      background:#2563eb;
      color:#fff;
    }

    .badge-vencido{
      background:#ef4444;
      color:#fff;
    }

    .badge-confirmado{
      background:#10b981;
      color:#052e16;
    }

    .badge-nao-confirmado{
      background:#ef4444;
      color:#fff;
    }

    .badge-neutro{
      background:#64748b;
      color:#fff;
    }

    .muted{
      color:#94a3b8;
    }

    @media(max-width:700px){
      h1{
        font-size:22px;
      }

      .filtros{
        flex-direction:column;
      }

      .filtros input,
      .filtros select,
      .filtros button{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Painel de Usuários</h1>

    <div class="topo">
      <div class="card">
        <h3>Total usuários</h3>
        <div class="valor" id="totalUsuarios">0</div>
      </div>

      <div class="card">
        <h3>Demos</h3>
        <div class="valor" id="totalDemos">0</div>
      </div>

      <div class="card">
        <h3>Pagos</h3>
        <div class="valor" id="totalPagos">0</div>
      </div>

      <div class="card">
        <h3>Ativos</h3>
        <div class="valor" id="totalAtivos">0</div>
      </div>

      <div class="card">
        <h3>Vencidos</h3>
        <div class="valor" id="totalVencidos">0</div>
      </div>
    </div>

    <div class="filtros">
      <input type="text" id="busca" placeholder="Buscar nome ou email">

      <select id="filtroPlano">
        <option value="">Todos os planos</option>
        <option value="demo">Demo</option>
        <option value="pago">Pago</option>
      </select>

      <select id="filtroStatus">
        <option value="">Todos os status</option>
        <option value="ATIVO">Ativo</option>
        <option value="VENCIDO">Vencido</option>
      </select>

      <select id="filtroConfirmacao">
        <option value="">Email: todos</option>
        <option value="CONFIRMADO">Confirmado</option>
        <option value="NAO CONFIRMOU">Não confirmou</option>
      </select>

      <button onclick="carregarUsuarios()">Atualizar</button>
    </div>

    <div class="erro" id="boxErro"></div>

    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Plano</th>
            <th>Trial usado</th>
            <th>Ativo sistema</th>
            <th>Expiração</th>
            <th>Status plano</th>
            <th>Status email</th>
            <th>Confirmado em</th>
            <th>Último login</th>
            <th>App ID</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
          <tr>
            <td colspan="11" class="muted">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    let usuariosCache = [];

    const corpoTabela = document.getElementById("corpoTabela");
    const boxErro = document.getElementById("boxErro");
    const busca = document.getElementById("busca");
    const filtroPlano = document.getElementById("filtroPlano");
    const filtroStatus = document.getElementById("filtroStatus");
    const filtroConfirmacao = document.getElementById("filtroConfirmacao");

    function mostrarErro(msg){
      boxErro.style.display = "block";
      boxErro.textContent = msg;
    }

    function esconderErro(){
      boxErro.style.display = "none";
      boxErro.textContent = "";
    }

    function formatarData(data){
      if(!data) return "-";
      const d = new Date(data);
      if(isNaN(d.getTime())) return "-";
      return d.toLocaleString("pt-BR");
    }

    function classePlano(plano){
      const p = String(plano || "").toLowerCase();
      return p === "demo" ? "badge-demo" : "badge-pago";
    }

    function classeStatusPlano(status){
      if(status === "ATIVO") return "badge-ativo";
      if(status === "VENCIDO") return "badge-vencido";
      return "badge-neutro";
    }

    function classeStatusEmail(status){
      if(status === "CONFIRMADO") return "badge-confirmado";
      if(status === "NAO CONFIRMOU") return "badge-nao-confirmado";
      return "badge-neutro";
    }

    function atualizarCards(lista){
      const total = lista.length;

      const demos = lista.filter(u =>
        String(u.plano || "").toLowerCase() === "demo"
      ).length;

      const pagos = lista.filter(u => {
        const p = String(u.plano || "").toLowerCase();
        return p && p !== "demo";
      }).length;

      const ativos = lista.filter(u => u.status_plano === "ATIVO").length;
      const vencidos = lista.filter(u => u.status_plano === "VENCIDO").length;

      document.getElementById("totalUsuarios").textContent = total;
      document.getElementById("totalDemos").textContent = demos;
      document.getElementById("totalPagos").textContent = pagos;
      document.getElementById("totalAtivos").textContent = ativos;
      document.getElementById("totalVencidos").textContent = vencidos;
    }

    function renderTabela(lista){
      if(!lista.length){
        corpoTabela.innerHTML = `
          <tr>
            <td colspan="11" class="muted">Nenhum usuário encontrado.</td>
          </tr>
        `;
        return;
      }

      corpoTabela.innerHTML = "";

      lista.forEach(usuario => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${usuario.nome || "-"}</td>
          <td>${usuario.email || "-"}</td>
          <td><span class="badge ${classePlano(usuario.plano)}">${usuario.plano || "-"}</span></td>
          <td>${usuario.trial_usado === true ? "Sim" : "Não"}</td>
          <td><span class="badge ${usuario.ativo === true ? "badge-ativo" : "badge-neutro"}">${usuario.ativo === true ? "Sim" : "Não"}</span></td>
          <td>${formatarData(usuario.data_expiracao)}</td>
          <td><span class="badge ${classeStatusPlano(usuario.status_plano)}">${usuario.status_plano || "-"}</span></td>
          <td><span class="badge ${classeStatusEmail(usuario.status_email)}">${usuario.status_email || "-"}</span></td>
          <td>${formatarData(usuario.email_confirmed_at)}</td>
          <td>${formatarData(usuario.last_sign_in_at)}</td>
          <td>${usuario.app_id || "-"}</td>
        `;
        corpoTabela.appendChild(tr);
      });
    }

    function aplicarFiltros(){
      const termo = busca.value.trim().toLowerCase();
      const plano = filtroPlano.value;
      const status = filtroStatus.value;
      const confirmacao = filtroConfirmacao.value;

      let lista = [...usuariosCache];

      if(termo){
        lista = lista.filter(u => {
          const nome = String(u.nome || "").toLowerCase();
          const email = String(u.email || "").toLowerCase();
          return nome.includes(termo) || email.includes(termo);
        });
      }

      if(plano){
        if(plano === "demo"){
          lista = lista.filter(u => String(u.plano || "").toLowerCase() === "demo");
        } else if(plano === "pago"){
          lista = lista.filter(u => {
            const p = String(u.plano || "").toLowerCase();
            return p && p !== "demo";
          });
        }
      }

      if(status){
        lista = lista.filter(u => u.status_plano === status);
      }

      if(confirmacao){
        lista = lista.filter(u => u.status_email === confirmacao);
      }

      atualizarCards(lista);
      renderTabela(lista);
    }

    async function carregarUsuarios(){
      esconderErro();

      corpoTabela.innerHTML = `
        <tr>
          <td colspan="11" class="muted">Carregando...</td>
        </tr>
      `;

      const { data, error } = await supabase
        .from("vw_painel_usuarios")
        .select(`
          id,
          nome,
          email,
          plano,
          trial_usado,
          ativo,
          app_id,
          data_expiracao,
          status_plano,
          status_email,
          email_confirmed_at,
          last_sign_in_at
        `)
        .order("nome", { ascending: true });

      if(error){
        console.error(error);
        mostrarErro("Erro ao carregar usuários: " + error.message);
        corpoTabela.innerHTML = `
          <tr>
            <td colspan="11" class="muted">Erro ao carregar dados.</td>
          </tr>
        `;
        return;
      }

      usuariosCache = data || [];
      aplicarFiltros();
    }

    window.carregarUsuarios = carregarUsuarios;

    busca.addEventListener("input", aplicarFiltros);
    filtroPlano.addEventListener("change", aplicarFiltros);
    filtroStatus.addEventListener("change", aplicarFiltros);
    filtroConfirmacao.addEventListener("change", aplicarFiltros);

    carregarUsuarios();
  </script>
</body>
</html>
