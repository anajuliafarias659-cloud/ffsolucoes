<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Demo e Renovações</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:#fff;
      padding:20px;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:28px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:15px;
      margin-bottom:20px;
    }

    .card{
      background:#1e293b;
      border-radius:16px;
      padding:18px;
      box-shadow:0 4px 14px rgba(0,0,0,.25);
    }

    .card h3{
      font-size:14px;
      color:#cbd5e1;
      margin-bottom:10px;
    }

    .card .numero{
      font-size:28px;
      font-weight:bold;
    }

    .topo-filtros{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:20px;
      align-items:center;
      justify-content:space-between;
    }

    .filtros-esquerda{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      flex:1;
    }

    input, select, button{
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
    }

    input, select{
      background:#1e293b;
      color:#fff;
      min-width:180px;
    }

    button{
      background:#22c55e;
      color:#fff;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:.92;
    }

    .tabela-wrap{
      overflow:auto;
      background:#111827;
      border-radius:16px;
      box-shadow:0 4px 14px rgba(0,0,0,.25);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }

    th, td{
      padding:14px 12px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,.08);
      font-size:14px;
    }

    th{
      background:#1f2937;
      position:sticky;
      top:0;
      z-index:1;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
    }

    .demo{
      background:#f59e0b;
      color:#111827;
    }

    .pago{
      background:#22c55e;
      color:#052e16;
    }

    .vencido{
      background:#ef4444;
      color:#fff;
    }

    .ativo{
      background:#3b82f6;
      color:#fff;
    }

    .inativo{
      background:#64748b;
      color:#fff;
    }

    .sem-plano{
      background:#a855f7;
      color:#fff;
    }

    .acoes{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn-mini{
      padding:8px 10px;
      font-size:12px;
      border-radius:8px;
      cursor:pointer;
      border:none;
      color:#fff;
    }

    .btn-renovar{
      background:#2563eb;
    }

    .btn-ativar{
      background:#16a34a;
    }

    .btn-demo{
      background:#d97706;
    }

    .muted{
      color:#94a3b8;
    }

    .erro, .sucesso{
      margin:15px 0;
      padding:12px;
      border-radius:12px;
      display:none;
    }

    .erro{
      background:#7f1d1d;
      color:#fecaca;
    }

    .sucesso{
      background:#052e16;
      color:#bbf7d0;
    }

    @media(max-width:700px){
      h1{
        font-size:22px;
      }

      .topo-filtros{
        flex-direction:column;
        align-items:stretch;
      }

      .filtros-esquerda{
        flex-direction:column;
      }

      input, select, button{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Painel Demo e Renovações</h1>

    <div class="cards">
      <div class="card">
        <h3>Total de usuários</h3>
        <div class="numero" id="totalUsuarios">0</div>
      </div>

      <div class="card">
        <h3>Demos</h3>
        <div class="numero" id="totalDemos">0</div>
      </div>

      <div class="card">
        <h3>Pagos</h3>
        <div class="numero" id="totalPagos">0</div>
      </div>

      <div class="card">
        <h3>Vencidos</h3>
        <div class="numero" id="totalVencidos">0</div>
      </div>

      <div class="card">
        <h3>Ativos</h3>
        <div class="numero" id="totalAtivos">0</div>
      </div>
    </div>

    <div class="topo-filtros">
      <div class="filtros-esquerda">
        <input type="text" id="busca" placeholder="Buscar por nome ou email">
        
        <select id="filtroPlano">
          <option value="">Todos os planos</option>
          <option value="demo">Demo</option>
          <option value="pago">Pago</option>
          <option value="outros">Outros</option>
        </select>

        <select id="filtroStatus">
          <option value="">Todos os status</option>
          <option value="ativo">Ativo</option>
          <option value="vencido">Vencido</option>
        </select>

        <select id="filtroAtivo">
          <option value="">Todos</option>
          <option value="true">Ativo no sistema</option>
          <option value="false">Inativo no sistema</option>
        </select>
      </div>

      <button onclick="carregarUsuarios()">Atualizar</button>
    </div>

    <div class="erro" id="boxErro"></div>
    <div class="sucesso" id="boxSucesso"></div>

    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Plano</th>
            <th>Status prazo</th>
            <th>Ativo</th>
            <th>Expiração</th>
            <th>Dias restantes</th>
            <th>Trial usado</th>
            <th>App ID</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
          <tr>
            <td colspan="10" class="muted">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://pdajixsoowcyhnjwhgpc.supabase.co",
      "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
    );

    let usuariosCache = [];

    const corpoTabela = document.getElementById("corpoTabela");
    const busca = document.getElementById("busca");
    const filtroPlano = document.getElementById("filtroPlano");
    const filtroStatus = document.getElementById("filtroStatus");
    const filtroAtivo = document.getElementById("filtroAtivo");
    const boxErro = document.getElementById("boxErro");
    const boxSucesso = document.getElementById("boxSucesso");

    function mostrarErro(msg){
      boxErro.style.display = "block";
      boxErro.textContent = msg;
      boxSucesso.style.display = "none";
    }

    function mostrarSucesso(msg){
      boxSucesso.style.display = "block";
      boxSucesso.textContent = msg;
      boxErro.style.display = "none";
      setTimeout(() => {
        boxSucesso.style.display = "none";
      }, 2500);
    }

    function esconderAvisos(){
      boxErro.style.display = "none";
      boxSucesso.style.display = "none";
    }

    function formatarData(data){
      if(!data) return "-";
      const d = new Date(data);
      if(isNaN(d)) return data;
      return d.toLocaleString("pt-BR");
    }

    function calcularDiasRestantes(dataExpiracao){
      if(!dataExpiracao) return null;
      const agora = new Date();
      const exp = new Date(dataExpiracao);
      const diff = exp.getTime() - agora.getTime();
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function obterStatusPrazo(dataExpiracao){
      if(!dataExpiracao) return { texto: "Sem data", classe: "sem-plano" };

      const dias = calcularDiasRestantes(dataExpiracao);

      if(dias >= 0){
        return { texto: "Ativo", classe: "ativo" };
      }

      return { texto: "Vencido", classe: "vencido" };
    }

    function obterClassePlano(plano){
      const p = String(plano || "").toLowerCase();

      if(p === "demo") return "demo";
      if(p === "pago" || p === "premium" || p === "pro" || p === "mensal" || p === "anual") return "pago";
      return "sem-plano";
    }

    function atualizarCards(lista){
      const total = lista.length;
      const demos = lista.filter(u => String(u.plano || "").toLowerCase() === "demo").length;
      const pagos = lista.filter(u => {
        const p = String(u.plano || "").toLowerCase();
        return p && p !== "demo";
      }).length;
      const vencidos = lista.filter(u => {
        if(!u.data_expiracao) return false;
        return new Date(u.data_expiracao) < new Date();
      }).length;
      const ativos = lista.filter(u => {
        if(!u.data_expiracao) return false;
        return new Date(u.data_expiracao) >= new Date();
      }).length;

      document.getElementById("totalUsuarios").textContent = total;
      document.getElementById("totalDemos").textContent = demos;
      document.getElementById("totalPagos").textContent = pagos;
      document.getElementById("totalVencidos").textContent = vencidos;
      document.getElementById("totalAtivos").textContent = ativos;
    }

    function renderTabela(lista){
      if(!lista.length){
        corpoTabela.innerHTML = `
          <tr>
            <td colspan="10" class="muted">Nenhum usuário encontrado.</td>
          </tr>
        `;
        return;
      }

      corpoTabela.innerHTML = "";

      lista.forEach(usuario => {
        const statusPrazo = obterStatusPrazo(usuario.data_expiracao);
        const dias = calcularDiasRestantes(usuario.data_expiracao);
        const plano = usuario.plano || "-";
        const ativoSistema = usuario.ativo === true;
        const trialUsado = usuario.trial_usado === true;

        let diasTexto = "-";
        if(dias !== null){
          diasTexto = dias >= 0 ? `${dias} dia(s)` : `${Math.abs(dias)} dia(s) atrás`;
        }

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${usuario.nome || "-"}</td>
          <td>${usuario.email || "-"}</td>
          <td><span class="badge ${obterClassePlano(plano)}">${plano}</span></td>
          <td><span class="badge ${statusPrazo.classe}">${statusPrazo.texto}</span></td>
          <td><span class="badge ${ativoSistema ? "ativo" : "inativo"}">${ativoSistema ? "Sim" : "Não"}</span></td>
          <td>${formatarData(usuario.data_expiracao)}</td>
          <td>${diasTexto}</td>
          <td>${trialUsado ? "Sim" : "Não"}</td>
          <td>${usuario.app_id || "-"}</td>
          <td>
            <div class="acoes">
              <button class="btn-mini btn-renovar" onclick="renovar30Dias('${usuario.id}')">+30 dias</button>
              <button class="btn-mini btn-ativar" onclick="marcarPago('${usuario.id}')">Marcar pago</button>
              <button class="btn-mini btn-demo" onclick="colocarDemo15Dias('${usuario.id}')">Demo 15 dias</button>
            </div>
          </td>
        `;
        corpoTabela.appendChild(tr);
      });
    }

    function aplicarFiltros(){
      const texto = busca.value.trim().toLowerCase();
      const planoSelecionado = filtroPlano.value;
      const statusSelecionado = filtroStatus.value;
      const ativoSelecionado = filtroAtivo.value;

      let lista = [...usuariosCache];

      if(texto){
        lista = lista.filter(u => {
          const nome = String(u.nome || "").toLowerCase();
          const email = String(u.email || "").toLowerCase();
          return nome.includes(texto) || email.includes(texto);
        });
      }

      if(planoSelecionado){
        if(planoSelecionado === "demo"){
          lista = lista.filter(u => String(u.plano || "").toLowerCase() === "demo");
        }else if(planoSelecionado === "pago"){
          lista = lista.filter(u => {
            const p = String(u.plano || "").toLowerCase();
            return p && p !== "demo";
          });
        }else if(planoSelecionado === "outros"){
          lista = lista.filter(u => !u.plano);
        }
      }

      if(statusSelecionado){
        lista = lista.filter(u => {
          if(!u.data_expiracao) return false;
          const ativo = new Date(u.data_expiracao) >= new Date();
          return statusSelecionado === "ativo" ? ativo : !ativo;
        });
      }

      if(ativoSelecionado){
        const valor = ativoSelecionado === "true";
        lista = lista.filter(u => u.ativo === valor);
      }

      atualizarCards(lista);
      renderTabela(lista);
    }

    async function carregarUsuarios(){
      esconderAvisos();
      corpoTabela.innerHTML = `
        <tr>
          <td colspan="10" class="muted">Carregando...</td>
        </tr>
      `;

      const { data, error } = await supabase
        .from("usuarios")
        .select("id, nome, email, plano, data_expiracao, trial_usado, ativo, app_id")
        .order("nome", { ascending: true });

      if(error){
        console.error(error);
        mostrarErro("Erro ao carregar usuários: " + error.message);
        corpoTabela.innerHTML = `
          <tr>
            <td colspan="10" class="muted">Erro ao carregar dados.</td>
          </tr>
        `;
        return;
      }

      usuariosCache = data || [];
      aplicarFiltros();
    }

    async function renovar30Dias(id){
      esconderAvisos();

      const { error } = await supabase
        .from("usuarios")
        .update({
          plano: "pago",
          ativo: true,
          data_expiracao: new Date(Date.now() + 30*24*60*60*1000).toISOString()
        })
        .eq("id", id);

      if(error){
        console.error(error);
        mostrarErro("Erro ao renovar: " + error.message);
        return;
      }

      mostrarSucesso("Usuário renovado com +30 dias.");
      carregarUsuarios();
    }

    async function marcarPago(id){
      esconderAvisos();

      const { error } = await supabase
        .from("usuarios")
        .update({
          plano: "pago",
          ativo: true
        })
        .eq("id", id);

      if(error){
        console.error(error);
        mostrarErro("Erro ao marcar pago: " + error.message);
        return;
      }

      mostrarSucesso("Usuário marcado como pago.");
      carregarUsuarios();
    }

    async function colocarDemo15Dias(id){
      esconderAvisos();

      const { error } = await supabase
        .from("usuarios")
        .update({
          plano: "demo",
          trial_usado: true,
          ativo: true,
          data_expiracao: new Date(Date.now() + 15*24*60*60*1000).toISOString()
        })
        .eq("id", id);

      if(error){
        console.error(error);
        mostrarErro("Erro ao colocar demo: " + error.message);
        return;
      }

      mostrarSucesso("Usuário colocado em demo por 15 dias.");
      carregarUsuarios();
    }

    window.carregarUsuarios = carregarUsuarios;
    window.renovar30Dias = renovar30Dias;
    window.marcarPago = marcarPago;
    window.colocarDemo15Dias = colocarDemo15Dias;

    busca.addEventListener("input", aplicarFiltros);
    filtroPlano.addEventListener("change", aplicarFiltros);
    filtroStatus.addEventListener("change", aplicarFiltros);
    filtroAtivo.addEventListener("change", aplicarFiltros);

    carregarUsuarios();
  </script>
</body>
</html>
