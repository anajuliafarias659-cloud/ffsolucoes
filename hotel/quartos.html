<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🛏️ Quartos - Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  body{margin:0;font-family:Arial;background:#020617;color:#fff}
  .topo{background:#0f172a;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
  .voltar{background:#1e293b;color:#fff;border:none;padding:10px 16px;border-radius:10px;cursor:pointer}
  .container{max-width:1000px;margin:30px auto;padding:20px}
  .card{background:#0f172a;padding:20px;border-radius:16px;margin-bottom:25px}
  input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;background:#1e293b;color:#fff}
  button{padding:10px 14px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
  .btn-green{background:#16a34a;color:#fff}
  .btn-red{background:#dc2626;color:#fff}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{padding:10px;border-bottom:1px solid #1e293b;text-align:left;vertical-align:top}
  .fotos{display:flex;gap:6px;flex-wrap:wrap}
  .fotos img{height:60px;width:80px;object-fit:cover;border-radius:6px}
  .acoes{display:flex;gap:8px;flex-wrap:wrap}
  .mini{padding:8px 10px;border-radius:8px}
</style>
</head>

<body>

<div class="topo">
  <h2>🛏️ Quartos</h2>
  <button class="voltar" onclick="history.back()">⬅ Voltar</button>
</div>

<div class="container">

  <div class="card">
    <h3>Cadastrar Novo Quarto</h3>
    <input id="numero" placeholder="Número do quarto">
    <input id="tipo" placeholder="Tipo (Standard, Suíte, Luxo)">
    <input id="preco" type="number" placeholder="Preço da diária (R$)">
    <label style="margin-top:12px;display:block;">📷 Fotos do quarto</label>
    <input id="fotosQuarto" type="file" multiple accept="image/*">
    <button id="btnSalvar" class="btn-green">Salvar Quarto</button>
  </div>

  <div class="card">
    <h3>Lista de Quartos</h3>
    <table>
      <thead>
        <tr>
          <th>Número</th>
          <th>Tipo</th>
          <th>Preço</th>
          <th>Fotos</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela">
        <tr><td colspan="5">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let negocio_id = null;

const elNumero = document.getElementById("numero");
const elTipo = document.getElementById("tipo");
const elPreco = document.getElementById("preco");
const elFotos = document.getElementById("fotosQuarto");
const elTabela = document.getElementById("tabela");
const btnSalvar = document.getElementById("btnSalvar");

/* ===== SESSÃO ===== */
async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

/* ===== INICIAR ===== */
async function iniciar(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(!usuario?.app_id){
    alert("Erro ao identificar negócio");
    return;
  }

  negocio_id = usuario.app_id;

  carregarQuartos();
}

/* ===== HELPERS ===== */
function safeName(name){
  return name
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "_")
    .replace(/[^a-zA-Z0-9._-]/g, "");
}

function formatarPreco(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

/* ===== UPLOAD ===== */
async function uploadFotos(quartoId){
  const files = elFotos.files;
  if(!files.length) return [];

  const urls = [];

  for(let i=0;i<files.length;i++){
    const file = files[i];
    const fileName = `${Date.now()}_${i}_${safeName(file.name)}`;
    const path = `${negocio_id}/${quartoId}/${fileName}`;

    const { error } = await supabase.storage
      .from("hotel-quartos")
      .upload(path,file,{upsert:true});

    if(error) continue;

    const { data } = supabase.storage.from("hotel-quartos").getPublicUrl(path);
    urls.push(data.publicUrl);
  }

  return urls;
}

/* ===== SALVAR ===== */
async function salvarQuarto(){
  const numero = elNumero.value.trim();
  const tipo = elTipo.value.trim();
  const preco = parseFloat(elPreco.value);

  if(!numero || !tipo || !preco){
    alert("Preencha corretamente");
    return;
  }

  btnSalvar.disabled = true;
  btnSalvar.innerText = "Salvando...";

  const { data: quarto, error } = await supabase
    .from("hotel_quartos")
    .insert([{
      negocio_id,
      numero,
      tipo,
      preco_diaria: preco,
      status: "livre",
      fotos:[]
    }])
    .select()
    .single();

  if(error){
    alert(error.message);
    return;
  }

  const fotos = await uploadFotos(quarto.id);

  if(fotos.length){
    await supabase
      .from("hotel_quartos")
      .update({ fotos })
      .eq("id", quarto.id);
  }

  elNumero.value = "";
  elTipo.value = "";
  elPreco.value = "";
  elFotos.value = "";

  btnSalvar.disabled = false;
  btnSalvar.innerText = "Salvar";

  carregarQuartos();
}

/* ===== EXCLUIR ===== */
window.excluirQuarto = async function(id){
  if(!confirm("Excluir quarto?")) return;

  await supabase
    .from("hotel_quartos")
    .delete()
    .eq("id", id);

  carregarQuartos();
};

window.excluirFotos = async function(id){
  if(!confirm("Excluir fotos?")) return;

  await supabase
    .from("hotel_quartos")
    .update({ fotos: [] })
    .eq("id", id);

  carregarQuartos();
};

/* ===== LISTAR ===== */
async function carregarQuartos(){
  elTabela.innerHTML = `<tr><td colspan="5">Carregando...</td></tr>`;

  const { data } = await supabase
    .from("hotel_quartos")
    .select("*")
    .eq("negocio_id", negocio_id)
    .order("numero");

  if(!data || !data.length){
    elTabela.innerHTML = `<tr><td colspan="5">Nenhum quarto</td></tr>`;
    return;
  }

  elTabela.innerHTML = "";

  data.forEach(q=>{
    const fotos = (q.fotos||[]).map(f=>`<img src="${f}">`).join("");

    elTabela.innerHTML += `
      <tr>
        <td>${q.numero}</td>
        <td>${q.tipo}</td>
        <td>${formatarPreco(q.preco_diaria)}</td>
        <td>${fotos}</td>
        <td>
          <button onclick="excluirFotos('${q.id}')">Fotos</button>
          <button onclick="excluirQuarto('${q.id}')">Excluir</button>
        </td>
      </tr>
    `;
  });
}

/* EVENTO */
btnSalvar.onclick = salvarQuarto;

iniciar();
</script>
</body>
</html>
