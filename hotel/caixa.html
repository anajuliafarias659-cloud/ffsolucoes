<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>💰 Caixa - Hotel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#020617;
      color:#fff;
    }

    .topo{
      background:#0f172a;
      padding:16px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .voltar{
      background:#1e293b;
      color:#fff;
      border:none;
      padding:10px 16px;
      border-radius:10px;
      cursor:pointer;
    }

    .container{
      max-width:1000px;
      margin:30px auto;
      padding:20px;
    }

    .card{
      background:#0f172a;
      padding:20px;
      border-radius:16px;
      margin-bottom:25px;
      border:1px solid rgba(255,255,255,.05);
    }

    input, select{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:none;
      background:#1e293b;
      color:#fff;
      outline:none;
    }

    button{
      padding:12px 16px;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      margin-top:12px;
      background:#16a34a;
      color:#fff;
    }

    button:hover{
      filter:brightness(1.05);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:10px;
      border-bottom:1px solid #1e293b;
      text-align:left;
      vertical-align:top;
    }

    .btn-red{
      background:#dc2626;
      color:#fff;
      margin-top:0;
    }

    .tipo-entrada{
      color:#22c55e;
      font-weight:bold;
      text-transform:capitalize;
    }

    .tipo-saida{
      color:#f87171;
      font-weight:bold;
      text-transform:capitalize;
    }

    @media(max-width:700px){
      .container{
        padding:14px;
      }

      .card{
        overflow:auto;
      }

      table{
        min-width:680px;
      }
    }
  </style>
</head>

<body>

  <div class="topo">
    <h2>💰 Caixa</h2>
    <button class="voltar" onclick="history.back()">⬅ Voltar</button>
  </div>

  <div class="container">

    <div class="card">
      <h3 id="totalDia">Total do dia: R$ 0,00</h3>

      <select id="tipo">
        <option value="">Selecione o tipo</option>
        <option value="entrada">Entrada</option>
        <option value="saida">Saída</option>
      </select>

      <input id="descricao" placeholder="Descrição (ex: diária, compra de material)">
      <input id="valor" type="number" step="0.01" min="0" placeholder="Valor (R$)">

      <button onclick="registrar()">Registrar</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Valor</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela">
          <tr><td colspan="5">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script type="module">
    import { supabase } from "../js/supabase.js";

    let negocio_id = null;
    const hoje = new Date().toISOString().slice(0, 10);

    const tabela = document.getElementById("tabela");
    const totalDia = document.getElementById("totalDia");

    function moedaBR(valor){
      return Number(valor || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatarData(data){
      if(!data) return "";
      const [ano, mes, dia] = String(data).split("-");
      if(!ano || !mes || !dia) return data;
      return `${dia}/${mes}/${ano}`;
    }

    async function verificarSessao(){
      const { data:{ session } } = await supabase.auth.getSession();

      if(!session){
        window.location.href = "/auth/login.html";
        return null;
      }

      return session.user.id;
    }

    async function carregarUsuario(){
      const userId = await verificarSessao();
      if(!userId) return false;

      const { data: usuario, error } = await supabase
        .from("usuarios")
        .select("nome, app_id")
        .eq("id", userId)
        .single();

      if(error || !usuario?.app_id){
        alert("Não foi possível identificar o negócio.");
        return false;
      }

      negocio_id = usuario.app_id;
      localStorage.setItem("app_id", usuario.app_id);

      return true;
    }

    async function carregarCaixa(){
      if(!negocio_id){
        tabela.innerHTML = "<tr><td colspan='5'>Negócio não identificado</td></tr>";
        return;
      }

      tabela.innerHTML = "<tr><td colspan='5'>Carregando...</td></tr>";

      const { data, error } = await supabase
        .from("hotel_caixa")
        .select("*")
        .eq("negocio_id", negocio_id)
        .eq("data", hoje)
        .order("created_at", { ascending: false });

      if(error){
        console.error(error);
        tabela.innerHTML = "<tr><td colspan='5'>Erro ao carregar</td></tr>";
        return;
      }

      let total = 0;
      tabela.innerHTML = "";

      if(!data || !data.length){
        tabela.innerHTML = "<tr><td colspan='5'>Sem registros</td></tr>";
        totalDia.innerText = "Total do dia: R$ 0,00";
        return;
      }

      data.forEach((r) => {
        const valor = Number(r.valor || 0);
        total += r.tipo === "entrada" ? valor : -valor;

        tabela.innerHTML += `
          <tr>
            <td>${formatarData(r.data)}</td>
            <td class="${r.tipo === "entrada" ? "tipo-entrada" : "tipo-saida"}">${r.tipo}</td>
            <td>${r.descricao || ""}</td>
            <td>${moedaBR(valor)}</td>
            <td>
              <button class="btn-red" onclick="excluir('${r.id}')">Excluir</button>
            </td>
          </tr>
        `;
      });

      totalDia.innerText = `Total do dia: ${moedaBR(total)}`;
    }

    window.registrar = async function(){
      if(!negocio_id){
        alert("Negócio não identificado.");
        return;
      }

      const tipo = document.getElementById("tipo").value;
      const descricao = document.getElementById("descricao").value.trim();
      const valor = parseFloat(document.getElementById("valor").value);

      if(!tipo || !descricao || !Number.isFinite(valor) || valor <= 0){
        alert("Preencha todos os campos corretamente.");
        return;
      }

      const { error } = await supabase
        .from("hotel_caixa")
        .insert([
          {
            negocio_id,
            tipo,
            descricao,
            valor,
            data: hoje
          }
        ]);

      if(error){
        alert("Erro ao registrar: " + error.message);
        return;
      }

      document.getElementById("descricao").value = "";
      document.getElementById("valor").value = "";
      document.getElementById("tipo").value = "";

      carregarCaixa();
    };

    window.excluir = async function(id){
      if(!confirm("Excluir registro?")) return;

      const { error } = await supabase
        .from("hotel_caixa")
        .delete()
        .eq("id", id)
        .eq("negocio_id", negocio_id);

      if(error){
        alert("Erro ao excluir");
        return;
      }

      carregarCaixa();
    };

    async function iniciar(){
      const ok = await carregarUsuario();
      if(!ok) return;
      carregarCaixa();
    }

    iniciar();
  </script>

</body>
</html>
