<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>👤 Hóspedes - Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:#fff;
}

button{
  margin-top:12px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:#fff;
  cursor:pointer;
}

.btn-red{
  background:#dc2626;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>👤 Cadastro de Hóspede</h2>

    <form id="formHospede">
      <input id="nome" placeholder="Nome">
      <input id="documento" placeholder="Documento">
      <input id="telefone" placeholder="Telefone">
      <input id="email" placeholder="Email">
      <button>Salvar Hóspede</button>
    </form>
  </div>

  <div class="card">
    <input id="busca" placeholder="Buscar hóspede..." oninput="carregarHospedes()">

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Documento</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaHospedes">
        <tr><td colspan="5">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let negocio_id = null;

/* ===== SESSÃO ===== */
async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

/* ===== CARREGAR USUARIO ===== */
async function iniciar(){
  const userId = await verificarSessao();
  if(!userId) return;

  const { data: usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(!usuario?.app_id){
    alert("Erro ao identificar negócio");
    return;
  }

  negocio_id = usuario.app_id;

  document.getElementById("formHospede")
    .addEventListener("submit", salvarHospede);

  carregarHospedes();
}

/* ===== CADASTRAR ===== */
async function salvarHospede(e){
  e.preventDefault();

  const nome = document.getElementById("nome").value.trim();
  const documento = document.getElementById("documento").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!nome){
    alert("Informe o nome");
    return;
  }

  const { error } = await supabase
    .from("hotel_hospedes")
    .insert([{ negocio_id, nome, documento, telefone, email }]);

  if(error){
    alert(error.message);
    return;
  }

  e.target.reset();
  carregarHospedes();
}

/* ===== LISTAR ===== */
window.carregarHospedes = async function(){
  const tabela = document.getElementById("tabelaHospedes");
  const termo = document.getElementById("busca").value.trim();

  tabela.innerHTML = "<tr><td colspan='5'>Carregando...</td></tr>";

  let query = supabase
    .from("hotel_hospedes")
    .select("*")
    .eq("negocio_id", negocio_id);

  if(termo){
    query = query.ilike("nome", `%${termo}%`);
  }

  const { data } = await query.order("nome");

  if(!data || !data.length){
    tabela.innerHTML = "<tr><td colspan='5'>Nenhum hóspede</td></tr>";
    return;
  }

  tabela.innerHTML = "";

  data.forEach(h => {
    tabela.innerHTML += `
      <tr>
        <td>${h.nome}</td>
        <td>${h.documento || "-"}</td>
        <td>${h.telefone || "-"}</td>
        <td>${h.email || "-"}</td>
        <td>
          <button class="btn-red" onclick="excluir('${h.id}')">Excluir</button>
        </td>
      </tr>
    `;
  });
};

/* ===== EXCLUIR ===== */
window.excluir = async function(id){
  if(!confirm("Excluir hóspede?")) return;

  await supabase
    .from("hotel_hospedes")
    .delete()
    .eq("id", id)
    .eq("negocio_id", negocio_id);

  carregarHospedes();
};

iniciar();
</script>

</body>
</html>
