<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>📅 Reservas - Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:#fff;
}

.topo{
  background:#0f172a;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.voltar{
  background:#1e293b;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.container{
  padding:32px;
  max-width:1150px;
  margin:auto;
}

.bloco{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  margin-bottom:22px;
  border:1px solid rgba(255,255,255,.05);
}

.grid-2{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.grid-3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.grid-4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

@media(max-width:900px){
  .grid-4,.grid-3,.grid-2{
    grid-template-columns:1fr;
  }
}

input,select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:#fff;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#16a34a;
  color:#fff;
  font-weight:bold;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.btn-azul{ background:#2563eb; }
.btn-cinza{ background:#475569; }
.btn-vermelho{ background:#dc2626; }
.btn-laranja{ background:#ea580c; }

.info{
  font-size:13px;
  opacity:.85;
  margin-top:8px;
}

.table-wrap{
  overflow:auto;
}

.tabela{
  width:100%;
  border-collapse:collapse;
  min-width:1050px;
}

.tabela th,.tabela td{
  padding:12px;
  border-bottom:1px solid #1e293b;
  text-align:left;
  vertical-align:top;
}

.status{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
  text-transform:capitalize;
}

.reservado{ background:#2563eb; color:#fff; }
.confirmado{ background:#0891b2; color:#fff; }
.hospedado{ background:#b91c1c; color:#fff; }
.finalizado{ background:#15803d; color:#fff; }
.cancelado{ background:#6b7280; color:#fff; }

.acoes{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.titulo-secao{
  margin:0 0 14px 0;
}

.linha-topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

small{
  opacity:.75;
}
</style>
</head>
<body>

<div class="topo">
  <h2>📅 Reservas - Hotel</h2>
  <button class="voltar" onclick="history.back()">⬅ Voltar</button>
</div>

<div class="container">

  <div class="bloco">
    <h3 class="titulo-secao">Nova Reserva</h3>

    <form id="formReserva">
      <div class="grid-2">
        <div>
          <label>Hóspede</label>
          <select id="hospede" required>
            <option value="">Carregando hóspedes...</option>
          </select>
        </div>

        <div>
          <label>Quarto</label>
          <select id="quarto" required>
            <option value="">Carregando quartos...</option>
          </select>
        </div>
      </div>

      <div class="grid-3" style="margin-top:12px;">
        <div>
          <label>Check-in</label>
          <input type="date" id="checkin" required>
        </div>

        <div>
          <label>Check-out</label>
          <input type="date" id="checkout" required>
        </div>

        <div>
          <label>Valor total</label>
          <input type="number" id="valor" readonly placeholder="Auto">
        </div>
      </div>

      <div class="info" id="infoDisponibilidade">
        Escolha quarto e datas para validar disponibilidade.
      </div>

      <div style="margin-top:12px;">
        <button type="submit" id="btnSalvar">Salvar Reserva</button>
      </div>
    </form>
  </div>

  <div class="bloco">
    <div class="linha-topo">
      <h3 class="titulo-secao" style="margin:0;">Reservas</h3>
      <small>Filtros por período e status</small>
    </div>

    <div class="grid-4" style="margin-top:14px;">
      <div>
        <label>Data inicial</label>
        <input type="date" id="filtroInicio">
      </div>

      <div>
        <label>Data final</label>
        <input type="date" id="filtroFim">
      </div>

      <div>
        <label>Status</label>
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="reservado">Reservado</option>
          <option value="confirmado">Confirmado</option>
          <option value="hospedado">Hospedado</option>
          <option value="finalizado">Finalizado</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>

      <div style="display:flex;align-items:end;gap:8px;">
        <button type="button" class="btn-azul" id="btnFiltrar">Filtrar</button>
        <button type="button" class="btn-cinza" id="btnLimparFiltro">Limpar</button>
      </div>
    </div>

    <div class="table-wrap" style="margin-top:18px;">
      <table class="tabela">
        <thead>
          <tr>
            <th>Hóspede</th>
            <th>Telefone</th>
            <th>Quarto</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Valor</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaReservas">
          <tr><td colspan="8">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let negocio_id = null;

const hospedeSelect = document.getElementById("hospede");
const quartoSelect = document.getElementById("quarto");
const form = document.getElementById("formReserva");
const checkinInput = document.getElementById("checkin");
const checkoutInput = document.getElementById("checkout");
const valorInput = document.getElementById("valor");
const tabela = document.getElementById("tabelaReservas");
const infoDisponibilidade = document.getElementById("infoDisponibilidade");
const btnSalvar = document.getElementById("btnSalvar");

const filtroInicio = document.getElementById("filtroInicio");
const filtroFim = document.getElementById("filtroFim");
const filtroStatus = document.getElementById("filtroStatus");
const btnFiltrar = document.getElementById("btnFiltrar");
const btnLimparFiltro = document.getElementById("btnLimparFiltro");

function hojeISO(){
  const d = new Date();
  const ano = d.getFullYear();
  const mes = String(d.getMonth()+1).padStart(2, "0");
  const dia = String(d.getDate()).padStart(2, "0");
  return `${ano}-${mes}-${dia}`;
}

function addDias(dataStr, dias){
  const d = new Date(dataStr + "T00:00:00");
  d.setDate(d.getDate() + dias);
  const ano = d.getFullYear();
  const mes = String(d.getMonth()+1).padStart(2, "0");
  const dia = String(d.getDate()).padStart(2, "0");
  return `${ano}-${mes}-${dia}`;
}

function formatarPreco(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function formatarDataBR(data){
  if(!data) return "-";
  const [ano, mes, dia] = String(data).split("-");
  if(!ano || !mes || !dia) return data;
  return `${dia}/${mes}/${ano}`;
}

function limparNumero(numero){
  return String(numero || "").replace(/\D/g, "");
}

function montarLinkWhats(numero, texto){
  const num = limparNumero(numero);
  const msg = encodeURIComponent(texto);
  return num ? `https://wa.me/${num}?text=${msg}` : `https://wa.me/?text=${msg}`;
}

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

async function carregarUsuario(){
  const userId = await verificarSessao();
  if(!userId) return false;

  const { data: usuario, error } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(error || !usuario?.app_id){
    console.error(error);
    alert("Não foi possível identificar o negócio.");
    return false;
  }

  negocio_id = usuario.app_id;
  localStorage.setItem("app_id", negocio_id);
  return true;
}

async function carregarHospedes(){
  const { data, error } = await supabase
    .from("hotel_hospedes")
    .select("id, nome")
    .eq("negocio_id", negocio_id)
    .order("nome", { ascending:true });

  if(error){
    console.error(error);
    hospedeSelect.innerHTML = "<option value=''>Erro ao carregar hóspedes</option>";
    return;
  }

  hospedeSelect.innerHTML = "<option value=''>Selecione o hóspede</option>";

  (data || []).forEach(h => {
    hospedeSelect.innerHTML += `<option value="${h.id}">${h.nome}</option>`;
  });
}

async function carregarQuartos(){
  const { data, error } = await supabase
    .from("hotel_quartos")
    .select("id, numero, tipo, preco_diaria, status")
    .eq("negocio_id", negocio_id)
    .not("status", "eq", "ocupado")
    .order("numero", { ascending:true });

  if(error){
    console.error(error);
    quartoSelect.innerHTML = "<option value=''>Erro ao carregar quartos</option>";
    return;
  }

  quartoSelect.innerHTML = "<option value=''>Selecione o quarto</option>";

  (data || []).forEach(q => {
    quartoSelect.innerHTML += `
      <option value="${q.id}" data-preco="${q.preco_diaria || 0}">
        Quarto ${q.numero || "-"}${q.tipo ? " - " + q.tipo : ""} - ${formatarPreco(q.preco_diaria)}
      </option>
    `;
  });
}

function calcularValor(){
  const opt = quartoSelect.selectedOptions[0];

  if(!opt || !opt.value || !checkinInput.value || !checkoutInput.value){
    valorInput.value = "";
    return;
  }

  const preco = Number(opt.dataset.preco || 0);
  const dias = (new Date(checkoutInput.value + "T00:00:00") - new Date(checkinInput.value + "T00:00:00")) / 86400000;

  valorInput.value = dias > 0 ? (dias * preco).toFixed(2) : "";
}

async function verificarDisponibilidade(quartoId, checkin, checkout, reservaIgnorarId = null){
  if(!quartoId || !checkin || !checkout) return false;
  if(!(checkout > checkin)) return false;

  let query = supabase
    .from("hotel_reservas")
    .select("id")
    .eq("negocio_id", negocio_id)
    .eq("quarto_id", quartoId)
    .in("status", ["reservado", "confirmado", "hospedado"])
    .lt("data_checkin", checkout)
    .gt("data_checkout", checkin);

  if(reservaIgnorarId){
    query = query.neq("id", reservaIgnorarId);
  }

  const { data, error } = await query.limit(1);

  if(error){
    console.error(error);
    return false;
  }

  return !data || data.length === 0;
}

async function atualizarInfoDisponibilidade(){
  calcularValor();

  const quartoId = quartoSelect.value;
  const checkin = checkinInput.value;
  const checkout = checkoutInput.value;

  if(!quartoId || !checkin || !checkout){
    infoDisponibilidade.innerText = "Escolha quarto e datas para validar disponibilidade.";
    return;
  }

  if(!(checkout > checkin)){
    infoDisponibilidade.innerText = "Check-out deve ser maior que o check-in.";
    return;
  }

  infoDisponibilidade.innerText = "Verificando disponibilidade...";

  const disponivel = await verificarDisponibilidade(quartoId, checkin, checkout);

  infoDisponibilidade.innerText = disponivel
    ? "Quarto disponível para esse período."
    : "Esse quarto já está reservado ou hospedado nesse período.";
}

checkinInput.addEventListener("change", () => {
  if(checkinInput.value){
    checkoutInput.min = addDias(checkinInput.value, 1);

    if(!checkoutInput.value || checkoutInput.value <= checkinInput.value){
      checkoutInput.value = addDias(checkinInput.value, 1);
    }
  }

  atualizarInfoDisponibilidade();
});

checkoutInput.addEventListener("change", atualizarInfoDisponibilidade);
quartoSelect.addEventListener("change", atualizarInfoDisponibilidade);

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const hospede_id = hospedeSelect.value;
  const quarto_id = quartoSelect.value;
  const data_checkin = checkinInput.value;
  const data_checkout = checkoutInput.value;
  const valor_total = Number(valorInput.value || 0);

  if(!hospede_id || !quarto_id || !data_checkin || !data_checkout){
    alert("Preencha todos os campos.");
    return;
  }

  if(!(data_checkout > data_checkin)){
    alert("Check-out deve ser maior que o check-in.");
    return;
  }

  btnSalvar.disabled = true;
  btnSalvar.innerText = "Salvando...";

  try{
    const disponivel = await verificarDisponibilidade(quarto_id, data_checkin, data_checkout);

    if(!disponivel){
      alert("Esse quarto já está reservado nesse período.");
      return;
    }

    const { error } = await supabase
      .from("hotel_reservas")
      .insert([{
        negocio_id,
        hospede_id,
        quarto_id,
        data_checkin,
        data_checkout,
        valor_total,
        status: "reservado"
      }]);

    if(error) throw error;

    form.reset();
    valorInput.value = "";

    const hoje = hojeISO();
    checkinInput.value = hoje;
    checkoutInput.value = addDias(hoje, 1);
    checkoutInput.min = addDias(hoje, 1);

    infoDisponibilidade.innerText = "Reserva salva com sucesso.";
    await carregarTudo();

  }catch(err){
    console.error(err);
    alert("Erro ao salvar: " + err.message);
  } finally {
    btnSalvar.disabled = false;
    btnSalvar.innerText = "Salvar Reserva";
  }
});

async function carregarReservas(){
  tabela.innerHTML = "<tr><td colspan='8'>Carregando...</td></tr>";

  let query = supabase
    .from("hotel_reservas")
    .select(`
      id,
      hospede_id,
      quarto_id,
      data_checkin,
      data_checkout,
      valor_total,
      status,
      hotel_hospedes(nome, telefone),
      hotel_quartos(numero, tipo)
    `)
    .eq("negocio_id", negocio_id);

  if(filtroInicio.value){
    query = query.gte("data_checkin", filtroInicio.value);
  }

  if(filtroFim.value){
    query = query.lte("data_checkout", filtroFim.value);
  }

  if(filtroStatus.value){
    query = query.eq("status", filtroStatus.value);
  }

  const { data, error } = await query.order("data_checkin", { ascending:false });

  if(error){
    console.error(error);
    tabela.innerHTML = "<tr><td colspan='8'>Erro ao carregar reservas</td></tr>";
    return;
  }

  if(!data || !data.length){
    tabela.innerHTML = "<tr><td colspan='8'>Nenhuma reserva encontrada</td></tr>";
    return;
  }

  tabela.innerHTML = "";

  data.forEach(r => {
    const hospedeNome = r.hotel_hospedes?.nome || "-";
    const telefone = r.hotel_hospedes?.telefone || "";
    const quartoNome = `${r.hotel_quartos?.numero || "-"}${r.hotel_quartos?.tipo ? " - " + r.hotel_quartos.tipo : ""}`;

    const textoWhats =
`Olá ${hospedeNome}, tudo bem?

Sua reserva:
🏨 Quarto: ${quartoNome}
📅 Check-in: ${formatarDataBR(r.data_checkin)}
📅 Check-out: ${formatarDataBR(r.data_checkout)}
💰 Valor: ${formatarPreco(r.valor_total)}
📌 Status: ${r.status}`;

    const linkWhats = montarLinkWhats(telefone, textoWhats);

    tabela.innerHTML += `
      <tr>
        <td>${hospedeNome}</td>
        <td>
          ${telefone || "-"}
          ${telefone ? `<div style="margin-top:8px;"><a href="${linkWhats}" target="_blank" style="color:#22c55e;text-decoration:none;font-weight:bold;">WhatsApp</a></div>` : ""}
        </td>
        <td>${quartoNome}</td>
        <td>${formatarDataBR(r.data_checkin)}</td>
        <td>${formatarDataBR(r.data_checkout)}</td>
        <td>${formatarPreco(r.valor_total)}</td>
        <td><span class="status ${r.status}">${r.status}</span></td>
        <td>
          <div class="acoes">
            ${
              r.status === "reservado"
              ? `<button class="btn-azul" onclick="mudarStatus('${r.id}','confirmado')">Confirmar</button>`
              : ``
            }

            ${
              r.status === "confirmado" || r.status === "reservado"
              ? `<button class="btn-laranja" onclick="mudarStatus('${r.id}','hospedado')">Check-in</button>`
              : ``
            }

            ${
              r.status === "hospedado"
              ? `<button onclick="mudarStatus('${r.id}','finalizado')">Check-out</button>`
              : ``
            }

            ${
              r.status !== "cancelado" && r.status !== "finalizado"
              ? `<button class="btn-vermelho" onclick="cancelarReserva('${r.id}')">Cancelar</button>`
              : ``
            }
          </div>
        </td>
      </tr>
    `;
  });
}

window.mudarStatus = async function(id, status){
  try{
    const { data, error } = await supabase
      .from("hotel_reservas")
      .update({ status })
      .eq("id", id)
      .eq("negocio_id", negocio_id)
      .select("id, quarto_id")
      .single();

    if(error) throw error;

    if(status === "finalizado"){
      await supabase
        .from("hotel_quartos")
        .update({ status: "limpeza" })
        .eq("id", data.quarto_id)
        .eq("negocio_id", negocio_id);
    }

    await carregarTudo();

  }catch(err){
    console.error(err);
    alert("Erro ao mudar status: " + err.message);
  }
};

window.cancelarReserva = async function(id){
  if(!confirm("Deseja cancelar esta reserva?")) return;

  try{
    const { error } = await supabase
      .from("hotel_reservas")
      .update({ status: "cancelado" })
      .eq("id", id)
      .eq("negocio_id", negocio_id);

    if(error) throw error;

    await carregarReservas();

  }catch(err){
    console.error(err);
    alert("Erro ao cancelar reserva: " + err.message);
  }
};

btnFiltrar.addEventListener("click", carregarReservas);

btnLimparFiltro.addEventListener("click", () => {
  filtroInicio.value = "";
  filtroFim.value = "";
  filtroStatus.value = "";
  carregarReservas();
});

async function carregarTudo(){
  await Promise.all([
    carregarHospedes(),
    carregarQuartos(),
    carregarReservas()
  ]);
}

async function iniciar(){
  const ok = await carregarUsuario();
  if(!ok) return;

  const hoje = hojeISO();
  checkinInput.min = hoje;
  checkinInput.value = hoje;
  checkoutInput.min = addDias(hoje, 1);
  checkoutInput.value = addDias(hoje, 1);

  await carregarTudo();
  await atualizarInfoDisponibilidade();
}

iniciar();
</script>

</body>
</html>
