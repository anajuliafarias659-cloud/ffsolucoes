<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --primary:#22c55e;
  --text:#ffffff;
}

/* ===== TEMAS ===== */
body[data-tema="padrao"]{--bg:#020617;--card:#0f172a;--primary:#22c55e}
body[data-tema="carnaval"]{--bg:linear-gradient(135deg,#ff0080,#7928ca,#00c6ff);--card:rgba(0,0,0,.5);--primary:#facc15}
body[data-tema="sao-joao"]{--bg:#3f1d0b;--card:#7c2d12;--primary:#f97316}
body[data-tema="natal"]{--bg:#052e16;--card:#14532d;--primary:#dc2626}
body[data-tema="pascoa"]{--bg:#2e1065;--card:#4c1d95;--primary:#a855f7}
body[data-tema="black"]{--bg:#000;--card:#111;--primary:#ffffff}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text)}

/* ===== BANNER ===== */
.banner{width:100%;height:220px;object-fit:cover}
@media(max-width:768px){.banner{height:150px}}

.container{max-width:1100px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:16px;margin-bottom:16px}
.endereco{opacity:.65;font-size:13px;margin-top:6px}

/* ===== QUARTOS ===== */
.quartos{display:grid;gap:12px}

/* MOBILE – 3 POR LINHA */
@media(max-width:768px){
  .quartos{grid-template-columns:repeat(3,1fr)}
  .quarto img{height:100px}
  .info{padding:8px}
  .info h3{font-size:13px}
  .preco{font-size:13px}
  .btn{padding:6px 8px;font-size:12px}
}

/* DESKTOP */
@media(min-width:769px){
  .quartos{grid-template-columns:repeat(2,1fr)}
  .quarto img{height:180px}
}

.quarto{
  background:#020617;
  border-radius:14px;
  overflow:hidden;
}
.quarto img{
  width:100%;
  object-fit:cover;
  cursor:pointer;
}
.info{padding:12px}
.preco{margin:6px 0;font-weight:800;color:var(--primary)}
.btn{
  background:var(--primary);
  color:#000;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

/* ===== MODAIS ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:60;
}

/* GALERIA */
.galeria-box{
  background:#000;
  padding:12px;
  border-radius:16px;
  width:100%;
  max-width:520px;
  max-height:85vh;
  overflow-y:auto;
}
.galeria-box img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

/* FORMULÁRIO WHATS */
.modal-box{
  background:linear-gradient(180deg,#25d366,#128c7e);
  padding:18px;
  border-radius:18px;
  width:100%;
  max-width:420px;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}
.modal-box h3{
  color:#fff;
  text-align:center;
  margin-bottom:8px;
}
.modal-box input,
.modal-box textarea{
  width:100%;
  margin-top:8px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0b141a;
  color:#fff;
}
.acoes{display:flex;gap:10px;margin-top:12px}
.acoes button{flex:1}
</style>
</head>

<body data-tema="padrao">

<img id="bannerHotel" class="banner">

<div class="container">
  <div class="card">
    <h1 id="nomeHotel">Hotel</h1>
    <div id="enderecoHotel" class="endereco"></div>
  </div>

  <div class="card">
    <div id="lista" class="quartos">Carregando...</div>
  </div>
</div>

<!-- GALERIA -->
<div class="modal" id="modalGaleria">
  <div class="galeria-box">
    <button class="btn" onclick="fecharGaleria()">Fechar</button>
    <div id="galeriaFotos"></div>
  </div>
</div>

<!-- RESERVA -->
<div class="modal" id="modalReserva">
  <div class="modal-box">
    <h3 id="tituloReserva"></h3>

    <input id="nomeCliente" placeholder="Nome do responsável">
    <input id="telefoneCliente" placeholder="WhatsApp do responsável">
    <input id="cpfCliente" placeholder="CPF do responsável">
    <input id="dataEntrada" type="date">
    <input id="dataSaida" type="date">
    <textarea id="obs" placeholder="Observações"></textarea>

    <div class="acoes">
      <button class="btn" onclick="enviarReserva()">Enviar</button>
      <button class="btn" onclick="fecharReserva()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

/* ===== SUPABASE ===== */
const sb = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

/* ===== PEGA ID IGUAL AO PAINEL ===== */
const admin = JSON.parse(localStorage.getItem("admin_logado"));
const negocio_id = admin?.app_id;

if(!negocio_id){
  document.body.innerHTML = `
    <div style="padding:30px;max-width:700px;margin:40px auto">
      <div class="card aviso">Sessão inválida. Faça login novamente.</div>
    </div>
  `;
  throw new Error("Sem app_id");
}

/* ===== ELEMENTOS ===== */
const lista = document.getElementById("lista");
const contador = document.getElementById("contadorQuartos");
const nomeHotel = document.getElementById("nomeHotel");
const subHotel = document.getElementById("subHotel");
const banner = document.getElementById("bannerHotel");

/* ===== CONFIG ===== */
let dadosConfig = {
  nome_site: "Hotel",
  whatsapp: ""
};

function formatarPreco(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function limparNumero(numero){
  return String(numero || "").replace(/\D/g, "");
}

function montarLinkWhatsApp(tipo, preco){
  const numero = limparNumero(dadosConfig.whatsapp);

  const msg = encodeURIComponent(
    `Olá! Quero reservar o quarto ${tipo}.\nValor da diária: ${formatarPreco(preco)}.`
  );

  if(!numero) return null;

  return `https://wa.me/55${numero}?text=${msg}`;
}

/* ===== CARREGAR CONFIG (CORRIGIDO) ===== */
async function carregarConfig(){
  const { data, error } = await sb
    .from("config_site")
    .select("*") // 🔥 evita erro 400
    .eq("app_id", negocio_id)
    .maybeSingle();

  if(error){
    console.error("Erro config:", error);
    return;
  }

  if(data){
    dadosConfig = data;

    nomeHotel.textContent = data.nome_site || "Hotel";
    subHotel.textContent = data.cidade || "Quartos disponíveis";

    if(data.banner_url){
      banner.src = data.banner_url;
      banner.style.display = "block";
    }
  }
}

/* ===== QUARTOS ===== */
async function carregarQuartos(){
  const { data, error } = await sb
    .from("hotel_quartos")
    .select("*")
    .eq("negocio_id", negocio_id)
    .eq("status","livre");

  if(error){
    console.error(error);
    lista.innerHTML = "Erro ao carregar quartos";
    return;
  }

  if(!data || data.length === 0){
    lista.innerHTML = "Nenhum quarto disponível";
    return;
  }

  contador.innerText = data.length + " quartos";

  lista.innerHTML = "";

  data.forEach(q=>{
    const foto = q.fotos?.[0] || "";
    const zap = montarLinkWhatsApp(q.tipo, q.preco_diaria);

    lista.innerHTML += `
      <div class="quarto">
        <div class="foto-box">
          ${foto ? `<img src="${foto}">` : `<div class="sem-foto">Sem foto</div>`}
        </div>

        <div class="info">
          <h3>${q.tipo}</h3>

          <div class="linha">
            <div class="preco">
              ${formatarPreco(q.preco_diaria)}
              <small>/ diária</small>
            </div>
            <div class="status">Disponível</div>
          </div>

          ${zap
            ? `<a class="btn" href="${zap}" target="_blank">💬 Reservar</a>`
            : `<button class="btn">Sem WhatsApp</button>`
          }
        </div>
      </div>
    `;
  });
}

/* ===== START ===== */
async function iniciar(){
  await carregarConfig();
  await carregarQuartos();
}

iniciar();
</script>

</body>
</html>
