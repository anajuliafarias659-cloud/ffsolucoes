<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --primary:#22c55e;
  --text:#ffffff;
}

/* ===== TEMAS ===== */
body[data-tema="padrao"]{--bg:#020617;--card:#0f172a;--primary:#22c55e}
body[data-tema="carnaval"]{--bg:linear-gradient(135deg,#ff0080,#7928ca,#00c6ff);--card:rgba(0,0,0,.5);--primary:#facc15}
body[data-tema="sao-joao"]{--bg:#3f1d0b;--card:#7c2d12;--primary:#f97316}
body[data-tema="natal"]{--bg:#052e16;--card:#14532d;--primary:#dc2626}
body[data-tema="pascoa"]{--bg:#2e1065;--card:#4c1d95;--primary:#a855f7}
body[data-tema="black"]{--bg:#000;--card:#111;--primary:#ffffff}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}

.banner{
  width:100%;
  height:220px;
  object-fit:cover;
  display:block;
  background:#0b1220;
}
@media(max-width:768px){
  .banner{height:150px}
}

.container{max-width:1100px;margin:auto;padding:16px}
.card{background:var(--card);padding:16px;border-radius:16px;margin-bottom:16px}
.endereco{opacity:.65;font-size:13px;margin-top:6px}

.filtros{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}
@media(max-width:768px){
  .filtros{grid-template-columns:1fr}
}

.filtros input,.filtros button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
}
.filtros input{
  background:#020617;
  color:#fff;
}
.filtros button{
  background:var(--primary);
  color:#000;
  font-weight:700;
  cursor:pointer;
}

.quartos{display:grid;gap:12px}
@media(max-width:768px){
  .quartos{grid-template-columns:repeat(2,1fr)}
  .quarto img{height:100px}
  .info{padding:8px}
  .info h3{font-size:13px}
  .preco{font-size:13px}
  .btn,.btn-sec{padding:8px 8px;font-size:12px}
}
@media(min-width:769px){
  .quartos{grid-template-columns:repeat(2,1fr)}
  .quarto img{height:180px}
}

.quarto{
  background:#020617;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.05);
}
.quarto img{
  width:100%;
  object-fit:cover;
  cursor:pointer;
  display:block;
  background:#0b1220;
}
.info{padding:12px}
.preco{margin:6px 0;font-weight:800;color:var(--primary)}
.status{
  margin:8px 0 10px 0;
  font-size:13px;
  font-weight:700;
}
.status.livre{color:#22c55e}
.status.ocupado{color:#f87171}
.btn{
  background:var(--primary);
  color:#000;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}
.btn-sec{
  background:#334155;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:700;
  padding:10px 12px;
}
.msg{
  opacity:.75;
  font-size:13px;
  margin-top:10px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:60;
  padding:14px;
}

.galeria-box{
  background:#000;
  padding:12px;
  border-radius:16px;
  width:100%;
  max-width:520px;
  max-height:85vh;
  overflow-y:auto;
}
.galeria-box img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
  display:block;
  background:#111;
}

.modal-box{
  background:linear-gradient(180deg,#25d366,#128c7e);
  padding:18px;
  border-radius:18px;
  width:100%;
  max-width:420px;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}
.modal-box h3{
  color:#fff;
  text-align:center;
  margin-bottom:8px;
}
.modal-box input,
.modal-box textarea{
  width:100%;
  margin-top:8px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0b141a;
  color:#fff;
}
.modal-box textarea{
  min-height:90px;
  resize:vertical;
}
.acoes{display:flex;gap:10px;margin-top:12px}
.acoes button{flex:1}
</style>
</head>

<body data-tema="padrao">

<img id="bannerHotel" class="banner" alt="Banner do hotel">

<div class="container">
  <div class="card">
    <h1 id="nomeHotel">Hotel</h1>
    <div id="enderecoHotel" class="endereco"></div>

    <div class="filtros">
      <input id="checkinFiltro" type="date">
      <input id="checkoutFiltro" type="date">
      <button id="btnBuscar">Buscar disponibilidade</button>
    </div>

    <div class="msg" id="msgBusca">
      Escolha check-in e check-out para ver os quartos disponíveis.
    </div>
  </div>

  <div class="card">
    <div id="lista" class="quartos">Carregando...</div>
  </div>
</div>

<div class="modal" id="modalGaleria">
  <div class="galeria-box">
    <button class="btn" onclick="fecharGaleria()">Fechar</button>
    <div id="galeriaFotos"></div>
  </div>
</div>

<div class="modal" id="modalReserva">
  <div class="modal-box">
    <h3 id="tituloReserva"></h3>

    <input id="nomeCliente" placeholder="Nome do responsável">
    <input id="telefoneCliente" placeholder="WhatsApp do responsável">
    <input id="cpfCliente" placeholder="CPF do responsável">
    <input id="dataEntrada" type="date">
    <input id="dataSaida" type="date">
    <textarea id="obs" placeholder="Observações"></textarea>

    <div class="acoes">
      <button class="btn" onclick="enviarReserva()">Enviar</button>
      <button class="btn" onclick="fecharReserva()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const sb = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

const params = new URLSearchParams(window.location.search);

let negocio_id =
  params.get("app_id") ||
  params.get("id") ||
  params.get("app") ||
  localStorage.getItem("app_id");

if(!negocio_id){
  const admin = JSON.parse(localStorage.getItem("admin_logado") || "{}");
  negocio_id = admin.app_id;
}

if(!negocio_id){
  document.body.innerHTML = `<div style="padding:30px;text-align:center">❌ Hotel não identificado</div>`;
  throw new Error("Sem app_id");
}

const lista = document.getElementById("lista");
const nomeHotel = document.getElementById("nomeHotel");
const enderecoHotel = document.getElementById("enderecoHotel");
const banner = document.getElementById("bannerHotel");
const checkinFiltro = document.getElementById("checkinFiltro");
const checkoutFiltro = document.getElementById("checkoutFiltro");
const btnBuscar = document.getElementById("btnBuscar");
const msgBusca = document.getElementById("msgBusca");

let dadosConfig = { nome_site:"Hotel", whatsapp:"" };
let quartosCache = [];
let quartoSelecionado = null;

function hojeISO(){
  const d = new Date();
  const ano = d.getFullYear();
  const mes = String(d.getMonth()+1).padStart(2,"0");
  const dia = String(d.getDate()).padStart(2,"0");
  return `${ano}-${mes}-${dia}`;
}

function addDias(dataStr, dias){
  const d = new Date(dataStr + "T00:00:00");
  d.setDate(d.getDate() + dias);
  const ano = d.getFullYear();
  const mes = String(d.getMonth()+1).padStart(2,"0");
  const dia = String(d.getDate()).padStart(2,"0");
  return `${ano}-${mes}-${dia}`;
}

function formatarPreco(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function limparNumero(numero){
  return String(numero || "").replace(/\D/g, "");
}

function formatarDataBR(data){
  if(!data) return "";
  const [ano, mes, dia] = String(data).split("-");
  if(!ano || !mes || !dia) return data;
  return `${dia}/${mes}/${ano}`;
}

function intervaloValido(entrada, saida){
  return !!entrada && !!saida && saida > entrada;
}

function parsePossivelJSON(valor){
  if(valor == null) return null;
  if(Array.isArray(valor) || typeof valor === "object") return valor;

  if(typeof valor !== "string") return valor;

  const txt = valor.trim();
  if(!txt) return "";

  try{
    return JSON.parse(txt);
  }catch{
    return valor;
  }
}

function extrairPrimeiraUrl(valor){
  const convertido = parsePossivelJSON(valor);

  if(Array.isArray(convertido)){
    return convertido[0] || "";
  }

  if(typeof convertido === "string"){
    return convertido;
  }

  return "";
}

function normalizarFotos(valor){
  const convertido = parsePossivelJSON(valor);

  if(Array.isArray(convertido)){
    return convertido.filter(Boolean).map(String);
  }

  if(typeof convertido === "string" && convertido.trim()){
    return [convertido.trim()];
  }

  return [];
}

function escAttr(texto){
  return String(texto || "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

async function carregarConfig(){
  const { data, error } = await sb
    .from("config_site")
    .select("*")
    .eq("app_id", negocio_id)
    .maybeSingle();

  if(error){
    console.error("Erro config:", error);
    return;
  }

  if(data){
    dadosConfig = data;
    nomeHotel.textContent = data.nome_site || "Hotel";
    enderecoHotel.textContent = `${data.endereco || ""} ${data.cidade || ""}`.trim();

    const bannerUrl = extrairPrimeiraUrl(data.banner_url);
    if(bannerUrl){
      banner.src = bannerUrl;
      banner.onerror = () => {
        banner.removeAttribute("src");
        banner.style.display = "none";
      };
    }else{
      banner.style.display = "none";
    }

    if(data.tema_site){
      document.body.setAttribute("data-tema", data.tema_site);
    }
  }
}

async function carregarQuartosBase(){
  const { data, error } = await sb
    .from("hotel_quartos")
    .select("*")
    .eq("negocio_id", negocio_id)
    .in("status", ["livre", "limpeza", null]);

  if(error){
    console.error(error);
    lista.innerHTML = "Erro ao carregar quartos";
    return [];
  }

  quartosCache = (data || []).map(q => ({
    ...q,
    fotosNormalizadas: normalizarFotos(q.fotos)
  }));

  return quartosCache;
}

async function buscarReservasOcupadas(checkin, checkout){
  const { data, error } = await sb
    .from("hotel_reservas")
    .select("id, quarto_id, data_checkin, data_checkout, status")
    .eq("negocio_id", negocio_id)
    .in("status", ["reservado", "confirmado", "hospedado"])
    .lt("data_checkin", checkout)
    .gt("data_checkout", checkin);

  if(error){
    console.error("Erro reservas:", error);
    return [];
  }

  return data || [];
}

function renderizarQuartos(quartos, reservas){
  if(!quartos.length){
    lista.innerHTML = "Nenhum quarto disponível";
    return;
  }

  const idsBloqueados = new Set((reservas || []).map(r => r.quarto_id));
  lista.innerHTML = "";

  quartos.forEach(q => {
    const fotos = q.fotosNormalizadas || [];
    const foto = fotos[0] || "";
    const bloqueadoPorReserva = idsBloqueados.has(q.id);
    const indisponivelPorStatus = q.status && q.status !== "livre";
    const disponivel = !bloqueadoPorReserva && !indisponivelPorStatus;

    const htmlFoto = foto
      ? `<img src="${escAttr(foto)}" alt="${escAttr(q.tipo || "Quarto")}" onclick="abrirGaleriaPorQuarto('${escAttr(q.id)}')">`
      : `<div style="height:180px;background:#111;display:flex;align-items:center;justify-content:center;color:#94a3b8">Sem foto</div>`;

    lista.innerHTML += `
      <div class="quarto">
        ${htmlFoto}

        <div class="info">
          <h3>${escAttr(q.tipo || "Quarto")}${q.numero ? " - Nº " + escAttr(q.numero) : ""}</h3>
          <div class="preco">${formatarPreco(q.preco_diaria)}</div>
          <div class="status ${disponivel ? "livre" : "ocupado"}">
            ${disponivel ? "Disponível nessas datas" : "Indisponível nessas datas"}
          </div>

          ${
            disponivel
              ? `<button class="btn" onclick="abrirReserva('${escAttr(q.id)}')">Reservar</button>`
              : `<button class="btn-sec" disabled>Bloqueado</button>`
          }
        </div>
      </div>
    `;
  });
}

window.abrirGaleriaPorQuarto = function(quartoId){
  const quarto = quartosCache.find(q => String(q.id) === String(quartoId));
  const fotos = quarto?.fotosNormalizadas || [];
  abrirGaleria(fotos);
};

window.abrirGaleria = function(fotos){
  const box = document.getElementById("galeriaFotos");
  const listaFotos = Array.isArray(fotos) ? fotos : [];
  box.innerHTML = listaFotos.length
    ? listaFotos.map(f => `<img src="${escAttr(f)}" alt="Foto do quarto">`).join("")
    : `<div style="padding:20px;text-align:center;color:#94a3b8">Sem fotos</div>`;
  document.getElementById("modalGaleria").style.display = "flex";
};

window.fecharGaleria = function(){
  document.getElementById("modalGaleria").style.display = "none";
};

window.abrirReserva = function(quartoId){
  const entrada = checkinFiltro.value;
  const saida = checkoutFiltro.value;

  if(!intervaloValido(entrada, saida)){
    alert("Escolha check-in e check-out válidos antes de reservar.");
    return;
  }

  const quarto = quartosCache.find(q => String(q.id) === String(quartoId));
  if(!quarto){
    alert("Quarto não encontrado.");
    return;
  }

  quartoSelecionado = {
    quartoId: quarto.id,
    tipo: quarto.tipo || "Quarto",
    preco: quarto.preco_diaria || 0,
    numero: quarto.numero || ""
  };

  document.getElementById("tituloReserva").innerText =
    `${quartoSelecionado.tipo}${quartoSelecionado.numero ? " - Nº " + quartoSelecionado.numero : ""}`;

  document.getElementById("dataEntrada").value = entrada;
  document.getElementById("dataSaida").value = saida;
  document.getElementById("dataEntrada").min = hojeISO();
  document.getElementById("dataSaida").min = addDias(entrada, 1);

  document.getElementById("modalReserva").style.display = "flex";
};

window.fecharReserva = function(){
  document.getElementById("modalReserva").style.display = "none";
};

window.enviarReserva = async function(){
  const nome = document.getElementById("nomeCliente").value.trim();
  const tel = document.getElementById("telefoneCliente").value.trim();
  const cpf = document.getElementById("cpfCliente").value.trim();
  const entrada = document.getElementById("dataEntrada").value;
  const saida = document.getElementById("dataSaida").value;
  const obs = document.getElementById("obs").value.trim();

  if(!quartoSelecionado){
    alert("Selecione um quarto.");
    return;
  }

  if(!nome || !tel || !entrada || !saida){
    alert("Preencha nome, telefone, entrada e saída.");
    return;
  }

  if(!intervaloValido(entrada, saida)){
    alert("Data de saída deve ser maior que a data de entrada.");
    return;
  }

  const reservas = await buscarReservasOcupadas(entrada, saida);
  const quartoJaOcupado = reservas.some(r => String(r.quarto_id) === String(quartoSelecionado.quartoId));

  if(quartoJaOcupado){
    alert("Esse quarto acabou de ser reservado para esse período. Escolha outro.");
    await buscarDisponibilidade();
    fecharReserva();
    return;
  }

  const dias = (new Date(saida + "T00:00:00") - new Date(entrada + "T00:00:00")) / 86400000;
  const valorTotal = dias > 0 ? dias * Number(quartoSelecionado.preco || 0) : 0;

  const { error } = await sb
    .from("hotel_reservas")
    .insert([{
      negocio_id,
      quarto_id: quartoSelecionado.quartoId,
      nome_hospede: nome,
      telefone: tel,
      cpf: cpf || null,
      data_checkin: entrada,
      data_checkout: saida,
      valor_total: valorTotal,
      observacoes: obs || null,
      status: "reservado",
      origem: "site"
    }]);

  if(error){
    console.error(error);
    alert("Erro ao salvar reserva: " + error.message);
    return;
  }

  const numero = limparNumero(dadosConfig.whatsapp);
  const mensagem = encodeURIComponent(
`Nova reserva online
Hotel: ${dadosConfig.nome_site || "Hotel"}
Hóspede: ${nome}
Telefone: ${tel}
CPF: ${cpf || "-"}
Quarto: ${quartoSelecionado.tipo}${quartoSelecionado.numero ? " - Nº " + quartoSelecionado.numero : ""}
Check-in: ${formatarDataBR(entrada)}
Check-out: ${formatarDataBR(saida)}
Valor total: ${formatarPreco(valorTotal)}
Observações: ${obs || "Nenhuma"}`
  );

  fecharReserva();
  await buscarDisponibilidade();

  if(numero){
    window.open(`https://wa.me/55${numero}?text=${mensagem}`, "_blank");
  }else{
    alert("Reserva enviada com sucesso.");
  }
};

async function buscarDisponibilidade(){
  const checkin = checkinFiltro.value;
  const checkout = checkoutFiltro.value;

  if(!intervaloValido(checkin, checkout)){
    msgBusca.textContent = "Escolha check-in e check-out válidos para consultar.";
    renderizarQuartos(quartosCache, []);
    return;
  }

  msgBusca.textContent = `Buscando disponibilidade de ${formatarDataBR(checkin)} até ${formatarDataBR(checkout)}...`;

  const reservas = await buscarReservasOcupadas(checkin, checkout);
  renderizarQuartos(quartosCache, reservas);

  msgBusca.textContent = `Mostrando disponibilidade de ${formatarDataBR(checkin)} até ${formatarDataBR(checkout)}.`;
}

btnBuscar.addEventListener("click", buscarDisponibilidade);

checkinFiltro.addEventListener("change", () => {
  if(checkinFiltro.value){
    checkoutFiltro.min = addDias(checkinFiltro.value, 1);
    if(!checkoutFiltro.value || checkoutFiltro.value <= checkinFiltro.value){
      checkoutFiltro.value = addDias(checkinFiltro.value, 1);
    }
  }
});

document.getElementById("dataEntrada").addEventListener("change", () => {
  const entrada = document.getElementById("dataEntrada").value;
  const saida = document.getElementById("dataSaida");
  if(entrada){
    saida.min = addDias(entrada, 1);
    if(!saida.value || saida.value <= entrada){
      saida.value = addDias(entrada, 1);
    }
  }
});

async function iniciar(){
  const hoje = hojeISO();
  checkinFiltro.min = hoje;
  checkinFiltro.value = hoje;
  checkoutFiltro.min = addDias(hoje, 1);
  checkoutFiltro.value = addDias(hoje, 1);

  await carregarConfig();
  await carregarQuartosBase();
  await buscarDisponibilidade();
}

iniciar();
</script>

</body>
</html>
