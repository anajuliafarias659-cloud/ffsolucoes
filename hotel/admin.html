<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

:root{
  --bg:#020617;
  --bg2:#0f172a;
  --card:#111827;
  --card2:#172033;
  --line:rgba(255,255,255,.08);
  --text:#ffffff;
  --muted:#94a3b8;
  --green:#22c55e;
  --green2:#16a34a;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%, #0f172a 100%);
  color:var(--text);
}

.topo{
  width:100%;
  min-height:260px;
  background:#0b1220;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid var(--line);
}

.banner{
  width:100%;
  height:260px;
  object-fit:cover;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(2,6,23,.10) 0%, rgba(2,6,23,.75) 72%, rgba(2,6,23,.95) 100%);
  display:flex;
  align-items:flex-end;
}

.topo-conteudo{
  width:100%;
  max-width:1100px;
  margin:auto;
  padding:22px;
}

.badge{
  display:inline-block;
  background:rgba(34,197,94,.18);
  color:#86efac;
  border:1px solid rgba(34,197,94,.35);
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:10px;
}

.titulo{
  margin:0;
  font-size:32px;
  line-height:1.1;
}

.subtitulo{
  margin:8px 0 0 0;
  color:#cbd5e1;
  font-size:15px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 20px rgba(0,0,0,.20);
}

.info-topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.info-topo h2{
  margin:0;
  font-size:22px;
}

.info-topo p{
  margin:6px 0 0 0;
  color:var(--muted);
}

.contador{
  background:#0b1220;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 14px;
  color:#cbd5e1;
  font-size:14px;
  font-weight:bold;
}

.quartos{
  display:grid;
  gap:16px;
}

.quarto{
  background:linear-gradient(180deg,#0f172a,#111827);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
  transition:.25s;
}

.quarto:hover{
  transform:translateY(-4px);
}

.foto-box{
  width:100%;
  height:210px;
  background:#0b1220;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.quarto img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.sem-foto{
  color:#64748b;
  font-size:14px;
}

.info{
  padding:16px;
}

.info h3{
  margin:0 0 10px 0;
  font-size:20px;
}

.linha{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.preco{
  color:#4ade80;
  font-weight:800;
  font-size:20px;
}

.preco small{
  font-size:13px;
  color:#bbf7d0;
  font-weight:600;
}

.status{
  background:rgba(34,197,94,.12);
  color:#86efac;
  border:1px solid rgba(34,197,94,.25);
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#fff;
  padding:13px 16px;
  border:none;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  filter:brightness(1.06);
}

.centralizado{
  text-align:center;
  color:#cbd5e1;
  padding:20px;
}

.aviso{
  color:#fca5a5;
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.15);
  border-radius:12px;
  padding:12px;
}

@media(min-width:768px){
  .quartos{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(min-width:1024px){
  .quartos{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:640px){
  .titulo{
    font-size:26px;
  }

  .banner,
  .topo{
    height:220px;
    min-height:220px;
  }
}
</style>
</head>

<body>

<header class="topo">
  <img id="bannerHotel" class="banner" style="display:none">
  <div class="overlay">
    <div class="topo-conteudo">
      <div class="badge">🏨 Hospedagem</div>
      <h1 class="titulo" id="nomeHotel">Hotel</h1>
      <p class="subtitulo" id="subHotel">Quartos disponíveis para reserva</p>
    </div>
  </div>
</header>

<div class="container">
  <div class="card">
    <div class="info-topo">
      <div>
        <h2>Quartos disponíveis</h2>
        <p>Escolha a melhor opção e faça sua reserva pelo WhatsApp.</p>
      </div>
      <div class="contador" id="contadorQuartos">Carregando...</div>
    </div>
  </div>

  <div class="card">
    <div id="lista" class="quartos">
      <div class="centralizado">Carregando quartos...</div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const sb = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

/* ===== PEGA ID DO HOTEL ===== */
const params = new URLSearchParams(window.location.search);
const negocio_id = params.get("app_id") || params.get("id");

if(!negocio_id){
  document.body.innerHTML = "Hotel não informado";
  throw new Error("Sem app_id");
}

/* ===== ELEMENTOS ===== */
const lista = document.getElementById("lista");
const contador = document.getElementById("contadorQuartos");
const nomeHotel = document.getElementById("nomeHotel");
const subHotel = document.getElementById("subHotel");
const banner = document.getElementById("bannerHotel");

let dadosConfig = {};

/* ===== FORMATOS ===== */
function formatarPreco(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

/* ===== CONFIG ===== */
async function carregarConfig(){
  const { data } = await sb
    .from("config_site")
    .select("*")
    .eq("app_id", negocio_id)
    .maybeSingle();

  if(data){
    dadosConfig = data;

    nomeHotel.textContent = data.nome_site || "Hotel";
    subHotel.textContent = data.cidade || "";

    if(data.banner_url){
      banner.src = data.banner_url;
      banner.style.display = "block";
    }
  }
}

/* ===== QUARTOS ===== */
async function carregarQuartos(){
  const { data } = await sb
    .from("hotel_quartos")
    .select("*")
    .eq("negocio_id", negocio_id)
    .eq("status","livre");

  if(!data || !data.length){
    lista.innerHTML = "Nenhum quarto disponível";
    return;
  }

  contador.innerText = data.length + " quartos";

  lista.innerHTML = "";

  data.forEach(q=>{
    const foto = q.fotos?.[0] || "";

    lista.innerHTML += `
      <div class="quarto">
        ${foto ? `<img src="${foto}">` : ""}
        <div class="info">
          <h3>${q.tipo}</h3>
          <div class="preco">${formatarPreco(q.preco_diaria)}</div>
          <a class="btn" target="_blank"
            href="https://wa.me/55${(dadosConfig.whatsapp || "").replace(/\D/g,"")}?text=Quero reservar ${q.tipo}">
            Reservar
          </a>
        </div>
      </div>
    `;
  });
}

/* ===== START ===== */
async function iniciar(){
  await carregarConfig();
  await carregarQuartos();
}

iniciar();
</script>
</body>
</html>
