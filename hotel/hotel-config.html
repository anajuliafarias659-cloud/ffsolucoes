<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurar Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#020617;
  color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
}
.container{
  max-width:520px;
  margin:40px auto;
  padding:24px;
  background:#0f172a;
  border-radius:18px;
}
h2{text-align:center;margin-bottom:10px}
label{display:block;margin-top:14px}
input,select,button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border-radius:12px;
  border:none;
}
input,select{background:#020617;color:#fff}
button{
  background:#22c55e;
  color:#022c22;
  font-weight:700;
  margin-top:22px;
  cursor:pointer;
}
.preview{
  margin-top:10px;
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:12px;
  display:none;
}
small{opacity:.6}
</style>
</head>

<body>

<div class="container">
  <h2>🏨 Configurar Hotel</h2>

  <label>Nome do hotel</label>
  <input id="nome" placeholder="Ex: Hotel Serra Azul">

  <label>WhatsApp</label>
  <input id="whatsapp" placeholder="Ex: 88999999999">

  <label>Endereço</label>
  <input id="endereco" placeholder="Rua, número, bairro">

  <label>Cidade</label>
  <input id="cidade" placeholder="Ex: São Raimundo Nonato - PI">

  <label>Tema do site</label>
  <select id="tema">
    <option value="padrao">Padrão</option>
    <option value="carnaval">🎉 Carnaval</option>
    <option value="sao-joao">🔥 São João</option>
    <option value="natal">🎄 Natal</option>
    <option value="pascoa">🐰 Páscoa</option>
    <option value="black">🖤 Black Friday</option>
  </select>

  <label>Banner do site</label>
  <input type="file" id="bannerInput" accept="image/*">
  <img id="bannerPreview" class="preview">

  <button onclick="salvar()">Salvar configurações</button>
  <small id="status"></small>
</div>

<script>
/* ===== SUPABASE ===== */
const sb = supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

/* ===== SESSÃO ===== */
const admin = JSON.parse(localStorage.getItem("admin_logado") || "{}");

if(!admin?.app_id){
  alert("Sessão expirada. Faça login novamente.");
  location.href = "../auth/login.html";
  throw new Error("Sem sessão");
}

const app_id = admin.app_id;

/* mantém padrão do sistema */
localStorage.setItem("app_id", app_id);

/* ===== ELEMENTOS ===== */
const nomeInput = document.getElementById("nome");
const whatsappInput = document.getElementById("whatsapp");
const enderecoInput = document.getElementById("endereco");
const cidadeInput = document.getElementById("cidade");
const temaSelect = document.getElementById("tema");
const bannerInput = document.getElementById("bannerInput");
const bannerPreview = document.getElementById("bannerPreview");
const statusEl = document.getElementById("status");
const btnSalvar = document.querySelector("button");

/* ===== PREVIEW ===== */
bannerInput.onchange = ()=>{
  const f = bannerInput.files[0];
  if(f){
    bannerPreview.src = URL.createObjectURL(f);
    bannerPreview.style.display="block";
  }
};

/* ===== UPLOAD ===== */
async function uploadBanner(file){
  try{
    const ext = file.name.split(".").pop();
    const path = `${app_id}/${Date.now()}.${ext}`;

    const { error } = await sb.storage
      .from("banners")
      .upload(path,file,{upsert:true});

    if(error){
      console.error(error);
      return null;
    }

    return sb.storage.from("banners").getPublicUrl(path).data.publicUrl;

  }catch(e){
    console.error(e);
    return null;
  }
}

/* ===== SALVAR ===== */
async function salvar(){
  btnSalvar.disabled = true;
  btnSalvar.innerText = "Salvando...";
  statusEl.innerText = "";

  let banner_url = null;

  if(bannerInput.files[0]){
    banner_url = await uploadBanner(bannerInput.files[0]);
  }

  const payload = {
    app_id,
    nome_site: nomeInput.value || null,
    whatsapp: whatsappInput.value || null,
    endereco: enderecoInput.value || null,
    cidade: cidadeInput.value || null,
    tema_site: temaSelect.value || "padrao"
  };

  if(banner_url) payload.banner_url = banner_url;

  const { data: existente } = await sb
    .from("config_site")
    .select("id")
    .eq("app_id",app_id)
    .maybeSingle();

  const res = existente
    ? await sb.from("config_site").update(payload).eq("app_id",app_id)
    : await sb.from("config_site").insert(payload);

  btnSalvar.disabled = false;
  btnSalvar.innerText = "Salvar configurações";

  if(res.error){
    console.error(res.error);
    statusEl.innerText = "";
    alert("Erro ao salvar: " + res.error.message);
    return;
  }

  statusEl.innerText = "✅ Salvo com sucesso!";
}

/* ===== LOAD ===== */
async function carregar(){
  const { data, error } = await sb
    .from("config_site")
    .select("*")
    .eq("app_id",app_id)
    .maybeSingle();

  if(error){
    console.error(error);
    return;
  }

  if(!data) return;

  nomeInput.value = data.nome_site || "";
  whatsappInput.value = data.whatsapp || "";
  enderecoInput.value = data.endereco || "";
  cidadeInput.value = data.cidade || "";
  temaSelect.value = data.tema_site || "padrao";

  if(data.banner_url){
    bannerPreview.src = data.banner_url;
    bannerPreview.style.display="block";
  }
}

/* ===== START ===== */
carregar();
</script>

</body>
</html>
