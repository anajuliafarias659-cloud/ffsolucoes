<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurar Hotel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  background:#020617;
  color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
  margin:0;
  padding:20px;
}

.container{
  max-width:520px;
  margin:40px auto;
  padding:24px;
  background:#0f172a;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.05);
}

h2{
  text-align:center;
  margin-bottom:10px;
}

label{
  display:block;
  margin-top:14px;
}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border-radius:12px;
  border:none;
}

input,select{
  background:#020617;
  color:#fff;
}

button{
  background:#22c55e;
  color:#022c22;
  font-weight:700;
  margin-top:22px;
  cursor:pointer;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.preview{
  margin-top:10px;
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:12px;
  display:none;
}

small{
  opacity:.8;
  display:block;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🏨 Configurar Hotel</h2>

  <label>Nome do hotel</label>
  <input id="nome" placeholder="Ex: Hotel Serra Azul">

  <label>WhatsApp</label>
  <input id="whatsapp" placeholder="Ex: 88999999999">

  <label>Endereço</label>
  <input id="endereco" placeholder="Rua, número, bairro">

  <label>Cidade</label>
  <input id="cidade" placeholder="Ex: São Raimundo Nonato - PI">

  <label>Tema do site</label>
  <select id="tema">
    <option value="padrao">Padrão</option>
    <option value="carnaval">🎉 Carnaval</option>
    <option value="sao-joao">🔥 São João</option>
    <option value="natal">🎄 Natal</option>
    <option value="pascoa">🐰 Páscoa</option>
    <option value="black">🖤 Black Friday</option>
  </select>

  <label>Banner do site</label>
  <input type="file" id="bannerInput" accept="image/*">
  <img id="bannerPreview" class="preview" alt="Preview do banner">

  <button id="btnSalvar">Salvar configurações</button>
  <small id="status"></small>
</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;

const nomeInput = document.getElementById("nome");
const whatsappInput = document.getElementById("whatsapp");
const enderecoInput = document.getElementById("endereco");
const cidadeInput = document.getElementById("cidade");
const temaSelect = document.getElementById("tema");
const bannerInput = document.getElementById("bannerInput");
const bannerPreview = document.getElementById("bannerPreview");
const statusEl = document.getElementById("status");
const btnSalvar = document.getElementById("btnSalvar");

async function verificarSessao(){
  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    window.location.href = "/auth/login.html";
    return null;
  }

  return session.user.id;
}

async function carregarUsuario(){
  const userId = await verificarSessao();
  if(!userId) return false;

  const { data: usuario, error } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", userId)
    .single();

  if(error || !usuario?.app_id){
    alert("Não foi possível identificar o negócio.");
    return false;
  }

  app_id = usuario.app_id;
  localStorage.setItem("app_id", app_id);
  return true;
}

bannerInput.addEventListener("change", () => {
  const file = bannerInput.files?.[0];
  if(!file) return;

  bannerPreview.src = URL.createObjectURL(file);
  bannerPreview.style.display = "block";
});

async function uploadBanner(file){
  try{
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = `${app_id}/${Date.now()}.${ext}`;

    const { error } = await supabase.storage
      .from("banners")
      .upload(path, file, { upsert: true });

    if(error){
      console.error(error);
      return null;
    }

    return supabase.storage.from("banners").getPublicUrl(path).data.publicUrl;
  }catch(e){
    console.error(e);
    return null;
  }
}

async function salvar(){
  if(!app_id){
    alert("Negócio não identificado.");
    return;
  }

  btnSalvar.disabled = true;
  btnSalvar.innerText = "Salvando...";
  statusEl.innerText = "";

  let banner_url = null;

  if(bannerInput.files?.[0]){
    banner_url = await uploadBanner(bannerInput.files[0]);
  }

  const payload = {
    app_id,
    nome_site: nomeInput.value.trim() || null,
    whatsapp: whatsappInput.value.trim() || null,
    endereco: enderecoInput.value.trim() || null,
    cidade: cidadeInput.value.trim() || null,
    tema_site: temaSelect.value || "padrao"
  };

  if(banner_url) payload.banner_url = banner_url;

  const { data: existente, error: erroBusca } = await supabase
    .from("config_site")
    .select("id")
    .eq("app_id", app_id)
    .maybeSingle();

  if(erroBusca){
    btnSalvar.disabled = false;
    btnSalvar.innerText = "Salvar configurações";
    alert("Erro ao verificar configuração: " + erroBusca.message);
    return;
  }

  const res = existente
    ? await supabase.from("config_site").update(payload).eq("app_id", app_id)
    : await supabase.from("config_site").insert(payload);

  btnSalvar.disabled = false;
  btnSalvar.innerText = "Salvar configurações";

  if(res.error){
    console.error(res.error);
    statusEl.innerText = "";
    alert("Erro ao salvar: " + res.error.message);
    return;
  }

  statusEl.innerText = "✅ Salvo com sucesso!";
}

async function carregar(){
  if(!app_id) return;

  const { data, error } = await supabase
    .from("config_site")
    .select("*")
    .eq("app_id", app_id)
    .maybeSingle();

  if(error){
    console.error(error);
    return;
  }

  if(!data) return;

  nomeInput.value = data.nome_site || "";
  whatsappInput.value = data.whatsapp || "";
  enderecoInput.value = data.endereco || "";
  cidadeInput.value = data.cidade || "";
  temaSelect.value = data.tema_site || "padrao";

  if(data.banner_url){
    bannerPreview.src = data.banner_url;
    bannerPreview.style.display = "block";
  }
}

btnSalvar.addEventListener("click", salvar);

async function iniciar(){
  const ok = await carregarUsuario();
  if(!ok) return;
  await carregar();
}

iniciar();
</script>

</body>
</html>
